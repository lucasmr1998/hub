Г© R$X por mГӘs sГі em pessoal.\" Deixar o impacto financeiro claro antes de mostrar a soluГ§ГЈo.\n\n---\n\n## Slide 4 вҖ” Demo ao Vivo: Comercial\n\n**Layout:** fluxo visual, fundo claro\n\n**TГӯtulo:**\n> Veja o Comercial funcionando\n\n**Fluxo:**\n```\nLead no WhatsApp вҶ’ Bot qualifica вҶ’ Coleta documentos вҶ’ Gera contrato вҶ’ Ativa no HubSoft\n```\n\n**Nota para o parceiro:**\n> Este Г© o momento da demo ao vivo. Abrir o sistema e navegar em tempo real. O slide fica em segundo plano.\n> SequГӘncia sugerida: mostrar chegada do lead, qualificaГ§ГЈo automГЎtica, coleta de documentos, geraГ§ГЈo do contrato, envio para o HubSoft.\n> Se o prospect usa HubSoft: mostrar a ativaГ§ГЈo em tempo real. Гү o momento de maior impacto da demo.\n\n---\n\n## Slide 5 вҖ” CRM Kanban (Comercial Pro)\n\n**Layout:** screenshot ou mockup do CRM, fundo claro\n\n**TГӯtulo:**\n> VisГЈo completa do pipeline em tempo real\n\n**Texto:**\n> Cada lead qualificado alimenta o CRM automaticamente. Sem lanГ§amento manual. O gestor vГӘ o funil completo, por vendedor, por etapa, por perГӯodo.\n\n**Incluso em:** Comercial Pro\n\n**Nota para o parceiro:**\n> Mostrar o CRM ao vivo se o prospect tem time de 3 pessoas ou mais. Para ISPs menores, focar no fluxo do Slide 4.\n\n---\n\n## Slide 6 вҖ” MГіdulo Marketing\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**TГӯtulo:**\n> Marketing вҖ” o motor de automaГ§ГЈo do hub\n\n**Bloco 1 вҖ” WhatsApp e e-mail**\n> Disparos segmentados com rГ©guas padrГЈo prontas para ISP. Basta ativar.\n\n**Bloco 2 вҖ” Fluxos de automaГ§ГЈo**\n> NutriГ§ГЈo de leads frios, reativaГ§ГЈo de cancelados, upsell de plano. Tudo automГЎtico.\n\n**Bloco 3 вҖ” TrГЎfego pago com IA**\n> GestГЈo de campanhas no Facebook e Google com otimizaГ§ГЈo por inteligГӘncia artificial.\n\n**Status:** Em desenvolvimento. DisponГӯvel em breve.\n\n**Nota para o parceiro:**\n> NГЈo entrar em detalhes de prazo. Se perguntarem quando sai, responder \"em breve, e quem estГЎ com o Comercial ativo terГЎ acesso prioritГЎrio.\"\n\n---\n\n## Slide 7 вҖ” MГіdulo CS\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**TГӯtulo:**\n> CS вҖ” retenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda\n\n**Bloco 1 вҖ” Clube de BenefГӯcios**\n> Streaming, antivГӯrus, rastreamento veicular, plano de saГәde e mais.\n\n**Bloco 2 вҖ” PrevenГ§ГЈo de churn**\n> IA identifica clientes com risco de cancelamento antes do cancelamento.\n\n**Bloco 3 вҖ” NPS e upsell**\n> Pesquisa de satisfaГ§ГЈo automГЎtica. Clientes promotores indicam. Clientes satisfeitos fazem upgrade.\n\n**Status:** Em desenvolvimento. DisponГӯvel em breve.\n\n**Nota para o parceiro:**\n> Mesma abordagem do Marketing. NГЈo comprometer prazo. Focar no valor futuro do hub completo.\n\n---\n\n## Slide 8 вҖ” Case de ProduГ§ГЈo\n\n**Layout:** nГәmeros grandes, fundo dark\n\n**TГӯtulo:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**SubtГӯtulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**MГ©tricas:**\n- **1.000** leads por mГӘs\n- **400** vendas digitais por mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Linha de fechamento:**\n> O sistema que gerou esse resultado Г© o mesmo que vocГӘ acabou de ver funcionando.\n\n**Nota para o parceiro:**\n> Comparar com os nГәmeros do prospect. \"VocГӘs tГӘm X leads por mГӘs. Com esse fluxo, quanto a mais vocГӘs poderiam converter?\" Deixar o prospect fazer a conta.\n\n---\n\n## Slide 9 вҖ” PrecificaГ§ГЈo\n\n**Layout:** 3 colunas, fundo claro\n\n**TГӯtulo:**\n> Investimento\n\n**Tabela Comercial:**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| UsuГЎrios | AtГ© 2 | AtГ© 5 | Ilimitado |\n| CRM Kanban | NГЈo | NГЈo | Sim |\n| Transacional | R$7/venda | R$7/venda | R$7/venda |\n\n**Nota para o parceiro:**\n> Fazer a simulaГ§ГЈo ao vivo com os nГәmeros do prospect.\n> \"VocГӘs fazem X vendas por mГӘs. X Г— R$7 = R$X de transacional. Mais R$797 de mensalidade = R$X total. VocГӘs geram R$X de receita digital por mГӘs. O ROI Г© Xx jГЎ no primeiro mГӘs.\"\n> Deixar o prospect ver o nГәmero na tela. NГЈo apressar.\n\n---\n\n## Slide 10 вҖ” PrГіximos Passos\n\n**Layout:** centralizado, fundo dark\n\n**TГӯtulo:**\n> O que acontece agora\n\n**Para provedores HubSoft:**\n> 14 dias gratuitos. VocГӘ testa com os seus leads reais. Sem compromisso.\n\n**Para demais provedores:**\n> Contrato mensal. Cancelamento a qualquer momento.\n\n**O que precisamos para ativar:**\n> Acesso ao HubSoft. NГәmero de WhatsApp do provedor. Cerca de 1 hora para configurar.\n\n**CTA:**\n> Vamos ativar hoje?\n\n**Nota para o parceiro:**\n> Sempre fechar um prГіximo passo concreto antes de encerrar. Se nГЈo for o contrato, definir data para retorno ou para apresentaГ§ГЈo a outro decisor. Nunca sair da reuniГЈo sem data marcada.\n\n---\n\n## Roteiro de tempo\n\n| Tempo | Slide | AГ§ГЈo |\n|-------|-------|------|\n| 0 a 5 min | 1 e 2 | ApresentaГ§ГЈo, agenda, levantar nГәmeros do prospect |\n| 5 a 10 min | 3 | Validar dores com os nГәmeros reais do prospect |\n| 10 a 25 min | 4 e 5 | Demo ao vivo do Comercial e CRM |\n| 25 a 30 min | 6 e 7 | VisГЈo de Marketing e CS |\n| 30 a 35 min | 8 | Case de produГ§ГЈo, comparar com prospect |\n| 35 a 40 min | 9 | PrecificaГ§ГЈo e simulaГ§ГЈo de ROI ao vivo |\n| 40 a 45 min | 10 | PrГіximos passos, fechar aГ§ГЈo concreta |\n\n---\n\n## Diretrizes visuais\n\n- **Fundo escuro:** #0F172A\n- **Fundo claro:** #F1F5F9\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n"}, {"t": "f", "n": "One Pager Estrutura", "fn": "one_pager_estrutura.md", "c": "# One-pager вҖ” AuroraISP\n**Formato:** 1 slide PPT (16:9) exportado em PDF\n**Canal de uso:** WhatsApp вҖ” enviado antes da demo pelo parceiro comercial\n**Objetivo:** Gerar curiosidade e conseguir 30 minutos de atenГ§ГЈo do dono do ISP\n\n---\n\n## Layout sugerido\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  [LOGO]   AuroraISP                          [Tagline]      в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв”Ӯ  GANCHO                      в”Ӯ   NГҡMEROS DO CASE            в”Ӯ\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв”Ӯ  Pergunta ou afirmaГ§ГЈo que   в”Ӯ   MГ©tricas em destaque       в”Ӯ\nв”Ӯ  ele reconhece no dia a dia  в”Ӯ   (grande, visual, impacto)  в”Ӯ\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв”Ӯ  O QUE Гү                     в”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв”Ӯ  Uma linha explicando        в”Ӯ                              в”Ӯ\nв”Ӯ  o produto                   в”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв”Ӯ  CTA                         в”Ӯ                              в”Ӯ\nв”Ӯ                              в”Ӯ                              в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n## ConteГәdo por bloco\n\n### Header\n- Logo da AuroraISP (esquerda)\n- Tagline: **Vende mais. Perde menos. Fideliza sempre.** (direita)\n\n---\n\n### Bloco esquerdo\n\n**Gancho:**\n> Quantos leads vocГӘ perdeu essa semana por falta de acompanhamento no WhatsApp?\n\n**O que Г© (1 linha):**\n> AuroraISP automatiza o fluxo de vendas do provedor do inГӯcio ao fim, integrado nativamente ao HubSoft.\n\n**CTA:**\n> SГЈo 30 minutos para vocГӘ ver funcionando ao vivo.\n> [Nome do parceiro] вҖ” [contato]\n\n---\n\n### Bloco direito вҖ” Case de produГ§ГЈo\n\n**TГӯtulo do bloco:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**4 mГ©tricas em destaque (nГәmero grande, label pequeno):**\n\n| NГәmero | Label |\n|--------|-------|\n| **400** | vendas digitais por mГӘs |\n| **2** | pessoas no time (eram 8) |\n| **R$284.400** | economia por ano em pessoal |\n| **HubSoft** | integraГ§ГЈo nativa e profunda |\n\n**RodapГ© do bloco:**\n> Provedor regional com 30.000 clientes ativos.\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark (#0F172A) ou branco com elementos azuis\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Tom:** direto, sem rodeios, fala a lГӯngua do provedor\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n\n---\n\n## O que NГғO colocar\n\n- DescriГ§ГЈo dos mГіdulos (Marketing, CS) вҖ” nГЈo Г© hora\n- Tabela de preГ§os вҖ” gera objeГ§ГЈo antes da demo\n- Muitos logos ou elementos visuais вҖ” deve respirar\n- Texto longo вҖ” se precisar de mais de 5 segundos para ler o bloco, corta\n"}, {"t": "f", "n": "Pitch Deck Estrutura", "fn": "pitch_deck_estrutura.md", "c": "# Pitch Deck вҖ” AuroraISP\n**VersГЈo:** 1.0\n**Data:** 26/03/2026\n\n---\n\n## Slide 1 вҖ” Capa\n\n**TГӯtulo:** AuroraISP\n**SubtГӯtulo:** Vende mais. Perde menos. Fideliza sempre.\n**Linha de apoio:** Hub de tecnologia com IA para provedores de internet.\n**RodapГ©:** Pitch Comercial вҖ” Confidencial\n\n---\n\n## Slide 2 вҖ” O Problema\n\n**TГӯtulo:** O dia a dia do time comercial hoje\n\n**4 cards:**\n\n1. **Lead some no WhatsApp**\n   Chega, pergunta o preГ§o e desaparece. NinguГ©m acompanha.\n\n2. **Documentos no caos**\n   Vendedor pede CPF no chat, o cliente manda foto borrada, o processo trava.\n\n3. **AtivaГ§ГЈo manual e lenta**\n   Depois do contrato, alguГ©m precisa lanГ§ar tudo no sistema. Retrabalho todo dia.\n\n4. **Time grande para pouco volume**\n   8 pessoas para atender 1.000 leads por mГӘs. Custo alto, resultado mГ©dio.\n\n---\n\n## Slide 3 вҖ” A SoluГ§ГЈo\n\n**TГӯtulo:** A AuroraISP resolve isso\n\n**Headline:** Do lead ao cliente fidelizado com inteligГӘncia.\n\n**Texto:**\nA Aurora automatiza o fluxo comercial do inГӯcio ao fim. O lead entra no WhatsApp, o bot qualifica, coleta os documentos, gera o contrato e ativa direto no HubSoft. Sem planilha, sem retrabalho, sem lead perdido.\n\n**Destaque:** IntegraГ§ГЈo nativa e profunda com HubSoft. Nenhum concorrente faz isso.\n\n---\n\n## Slide 4 вҖ” Os 3 MГіdulos\n\n**TГӯtulo:** Um hub. TrГӘs mГіdulos. Uma jornada completa.\n\n**3 colunas:**\n\n| Comercial вң… | Marketing рҹ”§ | CS рҹ”§ |\n|---|---|---|\n| Lead no WhatsApp | Disparos de WhatsApp e e-mail | Clube de BenefГӯcios |\n| Bot de qualificaГ§ГЈo | Fluxos de automaГ§ГЈo prontos | PrevenГ§ГЈo de churn |\n| Coleta de documentos | NutriГ§ГЈo de leads | NPS automatizado |\n| GeraГ§ГЈo de contrato | GestГЈo de trГЎfego pago com IA | Upsell de plano e SVA |\n| AtivaГ§ГЈo no HubSoft | RelatГіrios de atribuiГ§ГЈo | SaГәde da base |\n| CRM Kanban (Pro) | | |\n\n---\n\n## Slide 5 вҖ” Case de ProduГ§ГЈo\n\n**TГӯtulo:** Resultado real. Provedor em produГ§ГЈo.\n**SubtГӯtulo:** Provedor regional com 30.000 clientes ativos.\n\n**5 mГ©tricas em destaque:**\n\n- **1.000** leads por mГӘs\n- **400** vendas digitais/mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** no time (eram 8)\n- **R$284.400** economia/ano em pessoal\n\n**Texto de apoio:**\n8 pessoas atendiam 1.000 leads por mГӘs. Hoje 2 pessoas dГЈo conta do mesmo volume. As outras 2 viraram backoffice estratГ©gico, funГ§ГЈo que antes nГЈo existia.\n\n---\n\n## Slide 6 вҖ” Como Funciona\n\n**TГӯtulo:** Do lead ao HubSoft em minutos\n\n**Fluxo visual (5 etapas em sequГӘncia):**\n\n```\nLead no WhatsApp вҶ’ Bot qualifica вҶ’ Coleta documentos вҶ’ Gera contrato вҶ’ Ativa no HubSoft\n```\n\n**Texto de apoio:**\nSem planilha. Sem retrabalho. Sem lead perdido.\nTudo integrado nativamente ao HubSoft.\n\n---\n\n## Slide 7 вҖ” PrecificaГ§ГЈo\n\n**TГӯtulo:** PreГ§o que cresce com o provedor\n\n**3 planos (por mГіdulo):**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| PГәblico | ISPs pequenos | ISPs em crescimento | ISPs estabelecidos |\n| UsuГЎrios | AtГ© 2 | AtГ© 5 | Ilimitado |\n| Suporte | Standard | Standard | PrioritГЎrio |\n| Destaque | Entrada acessГӯvel | Mais popular | IA + CRM Kanban |\n\n**Nota:** Cada mГіdulo (Comercial, Marketing, CS) tem seu prГіprio plano. Transacional por uso incluso.\n\n---\n\n## Slide 8 вҖ” Diferenciais\n\n**TГӯtulo:** Por que AuroraISP\n\n**6 cards:**\n\n1. **HubSoft nativo**\n   IntegraГ§ГЈo profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso.\n\n2. **Case real**\n   Resultado comprovado em produГ§ГЈo. NГЈo Г© promessa. SГЈo nГәmeros reais de um provedor com 30.000 clientes.\n\n3. **IA no processo**\n   QualificaГ§ГЈo, validaГ§ГЈo, sugestГЈo de campanha e prevenГ§ГЈo de churn com inteligГӘncia artificial.\n\n4. **PreГ§o que faz sentido**\n   ROI positivo no primeiro mГӘs. O transacional alinha o sucesso da Aurora com o sucesso do provedor.\n\n5. **Trial para HubSoft**\n   14 dias gratuitos para quem jГЎ usa HubSoft. Em 14 dias dГЎ para ver resultado real.\n\n6. **Hub completo**\n   Comercial, Marketing e CS em uma plataforma. Do lead ao cliente fidelizado.\n\n---\n\n## Slide 9 вҖ” CTA\n\n**TГӯtulo:** PrГіximo passo\n\n**Headline:** SГЈo 30 minutos para vocГӘ ver funcionando.\n\n**SubtГӯtulo:** Demo ao vivo. Sem compromisso.\n\n**BotГЈo:** Agendar demonstraГ§ГЈo\n\n**Linha de apoio:** Provedores HubSoft: 14 dias gratuitos para testar.\n\n**Site:** auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark mode (#0F172A)\n- **Cor primГЎria:** azul (#2563EB)\n- **Acento:** ciano (#06B6D4)\n- **Texto principal:** branco\n- **Texto secundГЎrio:** cinza claro (#F1F5F9)\n- **Tipografia:** Inter\n- **Tom:** direto, confiante, sem exagero\n"}, {"t": "f", "n": "Pre Demo Deck Estrutura", "fn": "pre_demo_deck_estrutura.md", "c": "# Pre-demo Deck вҖ” AuroraISP\n**Formato:** 6 slides PPT (16:9) exportado em PDF\n**Canal:** WhatsApp вҖ” enviado pelo parceiro antes da demo\n**Objetivo:** Gerar interesse nos 3 mГіdulos e converter para uma reuniГЈo de demo\n\n---\n\n## Slide 1 вҖ” Capa\n\n**Layout:** centralizado, fundo dark\n\n**Logo:** [inserir quando disponГӯvel]\n\n**TГӯtulo:**\n> AuroraISP\n\n**Tagline (destaque, fonte grande):**\n> Vende mais. Perde menos. Fideliza sempre.\n\n**SubtГӯtulo:**\n> Hub de tecnologia com IA para provedores de internet.\n\n---\n\n## Slide 2 вҖ” O Problema\n\n**Layout:** 4 cards em linha, fundo claro\n\n**TГӯtulo do slide:**\n> O que acontece todo dia no seu provedor\n\n**Card 1 вҖ” Lead some no WhatsApp**\n> O cliente pergunta o preГ§o e desaparece. NinguГ©m acompanha. O lead esfria.\n\n**Card 2 вҖ” Documentos no caos**\n> Vendedor pede CPF no chat, cliente manda foto borrada, processo trava. A venda morre na burocracia.\n\n**Card 3 вҖ” AtivaГ§ГЈo manual e lenta**\n> Depois do contrato, alguГ©m precisa lanГ§ar tudo no sistema. Retrabalho todo dia, toda venda.\n\n**Card 4 вҖ” Time grande, resultado mГ©dio**\n> Muitas pessoas para atender poucos leads. Custo alto. ConversГЈo baixa.\n\n---\n\n## Slide 3 вҖ” Os 3 MГіdulos\n\n**Layout:** 3 colunas, fundo dark\n\n**TГӯtulo do slide:**\n> Um hub completo. Do lead ao cliente fidelizado.\n\n**Coluna 1 вҖ” Comercial** вң… DisponГӯvel\n> AutomaГ§ГЈo do fluxo de vendas do inГӯcio ao fim.\n> Lead no WhatsApp. Bot qualifica. Documentos coletados. Contrato gerado. AtivaГ§ГЈo no HubSoft.\n> Tudo sem intervenГ§ГЈo manual.\n\n**Coluna 2 вҖ” Marketing** Em breve\n> Motor de automaГ§ГЈo do hub.\n> E-mail e WhatsApp com fluxos prontos. NutriГ§ГЈo de leads. Campanhas com IA. TrГЎfego pago gerenciado.\n> RГ©guas padrГЈo jГЎ configuradas para o setor.\n\n**Coluna 3 вҖ” CS** Em breve\n> RetenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda.\n> Clube de BenefГӯcios. PrevenГ§ГЈo de churn. NPS automatizado. Upsell de plano e SVA.\n> Cliente que fica, e que compra mais.\n\n**Linha de apoio (rodapГ©):**\n> IntegraГ§ГЈo nativa e profunda com HubSoft em todos os mГіdulos.\n\n---\n\n## Slide 4 вҖ” Case de ProduГ§ГЈo\n\n**Layout:** nГәmeros grandes em destaque, fundo dark\n\n**TГӯtulo do slide:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**SubtГӯtulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**5 mГ©tricas (nГәmero grande + label):**\n\n- **1.000** leads por mГӘs\n- **400** vendas digitais por mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Texto de apoio:**\n> 8 pessoas para atender 1.000 leads por mГӘs. Hoje, 2 pessoas dГЈo conta do mesmo volume. As outras 2 viraram backoffice estratГ©gico. FunГ§ГЈo que antes nГЈo existia.\n\n---\n\n## Slide 5 вҖ” Por que AuroraISP\n\n**Layout:** 4 cards em grade 2x2, fundo claro\n\n**TГӯtulo do slide:**\n> Por que a AuroraISP Г© diferente\n\n**Card 1 вҖ” HubSoft nativo**\n> IntegraГ§ГЈo profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso. Os dados do ERP alimentam todo o hub em tempo real.\n\n**Card 2 вҖ” Case real, nГЈo promessa**\n> Resultado comprovado em produГ§ГЈo. NГәmeros reais de um provedor com 30.000 clientes. VocГӘ vГӘ funcionando antes de assinar.\n\n**Card 3 вҖ” IA no processo**\n> QualificaГ§ГЈo de leads, validaГ§ГЈo de documentos, sugestГЈo de campanha e prevenГ§ГЈo de churn. InteligГӘncia onde o provedor mais precisa.\n\n**Card 4 вҖ” PreГ§o que faz sentido**\n> ROI positivo no primeiro mГӘs. O modelo transacional cresce junto com o provedor. VocГӘ paga mais quando vende mais.\n\n---\n\n## Slide 6 вҖ” CTA\n\n**Layout:** centralizado, fundo dark com destaque azul\n\n**TГӯtulo:**\n> Veja funcionando. 30 minutos.\n\n**SubtГӯtulo:**\n> Demo ao vivo, sem compromisso.\n> VocГӘ traz os seus nГәmeros, a gente mostra o que a Aurora faria com eles.\n\n**Destaque:**\n> Provedores HubSoft: 14 dias gratuitos para testar.\n\n**Contato:**\n> [Nome do parceiro]\n> [WhatsApp]\n> auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo slides escuros:** #0F172A\n- **Fundo slides claros:** #F1F5F9\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n- **Tom:** direto, prГіximo, confiante. Fala a lГӯngua do provedor.\n"}]}, {"t": "d", "n": "fluxos", "ch": [{"t": "f", "n": "Crm Parceiro", "fn": "crm_parceiro.md", "c": "# CRM do Parceiro вҖ” AuroraISP\n\n**VersГЈo:** 1.0\n**Data:** 28/03/2026\n\n---\n\n## QualificaГ§ГЈo de entrada\n\nTodo lead entra com uma qualificaГ§ГЈo definida na primeira etapa. Isso determina a prioridade e o caminho no pipeline, nГЈo se o lead entra ou nГЈo.\n\n| QualificaГ§ГЈo | CritГ©rio | Impacto |\n|--------------|----------|---------|\n| **A** | Usa HubSoft | Alta prioridade. Trial de 14 dias disponГӯvel. IntegraГ§ГЈo nativa |\n| **B** | Outro ERP | MГ©dia prioridade. Entra no pipeline normalmente, sem trial |\n\n---\n\n## Pipeline вҖ” 5 estГЎgios\n\n### 1. Lead identificado\n\n**CritГ©rio de avanГ§o:** contato do decisor confirmado.\n\n**Campos obrigatГіrios:**\n- Nome do provedor\n- Cidade\n- Nome do decisor\n- WhatsApp do decisor\n- ERP utilizado\n- QualificaГ§ГЈo (A ou B)\n- Estimativa de clientes ativos\n- Estimativa de vendedores\n- Fonte do lead (comunidade, indicaГ§ГЈo, outbound, evento, inbound)\n\n---\n\n### 2. Em contato\n\n**Tarefas internas:**\n- [ ] DiagnГіstico enviado\n- [ ] Demo agendada\n- [ ] Demo realizada\n\n**CritГ©rio de avanГ§o:** demo realizada com decisor presente e sem objeГ§ГЈo bloqueante.\n\n**Campos obrigatГіrios:**\n- Data do diagnГіstico enviado\n- Data da demo agendada\n- Data da demo realizada\n- Decisor presente na demo (sim/nГЈo)\n- Dores principais identificadas\n- SimulaГ§ГЈo de ROI com dados reais do ISP\n\n---\n\n### 3. Em negociaГ§ГЈo\n\n**Tarefas internas:**\n- [ ] Proposta enviada\n- [ ] Follow-up D+2\n- [ ] Follow-up D+5\n\n**CritГ©rio de avanГ§o:** prospect sinalizou interesse em fechar ou iniciou trial.\n\n**Campos obrigatГіrios:**\n- MГіdulo(s) de interesse\n- Plano de interesse (Starter / Start / Pro)\n- MRR estimado\n- Data da proposta enviada\n- ObjeГ§Гөes levantadas\n- PrГіxima aГ§ГЈo e data\n\n---\n\n### 4. Trial ativo\n\n*(Exclusivo para leads qualificaГ§ГЈo A вҖ” HubSoft)*\n\n**Tarefas internas:**\n- [ ] AtivaГ§ГЈo feita\n- [ ] Acompanhamento D+7\n- [ ] Encerramento D+14\n\n**CritГ©rio de avanГ§o:** trial encerrado com decisГЈo tomada.\n\n**Campos obrigatГіrios:**\n- Data de inГӯcio do trial\n- Data de encerramento prevista\n- MГіdulo em trial\n- ResponsГЎvel Aurora pelo acompanhamento\n\n---\n\n### 5. Finalizada\n\n**Campos obrigatГіrios:**\n- Resultado: Ganho / Perdido\n- Se ganho: mГіdulo(s) contratado(s), plano, MRR fechado, data de inГӯcio\n- Se perdido: motivo da perda, data de encerramento\n\n---\n\n## Responsabilidades\n\n| Atividade | Parceiro | Aurora |\n|-----------|----------|--------|\n| Preencher e avanГ§ar cards | вң… | вҖ” |\n| RevisГЈo semanal do funil | Participa | Conduz |\n| AtivaГ§ГЈo e onboarding | вҖ” | вң… |\n| Acompanhamento do trial | вҖ” | вң… |\n\n---\n\n## ObservaГ§ГЈo\n\nEnquanto o mГіdulo Comercial Pro nГЈo inclui CRM prГіprio para a AuroraISP, este documento serve como base para configurar a ferramenta provisГіria do parceiro (Notion, Planilha Google ou Pipedrive).\n"}]}, {"t": "d", "n": "reguas", "ch": [{"t": "f", "n": "Regua Recuperacao Pos Trial Estrutura", "fn": "regua_recuperacao_pos_trial_estrutura.md", "c": "# RГ©gua de RecuperaГ§ГЈo PГіs-Trial вҖ” AuroraISP\n**Canal:** WhatsApp, E-mail, NotificaГ§ГЈo no sistema\n**DuraГ§ГЈo:** 30 dias apГіs encerramento do trial\n**LГіgica:** Escalada de oferta. Quanto mais tempo passa, mais agressiva a oferta.\n**Objetivo:** Recuperar prospects que nГЈo converteram no trial nos primeiros 30 dias.\n\n---\n\n## SegmentaГ§ГЈo\n\n| Segmento | DefiniГ§ГЈo |\n|----------|-----------|\n| **Usou o trial** | Processou ao menos 1 lead durante os 14 dias |\n| **NГЈo usou o trial** | Nunca logou ou nГЈo processou nenhum lead |\n\n---\n\n## Escalada por segmento\n\n| Dia | Usou o trial | NГЈo usou o trial |\n|-----|-------------|-----------------|\n| D+1 | \"VocГӘ viu funcionar. O que travou a decisГЈo?\" вҖ” sem oferta | \"O trial passou sem vocГӘ testar. O que aconteceu?\" вҖ” sem oferta |\n| D+7 | 1 mГӘs com 30% de desconto | ExtensГЈo do trial por 7 dias |\n| D+15 | Setup gratuito | 1 mГӘs com 30% de desconto |\n| D+22 | Setup gratuito + 1 mГӘs com 50% de desconto | Setup gratuito |\n| D+30 | Primeiro mГӘs grГЎtis. Гҡltima tentativa. | Primeiro mГӘs grГЎtis. Гҡltima tentativa. |\n\n---\n\n## Canais por touchpoint\n\n| Dia | Canal |\n|-----|-------|\n| D+1 | WhatsApp (PMM) |\n| D+7 | WhatsApp (PMM) + E-mail |\n| D+15 | E-mail + WhatsApp (PMM) |\n| D+22 | WhatsApp (parceiro) + E-mail |\n| D+30 | WhatsApp (parceiro) + E-mail |\n\n> D+22 e D+30 passam para o parceiro вҖ” sГЈo os momentos mais comerciais do ciclo.\n\n---\n\n## ApГіs D+30 sem resposta\n\nEncerrar ciclo ativo. Mover para nurturing passivo (conteГәdo periГіdico, sem oferta direta).\n\n---\n\n## PendГӘncias\n\n- [ ] Escrever textos de cada mensagem por canal e segmento\n- [ ] Definir condiГ§ГЈo de encerramento antecipado (ex: prospect responde negativamente de forma definitiva)\n"}, {"t": "f", "n": "Regua Trial Estrutura", "fn": "regua_trial_estrutura.md", "c": "# RГ©gua de ConversГЈo do Trial вҖ” AuroraISP\n**Canal:** WhatsApp, E-mail, NotificaГ§ГЈo no sistema\n**DuraГ§ГЈo:** 14 dias\n**LГіgica:** Orientada por comportamento. Dois trilhos a partir do D+1.\n**Objetivo:** Fazer o cliente usar a ferramenta, mostrar resultados e converter para pagante.\n\n---\n\n## Etapa comum вҖ” todos os prospects\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas, orientar primeiro passo, criar expectativa dos 14 dias | E-mail |\n\n---\n\n## BifurcaГ§ГЈo вҖ” D+1\n\n```\nD+0 вҖ” E-mail de boas-vindas (todos)\n         вҶ“\nD+1 вҖ” Primeiro acesso detectado?\n    в”ңв”Җв”Җ SIM вҶ’ Trilho Ativo\n    в””в”Җв”Җ NГғO вҶ’ Trilho Inativo\n```\n\n---\n\n## Trilho Ativo вҖ” usou o sistema\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas e orientaГ§ГЈo inicial | E-mail |\n| D+1 вҡЎ | Primeiro lead processado | Celebrar, mostrar o dado gerado em tempo real | NotificaГ§ГЈo no sistema |\n| D+3 | Usando ativamente | RelatГіrio: leads processados, conversГөes, tempo economizado | E-mail |\n| D+7 | Usando | Mostrar funcionalidade que ainda nГЈo usou. Ampliar valor percebido | E-mail |\n| D+10 | вҖ” | \"VocГӘ jГЎ viu o resultado. Vamos garantir a continuidade?\" | WhatsApp (parceiro) |\n| D+12 | вҖ” | Oferta de fechamento com urgГӘncia | WhatsApp (parceiro) + E-mail |\n| D+14 | вҖ” | Encerramento formal. Proposta de contrato | E-mail + NotificaГ§ГЈo |\n\n---\n\n## Trilho Inativo вҖ” nГЈo usou o sistema\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas e orientaГ§ГЈo inicial | E-mail |\n| D+1 | NГЈo logou | Verificar se teve algum problema tГ©cnico para comeГ§ar | WhatsApp (PMM) |\n| D+3 | Ainda inativo | Oferecer sessГЈo de ativaГ§ГЈo assistida ao vivo | WhatsApp (PMM) |\n| D+5 | Ainda inativo | Entender o motivo вҖ” pergunta direta e sem julgamento | WhatsApp (PMM) |\n| D+7 | Ainda inativo | Гҡltima tentativa de ativaГ§ГЈo com argumento de urgГӘncia | E-mail + WhatsApp (PMM) |\n| D+10 | вҖ” | Parceiro entra para entender, desbloquear e tentar salvar | WhatsApp (parceiro) |\n\n---\n\n## ConvergГӘncia вҖ” D+10 em diante (ambos os trilhos)\n\n| Dia | Objetivo | Canal |\n|-----|----------|-------|\n| D+10 | Parceiro faz contato comercial. Ativo: fechar. Inativo: entender e desbloquear | WhatsApp (parceiro) |\n| D+12 | UrgГӘncia. 2 dias restantes. Oferta de fechamento | WhatsApp (parceiro) + E-mail |\n| D+14 | Encerramento. Converter ou mover para nurturing de longo prazo | E-mail + NotificaГ§ГЈo |\n\n---\n\n## PГіs-trial вҖ” nГЈo converteu\n\nQuem chega ao D+14 sem converter entra na **RГ©gua de RecuperaГ§ГЈo PГіs-Trial** (a definir separadamente).\n\n> A oferta especial Г© reservada para o pГіs-trial. Durante os 14 dias o foco Г© ativaГ§ГЈo e valor, nГЈo desconto. Quem jГЎ conhece o produto e nГЈo converteu Г© o candidato ideal para uma oferta de reentrada.\n\n---\n\n## PendГӘncias\n\n- [ ] Escrever os textos de cada mensagem por canal\n- [ ] Definir ferramenta que detecta uso/nГЈo uso para bifurcar os trilhos\n- [ ] Criar RГ©gua de RecuperaГ§ГЈo PГіs-Trial com oferta especial\n"}]}, {"t": "d", "n": "scripts_vendas", "ch": [{"t": "f", "n": "Diagnostico Whatsapp", "fn": "diagnostico_whatsapp.md", "c": "# Script de DiagnГіstico вҖ” WhatsApp\n**Uso:** Parceiro conduz a conversa antes de marcar a demo\n**Tom:** PrГіximo, consultivo, sem forГ§ar venda\n**Tempo estimado:** 5 a 10 minutos de conversa\n\n---\n\n## Abertura\n\n> \"Oi [nome], tudo bem? Antes de a gente marcar a demo, quero entender melhor a operaГ§ГЈo de vocГӘs para personalizar o que vou mostrar. SГЈo sГі algumas perguntas rГЎpidas.\"\n\n---\n\n## QualificaГ§ГЈo (obrigatГіrio antes de avanГ§ar)\n\n**ERP:**\n> \"Qual sistema vocГӘs usam para gestГЈo? HubSoft, Voalle, SGP, outro?\"\n\n**Porte:**\n> \"Quantos clientes ativos vocГӘs tГӘm hoje, mais ou menos?\"\n\n**Time:**\n> \"Quantas pessoas trabalham no comercial ou no atendimento?\"\n\n**Decisor:**\n> \"VocГӘ Г© quem decide sobre novas ferramentas ou tem mais alguГ©m envolvido nisso?\"\n\n> Se nГЈo for o decisor: \"Faz sentido a gente incluir essa pessoa na demo tambГ©m? Assim ela vГӘ tudo ao vivo e vocГӘs decidem juntos.\"\n\n---\n\n## DiagnГіstico completo\n\n### OperaГ§ГЈo\n\n> \"Quantos leads chegam mais ou menos por mГӘs? Pode ser uma estimativa.\"\n\n> \"E de quantas viram venda? Sabe mais ou menos a taxa?\"\n\n> \"Qual o ticket mГ©dio do plano que mais vendem?\"\n\n> \"Hoje os leads chegam principalmente por onde, WhatsApp, indicaГ§ГЈo, trГЎfego pago?\"\n\n### Time\n\n> \"Quantas pessoas vocГӘs tГӘm no comercial hoje no total?\"\n\n> \"Tem alguГ©m sГі para backoffice, tipo lanГ§ar no sistema, gerar contrato, essas coisas?\"\n\n### Ferramentas\n\n> \"Como vocГӘs gerenciam os leads hoje, tem algum sistema ou Г© mais no WhatsApp e planilha?\"\n\n> \"Usam alguma ferramenta de CRM?\"\n\n### Dores\n\n> \"Me conta onde vocГӘs perdem mais lead no processo. Гү no primeiro contato, na hora dos documentos, na demora para ativar?\"\n\n> \"Quanto tempo leva em mГ©dia do lead chegar atГ© o cliente ser ativado no HubSoft?\"\n\n> \"VocГӘs tГӘm problema com churn, cancelamento, cliente indo embora?\"\n\n### Objetivos\n\n> \"O que vocГӘs querem melhorar no comercial nos prГіximos meses?\"\n\n---\n\n## Encerramento e agendamento\n\n> \"Perfeito, obrigado. Com essas informaГ§Гөes consigo montar uma demo bem personalizada para vocГӘs.\"\n\n> \"JГЎ calculei aqui: com o volume de vocГӘs, a Aurora pagaria por si mesma no primeiro mГӘs. Vou mostrar isso ao vivo na demo.\"\n\n> \"Quando vocГӘ tem 30 minutos para a gente fazer isso? Pode ser essa semana.\"\n\n---\n\n## Resumo para registrar apГіs a conversa\n\nApГіs a conversa, registrar:\n\n| Campo | Resposta |\n|-------|----------|\n| Nome e provedor | |\n| ERP | |\n| Clientes ativos | |\n| Leads/mГӘs | |\n| Vendas digitais/mГӘs | |\n| Ticket mГ©dio | |\n| Pessoas no comercial | |\n| Maior dor | |\n| Decisor presente na demo? | |\n| Qualificado? (sim/nГЈo) | |\n| Data da demo agendada | |\n"}]}]}];

  document.getElementById('btn-backlog').classList.toggle('active', !isDocs);
}

// в”Җв”Җ Sidebar with accordions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let allFiles = [];
let activeFileEl = null;

function countFiles(node) {
  if (node.t === 'f') return 1;
  return (node.ch || []).reduce((s, c) => s + countFiles(c), 0);
}

function buildTree(nodes, container, depth) {
  nodes.forEach(node => {
    if (node.t === 'd') {
      const fileCount = countFiles(node);
      const acc = document.createElement('div');
      acc.className = 'sb-accordion';

      const header = document.createElement('div');
      header.className = 'sb-acc-header';
      if (depth > 0) { header.style.paddingLeft = (12 + depth * 10) + 'px'; header.style.fontSize = '.74rem'; }
      header.innerHTML = `<i class="sb-icon bi bi-folder-fill"></i><span>${node.n}</span><span class="sb-count">(${fileCount})</span><i class="sb-arrow bi bi-chevron-right"></i>`;
      header.onclick = (e) => { e.preventDefault(); e.stopPropagation(); acc.classList.toggle('open'); return false; };

      const body = document.createElement('div');
      body.className = 'sb-acc-body';
      buildTree(node.ch || [], body, depth + 1);

      acc.appendChild(header);
      acc.appendChild(body);
      container.appendChild(acc);

    } else if (node.t === 'f') {
      const row = document.createElement('div');
      row.className = 'si' + (depth === 0 ? ' si-root' : '');
      row.innerHTML = `<i class="si-icon bi bi-file-earmark-text"></i><span>${node.n}</span>`;
      row.onclick = (e) => { e.stopPropagation(); openDoc(node, row); };
      container.appendChild(row);
      allFiles.push({ node, el: row });
    }
  });
}

function openDoc(node, el) {
  if (activeFileEl) activeFileEl.classList.remove('active');
  activeFileEl = el;
  el.classList.add('active');
  document.getElementById('breadcrumb-text').textContent = ' / ' + node.fn;
  const content = document.getElementById('doc-content');
  const html = marked.parse(node.c || '');
  content.innerHTML = `<div class="md">${html}</div>`;

  // render checkboxes
  content.querySelectorAll('li').forEach(li => {
    const t = li.childNodes[0];
    if (t && t.nodeType === 3) {
      const txt = t.textContent;
      if (/^\[( |x)\] /i.test(txt)) {
        const done = txt[1].toLowerCase() === 'x';
        const rest = txt.slice(4);
        li.innerHTML = `<input type="checkbox" ${done ? 'checked' : ''} disabled class="me-1">${rest}${li.innerHTML.replace(txt,'')}`;
      }
    }
  });

  // Transformar h2 em accordions
  convertH2ToAccordions(content.querySelector('.md'));

  document.getElementById('doc-panel').scrollTop = 0;
}

function convertH2ToAccordions(container) {
  if (!container) return;
  const children = Array.from(container.childNodes);
  const sections = [];
  let headerContent = []; // conteГәdo antes do primeiro h2 (tГӯtulo, intro)
  let currentSection = null;

  children.forEach(child => {
    if (child.nodeType === 1 && child.tagName === 'H2') {
      if (currentSection) sections.push(currentSection);
      currentSection = { title: child.textContent, elements: [] };
    } else if (currentSection) {
      currentSection.elements.push(child);
    } else {
      headerContent.push(child);
    }
  });
  if (currentSection) sections.push(currentSection);

  // Se tem menos de 2 seГ§Гөes h2, nГЈo vale converter
  if (sections.length < 2) return;

  // Limpar container
  container.innerHTML = '';

  // Re-adicionar o conteГәdo antes do primeiro h2 (tГӯtulo do doc)
  headerContent.forEach(el => container.appendChild(el));

  // Criar accordions
  sections.forEach((section, i) => {
    // Contar checkboxes na seГ§ГЈo
    const tempDiv = document.createElement('div');
    section.elements.forEach(el => tempDiv.appendChild(el.cloneNode(true)));
    const allChecks = tempDiv.querySelectorAll('li');
    let totalChecks = 0, doneChecks = 0;
    allChecks.forEach(li => {
      const txt = li.textContent.trim();
      if (/^\[.\]/.test(txt) || li.querySelector('input[type=checkbox]')) {
        totalChecks++;
        if (/^\[x\]/i.test(txt) || (li.querySelector('input[type=checkbox]') && li.querySelector('input[type=checkbox]').checked)) {
          doneChecks++;
        }
      }
    });
    // TambГ©m contar via emojis de status nas tabelas
    const allTds = tempDiv.querySelectorAll('td');
    let statusDone = 0, statusTotal = 0;
    allTds.forEach(td => {
      const t = td.textContent.trim();
      if (t === 'вң…' || t.startsWith('вң…')) { statusDone++; statusTotal++; }
      else if (t === 'вҸі' || t.startsWith('вҸі') || t === 'рҹҹЎ' || t.startsWith('рҹҹЎ') || t === 'рҹ”§' || t.startsWith('рҹ”§')) { statusTotal++; }
    });
    if (statusTotal > totalChecks) { totalChecks = statusTotal; doneChecks = statusDone; }

    const allDone = totalChecks > 0 && doneChecks === totalChecks;
    const hasTasks = totalChecks > 0;
    const pending = totalChecks - doneChecks;

    // Badge de progresso
    let badge = '';
    if (allDone) {
      badge = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;color:#16a34a;background:#dcfce7;padding:2px 8px;border-radius:99px;"><i class="bi bi-check-circle-fill"></i> Completo</span>`;
    } else if (hasTasks) {
      badge = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;color:#d97706;background:#fef3c7;padding:2px 8px;border-radius:99px;"><i class="bi bi-clock"></i> ${pending} pendente${pending > 1 ? 's' : ''}</span>`;
    }

    const acc = document.createElement('div');
    acc.className = 'content-accordion';
    const borderColor = allDone ? '#bbf7d0' : '#e2e8f0';
    acc.style.cssText = `margin-bottom:8px; border:1px solid ${borderColor}; border-radius:10px; overflow:hidden; background:#fff;`;
    if (allDone) acc.style.borderLeftWidth = '3px';
    if (allDone) acc.style.borderLeftColor = '#22c55e';

    const header = document.createElement('div');
    const headerBg = allDone ? '#f0fdf4' : '#f8fafc';
    header.style.cssText = `padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-weight:700; font-size:.9rem; color:#1e293b; background:${headerBg}; user-select:none; transition:background .1s;`;
    header.innerHTML = `<span style="flex:1;">${section.title}</span>${badge}<i class="bi bi-chevron-down" style="font-size:.7rem; color:#94a3b8; transition:transform .2s;"></i>`;

    const body = document.createElement('div');
    body.style.cssText = 'padding:0 16px 16px; display:none;';
    section.elements.forEach(el => body.appendChild(el));

    // Primeiro accordion aberto por padrГЈo
    if (i === 0) {
      body.style.display = 'block';
      header.querySelector('i').style.transform = 'rotate(180deg)';
      header.style.background = '#fff';
    }

    header.onmouseenter = () => { if (body.style.display === 'none') header.style.background = '#f1f5f9'; };
    header.onmouseleave = () => { header.style.background = body.style.display === 'none' ? '#f8fafc' : '#fff'; };

    header.onclick = (e) => {
      e.stopPropagation();
      const open = body.style.display === 'none';
      body.style.display = open ? 'block' : 'none';
      header.querySelector('i').style.transform = open ? 'rotate(180deg)' : 'rotate(0)';
      header.style.background = open ? '#fff' : '#f8fafc';
    };

    acc.appendChild(header);
    acc.appendChild(body);
    container.appendChild(acc);
  });
}

function searchDocs(q) {
  q = q.toLowerCase().trim();
  // expand all folders while searching
  document.querySelectorAll('.sf-children').forEach(el => {
    el.parentElement.classList.toggle('sf-open', !!q);
    const icon = el.parentElement.querySelector('.si-icon');
    if (icon) icon.className = `si-icon bi ${q ? 'bi-folder2-open' : 'bi-folder-fill'}`;
  });
  allFiles.forEach(({ node, el }) => {
    const match = !q
      || node.n.toLowerCase().includes(q)
      || node.fn.toLowerCase().includes(q)
      || (node.c || '').toLowerCase().includes(q);
    el.style.display = match ? 'flex' : 'none';
  });
}

// в”Җв”Җ Backlog в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const STATUS = {
  pendente:     { label: 'Pendente',     color: '#f97316', bg: '#fff7ed', icon: 'bi-clock-history',     statBg: '#fff7ed', statColor: '#f97316' },
  em_andamento: { label: 'Em andamento', color: '#3b82f6', bg: '#eff6ff', icon: 'bi-arrow-repeat',       statBg: '#eff6ff', statColor: '#3b82f6' },
  finalizada:   { label: 'Finalizada',   color: '#22c55e', bg: '#f0fdf4', icon: 'bi-check-circle',       statBg: '#f0fdf4', statColor: '#22c55e' },
};

function renderBacklog() {
  const wrap = document.getElementById('view-backlog');

  const byStatus = { pendente: [], em_andamento: [], finalizada: [] };
  TASKS.forEach(t => { if (byStatus[t.status]) byStatus[t.status].push(t); });
  const total = TASKS.length;

  // Stats
  const statsHtml = `
    <div class="row g-3 mb-4">
      ${['pendente','em_andamento','finalizada'].map(s => {
        const cfg = STATUS[s];
        const n = byStatus[s].length;
        return `
        <div class="col-sm-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:${cfg.statBg}">
              <i class="bi ${cfg.icon}" style="color:${cfg.statColor}"></i>
            </div>
            <div>
              <div class="stat-num">${n}</div>
              <div class="stat-label">${cfg.label}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
      <div class="col-sm-6 col-lg-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#f1f5f9">
            <i class="bi bi-list-task" style="color:#64748b"></i>
          </div>
          <div>
            <div class="stat-num">${total}</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>
    </div>`;

  // Kanban
  const colsHtml = `
    <div class="row g-3 align-items-start">
      ${['pendente','em_andamento','finalizada'].map(s => {
        const cfg = STATUS[s];
        const cards = byStatus[s].map((t, i) => taskCardHtml(t, s + i, cfg.color)).join('');
        const empty = !byStatus[s].length ? `<div class="kb-empty"><i class="bi bi-inbox mb-2 d-block" style="font-size:1.5rem;opacity:.3"></i>Nenhuma tarefa</div>` : '';
        return `
        <div class="col-lg-4">
          <div class="kb-col">
            <div class="kb-header" style="border-left: 4px solid ${cfg.color}; background: ${cfg.bg}">
              <span class="kb-title" style="color:${cfg.color}">${cfg.label}</span>
              <span class="badge rounded-pill text-white" style="background:${cfg.color}">${byStatus[s].length}</span>
            </div>
            <div class="kb-body">${cards}${empty}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  wrap.innerHTML = statsHtml + colsHtml;
}

function taskCardHtml(t, uid, color) {
  const pct = t.total > 0 ? Math.round((t.done / t.total) * 100) : 0;
  const date = t.created ? `<span style="font-size:.68rem;color:#94a3b8">${t.created}</span>` : '';
  const desc = t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : '';
  const progressHtml = t.total > 0 ? `
    <div class="task-progress"><div class="task-progress-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="task-meta">
      <span class="task-count">${t.done}/${t.total} tarefas &bull; ${pct}%</span>
      <button class="task-toggle" onclick="toggleChecklist('cl-${uid}',this)">Ver tarefas</button>
    </div>` : '';

  const checklistItems = t.items.map(item => {
    const cls = item.d ? 'ci ci-done' : 'ci ci-pend';
    const icon = item.d ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary';
    return `<div class="${cls}"><i class="ci-icon bi ${icon}"></i><span>${esc(item.t)}</span></div>`;
  }).join('');

  const checklist = t.items.length ? `<div class="task-checklist" id="cl-${uid}">${checklistItems}</div>` : '';

  return `
  <div class="task-card" style="border-left-color:${color}">
    <div class="d-flex justify-content-between align-items-start mb-1">
      <div class="task-name">${esc(t.name)}</div>
      ${date}
    </div>
    ${desc}
    ${progressHtml}
    ${checklist}
  </div>`;
}

function toggleChecklist(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? 'Ocultar' : 'Ver tarefas';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// в”Җв”Җ Summary в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSummary() {
  const totalDocs = allFiles.length;
  const totalTasks = TASKS.length;
  const doneTasks = TASKS.filter(t => t.status === 'finalizada').length;
  const pendTasks = TASKS.filter(t => t.status === 'pendente').length;

  // Agrupar docs por pasta de primeiro nГӯvel
  const folders = {};
  TREE.forEach(node => {
    if (node.t === 'd') {
      folders[node.n] = countFiles(node);
    }
  });

  // Encontrar docs do GTM
  let gtmFiles = [];
  function findGtm(nodes, path) {
    nodes.forEach(n => {
      if (n.t === 'd' && n.n === 'GTM') {
        (n.ch || []).forEach(f => { if (f.t === 'f') gtmFiles.push(f); });
      } else if (n.t === 'd') {
        findGtm(n.ch || [], path + '/' + n.n);
      }
    });
  }
  findGtm(TREE, '');

  const gtmHtml = gtmFiles.map(f =>
    `<div class="doc-link" onclick="openDocByName('${f.fn}')"><i class="bi bi-file-earmark-text"></i>${f.n}</div>`
  ).join('');

  // Tarefas recentes (finalizadas)
  const recentDone = TASKS.filter(t => t.status === 'finalizada').slice(0, 5);
  const recentPend = TASKS.filter(t => t.status === 'pendente').slice(0, 5);

  const doneHtml = recentDone.map(t =>
    `<div class="doc-link" style="border-left:3px solid #22c55e;"><i class="bi bi-check-circle-fill" style="color:#22c55e;"></i>${esc(t.name)}</div>`
  ).join('');

  const pendHtml = recentPend.map(t =>
    `<div class="doc-link" style="border-left:3px solid #f97316;"><i class="bi bi-clock" style="color:#f97316;"></i>${esc(t.name)}</div>`
  ).join('');

  document.getElementById('doc-summary').innerHTML = `
    <div class="summary-title">Hub AuroraISP</div>
    <div class="summary-sub">Gestor de documentos, backlog e estrategia. Gerado em 30/03/2026 15:54.</div>

    <div class="summary-grid">
      <div class="summary-card">
        <h3>Documentos</h3>
        <div class="num">${totalDocs}</div>
        <div class="sub">${Object.keys(folders).join(', ')}</div>
      </div>
      <div class="summary-card">
        <h3>Tarefas</h3>
        <div class="num">${totalTasks}</div>
        <div class="sub">${doneTasks} finalizadas, ${pendTasks} pendentes</div>
      </div>
      <div class="summary-card">
        <h3>Progresso</h3>
        <div class="num">${totalTasks > 0 ? Math.round((doneTasks/totalTasks)*100) : 0}%</div>
        <div class="sub">do backlog concluido</div>
      </div>
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-rocket-takeoff"></i> GTM (Go-to-Market)</h2>
      ${gtmHtml || '<div class="doc-link"><i class="bi bi-info-circle"></i>Nenhum documento GTM encontrado</div>'}
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-check2-square"></i> Finalizadas recentes</h2>
      ${doneHtml || '<div style="font-size:.8rem;color:#94a3b8;">Nenhuma tarefa finalizada</div>'}
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-clock-history"></i> Pendentes</h2>
      ${pendHtml || '<div style="font-size:.8rem;color:#94a3b8;">Nenhuma tarefa pendente</div>'}
    </div>
  `;
}

function goHome() {
  if (activeFileEl) activeFileEl.classList.remove('active');
  activeFileEl = null;
  document.getElementById('breadcrumb-text').textContent = '';
  document.getElementById('doc-content').innerHTML = '<div id="doc-summary"></div>';
  renderSummary();
  document.getElementById('doc-panel').scrollTop = 0;
}

function openDocByName(filename) {
  const found = allFiles.find(f => f.node.fn === filename);
  if (found) {
    // Abrir os accordions pai
    let el = found.el;
    while (el) {
      if (el.classList && el.classList.contains('sb-accordion')) el.classList.add('open');
      el = el.parentElement;
    }
    openDoc(found.node, found.el);
  }
}

// в”Җв”Җ Init в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
buildTree(TREE, document.getElementById('sidebar'), 0);
renderBacklog();
renderSummary();
</script>
