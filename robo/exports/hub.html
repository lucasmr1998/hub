, etc.) |\n| `duracao_segundos` | PositiveInteger | Duração da chamada |\n| `transcricao` | TextField | Transcrição |\n| `sucesso` | BooleanField | Se o contato foi bem-sucedido |\n| `converteu_lead` / `converteu_venda` | BooleanField | Flags de conversão |\n| `valor_venda` | Decimal(12,2) | Valor da venda (se converteu) |\n| `protocolo_atendimento` / `codigo_atendimento` | CharField(100) | IDs do atendimento |\n| `id_conta` / `numero_conta` | CharField(100) | IDs da conta no ERP |\n\n**15 índices** para performance em relatórios de funil.\n\n### APIs (20 endpoints)\n\n| Grupo | Endpoints | Auth |\n|-------|-----------|------|\n| **Lead CRUD** | registrar, atualizar, consultar | @api_token_required |\n| **Imagens** | registrar, listar, deletar, validar, por-cliente | @api_token_required |\n| **Prospectos** | registrar, atualizar | @api_token_required |\n| **Histórico** | registrar, atualizar, consultar | @api_token_required |\n| **Vendas** | aprovar, rejeitar | @api_token_required |\n| **Consulta** | leads (paginado), históricos (paginado) | Público |\n| **Página** | leads (lista no painel) | @login_required |\n\n### Signals (2)\n\n1. **relate_prospecto_when_lead_has_hubsoft** — Quando lead salvo com id_hubsoft, vincula prospectos com mesmo id_prospecto_hubsoft\n2. **relate_lead_when_prospecto_has_hubsoft** — Quando prospecto salvo com id_prospecto_hubsoft sem lead, vincula ao lead\n\n### Template\n\n`leads.html` — Página de gestão de leads com filtros (origem, status, ativo), cards de estatísticas (total, valor, erros, hoje, semana), tabela com ações.\n\n---\n\n## 2. Atendimento (`apps/comercial/atendimento/`)\n\n### O que faz\nMotor de fluxos automatizados (bot conversacional). Define fluxos com questões sequenciais que o N8N executa via WhatsApp. Suporta validação IA, roteamento inteligente, opções dinâmicas e webhooks N8N.\n\n### Models (5)\n\n#### FluxoAtendimento\nTabela: `fluxos_atendimento`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do fluxo |\n| `tipo_fluxo` | CharField | qualificacao/vendas/suporte/onboarding/pesquisa/customizado |\n| `status` | CharField | ativo/inativo/rascunho/teste |\n| `max_tentativas` | PositiveInteger(3) | Máximo de tentativas por questão |\n| `tempo_limite_minutos` | PositiveInteger | Tempo limite do atendimento |\n| `permite_pular_questoes` | BooleanField(False) | Permite pular |\n\n**Métodos:** `get_questoes_ordenadas()`, `get_estatisticas()`, `pode_ser_usado()`\n\n#### QuestaoFluxo\nTabela: `questoes_fluxo` | Unique: (fluxo, indice)\n\nCampo mais complexo do sistema. 20+ tipos de questão, validação IA, roteamento inteligente.\n\n| Grupo | Campos |\n|-------|--------|\n| **Básico** | titulo, descricao, indice (ordem), ativo |\n| **Tipo** | tipo_questao (20 choices: texto, numero, email, cpf_cnpj, cep, select, multiselect, boolean, escala, planos_internet, vencimentos, ia_validacao, condicional_complexa...) |\n| **Validação** | tipo_validacao (obrigatoria/opcional/condicional/ia_assistida/validacao_customizada), regex_validacao, tamanho_minimo/maximo, valor_minimo/maximo |\n| **Dependências** | questao_dependencia (self FK), valor_dependencia |\n| **Roteamento** | roteamento_respostas (JSON), questao_padrao_proxima (self FK) |\n| **IA** | prompt_ia_validacao, criterios_ia (JSON) |\n| **Erro** | max_tentativas, estrategia_erro (repetir/pular/redirecionar/finalizar/escalar_humano), mensagem_erro_padrao |\n| **N8N** | webhook_n8n_validacao, webhook_n8n_pos_resposta (URLs) |\n| **Opções dinâmicas** | opcoes_dinamicas_fonte (planos_internet/opcoes_vencimento/api_externa/query_customizada), query_opcoes_dinamicas |\n| **Template** | variaveis_contexto (JSON), template_questao |\n\n**Métodos:** `validar_resposta()`, `get_proxima_questao_inteligente()`, `deve_ser_exibida()`, `aplicar_estrategia_erro()`\n\n#### AtendimentoFluxo\nTabela: `atendimentos_fluxo`\n\nControla uma sessão de atendimento. Liga lead + fluxo + progresso.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead atendido |\n| `fluxo` | FK FluxoAtendimento | Fluxo usado |\n| `status` | CharField | iniciado/em_andamento/pausado/completado/abandonado/erro/cancelado/aguardando_validacao/validado/rejeitado |\n| `questao_atual` / `total_questoes` / `questoes_respondidas` | Inteiros | Progresso |\n| `dados_respostas` | JSONField | Todas as respostas |\n| `score_qualificacao` | Integer(1-10) | Score calculado |\n| `resultado_final` | JSONField | Resultado do atendimento |\n\n**Métodos:** `responder_questao_inteligente()`, `avancar_questao()`, `finalizar_atendimento()`, `calcular_score_qualificacao()`\n\n#### RespostaQuestao e TentativaResposta\nArmazenam respostas individuais e tentativas (com resultado IA, webhook, confiança).\n\n### APIs (34 endpoints)\n\n| Grupo | Endpoints | Descrição |\n|-------|-----------|-----------|\n| **CRUD Fluxos** | 4 (GET/POST/PUT/DELETE) | Gerenciar fluxos |\n| **CRUD Questões** | 4 (GET/POST/PUT/DELETE) | Gerenciar questões |\n| **Atendimentos** | 5 (GET/POST/PUT/responder/finalizar) | Operar atendimentos |\n| **N8N** | 14 endpoints dedicados | iniciar, consultar, responder, avançar, finalizar, pausar, retomar, buscar lead, criar lead, listar fluxos, obter questão, tentativas, estatísticas inteligentes |\n| **Config** | 5 (fluxos/questões CRUD + duplicar) | Configurar via painel |\n| **Legacy** | 4 endpoints de compatibilidade | Rotas antigas |\n\n### Services\n\n`atendimento_service.py` — Busca dados de atendimento da API Matrix, gera HTML formatado da conversa, salva em disco.\n\n### Templates (2)\n\n- `fluxos.html` — Grid de cards dos fluxos (nome, tipo, status, stats)\n- `questoes.html` — Gerenciamento de questões por fluxo\n\n---\n\n## 3. Cadastro (`apps/comercial/cadastro/`)\n\n### O que faz\nPágina pública de auto-cadastro para o site do provedor. O visitante preenche dados pessoais, endereço, seleciona plano/vencimento, envia documentos e aceita contrato. Gera lead automaticamente.\n\n### Models (5)\n\n#### ConfiguracaoCadastro\nTabela: `configuracoes_cadastro` | Singleton por tenant\n\nConfiguração completa da landing page de cadastro. 40+ campos.\n\n| Grupo | Campos |\n|-------|--------|\n| **Visual** | empresa, titulo_pagina, subtitulo_pagina, logo_url, background_type (gradient/solid/image), cores (primary, secondary, success, error) |\n| **Contato** | telefone_suporte, whatsapp_suporte, email_suporte |\n| **Planos** | mostrar_selecao_plano, plano_padrao FK |\n| **Campos** | cpf_obrigatorio, email_obrigatorio, telefone_obrigatorio, endereco_obrigatorio |\n| **Validações** | validar_cep (ViaCEP), validar_cpf |\n| **Documentação** | solicitar_documentacao, texto_instrucao_selfie/doc_frente/doc_verso, tamanho_max_arquivo_mb, formatos_aceitos |\n| **Contrato** | exibir_contrato, titulo_contrato, texto_contrato, tempo_minimo_leitura_segundos, texto_aceite_contrato |\n| **Fluxo** | criar_lead_automatico, numero_etapas, mostrar_progress_bar |\n| **Integração** | id_origem, id_origem_servico, id_vendedor (IDs externos), origem_lead_padrao |\n| **Mensagens** | mensagem_sucesso, instrucoes_pos_cadastro |\n| **Segurança** | captcha_obrigatorio, limite_tentativas_dia |\n\n#### PlanoInternet\nTabela: `planos_internet`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(100) | Ex: \"Fibra 400MB\" |\n| `velocidade_download` / `velocidade_upload` | PositiveInteger | Mbps |\n| `valor_mensal` | Decimal(8,2) | Preço mensal |\n| `wifi_6` / `suporte_prioritario` / `suporte_24h` / `upload_simetrico` | BooleanField | Features |\n| `destaque` | CharField | popular/premium/economico/recomendado (badge) |\n| `ordem_exibicao` | PositiveInteger | Ordem na lista |\n| `id_sistema_externo` | CharField(50) | ID no ERP |\n\n**Métodos:** `get_valor_formatado()` → \"R$ 99,90\", `get_velocidade_formatada()` → \"400MB\" ou \"1GB\"\n\n#### OpcaoVencimento\nTabela: `opcoes_vencimento`\n\nDias de vencimento disponíveis (ex: dia 5, dia 10, dia 20).\n\n#### DocumentoLead\nTabela: `documentos_lead`\n\nDocumentos enviados durante o cadastro. Base64 encoded.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead |\n| `tipo_documento` | CharField | selfie/doc_frente/doc_verso/comprovante_residencia/contrato_assinado/outro |\n| `arquivo_base64` | TextField | Imagem em base64 |\n| `status` | CharField | pendente/aprovado/rejeitado/em_analise |\n| `nome_arquivo` / `tamanho_arquivo` / `formato_arquivo` | Metadados | Info do arquivo |\n\n#### CadastroCliente\nTabela: `cadastros_clientes`\n\nRegistra cada sessão de cadastro (mesmo incompleto). Status em 8 etapas.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| **Pessoal** | nome_completo, cpf, rg, email, telefone, data_nascimento |\n| **Endereço** | cep, endereco, numero, bairro, cidade, estado |\n| **Comercial** | plano_selecionado FK, vencimento_selecionado FK |\n| **Status** | status (iniciado/dados_pessoais/endereco/documentacao/contrato/finalizado/erro/cancelado) |\n| **Auditoria** | ip_cliente, user_agent, origem_cadastro, tempo_total_cadastro, tentativas_etapa (JSON), erros_validacao (JSON) |\n| **Contrato** | contrato_aceito, tempo_leitura_contrato, ip_aceite_contrato |\n\n**Métodos:** `finalizar_cadastro()`, `gerar_lead()`, `get_progresso_percentual()`, `validar_dados_pessoais()`, `validar_endereco()`\n\n### APIs (12 endpoints)\n\n| Grupo | Endpoints | Descrição |\n|-------|-----------|-----------|\n| **Público** | cadastro/cliente (POST), planos (GET), vencimentos (GET), cep (GET) | Auto-cadastro + consultas |\n| **Config** | 3 páginas + 3 APIs CRUD | Gerenciar config, planos, vencimentos |\n\n### Consulta CEP\n\nMulti-source com fallback automático: ViaCEP → CepAPI → BrasilAPI → Postmon → OpenCEP. Primeira resposta válida retorna. Inclui headers CORS.\n\n### Templates (4)\n\n- `cadastro.html` — Landing page pública de auto-cadastro (multi-step form)\n- `configuracoes/cadastro.html` — Config da landing page\n- `configuracoes/planos.html` — CRUD de planos\n- `configuracoes/vencimentos.html` — CRUD de vencimentos\n\n---\n\n## 4. Viabilidade (`apps/comercial/viabilidade/`)\n\n### O que faz\nVerifica se o provedor tem cobertura técnica (fibra óptica) na região do cliente. Consultado durante o cadastro e pelo bot de atendimento.\n\n### Model (1)\n\n#### CidadeViabilidade\nTabela: auto-gerada\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `cidade` | CharField(120) | Nome da cidade |\n| `estado` | CharField(2) | UF (27 estados brasileiros) |\n| `cep` | CharField(9) | CEP específico (opcional, regex `^\\d{5}-?\\d{3}$`) |\n| `bairro` | CharField(120) | Bairro (opcional) |\n| `observacao` | TextField | Informações sobre a região |\n| `ativo` | BooleanField | Status |\n\nSe `cep` não informado, a cidade inteira é considerada viável. `save()` normaliza CEP (insere hífen) e capitaliza nome da cidade.\n\n### API (1 endpoint)\n\n`GET /api/viabilidade/?cep=64000000` ou `?cidade=Teresina&uf=PI`\n\n**Lógica de busca por CEP:**\n1. Busca direta no banco por CEP exato\n2. Consulta ViaCEP para descobrir cidade/estado do CEP\n3. Busca cidade na lista de viabilidade\n4. Retorna `viavel_pelo_cep` e/ou `viavel_pela_cidade`\n\n### Template\n\nNenhum. Módulo é API-only.\n\n---\n\n## 5. CRM (`apps/comercial/crm/`)\n\n### O que faz\nCRM Kanban completo para gestão do funil de vendas. Pipeline visual com drag-and-drop, tarefas, metas, segmentos dinâmicos, retenção/churn e integração com automações e HubSoft.\n\n**Disponível apenas no plano Pro.**\n\n### Models (13)\n\n#### Pipeline e Estágios\n\n**Pipeline** — Tabela: `crm_pipelines`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` / `slug` | CharField/Slug | Identificação |\n| `tipo` | CharField | vendas/suporte/onboarding/custom |\n| `cor_hex` / `icone_fa` | Char | Visual |\n| `padrao` | BooleanField | Pipeline padrão para auto-criação |\n\n**PipelineEstagio** — Tabela: `crm_pipeline_estagios`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `pipeline` | FK Pipeline | Pipeline pai |\n| `nome` / `slug` / `ordem` | Identificação | Ordem no Kanban |\n| `tipo` | CharField | novo/qualificacao/negociacao/fechamento/cliente/retencao/perdido |\n| `is_final_ganho` / `is_final_perdido` | BooleanField | Flags de encerramento |\n| `probabilidade_padrao` | Integer(50) | % padrão de probabilidade |\n| `sla_horas` | PositiveInteger | SLA em horas |\n\n#### Oportunidade de Venda\n\n**OportunidadeVenda** — Tabela: `crm_oportunidades`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `pipeline` | FK Pipeline | Pipeline |\n| `lead` | OneToOne LeadProspecto | Lead (1:1) |\n| `estagio` | FK PipelineEstagio | Estágio atual |\n| `responsavel` | FK User | Vendedor responsável |\n| `titulo` | CharField(255) | Título da oportunidade |\n| `valor_estimado` | Decimal(12,2) | Valor estimado |\n| `probabilidade` | Integer(50) | % de probabilidade |\n| `prioridade` | CharField | baixa/normal/alta/urgente |\n| `tags` | M2M TagCRM | Tags visuais |\n| `plano_interesse` | FK PlanoInternet | Plano de interesse |\n| `origem_crm` | CharField | automatico/manual/importacao |\n| `data_entrada_estagio` | DateTime | Para cálculo de SLA |\n| `motivo_perda` / `concorrente_perdido` | Text/Char | Se perdeu |\n| `contrato_hubsoft_id` | CharField(100) | ID do contrato no HubSoft |\n| `churn_risk_score` | Integer(0-100) | Score de risco de churn |\n\n**Propriedades:** `dias_no_estagio`, `sla_vencido`\n**Índices:** (estagio, ativo), (responsavel, estagio), (data_fechamento_previsto), (churn_risk_score)\n\n**HistoricoPipelineEstagio** — Tabela: `crm_historico_estagio`\n\nLog de cada movimentação de estágio: oportunidade, estágio anterior/novo, movido_por, motivo, tempo_no_estagio_horas.\n\n#### Tarefas e Notas\n\n**TarefaCRM** — Tabela: `crm_tarefas`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `oportunidade` / `lead` | FK | Vinculado a oportunidade ou lead |\n| `responsavel` | FK User | Quem deve executar |\n| `tipo` | CharField | ligacao/whatsapp/email/visita/followup/proposta/instalacao/suporte/outro |\n| `titulo` / `descricao` | Char/Text | Descrição |\n| `status` | CharField | pendente/em_andamento/concluida/cancelada/vencida |\n| `prioridade` | CharField | baixa/normal/alta/urgente |\n| `data_vencimento` | DateTime | Prazo |\n| `lembrete_em` | DateTime | Lembrete automático |\n\n`save()` auto-marca como `vencida` se prazo venceu.\n\n**NotaInterna** — Tabela: `crm_notas_internas`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `oportunidade` / `lead` | FK | Contexto |\n| `autor` | FK User | Quem escreveu |\n| `mencoes` | M2M User | Menções (@usuario) |\n| `conteudo` | TextField | Texto |\n| `tipo` | CharField | geral/reuniao/ligacao/email/importante/alerta |\n| `is_fixada` | BooleanField | Fixada no topo |\n\n#### Equipes e Perfis\n\n**EquipeVendas** — Tabela: `crm_equipes`\n\nNome, líder (FK User), descrição, cor_hex, ativo.\n\n**PerfilVendedor** — Tabela: `crm_perfis_vendedor`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `user` | OneToOne User | Usuário |\n| `equipe` | FK EquipeVendas | Equipe (1:1) |\n| `cargo` | CharField | vendedor/supervisor/gerente/diretor/outro |\n| `telefone_direto` / `whatsapp` | CharField | Contato |\n| `id_vendedor_hubsoft` | Integer | ID no HubSoft |\n\n#### Metas\n\n**MetaVendas** — Tabela: `crm_metas_vendas`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `tipo` | CharField | individual/equipe |\n| `vendedor` / `equipe` | FK | Quem tem a meta |\n| `periodo` | CharField | diario/semanal/mensal/trimestral |\n| `data_inicio` / `data_fim` | DateField | Período |\n| `meta_vendas_quantidade` / `meta_vendas_valor` / `meta_leads_qualificados` / `meta_contatos` | Numéricos | Metas |\n| `realizado_vendas_quantidade` / `realizado_vendas_valor` / `realizado_leads` | Numéricos | Realizado |\n\n**Propriedades:** `percentual_quantidade`, `percentual_valor`\n\n#### Segmentos\n\n**SegmentoCRM** — Tabela: `crm_segmentos`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome do segmento |\n| `tipo` | CharField | dinamico/manual/hibrido |\n| `regras_filtro` | JSONField | Regras de filtragem para segmentos dinâmicos |\n| `leads` | M2M via MembroSegmento | Leads do segmento |\n| `cor_hex` / `icone_fa` | Char | Visual |\n| `total_leads` | PositiveInteger | Cache do total |\n\n**Regras de filtro (JSON):**\n```json\n[\n    {\"campo\": \"origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"},\n    {\"campo\": \"score_qualificacao\", \"operador\": \"maior\", \"valor\": \"7\"},\n    {\"campo\": \"cidade\", \"operador\": \"contem\", \"valor\": \"Teresina\"}\n]\n```\n\nCampos disponíveis: origem, score_qualificacao, cidade, estado, bairro, valor, status_api, dias_cadastro\nOperadores: igual, diferente, contem, maior, menor, maior_igual, menor_igual\n\n**MembroSegmento** — Tabela: `crm_membros_segmento`\n\nThrough table: segmento FK, lead FK, adicionado_manualmente, adicionado_por.\n\n#### Retenção\n\n**AlertaRetencao** — Tabela: `crm_alertas_retencao`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `cliente_hubsoft` | FK ClienteHubsoft | Cliente |\n| `lead` / `oportunidade` | FK | Contexto |\n| `tipo_alerta` | CharField | contrato_expirando/inadimplencia/plano_downgradado/sem_uso/reclamacao/upgrade_disponivel/aniversario_contrato |\n| `nivel_risco` | CharField | baixo/medio/alto/critico |\n| `score_churn` | Integer(0-100) | Score de risco |\n| `status` | CharField | novo/em_tratamento/resolvido/perdido |\n\n**Scanner automático:** analisa contratos do HubSoft, cria alertas baseado em dias restantes (≤30 = crítico/90, ≤60 = alto/70, ≤90 = médio/50).\n\n#### Configuração\n\n**ConfiguracaoCRM** — Tabela: `crm_configuracao` | Singleton por tenant\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `sla_alerta_horas_padrao` | PositiveInteger(48) | SLA padrão em horas |\n| `criar_oportunidade_automatico` | BooleanField(True) | Auto-criar oportunidade quando lead qualificado |\n| `score_minimo_auto_criacao` | Integer(7) | Score mínimo para auto-criação |\n| `pipeline_padrao` / `estagio_inicial_padrao` | FK | Pipeline e estágio padrão |\n| `notificar_responsavel_nova_oportunidade` / `notificar_sla_breach` | BooleanField | Notificações |\n| `webhook_n8n_nova_oportunidade` / `mudanca_estagio` / `tarefa_vencida` | URLField | Webhooks N8N |\n\n### Services\n\n**segmentos.py** (4 funções):\n\n| Função | O que faz |\n|--------|-----------|\n| `filtrar_leads_por_regras(regras, queryset)` | Aplica regras de filtro dinâmico ao queryset de leads |\n| `lead_atende_regras(lead, regras)` | Verifica se um lead específico atende todas as regras (sem query) |\n| `atualizar_membros_segmento(segmento)` | Sync completo: remove quem não atende, adiciona quem atende |\n| `avaliar_lead_em_segmentos(lead)` | Avalia lead em TODOS os segmentos dinâmicos/híbridos do tenant |\n\n### Signals (3)\n\n1. **criar_oportunidade_automatica** (post_save LeadProspecto) — Cria OportunidadeVenda quando lead atinge score mínimo ou status_api='sucesso'\n2. **verificar_conversao_historico** (post_save HistoricoContato) — Move oportunidade para estágio ganho quando converteu_venda=True\n3. **avaliar_segmentos_dinamicos** (post_save LeadProspecto) — Avalia lead em segmentos dinâmicos, dispara evento `lead_entrou_segmento` para automações\n\n### Views (40+ funções)\n\n| Área | Views | Descrição |\n|------|-------|-----------|\n| **Pipeline** | pipeline_view, api_pipeline_dados, api_mover_oportunidade | Kanban com drag-drop, filtros, movimentação |\n| **Oportunidades** | oportunidades_lista, oportunidade_detalhe, api_atribuir, api_notas, api_tarefas | CRUD de oportunidades com contexto rico |\n| **Tarefas** | tarefas_lista, api_tarefa_concluir, api_tarefa_criar | Gestão de tarefas agrupadas (hoje/semana/vencidas/concluídas) |\n| **Notas** | api_nota_criar, api_nota_fixar, api_nota_deletar | Notas internas com fixar/desfixar |\n| **Desempenho** | desempenho_view, api_desempenho_dados | Dashboard de performance por vendedor |\n| **Metas** | metas_view, api_meta_criar, api_meta_salvar, api_meta_excluir | CRUD de metas individuais/equipe |\n| **Retenção** | retencao_view, api_tratar_alerta, api_resolver_alerta, api_scanner_retencao | Gestão de alertas de churn |\n| **Segmentos** | segmentos_lista, segmento_detalhe, api_segmento_salvar, api_preview_regras, api_adicionar_lead, api_remover_membro, api_disparar_campanha | Segmentação dinâmica com regras |\n| **Configurações** | configuracoes_crm, api_salvar_config, api_criar_estagio, api_reordenar_estagios, api_excluir_estagio | Config do CRM (pipelines, estágios, webhooks) |\n| **Equipes** | equipes_view, api_criar_equipe | Gestão de equipes de vendas |\n| **Webhook** | webhook_hubsoft_contrato | Recebe confirmação de contrato do HubSoft |\n\n**Visibilidade:** vendedores não-superuser veem apenas suas oportunidades + não atribuídas.\n\n### Templates (13)\n\n| Template | Descrição |\n|----------|-----------|\n| `pipeline.html` | Kanban drag-drop (990 linhas) |\n| `oportunidades_lista.html` | Lista de oportunidades com filtros |\n| `oportunidade_detalhe.html` | Detalhe com notas, tarefas, histórico, HubSoft |\n| `tarefas_lista.html` | Tarefas agrupadas com tabs |\n| `metas.html` | Metas com progress bars |\n| `desempenho.html` | Dashboard de performance |\n| `retencao.html` | Alertas de churn por nível de risco |\n| `segmentos_lista.html` | Grid de segmentos |\n| `segmento_detalhe.html` | Membros do segmento |\n| `segmento_criar.html` | Criar/editar segmento com rule builder |\n| `equipes.html` | Gestão de equipes |\n| `configuracoes_crm.html` | Config (pipelines, estágios, webhooks) |\n| `_tarefa_card.html` | Componente reutilizável de card de tarefa |\n\n---\n\n## Integrações entre Submódulos\n\n```\nLeads ──signal──▶ CRM (auto-cria oportunidade quando score >= 7)\nLeads ──signal──▶ CRM/Segmentos (avalia segmentos dinâmicos)\nAtendimento ──FK──▶ Leads (AtendimentoFluxo.lead)\nCadastro ──gera──▶ Leads (CadastroCliente.gerar_lead())\nViabilidade ──consulta──▶ Cadastro (verificação de cobertura)\nHistoricoContato ──signal──▶ CRM (conversão automática)\nCRM ──webhook──▶ HubSoft (confirmação de contrato)\nCRM ──webhook──▶ N8N (nova oportunidade, mudança de estágio, tarefa vencida)\nCRM/Segmentos ──event──▶ Automações (lead_entrou_segmento)\n```\n\n---\n\n## Estatísticas do Módulo\n\n| Métrica | Valor |\n|---------|-------|\n| **Sub-apps** | 5 (leads, atendimento, cadastro, viabilidade, crm) |\n| **Models** | 28 |\n| **Views** | 80+ funções |\n| **Templates** | 22 |\n| **APIs** | 70+ endpoints |\n| **Signals** | 7 |\n| **Índices** | 50+ |\n| **Linhas de código** | ~8.000+ (models + views + services) |\n"}, {"t": "f", "n": "08 Modulo Marketing", "fn": "08-MODULO_MARKETING.md", "c": "# Módulo Marketing — AuroraISP\n\n**Última atualização:** 04/04/2026\n**Status:** 🔧 Em desenvolvimento\n**Localização:** `apps/marketing/`\n\n---\n\n## Visão Geral\n\nO módulo Marketing é o motor de automação e inteligência do hub. Cobre campanhas de tráfego pago com detecção automática por palavra-chave, segmentação dinâmica de leads e automações visuais com editor de fluxo (Drawflow). É composto por 3 sub-apps que se integram via signals, services e o engine de execução.\n\n```\nLead chega (WhatsApp/Site/Instagram)\n    │\n    ▼\n┌────────────┐     ┌────────────┐     ┌────────────────┐\n│ CAMPANHAS  │────▶│ SEGMENTOS  │────▶│  AUTOMAÇÕES    │\n│ Detecção   │     │ Agrupamento│     │  Editor Visual │\n│ Atribuição │     │ Regras     │     │  Engine BFS    │\n│ ROI        │     │ Preview    │     │  Ações + Delay │\n└────────────┘     └────────────┘     └────────────────┘\n       │                  │                    │\n       ▼                  ▼                    ▼\n   N8N / API        Disparo massa        WhatsApp, Email,\n   Detecção         Avaliação auto       CRM, Pontos, Webhook\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, DRF, PostgreSQL, Drawflow.js\n\n---\n\n## 1. Campanhas (`apps/marketing/campanhas/`)\n\n### O que faz\nGerencia campanhas de tráfego pago com detecção automática de palavras-chave em mensagens de clientes. Identifica de qual campanha veio cada lead, calcula ROI, taxa de conversão e métricas por plataforma. Integração direta com N8N para detecção em tempo real.\n\n### Models (2)\n\n#### CampanhaTrafego\nTabela: `campanha_trafego` | Unique: (tenant, codigo)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Identificação** | nome (200), codigo (50, unique/tenant), descricao |\n| **Palavra-chave** | palavra_chave (200), tipo_match (exato/parcial/regex), case_sensitive (default False) |\n| **Classificação** | plataforma (9 opções: google_ads, facebook_ads, instagram_ads, tiktok_ads, linkedin_ads, email, sms, whatsapp, outro), tipo_trafego (pago/organico/hibrido) |\n| **Configuração** | prioridade (1-10, default 5), ativa (default True) |\n| **Período** | data_inicio, data_fim (DateField, opcionais) |\n| **Comercial** | url_destino (500), orcamento (Decimal 12,2), meta_leads |\n| **Estatísticas** | contador_deteccoes (auto), ultima_deteccao (auto) |\n| **Visual** | cor_identificacao (hex, default #667eea), ordem_exibicao |\n| **Auditoria** | criado_por FK User, criado_em, atualizado_em |\n\n**4 índices:** codigo, ativa, palavra_chave, plataforma\n\n**Propriedades:**\n\n| Propriedade | Retorno | Descrição |\n|-------------|---------|-----------|\n| `esta_no_periodo` | bool | Se está dentro das datas início/fim |\n| `esta_ativa` | bool | Ativa AND dentro do período |\n| `total_leads` | int | Count de LeadProspecto com campanha_origem=self |\n| `total_conversoes` | int | Detecções com converteu_venda=True |\n| `taxa_conversao` | float | (conversões / detecções) × 100 |\n| `receita_total` | Decimal | Sum de valor_venda das detecções convertidas |\n| `roi` | float | (receita - orçamento) / orçamento × 100 |\n\n#### DeteccaoCampanha\nTabela: `deteccao_campanha`\n\nRegistra cada vez que uma palavra-chave de campanha é detectada em uma mensagem de cliente.\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Relacionamentos** | lead FK LeadProspecto, campanha FK CampanhaTrafego |\n| **Mensagem** | telefone (20), mensagem_original, mensagem_normalizada (auto), tamanho_mensagem (auto) |\n| **Detecção** | trecho_detectado (500), posicao_inicio, posicao_fim, metodo_deteccao (exato/parcial/regex), score_confianca (Decimal 0-100) |\n| **Contexto** | eh_primeira_mensagem, origem (whatsapp/sms/email/chat/telefone), timestamp_mensagem |\n| **Técnico** | ip_origem, user_agent (500), metadata (JSON) |\n| **Validação** | aceita (default True), motivo_rejeicao, rejeitada_por FK User, data_rejeicao |\n| **N8N** | processado_n8n, data_processamento_n8n, resposta_n8n (JSON) |\n| **Conversão** | converteu_venda, data_conversao, valor_venda (Decimal 12,2) |\n| **Auditoria** | detectado_em (auto) |\n\n**6 índices:** telefone, lead, campanha, -detectado_em, aceita, converteu_venda\n\n**`save()` override:**\n1. Normaliza mensagem (NFKD, lowercase, remove acentos)\n2. Calcula tamanho da mensagem\n3. Atualiza contador_deteccoes da campanha\n\n### APIs (4 endpoints)\n\n| Endpoint | Método | Auth | Descrição |\n|----------|--------|------|-----------|\n| `/marketing/configuracoes/campanhas/` | GET | @login_required | Página de campanhas (template) |\n| `/marketing/configuracoes/campanhas/deteccoes/` | GET | @login_required | Página de detecções com filtros |\n| `/marketing/api/campanhas/` | GET/POST/PUT/DELETE | @login_required | CRUD completo de campanhas via JSON |\n| `/marketing/api/campanhas/detectar/` | POST | @api_token_required | Detecção de campanha (N8N) |\n\n#### API de Detecção (N8N)\n\nEndpoint principal de integração. O N8N envia cada mensagem recebida no WhatsApp e a API detecta automaticamente a campanha de origem.\n\n**Request:**\n```json\n{\n    \"telefone\": \"5589999999999\",\n    \"mensagem\": \"vi o cupom50 no Instagram\",\n    \"origem\": \"whatsapp\",\n    \"timestamp\": \"2024-11-20 10:30:00\"\n}\n```\n\n**Algoritmo:**\n1. Normaliza a mensagem (remove acentos, lowercase)\n2. Itera campanhas ativas ordenadas por prioridade\n3. Aplica método de detecção (exato → parcial → regex)\n4. Calcula score de confiança (100% exato, 95% parcial, 90% regex)\n5. Cria/vincula lead se não existe\n6. Registra DeteccaoCampanha\n7. Retorna campanha detectada com score\n\n**Response:**\n```json\n{\n    \"success\": true,\n    \"campanha_detectada\": {\n        \"id\": 5, \"codigo\": \"CUPOM50\", \"nome\": \"Promo 50% OFF\",\n        \"plataforma\": \"instagram_ads\"\n    },\n    \"deteccao\": {\n        \"id\": 12345, \"trecho_detectado\": \"cupom50\",\n        \"score_confianca\": 95.5, \"metodo\": \"parcial\"\n    },\n    \"lead_id\": 123,\n    \"lead_criado\": false\n}\n```\n\n### Templates (1)\n\n- `campanhas.html` — Grid 4 colunas de cards. KPIs no topo (total, ativas, detecções, leads). Modal de criação/edição. Cor fixa do sistema (--primary).\n\n### Admin\n\n**CampanhaTrafegoAdmin:** list com nome/codigo/plataforma/ativa/detecções. Filtros por ativa/plataforma/tipo_trafego. Fieldsets organizados por grupo. Custom method `estatisticas_display()` com tabela HTML de métricas.\n\n**DeteccaoCampanhaAdmin:** list com campanha/telefone/score/origem/aceita. Filtros por aceita/converteu_venda/origem/método. Campos de mensagem e timestamps como readonly.\n\n---\n\n## 2. Segmentos (`apps/marketing/segmentos_urls.py` + `apps/comercial/crm/`)\n\n### O que faz\nAgrupa leads por critérios dinâmicos, manuais ou híbridos. Os segmentos são a ponte entre o CRM e as automações: permitem disparo em massa, preview em tempo real das regras, e avaliação automática quando um lead muda. Segmentos ficam no contexto de Marketing (URLs `/marketing/segmentos/`) mas o model vive no CRM.\n\n### Model\n\n#### SegmentoCRM\nTabela: `crm_segmentos` | Unique: (tenant, nome)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome do segmento |\n| `descricao` | TextField | Descrição |\n| `tipo` | CharField | dinamico, manual, hibrido |\n| `regras_filtro` | JSONField | Regras para segmentos dinâmicos |\n| `leads` | M2M via MembroSegmento | Leads do segmento |\n| `cor_hex` | CharField(7, default #764ba2) | Cor visual |\n| `icone_fa` | CharField(50, default fa-users) | Ícone FontAwesome |\n| `ultima_atualizacao_dinamica` | DateTimeField | Último sync |\n| `total_leads` | PositiveInteger | Cache do total |\n| `criado_por` | FK User | Autor |\n| `ativo` | BooleanField(True) | Status |\n\n**MembroSegmento** — Through table: segmento FK, lead FK, adicionado_manualmente (bool), adicionado_por FK User.\n\n**Formato das regras de filtro (JSON):**\n```json\n{\n    \"regras\": [\n        {\"campo\": \"origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"},\n        {\"campo\": \"score_qualificacao\", \"operador\": \"maior\", \"valor\": \"7\"},\n        {\"campo\": \"cidade\", \"operador\": \"contem\", \"valor\": \"Teresina\"},\n        {\"campo\": \"dias_cadastro\", \"operador\": \"menor\", \"valor\": \"30\"}\n    ]\n}\n```\n\n**Campos disponíveis:** origem, score_qualificacao, cidade, estado, bairro, valor, status_api, dias_cadastro\n**Operadores:** igual, diferente, contem, maior, menor, maior_igual, menor_igual\n\n### Services (`apps/comercial/crm/services/segmentos.py`)\n\n| Função | O que faz |\n|--------|-----------|\n| `filtrar_leads_por_regras(regras, queryset)` | Aplica regras ao queryset. Trata `dias_cadastro` como data relativa. Retorna QuerySet filtrado |\n| `lead_atende_regras(lead, regras)` | Verifica se um lead atende TODAS as regras (sem query, avaliação in-memory) |\n| `atualizar_membros_segmento(segmento)` | Sync completo: remove quem não atende mais (exceto manuais), adiciona novos. Atualiza total_leads e timestamp |\n| `avaliar_lead_em_segmentos(lead)` | Avalia lead em TODOS os segmentos dinâmicos/híbridos do tenant. Retorna lista dos segmentos em que entrou |\n\n### Signal\n\n**`avaliar_segmentos_dinamicos`** (post_save LeadProspecto):\n- Chama `avaliar_lead_em_segmentos()` a cada save de lead\n- Para cada segmento que o lead entrou: dispara evento `lead_entrou_segmento` para o engine de automações\n- Contexto inclui: lead, lead_nome, telefone, segmento, segmento_nome\n\n### APIs (7 endpoints)\n\n| Endpoint | Método | Descrição |\n|----------|--------|-----------|\n| `/marketing/segmentos/` | GET | Lista de segmentos (grid de cards) |\n| `/marketing/segmentos/criar/` | GET | Página de criação com rule builder |\n| `/marketing/segmentos/<pk>/` | GET | Detalhe com membros |\n| `/marketing/segmentos/<pk>/editar/` | GET | Edição com regras |\n| `/marketing/segmentos/salvar/` | POST | Salvar segmento (API JSON) |\n| `/marketing/segmentos/preview/` | POST | Preview em tempo real (retorna count + amostra de leads) |\n| `/marketing/segmentos/<pk>/buscar-leads/` | GET | Buscar leads para adicionar manualmente |\n| `/marketing/segmentos/<pk>/adicionar-lead/` | POST | Adicionar lead manualmente |\n| `/marketing/segmentos/<pk>/remover-membro/` | POST | Remover membro |\n| `/marketing/segmentos/<pk>/disparar-campanha/` | POST | Disparo em massa para leads do segmento |\n\n### Templates (3)\n\n| Template | Descrição |\n|----------|-----------|\n| `segmentos_lista.html` | Grid de cards (nome, tipo badge, total_leads, ícone, cor) |\n| `segmento_criar.html` | Formulário com builder de regras dinâmicas (campo + operador + valor) e preview em tempo real |\n| `segmento_detalhe.html` | Lista de membros com ações (adicionar, remover, disparar campanha) |\n\n---\n\n## 3. Automações (`apps/marketing/automacoes/`)\n\n### O que faz\nMotor de automação do hub. Define regras que reagem a eventos do sistema e executam ações automaticamente. Os eventos são disparados de duas formas: **signals** (tempo real, quando algo acontece no sistema) e **cron** (periódico, a cada 5 minutos).\n\n### Como funciona (arquitetura)\n\n```\n═══════════════════════════════════════════════════════════════\n  TEMPO REAL (Signals Django — post_save)\n═══════════════════════════════════════════════════════════════\n\n  Lead salvo (created=True)\n      │  signal: on_lead_criado\n      ▼\n  engine.disparar_evento('lead_criado', contexto, tenant)\n      │\n      ├── Busca regras ativas com evento='lead_criado'\n      ├── Para cada regra:\n      │       ├── Verifica controles (rate limit, cooldown)\n      │       └── _processar_fluxo() → BFS no grafo Drawflow\n      │               │\n      │               ├── Trigger Node → segue default\n      │               ├── Condition Node → avalia campo/operador/valor\n      │               │       ├── true → segue saída 1\n      │               │       └── false → segue saída 2\n      │               ├── Action Node → executa ação\n      │               │       ├── notificacao_sistema → cria Notificacao\n      │               │       ├── criar_tarefa → cria TarefaCRM\n      │               │       ├── mover_estagio → move OportunidadeVenda\n      │               │       ├── atribuir_responsavel → round-robin\n      │               │       ├── dar_pontos → MembroClube.saldo\n      │               │       └── webhook → POST externo\n      │               └── Delay Node → cria ExecucaoPendente (cron retoma)\n      │\n      └── Registra LogExecucao + atualiza contadores\n\n\n  Oportunidade salva (created=False)\n      │  signal: on_oportunidade_movida\n      ▼\n  engine.disparar_evento('oportunidade_movida', {estagio: 'demo-agendada', ...})\n      │\n      └── Mesmo fluxo acima (busca regras, processa grafo)\n\n\n  Lead salvo (created=False, score >= 7)\n      │  signal: on_lead_qualificado\n      ▼\n  engine.disparar_evento('lead_qualificado', ...)\n\n\n  Todos os docs do lead validados\n      │  signal: on_docs_validados\n      ▼\n  engine.disparar_evento('docs_validados', ...)\n\n\n  Indicação convertida\n      │  signal: on_indicacao_convertida\n      ▼\n  engine.disparar_evento('indicacao_convertida', ...)\n\n\n  Lead entrou em segmento dinâmico\n      │  signal: avaliar_segmentos_dinamicos (apps/comercial/crm/signals.py)\n      ▼\n  engine.disparar_evento('lead_entrou_segmento', ...)\n\n\n═══════════════════════════════════════════════════════════════\n  PERIÓDICO (Cron — executar_automacoes_cron, a cada 5 min)\n═══════════════════════════════════════════════════════════════\n\n  python manage.py executar_automacoes_cron\n      │\n      ├── 1. Processar delays pendentes\n      │       Busca ExecucaoPendente com data_agendada <= now\n      │       Retoma execução do nodo onde parou\n      │\n      ├── 2. Lead sem contato\n      │       Para cada regra com evento='lead_sem_contato':\n      │           Extrai dias da condição (ex: 2 dias)\n      │           Busca leads com último HistoricoContato antes do limite\n      │           Exclui leads já disparados no período\n      │           Dispara: engine.disparar_evento('lead_sem_contato', {\n      │               dias_sem_contato: 2, lead: ..., lead_nome: ...\n      │           })\n      │\n      ├── 3. Tarefa vencida\n      │       Busca TarefaCRM pendente/em_andamento com data_vencimento vencida\n      │       Dispara: engine.disparar_evento('tarefa_vencida', ...)\n      │\n      └── 4. Disparo por segmento\n              Para cada regra com segmento vinculado:\n              Aplica regras_filtro do segmento\n              Dispara evento para cada lead do segmento\n\n\n═══════════════════════════════════════════════════════════════\n  RESUMO: Quem dispara o quê\n═══════════════════════════════════════════════════════════════\n\n  ┌─────────────────────────┬──────────────┬────────────────────────────┐\n  │ Evento                  │ Disparado por│ Quando                     │\n  ├─────────────────────────┼──────────────┼────────────────────────────┤\n  │ lead_criado             │ Signal       │ Lead salvo (created=True)  │\n  │ lead_qualificado        │ Signal       │ Lead score >= 7            │\n  │ oportunidade_movida     │ Signal       │ Oportunidade salva         │\n  │ docs_validados          │ Signal       │ Todos docs status=validado │\n  │ indicacao_convertida    │ Signal       │ Indicação status=convertido│\n  │ lead_entrou_segmento    │ Signal       │ Lead avaliado em segmento  │\n  │ mensagem_recebida       │ Signal       │ Mensagem tipo=contato      │\n  │ conversa_aberta         │ Signal       │ Conversa criada            │\n  │ conversa_resolvida      │ Signal       │ Conversa status=resolvida  │\n  ├─────────────────────────┼──────────────┼────────────────────────────┤\n  │ lead_sem_contato        │ Cron (5min)  │ Lead sem HistoricoContato  │\n  │ tarefa_vencida          │ Cron (5min)  │ TarefaCRM data vencida     │\n  │ disparo_segmento        │ Cron (5min)  │ Regra com segmento FK      │\n  ├─────────────────────────┼──────────────┼────────────────────────────┤\n  │ venda_aprovada          │ Signal*      │ *Pendente implementação    │\n  │ cliente_aniversario     │ Cron*        │ *Pendente implementação    │\n  └─────────────────────────┴──────────────┴────────────────────────────┘\n\n  * = evento definido no model mas signal/cron ainda não implementado\n```\n\n### Models (7)\n\n#### RegraAutomacao (principal)\nTabela: `automacoes_regraautomacao`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(200) | Nome da automação |\n| `descricao` | TextField | Descrição |\n| `evento` | CharField(50, blank) | Gatilho (definido como nó no editor visual) |\n| `ativa` | BooleanField(True) | Status (indexado) |\n| `criado_por` | FK User | Autor |\n| `data_criacao` / `data_atualizacao` | DateTime | Timestamps |\n| `total_execucoes` / `total_sucesso` / `total_erro` | PositiveInteger | Contadores |\n| `modo_fluxo` | BooleanField | True = editor visual, False = linear legado |\n| `fluxo_json` | JSONField | Estado do Drawflow para re-import |\n| `segmento` | FK SegmentoCRM | Para disparo em massa |\n| `max_execucoes_por_lead` | PositiveInteger(0) | 0 = ilimitado |\n| `cooldown_horas` | PositiveInteger(0) | Mínimo entre execuções por lead |\n| `periodo_limite_horas` | PositiveInteger(24) | Janela de tempo para max_execucoes |\n\n**14 eventos gatilho disponíveis:**\n\n| Evento | Descrição |\n|--------|-----------|\n| `lead_criado` | Novo lead cadastrado no sistema |\n| `lead_qualificado` | Score do lead atinge mínimo (≥ 7) |\n| `lead_sem_contato` | Lead sem interação há X dias |\n| `oportunidade_movida` | Oportunidade muda de estágio no pipeline |\n| `venda_aprovada` | Contrato aprovado no HubSoft |\n| `cliente_aniversario` | Cliente completa X dias/meses |\n| `indicacao_convertida` | Indicação vira cliente |\n| `tarefa_vencida` | Tarefa do CRM vence |\n| `docs_validados` | Todos os docs do lead aprovados |\n| `lead_entrou_segmento` | Lead entra em segmento dinâmico |\n| `disparo_segmento` | Disparo em massa por segmento |\n| `mensagem_recebida` | Mensagem recebida no inbox |\n| `conversa_aberta` | Nova conversa no inbox |\n| `conversa_resolvida` | Conversa resolvida no inbox |\n\n**Propriedade:** `taxa_sucesso` → (total_sucesso / total_execucoes) × 100\n\n#### CondicaoRegra (modo legado)\nTabela: `automacoes_condicaoregra`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `campo` | CharField(100) | Ex: lead.origem, crm.estagio |\n| `operador` | CharField | igual, diferente, contem, maior, menor, maior_igual, menor_igual |\n| `valor` | CharField(255) | Valor esperado |\n| `ordem` | PositiveInteger | Ordem de avaliação |\n\n**Método:** `avaliar(contexto)` — Resolve campo no contexto e compara.\n\n#### AcaoRegra (modo legado)\nTabela: `automacoes_acaoregra`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `tipo` | CharField | 8 tipos de ação (ver tabela abaixo) |\n| `configuracao` | TextField | Template com variáveis {{}} |\n| `ordem` | PositiveInteger | Ordem de execução |\n| `delay_ativo` | BooleanField | Se tem atraso |\n| `delay_valor` | PositiveInteger | Valor do atraso |\n| `delay_unidade` | CharField | minutos, horas, dias |\n\n#### NodoFluxo (modo visual)\nTabela: `automacoes_nodofluxo`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `tipo` | CharField | trigger, condition, action, delay |\n| `subtipo` | CharField(50) | Ex: lead_criado, enviar_whatsapp, campo_check |\n| `configuracao` | JSONField | Config específica por tipo |\n| `pos_x` / `pos_y` | Integer | Posição visual no canvas |\n| `ordem` | PositiveInteger | Ordem de processamento |\n\n#### ConexaoNodo (modo visual)\nTabela: `automacoes_conexaonodo` | Unique: (nodo_origem, nodo_destino, tipo_saida)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `nodo_origem` | FK NodoFluxo | De onde sai |\n| `nodo_destino` | FK NodoFluxo | Para onde vai |\n| `tipo_saida` | CharField | default, true (sim), false (não) |\n\n#### ExecucaoPendente\nTabela: `automacoes_execucaopendente`\n\nFila de ações aguardando execução (delays, agendamentos). Processada pelo cron.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra |\n| `nodo` / `acao` | FK NodoFluxo / AcaoRegra | Nó ou ação a executar |\n| `lead` | FK LeadProspecto | Lead alvo |\n| `contexto_json` | JSONField | Contexto serializado |\n| `data_agendada` | DateTimeField (indexado) | Quando executar |\n| `status` | CharField | pendente, executado, cancelado, erro |\n| `resultado` | TextField | Resultado da execução |\n\n**Índices:** (status, data_agendada), (lead, status)\n\n#### ControleExecucao\nTabela: `automacoes_controleexecucao` | Unique: (lead, regra)\n\nRate limiting por lead por regra. Controla max_execucoes e cooldown.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead |\n| `regra` | FK RegraAutomacao | Regra |\n| `total_execucoes_periodo` | PositiveInteger | Execuções na janela |\n| `primeira_execucao_periodo` | DateTime | Início da janela |\n| `ultima_execucao` | DateTime | Última execução |\n\n#### LogExecucao\nTabela: `automacoes_logexecucao`\n\nRegistro de cada execução de automação. Usado no dashboard e na timeline do lead.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra |\n| `acao` / `nodo` | FK AcaoRegra / NodoFluxo | O que foi executado |\n| `lead` | FK LeadProspecto (indexado) | Lead afetado |\n| `status` | CharField | sucesso, erro, agendado, cancelado |\n| `evento_dados` | JSONField | Contexto do evento |\n| `resultado` | TextField(500) | Mensagem de resultado |\n| `data_execucao` | DateTime (auto) | Quando executou |\n| `data_agendada` | DateTime | Se foi agendado |\n\n### Engine (`automacoes/engine.py`)\n\nO engine é o coração do módulo. Processa eventos em dois modos: linear legado e BFS em grafo visual.\n\n#### Fluxo de execução\n\n```\nSignal dispara evento\n    │\n    ▼\ndisparar_evento(evento, contexto, tenant)\n    │\n    ├── Busca regras ativas para o evento\n    ├── Para cada regra:\n    │       ├── _verificar_controles() → rate limit / cooldown\n    │       ├── Se modo_fluxo=True:\n    │       │       └── _processar_fluxo() → BFS no grafo\n    │       └── Se modo_fluxo=False:\n    │               └── _processar_regra_legacy() → linear\n    │\n    └── Atualiza contadores (sucesso/erro)\n```\n\n#### Modo visual (BFS)\n\n```\nTrigger Node (0 inputs, 1 output)\n    │ default\n    ▼\nCondition Node (1 input, 2 outputs)\n    ├── true → Action Node → ...\n    └── false → Action Node → ...\n         │\n    Delay Node → ExecucaoPendente → cron retoma\n```\n\n`_executar_nodo_e_seguir(regra, nodo, contexto, lead)`:\n- **trigger:** passa para saída default\n- **condition:** avalia campo/operador/valor, segue true ou false\n- **delay:** cria ExecucaoPendente com data_agendada, para (cron retoma)\n- **action:** executa, segue para saída default\n\n#### Modo legado (linear)\n\n1. Avalia TODAS as condições (lógica AND)\n2. Se alguma falha, interrompe\n3. Executa ações sequencialmente\n4. Se ação tem delay, agenda via ExecucaoPendente\n\n#### 8 tipos de ação\n\n| Tipo | O que faz | Config |\n|------|-----------|--------|\n| `enviar_whatsapp` | Envia WhatsApp via N8N webhook | Template com {{variáveis}} |\n| `enviar_email` | Envia e-mail via N8N | Assunto + corpo com {{variáveis}} |\n| `notificacao_sistema` | Cria notificação no painel | Mensagem |\n| `criar_tarefa` | Cria TarefaCRM | Título, tipo, prioridade |\n| `mover_estagio` | Move OportunidadeVenda | Pipeline slug + estágio slug |\n| `atribuir_responsavel` | Atribui vendedor | Responsável (auto round-robin) |\n| `dar_pontos` | Dá pontos no Clube de Benefícios | Pontos + motivo |\n| `webhook` | Chama webhook externo | URL, método (GET/POST), headers |\n\nTodas as ações suportam variáveis de contexto: `{{lead_nome}}`, `{{lead_telefone}}`, `{{oportunidade_titulo}}`, etc.\n\n### Signals (`automacoes/signals.py`)\n\n| Signal | Modelo | Evento disparado | Condição |\n|--------|--------|-------------------|----------|\n| `on_lead_criado` | LeadProspecto (post_save, created) | `lead_criado` | Sempre |\n| `on_lead_qualificado` | LeadProspecto (post_save, not created) | `lead_qualificado` | score_qualificacao ≥ 7 |\n| `on_oportunidade_movida` | OportunidadeVenda (post_save) | `oportunidade_movida` | Sempre |\n| `on_docs_validados` | ImagemLeadProspecto (post_save, status=validado) | `docs_validados` | TODOS os docs validados |\n| `on_indicacao_convertida` | Indicacao (post_save, status=convertido) | `indicacao_convertida` | Sempre |\n\n**Contexto disponível nos signals (variáveis que podem ser usadas nas condições e templates):**\n\n| Variável | Tipo | Disponível em |\n|----------|------|---------------|\n| `lead` | Objeto LeadProspecto | Todos (exceto indicacao) |\n| `lead_nome` | String | Todos |\n| `lead_telefone` | String | lead_criado, lead_sem_contato |\n| `lead_email` | String | lead_criado |\n| `lead_origem` | String | lead_criado |\n| `lead_score` | Integer | lead_criado, lead_qualificado |\n| `lead_valor` | String | lead_criado |\n| `telefone` | String (alias) | Todos |\n| `nome` | String (alias) | Todos |\n| `estagio` | String (**slug** do estágio) | oportunidade_movida |\n| `estagio_nome` | String (nome amigável) | oportunidade_movida |\n| `pipeline` | String (slug) | oportunidade_movida |\n| `pipeline_nome` | String (nome amigável) | oportunidade_movida |\n| `oportunidade` | Objeto | oportunidade_movida |\n| `oportunidade_titulo` | String | oportunidade_movida |\n| `responsavel` | String (nome completo) | oportunidade_movida |\n| `dias_sem_contato` | Integer | lead_sem_contato (cron) |\n| `indicacao` | Objeto | indicacao_convertida |\n| `nome_indicado` | String | indicacao_convertida |\n| `telefone_indicado` | String | indicacao_convertida |\n| `membro_indicador` | String | indicacao_convertida |\n| `segmento` | Objeto | lead_entrou_segmento |\n| `segmento_nome` | String | lead_entrou_segmento |\n\n**Campos disponíveis para condições no editor visual:**\n\n| Campo | Chave no contexto | Quando usar |\n|-------|-------------------|-------------|\n| Origem | `lead.origem` | lead_criado |\n| Score | `lead.score_qualificacao` | lead_criado, lead_qualificado |\n| Cidade | `lead.cidade` | lead_criado |\n| Estado | `lead.estado` | lead_criado |\n| Valor | `lead.valor` | lead_criado |\n| Campanha | `lead.campanha` | lead_criado |\n| Estágio | `estagio` | oportunidade_movida (slug: \"demo-agendada\") |\n| Estágio (CRM) | `crm.estagio` | Alias, resolve para estagio |\n| Pipeline | `crm.pipeline` | oportunidade_movida |\n| Responsável | `crm.responsavel` | oportunidade_movida |\n| Dias sem contato | `dias_sem_contato` | lead_sem_contato (cron) |\n| Dias como cliente | `cliente.dias_ativo` | cliente_aniversario |\n| Plano | `cliente.plano` | venda_aprovada |\n\n### Management Command\n\n**`executar_automacoes_cron`**\n\n```bash\npython manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings_local\npython manage.py executar_automacoes_cron --dry-run  # apenas simula\npython manage.py executar_automacoes_cron --tenant megalink  # tenant específico\n```\n\n**Executado a cada 5 minutos.** Responsabilidades:\n\n1. **Processar delays:** busca ExecucaoPendente com status=pendente e data_agendada ≤ now, retoma execução\n2. **Lead sem contato:** busca leads sem HistoricoContato há X dias, dispara `lead_sem_contato`\n3. **Tarefa vencida:** busca TarefaCRM pendente/em_andamento com data_vencimento vencida, dispara `tarefa_vencida`\n4. **Disparo por segmento:** busca regras com segmento vinculado, aplica regras_filtro, dispara `disparo_segmento` para cada lead\n\n### APIs (11 endpoints)\n\n| Endpoint | Método | Descrição |\n|----------|--------|-----------|\n| `/marketing/automacoes/` | GET | Lista de automações |\n| `/marketing/automacoes/criar/` | GET/POST | Criar (nome/desc) → redireciona para editor visual |\n| `/marketing/automacoes/dashboard/` | GET | Dashboard central com KPIs e gráfico 30 dias |\n| `/marketing/automacoes/<pk>/editar/` | GET/POST | Editar nome/descrição |\n| `/marketing/automacoes/<pk>/fluxo/` | GET | Editor visual Drawflow |\n| `/marketing/automacoes/<pk>/salvar-fluxo/` | POST | Salvar fluxograma (nodos + conexões) |\n| `/marketing/automacoes/<pk>/toggle/` | POST | Ativar/desativar |\n| `/marketing/automacoes/<pk>/excluir/` | POST | Excluir |\n| `/marketing/automacoes/<pk>/historico/` | GET | Histórico de execuções |\n| `/marketing/automacoes/api/lead/<pk>/timeline/` | GET | Timeline de automações do lead (JSON) |\n\n### Templates (5)\n\n| Template | Descrição |\n|----------|-----------|\n| `lista.html` | Lista com filtros (ativas/pausadas), search, KPIs, cards por regra |\n| `criar.html` | Formulário simples (nome + descrição) + aviso do editor visual |\n| `editor_fluxo.html` | Editor visual Drawflow. Sidebar com paleta de nós (11 gatilhos, 1 condição, 7 ações, 1 delay). Canvas drag & drop. Painel de configuração lateral. Salva via AJAX |\n| `dashboard.html` | Dashboard com Chart.js (execuções 30 dias), top regras, erros recentes, log completo |\n| `historico.html` | Tabela de execuções por regra (status, lead, resultado, timestamp) |\n\n### Editor Visual (Drawflow)\n\nO editor visual e o principal diferencial do modulo. Permite montar automacoes como fluxogramas, similar ao N8N/Zapier.\n\n**Tipos de no na paleta:**\n\n| Categoria | Nos disponiveis | Inputs/Outputs |\n|-----------|-----------------|----------------|\n| **Gatilhos** | 11 eventos (lead_criado, venda_aprovada, etc.) | 0 in / 1 out |\n| **Condicoes** | Verificar Campo (campo + operador + valor) | 1 in / 2 out (sim/nao) |\n| **Acoes** | WhatsApp, E-mail, Notificacao, Criar Tarefa, Mover Estagio, Atribuir Responsavel, Dar Pontos, Webhook | 1 in / 1 out |\n| **Controle** | Atraso (minutos/horas/dias) | 1 in / 1 out |\n\n**Painel de configuracao especifica por tipo (abre ao selecionar no):**\n\nGatilhos:\n- **Oportunidade movida:** Pipeline (select), estagio de (select filtrado), estagio para (select filtrado)\n- **Lead sem contato:** Dias sem contato (numero)\n- **Entrou em segmento:** Segmento (select com segmentos do CRM)\n- **Mensagem recebida:** Canal (select: WhatsApp/Email/Widget)\n- Outros gatilhos: informativo (disparam sempre)\n\nCondicoes:\n- **Campo:** select com optgroups (Lead: origem/score/cidade/estado/valor/status/email/cpf | CRM: estagio/pipeline/responsavel | Temporal: dias sem contato)\n- **Operador:** igual, diferente, contem, maior, menor, maior ou igual, menor ou igual\n- **Valor:** campo dinamico que muda conforme o campo selecionado:\n  - Origem → select com origens (site, facebook, whatsapp...)\n  - Status → select com status do lead\n  - Estagio → select com estagios de todos os pipelines\n  - Pipeline → select com pipelines\n  - Responsavel → select com usuarios staff\n  - Estado → select com UFs\n  - Demais → input texto livre\n\nAcoes:\n- **Enviar WhatsApp:** Mensagem com variaveis {{lead_nome}}, {{lead_telefone}}...\n- **Enviar Email:** Assunto + corpo com variaveis\n- **Notificacao:** Titulo + mensagem\n- **Criar Tarefa:** Titulo, tipo (select: ligacao/followup/visita/whatsapp/email), prioridade (select: baixa/normal/alta/urgente)\n- **Mover Estagio:** Pipeline (select), estagio destino (select filtrado por pipeline)\n- **Atribuir Responsavel:** Modo (round-robin/fixo), responsavel (select com usuarios staff)\n- **Dar Pontos:** Quantidade + motivo\n- **Webhook:** URL, metodo (POST/GET), payload JSON\n\nControle:\n- **Atraso:** Tempo + unidade (minutos/horas/dias)\n\nTodos os nos: botao \"Remover no\"\n\n**Persistencia:** estado do Drawflow salvo como JSON em `regra.fluxo_json`. Nodos e conexoes persistidos como records no banco (NodoFluxo, ConexaoNodo) para o engine processar. Se `fluxo_json` estiver vazio mas existirem nodos no banco, o editor reconstroi o grafo automaticamente.\n\n### Testes E2E\n\nManagement command `testar_automacoes` valida todos os componentes end-to-end:\n\n```bash\npython manage.py testar_automacoes --settings=gerenciador_vendas.settings_local\n```\n\n18 testes cobrindo:\n- **T1:** Gatilho via signal real (cria lead → dispara → verifica notificacao no banco + lead no log)\n- **T2:** Condicao com branching (score > 5 → branch TRUE executa, FALSE nao)\n- **T3:** Acao notificacao (verifica criacao no banco com variaveis substituidas)\n- **T4:** Acao criar tarefa (verifica no CRM: titulo, lead, responsavel)\n- **T5:** Delay + pendentes (cria pendente → verifica que acao NAO executa → simula tempo → executa → verifica resultado)\n- **T6:** Rate limit (2 permitidas, 3a bloqueada)\n- **T7:** Fluxo completo E2E (trigger → condicao cidade=Recife → TRUE cria tarefa → FALSE nao executa)\n- **T8:** Substituicao de variaveis (simples e de objeto)\n\n### Admin\n\n**RegraAutomacaoAdmin:** list com nome/evento/ativa/execuções/taxa_sucesso. Inlines: CondicaoInline, AcaoInline (TabularInline).\n\n**LogExecucaoAdmin:** list com regra/ação/status/data. Readonly fields. Filtros por status e regra.\n\n---\n\n## Integrações entre Submódulos\n\n```\nCampanhas ──detecção──▶ Leads (campanha_origem FK)\nCampanhas ──N8N API──▶ N8N (mensagem recebida → detecta campanha)\nSegmentos ──signal──▶ Automações (lead_entrou_segmento)\nSegmentos ──service──▶ Leads (filtrar, avaliar, atualizar membros)\nAutomações ──signal──▶ Leads (lead_criado, lead_qualificado)\nAutomações ──signal──▶ CRM (oportunidade_movida, tarefa_vencida)\nAutomações ──signal──▶ CS (indicacao_convertida)\nAutomações ──ação──▶ WhatsApp (via N8N webhook)\nAutomações ──ação──▶ CRM (criar_tarefa, mover_estagio)\nAutomações ──ação──▶ CS/Clube (dar_pontos)\nAutomações ──cron──▶ ExecucaoPendente (delays, temporal events)\nAutomações ──timeline──▶ CRM/Lead (api_lead_timeline)\n```\n\n---\n\n## Dependências externas\n\n| Serviço | Uso | Integração |\n|---------|-----|------------|\n| **N8N** | Envio de WhatsApp e e-mail, detecção de campanha | Webhook POST |\n| **Drawflow.js** | Editor visual de fluxo | CDN v0.0.59 |\n| **Chart.js** | Gráfico de execuções no dashboard | CDN |\n\n---\n\n## Estatísticas do Módulo\n\n| Métrica | Valor |\n|---------|-------|\n| **Sub-apps** | 3 (campanhas, automacoes, segmentos) |\n| **Models** | 11 (2 campanhas + 7 automações + 2 segmentos) |\n| **Views** | 22 funções |\n| **Templates** | 9 |\n| **APIs** | 22 endpoints |\n| **Signals** | 6 |\n| **Testes** | 60+ (test_automacoes.py) |\n| **Linhas de código** | ~4.500+ (models + views + engine + services) |\n"}, {"t": "f", "n": "09 Modulo Cs", "fn": "09-MODULO_CS.md", "c": "# Módulo Customer Success — AuroraISP\n\n**Última atualização:** 04/04/2026\n**Status:** 🔧 Em desenvolvimento\n**Localização:** `apps/cs/`\n\n---\n\n## Visão Geral\n\nO módulo CS (Customer Success) cobre todo o ciclo de fidelização do cliente: do primeiro contato pós-venda até a prevenção de churn. É composto por 6 sub-apps que se integram via services e a engine de gamificação. Migrado do projeto megaroleta para o hub em 29/03/2026.\n\n```\nCliente ativado no HubSoft\n    │\n    ▼\n┌──────────┐     ┌────────────┐     ┌──────────────┐\n│  CLUBE   │────▶│ INDICAÇÕES │────▶│  PARCEIROS   │\n│ Roleta   │     │ Programa   │     │  Cupons      │\n│ Missões  │     │ Conversão  │     │  Resgates    │\n│ XP/Níveis│     │ Página pub.│     │  Validação   │\n└────┬─────┘     └────────────┘     └──────────────┘\n     │\n     ├──▶ CARTEIRINHA (ID digital com QR code)\n     ├──▶ NPS (Pesquisa de satisfação) [stub]\n     └──▶ RETENÇÃO (Score de saúde, alertas churn) [stub]\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, PostgreSQL, N8N (OTP/WhatsApp), HubSoft API (consulta de clientes)\n\n---\n\n## 1. Clube (`apps/cs/clube/`)\n\n### O que faz\nMotor de gamificação do hub. Roleta digital com prêmios, sistema de pontos (saldo para giros + XP para níveis), missões configuráveis, ranking de membros e landing page pública. Cada provedor tem seu clube independente (multi-tenant).\n\n### Models (10)\n\n#### MembroClube\nTabela: `clube_membroclube` | Unique: (tenant, cpf)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Identificação** | nome (255), cpf (14, unique/tenant), email, telefone (20) |\n| **Endereço** | cep, endereco, bairro, cidade, estado |\n| **Gamificação** | saldo (Integer, pontos para giros), xp_total (Integer, determina nível) |\n| **Validação** | validado (Boolean, OTP), codigo_indicacao (10, UUID auto, unique) |\n| **Integração** | id_cliente_hubsoft (Integer) |\n| **Auditoria** | data_cadastro (auto) |\n\n**Propriedades:**\n- `nivel_atual` → retorna NivelClube baseado no xp_total\n- `proximo_nivel` → próximo nível a atingir\n\n#### NivelClube\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(50) | Ex: Bronze, Prata, Ouro, Diamante |\n| `xp_necessario` | Integer | XP mínimo para atingir |\n| `ordem` | Integer | Ordem (1 = mais baixo) |\n\n#### RegraPontuacao\nTabela: auto | Unique: (tenant, gatilho)\n\nEngine de gamificação configurável. Define quando e quanto pontuar.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `gatilho` | CharField(50) | Identificador único (ex: cadastro, telefone_verificado, indicacao_convertida) |\n| `nome_exibicao` | CharField(100) | Nome amigável (ex: \"Bônus de Boas Vindas\") |\n| `pontos_saldo` | Integer | Pontos de giro concedidos |\n| `pontos_xp` | Integer | XP concedido |\n| `limite_por_membro` | Integer | Vezes que pode ganhar (0 = ilimitado) |\n| `ativo` | Boolean | Status |\n| `visivel_na_roleta` | Boolean | Mostra como missão na área do membro |\n\n**Gatilhos pré-definidos:** cadastro, telefone_verificado, indicacao_convertida, ajuste_manual_admin\n\n#### ExtratoPontuacao\nTabela: auto\n\nLedger de todas as movimentações de pontos. Imutável (audit trail).\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Quem ganhou |\n| `regra` | FK RegraPontuacao | Qual regra ativou |\n| `pontos_saldo_ganhos` | Integer | Saldo creditado |\n| `pontos_xp_ganhos` | Integer | XP creditado |\n| `descricao_extra` | CharField(255) | Contexto (ex: \"Indicou CPF 123.456.789-00\") |\n| `data_recebimento` | DateTime (auto) | Timestamp |\n\n#### PremioRoleta\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do prêmio |\n| `quantidade` | Integer | Estoque |\n| `posicoes` | CharField(50) | Posições válidas na roleta (ex: \"4,7\") |\n| `probabilidade` | Integer | Peso (1 = raro, 10 = comum) |\n| `mensagem_vitoria` | TextField | Mensagem exibida ao ganhar |\n| `cidades_permitidas` | M2M Cidade | Restrição geográfica (null = todas) |\n\n#### RoletaConfig (Singleton)\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `custo_giro` | Integer | Custo em pontos de saldo |\n| `xp_por_giro` | Integer | XP ganho por giro |\n| `nome_clube` | CharField(100) | Nome do clube (default \"Clube MegaLink\") |\n| `limite_giros_por_membro` | Integer | Máx giros (0 = ilimitado) |\n| `periodo_limite` | CharField | total, diario, semanal, mensal |\n\n#### ParticipanteRoleta\nTabela: auto\n\nRegistro de cada giro na roleta.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `membro` | FK MembroClube (nullable) | Membro (se autenticado) |\n| `nome`, `cpf`, `telefone`, `email` | Dados diretos | Para não membros |\n| `endereco`, `bairro`, `cidade`, `estado`, `cep` | Endereço | Localização |\n| `premio` | CharField(255) | Prêmio ganho |\n| `canal_origem` | CharField(100) | Canal (default \"Online\") |\n| `perfil_cliente` | CharField(10) | \"sim\" ou \"nao\" |\n| `saldo` | Integer | Saldo no momento do giro |\n| `status` | CharField(50) | reservado, ganhou, inviavel_tec, inviavel_cani |\n\n#### RouletteAsset\nTabela: auto\n\nElementos visuais da roleta (frames, fundo, logo, ponteiro). Tipo: frame, background, logo, pointer. Campo `ordem` (0-12 para frames).\n\n#### BannerClube\nTabela: auto\n\nBanners da landing page pública. Campos: titulo, imagem, link, ordem, ativo.\n\n#### LandingConfig (Singleton)\nTabela: auto\n\nConfiguração da landing page pública do clube.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `titulo` / `subtitulo` | CharField | Textos principais |\n| `whatsapp_numero` / `whatsapp_mensagem` | CharField | WhatsApp de suporte |\n| `texto_como_funciona` | TextField | Seção \"Como funciona\" (markdown) |\n| `texto_rodape` | CharField | Rodapé |\n| `cor_primaria` / `cor_secundaria` | CharField(7) | Cores hex |\n| `logo` | ImageField | Logo do clube |\n| `ativo` | Boolean | Status |\n\n#### Cidade\nTabela: auto | Unique: (tenant, nome)\n\nCidades disponíveis para restrição geográfica de prêmios, cupons e parceiros.\n\n### Services (4)\n\n#### GamificationService (`services/gamification_service.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `atribuir_pontos(membro, gatilho, descricao_extra)` | Busca RegraPontuacao pelo gatilho, valida limite_por_membro, incrementa saldo e xp_total com `F()` (atômico), cria ExtratoPontuacao. Retorna (sucesso, mensagem) |\n\n**Usado por:** automações (ação `dar_pontos`), signals de indicação, OTP validado, cadastro.\n\n#### OTPService (`services/otp_service.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `gerar_codigo()` | Gera código aleatório de 6 dígitos |\n| `enviar_otp_whatsapp(cpf, telefone, codigo)` | Envia OTP via webhook N8N. Retorna (sucesso, mensagem) |\n\n#### SorteioService (`services/sorteio_service.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `executar_giro_roleta(membro, premios, custo_giro)` | Deduz saldo, sorteia prêmio com `random.choices()` (probabilidade ponderada), retorna (novo_saldo, premio, posicao) |\n\n#### HubsoftService (`services/hubsoft_service.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `consultar_cliente(cpf)` | Consulta cliente no HubSoft via webhook N8N. Retorna dict com dados + telefone mascarado |\n| `checar_pontos_extras_cpf(cpf)` | Consulta recorrência, pagamento adiantado e uso do app. Retorna dict com flags booleanas |\n\n### Views (35+ funções)\n\n#### Área pública (sem login)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `landing_clube` | `/roleta/clube/` | Landing page pública com parceiros, cupons, prêmios, níveis |\n| `roleta_index` | `/roleta/` | Frontend da roleta (dados via API JSON) |\n| `roleta_logout` | `/roleta/logout/` | Limpa sessão e redireciona |\n\n#### APIs (JSON)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `roleta_init_dados` | `/roleta/api/init-dados/` | Endpoint principal: retorna auth_membro, config, cidades, assets, premios, missoes, cupons, indicacao |\n| `cadastrar_participante` | `/roleta/cadastrar/` | Cadastro de membro + registro de participante |\n| `verificar_cliente` | `/roleta/verificar-cliente/` | Consulta CPF no HubSoft |\n| `solicitar_otp` | `/roleta/solicitar-otp/` | Envia código OTP via WhatsApp |\n| `validar_otp` | `/roleta/validar-otp/` | Valida código + atribui pontos de telefone_verificado |\n| `pre_cadastrar` | `/roleta/pre-cadastrar/` | Pré-cadastro para membros não validados |\n| `api_resgatar_cupom` | `/roleta/api/cupons/resgatar/` | Resgate de cupom (debita pontos/valida nível) |\n| `api_criar_indicacao` | `/roleta/api/indicacao/criar/` | Cria indicação |\n\n#### Área do membro (sessão autenticada)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `membro_hub` | `/roleta/membro/` | Hub do membro (4 cards com contadores) |\n| `membro_jogar` | `/roleta/membro/jogar/` | Página da roleta |\n| `membro_missoes` | `/roleta/membro/missoes/` | Lista de missões com status |\n| `membro_cupons` | `/roleta/membro/cupons/` | Cupons disponíveis + histórico de resgates |\n| `membro_indicar` | `/roleta/membro/indicar/` | Página de indicação com código |\n| `membro_perfil` | `/roleta/membro/perfil/` | Edição de perfil |\n| `membro_faq` | `/roleta/membro/faq/` | FAQs |\n\n#### Dashboard admin (@login_required)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `dashboard_home` | `/roleta/dashboard/` | KPIs, variação 7 dias, gráficos (pizza prêmios + linha 7 dias), ganhadores recentes |\n| `dashboard_premios` | `/roleta/dashboard/premios/` | CRUD de prêmios |\n| `dashboard_participantes` | `/roleta/dashboard/participantes/` | Gestão de membros (busca, filtro cidade, editar saldo) |\n| `dashboard_extrato_membro` | `/roleta/dashboard/participantes/<id>/extrato/` | Extrato de pontuação do membro |\n| `dashboard_giros` | `/roleta/dashboard/giros/` | Histórico de giros |\n| `dashboard_cidades` | `/roleta/dashboard/cidades/` | CRUD de cidades |\n| `dashboard_assets` | `/roleta/dashboard/assets/` | Upload de assets visuais da roleta |\n| `dashboard_config` | `/roleta/dashboard/config/` | Config da roleta (custo, XP, limites) |\n| `dashboard_gamificacao` | `/roleta/dashboard/gamificacao/` | CRUD de regras e níveis |\n| `dashboard_landing_config` | `/roleta/dashboard/landing/` | Config da landing page |\n| `dashboard_banners` | `/roleta/dashboard/banners/` | CRUD de banners |\n| `dashboard_categorias` | `/roleta/dashboard/categorias/` | Categorias de parceiros |\n| `dashboard_relatorios` | `/roleta/dashboard/relatorios/` | Relatórios gerais |\n| `dashboard_relatorios_indicacoes` | `/roleta/dashboard/relatorios/indicacoes/` | Relatórios de indicações |\n| `dashboard_relatorios_parceiros` | `/roleta/dashboard/relatorios/parceiros/` | Relatórios de parceiros |\n| `exportar_csv` | `/roleta/dashboard/exportar/` | Exportação CSV de membros/participantes |\n| `documentacao` | `/roleta/dashboard/docs/` | Documentação da API |\n\n### Templates (20+)\n\n| Template | Descrição |\n|----------|-----------|\n| `index_frontend.html` | Frontend da roleta (JS + animações) |\n| `landing_clube.html` | Landing page pública (parceiros, cupons, níveis) |\n| `membro/hub.html` | Hub do membro |\n| `membro/jogar.html` | Página de jogo |\n| `membro/missoes.html` | Lista de missões |\n| `membro/cupons.html` | Cupons e resgates |\n| `membro/indicar.html` | Indicação com código |\n| `membro/perfil.html` | Perfil do membro |\n| `membro/faq.html` | FAQs |\n| `dashboard/home.html` | Dashboard principal |\n| `dashboard/premios.html` | Gestão de prêmios |\n| `dashboard/participantes.html` | Gestão de membros |\n| `dashboard/extrato_membro.html` | Extrato individual |\n| `dashboard/giros.html` | Histórico de giros |\n| `dashboard/config.html` | Configuração da roleta |\n| `dashboard/gamificacao.html` | Regras e níveis |\n| `dashboard/relatorios.html` | Relatórios |\n| `dashboard/relatorios_indicacoes.html` | Relatórios de indicações |\n| `dashboard/relatorios_parceiros.html` | Relatórios de parceiros |\n\n### Management Commands\n\n| Command | Descrição |\n|---------|-----------|\n| `gerar_faq` | Gera/atualiza FAQs via IA. Flags: --force, --categoria, --dry-run |\n| `testar_pontuacoes` | Testa scoring com dados reais do HubSoft. Flags: --qtd, --cpf, --buscar-adiantado |\n\n### Admin\n\n**MembroClubeAdmin:** list com nome/cpf/telefone/validado/saldo/nivel_atual. Filtro por validado. Inline ExtratoPontuacao.\n\n**PremioRoletaAdmin:** list com nome/quantidade/probabilidade. Filter horizontal cidades_permitidas. Editable quantidade.\n\n**RegraPontuacaoAdmin:** list com nome_exibicao/gatilho/pontos/ativo/visivel. Editable fields.\n\n---\n\n## 2. Parceiros (`apps/cs/parceiros/`)\n\n### O que faz\nGerencia rede de parceiros comerciais com descontos exclusivos para membros do clube. Parceiros cadastram cupons que podem ser gratuitos, custar pontos ou exigir nível mínimo. Inclui fluxo completo de aprovação, resgate e validação no ponto de venda.\n\n### Models (4)\n\n#### CategoriaParceiro\nTabela: auto | Unique: (tenant, slug)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome da categoria |\n| `slug` | SlugField | Slug único/tenant |\n| `icone` | CharField(50) | Classe FontAwesome (default \"fas fa-tag\") |\n| `ordem` | Integer | Ordem de exibição |\n| `ativo` | Boolean | Status |\n\n#### Parceiro\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do parceiro |\n| `logo` | ImageField | Logo (tenant_upload_path) |\n| `descricao` | TextField | Descrição |\n| `contato_nome` / `contato_telefone` / `contato_email` | Char/Email | Dados de contato |\n| `usuario` | OneToOne User | Acesso ao painel de parceiro |\n| `categoria` | FK CategoriaParceiro | Categoria |\n| `cidades` | M2M Cidade | Cobertura geográfica |\n| `ativo` | Boolean | Status |\n\n#### CupomDesconto\nTabela: auto | Unique: (tenant, codigo)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Identificação** | titulo (255), descricao, imagem, codigo (50, unique/tenant) |\n| **Desconto** | tipo_desconto (percentual/fixo), valor_desconto (Decimal 10,2) |\n| **Modalidade** | modalidade: gratuito (livre), pontos (custo em saldo), nivel (exige NivelClube mínimo) |\n| **Custo** | custo_pontos (Integer, quando modalidade=pontos), nivel_minimo (FK NivelClube, quando modalidade=nivel) |\n| **Estoque** | quantidade_total (0 = ilimitado), quantidade_resgatada (auto), limite_por_membro (default 1) |\n| **Período** | data_inicio, data_fim (DateTime) |\n| **Restrição** | cidades_permitidas (M2M Cidade), parceiro (FK Parceiro) |\n| **Aprovação** | status_aprovacao (aprovado/pendente/rejeitado), motivo_rejeicao |\n| **Status** | ativo |\n\n**Propriedades:** `estoque_disponivel` (bool), `estoque_restante` (int ou \"Ilimitado\")\n\n#### ResgateCupom\nTabela: auto | Unique: (tenant, codigo_unico)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Quem resgatou |\n| `cupom` | FK CupomDesconto | Cupom resgatado |\n| `codigo_unico` | CharField(20) | UUID gerado (para validação) |\n| `pontos_gastos` | Integer | Pontos debitados |\n| `status` | CharField | resgatado, utilizado, expirado, cancelado |\n| `valor_compra` | Decimal(10,2) | Valor da compra (preenchido na validação) |\n| `data_resgate` | DateTime (auto) | Quando resgatou |\n| `data_utilizacao` | DateTime | Quando utilizou no parceiro |\n\n### Services\n\n#### CupomService (`services/services.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `resgatar_cupom(membro, cupom_id)` | Validações: ativo, período, estoque, limite/membro, cidade, pontos/nível. Debita saldo (se pontos). Cria ResgateCupom com codigo_unico UUID. Retorna (sucesso, mensagem, resgate) |\n| `cupons_disponiveis(membro)` | Filtra cupons ativos, aprovados, em período, com estoque, por cidade. Retorna queryset |\n\n### Views (6)\n\n#### Dashboard admin\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `dashboard_parceiros_home` | `/roleta/dashboard/parceiros/` | KPIs (total, cupons, resgates, utilizados), variação 7 dias, gráfico evolução, top cupons |\n| `dashboard_parceiros` | `/roleta/dashboard/parceiros/lista/` | CRUD de parceiros com busca |\n| `dashboard_cupons` | `/roleta/dashboard/cupons/` | CRUD de cupons com filtros (parceiro, modalidade, aprovação). Ações: aprovar/rejeitar |\n| `dashboard_cupom_detalhe` | `/roleta/dashboard/cupons/<id>/` | Detalhe do cupom com KPIs e lista de resgates |\n| `dashboard_cupons_resgates` | `/roleta/dashboard/cupons/resgates/` | Histórico de resgates com filtros (busca, status) |\n\n#### Página pública\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `validar_cupom` | `/roleta/cupom/validar/` | Validação no ponto de venda. Busca por codigo_unico, confirma uso, registra valor_compra |\n\n### Templates (5+)\n\n| Template | Descrição |\n|----------|-----------|\n| `dashboard/home.html` | Dashboard de parceiros com KPIs e gráficos |\n| `dashboard/parceiros.html` | CRUD de parceiros |\n| `dashboard/cupons.html` | Gestão de cupons |\n| `dashboard/cupom_detalhe.html` | Detalhe + resgates |\n| `dashboard/cupons_resgates.html` | Histórico de resgates |\n| `validar_cupom.html` | Página pública de validação |\n\n### Admin\n\n**ParceiroAdmin:** list com nome/ativo/data_cadastro. Filtro por ativo.\n\n**CupomDescontoAdmin:** list com titulo/parceiro/modalidade/tipo/valor/ativo. Filtros por ativo/modalidade/parceiro.\n\n**ResgateCupomAdmin:** list com membro/cupom/codigo_unico/status. Filtro por status.\n\n---\n\n## 3. Indicações (`apps/cs/indicacoes/`)\n\n### O que faz\nPrograma de indicação member-get-member. Cada membro do clube recebe um código único de indicação e uma página pública personalizada. Quando a indicação é convertida (contato feito, virou cliente), o indicador ganha pontos automaticamente via GamificationService.\n\n### Models (2)\n\n#### IndicacaoConfig (Singleton)\nTabela: auto\n\nConfiguração visual da página pública de indicação.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `titulo` / `subtitulo` | CharField | Textos (default \"Megalink\", \"Clube de Fidelidade\") |\n| `texto_indicador` | CharField | \"Você foi indicado por\" |\n| `texto_botao` | CharField | \"Enviar Indicação\" |\n| `texto_sucesso_titulo` / `texto_sucesso_msg` | Char/Text | Mensagem de sucesso |\n| `logo` / `imagem_fundo` | ImageField | Visuais |\n| `cor_fundo` / `cor_botao` | CharField(7) | Cores hex |\n| `mostrar_campo_cpf` / `mostrar_campo_cidade` | Boolean | Campos opcionais |\n\n#### Indicacao\nTabela: auto | Unique: (membro_indicador, telefone_indicado)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `membro_indicador` | FK MembroClube | Quem indicou |\n| `nome_indicado` | CharField(255) | Nome do indicado |\n| `telefone_indicado` | CharField(20) | Telefone |\n| `cpf_indicado` | CharField(14) | CPF (opcional) |\n| `cidade_indicado` | CharField(100) | Cidade (opcional) |\n| `status` | CharField | pendente, contato_feito, convertido, cancelado |\n| `membro_indicado` | FK MembroClube (nullable) | Membro criado (quando converteu) |\n| `pontos_creditados` | Boolean | Se os pontos já foram dados |\n| `data_indicacao` | DateTime (auto) | Quando indicou |\n| `data_conversao` | DateTime | Quando converteu |\n| `observacoes` | TextField | Observações |\n\n### Services\n\n#### IndicacaoService (`services/services.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `criar_indicacao(membro_indicador, nome, telefone, cpf, cidade)` | Valida: sem auto-indicação, sem duplicata (indicador + telefone). Cria Indicacao. Retorna (sucesso, msg, indicação) |\n| `confirmar_conversao(indicacao_id)` | Marca status=convertido, data_conversao=now(). Chama GamificationService.atribuir_pontos(gatilho='indicacao_convertida'). Marca pontos_creditados=True. @transaction.atomic |\n\n### Views (5)\n\n| View | Rota | Auth | Descrição |\n|------|------|------|-----------|\n| `dashboard_indicacoes_home` | `/roleta/dashboard/indicacoes/` | @login_required | KPIs (total, pendentes, convertidos, taxa), variação 7 dias, top 5 embaixadores |\n| `dashboard_indicacoes` | `/roleta/dashboard/indicacoes/lista/` | @login_required | Lista com filtros (busca, status), ações (alterar_status, adicionar_obs) |\n| `dashboard_indicacoes_membros` | `/roleta/dashboard/indicacoes/membros/` | @login_required | Membros com contagem de indicações, auto-gera código |\n| `dashboard_indicacoes_visual` | `/roleta/dashboard/indicacoes/visual/` | @login_required | Config visual da página pública |\n| `pagina_indicacao` | `/roleta/indicar/<codigo>/` | Público | Página pública de indicação. Busca membro pelo código, form de indicação |\n\n### Templates (5+)\n\n| Template | Descrição |\n|----------|-----------|\n| `dashboard/home.html` | Dashboard com KPIs, gráfico 7 dias, top embaixadores |\n| `dashboard/indicacoes.html` | Lista de indicações com filtros |\n| `dashboard/membros.html` | Membros embaixadores |\n| `dashboard/visual.html` | Config visual |\n| `pagina_indicacao.html` | Página pública personalizada |\n\n### Admin\n\n**IndicacaoAdmin:** list com indicador/nome_indicado/telefone/status/pontos_creditados/data. Filtros por status/pontos_creditados.\n\n---\n\n## 4. Carteirinha (`apps/cs/carteirinha/`)\n\n### O que faz\nSistema de carteirinha digital para membros do clube. Modelos visuais configuráveis (cores, logo, background), regras de atribuição automática (por nível, XP, cidade ou todos), QR code de validação e foto do membro.\n\n### Models (3)\n\n#### ModeloCarteirinha\nTabela: auto\n\nTemplate visual da carteirinha.\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Identificação** | nome (100), descricao |\n| **Fundo** | tipo_fundo (cor/imagem), cor_fundo_primaria, cor_fundo_secundaria, imagem_fundo |\n| **Textos** | cor_texto, cor_texto_secundario, cor_destaque, texto_marca (\"Clube Megalink\"), texto_rodape |\n| **Logo** | logo (ImageField) |\n| **Visibilidade** | mostra
