versao, valor_venda (Decimal 12,2) |\n| **Auditoria** | detectado_em (auto) |\n\n**6 Гӯndices:** telefone, lead, campanha, -detectado_em, aceita, converteu_venda\n\n**`save()` override:**\n1. Normaliza mensagem (NFKD, lowercase, remove acentos)\n2. Calcula tamanho da mensagem\n3. Atualiza contador_deteccoes da campanha\n\n### APIs (4 endpoints)\n\n| Endpoint | MГ©todo | Auth | DescriГ§ГЈo |\n|----------|--------|------|-----------|\n| `/marketing/configuracoes/campanhas/` | GET | @login_required | PГЎgina de campanhas (template) |\n| `/marketing/configuracoes/campanhas/deteccoes/` | GET | @login_required | PГЎgina de detecГ§Гөes com filtros |\n| `/marketing/api/campanhas/` | GET/POST/PUT/DELETE | @login_required | CRUD completo de campanhas via JSON |\n| `/marketing/api/campanhas/detectar/` | POST | @api_token_required | DetecГ§ГЈo de campanha (N8N) |\n\n#### API de DetecГ§ГЈo (N8N)\n\nEndpoint principal de integraГ§ГЈo. O N8N envia cada mensagem recebida no WhatsApp e a API detecta automaticamente a campanha de origem.\n\n**Request:**\n```json\n{\n    \"telefone\": \"5589999999999\",\n    \"mensagem\": \"vi o cupom50 no Instagram\",\n    \"origem\": \"whatsapp\",\n    \"timestamp\": \"2024-11-20 10:30:00\"\n}\n```\n\n**Algoritmo:**\n1. Normaliza a mensagem (remove acentos, lowercase)\n2. Itera campanhas ativas ordenadas por prioridade\n3. Aplica mГ©todo de detecГ§ГЈo (exato вҶ’ parcial вҶ’ regex)\n4. Calcula score de confianГ§a (100% exato, 95% parcial, 90% regex)\n5. Cria/vincula lead se nГЈo existe\n6. Registra DeteccaoCampanha\n7. Retorna campanha detectada com score\n\n**Response:**\n```json\n{\n    \"success\": true,\n    \"campanha_detectada\": {\n        \"id\": 5, \"codigo\": \"CUPOM50\", \"nome\": \"Promo 50% OFF\",\n        \"plataforma\": \"instagram_ads\"\n    },\n    \"deteccao\": {\n        \"id\": 12345, \"trecho_detectado\": \"cupom50\",\n        \"score_confianca\": 95.5, \"metodo\": \"parcial\"\n    },\n    \"lead_id\": 123,\n    \"lead_criado\": false\n}\n```\n\n### Templates (1)\n\n- `campanhas.html` вҖ” Grid 4 colunas de cards. KPIs no topo (total, ativas, detecГ§Гөes, leads). Modal de criaГ§ГЈo/ediГ§ГЈo. Cor fixa do sistema (--primary).\n\n### Admin\n\n**CampanhaTrafegoAdmin:** list com nome/codigo/plataforma/ativa/detecГ§Гөes. Filtros por ativa/plataforma/tipo_trafego. Fieldsets organizados por grupo. Custom method `estatisticas_display()` com tabela HTML de mГ©tricas.\n\n**DeteccaoCampanhaAdmin:** list com campanha/telefone/score/origem/aceita. Filtros por aceita/converteu_venda/origem/mГ©todo. Campos de mensagem e timestamps como readonly.\n\n---\n\n## 2. Segmentos (`apps/marketing/segmentos_urls.py` + `apps/comercial/crm/`)\n\n### O que faz\nAgrupa leads por critГ©rios dinГўmicos, manuais ou hГӯbridos. Os segmentos sГЈo a ponte entre o CRM e as automaГ§Гөes: permitem disparo em massa, preview em tempo real das regras, e avaliaГ§ГЈo automГЎtica quando um lead muda. Segmentos ficam no contexto de Marketing (URLs `/marketing/segmentos/`) mas o model vive no CRM.\n\n### Model\n\n#### SegmentoCRM\nTabela: `crm_segmentos` | Unique: (tenant, nome)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome do segmento |\n| `descricao` | TextField | DescriГ§ГЈo |\n| `tipo` | CharField | dinamico, manual, hibrido |\n| `regras_filtro` | JSONField | Regras para segmentos dinГўmicos |\n| `leads` | M2M via MembroSegmento | Leads do segmento |\n| `cor_hex` | CharField(7, default #764ba2) | Cor visual |\n| `icone_fa` | CharField(50, default fa-users) | ГҚcone FontAwesome |\n| `ultima_atualizacao_dinamica` | DateTimeField | Гҡltimo sync |\n| `total_leads` | PositiveInteger | Cache do total |\n| `criado_por` | FK User | Autor |\n| `ativo` | BooleanField(True) | Status |\n\n**MembroSegmento** вҖ” Through table: segmento FK, lead FK, adicionado_manualmente (bool), adicionado_por FK User.\n\n**Formato das regras de filtro (JSON):**\n```json\n{\n    \"regras\": [\n        {\"campo\": \"origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"},\n        {\"campo\": \"score_qualificacao\", \"operador\": \"maior\", \"valor\": \"7\"},\n        {\"campo\": \"cidade\", \"operador\": \"contem\", \"valor\": \"Teresina\"},\n        {\"campo\": \"dias_cadastro\", \"operador\": \"menor\", \"valor\": \"30\"}\n    ]\n}\n```\n\n**Campos disponГӯveis:** origem, score_qualificacao, cidade, estado, bairro, valor, status_api, dias_cadastro\n**Operadores:** igual, diferente, contem, maior, menor, maior_igual, menor_igual\n\n### Services (`apps/comercial/crm/services/segmentos.py`)\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `filtrar_leads_por_regras(regras, queryset)` | Aplica regras ao queryset. Trata `dias_cadastro` como data relativa. Retorna QuerySet filtrado |\n| `lead_atende_regras(lead, regras)` | Verifica se um lead atende TODAS as regras (sem query, avaliaГ§ГЈo in-memory) |\n| `atualizar_membros_segmento(segmento)` | Sync completo: remove quem nГЈo atende mais (exceto manuais), adiciona novos. Atualiza total_leads e timestamp |\n| `avaliar_lead_em_segmentos(lead)` | Avalia lead em TODOS os segmentos dinГўmicos/hГӯbridos do tenant. Retorna lista dos segmentos em que entrou |\n\n### Signal\n\n**`avaliar_segmentos_dinamicos`** (post_save LeadProspecto):\n- Chama `avaliar_lead_em_segmentos()` a cada save de lead\n- Para cada segmento que o lead entrou: dispara evento `lead_entrou_segmento` para o engine de automaГ§Гөes\n- Contexto inclui: lead, lead_nome, telefone, segmento, segmento_nome\n\n### APIs (7 endpoints)\n\n| Endpoint | MГ©todo | DescriГ§ГЈo |\n|----------|--------|-----------|\n| `/marketing/segmentos/` | GET | Lista de segmentos (grid de cards) |\n| `/marketing/segmentos/criar/` | GET | PГЎgina de criaГ§ГЈo com rule builder |\n| `/marketing/segmentos/<pk>/` | GET | Detalhe com membros |\n| `/marketing/segmentos/<pk>/editar/` | GET | EdiГ§ГЈo com regras |\n| `/marketing/segmentos/salvar/` | POST | Salvar segmento (API JSON) |\n| `/marketing/segmentos/preview/` | POST | Preview em tempo real (retorna count + amostra de leads) |\n| `/marketing/segmentos/<pk>/buscar-leads/` | GET | Buscar leads para adicionar manualmente |\n| `/marketing/segmentos/<pk>/adicionar-lead/` | POST | Adicionar lead manualmente |\n| `/marketing/segmentos/<pk>/remover-membro/` | POST | Remover membro |\n| `/marketing/segmentos/<pk>/disparar-campanha/` | POST | Disparo em massa para leads do segmento |\n\n### Templates (3)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `segmentos_lista.html` | Grid de cards (nome, tipo badge, total_leads, Гӯcone, cor) |\n| `segmento_criar.html` | FormulГЎrio com builder de regras dinГўmicas (campo + operador + valor) e preview em tempo real |\n| `segmento_detalhe.html` | Lista de membros com aГ§Гөes (adicionar, remover, disparar campanha) |\n\n---\n\n## 3. AutomaГ§Гөes (`apps/marketing/automacoes/`)\n\n### O que faz\nMotor de automaГ§ГЈo do hub. Define regras que reagem a eventos do sistema e executam aГ§Гөes automaticamente. Os eventos sГЈo disparados de duas formas: **signals** (tempo real, quando algo acontece no sistema) e **cron** (periГіdico, a cada 5 minutos).\n\n### Como funciona (arquitetura)\n\n```\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n  TEMPO REAL (Signals Django вҖ” post_save)\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n\n  Lead salvo (created=True)\n      в”Ӯ  signal: on_lead_criado\n      в–ј\n  engine.disparar_evento('lead_criado', contexto, tenant)\n      в”Ӯ\n      в”ңв”Җв”Җ Busca regras ativas com evento='lead_criado'\n      в”ңв”Җв”Җ Para cada regra:\n      в”Ӯ       в”ңв”Җв”Җ Verifica controles (rate limit, cooldown)\n      в”Ӯ       в””в”Җв”Җ _processar_fluxo() вҶ’ BFS no grafo Drawflow\n      в”Ӯ               в”Ӯ\n      в”Ӯ               в”ңв”Җв”Җ Trigger Node вҶ’ segue default\n      в”Ӯ               в”ңв”Җв”Җ Condition Node вҶ’ avalia campo/operador/valor\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ true вҶ’ segue saГӯda 1\n      в”Ӯ               в”Ӯ       в””в”Җв”Җ false вҶ’ segue saГӯda 2\n      в”Ӯ               в”ңв”Җв”Җ Action Node вҶ’ executa aГ§ГЈo\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ notificacao_sistema вҶ’ cria Notificacao\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ criar_tarefa вҶ’ cria TarefaCRM\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ mover_estagio вҶ’ move OportunidadeVenda\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ atribuir_responsavel вҶ’ round-robin\n      в”Ӯ               в”Ӯ       в”ңв”Җв”Җ dar_pontos вҶ’ MembroClube.saldo\n      в”Ӯ               в”Ӯ       в””в”Җв”Җ webhook вҶ’ POST externo\n      в”Ӯ               в””в”Җв”Җ Delay Node вҶ’ cria ExecucaoPendente (cron retoma)\n      в”Ӯ\n      в””в”Җв”Җ Registra LogExecucao + atualiza contadores\n\n\n  Oportunidade salva (created=False)\n      в”Ӯ  signal: on_oportunidade_movida\n      в–ј\n  engine.disparar_evento('oportunidade_movida', {estagio: 'demo-agendada', ...})\n      в”Ӯ\n      в””в”Җв”Җ Mesmo fluxo acima (busca regras, processa grafo)\n\n\n  Lead salvo (created=False, score >= 7)\n      в”Ӯ  signal: on_lead_qualificado\n      в–ј\n  engine.disparar_evento('lead_qualificado', ...)\n\n\n  Todos os docs do lead validados\n      в”Ӯ  signal: on_docs_validados\n      в–ј\n  engine.disparar_evento('docs_validados', ...)\n\n\n  IndicaГ§ГЈo convertida\n      в”Ӯ  signal: on_indicacao_convertida\n      в–ј\n  engine.disparar_evento('indicacao_convertida', ...)\n\n\n  Lead entrou em segmento dinГўmico\n      в”Ӯ  signal: avaliar_segmentos_dinamicos (apps/comercial/crm/signals.py)\n      в–ј\n  engine.disparar_evento('lead_entrou_segmento', ...)\n\n\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n  PERIГ“DICO (Cron вҖ” executar_automacoes_cron, a cada 5 min)\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n\n  python manage.py executar_automacoes_cron\n      в”Ӯ\n      в”ңв”Җв”Җ 1. Processar delays pendentes\n      в”Ӯ       Busca ExecucaoPendente com data_agendada <= now\n      в”Ӯ       Retoma execuГ§ГЈo do nodo onde parou\n      в”Ӯ\n      в”ңв”Җв”Җ 2. Lead sem contato\n      в”Ӯ       Para cada regra com evento='lead_sem_contato':\n      в”Ӯ           Extrai dias da condiГ§ГЈo (ex: 2 dias)\n      в”Ӯ           Busca leads com Гәltimo HistoricoContato antes do limite\n      в”Ӯ           Exclui leads jГЎ disparados no perГӯodo\n      в”Ӯ           Dispara: engine.disparar_evento('lead_sem_contato', {\n      в”Ӯ               dias_sem_contato: 2, lead: ..., lead_nome: ...\n      в”Ӯ           })\n      в”Ӯ\n      в”ңв”Җв”Җ 3. Tarefa vencida\n      в”Ӯ       Busca TarefaCRM pendente/em_andamento com data_vencimento vencida\n      в”Ӯ       Dispara: engine.disparar_evento('tarefa_vencida', ...)\n      в”Ӯ\n      в””в”Җв”Җ 4. Disparo por segmento\n              Para cada regra com segmento vinculado:\n              Aplica regras_filtro do segmento\n              Dispara evento para cada lead do segmento\n\n\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n  RESUMO: Quem dispara o quГӘ\nв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ\n\n  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n  в”Ӯ Evento                  в”Ӯ Disparado porв”Ӯ Quando                     в”Ӯ\n  в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\n  в”Ӯ lead_criado             в”Ӯ Signal       в”Ӯ Lead salvo (created=True)  в”Ӯ\n  в”Ӯ lead_qualificado        в”Ӯ Signal       в”Ӯ Lead score >= 7            в”Ӯ\n  в”Ӯ oportunidade_movida     в”Ӯ Signal       в”Ӯ Oportunidade salva         в”Ӯ\n  в”Ӯ docs_validados          в”Ӯ Signal       в”Ӯ Todos docs status=validado в”Ӯ\n  в”Ӯ indicacao_convertida    в”Ӯ Signal       в”Ӯ IndicaГ§ГЈo status=convertidoв”Ӯ\n  в”Ӯ lead_entrou_segmento    в”Ӯ Signal       в”Ӯ Lead avaliado em segmento  в”Ӯ\n  в”Ӯ mensagem_recebida       в”Ӯ Signal       в”Ӯ Mensagem tipo=contato      в”Ӯ\n  в”Ӯ conversa_aberta         в”Ӯ Signal       в”Ӯ Conversa criada            в”Ӯ\n  в”Ӯ conversa_resolvida      в”Ӯ Signal       в”Ӯ Conversa status=resolvida  в”Ӯ\n  в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\n  в”Ӯ lead_sem_contato        в”Ӯ Cron (5min)  в”Ӯ Lead sem HistoricoContato  в”Ӯ\n  в”Ӯ tarefa_vencida          в”Ӯ Cron (5min)  в”Ӯ TarefaCRM data vencida     в”Ӯ\n  в”Ӯ disparo_segmento        в”Ӯ Cron (5min)  в”Ӯ Regra com segmento FK      в”Ӯ\n  в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\n  в”Ӯ venda_aprovada          в”Ӯ Signal*      в”Ӯ *Pendente implementaГ§ГЈo    в”Ӯ\n  в”Ӯ cliente_aniversario     в”Ӯ Cron*        в”Ӯ *Pendente implementaГ§ГЈo    в”Ӯ\n  в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\n  * = evento definido no model mas signal/cron ainda nГЈo implementado\n```\n\n### Models (7)\n\n#### RegraAutomacao (principal)\nTabela: `automacoes_regraautomacao`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(200) | Nome da automaГ§ГЈo |\n| `descricao` | TextField | DescriГ§ГЈo |\n| `evento` | CharField(50, blank) | Gatilho (definido como nГі no editor visual) |\n| `ativa` | BooleanField(True) | Status (indexado) |\n| `criado_por` | FK User | Autor |\n| `data_criacao` / `data_atualizacao` | DateTime | Timestamps |\n| `total_execucoes` / `total_sucesso` / `total_erro` | PositiveInteger | Contadores |\n| `modo_fluxo` | BooleanField | True = editor visual, False = linear legado |\n| `fluxo_json` | JSONField | Estado do Drawflow para re-import |\n| `segmento` | FK SegmentoCRM | Para disparo em massa |\n| `max_execucoes_por_lead` | PositiveInteger(0) | 0 = ilimitado |\n| `cooldown_horas` | PositiveInteger(0) | MГӯnimo entre execuГ§Гөes por lead |\n| `periodo_limite_horas` | PositiveInteger(24) | Janela de tempo para max_execucoes |\n\n**14 eventos gatilho disponГӯveis:**\n\n| Evento | DescriГ§ГЈo |\n|--------|-----------|\n| `lead_criado` | Novo lead cadastrado no sistema |\n| `lead_qualificado` | Score do lead atinge mГӯnimo (вүҘ 7) |\n| `lead_sem_contato` | Lead sem interaГ§ГЈo hГЎ X dias |\n| `oportunidade_movida` | Oportunidade muda de estГЎgio no pipeline |\n| `venda_aprovada` | Contrato aprovado no HubSoft |\n| `cliente_aniversario` | Cliente completa X dias/meses |\n| `indicacao_convertida` | IndicaГ§ГЈo vira cliente |\n| `tarefa_vencida` | Tarefa do CRM vence |\n| `docs_validados` | Todos os docs do lead aprovados |\n| `lead_entrou_segmento` | Lead entra em segmento dinГўmico |\n| `disparo_segmento` | Disparo em massa por segmento |\n| `mensagem_recebida` | Mensagem recebida no inbox |\n| `conversa_aberta` | Nova conversa no inbox |\n| `conversa_resolvida` | Conversa resolvida no inbox |\n\n**Propriedade:** `taxa_sucesso` вҶ’ (total_sucesso / total_execucoes) Г— 100\n\n#### CondicaoRegra (modo legado)\nTabela: `automacoes_condicaoregra`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `campo` | CharField(100) | Ex: lead.origem, crm.estagio |\n| `operador` | CharField | igual, diferente, contem, maior, menor, maior_igual, menor_igual |\n| `valor` | CharField(255) | Valor esperado |\n| `ordem` | PositiveInteger | Ordem de avaliaГ§ГЈo |\n\n**MГ©todo:** `avaliar(contexto)` вҖ” Resolve campo no contexto e compara.\n\n#### AcaoRegra (modo legado)\nTabela: `automacoes_acaoregra`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `tipo` | CharField | 8 tipos de aГ§ГЈo (ver tabela abaixo) |\n| `configuracao` | TextField | Template com variГЎveis {{}} |\n| `ordem` | PositiveInteger | Ordem de execuГ§ГЈo |\n| `delay_ativo` | BooleanField | Se tem atraso |\n| `delay_valor` | PositiveInteger | Valor do atraso |\n| `delay_unidade` | CharField | minutos, horas, dias |\n\n#### NodoFluxo (modo visual)\nTabela: `automacoes_nodofluxo`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `tipo` | CharField | trigger, condition, action, delay |\n| `subtipo` | CharField(50) | Ex: lead_criado, enviar_whatsapp, campo_check |\n| `configuracao` | JSONField | Config especГӯfica por tipo |\n| `pos_x` / `pos_y` | Integer | PosiГ§ГЈo visual no canvas |\n| `ordem` | PositiveInteger | Ordem de processamento |\n\n#### ConexaoNodo (modo visual)\nTabela: `automacoes_conexaonodo` | Unique: (nodo_origem, nodo_destino, tipo_saida)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra pai |\n| `nodo_origem` | FK NodoFluxo | De onde sai |\n| `nodo_destino` | FK NodoFluxo | Para onde vai |\n| `tipo_saida` | CharField | default, true (sim), false (nГЈo) |\n\n#### ExecucaoPendente\nTabela: `automacoes_execucaopendente`\n\nFila de aГ§Гөes aguardando execuГ§ГЈo (delays, agendamentos). Processada pelo cron.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra |\n| `nodo` / `acao` | FK NodoFluxo / AcaoRegra | NГі ou aГ§ГЈo a executar |\n| `lead` | FK LeadProspecto | Lead alvo |\n| `contexto_json` | JSONField | Contexto serializado |\n| `data_agendada` | DateTimeField (indexado) | Quando executar |\n| `status` | CharField | pendente, executado, cancelado, erro |\n| `resultado` | TextField | Resultado da execuГ§ГЈo |\n\n**ГҚndices:** (status, data_agendada), (lead, status)\n\n#### ControleExecucao\nTabela: `automacoes_controleexecucao` | Unique: (lead, regra)\n\nRate limiting por lead por regra. Controla max_execucoes e cooldown.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead |\n| `regra` | FK RegraAutomacao | Regra |\n| `total_execucoes_periodo` | PositiveInteger | ExecuГ§Гөes na janela |\n| `primeira_execucao_periodo` | DateTime | InГӯcio da janela |\n| `ultima_execucao` | DateTime | Гҡltima execuГ§ГЈo |\n\n#### LogExecucao\nTabela: `automacoes_logexecucao`\n\nRegistro de cada execuГ§ГЈo de automaГ§ГЈo. Usado no dashboard e na timeline do lead.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `regra` | FK RegraAutomacao | Regra |\n| `acao` / `nodo` | FK AcaoRegra / NodoFluxo | O que foi executado |\n| `lead` | FK LeadProspecto (indexado) | Lead afetado |\n| `status` | CharField | sucesso, erro, agendado, cancelado |\n| `evento_dados` | JSONField | Contexto do evento |\n| `resultado` | TextField(500) | Mensagem de resultado |\n| `data_execucao` | DateTime (auto) | Quando executou |\n| `data_agendada` | DateTime | Se foi agendado |\n\n### Engine (`automacoes/engine.py`)\n\nO engine Г© o coraГ§ГЈo do mГіdulo. Processa eventos em dois modos: linear legado e BFS em grafo visual.\n\n#### Fluxo de execuГ§ГЈo\n\n```\nSignal dispara evento\n    в”Ӯ\n    в–ј\ndisparar_evento(evento, contexto, tenant)\n    в”Ӯ\n    в”ңв”Җв”Җ Busca regras ativas para o evento\n    в”ңв”Җв”Җ Para cada regra:\n    в”Ӯ       в”ңв”Җв”Җ _verificar_controles() вҶ’ rate limit / cooldown\n    в”Ӯ       в”ңв”Җв”Җ Se modo_fluxo=True:\n    в”Ӯ       в”Ӯ       в””в”Җв”Җ _processar_fluxo() вҶ’ BFS no grafo\n    в”Ӯ       в””в”Җв”Җ Se modo_fluxo=False:\n    в”Ӯ               в””в”Җв”Җ _processar_regra_legacy() вҶ’ linear\n    в”Ӯ\n    в””в”Җв”Җ Atualiza contadores (sucesso/erro)\n```\n\n#### Modo visual (BFS)\n\n```\nTrigger Node (0 inputs, 1 output)\n    в”Ӯ default\n    в–ј\nCondition Node (1 input, 2 outputs)\n    в”ңв”Җв”Җ true вҶ’ Action Node вҶ’ ...\n    в””в”Җв”Җ false вҶ’ Action Node вҶ’ ...\n         в”Ӯ\n    Delay Node вҶ’ ExecucaoPendente вҶ’ cron retoma\n```\n\n`_executar_nodo_e_seguir(regra, nodo, contexto, lead)`:\n- **trigger:** passa para saГӯda default\n- **condition:** avalia campo/operador/valor, segue true ou false\n- **delay:** cria ExecucaoPendente com data_agendada, para (cron retoma)\n- **action:** executa, segue para saГӯda default\n\n#### Modo legado (linear)\n\n1. Avalia TODAS as condiГ§Гөes (lГіgica AND)\n2. Se alguma falha, interrompe\n3. Executa aГ§Гөes sequencialmente\n4. Se aГ§ГЈo tem delay, agenda via ExecucaoPendente\n\n#### 8 tipos de aГ§ГЈo\n\n| Tipo | O que faz | Config |\n|------|-----------|--------|\n| `enviar_whatsapp` | Envia WhatsApp via N8N webhook | Template com {{variГЎveis}} |\n| `enviar_email` | Envia e-mail via N8N | Assunto + corpo com {{variГЎveis}} |\n| `notificacao_sistema` | Cria notificaГ§ГЈo no painel | Mensagem |\n| `criar_tarefa` | Cria TarefaCRM | TГӯtulo, tipo, prioridade |\n| `mover_estagio` | Move OportunidadeVenda | Pipeline slug + estГЎgio slug |\n| `atribuir_responsavel` | Atribui vendedor | ResponsГЎvel (auto round-robin) |\n| `dar_pontos` | DГЎ pontos no Clube de BenefГӯcios | Pontos + motivo |\n| `webhook` | Chama webhook externo | URL, mГ©todo (GET/POST), headers |\n\nTodas as aГ§Гөes suportam variГЎveis de contexto: `{{lead_nome}}`, `{{lead_telefone}}`, `{{oportunidade_titulo}}`, etc.\n\n### Signals (`automacoes/signals.py`)\n\n| Signal | Modelo | Evento disparado | CondiГ§ГЈo |\n|--------|--------|-------------------|----------|\n| `on_lead_criado` | LeadProspecto (post_save, created) | `lead_criado` | Sempre |\n| `on_lead_qualificado` | LeadProspecto (post_save, not created) | `lead_qualificado` | score_qualificacao вүҘ 7 |\n| `on_oportunidade_movida` | OportunidadeVenda (post_save) | `oportunidade_movida` | Sempre |\n| `on_docs_validados` | ImagemLeadProspecto (post_save, status=validado) | `docs_validados` | TODOS os docs validados |\n| `on_indicacao_convertida` | Indicacao (post_save, status=convertido) | `indicacao_convertida` | Sempre |\n\n**Contexto disponГӯvel nos signals (variГЎveis que podem ser usadas nas condiГ§Гөes e templates):**\n\n| VariГЎvel | Tipo | DisponГӯvel em |\n|----------|------|---------------|\n| `lead` | Objeto LeadProspecto | Todos (exceto indicacao) |\n| `lead_nome` | String | Todos |\n| `lead_telefone` | String | lead_criado, lead_sem_contato |\n| `lead_email` | String | lead_criado |\n| `lead_origem` | String | lead_criado |\n| `lead_score` | Integer | lead_criado, lead_qualificado |\n| `lead_valor` | String | lead_criado |\n| `telefone` | String (alias) | Todos |\n| `nome` | String (alias) | Todos |\n| `estagio` | String (**slug** do estГЎgio) | oportunidade_movida |\n| `estagio_nome` | String (nome amigГЎvel) | oportunidade_movida |\n| `pipeline` | String (slug) | oportunidade_movida |\n| `pipeline_nome` | String (nome amigГЎvel) | oportunidade_movida |\n| `oportunidade` | Objeto | oportunidade_movida |\n| `oportunidade_titulo` | String | oportunidade_movida |\n| `responsavel` | String (nome completo) | oportunidade_movida |\n| `dias_sem_contato` | Integer | lead_sem_contato (cron) |\n| `indicacao` | Objeto | indicacao_convertida |\n| `nome_indicado` | String | indicacao_convertida |\n| `telefone_indicado` | String | indicacao_convertida |\n| `membro_indicador` | String | indicacao_convertida |\n| `segmento` | Objeto | lead_entrou_segmento |\n| `segmento_nome` | String | lead_entrou_segmento |\n\n**Campos disponГӯveis para condiГ§Гөes no editor visual:**\n\n| Campo | Chave no contexto | Quando usar |\n|-------|-------------------|-------------|\n| Origem | `lead.origem` | lead_criado |\n| Score | `lead.score_qualificacao` | lead_criado, lead_qualificado |\n| Cidade | `lead.cidade` | lead_criado |\n| Estado | `lead.estado` | lead_criado |\n| Valor | `lead.valor` | lead_criado |\n| Campanha | `lead.campanha` | lead_criado |\n| EstГЎgio | `estagio` | oportunidade_movida (slug: \"demo-agendada\") |\n| EstГЎgio (CRM) | `crm.estagio` | Alias, resolve para estagio |\n| Pipeline | `crm.pipeline` | oportunidade_movida |\n| ResponsГЎvel | `crm.responsavel` | oportunidade_movida |\n| Dias sem contato | `dias_sem_contato` | lead_sem_contato (cron) |\n| Dias como cliente | `cliente.dias_ativo` | cliente_aniversario |\n| Plano | `cliente.plano` | venda_aprovada |\n\n### Management Command\n\n**`executar_automacoes_cron`**\n\n```bash\npython manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings_local\npython manage.py executar_automacoes_cron --dry-run  # apenas simula\npython manage.py executar_automacoes_cron --tenant megalink  # tenant especГӯfico\n```\n\n**Executado a cada 5 minutos.** Responsabilidades:\n\n1. **Processar delays:** busca ExecucaoPendente com status=pendente e data_agendada вүӨ now, retoma execuГ§ГЈo\n2. **Lead sem contato:** busca leads sem HistoricoContato hГЎ X dias, dispara `lead_sem_contato`\n3. **Tarefa vencida:** busca TarefaCRM pendente/em_andamento com data_vencimento vencida, dispara `tarefa_vencida`\n4. **Disparo por segmento:** busca regras com segmento vinculado, aplica regras_filtro, dispara `disparo_segmento` para cada lead\n\n### APIs (11 endpoints)\n\n| Endpoint | MГ©todo | DescriГ§ГЈo |\n|----------|--------|-----------|\n| `/marketing/automacoes/` | GET | Lista de automaГ§Гөes |\n| `/marketing/automacoes/criar/` | GET/POST | Criar (nome/desc) вҶ’ redireciona para editor visual |\n| `/marketing/automacoes/dashboard/` | GET | Dashboard central com KPIs e grГЎfico 30 dias |\n| `/marketing/automacoes/<pk>/editar/` | GET/POST | Editar nome/descriГ§ГЈo |\n| `/marketing/automacoes/<pk>/fluxo/` | GET | Editor visual Drawflow |\n| `/marketing/automacoes/<pk>/salvar-fluxo/` | POST | Salvar fluxograma (nodos + conexГөes) |\n| `/marketing/automacoes/<pk>/toggle/` | POST | Ativar/desativar |\n| `/marketing/automacoes/<pk>/excluir/` | POST | Excluir |\n| `/marketing/automacoes/<pk>/historico/` | GET | HistГіrico de execuГ§Гөes |\n| `/marketing/automacoes/api/lead/<pk>/timeline/` | GET | Timeline de automaГ§Гөes do lead (JSON) |\n\n### Templates (5)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `lista.html` | Lista com filtros (ativas/pausadas), search, KPIs, cards por regra |\n| `criar.html` | FormulГЎrio simples (nome + descriГ§ГЈo) + aviso do editor visual |\n| `editor_fluxo.html` | Editor visual Drawflow. Sidebar com paleta de nГіs (11 gatilhos, 1 condiГ§ГЈo, 7 aГ§Гөes, 1 delay). Canvas drag & drop. Painel de configuraГ§ГЈo lateral. Salva via AJAX |\n| `dashboard.html` | Dashboard com Chart.js (execuГ§Гөes 30 dias), top regras, erros recentes, log completo |\n| `historico.html` | Tabela de execuГ§Гөes por regra (status, lead, resultado, timestamp) |\n\n### Editor Visual (Drawflow)\n\nO editor visual e o principal diferencial do modulo. Permite montar automacoes como fluxogramas, similar ao N8N/Zapier.\n\n**Tipos de no na paleta:**\n\n| Categoria | Nos disponiveis | Inputs/Outputs |\n|-----------|-----------------|----------------|\n| **Gatilhos** | 11 eventos (lead_criado, venda_aprovada, etc.) | 0 in / 1 out |\n| **Condicoes** | Verificar Campo (campo + operador + valor) | 1 in / 2 out (sim/nao) |\n| **Acoes** | WhatsApp, E-mail, Notificacao, Criar Tarefa, Mover Estagio, Atribuir Responsavel, Dar Pontos, Webhook | 1 in / 1 out |\n| **Controle** | Atraso (minutos/horas/dias) | 1 in / 1 out |\n\n**Painel de configuracao especifica por tipo (abre ao selecionar no):**\n\nGatilhos:\n- **Oportunidade movida:** Pipeline (select), estagio de (select filtrado), estagio para (select filtrado)\n- **Lead sem contato:** Dias sem contato (numero)\n- **Entrou em segmento:** Segmento (select com segmentos do CRM)\n- **Mensagem recebida:** Canal (select: WhatsApp/Email/Widget)\n- Outros gatilhos: informativo (disparam sempre)\n\nCondicoes:\n- **Campo:** select com optgroups (Lead: origem/score/cidade/estado/valor/status/email/cpf | CRM: estagio/pipeline/responsavel | Temporal: dias sem contato)\n- **Operador:** igual, diferente, contem, maior, menor, maior ou igual, menor ou igual\n- **Valor:** campo dinamico que muda conforme o campo selecionado:\n  - Origem вҶ’ select com origens (site, facebook, whatsapp...)\n  - Status вҶ’ select com status do lead\n  - Estagio вҶ’ select com estagios de todos os pipelines\n  - Pipeline вҶ’ select com pipelines\n  - Responsavel вҶ’ select com usuarios staff\n  - Estado вҶ’ select com UFs\n  - Demais вҶ’ input texto livre\n\nAcoes:\n- **Enviar WhatsApp:** Mensagem com variaveis {{lead_nome}}, {{lead_telefone}}...\n- **Enviar Email:** Assunto + corpo com variaveis\n- **Notificacao:** Titulo + mensagem\n- **Criar Tarefa:** Titulo, tipo (select: ligacao/followup/visita/whatsapp/email), prioridade (select: baixa/normal/alta/urgente)\n- **Mover Estagio:** Pipeline (select), estagio destino (select filtrado por pipeline)\n- **Atribuir Responsavel:** Modo (round-robin/fixo), responsavel (select com usuarios staff)\n- **Dar Pontos:** Quantidade + motivo\n- **Webhook:** URL, metodo (POST/GET), payload JSON\n\nControle:\n- **Atraso:** Tempo + unidade (minutos/horas/dias)\n\nTodos os nos: botao \"Remover no\"\n\n**Persistencia:** estado do Drawflow salvo como JSON em `regra.fluxo_json`. Nodos e conexoes persistidos como records no banco (NodoFluxo, ConexaoNodo) para o engine processar. Se `fluxo_json` estiver vazio mas existirem nodos no banco, o editor reconstroi o grafo automaticamente.\n\n### Testes E2E\n\nManagement command `testar_automacoes` valida todos os componentes end-to-end:\n\n```bash\npython manage.py testar_automacoes --settings=gerenciador_vendas.settings_local\n```\n\n18 testes cobrindo:\n- **T1:** Gatilho via signal real (cria lead вҶ’ dispara вҶ’ verifica notificacao no banco + lead no log)\n- **T2:** Condicao com branching (score > 5 вҶ’ branch TRUE executa, FALSE nao)\n- **T3:** Acao notificacao (verifica criacao no banco com variaveis substituidas)\n- **T4:** Acao criar tarefa (verifica no CRM: titulo, lead, responsavel)\n- **T5:** Delay + pendentes (cria pendente вҶ’ verifica que acao NAO executa вҶ’ simula tempo вҶ’ executa вҶ’ verifica resultado)\n- **T6:** Rate limit (2 permitidas, 3a bloqueada)\n- **T7:** Fluxo completo E2E (trigger вҶ’ condicao cidade=Recife вҶ’ TRUE cria tarefa вҶ’ FALSE nao executa)\n- **T8:** Substituicao de variaveis (simples e de objeto)\n\n### Admin\n\n**RegraAutomacaoAdmin:** list com nome/evento/ativa/execuГ§Гөes/taxa_sucesso. Inlines: CondicaoInline, AcaoInline (TabularInline).\n\n**LogExecucaoAdmin:** list com regra/aГ§ГЈo/status/data. Readonly fields. Filtros por status e regra.\n\n---\n\n## IntegraГ§Гөes entre SubmГіdulos\n\n```\nCampanhas в”Җв”ҖdetecГ§ГЈoв”Җв”Җв–¶ Leads (campanha_origem FK)\nCampanhas в”Җв”ҖN8N APIв”Җв”Җв–¶ N8N (mensagem recebida вҶ’ detecta campanha)\nSegmentos в”Җв”Җsignalв”Җв”Җв–¶ AutomaГ§Гөes (lead_entrou_segmento)\nSegmentos в”Җв”Җserviceв”Җв”Җв–¶ Leads (filtrar, avaliar, atualizar membros)\nAutomaГ§Гөes в”Җв”Җsignalв”Җв”Җв–¶ Leads (lead_criado, lead_qualificado)\nAutomaГ§Гөes в”Җв”Җsignalв”Җв”Җв–¶ CRM (oportunidade_movida, tarefa_vencida)\nAutomaГ§Гөes в”Җв”Җsignalв”Җв”Җв–¶ CS (indicacao_convertida)\nAutomaГ§Гөes в”Җв”ҖaГ§ГЈoв”Җв”Җв–¶ WhatsApp (via N8N webhook)\nAutomaГ§Гөes в”Җв”ҖaГ§ГЈoв”Җв”Җв–¶ CRM (criar_tarefa, mover_estagio)\nAutomaГ§Гөes в”Җв”ҖaГ§ГЈoв”Җв”Җв–¶ CS/Clube (dar_pontos)\nAutomaГ§Гөes в”Җв”Җcronв”Җв”Җв–¶ ExecucaoPendente (delays, temporal events)\nAutomaГ§Гөes в”Җв”Җtimelineв”Җв”Җв–¶ CRM/Lead (api_lead_timeline)\n```\n\n---\n\n## DependГӘncias externas\n\n| ServiГ§o | Uso | IntegraГ§ГЈo |\n|---------|-----|------------|\n| **N8N** | Envio de WhatsApp e e-mail, detecГ§ГЈo de campanha | Webhook POST |\n| **Drawflow.js** | Editor visual de fluxo | CDN v0.0.59 |\n| **Chart.js** | GrГЎfico de execuГ§Гөes no dashboard | CDN |\n\n---\n\n## EstatГӯsticas do MГіdulo\n\n| MГ©trica | Valor |\n|---------|-------|\n| **Sub-apps** | 3 (campanhas, automacoes, segmentos) |\n| **Models** | 11 (2 campanhas + 7 automaГ§Гөes + 2 segmentos) |\n| **Views** | 22 funГ§Гөes |\n| **Templates** | 9 |\n| **APIs** | 22 endpoints |\n| **Signals** | 6 |\n| **Testes** | 60+ (test_automacoes.py) |\n| **Linhas de cГіdigo** | ~4.500+ (models + views + engine + services) |\n"}, {"t": "f", "n": "09 Modulo Cs", "fn": "09-MODULO_CS.md", "c": "# MГіdulo Customer Success вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 04/04/2026\n**Status:** рҹ”§ Em desenvolvimento\n**LocalizaГ§ГЈo:** `apps/cs/`\n\n---\n\n## VisГЈo Geral\n\nO mГіdulo CS (Customer Success) cobre todo o ciclo de fidelizaГ§ГЈo do cliente: do primeiro contato pГіs-venda atГ© a prevenГ§ГЈo de churn. Гү composto por 6 sub-apps que se integram via services e a engine de gamificaГ§ГЈo. Migrado do projeto megaroleta para o hub em 29/03/2026.\n\n```\nCliente ativado no HubSoft\n    в”Ӯ\n    в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  CLUBE   в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ INDICAГҮГ•ES в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ  PARCEIROS   в”Ӯ\nв”Ӯ Roleta   в”Ӯ     в”Ӯ Programa   в”Ӯ     в”Ӯ  Cupons      в”Ӯ\nв”Ӯ MissГөes  в”Ӯ     в”Ӯ ConversГЈo  в”Ӯ     в”Ӯ  Resgates    в”Ӯ\nв”Ӯ XP/NГӯveisв”Ӯ     в”Ӯ PГЎgina pub.в”Ӯ     в”Ӯ  ValidaГ§ГЈo   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n     в”Ӯ\n     в”ңв”Җв”Җв–¶ CARTEIRINHA (ID digital com QR code)\n     в”ңв”Җв”Җв–¶ NPS (Pesquisa de satisfaГ§ГЈo) [stub]\n     в””в”Җв”Җв–¶ RETENГҮГғO (Score de saГәde, alertas churn) [stub]\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, PostgreSQL, N8N (OTP/WhatsApp), HubSoft API (consulta de clientes)\n\n---\n\n## 1. Clube (`apps/cs/clube/`)\n\n### O que faz\nMotor de gamificaГ§ГЈo do hub. Roleta digital com prГӘmios, sistema de pontos (saldo para giros + XP para nГӯveis), missГөes configurГЎveis, ranking de membros e landing page pГәblica. Cada provedor tem seu clube independente (multi-tenant).\n\n### Models (10)\n\n#### MembroClube\nTabela: `clube_membroclube` | Unique: (tenant, cpf)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **IdentificaГ§ГЈo** | nome (255), cpf (14, unique/tenant), email, telefone (20) |\n| **EndereГ§o** | cep, endereco, bairro, cidade, estado |\n| **GamificaГ§ГЈo** | saldo (Integer, pontos para giros), xp_total (Integer, determina nГӯvel) |\n| **ValidaГ§ГЈo** | validado (Boolean, OTP), codigo_indicacao (10, UUID auto, unique) |\n| **IntegraГ§ГЈo** | id_cliente_hubsoft (Integer) |\n| **Auditoria** | data_cadastro (auto) |\n\n**Propriedades:**\n- `nivel_atual` вҶ’ retorna NivelClube baseado no xp_total\n- `proximo_nivel` вҶ’ prГіximo nГӯvel a atingir\n\n#### NivelClube\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(50) | Ex: Bronze, Prata, Ouro, Diamante |\n| `xp_necessario` | Integer | XP mГӯnimo para atingir |\n| `ordem` | Integer | Ordem (1 = mais baixo) |\n\n#### RegraPontuacao\nTabela: auto | Unique: (tenant, gatilho)\n\nEngine de gamificaГ§ГЈo configurГЎvel. Define quando e quanto pontuar.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `gatilho` | CharField(50) | Identificador Гәnico (ex: cadastro, telefone_verificado, indicacao_convertida) |\n| `nome_exibicao` | CharField(100) | Nome amigГЎvel (ex: \"BГҙnus de Boas Vindas\") |\n| `pontos_saldo` | Integer | Pontos de giro concedidos |\n| `pontos_xp` | Integer | XP concedido |\n| `limite_por_membro` | Integer | Vezes que pode ganhar (0 = ilimitado) |\n| `ativo` | Boolean | Status |\n| `visivel_na_roleta` | Boolean | Mostra como missГЈo na ГЎrea do membro |\n\n**Gatilhos prГ©-definidos:** cadastro, telefone_verificado, indicacao_convertida, ajuste_manual_admin\n\n#### ExtratoPontuacao\nTabela: auto\n\nLedger de todas as movimentaГ§Гөes de pontos. ImutГЎvel (audit trail).\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Quem ganhou |\n| `regra` | FK RegraPontuacao | Qual regra ativou |\n| `pontos_saldo_ganhos` | Integer | Saldo creditado |\n| `pontos_xp_ganhos` | Integer | XP creditado |\n| `descricao_extra` | CharField(255) | Contexto (ex: \"Indicou CPF 123.456.789-00\") |\n| `data_recebimento` | DateTime (auto) | Timestamp |\n\n#### PremioRoleta\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do prГӘmio |\n| `quantidade` | Integer | Estoque |\n| `posicoes` | CharField(50) | PosiГ§Гөes vГЎlidas na roleta (ex: \"4,7\") |\n| `probabilidade` | Integer | Peso (1 = raro, 10 = comum) |\n| `mensagem_vitoria` | TextField | Mensagem exibida ao ganhar |\n| `cidades_permitidas` | M2M Cidade | RestriГ§ГЈo geogrГЎfica (null = todas) |\n\n#### RoletaConfig (Singleton)\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `custo_giro` | Integer | Custo em pontos de saldo |\n| `xp_por_giro` | Integer | XP ganho por giro |\n| `nome_clube` | CharField(100) | Nome do clube (default \"Clube MegaLink\") |\n| `limite_giros_por_membro` | Integer | MГЎx giros (0 = ilimitado) |\n| `periodo_limite` | CharField | total, diario, semanal, mensal |\n\n#### ParticipanteRoleta\nTabela: auto\n\nRegistro de cada giro na roleta.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `membro` | FK MembroClube (nullable) | Membro (se autenticado) |\n| `nome`, `cpf`, `telefone`, `email` | Dados diretos | Para nГЈo membros |\n| `endereco`, `bairro`, `cidade`, `estado`, `cep` | EndereГ§o | LocalizaГ§ГЈo |\n| `premio` | CharField(255) | PrГӘmio ganho |\n| `canal_origem` | CharField(100) | Canal (default \"Online\") |\n| `perfil_cliente` | CharField(10) | \"sim\" ou \"nao\" |\n| `saldo` | Integer | Saldo no momento do giro |\n| `status` | CharField(50) | reservado, ganhou, inviavel_tec, inviavel_cani |\n\n#### RouletteAsset\nTabela: auto\n\nElementos visuais da roleta (frames, fundo, logo, ponteiro). Tipo: frame, background, logo, pointer. Campo `ordem` (0-12 para frames).\n\n#### BannerClube\nTabela: auto\n\nBanners da landing page pГәblica. Campos: titulo, imagem, link, ordem, ativo.\n\n#### LandingConfig (Singleton)\nTabela: auto\n\nConfiguraГ§ГЈo da landing page pГәblica do clube.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `titulo` / `subtitulo` | CharField | Textos principais |\n| `whatsapp_numero` / `whatsapp_mensagem` | CharField | WhatsApp de suporte |\n| `texto_como_funciona` | TextField | SeГ§ГЈo \"Como funciona\" (markdown) |\n| `texto_rodape` | CharField | RodapГ© |\n| `cor_primaria` / `cor_secundaria` | CharField(7) | Cores hex |\n| `logo` | ImageField | Logo do clube |\n| `ativo` | Boolean | Status |\n\n#### Cidade\nTabela: auto | Unique: (tenant, nome)\n\nCidades disponГӯveis para restriГ§ГЈo geogrГЎfica de prГӘmios, cupons e parceiros.\n\n### Services (4)\n\n#### GamificationService (`services/gamification_service.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `atribuir_pontos(membro, gatilho, descricao_extra)` | Busca RegraPontuacao pelo gatilho, valida limite_por_membro, incrementa saldo e xp_total com `F()` (atГҙmico), cria ExtratoPontuacao. Retorna (sucesso, mensagem) |\n\n**Usado por:** automaГ§Гөes (aГ§ГЈo `dar_pontos`), signals de indicaГ§ГЈo, OTP validado, cadastro.\n\n#### OTPService (`services/otp_service.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `gerar_codigo()` | Gera cГіdigo aleatГіrio de 6 dГӯgitos |\n| `enviar_otp_whatsapp(cpf, telefone, codigo)` | Envia OTP via webhook N8N. Retorna (sucesso, mensagem) |\n\n#### SorteioService (`services/sorteio_service.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `executar_giro_roleta(membro, premios, custo_giro)` | Deduz saldo, sorteia prГӘmio com `random.choices()` (probabilidade ponderada), retorna (novo_saldo, premio, posicao) |\n\n#### HubsoftService (`services/hubsoft_service.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `consultar_cliente(cpf)` | Consulta cliente no HubSoft via webhook N8N. Retorna dict com dados + telefone mascarado |\n| `checar_pontos_extras_cpf(cpf)` | Consulta recorrГӘncia, pagamento adiantado e uso do app. Retorna dict com flags booleanas |\n\n### Views (35+ funГ§Гөes)\n\n#### ГҒrea pГәblica (sem login)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `landing_clube` | `/roleta/clube/` | Landing page pГәblica com parceiros, cupons, prГӘmios, nГӯveis |\n| `roleta_index` | `/roleta/` | Frontend da roleta (dados via API JSON) |\n| `roleta_logout` | `/roleta/logout/` | Limpa sessГЈo e redireciona |\n\n#### APIs (JSON)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `roleta_init_dados` | `/roleta/api/init-dados/` | Endpoint principal: retorna auth_membro, config, cidades, assets, premios, missoes, cupons, indicacao |\n| `cadastrar_participante` | `/roleta/cadastrar/` | Cadastro de membro + registro de participante |\n| `verificar_cliente` | `/roleta/verificar-cliente/` | Consulta CPF no HubSoft |\n| `solicitar_otp` | `/roleta/solicitar-otp/` | Envia cГіdigo OTP via WhatsApp |\n| `validar_otp` | `/roleta/validar-otp/` | Valida cГіdigo + atribui pontos de telefone_verificado |\n| `pre_cadastrar` | `/roleta/pre-cadastrar/` | PrГ©-cadastro para membros nГЈo validados |\n| `api_resgatar_cupom` | `/roleta/api/cupons/resgatar/` | Resgate de cupom (debita pontos/valida nГӯvel) |\n| `api_criar_indicacao` | `/roleta/api/indicacao/criar/` | Cria indicaГ§ГЈo |\n\n#### ГҒrea do membro (sessГЈo autenticada)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `membro_hub` | `/roleta/membro/` | Hub do membro (4 cards com contadores) |\n| `membro_jogar` | `/roleta/membro/jogar/` | PГЎgina da roleta |\n| `membro_missoes` | `/roleta/membro/missoes/` | Lista de missГөes com status |\n| `membro_cupons` | `/roleta/membro/cupons/` | Cupons disponГӯveis + histГіrico de resgates |\n| `membro_indicar` | `/roleta/membro/indicar/` | PГЎgina de indicaГ§ГЈo com cГіdigo |\n| `membro_perfil` | `/roleta/membro/perfil/` | EdiГ§ГЈo de perfil |\n| `membro_faq` | `/roleta/membro/faq/` | FAQs |\n\n#### Dashboard admin (@login_required)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `dashboard_home` | `/roleta/dashboard/` | KPIs, variaГ§ГЈo 7 dias, grГЎficos (pizza prГӘmios + linha 7 dias), ganhadores recentes |\n| `dashboard_premios` | `/roleta/dashboard/premios/` | CRUD de prГӘmios |\n| `dashboard_participantes` | `/roleta/dashboard/participantes/` | GestГЈo de membros (busca, filtro cidade, editar saldo) |\n| `dashboard_extrato_membro` | `/roleta/dashboard/participantes/<id>/extrato/` | Extrato de pontuaГ§ГЈo do membro |\n| `dashboard_giros` | `/roleta/dashboard/giros/` | HistГіrico de giros |\n| `dashboard_cidades` | `/roleta/dashboard/cidades/` | CRUD de cidades |\n| `dashboard_assets` | `/roleta/dashboard/assets/` | Upload de assets visuais da roleta |\n| `dashboard_config` | `/roleta/dashboard/config/` | Config da roleta (custo, XP, limites) |\n| `dashboard_gamificacao` | `/roleta/dashboard/gamificacao/` | CRUD de regras e nГӯveis |\n| `dashboard_landing_config` | `/roleta/dashboard/landing/` | Config da landing page |\n| `dashboard_banners` | `/roleta/dashboard/banners/` | CRUD de banners |\n| `dashboard_categorias` | `/roleta/dashboard/categorias/` | Categorias de parceiros |\n| `dashboard_relatorios` | `/roleta/dashboard/relatorios/` | RelatГіrios gerais |\n| `dashboard_relatorios_indicacoes` | `/roleta/dashboard/relatorios/indicacoes/` | RelatГіrios de indicaГ§Гөes |\n| `dashboard_relatorios_parceiros` | `/roleta/dashboard/relatorios/parceiros/` | RelatГіrios de parceiros |\n| `exportar_csv` | `/roleta/dashboard/exportar/` | ExportaГ§ГЈo CSV de membros/participantes |\n| `documentacao` | `/roleta/dashboard/docs/` | DocumentaГ§ГЈo da API |\n\n### Templates (20+)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `index_frontend.html` | Frontend da roleta (JS + animaГ§Гөes) |\n| `landing_clube.html` | Landing page pГәblica (parceiros, cupons, nГӯveis) |\n| `membro/hub.html` | Hub do membro |\n| `membro/jogar.html` | PГЎgina de jogo |\n| `membro/missoes.html` | Lista de missГөes |\n| `membro/cupons.html` | Cupons e resgates |\n| `membro/indicar.html` | IndicaГ§ГЈo com cГіdigo |\n| `membro/perfil.html` | Perfil do membro |\n| `membro/faq.html` | FAQs |\n| `dashboard/home.html` | Dashboard principal |\n| `dashboard/premios.html` | GestГЈo de prГӘmios |\n| `dashboard/participantes.html` | GestГЈo de membros |\n| `dashboard/extrato_membro.html` | Extrato individual |\n| `dashboard/giros.html` | HistГіrico de giros |\n| `dashboard/config.html` | ConfiguraГ§ГЈo da roleta |\n| `dashboard/gamificacao.html` | Regras e nГӯveis |\n| `dashboard/relatorios.html` | RelatГіrios |\n| `dashboard/relatorios_indicacoes.html` | RelatГіrios de indicaГ§Гөes |\n| `dashboard/relatorios_parceiros.html` | RelatГіrios de parceiros |\n\n### Management Commands\n\n| Command | DescriГ§ГЈo |\n|---------|-----------|\n| `gerar_faq` | Gera/atualiza FAQs via IA. Flags: --force, --categoria, --dry-run |\n| `testar_pontuacoes` | Testa scoring com dados reais do HubSoft. Flags: --qtd, --cpf, --buscar-adiantado |\n\n### Admin\n\n**MembroClubeAdmin:** list com nome/cpf/telefone/validado/saldo/nivel_atual. Filtro por validado. Inline ExtratoPontuacao.\n\n**PremioRoletaAdmin:** list com nome/quantidade/probabilidade. Filter horizontal cidades_permitidas. Editable quantidade.\n\n**RegraPontuacaoAdmin:** list com nome_exibicao/gatilho/pontos/ativo/visivel. Editable fields.\n\n---\n\n## 2. Parceiros (`apps/cs/parceiros/`)\n\n### O que faz\nGerencia rede de parceiros comerciais com descontos exclusivos para membros do clube. Parceiros cadastram cupons que podem ser gratuitos, custar pontos ou exigir nГӯvel mГӯnimo. Inclui fluxo completo de aprovaГ§ГЈo, resgate e validaГ§ГЈo no ponto de venda.\n\n### Models (4)\n\n#### CategoriaParceiro\nTabela: auto | Unique: (tenant, slug)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome da categoria |\n| `slug` | SlugField | Slug Гәnico/tenant |\n| `icone` | CharField(50) | Classe FontAwesome (default \"fas fa-tag\") |\n| `ordem` | Integer | Ordem de exibiГ§ГЈo |\n| `ativo` | Boolean | Status |\n\n#### Parceiro\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do parceiro |\n| `logo` | ImageField | Logo (tenant_upload_path) |\n| `descricao` | TextField | DescriГ§ГЈo |\n| `contato_nome` / `contato_telefone` / `contato_email` | Char/Email | Dados de contato |\n| `usuario` | OneToOne User | Acesso ao painel de parceiro |\n| `categoria` | FK CategoriaParceiro | Categoria |\n| `cidades` | M2M Cidade | Cobertura geogrГЎfica |\n| `ativo` | Boolean | Status |\n\n#### CupomDesconto\nTabela: auto | Unique: (tenant, codigo)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **IdentificaГ§ГЈo** | titulo (255), descricao, imagem, codigo (50, unique/tenant) |\n| **Desconto** | tipo_desconto (percentual/fixo), valor_desconto (Decimal 10,2) |\n| **Modalidade** | modalidade: gratuito (livre), pontos (custo em saldo), nivel (exige NivelClube mГӯnimo) |\n| **Custo** | custo_pontos (Integer, quando modalidade=pontos), nivel_minimo (FK NivelClube, quando modalidade=nivel) |\n| **Estoque** | quantidade_total (0 = ilimitado), quantidade_resgatada (auto), limite_por_membro (default 1) |\n| **PerГӯodo** | data_inicio, data_fim (DateTime) |\n| **RestriГ§ГЈo** | cidades_permitidas (M2M Cidade), parceiro (FK Parceiro) |\n| **AprovaГ§ГЈo** | status_aprovacao (aprovado/pendente/rejeitado), motivo_rejeicao |\n| **Status** | ativo |\n\n**Propriedades:** `estoque_disponivel` (bool), `estoque_restante` (int ou \"Ilimitado\")\n\n#### ResgateCupom\nTabela: auto | Unique: (tenant, codigo_unico)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Quem resgatou |\n| `cupom` | FK CupomDesconto | Cupom resgatado |\n| `codigo_unico` | CharField(20) | UUID gerado (para validaГ§ГЈo) |\n| `pontos_gastos` | Integer | Pontos debitados |\n| `status` | CharField | resgatado, utilizado, expirado, cancelado |\n| `valor_compra` | Decimal(10,2) | Valor da compra (preenchido na validaГ§ГЈo) |\n| `data_resgate` | DateTime (auto) | Quando resgatou |\n| `data_utilizacao` | DateTime | Quando utilizou no parceiro |\n\n### Services\n\n#### CupomService (`services/services.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `resgatar_cupom(membro, cupom_id)` | ValidaГ§Гөes: ativo, perГӯodo, estoque, limite/membro, cidade, pontos/nГӯvel. Debita saldo (se pontos). Cria ResgateCupom com codigo_unico UUID. Retorna (sucesso, mensagem, resgate) |\n| `cupons_disponiveis(membro)` | Filtra cupons ativos, aprovados, em perГӯodo, com estoque, por cidade. Retorna queryset |\n\n### Views (6)\n\n#### Dashboard admin\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `dashboard_parceiros_home` | `/roleta/dashboard/parceiros/` | KPIs (total, cupons, resgates, utilizados), variaГ§ГЈo 7 dias, grГЎfico evoluГ§ГЈo, top cupons |\n| `dashboard_parceiros` | `/roleta/dashboard/parceiros/lista/` | CRUD de parceiros com busca |\n| `dashboard_cupons` | `/roleta/dashboard/cupons/` | CRUD de cupons com filtros (parceiro, modalidade, aprovaГ§ГЈo). AГ§Гөes: aprovar/rejeitar |\n| `dashboard_cupom_detalhe` | `/roleta/dashboard/cupons/<id>/` | Detalhe do cupom com KPIs e lista de resgates |\n| `dashboard_cupons_resgates` | `/roleta/dashboard/cupons/resgates/` | HistГіrico de resgates com filtros (busca, status) |\n\n#### PГЎgina pГәblica\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `validar_cupom` | `/roleta/cupom/validar/` | ValidaГ§ГЈo no ponto de venda. Busca por codigo_unico, confirma uso, registra valor_compra |\n\n### Templates (5+)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `dashboard/home.html` | Dashboard de parceiros com KPIs e grГЎficos |\n| `dashboard/parceiros.html` | CRUD de parceiros |\n| `dashboard/cupons.html` | GestГЈo de cupons |\n| `dashboard/cupom_detalhe.html` | Detalhe + resgates |\n| `dashboard/cupons_resgates.html` | HistГіrico de resgates |\n| `validar_cupom.html` | PГЎgina pГәblica de validaГ§ГЈo |\n\n### Admin\n\n**ParceiroAdmin:** list com nome/ativo/data_cadastro. Filtro por ativo.\n\n**CupomDescontoAdmin:** list com titulo/parceiro/modalidade/tipo/valor/ativo. Filtros por ativo/modalidade/parceiro.\n\n**ResgateCupomAdmin:** list com membro/cupom/codigo_unico/status. Filtro por status.\n\n---\n\n## 3. IndicaГ§Гөes (`apps/cs/indicacoes/`)\n\n### O que faz\nPrograma de indicaГ§ГЈo member-get-member. Cada membro do clube recebe um cГіdigo Гәnico de indicaГ§ГЈo e uma pГЎgina pГәblica personalizada. Quando a indicaГ§ГЈo Г© convertida (contato feito, virou cliente), o indicador ganha pontos automaticamente via GamificationService.\n\n### Models (2)\n\n#### IndicacaoConfig (Singleton)\nTabela: auto\n\nConfiguraГ§ГЈo visual da pГЎgina pГәblica de indicaГ§ГЈo.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `titulo` / `subtitulo` | CharField | Textos (default \"Megalink\", \"Clube de Fidelidade\") |\n| `texto_indicador` | CharField | \"VocГӘ foi indicado por\" |\n| `texto_botao` | CharField | \"Enviar IndicaГ§ГЈo\" |\n| `texto_sucesso_titulo` / `texto_sucesso_msg` | Char/Text | Mensagem de sucesso |\n| `logo` / `imagem_fundo` | ImageField | Visuais |\n| `cor_fundo` / `cor_botao` | CharField(7) | Cores hex |\n| `mostrar_campo_cpf` / `mostrar_campo_cidade` | Boolean | Campos opcionais |\n\n#### Indicacao\nTabela: auto | Unique: (membro_indicador, telefone_indicado)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `membro_indicador` | FK MembroClube | Quem indicou |\n| `nome_indicado` | CharField(255) | Nome do indicado |\n| `telefone_indicado` | CharField(20) | Telefone |\n| `cpf_indicado` | CharField(14) | CPF (opcional) |\n| `cidade_indicado` | CharField(100) | Cidade (opcional) |\n| `status` | CharField | pendente, contato_feito, convertido, cancelado |\n| `membro_indicado` | FK MembroClube (nullable) | Membro criado (quando converteu) |\n| `pontos_creditados` | Boolean | Se os pontos jГЎ foram dados |\n| `data_indicacao` | DateTime (auto) | Quando indicou |\n| `data_conversao` | DateTime | Quando converteu |\n| `observacoes` | TextField | ObservaГ§Гөes |\n\n### Services\n\n#### IndicacaoService (`services/services.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `criar_indicacao(membro_indicador, nome, telefone, cpf, cidade)` | Valida: sem auto-indicaГ§ГЈo, sem duplicata (indicador + telefone). Cria Indicacao. Retorna (sucesso, msg, indicaГ§ГЈo) |\n| `confirmar_conversao(indicacao_id)` | Marca status=convertido, data_conversao=now(). Chama GamificationService.atribuir_pontos(gatilho='indicacao_convertida'). Marca pontos_creditados=True. @transaction.atomic |\n\n### Views (5)\n\n| View | Rota | Auth | DescriГ§ГЈo |\n|------|------|------|-----------|\n| `dashboard_indicacoes_home` | `/roleta/dashboard/indicacoes/` | @login_required | KPIs (total, pendentes, convertidos, taxa), variaГ§ГЈo 7 dias, top 5 embaixadores |\n| `dashboard_indicacoes` | `/roleta/dashboard/indicacoes/lista/` | @login_required | Lista com filtros (busca, status), aГ§Гөes (alterar_status, adicionar_obs) |\n| `dashboard_indicacoes_membros` | `/roleta/dashboard/indicacoes/membros/` | @login_required | Membros com contagem de indicaГ§Гөes, auto-gera cГіdigo |\n| `dashboard_indicacoes_visual` | `/roleta/dashboard/indicacoes/visual/` | @login_required | Config visual da pГЎgina pГәblica |\n| `pagina_indicacao` | `/roleta/indicar/<codigo>/` | PГәblico | PГЎgina pГәblica de indicaГ§ГЈo. Busca membro pelo cГіdigo, form de indicaГ§ГЈo |\n\n### Templates (5+)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `dashboard/home.html` | Dashboard com KPIs, grГЎfico 7 dias, top embaixadores |\n| `dashboard/indicacoes.html` | Lista de indicaГ§Гөes com filtros |\n| `dashboard/membros.html` | Membros embaixadores |\n| `dashboard/visual.html` | Config visual |\n| `pagina_indicacao.html` | PГЎgina pГәblica personalizada |\n\n### Admin\n\n**IndicacaoAdmin:** list com indicador/nome_indicado/telefone/status/pontos_creditados/data. Filtros por status/pontos_creditados.\n\n---\n\n## 4. Carteirinha (`apps/cs/carteirinha/`)\n\n### O que faz\nSistema de carteirinha digital para membros do clube. Modelos visuais configurГЎveis (cores, logo, background), regras de atribuiГ§ГЈo automГЎtica (por nГӯvel, XP, cidade ou todos), QR code de validaГ§ГЈo e foto do membro.\n\n### Models (3)\n\n#### ModeloCarteirinha\nTabela: auto\n\nTemplate visual da carteirinha.\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **IdentificaГ§ГЈo** | nome (100), descricao |\n| **Fundo** | tipo_fundo (cor/imagem), cor_fundo_primaria, cor_fundo_secundaria, imagem_fundo |\n| **Textos** | cor_texto, cor_texto_secundario, cor_destaque, texto_marca (\"Clube Megalink\"), texto_rodape |\n| **Logo** | logo (ImageField) |\n| **Visibilidade** | mostrar_nome, mostrar_cpf, mostrar_nivel, mostrar_data_emissao, mostrar_data_validade, mostrar_qr_code, mostrar_foto, mostrar_pontos, mostrar_cidade |\n| **Status** | ativo, data_criacao |\n\n#### RegraAtribuicao\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `modelo` | FK ModeloCarteirinha | Modelo a atribuir |\n| `tipo` | CharField | nivel, pontuacao_minima, cidade, todos, manual |\n| `nivel` | FK NivelClube | Quando tipo=nivel |\n| `pontuacao_minima` | Integer | Quando tipo=pontuacao_minima (XP mГӯnimo) |\n| `cidade` | CharField(100) | Quando tipo=cidade |\n| `prioridade` | Integer | Maior vence em conflito |\n| `ativo` | Boolean | Status |\n\n#### CarteirinhaMembro\nTabela: auto\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Dono |\n| `modelo` | FK ModeloCarteirinha | Template visual |\n| `foto` | ImageField | Foto do membro |\n| `data_emissao` | DateTime (auto) | Quando emitiu |\n| `data_validade` | DateField | Validade |\n| `ativo` | Boolean | Status |\n\n### Services\n\n#### CarteirinhaService (`services/services.py`)\n\n| MГ©todo | O que faz |\n|--------|-----------|\n| `obter_modelo_para_membro(membro)` | Avalia regras (por prioridade desc): todos вҶ’ nГӯvel вҶ’ pontuacao_minima вҶ’ cidade. Fallback: primeiro modelo ativo |\n| `obter_carteirinha_membro(membro)` | Retorna CarteirinhaMembro existente ou cria automaticamente via regras. Usa update_or_create() |\n\n### Views (7)\n\n| View | Rota | Auth | DescriГ§ГЈo |\n|------|------|------|-----------|\n| `dashboard_carteirinha` | `/roleta/dashboard/carteirinha/` | @login_required | Home: modelos, regras, total emitidas |\n| `dashboard_modelos` | `/roleta/dashboard/carteirinha/modelos/` | @login_required | CRUD de modelos |\n| `dashboard_modelo_criar` | `/roleta/dashboard/carteirinha/modelos/criar/` | @login_required | CriaГ§ГЈo com preview |\n| `dashboard_modelo_editar` | `/roleta/dashboard/carteirinha/modelos/<id>/editar/` | @login_required | EdiГ§ГЈo com preview |\n| `dashboard_regras` | `/roleta/dashboard/carteirinha/regras/` | @login_required | CRUD de regras de atribuiГ§ГЈo |\n| `dashboard_preview` | `/roleta/dashboard/carteirinha/preview/<id>/` | @login_required | Preview com dados fake |\n| `membro_carteirinha` | `/roleta/membro/carteirinha/` | SessГЈo membro | Carteirinha do membro (auto-criada) |\n\n### Admin\n\n**ModeloCarteirinhaAdmin:** list com nome/ativo/data_criacao.\n\n**RegraAtribuicaoAdmin:** list com modelo/tipo/prioridade/ativo.\n\n**CarteirinhaMembroAdmin:** list com membro/modelo/data_emissao/ativo.\n\n---\n\n## 5. NPS (`apps/cs/nps/`) [stub]\n\n### O que faz\nPesquisa de satisfaГ§ГЈo Net Promoter Score. Estrutura de models criada, views e URLs pendentes.\n\n### Models (2)\n\n#### ConfiguracaoNPS (Singleton)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `periodicidade_dias` | Integer(90) | Intervalo entre pesquisas |\n| `canal_envio` | CharField | whatsapp, email, ambos |\n| `mensagem_template` | TextField | Template da mensagem |\n| `ativo` | Boolean | Status |\n\n#### PesquisaNPS\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `membro` | FK MembroClube | Membro (se aplicГЎvel) |\n| `nota` | Integer(0-10) | Nota NPS |\n| `comentario` | TextField | ComentГЎrio livre |\n| `categoria` | CharField | promotor (9-10), neutro (7-8), detrator (0-6) вҖ” auto-calculada |\n| `canal_resposta` | CharField | whatsapp (default) |\n| `data_envio` / `data_resposta` | DateTime | Timestamps |\n| `respondida` | Boolean | Se respondeu |\n\n### Status\nModels registrados no admin. Views e URLs vazios (TODO).\n\n---\n\n## 6. RetenГ§ГЈo (`apps/cs/retencao/`) [stub]\n\n### O que faz\nPrevenГ§ГЈo de churn com score de saГәde do cliente e alertas automГЎticos. Estrutura de models criada, views e URLs pendentes.\n\n**Nota:** O CRM jГЎ possui AlertaRetencao e scanner de contratos HubSoft (`apps/comercial/crm/`). Este mГіdulo complementarГЎ com score de saГәde e aГ§Гөes de retenГ§ГЈo dedicadas.\n\n### Models (3)\n\n#### ScoreCliente\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `score` | Integer(0-100, default 50) | Score de saГәde |\n| `fatores` | JSONField | Fatores que compГөem o score |\n| `ultima_atualizacao` | DateTime (auto) | Гҡltimo cГЎlculo |\n\n#### AlertaChurn\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `tipo` | CharField | inadimplencia, sem_uso, reclamacao, contrato_expirando |\n| `severidade` | CharField | baixa, media, alta, critica |\n| `descricao` | TextField | Detalhes |\n| `resolvido` | Boolean | Status |\n| `data_criacao` / `data_resolucao` | DateTime | Timestamps |\n\n#### AcaoRetencao\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `alerta` | FK AlertaChurn | Alerta relacionado |\n| `tipo_acao` | CharField | contato_whatsapp, oferta_desconto, upgrade_plano, visita_tecnica |\n| `descricao` | TextField | Detalhes |\n| `responsavel` | FK User | Quem executa |\n| `executada` | Boolean | Status |\n| `data_criacao` / `data_execucao` | DateTime | Timestamps |\n\n### Status\nModels registrados no admin com config bГЎsica. Views e URLs vazios (TODO).\n\n---\n\n## Sidebar do Painel\n\nO mГіdulo CS organiza o menu lateral em 3 seГ§Гөes:\n\n```\nCUSTOMER SUCCESS\nв”ңв”Җв”Җ Dashboard          вҶ’ clube:dashboard_home\nв””в”Җв”Җ Clientes           вҶ’ clube:dashboard_participantes\n\nFIDELIZAГҮГғO\nв”ңв”Җв”Җ IndicaГ§Гөes         вҶ’ indicacoes:dashboard_indicacoes_home\nв”ңв”Җв”Җ Parceiros          вҶ’ parceiros:dashboard_parceiros_home\nв”ңв”Җв”Җ Cupons             вҶ’ parceiros:dashboard_cupons\nв””в”Җв”Җ Roleta             вҶ’ clube:dashboard_premios\n\nCONFIGURAГҮГ•ES\nв”ңв”Җв”Җ Banners            вҶ’ clube:dashboard_banners\nв”ңв”Җв”Җ Carteirinhas       вҶ’ carteirinha:dashboard_carteirinha\nв””в”Җв”Җ NГӯveis e XP        вҶ’ clube:dashboard_gamificacao\n```\n\n---\n\n## IntegraГ§Гөes entre SubmГіdulos\n\n```\nClube в”Җв”ҖGamificationServiceв”Җв”Җв–¶ IndicaГ§Гөes (pontos ao converter)\nClube в”Җв”ҖGamificationServiceв”Җв”Җв–¶ AutomaГ§Гөes (aГ§ГЈo dar_pontos)\nClube в”Җв”ҖMembroClubeв”Җв”Җв–¶ Parceiros (cupons exigem membro)\nClube в”Җв”ҖNivelClubeв”Җв”Җв–¶ Parceiros (cupons por nГӯvel)\nClube в”Җв”ҖCidadeв”Җв”Җв–¶ Parceiros + PrГӘmios (restriГ§ГЈo geogrГЎfica)\nIndicaГ§Гөes в”Җв”ҖIndicacaoServiceв”Җв”Җв–¶ Clube (confirmar_conversao вҶ’ atribuir_pontos)\nParceiros в”Җв”ҖCupomServiceв”Җв”Җв–¶ Clube (debita saldo, valida nГӯvel)\nCarteirinha в”Җв”ҖCarteirinhaServiceв”Җв”Җв–¶ Clube (NivelClube, XP para regras)\n```\n\n---\n\n## IntegraГ§Гөes Externas\n\n| ServiГ§o | Uso | IntegraГ§ГЈo |\n|---------|-----|------------|\n| **N8N** | OTP via WhatsApp, consulta HubSoft | Webhook POST |\n| **HubSoft** | Consulta de clientes por CPF, verificaГ§ГЈo de recorrГӘncia/adiantamento/app | Webhook N8N ou conexГЈo PostgreSQL direta |\n\n---\n\n## EstatГӯsticas do MГіdulo\n\n| MГ©trica | Valor |\n|---------|-------|\n| **Sub-apps** | 6 (clube, parceiros, indicacoes, carteirinha, nps, retencao) |\n| **Models** | 24 (10 clube + 4 parceiros + 2 indicaГ§Гөes + 3 carteirinha + 2 NPS + 3 retenГ§ГЈo) |\n| **Views** | 55+ funГ§Гөes |\n| **Templates** | 30+ |\n| **APIs** | 40+ endpoints |\n| **Services** | 6 (Gamification, OTP, Sorteio, Hubsoft, Cupom, IndicaГ§ГЈo, Carteirinha) |\n| **Management Commands** | 2 (gerar_faq, testar_pontuacoes) |\n| **Linhas de cГіdigo** | ~6.000+ (models + views + services) |\n"}, {"t": "f", "n": "10 Integracoes", "fn": "10-INTEGRACOES.md", "c": "# Mapa de IntegraГ§Гөes вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 05/04/2026\n**ResponsГЎvel:** Tech Lead / CTO\n\n---\n\n## VisГЈo Geral\n\nO Aurora precisa de duas integraГ§Гөes externas para funcionar: uma com o **ERP do provedor** (gestГЈo de clientes, planos, contratos) e outra com a **plataforma de atendimento** (WhatsApp, chat). Hoje o sistema roda com HubSoft + Matrix, mas a arquitetura deve suportar outros ERPs e plataformas.\n\nEste documento mapeia **o que** precisa ser integrado, independente da ferramenta.\n\n---\n\n## 1. IntegraГ§ГЈo com ERP\n\nO ERP Г© a fonte da verdade sobre clientes, planos, contratos e financeiro do provedor.\n\n### 1.1 O que o Aurora consome do ERP\n\n| # | Dado | Onde Г© usado | Criticidade | FrequГӘncia |\n|---|------|-------------|-------------|------------|\n| 1 | **Consultar cliente por CPF** | VerificaГ§ГЈo de membro no Clube (CS), cadastro de lead | Alta | A cada cadastro/verificaГ§ГЈo |\n| 2 | **Dados do cliente** (nome, e-mail, telefone, endereГ§o) | Preencher MembroClube, vincular lead | Alta | A cada consulta |\n| 3 | **ID do cliente no ERP** | FK para rastreabilidade (id_cliente_hubsoft, id_prospecto_hubsoft) | Alta | Uma vez por cliente |\n| 4 | **Planos disponГӯveis** (nome, velocidade, preГ§o) | PГЎgina de cadastro pГәblico, seleГ§ГЈo de plano | MГ©dia | Seed inicial ou sync periГіdico |\n| 5 | **Status do contrato** (ativo, suspenso, cancelado, dias restantes) | Alertas de retenГ§ГЈo, score de churn | MГ©dia | Scanner periГіdico (cron) |\n| 6 | **SituaГ§ГЈo financeira** (inadimplГӘncia, pagamento adiantado, recorrГӘncia) | PontuaГ§ГЈo extra no Clube, alertas de churn | Baixa | A cada validaГ§ГЈo OTP |\n| 7 | **Uso do app do provedor** | PontuaГ§ГЈo extra no Clube | Baixa | A cada validaГ§ГЈo OTP |\n| 8 | **Clientes por cidade** | RelatГіrios, distribuiГ§ГЈo de prГӘmios por regiГЈo | Baixa | Cache 1h |\n\n### 1.2 O que o Aurora envia para o ERP\n\n| # | Dado | Quando | Criticidade |\n|---|------|--------|-------------|\n| 1 | **Novo prospecto/lead** | Lead qualificado pelo bot ou cadastro pГәblico | Alta |\n| 2 | **Documentos do lead** (selfie, RG frente/verso) | Upload durante cadastro | Alta |\n| 3 | **Contrato aceito** (IP, timestamp, dados) | Aceite no cadastro pГәblico | Alta |\n| 4 | **Status do processamento** (aprovado/rejeitado) | Webhook de confirmaГ§ГЈo | MГ©dia |\n\n### 1.3 Como cada integraГ§ГЈo funciona hoje (HubSoft)\n\n#### Via API REST OAuth2 (`apps/integracoes/services/hubsoft.py`)\n\n| # | OperaГ§ГЈo | Endpoint HubSoft | MГ©todo | Arquivo |\n|---|----------|------------------|--------|---------|\n| 1 | **Obter token OAuth** | `/oauth/token` | POST | `hubsoft.py:42` |\n| 2 | **Cadastrar prospecto** (lead вҶ’ ERP) | `/api/v1/integracao/prospecto` | POST | `hubsoft.py:115` |\n| 3 | **Consultar cliente** por CPF/CNPJ | `/api/v1/integracao/cliente` | GET | `hubsoft.py:184` |\n| 4 | **Sincronizar cliente** (cria/atualiza ClienteHubsoft local) | `/api/v1/integracao/cliente` | GET | `hubsoft.py:251` |\n| 5 | **Sincronizar serviГ§os** (planos ativos do cliente) | Dentro da resposta do cliente | вҖ” | `hubsoft.py:378` |\n\nCredenciais armazenadas em `IntegracaoAPI` (campos sensГӯveis criptografados). Token OAuth cacheado com expiraГ§ГЈo. Todas as chamadas logadas em `LogIntegracao` com tempo de resposta.\n\n#### Via Webhook N8N (`apps/cs/clube/services/hubsoft_service.py`)\n\n| # | OperaГ§ГЈo | Webhook N8N | MГ©todo | Arquivo |\n|---|----------|-------------|--------|---------|\n| 6 | **Consultar cliente** (Clube CS) | `/webhook/roletaconsultarcliente` | POST | `hubsoft_service.py:28` |\n\nO N8N recebe o CPF e faz a consulta no HubSoft, retornando os dados. Usado na verificaГ§ГЈo de membro do Clube.\n\n#### Via conexГЈo direta ao banco PostgreSQL (`apps/cs/clube/services/hubsoft_service.py`)\n\n| # | OperaГ§ГЈo | Query SQL | Arquivo |\n|---|----------|-----------|---------|\n| 7 | **Checar pontos extras** (recorrГӘncia, adiantamento, app) | SELECT em cliente, cobranca, cliente_cartao, cliente_acesso_central | `hubsoft_service.py:60` |\n| 8 | **Consultar cidade** do cliente (endereГ§o de instalaГ§ГЈo) | SELECT em cliente_servico_endereco + cidade | `hubsoft_service.py:139` |\n| 9 | **Clientes por cidade** (relatГіrios) | SELECT COUNT GROUP BY cidade | `hubsoft_service.py:189` |\n\nConexГЈo psycopg2 direta, read-only (`mega_leitura`). Env vars: `HUBSOFT_DB_USER`, `HUBSPOT_DB_PASSWORD`, `HUBSOFT_DB_HOST`, `HUBSOFT_DB_PORT`, `HUBSOFT_DB_NAME`.\n\n#### Via serviГ§o de contrato (`apps/comercial/cadastro/services/contrato_service.py`)\n\n| # | OperaГ§ГЈo | Endpoint HubSoft | MГ©todo | Arquivo |\n|---|----------|------------------|--------|---------|\n| 10 | **Buscar contrato** do cliente | API HubSoft | GET | `contrato_service.py:40` |\n| 11 | **Criar contrato** | API HubSoft | POST | `contrato_service.py:164` |\n| 12 | **Atualizar contrato** | API HubSoft | PUT | `contrato_service.py:256` |\n| 13 | **Download contrato PDF** | API HubSoft | GET | `contrato_service.py:314` |\n\n**Resumo: 13 pontos de integraГ§ГЈo com o ERP.**\n\n| MГ©todo | Quantidade | Pontos |\n|--------|-----------|--------|\n| API REST OAuth2 | 8 | #1-5, #10-13 |\n| Webhook N8N | 1 | #6 |\n| Banco direto (psycopg2) | 3 | #7, #8, #9 |\n| **Total** | **13** | |\n\n**RecomendaГ§ГЈo:** migrar os 3 acessos diretos ao banco (#7, #8, #9) para API REST. A conexГЈo direta depende de IP, schema e credenciais de banco, e nГЈo funciona com outros ERPs.\n\n### 1.4 Dados mГӯnimos que o ERP precisa expor\n\nPara integrar qualquer ERP, precisamos de no mГӯnimo:\n\n```\nGET  /clientes?cpf={cpf}          вҶ’ {id, nome, email, telefone, endereco, cidade, status}\nGET  /clientes/{id}/contratos     вҶ’ [{id, plano, status, data_inicio, data_fim, valor}]\nGET  /clientes/{id}/financeiro    вҶ’ {inadimplente, recorrencia, adiantado}\nGET  /planos                      вҶ’ [{id, nome, velocidade_down, velocidade_up, valor}]\nPOST /prospectos                  вҶ’ Criar prospecto com dados do lead\nPOST /prospectos/{id}/documentos  вҶ’ Enviar documentos\n```\n\n### 1.5 Credenciais necessГЎrias\n\n| Item | DescriГ§ГЈo |\n|------|-----------|\n| URL base da API | Ex: https://api.erp.com.br/v1 |\n| MГ©todo de autenticaГ§ГЈo | OAuth2 (client_credentials ou password), API Key, ou Bearer Token |\n| Client ID / Secret | Se OAuth |\n| Username / Password | Se auth por usuГЎrio |\n| IDs de mapeamento | id_origem (de onde vem o lead), id_vendedor_padrao, id_servico |\n\n---\n\n## 2. IntegraГ§ГЈo com Plataforma de Atendimento\n\nA plataforma de atendimento Г© o canal de comunicaГ§ГЈo com o cliente (WhatsApp, chat web, SMS).\n\n### 2.1 O que o Aurora consome da plataforma\n\n| # | Dado | Onde Г© usado | Criticidade |\n|---|------|-------------|-------------|\n| 1 | **Mensagens recebidas** (texto, remetente, timestamp) | Inbox, detecГ§ГЈo de campanha, bot de atendimento | Alta |\n| 2 | **Status de entrega/leitura** | Indicadores no chat (вң“, вң“вң“, azul) | Baixa |\n| 3 | **HistГіrico de conversa** | Ficha do lead, CRM, PDF da conversa | MГ©dia |\n\n### 2.2 O que o Aurora envia para a plataforma\n\n| # | Dado | Quando | Criticidade |\n|---|------|--------|-------------|\n| 1 | **Mensagens do agente** | Resposta no Inbox | Alta |\n| 2 | **Mensagens automГЎticas** (automaГ§Гөes: boas-vindas, follow-up) | Engine de automaГ§Гөes dispara | Alta |\n| 3 | **OTP de verificaГ§ГЈo** | Cadastro no Clube (CS) | Alta |\n| 4 | **NotificaГ§Гөes** (tarefa vencida, nova oportunidade) | AutomaГ§Гөes + webhooks CRM | MГ©dia |\n\n### 2.3 Como cada integraГ§ГЈo funciona hoje\n\n#### Plataforma de atendimento (Matrix)\n\n| # | OperaГ§ГЈo | DireГ§ГЈo | MГ©todo | Arquivo |\n|---|----------|---------|--------|---------|\n| 1 | **Buscar histГіrico de conversa** por cГіdigo | Aurora вҶ’ Matrix | GET `/rest/v1/atendimento` | `atendimento_service.py:48` |\n| 2 | **Enviar mensagem do agente** (Inbox) | Aurora вҶ’ Plataforma | POST webhook configurado por canal | `inbox/services.py:303` |\n| 3 | **Receber mensagem do cliente** | Plataforma вҶ’ Aurora | POST `/inbox/api/n8n/mensagem-recebida/` | `inbox/views_n8n.py` |\n| 4 | **Status de entrega/leitura** | Plataforma вҶ’ Aurora | POST `/inbox/api/n8n/status-mensagem/` | `inbox/views_n8n.py` |\n\nCredenciais: `MATRIX_API_URL`, `MATRIX_API_TOKEN` (env vars).\n\n#### N8N (orquestrador de webhooks)\n\n| # | OperaГ§ГЈo | DireГ§ГЈo | Webhook | Arquivo |\n|---|----------|---------|---------|---------|\n| 5 | **Enviar OTP via WhatsApp** | Aurora вҶ’ N8N вҶ’ WhatsApp | `/webhook/roletacodconfirmacao` | `otp_service.py:25` |\n| 6 | **Enviar WhatsApp (automaГ§Гөes)** | Aurora вҶ’ N8N вҶ’ WhatsApp | Webhook hardcoded no engine | `engine.py:442` |\n| 7 | **Enviar e-mail (automaГ§Гөes)** | Aurora вҶ’ N8N | Webhook hardcoded no engine | `engine.py:475` |\n| 8 | **ValidaГ§ГЈo IA de questГЈo (bot)** | Aurora вҶ’ N8N | URL configurada por questГЈo | `atendimento/models.py:739` |\n| 9 | **PГіs-resposta de questГЈo (bot)** | Aurora вҶ’ N8N | URL configurada por questГЈo | `atendimento/models.py:931` |\n| 10 | **NotificaГ§ГЈo CRM: nova oportunidade** | Aurora вҶ’ N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 11 | **NotificaГ§ГЈo CRM: mudanГ§a estГЎgio** | Aurora вҶ’ N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 12 | **NotificaГ§ГЈo CRM: tarefa vencida** | Aurora вҶ’ N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 13 | **Push notification** | Aurora вҶ’ N8N | URL em settings | `notificacoes/views.py:1172` |\n\n#### APIs do Aurora que sistemas externos consomem\n\n| # | Endpoint | MГ©todo | Auth | Quem chama |\n|---|----------|--------|------|------------|\n| 14 | `/api/v1/leads/registrar/` | POST | Token | N8N (bot) |\n| 15 | `/api/v1/leads/atualizar/` | PUT | Token | N8N (bot) |\n| 16 | `/api/v1/leads/imagens/registrar/` | POST | Token | N8N (docs) |\n| 17 | `/api/v1/atendimento/n8n/*` (14 endpoints) | GET/POST | Token | N8N (bot) |\n| 18 | `/marketing/api/campanhas/detectar/` | POST | Token | N8N (campanha) |\n| 19 | `/inbox/api/n8n/mensagem-recebida/` | POST | Token | Plataforma/N8N |\n| 20 | `/api/v1/venda/aprovar/` | POST | Token | N8N/ERP |\n| 21 | `/api/v1/venda/rejeitar/` | POST | Token | N8N/ERP |\n\n#### Consulta de CEP (multi-source)\n\n| # | OperaГ§ГЈo | Fonte | Arquivo |\n|---|----------|-------|---------|\n| 22 | **Buscar endereГ§o por CEP** | ViaCEP вҶ’ CepAPI вҶ’ BrasilAPI вҶ’ Postmon вҶ’ OpenCEP | `cadastro/views.py:604` |\n\n**Resumo: 22 pontos de integraГ§ГЈo com atendimento/N8N/externos.**\n\n| MГ©todo | Quantidade |\n|--------|-----------|\n| Aurora вҶ’ Plataforma (webhook envio) | 2 |\n| Plataforma вҶ’ Aurora (webhook recebimento) | 2 |\n| Aurora вҶ’ N8N (webhook) | 9 |\n| N8N/externo вҶ’ Aurora (API REST) | 8 |\n| Aurora вҶ’ APIs de CEP | 1 |\n| **Total** | **22** |\n\n### 2.4 Endpoints mГӯnimos que a plataforma precisa expor\n\n```\nPOST /enviar-mensagem  вҶ’ {telefone, mensagem, tipo}  (texto, imagem, documento)\nPOST /enviar-otp       вҶ’ {telefone, codigo}\nGET  /conversa/{id}    вҶ’ HistГіrico de mensagens\n```\n\nE a plataforma precisa enviar para o Aurora via webhook:\n\n```\nPOST /inbox/api/n8n/mensagem-recebida/  вҶ’ {telefone, mensagem, canal, timestamp}\nPOST /inbox/api/n8n/status-mensagem/    вҶ’ {mensagem_id, status} (entregue/lido)\n```\n\n### 2.5 Credenciais necessГЎrias\n\n| Item | DescriГ§ГЈo |\n|------|-----------|\n| URL do webhook de envio | Para onde o Aurora manda mensagens |\n| Token de autenticaГ§ГЈo | API Key ou Bearer Token da plataforma |\n| URL do webhook de recebimento | URL do Aurora que a plataforma vai chamar |\n| Token do Aurora | Token DRF gerado para a plataforma autenticar no Aurora |\n\n---\n\n## 3. IntegraГ§ГЈo com N8N (Orquestrador)\n\nO N8N funciona como middleware entre o Aurora e os sistemas externos. NГЈo Г© obrigatГіrio (as integraГ§Гөes podem ser diretas), mas simplifica o setup.\n\n### 3.1 Fluxos N8N necessГЎrios\n\n| # | Fluxo | Trigger | O que faz |\n|---|-------|---------|-----------|\n| 1 | **Bot de atendimento** | Mensagem recebida no WhatsApp | Consulta fluxo de questГөes na API do Aurora, envia resposta ao cliente, avanГ§a etapas |\n| 2 | **DetecГ§ГЈo de campanha** | Mensagem recebida no WhatsApp | Envia mensagem para API `/marketing/api/campanhas/detectar/`, atribui lead Г  campanha |\n| 3 | **Envio de OTP** | Webhook do Aurora | Recebe CPF + telefone + cГіdigo, envia via WhatsApp |\n| 4 | **Consulta cliente ERP** | Webhook do Aurora | Recebe CPF, consulta no ERP, retorna dados do cliente |\n| 5 | **Envio de WhatsApp (automaГ§Гөes)** | Webhook do Aurora | Recebe telefone + mensagem, envia via plataforma de atendimento |\n| 6 | **NotificaГ§Гөes CRM** | Webhook do Aurora | Nova oportunidade, mudanГ§a de estГЎgio, tarefa vencida |\n\n### 3.2 Webhooks configurados no Aurora\n\n| Webhook | Onde configurar | Quem chama |\n|---------|----------------|------------|\n| `webhook_n8n_nova_oportunidade` | ConfiguracaoCRM | Signal do CRM (auto) |\n| `webhook_n8n_mudanca_estagio` | ConfiguracaoCRM | Signal do CRM (auto) |\n| `webhook_n8n_tarefa_vencida` | ConfiguracaoCRM | Cron (auto) |\n| Webhook de envio por canal | ConfiguraГ§Гөes do Inbox > Canais | Agente responde no Inbox |\n\n### 3.3 APIs do Aurora que o N8N consome\n\n| API | MГ©todo | Auth | DescriГ§ГЈo |\n|-----|--------|------|-----------|\n| `/api/v1/leads/registrar/` | POST | Token | Criar lead |\n| `/api/v1/leads/atualizar/` | PUT | Token | Atualizar lead |\n| `/api/v1/leads/imagens/registrar/` | POST | Token | Enviar documentos |\n| `/api/v1/atendimento/n8n/*` | GET/POST | Token | 14 endpoints do bot |\n| `/marketing/api/campanhas/detectar/` | POST | Token | Detectar campanha |\n| `/inbox/api/n8n/mensagem-recebida/` | POST | Token | Receber mensagem |\n\n---\n\n## 4. Checklist de IntegraГ§ГЈo por Cliente\n\n### ERP (obrigatГіrio)\n\n```\n[ ] Identificar qual ERP o provedor usa\n[ ] Obter credenciais de API (URL, auth method, tokens)\n[ ] Mapear IDs: id_origem, id_vendedor, id_servico\n[ ] Testar consulta de cliente por CPF\n[ ] Testar criaГ§ГЈo de prospecto\n[ ] Configurar IntegracaoAPI no Aurora\n[ ] Validar conexГЈo no Admin Aurora > Monitoramento\n```\n\n### Plataforma de Atendimento (obrigatГіrio para Inbox/Bot)\n\n```\n[ ] Identificar qual plataforma o provedor usa (WhatsApp Business API, etc.)\n[ ] Obter webhook de envio (URL para onde Aurora manda mensagens)\n[ ] Configurar webhook de recebimento (URL do Aurora na plataforma)\n[ ] Gerar token DRF para a plataforma autenticar\n[ ] Configurar canal no Inbox > ConfiguraГ§Гөes > Canais\n[ ] Testar envio e recebimento de mensagem\n```\n\n### N8N (recomendado)\n\n```\n[ ] InstГўncia N8N disponГӯvel (self-hosted ou cloud)\n[ ] Duplicar/criar fluxos necessГЎrios (bot, campanha, OTP, notificaГ§Гөes)\n[ ] Configurar credenciais do ERP no N8N\n[ ] Configurar credenciais da plataforma de atendimento no N8N\n[ ] Configurar token do Aurora no N8N\n[ ] Testar fluxo completo: mensagem вҶ’ bot вҶ’ lead вҶ’ CRM\n```\n\n---\n\n## 5. ERPs conhecidos no mercado ISP\n\n| ERP | API REST | ObservaГ§Гөes |\n|-----|----------|-------------|\n| **HubSoft** | Sim (OAuth2) | IntegraГ§ГЈo nativa e profunda. Caso de produГ§ГЈo. |\n| **MK Solutions** | Sim | Popular em provedores mГ©dios. API documentada. |\n| **IXCSoft** | Sim | Grande base instalada. API REST disponГӯvel. |\n| **SGP** | Parcial | Alguns endpoints. Pode precisar de workaround. |\n| **Controllr** | Sim | API REST. Crescendo no mercado. |\n| **Topapp** | Sim | Focado em provedores menores. |\n\n### Plataformas de atendimento\n\n| Plataforma | Tipo | ObservaГ§Гөes |\n|------------|------|-------------|\n| **Matrix do Brasil** | WhatsApp Business API | IntegraГ§ГЈo atual da Megalink. |\n| **Evolution API** | WhatsApp (nГЈo oficial) | Open source, self-hosted. Popular. |\n| **Z-API** | WhatsApp Business API | API simples, boa documentaГ§ГЈo. |\n| **Twilio** | WhatsApp + SMS + Voz | Enterprise, mais caro. |\n| **Baileys/WPPConnect** | WhatsApp (nГЈo oficial) | Open source, instГЎvel. |\n| **Chatwoot** | Omnichannel | Open source, multi-canal. |\n\n---\n\n## 6. Mapa Consolidado вҖ” Todos os 35 Pontos de IntegraГ§ГЈo\n\n| # | OperaГ§ГЈo | Sistema | MГ©todo | DireГ§ГЈo |\n|---|----------|---------|--------|---------|\n| **ERP** | | | | |\n| 1 | Obter token
