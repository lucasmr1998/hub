іdulos por plano (Start vs Pro) |\n| `test_admin_aurora.py` | 2 | Admin Aurora: dashboard, criar tenant |\n| **test_automacoes.py** | **43** | **AutomaГ§Гөes: models, engine, condiГ§Гөes, aГ§Гөes, views, tenant isolation** |\n\n**Factories:** 30+ classes em `tests/factories.py` cobrindo todos os apps.\n\n---\n\n## Cobertura por mГіdulo\n\n### Bem cobertos (>70%)\n\n| Arquivo | Cobertura | Obs |\n|---------|-----------|-----|\n| `sistema/middleware.py` | 98% | Core do multi-tenant |\n| `sistema/mixins.py` | 100% | TenantMixin |\n| `sistema/models.py` | 86% | Tenant, PerfilUsuario, configs |\n| `sistema/authentication.py` | 93% | APITokenAuthentication |\n| `sistema/context_processors.py` | 100% | |\n| `sistema/logging_filters.py` | 100% | PIIFilter |\n| `crm/models.py` | 90% | Pipeline, Oportunidade, Tarefa |\n| `crm/signals.py` | 85% | Auto-criaГ§ГЈo CRM |\n| `clube/models.py` | 93% | MembroClube, NivelClube, Regras |\n| `parceiros/models.py` | 96% | Parceiro, Cupom, Resgate |\n| `indicacoes/models.py` | 98% | IndicaГ§ГЈo |\n| `notificacoes/models.py` | 98% | Todos os models |\n| `integracoes/models.py` | 100% | IntegracaoAPI, ClienteHubsoft |\n| `campanhas/models.py` | 93% | CampanhaTrafego |\n| `automacoes/models.py` | 93% | RegraAutomacao, CondiГ§ГЈo, AГ§ГЈo |\n| `automacoes/views.py` | 97% | CRUD completo |\n| `automacoes/engine.py` | 71% | Dispatcher + executores |\n| `api/serializers_panel.py` | 100% | ViewSets DRF |\n| `api/serializers_n8n.py` | 93% | Serializers N8N |\n\n### Parcialmente cobertos (30-70%)\n\n| Arquivo | Cobertura | O que falta |\n|---------|-----------|-------------|\n| `sistema/decorators.py` | 58% | Testar @webhook_token_required |\n| `sistema/encrypted_fields.py` | 59% | Testar encrypt/decrypt |\n| `sistema/validators.py` | 40% | Testar validate_image_upload |\n| `leads/models.py` | 49% | Properties e methods complexos |\n| `leads/admin.py` | 56% | Actions admin |\n| `atendimento/admin.py` | 45% | Admin customizado |\n| `cadastro/models.py` | 74% | GeraГ§ГЈo de PDF, signals |\n| `integracoes/signals.py` | 36% | Envio para HubSoft (mock) |\n| `automacoes/signals.py` | 67% | Mais cenГЎrios de evento |\n\n### Sem cobertura significativa (<30%)\n\n| Arquivo | Cobertura | Motivo |\n|---------|-----------|--------|\n| `dashboard/views.py` | 8% | 736 linhas, muitas queries complexas |\n| `clube/views/api_views.py` | 7% | 393 linhas, integraГ§ГЈo HubSoft |\n| `clube/views/dashboard_views.py` | 18% | Dashboards com Chart.js |\n| `crm/views.py` | 16% | 784 linhas, CRM pipeline |\n| `leads/views.py` | 22% | 679 linhas, listagem, filtros |\n| `sistema/views.py` | 23% | AutenticaГ§ГЈo, configuraГ§Гөes |\n| `notificacoes/views.py` | 16% | 508 linhas, maioria desativada |\n| `integracoes/services/hubsoft.py` | 12% | Chamadas HTTP externas |\n| `suporte/views.py` | 15% | Dashboard, tickets |\n| `cadastro/services/contrato_service.py` | 0% | IntegraГ§ГЈo HubSoft/Matrix |\n| `atendimento/services/atendimento_service.py` | 0% | LГіgica do bot |\n| Management commands | 0% | seed_planos, criar_tenant, etc |\n\n---\n\n## O que Г© testado hoje\n\n### Multi-tenancy (prioridade mГЎxima)\n- TenantManager filtra automaticamente por tenant ativo\n- Dados de tenant A nГЈo vazam para tenant B\n- Middleware resolve tenant corretamente\n- Cross-tenant access retorna vazio\n- Models com TenantMixin isolam dados\n\n### AutenticaГ§ГЈo e seguranГ§a\n- Endpoints protegidos retornam 401/403 sem auth\n- @api_token_required valida token\n- @login_required redireciona para login\n- API DRF com TokenAuth e SessionAuth\n\n### Models\n- CriaГ§ГЈo, validaГ§Гөes, str de todos os models principais\n- Relacionamentos (ForeignKey, ManyToMany)\n- Properties calculadas (taxa_sucesso, nivel_atual, etc)\n\n### AutomaГ§Гөes (novo)\n- Engine: disparo de evento, avaliaГ§ГЈo de condiГ§Гөes (7 operadores), execuГ§ГЈo de aГ§Гөes\n- AГ§Гөes: notificaГ§ГЈo, WhatsApp (mock), webhook (mock), criar tarefa, dar pontos\n- Delay/agendamento\n- Tenant isolation\n- Views: CRUD completo, toggle, histГіrico\n\n### Signals\n- Auto-criaГ§ГЈo de oportunidade CRM quando lead qualificado\n- Envio para HubSoft (parcial)\n- ConversГЈo de lead\n\n---\n\n## O que precisa melhorar\n\n### Prioridade 1: Views de pГЎgina\nAs views representam 60%+ do cГіdigo mas tГӘm <25% de cobertura. Motivo: testam lГіgica de negГіcio + renderizaГ§ГЈo + queries complexas. Abordagem recomendada: testes de integraГ§ГЈo com `client.get()` verificando status_code, context e conteГәdo.\n\n**Arquivos prioritГЎrios:**\n- `crm/views.py` (784 linhas, 16%) вҖ” Pipeline, configuraГ§Гөes, equipes\n- `leads/views.py` (679 linhas, 22%) вҖ” Listagem, filtros, APIs internas\n- `dashboard/views.py` (736 linhas, 8%) вҖ” Dashboards e relatГіrios\n\n### Prioridade 2: Services com integraГ§ГЈo externa\nServices que chamam APIs externas (HubSoft, N8N, Matrix) tГӘm 0-12% de cobertura. Precisam de mocks.\n\n**Arquivos:**\n- `integracoes/services/hubsoft.py` (12%) вҖ” Mock de requests\n- `cadastro/services/contrato_service.py` (0%) вҖ” Mock de upload de docs\n- `clube/services/hubsoft_service.py` (16%) вҖ” Mock de conexГЈo PostgreSQL\n\n### Prioridade 3: Management commands\nNenhum command tem testes. SГЈo executados manualmente mas podem quebrar silenciosamente.\n\n---\n\n## ConfiguraГ§ГЈo\n\n### pytest.ini\n```ini\n[pytest]\nDJANGO_SETTINGS_MODULE = gerenciador_vendas.settings_local\npython_files = test_*.py\npython_classes = Test*\npython_functions = test_*\n```\n\n### CI/CD\nGitHub Actions roda os testes automaticamente em cada push via `.github/workflows/ci.yml`.\n\n### Banco de testes\nSQLite in-memory (`:memory:`) via `settings_local.py`. Cada test case cria e destrГіi o banco automaticamente.\n"}, {"t": "f", "n": "05 Automacoes", "fn": "05-AUTOMACOES.md", "c": "# MГіdulo de AutomaГ§Гөes вҖ” AuroraISP\n\n**Ultima atualizacao:** 06/04/2026\n**Status:** вң… Implementado\n**LocalizaГ§ГЈo:** `apps/marketing/automacoes/`\n\n---\n\n## VisГЈo Geral\n\nO mГіdulo de AutomaГ§Гөes Г© o motor central do Marketing da AuroraISP. Permite que provedores criem regras visuais do tipo \"Quando X acontecer, se Y, entГЈo faГ§a Z\" com fluxos condicionais (if/else), delays, aГ§Гөes encadeadas e integraГ§ГЈo com segmentos.\n\n**Dois modos de operaГ§ГЈo:**\n- **Legacy (linear):** evento вҶ’ condiГ§Гөes AND вҶ’ aГ§Гөes sequenciais (compatibilidade com regras antigas)\n- **Fluxo visual (grafo):** editor drag & drop com nГіs conectГЎveis, branching if/else, delays reais\n\n---\n\n## Arquitetura\n\n### Models\n\n| Model | Tabela | DescriГ§ГЈo |\n|-------|--------|-----------|\n| `RegraAutomacao` | `automacoes_regraautomacao` | Regra principal: nome, evento, ativa, contadores, modo (legacy/fluxo), controles |\n| `CondicaoRegra` | `automacoes_condicaoregra` | CondiГ§ГЈo do modo legacy: campo + operador + valor |\n| `AcaoRegra` | `automacoes_acaoregra` | AГ§ГЈo do modo legacy: tipo + configuraГ§ГЈo + delay |\n| `NodoFluxo` | `automacoes_nodofluxo` | NГі do fluxograma: trigger, condition, action ou delay |\n| `ConexaoNodo` | `automacoes_conexaonodo` | Aresta entre dois nГіs: default, true ou false |\n| `ExecucaoPendente` | `automacoes_execucaopendente` | Fila de aГ§Гөes com delay aguardando execuГ§ГЈo |\n| `ControleExecucao` | `automacoes_controleexecucao` | Rate limiting por lead por regra |\n| `LogExecucao` | `automacoes_logexecucao` | Registro de cada execuГ§ГЈo com FK para lead e nodo |\n\n### Campos importantes de `RegraAutomacao`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField | Nome da regra |\n| `evento` | CharField (choices) | Evento gatilho (ver lista abaixo) |\n| `ativa` | BooleanField | Liga/desliga a regra |\n| `modo_fluxo` | BooleanField | `False` = legacy linear, `True` = fluxograma visual |\n| `fluxo_json` | JSONField | Estado salvo do editor Drawflow para re-import |\n| `segmento` | FK вҶ’ SegmentoCRM | Segmento para disparo em massa (opcional) |\n| `max_execucoes_por_lead` | int | MГЎximo de execuГ§Гөes por lead no perГӯodo (0 = ilimitado) |\n| `cooldown_horas` | int | Horas mГӯnimas entre execuГ§Гөes para o mesmo lead |\n| `periodo_limite_horas` | int | Janela de tempo para o max_execucoes (default 24h) |\n| `total_execucoes` | int | Contador total de execuГ§Гөes |\n| `total_sucesso` | int | Contador de sucesso |\n| `total_erro` | int | Contador de erros |\n\n---\n\n## Eventos DisponГӯveis\n\n### Via Signal (tempo real)\n\n| Evento | CГіdigo | Signal | Quando dispara |\n|--------|--------|--------|----------------|\n| Novo lead criado | `lead_criado` | `post_save` LeadProspecto (created=True) | Lead entra no sistema via WhatsApp/site |\n| Lead qualificado | `lead_qualificado` | `post_save` LeadProspecto (score >= 7) | Score do lead muda para >= 7 |\n| Oportunidade movida | `oportunidade_movida` | `post_save` OportunidadeVenda (created=False) | Card arrastado no Kanban |\n| Documentos validados | `docs_validados` | `post_save` ImagemLeadProspecto (status=validado) | Todos os docs do lead aprovados |\n| IndicaГ§ГЈo convertida | `indicacao_convertida` | `post_save` Indicacao (status=convertido) | IndicaГ§ГЈo vira cliente |\n| Lead entrou em segmento | `lead_entrou_segmento` | Disparado pelo signal de segmentos dinГўmicos | Lead atende regras de um segmento |\n\n### Via Cron (management command)\n\n| Evento | CГіdigo | Quando verifica |\n|--------|--------|-----------------|\n| Lead sem contato | `lead_sem_contato` | Lead sem histГіrico de contato hГЎ X dias |\n| Tarefa vencida | `tarefa_vencida` | TarefaCRM com status pendente e data_vencimento < agora |\n| Venda aprovada | `venda_aprovada` | NГЈo implementado (precisa webhook HubSoft) |\n| AniversГЎrio de cliente | `cliente_aniversario` | NГЈo implementado |\n| Disparo por segmento | `disparo_segmento` | Para todos os leads de um segmento (massa) |\n\n### Flag de skip\n\nCada signal verifica `getattr(instance, '_skip_automacao', False)` antes de disparar. Para importaГ§ГЈo em massa, setar `lead._skip_automacao = True` antes do save.\n\n---\n\n## Engine de ExecuГ§ГЈo\n\n### Arquivo: `apps/marketing/automacoes/engine.py`\n\n### Fluxo principal\n\n```\ndisparar_evento(evento, contexto, tenant)\n  в”ңв”Җв”Җ Busca regras ativas para o evento no tenant\n  в”ңв”Җв”Җ Para cada regra:\n  в”Ӯ   в”ңв”Җв”Җ Verifica controles (max_execucoes, cooldown)\n  в”Ӯ   в”ңв”Җв”Җ Se modo_fluxo=False: _processar_regra_legacy()\n  в”Ӯ   в”Ӯ   в”ңв”Җв”Җ Avalia condiГ§Гөes (AND)\n  в”Ӯ   в”Ӯ   в””в”Җв”Җ Executa aГ§Гөes sequenciais\n  в”Ӯ   в””в”Җв”Җ Se modo_fluxo=True: _processar_fluxo()\n  в”Ӯ       в”ңв”Җв”Җ Encontra nodo trigger\n  в”Ӯ       в””в”Җв”Җ BFS no grafo: _executar_nodo_e_seguir()\n  в”Ӯ           в”ңв”Җв”Җ trigger вҶ’ segue conexГөes default\n  в”Ӯ           в”ңв”Җв”Җ condition вҶ’ avalia вҶ’ segue 'true' ou 'false'\n  в”Ӯ           в”ңв”Җв”Җ delay вҶ’ cria ExecucaoPendente вҶ’ para\n  в”Ӯ           в””в”Җв”Җ action вҶ’ executa вҶ’ segue conexГөes default\n  в””в”Җв”Җ Registra log em LogExecucao\n```\n\n### Adaptador NodoFluxo вҶ’ AcaoRegra\n\nA classe `_NodoAcaoAdapter` converte a config JSON do `NodoFluxo` para a interface texto que os executores existentes esperam. Isso permite reutilizar os 6 executores sem duplicaГ§ГЈo.\n\n### Controles de execuГ§ГЈo\n\n```python\n_verificar_controles(regra, lead)\n```\n\n1. Se `max_execucoes_por_lead == 0` e `cooldown_horas == 0`: sempre passa\n2. Busca/cria `ControleExecucao` para o par (lead, regra)\n3. Se perГӯodo expirou: reseta contadores\n4. Verifica max execuГ§Гөes no perГӯodo\n5. Verifica cooldown desde Гәltima execuГ§ГЈo\n6. Atualiza contadores\n\n### Executar pendentes (delays)\n\n```python\nexecutar_pendentes(tenant=None)\n```\n\nChamado pelo cron. Busca `ExecucaoPendente` com `status=pendente` e `data_agendada <= agora`. Para cada:\n- Se tem `nodo`: retoma o grafo a partir das conexГөes de saГӯda do nodo de delay\n- Se tem `acao` (legacy): executa a aГ§ГЈo diretamente\n- Atualiza status para `executado` ou `erro`\n\n---\n\n## AГ§Гөes Implementadas\n\n| Tipo | Codigo | O que faz | Config no editor |\n|------|--------|-----------|------------------|\n| WhatsApp | `enviar_whatsapp` | POST para webhook N8N | Mensagem com `{{variaveis}}` |\n| E-mail | `enviar_email` | Envia via webhook N8N | Assunto + corpo com `{{variaveis}}` |\n| Notificacao | `notificacao_sistema` | Cria Notificacao no sistema | Titulo + mensagem com `{{variaveis}}` |\n| Criar Tarefa | `criar_tarefa` | Cria TarefaCRM | Titulo, tipo (select), prioridade (select) |\n| Mover Estagio | `mover_estagio` | Move OportunidadeVenda | Pipeline (select), estagio (select filtrado) |\n| Atribuir Responsavel | `atribuir_responsavel` | Atribui vendedor a oportunidade | Modo (round-robin/fixo), responsavel (select) |\n| Dar Pontos | `dar_pontos` | Adiciona saldo ao MembroClube | Quantidade + motivo |\n| Webhook | `webhook` | Chama URL externa | URL, metodo (POST/GET), payload JSON |\n\n### SubstituiГ§ГЈo de variГЎveis\n\nO template de mensagem suporta `{{variГЎvel}}`. VariГЎveis disponГӯveis dependem do evento:\n\n| VariГЎvel | Origem |\n|----------|--------|\n| `{{nome}}` | `contexto['nome']` (alias para nome do lead) |\n| `{{telefone}}` | `contexto['telefone']` |\n| `{{lead_nome}}` | `lead.nome_razaosocial` |\n| `{{lead_email}}` | `lead.email` |\n| `{{lead_telefone}}` | `lead.telefone` |\n| `{{lead_score}}` | `lead.score_qualificacao` |\n| `{{lead_origem}}` | `lead.origem` |\n| `{{lead_valor}}` | `lead.valor` |\n| `{{segmento_nome}}` | `segmento.nome` (quando evento = lead_entrou_segmento) |\n\n---\n\n## Editor Visual (Drawflow)\n\n### Biblioteca\n\n**Drawflow** (vanilla JS, 12KB, zero dependГӘncias, MIT)\n- CDN: `https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js`\n- Docs: https://github.com/jerosoler/Drawflow\n\n### Layout do editor\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ вҶҗ Nome da Regra                    [Ativa] [Salvar]    в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ PALETA   в”Ӯ                            в”Ӯ CONFIG PANEL    в”Ӯ\nв”Ӯ          в”Ӯ                            в”Ӯ (aparece ao     в”Ӯ\nв”Ӯ Gatilhos в”Ӯ     CANVAS DRAWFLOW        в”Ӯ  clicar num nГі) в”Ӯ\nв”Ӯ CondiГ§Гөesв”Ӯ                            в”Ӯ                 в”Ӯ\nв”Ӯ AГ§Гөes    в”Ӯ     (drag & drop)          в”Ӯ Campo: [...]    в”Ӯ\nв”Ӯ Controle в”Ӯ                            в”Ӯ Operador: [..] в”Ӯ\nв”Ӯ          в”Ӯ                            в”Ӯ Valor: [...]    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Paleta de nГіs (sidebar esquerda)\n\n| Categoria | NГіs |\n|-----------|-----|\n| **Gatilhos** | O evento da regra (definido na criaГ§ГЈo) |\n| **CondiГ§Гөes** | Verificar Campo (if/else com 2 saГӯdas) |\n| **AГ§Гөes** | WhatsApp, E-mail, NotificaГ§ГЈo, Criar Tarefa, Mover EstГЎgio, Dar Pontos, Webhook |\n| **Controle** | Atraso (delay em minutos/horas/dias) |\n\n### Tipos de nГі\n\n| Tipo | Inputs | Outputs | Comportamento |\n|------|--------|---------|---------------|\n| `trigger` | 0 | 1 (default) | Ponto de entrada do fluxo |\n| `condition` | 1 | 2 (true/false) | Avalia campo+operador+valor, segue branch |\n| `action` | 1 | 1 (default) | Executa aГ§ГЈo, segue para o prГіximo |\n| `delay` | 1 | 1 (default) | Cria ExecucaoPendente, para execuГ§ГЈo (retoma via cron) |\n\n### Configuracao especifica por tipo de no (painel direito)\n\n**Gatilhos:**\n- **Oportunidade movida:** Pipeline (select), estagio de (select filtrado), estagio para (select filtrado)\n- **Lead sem contato:** Dias sem contato (numero)\n- **Entrou em segmento:** Segmento (select com segmentos do CRM)\n- **Mensagem recebida:** Canal (select: WhatsApp/Email/Widget)\n- Outros gatilhos: informativo (disparam sempre)\n\n**Condicao:**\n- Campo (select com optgroups Lead/CRM/Temporal)\n- Operador (select: igual, diferente, contem, maior, menor, maior_igual, menor_igual)\n- Valor (campo dinamico conforme o campo selecionado):\n  - Origem вҶ’ select com origens do lead\n  - Status вҶ’ select com status do lead\n  - Estagio вҶ’ select com estagios dos pipelines\n  - Pipeline вҶ’ select com pipelines\n  - Responsavel вҶ’ select com usuarios staff\n  - Estado вҶ’ select com UFs\n  - Demais вҶ’ input texto livre\n\n**Acoes:**\n- **Enviar WhatsApp:** Mensagem com variaveis\n- **Enviar Email:** Assunto + corpo com variaveis\n- **Notificacao:** Titulo + mensagem\n- **Criar Tarefa:** Titulo, tipo (select: ligacao/followup/visita/whatsapp/email), prioridade (select)\n- **Mover Estagio:** Pipeline (select), estagio destino (select filtrado por pipeline)\n- **Atribuir Responsavel:** Modo (round-robin/fixo), responsavel (select com usuarios staff)\n- **Dar Pontos:** Quantidade + motivo\n- **Webhook:** URL, metodo (POST/GET), payload JSON\n\n**Delay:**\n- Tempo (numero) + Unidade (select: minutos/horas/dias)\n\n### SerializaГ§ГЈo\n\n**Salvar:** `editor.export()` вҶ’ JSON вҶ’ POST `/marketing/automacoes/<pk>/salvar-fluxo/`\n\nO backend recebe:\n```json\n{\n  \"drawflow_state\": { /* estado bruto do Drawflow para re-import */ },\n  \"nodos\": [\n    {\"id_temp\": \"1\", \"tipo\": \"trigger\", \"subtipo\": \"lead_criado\", \"config\": {}, \"pos_x\": 100, \"pos_y\": 200},\n    {\"id_temp\": \"2\", \"tipo\": \"condition\", \"subtipo\": \"campo_check\", \"config\": {\"campo\": \"lead.origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"}, \"pos_x\": 300, \"pos_y\": 200}\n  ],\n  \"conexoes\": [\n    {\"origem\": \"1\", \"destino\": \"2\", \"tipo_saida\": \"default\"}\n  ]\n}\n```\n\n**Carregar:** view passa `regra.fluxo_json` вҶ’ `editor.import(data)` no JS. Se `fluxo_json` estiver vazio mas existirem nodos no banco, o editor reconstroi o grafo automaticamente.\n\n---\n\n## Management Command (Cron)\n\n### Arquivo: `apps/marketing/automacoes/management/commands/executar_automacoes_cron.py`\n\n### Uso\n\n```bash\n# ExecuГ§ГЈo normal (todos os tenants)\npython manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings\n\n# SimulaГ§ГЈo (nГЈo executa, sГі mostra)\npython manage.py executar_automacoes_cron --dry-run\n\n# Tenant especГӯfico\npython manage.py executar_automacoes_cron --tenant megalink\n```\n\n### ConfiguraГ§ГЈo crontab\n\n```\n*/5 * * * * cd /path/to/project && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/automacoes.log 2>&1\n```\n\n### O que faz (por tenant)\n\n1. **Executa pendentes:** busca `ExecucaoPendente` com `data_agendada <= agora` e executa\n2. **Lead sem contato:** detecta leads com Гәltimo histГіrico > X dias e dispara `lead_sem_contato`\n3. **Tarefa vencida:** detecta tarefas pendentes com `data_vencimento < agora` e dispara `tarefa_vencida`\n4. **Disparo por segmento:** para regras com `evento=disparo_segmento` e segmento associado, itera leads do segmento\n\n### ProteГ§ГЈo contra duplicatas\n\nPara `lead_sem_contato`: verifica se jГЎ existe `LogExecucao` para o lead nessa regra dentro do perГӯodo, evitando disparar repetidamente.\n\n---\n\n## Dashboard Central\n\n### URL: `/marketing/automacoes/dashboard/`\n\n### ConteГәdo\n\n| SeГ§ГЈo | Dados |\n|-------|-------|\n| **KPIs** (4 cards) | ExecuГ§Гөes hoje, Taxa de sucesso, Regras ativas, Pendentes (delay) |\n| **GrГЎfico** | Linha: execuГ§Гөes nos Гәltimos 30 dias (Chart.js) |\n| **Top Regras** | 10 regras mais executadas |\n| **Erros Recentes** | 10 Гәltimos logs com status=erro |\n| **HistГіrico** | Tabela com Гәltimos 100 logs (data, regra, aГ§ГЈo, lead, status, resultado) |\n\n---\n\n## Timeline no Lead\n\n### IntegraГ§ГЈo\n\nNo detalhe da oportunidade (`apps/comercial/crm/views.py` вҶ’ `oportunidade_detalhe`), a view consulta:\n\n```python\nLogExecucao.all_tenants.filter(tenant=request.tenant, lead=lead)\n```\n\nE passa `logs_automacao` no contexto. Isso Г© possГӯvel graГ§as ao FK `LogExecucao.lead` que foi adicionado na refatoraГ§ГЈo.\n\n### API\n\n```\nGET /marketing/automacoes/api/lead/<lead_pk>/timeline/\n```\n\nRetorna JSON:\n```json\n{\n  \"logs\": [\n    {\"id\": 1, \"regra\": \"Boas vindas\", \"acao\": \"Enviar WhatsApp\", \"status\": \"sucesso\", \"resultado\": \"OK\", \"data\": \"03/04/2026 14:30\"}\n  ]\n}\n```\n\n---\n\n## IntegraГ§ГЈo com Segmentos\n\n### Evento `lead_entrou_segmento`\n\nQuando o signal `avaliar_segmentos_dinamicos` (em `apps/comercial/crm/signals.py`) adiciona um lead a um segmento dinГўmico, ele dispara:\n\n```python\ndisparar_evento('lead_entrou_segmento', {\n    'lead': instance,\n    'segmento': seg,\n    'segmento_nome': seg.nome,\n}, tenant=instance.tenant)\n```\n\nIsso permite criar regras como: \"Quando lead entrar no segmento 'Leads Quentes', enviar WhatsApp de boas vindas.\"\n\n### Disparo em massa por segmento\n\nRegras com `evento=disparo_segmento` e `segmento` FK preenchido sГЈo processadas pelo cron. Para cada lead do segmento, o cron dispara a automaГ§ГЈo (respeitando controles de rate limit e cooldown).\n\n### ServiГ§o compartilhado\n\nO `apps/comercial/crm/services/segmentos.py` contГ©m funГ§Гөes reutilizadas:\n- `filtrar_leads_por_regras(regras)` вҖ” filtra queryset por campo/operador/valor\n- `lead_atende_regras(lead, regras)` вҖ” avalia sem query (usado nos signals)\n- `avaliar_lead_em_segmentos(lead)` вҖ” retorna lista de segmentos adicionados\n- `atualizar_membros_segmento(segmento)` вҖ” sync completo de membros\n\n---\n\n## URLs\n\n| URL | View | MГ©todo | DescriГ§ГЈo |\n|-----|------|--------|-----------|\n| `/marketing/automacoes/` | `lista_automacoes` | GET | Lista de regras |\n| `/marketing/automacoes/criar/` | `criar_automacao` | GET/POST | Criar regra (modo legacy) |\n| `/marketing/automacoes/dashboard/` | `dashboard_automacoes` | GET | Dashboard central |\n| `/marketing/automacoes/<pk>/editar/` | `editar_automacao` | GET/POST | Editar regra (modo legacy) |\n| `/marketing/automacoes/<pk>/fluxo/` | `editor_fluxo` | GET | Editor visual Drawflow |\n| `/marketing/automacoes/<pk>/salvar-fluxo/` | `salvar_fluxo` | POST | Salvar fluxograma |\n| `/marketing/automacoes/<pk>/toggle/` | `toggle_automacao` | POST | Ativar/desativar (AJAX) |\n| `/marketing/automacoes/<pk>/excluir/` | `excluir_automacao` | POST | Excluir regra |\n| `/marketing/automacoes/<pk>/historico/` | `historico_automacao` | GET | Logs de uma regra |\n| `/marketing/automacoes/api/lead/<pk>/timeline/` | `api_lead_timeline` | GET | Timeline de automaГ§Гөes para um lead |\n\n---\n\n## Signals\n\n### Arquivo: `apps/marketing/automacoes/signals.py`\n\n| Signal | Sender | CondiГ§ГЈo | Skip flag |\n|--------|--------|----------|-----------|\n| `on_lead_criado` | `leads.LeadProspecto` | `created=True` | `_skip_automacao` |\n| `on_lead_qualificado` | `leads.LeadProspecto` | `created=False` AND `score >= 7` | `_skip_automacao` |\n| `on_oportunidade_movida` | `crm.OportunidadeVenda` | `created=False` | `_skip_automacao` |\n| `on_docs_validados` | `leads.ImagemLeadProspecto` | `status=validado` AND todos docs validados | `_skip_automacao` |\n| `on_indicacao_convertida` | `indicacoes.Indicacao` | `status=convertido` | `_skip_automacao` |\n\n### Arquivo: `apps/comercial/crm/signals.py`\n\n| Signal | Sender | O que faz |\n|--------|--------|-----------|\n| `avaliar_segmentos_dinamicos` | `leads.LeadProspecto` | Avalia segmentos + dispara `lead_entrou_segmento` |\n\n---\n\n## Testes\n\n### Arquivo: `tests/test_automacoes.py`\n\n**60 testes passando** cobrindo:\n\n| Classe | Testes | O que cobre |\n|--------|--------|-------------|\n| `RegraAutomacaoModelTest` | 4 | CRUD, taxa_sucesso, str |\n| `CondicaoRegraModelTest` | 7 | AvaliaГ§ГЈo: igual, maior, contГ©m, aninhado, inexistente, menor_igual, diferente |\n| `AcaoRegraModelTest` | 6 | Delay timedelta (minutos, horas, dias), str |\n| `EngineSubstituirVariaveisTest` | 3 | SubstituiГ§ГЈo de variГЎveis em templates |\n| `EngineDispararEventoTest` | 14 | Evento sem regras, com/sem condiГ§Гөes, inativa, mГәltiplas AND, delay, notificaГ§ГЈo, WhatsApp (mock), webhook (mock), criar tarefa, dar pontos, sem tenant |\n| `AutomacoesTenantIsolationTest` | 1 | Regras isoladas por tenant |\n| `AutomacoesViewsTest` | 12 | Lista, criar GET/POST, editar, toggle, excluir, histГіrico, sem login, editor_fluxo, dashboard, timeline, salvar_fluxo |\n| `FluxoEngineTest` | 5 | Fluxo linear, condiГ§ГЈo true/false, delay, legacy nГЈo afetado |\n| `ControleExecucaoTest` | 3 | Max execuГ§Гөes bloqueia, cooldown bloqueia, sem controles passa |\n| `ExecucaoPendenteTest` | 2 | Executa pendentes vencidos, nГЈo executa futuros |\n| `NovasViewsTest` | 3 | Editor fluxo, dashboard, timeline lead |\n\n### Factories\n\n```python\nRegraAutomacaoFactory   # evento='lead_criado', ativa=True\nCondicaoRegraFactory    # campo='lead.origem', operador='igual', valor='whatsapp'\nAcaoRegraFactory        # tipo='notificacao_sistema', configuracao='Novo lead: {{nome}}'\nLogExecucaoFactory      # status='sucesso'\nNodoFluxoFactory        # tipo='action', subtipo='enviar_whatsapp'\nConexaoNodoFactory      # tipo_saida='default'\nExecucaoPendenteFactory # status='pendente'\n```\n\n---\n\n## Testes E2E\n\nManagement command para validar todos os componentes end-to-end:\n\n```bash\npython manage.py testar_automacoes --settings=gerenciador_vendas.settings_local\n```\n\n18 testes cobrindo: gatilhos (5 eventos via signal real), condicoes (7 operadores), acoes (notificacao + tarefa verificadas no banco), delay (pendente вҶ’ execucao вҶ’ resultado), rate limit (2 permitidas, 3a bloqueada), fluxo visual completo (trigger вҶ’ condition вҶ’ branch true/false), substituicao de variaveis.\n\n---\n\n## Limitacoes conhecidas\n\n1. **Sem Celery:** delays usam tabela `ExecucaoPendente` + cron (latencia maxima = intervalo do cron, ex: 5 min)\n2. **Eventos nao implementados:** `venda_aprovada` (precisa webhook HubSoft) e `cliente_aniversario` (precisa campo data_nascimento)\n3. **Webhook WhatsApp hardcoded:** URL do N8N esta fixa no codigo, deveria ser configuravel por tenant\n4. **Sem deduplicacao de acoes:** se 2 regras mandam WhatsApp para o mesmo lead no mesmo minuto, manda 2x (usar `max_execucoes_por_lead` para controlar)\n\n---\n\n## Exemplo de uso\n\n### Criar automaГ§ГЈo: \"Boas vindas ao novo lead via WhatsApp\"\n\n1. Acesse `/marketing/automacoes/criar/`\n2. Nome: \"Boas vindas WhatsApp\"\n3. Evento: \"Novo lead criado\"\n4. Salvar вҶ’ vai para a lista\n5. Clique no Гӯcone de fluxograma (рҹ“Ҡ) вҶ’ abre editor visual\n6. Arraste \"Venda aprovada\" (trigger) para o canvas (jГЎ vem com o evento da regra)\n7. Arraste \"Verificar Campo\" вҶ’ configure: Campo=lead.origem, Operador=igual, Valor=whatsapp\n8. Arraste \"Enviar WhatsApp\" вҶ’ configure: \"OlГЎ {{nome}}, obrigado pelo interesse!\"\n9. Conecte: trigger вҶ’ condiГ§ГЈo (saГӯda default), condiГ§ГЈo вҶ’ whatsapp (saГӯda true)\n10. Clique \"Salvar\"\n\nAgora todo lead que chegar via WhatsApp recebe a mensagem automaticamente.\n\n### Criar automaГ§ГЈo com delay: \"Followup 2 dias apГіs cadastro\"\n\n1. Criar regra com evento \"Novo lead criado\"\n2. No editor: trigger вҶ’ delay (2 dias) вҶ’ criar tarefa (\"Contatar {{nome}}\")\n3. Salvar\n\nO lead Г© criado, o delay Г© agendado, e 2 dias depois o cron executa e cria a tarefa.\n"}, {"t": "f", "n": "06 Inbox", "fn": "06-INBOX.md", "c": "# MГіdulo Inbox (Atendimento/Suporte) вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 03/04/2026\n**Status:** вң… Implementado (3 sessГөes de desenvolvimento)\n**LocalizaГ§ГЈo:** `apps/inbox/`\n\n---\n\n## VisГЈo Geral\n\nO Inbox Г© o mГіdulo de conversas em tempo real da AuroraISP, estilo Chatwoot/Intercom. Permite que agentes do provedor conversem com leads e clientes via WhatsApp (webhook) e Chat Widget (embeddable), com interface three-panel unificada, equipes, filas de atendimento, distribuiГ§ГЈo automГЎtica, FAQ, mГ©tricas e integraГ§ГЈo com automaГ§Гөes.\n\n**LocalizaГ§ГЈo no painel:** Menu `Suporte` вҶ’ Sidebar `ATENDIMENTO`\n\n**Dois canais:**\n- **WhatsApp** вҖ” mensagens chegam/saem via webhook (pronto para N8N)\n- **Chat Widget** вҖ” JS embeddable para sites de provedores, com FAQ e 3 abas\n\n---\n\n## Arquitetura\n\n### Models (17 models)\n\n| Model | Tabela | DescriГ§ГЈo |\n|-------|--------|-----------|\n| **Core** | | |\n| `CanalInbox` | `inbox_canais` | ConfiguraГ§ГЈo do canal: tipo (whatsapp/widget/email/interno) + webhook URLs |\n| `EtiquetaConversa` | `inbox_etiquetas` | Labels/tags com cor para classificar conversas |\n| `Conversa` | `inbox_conversas` | Conversa principal: canal, lead, agente, equipe, fila, status, etiquetas |\n| `Mensagem` | `inbox_mensagens` | Mensagem individual: remetente, tipo de conteГәdo, lida, entrega, erro |\n| `RespostaRapida` | `inbox_respostas_rapidas` | Templates de resposta com atalhos (ex: `/ola`) |\n| `NotaInternaConversa` | `inbox_notas_internas` | Notas visГӯveis apenas para agentes |\n| **Equipes e Filas** | | |\n| `EquipeInbox` | `inbox_equipes` | Equipe de atendimento com lГӯder, cor, membros |\n| `MembroEquipeInbox` | `inbox_membros_equipe` | M2M: agente pode estar em mГәltiplas equipes (agente/supervisor/gerente) |\n| `PerfilAgenteInbox` | `inbox_perfis_agente` | Status do agente (online/ausente/offline) + capacidade mГЎxima |\n| `FilaInbox` | `inbox_filas` | Fila com modo de distribuiГ§ГЈo (round-robin/menor carga/manual) |\n| `RegraRoteamento` | `inbox_regras_roteamento` | Regra de roteamento: por canal, etiqueta ou horГЎrio вҶ’ direciona para fila |\n| `HistoricoTransferencia` | `inbox_historico_transferencia` | Audit trail de transferГӘncias entre agentes/equipes/filas |\n| **ConfiguraГ§ГЈo** | | |\n| `HorarioAtendimento` | `inbox_horario_atendimento` | Dias/horas de funcionamento por tenant |\n| `ConfiguracaoInbox` | `inbox_configuracao` | Singleton: mensagem fora do horГЎrio, distribuiГ§ГЈo padrГЈo |\n| **FAQ** | | |\n| `CategoriaFAQ` | `inbox_faq_categorias` | Categoria de artigos: nome, slug, Гӯcone, cor |\n| `ArtigoFAQ` | `inbox_faq_artigos` | Artigo: tГӯtulo, conteГәdo HTML, visualizaГ§Гөes |\n| **Widget** | | |\n| `WidgetConfig` | `inbox_widget_config` | Singleton: token pГәblico UUID, cores, posiГ§ГЈo, FAQ, campos obrigatГіrios, domГӯnios |\n\nTodos os models herdam de `TenantMixin` (multi-tenancy automГЎtico).\n\n### Campos importantes de `Conversa`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `numero` | PositiveIntegerField | Auto-increment por tenant |\n| `canal` | FK вҶ’ CanalInbox | Canal de origem |\n| `lead` | FK вҶ’ LeadProspecto | Vinculado automaticamente por telefone/email |\n| `contato_nome` / `contato_telefone` / `contato_email` | CharField | Denormalizados para exibiГ§ГЈo |\n| `status` | CharField | `aberta`, `pendente`, `resolvida`, `arquivada` |\n| `prioridade` | CharField | `baixa`, `normal`, `alta`, `urgente` |\n| `agente` | FK вҶ’ User | Atendente atribuГӯdo |\n| `equipe` | FK вҶ’ EquipeInbox | Equipe atribuГӯda |\n| `fila` | FK вҶ’ FilaInbox | Fila de atendimento |\n| `etiquetas` | M2M вҶ’ EtiquetaConversa | Labels visuais |\n| `ticket` | FK вҶ’ Ticket | Link com suporte |\n| `oportunidade` | FK вҶ’ OportunidadeVenda | Link com CRM |\n| `identificador_externo` | CharField | WhatsApp thread ID ou visitor_id do widget |\n| `ultima_mensagem_em` / `ultima_mensagem_preview` | DateTime/Char | Para lista sem join |\n| `mensagens_nao_lidas` | PositiveIntegerField | Badge |\n| `tempo_primeira_resposta_seg` | PositiveIntegerField | SLA |\n\n### ГҚndices\n\n**Conversa:** `(status, agente)`, `(canal, status)`, `(ultima_mensagem_em)`, `(contato_telefone)`, `(equipe, status)`, `(fila, status)`\n**Mensagem:** `(conversa, data_envio)`, `(identificador_externo)`\n\n---\n\n## RelaГ§Гөes com MГіdulos Existentes\n\n```\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”Ӯ LeadProspectoв”Ӯ\n                    в”Ӯ  (leads)    в”Ӯ\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                           в”Ӯ FK lead\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ        в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”җ        в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”ӮEquipeInboxв”Ӯв”Җв”Җв”ҖFKв”Җв”Җв–¶в”Ӯ  Conversa   в”Ӯв”Җв”Җв”Җв”ҖFKв”Җв”Җв–¶в”Ӯ    Ticket     в”Ӯ\nв”ӮFilaInbox  в”Ӯ       в”Ӯ  (inbox)    в”Ӯ        в”Ӯ  (suporte)   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ        в””в”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ        в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                           в”Ӯ FK oportunidade\n                    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n                    в”ӮOportunidade в”Ӯ\n                    в”Ӯ  Venda (crm)в”Ӯ\n                    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n## Services (LГіgica de NegГіcio)\n\n### Arquivo: `apps/inbox/services.py`\n\n### FunГ§Гөes principais\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `receber_mensagem(telefone, nome, conteudo, tenant, ...)` | Processa mensagem WhatsApp: normaliza telefone, busca/cria conversa, vincula lead, distribui, notifica WS |\n| `receber_mensagem_widget(visitor_id, nome, conteudo, tenant, ...)` | Processa mensagem do widget: usa visitor_id em vez de telefone, vincula lead por email/telefone |\n| `enviar_mensagem(conversa, conteudo, user, ...)` | Agente envia: cria mensagem, calcula SLA, webhook async, WS notify |\n| `atribuir_conversa(conversa, agente, atribuido_por)` | Atribui agente + mensagem de sistema |\n| `resolver_conversa(conversa, user)` | Status вҶ’ resolvida |\n| `reabrir_conversa(conversa, user)` | Status вҶ’ aberta |\n| `transferir_conversa(conversa, transferido_por, para_agente/equipe/fila, motivo)` | Transfere + HistoricoTransferencia + redistribui se para equipe/fila |\n| `criar_ticket_de_conversa(conversa, titulo, user, categoria)` | Cria Ticket com histГіrico das Гәltimas 10 mensagens |\n| `marcar_mensagens_lidas(conversa)` | Marca todas contato como lidas + zera badge |\n| `atualizar_status_entrega(identificador_externo, status, tenant)` | Atualiza delivery/read de mensagem externa |\n\n---\n\n## Engine de DistribuiГ§ГЈo\n\n### Arquivo: `apps/inbox/distribution.py`\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `verificar_horario_atendimento(tenant)` | Checa HorarioAtendimento para dia/hora atual. Sem registros = sempre aberto |\n| `determinar_fila(conversa, tenant)` | Itera RegraRoteamento por prioridade. Match por canal, etiqueta ou horГЎrio |\n| `selecionar_agente(fila, tenant)` | Round-robin (circular via ultimo_agente_id) ou menor carga (menos conversas abertas). Verifica status=online e capacidade |\n| `distribuir_conversa(conversa, tenant)` | Orquestrador: fila вҶ’ agente вҶ’ atribui вҶ’ mensagem de sistema |\n\n### IntegraГ§ГЈo\n\nChamado automaticamente em `receber_mensagem()` e `receber_mensagem_widget()` quando nova conversa Г© criada. TambГ©m chamado em `transferir_conversa()` quando destino Г© equipe/fila.\n\n---\n\n## APIs\n\n### API Webhook (N8N / Externos)\n\nAutenticaГ§ГЈo: `APITokenAuthentication` (Bearer token). Arquivo: `apps/inbox/views_n8n.py`\n\n| URL | MГ©todo | DescriГ§ГЈo |\n|-----|--------|-----------|\n| `/api/v1/n8n/inbox/mensagem-recebida/` | POST | Recebe mensagem de contato (WhatsApp) |\n| `/api/v1/n8n/inbox/status-mensagem/` | POST | Callback de delivery/leitura |\n\n### APIs Internas (Painel)\n\nProtegidas por `@login_required`. Arquivo: `apps/inbox/views.py`\n\n| URL | MГ©todo | DescriГ§ГЈo |\n|-----|--------|-----------|\n| `/inbox/` | GET | Inbox three-panel |\n| `/inbox/dashboard/` | GET | Dashboard de mГ©tricas |\n| `/inbox/configuracoes/` | GET/POST | ConfiguraГ§Гөes (equipes, filas, FAQ, widget, etc.) |\n| `/inbox/api/conversas/` | GET | Lista com filtros (status, agente, canal, busca) |\n| `/inbox/api/conversas/<pk>/` | GET | Detalhe com contexto (lead, CRM, notas) |\n| `/inbox/api/conversas/<pk>/mensagens/` | GET | Mensagens paginadas |\n| `/inbox/api/conversas/<pk>/enviar/` | POST | Agente envia mensagem |\n| `/inbox/api/conversas/<pk>/atribuir/` | POST | Atribuir agente |\n| `/inbox/api/conversas/<pk>/resolver/` | POST | Resolver conversa |\n| `/inbox/api/conversas/<pk>/reabrir/` | POST | Reabrir conversa |\n| `/inbox/api/conversas/<pk>/transferir/` | POST | Transferir para agente/equipe/fila |\n| `/inbox/api/conversas/<pk>/ticket/` | POST | Criar ticket de suporte |\n| `/inbox/api/conversas/<pk>/etiquetas/` | POST | Atualizar etiquetas |\n| `/inbox/api/conversas/<pk>/notas/` | POST | Adicionar nota interna |\n| `/inbox/api/agente/status/` | POST | Atualizar status do agente (online/ausente/offline) |\n| `/inbox/api/respostas-rapidas/` | GET | Listar respostas rГЎpidas |\n| `/inbox/api/etiquetas/` | GET | Listar etiquetas |\n\n### API PГәblica (Widget вҖ” sem login)\n\nAutenticaГ§ГЈo: `token` pГәblico UUID no query param. CORS manual. Arquivo: `apps/inbox/views_public.py`\n\n| URL | MГ©todo | DescriГ§ГЈo |\n|-----|--------|-----------|\n| `/api/public/widget/config/?token=X` | GET | Config do widget + categorias FAQ |\n| `/api/public/widget/faq/?token=X&categoria=slug` | GET | Artigos de uma categoria |\n| `/api/public/widget/faq/buscar/?token=X&q=texto` | GET | Busca artigos por tГӯtulo/conteГәdo |\n| `/api/public/widget/conversa/iniciar/` | POST | Inicia conversa (visitor_id, nome, email, mensagem) |\n| `/api/public/widget/conversa/<id>/mensagens/?token=X&visitor_id=Y` | GET | Mensagens da conversa |\n| `/api/public/widget/conversa/<id>/enviar/` | POST | Visitante envia mensagem |\n| `/api/public/widget/conversas/?token=X&visitor_id=Y` | GET | Lista conversas do visitante |\n\n**SeguranГ§a:** `@csrf_exempt`, validaГ§ГЈo de Origin contra `dominios_permitidos`, nГЈo expГөe notas internas, sobrenome do agente, dados do lead ou mensagens de sistema de atribuiГ§ГЈo.\n\n---\n\n## WebSocket (Tempo Real)\n\n### Consumer: `InboxConsumer` em `apps/inbox/consumers.py`\n\n| Group | Formato | Quem entra |\n|-------|---------|------------|\n| Tenant | `inbox_tenant_{tenant_id}` | Todos os agentes do tenant |\n| UsuГЎrio | `inbox_user_{user_id}` | Agente especГӯfico |\n| Conversa | `inbox_conversa_{conversa_id}` | Agentes com chat aberto |\n\n| Action (cliente вҶ’ servidor) | O que faz |\n|------------------------------|-----------|\n| `join_conversa` | Entra no group da conversa |\n| `leave_conversa` | Sai do group |\n| `typing` | Broadcast typing indicator |\n| `set_status` | Atualiza status (online/ausente/offline) |\n| `mark_read` | Marca mensagens como lidas |\n\nAuto-offline no `disconnect()`. Fallback para polling 5s quando WS nГЈo disponГӯvel.\n\n---\n\n## IntegraГ§ГЈo com AutomaГ§Гөes\n\n### Arquivo: `apps/inbox/signals.py`\n\n| Signal | Evento disparado |\n|--------|------------------|\n| `on_conversa_criada` (Conversa created) | `conversa_aberta` |\n| `on_mensagem_recebida` (Mensagem created, remetente=contato) | `mensagem_recebida` |\n| `on_conversa_resolvida` (Conversa status=resolvida) | `conversa_resolvida` |\n\n---\n\n## Chat Widget (Embeddable)\n\n### Arquivo: `apps/inbox/static/inbox/widget/aurora-chat.js`\n\nJS vanilla, self-contained (~15KB), zero dependГӘncias. Embed:\n\n```html\n<script src=\"https://app.auroraisp.com/static/inbox/widget/aurora-chat.js\"\n        data-token=\"<token-do-tenant>\"><\/script>\n```\n\n### Interface (3 abas)\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ вң•                               в”Ӯ\nв”Ӯ                                 в”Ӯ\nв”Ӯ  OlГЎ рҹ‘Ӣ                        в”Ӯ  вҶҗ Header com gradiente (cor_header)\nв”Ӯ  Como podemos ajudar?           в”Ӯ\nв”Ӯ                                 в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                 в”Ӯ\nв”Ӯ  [Envie uma mensagem      вҶ’]   в”Ӯ  вҶҗ CTA para abrir chat\nв”Ӯ                                 в”Ӯ\nв”Ӯ  Qual Г© a sua dГәvida?    рҹ”Қ    в”Ӯ  вҶҗ Busca FAQ\nв”Ӯ                                 в”Ӯ\nв”Ӯ  Planos e PreГ§os           вҶ’   в”Ӯ  вҶҗ Categorias FAQ\nв”Ӯ  Suporte TГ©cnico           вҶ’   в”Ӯ\nв”Ӯ  Financeiro                вҶ’   в”Ӯ\nв”Ӯ                                 в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  рҹҸ  InГӯcio  рҹ’¬ Mensagens  вқ“ Ajuda в”Ӯ  вҶҗ 3 abas\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n### Funcionalidades\n\n- **BotГЈo flutuante** (bottom-right/left, cor configurГЎvel)\n- **Aba InГӯcio:** saudaГ§ГЈo + CTA + busca FAQ + categorias com artigos\n- **Aba Mensagens:** lista de conversas do visitante, chat com bolhas, formulГЎrio de dados (nome/email/telefone) antes do primeiro contato (configurГЎvel)\n- **Aba Ajuda:** browser de FAQ por categoria + busca\n- **Visitor ID:** UUID em localStorage para continuidade entre sessГөes\n- **Polling 5s** para novas mensagens\n- **Responsivo:** full-screen em telas < 480px\n- **Isolamento CSS:** classes prefixadas `.aw-*`\n\n### ConfiguraГ§ГЈo via painel\n\nEm `/inbox/configuracoes/` aba \"Widget\":\n- TГӯtulo, mensagem de boas vindas\n- Cores (primГЎria + header)\n- PosiГ§ГЈo (inferior direito/esquerdo)\n- Mostrar FAQ, pedir dados antes do chat\n- Campos obrigatГіrios (nome, email, telefone)\n- DomГӯnios permitidos (CORS)\n- CГіdigo embed para copiar\n\n---\n\n## Dashboard de MГ©tricas\n\n### URL: `/inbox/dashboard/`\n\n| SeГ§ГЈo | Dados |\n|-------|-------|\n| **KPIs** (5 cards) | Abertas, Pendentes, Resolvidas hoje, Tempo mГ©dio 1ВӘ resposta, Total conversas |\n| **GrГЎfico** | Linha: volume nos Гәltimos 30 dias (Chart.js) |\n| **Por Canal** | Tabela com volume por canal |\n| **Por Equipe** | Volume por equipe com badges coloridos |\n| **Ranking Agentes** | Top 15 agentes: resolvidas (30d) + tempo mГ©dio |\n\n---\n\n## PГЎgina de ConfiguraГ§Гөes\n\n### URL: `/inbox/configuracoes/`\n\n9 abas:\n\n| Aba | O que configura |\n|-----|-----------------|\n| **Equipes** | CRUD equipes + adicionar/remover membros (cargo: agente/supervisor/gerente) |\n| **Filas** | CRUD filas (round-robin/menor carga/manual) + regras de roteamento (por canal/etiqueta/horГЎrio) |\n| **Respostas RГЎpidas** | CRUD templates com atalhos (ex: `/ola`) |\n| **Etiquetas** | CRUD labels com cores |\n| **Canais** | Configurar webhook de envio por canal |\n| **HorГЎrio** | Dias/horas de atendimento (segunda a domingo) |\n| **FAQ** | CRUD categorias + artigos (tГӯtulo + conteГәdo) |\n| **Widget** | Config visual + campos + domГӯnios + cГіdigo embed |\n| **Geral** | DistribuiГ§ГЈo padrГЈo, auto-atribuir ao responder, mensagem fora do horГЎrio |\n\n---\n\n## NavegaГ§ГЈo (Sidebar)\n\n```\nATENDIMENTO\n  рҹ’¬ Inbox              вҶҗ /inbox/ (three-panel, full-bleed)\n  рҹ“Ҡ Dashboard Inbox    вҶҗ /inbox/dashboard/\n\nSUPORTE\n  рҹ“Ҡ Dashboard          вҶҗ /suporte/\n  рҹ“Ӣ Tickets            вҶҗ /suporte/tickets/\n  вһ• Novo Ticket        вҶҗ /suporte/tickets/criar/\n\nCONFIGURAГҮГ•ES\n  вҡҷпёҸ ConfiguraГ§Гөes      вҶҗ /inbox/configuracoes/\n```\n\n---\n\n## Management Command\n\n```bash\n# Seed dados de teste (qualquer tenant)\npython manage.py seed_inbox --tenant=aurora-hq --settings=gerenciador_vendas.settings_local\n```\n\nCria: 2 canais, 5 etiquetas, 5 respostas rГЎpidas, 7 conversas com 29 mensagens.\n\n---\n\n## Estrutura de Arquivos\n\n```\napps/inbox/\nв”ңв”Җв”Җ __init__.py\nв”ңв”Җв”Җ apps.py                          # AppConfig com ready() вҶ’ importa signals\nв”ңв”Җв”Җ models.py                        # 17 models\nв”ңв”Җв”Җ services.py                      # LГіgica de negГіcio (receber, enviar, transferir, etc.)\nв”ңв”Җв”Җ distribution.py                  # Engine de distribuiГ§ГЈo (fila, round-robin, menor carga)\nв”ңв”Җв”Җ serializers.py                   # DRF serializers (input/output)\nв”ңв”Җв”Җ widget_auth.py                   # Decorator @widget_token_required + CORS\nв”ңв”Җв”Җ views.py                         # View principal + APIs internas + config + dashboard\nв”ңв”Җв”Җ views_n8n.py                     # 2 endpoints webhook (mensagem recebida, status)\nв”ңв”Җв”Җ views_public.py                  # 7 endpoints pГәblicos do widget (sem login)\nв”ңв”Җв”Җ urls.py                          # Rotas internas (app_name = 'inbox')\nв”ңв”Җв”Җ urls_public.py                   # Rotas pГәblicas do widget\nв”ңв”Җв”Җ signals.py                       # 3 signals вҶ’ engine de automaГ§Гөes\nв”ңв”Җв”Җ consumers.py                     # WebSocket consumer (InboxConsumer)\nв”ңв”Җв”Җ routing.py                       # WebSocket URL routing\nв”ңв”Җв”Җ admin.py                         # Admin para todos os 17 models\nв”ңв”Җв”Җ migrations/\nв”Ӯ   в”ңв”Җв”Җ 0001_initial.py              # Core: 6 models\nв”Ӯ   в”ңв”Җв”Җ 0002_*.py                    # Equipes, filas, distribuiГ§ГЈo: 8 models + 2 FKs\nв”Ӯ   в””в”Җв”Җ 0003_*.py                    # FAQ + WidgetConfig: 3 models\nв”ңв”Җв”Җ management/commands/\nв”Ӯ   в””в”Җв”Җ seed_inbox.py                # Seed de dados de teste\nв”ңв”Җв”Җ templates/inbox/\nв”Ӯ   в”ңв”Җв”Җ inbox.html                   # Three-panel chat\nв”Ӯ   в”ңв”Җв”Җ configuracoes_inbox.html     # 9 abas de configuraГ§ГЈo\nв”Ӯ   в””в”Җв”Җ dashboard_inbox.html         # Dashboard com Chart.js\nв””в”Җв”Җ static/inbox/\n    в”ңв”Җв”Җ css/inbox.css                # Estilos do painel\n    в”ңв”Җв”Җ js/inbox.js                  # JS do painel (fetch, polling, WebSocket)\n    в””в”Җв”Җ widget/aurora-chat.js        # Widget embeddable (vanilla JS, ~15KB)\n```\n\n---\n\n## LimitaГ§Гөes Conhecidas\n\n1. **Sem Celery:** envio de webhook Г© sГӯncrono (background thread)\n2. **N8N nГЈo configurado:** API webhook funciona, mas nenhum workflow WhatsApp conectado\n3. **InMemoryChannelLayer em dev:** WebSocket funciona sГі em processo Гәnico. ProduГ§ГЈo precisa Redis\n4. **Sem upload de arquivos:** campo `arquivo_url` espera URL externa\n5. **Widget sem WebSocket:** usa polling 5s. WebSocket para visitantes Г© enhancement futuro\n6. **Sem CSAT:** pesquisa de satisfaГ§ГЈo pГіs-conversa nГЈo implementada\n\n---\n\n## Deploy em ProduГ§ГЈo (checklist)\n\n1. **Redis:** configurar `CHANNEL_LAYERS` com `RedisChannelLayer`\n2. **Daphne:** adicionar `'daphne'` ao INSTALLED_APPS\n3. **Nginx:** proxy `/ws/` вҶ’ Daphne, resto вҶ’ Gunicorn\n4. **N8N:** workflow WhatsApp вҶ’ POST `/api/v1/n8n/inbox/mensagem-recebida/`\n5. **CanalInbox:** criar canal WhatsApp no admin com `webhook_envio_url`\n6. **Token:** `N8N_API_TOKEN` no `.env`\n7. **Widget:** configurar domГӯnios permitidos em `/inbox/configuracoes/` aba Widget\n8. **Migrate:** `python manage.py migrate inbox`\n"}, {"t": "f", "n": "07 Modulo Comercial", "fn": "07-MODULO_COMERCIAL.md", "c": "# MГіdulo Comercial вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 04/04/2026\n**Status:** вң… Em produГ§ГЈo\n**LocalizaГ§ГЈo:** `apps/comercial/`\n\n---\n\n## VisГЈo Geral\n\nO mГіdulo Comercial cobre todo o funil de vendas do provedor: da captaГ§ГЈo do lead atГ© o contrato ativado no HubSoft. Гү composto por 5 sub-apps independentes que se integram via ForeignKeys e signals.\n\n```\nLead chega (WhatsApp/Site/Instagram)\n    в”Ӯ   \n    в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  LEADS  в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ ATENDIMENTO  в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ CADASTRO в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ VIABILIDADE  в”Ӯ\nв”Ӯ Captura в”Ӯ     в”Ӯ Bot N8N      в”Ӯ     в”Ӯ Registro в”Ӯ     в”Ӯ Cobertura    в”Ӯ\nв””в”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n     в”Ӯ\n     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ   CRM   в”Ӯ  Pipeline Kanban, Tarefas, Metas, Segmentos, RetenГ§ГЈo\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, DRF, PostgreSQL\n\n---\n\n## 1. Leads (`apps/comercial/leads/`)\n\n### O que faz\nCaptura, armazena e qualifica leads de qualquer canal (WhatsApp, site, Instagram, Facebook, telefone). Gerencia documentos (selfie, RG frente/verso) e histГіrico de contatos do bot.\n\n### Models (4)\n\n#### LeadProspecto\nTabela: `leads_prospectos` | 60+ campos\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **IdentificaГ§ГЈo** | nome_razaosocial, email (unique), telefone (validado, regex), cpf_cnpj, rg, data_nascimento |\n| **EndereГ§o** | rua, numero_residencia, bairro, cidade, estado, cep, ponto_referencia |\n| **Comercial** | valor (DecimalField 12,2), origem (site/facebook/instagram/google/whatsapp/indicacao/telefone/email/outros), score_qualificacao (1-10), empresa |\n| **Status** | status_api (pendente/processado/erro/sucesso/rejeitado/aguardando_retry), ativo |\n| **DocumentaГ§ГЈo** | documentacao_completa, documentacao_validada, contrato_aceito, anexos_contrato_enviados, ip_aceite_contrato |\n| **Conversas** | url_pdf_conversa, html_conversa_path, data_geracao_pdf, data_geracao_html |\n| **Contato** | tentativas_contato, data_ultimo_contato, motivo_rejeicao, canal_entrada, tipo_entrada |\n| **Campanhas** | campanha_origem FK, campanha_conversao FK, total_campanhas_detectadas, metadata_campanhas (JSON) |\n| **IDs externos** | id_hubsoft, id_origem, id_origem_servico, id_plano_rp, id_dia_vencimento, id_vendedor_rp |\n\n**14 Гӯndices** incluindo compostos: `(canal_entrada, data_cadastro)`, `(score_qualificacao, status_api)`, `(tipo_entrada, ativo)`\n\n**MГ©todos principais:**\n- `calcular_score_qualificacao()` вҶ’ score 1-10 baseado em dados preenchidos\n- `validar_documentacao_completa()` вҶ’ verifica selfie + doc_frente + doc_verso\n- `aceitar_contrato(ip_address)` вҶ’ marca contrato aceito com IP e timestamp\n- `gerar_url_pdf()` вҶ’ gera URL do PDF da conversa\n- `get_historico_contatos_relacionados()` вҶ’ contatos por lead ou telefone\n- `get_taxa_sucesso_contatos()` вҶ’ % de contatos bem-sucedidos\n- `get_documentos_por_tipo()` вҶ’ organiza documentos por tipo\n\n#### ImagemLeadProspecto\nTabela: `imagens_lead_prospecto`\n\nArmazena URLs de imagens externas (documentos do lead). Status: pendente, documentos_validos, documentos_rejeitados.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead pai |\n| `link_url` | URLField(1024) | URL da imagem |\n| `descricao` | CharField(255) | DescriГ§ГЈo |\n| `status_validacao` | CharField(30) | pendente/documentos_validos/documentos_rejeitados |\n| `observacao_validacao` | TextField | ObservaГ§Гөes |\n| `validado_por` | CharField(150) | Username do validador |\n\n#### Prospecto\nTabela: `prospectos`\n\nRepresenta o prospecto no HubSoft. Vinculado ao lead via FK. Controla o processamento de envio para o ERP.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead pai (opcional) |\n| `nome_prospecto` | CharField(255) | Nome |\n| `id_prospecto_hubsoft` | CharField(100, unique) | ID no HubSoft |\n| `status` | CharField(20) | pendente/processando/processado/erro/finalizado/cancelado/aguardando_validacao/validacao_aprovada/validacao_rejeitada |\n| `tentativas_processamento` | PositiveInteger | Tentativas |\n| `tempo_processamento` | Decimal(10,3) | Tempo em segundos |\n| `dados_processamento` / `resultado_processamento` | JSONField | Input/output do processamento |\n| `score_conversao` | Decimal(5,2) | Score 0-100 de probabilidade de conversГЈo |\n\n**MГ©todos:** `iniciar_processamento()`, `finalizar_processamento()`, `calcular_score_conversao_automatico()`\n\n#### HistoricoContato\nTabela: `historico_contato`\n\nRegistra cada interaГ§ГЈo do bot ou agente com o contato. Usado para funil de conversГЈo e mГ©tricas.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead (opcional) |\n| `telefone` | CharField(17) | Telefone do contato |\n| `status` | CharField(30) | 14 status possГӯveis (fluxo_inicializado, venda_confirmada, etc.) |\n| `duracao_segundos` | PositiveInteger | DuraГ§ГЈo da chamada |\n| `transcricao` | TextField | TranscriГ§ГЈo |\n| `sucesso` | BooleanField | Se o contato foi bem-sucedido |\n| `converteu_lead` / `converteu_venda` | BooleanField | Flags de conversГЈo |\n| `valor_venda` | Decimal(12,2) | Valor da venda (se converteu) |\n| `protocolo_atendimento` / `codigo_atendimento` | CharField(100) | IDs do atendimento |\n| `id_conta` / `numero_conta` | CharField(100) | IDs da conta no ERP |\n\n**15 Гӯndices** para performance em relatГіrios de funil.\n\n### APIs (20 endpoints)\n\n| Grupo | Endpoints | Auth |\n|-------|-----------|------|\n| **Lead CRUD** | registrar, atualizar, consultar | @api_token_required |\n| **Imagens** | registrar, listar, deletar, validar, por-cliente | @api_token_required |\n| **Prospectos** | registrar, atualizar | @api_token_required |\n| **HistГіrico** | registrar, atualizar, consultar | @api_token_required |\n| **Vendas** | aprovar, rejeitar | @api_token_required |\n| **Consulta** | leads (paginado), histГіricos (paginado) | PГәblico |\n| **PГЎgina** | leads (lista no painel) | @login_required |\n\n### Signals (2)\n\n1. **relate_prospecto_when_lead_has_hubsoft** вҖ” Quando lead salvo com id_hubsoft, vincula prospectos com mesmo id_prospecto_hubsoft\n2. **relate_lead_when_prospecto_has_hubsoft** вҖ” Quando prospecto salvo com id_prospecto_hubsoft sem lead, vincula ao lead\n\n### Template\n\n`leads.html` вҖ” PГЎgina de gestГЈo de leads com filtros (origem, status, ativo), cards de estatГӯsticas (total, valor, erros, hoje, semana), tabela com aГ§Гөes.\n\n---\n\n## 2. Atendimento (`apps/comercial/atendimento/`)\n\n### O que faz\nMotor de fluxos automatizados (bot conversacional). Define fluxos com questГөes sequenciais que o N8N executa via WhatsApp. Suporta validaГ§ГЈo IA, roteamento inteligente, opГ§Гөes dinГўmicas e webhooks N8N.\n\n### Models (5)\n\n#### FluxoAtendimento\nTabela: `fluxos_atendimento`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(255) | Nome do fluxo |\n| `tipo_fluxo` | CharField | qualificacao/vendas/suporte/onboarding/pesquisa/customizado |\n| `status` | CharField | ativo/inativo/rascunho/teste |\n| `max_tentativas` | PositiveInteger(3) | MГЎximo de tentativas por questГЈo |\n| `tempo_limite_minutos` | PositiveInteger | Tempo limite do atendimento |\n| `permite_pular_questoes` | BooleanField(False) | Permite pular |\n\n**MГ©todos:** `get_questoes_ordenadas()`, `get_estatisticas()`, `pode_ser_usado()`\n\n#### QuestaoFluxo\nTabela: `questoes_fluxo` | Unique: (fluxo, indice)\n\nCampo mais complexo do sistema. 20+ tipos de questГЈo, validaГ§ГЈo IA, roteamento inteligente.\n\n| Grupo | Campos |\n|-------|--------|\n| **BГЎsico** | titulo, descricao, indice (ordem), ativo |\n| **Tipo** | tipo_questao (20 choices: texto, numero, email, cpf_cnpj, cep, select, multiselect, boolean, escala, planos_internet, vencimentos, ia_validacao, condicional_complexa...) |\n| **ValidaГ§ГЈo** | tipo_validacao (obrigatoria/opcional/condicional/ia_assistida/validacao_customizada), regex_validacao, tamanho_minimo/maximo, valor_minimo/maximo |\n| **DependГӘncias** | questao_dependencia (self FK), valor_dependencia |\n| **Roteamento** | roteamento_respostas (JSON), questao_padrao_proxima (self FK) |\n| **IA** | prompt_ia_validacao, criterios_ia (JSON) |\n| **Erro** | max_tentativas, estrategia_erro (repetir/pular/redirecionar/finalizar/escalar_humano), mensagem_erro_padrao |\n| **N8N** | webhook_n8n_validacao, webhook_n8n_pos_resposta (URLs) |\n| **OpГ§Гөes dinГўmicas** | opcoes_dinamicas_fonte (planos_internet/opcoes_vencimento/api_externa/query_customizada), query_opcoes_dinamicas |\n| **Template** | variaveis_contexto (JSON), template_questao |\n\n**MГ©todos:** `validar_resposta()`, `get_proxima_questao_inteligente()`, `deve_ser_exibida()`, `aplicar_estrategia_erro()`\n\n#### AtendimentoFluxo\nTabela: `atendimentos_fluxo`\n\nControla uma sessГЈo de atendimento. Liga lead + fluxo + progresso.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead atendido |\n| `fluxo` | FK FluxoAtendimento | Fluxo usado |\n| `status` | CharField | iniciado/em_andamento/pausado/completado/abandonado/erro/cancelado/aguardando_validacao/validado/rejeitado |\n| `questao_atual` / `total_questoes` / `questoes_respondidas` | Inteiros | Progresso |\n| `dados_respostas` | JSONField | Todas as respostas |\n| `score_qualificacao` | Integer(1-10) | Score calculado |\n| `resultado_final` | JSONField | Resultado do atendimento |\n\n**MГ©todos:** `responder_questao_inteligente()`, `avancar_questao()`, `finalizar_atendimento()`, `calcular_score_qualificacao()`\n\n#### RespostaQuestao e TentativaResposta\nArmazenam respostas individuais e tentativas (com resultado IA, webhook, confianГ§a).\n\n### APIs (34 endpoints)\n\n| Grupo | Endpoints | DescriГ§ГЈo |\n|-------|-----------|-----------|\n| **CRUD Fluxos** | 4 (GET/POST/PUT/DELETE) | Gerenciar fluxos |\n| **CRUD QuestГөes** | 4 (GET/POST/PUT/DELETE) | Gerenciar questГөes |\n| **Atendimentos** | 5 (GET/POST/PUT/responder/finalizar) | Operar atendimentos |\n| **N8N** | 14 endpoints dedicados | iniciar, consultar, responder, avanГ§ar, finalizar, pausar, retomar, buscar lead, criar lead, listar fluxos, obter questГЈo, tentativas, estatГӯsticas inteligentes |\n| **Config** | 5 (fluxos/questГөes CRUD + duplicar) | Configurar via painel |\n| **Legacy** | 4 endpoints de compatibilidade | Rotas antigas |\n\n### Services\n\n`atendimento_service.py` вҖ” Busca dados de atendimento da API Matrix, gera HTML formatado da conversa, salva em disco.\n\n### Templates (2)\n\n- `fluxos.html` вҖ” Grid de cards dos fluxos (nome, tipo, status, stats)\n- `questoes.html` вҖ” Gerenciamento de questГөes por fluxo\n\n---\n\n## 3. Cadastro (`apps/comercial/cadastro/`)\n\n### O que faz\nPГЎgina pГәblica de auto-cadastro para o site do provedor. O visitante preenche dados pessoais, endereГ§o, seleciona plano/vencimento, envia documentos e aceita contrato. Gera lead automaticamente.\n\n### Models (5)\n\n#### ConfiguracaoCadastro\nTabela: `configuracoes_cadastro` | Singleton por tenant\n\nConfiguraГ§ГЈo completa da landing page de cadastro. 40+ campos.\n\n| Grupo | Campos |\n|-------|--------|\n| **Visual** | empresa, titulo_pagina, subtitulo_pagina, logo_url, background_type (gradient/solid/image), cores (primary, secondary, success, error) |\n| **Contato** | telefone_suporte, whatsapp_suporte, email_suporte |\n| **Planos** | mostrar_selecao_plano, plano_padrao FK |\n| **Campos** | cpf_obrigatorio, email_obrigatorio, telefone_obrigatorio, endereco_obrigatorio |\n| **ValidaГ§Гөes** | validar_cep (ViaCEP), validar_cpf |\n| **DocumentaГ§ГЈo** | solicitar_documentacao, texto_instrucao_selfie/doc_frente/doc_verso, tamanho_max_arquivo_mb, formatos_aceitos |\n| **Contrato** | exibir_contrato, titulo_contrato, texto_contrato, tempo_minimo_leitura_segundos, texto_aceite_contrato |\n| **Fluxo** | criar_lead_automatico, numero_etapas, mostrar_progress_bar |\n| **IntegraГ§ГЈo** | id_origem, id_origem_servico, id_vendedor (IDs externos), origem_lead_padrao |\n| **Mensagens** | mensagem_sucesso, instrucoes_pos_cadastro |\n| **SeguranГ§a** | captcha_obrigatorio, limite_tentativas_dia |\n\n#### PlanoInternet\nTabela: `planos_internet`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(100) | Ex: \"Fibra 400MB\" |\n| `velocidade_download` / `velocidade_upload` | PositiveInteger | Mbps |\n| `valor_mensal` | Decimal(8,2) | PreГ§o mensal |\n| `wifi_6` / `suporte_prioritario` / `suporte_24h` / `upload_simetrico` | BooleanField | Features |\n| `destaque` | CharField | popular/premium/economico/recomendado (badge) |\n| `ordem_exibicao` | PositiveInteger | Ordem na lista |\n| `id_sistema_externo` | CharField(50) | ID no ERP |\n\n**MГ©todos:** `get_valor_formatado()` вҶ’ \"R$ 99,90\", `get_velocidade_formatada()` вҶ’ \"400MB\" ou \"1GB\"\n\n#### OpcaoVencimento\nTabela: `opcoes_vencimento`\n\nDias de vencimento disponГӯveis (ex: dia 5, dia 10, dia 20).\n\n#### DocumentoLead\nTabela: `documentos_lead`\n\nDocumentos enviados durante o cadastro. Base64 encoded.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead |\n| `tipo_documento` | CharField | selfie/doc_frente/doc_verso/comprovante_residencia/contrato_assinado/outro |\n| `arquivo_base64` | TextField | Imagem em base64 |\n| `status` | CharField | pendente/aprovado/rejeitado/em_analise |\n| `nome_arquivo` / `tamanho_arquivo` / `formato_arquivo` | Metadados | Info do arquivo |\n\n#### CadastroCliente\nTabela: `cadastros_clientes`\n\nRegistra cada sessГЈo de cadastro (mesmo incompleto). Status em 8 etapas.\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| **Pessoal** | nome_completo, cpf, rg, email, telefone, data_nascimento |\n| **EndereГ§o** | cep, endereco, numero, bairro, cidade, estado |\n| **Comercial** | plano_selecionado FK, vencimento_selecionado FK |\n| **Status** | status (iniciado/dados_pessoais/endereco/documentacao/contrato/finalizado/erro/cancelado) |\n| **Auditoria** | ip_cliente, user_agent, origem_cadastro, tempo_total_cadastro, tentativas_etapa (JSON), erros_validacao (JSON) |\n| **Contrato** | contrato_aceito, tempo_leitura_contrato, ip_aceite_contrato |\n\n**MГ©todos:** `finalizar_cadastro()`, `gerar_lead()`, `get_progresso_percentual()`, `validar_dados_pessoais()`, `validar_endereco()`\n\n### APIs (12 endpoints)\n\n| Grupo | Endpoints | DescriГ§ГЈo |\n|-------|-----------|-----------|\n| **PГәblico** | cadastro/cliente (POST), planos (GET), vencimentos (GET), cep (GET) | Auto-cadastro + consultas |\n| **Config** | 3 pГЎginas + 3 APIs CRUD | Gerenciar config, planos, vencimentos |\n\n### Consulta CEP\n\nMulti-source com fallback automГЎtico: ViaCEP вҶ’ CepAPI вҶ’ BrasilAPI вҶ’ Postmon вҶ’ OpenCEP. Primeira resposta vГЎlida retorna. Inclui headers CORS.\n\n### Templates (4)\n\n- `cadastro.html` вҖ” Landing page pГәblica de auto-cadastro (multi-step form)\n- `configuracoes/cadastro.html` вҖ” Config da landing page\n- `configuracoes/planos.html` вҖ” CRUD de planos\n- `configuracoes/vencimentos.html` вҖ” CRUD de vencimentos\n\n---\n\n## 4. Viabilidade (`apps/comercial/viabilidade/`)\n\n### O que faz\nVerifica se o provedor tem cobertura tГ©cnica (fibra Гіptica) na regiГЈo do cliente. Consultado durante o cadastro e pelo bot de atendimento.\n\n### Model (1)\n\n#### CidadeViabilidade\nTabela: auto-gerada\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `cidade` | CharField(120) | Nome da cidade |\n| `estado` | CharField(2) | UF (27 estados brasileiros) |\n| `cep` | CharField(9) | CEP especГӯfico (opcional, regex `^\\d{5}-?\\d{3}$`) |\n| `bairro` | CharField(120) | Bairro (opcional) |\n| `observacao` | TextField | InformaГ§Гөes sobre a regiГЈo |\n| `ativo` | BooleanField | Status |\n\nSe `cep` nГЈo informado, a cidade inteira Г© considerada viГЎvel. `save()` normaliza CEP (insere hГӯfen) e capitaliza nome da cidade.\n\n### API (1 endpoint)\n\n`GET /api/viabilidade/?cep=64000000` ou `?cidade=Teresina&uf=PI`\n\n**LГіgica de busca por CEP:**\n1. Busca direta no banco por CEP exato\n2. Consulta ViaCEP para descobrir cidade/estado do CEP\n3. Busca cidade na lista de viabilidade\n4. Retorna `viavel_pelo_cep` e/ou `viavel_pela_cidade`\n\n### Template\n\nNenhum. MГіdulo Г© API-only.\n\n---\n\n## 5. CRM (`apps/comercial/crm/`)\n\n### O que faz\nCRM Kanban completo para gestГЈo do funil de vendas. Pipeline visual com drag-and-drop, tarefas, metas, segmentos dinГўmicos, retenГ§ГЈo/churn e integraГ§ГЈo com automaГ§Гөes e HubSoft.\n\n**DisponГӯvel apenas no plano Pro.**\n\n### Models (13)\n\n#### Pipeline e EstГЎgios\n\n**Pipeline** вҖ” Tabela: `crm_pipelines`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` / `slug` | CharField/Slug | IdentificaГ§ГЈo |\n| `tipo` | CharField | vendas/suporte/onboarding/custom |\n| `cor_hex` / `icone_fa` | Char | Visual |\n| `padrao` | BooleanField | Pipeline padrГЈo para auto-criaГ§ГЈo |\n\n**PipelineEstagio** вҖ” Tabela: `crm_pipeline_estagios`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `pipeline` | FK Pipeline | Pipeline pai |\n| `nome` / `slug` / `ordem` | IdentificaГ§ГЈo | Ordem no Kanban |\n| `tipo` | CharField | novo/qualificacao/negociacao/fechamento/cliente/retencao/perdido |\n| `is_final_ganho` / `is_final_perdido` | BooleanField | Flags de encerramento |\n| `probabilidade_padrao` | Integer(50) | % padrГЈo de probabilidade |\n| `sla_horas` | PositiveInteger | SLA em horas |\n\n#### Oportunidade de Venda\n\n**OportunidadeVenda** вҖ” Tabela: `crm_oportunidades`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `pipeline` | FK Pipeline | Pipeline |\n| `lead` | OneToOne LeadProspecto | Lead (1:1) |\n| `estagio` | FK PipelineEstagio | EstГЎgio atual |\n| `responsavel` | FK User | Vendedor responsГЎvel |\n| `titulo` | CharField(255) | TГӯtulo da oportunidade |\n| `valor_estimado` | Decimal(12,2) | Valor estimado |\n| `probabilidade` | Integer(50) | % de probabilidade |\n| `prioridade` | CharField | baixa/normal/alta/urgente |\n| `tags` | M2M TagCRM | Tags visuais |\n| `plano_interesse` | FK PlanoInternet | Plano de interesse |\n| `origem_crm` | CharField | automatico/manual/importacao |\n| `data_entrada_estagio` | DateTime | Para cГЎlculo de SLA |\n| `motivo_perda` / `concorrente_perdido` | Text/Char | Se perdeu |\n| `contrato_hubsoft_id` | CharField(100) | ID do contrato no HubSoft |\n| `churn_risk_score` | Integer(0-100) | Score de risco de churn |\n\n**Propriedades:** `dias_no_estagio`, `sla_vencido`\n**ГҚndices:** (estagio, ativo), (responsavel, estagio), (data_fechamento_previsto), (churn_risk_score)\n\n**HistoricoPipelineEstagio** вҖ” Tabela: `crm_historico_estagio`\n\nLog de cada movimentaГ§ГЈo de estГЎgio: oportunidade, estГЎgio anterior/novo, movido_por, motivo, tempo_no_estagio_horas.\n\n#### Tarefas e Notas\n\n**TarefaCRM** вҖ” Tabela: `crm_tarefas`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `oportunidade` / `lead` | FK | Vinculado a oportunidade ou lead |\n| `responsavel` | FK User | Quem deve executar |\n| `tipo` | CharField | ligacao/whatsapp/email/visita/followup/proposta/instalacao/suporte/outro |\n| `titulo` / `descricao` | Char/Text | DescriГ§ГЈo |\n| `status` | CharField | pendente/em_andamento/concluida/cancelada/vencida |\n| `prioridade` | CharField | baixa/normal/alta/urgente |\n| `data_vencimento` | DateTime | Prazo |\n| `lembrete_em` | DateTime | Lembrete automГЎtico |\n\n`save()` auto-marca como `vencida` se prazo venceu.\n\n**NotaInterna** вҖ” Tabela: `crm_notas_internas`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `oportunidade` / `lead` | FK | Contexto |\n| `autor` | FK User | Quem escreveu |\n| `mencoes` | M2M User | MenГ§Гөes (@usuario) |\n| `conteudo` | TextField | Texto |\n| `tipo` | CharField | geral/reuniao/ligacao/email/importante/alerta |\n| `is_fixada` | BooleanField | Fixada no topo |\n\n#### Equipes e Perfis\n\n**EquipeVendas** вҖ” Tabela: `crm_equipes`\n\nNome, lГӯder (FK User), descriГ§ГЈo, cor_hex, ativo.\n\n**PerfilVendedor** вҖ” Tabela: `crm_perfis_vendedor`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `user` | OneToOne User | UsuГЎrio |\n| `equipe` | FK EquipeVendas | Equipe (1:1) |\n| `cargo` | CharField | vendedor/supervisor/gerente/diretor/outro |\n| `telefone_direto` / `whatsapp` | CharField | Contato |\n| `id_vendedor_hubsoft` | Integer | ID no HubSoft |\n\n#### Metas\n\n**MetaVendas** вҖ” Tabela: `crm_metas_vendas`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `tipo` | CharField | individual/equipe |\n| `vendedor` / `equipe` | FK | Quem tem a meta |\n| `periodo` | CharField | diario/semanal/mensal/trimestral |\n| `data_inicio` / `data_fim` | DateField | PerГӯodo |\n| `meta_vendas_quantidade` / `meta_vendas_valor` / `meta_leads_qualificados` / `meta_contatos` | NumГ©ricos | Metas |\n| `realizado_vendas_quantidade` / `realizado_vendas_valor` / `realizado_leads` | NumГ©ricos | Realizado |\n\n**Propriedades:** `percentual_quantidade`, `percentual_valor`\n\n#### Segmentos\n\n**SegmentoCRM** вҖ” Tabela: `crm_segmentos`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `nome` | CharField(100) | Nome do segmento |\n| `tipo` | CharField | dinamico/manual/hibrido |\n| `regras_filtro` | JSONField | Regras de filtragem para segmentos dinГўmicos |\n| `leads` | M2M via MembroSegmento | Leads do segmento |\n| `cor_hex` / `icone_fa` | Char | Visual |\n| `total_leads` | PositiveInteger | Cache do total |\n\n**Regras de filtro (JSON):**\n```json\n[\n    {\"campo\": \"origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"},\n    {\"campo\": \"score_qualificacao\", \"operador\": \"maior\", \"valor\": \"7\"},\n    {\"campo\": \"cidade\", \"operador\": \"contem\", \"valor\": \"Teresina\"}\n]\n```\n\nCampos disponГӯveis: origem, score_qualificacao, cidade, estado, bairro, valor, status_api, dias_cadastro\nOperadores: igual, diferente, contem, maior, menor, maior_igual, menor_igual\n\n**MembroSegmento** вҖ” Tabela: `crm_membros_segmento`\n\nThrough table: segmento FK, lead FK, adicionado_manualmente, adicionado_por.\n\n#### RetenГ§ГЈo\n\n**AlertaRetencao** вҖ” Tabela: `crm_alertas_retencao`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `cliente_hubsoft` | FK ClienteHubsoft | Cliente |\n| `lead` / `oportunidade` | FK | Contexto |\n| `tipo_alerta` | CharField | contrato_expirando/inadimplencia/plano_downgradado/sem_uso/reclamacao/upgrade_disponivel/aniversario_contrato |\n| `nivel_risco` | CharField | baixo/medio/alto/critico |\n| `score_churn` | Integer(0-100) | Score de risco |\n| `status` | CharField | novo/em_tratamento/resolvido/perdido |\n\n**Scanner automГЎtico:** analisa contratos do HubSoft, cria alertas baseado em dias restantes (вүӨ30 = crГӯtico/90, вүӨ60 = alto/70, вүӨ90 = mГ©dio/50).\n\n#### ConfiguraГ§ГЈo\n\n**ConfiguracaoCRM** вҖ” Tabela: `crm_configuracao` | Singleton por tenant\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `sla_alerta_horas_padrao` | PositiveInteger(48) | SLA padrГЈo em horas |\n| `criar_oportunidade_automatico` | BooleanField(True) | Auto-criar oportunidade quando lead qualificado |\n| `score_minimo_auto_criacao` | Integer(7) | Score mГӯnimo para auto-criaГ§ГЈo |\n| `pipeline_padrao` / `estagio_inicial_padrao` | FK | Pipeline e estГЎgio padrГЈo |\n| `notificar_responsavel_nova_oportunidade` / `notificar_sla_breach` | BooleanField | NotificaГ§Гөes |\n| `webhook_n8n_nova_oportunidade` / `mudanca_estagio` / `tarefa_vencida` | URLField | Webhooks N8N |\n\n### Services\n\n**segmentos.py** (4 funГ§Гөes):\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `filtrar_leads_por_regras(regras, queryset)` | Aplica regras de filtro dinГўmico ao queryset de leads |\n| `lead_atende_regras(lead, regras)` | Verifica se um lead especГӯfico atende todas as regras (sem query) |\n| `atualizar_membros_segmento(segmento)` | Sync completo: remove quem nГЈo atende, adiciona quem atende |\n| `avaliar_lead_em_segmentos(lead)` | Avalia lead em TODOS os segmentos dinГўmicos/hГӯbridos do tenant |\n\n### Signals (3)\n\n1. **criar_oportunidade_automatica** (post_save LeadProspecto) вҖ” Cria OportunidadeVenda quando lead atinge score mГӯnimo ou status_api='sucesso'\n2. **verificar_conversao_historico** (post_save HistoricoContato) вҖ” Move oportunidade para estГЎgio ganho quando converteu_venda=True\n3. **avaliar_segmentos_dinamicos** (post_save LeadProspecto) вҖ” Avalia lead em segmentos dinГўmicos, dispara evento `lead_entrou_segmento` para automaГ§Гөes\n\n### Views (40+ funГ§Гөes)\n\n| ГҒrea | Views | DescriГ§ГЈo |\n|------|-------|-----------|\n| **Pipeline** | pipeline_view, api_pipeline_dados, api_mover_oportunidade | Kanban com drag-drop, filtros, movimentaГ§ГЈo |\n| **Oportunidades** | oportunidades_lista, oportunidade_detalhe, api_atribuir, api_notas, api_tarefas | CRUD de oportunidades com contexto rico |\n| **Tarefas** | tarefas_lista, api_tarefa_concluir, api_tarefa_criar | GestГЈo de tarefas agrupadas (hoje/semana/vencidas/concluГӯdas) |\n| **Notas** | api_nota_criar, api_nota_fixar, api_nota_deletar | Notas internas com fixar/desfixar |\n| **Desempenho** | desempenho_view, api_desempenho_dados | Dashboard de performance por vendedor |\n| **Metas** | metas_view, api_meta_criar, api_meta_salvar, api_meta_excluir | CRUD de metas individuais/equipe |\n| **RetenГ§ГЈo** | retencao_view, api_tratar_alerta, api_resolver_alerta, api_scanner_retencao | GestГЈo de alertas de churn |\n| **Segmentos** | segmentos_lista, segmento_detalhe, api_segmento_salvar, api_preview_regras, api_adicionar_lead, api_remover_membro, api_disparar_campanha | SegmentaГ§ГЈo dinГўmica com regras |\n| **ConfiguraГ§Гөes** | configuracoes_crm, api_salvar_config, api_criar_estagio, api_reordenar_estagios, api_excluir_estagio | Config do CRM (pipelines, estГЎgios, webhooks) |\n| **Equipes** | equipes_view, api_criar_equipe | GestГЈo de equipes de vendas |\n| **Webhook** | webhook_hubsoft_contrato | Recebe confirmaГ§ГЈo de contrato do HubSoft |\n\n**Visibilidade:** vendedores nГЈo-superuser veem apenas suas oportunidades + nГЈo atribuГӯdas.\n\n### Templates (13)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `pipeline.html` | Kanban drag-drop (990 linhas) |\n| `oportunidades_lista.html` | Lista de oportunidades com filtros |\n| `oportunidade_detalhe.html` | Detalhe com notas, tarefas, histГіrico, HubSoft |\n| `tarefas_lista.html` | Tarefas agrupadas com tabs |\n| `metas.html` | Metas com progress bars |\n| `desempenho.html` | Dashboard de performance |\n| `retencao.html` | Alertas de churn por nГӯvel de risco |\n| `segmentos_lista.html` | Grid de segmentos |\n| `segmento_detalhe.html` | Membros do segmento |\n| `segmento_criar.html` | Criar/editar segmento com rule builder |\n| `equipes.html` | GestГЈo de equipes |\n| `configuracoes_crm.html` | Config (pipelines, estГЎgios, webhooks) |\n| `_tarefa_card.html` | Componente reutilizГЎvel de card de tarefa |\n\n---\n\n## IntegraГ§Гөes entre SubmГіdulos\n\n```\nLeads в”Җв”Җsignalв”Җв”Җв–¶ CRM (auto-cria oportunidade quando score >= 7)\nLeads в”Җв”Җsignalв”Җв”Җв–¶ CRM/Segmentos (avalia segmentos dinГўmicos)\nAtendimento в”Җв”ҖFKв”Җв”Җв–¶ Leads (AtendimentoFluxo.lead)\nCadastro в”Җв”Җgeraв”Җв”Җв–¶ Leads (CadastroCliente.gerar_lead())\nViabilidade в”Җв”Җconsultaв”Җв”Җв–¶ Cadastro (verificaГ§ГЈo de cobertura)\nHistoricoContato в”Җв”Җsignalв”Җв”Җв–¶ CRM (conversГЈo automГЎtica)\nCRM в”Җв”Җwebhookв”Җв”Җв–¶ HubSoft (confirmaГ§ГЈo de contrato)\nCRM в”Җв”Җwebhookв”Җв”Җв–¶ N8N (nova oportunidade, mudanГ§a de estГЎgio, tarefa vencida)\nCRM/Segmentos в”Җв”Җeventв”Җв”Җв–¶ AutomaГ§Гөes (lead_entrou_segmento)\n```\n\n---\n\n## EstatГӯsticas do MГіdulo\n\n| MГ©trica | Valor |\n|---------|-------|\n| **Sub-apps** | 5 (leads, atendimento, cadastro, viabilidade, crm) |\n| **Models** | 28 |\n| **Views** | 80+ funГ§Гөes |\n| **Templates** | 22 |\n| **APIs** | 70+ endpoints |\n| **Signals** | 7 |\n| **ГҚndices** | 50+ |\n| **Linhas de cГіdigo** | ~8.000+ (models + views + services) |\n"}, {"t": "f", "n": "08 Modulo Marketing", "fn": "08-MODULO_MARKETING.md", "c": "# MГіdulo Marketing вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 04/04/2026\n**Status:** рҹ”§ Em desenvolvimento\n**LocalizaГ§ГЈo:** `apps/marketing/`\n\n---\n\n## VisГЈo Geral\n\nO mГіdulo Marketing Г© o motor de automaГ§ГЈo e inteligГӘncia do hub. Cobre campanhas de trГЎfego pago com detecГ§ГЈo automГЎtica por palavra-chave, segmentaГ§ГЈo dinГўmica de leads e automaГ§Гөes visuais com editor de fluxo (Drawflow). Гү composto por 3 sub-apps que se integram via signals, services e o engine de execuГ§ГЈo.\n\n```\nLead chega (WhatsApp/Site/Instagram)\n    в”Ӯ\n    в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ     в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ CAMPANHAS  в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ SEGMENTOS  в”Ӯв”Җв”Җв”Җв”Җв–¶в”Ӯ  AUTOMAГҮГ•ES    в”Ӯ\nв”Ӯ DetecГ§ГЈo   в”Ӯ     в”Ӯ Agrupamentoв”Ӯ     в”Ӯ  Editor Visual в”Ӯ\nв”Ӯ AtribuiГ§ГЈo в”Ӯ     в”Ӯ Regras     в”Ӯ     в”Ӯ  Engine BFS    в”Ӯ\nв”Ӯ ROI        в”Ӯ     в”Ӯ Preview    в”Ӯ     в”Ӯ  AГ§Гөes + Delay в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ     в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n       в”Ӯ                  в”Ӯ                    в”Ӯ\n       в–ј                  в–ј                    в–ј\n   N8N / API        Disparo massa        WhatsApp, Email,\n   DetecГ§ГЈo         AvaliaГ§ГЈo auto       CRM, Pontos, Webhook\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, DRF, PostgreSQL, Drawflow.js\n\n---\n\n## 1. Campanhas (`apps/marketing/campanhas/`)\n\n### O que faz\nGerencia campanhas de trГЎfego pago com detecГ§ГЈo automГЎtica de palavras-chave em mensagens de clientes. Identifica de qual campanha veio cada lead, calcula ROI, taxa de conversГЈo e mГ©tricas por plataforma. IntegraГ§ГЈo direta com N8N para detecГ§ГЈo em tempo real.\n\n### Models (2)\n\n#### CampanhaTrafego\nTabela: `campanha_trafego` | Unique: (tenant, codigo)\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **IdentificaГ§ГЈo** | nome (200), codigo (50, unique/tenant), descricao |\n| **Palavra-chave** | palavra_chave (200), tipo_match (exato/parcial/regex), case_sensitive (default False) |\n| **ClassificaГ§ГЈo** | plataforma (9 opГ§Гөes: google_ads, facebook_ads, instagram_ads, tiktok_ads, linkedin_ads, email, sms, whatsapp, outro), tipo_trafego (pago/organico/hibrido) |\n| **ConfiguraГ§ГЈo** | prioridade (1-10, default 5), ativa (default True) |\n| **PerГӯodo** | data_inicio, data_fim (DateField, opcionais) |\n| **Comercial** | url_destino (500), orcamento (Decimal 12,2), meta_leads |\n| **EstatГӯsticas** | contador_deteccoes (auto), ultima_deteccao (auto) |\n| **Visual** | cor_identificacao (hex, default #667eea), ordem_exibicao |\n| **Auditoria** | criado_por FK User, criado_em, atualizado_em |\n\n**4 Гӯndices:** codigo, ativa, palavra_chave, plataforma\n\n**Propriedades:**\n\n| Propriedade | Retorno | DescriГ§ГЈo |\n|-------------|---------|-----------|\n| `esta_no_periodo` | bool | Se estГЎ dentro das datas inГӯcio/fim |\n| `esta_ativa` | bool | Ativa AND dentro do perГӯodo |\n| `total_leads` | int | Count de LeadProspecto com campanha_origem=self |\n| `total_conversoes` | int | DetecГ§Гөes com converteu_venda=True |\n| `taxa_conversao` | float | (conversГөes / detecГ§Гөes) Г— 100 |\n| `receita_total` | Decimal | Sum de valor_venda das detecГ§Гөes convertidas |\n| `roi` | float | (receita - orГ§amento) / orГ§amento Г— 100 |\n\n#### DeteccaoCampanha\nTabela: `deteccao_campanha`\n\nRegistra cada vez que uma palavra-chave de campanha Г© detectada em uma mensagem de cliente.\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Relacionamentos** | lead FK LeadProspecto, campanha FK CampanhaTrafego |\n| **Mensagem** | telefone (20), mensagem_original, mensagem_normalizada (auto), tamanho_mensagem (auto) |\n| **DetecГ§ГЈo** | trecho_detectado (500), posicao_inicio, posicao_fim, metodo_deteccao (exato/parcial/regex), score_confianca (Decimal 0-100) |\n| **Contexto** | eh_primeira_mensagem, origem (whatsapp/sms/email/chat/telefone), timestamp_mensagem |\n| **TГ©cnico** | ip_origem, user_agent (500), metadata (JSON) |\n| **ValidaГ§ГЈo** | aceita (default True), motivo_rejeicao, rejeitada_por FK User, data_rejeicao |\n| **N8N** | processado_n8n, data_processamento_n8n, resposta_n8n (JSON) |\n| **ConversГЈo** | converteu_venda, data_con
