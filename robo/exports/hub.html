mГіdulo CS\n- Modelo de precificaГ§ГЈo: mensalidade por mГіdulo (Start/Pro) + transacional variГЎvel\n- CriaГ§ГЈo de estrutura de agentes por funГ§ГЈo (13 agentes)\n- Tom de voz: acessГӯvel, prГіximo, direto. Fala a lГӯngua do provedor.\n- Regra de escrita: sem traГ§o como pontuaГ§ГЈo\n- Estrutura de docs em `docs/GTM/`, `docs/BRAND/`, `docs/AGENTES/`\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| Nome do mГіdulo de vendas: Comercial | Mais claro e direto que \"RobГҙ de Vendas\" |\n| CRM Kanban dentro do Comercial Pro | Depende dos dados do Comercial. NГЈo faz sentido separado. |\n| Clube de BenefГӯcios dentro do CS | CS Г© mais amplo e completo do que sГі o clube |\n| Marketing como motor de automaГ§ГЈo | Todas as rГ©guas rodam via Marketing. CS e Comercial consomem os fluxos. |\n| Tagline: Vende mais. Perde menos. Fideliza sempre. | Mapeia os 3 mГіdulos sem precisar explicar |\n| SubtГӯtulo: Do lead ao cliente fidelizado com inteligГӘncia. | Complementa a tagline com a jornada e o diferencial de IA |\n| Paleta oficial: dark mode (#0F172A, #2563EB, gradiente azul/ciano) | ExtraГӯda do site auroraisp.com.br (site do CEO) |\n| PadrГЈo de interface: light mode, dark automГЎtico via sistema | Site serГЎ light. App respeita preferГӘncia do sistema. |\n| Transacional Marketing: tamanho da base de leads | Modelo recorrente que escala com o crescimento da base |\n| Transacional Comercial: venda finalizada no ERP | Alinha receita da Aurora com conversГЈo do provedor |\n| Transacional CS: cliente ativo no clube | Modelo recorrente mensal |\n\n---\n\n## Dados do case de produГ§ГЈo (anГҙnimo)\n\n| MГ©trica | Valor |\n|---------|-------|\n| Clientes ativos do provedor | 30.000 |\n| Leads por mГӘs | 1.000 |\n| Vendas digitais por mГӘs | 400 |\n| Ticket mГ©dio | R$ 99,90 |\n| Time antes | 8 pessoas |\n| Time de atendimento hoje | 2 pessoas |\n| Backoffice criado | 2 pessoas |\n| Custo por pessoa (com encargos) | ~R$ 3.950/mГӘs |\n| Economia anual em pessoal | R$ 284.400 |\n\n---\n\n## Documentos criados\n\n| Documento | Status |\n|-----------|--------|\n| docs/GTM/00-README.md | вң… |\n| docs/GTM/01-PESQUISA_MERCADO.md | вң… |\n| docs/GTM/02-ICP.md | вң… |\n| docs/GTM/03-CONCORRENTES.md | вң… |\n| docs/GTM/04-PROPOSTA_VALOR.md | вң… |\n| docs/GTM/05-POSICIONAMENTO.md | вң… v2.0 |\n| docs/GTM/06-MENSAGENS_CHAVE.md | вң… |\n| docs/GTM/07-CANAIS.md | рҹҹЎ Em revisГЈo |\n| docs/GTM/08-PRECIFICACAO.md | рҹҹЎ Faltam valores |\n| docs/GTM/09-ENABLEMENT.md | рҹҹЎ Faltam materiais |\n| docs/GTM/10-ROADMAP_GTM.md | рҹ”§ Faltam datas e metas |\n| docs/GTM/11-MARKETING_REGUAS_PADRAO.md | вң… 16 rГ©guas mapeadas |\n| docs/BRAND/07-TOM_DE_VOZ.md | вң… |\n| docs/BRAND/08-BRANDBOOK.md | рҹҹЎ Aguardando logo |\n| docs/AGENTES/ | вң… 13 agentes criados |\n| CLAUDE.md | вң… Atualizado |\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Criar logo da AuroraISP | CEO |\n| Definir valores das mensalidades e transacionais | CEO |\n| Confirmar grupos de WhatsApp/Telegram de provedores | CEO |\n| Confirmar se hГЎ contato iniciado com HubSoft | CEO |\n| Definir modelo de comissГЈo do parceiro comercial | CEO |\n| Responder perguntas em aberto do 07-CANAIS.md | CEO |\n\n---\n\n## PrГіximos passos\n\n- [ ] Continuar revisГЈo do 07-CANAIS.md\n- [ ] Revisar 08-PRECIFICACAO.md (com valores quando disponГӯveis)\n- [ ] Revisar 09-ENABLEMENT.md\n- [ ] Revisar 10-ROADMAP_GTM.md com datas reais\n- [ ] Criar logo e atualizar brandbook\n- [ ] Criar one-pager para o parceiro comercial\n"}, {"t": "f", "n": "Gtm Precificacao 26 03 2026", "fn": "gtm_precificacao_26-03-2026.md", "c": "# GTM вҖ” PrecificaГ§ГЈo, Enablement e Roadmap\n\n**Data:** 26/03/2026\n**Participantes:** CEO, PMM (Claude)\n**DuraГ§ГЈo:** SessГЈo mГ©dia (continuaГ§ГЈo de gtm_fundacao_26-03-2026.md)\n\n---\n\n## Contexto\n\nContinuaГ§ГЈo da sessГЈo de fundaГ§ГЈo do GTM. Foco na definiГ§ГЈo de precificaГ§ГЈo completa, atualizaГ§ГЈo do enablement com informaГ§Гөes do parceiro, fechamento do roadmap com datas reais e reorganizaГ§ГЈo da documentaГ§ГЈo de produto.\n\n---\n\n## Principais pontos discutidos\n\n- AdiГ§ГЈo do plano Starter abaixo do Start, criando 3 tiers por mГіdulo\n- ReferГӘncia ao modelo HubSpot para definir escada de preГ§os (1:2:3,5)\n- DefiniГ§ГЈo dos valores de mensalidade e transacionais por mГіdulo\n- SimulaГ§Гөes de custo total por porte de ISP (pequeno, mГ©dio, grande)\n- Trial de 14 dias exclusivo para provedores HubSoft\n- ComissГЈo do sГіcio: 30% do lucro lГӯquido\n- Demo ao vivo como formato principal (nГЈo vГӯdeo gravado)\n- Parceiro tem processo prГіprio mas precisa de treinamento tГ©cnico\n- RГ©guas padrГЈo sГЈo produto, nГЈo GTM вҖ” movidas para `docs/PRODUTO/`\n- SVAs mapeados para a rГ©gua CS05\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| 3 tiers: Starter / Start / Pro | Starter para ISPs pequenos com barreira de entrada mГӯnima |\n| Escada 1:2:3,5 | Salto para Pro menor do que dobrar, facilita conversГЈo |\n| Comercial: R$397 / R$797 / R$1.397 | Produto Гўncora, maior valor percebido |\n| Marketing: R$297 / R$597 / R$997 | Ligeiramente abaixo do Comercial |\n| CS: R$247 / R$497 / R$897 | Mais acessГӯvel, clube tem custo para o ISP manter |\n| Transacional Comercial: R$7/venda | Alinha receita Aurora com conversГЈo do provedor |\n| Transacional Marketing: R$0,05/contato/mГӘs | Por base acumulada, escala com crescimento |\n| Transacional CS: R$0,15/cliente ativo no clube | Mercado pratica R$0,10 a R$0,20 |\n| Trial 14 dias sГі para HubSoft | ICP perfeito, integraГ§ГЈo nativa, resultado rГЎpido |\n| ComissГЈo do sГіcio: 30% do lucro lГӯquido | Modelo societГЎrio jГЎ definido |\n| Demo ao vivo | Parceiro conduz, Aurora apoia nas primeiras |\n| RГ©guas padrГЈo em `docs/PRODUTO/` | SГЈo especificaГ§ГЈo de produto, nГЈo estratГ©gia GTM |\n| Fase 0 encerra 30/03, refatoraГ§ГЈo atГ© 27/03 | Multi-tenancy crГӯtico para virar SaaS |\n| Meta Fase 1: 15 clientes atГ© junho/2026 | Primeiro trimestre de operaГ§ГЈo |\n\n---\n\n## Valores fechados\n\n### Mensalidades\n\n| MГіdulo | Starter | Start | Pro |\n|--------|---------|-------|-----|\n| Comercial | R$397 | R$797 | R$1.397 |\n| Marketing | R$297 | R$597 | R$997 |\n| CS | R$247 | R$497 | R$897 |\n\n### Transacionais\n\n| MГіdulo | Valor | Evento |\n|--------|-------|--------|\n| Comercial | R$7 | Por venda finalizada no ERP |\n| Marketing | R$0,05 | Por contato na base/mГӘs |\n| CS | R$0,15 | Por cliente ativo no clube/mГӘs |\n\n### SimulaГ§ГЈo stack completo\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Total/mГӘs | R$1.241 | R$3.491 | R$7.891 |\n| ROI (sГі Comercial) | 2,4x | 4,3x | 5x |\n\n---\n\n## Documentos atualizados\n\n| Documento | Status |\n|-----------|--------|\n| docs/GTM/08-PRECIFICACAO.md | вң… Aprovado |\n| docs/GTM/09-ENABLEMENT.md | рҹ”§ Em construГ§ГЈo (aguarda logo e treinamento) |\n| docs/GTM/10-ROADMAP_GTM.md | рҹ”§ Em construГ§ГЈo (Fases 2 e 3 sem data) |\n| docs/PRODUTO/01-REGUAS_PADRAO.md | рҹ”§ Em construГ§ГЈo (movido de GTM/11) |\n| CLAUDE.md | вң… Atualizado com nova pasta PRODUTO/ |\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Criar logo da AuroraISP | CEO |\n| Definir tempo de atraso que aciona churn (CS03) | CEO |\n| Mapear aprovaГ§Гөes humanas por fluxo nas rГ©guas | CEO + PMM |\n| Definir datas e metas das Fases 2 e 3 do roadmap | CEO |\n| Treinar parceiro comercial (apГіs Fase 0) | CEO + PMM |\n| Alinhar estratГ©gias de prospecГ§ГЈo com o parceiro | CEO + Parceiro |\n\n---\n\n## PrГіximos passos\n\n- [ ] RefatoraГ§ГЈo completa do projeto atГ© 27/03\n- [ ] Multi-tenancy pronto atГ© 30/03\n- [ ] Parceiro em campo a partir de 31/03\n- [ ] Criar one-pager e deck (aguarda logo)\n- [ ] Criar trilha de treinamento tГ©cnico do parceiro\n"}, {"t": "f", "n": "Gtm Visao Geral 27 03 2026", "fn": "gtm_visao_geral_27-03-2026.md", "c": "# GTM вҖ” VisГЈo Geral e EvoluГ§ГЈo\n\n**Data:** 27/03/2026\n**Participantes:** CEO, PMM (Claude)\n\n---\n\n## Contexto\n\nAo final da segunda sessГЈo de construГ§ГЈo do GTM, fizemos uma revisГЈo completa de tudo que foi construГӯdo nas duas sessГөes (26/03 e 27/03/2026).\n\n---\n\n## EvoluГ§ГЈo em 2 sessГөes\n\n### SessГЈo 1 вҖ” 26/03/2026\nFundaГ§ГЈo completa do GTM: posicionamento, ICP, concorrentes, proposta de valor, mensagens chave, tom de voz, brandbook, canais, primeiros rascunhos de precificaГ§ГЈo e enablement. CriaГ§ГЈo da estrutura de agentes e do workspace de documentaГ§ГЈo.\n\n### SessГЈo 2 вҖ” 27/03/2026\nPrecificaГ§ГЈo aprovada, esteira comercial definida, materiais estruturados, rГ©guas de nurturing especificadas.\n\n---\n\n## Estado atual do GTM\n\n### EstratГ©gia\n\n| ГҒrea | Status |\n|------|--------|\n| Posicionamento | вң… SГіlido |\n| ICP вҖ” 4 personas | вң… SГіlido |\n| AnГЎlise de concorrentes | вң… SГіlido |\n| Proposta de valor | вң… SГіlido |\n| Mensagens chave | вң… SГіlido |\n| Tom de voz вҖ” 4 pilares | вң… SГіlido |\n| Canais вҖ” 6 canais mapeados | вң… SГіlido |\n| PrecificaГ§ГЈo вҖ” Starter/Start/Pro + transacional | вң… Aprovado |\n\n### Comercial\n\n| ГҒrea | Status |\n|------|--------|\n| Fluxo comercial вҖ” 7 etapas | вң… SГіlido |\n| DiagnГіstico do provedor вҖ” 5 blocos | вң… SГіlido |\n| Script de diagnГіstico WhatsApp | вң… Pronto |\n| RГ©gua de trial вҖ” dois trilhos D+0 a D+14 | вң… Estrutura pronta |\n| RГ©gua de recuperaГ§ГЈo pГіs-trial вҖ” D+1 a D+30 | вң… Estrutura pronta |\n| Enablement do parceiro | рҹҹЎ Em construГ§ГЈo |\n\n### Materiais\n\n| Material | Status |\n|----------|--------|\n| 5 estruturas de deck | вң… Roteiros prontos |\n| RГ©guas padrГЈo do produto вҖ” 16 fluxos | вң… Especificado |\n| Materiais visuais (PPT/PDF) | вҸі Aguarda logo |\n| Case anГҙnimo PDF | вҸі A criar |\n| Typeform de diagnГіstico | вҸі A criar |\n\n---\n\n## PrecificaГ§ГЈo aprovada\n\n| MГіdulo | Starter | Start | Pro | Transacional |\n|--------|---------|-------|-----|--------------|\n| Comercial | R$397 | R$797 | R$1.397 | R$7/venda |\n| Marketing | R$297 | R$597 | R$997 | R$0,05/contato/mГӘs |\n| CS | R$247 | R$497 | R$897 | R$0,15/cliente ativo/mГӘs |\n\n---\n\n## RГ©guas definidas\n\n| RГ©gua | Estrutura | Textos |\n|-------|-----------|--------|\n| ConversГЈo do trial | вң… Pronta | вҸі Backlog |\n| RecuperaГ§ГЈo pГіs-trial | вң… Pronta | вҸі Backlog |\n\n---\n\n## Bloqueadores para lanГ§ar\n\n| Bloqueador | ResponsГЎvel | Prazo |\n|------------|-------------|-------|\n| Logo | CEO | вҖ” |\n| Multi-tenancy | Dev | 30/03/2026 |\n| Textos das rГ©guas | PMM | Backlog |\n| Materiais visuais | PMM | ApГіs logo |\n| Treinamento do parceiro | PMM + CEO | ApГіs multi-tenancy |\n\n---\n\n## ConclusГЈo\n\nEm 2 sessГөes saГӯmos do zero para uma estratГ©gia GTM completa, esteira comercial definida e materiais estruturados. O bloqueio agora Г© execuГ§ГЈo, nГЈo estratГ©gia.\n"}, {"t": "f", "n": "Inbox Atendimento Suporte 03 04 2026", "fn": "inbox_atendimento_suporte_03-04-2026.md", "c": "# MГіdulo Inbox de Atendimento/Suporte вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**Participantes:** Lucas (Dev), Claude (Tech Lead / PM)\n**DuraГ§ГЈo:** SessГЈo intensiva (~4h)\n\n---\n\n## Contexto\n\nO sistema da AuroraISP jГЎ tinha um motor de fluxos automatizados (`apps/comercial/atendimento/`) e um sistema de tickets (`apps/suporte/`), mas nГЈo tinha um inbox de conversas em tempo real para os agentes atenderem leads/clientes. A tarefa do backlog \"MГіdulo Atendimento/Suporte estilo Chatwoot\" estava aguardando planejamento.\n\n---\n\n## Principais pontos discutidos\n\n- DiferenГ§a entre o mГіdulo de fluxos existente (bot) e o inbox necessГЎrio (conversas humanas)\n- Arquitetura: novo app `apps/inbox/` top-level (cross-cutting, nГЈo aninhado)\n- Posicionamento na navegaГ§ГЈo: dentro do menu Suporte (nГЈo como mГіdulo separado na topbar)\n- Dois canais: WhatsApp (via webhook/N8N) e Chat Widget (embeddable JS)\n- Equipes, filas e distribuiГ§ГЈo automГЎtica (round-robin, menor carga)\n- FAQ/Base de conhecimento para o widget\n- MigraГ§ГЈo de SQLite para PostgreSQL local (aurora_dev)\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| App `inbox/` como top-level | Cross-cutting: conecta leads, tickets, CRM, automaГ§Гөes |\n| Inbox dentro do menu Suporte | Faz parte do mesmo fluxo de atendimento, nГЈo justifica mГіdulo separado na topbar |\n| WebSocket com fallback polling | Channels para real-time, polling 5s como fallback robusto |\n| InMemoryChannelLayer em dev | Evita dependГӘncia de Redis em dev. ProduГ§ГЈo usa Redis |\n| Daphne removido do INSTALLED_APPS em dev | Bugs de logging no Windows. Adicionado sГі em produГ§ГЈo |\n| Widget sem iframe | Injeta DOM direto na pГЎgina, evita problemas de X_FRAME_OPTIONS e CSP |\n| API pГәblica sem login | Auth via token pГәblico UUID no query param + validaГ§ГЈo de Origin |\n| FAQ novo (nГЈo reutilizar megaroleta) | megaroleta Г© legacy e read-only conforme CLAUDE.md |\n| PostgreSQL local (aurora_dev) | SQLite tem limitaГ§Гөes. Banco `aurora_dev` com user `postgres` jГЎ existia |\n| Agentes em mГәltiplas equipes | Diferente do CRM (1:1), inbox usa M2M via MembroEquipeInbox |\n\n---\n\n## O que foi implementado\n\n### SessГЈo 1: Inbox Base (5 phases)\n1. **Phase 1:** 6 models core (CanalInbox, Conversa, Mensagem, RespostaRapida, EtiquetaConversa, NotaInternaConversa) + admin + migrations\n2. **Phase 2:** API webhook genГ©rica (receber/enviar mensagens, status de entrega) + services\n3. **Phase 3:** Inbox UI three-panel (lista conversas, chat, contexto do lead) + 13 APIs internas AJAX\n4. **Phase 4:** WebSocket com Django Channels + InMemoryChannelLayer + Daphne\n5. **Phase 5:** IntegraГ§ГЈo com automaГ§Гөes (3 novos eventos: mensagem_recebida, conversa_aberta, conversa_resolvida)\n\n### SessГЈo 2: Equipes, Filas, DistribuiГ§ГЈo (5 phases)\n1. **Phase 1:** 8 models novos (EquipeInbox, MembroEquipeInbox, PerfilAgenteInbox, FilaInbox, RegraRoteamento, HistoricoTransferencia, HorarioAtendimento, ConfiguracaoInbox) + 2 FKs na Conversa\n2. **Phase 2:** Engine de distribuiГ§ГЈo automГЎtica (round-robin, menor carga, manual) + verificaГ§ГЈo de horГЎrio + status do agente\n3. **Phase 3:** PГЎgina de configuraГ§Гөes com 7 abas (equipes, filas, respostas, etiquetas, canais, horГЎrio, geral)\n4. **Phase 4:** TransferГӘncia de conversas (para agente/equipe/fila + modal no chat)\n5. **Phase 5:** Dashboard de mГ©tricas (5 KPIs, grГЎfico Chart.js 30 dias, ranking agentes)\n\n### SessГЈo 3: Widget + FAQ (4 phases)\n1. **Phase 1-2:** 3 models (CategoriaFAQ, ArtigoFAQ, WidgetConfig) + abas FAQ e Widget na config\n2. **Phase 3:** API pГәblica (7 endpoints sem login, auth via token, CORS manual) + `receber_mensagem_widget()`\n3. **Phase 4:** Widget JS (`aurora-chat.js`, ~15KB, vanilla, 3 abas: InГӯcio/Mensagens/Ajuda)\n4. Widget adicionado ao `base.html` do sistema para testes\n\n---\n\n## Resultado final\n\n- **17 models** no app inbox\n- **26+ endpoints** (internos, N8N, pГәblicos)\n- **3 migrations** aplicadas no PostgreSQL\n- **9 abas** na pГЎgina de configuraГ§Гөes\n- **Dashboard** com mГ©tricas e grГЎfico\n- **Widget JS** embeddable com FAQ\n- **DistribuiГ§ГЈo automГЎtica** com equipes e filas\n- **IntegraГ§ГЈo** com automaГ§Гөes, tickets, CRM e leads\n- **60 testes** existentes passando\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Configurar N8N com workflow WhatsApp | Dev/Ops |\n| Instalar Redis para produГ§ГЈo (WebSocket) | DevOps |\n| Configurar Daphne + Nginx para WebSocket | DevOps |\n| Criar FAQ real com artigos do provedor | CS |\n| Testar widget em site externo do provedor | Dev |\n| Implementar CSAT (pesquisa de satisfaГ§ГЈo) | Dev (futuro) |\n\n---\n\n## PrГіximos passos\n\n- [ ] Configurar N8N para WhatsApp вҶ’ webhook inbox\n- [ ] Testar o widget embeddado em um site real de provedor\n- [ ] Criar conteГәdo de FAQ para o primeiro cliente\n- [ ] Deploy com Redis + Daphne para WebSocket em produГ§ГЈo\n- [ ] Refinar UI do inbox baseado em feedback dos atendentes\n"}, {"t": "f", "n": "Multi Tenancy 29 03 2026", "fn": "multi_tenancy_29-03-2026.md", "c": "# Multi-tenancy e Produto вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, CTO\n**DuraГ§ГЈo:** ~2 horas (segunda sessГЈo do dia)\n\n---\n\n## Contexto\n\nContinuaГ§ГЈo da sessГЈo de refatoraГ§ГЈo em apps. ApГіs criar a estrutura de apps e migrar os models, o foco foi implementar multi-tenancy funcional e as features de produto necessГЎrias para aceitar o primeiro cliente.\n\n---\n\n## Principais pontos implementados\n\n### Multi-tenancy\n- Models migrados para novos apps com `app_label = 'vendas_web'` temporГЎrio (para compatibilidade com admin/views legados)\n- `vendas_web/models.py` substituГӯdo por re-exports dos novos apps\n- FKs cross-app corrigidas para usar app_labels corretos\n- `TenantManager` com auto-filtro por tenant via thread-local\n- `TenantMixin.save()` auto-preenche tenant no create\n- `all_tenants` como escape hatch para admin/commands\n- Isolamento testado com 3 tenants (Megalink, Provedor Teste, Mega Fibra)\n\n### Produto\n- Command `criar_tenant` para onboarding automatizado (Tenant + User + Perfil + Config)\n- IntegracaoAPI vinculada ao Tenant (cada provedor tem seu HubSoft)\n- Context processor multi-tenant (mГіdulos, planos, cores, logo por tenant)\n- Tela de setup inicial (`/setup/`) com coleta de dados da empresa e credenciais HubSoft\n- Middleware redireciona ao setup se tenant nГЈo tem ConfiguracaoEmpresa\n- Controle de mГіdulos na topbar (comercial e marketing condicionais)\n\n### SeguranГ§a\n- SECRET_KEY removida do cГіdigo (variГЎvel de ambiente obrigatГіria)\n- Senha do banco removida (sem fallback)\n- Token Matrix API removido (variГЎvel de ambiente)\n- Credenciais HubSoft removidas do setup_hubsoft.py (variГЎveis de ambiente)\n- DEBUG=False por padrГЈo (opt-in via env)\n- `.env.example` criado\n- IP do servidor removido do ALLOWED_HOSTS\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| `app_label = 'vendas_web'` temporГЎrio nos models | Admin e views legados ainda importam de vendas_web. SerГЎ removido quando admin migrar |\n| Managers nos models de sistema | ConfiguracaoEmpresa e outros precisam de `all_tenants` para funcionar no context processor |\n| SECRET_KEY vazia no settings base, validaГ§ГЈo no production | Permite settings_local definir sua prГіpria sem falhar no import |\n| Setup HubSoft opcional | Nem todo provedor usa HubSoft. O setup permite pular |\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Deploy multi-tenancy em produГ§ГЈo | Dev |\n| MigraГ§ГЈo de dados: preencher tenant_id nos registros existentes | Dev |\n| Rotacionar credenciais no servidor (senha DB, SECRET_KEY, token Matrix) | Dev + Ops |\n| Mover views/urls/templates/signals para novos apps | Dev |\n| Remover `app_label = 'vendas_web'` quando admin migrar | Dev |\n| Remover vendas_web apГіs migraГ§ГЈo completa | Dev |\n\n---\n\n## PrГіximos passos\n\n- [ ] Deploy em produГ§ГЈo (migrations + seed Megalink + preencher tenant_id)\n- [ ] Rotacionar credenciais no servidor\n- [ ] Mover views para novos apps (incremental)\n- [ ] Remover app_label temporГЎrio\n- [ ] Testes automatizados para isolamento de tenant\n"}, {"t": "f", "n": "Refatoracao Apps 29 03 2026", "fn": "refatoracao_apps_29-03-2026.md", "c": "# RefatoraГ§ГЈo em Apps por MГіdulo вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, CTO, PM, Tech Lead\n**DuraГ§ГЈo:** ~2 horas\n\n---\n\n## Contexto\n\nO sistema em produГ§ГЈo (`robo/`) concentra 27 models em um Гәnico app (`vendas_web`), com 5.349 linhas de models, 7.464 linhas de views e 222 rotas. Isso bloqueia o multi-tenancy e a separaГ§ГЈo por mГіdulos (Comercial, Marketing, CS) necessГЎria para vender o SaaS.\n\n---\n\n## Principais pontos discutidos\n\n- AnГЎlise completa do sistema robo: models, views, urls, anГЎlise crГӯtica existente, GTM_PRODUTO.md, GTM_ROADMAP_CRM.md\n- App `crm/` jГЎ existia separado com 12 models (referГӘncia de qualidade)\n- DefiniГ§ГЈo da estrutura de CRM do parceiro: 5 estГЎgios, qualificaГ§ГЈo A/B, campos por etapa, critГ©rios de avanГ§o\n- DiscussГЈo sobre 3 opГ§Гөes de arquitetura: sub-apps por pasta (A), flat com prefixo (B), mГіdulo como app Гәnico (C)\n- Comparativo detalhado entre OpГ§ГЈo A e OpГ§ГЈo C\n- DecisГЈo pela OpГ§ГЈo A: cada domГӯnio Г© um app Django completo dentro do mГіdulo\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| OpГ§ГЈo A (sub-apps por pasta) | Migrations isoladas, ativaГ§ГЈo/desativaГ§ГЈo por plano, refatoraГ§ГЈo incremental, CRM jГЎ existe como app separado |\n| 10 apps + 3 mГіdulos futuros (CS) | Reflete os mГіdulos do produto: Sistema (base), Comercial, Marketing, CS |\n| TenantMixin como base | Todos os models herdam tenant FK via mixin abstrato |\n| MigraГ§ГЈo incremental | Novos apps coexistem com vendas_web durante transiГ§ГЈo. Sem risco para produГ§ГЈo |\n| db_table mantido | Nenhuma tabela do banco muda de nome. Migrations usarГЈo SeparateDatabaseAndState |\n| PermissГЈo de ediГ§ГЈo no robo/ | CLAUDE.md atualizado para permitir ediГ§ГЈo do projeto robo |\n\n---\n\n## O que foi implementado\n\n| Item | Status |\n|------|--------|\n| Estrutura `apps/` com 10 apps (96 arquivos) | вң… |\n| `apps/sistema/` com 7 models (Tenant, PerfilUsuario, 5 configs) + middleware + mixin | вң… |\n| `apps/integracoes/` copiado do app existente | вң… |\n| `apps/comercial/crm/` copiado do app existente | вң… |\n| Scaffold de leads, atendimento, cadastro, viabilidade, campanhas, notificacoes, dashboard | вң… |\n| Models migrados para todos os novos apps (5.902 linhas total) | вң… |\n| `settings.py` atualizado com INSTALLED_APPS | вң… |\n| `urls.py` atualizado (legadas ativas, novas comentadas) | вң… |\n| Roadmap de produto atualizado com status | вң… |\n| CRM do parceiro: pipeline 5 estГЎgios, qualificaГ§ГЈo, campos, critГ©rios | вң… |\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Atualizar vendas_web/models.py para re-exportar dos novos apps | Dev |\n| Criar migrations com SeparateDatabaseAndState para cada app | Dev |\n| Mover views e urls para cada app | Dev |\n| Ativar novas rotas e desativar legadas | Dev |\n| Mover templates para dentro de cada app | Dev |\n| Atualizar imports em signals, admin, services | Dev |\n| Remover vendas_web apГіs migraГ§ГЈo completa | Dev |\n| Atualizar FKs cross-app (de vendas_web.X para app_novo.X) | Dev |\n| SeguranГ§a: remover credenciais hardcoded | Dev (urgente) |\n\n---\n\n## PrГіximos passos\n\n- [ ] Atualizar vendas_web/models.py com re-exports dos novos apps\n- [ ] Criar migrations SeparateDatabaseAndState\n- [ ] Mover views por app (comeГ§ando por leads)\n- [ ] Mover urls por app\n- [ ] Testar localmente com SQLite\n- [ ] Resolver credenciais hardcoded (bloqueador de seguranГ§a)\n"}, {"t": "f", "n": "Seguranca Criticos 30 03 2026", "fn": "seguranca_criticos_30-03-2026.md", "c": "# CorreГ§ГЈo de Vulnerabilidades CrГӯticas de SeguranГ§a вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**Participantes:** Dev, SeguranГ§a (AppSec)\n**Tipo:** ImplementaГ§ГЈo tГ©cnica\n\n---\n\n## Contexto\n\nScan de seguranГ§a completo identificou 5 vulnerabilidades crГӯticas, 9 altas e 8 mГ©dias. As 5 crГӯticas foram corrigidas nesta sessГЈo.\n\n---\n\n## CorreГ§Гөes realizadas\n\n### 1. Credencial HubSoft hardcoded вҖ” вң… Corrigido\n**Arquivo:** `apps/cs/clube/management/commands/testar_pontuacoes.py`\n**O que tinha:** Senha do banco HubSoft em texto plano no cГіdigo.\n**O que foi feito:** SubstituГӯdo por `os.environ['HUBSOFT_DB_*']`. Adicionado ao `.env.example`.\n**AГ§ГЈo pendente:** Rotacionar a senha exposta no HubSoft (responsГЎvel: admin do provedor).\n\n### 2. Admin exibe senhas (render_value=True) вҖ” вң… Corrigido\n**Arquivo:** `apps/integracoes/admin.py`\n**O que tinha:** `PasswordInput(render_value=True)` mostrava senha e client_secret em texto plano no HTML.\n**O que foi feito:** Removido `render_value=True`. Campos ficam vazios ao editar. Adicionado `clean_password()` e `clean_client_secret()` para manter valor existente se campo vazio.\n\n### 3. Webhook sem validaГ§ГЈo de token вҖ” вң… Corrigido\n**Arquivos:** `apps/comercial/crm/views.py`, `crm/views.py`\n**O que tinha:** `webhook_hubsoft_contrato()` aceitava qualquer POST, permitindo forjar confirmaГ§Гөes de contrato.\n**O que foi feito:**\n- Criado `apps/sistema/decorators.py` com `@webhook_token_required` e `@api_token_required`\n- Decorator valida `Authorization: Bearer <token>` no header\n- Aplicado no webhook do CRM\n- Tokens configurГЎveis via `WEBHOOK_SECRET_TOKEN` e `N8N_API_TOKEN` no `.env`\n- Tentativas invГЎlidas sГЈo logadas\n\n### 4. CRM sem TenantMixin (9 models) вҖ” вң… Corrigido\n**Arquivo:** `apps/comercial/crm/models.py`\n**O que tinha:** 13 models sem FK tenant. Qualquer tenant via dados de outro.\n**O que foi feito:**\n- Adicionado `TenantMixin` em todos os 13 models (PipelineEstagio, EquipeVendas, PerfilVendedor, TagCRM, OportunidadeVenda, HistoricoPipelineEstagio, TarefaCRM, NotaInterna, MetaVendas, SegmentoCRM, MembroSegmento, AlertaRetencao, ConfiguracaoCRM)\n- Migration `0004` gerada e aplicada (SQLite local)\n- Campo tenant nullable para compatibilidade com dados existentes\n- TenantManager (auto-filtro) ativo em todos os models\n\n### 5. 48+ endpoints sem autenticaГ§ГЈo вҖ” вң… Corrigido\n**Arquivos:** `vendas_web/views.py`, `vendas_web/views_api_atendimento.py`\n**O que tinha:** Todos os endpoints de API usavam `@csrf_exempt` sem autenticaГ§ГЈo.\n**O que foi feito:**\n- **27 endpoints N8N/externos:** adicionado `@api_token_required` (valida `Authorization: Bearer <N8N_API_TOKEN>`)\n- **21 endpoints do painel:** removido `@csrf_exempt`, adicionado `@login_required`\n- **3 endpoints pГәblicos:** mantidos sem auth (cadastro cliente, upload documento, consulta CEP)\n\n---\n\n## ValidaГ§ГЈo\n\n- `manage.py check` вҖ” 0 erros\n- 16 testes de isolamento tenant вҖ” todos passando\n- Migration CRM aplicada com sucesso (SQLite local)\n\n---\n\n## PendГӘncias pГіs-correГ§ГЈo\n\n- [ ] Rotacionar senha HubSoft exposta no cГіdigo (admin do provedor)\n- [ ] Configurar `WEBHOOK_SECRET_TOKEN` e `N8N_API_TOKEN` no `.env` de produГ§ГЈo\n- [ ] Atualizar workflows do N8N para enviar `Authorization: Bearer <token>` no header\n- [ ] Deploy das correГ§Гөes em produГ§ГЈo\n- [ ] Data migration para popular tenant nos registros existentes do CRM\n\n---\n\n## Arquivos criados/modificados\n\n| Arquivo | AГ§ГЈo |\n|---------|------|\n| `apps/sistema/decorators.py` | **Criado** вҖ” decorators webhook_token_required e api_token_required |\n| `apps/sistema/middleware.py` | Atualizado вҖ” LoginRequiredMiddleware movido para cГЎ |\n| `apps/sistema/context_processors.py` | **Criado** вҖ” empresa_context movido de vendas_web |\n| `apps/integracoes/admin.py` | Corrigido вҖ” render_value removido |\n| `apps/comercial/crm/models.py` | Corrigido вҖ” TenantMixin em 13 models |\n| `apps/comercial/crm/views.py` | Corrigido вҖ” webhook_token_required no webhook |\n| `apps/cs/clube/management/commands/testar_pontuacoes.py` | Corrigido вҖ” credenciais via env |\n| `vendas_web/views.py` | Corrigido вҖ” auth em 24 endpoints |\n| `vendas_web/views_api_atendimento.py` | Corrigido вҖ” auth em 24 endpoints |\n| `.env.example` | Atualizado вҖ” HUBSOFT_DB_*, WEBHOOK_SECRET_TOKEN, N8N_API_TOKEN |\n"}, {"t": "f", "n": "Sessao Completa 30 03 2026", "fn": "sessao_completa_30-03-2026.md", "c": "# SessГЈo Completa de Trabalho вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**Participantes:** Lucas (CEO), Claude (Assistente, PMM, Tech Lead, SeguranГ§a AppSec, QA, PM)\n**Tipo:** SessГЈo de trabalho intensiva (GTM, seguranГ§a, documentaГ§ГЈo)\n\n---\n\n## Resumo Executivo\n\nSessГЈo de trabalho cobrindo GTM, seguranГ§a, documentaГ§ГЈo jurГӯdica e comercial. SaГӯmos de 12 tarefas no backlog para 55 (mapeamento completo) e finalizamos 28 delas no mesmo dia.\n\n---\n\n## 1. Mapeamento do GTM\n\n**Agente: PMM**\n\n- Analisado o checklist GTM existente (42 feitos, 12 parciais, 51 pendentes)\n- Identificadas frentes com zero progresso: enablement do parceiro (0/7), presenГ§a digital (0/7), operaГ§Гөes e jurГӯdico (0/6)\n- Criadas 15 tarefas novas cobrindo ГЎreas que nГЈo tinham mapeamento: desenvolvimento (4), infraestrutura (3), qualidade (2), seguranГ§a (2), produto (2), operaГ§Гөes (2)\n\n---\n\n## 2. Limpeza de Apps Legados e Imports\n\n**Agente: Tech Lead**\n\nInvestigaГ§ГЈo revelou que os models jГЎ estavam nos apps modulares (refatoraГ§ГЈo de 29/03). O trabalho real era limpeza:\n\n- Removidos `crm` e `integracoes` legados do INSTALLED_APPS\n- Registrados `apps.comercial.crm`, `apps.integracoes`, `apps.admin_aurora` e 4 apps CS\n- ~40 arquivos com imports atualizados (`vendas_web.models` вҶ’ `apps.*.models`)\n- Middleware e context_processors movidos de `vendas_web/` para `apps/sistema/`\n- URLs atualizadas (`integracoes.urls` вҶ’ `apps.integracoes.urls`)\n- settings_local.py corrigido para herdar INSTALLED_APPS do settings.py\n- **16 testes passando, manage.py check OK**\n\n---\n\n## 3. RepositГіrio GitHub\n\nCriado repositГіrio: https://github.com/lucasmr1998/hub\n\n- .gitignore protege .env, SQLite, megaroleta/, robo/ (repos separados)\n- hub.html incluГӯdo para preview online\n- Preview: htmlpreview.github.io/?https://github.com/lucasmr1998/hub/blob/main/exports/hub.html\n\n---\n\n## 4. Scan de SeguranГ§a Completo\n\n**Agentes: SeguranГ§a (AppSec), DevOps, QA**\n\nScan com 3 agentes em paralelo identificou:\n- 5 vulnerabilidades crГӯticas\n- 9 altas\n- 8 mГ©dias\n- 3 baixas\n\n### CrГӯticas resolvidas:\n1. **Credencial HubSoft hardcoded** вҶ’ `os.environ[]`\n2. **Admin exibe senhas** вҶ’ `render_value=True` removido\n3. **Webhook sem token** вҶ’ decorator `@webhook_token_required` criado\n4. **CRM sem TenantMixin** вҶ’ 13 models com TenantMixin, migration gerada\n5. **48+ endpoints sem auth** вҶ’ 27 com `@api_token_required`, 21 com `@login_required`, 3 pГәblicos\n\n### Altas resolvidas:\n6. **IDOR nas APIs** вҶ’ helper `get_tenant_object_or_404`\n7. **PII em print()** вҶ’ 35+ prints removidos, logging estruturado\n8. **User sem filtro tenant** вҶ’ 5 views do CRM corrigidas\n9. **Admin Aurora** вҶ’ `superuser_required` + `_user_can_access_tenant`\n10. **Clube auth** вҶ’ 4 endpoints com filtro tenant\n11. **Uploads sem isolamento** вҶ’ `tenant_upload_path` em 6 campos\n\n### MГ©dias resolvidas:\n12. **XSS mark_safe** вҶ’ escape de HTML em JSON, format_html corrigido (9 funГ§Гөes)\n13. **API dados sensГӯveis** вҶ’ login, senha, mac_addr, ipv4 removidos dos responses\n14. **ALLOWED_HOSTS** вҶ’ migrado para env var, IP e localhost removidos\n15. **HTTPS/cookies** вҶ’ SECURE_SSL_REDIRECT, SESSION_COOKIE_SECURE via env\n16. **Upload validaГ§ГЈo** вҶ’ validate_image_upload (tipo + 5MB)\n17. **PII filter** вҶ’ PIIFilter para logging (CPF, email, telefone)\n\n---\n\n## 5. Testes Automatizados\n\n**Agente: QA**\n\n- Criado `tests/test_endpoint_auth.py` com 80 testes parametrizados\n- Testes encontraram 4 endpoints sem auth que foram corrigidos\n- **96 testes passando** (16 tenant + 80 auth)\n\n---\n\n## 6. DocumentaГ§ГЈo JurГӯdica\n\n**Agente: JurГӯdico**\n\n3 documentos criados em `exports/drafts/juridico/`:\n- **Contrato SaaS** вҖ” 15 clГЎusulas, trial, SLA 99.5%, multi-tenancy, foro Teresina/PI\n- **Termos de Uso** вҖ” 12 seГ§Гөes\n- **PolГӯtica de Privacidade** вҖ” 16 seГ§Гөes, LGPD compliant\n\n---\n\n## 7. Treinamento do Parceiro\n\n**Agente: PMM**\n\n5 mГіdulos criados em `exports/drafts/treinamento_parceiro/`:\n- M1: VisГЈo geral da AuroraISP\n- M2: MГіdulo Comercial a fundo (demo, ROI, mГ©tricas)\n- M3: Marketing e CS (roadmap, cross-sell)\n- M4: PrecificaГ§ГЈo e ROI (simulaГ§Гөes por porte)\n- M5: ObjeГ§Гөes e fechamento (10 objeГ§Гөes, tГ©cnicas, follow-up)\n\n---\n\n## 8. Materiais de Venda\n\n**Agente: PMM**\n\n2 documentos criados em `exports/drafts/apresentacao/`:\n- **Case anГҙnimo** вҖ” Provedor 30k clientes, 400 vendas/mГӘs, R$284k economia/ano\n- **Battle card** вҖ” AuroraISP vs ISPRO AI, vs CRM genГ©rico, vs processo manual\n\n---\n\n## 9. Melhorias no Hub\n\n- Corrigido bug do `<\/script>` dentro do JSON (tarefa XSS quebrava o HTML)\n- Frontmatter adicionado em todas as 42+ tarefas para tГӯtulos legГӯveis\n- Template de tarefas atualizado com frontmatter obrigatГіrio\n\n---\n\n## Arquivos Criados/Modificados\n\n### Novos:\n- `apps/sistema/decorators.py` вҖ” webhook_token_required, api_token_required, get_tenant_object_or_404\n- `apps/sistema/validators.py` вҖ” validate_image_upload, tenant_upload_path\n- `apps/sistema/logging_filters.py` вҖ” PIIFilter\n- `apps/sistema/context_processors.py` вҖ” empresa_context (movido de vendas_web)\n- `tests/test_endpoint_auth.py` вҖ” 80 testes de autenticaГ§ГЈo\n- `exports/drafts/juridico/` вҖ” 3 documentos jurГӯdicos\n- `exports/drafts/treinamento_parceiro/` вҖ” 5 mГіdulos\n- `exports/drafts/apresentacao/case_anonimo.md`\n- `exports/drafts/apresentacao/battle_card_concorrentes.md`\n- 15+ tarefas no backlog\n\n### Modificados:\n- `gerenciador_vendas/settings.py` вҖ” INSTALLED_APPS, middleware, HTTPS\n- `gerenciador_vendas/settings_local.py` вҖ” herda INSTALLED_APPS\n- `gerenciador_vendas/settings_production.py` вҖ” ALLOWED_HOSTS via env\n- `gerenciador_vendas/urls.py` вҖ” URLs atualizadas para apps modulares\n- `vendas_web/views.py` вҖ” auth em 24 endpoints, PII removido\n- `vendas_web/views_api_atendimento.py` вҖ” auth em 24 endpoints\n- `vendas_web/admin_config.py` вҖ” format_html XSS corrigido\n- `apps/comercial/crm/models.py` вҖ” TenantMixin em 13 models\n- `apps/comercial/crm/views.py` вҖ” User filtrado por tenant, webhook token\n- `apps/integracoes/admin.py` вҖ” render_value removido\n- `apps/integracoes/views.py` вҖ” dados sensГӯveis removidos\n- `apps/admin_aurora/views.py` вҖ” superuser_required, tenant check\n- `apps/cs/clube/views/api_views.py` вҖ” tenant filter\n- `apps/cs/carteirinha/views.py` вҖ” upload validation\n- `apps/cs/parceiros/views.py` вҖ” upload validation\n- `apps/cs/parceiros/templatetags/parceiros_tags.py` вҖ” XSS fix\n- `.env.example` вҖ” HUBSOFT_DB_*, WEBHOOK_SECRET_TOKEN, N8N_API_TOKEN\n- `scripts/gerar_hub.py` вҖ” fix script tag injection\n- ~40 arquivos com imports atualizados\n\n---\n\n## Estado Final\n\n| MГ©trica | Valor |\n|---------|-------|\n| Backlog pendente | 27 tarefas |\n| Backlog finalizado | 28 tarefas |\n| Testes | 96 passando |\n| Commits no GitHub | 7 |\n| Documentos criados | 10 (jurГӯdico + treinamento + comercial) |\n\n---\n\n## PrГіximos Passos\n\n1. **Deploy em produГ§ГЈo** вҖ” bloqueador principal (acesso ao servidor)\n2. **Configurar tokens no N8N** вҖ” necessГЎrio antes do deploy\n3. **Criar logo** вҖ” desbloqueia materiais visuais\n4. **Rotacionar senha HubSoft** вҖ” credencial exposta no cГіdigo\n"}, {"t": "f", "n": "Sessao Dev Ajustes 01 04 2026", "fn": "sessao_dev_ajustes_01-04-2026.md", "c": "# SessГЈo Dev: Ajustes, PopulacГЈo e AutomaГ§Гөes вҖ” 01/04/2026\n\n**Data:** 01/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / CS / JurГӯdico)\n**DuraГ§ГЈo:** ~3 horas\n\n---\n\n## Contexto\n\nContinuaГ§ГЈo da sessГЈo intensiva de desenvolvimento. Foco em corrigir bugs, popular o sistema completo para ambos os tenants, reorganizar menus, documentar integraГ§Гөes e iniciar o mГіdulo de AutomaГ§Гөes.\n\n---\n\n## Principais pontos discutidos\n\n- Sistema CS nГЈo mostrava dados porque script populava apenas tenant Megalink, nГЈo Aurora\n- 9 models com `unique=True` global impediam multi-tenancy (mesmo cГіdigo em tenants diferentes dava erro)\n- Chart.js nГЈo carregava em 6 templates do CS (extends `sistema/base.html` que nГЈo inclui Chart.js)\n- ReferГӘncias ao `vendas_web` ainda existiam em imports, admin e template do `/admin/`\n- ReorganizaГ§ГЈo completa dos menus: Comercial, Marketing, CS, Suporte\n- Sistema de notificaГ§Гөes existe estruturalmente mas estГЎ 100% desativado (envio, testes, configuraГ§Гөes)\n- Signals espalhados e hardcoded, necessidade de gerenciamento configurГЎvel pelo cliente\n- Proposta de mГіdulo de AutomaГ§Гөes em Marketing para substituir signals hardcoded\n- DocumentaГ§ГЈo das integraГ§Гөes HubSoft para onboarding\n- Contrato modelo para primeiro cliente (Grupo Magister)\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| Corrigir `unique=True` para `unique_together('tenant', campo)` em 9 models | Multi-tenancy quebrava com dados em 2+ tenants |\n| Reorganizar menu CS em 3 seГ§Гөes: Customer Success, FidelizaГ§ГЈo, ConfiguraГ§Гөes | Menu antigo tinha 5 seГ§Гөes fragmentadas |\n| IndicaГ§Гөes vai para FidelizaГ§ГЈo, nГЈo CS | Гү mecГўnica de benefГӯcio/engajamento |\n| Membros renomeado para Clientes no menu CS | Mais claro para o usuГЎrio final |\n| RetenГ§ГЈo removido do menu temporariamente | MГіdulo nГЈo estГЎ pronto |\n| Vendas movido para dentro do CRM, Desempenho virou Dashboard do Comercial | OrganizaГ§ГЈo mais lГіgica |\n| CS renomeado para Customer Success no menu | Nome completo mais profissional |\n| MГіdulo AutomaГ§Гөes serГЎ em Marketing | Clients devem gerenciar signals/regras de automaГ§ГЈo de forma visual |\n| Frontend primeiro, backend depois para AutomaГ§Гөes | Validar UX antes de implementar |\n| Contrato modelo criado do zero | Primeiro cliente real (Grupo Magister) |\n\n---\n\n## O que foi feito\n\n### CorreГ§Гөes\n- Populou sistema completo para Megalink + Aurora HQ (leads B2B, CRM, CS, giros, validaГ§Гөes)\n- Corrigiu 9 models: RegraPontuacao, TipoNotificacao, CanalNotificacao, Cidade, MembroClube, CategoriaParceiro, CupomDesconto, ResgateCupom, CampanhaTrafego, TagCRM\n- Adicionou Chart.js em 6 templates CS\n- Removeu todas as referГӘncias a `vendas_web` em `apps/`\n- Removeu template legado `templates/admin/index.html`\n- Corrigiu UserAdmin com campo `telefone` inexistente\n- Removeu seГ§ГЈo \"EstatГӯsticas do Sistema\" das configuraГ§Гөes\n- Removeu seГ§ГЈo \"Equipes\" duplicada das configuraГ§Гөes CRM\n- Tarefas CRM abre na aba \"Todas Pendentes\" por padrГЈo\n- BotГЈo Excluir pipeline virou Гӯcone discreto\n\n### Menus reorganizados\n- Comercial: Dashboard (ex-Desempenho) > CRM (Pipeline, Vendas, Tarefas) > Config (ConfiguraГ§Гөes, Equipes, Metas)\n- Marketing: Leads, Campanhas, AutomaГ§Гөes (novo), Landing Page, Segmentos\n- Customer Success: Dashboard, Clientes > FidelizaГ§ГЈo (IndicaГ§Гөes, Parceiros, Cupons, Roleta) > ConfiguraГ§Гөes (Banners, Carteirinhas, NГӯveis e XP)\n- Removidos: Cadastro do Comercial, Aurora do topbar\n\n### DocumentaГ§ГЈo\n- `docs/PRODUTO/03-INTEGRACOES_HUBSOFT.md`: mapa completo das integraГ§Гөes, requisitos de onboarding, checklist\n- `docs/OPERACIONAL/contratos/contrato_grupo_magister_01-04-2026.md` + PDF\n\n### Novo mГіdulo: AutomaГ§Гөes (frontend only)\n- App `apps/marketing/automacoes/` criado\n- Lista de automaГ§Гөes com toggle, KPIs, filtros, busca\n- Builder visual: Quando (9 eventos) > Se (condiГ§Гөes dinГўmicas) > EntГЈo (aГ§Гөes encadeГЎveis com delay)\n- Registrado no INSTALLED_APPS, URLs e menu\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Implementar backend do mГіdulo AutomaГ§Гөes (models, signals dinГўmicos, execuГ§ГЈo) | Dev |\n| Reativar sistema de notificaГ§Гөes (implementar service de envio, signals automГЎticos) | Dev |\n| Implementar mГіdulo RetenГ§ГЈo (churn alerts, NPS) | Dev |\n| Deploy em produГ§ГЈo do multi-tenancy | DevOps |\n| Revisar e assinar contrato Grupo Magister | Lucas / JurГӯdico |\n| Popular dados de `ResgateCupom` no script (grГЎfico Resgates fica vazio) | Dev |\n\n---\n\n## PrГіximos passos\n\n- [ ] Validar frontend de AutomaГ§Гөes e ajustar UX\n- [ ] Implementar backend de AutomaГ§Гөes (RegraAutomacao model, engine de execuГ§ГЈo)\n- [ ] Reativar e conectar sistema de notificaГ§Гөes ao mГіdulo de AutomaГ§Гөes\n- [ ] Implementar mГіdulo RetenГ§ГЈo no CS\n- [ ] Preparar deploy produГ§ГЈo\n- [ ] Onboarding Grupo Magister\n"}, {"t": "f", "n": "Sessao Dev Automacoes 03 04 2026", "fn": "sessao_dev_automacoes_03-04-2026.md", "c": "# SessГЈo Dev: AutomaГ§Гөes, Filtros CRM, Segmentos e Ajustes вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / CPO / QA)\n**DuraГ§ГЈo:** ~4 horas\n\n---\n\n## Contexto\n\nContinuaГ§ГЈo do desenvolvimento. Foco em filtros do CRM, reorganizaГ§ГЈo de segmentos para Marketing, refatoraГ§ГЈo completa do mГіdulo de AutomaГ§Гөes com editor visual, e evoluГ§ГЈo dos testes.\n\n---\n\n## Principais pontos discutidos\n\n- Filtros no CRM (pipeline, oportunidades, tarefas) precisavam ser colapsГЎveis no padrГЈo \"Filtros >\"\n- Segmentos devem pertencer ao Marketing, nГЈo ao Comercial\n- Segmentos precisam de pГЎgina dedicada com regras dinГўmicas e preview em tempo real\n- Signal para atualizar segmentos automaticamente quando lead muda\n- AutomaГ§Гөes Г© o mГіdulo mais importante do Marketing\n- Fluxos condicionais (if/else entre aГ§Гөes) sГЈo necessГЎrios\n- Editor visual tipo N8N/Zapier (Drawflow)\n- Segmentos como fonte de dados para disparo em massa\n- Timeline de automaГ§Гөes na ficha do lead\n- Controles robustos (rate limit, cooldown, deduplicaГ§ГЈo)\n- Logs claros por lead e por regra\n- PostgreSQL local configurado (aurora_dev)\n- MigraГ§ГЈo de dados SQLite вҶ’ PostgreSQL para Aurora HQ\n\n---\n\n## O que foi implementado\n\n### CRM\n- Filtros colapsГЎveis (padrГЈo \"Filtros >\") no Pipeline, Oportunidades e Tarefas\n- Filtros por responsГЎvel, tag, valor no Pipeline\n- Filtros por estГЎgio, responsГЎvel, tag nas Oportunidades\n- Filtros por tipo, responsГЎvel, prioridade nas Tarefas\n- Dropdown de seleГ§ГЈo de pipeline no tГӯtulo (substitui tabs)\n- Troca de pipeline via AJAX sem reload da pГЎgina\n- Superuser vГӘ tarefas de todos\n\n### Segmentos\n- Movidos do CRM para Marketing (URLs /marketing/segmentos/)\n- PГЎgina dedicada de criaГ§ГЈo/ediГ§ГЈo (substituiu modal)\n- Builder de regras dinГўmicas (campo + operador + valor)\n- Preview em tempo real (mostra leads que atendem as regras)\n- Signal automГЎtico: lead criado/atualizado avalia segmentos dinГўmicos\n- Service extraГӯdo para `apps/comercial/crm/services/segmentos.py`\n\n### AutomaГ§Гөes (refatoraГ§ГЈo completa)\n- 4 novos models: NodoFluxo, ConexaoNodo, ExecucaoPendente, ControleExecucao\n- Engine dual-mode: legacy linear + BFS em grafo visual\n- Branching if/else entre aГ§Гөes\n- Delays reais via ExecucaoPendente + cron\n- Management command `executar_automacoes_cron`\n- Editor visual Drawflow (drag & drop, paleta de nГіs, painel de config)\n- Dashboard central com KPIs, grГЎfico 30 dias, erros\n- Timeline de automaГ§Гөes na ficha do lead\n- IntegraГ§ГЈo com segmentos (lead_entrou_segmento, disparo em massa)\n- Controles: max_execucoes_por_lead, cooldown_horas\n- 60 testes passando\n- DocumentaГ§ГЈo completa em docs/PRODUTO/05-AUTOMACOES.md\n\n### Infraestrutura\n- PostgreSQL 18 instalado localmente\n- Banco aurora_dev criado\n- settings_local_pg.py configurado\n- MigraГ§ГЈo SQLite вҶ’ PostgreSQL do tenant Aurora HQ (CRM, equipes, tags, config)\n\n### Testes\n- Evoluiu de 291 para 756+ testes\n- Cobertura de 40% para 57%\n- DocumentaГ§ГЈo de testes em docs/PRODUTO/04-TESTES.md\n\n### Outros ajustes\n- Removido \"Aurora\" do menu topbar\n- Removido \"Cadastro\" do menu Comercial\n- Removido \"EstatГӯsticas do Sistema\" das configuraГ§Гөes\n- CS renomeado para \"Customer Success\"\n- Membros renomeado para \"Clientes\" no CS\n- IndicaГ§Гөes movida para primeira posiГ§ГЈo em FidelizaГ§ГЈo\n- RetenГ§ГЈo removida temporariamente do menu\n- Cores de segmentos padronizadas com sistema\n- Erro `vendas_web_leadprospecto` no admin corrigido\n- Admin Aurora: pГЎginas Produto, Docs e Backlog adicionadas\n- Contrato Grupo Magister gerado (MD + PDF)\n\n---\n\n## PrГіximos passos\n\n- [ ] Testar editor visual Drawflow com feedback do Lucas\n- [ ] MГіdulo de Suporte (atendimentos + tickets)\n- [ ] Feedback e ajustes no CRM e AutomaГ§Гөes\n"}, {"t": "f", "n": "Tech Refatoracao 29 03 2026", "fn": "tech_refatoracao_29-03-2026.md", "c": "# RefatoraГ§ГЈo tГ©cnica e migraГ§ГЈo CS вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, Assistente IA (Tech Lead, DevOps, QA, SeguranГ§a)\n**DuraГ§ГЈo:** sessГЈo extensa (dia inteiro)\n\n---\n\n## Contexto\n\nNecessidade de refatorar o monolito vendas_web em apps separados por mГіdulo, implementar multi-tenancy para viabilizar o modelo SaaS, reforГ§ar seguranГ§a de credenciais e migrar o mГіdulo CS (megaroleta) para dentro do hub.\n\n---\n\n## Principais pontos discutidos\n\n- SeparaГ§ГЈo do monolito vendas_web em 10 apps por mГіdulo (OpГ§ГЈo A aprovada pelo CEO), organizados em quatro ГЎreas: Base (sistema, notificacoes, integracoes, dashboard), Comercial (leads, atendimento, cadastro, viabilidade, crm), Marketing (campanhas) e CS (clube, parceiros, indicacoes, carteirinha).\n- ImplementaГ§ГЈo completa de multi-tenancy com Tenant, PerfilUsuario, TenantMixin, TenantManager e TenantMiddleware.\n- SeguranГ§a: secrets removidos do cГіdigo fonte e migrados para variГЎveis de ambiente.\n- CriaГ§ГЈo do Painel Admin Aurora (/aurora-admin/) com dashboard de tenants, gerenciamento de planos e features.\n- MigraГ§ГЈo do megaroleta (mГіdulo CS) para dentro do hub: 4 apps, 20 models, 76 URLs, 67+ templates.\n- Templates CS integrados ao layout do hub (vendas_web/base.html).\n- Sidebar CS com sub-seГ§Гөes: Clube, Parceiros, Carteirinhas, IndicaГ§Гөes.\n- CriaГ§ГЈo de 3 novos agentes: SeguranГ§a (AppSec), DevOps, QA.\n- DefiniГ§ГЈo do CRM do parceiro com 5 estГЎgios: Lead identificado, Em contato, Em negociaГ§ГЈo, Trial ativo, Finalizada.\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Motivo |\n|---------|--------|\n| OpГ§ГЈo A (sub-apps por pasta) para estrutura de apps Django | Melhor organizaГ§ГЈo modular mantendo compatibilidade com o Django |\n| GestГЈo (17 models, agentes IA) NГғO migra para o hub | Complexidade elevada e escopo separado do hub comercial |\n| Templates CS estendem vendas_web/base.html (layout unificado) | ExperiГӘncia visual consistente em todos os mГіdulos |\n| Modais com display:none inline para evitar conflito CSS | SoluГ§ГЈo pragmГЎtica para conflitos de estilo entre mГіdulos |\n\n---\n\n## PendГӘncias\n\n| PendГӘncia | ResponsГЎvel |\n|-----------|-------------|\n| Deploy do multi-tenancy em produГ§ГЈo | DevOps / Tech Lead |\n| Rotacionar credenciais no servidor | DevOps / SeguranГ§a |\n| Logo da AuroraISP (bloqueia materiais visuais) | CEO / Design |\n| Testes automatizados de isolamento de tenant | QA / Tech Lead |\n| Refinamento visual dos templates CS | Tech Lead / UX |\n| URLs hardcoded na landing page do clube | Tech Lead |\n\n---\n\n## PrГіximos passos\n\n- [ ] Deploy do multi-tenancy: rodar migrations, criar seed do tenant Megalink, preencher tenant_id\n- [ ] Rotacionar todas as credenciais no servidor de produГ§ГЈo\n- [ ] Escrever testes automatizados de isolamento de tenant\n- [ ] Refinar visualmente os templates CS integrados\n- [ ] Substituir URLs hardcoded na landing page do clube por {% url %}\n- [ ] Definir logo da AuroraISP para desbloquear materiais visuais\n"}]}, {"t": "d", "n": "tarefas", "ch": [{"t": "d", "n": "backlog", "ch": [{"t": "f", "n": "Aurora Suporte Crm Interno 31 03 2026", "fn": "aurora_suporte_crm_interno_31-03-2026.md", "c": "---\nname: \"Aurora como primeiro cliente: Suporte + CRM interno\"\ndescription: \"Estruturar a AuroraISP como primeira cliente do prГіprio sistema. CRM para pipeline de provedores e sistema de suporte.\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"CEO / PM / Tech Lead\"\n---\n\n# Aurora como Primeiro Cliente: Suporte + CRM Interno вҖ” 31/03/2026\n\n**Data:** 31/03/2026\n**ResponsГЎvel:** CEO / PM / Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nA AuroraISP serГЎ a primeira cliente do prГіprio sistema multi-tenant. NГЈo Г© criar algo novo: Г© usar o mesmo CRM, fluxos de atendimento e CS que jГЎ existem, mas configurados para o contexto B2B (provedores como leads em vez de pessoas fГӯsicas). O tenant \"Aurora HQ\" opera no mesmo sistema que os tenants dos provedores clientes.\n\n---\n\n## Tarefas\n\n### CRM Interno (pipeline de provedores)\n- [ ] Criar tenant \"Aurora HQ\" com configuraГ§ГЈo interna\n- [ ] Definir estГЎgios do pipeline: Lead Identificado > Contato > Qualificado > Demo Agendada > Em Trial > NegociaГ§ГЈo > Cliente Ativo > Churn\n- [ ] Configurar CRM Kanban com os estГЎgios\n- [ ] Definir campos customizados para provedores (base de clientes, ERP, cidade, vendedores)\n- [ ] Criar mГ©tricas: MRR, churn rate, LTV, CAC\n- [ ] Integrar acompanhamento de trials (14 dias)\n- [ ] Dashboard interno com pipeline e mГ©tricas\n\n### Sistema de Suporte (tickets)\n- [ ] Definir tipos de ticket: bug, dГәvida, solicitaГ§ГЈo, incidente\n- [ ] Definir prioridades: baixa, normal, alta, urgente\n- [ ] Definir SLA por plano (Starter: 24h, Start: 8h, Pro: 4h)\n- [ ] Criar models: Ticket, ComentarioTicket, CategoriaTicket\n- [ ] Criar views: lista de tickets, detalhe, criar, responder\n- [ ] NotificaГ§ГЈo ao abrir/responder ticket (WhatsApp/email)\n- [ ] Dashboard de suporte (tickets abertos, SLA, tempo mГ©dio)\n- [ ] Base de conhecimento / FAQ\n\n### Fluxos de Atendimento\n- [ ] Fluxo de onboarding do provedor (passo a passo)\n- [ ] Fluxo de suporte tГ©cnico (triagem > resoluГ§ГЈo)\n- [ ] Fluxo de churn prevention (alertas > aГ§ГЈo > retenГ§ГЈo)\n\n---\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: docs/context/reunioes/aurora_primeiro_cliente_31-03-2026.md\n- CRM existente: apps/comercial/crm/ (13 models, pipeline Kanban)\n- Suporte serГЎ novo app: apps/suporte/\n- CS existente: apps/cs/ (clube, parceiros, indicaГ§Гөes, carteirinha, NPS, retenГ§ГЈo)\n\n---\n\n## Resultado esperado\n\nAurora opera usando o prГіprio sistema para vender e dar suporte. Pipeline de provedores gerenciado no CRM. Tickets de suporte com SLA. MГ©tricas de negГіcio visГӯveis no dashboard.\n"}, {"t": "f", "n": "Criar Logo 26 03 2026", "fn": "criar_logo_26-03-2026.md", "c": "---\nname: \"Criar Logo da AuroraISP\"\ndescription: \"Criar a identidade visual da AuroraISP, comeГ§ando pela logo. Гү o principal desbloqueador do lanГ§amento вҖ” one-pager, pitc\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"CEO\"\n---\n\n# Criar Logo da AuroraISP\n\n**Data:** 26/03/2026\n**ResponsГЎvel:** CEO\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nCriar a identidade visual da AuroraISP, comeГ§ando pela logo. Гү o principal desbloqueador do lanГ§amento вҖ” one-pager, pitch deck, brandbook, redes sociais e landing page dependem dela.\n\n---\n\n## Tarefas\n\n- [ ] Definir direГ§ГЈo criativa (sГӯmbolo, tipografia, estilo)\n- [ ] Criar logo principal (versГЈo colorida)\n- [ ] Criar versГЈo negativa (para fundos escuros)\n- [ ] Criar versГЈo monocromГЎtica\n- [ ] Exportar nos formatos SVG, PNG e PDF\n- [ ] Validar com o time\n\n---\n\n## Contexto e referГӘncias\n\nPaleta oficial definida em [08-BRANDBOOK.md](../../BRAND/08-BRANDBOOK.md):\n- Fundo escuro: #0F172A\n- Azul primГЎrio: #2563EB\n- Gradiente: azul para ciano\n\nTipografia: Inter (Google Fonts)\n\nPosicionamento: hub de tecnologia com IA para provedores de internet. Tom prГіximo, direto e confiante. NГЈo Г© banco, nГЈo Г© startup de Silicon Valley. Гү tecnologia que fala a lГӯngua do provedor regional brasileiro.\n\n---\n\n## Resultado esperado\n\nLogo em todas as variaГ§Гөes, pronta para uso em documentos, digital e apresentaГ§Гөes.\n\n## Impacto ao desbloquear\n\nDesbloquearГЎ: one-pager, pitch deck, brandbook completo, redes sociais, landing page.\n"}, {"t": "f", "n": "Crm Parceiro 27 03 2026", "fn": "crm_parceiro_27-03-2026.md", "c": "---\nname: \"CRM para rastreamento do funil do parceiro\"\ndescription: \"Definir como o parceiro registra e acompanha cada lead ao longo da esteira comercial\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Head de Vendas\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nGarantir visibilidade sobre o funil comercial: quantos leads estГЈo em cada etapa, onde estГЈo travando e o que foi feito em cada um.\n\n## Atividades\n\n- [x] Definir etapas do pipeline вҖ” 5 estГЎgios: Lead identificado, Em contato, Em negociaГ§ГЈo, Trial ativo, Finalizada\n- [x] Definir qualificaГ§ГЈo de entrada (A: HubSoft / B: outro ERP)\n- [x] Definir campos obrigatГіrios por etapa\n- [x] Definir critГ©rios de avanГ§o entre etapas\n- [x] Criar template do CRM вҖ” exports/drafts/fluxos/crm_parceiro.md\n- [ ] Definir ferramenta (opГ§Гөes: Notion, Planilha Google, Pipedrive)\n- [ ] Configurar ferramenta com base no template\n- [ ] Treinar parceiro no uso\n- [ ] Definir cadГӘncia de revisГЈo do funil com o parceiro (semanal?)\n\n## ResponsГЎvel\n\nAurora define a estrutura. Parceiro alimenta.\n\n## ObservaГ§ГЈo\n\nEnquanto o mГіdulo Comercial Pro nГЈo tem CRM prГіprio para a Aurora, essa ferramenta serve como soluГ§ГЈo provisГіria para rastrear as vendas da prГіpria AuroraISP.\n"}, {"t": "f", "n": "Deploy Multitenancy 29 03 2026", "fn": "deploy_multitenancy_29-03-2026.md", "c": "---\nname: \"Deploy do multi-tenancy em produГ§ГЈo\"\ndescription: \"Realizar o deploy do sistema de multi-tenancy em produГ§ГЈo. Isso envolve rodar as migrations no banco de produГ§ГЈo, criar \"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"DevOps / Tech Lead\"\n---\n\n# Deploy do multi-tenancy em produГ§ГЈo вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**ResponsГЎvel:** DevOps / Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nRealizar o deploy do sistema de multi-tenancy em produГ§ГЈo. Isso envolve rodar as migrations no banco de produГ§ГЈo, criar o tenant seed da Megalink, preencher o campo tenant_id nos registros existentes e rotacionar todas as credenciais expostas anteriormente no cГіdigo.\n\n---\n\n## Tarefas\n\n- [ ] Rodar migrations de multi-tenancy no banco de produГ§ГЈo (com backup prГ©vio)\n- [ ] Criar tenant seed da Megalink Telecom\n- [ ] Preencher tenant_id em todos os registros existentes (atribuir ao tenant Megalink)\n- [ ] Rotacionar todas as credenciais no servidor (HubSoft API, N8N, Matrix, etc.)\n- [ ] Atualizar variГЎveis de ambiente no servidor de produГ§ГЈo\n- [ ] Validar que o sistema funciona corretamente com o tenant Megalink\n- [ ] Testar acesso ao Painel Admin Aurora (/aurora-admin/) em produГ§ГЈo\n\n---\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Tarefa concluГӯda: `docs/context/tarefas/finalizadas/refatoracao_apps_29-03-2026.md`\n- Tarefa relacionada: `docs/context/tarefas/backlog/seguranca_credenciais_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nMulti-tenancy ativo em produГ§ГЈo com o tenant Megalink operacional, credenciais rotacionadas e seguras, painel admin acessГӯvel. Sistema pronto para onboarding de novos tenants.\n"}, {"t": "f", "n": "Grupos Provedores 26 03 2026", "fn": "grupos_provedores_26-03-2026.md", "c": "---\nname: \"Mapeamento de Grupos de Provedores\"\ndescription: \"Levantar com o sГіcio comercial quais grupos de WhatsApp e Telegram de provedores regionais sГЈo mais relevantes para pros\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"SГіcio comercial\"\n---\n\n# Mapeamento de Grupos de Provedores\n\n**Data:** 26/03/2026\n**ResponsГЎvel:** SГіcio comercial\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nLevantar com o sГіcio comercial quais grupos de WhatsApp e Telegram de provedores regionais sГЈo mais relevantes para prospecГ§ГЈo da AuroraISP.\n\n---\n\n## Tarefas\n\n- [ ] SГіcio comercial mapear grupos de WhatsApp de ISPs que participa\n- [ ] SГіcio comercial mapear grupos de Telegram relevantes\n- [ ] Identificar grupos com maior concentraГ§ГЈo de donos de provedor (decisores)\n- [ ] Identificar grupos da ABRINT e ABRI\n- [ ] Definir abordagem para cada grupo (conteГәdo, case, indicaГ§ГЈo)\n\n---\n\n## Contexto e referГӘncias\n\nCanal 2 do GTM: [07-CANAIS.md](../../../GTM/07-CANAIS.md)\n\nO foco Г© presenГ§a com conteГәdo de valor, nГЈo propaganda direta. O case anГҙnimo do provedor com 30.000 clientes Г© o principal ativo para usar nesses grupos.\n\n---\n\n## Resultado esperado\n\nLista de 5 a 10 grupos mapeados com perfil, tamanho estimado e abordagem recomendada para cada um.\n"}, {"t": "f", "n": "Implementacao Aurora 05 04 2026", "fn": "implementacao_aurora_05-04-2026.md", "c": "# Tarefa: ImplementaГ§ГЈo Aurora (primeiro cliente)\n\n**Data:** 05/04/2026\n**Status:** Em andamento\n**Prioridade:** Alta\n\n---\n\n## Objetivo\n\nConfigurar a AuroraISP como primeiro cliente da plataforma. Integrar com Uazapi para WhatsApp, configurar Inbox, CRM e automaГ§Гөes bГЎsicas.\n\n## Fases\n\n1. Tenant Aurora (criar, seeds, config)\n2. IntegraГ§ГЈo Uazapi (service, webhook, canal)\n3. Inbox (equipe, fila, respostas)\n4. CRM (pipeline SaaS, tags)\n5. AutomaГ§Гөes bГЎsicas\n6. Marketing (campanhas, segmentos)\n\n## Doc de referГӘncia\n\n`docs/OPERACIONAL/implementacao_aurora_05-04-2026.md`\n"}, {"t": "f", "n": "Lancamento Digital 26 03 2026", "fn": "lancamento_digital_26-03-2026.md", "c": "---\nname: \"LanГ§amento Digital вҖ” Landing Page e Redes Sociais\"\ndescription: \"Criar a presenГ§a digital da AuroraISP: landing page, redes sociais e WhatsApp Business. Esses canais sГЈo necessГЎrios par\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev + PMM\"\n---\n\n# LanГ§amento Digital вҖ” Landing Page e Redes Sociais\n\n**Data:** 26/03/2026\n**ResponsГЎvel:** Dev + PMM\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando logo\n\n---\n\n## DescriГ§ГЈo\n\nCriar a presenГ§a digital da AuroraISP: landing page, redes sociais e WhatsApp Business. Esses canais sГЈo necessГЎrios para dar credibilidade durante a prospecГ§ГЈo e capturar leads inbound no mГ©dio prazo.\n\n---\n\n## Tarefas\n\n- [ ] Criar copy da landing page (PMM)\n- [ ] Desenvolver landing page (Dev, aguarda logo e copy)\n- [ ] Criar perfil no Instagram (aguarda logo)\n- [ ] Criar perfil no LinkedIn (aguarda logo)\n- [ ] Configurar WhatsApp Business (CEO)\n- [ ] Definir domГӯnio oficial (auroraisp.com.br ou similar)\n\n---\n\n## Contexto e referГӘncias\n\n- Tom de voz em [07-TOM_DE_VOZ.md](../../BRAND/07-TOM_DE_VOZ.md)\n- Mensagens chave em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- Posicionamento em [05-POSICIONAMENTO.md](../../GTM/05-POSICIONAMENTO.md)\n\nA landing page deve ter: tagline, subtГӯtulo, os 3 mГіdulos, case anГҙnimo com nГәmeros, CTA para demo.\n\n---\n\n## Resultado esperado\n\nPresenГ§a digital ativa com landing page no ar, redes configuradas e WhatsApp Business pronto para receber contatos.\n"}, {"t": "f", "n": "Lgpd Privacidade 30 03 2026", "fn": "lgpd_privacidade_30-03-2026.md", "c": "---\nname: \"LGPD e Privacidade de Dados\"\ndescription: \"O sistema armazena dados pessoais de leads e clientes (nome, CPF, telefone, endereГ§o, documentos). Com a operaГ§ГЈo SaaS m\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"SeguranГ§a (AppSec) / JurГӯdico\"\n---\n\n# LGPD e Privacidade de Dados вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** SeguranГ§a (AppSec) / JurГӯdico\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO sistema armazena dados pessoais de leads e clientes (nome, CPF, telefone, endereГ§o, documentos). Com a operaГ§ГЈo SaaS multi-tenant, Г© necessГЎrio garantir conformidade com a LGPD, incluindo consentimento, portabilidade e exclusГЈo de dados.\n\n---\n\n## Tarefas\n\n- [ ] Mapear dados pessoais armazenados por model (Lead, Cliente, Membro, etc.)\n- [ ] Implementar registro de consentimento no cadastro de leads\n- [ ] Criar endpoint de exportaГ§ГЈo de dados pessoais (portabilidade)\n- [ ] Criar endpoint de exclusГЈo/anonimizaГ§ГЈo de dados (direito ao esquecimento)\n- [ ] Definir polГӯtica de retenГ§ГЈo de dados por tipo\n- [ ] Revisar logs e auditoria para nГЈo expor dados pessoais\n- [ ] Criptografar campos sensГӯveis (CPF, documentos) em repouso\n- [ ] Documentar fluxo de tratamento de dados no sistema\n\n---\n\n## Contexto e referГӘncias\n\n- Termos de uso e polГӯtica de privacidade: `backlog/contrato_termos_30-03-2026.md`\n- Models com dados pessoais: Lead, ClienteHubSoft, MembroClube, Parceiro\n\n---\n\n## Resultado esperado\n\nSistema em conformidade com LGPD. Consentimento registrado, dados exportГЎveis/excluГӯveis, campos sensГӯveis criptografados.\n"}, {"t": "f", "n": "Materiais Vendas Visual 27 03 2026", "fn": "materiais_vendas_visual_27-03-2026.md", "c": "---\nname: \"Materiais de Vendas вҖ” VersГөes Visuais\"\ndescription: \"Produzir os arquivos finais em PPT/PDF dos materiais de vendas com identidade visual da AuroraISP\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"CMO\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nTransformar os roteiros aprovados em arquivos visuais prontos para uso pelo parceiro.\n\n## Atividades\n\n- [ ] Criar one-pager em PPT e exportar PDF вҶ’ exports/prospect/01_prospeccao/\n- [ ] Criar pre-demo deck em PPT e exportar PDF вҶ’ exports/prospect/01_prospeccao/\n- [ ] Criar deck de apoio em PPT e exportar PDF вҶ’ exports/prospect/02_demo/\n- [ ] Criar deck do parceiro em PPT (uso interno) вҶ’ exports/parceiro/demo/\n- [ ] Criar case anГҙnimo em PDF вҶ’ exports/prospect/03_proposta/\n\n## DependГӘncias\n\n- Logo da AuroraISP (criar_logo_26-03-2026.md)\n\n## ReferГӘncias\n\n- Roteiros em exports/drafts/apresentacao/\n- Paleta e tipografia em docs/BRAND/08-BRANDBOOK.md\n"}, {"t": "f", "n": "Migrar Gestao Megaroleta 30 03 2026", "fn": "migrar_gestao_megaroleta_30-03-2026.md", "c": "---\nname: \"Migrar App GestГЈo do Megaroleta\"\ndescription: \"O app `gestao` do megaroleta (17 models, agentes IA) nГЈo foi migrado para o hub. Existe um TODO no cГіdigo (`apps/cs/club\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev\"\n---\n\n# Migrar App GestГЈo do Megaroleta вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO app `gestao` do megaroleta (17 models, agentes IA) nГЈo foi migrado para o hub. Existe um TODO no cГіdigo (`apps/cs/clube/views/membro_views.py:193`) referenciando essa pendГӘncia. Гү necessГЎrio avaliar quais models sГЈo relevantes e migrГЎ-los.\n\n---\n\n## Tarefas\n\n- [ ] Auditar os 17 models do `gestao` no megaroleta\n- [ ] Definir quais models serГЈo migrados e para qual app destino\n- [ ] Migrar models relevantes (FAQ, configuraГ§Гөes de agentes IA)\n- [ ] Atualizar referГӘncias no app `clube` (resolver TODO)\n- [ ] Gerar migrations\n- [ ] Testar localmente\n\n---\n\n## Contexto e referГӘncias\n\n- TODO em `apps/cs/clube/views/membro_views.py:193`\n- App original: `megaroleta/gestao/` (somente leitura)\n- Tarefa relacionada: `finalizadas/migracao_megaroleta_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nModels relevantes do `gestao` integrados ao hub. TODO resolvido. Funcionalidades de FAQ e agentes IA disponГӯveis no mГіdulo CS.\n"}, {"t": "f", "n": "Modulo Automacoes 01 04 2026", "fn": "modulo_automacoes_01-04-2026.md", "c": "---\nname: \"MГіdulo AutomaГ§Гөes: Backend completo\"\ndescription: \"Implementar models, engine de execuГ§ГЈo e APIs do mГіdulo de automaГ§Гөes em Marketing\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# MГіdulo AutomaГ§Гөes вҖ” Backend вҖ” 01/04/2026\n\n**Data:** 01/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nImplementar o backend do mГіdulo de automaГ§Гөes que permite ao cliente criar regras do tipo \"Quando X acontecer, se Y, entГЈo faГ§a Z\". O frontend (lista + builder) jГЎ estГЎ pronto em `apps/marketing/automacoes/`.\n\n---\n\n## Tarefas\n\n- [x] Frontend: lista de automaГ§Гөes com toggle, KPIs, filtros\n- [x] Frontend: builder visual (Quando/Se/EntГЈo)\n- [x] URLs e views placeholder\n- [ ] Models: RegraAutomacao, CondicaoRegra, AcaoRegra, LogExecucao\n- [ ] Admin registration\n- [ ] Views: CRUD de regras via POST do formulГЎrio\n- [ ] Engine: dispatcher que escuta signals e executa regras ativas\n- [ ] AГ§Гөes: enviar_whatsapp, criar_tarefa, mover_estagio, notificacao_sistema, dar_pontos, webhook\n- [ ] CondiГ§Гөes: avaliador dinГўmico de campo/operador/valor\n- [ ] Delay: suporte a aГ§Гөes com atraso (minutos/horas/dias)\n- [ ] Log de execuГ§Гөes por regra\n- [ ] Testes\n\n---\n\n## Contexto e referГӘncias\n\n- Frontend: `apps/marketing/automacoes/templates/automacoes/lista.html` e `criar.html`\n- Signals existentes: `apps/integracoes/signals.py`, `apps/comercial/cadastro/signals.py`\n- Sistema de notificaГ§Гөes: `apps/notificacoes/` (desativado, serГЎ conectado)\n\n---\n\n## Resultado esperado\n\nCliente consegue criar, ativar/desativar e monitorar regras de automaГ§ГЈo pelo painel. Exemplo: \"Quando novo lead chegar via WhatsApp com score >= 7, criar tarefa no CRM e enviar WhatsApp de boas vindas.\"\n"}, {"t": "f", "n": "Modulo Marketing 30 03 2026", "fn": "modulo_marketing_30-03-2026.md", "c": "---\nname: \"Desenvolver MГіdulo Marketing\"\ndescription: \"O mГіdulo Marketing estГЎ listado no hub como \"a desenvolver\". Atualmente existe apenas o app `apps/marketing/campanhas/` \"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / PM\"\n---\n\n# Desenvolver MГіdulo Marketing вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / PM\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO mГіdulo Marketing estГЎ listado no hub como \"a desenvolver\". Atualmente existe apenas o app `apps/marketing/campanhas/` com detecГ§ГЈo de trГЎfego pago. Гү necessГЎrio expandir para cobrir o escopo completo do mГіdulo: rГ©guas de automaГ§ГЈo, segmentaГ§ГЈo de base, integraГ§Гөes de e-mail e WhatsApp em massa, e relatГіrios de performance.\n\n---\n\n## Tarefas\n\n- [ ] Definir escopo do MVP do mГіdulo Marketing (Start vs Pro)\n- [ ] Especificar models: Campanha, Segmento, Disparo, Metricas\n- [ ] Implementar segmentaГ§ГЈo de base de leads/clientes\n- [ ] Implementar disparo em massa (WhatsApp via N8N, e-mail)\n- [ ] Criar dashboard de performance de campanhas\n- [ ] Integrar com rГ©guas de automaГ§ГЈo\n- [ ] Definir limites por plano (Start vs Pro)\n- [ ] Testar fluxos com tenant de teste\n\n---\n\n## Contexto e referГӘncias\n\n- App existente: `apps/marketing/campanhas/`\n- RГ©guas: `docs/PRODUTO/01-REGUAS_PADRAO.md` (M01 a M03)\n- PrecificaГ§ГЈo: `docs/GTM/08-PRECIFICACAO.md` (transacional por base de leads)\n\n---\n\n## Resultado esperado\n\nMГіdulo Marketing funcional no plano Start (rГ©guas bГЎsicas, segmentaГ§ГЈo simples). Base para evoluГ§ГЈo ao plano Pro (IA, trГЎfego pago).\n"}, {"t": "f", "n": "Pos Ativacao 27 03 2026", "fn": "pos_ativacao_27-03-2026.md", "c": "---\nname: \"Processo pГіs-ativaГ§ГЈo\"\ndescription: \"Definir o que acontece depois que o cliente estГЎ ativo вҖ” NPS, indicaГ§ГЈo, expansГЈo para outros mГіdulos\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"CS\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nCriar o processo de acompanhamento pГіs-ativaГ§ГЈo para aumentar retenГ§ГЈo, gerar indicaГ§Гөes e expandir para Marketing e CS.\n\n## Atividades\n\n- [ ] Definir touchpoints pГіs-ativaГ§ГЈo (D+7, D+30, D+60, D+90)\n- [ ] Criar mensagem de NPS para D+30 (integra com rГ©gua CS02)\n- [ ] Criar fluxo de pedido de indicaГ§ГЈo para clientes com NPS 9 ou 10\n- [ ] Definir gatilho para oferta de expansГЈo (quando oferecer Marketing ou CS)\n- [ ] Definir quem faz o acompanhamento pГіs-ativaГ§ГЈo (Aurora ou parceiro)\n- [ ] Documentar em 12-FLUXO_COMERCIAL.md e criar drafts em exports/drafts/whatsapp/\n\n## ResponsГЎvel\n\nAurora define e executa (pГіs-ativaГ§ГЈo Г© responsabilidade do time interno).\n"}, {"t": "f", "n": "Processo Suporte Cobranca 30 03 2026", "fn": "processo_suporte_cobranca_30-03-2026.md", "c": "---\nname: \"Processo de Suporte e CobranГ§a\"\ndescription: \"NГЈo hГЎ processo definido para suporte ao cliente SaaS nem modelo de cobranГ§a implementado. Com a Fase 1 comeГ§ando, Г© nec\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"CEO / RevOps\"\n---\n\n# Processo de Suporte e CobranГ§a вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** CEO / RevOps\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nNГЈo hГЎ processo definido para suporte ao cliente SaaS nem modelo de cobranГ§a implementado. Com a Fase 1 comeГ§ando, Г© necessГЎrio definir como os clientes serГЈo atendidos e como a cobranГ§a (mensalidade fixa + transacional variГЎvel) serГЎ operacionalizada.\n\n---\n\n## Tarefas\n\n- [ ] Definir canais de suporte (WhatsApp, e-mail, portal)\n- [ ] Definir SLA de atendimento por plano (Start vs Pro)\n- [ ] Criar base de conhecimento / FAQ para clientes\n- [ ] Definir modelo de faturamento (gateway de pagamento, boleto, Pix)\n- [ ] Implementar cГЎlculo do transacional variГЎvel por mГіdulo\n- [ ] Criar dashboard de faturamento por tenant no Admin Aurora\n- [ ] Definir processo de cobranГ§a inadimplente\n- [ ] Documentar fluxo completo de suporte e cobranГ§a\n\n---\n\n## Contexto e referГӘncias\n\n- PrecificaГ§ГЈo: `docs/GTM/08-PRECIFICACAO.md` (modelo transacional)\n- Admin Aurora: `finalizadas/admin_aurora_29-03-2026.md`\n- Fluxo comercial: `docs/GTM/12-FLUXO_COMERCIAL.md` (pГіs-ativaГ§ГЈo)\n\n---\n\n## Resultado esperado\n\nProcesso de suporte funcional com SLA definido. CobranГ§a automatizada (mensalidade + transacional). Dashboard de faturamento visГӯvel no Admin Aurora.\n"}, {"t": "f", "n": "Reguas Automacao Implementar 30 03 2026", "fn": "reguas_automacao_implementar_30-03-2026.md", "c": "---\nname: \"Implementar RГ©guas de AutomaГ§ГЈo\"\ndescription: \"As 16 rГ©guas de automaГ§ГЈo estГЈo especificadas (`docs/PRODUTO/01-REGUAS_PADRAO.md`) mas nenhuma foi implementada no cГіdig\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / CRM e AutomaГ§ГЈo\"\n---\n\n# Implementar RГ©guas de AutomaГ§ГЈo вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / CRM e AutomaГ§ГЈo\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nAs 16 rГ©guas de automaГ§ГЈo estГЈo especificadas (`docs/PRODUTO/01-REGUAS_PADRAO.md`) mas nenhuma foi implementada no cГіdigo. SГЈo o motor de automaГ§ГЈo do hub, cobrindo os mГіdulos Comercial (C01 a C06), CS (CS01 a CS07) e Marketing (M01 a M03).\n\n---\n\n## Tarefas\n\n- [ ] Definir arquitetura do motor de rГ©guas (models: Regua, EtapaRegua, ExecucaoRegua)\n- [ ] Criar app `apps/marketing/automacao/` ou integrar ao `apps/marketing/campanhas/`\n- [ ] Implementar rГ©guas do Comercial (C01 a C06) вҖ” prioridade: C01 (boas-vindas), C02 (follow-up)\n- [ ] Implementar rГ©guas do CS (CS01 a CS07) вҖ” prioridade: CS01 (onboarding), CS02 (NPS)\n- [ ] Implementar rГ©guas do Marketing (M01 a M03)\n- [ ] Integrar com N8N para disparo de WhatsApp/e-mail\n- [ ] Criar painel de configuraГ§ГЈo por tenant (ativar/desativar rГ©guas)\n- [ ] Criar logs de execuГ§ГЈo por rГ©gua\n- [ ] Testar fluxos end-to-end\n\n---\n\n## Contexto e referГӘncias\n\n- EspecificaГ§ГЈo: `docs/PRODUTO/01-REGUAS_PADRAO.md` (16 fluxos detalhados)\n- IntegraГ§ГЈo N8N existente: `apps/integracoes/`\n- Depende de: Apps NPS e RetenГ§ГЈo (`apps_cs_nps_retencao_30-03-2026.md`)\n\n---\n\n## Resultado esperado\n\nMotor de rГ©guas funcional com pelo menos as rГ©guas C01, C02, CS01 e CS02 em produГ§ГЈo. ConfigurГЎvel por tenant. Logs de execuГ§ГЈo visГӯveis no painel.\n"}, {"t": "f", "n": "Textos Regua Recuperacao 27 03 2026", "fn": "textos_regua_recuperacao_27-03-2026.md", "c": "---\nname: \"Textos da RГ©gua de RecuperaГ§ГЈo PГіs-Trial\"\ndescription: \"Escrever os textos de cada mensagem da rГ©gua de recuperaГ§ГЈo por canal e segmento\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"PMM\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nEscrever os textos de todas as mensagens da rГ©gua de recuperaГ§ГЈo pГіs-trial seguindo a estrutura definida em:\n`exports/drafts/email/regua_recuperacao_pos_trial_estrutura.md`\n\n## Atividades\n\n### Segmento: Usou o trial\n- [ ] D+1 вҖ” WhatsApp PMM (entender o que travou)\n- [ ] D+7 вҖ” WhatsApp PMM + e-mail (oferta: 1 mГӘs com 30% de desconto)\n- [ ] D+15 вҖ” E-mail + WhatsApp PMM (oferta: setup gratuito)\n- [ ] D+22 вҖ” WhatsApp parceiro + e-mail (oferta: setup grГЎtis + 50% de desconto)\n- [ ] D+30 вҖ” WhatsApp parceiro + e-mail (oferta: primeiro mГӘs grГЎtis. Гҡltima tentativa.)\n\n### Segmento: NГЈo usou o trial\n- [ ] D+1 вҖ” WhatsApp PMM (entender o que aconteceu)\n- [ ] D+7 вҖ” WhatsApp PMM + e-mail (oferta: extensГЈo do trial por 7 dias)\n- [ ] D+15 вҖ” E-mail + WhatsApp PMM (oferta: 1 mГӘs com 30% de desconto)\n- [ ] D+22 вҖ” WhatsApp parceiro + e-mail (oferta: setup gratuito)\n- [ ] D+30 вҖ” WhatsApp parceiro + e-mail (oferta: primeiro mГӘs grГЎtis. Гҡltima tentativa.)\n\n## ResponsГЎvel\n\nPMM redige todos os textos. Scripts do parceiro (D+22 e D+30) salvos em exports/drafts/scripts_vendas/. Demais mensagens em exports/drafts/whatsapp/ e exports/drafts/email/.\n\n## DependГӘncias\n\n- Estrutura aprovada: exports/drafts/reguas/regua_recuperacao_pos_trial_estrutura.md вң…\n"}, {"t": "f", "n": "Textos Regua Trial 27 03 2026", "fn": "textos_regua_trial_27-03-2026.md", "c": "---\nname: \"Textos da RГ©gua de ConversГЈo do Trial\"\ndescription: \"Escrever os textos de cada mensagem da rГ©gua de trial por canal (WhatsApp, e-mail, notificaГ§ГЈo)\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"PMM\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nEscrever os textos de todas as mensagens da rГ©gua de trial seguindo a estrutura definida em:\n`exports/drafts/email/regua_trial_estrutura.md`\n\n## Atividades\n\n### Trilho comum\n- [ ] D+0 вҖ” E-mail de boas-vindas\n\n### Trilho Ativo\n- [ ] D+1 вҡЎ вҖ” NotificaГ§ГЈo de celebraГ§ГЈo (primeiro lead processado)\n- [ ] D+3 вҖ” E-mail de relatГіrio de uso\n- [ ] D+7 вҖ” E-mail mostrando funcionalidade nГЈo utilizada\n- [ ] D+10 вҖ” Script WhatsApp para o parceiro\n- [ ] D+12 вҖ” Script WhatsApp para o parceiro + e-mail de urgГӘncia\n- [ ] D+14 вҖ” E-mail de encerramento + notificaГ§ГЈo\n\n### Trilho Inativo\n- [ ] D+1 вҖ” WhatsApp PMM (verificar problema tГ©cnico)\n- [ ] D+3 вҖ” WhatsApp PMM (sessГЈo de ativaГ§ГЈo assistida)\n- [ ] D+5 вҖ” WhatsApp PMM (entender o motivo de nГЈo uso)\n- [ ] D+7 вҖ” E-mail + WhatsApp PMM (Гәltima tentativa)\n- [ ] D+10 вҖ” Script WhatsApp para o parceiro\n\n## ResponsГЎvel\n\nPMM redige todos os textos. Scripts do parceiro (D+10 e D+12) salvos em exports/drafts/scripts_vendas/. Demais mensagens em exports/drafts/whatsapp/ e exports/drafts/email/.\n\n## DependГӘncias\n\n- Estrutura da rГ©gua aprovada (exports/drafts/reguas/regua_trial_estrutura.md) вң…\n- Definir ferramenta de detecГ§ГЈo de uso/nГЈo uso para bifurcar os trilhos\n"}]}, {"t": "d", "n": "finalizadas", "ch": [{"t": "f", "n": "Admin Aurora 29 03 2026", "fn": "admin_aurora_29-03-2026.md", "c": "---\nname: Painel Admin Aurora e sistema de planos\ndescription: Painel de gestГЈo do SaaS com gerenciamento de tenants, planos e features\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nCriar o painel administrativo da Aurora para gerenciar provedores, planos e features sem depender do Django Admin.\n\n## Atividades\n\n- [x] Criar app admin_aurora separado do app sistema\n- [x] Dashboard com stats (tenants, ativos, trial, erros)\n- [x] CRUD de tenants (criar, editar mГіdulos/planos, toggle ativo, trial)\n- [x] Detalhe do tenant (users, leads, integraГ§ГЈo HubSoft)\n- [x] Logs do sistema com filtros\n- [x] Model Plano (modulo, tier, preco_mensal, preco_transacional)\n- [x] Model FeaturePlano (slug, nome, categoria, vinculado ao Plano)\n- [x] 9 planos criados (3x3) conforme 08-PRECIFICACAO.md\n- [x] 115 features distribuГӯdas entre planos\n- [x] Tenant vinculado ao Plano via FK (tem_feature, features_ativas)\n- [x] Command seed_planos para recriar features\n- [x] Command criar_tenant para onboarding\n- [x] Gerenciamento visual de planos (/aurora-admin/planos/)\n- [x] EdiГ§ГЈo de features por plano (/aurora-admin/planos/{id}/)\n- [x] Topbar com botГЈo Aurora (staff only)\n- [x] Context processor multi-tenant (mГіdulos, planos, cores, logo)\n- [x] Controle de mГіdulos na topbar e sidebar\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: docs/context/reunioes/admin_aurora_planos_29-03-2026.md\n- PrecificaГ§ГЈo: docs/GTM/08-PRECIFICACAO.md\n- URL: /aurora-admin/\n\n## Resultado esperado\n\nGestГЈo completa do SaaS via painel web. Planos e features editГЎveis sem deploy.\n"}, {"t": "f", "n": "Admin Aurora Tenant Check 30 03 2026", "fn": "admin_aurora_tenant_check_30-03-2026.md", "c": "---\nname: \"Admin Aurora вҖ” VerificaГ§ГЈo de Tenant por Objeto\"\ndescription: \"O painel Admin Aurora usa `@staff_required` (verifica `is_staff`) mas nГЈo valida se o objeto acessado pertence ao tenant\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Admin Aurora вҖ” VerificaГ§ГЈo de Tenant por Objeto вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO painel Admin Aurora usa `@staff_required` (verifica `is_staff`) mas nГЈo valida se o objeto acessado pertence ao tenant do usuГЎrio. Um staff de Tenant A pode acessar detalhes de Tenant B via URL direta.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar verificaГ§ГЈo de tenant em todas as views que recebem ID por URL\n- [ ] Restringir `tenant_detalhe` para superusers ou verificar que o staff pertence ao tenant\n- [ ] Revisar permissГөes: staff vГӘ apenas seu tenant, superuser vГӘ todos\n- [ ] Testar com staff de Tenant A acessando URL de Tenant B (esperar 403)\n\n---\n\n## Contexto e referГӘncias\n\n- Views: `apps/admin_aurora/views.py`, linhas 21-279\n- Decorator: `staff_required` verifica apenas `is_staff`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nStaff users sГі acessam dados do seu tenant. Superusers acessam todos. Acesso indevido retorna 403.\n"}, {"t": "f", "n": "Admin Render Value 30 03 2026", "fn": "admin_render_value_30-03-2026.md", "c": "---\nname: \"Corrigir ExibiГ§ГЈo de Senhas no Admin\"\ndescription: \"O formulГЎrio de ediГ§ГЈo de integraГ§Гөes no Django Admin usa `render_value=True` nos campos de senha e client_secret. Isso \"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Corrigir ExibiГ§ГЈo de Senhas no Admin вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO formulГЎrio de ediГ§ГЈo de integraГ§Гөes no Django Admin usa `render_value=True` nos campos de senha e client_secret. Isso faz com que os valores apareГ§am em texto plano no HTML da pГЎgina, expostos no histГіrico do navegador e no cГіdigo-fonte.\n\n---\n\n## Tarefas\n\n- [ ] Remover `render_value=True` dos PasswordInput em `apps/integracoes/admin.py`\n- [ ] Verificar se outros formulГЎrios de admin expГөem senhas da mesma forma\n\n---\n\n## Contexto e referГӘncias\n\n- Arquivo: `robo/dashboard_comercial/gerenciador_vendas/apps/integracoes/admin.py`, linhas 15-24\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCampos de senha no admin nunca exibem o valor armazenado. Comportamento padrГЈo do Django (campo vazio ao editar).\n"}, {"t": "f", "n": "Allowed Hosts Producao 30 03 2026", "fn": "allowed_hosts_producao_30-03-2026.md", "c": "---\nname: \"Limpar ALLOWED_HOSTS de ProduГ§ГЈo\"\ndescription: \"O `settings_production.py` contГ©m IP hardcoded e `localhost`/`127.0.0.1` no ALLOWED_HOSTS. Isso aumenta a superfГӯcie de \"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"DevOps\"\n---\n\n# Limpar ALLOWED_HOSTS de ProduГ§ГЈo вҖ” 30/03/2026\n\n**Data
