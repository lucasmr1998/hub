para exportação por 30 (trinta) dias, com exclusão posterior |\n| Logs de acesso à Plataforma | 6 (seis) meses, conforme o Marco Civil da Internet (Art. 15) |\n| Dados para cumprimento de obrigação legal | Pelo prazo determinado pela legislação aplicável |\n\n7.3. Após o término do prazo de retenção, os dados pessoais serão eliminados de forma segura e irreversível, salvo quando a retenção for necessária para cumprimento de obrigação legal ou regulatória.\n\n---\n\n## 8. SEGURANÇA DOS DADOS\n\n8.1. A Aurora adota medidas técnicas e administrativas adequadas para proteger os dados pessoais contra acessos não autorizados, destruição acidental ou ilícita, perda, alteração, comunicação ou qualquer forma de tratamento inadequado, incluindo:\n\na) **Criptografia:** dados em trânsito protegidos por TLS/SSL e dados sensíveis armazenados com criptografia;\n\nb) **Controle de acesso:** autenticação obrigatória, permissões baseadas em perfis de usuário e princípio do menor privilégio;\n\nc) **Isolamento de dados:** arquitetura multi-tenant com isolamento lógico, impedindo que dados de um CONTRATANTE sejam acessíveis por outro;\n\nd) **Backups:** cópias de segurança regulares, armazenadas de forma criptografada;\n\ne) **Monitoramento:** registros de acesso e atividades para detecção de incidentes de segurança;\n\nf) **Atualizações:** aplicação regular de patches de segurança e atualizações de infraestrutura;\n\ng) **Treinamento:** capacitação da equipe sobre práticas de proteção de dados e privacidade.\n\n8.2. Apesar das medidas adotadas, nenhum sistema é integralmente seguro. A Aurora não pode garantir proteção absoluta contra todas as ameaças, mas se compromete a empregar os melhores esforços para manter a segurança dos dados.\n\n---\n\n## 9. DIREITOS DO TITULAR\n\n9.1. Em conformidade com os artigos 17 a 22 da LGPD, o titular dos dados pessoais tem direito a:\n\na) **Confirmação da existência de tratamento:** obter confirmação de que seus dados pessoais são tratados pela Aurora;\n\nb) **Acesso aos dados:** acessar seus dados pessoais mantidos pela Aurora;\n\nc) **Correção:** solicitar a correção de dados incompletos, inexatos ou desatualizados;\n\nd) **Anonimização, bloqueio ou eliminação:** solicitar a anonimização, bloqueio ou eliminação de dados desnecessários, excessivos ou tratados em desconformidade com a LGPD;\n\ne) **Portabilidade:** solicitar a portabilidade dos dados a outro fornecedor de serviço, mediante requisição expressa e observada a regulamentação da ANPD;\n\nf) **Eliminação:** solicitar a eliminação dos dados pessoais tratados com base no consentimento, exceto nas hipóteses de conservação previstas no Art. 16 da LGPD;\n\ng) **Informação sobre compartilhamento:** ser informado sobre as entidades públicas e privadas com as quais a Aurora realizou uso compartilhado de dados;\n\nh) **Informação sobre consentimento:** ser informado sobre a possibilidade de não fornecer consentimento e sobre as consequências da negativa;\n\ni) **Revogação do consentimento:** revogar o consentimento a qualquer momento, nos termos do § 5º do Art. 8º da LGPD.\n\n9.2. **Quando a Aurora atua como Operadora:** as solicitações de titulares relacionadas a dados inseridos pelo CONTRATANTE deverão ser encaminhadas diretamente ao CONTRATANTE (Controlador). A Aurora apoiará o CONTRATANTE no atendimento dessas solicitações, conforme previsto no Contrato de Prestação de Serviço SaaS.\n\n9.3. **Quando a Aurora atua como Controladora:** as solicitações podem ser feitas diretamente ao Encarregado de Proteção de Dados (DPO) da Aurora, por meio dos canais indicados na Seção 12.\n\n9.4. A Aurora responderá às solicitações dos titulares no prazo de 15 (quinze) dias, conforme previsto na LGPD, podendo solicitar informações adicionais para verificação da identidade do solicitante.\n\n---\n\n## 10. TRANSFERÊNCIA INTERNACIONAL DE DADOS\n\n10.1. A Aurora prioriza o armazenamento de dados em território brasileiro. Caso seja necessária a transferência internacional de dados pessoais (por exemplo, para utilização de serviços de infraestrutura em nuvem com servidores no exterior), a Aurora garantirá que o país de destino proporcione grau de proteção adequado ao previsto na LGPD, ou que sejam adotadas garantias apropriadas, nos termos dos artigos 33 a 36 da LGPD.\n\n10.2. Qualquer transferência internacional de dados será realizada com base nas hipóteses legais previstas na LGPD e em conformidade com a regulamentação da ANPD.\n\n---\n\n## 11. INCIDENTES DE SEGURANÇA\n\n11.1. Em caso de incidente de segurança que possa acarretar risco ou dano relevante aos titulares, a Aurora comunicará:\n\na) O CONTRATANTE afetado, no prazo de 48 (quarenta e oito) horas após a tomada de conhecimento do incidente;\n\nb) A Autoridade Nacional de Proteção de Dados (ANPD), quando o incidente configurar risco ou dano relevante aos titulares, conforme Art. 48 da LGPD.\n\n11.2. A comunicação do incidente incluirá, no mínimo:\n\na) Descrição da natureza dos dados pessoais afetados;\n\nb) Informações sobre os titulares envolvidos;\n\nc) Indicação das medidas técnicas e de segurança utilizadas para a proteção dos dados;\n\nd) Riscos relacionados ao incidente;\n\ne) Medidas que foram ou serão adotadas para reverter ou mitigar os efeitos do incidente.\n\n---\n\n## 12. ENCARREGADO DE PROTEÇÃO DE DADOS (DPO)\n\n12.1. A Aurora designou um Encarregado de Proteção de Dados (Data Protection Officer, \"DPO\"), conforme Art. 41 da LGPD, responsável por:\n\na) Aceitar reclamações e comunicações dos titulares, prestar esclarecimentos e adotar providências;\n\nb) Receber comunicações da ANPD e adotar providências;\n\nc) Orientar os funcionários e contratados da Aurora a respeito das práticas de proteção de dados pessoais;\n\nd) Executar as demais atribuições determinadas pela Aurora ou estabelecidas em normas complementares.\n\n12.2. **Dados de contato do DPO:**\n\n| Informação | Detalhe |\n|-----------|---------|\n| Nome | [NOME DO DPO] |\n| E-mail | [EMAIL DO DPO] |\n| Telefone | [TELEFONE DO DPO] |\n| Endereço | [ENDEREÇO PARA CORRESPONDÊNCIA] |\n\n12.3. As solicitações encaminhadas ao DPO serão respondidas no prazo de 15 (quinze) dias, prorrogável por igual período em caso de complexidade da demanda, mediante justificativa ao solicitante.\n\n---\n\n## 13. COOKIES E TECNOLOGIAS DE RASTREAMENTO\n\n13.1. A Plataforma poderá utilizar cookies e tecnologias similares para:\n\na) Manter a sessão do Usuário ativa durante a navegação;\n\nb) Lembrar preferências e configurações do Usuário;\n\nc) Coletar dados de navegação para fins de segurança e melhoria da Plataforma.\n\n13.2. Os cookies utilizados são:\n\n| Tipo | Finalidade | Prazo |\n|------|-----------|-------|\n| Cookies essenciais | Funcionamento básico da Plataforma, autenticação e segurança | Sessão |\n| Cookies de preferência | Armazenamento de configurações e preferências do Usuário | 1 ano |\n| Cookies analíticos | Dados agregados sobre uso da Plataforma para melhoria contínua | 1 ano |\n\n13.3. A Plataforma **não utiliza** cookies de terceiros para fins de publicidade ou marketing comportamental.\n\n13.4. O Usuário pode gerenciar as configurações de cookies por meio das configurações de seu navegador. A desativação de cookies essenciais poderá comprometer o funcionamento da Plataforma.\n\n---\n\n## 14. ALTERAÇÕES NESTA POLÍTICA\n\n14.1. A Aurora reserva-se o direito de atualizar esta Política periodicamente para refletir mudanças em suas práticas de privacidade, na legislação aplicável ou nos serviços oferecidos.\n\n14.2. As alterações serão comunicadas ao CONTRATANTE por e-mail e/ou por meio de notificação na Plataforma, com antecedência mínima de 15 (quinze) dias antes de sua entrada em vigor.\n\n14.3. O uso continuado da Plataforma após a entrada em vigor das alterações constituirá aceitação da Política atualizada.\n\n14.4. As versões anteriores desta Política serão mantidas em arquivo e poderão ser disponibilizadas mediante solicitação ao DPO.\n\n---\n\n## 15. LEGISLAÇÃO APLICÁVEL E FORO\n\n15.1. Esta Política é regida pela legislação da República Federativa do Brasil, em especial a Lei nº 13.709/2018 (LGPD), o Marco Civil da Internet (Lei nº 12.965/2014) e o Código Civil Brasileiro.\n\n15.2. Fica eleito o foro da Comarca de Teresina, Estado do Piauí, para dirimir quaisquer controvérsias decorrentes desta Política, com renúncia expressa a qualquer outro, por mais privilegiado que seja.\n\n---\n\n## 16. CONTATO\n\n16.1. Para dúvidas, solicitações ou reclamações relacionadas a esta Política de Privacidade ou ao tratamento de dados pessoais, entre em contato:\n\n| Canal | Informação |\n|-------|-----------|\n| E-mail geral | [EMAIL DE CONTATO] |\n| E-mail do DPO | [EMAIL DO DPO] |\n| WhatsApp | [NÚMERO DE WHATSAPP] |\n| Endereço | [ENDEREÇO COMPLETO], Teresina/PI |\n\n---\n\n**AURORAISP TECNOLOGIA LTDA.**\nTeresina/PI\nCNPJ: [CNPJ]\n"}, {"t": "f", "n": "Termos De Uso", "fn": "termos_de_uso.md", "c": "# TERMOS DE USO DA PLATAFORMA AURORAISP\n\n**Última atualização:** 30 de março de 2026\n\n---\n\n## 1. INTRODUÇÃO\n\n1.1. Estes Termos de Uso (\"Termos\") regulam o acesso e a utilização da plataforma **AuroraISP** (\"Plataforma\"), de titularidade da **AURORAISP TECNOLOGIA LTDA.** (\"Aurora\"), pessoa jurídica de direito privado, inscrita no CNPJ sob o nº [CNPJ], com sede na cidade de Teresina, Estado do Piauí.\n\n1.2. Ao acessar ou utilizar a Plataforma, o usuário (\"Usuário\") declara ter lido, compreendido e aceitado integralmente estes Termos. Caso não concorde com qualquer disposição, o Usuário deverá cessar imediatamente o uso da Plataforma.\n\n1.3. A Plataforma é destinada exclusivamente a provedores de serviços de internet (\"ISPs\") e seus colaboradores autorizados, para fins de automação comercial, marketing e gestão de sucesso do cliente.\n\n---\n\n## 2. DEFINIÇÕES\n\n2.1. Para os fins destes Termos, aplicam-se as seguintes definições:\n\n**a) Plataforma:** o sistema AuroraISP, acessível via navegador web e integrações de API stas em sua natureza: automação de processos comerciais, marketing e sucesso do cliente para provedores de internet.\n\n4.2. O Usuário compromete-se a utilizar a Plataforma de forma ética, legal e em conformidade com estes Termos, a legislação brasileira vigente e os bons costumes.\n\n4.3. É considerado uso aceitável:\n\na) Gerenciar leads, oportunidades comerciais e processos de venda;\n\nb) Coletar e armazenar documentos de clientes para fins de contratação de serviços;\n\nc) Enviar comunicações legítimas a clientes e leads com base legal adequada;\n\nd) Integrar a Plataforma com o ERP HubSoft e demais sistemas autorizados;\n\ne) Gerar relatórios e análises para tomada de decisão do CONTRATANTE.\n\n---\n\n## 5. CONDUTAS PROIBIDAS\n\n5.1. É expressamente vedado ao Usuário:\n\na) Utilizar a Plataforma para fins ilícitos, ilegais ou contrários à moralidade e à ordem pública;\n\nb) Realizar envio de comunicações não solicitadas (spam) ou mensagens em massa sem base legal;\n\nc) Inserir, transmitir ou armazenar conteúdo que viole direitos de terceiros, incluindo direitos de propriedade intelectual, privacidade ou imagem;\n\nd) Tentar acessar áreas restritas da Plataforma, sistemas, servidores ou redes sem autorização;\n\ne) Realizar engenharia reversa, descompilação, desmontagem ou qualquer tentativa de obter o código fonte da Plataforma;\n\nf) Desenvolver, distribuir ou utilizar ferramentas que automatizem a interação com a Plataforma de forma não autorizada (bots, scrapers, crawlers);\n\ng) Sobrecarregar intencionalmente a infraestrutura da Plataforma, realizar ataques de negação de serviço (DoS/DDoS) ou explorar vulnerabilidades de segurança;\n\nh) Compartilhar, sublicenciar, alugar, vender ou ceder o acesso à Plataforma a terceiros;\n\ni) Utilizar a Plataforma para coletar dados pessoais sem base legal adequada nos termos da LGPD;\n\nj) Inserir vírus, malware, trojans ou qualquer código malicioso na Plataforma;\n\nk) Simular a identidade de outra pessoa ou entidade egral entre as partes em relação ao uso da Plataforma.\n\n---\n\n**AURORAISP TECNOLOGIA LTDA.**\nTeresina/PI\nContato: [E-MAIL DE CONTATO]\n"}]}, {"t": "d", "n": "reguas", "ch": [{"t": "f", "n": "Regua Recuperacao Pos Trial Estrutura", "fn": "regua_recuperacao_pos_trial_estrutura.md", "c": "# Régua de Recuperação Pós-Trial — AuroraISP\n**Canal:** WhatsApp, E-mail, Notificação no sistema\n**Duração:** 30 dias após encerramento do trial\n**Lógica:** Escalada de oferta. Quanto mais tempo passa, mais agressiva a oferta.\n**Objetivo:** Recuperar prospects que não converteram no trial nos primeiros 30 dias.\n\n---\n\n## Segmentação\n\n| Segmento | Definição |\n|----------|-----------|\n| **Usou o trial** | Processou ao menos 1 lead durante os 14 dias |\n| **Não usou o trial** | Nunca logou ou não processou nenhum lead |\n\n---\n\n## Escalada por segmento\n\n| Dia | Usou o trial | Não usou o trial |\n|-----|-------------|-----------------|\n| D+1 | \"Você viu funcionar. O que travou a decisão?\" — sem oferta | \"O trial passou sem você testar. O que aconteceu?\" — sem oferta |\n| D+7 | 1 mês com 30% de desconto | Extensão do trial por 7 dias |\n| D+15 | Setup gratuito | 1 mês com 30% de desconto |\n| D+22 | Setup gratuito + 1 mês com 50% de desconto | Setup gratuito |\n| D+30 | Primeiro mês grátis. Última tentativa. | Primeiro mês grátis. Última tentativa. |\n\n---\n\n## Canais por touchpoint\n\n| Dia | Canal |\n|-----|-------|\n| D+1 | WhatsApp (PMM) |\n| D+7 | WhatsApp (PMM) + E-mail |\n| D+15 | E-mail + WhatsApp (PMM) |\n| D+22 | WhatsApp (parceiro) + E-mail |\n| D+30 | WhatsApp (parceiro) + E-mail |\n\n> D+22 e D+30 passam para o parceiro — são os momentos mais comerciais do ciclo.\n\n---\n\n## Após D+30 sem resposta\n\nEncerrar ciclo ativo. Mover para nurturing passivo (conteúdo periódico, sem oferta direta).\n\n---\n\n## Pendências\n\n- [ ] Escrever textos de cada mensagem por canal e segmento\n- [ ] Definir condição de encerramento antecipado (ex: prospect responde negativamente de forma definitiva)\n"}, {"t": "f", "n": "Regua Trial Estrutura", "fn": "regua_trial_estrutura.md", "c": "# Régua de Conversão do Trial — AuroraISP\n**Canal:** WhatsApp, E-mail, Notificação no sistema\n**Duração:** 14 dias\n**Lógica:** Orientada por comportamento. Dois trilhos a partir do D+1.\n**Objetivo:** Fazer o cliente usar a ferramenta, mostrar resultados e converter para pagante.\n\n---\n\n## Etapa comum — todos os prospects\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas, orientar primeiro passo, criar expectativa dos 14 dias | E-mail |\n\n---\n\n## Bifurcação — D+1\n\n```\nD+0 — E-mail de boas-vindas (todos)\n         ↓\nD+1 — Primeiro acesso detectado?\n    ├── SIM → Trilho Ativo\n    └── NÃO → Trilho Inativo\n```\n\n---\n\n## Trilho Ativo — usou o sistema\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas e orientação inicial | E-mail |\n| D+1 ⚡ | Primeiro lead processado | Celebrar, mostrar o dado gerado em tempo real | Notificação no sistema |\n| D+3 | Usando ativamente | Relatório: leads processados, conversões, tempo economizado | E-mail |\n| D+7 | Usando | Mostrar funcionalidade que ainda não usou. Ampliar valor percebido | E-mail |\n| D+10 | — | \"Você já viu o resultado. Vamos garantir a continuidade?\" | WhatsApp (parceiro) |\n| D+12 | — | Oferta de fechamento com urgência | WhatsApp (parceiro) + E-mail |\n| D+14 | — | Encerramento formal. Proposta de contrato | E-mail + Notificação |\n\n---\n\n## Trilho Inativo — não usou o sistema\n\n| Dia | Gatilho | Objetivo | Canal |\n|-----|---------|----------|-------|\n| D+0 | Trial ativado | Boas-vindas e orientação inicial | E-mail |\n| D+1 | Não logou | Verificar se teve algum problema técnico para começar | WhatsApp (PMM) |\n| D+3 | Ainda inativo | Oferecer sessão de ativação assistida ao vivo | WhatsApp (PMM) |\n| D+5 | Ainda inativo | Entender o motivo — pergunta direta e sem julgamento | WhatsApp (PMM) |\n| D+7 | Ainda inativo | Última tentativa de ativação com argumento de urgência | E-mail + WhatsApp (PMM) |\n| D+10 | — | Parceiro entra para entender, desbloquear e tentar salvar | WhatsApp (parceiro) |\n\n---\n\n## Convergência — D+10 em diante (ambos os trilhos)\n\n| Dia | Objetivo | Canal |\n|-----|----------|-------|\n| D+10 | Parceiro faz contato comercial. Ativo: fechar. Inativo: entender e desbloquear | WhatsApp (parceiro) |\n| D+12 | Urgência. 2 dias restantes. Oferta de fechamento | WhatsApp (parceiro) + E-mail |\n| D+14 | Encerramento. Converter ou mover para nurturing de longo prazo | E-mail + Notificação |\n\n---\n\n## Pós-trial — não converteu\n\nQuem chega ao D+14 sem converter entra na **Régua de Recuperação Pós-Trial** (a definir separadamente).\n\n> A oferta especial é reservada para o pós-trial. Durante os 14 dias o foco é ativação e valor, não desconto. Quem já conhece o produto e não converteu é o candidato ideal para uma oferta de reentrada.\n\n---\n\n## Pendências\n\n- [ ] Escrever os textos de cada mensagem por canal\n- [ ] Definir ferramenta que detecta uso/não uso para bifurcar os trilhos\n- [ ] Criar Régua de Recuperação Pós-Trial com oferta especial\n"}]}, {"t": "d", "n": "scripts_vendas", "ch": [{"t": "f", "n": "Diagnostico Whatsapp", "fn": "diagnostico_whatsapp.md", "c": "# Script de Diagnóstico — WhatsApp\n**Uso:** Parceiro conduz a conversa antes de marcar a demo\n**Tom:** Próximo, consultivo, sem forçar venda\n**Tempo estimado:** 5 a 10 minutos de conversa\n\n---\n\n## Abertura\n\n> \"Oi [nome], tudo bem? Antes de a gente marcar a demo, quero entender melhor a operação de vocês para personalizar o que vou mostrar. São só algumas perguntas rápidas.\"\n\n---\n\n## Qualificação (obrigatório antes de avançar)\n\n**ERP:**\n> \"Qual sistema vocês usam para gestão? HubSoft, Voalle, SGP, outro?\"\n\n**Porte:**\n> \"Quantos clientes ativos vocês têm hoje, mais ou menos?\"\n\n**Time:**\n> \"Quantas pessoas trabalham no comercial ou no atendimento?\"\n\n**Decisor:**\n> \"Você é quem decide sobre novas ferramentas ou tem mais alguém envolvido nisso?\"\n\n> Se não for o decisor: \"Faz sentido a gente incluir essa pessoa na demo também? Assim ela vê tudo ao vivo e vocês decidem juntos.\"\n\n---\n\n## Diagnóstico completo\n\n### Operação\n\n> \"Quantos leads chegam mais ou menos por mês? Pode ser uma estimativa.\"\n\n> \"E de quantas viram venda? Sabe mais ou menos a taxa?\"\n\n> \"Qual o ticket médio do plano que mais vendem?\"\n\n> \"Hoje os leads chegam principalmente por onde, WhatsApp, indicação, tráfego pago?\"\n\n### Time\n\n> \"Quantas pessoas vocês têm no comercial hoje no total?\"\n\n> \"Tem alguém só para backoffice, tipo lançar no sistema, gerar contrato, essas coisas?\"\n\n### Ferramentas\n\n> \"Como vocês gerenciam os leads hoje, tem algum sistema ou é mais no WhatsApp e planilha?\"\n\n> \"Usam alguma ferramenta de CRM?\"\n\n### Dores\n\n> \"Me conta onde vocês perdem mais lead no processo. É no primeiro contato, na hora dos documentos, na demora para ativar?\"\n\n> \"Quanto tempo leva em média do lead chegar até o cliente ser ativado no HubSoft?\"\n\n> \"Vocês têm problema com churn, cancelamento, cliente indo embora?\"\n\n### Objetivos\n\n> \"O que vocês querem melhorar no comercial nos próximos meses?\"\n\n---\n\n## Encerramento e agendamento\n\n> \"Perfeito, obrigado. Com essas informações consigo montar uma demo bem personalizada para vocês.\"\n\n> \"Já calculei aqui: com o volume de vocês, a Aurora pagaria por si mesma no primeiro mês. Vou mostrar isso ao vivo na demo.\"\n\n> \"Quando você tem 30 minutos para a gente fazer isso? Pode ser essa semana.\"\n\n---\n\n## Resumo para registrar após a conversa\n\nApós a conversa, registrar:\n\n| Campo | Resposta |\n|-------|----------|\n| Nome e provedor | |\n| ERP | |\n| Clientes ativos | |\n| Leads/mês | |\n| Vendas digitais/mês | |\n| Ticket médio | |\n| Pessoas no comercial | |\n| Maior dor | |\n| Decisor presente na demo? | |\n| Qualificado? (sim/não) | |\n| Data da demo agendada | |\n"}]}, {"t": "d", "n": "treinamento_parceiro", "ch": [{"t": "f", "n": "Modulo 01 Visao Geral", "fn": "modulo_01_visao_geral.md", "c": "# Módulo 1 — Visão Geral da AuroraISP\n\n**Trilha de Treinamento do Parceiro Comercial**\n**Duração estimada:** 30 minutos de leitura + discussão\n\n---\n\n## 1. O que é a AuroraISP\n\nA AuroraISP é um hub de tecnologia com inteligência artificial feito para provedores de internet. Ela automatiza três áreas da operação do provedor: o processo comercial (vendas), o marketing e o sucesso do cliente (retenção e fidelização).\n\n**Tagline:** Vende mais. Perde menos. Fideliza sempre.\n\n**Em uma frase:** do lead ao cliente fidelizado com inteligência. O provedor conecta a Aurora ao HubSoft e ganha um time digital que qualifica leads, coleta documentos, gera contratos, ativa clientes e ainda cuida da retenção.\n\nA Aurora não substitui o vendedor. Ela libera o vendedor para fazer o que ele faz de melhor: vender. Todo o resto (coleta de documento, contrato, ativação no ERP) é automático.\n\n---\n\n## 2. O problema que a Aurora resolve\n\nProvedores de internet regionais enfrentam três problemas graves no dia a dia:\n\n### Processo comercial manual e desorganizado\nO lead chega no WhatsApp. O vendedor atende quando pode. Pede documento por mensagem. Gera contrato manualmente. Digita os dados no HubSoft. Cada etapa depende de uma pessoa fazer algo. Resultado: leads perdidos, vendas demoradas, retrabalho constante.\n\n### Falta de integração entre ferramentas\nO provedor usa WhatsApp de um lado, planilha do outro, HubSoft para faturamento. Nada conversa entre si. O gerente não sabe quantos leads entraram, quantos estão parados, quantos foram perdidos. Cobra o time sem dado nenhum.\n\n### Churn invisível\nO cliente cancela e ninguém sabe por quê. Não existe programa de fidelização, não existe acompanhamento pós-venda, não existe prevenção. O provedor descobre o cancelamento quando já perdeu o cliente.\n\n**A Aurora resolve os três problemas em uma plataforma integrada.**\n\n---\n\n## 3. Os três módulos do Hub\n\nA AuroraISP é composta por três módulos que funcionam juntos, mas podem ser contratados separadamente.\n\n### Módulo Comercial (disponível, em produção)\n\nAutomatiza todo o fluxo de vendas: do lead no WhatsApp até a ativação no HubSoft.\n\n**O que faz:**\n- Bot qualifica o lead automaticamente\n- Coleta documentos (RG, CPF, comprovante) via WhatsApp\n- Gera contrato automaticamente\n- Ativa o cliente direto no HubSoft\n- CRM Kanban para gestão visual do pipeline (plano Pro)\n\n**Para quem vender:** qualquer provedor que recebe leads no WhatsApp e usa HubSoft. Este é o módulo de entrada.\n\n### Módulo Marketing (em desenvolvimento)\n\nMotor de automação do hub. Cuida de campanhas, nutrição de leads e comunicação com a base.\n\n**O que vai fazer:**\n- Disparos de e-mail e WhatsApp\n- Réguas de automação prontas para o provedor usar no primeiro dia\n- Rastreamento de campanhas e atribuição\n- Gestão de tráfego pago com IA (plano Pro)\n\n**Para quem vender:** provedores que já usam o Comercial e querem aumentar a geração de leads.\n\n### Módulo CS — Customer Success (em desenvolvimento)\n\nRetenção e fidelização pós-venda. O módulo que garante que o cliente não cancela.\n\n**O que vai fazer:**\n- Clube de Benefícios (já migrado do sistema legado)\n- Prevenção de churn com IA\n- NPS e pesquisas de satisfação\n- Upsell automatizado\n\n**Para quem vender:** provedores com base grande que perdem clientes e não sabem por quê.\n\n---\n\n## 4. A vantagem competitiva\n\n### Integração HubSoft nativa e profunda\n\nEste é o diferencial mais forte da Aurora. Nenhum concorrente faz integração real com o HubSoft. A Aurora não apenas \"conecta\" ao HubSoft. Ela lê dados, valida informações, gera contratos no padrão do ERP e ativa o cliente diretamente no sistema. Sem digitação manual, sem importação de planilha, sem erro humano.\n\n**Quando o prospect perguntar \"mas o que vocês fazem que os outros não fazem?\", a resposta é esta:** integração HubSoft de verdade. Do WhatsApp ao ERP, sem ninguém no meio.\n\n### Case de produção (anônimo)\n\nEstes números são reais, de um provedor que já usa a Aurora em produção:\n\n| Dado | Número |\n|------|--------|\n| Clientes ativos | 30.000 |\n| Leads por mês | 1.000 |\n| Vendas digitais por mês | 400 |\n| Ticket médio | R$ 99,90 |\n| Time antes da Aurora | 8 pessoas |\n| Time depois da Aurora | 2 pessoas no atendimento + 2 no backoffice estratégico |\n| Economia anual em pessoal | R$ 284.400 |\n\n**Frase de impacto:** \"2 pessoas fazem o que 8 faziam. O processo ficou mais eficiente, não mais lento.\"\n\nUse esses números em toda apresentação. Eles provam que a Aurora funciona em escala real.\n\n---\n\n## 5. ICP — Perfil Ideal de Cliente\n\nNem todo provedor é um bom prospect. O ICP da Aurora é bem definido:\n\n| Critério | Mínimo | Ideal |\n|----------|--------|-------|\n| Clientes ativos | 500 | 2.000 a 50.000 |\n| Vendedores ou atendentes | 2 | 5 a 20 |\n| ERP | HubSoft (obrigatório para trial) | HubSoft |\n| Canal de vendas | WhatsApp ativo | WhatsApp + tráfego pago |\n| Decisor acessível | Sim | Dono ou gerente comercial direto |\n\n### Desqualificadores imediatos\n\nNão perca tempo com provedores que:\n- Têm menos de 500 clientes ativos\n- Não fazem venda digital (só presencial)\n- Não usam WhatsApp para atendimento comercial\n- Não dão acesso ao decisor\n\n### Onde encontrar o ICP\n\n- Grupos de WhatsApp e Telegram de provedores\n- Comunidades ABRINT e ABRI\n- Eventos do setor (ISP Summit, MeetISP, feiras regionais)\n- Indicações de provedores que já usam a Aurora\n- Grupos de usuários HubSoft\n\n---\n\n## 6. Posicionamento no mercado\n\nA Aurora não é uma ferramenta de WhatsApp. Não é um chatbot. Não é um CRM genérico.\n\n**A Aurora é o hub de tecnologia com IA do provedor de internet.** Ela cuida de todo o ciclo: da aquisição do cliente até a fidelização. Tudo integrado ao HubSoft.\n\n### Versus o concorrente principal (ISPRO AI)\n\n| Critério | AuroraISP | ISPRO AI |\n|----------|-----------|----------|\n| Case real de produção | Sim (30k clientes, 400 vendas/mês) | Não publicado |\n| Integração HubSoft profunda | Sim, nativa | Não comprovada |\n| Preço público e transparente | Sim | Não disponível |\n| Módulos além do comercial | Marketing + CS (em desenvolvimento) | Foco apenas em IA |\n\n**Quando mencionarem o ISPRO:** \"A gente tem um case real com 30.000 clientes e 400 vendas digitais por mês. Funciona hoje, em produção. Se eles também têm, peça os números.\"\n\n---\n\n## Checklist de fixação\n\nApós estudar este módulo, você deve conseguir responder:\n\n- [ ] O que é a AuroraISP em uma frase?\n- [ ] Quais são os três módulos e o que cada um faz?\n- [ ] Qual o diferencial principal da Aurora?\n- [ ] Quais são os números do case de produção?\n- [ ] Qual o perfil ideal de cliente (ICP)?\n- [ ] Por que a Aurora é diferente do ISPRO AI?\n- [ ] Quais são os desqualificadores imediatos de um prospect?\n\n---\n\n*Próximo módulo: [Módulo 2 — Comercial a Fundo](modulo_02_comercial.md)*\n"}, {"t": "f", "n": "Modulo 02 Comercial", "fn": "modulo_02_comercial.md", "c": "# Módulo 2 — Módulo Comercial a Fundo\n\n**Trilha de Treinamento do Parceiro Comercial**\n**Duração estimada:** 40 minutos de leitura + prática\n\n---\n\n## 1. O fluxo completo: do WhatsApp ao HubSoft\n\nEste é o coração da Aurora. O fluxo que você vai mostrar em toda demo. Memorize cada etapa.\n\n```\nLead entra no WhatsApp\n      ↓\nBot qualifica (nome, endereço, plano desejado)\n      ↓\nBot coleta documentos (RG, CPF, comprovante de endereço)\n      ↓\nSistema valida os documentos\n      ↓\nContrato gerado automaticamente\n      ↓\nCliente assina o contrato digital\n      ↓\nDados enviados para o HubSoft\n      ↓\nCliente ativado no ERP — pronto para instalar\n```\n\n**Tempo total do fluxo:** pode ser concluído em minutos, sem intervenção humana. O vendedor só entra quando precisa (modo manual sempre disponível).\n\n### O que acontece em cada etapa\n\n**Qualificação automática:** o bot faz as perguntas certas no WhatsApp. Nome completo, endereço, plano de interesse, viabilidade técnica. O lead chega ao vendedor já qualificado.\n\n**Coleta de documentos:** o bot pede RG, CPF e comprovante de endereço direto no WhatsApp. O cliente envia as fotos e o sistema processa. Sem o vendedor precisar ficar cobrando documento.\n\n**Geração de contrato:** com os dados e documentos validados, o sistema gera o contrato no padrão do provedor automaticamente. Usa WeasyPrint para geração de PDF profissional.\n\n**Ativação no HubSoft:** os dados do novo cliente são enviados direto para o HubSoft via API. O provedor abre o ERP e o cliente já está lá, pronto para ativação técnica. Sem digitação manual.\n\n---\n\n## 2. Start versus Pro: o que muda\n\n### Comercial Starter (R$ 397/mês)\n\n| Item | Detalhe |\n|------|---------|\n| Usuários | 1 a 2 |\n| Bot de qualificação | Sim |\n| Coleta de documentos | Sim |\n| Geração de contrato | Sim |\n| Ativação no HubSoft | Sim |\n| Automações de follow-up | Não |\n| Relatórios | Não |\n| CRM Kanban | Não |\n| Suporte | Standard |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP pequeno, até 2.000 clientes, 1 a 2 vendedores. Quer automatizar o básico.\n\n### Comercial Start (R$ 797/mês)\n\n| Item | Detalhe |\n|------|---------|\n| Usuários | Até 5 |\n| Tudo do Starter | Sim |\n| Automações de follow-up | Sim |\n| Relatórios básicos | Sim |\n| CRM Kanban | Não |\n| Suporte | Standard |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP médio, 2.000 a 10.000 clientes, time de 3 a 5 vendedores. Precisa de mais controle e acompanhamento.\n\n### Comercial Pro (R$ 1.397/mês)\n\n| Item | Detalhe |\n|------|---------|\n| Usuários | Ilimitado |\n| Tudo do Start | Sim |\n| CRM Kanban completo | Sim |\n| Automações avançadas | Sim |\n| Validação com IA | Sim |\n| Relatórios completos | Sim |\n| Suporte | Prioritário |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP grande, acima de 10.000 clientes, time de 5+ vendedores. Precisa de pipeline visual, IA e relatórios para gestão.\n\n### Como apresentar a diferença\n\n\"O Starter automatiza o processo. O Start adiciona controle e relatórios. O Pro dá visão estratégica completa com CRM e IA.\"\n\nA recomendação inicial depende do porte. Na dúvida, comece pelo Start. É o plano que atende a maioria dos provedores e tem espaço para crescer.\n\n---\n\n## 3. Roteiro de demo ao vivo do Comercial\n\nEsta é a sequência que você vai seguir em toda demo. Pratique até conseguir fazer sem consultar.\n\n### Preparação (antes da demo)\n\n- Confirmar que o ambiente de demo está funcionando\n- Ter os dados do prospect prontos (número de clientes, leads/mês, vendedores, ticket médio)\n- Ter a simulação de ROI calculada com os números do prospect\n- Testar a conexão com o HubSoft de demo\n\n### Sequência da demo\n\n**Abertura (5 min)**\n\nConfirme o contexto do prospect. Use as informações do diagnóstico.\n\n> \"Pelo que conversamos, vocês recebem [X] leads por mês no WhatsApp, têm [Y] vendedores e hoje o processo de venda leva [Z] dias do lead até a ativação. Correto?\"\n\nValide a dor principal:\n\n> \"O que mais te incomoda no processo atual?\"\n\n**Fluxo do lead ao vivo (10 min)**\n\nMostre o fluxo real, passo a passo:\n\n1. Envie uma mensagem para o número de demo como se fosse um lead\n2. Mostre o bot qualificando (fazendo perguntas, coletando dados)\n3. Mostre a coleta de documentos (envie fotos de teste)\n4. Mostre o contrato sendo gerado automaticamente\n5. Mostre os dados aparecendo no painel da Aurora\n\n**Dica:** vá narrando cada etapa. \"Veja, o lead acabou de mandar o documento. O sistema já validou. Agora o contrato está sendo gerado. Pronto, em 30 segundos.\"\n\n**Ativação no HubSoft (5 min)**\n\nMostre os dados chegando no HubSoft de demo. Este é o momento de maior impacto.\n\n> \"Pronto. O cliente já está no HubSoft. Ninguém digitou nada. Ninguém copiou dado de planilha. Foi direto do WhatsApp para o ERP.\"\n\n**CRM Kanban — só se for mostrar o Pro (5 min)**\n\nMostre o pipeline visual:\n- Leads por etapa (qualificação, documentos, contrato, ativação)\n- Tempo parado em cada etapa\n- Alertas de leads que precisam de atenção\n\n> \"Esse lead está parado há 3 dias na etapa de documento. O sistema já avisou o vendedor. Sem o CRM, esse lead estaria perdido.\"\n\n**Números e ROI (5 min)**\n\nApresente o case de produção e compare com os números do prospect:\n\n> \"Um provedor com 30.000 clientes faz 400 vendas digitais por mês com a Aurora. 2 pessoas fazem o que 8 faziam. Economia de R$ 284.400 por ano. Com os seus [X] leads por mês e [Y] vendedores, a conta fica assim...\"\n\nMostre a simulação de ROI personalizada.\n\n**Próximos passos (5 min)**\n\n> \"Você usa HubSoft, certo? Então a gente libera 14 dias gratuitos para vocês testarem com seus dados reais. Quando podemos configurar?\"\n\n---\n\n## 4. Métricas que vendem\n\nMemorize estes números. Use em toda conversa.\n\n| Métrica | Número |\n|---------|--------|\n| Vendas digitais por mês (case) | 400 |\n| Leads processados por mês (case) | 1.000 |\n| Pessoas no atendimento antes | 8 |\n| Pessoas no atendimento depois | 2 (+ 2 em backoffice estratégico) |\n| Economia anual em pessoal | R$ 284.400 |\n| Ticket médio do case | R$ 99,90 |\n| Receita digital mensal (case) | R$ 39.960 |\n| Clientes ativos do case | 30.000 |\n\n### Contexto para cada métrica\n\n**\"400 vendas digitais por mês\"** — significa que 400 clientes foram do WhatsApp até a ativação no HubSoft sem intervenção manual no processo operacional.\n\n**\"2 pessoas fazem o que 8 faziam\"** — a Aurora não demitiu 6 pessoas. Ela liberou 6 pessoas. 2 ficaram no atendimento com muito mais eficiência, 2 foram para backoffice estratégico (função que antes não existia). As demais foram realocadas.\n\n**\"R$ 284.400 por ano\"** — calculado com base em: 6 pessoas × R$ 3.950/mês (salário + encargos estimados) × 12 meses.\n\n---\n\n## 5. Cálculo de ROI para o prospect\n\nUse esta fórmula durante a demo, com os números reais do prospect:\n\n```\nReceita digital mensal = vendas digitais/mês × ticket médio\nCusto atual do time = pessoas no comercial × R$ 3.950/mês\nCusto da Aurora = mensalidade + (vendas × R$ 7)\nROI = receita digital / custo da Aurora\nEconomia = custo atual do time − custo mínimo com Aurora\n```\n\n### Exemplo com prospect de 5.000 clientes\n\n| Dado | Valor |\n|------|-------|\n| Leads por mês | 200 |\n| Vendas digitais estimadas | 80 |\n| Ticket médio | R$ 89,90 |\n| Vendedores atuais | 4 |\n| Receita digital mensal | R$ 7.192 |\n| Custo do time atual | 4 × R$ 3.950 = R$ 15.800/mês |\n| Custo Aurora (Start) | R$ 797 + (80 × R$ 7) = R$ 1.357/mês |\n| ROI | 5,3x |\n| Economia potencial mensal | R$ 15.800 − R$ 7.900 (2 pessoas) = R$ 7.900/mês |\n\n> \"Com a Aurora, você pode manter 2 vendedores em vez de 4 e ainda vender mais. A economia paga o sistema 5 vezes.\"\n\n---\n\n## Checklist de fixação\n\nApós estudar este módulo, você deve conseguir:\n\n- [ ] Descrever o fluxo completo do lead ao HubSoft sem consultar\n- [ ] Explicar a diferença entre Starter, Start e Pro\n- [ ] Conduzir a demo ao vivo seguindo o roteiro\n- [ ] Calcular o ROI para qualquer prospect usando a fórmula\n- [ ] Citar de memória os números do case de produção\n- [ ] Explicar por que \"2 pessoas fazem o que 8 faziam\" sem parecer que houve demissão\n\n---\n\n*Próximo módulo: [Módulo 3 — Marketing e CS](modulo_03_marketing_cs.md)*\n"}, {"t": "f", "n": "Modulo 03 Marketing Cs", "fn": "modulo_03_marketing_cs.md", "c": "# Módulo 3 — Marketing e CS\n\n**Trilha de Treinamento do Parceiro Comercial**\n**Duração estimada:** 30 minutos de leitura + discussão\n\n---\n\n## 1. Por que você precisa conhecer esses módulos\n\nO Comercial é a porta de entrada. É o módulo que já funciona, que tem case de produção e que vende hoje. Mas a estratégia da Aurora é de expansão: o provedor entra pelo Comercial e, ao longo do tempo, adiciona Marketing e CS.\n\nVocê precisa saber o que esses módulos fazem por três razões:\n\n1. **Na demo, o prospect vai perguntar.** \"Vocês só fazem o comercial?\" Você precisa responder com segurança.\n2. **O cross-sell aumenta sua comissão.** Cada módulo adicionado é mais receita recorrente.\n3. **A visão completa do hub é o diferencial.** Nenhum concorrente oferece automação comercial + marketing + CS integrados para ISPs.\n\n---\n\n## 2. Módulo Marketing\n\n### O que é\n\nO motor de automação do hub. Cuida de toda comunicação com leads e clientes nos canais digitais.\n\n### O que vai fazer\n\n| Funcionalidade | Starter | Start | Pro |\n|----------------|---------|-------|-----|\n| Disparos de WhatsApp e e-mail | Sim | Sim | Sim |\n| Réguas de automação prontas | Sim | Sim | Sim |\n| Fluxos personalizados | Não | Sim | Sim |\n| Rastreamento de campanhas | Não | Sim | Sim |\n| Nutrição avançada de leads | Não | Não | Sim |\n| Upsell de SVA | Não | Não | Sim |\n| Otimização de tráfego com IA | Não | Não | Sim |\n| Relatórios de atribuição | Não | Não | Sim |\n\n### Réguas de automação prontas\n\nEste é um diferencial importante. O provedor não precisa criar nada do zero. A Aurora entrega réguas prontas para cenários comuns:\n\n- **Boas-vindas:** novo lead recebe mensagem automática com próximos passos\n- **Follow-up de lead frio:** lead que não respondeu recebe lembrete depois de 24h, 48h e 72h\n- **Aniversário de contrato:** cliente recebe mensagem no aniversário de 1 ano como cliente\n- **Upgrade:** cliente em plano básico recebe oferta de upgrade com condições especiais\n- **Reativação:** lead que desistiu do processo recebe campanha de reativação após 30 dias\n\n### Precificação do Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 297/mês | R$ 597/mês | R$ 997/mês |\n| Transacional | R$ 0,05 por contato na base/mês | R$ 0,05 por contato na base/mês | R$ 0,05 por contato na base/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n\n### Como apresentar na demo\n\n> \"Hoje a gente está mostrando o Comercial, que é o módulo pronto e em produção. Mas a Aurora é um hub completo. O módulo de Marketing vai cuidar de toda automação de comunicação do provedor: e-mail, WhatsApp, réguas prontas para usar no primeiro dia. E o melhor: tudo integrado com o Comercial. O lead que entrou pelo Marketing já alimenta o pipeline do Comercial automaticamente.\"\n\n**Não prometa datas de lançamento.** Diga apenas que está em desenvolvimento e que os clientes que entrarem agora pelo Comercial terão prioridade no acesso.\n\n---\n\n## 3. Módulo CS (Customer Success)\n\n### O que é\n\nO módulo de retenção e fidelização. Cuida do cliente depois que ele virou assinante.\n\n### O que vai fazer\n\n| Funcionalidade | Starter | Start | Pro |\n|----------------|---------|-------|-----|\n| Clube de Benefícios | Sim | Sim | Sim |\n| Réguas básicas de retenção (via Marketing) | Sim | Sim | Sim |\n| NPS e pesquisas de satisfação | Não | Sim | Sim |\n| Relatórios de saúde da base | Não | Sim | Sim |\n| Prevenção de churn com IA | Não | Não | Sim |\n| Upsell automatizado | Não | Não | Sim |\n| Relatórios avançados | Não | Não | Sim |\n\n### Clube de Benefícios\n\nO Clube de Benefícios já foi desenvolvido e testado (migrado do sistema legado megaroleta). Funciona assim:\n\n- O provedor oferece benefícios exclusivos para clientes ativos (descontos em parceiros locais, sorteios, vantagens)\n- O cliente acessa pelo app ou portal e vê seus benefícios\n- Parceiros locais (farmácias, restaurantes, lojas) entram no clube como parceiros de benefícios\n- O cliente fica porque vale a pena ficar, e não apenas pelo plano de internet\n\n**Frase de impacto:** \"Cliente que tem vantagem não cancela.\"\n\n### Precificação do CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 247/mês | R$ 497/mês | R$ 897/mês |\n| Transacional | R$ 0,15 por cliente ativo no clube/mês | R$ 0,15 por cliente ativo no clube/mês | R$ 0,15 por cliente ativo no clube/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n\n### Como apresentar na demo\n\n> \"Além de vender, a Aurora ajuda a reter. O módulo de CS traz um Clube de Benefícios para o provedor oferecer aos clientes. O cliente ganha descontos em parceiros locais, sorteios, vantagens exclusivas. Isso reduz cancelamento e aumenta o tempo de vida do cliente. O Clube já existe e funciona. Os recursos avançados de prevenção de churn com IA estão em desenvolvimento.\"\n\n---\n\n## 4. O que está pronto versus o que está em desenvolvimento\n\nSeja sempre transparente sobre isso. Credibilidade é mais importante que empolgação.\n\n| Módulo | Funcionalidade | Status |\n|--------|---------------|--------|\n| Comercial | Fluxo completo (lead → HubSoft) | ✅ Em produção |\n| Comercial | CRM Kanban | ✅ Em produção (Pro) |\n| CS | Clube de Benefícios | ✅ Desenvolvido, integrando ao hub |\n| Marketing | Disparos e réguas | Em desenvolvimento |\n| Marketing | Tráfego pago com IA | Em desenvolvimento |\n| CS | NPS | Em desenvolvimento |\n| CS | Prevenção de churn com IA | Em desenvolvimento |\n\n**Regra de ouro:** venda o que está pronto. Mostre o que está vindo como visão de futuro, nunca como promessa com data.\n\n---\n\n## 5. Estratégia de cross-sell\n\nA jornada natural de expansão do cliente é:\n\n```\nComercial (entrada)\n    ↓\nMarketing (aumentar geração de leads)\n    ↓\nCS (reter os clientes que o Comercial trouxe)\n    ↓\nStack completo\n```\n\n### Gatilhos para oferecer Marketing\n\n- O provedor reclama que não gera leads suficientes\n- O provedor faz tráfego pago sem rastreamento\n- O provedor envia WhatsApp manualmente para a base\n- O provedor não faz follow-up com leads que não fecharam\n\n### Gatilhos para oferecer CS\n\n- O provedor tem churn acima de 3% ao mês\n- O provedor não tem programa de fidelização\n- O provedor não mede satisfação do cliente\n- O provedor perde cliente para concorrente regional que oferece \"mimos\"\n\n### Simulação de stack completo\n\nPara um provedor Start (médio), o stack completo custa:\n\n| Módulo | Custo mensal |\n|--------|-------------|\n| Comercial Start | R$ 1.847 (mensalidade + transacional) |\n| Marketing Start | R$ 697 |\n| CS Start | R$ 947 |\n| **Total** | **R$ 3.491/mês** |\n\nA receita digital gerada (150 vendas × R$ 99,90) é de R$ 14.985/mês. O ROI do stack completo é de 4,3x.\n\n> \"O stack completo custa menos de 20% da receita digital gerada. E isso sem contar a economia em pessoal.\"\n\n---\n\n## 6. Perguntas frequentes sobre Marketing e CS\n\n**\"Quando vai ficar pronto?\"**\n\"Estamos trabalhando ativamente nisso. Os clientes que entrarem agora pelo Comercial terão acesso prioritário. Posso te avisar assim que estiver disponível para teste.\"\n\n**\"Posso esperar e contratar tudo junto?\"**\n\"Pode, claro. Mas o Comercial já está gerando resultado em produção. Cada mês sem ele é lead perdido e venda que não aconteceu. E quem entrar agora terá condições melhores na expansão.\"\n\n**\"O Clube de Benefícios funciona mesmo?\"**\n\"Sim. Ele foi desenvolvido e testado em um provedor real. Estamos integrando ao hub da Aurora para que funcione junto com os outros módulos.\"\n\n**\"Preciso do Marketing para o Comercial funcionar?\"**\n\"Não. O Comercial funciona de forma independente. O Marketing é uma camada adicional que potencializa a geração de leads, mas o Comercial processa os leads que já chegam no WhatsApp do provedor.\"\n\n---\n\n## Checklist de fixação\n\nApós estudar este módulo, você deve conseguir:\n\n- [ ] Explicar o que o módulo Marketing faz sem prometer datas\n- [ ] Descrever o Clube de Benefícios do CS com clareza\n- [ ] Diferenciar o que está pronto do que está em desenvolvimento\n- [ ] Identificar gatilhos de cross-sell durante a conversa com o prospect\n- [ ] Responder \"quando vai ficar pronto?\" sem perder credibilidade\n- [ ] Calcular o custo do stack completo para um provedor médio\n\n---\n\n*Próximo módulo: [Módulo 4 — Precificação e ROI](modulo_04_precificacao_roi.md)*\n"}, {"t": "f", "n": "Modulo 04 Precificacao Roi", "fn": "modulo_04_precificacao_roi.md", "c": "# Módulo 4 — Precificação e ROI\n\n**Trilha de Treinamento do Parceiro Comercial**\n**Duração estimada:** 40 minutos de leitura + prática com simulações\n\n---\n\n## 1. Como funciona o modelo de precificação\n\nA Aurora usa um modelo inspirado no HubSpot: **mensalidade fixa por módulo + valor transacional variável mensal.**\n\nO provedor paga uma mensalidade pelo plano escolhido (Starter, Start ou Pro) e um valor variável que escala conforme o uso real.\n\n### Por que esse modelo é bom para o prospect\n\n- **Não tem limite de volume.** O provedor pode processar quantos leads quiser.\n- **O transacional substitui os limites.** Em vez de \"você tem direito a 100 leads\", o provedor paga proporcionalmente ao que usa.\n- **Quanto mais o provedor cresce, mais paga, mas sempre com ROI positivo.** O custo nunca supera o benefício.\n\n### O transacional por módulo\n\n| Módulo | Evento cobrado | Valor |\n|--------|---------------|-------|\n| Comercial | Venda finalizada e validada no ERP | R$ 7 por venda |\n| Marketing | Contato na base de leads | R$ 0,05 por contato/mês |\n| CS | Cliente ativo no clube | R$ 0,15 por cliente/mês |\n\n**Importante:** o transacional do Comercial só é cobrado quando a venda é confirmada no HubSoft. Se o lead não virou cliente, não cobra. O provedor só paga quando vende.\n\n---\n\n## 2. Tabela de preços completa\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 397/mês | R$ 797/mês | R$ 1.397/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Transacional | R$ 7/venda | R$ 7/venda | R$ 7/venda |\n| Suporte | Standard | Standard | Prioritário |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 297/mês | R$ 597/mês | R$ 997/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Transacional | R$ 0,05/contato/mês | R$ 0,05/contato/mês | R$ 0,05/contato/mês |\n| Suporte | Standard | Standard | Prioritário |\n\n### CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 247/mês | R$ 497/mês | R$ 897/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Transacional | R$ 0,15/cliente/mês | R$ 0,15/cliente/mês | R$ 0,15/cliente/mês |\n| Suporte | Standard | Standard | Prioritário |\n\n### Escada de preço\n\nA proporção entre os planos é **1 : 2 : 3,5** (Starter : Start : Pro). Isso é consistente em todos os módulos. Ajuda a posicionar o Start como o melhor custo-benefício para a maioria dos provedores.\n\n---\n\n## 3. Simulações de ROI por porte\n\n### Provedor pequeno (500 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mês | ~50 |\n| Vendas digitais estimadas | 15 a 30 |\n| Vendedores | 1 a 2 |\n| Ticket médio | R$ 79,90 |\n| Plano recomendado | Comercial Starter |\n\n**Cálculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 397 |\n| Transacional (20 vendas × R$ 7) | R$ 140 |\n| **Custo total Aurora** | **R$ 537/mês** |\n| Receita digital (20 × R$ 79,90) | R$ 1.598/mês |\n| **ROI** | **3x** |\n\n**Como apresentar:** \"Por menos de R$ 600 por mês, você automatiza todo o processo comercial. Cada venda digital gera quase R$ 80 de receita recorrente. O sistema se paga com 7 vendas.\"\n\n---\n\n### Provedor médio (2.000 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mês | ~200 |\n| Vendas digitais estimadas | 80 a 150 |\n| Vendedores | 3 a 5 |\n| Ticket médio | R$ 89,90 |\n| Plano recomendado | Comercial Start |\n\n**Cálculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 797 |\n| Transacional (100 vendas × R$ 7) | R$ 700 |\n| **Custo total Aurora** | **R$ 1.497/mês** |\n| Receita digital (100 × R$ 89,90) | R$ 8.990/mês |\n| Custo do time atual (4 pessoas) | R$ 15.800/mês |\n| Custo do time com Aurora (2 pessoas) | R$ 7.900/mês |\n| **ROI** | **6x** |\n| **Economia em pessoal** | **R$ 7.900/mês = R$ 94.800/ano** |\n\n**Como apresentar:** \"Com a Aurora, você mantém 2 vendedores em vez de 4, o sistema custa R$ 1.500 por mês e gera quase R$ 9.000 em receita digital. A economia em pessoal sozinha já paga o sistema 5 vezes.\"\n\n---\n\n### Provedor grande (10.000 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mês | ~500 |\n| Vendas digitais estimadas | 200 a 300 |\n| Vendedores | 6 a 10 |\n| Ticket médio | R$ 99,90 |\n| Plano recomendado | Comercial Pro |\n\n**Cálculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 1.397 |\n| Transacional (250 vendas × R$ 7) | R$ 1.750 |\n| **Custo total Aurora** | **R$ 3.147/mês** |\n| Receita digital (250 × R$ 99,90) | R$ 24.975/mês |\n| Custo do time atual (8 pessoas) | R$ 31.600/mês |\n| Custo do time com Aurora (3 pessoas) | R$ 11.850/mês |\n| **ROI** | **7,9x** |\n| **Economia em pessoal** | **R$ 19.750/mês = R$ 237.000/ano** |\n\n**Como apresentar:** \"Com 10.000 clientes e 8 vendedores, a conta é clara. A Aurora custa R$ 3.100 por mês e gera quase R$ 25.000 em receita digital. Você pode operar com 3 pessoas, economizando quase R$ 20.000 por mês. São R$ 237.000 por ano.\"\n\n---\n\n### Provedor muito grande (30.000 clientes — o case real)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mês | 1.000 |\n| Vendas digitais | 400 |\n| Ticket médio | R$ 99,90 |\n| Plano | Comercial Pro |\n\n**Cálculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 1.397 |\n| Transacional (400 vendas × R$ 7) | R$ 2.800 |\n| **Custo total Aurora** | **R$ 4.197/mês** |\n| Receita digital (400 × R$ 99,90) | R$ 39.960/mês |\n| Economia anual em pessoal | R$ 284.400 |\n| **ROI** | **9,5x** |\n\n---\n\n## 4. Política de trial\n\n**14 dias gratuitos** para provedores que usam HubSoft como ERP.\n\nSem trial para provedores com outros ERPs. A integração nativa é com HubSoft e o trial precisa funcionar perfeitamente para converter.\n\n### Como usar o trial no fechamento\n\n> \"Você usa HubSoft, certo? Então a gente libera 14 dias gratuitos para você testar com seus dados reais. Sem compromisso. Se não funcionar para vocês, cancela sem custo. Quando podemos configurar?\"\n\nO trial é o argumento mais forte para quem usa HubSoft. Use sempre.\n\n---\n\n## 5. Bundles e descontos\n\nOs bundles com desconto para quem contratar mais de um módulo ainda estão sendo definidos. Por enquanto, não ofereça desconto por conta própria.\n\n**Regra:** se o prospect pedir desconto, a resposta é:\n\n> \"O preço já está calibrado para entregar ROI positivo em qualquer porte. Um contrato a mais por mês já paga o sistema. Mas se vocês quiserem contratar mais de um módulo, posso verificar condições especiais com a Aurora.\"\n\nNesse caso, escale para o CEO.\n\n---\n\n## 6. Como apresentar o preço\n\n### Princípio: ancore na economia, não no custo\n\nNunca comece falando o preço. Sempre comece pelos números do prospect.\n\n**Errado:** \"O plano Start custa R$ 797 por mês mais R$ 7 por venda.\"\n\n**Certo:**\n1. Primeiro, calcule a economia de pessoal do prospect\n2. Depois, mostre a receita digital que a Aurora gera\n3. Por fim, revele o custo como fração da economia\n\n> \"Com os seus números, a economia em pessoal seria de R$ 7.900 por mês. A receita digital gerada seria de R$ 8.990 por mês. O custo da Aurora? R$ 1.497. Menos de 10% do que você economiza.\"\n\n### Comparação com contratação\n\nUse esta tabela quando o prospect hesitar sobre o preço:\n\n| Item | Custo mensal |\n|------|-------------|\n| 1 vendedor CLT (salário + encargos) | ~R$ 3.950 |\n| Aurora Starter | R$ 537 (com transacional) |\n| Aurora Start | R$ 1.497 (com transacional) |\n| Aurora Pro | R$ 3.147 (com transacional) |\n\n> \"A Aurora Pro custa menos que um vendedor CLT. E ela não tira férias, não falta, não erra ao digitar no HubSoft e atende à noite.\"\n\n### Sequência de apresentação do preço\n\n1. Recapitule os números do prospect (leads, vendas, time, custo)\n2. Mostre a simulação de ROI com os dados dele\n3. Mostre a economia em pessoal\n4. Revele o custo como fração da economia\n5. Pergunte: \"Faz sentido testar 14 dias gratuitos?\"\n\n---\n\n## 7. Sua comissão\n\nVocê recebe **30% do lucro líquido** gerado pelos clientes que trouxer. Isso inclui mensalidade e transacional, após dedução dos custos operacionais.\n\nQuanto mais o cliente cresce, mais você ganha. O modelo transacional beneficia você também.\n\n### Simulação de comissão\n\nPara um cliente Comercial Start com 100 vendas/mês:\n\n| Item | Valor |\n|------|-------|\n| Receita Aurora | R$ 1.497/mês |\n| Margem estimada (~60%) | R$ 898/mês |\n| Sua comissão (30%) | ~R$ 269/mês |\n| **Anual por cliente** | **~R$ 3.230** |\n\nCom 10 clientes nesse perfil: **~R$ 32.300 por ano** em comissão recorrente.\n\n---\n\n## Checklist de fixação\n\nApós estudar este módulo, você deve conseguir:\n\n- [ ] Explicar o modelo de precificação (mensalidade + transacional) sem consultar\n- [ ] Calcular o custo total da Aurora para qualquer porte\n- [ ] Fazer a simulação de ROI ao vivo durante a demo\n- [ ] Apresentar o preço ancorado na economia, nunca isolado\n- [ ] Usar o trial de 14 dias como argumento de fechamento\n- [ ] Saber quando escalar para o CEO (pedidos de desconto, bundles)\n- [ ] Explicar por que a Aurora é mais barata que contratar gente\n\n---\n\n*Próximo módulo: [Módulo 5 — Objeções e Fechamento](modulo_05_objecoes_fechamento.md)*\n"}, {"t": "f", "n": "Modulo 05 Objecoes Fechamento", "fn": "modulo_05_objecoes_fechamento.md", "c": "# Módulo 5 — Objeções e Fechamento\n\n**Trilha de Treinamento do Parceiro Comercial**\n**Duração estimada:** 45 minutos de leitura + prática de role-play\n\n---\n\n## 1. As 10 objeções mais comuns e como responder\n\nPara cada objeção: entenda o que o prospect realmente está dizendo, valide a preocupação e redirecione com fatos.\n\n---\n\n### Objeção 1: \"É caro\"\n\n**O que ele está dizendo:** \"Não entendi o valor. Estou comparando com o custo, não com o retorno.\"\n\n**Resposta:**\n\n> \"Entendo a preocupação. Vamos olhar por outro ângulo. Quanto custa um vendedor CLT para você hoje? Uns R$ 3.950 por mês com encargos. A Aurora Start custa R$ 1.497 e faz o trabalho operacional de vários vendedores. Um provedor parecido com o seu economizou R$ 284.400 por ano em pessoal. O sistema se paga com 7 vendas no mês. Todo o resto é lucro.\"\n\n**Se insistir:**\n\n> \"Cada lead que você perde hoje por falta de acompanhamento é receita que não entra. Se são 10 leads perdidos por mês a R$ 99,90, são quase R$ 12.000 por ano que você deixa na mesa. O custo de não ter a Aurora é maior do que o custo de ter.\"\n\n---\n\n### Objeção 2: \"Já tenho um sistema\"\n\n**O que ele está dizendo:** \"Não quero trocar tudo. Tenho medo de mais complexidade.\"\n\n**Resposta:**\n\n> \"A Aurora não substitui o que você já tem. Ela complementa. Você usa o HubSoft para faturamento e ERP, certo? A Aurora cuida de tudo que vem antes: a venda. Do WhatsApp ao HubSoft, sem você precisar mudar nada no seu ERP. Na verdade, a Aurora melhora o uso do HubSoft porque os dados chegam limpos e validados.\"\n\n**Se ele tiver um CRM genérico:**\n\n> \"CRM genérico não integra com o HubSoft. Você digita os dados duas vezes. A Aurora elimina isso. O dado vai direto do WhatsApp para o ERP, sem retrabalho.\"\n\n---\n\n### Objeção 3: \"Não uso HubSoft\"\n\n**O que ele está dizendo:** \"Vocês funcionam para mim?\"\n\n**Resposta:**\n\n> \"Hoje nossa integração mais profunda é com o HubSoft. É onde a gente entrega o maior valor, porque o dado vai direto do WhatsApp até o ERP sem intervenção. Para outros ERPs, a automação do fluxo comercial funciona (qualificação, documentos, contrato), mas a ativação automática no ERP depende de integração específica. Podemos conversar sobre o seu caso.\"\n\n**Importante:** não ofereça trial. O trial é exclusivo para HubSoft. Se o provedor usar outro ERP, alinhe expectativas e, se necessário, escale para o CEO para avaliar viabilidade.\n\n---\n\n### Objeção 4: \"Preciso ver funcionando\"\n\n**O que ele está dizendo:** \"Estou interessado, mas quero prova.\"\n\n**Isso é bom.** Significa que ele quer comprar, só precisa de segurança.\n\n**Resposta:**\n\n> \"Perfeito. A gente faz uma demo ao vivo de 30 minutos. Você vai ver o fluxo real: lead entrando no WhatsApp, bot qualificando, documentos sendo coletados e o dado chegando no HubSoft. Tudo ao vivo, sem slide. Quando funciona para você?\"\n\n**Se ele quiser testar com os dados dele:**\n\n> \"Se você usa HubSoft, a gente libera 14 dias gratuitos para você testar com seus leads reais. Sem compromisso.\"\n\n---\n\n### Objeção 5: \"Vou pensar\"\n\n**O que ele está dizendo:** \"Não estou convencido o suficiente\" ou \"Preciso consultar outra pessoa.\"\n\n**Resposta (descubra o real motivo):**\n\n> \"Claro, faz sentido. Só para eu entender melhor: é sobre o investimento, sobre a funcionalidade ou você precisa alinhar com mais alguém?\"\n\n**Se for sobre o investimento:** volte para o ROI. Refaça a conta com os números dele.\n\n**Se precisar alinhar com outro decisor:**\n\n> \"Entendo perfeitamente. Quer que a gente marque uma segunda reunião rápida incluindo ele? Assim eu mostro os números diretamente e respondo as dúvidas dele. Qual o melhor dia?\"\n\n**Regra de ouro:** nunca saia da conversa sem um próximo passo concreto. Uma data marcada, um material a enviar, algo tangível.\n\n---\n\n### Objeção 6: \"Quem garante que funciona?\"\n\n**O que ele está dizendo:** \"Quero prova social. Quero saber que alguém já testou.\"\n\n**Resposta:**\n\n> \"Temos um provedor com 30.000 clientes usando a Aurora em produção. São 1.000 leads por mês, 400 vendas digitais. 2 pessoas fazem o que 8 faziam. Economia de R$ 284.400 por ano. Funciona há meses, com dados reais, em escala real.\"\n\n**Se pedir para falar com o cliente:**\n\n> \"Por questão de contrato, não podemos divulgar o nome do provedor. Mas os números são verificáveis e o resultado está em produção. Além disso, você pode testar 14 dias gratuitos e ver o resultado nos seus próprios dados.\"\n\n---\n\n### Objeção 7: \"Não tenho equipe técnica\"\n\n**O que ele está dizendo:** \"Tenho medo de não conseguir implementar ou manter.\"\n\n**Resposta:**\n\n> \"A implementação é inteira por conta da Aurora. A gente configura, testa e entrega funcionando. O onboarding leva aproximadamente 1 hora. Seu time não precisa de conhecimento técnico nenhum. A interface foi feita para vendedor usar, não para programador. E as atualizações são automáticas, sem você precisar fazer nada.\"\n\n**Reforce:**\n\n> \"Seu TI não vai precisar manter nada. É SaaS. A Aurora cuida de tudo: servidor, atualização, integração com HubSoft. Se der qualquer problema, nosso suporte resolve.\"\n\n---\n\n### Objeção 8: \"E se eu cancelar?\"\n\n**O que ele está dizendo:** \"Não quero ficar preso.\"\n\n**Resposta:**\n\n> \"Sem fidelidade. O contrato é mensal. Se não funcionar para você, cancela no mês seguinte. Seus dados ficam disponíveis para exportação. A gente confia que o resultado fala por si. Por isso oferecemos 14 dias gratuitos para quem usa HubSoft.\"\n\n**Reforce a confiança:**\n\n> \"Nenhum cliente que viu o resultado cancelou por insatisfação. A Aurora se paga com poucas vendas por mês. Quando o provedor vê o número, ele expande, não cancela.\"\n\n---\n\n### Objeção 9: \"Vocês são novos no mercado\"\n\n**O que ele está dizendo:** \"Tenho medo de apostar em algo que pode sumir.\"\n\n**Resposta:**\n\n> \"A tecnologia da Aurora está em produção há meses em um provedor com 30.000 clientes. Não é um MVP, não é protótipo. São 400 vendas digitais por mês passando pelo sistema, todo dia. O que estamos fazendo agora é abrir para outros provedores o que já funciona. Você não é cobaia. Você é dos primeiros a ter acesso a algo que já foi validado em escala.\"\n\n**Vire a vantagem:**\n\n> \"Ser dos primeiros clientes tem uma vantagem: atendimento direto, personalização do onboarding e prioridade em novas funcionalidades. Quando tivermos 100 clientes, esse nível de atenção não vai existir.\"\n\n---\n\n### Objeção 10: \"O ISPRO faz a mesma coisa\"\n\n**O que ele está dizendo:** \"Vi o concorrente. Quero saber por que vocês são melhores.\"\n\n**Resposta:**\n\n> \"Ótimo que você está comparando. Então me responde: eles mostraram um case real para você? Com números de produção? Quantas vendas por mês, quantos clientes, quanta economia? A Aurora tem um case com 30.000 clientes, 400 vendas digitais por mês e R$ 284.400 de economia anual. Tudo verificável. Se eles também têm, peça os números.\"\n\n**Aprofunde:**\n\n> \"A integração com HubSoft é nativa na Aurora. Não é uma API genérica. O dado vai do WhatsApp ao ERP com validação, contrato e ativação automática. Confirme se o ISPRO faz isso com o HubSoft. A gente tem preço público e transparente. Eles publicam o preço?\"\n\n**Regra:** nunca fale mal do concorrente. Apenas pergunte o que eles entregam. Os fatos fazem o trabalho.\n\n---\n\n## 2. Técnicas de fechamento para donos de ISP\n\n### Fechamento por trial\n\nPara quem usa HubSoft. O mais direto e eficaz.\n\n> \"Você já viu o fluxo funcionando. Usa HubSoft. A gente libera 14 dias gratuitos para testar com seus dados. Sem compromisso. Quando podemos configurar?\"\n\n### Fechamento por custo de inação\n\nPara quem está hesitando.\n\n> \"Cada mês sem a Aurora, você perde leads que não são acompanhados. Se são 20 leads perdidos por mês a R$ 99,90, são quase R$ 24.000 por ano. O custo de não ter é maior do que o custo de ter.\"\n\n### Fechamento por comparação salarial\n\nPara quem reclama do preço.\n\n> \"A Aurora Pro custa menos que um vendedor CLT. E ela não tira férias, não falta, não erra ao digitar no HubSoft e atende de madrugada.\"\n\n### Fechamento por exclusividade\n\nPara quem é competitivo na região.\n\n> \"Se o seu concorrente na cidade contratar a Aurora antes de você, ele vai vender mais rápido, com menos gente, e com custo menor. Quando você for reagir, ele já vai estar operando com IA.\"\n\n### Fechamento por próximo passo simples\n\nSempre finalize com uma ação concreta, não com uma pergunta aberta.\n\n**Errado:** \"O que você acha?\"\n**Certo:** \"Quando podemos configurar o trial? Terça ou quinta funciona para você?\"\n\n---\n\n## 3. Cadência de follow-up após a demo\n\nQuando o prospect não fecha na hora, execute este processo sem falta.\n\n| Dia | Ação | Canal |\n|-----|------|-------|\n| D+0 | Enviar deck de apoio com mensagem personalizada | WhatsApp |\n| D+2 | Follow-up leve | WhatsApp |\n| D+5 | Enviar simulação de ROI com os números do prospect | WhatsApp + e-mail |\n| D+10 | Última tentativa com nova proposta ou encerrar ciclo | WhatsApp |\n\n### Mensagens de follow-up\n\n**D+0 (logo após a demo):**\n\n> \"[Nome], foi ótimo conversar. Conforme combinamos, segue o material com o resumo da Aurora e a simulação com os números de vocês. Qualquer dúvida, estou aqui.\"\n\n**D+2:**\n\n> \"[Nome], ficou alguma dúvida depois que você viu o material? Se quiser, posso esclarecer por mensagem mesmo ou a gente marca 10 minutos rápidos.\"\n\n**D+5:**\n\n> \"[Nome], preparei uma simulação detalhada de ROI com os dados que você me passou. Com [X] leads por mês e [Y] vendedores, a economia estimada é de R$ [Z] por ano. Segue o documento. Quando podemos ativar o trial?\"\n\n**D+10:**\n\n> \"[Nome], sei que está corrido. Último contato sobre isso: se fizer sentido testar a Aurora, a gente libera 14 dias gratuitos para vocês verem o resultado com dados reais. Se não for o momento, sem problema. Fico à disposição para quando fizer sentido.\"\n\n### Regras do follow-up\n\n- **Nunca mande mais de uma mensagem por dia**\n- **Sempre personalize.** Use o nome e os números do prospect.\n- **Se não responder após D+10**, mova para nutrição de longo prazo. Não insista.\n- **Se responder com objeção**, volte à seção 1 deste módulo e trate a objeção antes de tentar fechar novamente.\n\n---\n\n## 4. Quando escalar para o CEO\n\nNão tente resolver tudo sozinho. Escale para o CEO nos seguintes cenários:\n\n| Cenário | Por que escalar |\n|---------|-----------------|\n| Prospect pede desconto que você não pode dar | Preço é definido pela Aurora |\n| Prospect quer contratar mais de um módulo e pede bundle | Bundles ainda em definição |\n| Prospect usa outro ERP (não HubSoft) e quer integração | Requer avaliação técnica |\n| Prospect é muito grande (acima de 50.000 clientes) | Pode precisar de plano customizado |\n| Prospect quer falar com a \"empresa\" antes de fechar | Credibilidade institucional |\n| Objeção técnica que você não consegue responder | Melhor escalar do que inventar resposta |\n\n### Como escalar\n\n> \"[Nome do CEO], tenho um prospect com perfil [descrever porte e situação]. Ele [descrever objeção ou pedido]. Preciso de apoio para [descrever o que precisa]. Pode entrar numa call rápida?\"\n\nSempre informe o contexto completo. O CEO não deve entrar na conversa sem saber o que já foi discutido.\n\n---\n\n## 5. Cenários de fechamento\n\n### Cenário A: fecha na hora\n\n1. Confirmar plano escolhido\n2. Se usa HubSoft: ativar trial de 14 dias\n3. Se usa outro ERP: assinar contrato mensal\n4. Agendar onboarding com o time da Aurora (aproximadamente 1 hora)\n5. Enviar mensagem de boas-vindas com próximos passos\n\n### Cenário B: precisa de outro decisor\n\n1. Marcar segunda reunião incluindo o sócio ou diretor\n2. Enviar deck de apoio para o prospect apresentar internamente\n3. Preparar simulação de ROI personalizada para a segunda reunião\n4. Manter contato entre as reuniões (D+2, sem pressão)\n\n### Cenário C: quer pensar\n\n1. Descobrir o real motivo (investimento, funcionalidade ou alinhamento interno)\n2. Tratar a objeção específica\n3. Definir data de retorno antes de encerrar\n4. Executar cadência de follow-up (D+0 a D+10)\n\n### Cenário D: não fecha\n\n1. Registrar os motivos da recusa\n2. Mover para nutrição de longo prazo\n3. Fazer contato leve a cada 45 a 60 dias\n4. Retomar quando houver novidade relevante (novo módulo, novo case, novo recurso)\n\n**Regra absoluta:** nunca saia de uma conversa sem um próximo passo definido. Mesmo que seja \"vou te procurar em 45 dias com novidades.\"\n\n---\n\n## 6. Resumo das frases de impacto\n\nMemorize estas frases. Use conforme o contexto.\n\n| Situação | Frase |\n|----------|-------|\n| Abordagem | \"Você já perdeu lead essa semana por falta de acompanhamento no WhatsApp?\" |\n| Diferencial | \"Do WhatsApp ao HubSoft, sem ninguém no meio.\" |\n| Prova social | \"2 pessoas fazem o que 8 faziam. R$ 284.400 de economia por ano.\" |\n| Preço | \"Custa menos que um vendedor CLT. E não tira férias.\" |\n| ROI | \"O stack completo custa menos de 20% da receita digital gerada.\" |\n| Trial | \"14 dias gratuitos para testar com seus dados reais. Sem compromisso.\" |\n| Urgência | \"Cada mês sem a Aurora é lead perdido e venda que não aconteceu.\" |\n| Concorrente | \"Se eles também têm case real, peça os números.\" |\n| Fechamento | \"Quando podemos configurar? Terça ou quinta funciona?\" |\n\n---\n\n## Checklist de fixação\n\nApós estudar este módulo, você deve conseguir:\n\n- [ ] Responder todas as 10 objeções sem consultar\n- [ ] Usar pelo menos 3 técnicas de fechamento diferentes\n- [ ] Executar a cadência de follow-up sem esquecer nenhum passo\n- [ ] Saber exatamente quando escalar para o CEO\n- [ ] Conduzir o fechamento nos 4 cenários (fecha na hora, outro decisor, quer pensar, não fecha)\n- [ ] Recitar de memória as frases de impacto\n\n---\n\n**Parabéns por concluir a trilha de treinamento.**\n\nApós estudar os 5 módulos, o próximo passo é a prática: demo hands-on com o ambiente de teste da Aurora, simulando apresentações reais com role-play de objeções. Agende com o CEO para a primeira sessão prática.\n"}]}]}];
