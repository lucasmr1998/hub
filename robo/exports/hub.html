ews вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nViews do CRM e outros mГіdulos fazem `User.objects.filter(is_active=True)` sem filtrar por tenant. Dropdowns de atribuiГ§ГЈo de responsГЎvel mostram usuГЎrios de todos os tenants. O model User do Django nГЈo tem tenant, mas PerfilUsuario faz a ponte.\n\n---\n\n## Tarefas\n\n- [ ] Criar helper `get_tenant_users(tenant)` que retorna users via PerfilUsuario\n- [ ] Substituir `User.objects.filter(is_active=True)` por `get_tenant_users()` nas views do CRM\n- [ ] Verificar outros locais que listam usuГЎrios (dashboard, admin, notificaГ§Гөes)\n- [ ] Testar que dropdowns sГі mostram usuГЎrios do tenant correto\n\n---\n\n## Contexto e referГӘncias\n\n- CRM views: `apps/comercial/crm/views.py`, linhas 79, 297, 642, 682\n- PerfilUsuario: `apps/sistema/models.py` (FK tenant)\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nNenhum dropdown ou listagem exibe usuГЎrios de outros tenants. Filtragem via PerfilUsuario.tenant.\n"}, {"t": "f", "n": "Webhook Validacao Token 30 03 2026", "fn": "webhook_validacao_token_30-03-2026.md", "c": "---\nname: \"ValidaГ§ГЈo de Token nos Webhooks\"\ndescription: \"O webhook `webhook_hubsoft_contrato()` aceita qualquer POST sem validar a origem. Um atacante pode forjar confirmaГ§Гөes d\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# ValidaГ§ГЈo de Token nos Webhooks вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO webhook `webhook_hubsoft_contrato()` aceita qualquer POST sem validar a origem. Um atacante pode forjar confirmaГ§Гөes de contrato e mover oportunidades para \"Cliente Ativo\", causando fraude de receita. Outros webhooks do N8N tГӘm o mesmo problema.\n\n---\n\n## Tarefas\n\n- [ ] Criar variГЎvel de ambiente `WEBHOOK_SECRET_TOKEN` no `.env`\n- [ ] Implementar validaГ§ГЈo de token no header `X-Webhook-Token` no `webhook_hubsoft_contrato()` (CRM)\n- [ ] Implementar a mesma validaГ§ГЈo nos webhooks de `vendas_web/views.py` (ex: `registrar_lead_api`)\n- [ ] Configurar o token no N8N (header de autenticaГ§ГЈo nos workflows)\n- [ ] Retornar 401 Unauthorized se token invГЎlido ou ausente\n- [ ] Adicionar log de tentativas invГЎlidas para monitoramento\n- [ ] Documentar o processo de configuraГ§ГЈo do token para novos webhooks\n\n---\n\n## Contexto e referГӘncias\n\n- Webhook CRM: `apps/comercial/crm/views.py`, `webhook_hubsoft_contrato()`\n- Webhook vendas_web: `vendas_web/views.py`, mГәltiplos endpoints com `@csrf_exempt`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodos os webhooks validam um token secreto no header antes de processar. RequisiГ§Гөes sem token vГЎlido sГЈo rejeitadas com 401. Tentativas invГЎlidas sГЈo logadas.\n"}, {"t": "f", "n": "Xss Mark Safe 30 03 2026", "fn": "xss_mark_safe_30-03-2026.md", "c": "---\nname: \"Corrigir XSS вҖ” mark_safe e format_html\"\ndescription: \"Template tags de parceiros usam `mark_safe(json.dumps(data))` com dados de usuГЎrio (tГӯtulo, descriГ§ГЈo de cupom). O `admi\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Corrigir XSS вҖ” mark_safe e format_html вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nTemplate tags de parceiros usam `mark_safe(json.dumps(data))` com dados de usuГЎrio (tГӯtulo, descriГ§ГЈo de cupom). O `admin_config.py` usa `format_html()` com conteГәdo nГЈo escapado. Ambos sГЈo vetores de XSS armazenado se os dados contiverem JavaScript.\n\n---\n\n## Tarefas\n\n- [ ] Substituir `mark_safe(json.dumps(...))` por `json_script` filter do Django em `parceiros/templatetags/parceiros_tags.py`\n- [ ] Corrigir `format_html()` em `vendas_web/admin_config.py` para escapar conteГәdo\n- [ ] Auditar outros usos de `mark_safe` e `|safe` nos templates\n- [ ] Testar com payloads XSS (ex: `<script>alert(1)<\/script>` como tГӯtulo de cupom)\n\n---\n\n## Contexto e referГӘncias\n\n- `apps/cs/parceiros/templatetags/parceiros_tags.py`, linha 27\n- `vendas_web/admin_config.py`, linhas 20-53\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero uso de `mark_safe` com dados de usuГЎrio. ConteГәdo dinГўmico sempre escapado.\n"}]}, {"t": "f", "n": "Apis Agentes Ia 07 04 2026", "fn": "apis_agentes_ia_07-04-2026.md", "c": "---\nname: \"APIs para Agentes IA (Tools)\"\ndescription: \"Criar endpoints DRF em /api/v1/n8n/crm/ para agentes externos (N8N) interagirem com o CRM\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# APIs para Agentes IA (Tools) вҖ” 07/04/2026\n\n**Data:** 07/04/2026\n**Responsavel:** Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## Descricao\n\nCriar APIs DRF padronizadas para que agentes externos (N8N, futuramente nosso no Agente IA) possam interagir com o CRM, leads e inbox do sistema. Primeira fase do plano de Agente IA.\n\n---\n\n## Tarefas\n\n- [ ] Serializers DRF para OportunidadeVenda, TarefaCRM, Pipeline, PipelineEstagio\n- [ ] POST /api/v1/n8n/crm/oportunidades/ (criar)\n- [ ] PUT /api/v1/n8n/crm/oportunidades/<pk>/ (atualizar/mover estagio)\n- [ ] GET /api/v1/n8n/crm/oportunidades/buscar/ (buscar por lead)\n- [ ] POST /api/v1/n8n/crm/tarefas/ (criar)\n- [ ] PUT /api/v1/n8n/crm/tarefas/<pk>/ (atualizar/concluir)\n- [ ] GET /api/v1/n8n/crm/pipelines/ (listar com estagios)\n- [ ] GET /api/v1/n8n/crm/estagios/ (listar, filtrar por pipeline)\n- [ ] POST /api/v1/n8n/inbox/enviar/ (enviar mensagem como bot)\n- [ ] Documentar APIs\n- [ ] Testar com curl\n\n---\n\n## Contexto e referencias\n\nPlano completo em `.claude/plans/breezy-frolicking-thompson.md`.\nAnalise do fluxo N8N em `robo/docs/context/reunioes/analise_fluxo_n8n_consultoria_06-04-2026.md`.\nAPIs existentes em `/api/v1/n8n/leads/`, `/api/v1/n8n/atendimentos/`.\n\n---\n\n## Resultado esperado\n\nN8N pode chamar nossas APIs para criar oportunidades, tarefas, mover estagios e enviar mensagens. Mesmas APIs serao reutilizadas internamente pelo futuro no Agente IA.\n"}, {"t": "f", "n": "Campos Customizaveis Leads 06 04 2026", "fn": "campos_customizaveis_leads_06-04-2026.md", "c": "---\nname: \"Campos customizaveis nos Leads\"\ndescription: \"Permitir que cada tenant defina campos extras nos leads via JSONField\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Tech Lead\"\n---\n\n# Campos Customizaveis nos Leads вҖ” 06/04/2026\n\n**Data:** 06/04/2026\n**Responsavel:** Tech Lead\n**Prioridade:** рҹҹЎ Media\n**Status:** рҹ”§ Em andamento\n\n---\n\n## Descricao\n\nPermitir que cada provedor (tenant) crie campos personalizados nos leads, sem necessidade de alterar o schema do banco. Abordagem: model CampoCustomizado por tenant + JSONField no LeadProspecto.\n\n---\n\n## Tarefas\n\n- [ ] Model CampoCustomizado (nome, slug, tipo, opcoes, obrigatorio, ordem)\n- [ ] Adicionar campo dados_custom (JSONField) no LeadProspecto\n- [ ] Migration local\n- [ ] Tela de configuracao para gerenciar campos custom\n- [ ] Renderizar campos custom no detalhe do lead\n- [ ] Suportar campos custom na API\n\n---\n\n## Contexto e referencias\n\nDecisao: JSONField escolhido por flexibilidade e bom suporte no Django 5.2 + PostgreSQL (indexes GIN).\nAlternativas descartadas: EAV (complexidade) e toggle de visibilidade (sem campos novos).\n\n---\n\n## Resultado esperado\n\nCada tenant pode criar, editar e ordenar campos extras para seus leads. Os campos aparecem no detalhe do lead e na API. Sem necessidade de migrations para novos campos.\n"}, {"t": "f", "n": "Email Builder 06 04 2026", "fn": "email_builder_06-04-2026.md", "c": "---\nname: \"Email Builder вҖ” Marketing\"\ndescription: \"Editor visual de e-mails com blocos programados no mГіdulo Marketing\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Claude + Lucas\"\n---\n\n# Email Builder вҖ” 06/04/2026\n\n**Data:** 06/04/2026\n**ResponsГЎvel:** Claude + Lucas\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nConstruir um editor visual de e-mails dentro do mГіdulo Marketing, semelhante ao HubSpot e RD Station. O usuГЎrio monta e-mails arrastando blocos programados (texto, imagem, botГЈo, colunas, etc.) com propriedades editГЎveis. Os templates sГЈo salvos como JSON e renderizados em HTML responsivo.\n\n---\n\n## Tarefas\n\n### Fase 1 вҖ” Base\n- [ ] Models: CategoriaTemplate, TemplateEmail, EnvioEmail\n- [ ] App structure: apps/marketing/emails/\n- [ ] Renderer: JSON de blocos вҶ’ HTML responsivo\n- [ ] Views + URLs: CRUD, editor, preview\n- [ ] Admin\n- [ ] Template: editor visual drag-and-drop com Sortable.js\n- [ ] Template: lista de e-mails\n- [ ] Registro no settings.py e urls.py\n\n### Fase 2 вҖ” Templates prontos\n- [ ] 5 a 8 templates base por categoria\n\n### Fase 3 вҖ” IntegraГ§ГЈo automaГ§Гөes\n- [ ] Nova aГ§ГЈo \"enviar email com template\" no engine\n- [ ] Seletor de template no editor de fluxos\n\n### Fase 4 вҖ” Tracking\n- [ ] Pixel de abertura\n- [ ] Redirect de cliques\n- [ ] Dashboard de mГ©tricas\n\n---\n\n## Contexto e referГӘncias\n\n- PadrГЈo de apps: TenantMixin, @login_required, JSONField para dados visuais\n- Editor de fluxos (automacoes) como referГӘncia de UX\n- Engine de automaГ§Гөes jГЎ tem aГ§ГЈo enviar_email (texto puro via N8N)\n\n---\n\n## Resultado esperado\n\nEditor funcional onde o usuГЎrio cria e-mails visuais com blocos programados, salva como template e visualiza preview desktop/mobile.\n"}]}]}, {"t": "d", "n": "GTM", "ch": [{"t": "f", "n": "00 Checklist Gtm", "fn": "00-CHECKLIST_GTM.md", "c": "# Checklist Completo GTM вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 31/03/2026\n\nLegenda: вң… Feito вҖ” рҹҹЎ Parcial/Rascunho вҖ” рҹ”§ Em andamento вҖ” вҸі NГЈo iniciado\n\n---\n\ o completa: vendas_web removido, 15 apps modulares, 225 testes, 17 vulnerabilidades corrigidas, 36 tarefas finalizadas, 21 pendentes.\n"}, {"t": "f", "n": "00 Readme", "fn": "00-README.md", "c": "# GTM вҖ” AuroraISP\n\n**Tagline:** Vende mais. Perde menos. Fideliza sempre.\n**SubtГӯtulo:** Do lead ao cliente fidelizado com inteligГӘncia.\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## ГҚndice\n\n| # | Documento | Status |\n|---|-----------|--------|\n| 01 | [Pesquisa de Mercado](./01-PESQUISA_MERCADO.md) | рҹ”§ Em construГ§ГЈo |\n| 02 | [ICP](./02-ICP.md) | рҹ”§ Em construГ§ГЈo |\n| 03 | [AnГЎlise de Concorrentes](./03-CONCORRENTES.md) | рҹ”§ Em construГ§ГЈo |\n| 04 | [Proposta de Valor](./04-PROPOSTA_VALOR.md) | рҹ”§ Em construГ§ГЈo |\n| 05 | [Posicionamento](./05-POSICIONAMENTO.md) | рҹҹЎ Rascunho |\n| 06 | [Mensagens Chave](./06-MENSAGENS_CHAVE.md) | рҹ”§ Em construГ§ГЈo |\n| 07 | [Canais](./07-CANAIS.md) | рҹ”§ Em construГ§ГЈo |\n| 08 | [PrecificaГ§ГЈo](./08-PRECIFICACAO.md) | рҹ”§ Em construГ§ГЈo |\n| 09 | [Enablement](./09-ENABLEMENT.md) | рҹ”§ Em construГ§ГЈo |\n| 10 | [Roadmap GTM](./10-ROADMAP_GTM.md) | рҹ”§ Em construГ§ГЈo |\n| 11 | [Materiais de LanГ§amento](./11-MATERIAIS_LANCAMENTO.md) | рҹ”§ Em construГ§ГЈo |\n| 12 | [Fluxo Comercial](./12-FLUXO_COMERCIAL.md) | рҹ”§ Em construГ§ГЈo |\n| 13 | [DiagnГіstico do Provedor](./13-DIAGNOSTICO.md) | рҹ”§ Em construГ§ГЈo |\n\n**Brand** (pasta separada em `docs/BRAND/`):\n\n| # | Documento | Status |\n|---|-----------|--------|\n| 07 | [Tom de Voz](../BRAND/07-TOM_DE_VOZ.md) | рҹҹЎ Rascunho |\n| 08 | [Brandbook](../BRAND/08-BRANDBOOK.md) | рҹ”§ Em construГ§ГЈo |\n\n---\n\n## Ordem de construГ§ГЈo\n\n```\nPesquisa de Mercado вҶ’ ICP вҶ’ Concorrentes вҶ’ Proposta de Valor\nвҶ’ Posicionamento вҶ’ Mensagens Chave вҶ’ Tom de Voz вҶ’ Brandbook\nвҶ’ Canais вҶ’ PrecificaГ§ГЈo вҶ’ Enablement вҶ’ Roadmap GTM\n```\n\nOs documentos marcados como **Rascunho** foram criados antes da fundaГ§ГЈo e serГЈo revisados apГіs ICP e Concorrentes.\n"}, {"t": "f", "n": "01 Pesquisa Mercado", "fn": "01-PESQUISA_MERCADO.md", "c": "# 01. Pesquisa de Mercado\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender o tamanho, o contexto e a oportunidade do mercado de provedores de internet no Brasil antes de definir ICP e posicionamento.\n\n---\n\n## Mercado de ISPs no Brasil\n\n### Tamanho do mercado\n\n| Dado | Valor | Fonte |\n|------|-------|-------|\n| Total de ISPs registrados | ~14.000 | Anatel 2024 |\n| ISPs pequenos e mГ©dios (menos de 50k clientes) | ~85% (~11.900) | Estimativa de mercado |\n| ISPs que utilizam HubSoft | ~3.000 a 5.000 | Estimativa |\n| TAM estimado (SaaS para ISP) | R$ 10M a R$ 50M/ano | Estimativa conservadora |\n\n### Contexto do mercado\n\n- O mercado de provedores regionais no Brasil cresceu aceleradamente nos Гәltimos anos com a expansГЈo de fibra Гіptica\n- A maioria dos ISPs pequenos e mГ©dios opera com processos manuais ou ferramentas genГ©ricas nГЈo adaptadas para o setor\n- HubSoft Г© o ERP/faturamento mais utilizado por provedores regionais no Brasil\n- NГЈo existe um CRM ou plataforma de automaГ§ГЈo comercial construГӯda especificamente para ISP com integraГ§ГЈo nativa ao HubSoft\n\n### Oportunidade\n\n- Mercado fragmentado, sem lГӯder consolidado em automaГ§ГЈo comercial para ISP\n- Concorrentes posicionados como IA generativa (ISPRO AI) mas sem profundidade no fluxo de vendas\n- Resultado comprovado em produГ§ГЈo real com nГәmeros mensurГЎveis\n\n---\n\n## Dores do mercado\n\n> A ser detalhado no documento de ICP e validado com entrevistas de clientes.\n\n| Dor | Impacto |\n|-----|---------|\n| Perda de leads no WhatsApp | Alto |\n| Processo de documentaГ§ГЈo manual e caГіtico | Alto |\n| Contrato lento para chegar ao HubSoft | MГ©dio |\n| Zero visibilidade do pipeline de vendas | Alto |\n| Churn de clientes sem programa de fidelizaГ§ГЈo | MГ©dio |\n\n---\n\n## ValidaГ§ГЈo em produГ§ГЈo\n\nResultado real de um provedor regional em operaГ§ГЈo com a AuroraISP:\n\n| MГ©trica | Resultado |\n|---------|-----------|\n| Leads processados | 341 |\n| Taxa de conversГЈo | 48,9% |\n| ReduГ§ГЈo de trabalho manual | 70% |\n| Contratos enviados ao HubSoft automaticamente | 12 |\n| Economia estimada por ano | R$ 58.000 |\n| ROI | 564% |\n\n> O nome do provedor nГЈo Г© divulgado publicamente.\n\n---\n\n## Benchmark de volume (provedor de referГӘncia)\n\nDados reais de um provedor regional de mГ©dio porte em operaГ§ГЈo com a AuroraISP:\n\n| MГ©trica | Antes | Depois |\n|---------|-------|--------|\n| Clientes ativos | 30.000 | 30.000 |\n| Leads recebidos por mГӘs | ~1.000 | ~1.000 |\n| Vendas digitais por mГӘs | ~400 | ~400 |\n| Taxa de conversГЈo | ~40% | ~40% |\n| Pessoas atendendo leads comerciais | 8 | 2 |\n| Pessoas em backoffice comercial | 0 | 2 |\n| Total no comercial | 8 | 4 |\n| Ticket mГ©dio do plano | R$ 99,90 | R$ 99,90 |\n\n> O dado mais forte do case: **2 pessoas fazem hoje o que 8 faziam antes.** A automaГ§ГЈo nГЈo sГі reduziu o time вҖ” ela liberou pessoas para funГ§Гөes estratГ©gicas que antes nГЈo existiam.\n\n### Impacto econГҙmico calculado\n\n| CГЎlculo | Valor |\n|---------|-------|\n| Equipe reduzida | 8 para 4 pessoas (50%) |\n| Resultado das 4 liberadas | Parte demitida (reduГ§ГЈo de custo direto) + parte realocada (ganho de produtividade em outros setores) |\n| Custo por pessoa (salГЎrio + comissГЈo + benefГӯcios) | R$ 3.050/mГӘs |\n| Custo por pessoa com encargos trabalhistas (~40%) | ~R$ 3.950/mГӘs |\n| Pessoas liberadas do atendimento comercial | 6 (de 8 para 2) |\n| Custo real por pessoa (salГЎrio + comissГЈo + benefГӯcios + encargos) | ~R$ 3.950/mГӘs |\n| Economia mensal com 6 pessoas liberadas | R$ 23.700/mГӘs |\n| **Economia anual com 6 pessoas liberadas** | **R$ 284.400/ano** |\n| Receita mensal gerada pelas 400 vendas | R$ 39.960/mГӘs |\n| Receita anual gerada pelas 400 vendas | R$ 479.520/ano |\n\n> ReferГӘncia Гәtil para dimensionar o valor do produto no pitch comercial.\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o percentual de ISPs com HubSoft que tГӘm time comercial estruturado?\n- [ ] Qual o ticket mГ©dio de aquisiГ§ГЈo de cliente para um ISP regional?\n- [ ] Qual o custo mГ©dio de um vendedor para um ISP pequeno/mГ©dio?\n"}, {"t": "f", "n": "02 Icp", "fn": "02-ICP.md", "c": "# 02. ICP вҖ” Ideal Customer Profile\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir com precisГЈo quem Г© o cliente ideal da AuroraISP: o perfil da empresa, os decisores e as personas que interagem com o produto.\n\n---\n\n## Perfil da empresa (ICP primГЎrio)\n\n| CritГ©rio | DescriГ§ГЈo |\n|----------|-----------|\n| Segmento | Provedor regional de internet (ISP) |\n| ERP utilizado | HubSoft |\n| Porte | 500 a 50.000 clientes ativos (referГӘncia: 30.000 clientes, ~1.000 leads/mГӘs) |\n| Time comercial | 2 a 20 vendedores |\n| LocalizaГ§ГЈo | Brasil (foco inicial: interior e cidades mГ©dias) |\n| Maturidade digital | Usa WhatsApp como canal principal de vendas |\n| Dor principal | Perda de leads, processo manual, falta de visibilidade |\n\n## Perfil da empresa (ICP secundГЎrio вҖ” futuro)\n\n| CritГ©rio | DescriГ§ГЈo |\n|----------|-----------|\n| ERP utilizado | Voalle, SGP, MK-Auth ou outros |\n| ExpansГЈo | ApГіs consolidaГ§ГЈo com HubSoft |\n\n---\n\n## Personas\n\n### Persona 1 вҖ” O Dono do Provedor\n\n> Quem decide a compra.\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| Cargo | ProprietГЎrio / CEO |\n| Perfil | Empreendedor regional, fundou o provedor, operacional no dia a dia |\n| Dor principal | \"Meus vendedores perdem lead e eu nГЈo sei o que estГЎ acontecendo nas vendas\" |\n| O que quer | Visibilidade, controle e menos desperdГӯcio |\n| Como decide | Por ROI e indicaГ§ГЈo de confianГ§a |\n| Canal preferido | WhatsApp, grupos de provedor, eventos do setor |\n\n---\n\n### Persona 2 вҖ” O Gerente Comercial\n\n> Quem vai usar o produto para gerir o time.\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| Cargo | Gerente Comercial / Supervisor de Vendas |\n| Perfil | ResponsГЎvel pelo time, quer dados para cobrar resultados |\n| Dor principal | \"NГЈo consigo cobrar o time porque nГЈo tenho dado nenhum\" |\n| O que quer | Dashboard, relatГіrios, visibilidade de pipeline |\n| Como decide | Influencia o dono, quer ferramenta que facilite a gestГЈo |\n| Canal preferido | WhatsApp, ferramentas de gestГЈo |\n\n---\n\n### Persona 3 вҖ” O Vendedor\n\n> Quem usa o produto no dia a dia.\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| Cargo | Vendedor / Atendente comercial |\n| Perfil | Atende via WhatsApp, coleta dados, pede documentos manualmente |\n| Dor principal | \"Fico perdido. NГЈo sei qual lead devo ligar agora\" |\n| O que quer | Fila clara, lembretes automГЎticos, menos trabalho repetitivo |\n| Como decide | NГЈo decide, mas adota ou resiste. A experiГӘncia precisa ser simples |\n| Canal preferido | WhatsApp, interface mobile |\n\n---\n\n### Persona 4 вҖ” O TI do Provedor\n\n> Quem vai avaliar e implementar tecnicamente.\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| Cargo | Analista de TI / TГ©cnico de suporte |\n| Perfil | ResponsГЎvel por sistemas, nГЈo quer manutenГ§ГЈo extra |\n| Dor principal | \"NГЈo quero dar suporte em coisa que nГЈo Г© meu core\" |\n| O que quer | SaaS pronto, documentaГ§ГЈo clara, pouca manutenГ§ГЈo |\n| Como decide | Valida viabilidade tГ©cnica para o dono |\n| Canal preferido | DocumentaГ§ГЈo tГ©cnica, e-mail |\n\n---\n\n## Sinais de fit (quem tem mais chance de comprar)\n\n- [ ] Usa HubSoft como ERP\n- [ ] Tem time comercial ativo (mГӯnimo 2 vendedores)\n- [ ] Recebe leads pelo WhatsApp hoje\n- [ ] JГЎ perdeu lead por falta de acompanhamento\n- [ ] Dono ou gerente sente falta de visibilidade do pipeline\n- [ ] NГЈo tem CRM estruturado (usa planilha ou nada)\n\n## Sinais de nГЈo fit (quem provavelmente nГЈo vai comprar agora)\n\n- [ ] ISP muito pequeno sem time comercial (vendas feitas sГі pelo dono)\n- [ ] Usa outro ERP e nГЈo tem plano de migrar para HubSoft\n- [ ] JГЎ tem CRM estruturado e integrado\n- [ ] Processo de vendas 100% presencial sem uso de WhatsApp\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o tamanho mГ©dio de time comercial dos provedores com HubSoft?\n- [ ] Quantos leads por mГӘs um ISP mГ©dio recebe?\n- [ ] O dono costuma ser o decisor ou delega para gerente?\n"}, {"t": "f", "n": "03 Concorrentes", "fn": "03-CONCORRENTES.md", "c": "# 03. AnГЎlise de Concorrentes\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender quem compete pelo mesmo cliente, o que oferecem, onde falham e onde a AuroraISP se diferencia.\n\n---\n\n## Mapa competitivo\n\n| Concorrente | Tipo | Foco | PreГ§o | HubSoft | Social proof |\n|-------------|------|------|-------|---------|--------------|\n| **ISPRO AI** | SaaS ISP | IA conversacional (vendas, cobranГ§a, suporte) | NГЈo divulgado | GenГ©rico | Nenhuma |\n| **Pipedrive** | CRM genГ©rico | Pipeline de vendas | R$ 900+/mГӘs | NГЈo | Sim |\n| **RD Station** | CRM + Marketing | Marketing e vendas | R$ 600 a 1.200/mГӘs | NГЈo | Sim |\n| **Planilha + WhatsApp** | Nenhum | Tudo manual | R$ 0 | NГЈo | N/A |\n| **Sistema prГіprio** | Interno | Customizado | Alto custo de dev | ГҖs vezes | N/A |\n\n---\n\n## AnГЎlise detalhada\n\n### ISPRO AI (isproai.com.br)\n**Concorrente mais direto.**\n\n| Item | Detalhe |\n|------|---------|\n| Posicionamento | \"A plataforma lГӯder em IA Generativa para Provedores de Internet\" |\n| MГіdulos | Venda digital, cobranГ§a, suporte N1, campanhas, indicaГ§Гөes, resgate de abandono |\n| Diferencial que afirmam | IA generativa, 24/7, aumento de atГ© 50% na conversГЈo |\n| Fraquezas | Sem preГ§o pГәblico, sem case real, sem social proof, integraГ§ГЈo HubSoft genГ©rica |\n| CTA | Apenas WhatsApp |\n| Estilo | GenГ©rico, nГЈo mostra profundidade no fluxo de vendas |\n\n**Onde a AuroraISP ganha:**\n- IntegraГ§ГЈo HubSoft nativa e profunda (contrato vai direto para o ERP)\n- Resultado comprovado em operaГ§ГЈo real com nГәmeros verificГЎveis\n- Foco no fluxo de vendas completo: lead, documento, contrato, ativaГ§ГЈo\n- Hub com produtos complementares (CRM + Clube de BenefГӯcios)\n\n**Onde o ISPRO AI ganha:**\n- MГіdulos de cobranГ§a e suporte (fora do escopo atual da AuroraISP)\n- Possivelmente mais recursos de campanha ativa\n\n---\n\n\n### Pipedrive / RD Station\n**Concorrentes indiretos.**\n\nProvedores mais sofisticados jГЎ usam ou tentaram usar essas ferramentas. A barreira Г© a falta de integraГ§ГЈo com HubSoft e o custo elevado para o porte do ISP regional.\n\n**Onde a AuroraISP ganha:**\n- Feito para ISP, nГЈo adaptado\n- IntegraГ§ГЈo HubSoft nativa\n- PreГ§o acessГӯvel para o mercado regional\n- NГЈo exige consultor para configurar\n\n---\n\n### Planilha + WhatsApp Business\n**O \"concorrente\" mais comum.**\n\nГү o sistema atual de 80% dos provedores regionais. O desafio nГЈo Г© vencer uma ferramenta, Г© vencer o hГЎbito.\n\n**Argumento de troca:**\n- \"Planilha nГЈo avisa quando lead esfriou. Planilha nГЈo manda documento pro HubSoft. Planilha nГЈo gera contrato.\"\n\n---\n\n## Matriz de diferenciaГ§ГЈo\n\n| Capacidade | AuroraISP | ISPRO AI | Pipedrive | Planilha |\n|------------|-----------|----------|-----------|---------|\n| IntegraГ§ГЈo HubSoft nativa | вң… | вҡ пёҸ GenГ©rica | вқҢ | вқҢ |\n| Fluxo lead вҶ’ contrato вҶ’ ERP | вң… | вқҢ | вқҢ | вқҢ |\n| Coleta e validaГ§ГЈo de documentos | вң… | вқҢ | вқҢ | вқҢ |\n| Bot de qualificaГ§ГЈo WhatsApp | вң… | вң… | вқҢ | вқҢ |\n| CRM com pipeline visual | рҹ”§ Em dev | вҡ пёҸ Parcial | вң… | вқҢ |\n| Clube de fidelizaГ§ГЈo | рҹ”§ Em dev | вқҢ | вқҢ | вқҢ |\n| CobranГ§a automatizada | вқҢ | вң… | вқҢ | вқҢ |\n| Suporte N1 automatizado | вқҢ | вң… | вқҢ | вқҢ |\n| Resultado comprovado em ISP | вң… | вқҢ | вқҢ | N/A |\n| PreГ§o acessГӯvel para ISP regional | вң… | вқ“ | вқҢ | вң… |\n\n---\n\n## Perguntas em aberto\n\n- [ ] O ISPRO AI tem clientes pagantes hoje? Quantos?\n- [ ] Existe algum outro concorrente regional nГЈo mapeado?\n- [ ] Provedores que usaram Pipedrive/RD Station: qual foi o motivo de abandono?\n"}, {"t": "f", "n": "04 Proposta Valor", "fn": "04-PROPOSTA_VALOR.md", "c": "# 04. Proposta de Valor\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir o que a AuroraISP entrega para cada persona, de forma clara e verificГЎvel.\n\n---\n\n## Proposta central\n\n> A AuroraISP automatiza o fluxo comercial do provedor de internet com inteligГӘncia artificial вҖ” do primeiro contato no WhatsApp atГ© a ativaГ§ГЈo no HubSoft вҖ” eliminando retrabalho, reduzindo perda de leads e dando visibilidade real ao processo de vendas.\n\n---\n\n## Por persona\n\n### Para o Dono do Provedor\n\n**Antes:** \"Meus vendedores perdem lead e eu nГЈo sei o que estГЎ acontecendo.\"\n**Depois:** Painel com todos os leads, conversГөes e gargalos em tempo real.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Visibilidade do pipeline | Sabe exatamente quantos leads entraram, em qual etapa estГЈo e quantos foram perdidos |\n| AutomaГ§ГЈo do fluxo | Time nГЈo precisa pedir documento, gerar contrato ou ativar manualmente no HubSoft |\n| Resultado com dado | Consegue cobrar o time com base em nГәmeros reais |\n\n---\n\n### Para o Gerente Comercial\n\n**Antes:** \"NГЈo consigo cobrar porque nГЈo tenho dado nenhum.\"\n**Depois:** Dashboard com mГ©tricas de conversГЈo por vendedor, por etapa e por perГӯodo.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| RelatГіrios automГЎticos | Sabe a performance de cada vendedor sem precisar perguntar |\n| Pipeline visual | Identifica onde os leads estГЈo travando no funil |\n| Alertas inteligentes | Recebe aviso quando lead estГЎ hГЎ muito tempo sem contato |\n\n---\n\n### Para o Vendedor\n\n**Antes:** \"Fico perdido. NГЈo sei qual lead ligar agora.\"\n**Depois:** Fila de prioridade clara, com o prГіximo passo definido para cada lead.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Fila de atendimento | Sabe qual lead abordar agora e qual estГЎ esperando |\n| Bot de qualificaГ§ГЈo | Recebe o lead jГЎ qualificado, sem precisar fazer perguntas bГЎsicas |\n| Coleta automГЎtica de docs | NГЈo precisa ficar pedindo documento por mensagem |\n\n---\n\n### Para o TI do Provedor\n\n**Antes:** \"NГЈo quero manutenГ§ГЈo em coisa que nГЈo Г© meu core.\"\n**Depois:** SaaS pronto, com onboarding pela AuroraISP e suporte contГӯnuo.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| ImplementaГ§ГЈo pela Aurora | Configura, testa e entrega funcionando |\n| IntegraГ§ГЈo HubSoft documentada | NГЈo precisa desenvolver nada |\n| AtualizaГ§Гөes sem intervenГ§ГЈo | O sistema evolui sem exigir trabalho interno |\n\n---\n\n## Proposta de valor por produto\n\n### Comercial\n> \"Seu vendedor atende. A Aurora qualifica, coleta documento, gera contrato e ativa no HubSoft.\"\n\n### CRM Kanban *(em desenvolvimento)*\n> \"Veja onde cada lead estГЎ, quanto tempo estГЎ parado e quem precisa de atenГ§ГЈo agora.\"\n\n### Clube de BenefГӯcios *(em desenvolvimento)*\n> \"Seu cliente fica porque vale a pena ficar.\"\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o ganho financeiro mГ©dio esperado por provedor ao usar o Comercial?\n- [ ] Qual a reduГ§ГЈo de tempo mГ©dio do ciclo de vendas com a plataforma?\n- [ ] A proposta de valor do Clube de BenefГӯcios precisa ser validada com provedores\n"}, {"t": "f", "n": "05 Posicionamento", "fn": "05-POSICIONAMENTO.md", "c": "# Posicionamento вҖ” AuroraISP\n\n**VersГЈo:** 2.0\n**Status:** вң… Aprovado\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## O que Г© a AuroraISP\n\nA AuroraISP Г© um hub de tecnologia com inteligГӘncia artificial para provedores de internet.\n\nReunimos em um sГі lugar os mГіdulos que o ISP precisa para crescer: do primeiro contato com o lead atГ© a fidelizaГ§ГЈo do cliente. Tudo automatizado, tudo integrado, tudo com IA.\n\n---\n\n## A jornada completa do provedor\n\n```\nATRAIR вҶ’ CONVERTER вҶ’ RETER\n```\n\n| Etapa | MГіdulo | O que faz |\n|-------|--------|-----------|\n| **Atrair** | Marketing | Motor de automaГ§ГЈo do hub. E-mail, WhatsApp, fluxos com rГ©guas padrГЈo prontas e gestГЈo de trГЎfego pago com IA. |\n| **Converter** | Comercial | AutomaГ§ГЈo do fluxo de vendas: lead, docs, contrato, HubSoft. Pro inclui CRM Kanban. |\n| **Reter** | CS | Clube de BenefГӯcios, prevenГ§ГЈo de churn, NPS e upsell. AutomaГ§Гөes rodam via Marketing. |\n\n> Cada mГіdulo funciona de forma independente. Juntos, cobrem a jornada completa do provedor.\n\n---\n\n## O papel da IA\n\nA inteligГӘncia artificial nГЈo Г© um recurso isolado. EstГЎ presente em toda a plataforma:\n\n- **Marketing:** otimizaГ§ГЈo de campanhas, segmentaГ§ГЈo de base, sugestГЈo de rГ©guas com melhor performance\n- **Comercial:** qualificaГ§ГЈo automГЎtica de leads, validaГ§ГЈo de documentos, respostas inteligentes no WhatsApp, priorizaГ§ГЈo de pipeline\n- **CS:** personalizaГ§ГЈo de benefГӯcios, identificaГ§ГЈo de risco de churn, recomendaГ§ГЈo de upsell por perfil de cliente\n\n---\n\n## O problema que resolvemos\n\nO provedor regional opera com ferramentas desconectadas. WhatsApp para captar, planilha para registrar, e-mail para pedir documento, HubSoft para ativar. Nada conversa entre si.\n\nO resultado: leads perdidos, processo manual, time sobrecarregado e zero visibilidade do que estГЎ acontecendo nas vendas.\n\n---\n\n## Para quem\n\n**ICP primГЎrio:** Provedores regionais de internet que utilizam HubSoft como ERP.\n\n| CritГ©rio | Perfil |\n|----------|--------|\n| Porte | 500 a 50.000 clientes ativos |\n| Time comercial | 2 a 20 vendedores |\n| ERP | HubSoft (primГЎrio) |\n| Dor principal | Perda de leads, processo manual, zero visibilidade |\n| Perfil de compra | Dono ou gerente comercial |\n\n**ICP secundГЎrio (futuro):** Provedores com outros ERPs (Voalle, SGP, MK-Auth).\n\n---\n\n## Posicionamento\n\n> **Vende mais. Perde menos. Fideliza sempre.**\n> Do lead ao cliente fidelizado com inteligГӘncia.\n\nNГЈo somos um CRM genГ©rico adaptado para ISP.\nNГЈo somos um chatbot.\nSomos o hub de IA construГӯdo para o provedor crescer, com mГіdulos que se conectam e evoluem juntos.\n\n---\n\n## Status dos mГіdulos\n\n| MГіdulo | Planos | Status |\n|--------|--------|--------|\n| **Comercial** | Start / Pro (Pro inclui CRM Kanban) | вң… Validado em produГ§ГЈo |\n| **Marketing** | Start / Pro | рҹ”§ Em desenvolvimento |\n| **CS** | Start / Pro (inclui Clube de BenefГӯcios) | рҹ”§ Em desenvolvimento |\n\n---\n\n## Resultado comprovado\n\nUm provedor regional com 30.000 clientes usava 8 pessoas para atender 1.000 leads por mГӘs. Hoje, 2 pessoas fazem o mesmo trabalho. As outras 2 viraram backoffice estratГ©gico, funГ§ГЈo que antes nГЈo existia. SГЈo 400 vendas por mГӘs no digital, R$ 99,90 cada. Economia de R$ 284.400 por ano sГі em pessoal.\n\n> Nome do provedor nГЈo divulgado. NГәmeros verificados em produГ§ГЈo.\n\n---\n\n## Contra quem competimos\n\n| Concorrente | O que fazem | Onde perdemos | Onde ganhamos |\n|-------------|-------------|---------------|---------------|\n| **ISPRO AI** | IA conversacional para ISP (cobranГ§a, suporte, vendas) | MГіdulos de cobranГ§a e suporte | Hub completo, integraГ§ГЈo HubSoft profunda, resultado comprovado em produГ§ГЈo |\n| **Pipedrive / RD Station** | CRM genГ©rico | Marca consolidada | Feito para ISP, integra HubSoft, custo acessГӯvel |\n| **Planilha + WhatsApp** | O sistema atual da maioria | Custo zero | Automatiza tudo, tem IA, tem visibilidade real |\n| **Sistema prГіprio** | CRM interno | CustomizaГ§ГЈo total | Sem custo de manutenГ§ГЈo, evoluГ§ГЈo contГӯnua, time dedicado |\n\n---\n\n## Nossa vantagem real\n\n**1. Hub completo para provedor**\nA jornada inteira em um lugar: atrair, converter e reter. Nenhum concorrente cobre as trГӘs etapas com foco exclusivo em ISP.\n\n**2. IA que resolve problema real**\nNГЈo Г© IA como buzzword. Гү IA aplicada a dores reais do provedor: qualificaГ§ГЈo de lead, validaГ§ГЈo de documento, prevenГ§ГЈo de churn, otimizaГ§ГЈo de campanha.\n\n**3. IntegraГ§ГЈo HubSoft nativa**\nContrato gerado e enviado direto ao HubSoft. Nenhum concorrente faz isso.\n\n**4. Resultado comprovado**\nNГәmeros reais de um provedor em operaГ§ГЈo. NГЈo projeГ§ГЈo, nГЈo demo, nГЈo promessa.\n\n---\n\n## O que nГЈo somos\n\n- NГЈo somos sistema de cobranГ§a\n- NГЈo somos ERP nem substituto do HubSoft\n- NГЈo somos suporte tГ©cnico automatizado\n\nNosso foco Г© crescimento: atrair mais leads, converter mais vendas, reter mais clientes.\n"}, {"t": "f", "n": "06 Mensagens Chave", "fn": "06-MENSAGENS_CHAVE.md", "c": "# 06. Mensagens Chave\n\n**Status:** вң… Aprovado\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Hierarquia de mensagem\n\n```\nTagline\n  в””в”Җв”Җ Proposta central\n        в””в”Җв”Җ Mensagens por mГіdulo\n              в””в”Җв”Җ Mensagens por persona\n```\n\n---\n\n## Tagline\n\n> **Vende mais. Perde menos. Fideliza sempre.**\n\n## SubtГӯtulo\n\n> Do lead ao cliente fidelizado com inteligГӘncia.\n\n---\n\n## Proposta central\n\n> \"A AuroraISP automatiza o processo comercial do provedor de internet com IA. Do WhatsApp ao HubSoft, sem retrabalho.\"\n\n---\n\n## Mensagens por mГіdulo\n\n### Comercial\n- \"Do WhatsApp ao HubSoft, sem um clique manual.\"\n- \"Seu time vende. A Aurora cuida do resto.\"\n- \"Lead entra no WhatsApp. Contrato chega no HubSoft. AutomГЎtico.\"\n\n**Comercial Pro (CRM Kanban)**\n- \"Veja onde cada lead estГЎ parado. Antes de perder.\"\n- \"Pipeline claro. DecisГЈo rГЎpida.\"\n\n### Marketing\n- \"Seus leads recebem a mensagem certa, na hora certa, no canal certo.\"\n- \"RГ©guas prontas para o provedor usar no primeiro dia.\"\n- \"Campanha no ar. IA otimizando. VocГӘ vendendo.\"\n\n### CS\n- \"Cliente que tem vantagem, nГЈo cancela.\"\n- \"FidelizaГ§ГЈo que o provedor nunca teve. Agora tem.\"\n- \"Saiba quem estГЎ prestes a cancelar antes que ele cancele.\"\n\n---\n\n## Mensagens por persona\n\n### Para o Dono\n- \"VocГӘ sabia que seu time perdeu leads essa semana sem saber?\"\n- \"Com a Aurora, vocГӘ vГӘ o funil de vendas em tempo real.\"\n- \"Um contrato a mais por mГӘs jГЎ paga o plano. O resto Г© lucro.\"\n\n**ГӮngulo custo:** \"Um provedor reduziu o time de atendimento de 8 para 2 pessoas. O processo ficou mais eficiente, nГЈo mais lento.\"\n\n**ГӮngulo crescimento:** \"Com a Aurora, seu time atual consegue atender o dobro de leads. VocГӘ cresce sem precisar contratar.\"\n\n### Para o Gerente Comercial\n- \"Seu time tem meta. Agora vocГӘ tem dado para cobrar.\"\n- \"RelatГіrio de conversГЈo por vendedor. AutomГЎtico, todo dia.\"\n\n### Para o Vendedor\n- \"Sem fila de prioridade, o lead mais quente fica esperando.\"\n- \"A Aurora avisa qual lead ligar agora. VocГӘ sГі fecha.\"\n\n---\n\n## Mensagem de prova (case anГҙnimo)\n\n> \"Um provedor regional com 30.000 clientes recebia mil leads por mГӘs e precisava de 8 pessoas para dar conta. Hoje, 2 pessoas atendem o mesmo volume. As outras 2 viraram backoffice estratГ©gico do comercial, funГ§ГЈo que antes nГЈo existia. 400 vendas por mГӘs no digital, R$ 99,90 cada, processo inteiro automatizado. Economia de R$ 284.400 por ano sГі em pessoal.\"\n\n---\n\n## ObjeГ§Гөes e respostas\n\n| ObjeГ§ГЈo | Resposta |\n|---------|----------|\n| \"JГЎ uso WhatsApp Business\" | WhatsApp Business nГЈo qualifica lead, nГЈo coleta documento, nГЈo manda contrato pro HubSoft. SГЈo ferramentas diferentes. |\n| \"Minha equipe nГЈo vai aprender\" | Interface feita para vendedor sem conhecimento tГ©cnico. Treinamento em 30 minutos. |\n| \"E se o bot errar?\" | Modo manual sempre disponГӯvel. O bot Г© auxiliar, nГЈo decisor. |\n| \"NГЈo tenho tГ©cnico para configurar\" | A implementaГ§ГЈo Г© responsabilidade da Aurora. VocГӘ paga o setup, a gente configura. |\n| \"HubSoft jГЎ faz isso\" | HubSoft Г© ERP e faturamento. NГЈo qualifica lead, nГЈo coleta documento, nГЈo fideliza cliente. |\n| \"Quanto vou economizar?\" | Depende do seu volume. Um provedor com perfil similar economizou R$ 284.400 por ano sГі em pessoal. |\n\n---\n\n## Perguntas em aberto\n\n- [ ] Validar mensagens com o parceiro comercial antes de usar em campo\n- [ ] Criar versГөes curtas para WhatsApp (mГЎximo 3 linhas)\n- [ ] Criar versГЈo para pitch de 2 minutos\n"}, {"t": "f", "n": "07 Canais", "fn": "07-CANAIS.md", "c": "# 07. Canais\n\n**Status:** вң… Aprovado\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir como a AuroraISP chega atГ© o ICP вҖ” quais canais usar, em que ordem e com qual abordagem.\n\n---\n\n## Canais mapeados\n\n### Canal 1 вҖ” SГіcio Comercial\n**Prioridade:** Alta\n**Status:** Ativo\n\nO sГіcio comercial detГ©m 30% do lucro da AuroraISP e Г© responsГЎvel pela prospecГ§ГЈo e fechamento de novos clientes. A Aurora fornece material de enablement, pitch e suporte tГ©cnico para demos.\n\n| Item | Detalhe |\n|------|---------|\n| ResponsГЎvel | SГіcio comercial |\n| Modelo | 30% do lucro (participaГ§ГЈo societГЎria) |\n| Abordagem | Consultiva |\n| Material necessГЎrio | Pitch deck, one-pager, case anГҙnimo, demo ao vivo |\n| Resultado esperado | A definir com o sГіcio |\n\n---\n\n### Canal 2 вҖ” Comunidades de Provedores\n**Prioridade:** Alta\n**Custo:** Baixo\n\nGrupos de WhatsApp e Telegram de provedores regionais sГЈo o principal ponto de encontro do ICP. PresenГ§a ativa com conteГәdo de valor gera reconhecimento orgГўnico sem custo.\n\n| Item | Detalhe |\n|------|---------|\n| Canais | Grupos WhatsApp/Telegram de ISPs, comunidades ABRINT, ABRI |\n| Abordagem | ConteГәdo de valor + case + indicaГ§ГЈo |\n| Mapeamento | A levantar com o sГіcio comercial |\n| Resultado esperado | A definir apГіs mapeamento |\n\n---\n\n### Canal 3 вҖ” Parceria HubSoft\n**Prioridade:** Baixa (longo prazo)\n**Custo:** Baixo apГіs acordo\n\nHubSoft tem 3.000 a 5.000 ISPs na base. Uma parceria dГЎ acesso direto ao ICP perfeito вҖ” provedores que jГЎ usam o ERP com o qual a AuroraISP integra nativamente. Pode ser desde indicaГ§ГЈo informal atГ© presenГ§a em marketplace oficial.\n\n| Item | Detalhe |\n|------|---------|\n| Tipo | IndicaГ§ГЈo, co-marketing ou marketplace |\n| Vantagem | Acesso direto Г  base de ISPs HubSoft sem custo de prospecГ§ГЈo |\n| Diferencial para HubSoft | AuroraISP aumenta o valor percebido do HubSoft para o cliente final |\n| Status | Contato a iniciar |\n| Resultado esperado | A definir apГіs primeiro contato |\n\n---\n\n### Canal 4 вҖ” Outbound Direto\n**Prioridade:** MГ©dia\n**Custo:** Baixo\n\n| Item | Detalhe |\n|------|---------|\n| Canais | WhatsApp direto para donos de ISP |\n| Abordagem | Personalizada com pitch curto e link para demo |\n| Resultado esperado | A definir |\n\n---\n\n### Canal 5 вҖ” Eventos do Setor\n**Prioridade:** MГ©dia\n**Custo:** MГ©dio\n\n| Item | Detalhe |\n|------|---------|\n| Eventos | ISP Summit, MeetISP, ABRINT, feiras regionais |\n| Abordagem | Stand, palestra ou participaГ§ГЈo como case |\n| Resultado esperado | 10 ou mais leads por evento |\n\n---\n\n### Canal 6 вҖ” Inbound (ConteГәdo)\n**Prioridade:** Baixa (mГ©dio/longo prazo)\n**Custo:** Baixo\n\n| Item | Detalhe |\n|------|---------|\n| Formatos | Blog, YouTube, LinkedIn |\n| Temas | Como nГЈo perder lead no WhatsApp, como estruturar time de vendas de ISP |\n| Resultado esperado | 1 a 2 conversГөes por mГӘs apГіs 6 meses |\n\n---\n\n## Prioridade de execuГ§ГЈo\n\n```\nAgora:     SГіcio Comercial + Comunidades de Provedores\nPrГіximo:   Outbound Direto\nFuturo:    Parceria HubSoft + Eventos + Inbound\n```\n\n---\n\n## PendГӘncias\n\n- [ ] Levantar com o sГіcio comercial os grupos de WhatsApp/Telegram mais relevantes\n"}, {"t": "f", "n": "08 Precificacao", "fn": "08-PRECIFICACAO.md", "c": "# 08. PrecificaГ§ГЈo\n\n**Status:** вң… Aprovado\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Modelo de precificaГ§ГЈo\n\n**Por mГіdulo** (Starter, Start e Pro) **+ valor transacional mensal.**\n\nInspirado no modelo HubSpot: o cliente entra pelo plano que cabe no bolso e expande conforme cresce. TrГӘs nГӯveis de profundidade por mГіdulo. O transacional alinha o sucesso da Aurora com o sucesso do provedor.\n\nEscada de preГ§o: **1:2:3,5** por mГіdulo.\n\n---\n\n## MГіdulos disponГӯveis\n\n| MГіdulo | Status | O que resolve |\n|--------|--------|---------------|\n| **Comercial** | вң… DisponГӯvel | AutomaГ§ГЈo do fluxo comercial: lead вҶ’ documento вҶ’ contrato вҶ’ HubSoft. CRM Kanban incluso no Pro. |\n| **Marketing** | рҹ”§ Em desenvolvimento | Motor de automaГ§ГЈo do hub. E-mail e WhatsApp, fluxos de automaГ§ГЈo com rГ©guas padrГЈo prontas, gestГЈo de trГЎfego pago com IA. |\n| **CS** | рҹ”§ Em desenvolvimento | RetenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda: Clube de BenefГӯcios, prevenГ§ГЈo de churn, NPS, upsell. AutomaГ§Гөes rodam via Marketing. |\n\n> O CRM Kanban Г© parte do Comercial Pro, nГЈo um produto separado. O pipeline sГі existe porque o Comercial alimenta os dados.\n\n---\n\n## O que diferencia Starter, Start e Pro\n\n| CritГ©rio | Starter | Start | Pro |\n|----------|---------|-------|-----|\n| PГәblico-alvo | ISP pequeno, atГ© ~2.000 clientes | ISP mГ©dio, 2.000 a 10.000 clientes | ISP grande, acima de 10.000 clientes |\n| Funcionalidades | Essenciais | Completas | Completas + avanГ§adas com IA |\n| NГәmero de usuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| NГӯvel de suporte | Standard | Standard | PrioritГЎrio |\n\n> NГЈo hГЎ limite de volume (leads, clientes, contatos). O volume Г© coberto pelo transacional. Quanto mais o provedor cresce, mais paga, mas sempre com ROI positivo.\n\n---\n\n## Estrutura por mГіdulo\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Funcionalidades | Bot de qualificaГ§ГЈo, coleta de docs, contrato, ativaГ§ГЈo HubSoft | Tudo do Starter + automaГ§Гөes de follow-up, relatГіrios bГЎsicos | Tudo do Start + CRM Kanban, automaГ§Гөes avanГ§adas, validaГ§ГЈo IA, relatГіrios completos |\n| Suporte | Standard | Standard | PrioritГЎrio |\n| **Transacional** | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$297/mГӘs | R$597/mГӘs | R$997/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Funcionalidades | Disparos de WhatsApp e e-mail, rГ©guas padrГЈo prontas | Tudo do Starter + fluxos personalizados, rastreamento de campanhas | Tudo do Start + nutriГ§ГЈo avanГ§ada, upsell de SVA, otimizaГ§ГЈo de trГЎfego com IA, relatГіrios de atribuiГ§ГЈo |\n| Suporte | Standard | Standard | PrioritГЎrio |\n| **Transacional** | R$0,05 por contato na base/mГӘs | R$0,05 por contato na base/mГӘs | R$0,05 por contato na base/mГӘs |\n\n### CS (Customer Success)\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$247/mГӘs | R$497/mГӘs | R$897/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Funcionalidades | Clube de BenefГӯcios, rГ©guas bГЎsicas de retenГ§ГЈo via Marketing | Tudo do Starter + NPS, relatГіrios de saГәde da base | Tudo do Start + prevenГ§ГЈo de churn com IA, upsell automatizado, relatГіrios avanГ§ados |\n| Suporte | Standard | Standard | PrioritГЎrio |\n| **Transacional** | R$0,15 por cliente ativo no clube/mГӘs | R$0,15 por cliente ativo no clube/mГӘs | R$0,15 por cliente ativo no clube/mГӘs |\n\n---\n\n## Eventos transacionais por mГіdulo\n\n| MГіdulo | Evento | Valor | Natureza |\n|--------|--------|-------|---------|\n| Comercial | Venda finalizada e validada no ERP | R$7 por venda | VariГЎvel mensal вҖ” escala com volume de vendas |\n| Marketing | Contato na base de leads | R$0,05 por contato/mГӘs | VariГЎvel mensal вҖ” escala com crescimento da base |\n| CS | Cliente ativo no clube | R$0,15 por cliente/mГӘs | VariГЎvel mensal вҖ” escala com retenГ§ГЈo da base |\n| CRM Kanban | Incluso no Comercial Pro | Sem transacional prГіprio | вҖ” |\n\n> Os trГӘs transacionais escalam com mГ©tricas diferentes do provedor: volume de vendas, base de leads e base de clientes ativos. Quanto mais o provedor cresce, mais a Aurora cresce junto.\n\n---\n\n## SimulaГ§ГЈo por porte\n\n### Perfis de referГӘncia\n\n| | Starter (pequeno) | Start (mГ©dio) | Pro (grande) |\n|-|-------------------|---------------|--------------|\n| Vendas digitais/mГӘs | 30 | 150 | 400 |\n| Leads na base | 300 | 2.000 | 6.000 |\n| Clientes no clube | 500 | 3.000 | 10.000 |\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$397 | R$797 | R$1.397 |\n| Transacional | 30 Г— R$7 = R$210 | 150 Г— R$7 = R$1.050 | 400 Г— R$7 = R$2.800 |\n| **Total/mГӘs** | **R$607** | **R$1.847** | **R$4.197** |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$297 | R$597 | R$997 |\n| Transacional | 300 Г— R$0,05 = R$15 | 2.000 Г— R$0,05 = R$100 | 6.000 Г— R$0,05 = R$300 |\n| **Total/mГӘs** | **R$312** | **R$697** | **R$1.297** |\n\n### CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$247 | R$497 | R$897 |\n| Transacional | 500 Г— R$0,15 = R$75 | 3.000 Г— R$0,15 = R$450 | 10.000 Г— R$0,15 = R$1.500 |\n| **Total/mГӘs** | **R$322** | **R$947** | **R$2.397** |\n\n### Stack completo\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Comercial | R$607 | R$1.847 | R$4.197 |\n| Marketing | R$312 | R$697 | R$1.297 |\n| CS | R$322 | R$947 | R$2.397 |\n| **Total/mГӘs** | **R$1.241** | **R$3.491** | **R$7.891** |\n\n---\n\n## ROI por porte (ticket mГ©dio R$99,90)\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Receita digital gerada/mГӘs | R$2.997 | R$14.985 | R$39.960 |\n| Custo stack completo/mГӘs | R$1.241 | R$3.491 | R$7.891 |\n| **ROI** | **2,4x** | **4,3x** | **5x** |\n\n> O stack completo custa menos de 20% da receita digital gerada em todos os portes.\n\n---\n\n## Jornada natural de expansГЈo\n\n```\nComercial Starter        вҶҗ entrada para ISPs pequenos\n      вҶ“\nComercial Start          вҶҗ time crescendo, precisa de mais usuГЎrios\n      вҶ“\nComercial Pro            вҶҗ CRM Kanban + IA + relatГіrios completos\n      вҶ“\n+ Marketing Starter      вҶҗ automaГ§ГЈo bГЎsica de leads\n      вҶ“\n+ Marketing Start/Pro    вҶҗ campanhas, trГЎfego pago, IA\n      вҶ“\n+ CS Starter             вҶҗ clube de benefГӯcios ativo\n      вҶ“\n+ CS Start/Pro           вҶҗ retenГ§ГЈo avanГ§ada, churn prevention\n      вҶ“\nStack completo\n```\n\n---\n\n## PerГӯodo de teste\n\n14 dias gratuitos para provedores que utilizam HubSoft como ERP. Sem trial para demais ERPs.\n\n> O HubSoft Г© o ICP perfeito. O trial Г© um argumento direto para quem jГЎ usa o sistema com o qual a Aurora integra nativamente.\n\n---\n\n## ComissГЈo do sГіcio comercial\n\nO sГіcio recebe **30% do lucro lГӯquido** gerado pelos clientes que ele trouxer. Mensalidade e transacional entram na base de cГЎlculo apГіs deduГ§ГЈo dos custos operacionais.\n\n---\n\n## PendГӘncias\n\n- [ ] Definir bundle com desconto para quem contratar mais de um mГіdulo (baixa prioridade)\n"}, {"t": "f", "n": "09 Enablement", "fn": "09-ENABLEMENT.md", "c": "# 09. Enablement вҖ” Material do Parceiro Comercial\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nGarantir que o parceiro comercial tenha tudo que precisa para prospectar, apresentar e fechar вҖ” sem depender da equipe da Aurora para cada conversa.\n\n---\n\n## Contexto do parceiro\n\n| Item | Detalhe |\n|------|---------|\n| Modelo | SГіcio comercial вҖ” 30% do lucro lГӯquido |\n| Processo prГіprio | Sim. A Aurora apoia e complementa com estratГ©gias e materiais |\n| Demo | Ao vivo, conduzida pelo parceiro com suporte da Aurora quando necessГЎrio |\n| Treinamento tГ©cnico | NecessГЎrio. O parceiro precisa entender o produto para conduzir a demo com autonomia |\n\n---\n\n## Materiais necessГЎrios\n\n| Material | Formato | Status |\n|----------|---------|--------|\n| Pitch de 2 minutos (script) | Texto | вң… Rascunho pronto |\n| One-pager | PDF | рҹ”§ A criar |\n| Deck de apresentaГ§ГЈo | Slides | рҹ”§ A criar |\n| Case anГҙnimo com nГәmeros | PDF/Texto | рҹ”§ A criar |\n| Respostas para objeГ§Гөes | Texto | рҹҹЎ Rascunho em 06-MENSAGENS_CHAVE.md |\n| Roteiro de demo ao vivo | Texto | рҹ”§ A criar |\n| Tabela de preГ§os | PDF | вң… PrecificaГ§ГЈo aprovada |\n| Trilha de treinamento tГ©cnico | Texto/VГӯdeo | рҹ”§ A criar |\n\n---\n\n## Pitch de 2 minutos\n\n> \"VocГӘ jГЎ perdeu lead essa semana por falta de acompanhamento no WhatsApp? A AuroraISP resolve isso.\n>\n> A gente automatiza o fluxo de vendas do provedor do comeГ§o ao fim: o lead entra no WhatsApp, o bot qualifica, coleta os documentos, gera o contrato e manda direto pro HubSoft. Sem planilha, sem retrabalho, sem lead perdido.\n>\n> Temos resultado comprovado: um provedor com 30.000 clientes recebia mil leads por mГӘs e precisava de 8 pessoas para atender. Hoje, 2 pessoas dГЈo conta do mesmo volume. SГЈo 400 vendas por mГӘs no digital, R$99,90 cada. Tudo automatizado. Economia de R$284.400 por ano sГі em pessoal.\n>\n> SГЈo 15 minutos para vocГӘ ver funcionando. Quando vocГӘ tem?\"\n\n---\n\n## Roteiro de demo ao vivo\n\n**Objetivo da demo:** mostrar o fluxo completo de uma venda em tempo real. O prospect precisa sair da demo pensando \"isso Г© o que eu preciso\".\n\n**DuraГ§ГЈo sugerida:** 30 a 45 minutos\n\n| Etapa | Tempo | O que mostrar |\n|-------|-------|---------------|\n| Abertura | 5 min | Contexto do provedor, confirmar dor principal |\n| Fluxo do lead | 10 min | Lead entra no WhatsApp, bot qualifica, coleta docs |\n| GeraГ§ГЈo de contrato | 5 min | Contrato gerado automaticamente |\n| AtivaГ§ГЈo no HubSoft | 5 min | Dados enviados direto para o ERP |\n| CRM Kanban (se Pro) | 5 min | Pipeline de vendas atualizado em tempo real |\n| NГәmeros e ROI | 5 min | Case anГҙnimo, simulaГ§ГЈo com os nГәmeros do prospect |\n| PrГіximos passos | 5 min | Trial 14 dias (HubSoft), condiГ§Гөes, fechamento |\n\n> O parceiro conduz. A Aurora entra como suporte tГ©cnico quando necessГЎrio nas primeiras demos.\n\n---\n\n## Trilha de treinamento tГ©cnico\n\n**Objetivo:** o parceiro entender o produto fundo o suficiente para conduzir demos com autonomia e responder perguntas tГ©cnicas do prospect.\n\n| MГіdulo | ConteГәdo | Status |\n|--------|----------|--------|\n| 1. VisГЈo geral da AuroraISP | Hub, mГіdulos, posicionamento, ICP | рҹ”§ A criar |\n| 2. Comercial a fundo | Fluxo completo: lead вҶ’ HubSoft, bot, docs, contrato, CRM | рҹ”§ A criar |\n| 3. Marketing e CS | VisГЈo geral dos mГіdulos em desenvolvimento | рҹ”§ A criar |\n| 4. PrecificaГ§ГЈo e transacional | Starter/Start/Pro, simulaГ§Гөes, ROI | рҹ”§ A criar |\n| 5. ObjeГ§Гөes comuns | Respostas prontas para as principais objeГ§Гөes | рҹ”§ A criar |\n| 6. Demo hands-on | PrГЎtica guiada do roteiro de demo ao vivo | рҹ”§ A criar |\n\n---\n\n## EstratГ©gias de prospecГ§ГЈo conjuntas\n\nO parceiro tem processo prГіprio. A Aurora complementa com:\n\n| EstratГ©gia | ResponsГЎvel | Status |\n|------------|-------------|--------|\n| Mapeamento de grupos WhatsApp/Telegram de ISPs | Parceiro + Aurora | вҸі Pendente |\n| Abordagem para comunidades ABRINT/ABRI | Aurora define, parceiro executa | рҹ”§ A criar |\n| Outbound direto via WhatsApp para donos de ISP | Aurora define script, parceiro executa | рҹ”§ A criar |\n| ParticipaГ§ГЈo em eventos do setor | Conjunto | рҹ”§ A planejar |\n\n---\n\n## PendГӘncias\n\n- [ ] Criar one-pager (aguarda logo)\n- [ ] Criar deck de apresentaГ§ГЈo (aguarda logo)\n- [ ] Criar case anГҙnimo em PDF\n- [ ] Criar roteiro detalhado de demo ao vivo\n- [ ] Criar trilha de treinamento tГ©cnico (mГіdulos 1 a 6)\n- [ ] Definir estratГ©gias de prospecГ§ГЈo conjuntas com o parceiro\n"}, {"t": "f", "n": "10 Roadmap Gtm", "fn": "10-ROADMAP_GTM.md", "c": "# 10. Roadmap GTM\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 29/03/2026\n\n---\n\n## Objetivo\n\nDefinir as fases de entrada no mercado, com aГ§Гөes concretas, responsГЎveis e mГ©tricas de sucesso.\n\n---\n\n## Fases\n\n### Fase 0 вҖ” FundaГ§ГЈo\n**PerГӯodo:** atГ© 30/03/2026\n**Foco:** Preparar produto e material antes de ir ao mercado\n\n| AГ§ГЈo | ResponsГЎvel | Prazo | Status |\n|------|-------------|-------|--------|\n| RefatoraГ§ГЈo completa do projeto | Dev | 27/03/2026 | вң… ConcluГӯdo (29/03). 10+ apps criados, models migrados |\n| Multi-tenancy implementado | Dev | 30/03/2026 | вң… ConcluГӯdo (29/03). Tenant, isolamento, auto-filtro, 16 testes |\n| SeguranГ§a: secrets removidos | Dev | 29/03/2026 | вң… ConcluГӯdo (29/03). VariГЎveis de ambiente |\n| CS migrado do megaroleta | Dev | 29/03/2026 | вң… ConcluГӯdo (29/03). 4 apps, 20 models, 76 URLs |\n| Painel Admin Aurora | Dev | 29/03/2026 | вң… ConcluГӯdo (29/03). Tenants, planos, 115 features |\n| Sistema de planos e features | Dev | 29/03/2026 | вң… ConcluГӯdo (29/03). 9 planos (3x3), seed_planos |\n| Finalizar documentaГ§ГЈo GTM | PMM | 30/03/2026 | рҹ”§ Em andamento |\n| Definir precificaГ§ГЈo | CEO + PMM | 26/03/2026 | вң… ConcluГӯdo |\n| Criar brandbook e identidade visual | PMM | A definir | рҹ”§ Em andamento |\n| Criar one-pager e pitch deck | PMM | A definir (aguarda logo) | вҸі Aguardando |\n| Preparar roteiro de demo ao vivo | PMM + Parceiro | A definir | рҹ”§ A fazer |\n| Criar case anГҙnimo em PDF | PMM | A definir | рҹ”§ A fazer |\n| Criar trilha de treinamento do parceiro | PMM | A definir | рҹ”§ A fazer |\n\n---\n\n### Fase 1 вҖ” ValidaГ§ГЈo Comercial\n**PerГӯodo:** a partir de 31/03/2026\n**Foco:** Primeiros clientes pagantes, ajuste de pitch e preГ§o\n**Meta:** 15 clientes pagantes no primeiro trimestre de operaГ§ГЈo (abril a junho/2026)\n\n| AГ§ГЈo | ResponsГЎvel | Meta |\n|------|-------------|------|\n| Parceiro comercial em campo | Parceiro | Imediato apГіs Fase 0 |\n| Treinar parceiro no produto | CEO + PMM | Primeira semana de abril |\n| Abordar comunidades de provedores | Parceiro + CEO | A definir |\n| Fechar primeiros contratos | Parceiro | 15 clientes atГ© junho/2026 |\n| Coletar feedback de onboarding | CEO | Por cliente fechado |\n| Ajustar pitch com base em objeГ§Гөes reais | PMM | ContГӯnuo |\n\n---\n\n### Fase 2 вҖ” Escala Inicial\n**PerГӯodo:** A definir (apГіs validaГ§ГЈo)\n**Foco:** Repetir o processo que funcionou, aumentar volume\n\n| AГ§ГЈo | ResponsГЎvel | Meta |\n|------|-------------|------|\n| LanГ§ar case pГәblico (com autorizaГ§ГЈo) | PMM | A definir |\n| Ativar outbound direto | Parceiro | A definir |\n| CRM Kanban em produГ§ГЈo | Dev | A definir |\n| Iniciar contato com HubSoft | CEO | A definir |\n\n---\n\n### Fase 3 вҖ” Crescimento\n**PerГӯodo:** A definir\n**Foco:** Novos canais, novos produtos, novos ERPs\n\n| AГ§ГЈo | ResponsГЎvel | Meta |\n|------|-------------|------|\n| MГіdulo Marketing em produГ§ГЈo | Dev | A definir |\n| Clube de BenefГӯcios em produГ§ГЈo | Dev | A definir |\n| ExpansГЈo para outros ERPs (Voalle, SGP) | Dev | A definir |\n| Inbound вҖ” blog, YouTube, LinkedIn | PMM | A definir |\n| Eventos do setor | CEO + Parceiro | A definir |\n\n---\n\n## Linha do tempo resumida\n\n```\n26/03  PrecificaГ§ГЈo aprovada, GTM em construГ§ГЈo\n27/03  RefatoraГ§ГЈo completa do projeto iniciada\n29/03  вң… RefatoraГ§ГЈo, multi-tenancy, seguranГ§a, CS, Admin Aurora, planos concluГӯdos\n30/03  Fase 0 encerra (pendente: deploy em produГ§ГЈo)\n31/03  Fase 1 comeГ§a. Parceiro em campo\njun/26 Meta: 15 clientes pagantes\n       вҶ“\n       Fase 2 (datas a definir)\n       вҶ“\n       Fase 3 (datas a definir)\n```\n\n---\n\n## PendГӘncias\n\n- [ ] Definir datas e metas das Fases 2 e 3\n- [ ] Criar logo (CEO) вҖ” desbloqueia one-pager, deck e brandbook\n- [ ] Alinhar primeira semana de treinamento com o parceiro\n"}, {"t": "f", "n": "11 Materiais Lancamento", "fn": "11-MATERIAIS_LANCAMENTO.md", "c": "# 11. Materiais de LanГ§amento\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nCentralizar todos os materiais necessГЎrios para lanГ§ar a AuroraISP no mercado. Cada item tem responsГЎvel, status e dependГӘncias вҖ” para que nada seja esquecido antes de ir ao ar.\n\n---\n\n## Brand\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| Logo da AuroraISP | CEO | вҖ” | вҸі Pendente |\n| Brandbook completo | PMM | Logo | рҹҹЎ Em andamento (aguarda logo) |\n| Paleta de cores | PMM | вҖ” | вң… Definida |\n| Tipografia (Inter) | PMM | вҖ” | вң… Definida |\n| PadrГЈo de interface (light/dark) | PMM | вҖ” | вң… Definido |\n\n---\n\n## Vendas e Enablement\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| One-pager | PMM | Logo | вҸі Aguardando logo |\n| Pitch deck | PMM | Logo | вҸі Aguardando logo |\n| Case anГҙnimo em PDF | PMM | вҖ” | рҹ”§ A criar |\n| Tabela de preГ§os | PMM | вҖ” | вң… Aprovada |\n| Respostas para objeГ§Гөes | PMM | вҖ” | рҹҹЎ Rascunho em 06-MENSAGENS_CHAVE.md |\n| Script do pitch de 2 minutos | PMM | вҖ” | рҹҹЎ Rascunho em 09-ENABLEMENT.md |\n| DiagnГіstico вҖ” Typeform | PMM + Dev | вҖ” | рҹ”§ A criar (ver 13-DIAGNOSTICO.md) |\n| DiagnГіstico вҖ” Script WhatsApp | PMM | вҖ” | вң… Rascunho em exports/drafts/scripts_vendas/ |\n\n---\n\n## Demo\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| Ambiente de demo configurado | Dev | Multi-tenancy | вҸі Aguardando multi-tenancy |\n| Roteiro de demo ao vivo | PMM + Parceiro | вҖ” | рҹ”§ A criar |\n| Checklist prГ©-demo | PMM | Roteiro | рҹ”§ A criar |\n\n---\n\n## Treinamento do Parceiro\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| MГіdulo 1 вҖ” VisГЈo geral da AuroraISP | PMM | вҖ” | рҹ”§ A criar |\n| MГіdulo 2 вҖ” Comercial a fundo | PMM | вҖ” | рҹ”§ A criar |\n| MГіdulo 3 вҖ” Marketing e CS | PMM | вҖ” | рҹ”§ A criar |\n| MГіdulo 4 вҖ” PrecificaГ§ГЈo e transacional | PMM | вҖ” | рҹ”§ A criar |\n| MГіdulo 5 вҖ” ObjeГ§Гөes comuns | PMM | вҖ” | рҹ”§ A criar |\n| MГіdulo 6 вҖ” Demo hands-on | PMM + Dev | Ambiente de demo | рҹ”§ A criar |\n\n---\n\n## Digital\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| Landing page | Dev + PMM | Logo, copy | рҹ”§ A criar |\n| Copy da landing page | PMM | вҖ” | рҹ”§ A criar |\n| Instagram | PMM | Logo | вҸі Aguardando logo |\n| LinkedIn | PMM | Logo | вҸі Aguardando logo |\n| WhatsApp Business configurado | CEO | вҖ” | рҹ”§ A verificar |\n\n---\n\n## Produto\n\n| Material | ResponsГЎvel | Depende de | Status |\n|----------|-------------|------------|--------|\n| RefatoraГ§ГЈo do projeto | Dev | вҖ” | рҹ”§ AtГ© 27/03 |\n| Multi-tenancy | Dev | RefatoraГ§ГЈo | рҹ”§ AtГ© 30/03 |\n| Onboarding do cliente | Dev + PMM | Multi-tenancy | рҹ”§ A criar |\n| DocumentaГ§ГЈo de uso para o provedor | PMM | вҖ” | рҹ”§ A criar |\n\n---\n\n## Resumo por status\n\n| Status | Qtd |\n|--------|-----|\n| вң… Pronto | 4 |\n| рҹҹЎ Rascunho/Em andamento | 3 |\n| вҸі Aguardando desbloqueador | 5 |\n| рҹ”§ A criar | 13 |\n\n---\n\n## Principal desbloqueador\n\nA **logo** Г© o item que mais trava o avanГ§o. One-pager, deck, brandbook, redes sociais e landing page dependem dela diretamente.\n\n---\n\n## DependГӘncias crГӯticas\n\n```\nLogo\n  в””в”Җв”Җ Brandbook completo\n  в””в”Җв”Җ One-pager\n  в””в”Җв”Җ Pitch deck\n  в””в”Җв”Җ Redes sociais\n  в””в”Җв”Җ Landing page\n\nMulti-tenancy (30/03)\n  в””в”Җв”Җ Ambiente de demo\n  в””в”Җв”Җ MГіdulo 6 вҖ” Demo hands-on\n  в””в”Җв”Җ Onboarding do cliente\n```\n"}, {"t": "f", "n": "12 Fluxo Comercial", "fn": "12-FLUXO_COMERCIAL.md", "c": "# 12. Fluxo Comercial\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## VisГЈo geral\n\n```\nGeraГ§ГЈo de demanda вҶ’ Abordagem вҶ’ DiagnГіstico вҶ’ Demo вҶ’ Fechamento вҶ’ AtivaГ§ГЈo\n```\n\nA Aurora gera demanda por mГәltiplos canais. O parceiro executa o processo comercial. A Aurora apoia na demo quando necessГЎrio e conduz o onboarding.\n\n---\n\n## Fontes de lead\n\n| Fonte | Quem gera | Canal |\n|-------|-----------|-------|\n| Rede do parceiro | Parceiro | Contato direto, indicaГ§Гөes |\n| Comunidades de provedores | Aurora + Parceiro | WhatsApp, Telegram, ABRINT, ABRI |\n| Outbound direto | Aurora define, parceiro executa | WhatsApp direto para donos de ISP |\n| Eventos do setor | Aurora + Parceiro | ISP Summit, MeetISP, feiras regionais |\n| Inbound (futuro) | Aurora | Blog, YouTube, LinkedIn |\n\n---\n\n## Etapas do fluxo\n\n### 1. IdentificaГ§ГЈo do lead\n\n**ResponsГЎvel:** Aurora ou Parceiro\n**CritГ©rio de entrada:** ISP regional com HubSoft, 500 a 50.000 clientes, 2 a 20 vendedores.\n\n**AГ§Гөes:**\n- Lead identificado via comunidade, indicaГ§ГЈo, evento ou outbound\n- Registrar lead com: nome, provedor, cidade, estimativa de clientes, usa HubSoft (sim/nГЈo)\n\n---\n\n### 2. Abordagem inicial\n\n**ResponsГЎvel:** Parceiro\n**Canal:** WhatsApp direto\n\n**AГ§Гөes:**\n- Contato personalizado com pitch curto (2 minutos)\n- Enviar pre-demo deck se houver interesse inicial\n- Objetivo: conseguir 30 minutos para a demo\n\n**Script de abertura (referГӘncia):**\n> \"VocГӘ jГЎ perdeu lead essa semana por falta de acompanhamento no WhatsApp? Tenho um sistema que resolve isso para provedores. SГЈo 30 minutos para vocГӘ ver funcionando. Quando vocГӘ tem?\"\n\n**CritГ©rio para avanГ§ar:** prospect aceita a reuniГЈo.\n\n---\n\n### 3. DiagnГіstico\n\n**ResponsГЎvel:** Parceiro\n**Quando:** Antes de agendar a demo вҖ” via Typeform (inbound) ou script WhatsApp (outbound)\n**ReferГӘncia:** [13-DIAGNOSTICO.md](./13-DIAGNOSTICO.md) e [script WhatsApp](../../exports/drafts/scripts_vendas/diagnostico_whatsapp.md)\n\n**O que cobre:**\n- QualificaГ§ГЈo obrigatГіria (ERP, porte, time, decisor)\n- OperaГ§ГЈo comercial (leads, vendas, ticket, canal)\n- Ferramentas atuais (CRM, gestГЈo de leads)\n- Dores principais (onde perde mais, quanto tempo leva)\n- Objetivos (meta de crescimento, prioridade)\n\n**SaГӯda do diagnГіstico:**\n- Lead qualificado ou descartado\n- Resumo com nГәmeros reais do prospect\n- SimulaГ§ГЈo de ROI personalizada\n- Demo personalizada com dados do prГіprio ISP\n\n**CritГ©rio para avanГ§ar:** passa no checklist obrigatГіrio. Decisor presente ou confirmado para a demo.\n\n---\n\n### 4. Demo ao vivo\n\n**ResponsГЎvel:** Parceiro (Aurora apoia nas primeiras demos)\n**DuraГ§ГЈo:** 30 a 45 minutos\n**Material:** Deck do parceiro + sistema ao vivo\n\n**SequГӘncia:**\n1. Agenda e contexto (5 min)\n2. Validar as dores com os nГәmeros do prospect (5 min)\n3. Demo ao vivo do Comercial (15 min)\n4. VisГЈo de Marketing e CS вҖ” mГіdulos futuros (5 min)\n5. Case de produГ§ГЈo com comparaГ§ГЈo ao prospect (5 min)\n6. PrecificaГ§ГЈo e simulaГ§ГЈo de ROI ao vivo (5 min)\n7. PrГіximos passos (5 min)\n\n**CritГ©rio para avanГ§ar:** prospect engajado, sem objeГ§ГЈo bloqueante.\n\n---\n\n### 5. Fechamento\n\n**ResponsГЎvel:** Parceiro\n**Objetivo:** Fechar o prГіximo passo concreto antes de encerrar a reuniГЈo.\n\n**CenГЎrio 1 вҖ” Fecha na hora:**\n- HubSoft: ativar trial de 14 dias imediatamente\n- Outros ERPs: assinar contrato mensal\n\n**CenГЎrio 2 вҖ” NГЈo fecha na hora:**\n- Enviar deck de apoio logo apГіs a reuniГЈo\n- Definir data para retorno antes de encerrar\n- Executar processo de follow-up definido pela Aurora\n\n**CenГЎrio 3 вҖ” Precisa de outros decisores:**\n- Marcar segunda reuniГЈo incluindo o sГіcio ou diretor\n- Enviar deck de apoio para o prospect apresentar internamente\n\n**Regra:** nunca sair da reuniГЈo sem uma data marcada.\n\n---\n\n### 6. Follow-up (quando nГЈo fecha na hora)\n\n**ResponsГЎvel:** Parceiro (processo definido pela Aurora)\n**Material:** Deck de apoio, case anГҙnimo, simulaГ§ГЈo de ROI personalizada\n\n| Dia | AГ§ГЈo |\n|-----|------|\n| D+0 | Enviar deck de apoio por WhatsApp com mensagem personalizada |\n| D+2 | Follow-up leve: \"Ficou alguma dГәvida depois que vocГӘ viu o material?\" |\n| D+5 | Enviar simulaГ§ГЈo de ROI com os nГәmeros do prospect |\n| D+10 | Гҡltima tentativa: nova proposta ou encerrar ciclo |\n\n**CritГ©rio para encerrar:** sem resposta apГіs D+10. Mover para nutriГ§ГЈo de longo prazo.\n\n---\n\n### 7. AtivaГ§ГЈo e onboarding\n\n**ResponsГЎvel:** Time da Aurora\n**DuraГ§ГЈo:** Aproximadamente 1 hora\n**Gatilho:** Contrato assinado ou trial iniciado\n\n**Checklist de ativaГ§ГЈo:**\n- [ ] Acesso ao HubSoft configurado\n- [ ] NГәmero de WhatsApp do provedor conectado\n- [ ] Bot de qualificaГ§ГЈo configurado com dados do provedor\n- [ ] Fluxo de documentos testado\n- [ ] Primeiro lead de teste rodado com o cliente presente\n- [ ] Cliente orientado sobre painel e relatГіrios\n\n**CritГ©rio de conclusГЈo:** cliente ativo, primeiro lead processado com sucesso.\n\n---\n\n## Materiais por etapa\n\n| Etapa | Material |\n|-------|----------|\n| Abordagem | Script de abertura, pre-demo deck |\n| DiagnГіstico | Typeform (inbound), script WhatsApp (outbound) |\n| Demo | Deck do parceiro, sistema ao vivo, simulaГ§ГЈo de ROI com dados do diagnГіstico |\n| Fechamento | Proposta com dados do prГіprio ISP |\n| Follow-up | Deck de apoio, case anГҙnimo, simulaГ§ГЈo personalizada |\n| AtivaГ§ГЈo | Checklist interno da Aurora |\n\n---\n\n## Responsabilidades\n\n| Etapa | Parceiro | Aurora |\n|-------|----------|--------|\n| GeraГ§ГЈo de demanda | Rede prГіpria, executa outbound | Define estratГ©gia, gera leads via canais digitais |\n| Abordagem e qualificaГ§ГЈo | Executa | Fornece script e materiais |\n| Demo | Conduz | Apoia nas primeiras demos |\n| Fechamento | Executa | Fornece simulaГ§ГЈo de ROI |\n| Follow-up | Executa | Define processo e materiais |\n| AtivaГ§ГЈo e onboarding | NГЈo envolvido | Conduz integralmente |\n\n---\n\n## PendГӘncias\n\n- [ ] Definir script detalhado de follow-up para o parceiro\n- [ ] Definir critГ©rio de qualificaГ§ГЈo mГӯnima (tamanho, ERP, etc.)\n- [ ] Criar checklist de onboarding completo\n- [ ] Definir SLA de ativaГ§ГЈo (prazo mГЎximo apГіs assinatura)\n"}, {"t": "f", "n": "13 Diagnostico", "fn": "13-DIAGNOSTICO.md", "c": "# 13. DiagnГіstico do Provedor\n\n**Status:** рҹ”§ Em construГ§ГЈo\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender as dores, a operaГ§ГЈo e o momento do provedor antes da demo. O diagnГіstico serve para:\n\n- Qualificar o lead (entra ou nГЈo no funil de demo)\n- Personalizar a demo com os nГәmeros reais do prospect\n- Gerar a simulaГ§ГЈo de ROI especГӯfica para aquele provedor\n- Posicionar a Aurora como consultiva, nГЈo apenas como vendedora\n\n---\n\n## Formatos disponГӯveis\n\n| Formato | Quando usar | ResponsГЎvel |\n|---------|-------------|-------------|\n| Typeform | Leads inbound (landing page) | Aurora вҖ” preenchido pelo prospect antes de agendar |\n| Script WhatsApp | Leads outbound e comunidades | Parceiro вҖ” conduzido em conversa |\n| Conversa na abertura da demo | Leads que pularam a etapa | Parceiro вҖ” primeiros 5 minutos da reuniГЈo |\n\n---\n\n## Checklist de qualificaГ§ГЈo\n\nCritГ©rios que definem se o lead avanГ§a para a demo.\n\n### ObrigatГіrios\n\n| CritГ©rio | Pergunta | MГӯnimo para avanГ§ar |\n|----------|----------|---------------------|\n| ERP | Usa HubSoft? | Preferencial. Outros ERPs entram com ressalva e sem trial. |\n| Porte | Quantos clientes ativos hoje? | 500 ou mais |\n| Time | Quantos vendedores ou atendentes comerciais? | 2 ou mais |\n| Decisor | VocГӘ decide a contrataГ§ГЈo ou precisa de aprovaГ§ГЈo? | Ter acesso ao decisor antes de fazer a demo |\n\n### Desqualificadores imediatos\n\n- Menos de 500 clientes ativos\n- Sem operaГ§ГЈo comercial digital (sГі venda presencial, sem WhatsApp)\n- Nenhum acesso ao decisor e sem perspectiva de tГӘ-lo\n\n---\n\n## DiagnГіstico completo\n\n### Bloco 1 вҖ” OperaГ§ГЈo comercial\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quantos leads chegam por mГӘs? | Dimensionar o volume e o transacional potencial |\n| Qual o canal principal de entrada de leads? | Entender origem (WhatsApp, indicaГ§ГЈo, trГЎfego pago) |\n| Quantas vendas digitais sГЈo feitas por mГӘs? | Calcular taxa de conversГЈo atual |\n| Qual o ticket mГ©dio do plano mais vendido? | Calcular ROI da simulaГ§ГЈo |\n| Qual a taxa de conversГЈo estimada (leads para vendas)? | Identificar gargalo no funil |\n\n### Bloco 2 вҖ” Time\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quantas pessoas no time comercial hoje? | Calcular custo de pessoal atual |\n| Quantas no atendimento? | Entender divisГЈo de funГ§Гөes |\n| Tem backoffice dedicado? | Entender carga operacional |\n| Qual a maior dificuldade do time no dia a dia? | Identificar dor principal |\n\n### Bloco 3 вҖ” Ferramentas\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Qual ERP usa? (HubSoft, Voalle, SGP, outro) | QualificaГ§ГЈo e definiГ§ГЈo do trial |\n| Usa algum CRM hoje? | Identificar gap que o Comercial Pro resolve |\n| Como gerencia os leads hoje? (planilha, WhatsApp, sistema) | Entender nГӯvel de organizaГ§ГЈo atual |\n| Usa alguma ferramenta de e-mail ou WhatsApp marketing? | Identificar gap do mГіdulo Marketing |\n\n### Bloco 4 вҖ” Dores\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Onde vocГӘ perde mais leads no processo? | Mapear o maior gargalo |\n| Qual etapa mais trava o processo de vendas? | Priorizar o que mostrar na demo |\n| JГЎ perdeu um bom cliente por demora no atendimento? | Validar dor emocional |\n| Quanto tempo leva do lead atГ© a ativaГ§ГЈo no ERP hoje? | Mostrar o contraste com a Aurora |\n| Tem problema com churn ou cancelamento? | Abrir conversa sobre CS |\n\n### Bloco 5 вҖ” Objetivos\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quanto quer crescer em vendas nos prГіximos 6 meses? | Alinhar a demo com a meta do prospect |\n| O que mudaria primeiro na operaГ§ГЈo se pudesse? | Entender prioridade do decisor |\n| JГЎ considerou alguma soluГ§ГЈo parecida? Por que nГЈo foi em frente? | Identificar objeГ§Гөes antecipadas |\n\n---\n\n## SaГӯda do diagnГіstico\n\nApГіs o preenchimento, gerar um resumo com:\n\n| Campo | Fonte |\n|-------|-------|\n| Porte do ISP | Bloco 1 e 2 |\n| ERP utilizado | Bloco 3 |\n| Volume de leads/mГӘs | Bloco 1 |\n| Vendas digitais/mГӘs | Bloco 1 |\n| Ticket mГ©dio | Bloco 1 |\n| Custo estimado do time | Bloco 2 |\n| Maior dor identificada | Bloco 4 |\n| SimulaГ§ГЈo de ROI | Calculada automaticamente |\n| Qualificado para demo? | Baseado no checklist |\n\n### FГіrmula de ROI para a simulaГ§ГЈo\n\n```\nReceita digital atual = vendas digitais/mГӘs Г— ticket mГ©dio\nCusto do time = pessoas no comercial Г— R$3.950/mГӘs (referГӘncia)\nCusto Aurora (estimado) = mensalidade + (vendas Г— R$7)\nROI = receita digital / custo Aurora\nEconomia potencial = custo do time atual вҲ’ custo mГӯnimo com Aurora\n```\n\n---\n\n## PendГӘncias\n\n- [ ] Criar formulГЎrio no Typeform com base nesse diagnГіstico\n- [ ] Criar script de conversa para WhatsApp (em exports/drafts/scripts_vendas/)\n- [ ] Definir ferramenta para gerar o resumo automГЎtico do diagnГіstico\n- [ ] Definir quem recebe o resumo (parceiro, Aurora ou ambos)\n"}]}, {"t": "d", "n": "OPERACIONAL", "ch": [{"t": "d", "n": "contratos", "ch": [{"t": "f", "n": "Contrato Grupo Magister 01 04 2026", "fn": "contrato_grupo_magister_01-04-2026.md", "c": "# CONTRATO DE PRESTAГҮГғO DE SERVIГҮOS DE TECNOLOGIA\n\n## CONTRATO NВә 2026/001\n\n---\n\n**CONTRATANTE:** GRUPO MAGISTER DE ENSINO SUPERIOR LTDA, pessoa jurГӯdica de direito privado, inscrita no CNPJ sob o nВә 01.993.025/0001-04, com sede na Rua Primeiro de Maio, 2235, 1Вә Piso/Norte, Centro, CEP 64000-000, Teresina/PI, neste ato representada por seu sГіcio **Gislan Vieira de Sousa**, doravante denominada simplesmente **\"CONTRATANTE\"**.\n\n**CONTRATADA:** PSBR CONSULTORIA EMPRESARIAL LTDA, pessoa jurГӯdica de direito privado, inscrita no CNPJ sob o nВә 41.312.673/0001-64, com sede na Rua Tocantins, 140, Bairro Brasileia, CEP 32600-314, Betim/MG, neste ato representada por seu sГіcio **Paulo SГ©rgio Barbosa Rodrigues**, doravante denominada simplesmente **\"CONTRATADA\"**.\n\nAs partes acima qualificadas celebram o presente Contrato de PrestaГ§ГЈo de ServiГ§os de Tecnologia, que se regerГЎ pelas clГЎusulas e condiГ§Гөes a seguir estipuladas.\n\n---\n\n## CLГҒUSULA 1ВӘ вҖ” DO OBJETO\n\n1.1. O presente contrato tem por objeto a prestaГ§ГЈo de serviГ§os de tecnologia pela CONTRATADA Г  CONTRATANTE, consistente na licenГ§a de uso da plataforma **AuroraISP**, mГіdulo **Comercial**, conforme especificaГ§Гөes abaixo:\n\n| Item | DescriГ§ГЈo |\n|------|-----------|\n| **Plataforma** | AuroraISP |\n| **MГіdulo** | Comercial |\n| **Plano** | Aurora |\n| **Modalidade** | Software como ServiГ§o (SaaS) |\n\n1.2. O mГіdulo Comercial contempla as seguintes funcionalidades:\n\na) Captura e qualificaГ§ГЈo automatizada de leads via WhatsApp;\nb) GestГЈo do funil de vendas com CRM Kanban;\nc) Fluxos de atendimento automatizados;\nd) Cadastro digital de clientes com coleta de documentos;\ne) IntegraГ§ГЈo nativa com ERP HubSoft (envio de prospectos, sincronizaГ§ГЈo de clientes, anexaГ§ГЈo de contratos);\nf) Dashboard de vendas e relatГіrios;\ng) GestГЈo de equipes, metas e tarefas;\nh) Sistema de notificaГ§Гөes;\ni) API REST para integraГ§Гөes.\n\n1.3. A CONTRATADA fornecerГЎ acesso Г  plataforma via ambiente web, com disponibilidade 24 horas por dia, 7 dias por semana, ressalvados os perГӯodos de manutenГ§ГЈo programada.\n\n---\n\n## CLГҒUSULA 2ВӘ вҖ” DO VALOR E FORMA DE PAGAMENTO\n\n2.1. Pela prestaГ§ГЈo dos serviГ§os ora contratados, a CONTRATANTE pagarГЎ Г  CONTRATADA o valor mensal de **R$ 499,00 (quatrocentos e noventa e nove reais)**.\n\n2.2. O valor total do contrato para o perГӯodo de vigГӘncia Г© de **R$ 5.988,00 (cinco mil, novecentos e oitenta e oito reais)**.\n\n2.3. O pagamento serГЎ realizado mensalmente, atГ© o dia **10 (dez)** de cada mГӘs subsequente ao da prestaГ§ГЈo dos serviГ§os, mediante emissГЈo de boleto bancГЎrio ou transferГӘncia via PIX.\n\n2.4. Em caso de atraso no pagamento, incidirГЈo multa de 2% (dois por cento) sobre o valor da parcela em atraso, acrescida de juros de mora de 1% (um por cento) ao mГӘs, calculados pro rata die.\n\n2.5. O valor mensal serГЎ reajustado anualmente, na data de aniversГЎrio do contrato, pelo Гӯndice IGPM/FGV acumulado no perГӯodo, ou por outro Гӯndice que venha a substituГӯ-lo.\n\n---\n\n## CLГҒUSULA 3ВӘ вҖ” DA VIGГҠNCIA\n\n3.1. O presente contrato terГЎ vigГӘncia de **12 (doze) meses**, com inГӯcio em **01 de abril de 2026** e tГ©rmino em **31 de marГ§o de 2027**.\n\n3.2. O contrato serГЎ renovado automaticamente por perГӯodos iguais e sucessivos, salvo manifestaГ§ГЈo contrГЎria de qualquer das partes, por escrito, com antecedГӘncia mГӯnima de **30 (trinta) dias** do tГ©rmino da vigГӘncia ou de qualquer perГӯodo de renovaГ§ГЈo.\n\n---\n\n## CLГҒUSULA 4ВӘ вҖ” DAS OBRIGAГҮГ•ES DA CONTRATADA\n\n4.1. A CONTRATADA se obriga a:\n\na) Disponibilizar a plataforma AuroraISP com as funcionalidades descritas na ClГЎusula 1ВӘ;\nb) Garantir disponibilidade mГӯnima de **99,5% (noventa e nove vГӯrgula cinco por cento)** ao mГӘs (SLA);\nc) Realizar manutenГ§Гөes corretivas e evolutivas na plataforma, sem custo adicional;\nd) Prestar suporte tГ©cnico em horГЎrio comercial (segunda a sexta, das 8h Г s 18h), com tempo de primeira resposta de atГ© **4 horas Гәteis**;\ne) Comunicar previamente qualquer manutenГ§ГЈo programada que possa impactar a disponibilidade, com antecedГӘncia mГӯnima de 24 horas;\nf) Manter sigilo sobre todas as informaГ§Гөes e dados da CONTRATANTE;\ng) Realizar backup diГЎrio dos dados armazenados na plataforma;\nh) Configurar a integraГ§ГЈo inicial com o ERP HubSoft da CONTRATANTE no prazo de atГ© **5 (cinco) dias Гәteis** apГіs a assinatura deste contrato.\n\n---\n\n## CLГҒUSULA 5ВӘ вҖ” DAS OBRIGAГҮГ•ES DA CONTRATANTE\n\n5.1. A CONTRATANTE se obriga a:\n\na) Efetuar os pagamentos nas datas e condiГ§Гөes estabelecidas;\nb) Fornecer as credenciais de acesso ao ERP HubSoft necessГЎrias para a integraГ§ГЈo (Client ID, Client Secret, usuГЎrio e senha da API);\nc) Designar um responsГЎvel tГ©cnico para acompanhar a implantaГ§ГЈo e servir de ponto de contato;\nd) Utilizar a plataforma de acordo com as boas prГЎticas e orientaГ§Гөes da CONTRATADA;\ne) NГЈo compartilhar credenciais de acesso com terceiros nГЈo autorizados;\nf) Manter atualizados os dados cadastrais e informaГ§Гөes de contato.\n\n---\n\n## CLГҒUSULA 6ВӘ вҖ” DA IMPLANTAГҮГғO\n\n6.1. A implantaГ§ГЈo serГЎ realizada em atГ© **10 (dez) dias Гәteis** apГіs a assinatura do contrato, compreendendo:\n\na) ConfiguraГ§ГЈo do tenant (ambiente isolado) da CONTRATANTE na plataforma;\nb) IntegraГ§ГЈo com o ERP HubSoft;\nc) Cadastro de planos de internet e opГ§Гөes de vencimento;\nd) ConfiguraГ§ГЈo dos fluxos de atendimento;\ne) CriaГ§ГЈo dos usuГЎrios iniciais;\nf) Treinamento da equipe (atГ© 2 horas, por videoconferГӘncia).\n\n6.2. Eventuais customizaГ§Гөes ou integraГ§Гөes adicionais nГЈo previstas neste contrato serГЈo objeto de proposta comercial separada.\n\n---\n\n## CLГҒUSULA 7ВӘ вҖ” DA PROTEГҮГғO DE DADOS (LGPD)\n\n7.1. As partes se comprometem a cumprir a Lei Geral de ProteГ§ГЈo de Dados Pessoais (Lei nВә 13.709/2018) no que for aplicГЎvel ao presente contrato.\n\n7.2. A CONTRATADA atuarГЎ como **operadora** de dados pessoais, tratando os dados exclusivamente conforme as instruГ§Гөes da CONTRATANTE (controladora).\n\n7.3. A CONTRATADA adotarГЎ medidas tГ©cnicas e administrativas aptas a proteger os dados pessoais de acessos nГЈo autorizados e de situaГ§Гөes acidentais ou ilГӯcitas, incluindo:\n\na) Criptografia de dados sensГӯveis em repouso e em trГўnsito;\nb) Controle de acesso baseado em perfis e tenant isolation;\nc) Logs de auditoria e filtros de dados pessoais (PII);\nd) Backups criptografados com retenГ§ГЈo mГӯnima de 30 dias.\n\n7.4. Em caso de incidente de seguranГ§a envolvendo dados pessoais, a CONTRATADA comunicarГЎ a CONTRATANTE no prazo de **48 (quarenta e oito) horas** apГіs a ciГӘncia do incidente.\n\n7.5. Ao tГ©rmino do contrato, a CONTRATADA excluirГЎ os dados pessoais tratados em nome da CONTRATANTE no prazo de **30 (trinta) dias**, salvo obrigaГ§ГЈo legal de retenГ§ГЈo.\n\n---\n\n## CLГҒUSULA 8ВӘ вҖ” DA PROPRIEDADE INTELECTUAL\n\n8.1. A plataforma AuroraISP, incluindo seu cГіdigo fonte, algoritmos, interfaces, documentaГ§ГЈo e marcas, Г© de propriedade exclusiva da CONTRATADA.\n\n8.2. O presente contrato nГЈo transfere Г  CONTRATANTE qualquer direito de propriedade intelectual sobre a plataforma, conferindo apenas o direito de uso conforme as condiГ§Гөes aqui estipuladas.\n\n8.3. Os dados inseridos pela CONTRATANTE na plataforma sГЈo de propriedade exclusiva da CONTRATANTE.\n\n---\n\n## CLГҒUSULA 9ВӘ вҖ” DA RESCISГғO\n\n9.1. O presente contrato poderГЎ ser rescindido:\n\na) Por mГәtuo acordo entre as partes, formalizado por escrito;\nb) Por inadimplemento de qualquer das partes, caso nГЈo sanado no prazo de **15 (quinze) dias** apГіs notificaГ§ГЈo por escrito;\nc) Por qualquer das partes, sem justa causa, mediante aviso prГ©vio de **30 (trinta) dias** e pagamento de multa rescisГіria.\n\n9.2. Em caso de rescisГЈo antecipada sem justa causa pela CONTRATANTE, serГЎ devida multa equivalente a **20% (vinte por cento)** do valor remanescente do contrato.\n\n9.3. Em caso de rescisГЈo por inadimplemento da CONTRATADA, nenhuma multa serГЎ devida pela CONTRATANTE, sendo reembolsados eventuais valores pagos antecipadamente.\n\n9.4. ApГіs a rescisГЈo, a CONTRATADA disponibilizarГЎ os dados da CONTRATANTE para exportaГ§ГЈo pelo prazo de **15 (quinze) dias**, apГіs o qual os dados serГЈo excluГӯdos conforme ClГЎusula 7.5.\n\n---\n\n## CLГҒUSULA 10ВӘ вҖ” DA CONFIDENCIALIDADE\n\n10.1. As partes se obrigam a manter sigilo sobre todas as informaГ§Гө
