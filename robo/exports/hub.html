 OAuth | HubSoft API | REST POST | Aurora вҶ’ ERP |\n| 2 | Cadastrar prospecto | HubSoft API | REST POST | Aurora вҶ’ ERP |\n| 3 | Consultar cliente por CPF | HubSoft API | REST GET | Aurora вҶ’ ERP |\n| 4 | Sincronizar cliente (local) | HubSoft API | REST GET | Aurora вҶ’ ERP |\n| 5 | Sincronizar serviГ§os | HubSoft API | Dentro de #4 | Aurora вҶ’ ERP |\n| 6 | Consultar cliente (Clube) | N8N webhook | POST | Aurora вҶ’ N8N вҶ’ ERP |\n| 7 | Checar pontos extras | HubSoft DB | SQL direto | Aurora вҶ’ DB ERP |\n| 8 | Consultar cidade | HubSoft DB | SQL direto | Aurora вҶ’ DB ERP |\n| 9 | Clientes por cidade | HubSoft DB | SQL direto | Aurora вҶ’ DB ERP |\n| 10 | Buscar contrato | HubSoft API | REST GET | Aurora вҶ’ ERP |\n| 11 | Criar contrato | HubSoft API | REST POST | Aurora вҶ’ ERP |\n| 12 | Atualizar contrato | HubSoft API | REST PUT | Aurora вҶ’ ERP |\n| 13 | Download contrato PDF | HubSoft API | REST GET | Aurora вҶ’ ERP |\n| **Atendimento** | | | | |\n| 14 | Buscar histГіrico conversa | Matrix API | REST GET | Aurora вҶ’ Plataforma |\n| 15 | Enviar mensagem (Inbox) | Webhook canal | POST | Aurora вҶ’ Plataforma |\n| 16 | Receber mensagem cliente | API Aurora | POST | Plataforma вҶ’ Aurora |\n| 17 | Status entrega/leitura | API Aurora | POST | Plataforma вҶ’ Aurora |\n| **N8N / Webhooks** | | | | |\n| 18 | Enviar OTP WhatsApp | N8N webhook | POST | Aurora вҶ’ N8N |\n| 19 | Enviar WhatsApp (automaГ§ГЈo) | N8N webhook | POST | Aurora вҶ’ N8N |\n| 20 | Enviar e-mail (automaГ§ГЈo) | N8N webhook | POST | Aurora вҶ’ N8N |\n| 21 | ValidaГ§ГЈo IA questГЈo (bot) | N8N webhook | POST | Aurora вҶ’ N8N |\n| 22 | PГіs-resposta questГЈo (bot) | N8N webhook | POST | Aurora вҶ’ N8N |\n| 23 | NotificaГ§ГЈo: nova oportunidade | N8N webhook | POST | Aurora вҶ’ N8N |\n| 24 | NotificaГ§ГЈo: mudanГ§a estГЎgio | N8N webhook | POST | Aurora вҶ’ N8N |\n| 25 | NotificaГ§ГЈo: tarefa vencida | N8N webhook | POST | Aurora вҶ’ N8N |\n| 26 | Push notification | N8N webhook | POST | Aurora вҶ’ N8N |\n| **APIs consumidas por externos** | | | | |\n| 27 | Registrar lead | API Aurora | POST | N8N вҶ’ Aurora |\n| 28 | Atualizar lead | API Aurora | PUT | N8N вҶ’ Aurora |\n| 29 | Enviar documentos | API Aurora | POST | N8N вҶ’ Aurora |\n| 30 | Bot atendimento (14 endpoints) | API Aurora | GET/POST | N8N вҶ’ Aurora |\n| 31 | Detectar campanha | API Aurora | POST | N8N вҶ’ Aurora |\n| 32 | Aprovar venda | API Aurora | POST | ERP/N8N вҶ’ Aurora |\n| 33 | Rejeitar venda | API Aurora | POST | ERP/N8N вҶ’ Aurora |\n| **Outros** | | | | |\n| 34 | Consultar CEP | ViaCEP + fallbacks | REST GET | Aurora вҶ’ APIs pГәblicas |\n| 35 | IA (OpenAI/Gemini) | APIs IA | REST POST | Aurora вҶ’ OpenAI/Google |\n\n---\n\n## 7. Resumo: O que perguntar ao provedor\n\nAo iniciar a implementaГ§ГЈo de um novo cliente:\n\n1. **Qual ERP vocГӘs usam?** (HubSoft, MK, IXC, SGP, Controllr, outro)\n2. **VocГӘs tГӘm acesso Г  API do ERP?** (credenciais, documentaГ§ГЈo)\n3. **Qual plataforma de WhatsApp usam?** (Matrix, Evolution, Z-API, outro)\n4. **JГЎ tГӘm N8N ou ferramenta de automaГ§ГЈo?** (self-hosted, cloud)\n5. **Quais IDs preciso mapear?** (vendedor padrГЈo, origem do lead, serviГ§o)\n6. **Quem Г© o contato tГ©cnico para integraГ§Гөes?** (para resolver credenciais e testes)\n"}, {"t": "f", "n": "11 Permissoes", "fn": "11-PERMISSOES.md", "c": "# Sistema de PermissГөes вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 05/04/2026\n**Status:** вң… Implementado\n**LocalizaГ§ГЈo:** `apps/sistema/`\n\n---\n\n## VisГЈo Geral\n\nO sistema de permissГөes controla o acesso de cada usuГЎrio a funcionalidades especГӯficas do sistema. Funciona em 3 camadas:\n\n```\nCamada 1: PERFIL DE PERMISSГғO (role reutilizГЎvel)\n    Admin cria perfis como \"Vendedor\", \"Supervisor\", \"Gerente\"\n    Cada perfil tem uma lista de funcionalidades habilitadas\n\nCamada 2: FUNCIONALIDADE (granular)\n    35 funcionalidades fixas agrupadas por mГіdulo\n    Cada funcionalidade = 1 checkbox no perfil\n\nCamada 3: ATRIBUIГҮГғO (usuГЎrio вҶ’ perfil)\n    Cada usuГЎrio recebe 1 perfil\n    Muda o perfil = muda para todos os usuГЎrios com aquele perfil\n```\n\n**RetrocompatГӯvel:** superusers passam tudo. UsuГЎrios sem perfil atribuГӯdo tambГ©m (legado).\n\n---\n\n## Arquitetura\n\n### Models\n\n```\nFuncionalidade (35 registros fixos, seed)\n    в”ңв”Җв”Җ modulo: comercial | marketing | cs | inbox | configuracoes\n    в”ңв”Җв”Җ codigo: \"comercial.ver_pipeline\" (unique)\n    в”ңв”Җв”Җ nome: \"Ver Pipeline\"\n    в””в”Җв”Җ descricao: \"Visualizar pipeline Kanban e oportunidades\"\n\nPerfilPermissao (criado pelo admin, por tenant)\n    в”ңв”Җв”Җ nome: \"Vendedor\" (unique por tenant)\n    в”ңв”Җв”Җ descricao: \"Acesso bГЎsico ao comercial\"\n    в””в”Җв”Җ funcionalidades: M2M вҶ’ Funcionalidade\n\nPermissaoUsuario (1:1 com User)\n    в”ңв”Җв”Җ user: OneToOne User\n    в”ңв”Җв”Җ tenant: FK Tenant\n    в””в”Җв”Җ perfil: FK PerfilPermissao (nullable)\n```\n\n### Como a verificaГ§ГЈo funciona\n\n```\nRequest chega\n    в”Ӯ\n    в–ј\nPermissaoMiddleware (apps/sistema/middleware.py)\n    в”Ӯ\n    в”ңв”Җв”Җ Superuser? вҶ’ passa\n    в”ңв”Җв”Җ Sem PermissaoUsuario? вҶ’ passa (retrocompatГӯvel)\n    в”ңв”Җв”Җ URL contГ©m /crm/ ? вҶ’ verifica perm.acesso_comercial\n    в”ңв”Җв”Җ URL contГ©m /marketing/ ? вҶ’ verifica perm.acesso_marketing\n    в”ңв”Җв”Җ URL contГ©m /cs/ ou /roleta/ ? вҶ’ verifica perm.acesso_cs\n    в”ңв”Җв”Җ URL contГ©m /inbox/ ou /suporte/ ? вҶ’ verifica perm.acesso_inbox\n    в””в”Җв”Җ URL contГ©m /configuracoes ? вҶ’ verifica perm.acesso_configuracoes\n         в”Ӯ\n         в””в”Җв”Җ Se nГЈo tem acesso вҶ’ HTTP 403 \"Acesso negado\"\n```\n\nA sidebar e topbar filtram os menus via context processor (`perm` e `is_superuser` disponГӯveis em todos os templates).\n\n---\n\n## 35 Funcionalidades\n\n### Comercial (9)\n\n| CГіdigo | Nome | Escopo |\n|--------|------|--------|\n| `comercial.ver_dashboard` | Ver Dashboard | Acesso ao dashboard comercial |\n| `comercial.ver_pipeline` | Ver Pipeline | Visualizar pipeline Kanban |\n| `comercial.mover_oportunidade` | Mover Oportunidades | Arrastar entre estГЎgios |\n| `comercial.ver_todas_oportunidades` | Ver Todas as Oportunidades | Escopo supervisor/gerente (nГЈo sГі as suas) |\n| `comercial.criar_tarefa` | Criar e Editar Tarefas | CRUD de tarefas no CRM |\n| `comercial.ver_desempenho` | Ver RelatГіrios de Desempenho | Dashboard de performance |\n| `comercial.gerenciar_metas` | Gerenciar Metas | CRUD de metas de vendas |\n| `comercial.gerenciar_equipes` | Gerenciar Equipes | Criar equipes e atribuir membros |\n| `comercial.configurar_pipeline` | Configurar Pipelines | Pipelines, estГЎgios, webhooks, config CRM |\n\n### Marketing (7)\n\n| CГіdigo | Nome | Escopo |\n|--------|------|--------|\n| `marketing.ver_leads` | Ver Leads | Lista de leads e detalhes |\n| `marketing.gerenciar_campanhas` | Gerenciar Campanhas | CRUD campanhas de trГЎfego |\n| `marketing.ver_segmentos` | Ver Segmentos | Visualizar segmentos e membros |\n| `marketing.gerenciar_segmentos` | Gerenciar Segmentos | Criar/editar regras de filtro |\n| `marketing.ver_automacoes` | Ver AutomaГ§Гөes | Lista e histГіrico |\n| `marketing.gerenciar_automacoes` | Gerenciar AutomaГ§Гөes | Editor visual, criar/editar |\n| `marketing.configurar` | Configurar Marketing | Landing page, ativar/desativar automaГ§Гөes |\n\n### Customer Success (6)\n\n| CГіdigo | Nome | Escopo |\n|--------|------|--------|\n| `cs.ver_dashboard` | Ver Dashboard CS | Dashboard do Clube |\n| `cs.gerenciar_membros` | Gerenciar Membros | Editar saldo e extrato |\n| `cs.gerenciar_cupons` | Gerenciar Cupons e Parceiros | CRUD parceiros, cupons, resgates |\n| `cs.aprovar_cupons` | Aprovar/Rejeitar Cupons | AprovaГ§ГЈo de cupons de parceiros |\n| `cs.gerenciar_indicacoes` | Gerenciar IndicaГ§Гөes | Status e conversГЈo de indicaГ§Гөes |\n| `cs.configurar` | Configurar CS | Regras, nГӯveis, banners, carteirinhas |\n\n### Inbox / Suporte (8)\n\n| CГіdigo | Nome | Escopo |\n|--------|------|--------|\n| `inbox.ver_minhas` | Ver Minhas Conversas | Apenas atribuГӯdas a mim |\n| `inbox.ver_equipe` | Ver Conversas da Equipe | Escopo supervisor |\n| `inbox.ver_todas` | Ver Todas as Conversas | Todas do tenant |\n| `inbox.responder` | Responder Conversas | Enviar mensagens e notas |\n| `inbox.transferir_agente` | Transferir para Agente | Entre agentes da mesma equipe |\n| `inbox.transferir_equipe` | Transferir entre Equipes | Entre equipes/filas |\n| `inbox.resolver` | Resolver e Reabrir | Mudar status da conversa |\n| `inbox.configurar` | Configurar Inbox | Equipes, filas, horГЎrios, canais, widget |\n\n### ConfiguraГ§Гөes (5)\n\n| CГіdigo | Nome | Escopo |\n|--------|------|--------|\n| `config.gerenciar_usuarios` | Gerenciar UsuГЎrios | CRUD de usuГЎrios |\n| `config.gerenciar_perfis` | Gerenciar Perfis | Criar/editar perfis de permissГЈo |\n| `config.gerenciar_planos` | Gerenciar Planos e Vencimentos | CRUD planos de internet |\n| `config.gerenciar_fluxos` | Gerenciar Fluxos de Atendimento | Configurar bot |\n| `config.gerenciar_notificacoes` | Gerenciar NotificaГ§Гөes | Tipos e canais |\n\n---\n\n## Onde gerenciar\n\n| O que | Onde | Quem acessa |\n|-------|------|-------------|\n| Criar/editar perfis | ConfiguraГ§Гөes > UsuГЎrios > botГЈo \"Perfis\" (`/configuracoes/perfis/`) | Admin |\n| Atribuir perfil a usuГЎrio | ConfiguraГ§Гөes > UsuГЎrios > Editar > select \"Perfil de PermissГЈo\" | Admin |\n| Seed de funcionalidades | `python manage.py seed_funcionalidades` | DevOps |\n| Django Admin | `/admin/sistema/funcionalidade/` e `/admin/sistema/perfilpermissao/` | Superuser |\n\n---\n\n## Exemplos de perfis sugeridos\n\n### Vendedor\nComercial: ver_dashboard, ver_pipeline, mover_oportunidade, criar_tarefa\nInbox: ver_minhas, responder\n\n### Supervisor Comercial\nTudo do Vendedor +\nComercial: ver_todas_oportunidades, ver_desempenho\nInbox: ver_equipe, transferir_agente\n\n### Gerente Comercial\nTudo do Supervisor +\nComercial: gerenciar_metas, gerenciar_equipes, configurar_pipeline\nInbox: ver_todas, transferir_equipe, resolver\n\n### Analista Marketing\nMarketing: ver_leads, gerenciar_campanhas, ver_segmentos, gerenciar_segmentos, ver_automacoes\n\n### Gerente Marketing\nTudo do Analista +\nMarketing: gerenciar_automacoes, configurar\n\n### Operador CS\nCS: ver_dashboard, gerenciar_membros, gerenciar_cupons, gerenciar_indicacoes\n\n### Agente Suporte\nInbox: ver_minhas, responder, transferir_agente, resolver\n\n### Admin\nTodas as 35 funcionalidades\n\n---\n\n## Arquivos do sistema\n\n| Arquivo | O que contГ©m |\n|---------|-------------|\n| `apps/sistema/models.py` | Funcionalidade, PerfilPermissao, PermissaoUsuario |\n| `apps/sistema/middleware.py` | PermissaoMiddleware (verifica por URL) |\n| `apps/sistema/decorators.py` | `@permissao_required` (verifica por mГіdulo + papel) |\n| `apps/sistema/context_processors.py` | `perm` e `is_superuser` em templates |\n| `apps/sistema/admin.py` | Admin para Funcionalidade, PerfilPermissao, PermissaoUsuario |\n| `apps/sistema/management/commands/seed_funcionalidades.py` | Seed das 35 funcionalidades |\n| `apps/sistema/templates/sistema/configuracoes/perfis_permissao.html` | PГЎgina de gestГЈo de perfis |\n| `apps/sistema/templates/sistema/configuracoes/usuarios.html` | AtribuiГ§ГЈo de perfil por usuГЎrio |\n| `apps/sistema/templates/sistema/base.html` | Sidebar/topbar filtrados por permissГөes |\n\n---\n\n## O que funciona hoje\n\n1. **Middleware bloqueia acesso por mГіdulo** (URL-based, HTTP 403)\n2. **Topbar esconde mГіdulos** sem acesso\n3. **Sidebar esconde menus de configuraГ§ГЈo** para nГЈo-gerentes\n4. **Perfis reutilizГЎveis** com checkboxes de funcionalidades por mГіdulo\n5. **AtribuiГ§ГЈo** via select na ediГ§ГЈo de usuГЎrio\n6. **RetrocompatГӯvel** (superuser e sem perfil = acesso total)\n7. **35 funcionalidades seedadas** via management command\n\n---\n\n## O que falta implementar (futuro)\n\n### Prioridade alta\n\n1. **Aplicar verificaГ§ГЈo granular nas views**\n   Hoje o middleware bloqueia por mГіdulo (URL). Mas dentro do mГіdulo, todas as funcionalidades estГЈo liberadas. Exemplo: se o perfil tem `comercial.ver_pipeline` mas nГЈo tem `comercial.configurar_pipeline`, o middleware libera ambas porque a URL Г© `/crm/...`.\n   **SoluГ§ГЈo:** aplicar `@permissao_required` ou `perm.tem('comercial.configurar_pipeline')` nas views sensГӯveis (configuraГ§Гөes, metas, equipes).\n\n2. **Filtro de escopo nos querysets**\n   Hoje o CRM jГЎ filtra por `request.user` para vendedores (nГЈo-superuser vГӘ sГі suas oportunidades). Mas nГЈo estГЎ integrado com o sistema de permissГөes.\n   **SoluГ§ГЈo:** usar `perm.escopo_comercial()` e `perm.escopo_inbox()` para filtrar querysets baseado nas funcionalidades `ver_todas_oportunidades`, `ver_equipe`, etc.\n\n3. **Aplicar permissГөes no Inbox**\n   O Inbox nГЈo filtra conversas por agente/equipe baseado nas permissГөes. Todos veem tudo.\n   **SoluГ§ГЈo:** na view `api_conversas`, verificar `inbox.ver_minhas` / `inbox.ver_equipe` / `inbox.ver_todas` e filtrar o queryset.\n\n### Prioridade mГ©dia\n\n4. **Cache de permissГөes**\n   Hoje cada request faz query no banco (user вҶ’ permissao вҶ’ perfil вҶ’ funcionalidades M2M). Em alto trГЎfego pode impactar.\n   **SoluГ§ГЈo:** cachear `perm.funcionalidades` em memГіria por sessГЈo ou usar `select_related`/`prefetch_related` no middleware.\n\n5. **Audit log de mudanГ§as de perfil**\n   Registrar quando um perfil Г© criado/editado/excluГӯdo e quando um usuГЎrio muda de perfil.\n   **SoluГ§ГЈo:** signal `post_save` em PerfilPermissao e PermissaoUsuario, salvar em LogSistema.\n\n6. **HeranГ§a de perfis**\n   Permitir que um perfil herde de outro (ex: \"Supervisor\" herda tudo de \"Vendedor\" e adiciona funcionalidades).\n   **SoluГ§ГЈo:** campo `pai` FK em PerfilPermissao. Na verificaГ§ГЈo, unir funcionalidades do perfil + pai.\n\n### Prioridade baixa\n\n7. **PermissГөes por objeto**\n   Controlar acesso a registros especГӯficos (ex: vendedor X sГі pode ver leads da cidade Y).\n   **SoluГ§ГЈo:** model `RestricaoObjeto` com filtros dinГўmicos. Complexidade alta, avaliar necessidade real.\n\n8. **Funcionalidades customizГЎveis por tenant**\n   Hoje as 35 funcionalidades sГЈo fixas (seed). Um tenant pode querer criar funcionalidades prГіprias.\n   **SoluГ§ГЈo:** campo `tenant` nullable em Funcionalidade. Se null = global, se preenchido = custom do tenant.\n\n---\n\n## PreocupaГ§Гөes\n\n### SeguranГ§a\n- **Hoje a verificaГ§ГЈo Г© apenas por URL (middleware).** Um usuГЎrio com acesso ao mГіdulo comercial pode acessar todas as funcionalidades do mГіdulo, mesmo sem ter as funcionalidades habilitadas. A verificaГ§ГЈo granular nas views Г© o prГіximo passo crГӯtico.\n- **APIs nГЈo verificam funcionalidades.** As APIs REST (`/api/v1/...`) sГі verificam token, nГЈo perfil de permissГЈo. Para N8N isso Г© ok (acesso de serviГ§o), mas se expor APIs para o frontend SPA no futuro, precisa verificar.\n\n### Performance\n- **M2M query a cada request.** A verificaГ§ГЈo `perm.acesso_comercial` faz `perfil.funcionalidades.filter(modulo='comercial').exists()` que Г© uma query. Com `prefetch_related` no middleware resolve.\n- **35 funcionalidades Г© gerenciГЎvel.** Se crescer para 100+, a pГЎgina de perfis precisa de busca/filtro.\n\n### Operacional\n- **Seed obrigatГіrio.** Em cada deploy, rodar `python manage.py seed_funcionalidades`. Se esquecer, a pГЎgina de perfis fica sem funcionalidades para marcar.\n- **Migration de perfis existentes.** Se jГЎ existem perfis criados com o modelo antigo (campos booleanos), eles perdem as permissГөes ao migrar. Precisa reconfigurar manualmente.\n"}, {"t": "f", "n": "12 Modulo Suporte", "fn": "12-MODULO_SUPORTE.md", "c": "# MГіdulo Suporte & Inbox вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 06/04/2026\n**Status:** вң… Em produГ§ГЈo\n**LocalizaГ§ГЈo:** `apps/inbox/` + `apps/suporte/`\n\n---\n\n## VisГЈo Geral\n\nO mГіdulo de Suporte & Inbox Г© o sistema de atendimento omnichannel da Aurora. Composto por dois sub-apps que trabalham juntos: o **Inbox** (chat em tempo real, WhatsApp, widget) e o **Suporte** (tickets formais com SLA). O Inbox Г© o app principal, com 20 models, 20+ views, provider pattern para multi-provedor, distribuiГ§ГЈo automГЎtica, WebSocket e widget embeddable.\n\n```\nCliente (WhatsApp / Widget / E-mail)\n    в”Ӯ\n    в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    PROVIDERS                          в”Ӯ\nв”Ӯ  Uazapi в”Ӯ Evolution в”Ӯ Meta Cloud в”Ӯ Twilio в”Ӯ Webhook  в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                     в”Ӯ parse_webhook()\n                     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                     INBOX                             в”Ӯ\nв”Ӯ  Receber mensagem вҶ’ Distribuir вҶ’ Conversa вҶ’ Agente   в”Ӯ\nв”Ӯ  Enviar mensagem вҶҗ Provider вҶҗ Agente                 в”Ӯ\nв”Ӯ  Notas internas, etiquetas, transferГӘncias            в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                     в”Ӯ Criar ticket\n                     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                    SUPORTE                            в”Ӯ\nв”Ӯ  Ticket вҶ’ ComentГЎrios вҶ’ SLA вҶ’ ResoluГ§ГЈo вҶ’ Fechamento в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n## 1. Inbox (`apps/inbox/`)\n\n### Models (20)\n\n#### Conversa (central)\nTabela: `inbox_conversas` | Unique: (tenant, numero)\n\n| Grupo | Campos |\n|-------|--------|\n| **IdentificaГ§ГЈo** | numero (auto, sequencial por tenant), identificador_externo (thread ID WhatsApp) |\n| **Contato** | contato_nome, contato_telefone (indexado), contato_email |\n| **Canal** | canal FK CanalInbox |\n| **Status** | status (aberta/pendente/resolvida/arquivada), prioridade (baixa/normal/alta/urgente) |\n| **AtribuiГ§ГЈo** | agente FK User, equipe FK EquipeInbox, fila FK FilaInbox |\n| **VinculaГ§Гөes** | lead FK LeadProspecto, ticket FK Ticket, oportunidade FK OportunidadeVenda |\n| **Etiquetas** | etiquetas M2M EtiquetaConversa |\n| **MГ©tricas** | ultima_mensagem_em, ultima_mensagem_preview, mensagens_nao_lidas, tempo_primeira_resposta_seg |\n| **Timestamps** | data_abertura (auto), data_resolucao, data_arquivamento |\n| **Extra** | metadata (JSON) |\n\n**6 Гӯndices:** status+agente, canal+status, ultima_mensagem_em, contato_telefone, equipe+status, fila+status\n\n#### Mensagem\nTabela: `inbox_mensagens`\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `conversa` | FK Conversa | Conversa pai |\n| `remetente_tipo` | CharField | contato, agente, sistema, bot |\n| `remetente_user` | FK User | Se agente |\n| `remetente_nome` | CharField | Nome exibido |\n| `tipo_conteudo` | CharField | texto, imagem, arquivo, audio, video, localizacao, sistema |\n| `conteudo` | TextField | ConteГәdo da mensagem |\n| `arquivo_url` | URLField | URL do arquivo (se mГӯdia) |\n| `arquivo_nome` | CharField | Nome do arquivo |\n| `lida` | Boolean | Se foi lida |\n| `data_envio` | DateTime | Timestamp de envio |\n| `data_entrega` / `data_leitura` | DateTime | Timestamps de entrega/leitura |\n| `identificador_externo` | CharField | Message ID do provider |\n| `erro_envio` | TextField | Erro ao enviar (se houver) |\n\n#### CanalInbox\nTabela: `inbox_canais` | Unique: (tenant, tipo, identificador_canal)\n\n| Campo | Tipo | DescriГ§ГЈo |\n|-------|------|-----------|\n| `tipo` | CharField | whatsapp, widget, email, interno |\n| `nome` | CharField | Nome do canal |\n| `integracao` | FK IntegracaoAPI | IntegraГ§ГЈo vinculada |\n| `provedor` | CharField | Slug do provider (uazapi, evolution, etc) |\n| `identificador_canal` | CharField | NГәmero de telefone, ID da instГўncia |\n| `configuracao` | JSONField | webhook_envio_url, tokens, etc |\n\n#### EquipeInbox + MembroEquipeInbox\nEquipes de atendimento com membros (agente/supervisor/gerente).\n\n#### PerfilAgenteInbox\nStatus do agente (online/ausente/offline), capacidade mГЎxima de conversas, check de disponibilidade.\n\n#### FilaInbox + RegraRoteamento\nFilas de distribuiГ§ГЈo com regras por canal, etiqueta ou horГЎrio. Modos: round_robin, menor_carga, manual.\n\n#### HorarioAtendimento\nHorГЎrio por dia da semana (hora_inicio, hora_fim, ativo).\n\n#### ConfiguracaoInbox\nSingleton: mensagem_fora_horario, distribuicao_padrao, atribuir_ao_responder.\n\n#### RespostaRapida\nTemplates de resposta com atalho (ex: `/ola`). Unique: (tenant, atalho).\n\n#### EtiquetaConversa\nTags com cor hex. Unique: (tenant, nome).\n\n#### NotaInternaConversa\nNotas privadas do agente na conversa.\n\n#### HistoricoTransferencia\nLog de transferГӘncias entre agentes/equipes/filas.\n\n#### CategoriaFAQ + ArtigoFAQ\nFAQ para o widget de chat. Categorias com Гӯcone e artigos com contagem de visualizaГ§Гөes.\n\n#### WidgetConfig\nConfiguraГ§ГЈo do widget embeddable: token_publico (UUID), cores, posiГ§ГЈo, FAQ, campos obrigatГіrios, domГӯnios permitidos.\n\n---\n\n### Services (`services.py`)\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `receber_mensagem(telefone, nome, conteudo, tenant, ...)` | Processa mensagem recebida. Normaliza telefone, busca/cria conversa, busca/cria lead, verifica horГЎrio, distribui, cria mensagem, notifica via WebSocket |\n| `enviar_mensagem(conversa, conteudo, user, ...)` | Agente envia mensagem. Cria Mensagem, calcula tempo de resposta, auto-atribui agente, envia via provider em background thread |\n| `atribuir_conversa(conversa, agente, atribuido_por)` | Atribui conversa a agente, cria mensagem de sistema |\n| `resolver_conversa(conversa, user)` | Marca como resolvida, seta data_resolucao |\n| `reabrir_conversa(conversa, user)` | Reabre conversa resolvida/arquivada |\n| `transferir_conversa(conversa, transferido_por, ...)` | Transfere para agente/equipe/fila, cria histГіrico |\n| `criar_ticket_de_conversa(conversa, titulo, user)` | Cria Ticket de suporte a partir da conversa com histГіrico de mensagens |\n| `marcar_mensagens_lidas(conversa)` | Marca mensagens do contato como lidas |\n| `atualizar_status_entrega(identificador_externo, status)` | Atualiza status de entrega/leitura da mensagem |\n| `receber_mensagem_widget(visitor_id, nome, conteudo, ...)` | VersГЈo widget: usa visitor_id em vez de telefone |\n| `buscar_lead_por_telefone(telefone, tenant)` | Busca lead por match exato ou parcial (Гәltimos 11/10 dГӯgitos) |\n\n### DistribuiГ§ГЈo automГЎtica (`distribution.py`)\n\n| FunГ§ГЈo | O que faz |\n|--------|-----------|\n| `verificar_horario_atendimento(tenant)` | Verifica se estГЎ dentro do horГЎrio de atendimento |\n| `determinar_fila(conversa, tenant)` | Encontra fila pela regra de roteamento (canal, etiqueta, horГЎrio) |\n| `selecionar_agente(fila, tenant)` | Seleciona agente disponГӯvel (round_robin, menor_carga, manual) |\n| `distribuir_conversa(conversa, tenant)` | Orquestra: fila вҶ’ agente вҶ’ atribuiГ§ГЈo |\n\n---\n\n### Provider Pattern (`providers/`)\n\nAbstraГ§ГЈo para mГәltiplos provedores de mensageria.\n\n```\nproviders/\n    __init__.py     # Registry + get_provider(canal) factory\n    base.py         # BaseProvider ABC\n    uazapi.py       # UazapiProvider (WhatsApp via Uazapi)\n    webhook.py      # GenericWebhookProvider (N8N fallback)\n```\n\n**BaseProvider (ABC):**\n- `enviar_texto(telefone, mensagem)` вҖ” obrigatГіrio\n- `enviar_imagem(telefone, url, legenda)` вҖ” obrigatГіrio\n- `enviar_documento(telefone, url, nome)` вҖ” obrigatГіrio\n- `enviar_audio(telefone, url)` вҖ” obrigatГіrio\n- `enviar_mensagem(conversa, mensagem)` вҖ” router por tipo_conteudo\n- `parse_webhook(body)` вҖ” normaliza payload do provider\n- `extrair_msg_id(result)` вҖ” extrai message ID da resposta\n\n**UazapiProvider:** wraps UazapiService com 20+ mГ©todos de envio (texto, mГӯdia, menu, carrossel, vCard, localizaГ§ГЈo, PIX). Parse de webhook nos formatos Uazapi real e Baileys/legacy.\n\n**Para adicionar novo provider:** criar 1 arquivo com `@register_provider`, implementar os mГ©todos abstract. Zero mudanГ§as em services/views.\n\n---\n\n### Views (20+)\n\n#### Interface principal\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `inbox_view` | `/inbox/` | Interface 3 painГ©is (conversas, chat, contexto) |\n| `dashboard_inbox` | `/inbox/dashboard/` | KPIs, grГЎficos 30 dias, ranking agentes |\n| `configuracoes_inbox` | `/inbox/configuracoes/` | 9 tabs (equipes, filas, respostas, etiquetas, canais, horГЎrio, FAQ, widget, geral) |\n\n#### APIs internas (AJAX)\n\n| View | Rota | MГ©todo | DescriГ§ГЈo |\n|------|------|--------|-----------|\n| `api_conversas` | `/inbox/api/conversas/` | GET | Lista com filtros (status, agente, busca, escopo) |\n| `api_conversa_detalhe` | `/inbox/api/conversas/<pk>/` | GET | Detalhe + lead + oportunidade + conversas anteriores + notas |\n| `api_mensagens` | `/inbox/api/conversas/<pk>/mensagens/` | GET | Mensagens paginadas |\n| `api_enviar_mensagem` | `/inbox/api/conversas/<pk>/enviar/` | POST | Agente envia mensagem |\n| `api_atribuir` | `/inbox/api/conversas/<pk>/atribuir/` | POST | Atribuir agente |\n| `api_resolver` | `/inbox/api/conversas/<pk>/resolver/` | POST | Resolver conversa |\n| `api_reabrir` | `/inbox/api/conversas/<pk>/reabrir/` | POST | Reabrir conversa |\n| `api_transferir` | `/inbox/api/conversas/<pk>/transferir/` | POST | Transferir para agente/equipe/fila |\n| `api_criar_ticket` | `/inbox/api/conversas/<pk>/ticket/` | POST | Criar ticket de suporte |\n| `api_atualizar_conversa` | `/inbox/api/conversas/<pk>/atualizar/` | POST | Atualizar prioridade, equipe, etiquetas |\n| `api_notas` | `/inbox/api/conversas/<pk>/notas/` | POST | Adicionar nota interna |\n| `api_respostas_rapidas` | `/inbox/api/respostas-rapidas/` | GET | Listar templates de resposta |\n| `api_atualizar_status_agente` | `/inbox/api/agente/status/` | POST | Online/ausente/offline |\n\n#### Webhooks (recebimento de mensagens)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `provider_webhook` | `/inbox/api/webhook/<provedor>/<canal_id>/` | Webhook genГ©rico (escalГЎvel, qualquer provider) |\n| `uazapi_webhook` | `/inbox/api/uazapi/webhook/` | Webhook legacy Uazapi (backward compat) |\n\n#### APIs N8N (DRF)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `InboxMensagemRecebidaAPIView` | `/api/v1/inbox/mensagem-recebida/` | Receber mensagem via N8N |\n| `InboxStatusMensagemAPIView` | `/api/v1/inbox/status-mensagem/` | Status de entrega/leitura |\n\n#### APIs pГәblicas (Widget)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `widget_config` | `/api/public/widget/config/` | Config do widget (cores, FAQ, campos) |\n| `widget_faq` | `/api/public/widget/faq/` | Artigos FAQ por categoria |\n| `widget_faq_buscar` | `/api/public/widget/faq/buscar/` | Busca FAQ |\n| `widget_conversa_iniciar` | `/api/public/widget/conversa/iniciar/` | Iniciar conversa via widget |\n| `widget_mensagens` | `/api/public/widget/conversa/<id>/mensagens/` | Mensagens da conversa |\n| `widget_enviar` | `/api/public/widget/conversa/<id>/enviar/` | Enviar mensagem via widget |\n| `widget_conversas` | `/api/public/widget/conversas/` | Conversas do visitante |\n\n---\n\n### WebSocket (`consumers.py`)\n\n**InboxConsumer** (AsyncJsonWebsocketConsumer):\n- Grupos: `inbox_tenant_{id}`, `inbox_user_{id}`, `inbox_conversa_{id}`\n- AГ§Гөes: join/leave conversa, typing indicator, set status, mark read\n- Eventos: nova_mensagem, conversa_atualizada, indicador_digitando\n- Auto-online ao conectar, auto-offline ao desconectar\n- Requer ASGI server (Daphne/Uvicorn). Em dev com runserver, fallback para polling (5s).\n\n### Signals\n\n| Signal | Modelo | Evento disparado |\n|--------|--------|-----------------|\n| `on_conversa_criada` | Conversa (post_save, created) | `conversa_aberta` |\n| `on_mensagem_recebida` | Mensagem (post_save, remetente=contato) | `mensagem_recebida` |\n| `on_conversa_resolvida` | Conversa (post_save, status=resolvida) | `conversa_resolvida` |\n\n---\n\n### Widget (`static/inbox/widget/aurora-chat.js`)\n\nWidget de chat embeddable para sites de provedores. Auto-contido (zero dependГӘncias, CSS inline).\n\n**InstalaГ§ГЈo:**\n```html\n<script src=\"https://app.aurora.com/static/inbox/widget/aurora-chat.js\" data-token=\"UUID\"><\/script>\n```\n\n**Features:**\n- 3 tabs: InГӯcio (boas-vindas + FAQ), Mensagens (chat), Ajuda (busca FAQ)\n- Visitor tracking via UUID no localStorage\n- PersonalizaГ§ГЈo: cores, posiГ§ГЈo (bottom-right/left), campos obrigatГіrios\n- CORS: valida domГӯnios permitidos\n- Polling a cada 5 segundos para novas mensagens\n\n---\n\n### Templates (3)\n\n| Template | DescriГ§ГЈo |\n|----------|-----------|\n| `inbox.html` | Interface 3 painГ©is: lista de conversas (esquerda), chat com mensagens (centro), painel de contexto com accordions (direita) |\n| `configuracoes_inbox.html` | 9 tabs de configuraГ§ГЈo: Equipes, Filas, Respostas RГЎpidas, Etiquetas, Canais, HorГЎrio, FAQ, Widget, Geral |\n| `dashboard_inbox.html` | Dashboard com KPIs (abertas, pendentes, resolvidas, tempo mГ©dio), grГЎfico 30 dias, ranking agentes |\n\n### Frontend (`static/inbox/`)\n\n**inbox.js** (~700 linhas): App principal do Inbox. Estado, polling, AJAX, WebSocket, filtros, emoji picker, anexos, respostas rГЎpidas, accordions, conversas anteriores.\n\n**inbox.css** (~600 linhas): Three-panel layout, message bubbles, accordions, emoji picker, status badges, responsive.\n\n---\n\n## 2. Suporte / Tickets (`apps/suporte/`)\n\n### Models (4)\n\n#### CategoriaTicket\nTabela: `suporte_categorias` | Unique: (tenant, slug)\n\nCategorias de tickets com nome, slug, Гӯcone FontAwesome, ordem.\n\n#### SLAConfig\nTabela: `suporte_sla_config` | Unique: (tenant, plano_tier)\n\nSLA por plano (starter/start/pro): tempo de primeira resposta e resoluГ§ГЈo em horas.\n\n#### Ticket\nTabela: `suporte_tickets` | Unique: (tenant, numero)\n\n| Grupo | Campos |\n|-------|--------|\n| **IdentificaГ§ГЈo** | numero (auto), titulo, descricao |\n| **ClassificaГ§ГЈo** | categoria FK, prioridade, status (aberto/em_andamento/aguardando_cliente/resolvido/fechado) |\n| **Pessoas** | solicitante FK User, atendente FK User |\n| **SLA** | sla_horas (auto do SLAConfig), sla_cumprido (property) |\n| **Timestamps** | data_abertura, data_primeira_resposta, data_resolucao, data_fechamento |\n| **Provedor** | tenant_cliente FK Tenant |\n\n#### ComentarioTicket\nTimeline do ticket: autor, mensagem, interno (flag para visibilidade staff-only).\n\n### Views (4)\n\n| View | Rota | DescriГ§ГЈo |\n|------|------|-----------|\n| `dashboard_suporte` | `/suporte/` | Dashboard KPIs (abertos, em andamento, aguardando, resolvidos, SLA breach) |\n| `ticket_lista` | `/suporte/tickets/` | Lista com filtros (status, prioridade, categoria, busca) |\n| `ticket_criar` | `/suporte/tickets/criar/` | FormulГЎrio de criaГ§ГЈo |\n| `ticket_detalhe` | `/suporte/tickets/<pk>/` | Detalhe com timeline, comentГЎrios, aГ§Гөes (alterar status, atribuir, comentar interno/pГәblico) |\n\n### Fluxo de vida do ticket\n\n```\nABERTO в”Җв”Җatribuirв”Җв”Җв–¶ EM ANDAMENTO в”Җв”Җresolverв”Җв”Җв–¶ RESOLVIDO в”Җв”Җfecharв”Җв”Җв–¶ FECHADO\n   в”Ӯ                      в”Ӯ\n   в””в”Җв”Җaguardarв”Җв”Җв–¶ AGUARDANDO CLIENTE в”Җв”Җresponderв”Җв”Җв”ҳ\n```\n\n---\n\n## IntegraГ§Гөes entre Inbox e Suporte\n\n```\nConversa (Inbox) в”Җв”ҖFKв”Җв”Җв–¶ Ticket (Suporte)\n    в”Ӯ\n    в””в”Җв”Җ api_criar_ticket: cria ticket com Гәltimas 10 mensagens como descriГ§ГЈo\n        herda prioridade da conversa\n        cria mensagem de sistema \"Ticket #N criado\"\n```\n\n---\n\n## Fluxos completos\n\n### Mensagem WhatsApp вҶ’ Inbox\n\n```\n1. Cliente envia WhatsApp\n2. Uazapi recebe вҶ’ POST webhook Aurora\n3. views_webhook.provider_webhook()\n4. UazapiProvider.parse_webhook() вҶ’ normaliza payload\n5. services.receber_mensagem()\n   a. Normaliza telefone\n   b. Busca/cria lead (auto-cria se novo)\n   c. Busca conversa aberta ou cria nova\n   d. Verifica horГЎrio вҶ’ envia mensagem fora do horГЎrio se necessГЎrio\n   e. Distribui (fila вҶ’ agente round-robin/menor_carga)\n   f. Cria Mensagem\n   g. Notifica via WebSocket\n6. Agente vГӘ no Inbox em tempo real\n```\n\n### Agente responde вҶ’ WhatsApp\n\n```\n1. Agente digita e clica Enviar\n2. POST /inbox/api/conversas/<id>/enviar/\n3. services.enviar_mensagem()\n   a. Cria Mensagem (remetente_tipo=agente)\n   b. Calcula tempo_primeira_resposta\n   c. Auto-atribui agente se nГЈo tinha\n   d. Background thread: get_provider(canal).enviar_mensagem()\n   e. UazapiService.enviar_texto() вҶ’ POST Uazapi /send/text\n   f. Salva identificador_externo (message ID)\n4. Mensagem chega no WhatsApp do cliente\n```\n\n### Widget вҶ’ Inbox\n\n```\n1. Visitante abre widget no site do provedor\n2. aurora-chat.js gera visitor_id (UUID localStorage)\n3. POST /api/public/widget/conversa/iniciar/\n4. services.receber_mensagem_widget()\n5. Conversa aparece no Inbox do agente\n6. Agente responde вҶ’ mensagem volta ao widget via polling\n```\n\n---\n\n## EstatГӯsticas do mГіdulo\n\n| MГ©trica | Inbox | Suporte | Total |\n|---------|-------|---------|-------|\n| **Models** | 20 | 4 | 24 |\n| **Views** | 25+ | 4 | 29+ |\n| **APIs** | 20+ | вҖ” | 20+ |\n| **Templates** | 3 | 4 | 7 |\n| **Services** | 12 funГ§Гөes | вҖ” | 12 |\n| **Providers** | 2 (uazapi, webhook) | вҖ” | 2 |\n| **Signals** | 3 | вҖ” | 3 |\n| **WebSocket** | 1 consumer | вҖ” | 1 |\n| **Widget** | 1 (JS auto-contido) | вҖ” | 1 |\n| **Linhas de cГіdigo** | ~3.500 | ~500 | ~4.000 |\n"}, {"t": "f", "n": "13 Modulo Fluxos", "fn": "13-MODULO_FLUXOS.md", "c": "# 13. Comercial вҖ” Modulo de Fluxos\n\n**Status:** вң… Em producao\n**Ultima atualizacao:** 06/04/2026\n**App:** `apps/comercial/atendimento/`\n\n---\n\n## Contexto\n\nO modulo de Fluxos e o motor de fluxos conversacionais (bot) da AuroraISP. Suporta dois modos:\n\n- **Legado (questoes lineares):** QuestaoFluxo com perguntas sequenciais e roteamento por indice\n- **Visual (node-based):** Editor Drawflow com nodos de diferentes tipos conectados por arestas\n\nO campo `FluxoAtendimento.modo_fluxo` define qual engine usar. Os dois modos coexistem.\n\nA **execucao** dos fluxos esta documentada em `14-MODULO_ATENDIMENTO.md`.\n\n---\n\n## FluxoAtendimento\n\nDefine um fluxo reutilizavel.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| nome | CharField(255) | Nome do fluxo |\n| descricao | TextField | Descricao detalhada |\n| tipo_fluxo | CharField(20) | qualificacao, vendas, suporte, onboarding, pesquisa, customizado |\n| status | CharField(20) | ativo, inativo, rascunho, teste |\n| canal | CharField(20) | Canal que ativa o fluxo: qualquer, whatsapp, site, facebook, instagram, google, telefone, email, indicacao, manual |\n| max_tentativas | PositiveInteger | Maximo de tentativas (padrao: 3) |\n| tempo_limite_minutos | PositiveInteger | Tempo limite em minutos |\n| permite_pular_questoes | Boolean | Permite pular questoes opcionais |\n| modo_fluxo | Boolean | False = legado, True = visual (node-based) |\n| fluxo_json | JSONField | Estado do editor Drawflow para re-import |\n| criado_por | CharField(100) | Usuario criador |\n| ativo | Boolean | Ativo/inativo |\n\n**Tabela:** `fluxos_atendimento`\n\n---\n\n## Sistema Visual (Node-Based)\n\n### NodoFluxoAtendimento\n\nNo do fluxograma visual.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| fluxo | FK вҶ’ FluxoAtendimento | Fluxo pai (cascade) |\n| tipo | CharField(20) | entrada, questao, condicao, acao, delay, finalizacao |\n| subtipo | CharField(50) | Ex: texto, select, campo_check, webhook, criar_oportunidade |\n| configuracao | JSONField | Config especifica do no |\n| pos_x, pos_y | IntegerField | Posicao no canvas |\n| ordem | PositiveIntegerField | Ordem |\n\n**Tabela:** `atendimento_nodofluxo`\n\n### ConexaoNodoAtendimento\n\nAresta dirigida entre dois nodos.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| fluxo | FK вҶ’ FluxoAtendimento | Fluxo pai |\n| nodo_origem | FK вҶ’ NodoFluxoAtendimento | Origem |\n| nodo_destino | FK вҶ’ NodoFluxoAtendimento | Destino |\n| tipo_saida | CharField(10) | default, true, false |\n\n**Tabela:** `atendimento_conexaonodo`\n**Constraint:** unique (nodo_origem, nodo_destino, tipo_saida)\n\n---\n\n## Tipos de Nodos\n\n### Entrada\n\nPonto de inicio do fluxo. 0 inputs, 1 output.\n\n**Config:** `canal` (canal que ativa o fluxo)\n\n### Questao (Interacao)\n\nEnvia mensagem ao lead. Pode esperar resposta ou nao.\n\n**Subtipos na sidebar:** Texto, Selecao, Imagem, Pix\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| modelo | Modelo pronto: nome, email, telefone, cpf, cidade, cep, endereco, plano |\n| titulo | Texto da pergunta |\n| descricao | Instrucoes adicionais |\n| opcoes_resposta | Lista de opcoes (para selecao) |\n| espera_resposta | true = pausa e aguarda, false = envia e continua |\n| validacao | Tipo: texto, email, telefone, cpf_cnpj, cep, numero |\n| regex | Regex customizado de validacao |\n| salvar_em | Campo do lead onde salvar a resposta (nome_razaosocial, email, telefone, cpf_cnpj, cidade, cep, rua, etc.) |\n| max_tentativas | Maximo de tentativas (padrao: 3) |\n| mensagem_erro | Mensagem quando resposta invalida |\n| webhook_validacao | URL do webhook para validacao externa |\n| prompt_validacao | Prompt enviado ao webhook/IA junto com a resposta |\n| integracao_ia_id | ID da integracao de IA para validacao (OpenAI, Claude, Groq, Gemini) |\n\n**Cascata de validacao:**\n1. Resposta vazia (se espera_resposta)\n2. Opcoes (para selecao)\n3. Tipo (email, telefone, CPF, CEP, numero)\n4. Regex\n5. Integracao IA (chama provider configurado)\n6. Webhook externo\n\n**Modelos prontos:** Ao selecionar um modelo (ex: \"Nome\"), preenche automaticamente titulo, validacao e campo de salvamento.\n\n### Condicao\n\nAvalia uma condicao e segue branch true ou false. 1 input, 2 outputs.\n\n**Subtipos:** campo_check, resposta_check\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| campo | Campo a verificar (lead.origem, lead.score, lead.cidade, ultima_resposta, etc.) |\n| operador | igual, diferente, contem, maior, menor, maior_igual, menor_igual |\n| valor | Valor para comparacao |\n\n### Acao\n\nExecuta algo e continua. 1 input, 1 output.\n\n**Subtipos:**\n\n| Subtipo | Descricao |\n|---------|-----------|\n| criar_oportunidade | Cria oportunidade no CRM (pipeline padrao, estagio inicial) |\n| webhook | Chama URL externa (GET/POST) |\n| criar_tarefa | Cria tarefa no CRM |\n| mover_estagio | Move oportunidade de estagio |\n| notificacao_sistema | Cria notificacao no sistema |\n\n### Delay\n\nPausa a execucao por um tempo. 1 input, 1 output.\n\n**Config:** `valor` (numero) + `unidade` (minutos, horas, dias)\n\n### Finalizacao\n\nFinaliza o atendimento. 1 input, 0 outputs.\n\n**Subtipos:** finalizar (simples), calcular_score (com score 1-10)\n\n**Config:** `mensagem_final`, `score` (para calcular_score)\n\n---\n\n## Editor Visual\n\n**URL:** `/configuracoes/fluxos/<id>/editor/`\n**Biblioteca:** Drawflow v0.0.59 (CDN)\n**Layout:** Sidebar (paleta de nos) + Canvas (Drawflow) + Config Panel (direita)\n\n**Sidebar (todos colapsados por padrao):**\n- Entrada: Inicio do Fluxo\n- Interacao (icone WhatsApp): Texto, Selecao, Imagem, Pix\n- Condicoes: Verificar Campo, Verificar Resposta\n- Acoes: Criar Oportunidade, Webhook, Criar Tarefa, Mover Estagio, Notificacao\n- Controle: Atraso, Finalizar Fluxo, Finalizar com Score\n\n**Salvar:** POST para `/api/fluxos/<id>/salvar-fluxo/` com `{drawflow_state, nodos[], conexoes[]}`\n\n**Carregar:** Importa de `fluxo_json` ou reconstroi do banco se nao houver JSON salvo.\n\n---\n\n## Integracao com IA\n\nA validacao por IA usa o modulo de integracoes (`apps/integracoes/`). O provedor configura uma integracao do tipo OpenAI, Anthropic, Groq ou Google AI com API key e modelo.\n\n**Providers suportados:**\n\n| Provider | Tipo | Modelo padrao |\n|----------|------|---------------|\n| OpenAI | openai | gpt-4o-mini |\n| Anthropic | anthropic | claude-haiku-4-5-20251001 |\n| Groq | groq | llama-3.1-8b-instant |\n| Google AI | google_ai | gemini-2.0-flash |\n\n**Fluxo:** Resposta do lead + prompt de validacao вҶ’ API do provider вҶ’ JSON `{valido, mensagem}` вҶ’ aceita ou rejeita\n\n---\n\n## Canal de Ativacao\n\nCada fluxo tem um `canal` que define quando e ativado automaticamente:\n\n1. Mensagem chega no Inbox (ex: WhatsApp)\n2. Signal `on_mensagem_recebida` detecta o canal\n3. Engine busca fluxo ativo para o canal (`buscar_fluxo_por_canal`)\n4. Prioridade: fluxo do canal exato вҶ’ fluxo \"qualquer\" вҶ’ nenhum\n5. Cria atendimento e inicia o fluxo\n6. Pergunta do bot e enviada de volta no Inbox como mensagem \"Aurora\"\n\n---\n\n## Endpoints\n\n### Paginas (HTML)\n\n| URL | Descricao |\n|-----|-----------|\n| `/configuracoes/fluxos/` | Gerenciamento de fluxos (CRUD + botoes Editor Visual, Ativos, Questoes) |\n| `/configuracoes/fluxos/<id>/editor/` | Editor visual Drawflow |\n| `/configuracoes/sessoes/` | Acompanhamento de sessoes ativas |\n| `/configuracoes/sessoes/<id>/` | Detalhe da sessao com logs |\n| `/configuracoes/sessoes/<id>/fluxo/` | Visualizacao do fluxo ao vivo (nodo atual pulsando) |\n| `/configuracoes/questoes/` | Gerenciamento de questoes (legado) |\n\n### APIs\n\n| Metodo | URL | Descricao |\n|--------|-----|-----------|\n| GET | `/api/fluxos/` | Listar fluxos |\n| POST | `/api/fluxos/criar/` | Criar fluxo |\n| PUT | `/api/fluxos/<id>/atualizar/` | Atualizar fluxo |\n| DELETE | `/api/fluxos/<id>/deletar/` | Deletar fluxo |\n| POST | `/api/fluxos/<id>/salvar-fluxo/` | Salvar editor visual |\n\n---\n\n## Relacionamentos\n\n```\nFluxoAtendimento\nв”ңв”Җв”Җ questoes вҶ’ QuestaoFluxo (1:N, legado)\nв”ңв”Җв”Җ nodos вҶ’ NodoFluxoAtendimento (1:N, visual)\nв”ңв”Җв”Җ conexoes вҶ’ ConexaoNodoAtendimento (1:N, visual)\nв””в”Җв”Җ atendimentos вҶ’ AtendimentoFluxo (1:N)\n\nNodoFluxoAtendimento\nв”ңв”Җв”Җ saidas вҶ’ ConexaoNodoAtendimento (1:N)\nв”ңв”Җв”Җ entradas вҶ’ ConexaoNodoAtendimento (1:N)\nв”ңв”Җв”Җ logs вҶ’ LogFluxoAtendimento (1:N)\nв””в”Җв”Җ execucoes_pendentes вҶ’ ExecucaoFluxoAtendimento (1:N)\n```\n\n---\n\n## Arquivos\n\n| Arquivo | Descricao |\n|---------|-----------|\n| `models.py` | FluxoAtendimento, NodoFluxoAtendimento, ConexaoNodoAtendimento, ExecucaoFluxoAtendimento, LogFluxoAtendimento + legado |\n| `engine.py` | Engine visual: traversal, validacao (tipo/regex/IA/webhook), acoes, delays |\n| `views.py` | Editor visual, salvar fluxo, sessoes, detalhe, fluxo ao vivo |\n| `views_api.py` | APIs CRUD, N8N dual-mode |\n| `templates/editor_fluxo.html` | Editor Drawflow |\n| `templates/sessoes.html` | Lista de sessoes |\n| `templates/sessao_detalhe.html` | Detalhe com logs |\n| `templates/sessao_fluxo_visual.html` | Fluxo ao vivo read-only |\n| `templates/fluxos.html` | CRUD de fluxos |\n"}, {"t": "f", "n": "14 Modulo Atendimento", "fn": "14-MODULO_ATENDIMENTO.md", "c": "# 14. Comercial вҖ” Modulo de Atendimento\n\n**Status:** вң… Em producao\n**Ultima atualizacao:** 06/04/2026\n**App:** `apps/comercial/atendimento/`\n\n---\n\n## Contexto\n\nO modulo de Atendimento gerencia a **execucao** dos fluxos conversacionais: sessoes ativas com leads, respostas, validacao, logs e integracao com Inbox/WhatsApp. A **configuracao** de fluxos esta documentada em `13-MODULO_FLUXOS.md`.\n\nSuporta dois modos de execucao:\n- **Legado:** QuestaoFluxo sequencial (questao por indice)\n- **Visual:** Engine node-based com traversal do grafo (engine.py)\n\n---\n\n## Arquitetura вҖ” Modo Visual\n\n```\nMensagem chega no Inbox (WhatsApp, Site, etc.)\n          вҶ“\nSignal on_mensagem_recebida (inbox/signals.py)\n          вҶ“\nengine.buscar_fluxo_por_canal(canal, tenant)\n          вҶ“\n   Fluxo encontrado? вҶ’ engine.iniciar_por_canal(lead, canal)\n          вҶ“\n   Cria AtendimentoFluxo вҶ’ engine.iniciar_fluxo_visual()\n          вҶ“\n   Percorre grafo: entrada вҶ’ nodos...\n          вҶ“\n   Encontra nodo questao (espera_resposta=true)?\n     вҶ’ PAUSA, envia pergunta no Inbox como bot \"Aurora\"\n          вҶ“\n   Lead responde no WhatsApp\n          вҶ“\n   Signal detecta atendimento ativo вҶ’ engine.processar_resposta_visual()\n          вҶ“\n   Valida resposta (tipo вҶ’ regex вҶ’ IA вҶ’ webhook)\n          вҶ“\n   Salva no campo do lead (se configurado)\n          вҶ“\n   Segue conexoes вҶ’ proximo nodo (condicao/acao/delay/finalizacao)\n          вҶ“\n   [loop ate finalizar]\n          вҶ“\n   Nodo finalizacao вҶ’ score + atualiza lead вҶ’ mensagem final no Inbox\n```\n\n---\n\n## Models\n\n### AtendimentoFluxo\n\nSessao ativa de um lead em um fluxo.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| lead | FK вҶ’ LeadProspecto | Lead sendo atendido |\n| fluxo | FK вҶ’ FluxoAtendimento | Fluxo utilizado |\n| historico_contato | FK вҶ’ HistoricoContato | Historico vinculado (opcional) |\n| nodo_atual | FK вҶ’ NodoFluxoAtendimento | Posicao no modo visual (nullable) |\n| status | CharField(30) | iniciado, em_andamento, pausado, completado, abandonado, erro, cancelado |\n| questao_atual | PositiveInteger | Indice da questao atual (legado) |\n| total_questoes | PositiveInteger | Total de questoes/nodos tipo questao |\n| questoes_respondidas | PositiveInteger | Quantas foram respondidas |\n| dados_respostas | JSONField | Respostas: `{nodo_id: {resposta, data, titulo, ...}}` |\n| score_qualificacao | Integer(1-10) | Score calculado ao finalizar |\n| tempo_total | PositiveInteger | Duracao em segundos |\n\n**Tabela:** `atendimentos_fluxo`\n\n### LogFluxoAtendimento\n\nRegistro de cada passo executado no fluxo visual.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| atendimento | FK вҶ’ AtendimentoFluxo | Sessao |\n| nodo | FK вҶ’ NodoFluxoAtendimento | Nodo executado (nullable) |\n| lead | FK вҶ’ LeadProspecto | Lead (indexed) |\n| tipo_nodo | CharField(20) | entrada, questao, condicao, acao, delay, finalizacao |\n| subtipo_nodo | CharField(50) | Subtipo do nodo |\n| status | CharField(20) | sucesso, erro, aguardando, agendado |\n| mensagem | TextField | Descricao do que aconteceu |\n| dados | JSONField | Dados extras (resposta, branch, score...) |\n| data_execucao | DateTime | Quando executou |\n\n**Tabela:** `atendimento_log_fluxo`\n\n### ExecucaoFluxoAtendimento\n\nFila de execucoes pendentes (delays).\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| atendimento | FK вҶ’ AtendimentoFluxo | Sessao |\n| nodo | FK вҶ’ NodoFluxoAtendimento | Nodo de delay |\n| contexto_json | JSONField | Contexto serializado |\n| data_agendada | DateTime | Quando executar |\n| status | CharField(20) | pendente, executado, cancelado, erro |\n\n**Tabela:** `atendimento_execucao_pendente`\n\n---\n\n## Engine (engine.py)\n\nEngine conversacional assincrono. A execucao **pausa** em nos de questao (espera_resposta=true) e delay.\n\n### Funcoes principais\n\n| Funcao | Descricao |\n|--------|-----------|\n| `buscar_fluxo_por_canal(canal, tenant)` | Busca fluxo ativo por canal (exato вҶ’ \"qualquer\" вҶ’ None) |\n| `iniciar_por_canal(lead, canal, tenant)` | Cria atendimento automaticamente por canal |\n| `iniciar_fluxo_visual(atendimento)` | Encontra nodo entrada, percorre ate primeira questao |\n| `processar_resposta_visual(atendimento, resposta)` | Valida resposta, salva no lead, segue conexoes |\n| `executar_pendentes_atendimento(tenant)` | Cron: executa delays pendentes |\n\n### Traversal do grafo\n\n| Tipo nodo | Comportamento |\n|-----------|--------------|\n| entrada | Passa direto, segue conexao default |\n| questao (espera=true) | **PAUSA**, retorna dados da pergunta |\n| questao (espera=false) | Envia mensagem, continua sem parar |\n| condicao | Avalia campo/operador/valor, segue branch true ou false |\n| acao | Executa (webhook, criar oportunidade, etc.), continua |\n| delay | Agenda ExecucaoFluxoAtendimento, **PAUSA** |\n| finalizacao | Calcula score, atualiza lead, **FIM** |\n\n### Validacao de respostas (cascata)\n\n1. **Resposta vazia** вҖ” rejeita se espera resposta\n2. **Opcoes** вҖ” valida contra lista (para selecao)\n3. **Tipo** вҖ” email (@), telefone (10+ digitos), CPF/CNPJ (11/14), CEP (8), numero\n4. **Regex** вҖ” valida contra padrao customizado\n5. **Integracao IA** вҖ” chama provider configurado (OpenAI, Claude, Groq, Gemini) com prompt\n6. **Webhook** вҖ” chama URL externa com resposta + prompt, espera `{valido, mensagem}`\n\n### Salvar resposta no lead\n\nSe o nodo de questao tem `salvar_em` configurado, a resposta e salva diretamente no campo do lead:\n\n| salvar_em | Campo do lead |\n|-----------|---------------|\n| nome_razaosocial | Nome |\n| email | Email |\n| telefone | Telefone |\n| cpf_cnpj | CPF/CNPJ |\n| cidade | Cidade |\n| estado | Estado |\n| cep | CEP |\n| rua | Rua |\n| bairro | Bairro |\n| empresa | Empresa |\n| observacoes | Observacoes |\n\n### Acoes disponiveis\n\n| Acao | Descricao |\n|------|-----------|\n| criar_oportunidade | Cria oportunidade no CRM (pipeline padrao, nao duplica) |\n| webhook | Chama URL externa (GET/POST) com contexto |\n| criar_tarefa | Cria tarefa no CRM com responsavel |\n| mover_estagio | Move oportunidade de estagio |\n| notificacao_sistema | Cria notificacao no painel |\n\n### Validacao por IA\n\nUsa integracoes configuradas em `/integracoes/` (modelo IntegracaoAPI).\n\n| Provider | Tipo | Modelo padrao |\n|----------|------|---------------|\n| OpenAI | openai | gpt-4o-mini |\n| Anthropic | anthropic | claude-haiku-4-5-20251001 |\n| Groq | groq | llama-3.1-8b-instant |\n| Google AI | google_ai | gemini-2.0-flash |\n\n**Fluxo:** Prompt + resposta вҶ’ API do provider вҶ’ JSON `{valido, mensagem}` вҶ’ aceita ou rejeita\n\n---\n\n## Integracao com Inbox\n\nO signal `on_mensagem_recebida` em `apps/inbox/signals.py`:\n\n1. Mensagem de contato chega no Inbox\n2. Verifica se existe atendimento ativo aguardando resposta вҶ’ processa resposta\n3. Se nao, tenta iniciar novo fluxo pelo canal\n4. Envia pergunta/mensagem do bot de volta no Inbox como remetente \"Aurora\" (tipo bot)\n5. Envia via webhook externo (WhatsApp) se configurado no canal\n\n---\n\n## Telas de acompanhamento\n\n### Sessoes (`/configuracoes/sessoes/`)\n- Lista todas as sessoes com status, progresso, nodo atual\n- Filtros por status (em andamento, completado, etc.) e por fluxo\n- Botao \"Ativos\" nos cards de fluxo filtra sessoes ativas\n\n### Detalhe da sessao (`/configuracoes/sessoes/<id>/`)\n- Info: fluxo, canal, inicio, duracao, score, progresso\n- Nodo atual (onde o lead esta)\n- Respostas do lead\n- **Log de execucao** passo a passo: cada nodo com status, mensagem e timestamp\n\n### Fluxo ao vivo (`/configuracoes/sessoes/<id>/fluxo/`)\n- Editor Drawflow em modo **read-only**\n- Nodos executados com **borda verde**\n- Nodo atual com **borda azul pulsando**\n- Sidebar com legenda, dados da sessao e respostas\n\n---\n\n## Endpoints\n\n### Paginas\n\n| URL | Descricao |\n|-----|-----------|\n| `/configuracoes/sessoes/` | Lista de sessoes |\n| `/configuracoes/sessoes/<id>/` | Detalhe com logs |\n| `/configuracoes/sessoes/<id>/fluxo/` | Visualizacao ao vivo |\n\n### APIs (dual-mode: legado + visual)\n\n| Metodo | URL | Descricao |\n|--------|-----|-----------|\n| POST | `/api/n8n/atendimento/iniciar/` | Iniciar atendimento (detecta modo_fluxo) |\n| POST | `/api/n8n/atendimento/<id>/responder/` | Responder (detecta modo_fluxo) |\n| POST | `/api/n8n/atendimento/<id>/finalizar/` | Finalizar |\n| POST | `/api/n8n/atendimento/<id>/pausar/` | Pausar |\n| POST | `/api/n8n/atendimento/<id>/retomar/` | Retomar |\n\n---\n\n## Tabelas\n\n| Model | Tabela |\n|-------|--------|\n| AtendimentoFluxo | `atendimentos_fluxo` |\n| NodoFluxoAtendimento | `atendimento_nodofluxo` |\n| ConexaoNodoAtendimento | `atendimento_conexaonodo` |\n| ExecucaoFluxoAtendimento | `atendimento_execucao_pendente` |\n| LogFluxoAtendimento | `atendimento_log_fluxo` |\n| RespostaQuestao | `respostas_questao` (legado) |\n| TentativaResposta | `tentativas_resposta` (legado) |\n\n---\n\n## Arquivos\n\n| Arquivo | Descricao |\n|---------|-----------|\n| `models.py` | Todos os models (legado + visual) |\n| `engine.py` | Engine visual: traversal, validacao, acoes, IA, delays, logs |\n| `views.py` | Editor, salvar fluxo, sessoes, detalhe, fluxo ao vivo |\n| `views_api.py` | APIs N8N dual-mode |\n| `apps/inbox/signals.py` | Signal que conecta mensagens do Inbox ao engine |\n| `services/atendimento_service.py` | Integracao Matrix/HubSoft |\n"}, {"t": "f", "n": "15 Servicos Cron", "fn": "15-SERVICOS_CRON.md", "c": "# 15. Servicos Periodicos e Cron Jobs\n\n**Ultima atualizacao:** 06/04/2026\n**Status:** вң… Em producao\n\n---\n\n## Visao Geral\n\nO sistema utiliza servicos periodicos para processar automacoes, sincronizar dados com HubSoft, mover leads no CRM e executar delays dos fluxos de atendimento. Nao usa Celery. Tudo roda via **crontab** (Linux) ou **Task Scheduler** (Windows) + **systemd timer** para o sync HubSoft.\n\n---\n\n## Servicos Criticos (producao)\n\n### 1. executar_automacoes_cron\n\n**O que faz:** Coracao do motor de automacoes. Processa delays pendentes, detecta leads sem contato, tarefas vencidas e dispara automacoes por segmento.\n\n**App:** `apps/marketing/automacoes/`\n**Comando:** `python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 5 minutos\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem executar |\n| `--tenant SLUG` | Roda apenas para um tenant |\n\n**O que executa (por tenant):**\n\n1. **Processar delays pendentes** вҖ” Busca `ExecucaoPendente` com `data_agendada <= agora` e retoma a execucao do grafo de onde parou\n2. **Lead sem contato** вҖ” Detecta leads sem `HistoricoContato` ha X dias, dispara evento `lead_sem_contato` (com protecao contra duplicatas via `LogExecucao`)\n3. **Tarefa vencida** вҖ” Detecta `TarefaCRM` pendente com `data_vencimento < agora`, dispara evento `tarefa_vencida`\n4. **Disparo por segmento** вҖ” Para regras com `evento=disparo_segmento` e segmento FK, itera leads do segmento e dispara automacao (respeita rate limit e cooldown)\n\n**Crontab:**\n```bash\n*/5 * * * * cd /path/to/project && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/automacoes.log 2>&1\n```\n\n---\n\n### 2. sincronizar_clientes\n\n**O que faz:** Sincroniza clientes do HubSoft para o sistema local. Cria/atualiza registros em `ClienteHubsoft` e `ServicoClienteHubsoft`. Detecta alteracoes e marca `houve_alteracao=True`.\n\n**App:** `apps/integracoes/`\n**Comando:** `python manage.py sincronizar_clientes --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 1 minuto (via systemd timer)\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--lead-id INT` | Sincroniza apenas um lead |\n| `--todos` | Forca sync completo |\n| `--dry-run` | Simula sem salvar |\n\n**Dependencias:** `IntegracaoAPI` (tipo=hubsoft), `HubsoftService`\n\n**Systemd timer** (`apps/integracoes/systemd/robovendas-sync-clientes.timer`):\n```ini\n[Timer]\nOnBootSec=60\nOnUnitActiveSec=60\nAccuracySec=5\nPersistent=true\n```\n\n---\n\n### 3. processar_pendentes\n\n**O que faz:** Processa leads com `status_api='pendente'` e envia para o HubSoft via API. Atualiza `status_api` para 'processado' ou 'erro' e preenche `id_hubsoft` em caso de sucesso.\n\n**App:** `apps/integracoes/`\n**Comando:** `python manage.py processar_pendentes --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 30 minutos\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--lead-id INT` | Processa apenas um lead |\n| `--dry-run` | Simula sem enviar |\n\n**Crontab:**\n```bash\n*/30 * * * * cd /path/to/project && python manage.py processar_pendentes --settings=gerenciador_vendas.settings >> /var/log/hubsoft_pendentes.log 2>&1\n```\n\n---\n\n## Servicos de Manutencao (diario/semanal)\n\n### 4. taguear_leads\n\n**O que faz:** Auto-atribui tags do CRM baseado na completude dos dados do lead:\n- \"Comercial\" вҶ’ lead tem plano ou dia de vencimento selecionado\n- \"Endereco\" вҶ’ lead tem endereco completo (rua, numero, bairro, CEP)\n- \"Documental\" вҶ’ lead tem CPF preenchido\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py taguear_leads --settings=gerenciador_vendas.settings`\n**Frequencia:** Diario (recomendado: 2h da manha)\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem salvar |\n| `--resetar` | Remove tags existentes antes de reatribuir |\n| `--estagio TIPO` | Filtra por tipo de estagio |\n\n**Crontab:**\n```bash\n0 2 * * * cd /path/to/project && python manage.py taguear_leads --settings=gerenciador_vendas.settings\n```\n\n---\n\n### 5. mover_perdidos\n\n**O que faz:** Move automaticamente oportunidades do estagio \"Qualificacao\" para \"Perdido\" se nao houver validacao de documentacao em X horas (padrao: 48h).\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py mover_perdidos --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 2 horas\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem mover |\n| `--horas INT` | Limite de horas sem atividade (padrao: 48) |\n\n**Cria:** Registro em `HistoricoPipelineEstagio` para auditoria.\n\n**Crontab:**\n```bash\n0 */2 * * * cd /path/to/project && python manage.py mover_perdidos --settings=gerenciador_vendas.settings\n```\n\n---\n\n### 6. popular_crm\n\n**O que faz:** Popula o pipeline do CRM com leads existentes, usando regras de prioridade para definir o estagio:\n- P1: HubSoft `servico_habilitado` вҶ’ \"cliente\"\n- P2: HubSoft `aguardando_instalacao` вҶ’ \"fechamento\"\n- P3: `documentacao_validada=True` вҶ’ \"fechamento\"\n- P4: `status_api='processado'` вҶ’ \"negociacao\"\n- P5: `status_api='processamento_manual'` вҶ’ \"qualificacao\"\n- P6: Demais вҶ’ \"novo\"\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py popular_crm --settings=gerenciador_vendas.settings`\n**Frequencia:** Unica vez ou semanal para backfill\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem criar |\n| `--limpar` | Remove oportunidades existentes antes |\n| `--criar-perfis` | Cria PerfilVendedor para users sem perfil CRM |\n\n---\n\n## Engine de Pendentes (Delays)\n\n### Automacoes (Marketing)\n\n**Funcao:** `executar_pendentes(tenant=None)` em `apps/marketing/automacoes/engine.py`\n\n**Como funciona:**\n1. Busca `ExecucaoPendente` com `status='pendente'` e `data_agendada <= agora`\n2. Para cada pendente:\n   - Restaura contexto do JSON serializado\n   - Se `nodo` (modo fluxo): retoma traversal do grafo a partir das saidas do no de delay\n   - Se `acao` (modo legado): executa a acao diretamente\n   - Marca como `executado` ou `erro`\n3. Chamada pelo cron `executar_automacoes_cron`\n\n**Idempotente:** Cada pendente e marcado apos execucao, nao re-executa.\n\n### Atendimento (Fluxos de Bot)\n\n**Funcao:** `executar_pendentes_atendimento(tenant=None)` em `apps/comercial/atendimento/engine.py`\n\n**Como funciona:**\n1. Busca `ExecucaoFluxoAtendimento` com `status='pendente'` e `data_agendada <= agora`\n2. Para cada pendente:\n   - Reconstroi contexto da conversa\n   - Retoma traversal do grafo a partir do no de delay\n   - Marca como `executado` ou `erro`\n\n**Nota:** Deve ser integrado ao cron principal ou ter cron separado.\n\n---\n\n## Comandos de Setup (unica vez)\n\n| Comando | App | O que faz |\n|---------|-----|-----------|\n| `seed_planos` | sistema | Cria planos de assinatura e features |\n| `seed_funcionalidades` | sistema | Cria 35 funcionalidades do sistema de permissoes |\n| `seed_perfis` | sistema | Cria perfis de usuario base |\n| `criar_tenant` | sistema | Cria novo workspace multi-tenant |\n| `setup_hubsoft` | integracoes | Configura credenciais HubSoft (le de variaveis de ambiente) |\n| `seed_inbox` | inbox | Inicializa sistema de inbox |\n| `seed_aurora` | suporte | Popula dados de suporte |\n| `gerar_faq` | cs/clube | Gera conteudo FAQ do clube de beneficios |\n\n---\n\n## Comandos de Teste (desenvolvimento)\n\n| Comando | App | O que faz |\n|---------|-----|-----------|\n| `testar_automacoes` | automacoes | 18 testes E2E do engine de automacoes |\n| `testar_pontuacoes` | cs/clube | Testa sistema de gamificacao |\n\n---\n\n## Configuracao Completa de Producao\n\n### Crontab (Linux)\n\n```bash\n# ============================================================\n# CRITICOS вҖ” nao desligar\n# ============================================================\n\n# Engine de automacoes (delays, eventos, segmentos)\n*/5 * * * * cd /opt/aurora && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/aurora/automacoes.log 2>&1\n\n# Processar leads pendentes para HubSoft\n*/30 * * * * cd /opt/aurora && python manage.py processar_pendentes --settings=gerenciador_vendas.settings >> /var/log/aurora/hubsoft_pendentes.log 2>&1\n\n# ============================================================\n# MANUTENCAO вҖ” pode ajustar horario\n# ============================================================\n\n# Auto-tag de leads por completude de dados\n0 2 * * * cd /opt/aurora && python manage.py taguear_leads --settings=gerenciador_vendas.settings >> /var/log/aurora/tags.log 2>&1\n\n# Mover oportunidades estagnadas para \"Perdido\"\n0 */2 * * * cd /opt/aurora && python manage.py mover_perdidos --settings=gerenciador_vendas.settings >> /var/log/aurora/perdidos.log 2>&1\n```\n\n### Systemd Timer (sincronizar_clientes)\n\n```bash\n# Copiar arquivos\nsudo cp apps/integracoes/systemd/robovendas-sync-clientes.timer /etc/systemd/system/\nsudo cp apps/integracoes/systemd/robovendas-sync-clientes.service /etc/systemd/system/\n\n# Ativar\nsudo systemctl daemon-reload\nsudo systemctl enable robovendas-sync-clientes.timer\nsudo systemctl start robovendas-sync-clientes.timer\n\n# Verificar\nsudo systemctl status robovendas-sync-clientes.timer\n```\n\n### Task Scheduler (Windows вҖ” desenvolvimento)\n\nPara ambiente de desenvolvimento no Windows, criar tarefas no Agendador de Tarefas:\n\n| Tarefa | Programa | Argumentos | Frequencia |\n|--------|----------|------------|------------|\n| Aurora Automacoes | python | `manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings_local` | 5 min |\n| Aurora HubSoft Sync | python | `manage.py sincronizar_clientes --settings=gerenciador_vendas.settings_local` | 1 min |\n| Aurora Pendentes | python | `manage.py processar_pendentes --settings=gerenciador_vendas.settings_local` | 30 min |\n\n---\n\n## Monitoramento\n\nPara verificar se os crons estao rodando:\n\n```bash\n# Verificar logs\ntail -f /var/log/aurora/automacoes.log\n\n# Verificar pendentes acumulados (sinal de cron parado)\npython manage.py shell -c \"\nfrom apps.marketing.automacoes.models import ExecucaoPendente\nprint(f'Pendentes: {ExecucaoPendente.objects.filter(status=\\\"pendente\\\").count()}')\n\"\n\n# Verificar ultima execucao\npython manage.py shell -c \"\nfrom apps.marketing.automacoes.models import LogExecucao\nultimo = LogExecucao.objects.order_by('-data_execucao').first()\nprint(f'Ultima execucao: {ultimo.data_execucao if ultimo else \\\"nunca\\\"} - {ultimo.resultado[:50] if ultimo else \\\"\\\"}')\n\"\n```\n"}]}]}, {"t": "d", "n": "Drafts", "ch": [{"t": "d", "n": "apresentacao", "ch": [{"t": "f", "n": "Battle Card Concorrentes", "fn": "battle_card_concorrentes.md", "c": "# Battle Card: AuroraISP vs Concorrentes\n\n**Uso:** ReferГӘncia rГЎpida para o parceiro durante ligaГ§Гөes e reuniГөes com provedores.\n**AtualizaГ§ГЈo:** 30/03/2026\n\n---\n\n## 1. AuroraISP vs ISPRO AI\n\n### Comparativo direto\n\n| CritГ©rio | **AuroraISP** | **ISPRO AI** |\n|----------|---------------|--------------|\n| **IntegraГ§ГЈo HubSoft** | **Nativa e profunda** (lead вҶ’ contrato вҶ’ ativaГ§ГЈo no ERP) | GenГ©rica, sem fluxo completo |\n| Fluxo lead вҶ’ contrato вҶ’ ERP | вң… Automatizado de ponta a ponta | вқҢ NГЈo demonstrado |\n| Coleta e validaГ§ГЈo de documentos | вң… AutomГЎtica via WhatsApp | вқҢ NГЈo mencionado |\n| Bot de qualificaГ§ГЈo WhatsApp | вң… | вң… |\n| CRM com pipeline visual | рҹ”§ Em desenvolvimento (Pro) | вҡ пёҸ Parcial |\n| Clube de fidelizaГ§ГЈo (CS) | рҹ”§ Em desenvolvimento | вқҢ |\n| CobranГ§a automatizada | вқҢ (fora do escopo atual) | вң… |\n| Suporte N1 automatizado | вқҢ (fora do escopo atual) | вң… |\n| **Case real comprovado** | **вң… 400 vendas/mГӘs, R$ 284.400/ano de economia** | вқҢ Nenhum case pГәblico |\n| **PreГ§o pГәblico** | **вң… Transparente** | вқҢ NГЈo divulgado |\n| Social proof | вң… Provedor com 30.000 clientes em produГ§ГЈo | вқҢ Nenhuma |\n\n### Fraquezas do ISPRO AI para explorar\n\n- **Sem case real:** nenhum provedor validou publicamente os resultados prometidos\n- **IntegraГ§ГЈo HubSoft genГ©rica:** nГЈo demonstra fluxo completo de lead atГ© ativaГ§ГЈo no ERP\n- **PreГ§o oculto:** sem tabela pГәblica, o que gera desconfianГ§a\n- **Promessas genГ©ricas de IA:** \"aumento de atГ© 50% na conversГЈo\" sem dado verificГЎvel\n- **CTA apenas por WhatsApp:** sem demonstraГ§ГЈo, sem trial, sem transparГӘncia\n\n### ForГ§as da AuroraISP para destacar\n\n- **Resultado comprovado:** 400 vendas digitais/mГӘs em provedor com 30.000 clientes\n- **IntegraГ§ГЈo HubSoft que ninguГ©m mais tem:** contrato vai direto para o ERP, sem copiar e colar\n- **PreГ§o justo e transparente:** mensalidade fixa + transacional por resultado\n\n### Pergunta decisiva para o prospect\n\n> **\"Quantas vendas digitais o ISPRO entrega por mГӘs? Pode mostrar um case real com nГәmeros?\"**\n\n---\n\n## 2. AuroraISP vs CRM GenГ©rico (RD Station, Pipedrive)\n\n### Por que CRM genГ©rico nГЈo resolve o problema do provedor\n\n| CritГ©rio | **AuroraISP** | **CRM GenГ©rico** |\n|----------|---------------|-------------------|\n| **IntegraГ§ГЈo HubSoft** | **Nativa. Lead vira contrato no ERP.** | вқҢ NГЈo existe. Tudo manual. |\n| Coleta de documentos via WhatsApp | вң… AutomГЎtica | вқҢ NГЈo faz |\n| GeraГ§ГЈo de contrato | вң… AutomГЎtica | вқҢ NГЈo faz |\n| AutomaГ§ГЈo do fluxo ISP | вң… Pronto para usar | вқҢ Precisa de consultoria + customizaГ§ГЈo |\n| Tempo de implantaГ§ГЈo | Dias | Semanas ou meses (com consultor) |\n| PreГ§o total (ferramenta + customizaГ§ГЈo) | **AcessГӯvel para ISP regional** | R$ 900+/mГӘs + R$ 5.000 a 15.000 de setup com consultor |\n| Curva de aprendizado | Treinamento em 30 minutos | Semanas de adaptaГ§ГЈo |\n\n### Argumento central\n\nO CRM genГ©rico foi feito para qualquer empresa. **A AuroraISP foi feita para o provedor.** O vendedor do provedor nГЈo precisa de um pipeline sofisticado para 50 tipos de negГіcio. Ele precisa que o lead do WhatsApp vire contrato no HubSoft sem copiar e colar.\n\n### Conta rГЎpida para o prospect\n\n> \"Quanto vocГӘ gasta hoje com Pipedrive/RD Station + o tempo do seu vendedor copiando dados manualmente para o HubSoft? Com a Aurora, esse retrabalho desaparece.\"\n\n---\n\n## 3. AuroraISP vs \"NГЈo fazer nada\" (processo manual)\n\n### O custo real de manter o processo manual\n\n| Item | Processo manual | Com AuroraISP |\n|------|----------------|---------------|\n| Pessoas para atender 1.000 leads/mГӘs | 8 | **2** |\n| Custo anual estimado de pessoal | R$ 384.000 | R$ 99.600 |\n| **Economia anual** | | **R$ 284.400** |\n| Leads sem acompanhamento | Muitos (sem controle) | **Zero (rastreio completo)** |\n| Erro em documentos e contratos | Frequente | **ValidaГ§ГЈo automГЎtica** |\n| Visibilidade do funil | Nenhuma | **Dashboard em tempo real** |\n| Tempo mГ©dio do lead atГ© contrato | Dias | **Minutos** |\n\n### TrГӘs problemas que o provedor nГЈo percebe\n\n1. **Leads perdidos sem saber:** vendedor esquece de retornar, lead esfria, ninguГ©m rastreia. Cada lead perdido Г© receita recorrente que nunca vai existir.\n2. **Retrabalho invisГӯvel:** pedir documento por mensagem, digitar dados no HubSoft, gerar contrato manual. Tempo que o vendedor poderia estar vendendo.\n3. **DecisГЈo no escuro:** sem dados, o dono nГЈo sabe se o problema Г© volume de leads, performance do vendedor ou gargalo no processo.\n\n### ROI simplificado\n\n> **Um provedor com perfil similar (30.000 clientes, 1.000 leads/mГӘs) economizou R$ 284.400 por ano sГі em pessoal. 2 pessoas passaram a fazer o que 8 faziam, e o processo ficou mais rГЎpido.**\n\n---\n\n## 4. Respostas RГЎpidas para ObjeГ§Гөes Competitivas\n\n| ObjeГ§ГЈo | Resposta |\n|---------|----------|\n| **\"O ISPRO faz a mesma coisa\"** | \"O ISPRO promete IA para ISP, mas nГЈo tem um case pГәblico com nГәmeros. A Aurora tem: 400 vendas/mГӘs, 30.000 clientes, em produГ§ГЈo. Pede o case deles e compara.\" |\n| **\"Uso RD Station e funciona\"** | \"RD Station Г© Гіtimo para marketing genГ©rico. Mas ele manda contrato pro HubSoft? Coleta documento do cliente? Ativa o plano no ERP? A Aurora faz isso. SГЈo coisas complementares, nГЈo iguais.\" |\n| **\"Meu processo manual funciona bem\"** | \"Funciona, mas quanto custa? Um provedor do seu porte gastava R$ 384.000/ano em pessoal para o mesmo volume. Hoje gasta R$ 99.600 e atende mais rГЎpido. A pergunta nГЈo Г© se funciona. Гү quanto vocГӘ estГЎ deixando na mesa.\" |\n| **\"Vou esperar o mercado amadurecer\"** | \"Seu concorrente nГЈo vai esperar. Quem automatiza primeiro atende mais leads com menos gente. Enquanto vocГӘ espera, ele fecha os clientes que poderiam ser seus.\" |\n| **\"Гү caro\"** | \"Um contrato a mais por mГӘs jГЎ paga o plano. O resto Г© lucro. E a economia em pessoal paga o investimento no primeiro mГӘs.\" |\n| **\"HubSoft jГЎ faz isso\"** | \"HubSoft Г© ERP e faturamento. NГЈo qualifica lead, nГЈo coleta documento pelo WhatsApp, nГЈo gera contrato automaticamente. A Aurora Г© o que falta entre o WhatsApp e o HubSoft.\" |\n\n---\n\n*Documento de uso interno. Atualizar conforme novos dados de mercado e feedback do parceiro.*\n"}, {"t": "f", "n": "Case Anonimo", "fn": "case_anonimo.md", "c": "# Case de Sucesso: Automacao Comercial para Provedor Regional\n\n**AuroraISP | Modulo Comercial em Producao**\n\n---\n\n## O Provedor\n\nProvedor regional do Nordeste com **30.000 clientes ativos**, operacao consolidada e equipe comercial estruturada. Utiliza o HubSoft como ERP principal.\n\n---\n\n## 1. O Desafio\n\nO provedor recebia cerca de **1.000 leads por mes** via WhatsApp. Todo o processo comercial era manual e dependia de uma equipe de **8 pessoas** para dar conta do volume.\n\n**Os problemas eram claros:**\n\n- **Leads perdidos no WhatsApp.** Conversas se misturavam, mensagens ficavam sem resposta e ninguem sabia quantos leads estavam parados sem atendimento.\n- **Coleta de documentos por mensagem.** O vendedor pedia CPF, comprovante de endereco e foto do documento um por um, por chat. Documentos se perdiam, vinham errados e precisavam ser solicitados novamente.\n- **Contratos gerados manualmente.** Cada contrato era montado a mao, com erros frequentes de dados e retrabalho constante.\n- **Cadastro no HubSoft feito a mao.** Apos a venda, alguem precisava acessar o ERP e digitar todos os dados do cliente. Isso gerava atrasos na ativacao e erros de cadastro.\n- **Zero visibilidade.** O dono e o gerente nao tinham nenhum dado confiavel sobre o funil. Nao sabiam quantos leads entraram, quantos converteram, onde estavam os gargalos.\n\nO resultado: um processo lento, caro e fragil, onde o crescimento do provedor dependia de contratar mais gente.\n\n---\n\n## 2. A Solucao\n\nO provedor implantou o **modulo Comercial da AuroraISP**, que automatizou todo o fluxo do lead ate a ativacao no HubSoft.\n\n**O que foi entregue:**\n\n- **Qualificacao automatica via WhatsApp.** O bot da Aurora recebe o lead, faz as perguntas iniciais (endereco, plano de interesse, viabilidade) e qualifica antes de passar ao vendedor.\n- **Coleta inteligente de documentos.** O sistema solicita, recebe e valida os documentos automaticamente. Sem ir e vir de mensagens, sem perda de arquivos.\n- **Geracao automatica de contrato.** Com os dados validados, o contrato e gerado e enviado para assinatura digital sem intervencao manual.\n- **Ativacao direta no HubSoft.** Apos a assinatura, o cadastro do cliente e criado automaticamente no ERP, com todos os dados corretos.\n- **Dashboard em tempo real.** O gestor acompanha leads, conversoes, tempo medio de atendimento e performance de cada vendedor em um painel unico.\n\nA implantacao foi feita pela equipe da AuroraISP, sem necessidade de desenvolvimento interno pelo provedor.\n\n---\n\n## 3. Os Resultados\n\n| Metrica | Antes | Depois |\n|---------|-------|--------|\n| Equipe comercial | **8 pessoas** | **2 pessoas** |\n| Leads atendidos/mes | ~1.000 (com perda) | **1.000** (100% rastreados) |\n| Vendas digitais/mes | Sem controle | **400 vendas/mes** |\n| Ticket medio | R$ 99,90 | R$ 99,90 |\n| Receita digital mensal | Sem medicao | **R$ 39.960/mes** |\n| Tempo de cadastro no HubSoft | Manual (horas) | **Automatico (minutos)** |\n| Visibilidade do funil | Nenhuma | **Tempo real** |\n\n### Impacto financeiro direto\n\n- **Reducao de 6 posicoes** na equipe comercial (de 8 para 2).\n- **Economia anual de R$ 284.400** em custos de pessoal.\n- **400 vendas digitais por mes** com rastreabilidade completa.\n- **R$ 39.960/mes em receita digital** passando pelo sistema com controle total.\n\n---\n\n## 4. Depoimento\n\n> \"Antes a gente nao sabia nem quantos leads estavam parados. Hoje, com duas pessoas, a gente vende mais do que vendia com oito. O sistema faz o trabalho pesado e a equipe foca no que importa: fechar a venda.\"\n>\n> **Gerente de Operacoes** | Provedor regional do Nordeste\n\n---\n\n## 5. Por que a AuroraISP\n\n**Integracao nativa com HubSoft.** A Aurora e a unica plataforma que conecta o fluxo comercial diretamente ao HubSoft, sem gambiarras, sem planilhas intermediarias, sem digitacao manual.\n\n**Automacao de ponta a ponta.** Do primeiro contato no WhatsApp ate a ativacao do cliente no ERP, o processo roda com minima intervencao humana. O vendedor atende. A Aurora faz o resto.\n\n**Visibilidade real.** Dashboard com dados de verdade: leads, conversoes, gargalos, performance por vendedor. O gestor toma decisao com base em numeros, nao em achismo.\n\n**ROI comprovado.** Com economia de quase R$ 300.000 por ano so em pessoal, o retorno sobre o investimento se paga nos primeiros dias de operacao.\n\n---\n\n*AuroraISP. Vende mais. Perde menos. Fideliza sempre.*\n\n*Saiba mais em aurorahub.com.br*\n"}, {"t": "f", "n": "Demo Deck Apoio Estrutura", "fn": "demo_deck_apoio_estrutura.md", "c": "# Deck de Apoio вҖ” AuroraISP\n**Formato:** 10 slides PPT (16:9) exportado em PDF\n**Uso:** Antes ou depois da demo ao vivo. Apoio, formalizaГ§ГЈo e proposta.\n**Objetivo:** O prospect entende o produto, vГӘ o ROI e tem tudo que precisa para decidir.\n\n---\n\n## Slide 1 вҖ” Capa\n\n**Layout:** fundo dark, centralizado\n\n**Logo:** [inserir quando disponГӯvel]\n\n**TГӯtulo:**\n> AuroraISP\n\n**SubtГӯtulo:**\n> Hub de tecnologia com IA para provedores de internet.\n\n**Tagline:**\n> Vende mais. Perde menos. Fideliza sempre.\n\n---\n\n## Slide 2 вҖ” O Problema\n\n**Layout:** 4 cards em linha, fundo claro\n\n**TГӯtulo:**\n> O que custa caro no seu provedor hoje\n\n**Card 1 вҖ” Lead perdido no WhatsApp**\n> O cliente pergunta o preГ§o e desaparece. Sem acompanhamento automГЎtico, a venda esfria antes de acontecer.\n\n**Card 2 вҖ” Documentos no caos**\n> CPF no chat, foto borrada, processo travado. A burocracia mata vendas que jГЎ estavam feitas.\n\n**Card 3 вҖ” AtivaГ§ГЈo manual**\n> Depois do contrato, alguГ©m lanГ§a tudo no sistema Г  mГЈo. Retrabalho em cada venda, todo dia.\n\n**Card 4 вҖ” Time superdimensionado**\n> Muitas pessoas para um volume que a tecnologia resolveria com muito menos.\n\n---\n\n## Slide 3 вҖ” A SoluГ§ГЈo\n\n**Layout:** fundo dark, texto centralizado com destaque visual\n\n**TГӯtulo:**\n> AuroraISP вҖ” do lead ao cliente fidelizado com inteligГӘncia.\n\n**Texto:**\n> A Aurora automatiza o fluxo comercial do provedor do inГӯcio ao fim, com integraГ§ГЈo nativa e profunda ao HubSoft. TrГӘs mГіdulos que cobrem toda a jornada: atraГ§ГЈo, conversГЈo e retenГ§ГЈo.\n\n**Destaque:**\n> IntegraГ§ГЈo nativa com HubSoft. Nenhum concorrente faz isso.\n\n---\n\n## Slide 4 вҖ” MГіdulo Comercial\n\n**Layout:** fluxo visual + lista de funcionalidades, fundo claro\n\n**TГӯtulo:**\n> Comercial вҖ” automaГ§ГЈo do fluxo de vendas\n\n**Status:** вң… DisponГӯvel\n\n**Fluxo:**\n```\nLead no WhatsApp вҶ’ Bot qualifica вҶ’ Coleta documentos вҶ’ Gera contrato вҶ’ Ativa no HubSoft\n```\n\n**Funcionalidades:**\n> Bot de qualificaГ§ГЈo com IA. Coleta automГЎtica de documentos. GeraГ§ГЈo de contrato. AtivaГ§ГЈo direta no HubSoft. CRM Kanban com pipeline em tempo real (plano Pro).\n\n**Resultado:**\n> O lead entra, o processo acontece e o cliente Г© ativado. Sem intervenГ§ГЈo manual em nenhuma etapa.\n\n---\n\n## Slide 5 вҖ” MГіdulo Marketing\n\n**Layout:** 3 blocos, fundo dark\n\n**TГӯtulo:**\n> Marketing вҖ” motor de automaГ§ГЈo do hub\n\n**Status:** Em breve\n\n**Bloco 1 вҖ” WhatsApp e e-mail**\n> Disparos segmentados com rГ©guas padrГЈo prontas para o setor de ISP. Basta ativar e personalizar.\n\n**Bloco 2 вҖ” Fluxos de automaГ§ГЈo**\n> NutriГ§ГЈo de leads frios, reativaГ§ГЈo de cancelados, follow-up de documentos, upsell de plano. Tudo automГЎtico.\n\n**Bloco 3 вҖ” TrГЎfego pago com IA**\n> Campanhas no Facebook e Google otimizadas por inteligГӘncia artificial, com relatГіrios de atribuiГ§ГЈo por canal.\n\n---\n\n## Slide 6 вҖ” MГіdulo CS\n\n**Layout:** 3 blocos, fundo dark\n\n**TГӯtulo:**\n> CS вҖ” retenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda\n\n**Status:** Em breve\n\n**Bloco 1 вҖ” Clube de BenefГӯcios**\n> Streaming, antivГӯrus, rastreamento veicular, plano de saГәde e mais. O cliente permanece pelo serviГ§o e pelo clube.\n\n**Bloco 2 вҖ” PrevenГ§ГЈo de churn**\n> IA identifica clientes com risco de cancelamento antes do cancelamento. O time age antes de perder o cliente.\n\n**Bloco 3 вҖ” NPS e upsell**\n> Pesquisa de satisfaГ§ГЈo automГЎtica. Clientes promotores sГЈo convidados a indicar. Clientes satisfeitos recebem oferta de upgrade.\n\n---\n\n## Slide 7 вҖ” Case de ProduГ§ГЈo\n\n**Layout:** nГәmeros grandes em destaque, fundo dark\n\n**TГӯtulo:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**SubtГӯtulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**MГ©tricas:**\n- **1.000** leads por mГӘs\n- **400** vendas digitais por mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Texto de apoio:**\n> 8 pessoas atendiam 1.000 leads por mГӘs. Hoje 2 pessoas dГЈo conta do mesmo volume. As outras 2 viraram backoffice estratГ©gico. FunГ§ГЈo que antes nГЈo existia. NГЈo Г© promessa. Гү o sistema que vocГӘ acabou de conhecer.\n\n---\n\n## Slide 8 вҖ” PrecificaГ§ГЈo\n\n**Layout:** 3 colunas, fundo claro\n\n**TГӯtulo:**\n> Investimento вҖ” MГіdulo Comercial\n\n**Tabela:**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| UsuГЎrios | AtГ© 2 | AtГ© 5 | Ilimitado |\n| Funcionalidades | Essenciais | Completas | Completas + IA e CRM Kanban |\n| Suporte | Standard | Standard | Prior
