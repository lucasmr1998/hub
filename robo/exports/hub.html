TV, CAC\n- Integração com os fluxos de atendimento já existentes\n\n### Futuro: Opção B (Onboarding) + Opção D (Portal)\n- Onboarding self-service\n- Portal do cliente com billing, documentação\n\n---\n\n## Princípio\n\nA Aurora usa o mesmo sistema que vende. Os módulos de Comercial e CS do próprio produto servem para gerenciar os clientes da Aurora. Isso garante que o produto funciona e que a equipe conhece cada detalhe.\n\n---\n\n## Próximos passos\n\n1. Definir os fluxos de atendimento internos da Aurora\n2. Estruturar o CRM para pipeline de provedores\n3. Criar tenant \"Aurora HQ\" para uso interno\n4. Configurar os estágios do pipeline (Lead > Qualificado > Demo > Trial > Ativo > Churn)\n5. Definir os tipos de ticket de suporte\n6. Implementar sistema de tickets\n"}, {"t": "f", "n": "Gtm Esteira Comercial 27 03 2026", "fn": "gtm_esteira_comercial_27-03-2026.md", "c": "# GTM — Esteira Comercial, Precificação e Materiais\n\n**Data:** 27/03/2026\n**Participantes:** CEO, PMM (Claude)\n**Continuação de:** gtm_precificacao_26-03-2026.md\n\n---\n\n## Contexto\n\nSessão focada em finalizar a precificação, estruturar os materiais de vendas, definir a esteira comercial completa e criar a régua de conversão do trial.\n\n---\n\n## Principais pontos discutidos\n\n- Escada de preços 1:2:3,5 para os três tiers (Starter/Start/Pro)\n- Valores finais de mensalidade e transacional por módulo\n- Simulações de custo total por porte de ISP\n- Trial 14 dias exclusivo para HubSoft. Comissão do sócio: 30% do lucro líquido\n- Estrutura de materiais de vendas (4 decks + one-pager)\n- Organização da pasta exports/ com drafts por categoria\n- Fluxo comercial completo com 7 etapas\n- Diagnóstico do provedor como etapa formal antes da demo\n- Régua de trial com dois trilhos (ativo e inativo) baseada em comportamento\n- Oferta especial reservada para pós-trial (régua de recuperação)\n- Organização de tasks em backlog e finalizadas\n\n---\n\n## Decisões tomadas\n\n| Decisão | Detalhe |\n|---------|---------|\n| Escada de preços | 1:2:3,5 por módulo |\n| Comercial | R$397 / R$797 / R$1.397 + R$7/venda |\n| Marketing | R$297 / R$597 / R$997 + R$0,05/contato/mês |\n| CS | R$247 / R$497 / R$897 + R$0,15/cliente ativo/mês |\n| Trial | 14 dias gratuitos exclusivo para HubSoft |\n| Comissão do sócio | 30% do lucro líquido |\n| Oferta de fechamento | Reservada para pós-trial, não durante os 14 dias |\n| Régua de trial | Dois trilhos: ativo (usou) e inativo (não usou) |\n| Responsável pela régua | PMM executa. Parceiro entra no D+10 e D+12 |\n| Réguas padrão | Movidas de GTM/ para docs/PRODUTO/ |\n| Diagnóstico | Etapa formal antes da demo. Typeform (inbound) e script WhatsApp (outbound) |\n\n---\n\n## Documentos criados ou atualizados\n\n| Documento | Status |\n|-----------|--------|\n| docs/GTM/08-PRECIFICACAO.md | ✅ Aprovado |\n| docs/GTM/09-ENABLEMENT.md | 🔧 Atualizado |\n| docs/GTM/10-ROADMAP_GTM.md | 🔧 Atualizado com datas |\n| docs/GTM/11-MATERIAIS_LANCAMENTO.md | ✅ Criado |\n| docs/GTM/12-FLUXO_COMERCIAL.md | ✅ Criado |\n| docs/GTM/13-DIAGNOSTICO.md | ✅ Criado |\n| docs/PRODUTO/01-REGUAS_PADRAO.md | ✅ Movido de GTM |\n| exports/drafts/apresentacao/ | ✅ 4 estruturas de deck criadas |\n| exports/drafts/scripts_vendas/diagnostico_whatsapp.md | ✅ Criado |\n| exports/drafts/email/regua_trial_estrutura.md | ✅ Criado |\n| CLAUDE.md | ✅ Uso proativo dos agentes adicionado |\n\n---\n\n## Status das tarefas\n\n| Task | Status | Prioridade |\n|------|--------|------------|\n| Criar logo da AuroraISP | 🔴 Backlog | Alta — desbloqueador principal |\n| Materiais de vendas (PPTs e case PDF) | 🟡 Backlog | Alta — aguarda logo |\n| Lançamento digital (landing page, redes) | 🟡 Backlog | Média — aguarda logo |\n| Mapeamento de grupos de provedores | ⏳ Backlog | Média — responsável: parceiro |\n| Trilha de treinamento do parceiro | ⏳ Backlog | Alta — aguarda multi-tenancy (30/03) |\n| Textos da régua de trial | ⏳ Backlog | Alta |\n| Régua de recuperação pós-trial | ⏳ Backlog | Média |\n| Processo pós-ativação | ⏳ Backlog | Média |\n| CRM do parceiro | ⏳ Backlog | Média |\n| Conversão do trial | ✅ Finalizada | — |\n\n---\n\n## Próximos passos prioritários\n\n1. CEO criar logo (desbloqueador de 5 materiais)\n2. Refatoração completa do projeto — até 27/03\n3. Multi-tenancy pronto — até 30/03\n4. Parceiro em campo a partir de 31/03\n5. Escrever textos da régua de trial\n6. Criar Typeform do diagnóstico\n"}, {"t": "f", "n": "Gtm Fundacao 26 03 2026", "fn": "gtm_fundacao_26-03-2026.md", "c": "# GTM Fundação — AuroraISP\n\n**Data:** 26/03/2026\n**Participantes:** CEO, PMM (Claude)\n**Duração:** Sessão longa\n\n---\n\n## Contexto\n\nPrimeira sessão de construção do GTM da AuroraISP. Partimos do zero, com base nos projetos existentes (`robo/` e `megaroleta/`) e em documentos de uma conversa anterior com IA. O objetivo foi construir a fundação estratégica do hub de tecnologia para provedores de internet.\n\n---\n\n## Principais pontos discutidos\n\n- Definição da AuroraISP como hub de tecnologia com IA para provedores de internet\n- Estrutura de 3 módulos: Comercial, Marketing e CS\n- Marketing como motor de automação do hub (réguas padrão prontas)\n- CRM Kanban como parte do Comercial Pro, não produto separado\n- Clube de Benefícios como parte do módulo CS\n- Modelo de precificação: mensalidade por módulo (Start/Pro) + transacional variável\n- Criação de estrutura de agentes por função (13 agentes)\n- Tom de voz: acessível, próximo, direto. Fala a língua do provedor.\n- Regra de escrita: sem traço como pontuação\n- Estrutura de docs em `docs/GTM/`, `docs/BRAND/`, `docs/AGENTES/`\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| Nome do módulo de vendas: Comercial | Mais claro e direto que \"Robô de Vendas\" |\n| CRM Kanban dentro do Comercial Pro | Depende dos dados do Comercial. Não faz sentido separado. |\n| Clube de Benefícios dentro do CS | CS é mais amplo e completo do que só o clube |\n| Marketing como motor de automação | Todas as réguas rodam via Marketing. CS e Comercial consomem os fluxos. |\n| Tagline: Vende mais. Perde menos. Fideliza sempre. | Mapeia os 3 módulos sem precisar explicar |\n| Subtítulo: Do lead ao cliente fidelizado com inteligência. | Complementa a tagline com a jornada e o diferencial de IA |\n| Paleta oficial: dark mode (#0F172A, #2563EB, gradiente azul/ciano) | Extraída do site auroraisp.com.br (site do CEO) |\n| Padrão de interface: light mode, dark automático via sistema | Site será light. App respeita preferência do sistema. |\n| Transacional Marketing: tamanho da base de leads | Modelo recorrente que escala com o crescimento da base |\n| Transacional Comercial: venda finalizada no ERP | Alinha receita da Aurora com conversão do provedor |\n| Transacional CS: cliente ativo no clube | Modelo recorrente mensal |\n\n---\n\n## Dados do case de produção (anônimo)\n\n| Métrica | Valor |\n|---------|-------|\n| Clientes ativos do provedor | 30.000 |\n| Leads por mês | 1.000 |\n| Vendas digitais por mês | 400 |\n| Ticket médio | R$ 99,90 |\n| Time antes | 8 pessoas |\n| Time de atendimento hoje | 2 pessoas |\n| Backoffice criado | 2 pessoas |\n| Custo por pessoa (com encargos) | ~R$ 3.950/mês |\n| Economia anual em pessoal | R$ 284.400 |\n\n---\n\n## Documentos criados\n\n| Documento | Status |\n|-----------|--------|\n| docs/GTM/00-README.md | ✅ |\n| docs/GTM/01-PESQUISA_MERCADO.md | ✅ |\n| docs/GTM/02-ICP.md | ✅ |\n| docs/GTM/03-CONCORRENTES.md | ✅ |\n| docs/GTM/04-PROPOSTA_VALOR.md | ✅ |\n| docs/GTM/05-POSICIONAMENTO.md | ✅ v2.0 |\n| docs/GTM/06-MENSAGENS_CHAVE.md | ✅ |\n| docs/GTM/07-CANAIS.md | 🟡 Em revisão |\n| docs/GTM/08-PRECIFICACAO.md | 🟡 Faltam valores |\n| docs/GTM/09-ENABLEMENT.md | 🟡 Faltam materiais |\n| docs/GTM/10-ROADMAP_GTM.md | 🔧 Faltam datas e metas |\n| docs/GTM/11-MARKETING_REGUAS_PADRAO.md | ✅ 16 réguas mapeadas |\n| docs/BRAND/07-TOM_DE_VOZ.md | ✅ |\n| docs/BRAND/08-BRANDBOOK.md | 🟡 Aguardando logo |\n| docs/AGENTES/ | ✅ 13 agentes criados |\n| CLAUDE.md | ✅ Atualizado |\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Criar logo da AuroraISP | CEO |\n| Definir valores das mensalidades e transacionais | CEO |\n| Confirmar grupos de WhatsApp/Telegram de provedores | CEO |\n| Confirmar se há contato iniciado com HubSoft | CEO |\n| Definir modelo de comissão do parceiro comercial | CEO |\n| Responder perguntas em aberto do 07-CANAIS.md | CEO |\n\n---\n\n## Próximos passos\n\n- [ ] Continuar revisão do 07-CANAIS.md\n- [ ] Revisar 08-PRECIFICACAO.md (com valores quando disponíveis)\n- [ ] Revisar 09-ENABLEMENT.md\n- [ ] Revisar 10-ROADMAP_GTM.md com datas reais\n- [ ] Criar logo e atualizar brandbook\n- [ ] Criar one-pager para o parceiro comercial\n"}, {"t": "f", "n": "Gtm Precificacao 26 03 2026", "fn": "gtm_precificacao_26-03-2026.md", "c": "# GTM — Precificação, Enablement e Roadmap\n\n**Data:** 26/03/2026\n**Participantes:** CEO, PMM (Claude)\n**Duração:** Sessão média (continuação de gtm_fundacao_26-03-2026.md)\n\n---\n\n## Contexto\n\nContinuação da sessão de fundação do GTM. Foco na definição de precificação completa, atualização do enablement com informações do parceiro, fechamento do roadmap com datas reais e reorganização da documentação de produto.\n\n---\n\n## Principais pontos discutidos\n\n- Adição do plano Starter abaixo do Start, criando 3 tiers por módulo\n- Referência ao modelo HubSpot para definir escada de preços (1:2:3,5)\n- Definição dos valores de mensalidade e transacionais por módulo\n- Simulações de custo total por porte de ISP (pequeno, médio, grande)\n- Trial de 14 dias exclusivo para provedores HubSoft\n- Comissão do sócio: 30% do lucro líquido\n- Demo ao vivo como formato principal (não vídeo gravado)\n- Parceiro tem processo próprio mas precisa de treinamento técnico\n- Réguas padrão são produto, não GTM — movidas para `docs/PRODUTO/`\n- SVAs mapeados para a régua CS05\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| 3 tiers: Starter / Start / Pro | Starter para ISPs pequenos com barreira de entrada mínima |\n| Escada 1:2:3,5 | Salto para Pro menor do que dobrar, facilita conversão |\n| Comercial: R$397 / R$797 / R$1.397 | Produto âncora, maior valor percebido |\n| Marketing: R$297 / R$597 / R$997 | Ligeiramente abaixo do Comercial |\n| CS: R$247 / R$497 / R$897 | Mais acessível, clube tem custo para o ISP manter |\n| Transacional Comercial: R$7/venda | Alinha receita Aurora com conversão do provedor |\n| Transacional Marketing: R$0,05/contato/mês | Por base acumulada, escala com crescimento |\n| Transacional CS: R$0,15/cliente ativo no clube | Mercado pratica R$0,10 a R$0,20 |\n| Trial 14 dias só para HubSoft | ICP perfeito, integração nativa, resultado rápido |\n| Comissão do sócio: 30% do lucro líquido | Modelo societário já definido |\n| Demo ao vivo | Parceiro conduz, Aurora apoia nas primeiras |\n| Réguas padrão em `docs/PRODUTO/` | São especificação de produto, não estratégia GTM |\n| Fase 0 encerra 30/03, refatoração até 27/03 | Multi-tenancy crítico para virar SaaS |\n| Meta Fase 1: 15 clientes até junho/2026 | Primeiro trimestre de operação |\n\n---\n\n## Valores fechados\n\n### Mensalidades\n\n| Módulo | Starter | Start | Pro |\n|--------|---------|-------|-----|\n| Comercial | R$397 | R$797 | R$1.397 |\n| Marketing | R$297 | R$597 | R$997 |\n| CS | R$247 | R$497 | R$897 |\n\n### Transacionais\n\n| Módulo | Valor | Evento |\n|--------|-------|--------|\n| Comercial | R$7 | Por venda finalizada no ERP |\n| Marketing | R$0,05 | Por contato na base/mês |\n| CS | R$0,15 | Por cliente ativo no clube/mês |\n\n### Simulação stack completo\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Total/mês | R$1.241 | R$3.491 | R$7.891 |\n| ROI (só Comercial) | 2,4x | 4,3x | 5x |\n\n---\n\n## Documentos atualizados\n\n| Documento | Status |\n|-----------|--------|\n| docs/GTM/08-PRECIFICACAO.md | ✅ Aprovado |\n| docs/GTM/09-ENABLEMENT.md | 🔧 Em construção (aguarda logo e treinamento) |\n| docs/GTM/10-ROADMAP_GTM.md | 🔧 Em construção (Fases 2 e 3 sem data) |\n| docs/PRODUTO/01-REGUAS_PADRAO.md | 🔧 Em construção (movido de GTM/11) |\n| CLAUDE.md | ✅ Atualizado com nova pasta PRODUTO/ |\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Criar logo da AuroraISP | CEO |\n| Definir tempo de atraso que aciona churn (CS03) | CEO |\n| Mapear aprovações humanas por fluxo nas réguas | CEO + PMM |\n| Definir datas e metas das Fases 2 e 3 do roadmap | CEO |\n| Treinar parceiro comercial (após Fase 0) | CEO + PMM |\n| Alinhar estratégias de prospecção com o parceiro | CEO + Parceiro |\n\n---\n\n## Próximos passos\n\n- [ ] Refatoração completa do projeto até 27/03\n- [ ] Multi-tenancy pronto até 30/03\n- [ ] Parceiro em campo a partir de 31/03\n- [ ] Criar one-pager e deck (aguarda logo)\n- [ ] Criar trilha de treinamento técnico do parceiro\n"}, {"t": "f", "n": "Gtm Visao Geral 27 03 2026", "fn": "gtm_visao_geral_27-03-2026.md", "c": "# GTM — Visão Geral e Evolução\n\n**Data:** 27/03/2026\n**Participantes:** CEO, PMM (Claude)\n\n---\n\n## Contexto\n\nAo final da segunda sessão de construção do GTM, fizemos uma revisão completa de tudo que foi construído nas duas sessões (26/03 e 27/03/2026).\n\n---\n\n## Evolução em 2 sessões\n\n### Sessão 1 — 26/03/2026\nFundação completa do GTM: posicionamento, ICP, concorrentes, proposta de valor, mensagens chave, tom de voz, brandbook, canais, primeiros rascunhos de precificação e enablement. Criação da estrutura de agentes e do workspace de documentação.\n\n### Sessão 2 — 27/03/2026\nPrecificação aprovada, esteira comercial definida, materiais estruturados, réguas de nurturing especificadas.\n\n---\n\n## Estado atual do GTM\n\n### Estratégia\n\n| Área | Status |\n|------|--------|\n| Posicionamento | ✅ Sólido |\n| ICP — 4 personas | ✅ Sólido |\n| Análise de concorrentes | ✅ Sólido |\n| Proposta de valor | ✅ Sólido |\n| Mensagens chave | ✅ Sólido |\n| Tom de voz — 4 pilares | ✅ Sólido |\n| Canais — 6 canais mapeados | ✅ Sólido |\n| Precificação — Starter/Start/Pro + transacional | ✅ Aprovado |\n\n### Comercial\n\n| Área | Status |\n|------|--------|\n| Fluxo comercial — 7 etapas | ✅ Sólido |\n| Diagnóstico do provedor — 5 blocos | ✅ Sólido |\n| Script de diagnóstico WhatsApp | ✅ Pronto |\n| Régua de trial — dois trilhos D+0 a D+14 | ✅ Estrutura pronta |\n| Régua de recuperação pós-trial — D+1 a D+30 | ✅ Estrutura pronta |\n| Enablement do parceiro | 🟡 Em construção |\n\n### Materiais\n\n| Material | Status |\n|----------|--------|\n| 5 estruturas de deck | ✅ Roteiros prontos |\n| Réguas padrão do produto — 16 fluxos | ✅ Especificado |\n| Materiais visuais (PPT/PDF) | ⏳ Aguarda logo |\n| Case anônimo PDF | ⏳ A criar |\n| Typeform de diagnóstico | ⏳ A criar |\n\n---\n\n## Precificação aprovada\n\n| Módulo | Starter | Start | Pro | Transacional |\n|--------|---------|-------|-----|--------------|\n| Comercial | R$397 | R$797 | R$1.397 | R$7/venda |\n| Marketing | R$297 | R$597 | R$997 | R$0,05/contato/mês |\n| CS | R$247 | R$497 | R$897 | R$0,15/cliente ativo/mês |\n\n---\n\n## Réguas definidas\n\n| Régua | Estrutura | Textos |\n|-------|-----------|--------|\n| Conversão do trial | ✅ Pronta | ⏳ Backlog |\n| Recuperação pós-trial | ✅ Pronta | ⏳ Backlog |\n\n---\n\n## Bloqueadores para lançar\n\n| Bloqueador | Responsável | Prazo |\n|------------|-------------|-------|\n| Logo | CEO | — |\n| Multi-tenancy | Dev | 30/03/2026 |\n| Textos das réguas | PMM | Backlog |\n| Materiais visuais | PMM | Após logo |\n| Treinamento do parceiro | PMM + CEO | Após multi-tenancy |\n\n---\n\n## Conclusão\n\nEm 2 sessões saímos do zero para uma estratégia GTM completa, esteira comercial definida e materiais estruturados. O bloqueio agora é execução, não estratégia.\n"}, {"t": "f", "n": "Inbox Atendimento Suporte 03 04 2026", "fn": "inbox_atendimento_suporte_03-04-2026.md", "c": "# Módulo Inbox de Atendimento/Suporte — 03/04/2026\n\n**Data:** 03/04/2026\n**Participantes:** Lucas (Dev), Claude (Tech Lead / PM)\n**Duração:** Sessão intensiva (~4h)\n\n---\n\n## Contexto\n\nO sistema da AuroraISP já tinha um motor de fluxos automatizados (`apps/comercial/atendimento/`) e um sistema de tickets (`apps/suporte/`), mas não tinha um inbox de conversas em tempo real para os agentes atenderem leads/clientes. A tarefa do backlog \"Módulo Atendimento/Suporte estilo Chatwoot\" estava aguardando planejamento.\n\n---\n\n## Principais pontos discutidos\n\n- Diferença entre o módulo de fluxos existente (bot) e o inbox necessário (conversas humanas)\n- Arquitetura: novo app `apps/inbox/` top-level (cross-cutting, não aninhado)\n- Posicionamento na navegação: dentro do menu Suporte (não como módulo separado na topbar)\n- Dois canais: WhatsApp (via webhook/N8N) e Chat Widget (embeddable JS)\n- Equipes, filas e distribuição automática (round-robin, menor carga)\n- FAQ/Base de conhecimento para o widget\n- Migração de SQLite para PostgreSQL local (aurora_dev)\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| App `inbox/` como top-level | Cross-cutting: conecta leads, tickets, CRM, automações |\n| Inbox dentro do menu Suporte | Faz parte do mesmo fluxo de atendimento, não justifica módulo separado na topbar |\n| WebSocket com fallback polling | Channels para real-time, polling 5s como fallback robusto |\n| InMemoryChannelLayer em dev | Evita dependência de Redis em dev. Produção usa Redis |\n| Daphne removido do INSTALLED_APPS em dev | Bugs de logging no Windows. Adicionado só em produção |\n| Widget sem iframe | Injeta DOM direto na página, evita problemas de X_FRAME_OPTIONS e CSP |\n| API pública sem login | Auth via token público UUID no query param + validação de Origin |\n| FAQ novo (não reutilizar megaroleta) | megaroleta é legacy e read-only conforme CLAUDE.md |\n| PostgreSQL local (aurora_dev) | SQLite tem limitações. Banco `aurora_dev` com user `postgres` já existia |\n| Agentes em múltiplas equipes | Diferente do CRM (1:1), inbox usa M2M via MembroEquipeInbox |\n\n---\n\n## O que foi implementado\n\n### Sessão 1: Inbox Base (5 phases)\n1. **Phase 1:** 6 models core (CanalInbox, Conversa, Mensagem, RespostaRapida, EtiquetaConversa, NotaInternaConversa) + admin + migrations\n2. **Phase 2:** API webhook genérica (receber/enviar mensagens, status de entrega) + services\n3. **Phase 3:** Inbox UI three-panel (lista conversas, chat, contexto do lead) + 13 APIs internas AJAX\n4. **Phase 4:** WebSocket com Django Channels + InMemoryChannelLayer + Daphne\n5. **Phase 5:** Integração com automações (3 novos eventos: mensagem_recebida, conversa_aberta, conversa_resolvida)\n\n### Sessão 2: Equipes, Filas, Distribuição (5 phases)\n1. **Phase 1:** 8 models novos (EquipeInbox, MembroEquipeInbox, PerfilAgenteInbox, FilaInbox, RegraRoteamento, HistoricoTransferencia, HorarioAtendimento, ConfiguracaoInbox) + 2 FKs na Conversa\n2. **Phase 2:** Engine de distribuição automática (round-robin, menor carga, manual) + verificação de horário + status do agente\n3. **Phase 3:** Página de configurações com 7 abas (equipes, filas, respostas, etiquetas, canais, horário, geral)\n4. **Phase 4:** Transferência de conversas (para agente/equipe/fila + modal no chat)\n5. **Phase 5:** Dashboard de métricas (5 KPIs, gráfico Chart.js 30 dias, ranking agentes)\n\n### Sessão 3: Widget + FAQ (4 phases)\n1. **Phase 1-2:** 3 models (CategoriaFAQ, ArtigoFAQ, WidgetConfig) + abas FAQ e Widget na config\n2. **Phase 3:** API pública (7 endpoints sem login, auth via token, CORS manual) + `receber_mensagem_widget()`\n3. **Phase 4:** Widget JS (`aurora-chat.js`, ~15KB, vanilla, 3 abas: Início/Mensagens/Ajuda)\n4. Widget adicionado ao `base.html` do sistema para testes\n\n---\n\n## Resultado final\n\n- **17 models** no app inbox\n- **26+ endpoints** (internos, N8N, públicos)\n- **3 migrations** aplicadas no PostgreSQL\n- **9 abas** na página de configurações\n- **Dashboard** com métricas e gráfico\n- **Widget JS** embeddable com FAQ\n- **Distribuição automática** com equipes e filas\n- **Integração** com automações, tickets, CRM e leads\n- **60 testes** existentes passando\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Configurar N8N com workflow WhatsApp | Dev/Ops |\n| Instalar Redis para produção (WebSocket) | DevOps |\n| Configurar Daphne + Nginx para WebSocket | DevOps |\n| Criar FAQ real com artigos do provedor | CS |\n| Testar widget em site externo do provedor | Dev |\n| Implementar CSAT (pesquisa de satisfação) | Dev (futuro) |\n\n---\n\n## Próximos passos\n\n- [ ] Configurar N8N para WhatsApp → webhook inbox\n- [ ] Testar o widget embeddado em um site real de provedor\n- [ ] Criar conteúdo de FAQ para o primeiro cliente\n- [ ] Deploy com Redis + Daphne para WebSocket em produção\n- [ ] Refinar UI do inbox baseado em feedback dos atendentes\n"}, {"t": "f", "n": "Multi Tenancy 29 03 2026", "fn": "multi_tenancy_29-03-2026.md", "c": "# Multi-tenancy e Produto — 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, CTO\n**Duração:** ~2 horas (segunda sessão do dia)\n\n---\n\n## Contexto\n\nContinuação da sessão de refatoração em apps. Após criar a estrutura de apps e migrar os models, o foco foi implementar multi-tenancy funcional e as features de produto necessárias para aceitar o primeiro cliente.\n\n---\n\n## Principais pontos implementados\n\n### Multi-tenancy\n- Models migrados para novos apps com `app_label = 'vendas_web'` temporário (para compatibilidade com admin/views legados)\n- `vendas_web/models.py` substituído por re-exports dos novos apps\n- FKs cross-app corrigidas para usar app_labels corretos\n- `TenantManager` com auto-filtro por tenant via thread-local\n- `TenantMixin.save()` auto-preenche tenant no create\n- `all_tenants` como escape hatch para admin/commands\n- Isolamento testado com 3 tenants (Megalink, Provedor Teste, Mega Fibra)\n\n### Produto\n- Command `criar_tenant` para onboarding automatizado (Tenant + User + Perfil + Config)\n- IntegracaoAPI vinculada ao Tenant (cada provedor tem seu HubSoft)\n- Context processor multi-tenant (módulos, planos, cores, logo por tenant)\n- Tela de setup inicial (`/setup/`) com coleta de dados da empresa e credenciais HubSoft\n- Middleware redireciona ao setup se tenant não tem ConfiguracaoEmpresa\n- Controle de módulos na topbar (comercial e marketing condicionais)\n\n### Segurança\n- SECRET_KEY removida do código (variável de ambiente obrigatória)\n- Senha do banco removida (sem fallback)\n- Token Matrix API removido (variável de ambiente)\n- Credenciais HubSoft removidas do setup_hubsoft.py (variáveis de ambiente)\n- DEBUG=False por padrão (opt-in via env)\n- `.env.example` criado\n- IP do servidor removido do ALLOWED_HOSTS\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| `app_label = 'vendas_web'` temporário nos models | Admin e views legados ainda importam de vendas_web. Será removido quando admin migrar |\n| Managers nos models de sistema | ConfiguracaoEmpresa e outros precisam de `all_tenants` para funcionar no context processor |\n| SECRET_KEY vazia no settings base, validação no production | Permite settings_local definir sua própria sem falhar no import |\n| Setup HubSoft opcional | Nem todo provedor usa HubSoft. O setup permite pular |\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Deploy multi-tenancy em produção | Dev |\n| Migração de dados: preencher tenant_id nos registros existentes | Dev |\n| Rotacionar credenciais no servidor (senha DB, SECRET_KEY, token Matrix) | Dev + Ops |\n| Mover views/urls/templates/signals para novos apps | Dev |\n| Remover `app_label = 'vendas_web'` quando admin migrar | Dev |\n| Remover vendas_web após migração completa | Dev |\n\n---\n\n## Próximos passos\n\n- [ ] Deploy em produção (migrations + seed Megalink + preencher tenant_id)\n- [ ] Rotacionar credenciais no servidor\n- [ ] Mover views para novos apps (incremental)\n- [ ] Remover app_label temporário\n- [ ] Testes automatizados para isolamento de tenant\n"}, {"t": "f", "n": "Refatoracao Apps 29 03 2026", "fn": "refatoracao_apps_29-03-2026.md", "c": "# Refatoração em Apps por Módulo — 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, CTO, PM, Tech Lead\n**Duração:** ~2 horas\n\n---\n\n## Contexto\n\nO sistema em produção (`robo/`) concentra 27 models em um único app (`vendas_web`), com 5.349 linhas de models, 7.464 linhas de views e 222 rotas. Isso bloqueia o multi-tenancy e a separação por módulos (Comercial, Marketing, CS) necessária para vender o SaaS.\n\n---\n\n## Principais pontos discutidos\n\n- Análise completa do sistema robo: models, views, urls, análise crítica existente, GTM_PRODUTO.md, GTM_ROADMAP_CRM.md\n- App `crm/` já existia separado com 12 models (referência de qualidade)\n- Definição da estrutura de CRM do parceiro: 5 estágios, qualificação A/B, campos por etapa, critérios de avanço\n- Discussão sobre 3 opções de arquitetura: sub-apps por pasta (A), flat com prefixo (B), módulo como app único (C)\n- Comparativo detalhado entre Opção A e Opção C\n- Decisão pela Opção A: cada domínio é um app Django completo dentro do módulo\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| Opção A (sub-apps por pasta) | Migrations isoladas, ativação/desativação por plano, refatoração incremental, CRM já existe como app separado |\n| 10 apps + 3 módulos futuros (CS) | Reflete os módulos do produto: Sistema (base), Comercial, Marketing, CS |\n| TenantMixin como base | Todos os models herdam tenant FK via mixin abstrato |\n| Migração incremental | Novos apps coexistem com vendas_web durante transição. Sem risco para produção |\n| db_table mantido | Nenhuma tabela do banco muda de nome. Migrations usarão SeparateDatabaseAndState |\n| Permissão de edição no robo/ | CLAUDE.md atualizado para permitir edição do projeto robo |\n\n---\n\n## O que foi implementado\n\n| Item | Status |\n|------|--------|\n| Estrutura `apps/` com 10 apps (96 arquivos) | ✅ |\n| `apps/sistema/` com 7 models (Tenant, PerfilUsuario, 5 configs) + middleware + mixin | ✅ |\n| `apps/integracoes/` copiado do app existente | ✅ |\n| `apps/comercial/crm/` copiado do app existente | ✅ |\n| Scaffold de leads, atendimento, cadastro, viabilidade, campanhas, notificacoes, dashboard | ✅ |\n| Models migrados para todos os novos apps (5.902 linhas total) | ✅ |\n| `settings.py` atualizado com INSTALLED_APPS | ✅ |\n| `urls.py` atualizado (legadas ativas, novas comentadas) | ✅ |\n| Roadmap de produto atualizado com status | ✅ |\n| CRM do parceiro: pipeline 5 estágios, qualificação, campos, critérios | ✅ |\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Atualizar vendas_web/models.py para re-exportar dos novos apps | Dev |\n| Criar migrations com SeparateDatabaseAndState para cada app | Dev |\n| Mover views e urls para cada app | Dev |\n| Ativar novas rotas e desativar legadas | Dev |\n| Mover templates para dentro de cada app | Dev |\n| Atualizar imports em signals, admin, services | Dev |\n| Remover vendas_web após migração completa | Dev |\n| Atualizar FKs cross-app (de vendas_web.X para app_novo.X) | Dev |\n| Segurança: remover credenciais hardcoded | Dev (urgente) |\n\n---\n\n## Próximos passos\n\n- [ ] Atualizar vendas_web/models.py com re-exports dos novos apps\n- [ ] Criar migrations SeparateDatabaseAndState\n- [ ] Mover views por app (começando por leads)\n- [ ] Mover urls por app\n- [ ] Testar localmente com SQLite\n- [ ] Resolver credenciais hardcoded (bloqueador de segurança)\n"}, {"t": "f", "n": "Seguranca Criticos 30 03 2026", "fn": "seguranca_criticos_30-03-2026.md", "c": "# Correção de Vulnerabilidades Críticas de Segurança — 30/03/2026\n\n**Data:** 30/03/2026\n**Participantes:** Dev, Segurança (AppSec)\n**Tipo:** Implementação técnica\n\n---\n\n## Contexto\n\nScan de segurança completo identificou 5 vulnerabilidades críticas, 9 altas e 8 médias. As 5 críticas foram corrigidas nesta sessão.\n\n---\n\n## Correções realizadas\n\n### 1. Credencial HubSoft hardcoded — ✅ Corrigido\n**Arquivo:** `apps/cs/clube/management/commands/testar_pontuacoes.py`\n**O que tinha:** Senha do banco HubSoft em texto plano no código.\n**O que foi feito:** Substituído por `os.environ['HUBSOFT_DB_*']`. Adicionado ao `.env.example`.\n**Ação pendente:** Rotacionar a senha exposta no HubSoft (responsável: admin do provedor).\n\n### 2. Admin exibe senhas (render_value=True) — ✅ Corrigido\n**Arquivo:** `apps/integracoes/admin.py`\n**O que tinha:** `PasswordInput(render_value=True)` mostrava senha e client_secret em texto plano no HTML.\n**O que foi feito:** Removido `render_value=True`. Campos ficam vazios ao editar. Adicionado `clean_password()` e `clean_client_secret()` para manter valor existente se campo vazio.\n\n### 3. Webhook sem validação de token — ✅ Corrigido\n**Arquivos:** `apps/comercial/crm/views.py`, `crm/views.py`\n**O que tinha:** `webhook_hubsoft_contrato()` aceitava qualquer POST, permitindo forjar confirmações de contrato.\n**O que foi feito:**\n- Criado `apps/sistema/decorators.py` com `@webhook_token_required` e `@api_token_required`\n- Decorator valida `Authorization: Bearer <token>` no header\n- Aplicado no webhook do CRM\n- Tokens configuráveis via `WEBHOOK_SECRET_TOKEN` e `N8N_API_TOKEN` no `.env`\n- Tentativas inválidas são logadas\n\n### 4. CRM sem TenantMixin (9 models) — ✅ Corrigido\n**Arquivo:** `apps/comercial/crm/models.py`\n**O que tinha:** 13 models sem FK tenant. Qualquer tenant via dados de outro.\n**O que foi feito:**\n- Adicionado `TenantMixin` em todos os 13 models (PipelineEstagio, EquipeVendas, PerfilVendedor, TagCRM, OportunidadeVenda, HistoricoPipelineEstagio, TarefaCRM, NotaInterna, MetaVendas, SegmentoCRM, MembroSegmento, AlertaRetencao, ConfiguracaoCRM)\n- Migration `0004` gerada e aplicada (SQLite local)\n- Campo tenant nullable para compatibilidade com dados existentes\n- TenantManager (auto-filtro) ativo em todos os models\n\n### 5. 48+ endpoints sem autenticação — ✅ Corrigido\n**Arquivos:** `vendas_web/views.py`, `vendas_web/views_api_atendimento.py`\n**O que tinha:** Todos os endpoints de API usavam `@csrf_exempt` sem autenticação.\n**O que foi feito:**\n- **27 endpoints N8N/externos:** adicionado `@api_token_required` (valida `Authorization: Bearer <N8N_API_TOKEN>`)\n- **21 endpoints do painel:** removido `@csrf_exempt`, adicionado `@login_required`\n- **3 endpoints públicos:** mantidos sem auth (cadastro cliente, upload documento, consulta CEP)\n\n---\n\n## Validação\n\n- `manage.py check` — 0 erros\n- 16 testes de isolamento tenant — todos passando\n- Migration CRM aplicada com sucesso (SQLite local)\n\n---\n\n## Pendências pós-correção\n\n- [ ] Rotacionar senha HubSoft exposta no código (admin do provedor)\n- [ ] Configurar `WEBHOOK_SECRET_TOKEN` e `N8N_API_TOKEN` no `.env` de produção\n- [ ] Atualizar workflows do N8N para enviar `Authorization: Bearer <token>` no header\n- [ ] Deploy das correções em produção\n- [ ] Data migration para popular tenant nos registros existentes do CRM\n\n---\n\n## Arquivos criados/modificados\n\n| Arquivo | Ação |\n|---------|------|\n| `apps/sistema/decorators.py` | **Criado** — decorators webhook_token_required e api_token_required |\n| `apps/sistema/middleware.py` | Atualizado — LoginRequiredMiddleware movido para cá |\n| `apps/sistema/context_processors.py` | **Criado** — empresa_context movido de vendas_web |\n| `apps/integracoes/admin.py` | Corrigido — render_value removido |\n| `apps/comercial/crm/models.py` | Corrigido — TenantMixin em 13 models |\n| `apps/comercial/crm/views.py` | Corrigido — webhook_token_required no webhook |\n| `apps/cs/clube/management/commands/testar_pontuacoes.py` | Corrigido — credenciais via env |\n| `vendas_web/views.py` | Corrigido — auth em 24 endpoints |\n| `vendas_web/views_api_atendimento.py` | Corrigido — auth em 24 endpoints |\n| `.env.example` | Atualizado — HUBSOFT_DB_*, WEBHOOK_SECRET_TOKEN, N8N_API_TOKEN |\n"}, {"t": "f", "n": "Sessao Completa 30 03 2026", "fn": "sessao_completa_30-03-2026.md", "c": "# Sessão Completa de Trabalho — 30/03/2026\n\n**Data:** 30/03/2026\n**Participantes:** Lucas (CEO), Claude (Assistente, PMM, Tech Lead, Segurança AppSec, QA, PM)\n**Tipo:** Sessão de trabalho intensiva (GTM, segurança, documentação)\n\n---\n\n## Resumo Executivo\n\nSessão de trabalho cobrindo GTM, segurança, documentação jurídica e comercial. Saímos de 12 tarefas no backlog para 55 (mapeamento completo) e finalizamos 28 delas no mesmo dia.\n\n---\n\n## 1. Mapeamento do GTM\n\n**Agente: PMM**\n\n- Analisado o checklist GTM existente (42 feitos, 12 parciais, 51 pendentes)\n- Identificadas frentes com zero progresso: enablement do parceiro (0/7), presença digital (0/7), operações e jurídico (0/6)\n- Criadas 15 tarefas novas cobrindo áreas que não tinham mapeamento: desenvolvimento (4), infraestrutura (3), qualidade (2), segurança (2), produto (2), operações (2)\n\n---\n\n## 2. Limpeza de Apps Legados e Imports\n\n**Agente: Tech Lead**\n\nInvestigação revelou que os models já estavam nos apps modulares (refatoração de 29/03). O trabalho real era limpeza:\n\n- Removidos `crm` e `integracoes` legados do INSTALLED_APPS\n- Registrados `apps.comercial.crm`, `apps.integracoes`, `apps.admin_aurora` e 4 apps CS\n- ~40 arquivos com imports atualizados (`vendas_web.models` → `apps.*.models`)\n- Middleware e context_processors movidos de `vendas_web/` para `apps/sistema/`\n- URLs atualizadas (`integracoes.urls` → `apps.integracoes.urls`)\n- settings_local.py corrigido para herdar INSTALLED_APPS do settings.py\n- **16 testes passando, manage.py check OK**\n\n---\n\n## 3. Repositório GitHub\n\nCriado repositório: https://github.com/lucasmr1998/hub\n\n- .gitignore protege .env, SQLite, megaroleta/, robo/ (repos separados)\n- hub.html incluído para preview online\n- Preview: htmlpreview.github.io/?https://github.com/lucasmr1998/hub/blob/main/exports/hub.html\n\n---\n\n## 4. Scan de Segurança Completo\n\n**Agentes: Segurança (AppSec), DevOps, QA**\n\nScan com 3 agentes em paralelo identificou:\n- 5 vulnerabilidades críticas\n- 9 altas\n- 8 médias\n- 3 baixas\n\n### Críticas resolvidas:\n1. **Credencial HubSoft hardcoded** → `os.environ[]`\n2. **Admin exibe senhas** → `render_value=True` removido\n3. **Webhook sem token** → decorator `@webhook_token_required` criado\n4. **CRM sem TenantMixin** → 13 models com TenantMixin, migration gerada\n5. **48+ endpoints sem auth** → 27 com `@api_token_required`, 21 com `@login_required`, 3 públicos\n\n### Altas resolvidas:\n6. **IDOR nas APIs** → helper `get_tenant_object_or_404`\n7. **PII em print()** → 35+ prints removidos, logging estruturado\n8. **User sem filtro tenant** → 5 views do CRM corrigidas\n9. **Admin Aurora** → `superuser_required` + `_user_can_access_tenant`\n10. **Clube auth** → 4 endpoints com filtro tenant\n11. **Uploads sem isolamento** → `tenant_upload_path` em 6 campos\n\n### Médias resolvidas:\n12. **XSS mark_safe** → escape de HTML em JSON, format_html corrigido (9 funções)\n13. **API dados sensíveis** → login, senha, mac_addr, ipv4 removidos dos responses\n14. **ALLOWED_HOSTS** → migrado para env var, IP e localhost removidos\n15. **HTTPS/cookies** → SECURE_SSL_REDIRECT, SESSION_COOKIE_SECURE via env\n16. **Upload validação** → validate_image_upload (tipo + 5MB)\n17. **PII filter** → PIIFilter para logging (CPF, email, telefone)\n\n---\n\n## 5. Testes Automatizados\n\n**Agente: QA**\n\n- Criado `tests/test_endpoint_auth.py` com 80 testes parametrizados\n- Testes encontraram 4 endpoints sem auth que foram corrigidos\n- **96 testes passando** (16 tenant + 80 auth)\n\n---\n\n## 6. Documentação Jurídica\n\n**Agente: Jurídico**\n\n3 documentos criados em `exports/drafts/juridico/`:\n- **Contrato SaaS** — 15 cláusulas, trial, SLA 99.5%, multi-tenancy, foro Teresina/PI\n- **Termos de Uso** — 12 seções\n- **Política de Privacidade** — 16 seções, LGPD compliant\n\n---\n\n## 7. Treinamento do Parceiro\n\n**Agente: PMM**\n\n5 módulos criados em `exports/drafts/treinamento_parceiro/`:\n- M1: Visão geral da AuroraISP\n- M2: Módulo Comercial a fundo (demo, ROI, métricas)\n- M3: Marketing e CS (roadmap, cross-sell)\n- M4: Precificação e ROI (simulações por porte)\n- M5: Objeções e fechamento (10 objeções, técnicas, follow-up)\n\n---\n\n## 8. Materiais de Venda\n\n**Agente: PMM**\n\n2 documentos criados em `exports/drafts/apresentacao/`:\n- **Case anônimo** — Provedor 30k clientes, 400 vendas/mês, R$284k economia/ano\n- **Battle card** — AuroraISP vs ISPRO AI, vs CRM genérico, vs processo manual\n\n---\n\n## 9. Melhorias no Hub\n\n- Corrigido bug do `<\/script>` dentro do JSON (tarefa XSS quebrava o HTML)\n- Frontmatter adicionado em todas as 42+ tarefas para títulos legíveis\n- Template de tarefas atualizado com frontmatter obrigatório\n\n---\n\n## Arquivos Criados/Modificados\n\n### Novos:\n- `apps/sistema/decorators.py` — webhook_token_required, api_token_required, get_tenant_object_or_404\n- `apps/sistema/validators.py` — validate_image_upload, tenant_upload_path\n- `apps/sistema/logging_filters.py` — PIIFilter\n- `apps/sistema/context_processors.py` — empresa_context (movido de vendas_web)\n- `tests/test_endpoint_auth.py` — 80 testes de autenticação\n- `exports/drafts/juridico/` — 3 documentos jurídicos\n- `exports/drafts/treinamento_parceiro/` — 5 módulos\n- `exports/drafts/apresentacao/case_anonimo.md`\n- `exports/drafts/apresentacao/battle_card_concorrentes.md`\n- 15+ tarefas no backlog\n\n### Modificados:\n- `gerenciador_vendas/settings.py` — INSTALLED_APPS, middleware, HTTPS\n- `gerenciador_vendas/settings_local.py` — herda INSTALLED_APPS\n- `gerenciador_vendas/settings_production.py` — ALLOWED_HOSTS via env\n- `gerenciador_vendas/urls.py` — URLs atualizadas para apps modulares\n- `vendas_web/views.py` — auth em 24 endpoints, PII removido\n- `vendas_web/views_api_atendimento.py` — auth em 24 endpoints\n- `vendas_web/admin_config.py` — format_html XSS corrigido\n- `apps/comercial/crm/models.py` — TenantMixin em 13 models\n- `apps/comercial/crm/views.py` — User filtrado por tenant, webhook token\n- `apps/integracoes/admin.py` — render_value removido\n- `apps/integracoes/views.py` — dados sensíveis removidos\n- `apps/admin_aurora/views.py` — superuser_required, tenant check\n- `apps/cs/clube/views/api_views.py` — tenant filter\n- `apps/cs/carteirinha/views.py` — upload validation\n- `apps/cs/parceiros/views.py` — upload validation\n- `apps/cs/parceiros/templatetags/parceiros_tags.py` — XSS fix\n- `.env.example` — HUBSOFT_DB_*, WEBHOOK_SECRET_TOKEN, N8N_API_TOKEN\n- `scripts/gerar_hub.py` — fix script tag injection\n- ~40 arquivos com imports atualizados\n\n---\n\n## Estado Final\n\n| Métrica | Valor |\n|---------|-------|\n| Backlog pendente | 27 tarefas |\n| Backlog finalizado | 28 tarefas |\n| Testes | 96 passando |\n| Commits no GitHub | 7 |\n| Documentos criados | 10 (jurídico + treinamento + comercial) |\n\n---\n\n## Próximos Passos\n\n1. **Deploy em produção** — bloqueador principal (acesso ao servidor)\n2. **Configurar tokens no N8N** — necessário antes do deploy\n3. **Criar logo** — desbloqueia materiais visuais\n4. **Rotacionar senha HubSoft** — credencial exposta no código\n"}, {"t": "f", "n": "Sessao Dev Ajustes 01 04 2026", "fn": "sessao_dev_ajustes_01-04-2026.md", "c": "# Sessão Dev: Ajustes, Populacão e Automações — 01/04/2026\n\n**Data:** 01/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / CS / Jurídico)\n**Duração:** ~3 horas\n\n---\n\n## Contexto\n\nContinuação da sessão intensiva de desenvolvimento. Foco em corrigir bugs, popular o sistema completo para ambos os tenants, reorganizar menus, documentar integrações e iniciar o módulo de Automações.\n\n---\n\n## Principais pontos discutidos\n\n- Sistema CS não mostrava dados porque script populava apenas tenant Megalink, não Aurora\n- 9 models com `unique=True` global impediam multi-tenancy (mesmo código em tenants diferentes dava erro)\n- Chart.js não carregava em 6 templates do CS (extends `sistema/base.html` que não inclui Chart.js)\n- Referências ao `vendas_web` ainda existiam em imports, admin e template do `/admin/`\n- Reorganização completa dos menus: Comercial, Marketing, CS, Suporte\n- Sistema de notificações existe estruturalmente mas está 100% desativado (envio, testes, configurações)\n- Signals espalhados e hardcoded, necessidade de gerenciamento configurável pelo cliente\n- Proposta de módulo de Automações em Marketing para substituir signals hardcoded\n- Documentação das integrações HubSoft para onboarding\n- Contrato modelo para primeiro cliente (Grupo Magister)\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| Corrigir `unique=True` para `unique_together('tenant', campo)` em 9 models | Multi-tenancy quebrava com dados em 2+ tenants |\n| Reorganizar menu CS em 3 seções: Customer Success, Fidelização, Configurações | Menu antigo tinha 5 seções fragmentadas |\n| Indicações vai para Fidelização, não CS | É mecânica de benefício/engajamento |\n| Membros renomeado para Clientes no menu CS | Mais claro para o usuário final |\n| Retenção removido do menu temporariamente | Módulo não está pronto |\n| Vendas movido para dentro do CRM, Desempenho virou Dashboard do Comercial | Organização mais lógica |\n| CS renomeado para Customer Success no menu | Nome completo mais profissional |\n| Módulo Automações será em Marketing | Clients devem gerenciar signals/regras de automação de forma visual |\n| Frontend primeiro, backend depois para Automações | Validar UX antes de implementar |\n| Contrato modelo criado do zero | Primeiro cliente real (Grupo Magister) |\n\n---\n\n## O que foi feito\n\n### Correções\n- Populou sistema completo para Megalink + Aurora HQ (leads B2B, CRM, CS, giros, validações)\n- Corrigiu 9 models: RegraPontuacao, TipoNotificacao, CanalNotificacao, Cidade, MembroClube, CategoriaParceiro, CupomDesconto, ResgateCupom, CampanhaTrafego, TagCRM\n- Adicionou Chart.js em 6 templates CS\n- Removeu todas as referências a `vendas_web` em `apps/`\n- Removeu template legado `templates/admin/index.html`\n- Corrigiu UserAdmin com campo `telefone` inexistente\n- Removeu seção \"Estatísticas do Sistema\" das configurações\n- Removeu seção \"Equipes\" duplicada das configurações CRM\n- Tarefas CRM abre na aba \"Todas Pendentes\" por padrão\n- Botão Excluir pipeline virou ícone discreto\n\n### Menus reorganizados\n- Comercial: Dashboard (ex-Desempenho) > CRM (Pipeline, Vendas, Tarefas) > Config (Configurações, Equipes, Metas)\n- Marketing: Leads, Campanhas, Automações (novo), Landing Page, Segmentos\n- Customer Success: Dashboard, Clientes > Fidelização (Indicações, Parceiros, Cupons, Roleta) > Configurações (Banners, Carteirinhas, Níveis e XP)\n- Removidos: Cadastro do Comercial, Aurora do topbar\n\n### Documentação\n- `docs/PRODUTO/03-INTEGRACOES_HUBSOFT.md`: mapa completo das integrações, requisitos de onboarding, checklist\n- `docs/OPERACIONAL/contratos/contrato_grupo_magister_01-04-2026.md` + PDF\n\n### Novo módulo: Automações (frontend only)\n- App `apps/marketing/automacoes/` criado\n- Lista de automações com toggle, KPIs, filtros, busca\n- Builder visual: Quando (9 eventos) > Se (condições dinâmicas) > Então (ações encadeáveis com delay)\n- Registrado no INSTALLED_APPS, URLs e menu\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Implementar backend do módulo Automações (models, signals dinâmicos, execução) | Dev |\n| Reativar sistema de notificações (implementar service de envio, signals automáticos) | Dev |\n| Implementar módulo Retenção (churn alerts, NPS) | Dev |\n| Deploy em produção do multi-tenancy | DevOps |\n| Revisar e assinar contrato Grupo Magister | Lucas / Jurídico |\n| Popular dados de `ResgateCupom` no script (gráfico Resgates fica vazio) | Dev |\n\n---\n\n## Próximos passos\n\n- [ ] Validar frontend de Automações e ajustar UX\n- [ ] Implementar backend de Automações (RegraAutomacao model, engine de execução)\n- [ ] Reativar e conectar sistema de notificações ao módulo de Automações\n- [ ] Implementar módulo Retenção no CS\n- [ ] Preparar deploy produção\n- [ ] Onboarding Grupo Magister\n"}, {"t": "f", "n": "Sessao Dev Automacoes 03 04 2026", "fn": "sessao_dev_automacoes_03-04-2026.md", "c": "# Sessão Dev: Automações, Filtros CRM, Segmentos e Ajustes — 03/04/2026\n\n**Data:** 03/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / CPO / QA)\n**Duração:** ~4 horas\n\n---\n\n## Contexto\n\nContinuação do desenvolvimento. Foco em filtros do CRM, reorganização de segmentos para Marketing, refatoração completa do módulo de Automações com editor visual, e evolução dos testes.\n\n---\n\n## Principais pontos discutidos\n\n- Filtros no CRM (pipeline, oportunidades, tarefas) precisavam ser colapsáveis no padrão \"Filtros >\"\n- Segmentos devem pertencer ao Marketing, não ao Comercial\n- Segmentos precisam de página dedicada com regras dinâmicas e preview em tempo real\n- Signal para atualizar segmentos automaticamente quando lead muda\n- Automações é o módulo mais importante do Marketing\n- Fluxos condicionais (if/else entre ações) são necessários\n- Editor visual tipo N8N/Zapier (Drawflow)\n- Segmentos como fonte de dados para disparo em massa\n- Timeline de automações na ficha do lead\n- Controles robustos (rate limit, cooldown, deduplicação)\n- Logs claros por lead e por regra\n- PostgreSQL local configurado (aurora_dev)\n- Migração de dados SQLite → PostgreSQL para Aurora HQ\n\n---\n\n## O que foi implementado\n\n### CRM\n- Filtros colapsáveis (padrão \"Filtros >\") no Pipeline, Oportunidades e Tarefas\n- Filtros por responsável, tag, valor no Pipeline\n- Filtros por estágio, responsável, tag nas Oportunidades\n- Filtros por tipo, responsável, prioridade nas Tarefas\n- Dropdown de seleção de pipeline no título (substitui tabs)\n- Troca de pipeline via AJAX sem reload da página\n- Superuser vê tarefas de todos\n\n### Segmentos\n- Movidos do CRM para Marketing (URLs /marketing/segmentos/)\n- Página dedicada de criação/edição (substituiu modal)\n- Builder de regras dinâmicas (campo + operador + valor)\n- Preview em tempo real (mostra leads que atendem as regras)\n- Signal automático: lead criado/atualizado avalia segmentos dinâmicos\n- Service extraído para `apps/comercial/crm/services/segmentos.py`\n\n### Automações (refatoração completa)\n- 4 novos models: NodoFluxo, ConexaoNodo, ExecucaoPendente, ControleExecucao\n- Engine dual-mode: legacy linear + BFS em grafo visual\n- Branching if/else entre ações\n- Delays reais via ExecucaoPendente + cron\n- Management command `executar_automacoes_cron`\n- Editor visual Drawflow (drag & drop, paleta de nós, painel de config)\n- Dashboard central com KPIs, gráfico 30 dias, erros\n- Timeline de automações na ficha do lead\n- Integração com segmentos (lead_entrou_segmento, disparo em massa)\n- Controles: max_execucoes_por_lead, cooldown_horas\n- 60 testes passando\n- Documentação completa em docs/PRODUTO/05-AUTOMACOES.md\n\n### Infraestrutura\n- PostgreSQL 18 instalado localmente\n- Banco aurora_dev criado\n- settings_local_pg.py configurado\n- Migração SQLite → PostgreSQL do tenant Aurora HQ (CRM, equipes, tags, config)\n\n### Testes\n- Evoluiu de 291 para 756+ testes\n- Cobertura de 40% para 57%\n- Documentação de testes em docs/PRODUTO/04-TESTES.md\n\n### Outros ajustes\n- Removido \"Aurora\" do menu topbar\n- Removido \"Cadastro\" do menu Comercial\n- Removido \"Estatísticas do Sistema\" das configurações\n- CS renomeado para \"Customer Success\"\n- Membros renomeado para \"Clientes\" no CS\n- Indicações movida para primeira posição em Fidelização\n- Retenção removida temporariamente do menu\n- Cores de segmentos padronizadas com sistema\n- Erro `vendas_web_leadprospecto` no admin corrigido\n- Admin Aurora: páginas Produto, Docs e Backlog adicionadas\n- Contrato Grupo Magister gerado (MD + PDF)\n\n---\n\n## Próximos passos\n\n- [ ] Testar editor visual Drawflow com feedback do Lucas\n- [ ] Módulo de Suporte (atendimentos + tickets)\n- [ ] Feedback e ajustes no CRM e Automações\n"}, {"t": "f", "n": "Sessao Dev Completa 06 07 04 2026", "fn": "sessao_dev_completa_06-07-04-2026.md", "c": "# Sessao Dev: Leads, Fluxos Visuais, Automacoes, Logging, APIs — 06-07/04/2026\n\n**Data:** 06-07/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / PM / CMO)\n**Duracao:** Sessao longa (~8h)\n\n---\n\n## Principais entregas (11 commits)\n\n### Leads\n- Pagina de detalhe do lead (/leads/<id>/) substituindo modal\n- Pagina de detalhe do historico com mensagens do Inbox\n- Campos customizaveis por tenant (CampoCustomizado + JSONField)\n- Tela de configuracao de campos custom (/configuracoes/campos-leads/)\n\n### Fluxos Visuais (Node-Based) para Atendimento\n- 3 novos models: NodoFluxoAtendimento, ConexaoNodoAtendimento, ExecucaoFluxoAtendimento\n- Model LogFluxoAtendimento para auditoria\n- Engine conversacional assincrono (pausa em questoes/delays)\n- Editor visual Drawflow com 25+ tipos de nos\n- Canal de ativacao por fluxo (whatsapp, site, facebook, etc.)\n- Signal no Inbox para iniciar fluxo automaticamente por canal\n- Processamento de respostas do lead via signal\n- Envio de perguntas do bot de volta no Inbox\n- Dual-mode nas APIs N8N (legado + visual)\n- CRUD completo na tela de fluxos\n- Tela de sessoes ativas com filtros\n- Detalhe da sessao com logs de execucao\n- Visualizacao do fluxo ao vivo (nodo atual pulsando)\n- Modelos prontos de perguntas (nome, email, CPF, cidade...)\n- Salvar resposta em campo do lead\n- Validacao: tipo, regex, integracao IA (4 providers), webhook\n- Acao \"Criar Oportunidade\" no CRM\n\n### Automacoes Marketing\n- Trigger agora gera log de execucao\n- Tela de historico melhorada (nodo, lead, status)\n- Editor visual reconstroi do banco quando nao tem fluxo_json\n- Config especifica por tipo de no (gatilhos, condicoes, acoes)\n- Selects dinamicos (pipelines, estagios, usuarios, segmentos, origens, UFs)\n- Campo valor da condicao muda conforme campo selecionado\n- Testes E2E: 18/18 OK via management command testar_automacoes\n\n### Integracoes IA\n- Tipos OpenAI, Anthropic, Groq, Google AI adicionados em IntegracaoAPI\n- Validacao por IA nos fluxos de atendimento (4 providers)\n- Select de integracao IA no editor de questoes\n\n### Logging Centralizado\n- LogSistema evoluido: campos categoria, acao, entidade, entidade_id\n- Helper registrar_acao() com auto-deteccao de tenant/usuario/IP\n- Decorator @auditar() para views POST/PUT/DELETE automatico\n- 49 pontos de auditoria: auth, CRM, leads, inbox, suporte, marketing, config, admin\n- Tela centralizada em /configuracoes/logs/ com filtros\n\n### APIs para Agentes/N8N\n- GET  /api/v1/n8n/crm/pipelines/\n- GET  /api/v1/n8n/crm/estagios/\n- POST /api/v1/n8n/crm/oportunidades/\n- PUT  /api/v1/n8n/crm/oportunidades/<pk>/\n- GET  /api/v1/n8n/crm/oportunidades/buscar/\n- POST /api/v1/n8n/crm/tarefas/\n- PUT  /api/v1/n8n/crm/tarefas/<pk>/\n- POST /api/v1/n8n/inbox/enviar/\n- Todas com APITokenAuthentication e audit logging\n\n### Reorganizacao\n- docs/ movido para robo/docs/\n- exports/ movido para robo/exports/\n- robo/CLAUDE.md removido (mesclado na raiz)\n- 7 arquivos legados removidos do robo/\n- CLAUDE.md reescrito (focado em regras, enxuto)\n- README.md reescrito (SaaS multi-tenant)\n\n### Documentacao\n- 12-MODULO_SUPORTE.md\n- 13-MODULO_FLUXOS.md (configuracao de fluxos e questoes)\n- 14-MODULO_ATENDIMENTO.md (execucao, sessoes, N8N, Matrix)\n- 15-SERVICOS_CRON.md (todos os crons e servicos periodicos)\n- 05-AUTOMACOES.md atualizado\n- 08-MODULO_MARKETING.md atualizado\n- Analise do fluxo N8N Consultoria (referencia)\n- Tarefa APIs Agentes IA no backlog\n\n### Infraestrutura\n- PostgreSQL local (aurora_dev) verificado e sincronizado\n- 3 ambientes documentados: SQLite, PG local, producao\n- Servidor rodando com settings_local_pg\n\n---\n\n## Decisoes tomadas\n\n1. Fluxos de atendimento com sistema node-based paralelo ao legado (QuestaoFluxo)\n2. Canal de ativacao por fluxo (cada fluxo tem um canal que o dispara)\n3. Validacao por IA via integracoes configuradas (nao hardcoded)\n4. Logging centralizado reutilizando LogSistema (nao models separados)\n5. APIs primeiro, depois no Agente IA (abordagem em fases)\n6. Memoria do agente IA via Redis (ja tem em producao)\n7. Tools CRM completo durante conversa do agente\n8. Saida do loop do agente por maximo de turnos\n9. Chat de teste no painel (futuro)\n\n---\n\n## Proximos passos\n\n- [ ] Implementacao do fluxo da faculdade (FATEPI/FAESPI)\n- [ ] No Agente IA no editor visual (Fase 2 do plano)\n- [ ] Chat de teste no painel (Fase 3)\n- [ ] Config especifica por tipo de no no editor de atendimento (mesma melhoria feita nas automacoes)\n- [ ] Definir novo nome do produto (sugestoes: Nexo, Hubly, etc.)\n"}, {"t": "f", "n": "Sessao Dev Fatepi 07 04 2026", "fn": "sessao_dev_fatepi_07-04-2026.md", "c": "# Sessao Dev: Implementacao FATEPI + Seguranca Multi-Tenant — 07/04/2026\n\n**Data:** 07/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO)\n**Duracao:** Sessao longa\n\n---\n\n## Principais entregas\n\n### APIs DRF para Agentes/N8N\n- GET /api/v1/n8n/crm/pipelines/ (listar pipelines com estagios)\n- GET /api/v1/n8n/crm/estagios/ (listar, filtro por pipeline)\n- POST /api/v1/n8n/crm/oportunidades/ (criar, nao duplica)\n- PUT /api/v1/n8n/crm/oportunidades/<pk>/ (mover estagio, atribuir)\n- GET /api/v1/n8n/crm/oportunidades/buscar/ (por lead_id ou telefone)\n- POST /api/v1/n8n/crm/tarefas/ (criar)\n- PUT /api/v1/n8n/crm/tarefas/<pk>/ (atualizar/concluir)\n- POST /api/v1/n8n/inbox/enviar/ (enviar mensagem como bot)\n- Serializers DRF completos, audit logging, testado 7/7 OK\n\n### Seguranca Multi-Tenant (CRITICO)\n- Auditoria encontrou 40+ queries sem filtro de tenant\n- TenantMixin adicionado a IntegracaoAPI, ClienteHubsoft, ServicoClienteHubsoft, LogIntegracao\n- 30+ queries no dashboard corrigidas automaticamente via TenantManager\n- Admin Aurora corrigido para usar all_tenants.filter(tenant=tenant)\n- Signal inbox usa all_tenants com filtro manual (sem middleware)\n- CLAUDE.md atualizado com regra CRITICA de multi-tenancy\n- Tela de integracoes filtrada por tenant (FATEPI nao ve mais dados da Aurora)\n\n### Token API por Tenant\n- Campo api_token adicionado ao IntegracaoAPI\n- APITokenAuthentication busca token no banco, identifica tenant automaticamente\n- Decorator api_token_required tambem busca por tenant\n- Fallback para token global (env var) mantido\n- Tokens gerados para FATEPI e Aurora\n- Fix: _thread_local -> _thread_locals (causava falha no token por tenant)\n- Fix: APIServiceUser agora tem atributo username\n\n### Login por Email\n- EmailBackend criado (busca por email, fallback username)\n- View e template de login atualizados (campo email)\n- Criacao de usuario sem campo username (gerado automaticamente do email)\n- Template de usuarios mostra email em vez de @username\n- Dois tenants podem ter usuarios \"admin\" sem conflito\n\n### Webhook Uazapi por Tenant\n- Nova rota: /inbox/api/webhook/<api_token>/\n- Cada tenant configura webhook proprio no Uazapi\n- Parser adaptado para formato real do Uazapi (EventType, chat, message)\n- Token Uazapi via configuracoes_extras (EncryptedCharField nao desencripta)\n- Payload original do Uazapi repassado completo ao N8N\n\n### Configuracao de Canais no Painel\n- Select de integracao por canal (vincular Uazapi ao canal WhatsApp)\n- Criar novo canal com tipo e integracao\n- Badge mostrando provedor vinculado\n\n### Inbox Visual\n- Mensagens bot renderizam no lado direito (como agente)\n- Fundo verde claro diferencia bot de agente humano (azul)\n\n### FATEPI — Implementacao\n- Tenant criado (ID=7)\n- Pipeline \"Matriculas FATEPI\" com 6 estagios\n- Integracao N8N configurada com webhook\n- Integracao Uazapi configurada\n- Canal WhatsApp vinculado ao provider Uazapi\n- Fluxo E2E funcionando: WhatsApp -> Inbox -> N8N -> Inbox -> WhatsApp\n- Agente IA \"Pedro\" respondendo via N8N\n- Mensagens registradas no Inbox com historico completo\n- Usuario admin@fatepi.com.br criado\n\n---\n\n## Fluxo E2E da FATEPI (funcionando)\n\n```\nWhatsApp (lead manda mensagem)\n    |\nUazapi webhook -> /inbox/api/webhook/<token_fatepi>/\n    |\nNosso sistema: registra no Inbox + cria lead + cria conversa\n    |\nSignal: encaminha payload completo para N8N\n    |\nN8N: agente IA \"Pedro\" processa com OpenAI\n    |\nN8N: POST /api/v1/n8n/inbox/enviar/ (com delay entre mensagens)\n    |\nNosso sistema: registra resposta no Inbox\n    |\nProvider Uazapi: envia resposta no WhatsApp\n```\n\n---\n\n## Decisoes tomadas\n\n1. Token API por tenant (nao global) para isolamento\n2. Webhook Uazapi por tenant (token na URL)\n3. Login por email (nao username) para multi-tenant\n4. Payload original do Uazapi repassado ao N8N (nao reformatado)\n5. Mensagens bot no lado direito com cor verde (diferente do agente azul)\n6. Delay entre mensagens picadas no N8N para manter ordem\n7. Token Uazapi salvo em configuracoes_extras (nao access_token encriptado)\n\n---\n\n## Proximos passos\n\n- [ ] Resolver problema do EncryptedCharField (access_token nao desencripta)\n- [ ] Configurar tools no N8N (atualizar lead, criar oportunidade via nossas APIs)\n- [ ] Testar fluxo completo com lead real\n- [ ] Documentar APIs na tela do painel\n- [ ] Deploy em producao\n"}, {"t": "f", "n": "Sessao Dev Fatepi Parte2 08 04 2026", "fn": "sessao_dev_fatepi_parte2_08-04-2026.md", "c": "# Sessao Dev: FATEPI parte 2 — APIs, Tenant, Login, Webhook, CRM — 07-08/04/2026\n\n**Data:** 07-08/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / CTO / PM)\n\n---\n\n## Entregas\n\n### APIs DRF para N8N\n- 8 endpoints criados em /api/v1/n8n/crm/ e /inbox/\n- Pipelines, estagios, oportunidades (CRUD), tarefas (CRUD), inbox enviar\n- Serializers com dados_custom para lead e oportunidade\n- Testados 7/7 OK via curl\n\n### Seguranca Multi-Tenant (correcao critica)\n- Auditoria encontrou 40+ queries sem filtro de tenant\n- TenantMixin adicionado a IntegracaoAPI, ClienteHubsoft, ServicoClienteHubsoft, LogIntegracao\n- CLAUDE.md com regra CRITICA de multi-tenancy\n- Tela de integracoes filtrada por tenant\n\n### Token API por Tenant\n- Campo api_token no IntegracaoAPI\n- APITokenAuthentication busca token no banco, identifica tenant\n- Fix _thread_local -> _thread_locals\n- Fix APIServiceUser sem username\n\n### Login por Email\n- EmailBackend (busca por email, fallback username)\n- Template e view atualizados\n- Username gerado automaticamente do email\n\n### Webhook Uazapi por Tenant\n- Rota /inbox/api/webhook/<api_token>/\n- Parser adaptado para formato real Uazapi\n- Token via configuracoes_extras (fix EncryptedCharField)\n\n### Configuracao de Canais no Painel\n- Select de integracao por canal\n- Criar/editar canal com provider vinculado\n\n### Campos Custom em Lead e Oportunidade\n- Campo entidade (lead/oportunidade) no CampoCustomizado\n- dados_custom JSONField na OportunidadeVenda\n- APIs aceitam dados_custom nos dois\n\n### Acao Criar Oportunidade nas Automacoes\n- Engine + executor + editor visual\n- Config: titulo, pipeline (select), estagio (select)\n- Fix: salvar_fluxo extrai evento do trigger automaticamente\n\n### Historico de Conversas no CRM\n- Tab \"Conversas\" no detalhe da oportunidade\n- Chat com mensagens do Inbox (contato, bot, agente)\n\n### Prompt Agente Pedro\n- Prompt completo atualizado para nossas APIs\n- 2 tools documentadas (Atualizar Lead, Atualizar Oportunidade)\n- Mapeamento de campos e estagios\n\n### FATEPI Funcionando E2E\n- Tenant + pipeline + estagios + integracoes + canal\n- Automacao: lead_criado -> criar_oportunidade\n- Fluxo: WhatsApp -> Uazapi -> Inbox -> N8N -> API enviar -> Inbox -> Uazapi -> WhatsApp\n- Lead + oportunidade criados automaticamente\n\n---\n\n## Bugs encontrados e corrigidos\n- IntegracaoAPI sem TenantMixin (dados vazavam entre tenants)\n- _thread_local vs _thread_locals (token por tenant falhava)\n- APIServiceUser sem username (registrar_acao falhava)\n- EncryptedCharField nao desencripta (token Uazapi)\n- Conversa sem lead apos deletar lead (nao recriava)\n- salvar_fluxo nao preenchia campo evento da regra\n- Webhook Uazapi formato diferente do esperado\n- ALLOWED_HOSTS faltando no settings_local_pg\n- Mensagens bot no lado errado do chat (CSS)\n\n---\n\n## Pendente\n- [ ] Bug visual: menu tres pontinhos do card CRM expandindo demais\n- [ ] Configurar tools no N8N com prompt atualizado\n- [ ] Testar tools (Atualizar Lead, Atualizar Oportunidade) via N8N\n- [ ] Deploy em producao\n"}, {"t": "f", "n": "Sessao Dev Nos Ia 08 04 2026", "fn": "sessao_dev_nos_ia_08-04-2026.md", "c": "# Sessao Dev: Nos IA Modulares + Permissoes + Tools FATEPI — 08/04/2026\n\n**Data:** 08/04/2026\n**Participantes:** Lucas (CEO), Claude (Tech Lead / PM)\n\n---\n\n## Entregas\n\n### Permissoes Granulares\n- Removido is_superuser de 21 views (CRM, Sistema, Notificacoes)\n- Substituido por user_tem_funcionalidade() em todas\n- Tela de usuarios filtrada por tenant (fix vazamento multi-tenant)\n- Campo Staff removido da interface\n- Seed perfis Admin para todos os usuarios/tenants\n\n### Timeline CRM Mesclada\n- Timeline na oportunidade agora mostra estagios + contatos + conversas\n- Todos ordenados cronologicamente (mais recente primeiro)\n- Eventos de conversa: iniciada (icone WhatsApp) e finalizada (icone check)\n\n### Tools Agente FATEPI (N8N)\n- oportunidade_id adicionado ao payload enviado ao N8N\n- API oportunidades aceita campos flat dados_custom.* \n- API aceita valores vazios sem erro\n- N8N atualizado para versao mais recente\n- No do agente recriado na versao 3.1\n- Documentacao separada: system_prompt + tools + indice\n\n### Nos IA Modulares no Editor Visual\n- 4 novos tipos de no implementados:\n  - ia_classificador: analisa mensagem, retorna categoria como variavel\n  - ia_extrator: extrai dados estruturados, salva no lead/oportunidade\n  - ia_respondedor: gera resposta IA, pausa e espera\n  - ia_agente: conversa multi-turno com historico\n- Engine completo com _chamar_llm_simples() (4 providers)\n- Sistema de variaveis entre nos (dados_respostas['variaveis'])\n- Editor visual com secao IA, paineis de config, CSS roxo\n- Condicoes suportam variaveis IA (var.classificacao, etc.)\n\n### Fluxo FATEPI via Nos IA\n- Fluxo criado com 12 nos e 12 conexoes\n- Testado E2E via widget: nome extraido, curso classificado, oportunidade criada\n- dados_custom salvos na oportunidade (curso_interesse)\n- Integracao OpenAI criada para FATEPI\n\n### Canal + Fluxo de Atendimento\n- CanalInbox agora tem FK para FluxoAtendimento\n- Select de fluxo nas configuracoes de cada canal\n- Widget token dinamico por tenant\n- Lead criado automaticamente para conversas widget sem lead\n\n### CRM dados_custom\n- dados_custom exibidos no card do pipeline e detalhe da oportunidade\n- Acao criar_oportunidade salva variaveis IA no dados_custom\n\n### CLAUDE.md\n- Regra de agente obrigatoria na resposta\n- Documentacao obrigatoria apos implementacao\n\n### Nome do Produto\n- Definido: Hubtrix (dominio hubtrix.com.br disponivel)\n- Implementacao da troca pendente\n\n---\n\n## Bugs Corrigidos\n- is_superuser bloqueava acesso a configuracoes do CRM\n- Usuarios de todos os tenants visiveis na tela de permissoes\n- Signal N8N falhava silenciosamente (campo ativo vs ativa)\n- EncryptedCharField encriptava API key da OpenAI\n- Widget com token hardcoded (mesmo token para todos os tenants)\n- Widget sendMessage falhava sem currentConversa\n- Duplicacao de canal (IntegrityError)\n- mover_estagio passava slug como ID\n- Variaveis {{}} no template interpretadas pelo Django\n\n---\n\n## Pendente\n- [ ] Integrar validacao/classificacao/extracao IA direto no no de questao\n- [ ] Modal de configuracao (estilo N8N) para todos os tipos de no\n- [ ] Tool calling nativo por provider no no ia_agente\n- [ ] Completar fluxo FATEPI (forma ingresso, valores, fechamento com PIX)\n- [ ] Testar fluxo via WhatsApp (testado apenas via widget)\n- [ ] Troca de nome Aurora -> Hubtrix\n- [ ] Deploy em producao\n"}, {"t": "f", "n": "Tech Refatoracao 29 03 2026", "fn": "tech_refatoracao_29-03-2026.md", "c": "# Refatoração técnica e migração CS — 29/03/2026\n\n**Data:** 29/03/2026\n**Participantes:** CEO, Assistente IA (Tech Lead, DevOps, QA, Segurança)\n**Duração:** sessão extensa (dia inteiro)\n\n---\n\n## Contexto\n\nNecessidade de refatorar o monolito vendas_web em apps separados por módulo, implementar multi-tenancy para viabilizar o modelo SaaS, reforçar segurança de credenciais e migrar o módulo CS (megaroleta) para dentro do hub.\n\n---\n\n## Principais pontos discutidos\n\n- Separação do monolito vendas_web em 10 apps por módulo (Opção A aprovada pelo CEO), organizados em quatro áreas: Base (sistema, notificacoes, integracoes, dashboard), Comercial (leads, atendimento, cadastro, viabilidade, crm), Marketing (campanhas) e CS (clube, parceiros, indicacoes, carteirinha).\n- Implementação completa de multi-tenancy com Tenant, PerfilUsuario, TenantMixin, TenantManager e TenantMiddleware.\n- Segurança: secrets removidos do código fonte e migrados para variáveis de ambiente.\n- Criação do Painel Admin Aurora (/aurora-admin/) com dashboard de tenants, gerenciamento de planos e features.\n- Migração do megaroleta (módulo CS) para dentro do hub: 4 apps, 20 models, 76 URLs, 67+ templates.\n- Templates CS integrados ao layout do hub (vendas_web/base.html).\n- Sidebar CS com sub-seções: Clube, Parceiros, Carteirinhas, Indicações.\n- Criação de 3 novos agentes: Segurança (AppSec), DevOps, QA.\n- Definição do CRM do parceiro com 5 estágios: Lead identificado, Em contato, Em negociação, Trial ativo, Finalizada.\n\n---\n\n## Decisões tomadas\n\n| Decisão | Motivo |\n|---------|--------|\n| Opção A (sub-apps por pasta) para estrutura de apps Django | Melhor organização modular mantendo compatibilidade com o Django |\n| Gestão (17 models, agentes IA) NÃO migra para o hub | Complexidade elevada e escopo separado do hub comercial |\n| Templates CS estendem vendas_web/base.html (layout unificado) | Experiência visual consistente em todos os módulos |\n| Modais com display:none inline para evitar conflito CSS | Solução pragmática para conflitos de estilo entre módulos |\n\n---\n\n## Pendências\n\n| Pendência | Responsável |\n|-----------|-------------|\n| Deploy do multi-tenancy em produção | DevOps / Tech Lead |\n| Rotacionar credenciais no servidor | DevOps / Segurança |\n| Logo da AuroraISP (bloqueia materiais visuais) | CEO / Design |\n| Testes automatizados de isolamento de tenant | QA / Tech Lead |\n| Refinamento visual dos templates CS | Tech Lead / UX |\n| URLs hardcoded na landing page do clube | Tech Lead |\n\n---\n\n## Próximos passos\n\n- [ ] Deploy do multi-tenancy: rodar migrations, criar seed do tenant Megalink, preencher tenant_id\n- [ ] Rotacionar todas as credenciais no servidor de produção\n- [ ] Escrever testes automatizados de isolamento de tenant\n- [ ] Refinar visualmente os templates CS integrados\n- [ ] Substituir URLs hardcoded na landing page do clube por {% url %}\n- [ ] Definir logo da AuroraISP para desbloquear materiais visuais\n"}]}, {"t": "d", "n": "tarefas", "ch": [{"t": "d", "n": "backlog", "ch": [{"t": "f", "n": "Aurora Suporte Crm Interno 31 03 2026", "fn": "aurora_suporte_crm_interno_31-03-2026.md", "c": "---\nname: \"Aurora como primeiro cliente: Suporte + CRM interno\"\ndescription: \"Estruturar a AuroraISP como primeira cliente do próprio sistema. CRM para pipeline de provedores e sistema de suporte.\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"CEO / PM / Tech Lead\"\n---\n\n# Aurora como Primeiro Cliente: Suporte + CRM Interno — 31/03/2026\n\n**Data:** 31/03/2026\n**Responsável:** CEO / PM / Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nA AuroraISP será a primeira cliente do próprio sistema multi-tenant. Não é criar algo novo: é usar o mesmo CRM, fluxos de atendimento e CS que já existem, mas configurados para o contexto B2B (provedores como leads em vez de pessoas físicas). O tenant \"Aurora HQ\" opera no mesmo sistema que os tenants dos provedores clientes.\n\n---\n\n## Tarefas\n\n### CRM Interno (pipeline de provedores)\n- [ ] Criar tenant \"Aurora HQ\" com configuração interna\n- [ ] Definir estágios do pipeline: Lead Identificado > Contato > Qualificado > Demo Agendada > Em Trial > Negociação > Cliente Ativo > Churn\n- [ ] Configurar CRM Kanban com os estágios\n- [ ] Definir campos customizados para provedores (base de clientes, ERP, cidade, vendedores)\n- [ ] Criar métricas: MRR, churn rate, LTV, CAC\n- [ ] Integrar acompanhamento de trials (14 dias)\n- [ ] Dashboard interno com pipeline e métricas\n\n### Sistema de Suporte (tickets)\n- [ ] Definir tipos de ticket: bug, dúvida, solicitação, incidente\n- [ ] Definir prioridades: baixa, normal, alta, urgente\n- [ ] Definir SLA por plano (Starter: 24h, Start: 8h, Pro: 4h)\n- [ ] Criar models: Ticket, ComentarioTicket, CategoriaTicket\n- [ ] Criar views: lista de tickets, detalhe, criar, responder\n- [ ] Notificação ao abrir/responder ticket (WhatsApp/email)\n- [ ] Dashboard de suporte (tickets abertos, SLA, tempo médio)\n- [ ] Base de conhecimento / FAQ\n\n### Fluxos de Atendimento\n- [ ] Fluxo de onboarding do provedor (passo a passo)\n- [ ] Fluxo de suporte técnico (triagem > resolução)\n- [ ] Fluxo de churn prevention (alertas > ação > retenção)\n\n---\n\n## Contexto e referências\n\n- Reunião: docs/context/reunioes/aurora_primeiro_cliente_31-03-2026.md\n- CRM existente: apps/comercial/crm/ (13 models, pipeline Kanban)\n- Suporte será novo app: apps/suporte/\n- CS existente: apps/cs/ (clube, parceiros, indicações, carteirinha, NPS, retenção)\n\n---\n\n## Resultado esperado\n\nAurora opera usando o próprio sistema para vender e dar suporte. Pipeline de provedores gerenciado no CRM. Tickets de suporte com SLA. Métricas de negócio visíveis no dashboard.\n"}, {"t": "f", "n": "Criar Logo 26 03 2026", "fn": "criar_logo_26-03-2026.md", "c": "---\nname: \"Criar Logo da AuroraISP\"\ndescription: \"Criar a identidade visual da AuroraISP, começando pela logo. É o principal desbloqueador do lançamento — one-pager, pitc\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"CEO\"\n---\n\n# Criar Logo da AuroraISP\n\n**Data:** 26/03/2026\n**Responsável:** CEO\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nCriar a identidade visual da AuroraISP, começando pela logo. É o principal desbloqueador do lançamento — one-pager, pitch deck, brandbook, redes sociais e landing page dependem dela.\n\n---\n\n## Tarefas\n\n- [ ] Definir direção criativa (símbolo, tipografia, estilo)\n- [ ] Criar logo principal (versão colorida)\n- [ ] Criar versão negativa (para fundos escuros)\n- [ ] Criar versão monocromática\n- [ ] Exportar nos formatos SVG, PNG e PDF\n- [ ] Validar com o time\n\n---\n\n## Contexto e referências\n\nPaleta oficial definida em [08-BRANDBOOK.md](../../BRAND/08-BRANDBOOK.md):\n- Fundo escuro: #0F172A\n- Azul primário: #2563EB\n- Gradiente: azul para ciano\n\nTipografia: Inter (Google Fonts)\n\nPosicionamento: hub de tecnologia com IA para provedores de internet. Tom próximo, direto e confiante. Não é banco, não é startup de Silicon Valley. É tecnologia que fala a língua do provedor regional brasileiro.\n\n---\n\n## Resultado esperado\n\nLogo em todas as variações, pronta para uso em documentos, digital e apresentações.\n\n## Impacto ao desbloquear\n\nDesbloqueará: one-pager, pitch deck, brandbook completo, redes sociais, landing page.\n"}, {"t": "f", "n": "Crm Parceiro 27 03 2026", "fn": "crm_parceiro_27-03-2026.md", "c": "---\nname: \"CRM para rastreamento do funil do parceiro\"\ndescription: \"Definir como o parceiro registra e acompanha cada lead ao longo da esteira comercial\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Head de Vendas\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nGarantir visibilidade sobre o funil comercial: quantos leads estão em cada etapa, onde estão travando e o que foi feito em cada um.\n\n## Atividades\n\n- [x] Definir etapas do pipeline — 5 estágios: Lead identificado, Em contato, Em negociação, Trial ativo, Finalizada\n- [x] Definir qualificação de entrada (A: HubSoft / B: outro ERP)\n- [x] Definir campos obrigatórios por etapa\n- [x] Definir critérios de avanço entre etapas\n- [x] Criar template do CRM — exports/drafts/fluxos/crm_parceiro.md\n- [ ] Definir ferramenta (opções: Notion, Planilha Google, Pipedrive)\n- [ ] Configurar ferramenta com base no template\n- [ ] Treinar parceiro no uso\n- [ ] Definir cadência de revisão do funil com o parceiro (semanal?)\n\n## Responsável\n\nAurora define a estrutura. Parceiro alimenta.\n\n## Observação\n\nEnquanto o módulo Comercial Pro não tem CRM próprio para a Aurora, essa ferramenta serve como solução provisória para rastrear as vendas da própria AuroraISP.\n"}, {"t": "f", "n": "Deploy Multitenancy 29 03 2026", "fn": "deploy_multitenancy_29-03-2026.md", "c": "---\nname: \"Deploy do multi-tenancy em produção\"\ndescription: \"Realizar o deploy do sistema de multi-tenancy em produção. Isso envolve rodar as migrations no banco de produção, criar \"\nprioridade: \"🔴 Alta\"\nresponsavel: \"DevOps / Tech Lead\"\n---\n\n# Deploy do multi-tenancy em produção — 29/03/2026\n\n**Data:** 29/03/2026\n**Responsável:** DevOps / Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nRealizar o deploy do sistema de multi-tenancy em produção. Isso envolve rodar as migrations no banco de produção, criar o tenant seed da Megalink, preencher o campo tenant_id nos registros existentes e rotacionar todas as credenciais expostas anteriormente no código.\n\n---\n\n## Tarefas\n\n- [ ] Rodar migrations de multi-tenancy no banco de produção (com backup prévio)\n- [ ] Criar tenant seed da Megalink Telecom\n- [ ] Preencher tenant_id em todos os registros existentes (atribuir ao tenant Megalink)\n- [ ] Rotacionar todas as credenciais no servidor (HubSoft API, N8N, Matrix, etc.)\n- [ ] Atualizar variáveis de ambiente no servidor de produção\n- [ ] Validar que o sistema funciona corretamente com o tenant Megalink\n- [ ] Testar acesso ao Painel Admin Aurora (/aurora-admin/) em produção\n\n---\n\n## Contexto e referências\n\n- Reunião: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Tarefa concluída: `docs/context/tarefas/finalizadas/refatoracao_apps_29-03-2026.md`\n- Tarefa relacionada: `docs/context/tarefas/backlog/seguranca_credenciais_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nMulti-tenancy ativo em produção com o tenant Megalink operacional, credenciais rotacionadas e seguras, painel admin acessível. Sistema pronto para onboarding de novos tenants.\n"}, {"t": "f", "n": "Grupos Provedores 26 03 2026", "fn": "grupos_provedores_26-03-2026.md", "c": "---\nname: \"Mapeamento de Grupos de Provedores\"\ndescription: \"Levantar com o sócio comercial quais grupos de WhatsApp e Telegram de provedores regionais são mais relevantes para pros\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Sócio comercial\"\n---\n\n# Mapeamento de Grupos de Provedores\n\n**Data:** 26/03/2026\n**Responsável:** Sócio comercial\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nLevantar com o sócio comercial quais grupos de WhatsApp e Telegram de provedores regionais são mais relevantes para prospecção da AuroraISP.\n\n---\n\n## Tarefas\n\n- [ ] Sócio comercial mapear grupos de WhatsApp de ISPs que participa\n- [ ] Sócio comercial mapear grupos de Telegram relevantes\n- [ ] Identificar grupos com maior concentração de donos de provedor (decisores)\n- [ ] Identificar grupos da ABRINT e ABRI\n- [ ] Definir abordagem para cada grupo (conteúdo, case, indicação)\n\n---\n\n## Contexto e referências\n\nCanal 2 do GTM: [07-CANAIS.md](../../../GTM/07-CANAIS.md)\n\nO foco é presença com conteúdo de valor, não propaganda direta. O case anônimo do provedor com 30.000 clientes é o principal ativo para usar nesses grupos.\n\n---\n\n## Resultado esperado\n\nLista de 5 a 10 grupos mapeados com perfil, tamanho estimado e abordagem recomendada para cada um.\n"}, {"t": "f", "n": "Implementacao Aurora 05 04 2026", "fn": "implementacao_aurora_05-04-2026.md", "c": "# Tarefa: Implementação Aurora (primeiro cliente)\n\n**Data:** 05/04/2026\n**Status:** Em andamento\n**Prioridade:** Alta\n\n---\n\n## Objetivo\n\nConfigurar a AuroraISP como primeiro cliente da plataforma. Integrar com Uazapi para WhatsApp, configurar Inbox, CRM e automações básicas.\n\n## Fases\n\n1. Tenant Aurora (criar, seeds, config)\n2. Integração Uazapi (service, webhook, canal)\n3. Inbox (equipe, fila, respostas)\n4. CRM (pipeline SaaS, tags)\n5. Automações básicas\n6. Marketing (campanhas, segmentos)\n\n## Doc de referência\n\n`docs/OPERACIONAL/implementacao_aurora_05-04-2026.md`\n"}, {"t": "f", "n": "Lancamento Digital 26 03 2026", "fn": "lancamento_digital_26-03-2026.md", "c": "---\nname: \"Lançamento Digital — Landing Page e Redes Sociais\"\ndescription: \"Criar a presença digital da AuroraISP: landing page, redes sociais e WhatsApp Business. Esses canais são necessários par\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev + PMM\"\n---\n\n# Lançamento Digital — Landing Page e Redes Sociais\n\n**Data:** 26/03/2026\n**Responsável:** Dev + PMM\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando logo\n\n---\n\n## Descrição\n\nCriar a presença digital da AuroraISP: landing page, redes sociais e WhatsApp Business. Esses canais são necessários para dar credibilidade durante a prospecção e capturar leads inbound no médio prazo.\n\n---\n\n## Tarefas\n\n- [ ] Criar copy da landing page (PMM)\n- [ ] Desenvolver landing page (Dev, aguarda logo e copy)\n- [ ] Criar perfil no Instagram (aguarda logo)\n- [ ] Criar perfil no LinkedIn (aguarda logo)\n- [ ] Configurar WhatsApp Business (CEO)\n- [ ] Definir domínio oficial (auroraisp.com.br ou similar)\n\n---\n\n## Contexto e referências\n\n- Tom de voz em [07-TOM_DE_VOZ.md](../../BRAND/07-TOM_DE_VOZ.md)\n- Mensagens chave em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- Posicionamento em [05-POSICIONAMENTO.md](../../GTM/05-POSICIONAMENTO.md)\n\nA landing page deve ter: tagline, subtítulo, os 3 módulos, case anônimo com números, CTA para demo.\n\n---\n\n## Resultado esperado\n\nPresença digital ativa com landing page no ar, redes configuradas e WhatsApp Business pronto para receber contatos.\n"}, {"t": "f", "n": "Lgpd Privacidade 30 03 2026", "fn": "lgpd_privacidade_30-03-2026.md", "c": "---\nname: \"LGPD e Privacidade de Dados\"\ndescription: \"O sistema armazena dados pessoais de leads e clientes (nome, CPF, telefone, endereço, documentos). Com a operação SaaS m\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Segurança (AppSec) / Jurídico\"\n---\n\n# LGPD e Privacidade de Dados — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Segurança (AppSec) / Jurídico\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO sistema armazena dados pessoais de leads e clientes (nome, CPF, telefone, endereço, documentos). Com a operação SaaS multi-tenant, é necessário garantir conformidade com a LGPD, incluindo consentimento, portabilidade e exclusão de dados.\n\n---\n\n## Tarefas\n\n- [ ] Mapear dados pessoais armazenados por model (Lead, Cliente, Membro, etc.)\n- [ ] Implementar registro de consentimento no cadastro de leads\n- [ ] Criar endpoint de exportação de dados pessoais (portabilidade)\n- [ ] Criar endpoint de exclusão/anonimização de dados (direito ao esquecimento)\n- [ ] Definir política de retenção de dados por tipo\n- [ ] Revisar logs e auditoria para não expor dados pessoais\n- [ ] Criptografar campos sensíveis (CPF, documentos) em repouso\n- [ ] Documentar fluxo de tratamento de dados no sistema\n\n---\n\n## Contexto e ref
