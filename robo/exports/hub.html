r_nome, mostrar_cpf, mostrar_nivel, mostrar_data_emissao, mostrar_data_validade, mostrar_qr_code, mostrar_foto, mostrar_pontos, mostrar_cidade |\n| **Status** | ativo, data_criacao |\n\n#### RegraAtribuicao\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `modelo` | FK ModeloCarteirinha | Modelo a atribuir |\n| `tipo` | CharField | nivel, pontuacao_minima, cidade, todos, manual |\n| `nivel` | FK NivelClube | Quando tipo=nivel |\n| `pontuacao_minima` | Integer | Quando tipo=pontuacao_minima (XP mínimo) |\n| `cidade` | CharField(100) | Quando tipo=cidade |\n| `prioridade` | Integer | Maior vence em conflito |\n| `ativo` | Boolean | Status |\n\n#### CarteirinhaMembro\nTabela: auto\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `membro` | FK MembroClube | Dono |\n| `modelo` | FK ModeloCarteirinha | Template visual |\n| `foto` | ImageField | Foto do membro |\n| `data_emissao` | DateTime (auto) | Quando emitiu |\n| `data_validade` | DateField | Validade |\n| `ativo` | Boolean | Status |\n\n### Services\n\n#### CarteirinhaService (`services/services.py`)\n\n| Método | O que faz |\n|--------|-----------|\n| `obter_modelo_para_membro(membro)` | Avalia regras (por prioridade desc): todos → nível → pontuacao_minima → cidade. Fallback: primeiro modelo ativo |\n| `obter_carteirinha_membro(membro)` | Retorna CarteirinhaMembro existente ou cria automaticamente via regras. Usa update_or_create() |\n\n### Views (7)\n\n| View | Rota | Auth | Descrição |\n|------|------|------|-----------|\n| `dashboard_carteirinha` | `/roleta/dashboard/carteirinha/` | @login_required | Home: modelos, regras, total emitidas |\n| `dashboard_modelos` | `/roleta/dashboard/carteirinha/modelos/` | @login_required | CRUD de modelos |\n| `dashboard_modelo_criar` | `/roleta/dashboard/carteirinha/modelos/criar/` | @login_required | Criação com preview |\n| `dashboard_modelo_editar` | `/roleta/dashboard/carteirinha/modelos/<id>/editar/` | @login_required | Edição com preview |\n| `dashboard_regras` | `/roleta/dashboard/carteirinha/regras/` | @login_required | CRUD de regras de atribuição |\n| `dashboard_preview` | `/roleta/dashboard/carteirinha/preview/<id>/` | @login_required | Preview com dados fake |\n| `membro_carteirinha` | `/roleta/membro/carteirinha/` | Sessão membro | Carteirinha do membro (auto-criada) |\n\n### Admin\n\n**ModeloCarteirinhaAdmin:** list com nome/ativo/data_criacao.\n\n**RegraAtribuicaoAdmin:** list com modelo/tipo/prioridade/ativo.\n\n**CarteirinhaMembroAdmin:** list com membro/modelo/data_emissao/ativo.\n\n---\n\n## 5. NPS (`apps/cs/nps/`) [stub]\n\n### O que faz\nPesquisa de satisfação Net Promoter Score. Estrutura de models criada, views e URLs pendentes.\n\n### Models (2)\n\n#### ConfiguracaoNPS (Singleton)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `periodicidade_dias` | Integer(90) | Intervalo entre pesquisas |\n| `canal_envio` | CharField | whatsapp, email, ambos |\n| `mensagem_template` | TextField | Template da mensagem |\n| `ativo` | Boolean | Status |\n\n#### PesquisaNPS\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `membro` | FK MembroClube | Membro (se aplicável) |\n| `nota` | Integer(0-10) | Nota NPS |\n| `comentario` | TextField | Comentário livre |\n| `categoria` | CharField | promotor (9-10), neutro (7-8), detrator (0-6) — auto-calculada |\n| `canal_resposta` | CharField | whatsapp (default) |\n| `data_envio` / `data_resposta` | DateTime | Timestamps |\n| `respondida` | Boolean | Se respondeu |\n\n### Status\nModels registrados no admin. Views e URLs vazios (TODO).\n\n---\n\n## 6. Retenção (`apps/cs/retencao/`) [stub]\n\n### O que faz\nPrevenção de churn com score de saúde do cliente e alertas automáticos. Estrutura de models criada, views e URLs pendentes.\n\n**Nota:** O CRM já possui AlertaRetencao e scanner de contratos HubSoft (`apps/comercial/crm/`). Este módulo complementará com score de saúde e ações de retenção dedicadas.\n\n### Models (3)\n\n#### ScoreCliente\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `score` | Integer(0-100, default 50) | Score de saúde |\n| `fatores` | JSONField | Fatores que compõem o score |\n| `ultima_atualizacao` | DateTime (auto) | Último cálculo |\n\n#### AlertaChurn\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `cliente` | FK ClienteHubsoft | Cliente |\n| `tipo` | CharField | inadimplencia, sem_uso, reclamacao, contrato_expirando |\n| `severidade` | CharField | baixa, media, alta, critica |\n| `descricao` | TextField | Detalhes |\n| `resolvido` | Boolean | Status |\n| `data_criacao` / `data_resolucao` | DateTime | Timestamps |\n\n#### AcaoRetencao\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `alerta` | FK AlertaChurn | Alerta relacionado |\n| `tipo_acao` | CharField | contato_whatsapp, oferta_desconto, upgrade_plano, visita_tecnica |\n| `descricao` | TextField | Detalhes |\n| `responsavel` | FK User | Quem executa |\n| `executada` | Boolean | Status |\n| `data_criacao` / `data_execucao` | DateTime | Timestamps |\n\n### Status\nModels registrados no admin com config básica. Views e URLs vazios (TODO).\n\n---\n\n## Sidebar do Painel\n\nO módulo CS organiza o menu lateral em 3 seções:\n\n```\nCUSTOMER SUCCESS\n├── Dashboard          → clube:dashboard_home\n└── Clientes           → clube:dashboard_participantes\n\nFIDELIZAÇÃO\n├── Indicações         → indicacoes:dashboard_indicacoes_home\n├── Parceiros          → parceiros:dashboard_parceiros_home\n├── Cupons             → parceiros:dashboard_cupons\n└── Roleta             → clube:dashboard_premios\n\nCONFIGURAÇÕES\n├── Banners            → clube:dashboard_banners\n├── Carteirinhas       → carteirinha:dashboard_carteirinha\n└── Níveis e XP        → clube:dashboard_gamificacao\n```\n\n---\n\n## Integrações entre Submódulos\n\n```\nClube ──GamificationService──▶ Indicações (pontos ao converter)\nClube ──GamificationService──▶ Automações (ação dar_pontos)\nClube ──MembroClube──▶ Parceiros (cupons exigem membro)\nClube ──NivelClube──▶ Parceiros (cupons por nível)\nClube ──Cidade──▶ Parceiros + Prêmios (restrição geográfica)\nIndicações ──IndicacaoService──▶ Clube (confirmar_conversao → atribuir_pontos)\nParceiros ──CupomService──▶ Clube (debita saldo, valida nível)\nCarteirinha ──CarteirinhaService──▶ Clube (NivelClube, XP para regras)\n```\n\n---\n\n## Integrações Externas\n\n| Serviço | Uso | Integração |\n|---------|-----|------------|\n| **N8N** | OTP via WhatsApp, consulta HubSoft | Webhook POST |\n| **HubSoft** | Consulta de clientes por CPF, verificação de recorrência/adiantamento/app | Webhook N8N ou conexão PostgreSQL direta |\n\n---\n\n## Estatísticas do Módulo\n\n| Métrica | Valor |\n|---------|-------|\n| **Sub-apps** | 6 (clube, parceiros, indicacoes, carteirinha, nps, retencao) |\n| **Models** | 24 (10 clube + 4 parceiros + 2 indicações + 3 carteirinha + 2 NPS + 3 retenção) |\n| **Views** | 55+ funções |\n| **Templates** | 30+ |\n| **APIs** | 40+ endpoints |\n| **Services** | 6 (Gamification, OTP, Sorteio, Hubsoft, Cupom, Indicação, Carteirinha) |\n| **Management Commands** | 2 (gerar_faq, testar_pontuacoes) |\n| **Linhas de código** | ~6.000+ (models + views + services) |\n"}, {"t": "f", "n": "10 Integracoes", "fn": "10-INTEGRACOES.md", "c": "# Mapa de Integrações — AuroraISP\n\n**Última atualização:** 05/04/2026\n**Responsável:** Tech Lead / CTO\n\n---\n\n## Visão Geral\n\nO Aurora precisa de duas integrações externas para funcionar: uma com o **ERP do provedor** (gestão de clientes, planos, contratos) e outra com a **plataforma de atendimento** (WhatsApp, chat). Hoje o sistema roda com HubSoft + Matrix, mas a arquitetura deve suportar outros ERPs e plataformas.\n\nEste documento mapeia **o que** precisa ser integrado, independente da ferramenta.\n\n---\n\n## 1. Integração com ERP\n\nO ERP é a fonte da verdade sobre clientes, planos, contratos e financeiro do provedor.\n\n### 1.1 O que o Aurora consome do ERP\n\n| # | Dado | Onde é usado | Criticidade | Frequência |\n|---|------|-------------|-------------|------------|\n| 1 | **Consultar cliente por CPF** | Verificação de membro no Clube (CS), cadastro de lead | Alta | A cada cadastro/verificação |\n| 2 | **Dados do cliente** (nome, e-mail, telefone, endereço) | Preencher MembroClube, vincular lead | Alta | A cada consulta |\n| 3 | **ID do cliente no ERP** | FK para rastreabilidade (id_cliente_hubsoft, id_prospecto_hubsoft) | Alta | Uma vez por cliente |\n| 4 | **Planos disponíveis** (nome, velocidade, preço) | Página de cadastro público, seleção de plano | Média | Seed inicial ou sync periódico |\n| 5 | **Status do contrato** (ativo, suspenso, cancelado, dias restantes) | Alertas de retenção, score de churn | Média | Scanner periódico (cron) |\n| 6 | **Situação financeira** (inadimplência, pagamento adiantado, recorrência) | Pontuação extra no Clube, alertas de churn | Baixa | A cada validação OTP |\n| 7 | **Uso do app do provedor** | Pontuação extra no Clube | Baixa | A cada validação OTP |\n| 8 | **Clientes por cidade** | Relatórios, distribuição de prêmios por região | Baixa | Cache 1h |\n\n### 1.2 O que o Aurora envia para o ERP\n\n| # | Dado | Quando | Criticidade |\n|---|------|--------|-------------|\n| 1 | **Novo prospecto/lead** | Lead qualificado pelo bot ou cadastro público | Alta |\n| 2 | **Documentos do lead** (selfie, RG frente/verso) | Upload durante cadastro | Alta |\n| 3 | **Contrato aceito** (IP, timestamp, dados) | Aceite no cadastro público | Alta |\n| 4 | **Status do processamento** (aprovado/rejeitado) | Webhook de confirmação | Média |\n\n### 1.3 Como cada integração funciona hoje (HubSoft)\n\n#### Via API REST OAuth2 (`apps/integracoes/services/hubsoft.py`)\n\n| # | Operação | Endpoint HubSoft | Método | Arquivo |\n|---|----------|------------------|--------|---------|\n| 1 | **Obter token OAuth** | `/oauth/token` | POST | `hubsoft.py:42` |\n| 2 | **Cadastrar prospecto** (lead → ERP) | `/api/v1/integracao/prospecto` | POST | `hubsoft.py:115` |\n| 3 | **Consultar cliente** por CPF/CNPJ | `/api/v1/integracao/cliente` | GET | `hubsoft.py:184` |\n| 4 | **Sincronizar cliente** (cria/atualiza ClienteHubsoft local) | `/api/v1/integracao/cliente` | GET | `hubsoft.py:251` |\n| 5 | **Sincronizar serviços** (planos ativos do cliente) | Dentro da resposta do cliente | — | `hubsoft.py:378` |\n\nCredenciais armazenadas em `IntegracaoAPI` (campos sensíveis criptografados). Token OAuth cacheado com expiração. Todas as chamadas logadas em `LogIntegracao` com tempo de resposta.\n\n#### Via Webhook N8N (`apps/cs/clube/services/hubsoft_service.py`)\n\n| # | Operação | Webhook N8N | Método | Arquivo |\n|---|----------|-------------|--------|---------|\n| 6 | **Consultar cliente** (Clube CS) | `/webhook/roletaconsultarcliente` | POST | `hubsoft_service.py:28` |\n\nO N8N recebe o CPF e faz a consulta no HubSoft, retornando os dados. Usado na verificação de membro do Clube.\n\n#### Via conexão direta ao banco PostgreSQL (`apps/cs/clube/services/hubsoft_service.py`)\n\n| # | Operação | Query SQL | Arquivo |\n|---|----------|-----------|---------|\n| 7 | **Checar pontos extras** (recorrência, adiantamento, app) | SELECT em cliente, cobranca, cliente_cartao, cliente_acesso_central | `hubsoft_service.py:60` |\n| 8 | **Consultar cidade** do cliente (endereço de instalação) | SELECT em cliente_servico_endereco + cidade | `hubsoft_service.py:139` |\n| 9 | **Clientes por cidade** (relatórios) | SELECT COUNT GROUP BY cidade | `hubsoft_service.py:189` |\n\nConexão psycopg2 direta, read-only (`mega_leitura`). Env vars: `HUBSOFT_DB_USER`, `HUBSPOT_DB_PASSWORD`, `HUBSOFT_DB_HOST`, `HUBSOFT_DB_PORT`, `HUBSOFT_DB_NAME`.\n\n#### Via serviço de contrato (`apps/comercial/cadastro/services/contrato_service.py`)\n\n| # | Operação | Endpoint HubSoft | Método | Arquivo |\n|---|----------|------------------|--------|---------|\n| 10 | **Buscar contrato** do cliente | API HubSoft | GET | `contrato_service.py:40` |\n| 11 | **Criar contrato** | API HubSoft | POST | `contrato_service.py:164` |\n| 12 | **Atualizar contrato** | API HubSoft | PUT | `contrato_service.py:256` |\n| 13 | **Download contrato PDF** | API HubSoft | GET | `contrato_service.py:314` |\n\n**Resumo: 13 pontos de integração com o ERP.**\n\n| Método | Quantidade | Pontos |\n|--------|-----------|--------|\n| API REST OAuth2 | 8 | #1-5, #10-13 |\n| Webhook N8N | 1 | #6 |\n| Banco direto (psycopg2) | 3 | #7, #8, #9 |\n| **Total** | **13** | |\n\n**Recomendação:** migrar os 3 acessos diretos ao banco (#7, #8, #9) para API REST. A conexão direta depende de IP, schema e credenciais de banco, e não funciona com outros ERPs.\n\n### 1.4 Dados mínimos que o ERP precisa expor\n\nPara integrar qualquer ERP, precisamos de no mínimo:\n\n```\nGET  /clientes?cpf={cpf}          → {id, nome, email, telefone, endereco, cidade, status}\nGET  /clientes/{id}/contratos     → [{id, plano, status, data_inicio, data_fim, valor}]\nGET  /clientes/{id}/financeiro    → {inadimplente, recorrencia, adiantado}\nGET  /planos                      → [{id, nome, velocidade_down, velocidade_up, valor}]\nPOST /prospectos                  → Criar prospecto com dados do lead\nPOST /prospectos/{id}/documentos  → Enviar documentos\n```\n\n### 1.5 Credenciais necessárias\n\n| Item | Descrição |\n|------|-----------|\n| URL base da API | Ex: https://api.erp.com.br/v1 |\n| Método de autenticação | OAuth2 (client_credentials ou password), API Key, ou Bearer Token |\n| Client ID / Secret | Se OAuth |\n| Username / Password | Se auth por usuário |\n| IDs de mapeamento | id_origem (de onde vem o lead), id_vendedor_padrao, id_servico |\n\n---\n\n## 2. Integração com Plataforma de Atendimento\n\nA plataforma de atendimento é o canal de comunicação com o cliente (WhatsApp, chat web, SMS).\n\n### 2.1 O que o Aurora consome da plataforma\n\n| # | Dado | Onde é usado | Criticidade |\n|---|------|-------------|-------------|\n| 1 | **Mensagens recebidas** (texto, remetente, timestamp) | Inbox, detecção de campanha, bot de atendimento | Alta |\n| 2 | **Status de entrega/leitura** | Indicadores no chat (✓, ✓✓, azul) | Baixa |\n| 3 | **Histórico de conversa** | Ficha do lead, CRM, PDF da conversa | Média |\n\n### 2.2 O que o Aurora envia para a plataforma\n\n| # | Dado | Quando | Criticidade |\n|---|------|--------|-------------|\n| 1 | **Mensagens do agente** | Resposta no Inbox | Alta |\n| 2 | **Mensagens automáticas** (automações: boas-vindas, follow-up) | Engine de automações dispara | Alta |\n| 3 | **OTP de verificação** | Cadastro no Clube (CS) | Alta |\n| 4 | **Notificações** (tarefa vencida, nova oportunidade) | Automações + webhooks CRM | Média |\n\n### 2.3 Como cada integração funciona hoje\n\n#### Plataforma de atendimento (Matrix)\n\n| # | Operação | Direção | Método | Arquivo |\n|---|----------|---------|--------|---------|\n| 1 | **Buscar histórico de conversa** por código | Aurora → Matrix | GET `/rest/v1/atendimento` | `atendimento_service.py:48` |\n| 2 | **Enviar mensagem do agente** (Inbox) | Aurora → Plataforma | POST webhook configurado por canal | `inbox/services.py:303` |\n| 3 | **Receber mensagem do cliente** | Plataforma → Aurora | POST `/inbox/api/n8n/mensagem-recebida/` | `inbox/views_n8n.py` |\n| 4 | **Status de entrega/leitura** | Plataforma → Aurora | POST `/inbox/api/n8n/status-mensagem/` | `inbox/views_n8n.py` |\n\nCredenciais: `MATRIX_API_URL`, `MATRIX_API_TOKEN` (env vars).\n\n#### N8N (orquestrador de webhooks)\n\n| # | Operação | Direção | Webhook | Arquivo |\n|---|----------|---------|---------|---------|\n| 5 | **Enviar OTP via WhatsApp** | Aurora → N8N → WhatsApp | `/webhook/roletacodconfirmacao` | `otp_service.py:25` |\n| 6 | **Enviar WhatsApp (automações)** | Aurora → N8N → WhatsApp | Webhook hardcoded no engine | `engine.py:442` |\n| 7 | **Enviar e-mail (automações)** | Aurora → N8N | Webhook hardcoded no engine | `engine.py:475` |\n| 8 | **Validação IA de questão (bot)** | Aurora → N8N | URL configurada por questão | `atendimento/models.py:739` |\n| 9 | **Pós-resposta de questão (bot)** | Aurora → N8N | URL configurada por questão | `atendimento/models.py:931` |\n| 10 | **Notificação CRM: nova oportunidade** | Aurora → N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 11 | **Notificação CRM: mudança estágio** | Aurora → N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 12 | **Notificação CRM: tarefa vencida** | Aurora → N8N | URL em ConfiguracaoCRM | `crm/views.py:33` |\n| 13 | **Push notification** | Aurora → N8N | URL em settings | `notificacoes/views.py:1172` |\n\n#### APIs do Aurora que sistemas externos consomem\n\n| # | Endpoint | Método | Auth | Quem chama |\n|---|----------|--------|------|------------|\n| 14 | `/api/v1/leads/registrar/` | POST | Token | N8N (bot) |\n| 15 | `/api/v1/leads/atualizar/` | PUT | Token | N8N (bot) |\n| 16 | `/api/v1/leads/imagens/registrar/` | POST | Token | N8N (docs) |\n| 17 | `/api/v1/atendimento/n8n/*` (14 endpoints) | GET/POST | Token | N8N (bot) |\n| 18 | `/marketing/api/campanhas/detectar/` | POST | Token | N8N (campanha) |\n| 19 | `/inbox/api/n8n/mensagem-recebida/` | POST | Token | Plataforma/N8N |\n| 20 | `/api/v1/venda/aprovar/` | POST | Token | N8N/ERP |\n| 21 | `/api/v1/venda/rejeitar/` | POST | Token | N8N/ERP |\n\n#### Consulta de CEP (multi-source)\n\n| # | Operação | Fonte | Arquivo |\n|---|----------|-------|---------|\n| 22 | **Buscar endereço por CEP** | ViaCEP → CepAPI → BrasilAPI → Postmon → OpenCEP | `cadastro/views.py:604` |\n\n**Resumo: 22 pontos de integração com atendimento/N8N/externos.**\n\n| Método | Quantidade |\n|--------|-----------|\n| Aurora → Plataforma (webhook envio) | 2 |\n| Plataforma → Aurora (webhook recebimento) | 2 |\n| Aurora → N8N (webhook) | 9 |\n| N8N/externo → Aurora (API REST) | 8 |\n| Aurora → APIs de CEP | 1 |\n| **Total** | **22** |\n\n### 2.4 Endpoints mínimos que a plataforma precisa expor\n\n```\nPOST /enviar-mensagem  → {telefone, mensagem, tipo}  (texto, imagem, documento)\nPOST /enviar-otp       → {telefone, codigo}\nGET  /conversa/{id}    → Histórico de mensagens\n```\n\nE a plataforma precisa enviar para o Aurora via webhook:\n\n```\nPOST /inbox/api/n8n/mensagem-recebida/  → {telefone, mensagem, canal, timestamp}\nPOST /inbox/api/n8n/status-mensagem/    → {mensagem_id, status} (entregue/lido)\n```\n\n### 2.5 Credenciais necessárias\n\n| Item | Descrição |\n|------|-----------|\n| URL do webhook de envio | Para onde o Aurora manda mensagens |\n| Token de autenticação | API Key ou Bearer Token da plataforma |\n| URL do webhook de recebimento | URL do Aurora que a plataforma vai chamar |\n| Token do Aurora | Token DRF gerado para a plataforma autenticar no Aurora |\n\n---\n\n## 3. Integração com N8N (Orquestrador)\n\nO N8N funciona como middleware entre o Aurora e os sistemas externos. Não é obrigatório (as integrações podem ser diretas), mas simplifica o setup.\n\n### 3.1 Fluxos N8N necessários\n\n| # | Fluxo | Trigger | O que faz |\n|---|-------|---------|-----------|\n| 1 | **Bot de atendimento** | Mensagem recebida no WhatsApp | Consulta fluxo de questões na API do Aurora, envia resposta ao cliente, avança etapas |\n| 2 | **Detecção de campanha** | Mensagem recebida no WhatsApp | Envia mensagem para API `/marketing/api/campanhas/detectar/`, atribui lead à campanha |\n| 3 | **Envio de OTP** | Webhook do Aurora | Recebe CPF + telefone + código, envia via WhatsApp |\n| 4 | **Consulta cliente ERP** | Webhook do Aurora | Recebe CPF, consulta no ERP, retorna dados do cliente |\n| 5 | **Envio de WhatsApp (automações)** | Webhook do Aurora | Recebe telefone + mensagem, envia via plataforma de atendimento |\n| 6 | **Notificações CRM** | Webhook do Aurora | Nova oportunidade, mudança de estágio, tarefa vencida |\n\n### 3.2 Webhooks configurados no Aurora\n\n| Webhook | Onde configurar | Quem chama |\n|---------|----------------|------------|\n| `webhook_n8n_nova_oportunidade` | ConfiguracaoCRM | Signal do CRM (auto) |\n| `webhook_n8n_mudanca_estagio` | ConfiguracaoCRM | Signal do CRM (auto) |\n| `webhook_n8n_tarefa_vencida` | ConfiguracaoCRM | Cron (auto) |\n| Webhook de envio por canal | Configurações do Inbox > Canais | Agente responde no Inbox |\n\n### 3.3 APIs do Aurora que o N8N consome\n\n| API | Método | Auth | Descrição |\n|-----|--------|------|-----------|\n| `/api/v1/leads/registrar/` | POST | Token | Criar lead |\n| `/api/v1/leads/atualizar/` | PUT | Token | Atualizar lead |\n| `/api/v1/leads/imagens/registrar/` | POST | Token | Enviar documentos |\n| `/api/v1/atendimento/n8n/*` | GET/POST | Token | 14 endpoints do bot |\n| `/marketing/api/campanhas/detectar/` | POST | Token | Detectar campanha |\n| `/inbox/api/n8n/mensagem-recebida/` | POST | Token | Receber mensagem |\n\n---\n\n## 4. Checklist de Integração por Cliente\n\n### ERP (obrigatório)\n\n```\n[ ] Identificar qual ERP o provedor usa\n[ ] Obter credenciais de API (URL, auth method, tokens)\n[ ] Mapear IDs: id_origem, id_vendedor, id_servico\n[ ] Testar consulta de cliente por CPF\n[ ] Testar criação de prospecto\n[ ] Configurar IntegracaoAPI no Aurora\n[ ] Validar conexão no Admin Aurora > Monitoramento\n```\n\n### Plataforma de Atendimento (obrigatório para Inbox/Bot)\n\n```\n[ ] Identificar qual plataforma o provedor usa (WhatsApp Business API, etc.)\n[ ] Obter webhook de envio (URL para onde Aurora manda mensagens)\n[ ] Configurar webhook de recebimento (URL do Aurora na plataforma)\n[ ] Gerar token DRF para a plataforma autenticar\n[ ] Configurar canal no Inbox > Configurações > Canais\n[ ] Testar envio e recebimento de mensagem\n```\n\n### N8N (recomendado)\n\n```\n[ ] Instância N8N disponível (self-hosted ou cloud)\n[ ] Duplicar/criar fluxos necessários (bot, campanha, OTP, notificações)\n[ ] Configurar credenciais do ERP no N8N\n[ ] Configurar credenciais da plataforma de atendimento no N8N\n[ ] Configurar token do Aurora no N8N\n[ ] Testar fluxo completo: mensagem → bot → lead → CRM\n```\n\n---\n\n## 5. ERPs conhecidos no mercado ISP\n\n| ERP | API REST | Observações |\n|-----|----------|-------------|\n| **HubSoft** | Sim (OAuth2) | Integração nativa e profunda. Caso de produção. |\n| **MK Solutions** | Sim | Popular em provedores médios. API documentada. |\n| **IXCSoft** | Sim | Grande base instalada. API REST disponível. |\n| **SGP** | Parcial | Alguns endpoints. Pode precisar de workaround. |\n| **Controllr** | Sim | API REST. Crescendo no mercado. |\n| **Topapp** | Sim | Focado em provedores menores. |\n\n### Plataformas de atendimento\n\n| Plataforma | Tipo | Observações |\n|------------|------|-------------|\n| **Matrix do Brasil** | WhatsApp Business API | Integração atual da Megalink. |\n| **Evolution API** | WhatsApp (não oficial) | Open source, self-hosted. Popular. |\n| **Z-API** | WhatsApp Business API | API simples, boa documentação. |\n| **Twilio** | WhatsApp + SMS + Voz | Enterprise, mais caro. |\n| **Baileys/WPPConnect** | WhatsApp (não oficial) | Open source, instável. |\n| **Chatwoot** | Omnichannel | Open source, multi-canal. |\n\n---\n\n## 6. Mapa Consolidado — Todos os 35 Pontos de Integração\n\n| # | Operação | Sistema | Método | Direção |\n|---|----------|---------|--------|---------|\n| **ERP** | | | | |\n| 1 | Obter token OAuth | HubSoft API | REST POST | Aurora → ERP |\n| 2 | Cadastrar prospecto | HubSoft API | REST POST | Aurora → ERP |\n| 3 | Consultar cliente por CPF | HubSoft API | REST GET | Aurora → ERP |\n| 4 | Sincronizar cliente (local) | HubSoft API | REST GET | Aurora → ERP |\n| 5 | Sincronizar serviços | HubSoft API | Dentro de #4 | Aurora → ERP |\n| 6 | Consultar cliente (Clube) | N8N webhook | POST | Aurora → N8N → ERP |\n| 7 | Checar pontos extras | HubSoft DB | SQL direto | Aurora → DB ERP |\n| 8 | Consultar cidade | HubSoft DB | SQL direto | Aurora → DB ERP |\n| 9 | Clientes por cidade | HubSoft DB | SQL direto | Aurora → DB ERP |\n| 10 | Buscar contrato | HubSoft API | REST GET | Aurora → ERP |\n| 11 | Criar contrato | HubSoft API | REST POST | Aurora → ERP |\n| 12 | Atualizar contrato | HubSoft API | REST PUT | Aurora → ERP |\n| 13 | Download contrato PDF | HubSoft API | REST GET | Aurora → ERP |\n| **Atendimento** | | | | |\n| 14 | Buscar histórico conversa | Matrix API | REST GET | Aurora → Plataforma |\n| 15 | Enviar mensagem (Inbox) | Webhook canal | POST | Aurora → Plataforma |\n| 16 | Receber mensagem cliente | API Aurora | POST | Plataforma → Aurora |\n| 17 | Status entrega/leitura | API Aurora | POST | Plataforma → Aurora |\n| **N8N / Webhooks** | | | | |\n| 18 | Enviar OTP WhatsApp | N8N webhook | POST | Aurora → N8N |\n| 19 | Enviar WhatsApp (automação) | N8N webhook | POST | Aurora → N8N |\n| 20 | Enviar e-mail (automação) | N8N webhook | POST | Aurora → N8N |\n| 21 | Validação IA questão (bot) | N8N webhook | POST | Aurora → N8N |\n| 22 | Pós-resposta questão (bot) | N8N webhook | POST | Aurora → N8N |\n| 23 | Notificação: nova oportunidade | N8N webhook | POST | Aurora → N8N |\n| 24 | Notificação: mudança estágio | N8N webhook | POST | Aurora → N8N |\n| 25 | Notificação: tarefa vencida | N8N webhook | POST | Aurora → N8N |\n| 26 | Push notification | N8N webhook | POST | Aurora → N8N |\n| **APIs consumidas por externos** | | | | |\n| 27 | Registrar lead | API Aurora | POST | N8N → Aurora |\n| 28 | Atualizar lead | API Aurora | PUT | N8N → Aurora |\n| 29 | Enviar documentos | API Aurora | POST | N8N → Aurora |\n| 30 | Bot atendimento (14 endpoints) | API Aurora | GET/POST | N8N → Aurora |\n| 31 | Detectar campanha | API Aurora | POST | N8N → Aurora |\n| 32 | Aprovar venda | API Aurora | POST | ERP/N8N → Aurora |\n| 33 | Rejeitar venda | API Aurora | POST | ERP/N8N → Aurora |\n| **Outros** | | | | |\n| 34 | Consultar CEP | ViaCEP + fallbacks | REST GET | Aurora → APIs públicas |\n| 35 | IA (OpenAI/Gemini) | APIs IA | REST POST | Aurora → OpenAI/Google |\n\n---\n\n## 7. Resumo: O que perguntar ao provedor\n\nAo iniciar a implementação de um novo cliente:\n\n1. **Qual ERP vocês usam?** (HubSoft, MK, IXC, SGP, Controllr, outro)\n2. **Vocês têm acesso à API do ERP?** (credenciais, documentação)\n3. **Qual plataforma de WhatsApp usam?** (Matrix, Evolution, Z-API, outro)\n4. **Já têm N8N ou ferramenta de automação?** (self-hosted, cloud)\n5. **Quais IDs preciso mapear?** (vendedor padrão, origem do lead, serviço)\n6. **Quem é o contato técnico para integrações?** (para resolver credenciais e testes)\n"}, {"t": "f", "n": "11 Permissoes", "fn": "11-PERMISSOES.md", "c": "# Sistema de Permissões — AuroraISP\n\n**Última atualização:** 08/04/2026\n**Status:** ✅ Implementado\n**Localização:** `apps/sistema/`\n\n---\n\n## Visão Geral\n\nO sistema de permissões controla o acesso de cada usuário a funcionalidades específicas do sistema. Funciona em 3 camadas:\n\n```\nCamada 1: PERFIL DE PERMISSÃO (role reutilizável)\n    Admin cria perfis como \"Vendedor\", \"Supervisor\", \"Gerente\"\n    Cada perfil tem uma lista de funcionalidades habilitadas\n\nCamada 2: FUNCIONALIDADE (granular)\n    35 funcionalidades fixas agrupadas por módulo\n    Cada funcionalidade = 1 checkbox no perfil\n\nCamada 3: ATRIBUIÇÃO (usuário → perfil)\n    Cada usuário recebe 1 perfil\n    Muda o perfil = muda para todos os usuários com aquele perfil\n```\n\n**Retrocompatível:** superusers passam tudo. Usuários sem perfil atribuído também (legado).\n\n**Importante:** todas as views usam `user_tem_funcionalidade()` para verificar permissões. O campo `is_superuser` do Django é reservado apenas para o painel Aurora Admin (`/aurora-admin/`) e proteções internas (ex: impedir exclusao de superusers). Nunca usar `is_superuser` para controle de acesso em views do sistema.\n\n---\n\n## Arquitetura\n\n### Models\n\n```\nFuncionalidade (35 registros fixos, seed)\n    ├── modulo: comercial | marketing | cs | inbox | configuracoes\n    ├── codigo: \"comercial.ver_pipeline\" (unique)\n    ├── nome: \"Ver Pipeline\"\n    └── descricao: \"Visualizar pipeline Kanban e oportunidades\"\n\nPerfilPermissao (criado pelo admin, por tenant)\n    ├── nome: \"Vendedor\" (unique por tenant)\n    ├── descricao: \"Acesso básico ao comercial\"\n    └── funcionalidades: M2M → Funcionalidade\n\nPermissaoUsuario (1:1 com User)\n    ├── user: OneToOne User\n    ├── tenant: FK Tenant\n    └── perfil: FK PerfilPermissao (nullable)\n```\n\n### Como a verificação funciona\n\n```\nRequest chega\n    │\n    ▼\nPermissaoMiddleware (apps/sistema/middleware.py)\n    │\n    ├── Superuser? → passa\n    ├── Sem PermissaoUsuario? → passa (retrocompatível)\n    ├── URL contém /crm/ ? → verifica perm.acesso_comercial\n    ├── URL contém /marketing/ ? → verifica perm.acesso_marketing\n    ├── URL contém /cs/ ou /roleta/ ? → verifica perm.acesso_cs\n    ├── URL contém /inbox/ ou /suporte/ ? → verifica perm.acesso_inbox\n    └── URL contém /configuracoes ? → verifica perm.acesso_configuracoes\n         │\n         └── Se não tem acesso → HTTP 403 \"Acesso negado\"\n```\n\nA sidebar e topbar filtram os menus via context processor (`perm` e `is_superuser` disponíveis em todos os templates).\n\n---\n\n## 35 Funcionalidades\n\n### Comercial (9)\n\n| Código | Nome | Escopo |\n|--------|------|--------|\n| `comercial.ver_dashboard` | Ver Dashboard | Acesso ao dashboard comercial |\n| `comercial.ver_pipeline` | Ver Pipeline | Visualizar pipeline Kanban |\n| `comercial.mover_oportunidade` | Mover Oportunidades | Arrastar entre estágios |\n| `comercial.ver_todas_oportunidades` | Ver Todas as Oportunidades | Escopo supervisor/gerente (não só as suas) |\n| `comercial.criar_tarefa` | Criar e Editar Tarefas | CRUD de tarefas no CRM |\n| `comercial.ver_desempenho` | Ver Relatórios de Desempenho | Dashboard de performance |\n| `comercial.gerenciar_metas` | Gerenciar Metas | CRUD de metas de vendas |\n| `comercial.gerenciar_equipes` | Gerenciar Equipes | Criar equipes e atribuir membros |\n| `comercial.configurar_pipeline` | Configurar Pipelines | Pipelines, estágios, webhooks, config CRM |\n\n### Marketing (7)\n\n| Código | Nome | Escopo |\n|--------|------|--------|\n| `marketing.ver_leads` | Ver Leads | Lista de leads e detalhes |\n| `marketing.gerenciar_campanhas` | Gerenciar Campanhas | CRUD campanhas de tráfego |\n| `marketing.ver_segmentos` | Ver Segmentos | Visualizar segmentos e membros |\n| `marketing.gerenciar_segmentos` | Gerenciar Segmentos | Criar/editar regras de filtro |\n| `marketing.ver_automacoes` | Ver Automações | Lista e histórico |\n| `marketing.gerenciar_automacoes` | Gerenciar Automações | Editor visual, criar/editar |\n| `marketing.configurar` | Configurar Marketing | Landing page, ativar/desativar automações |\n\n### Customer Success (6)\n\n| Código | Nome | Escopo |\n|--------|------|--------|\n| `cs.ver_dashboard` | Ver Dashboard CS | Dashboard do Clube |\n| `cs.gerenciar_membros` | Gerenciar Membros | Editar saldo e extrato |\n| `cs.gerenciar_cupons` | Gerenciar Cupons e Parceiros | CRUD parceiros, cupons, resgates |\n| `cs.aprovar_cupons` | Aprovar/Rejeitar Cupons | Aprovação de cupons de parceiros |\n| `cs.gerenciar_indicacoes` | Gerenciar Indicações | Status e conversão de indicações |\n| `cs.configurar` | Configurar CS | Regras, níveis, banners, carteirinhas |\n\n### Inbox / Suporte (8)\n\n| Código | Nome | Escopo |\n|--------|------|--------|\n| `inbox.ver_minhas` | Ver Minhas Conversas | Apenas atribuídas a mim |\n| `inbox.ver_equipe` | Ver Conversas da Equipe | Escopo supervisor |\n| `inbox.ver_todas` | Ver Todas as Conversas | Todas do tenant |\n| `inbox.responder` | Responder Conversas | Enviar mensagens e notas |\n| `inbox.transferir_agente` | Transferir para Agente | Entre agentes da mesma equipe |\n| `inbox.transferir_equipe` | Transferir entre Equipes | Entre equipes/filas |\n| `inbox.resolver` | Resolver e Reabrir | Mudar status da conversa |\n| `inbox.configurar` | Configurar Inbox | Equipes, filas, horários, canais, widget |\n\n### Configurações (5)\n\n| Código | Nome | Escopo |\n|--------|------|--------|\n| `config.gerenciar_usuarios` | Gerenciar Usuários | CRUD de usuários |\n| `config.gerenciar_perfis` | Gerenciar Perfis | Criar/editar perfis de permissão |\n| `config.gerenciar_planos` | Gerenciar Planos e Vencimentos | CRUD planos de internet |\n| `config.gerenciar_fluxos` | Gerenciar Fluxos de Atendimento | Configurar bot |\n| `config.gerenciar_notificacoes` | Gerenciar Notificações | Tipos e canais |\n\n---\n\n## Onde gerenciar\n\n| O que | Onde | Quem acessa |\n|-------|------|-------------|\n| Criar/editar perfis | Configurações > Usuários > botão \"Perfis\" (`/configuracoes/perfis/`) | Admin |\n| Atribuir perfil a usuário | Configurações > Usuários > Editar > select \"Perfil de Permissão\" | Admin |\n| Seed de funcionalidades | `python manage.py seed_funcionalidades` | DevOps |\n| Django Admin | `/admin/sistema/funcionalidade/` e `/admin/sistema/perfilpermissao/` | Superuser |\n\n---\n\n## Exemplos de perfis sugeridos\n\n### Vendedor\nComercial: ver_dashboard, ver_pipeline, mover_oportunidade, criar_tarefa\nInbox: ver_minhas, responder\n\n### Supervisor Comercial\nTudo do Vendedor +\nComercial: ver_todas_oportunidades, ver_desempenho\nInbox: ver_equipe, transferir_agente\n\n### Gerente Comercial\nTudo do Supervisor +\nComercial: gerenciar_metas, gerenciar_equipes, configurar_pipeline\nInbox: ver_todas, transferir_equipe, resolver\n\n### Analista Marketing\nMarketing: ver_leads, gerenciar_campanhas, ver_segmentos, gerenciar_segmentos, ver_automacoes\n\n### Gerente Marketing\nTudo do Analista +\nMarketing: gerenciar_automacoes, configurar\n\n### Operador CS\nCS: ver_dashboard, gerenciar_membros, gerenciar_cupons, gerenciar_indicacoes\n\n### Agente Suporte\nInbox: ver_minhas, responder, transferir_agente, resolver\n\n### Admin\nTodas as 35 funcionalidades\n\n---\n\n## Arquivos do sistema\n\n| Arquivo | O que contém |\n|---------|-------------|\n| `apps/sistema/models.py` | Funcionalidade, PerfilPermissao, PermissaoUsuario |\n| `apps/sistema/middleware.py` | PermissaoMiddleware (verifica por URL) |\n| `apps/sistema/decorators.py` | `@permissao_required`, `user_tem_funcionalidade()` |\n| `apps/sistema/context_processors.py` | `perm` e `user_funcs` em templates |\n| `apps/sistema/admin.py` | Admin para Funcionalidade, PerfilPermissao, PermissaoUsuario |\n| `apps/sistema/management/commands/seed_funcionalidades.py` | Seed das 35 funcionalidades |\n| `apps/sistema/templates/sistema/configuracoes/perfis_permissao.html` | Página de gestão de perfis |\n| `apps/sistema/templates/sistema/configuracoes/usuarios.html` | Atribuição de perfil por usuário |\n| `apps/sistema/templates/sistema/base.html` | Sidebar/topbar filtrados por permissões |\n\n---\n\n## O que funciona hoje\n\n1. **Middleware bloqueia acesso por módulo** (URL-based, HTTP 403)\n2. **Verificacao granular nas views** via `user_tem_funcionalidade()` em CRM, Sistema e Notificacoes\n3. **Filtro de escopo no CRM** baseado em `comercial.ver_todas_oportunidades` (vendedor ve so suas, supervisor/gerente ve todas)\n4. **Topbar esconde módulos** sem acesso\n5. **Sidebar esconde menus de configuração** para não-gerentes\n6. **Perfis reutilizáveis** com checkboxes de funcionalidades por módulo\n7. **Atribuição** via select na edição de usuário\n8. **Retrocompatível** (superuser e sem perfil = acesso total)\n9. **35 funcionalidades seedadas** via management command\n10. **Tela de usuarios filtrada por tenant** (cada tenant ve apenas seus usuarios)\n11. **Campo Staff removido** da interface (apenas Ativo/Inativo visivel)\n\n---\n\n## O que falta implementar (futuro)\n\n### Prioridade alta\n\n1. **Aplicar permissões no Inbox**\n   O Inbox não filtra conversas por agente/equipe baseado nas permissões. Todos veem tudo.\n   **Solução:** na view `api_conversas`, verificar `inbox.ver_minhas` / `inbox.ver_equipe` / `inbox.ver_todas` e filtrar o queryset.\n\n### Prioridade média\n\n4. **Cache de permissões**\n   Hoje cada request faz query no banco (user → permissao → perfil → funcionalidades M2M). Em alto tráfego pode impactar.\n   **Solução:** cachear `perm.funcionalidades` em memória por sessão ou usar `select_related`/`prefetch_related` no middleware.\n\n5. **Audit log de mudanças de perfil**\n   Registrar quando um perfil é criado/editado/excluído e quando um usuário muda de perfil.\n   **Solução:** signal `post_save` em PerfilPermissao e PermissaoUsuario, salvar em LogSistema.\n\n6. **Herança de perfis**\n   Permitir que um perfil herde de outro (ex: \"Supervisor\" herda tudo de \"Vendedor\" e adiciona funcionalidades).\n   **Solução:** campo `pai` FK em PerfilPermissao. Na verificação, unir funcionalidades do perfil + pai.\n\n### Prioridade baixa\n\n7. **Permissões por objeto**\n   Controlar acesso a registros específicos (ex: vendedor X só pode ver leads da cidade Y).\n   **Solução:** model `RestricaoObjeto` com filtros dinâmicos. Complexidade alta, avaliar necessidade real.\n\n8. **Funcionalidades customizáveis por tenant**\n   Hoje as 35 funcionalidades são fixas (seed). Um tenant pode querer criar funcionalidades próprias.\n   **Solução:** campo `tenant` nullable em Funcionalidade. Se null = global, se preenchido = custom do tenant.\n\n---\n\n## Preocupações\n\n### Segurança\n- **Verificacao granular aplicada em CRM, Sistema e Notificacoes.** Todas as views sensíveis (configuracoes, criar/editar/excluir) usam `user_tem_funcionalidade()`. O middleware continua como primeira barreira por módulo (URL).\n- **APIs N8N não verificam funcionalidades.** As APIs REST (`/api/v1/n8n/...`) só verificam token, não perfil de permissão. Para N8N isso é ok (acesso de serviço), mas se expor APIs para o frontend SPA no futuro, precisa verificar.\n- **Inbox ainda não filtra por escopo.** Todos os agentes veem todas as conversas. Pendente aplicar `inbox.ver_minhas` / `inbox.ver_equipe` / `inbox.ver_todas`.\n\n### Performance\n- **M2M query a cada request.** A verificação `perm.acesso_comercial` faz `perfil.funcionalidades.filter(modulo='comercial').exists()` que é uma query. Com `prefetch_related` no middleware resolve.\n- **35 funcionalidades é gerenciável.** Se crescer para 100+, a página de perfis precisa de busca/filtro.\n\n### Operacional\n- **Seed obrigatório.** Em cada deploy, rodar `python manage.py seed_funcionalidades`. Se esquecer, a página de perfis fica sem funcionalidades para marcar.\n- **Migration de perfis existentes.** Se já existem perfis criados com o modelo antigo (campos booleanos), eles perdem as permissões ao migrar. Precisa reconfigurar manualmente.\n"}, {"t": "f", "n": "12 Modulo Suporte", "fn": "12-MODULO_SUPORTE.md", "c": "# Módulo Suporte & Inbox — AuroraISP\n\n**Última atualização:** 06/04/2026\n**Status:** ✅ Em produção\n**Localização:** `apps/inbox/` + `apps/suporte/`\n\n---\n\n## Visão Geral\n\nO módulo de Suporte & Inbox é o sistema de atendimento omnichannel da Aurora. Composto por dois sub-apps que trabalham juntos: o **Inbox** (chat em tempo real, WhatsApp, widget) e o **Suporte** (tickets formais com SLA). O Inbox é o app principal, com 20 models, 20+ views, provider pattern para multi-provedor, distribuição automática, WebSocket e widget embeddable.\n\n```\nCliente (WhatsApp / Widget / E-mail)\n    │\n    ▼\n┌──────────────────────────────────────────────────────┐\n│                    PROVIDERS                          │\n│  Uazapi │ Evolution │ Meta Cloud │ Twilio │ Webhook  │\n└────────────────────┬─────────────────────────────────┘\n                     │ parse_webhook()\n                     ▼\n┌──────────────────────────────────────────────────────┐\n│                     INBOX                             │\n│  Receber mensagem → Distribuir → Conversa → Agente   │\n│  Enviar mensagem ← Provider ← Agente                 │\n│  Notas internas, etiquetas, transferências            │\n└────────────────────┬─────────────────────────────────┘\n                     │ Criar ticket\n                     ▼\n┌──────────────────────────────────────────────────────┐\n│                    SUPORTE                            │\n│  Ticket → Comentários → SLA → Resolução → Fechamento │\n└──────────────────────────────────────────────────────┘\n```\n\n---\n\n## 1. Inbox (`apps/inbox/`)\n\n### Models (20)\n\n#### Conversa (central)\nTabela: `inbox_conversas` | Unique: (tenant, numero)\n\n| Grupo | Campos |\n|-------|--------|\n| **Identificação** | numero (auto, sequencial por tenant), identificador_externo (thread ID WhatsApp) |\n| **Contato** | contato_nome, contato_telefone (indexado), contato_email |\n| **Canal** | canal FK CanalInbox |\n| **Status** | status (aberta/pendente/resolvida/arquivada), prioridade (baixa/normal/alta/urgente) |\n| **Atribuição** | agente FK User, equipe FK EquipeInbox, fila FK FilaInbox |\n| **Vinculações** | lead FK LeadProspecto, ticket FK Ticket, oportunidade FK OportunidadeVenda |\n| **Etiquetas** | etiquetas M2M EtiquetaConversa |\n| **Métricas** | ultima_mensagem_em, ultima_mensagem_preview, mensagens_nao_lidas, tempo_primeira_resposta_seg |\n| **Timestamps** | data_abertura (auto), data_resolucao, data_arquivamento |\n| **Extra** | metadata (JSON) |\n\n**6 índices:** status+agente, canal+status, ultima_mensagem_em, contato_telefone, equipe+status, fila+status\n\n#### Mensagem\nTabela: `inbox_mensagens`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `conversa` | FK Conversa | Conversa pai |\n| `remetente_tipo` | CharField | contato, agente, sistema, bot |\n| `remetente_user` | FK User | Se agente |\n| `remetente_nome` | CharField | Nome exibido |\n| `tipo_conteudo` | CharField | texto, imagem, arquivo, audio, video, localizacao, sistema |\n| `conteudo` | TextField | Conteúdo da mensagem |\n| `arquivo_url` | URLField | URL do arquivo (se mídia) |\n| `arquivo_nome` | CharField | Nome do arquivo |\n| `lida` | Boolean | Se foi lida |\n| `data_envio` | DateTime | Timestamp de envio |\n| `data_entrega` / `data_leitura` | DateTime | Timestamps de entrega/leitura |\n| `identificador_externo` | CharField | Message ID do provider |\n| `erro_envio` | TextField | Erro ao enviar (se houver) |\n\n#### CanalInbox\nTabela: `inbox_canais` | Unique: (tenant, tipo, identificador_canal)\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `tipo` | CharField | whatsapp, widget, email, interno |\n| `nome` | CharField | Nome do canal |\n| `integracao` | FK IntegracaoAPI | Integração vinculada |\n| `provedor` | CharField | Slug do provider (uazapi, evolution, etc) |\n| `identificador_canal` | CharField | Número de telefone, ID da instância |\n| `configuracao` | JSONField | webhook_envio_url, tokens, etc |\n\n#### EquipeInbox + MembroEquipeInbox\nEquipes de atendimento com membros (agente/supervisor/gerente).\n\n#### PerfilAgenteInbox\nStatus do agente (online/ausente/offline), capacidade máxima de conversas, check de disponibilidade.\n\n#### FilaInbox + RegraRoteamento\nFilas de distribuição com regras por canal, etiqueta ou horário. Modos: round_robin, menor_carga, manual.\n\n#### HorarioAtendimento\nHorário por dia da semana (hora_inicio, hora_fim, ativo).\n\n#### ConfiguracaoInbox\nSingleton: mensagem_fora_horario, distribuicao_padrao, atribuir_ao_responder.\n\n#### RespostaRapida\nTemplates de resposta com atalho (ex: `/ola`). Unique: (tenant, atalho).\n\n#### EtiquetaConversa\nTags com cor hex. Unique: (tenant, nome).\n\n#### NotaInternaConversa\nNotas privadas do agente na conversa.\n\n#### HistoricoTransferencia\nLog de transferências entre agentes/equipes/filas.\n\n#### CategoriaFAQ + ArtigoFAQ\nFAQ para o widget de chat. Categorias com ícone e artigos com contagem de visualizações.\n\n#### WidgetConfig\nConfiguração do widget embeddable: token_publico (UUID), cores, posição, FAQ, campos obrigatórios, domínios permitidos.\n\n---\n\n### Services (`services.py`)\n\n| Função | O que faz |\n|--------|-----------|\n| `receber_mensagem(telefone, nome, conteudo, tenant, ...)` | Processa mensagem recebida. Normaliza telefone, busca/cria conversa, busca/cria lead, verifica horário, distribui, cria mensagem, notifica via WebSocket |\n| `enviar_mensagem(conversa, conteudo, user, ...)` | Agente envia mensagem. Cria Mensagem, calcula tempo de resposta, auto-atribui agente, envia via provider em background thread |\n| `atribuir_conversa(conversa, agente, atribuido_por)` | Atribui conversa a agente, cria mensagem de sistema |\n| `resolver_conversa(conversa, user)` | Marca como resolvida, seta data_resolucao |\n| `reabrir_conversa(conversa, user)` | Reabre conversa resolvida/arquivada |\n| `transferir_conversa(conversa, transferido_por, ...)` | Transfere para agente/equipe/fila, cria histórico |\n| `criar_ticket_de_conversa(conversa, titulo, user)` | Cria Ticket de suporte a partir da conversa com histórico de mensagens |\n| `marcar_mensagens_lidas(conversa)` | Marca mensagens do contato como lidas |\n| `atualizar_status_entrega(identificador_externo, status)` | Atualiza status de entrega/leitura da mensagem |\n| `receber_mensagem_widget(visitor_id, nome, conteudo, ...)` | Versão widget: usa visitor_id em vez de telefone |\n| `buscar_lead_por_telefone(telefone, tenant)` | Busca lead por match exato ou parcial (últimos 11/10 dígitos) |\n\n### Distribuição automática (`distribution.py`)\n\n| Função | O que faz |\n|--------|-----------|\n| `verificar_horario_atendimento(tenant)` | Verifica se está dentro do horário de atendimento |\n| `determinar_fila(conversa, tenant)` | Encontra fila pela regra de roteamento (canal, etiqueta, horário) |\n| `selecionar_agente(fila, tenant)` | Seleciona agente disponível (round_robin, menor_carga, manual) |\n| `distribuir_conversa(conversa, tenant)` | Orquestra: fila → agente → atribuição |\n\n---\n\n### Provider Pattern (`providers/`)\n\nAbstração para múltiplos provedores de mensageria.\n\n```\nproviders/\n    __init__.py     # Registry + get_provider(canal) factory\n    base.py         # BaseProvider ABC\n    uazapi.py       # UazapiProvider (WhatsApp via Uazapi)\n    webhook.py      # GenericWebhookProvider (N8N fallback)\n```\n\n**BaseProvider (ABC):**\n- `enviar_texto(telefone, mensagem)` — obrigatório\n- `enviar_imagem(telefone, url, legenda)` — obrigatório\n- `enviar_documento(telefone, url, nome)` — obrigatório\n- `enviar_audio(telefone, url)` — obrigatório\n- `enviar_mensagem(conversa, mensagem)` — router por tipo_conteudo\n- `parse_webhook(body)` — normaliza payload do provider\n- `extrair_msg_id(result)` — extrai message ID da resposta\n\n**UazapiProvider:** wraps UazapiService com 20+ métodos de envio (texto, mídia, menu, carrossel, vCard, localização, PIX). Parse de webhook nos formatos Uazapi real e Baileys/legacy.\n\n**Para adicionar novo provider:** criar 1 arquivo com `@register_provider`, implementar os métodos abstract. Zero mudanças em services/views.\n\n---\n\n### Views (20+)\n\n#### Interface principal\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `inbox_view` | `/inbox/` | Interface 3 painéis (conversas, chat, contexto) |\n| `dashboard_inbox` | `/inbox/dashboard/` | KPIs, gráficos 30 dias, ranking agentes |\n| `configuracoes_inbox` | `/inbox/configuracoes/` | 9 tabs (equipes, filas, respostas, etiquetas, canais, horário, FAQ, widget, geral) |\n\n#### APIs internas (AJAX)\n\n| View | Rota | Método | Descrição |\n|------|------|--------|-----------|\n| `api_conversas` | `/inbox/api/conversas/` | GET | Lista com filtros (status, agente, busca, escopo) |\n| `api_conversa_detalhe` | `/inbox/api/conversas/<pk>/` | GET | Detalhe + lead + oportunidade + conversas anteriores + notas |\n| `api_mensagens` | `/inbox/api/conversas/<pk>/mensagens/` | GET | Mensagens paginadas |\n| `api_enviar_mensagem` | `/inbox/api/conversas/<pk>/enviar/` | POST | Agente envia mensagem |\n| `api_atribuir` | `/inbox/api/conversas/<pk>/atribuir/` | POST | Atribuir agente |\n| `api_resolver` | `/inbox/api/conversas/<pk>/resolver/` | POST | Resolver conversa |\n| `api_reabrir` | `/inbox/api/conversas/<pk>/reabrir/` | POST | Reabrir conversa |\n| `api_transferir` | `/inbox/api/conversas/<pk>/transferir/` | POST | Transferir para agente/equipe/fila |\n| `api_criar_ticket` | `/inbox/api/conversas/<pk>/ticket/` | POST | Criar ticket de suporte |\n| `api_atualizar_conversa` | `/inbox/api/conversas/<pk>/atualizar/` | POST | Atualizar prioridade, equipe, etiquetas |\n| `api_notas` | `/inbox/api/conversas/<pk>/notas/` | POST | Adicionar nota interna |\n| `api_respostas_rapidas` | `/inbox/api/respostas-rapidas/` | GET | Listar templates de resposta |\n| `api_atualizar_status_agente` | `/inbox/api/agente/status/` | POST | Online/ausente/offline |\n\n#### Webhooks (recebimento de mensagens)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `provider_webhook` | `/inbox/api/webhook/<provedor>/<canal_id>/` | Webhook genérico (escalável, qualquer provider) |\n| `uazapi_webhook` | `/inbox/api/uazapi/webhook/` | Webhook legacy Uazapi (backward compat) |\n\n#### APIs N8N (DRF)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `InboxMensagemRecebidaAPIView` | `/api/v1/inbox/mensagem-recebida/` | Receber mensagem via N8N |\n| `InboxStatusMensagemAPIView` | `/api/v1/inbox/status-mensagem/` | Status de entrega/leitura |\n\n#### APIs públicas (Widget)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `widget_config` | `/api/public/widget/config/` | Config do widget (cores, FAQ, campos) |\n| `widget_faq` | `/api/public/widget/faq/` | Artigos FAQ por categoria |\n| `widget_faq_buscar` | `/api/public/widget/faq/buscar/` | Busca FAQ |\n| `widget_conversa_iniciar` | `/api/public/widget/conversa/iniciar/` | Iniciar conversa via widget |\n| `widget_mensagens` | `/api/public/widget/conversa/<id>/mensagens/` | Mensagens da conversa |\n| `widget_enviar` | `/api/public/widget/conversa/<id>/enviar/` | Enviar mensagem via widget |\n| `widget_conversas` | `/api/public/widget/conversas/` | Conversas do visitante |\n\n---\n\n### WebSocket (`consumers.py`)\n\n**InboxConsumer** (AsyncJsonWebsocketConsumer):\n- Grupos: `inbox_tenant_{id}`, `inbox_user_{id}`, `inbox_conversa_{id}`\n- Ações: join/leave conversa, typing indicator, set status, mark read\n- Eventos: nova_mensagem, conversa_atualizada, indicador_digitando\n- Auto-online ao conectar, auto-offline ao desconectar\n- Requer ASGI server (Daphne/Uvicorn). Em dev com runserver, fallback para polling (5s).\n\n### Signals\n\n| Signal | Modelo | Evento disparado |\n|--------|--------|-----------------|\n| `on_conversa_criada` | Conversa (post_save, created) | `conversa_aberta` |\n| `on_mensagem_recebida` | Mensagem (post_save, remetente=contato) | `mensagem_recebida` |\n| `on_conversa_resolvida` | Conversa (post_save, status=resolvida) | `conversa_resolvida` |\n\n---\n\n### Widget (`static/inbox/widget/aurora-chat.js`)\n\nWidget de chat embeddable para sites de provedores. Auto-contido (zero dependências, CSS inline).\n\n**Instalação:**\n```html\n<script src=\"https://app.aurora.com/static/inbox/widget/aurora-chat.js\" data-token=\"UUID\"><\/script>\n```\n\n**Features:**\n- 3 tabs: Início (boas-vindas + FAQ), Mensagens (chat), Ajuda (busca FAQ)\n- Visitor tracking via UUID no localStorage\n- Personalização: cores, posição (bottom-right/left), campos obrigatórios\n- CORS: valida domínios permitidos\n- Polling a cada 5 segundos para novas mensagens\n\n---\n\n### Templates (3)\n\n| Template | Descrição |\n|----------|-----------|\n| `inbox.html` | Interface 3 painéis: lista de conversas (esquerda), chat com mensagens (centro), painel de contexto com accordions (direita) |\n| `configuracoes_inbox.html` | 9 tabs de configuração: Equipes, Filas, Respostas Rápidas, Etiquetas, Canais, Horário, FAQ, Widget, Geral |\n| `dashboard_inbox.html` | Dashboard com KPIs (abertas, pendentes, resolvidas, tempo médio), gráfico 30 dias, ranking agentes |\n\n### Frontend (`static/inbox/`)\n\n**inbox.js** (~700 linhas): App principal do Inbox. Estado, polling, AJAX, WebSocket, filtros, emoji picker, anexos, respostas rápidas, accordions, conversas anteriores.\n\n**inbox.css** (~600 linhas): Three-panel layout, message bubbles, accordions, emoji picker, status badges, responsive.\n\n---\n\n## 2. Suporte / Tickets (`apps/suporte/`)\n\n### Models (4)\n\n#### CategoriaTicket\nTabela: `suporte_categorias` | Unique: (tenant, slug)\n\nCategorias de tickets com nome, slug, ícone FontAwesome, ordem.\n\n#### SLAConfig\nTabela: `suporte_sla_config` | Unique: (tenant, plano_tier)\n\nSLA por plano (starter/start/pro): tempo de primeira resposta e resolução em horas.\n\n#### Ticket\nTabela: `suporte_tickets` | Unique: (tenant, numero)\n\n| Grupo | Campos |\n|-------|--------|\n| **Identificação** | numero (auto), titulo, descricao |\n| **Classificação** | categoria FK, prioridade, status (aberto/em_andamento/aguardando_cliente/resolvido/fechado) |\n| **Pessoas** | solicitante FK User, atendente FK User |\n| **SLA** | sla_horas (auto do SLAConfig), sla_cumprido (property) |\n| **Timestamps** | data_abertura, data_primeira_resposta, data_resolucao, data_fechamento |\n| **Provedor** | tenant_cliente FK Tenant |\n\n#### ComentarioTicket\nTimeline do ticket: autor, mensagem, interno (flag para visibilidade staff-only).\n\n### Views (4)\n\n| View | Rota | Descrição |\n|------|------|-----------|\n| `dashboard_suporte` | `/suporte/` | Dashboard KPIs (abertos, em andamento, aguardando, resolvidos, SLA breach) |\n| `ticket_lista` | `/suporte/tickets/` | Lista com filtros (status, prioridade, categoria, busca) |\n| `ticket_criar` | `/suporte/tickets/criar/` | Formulário de criação |\n| `ticket_detalhe` | `/suporte/tickets/<pk>/` | Detalhe com timeline, comentários, ações (alterar status, atribuir, comentar interno/público) |\n\n### Fluxo de vida do ticket\n\n```\nABERTO ──atribuir──▶ EM ANDAMENTO ──resolver──▶ RESOLVIDO ──fechar──▶ FECHADO\n   │                      │\n   └──aguardar──▶ AGUARDANDO CLIENTE ──responder──┘\n```\n\n---\n\n## Integrações entre Inbox e Suporte\n\n```\nConversa (Inbox) ──FK──▶ Ticket (Suporte)\n    │\n    └── api_criar_ticket: cria ticket com últimas 10 mensagens como descrição\n        herda prioridade da conversa\n        cria mensagem de sistema \"Ticket #N criado\"\n```\n\n---\n\n## Fluxos completos\n\n### Mensagem WhatsApp → Inbox\n\n```\n1. Cliente envia WhatsApp\n2. Uazapi recebe → POST webhook Aurora\n3. views_webhook.provider_webhook()\n4. UazapiProvider.parse_webhook() → normaliza payload\n5. services.receber_mensagem()\n   a. Normaliza telefone\n   b. Busca/cria lead (auto-cria se novo)\n   c. Busca conversa aberta ou cria nova\n   d. Verifica horário → envia mensagem fora do horário se necessário\n   e. Distribui (fila → agente round-robin/menor_carga)\n   f. Cria Mensagem\n   g. Notifica via WebSocket\n6. Agente vê no Inbox em tempo real\n```\n\n### Agente responde → WhatsApp\n\n```\n1. Agente digita e clica Enviar\n2. POST /inbox/api/conversas/<id>/enviar/\n3. services.enviar_mensagem()\n   a. Cria Mensagem (remetente_tipo=agente)\n   b. Calcula tempo_primeira_resposta\n   c. Auto-atribui agente se não tinha\n   d. Background thread: get_provider(canal).enviar_mensagem()\n   e. UazapiService.enviar_texto() → POST Uazapi /send/text\n   f. Salva identificador_externo (message ID)\n4. Mensagem chega no WhatsApp do cliente\n```\n\n### Widget → Inbox\n\n```\n1. Visitante abre widget no site do provedor\n2. aurora-chat.js gera visitor_id (UUID localStorage)\n3. POST /api/public/widget/conversa/iniciar/\n4. services.receber_mensagem_widget()\n5. Conversa aparece no Inbox do agente\n6. Agente responde → mensagem volta ao widget via polling\n```\n\n---\n\n## Estatísticas do módulo\n\n| Métrica | Inbox | Suporte | Total |\n|---------|-------|---------|-------|\n| **Models** | 20 | 4 | 24 |\n| **Views** | 25+ | 4 | 29+ |\n| **APIs** | 20+ | — | 20+ |\n| **Templates** | 3 | 4 | 7 |\n| **Services** | 12 funções | — | 12 |\n| **Providers** | 2 (uazapi, webhook) | — | 2 |\n| **Signals** | 3 | — | 3 |\n| **WebSocket** | 1 consumer | — | 1 |\n| **Widget** | 1 (JS auto-contido) | — | 1 |\n| **Linhas de código** | ~3.500 | ~500 | ~4.000 |\n"}, {"t": "f", "n": "13 Modulo Fluxos", "fn": "13-MODULO_FLUXOS.md", "c": "# 13. Comercial — Modulo de Fluxos\n\n**Status:** ✅ Em producao\n**Ultima atualizacao:** 08/04/2026\n**App:** `apps/comercial/atendimento/`\n\n---\n\n## Contexto\n\nO modulo de Fluxos e o motor de fluxos conversacionais (bot) da AuroraISP. Suporta dois modos:\n\n- **Legado (questoes lineares):** QuestaoFluxo com perguntas sequenciais e roteamento por indice\n- **Visual (node-based):** Editor Drawflow com nodos de diferentes tipos conectados por arestas\n\nO campo `FluxoAtendimento.modo_fluxo` define qual engine usar. Os dois modos coexistem.\n\nA **execucao** dos fluxos esta documentada em `14-MODULO_ATENDIMENTO.md`.\n\n---\n\n## FluxoAtendimento\n\nDefine um fluxo reutilizavel.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| nome | CharField(255) | Nome do fluxo |\n| descricao | TextField | Descricao detalhada |\n| tipo_fluxo | CharField(20) | qualificacao, vendas, suporte, onboarding, pesquisa, customizado |\n| status | CharField(20) | ativo, inativo, rascunho, teste |\n| canal | CharField(20) | Canal que ativa o fluxo: qualquer, whatsapp, site, facebook, instagram, google, telefone, email, indicacao, manual |\n| max_tentativas | PositiveInteger | Maximo de tentativas (padrao: 3) |\n| tempo_limite_minutos | PositiveInteger | Tempo limite em minutos |\n| permite_pular_questoes | Boolean | Permite pular questoes opcionais |\n| modo_fluxo | Boolean | False = legado, True = visual (node-based) |\n| fluxo_json | JSONField | Estado do editor Drawflow para re-import |\n| criado_por | CharField(100) | Usuario criador |\n| ativo | Boolean | Ativo/inativo |\n\n**Tabela:** `fluxos_atendimento`\n\n---\n\n## Sistema Visual (Node-Based)\n\n### NodoFluxoAtendimento\n\nNo do fluxograma visual.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| fluxo | FK → FluxoAtendimento | Fluxo pai (cascade) |\n| tipo | CharField(20) | entrada, questao, condicao, acao, delay, finalizacao |\n| subtipo | CharField(50) | Ex: texto, select, campo_check, webhook, criar_oportunidade |\n| configuracao | JSONField | Config especifica do no |\n| pos_x, pos_y | IntegerField | Posicao no canvas |\n| ordem | PositiveIntegerField | Ordem |\n\n**Tabela:** `atendimento_nodofluxo`\n\n### ConexaoNodoAtendimento\n\nAresta dirigida entre dois nodos.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| fluxo | FK → FluxoAtendimento | Fluxo pai |\n| nodo_origem | FK → NodoFluxoAtendimento | Origem |\n| nodo_destino | FK → NodoFluxoAtendimento | Destino |\n| tipo_saida | CharField(10) | default, true, false |\n\n**Tabela:** `atendimento_conexaonodo`\n**Constraint:** unique (nodo_origem, nodo_destino, tipo_saida)\n\n---\n\n## Tipos de Nodos\n\n### Entrada\n\nPonto de inicio do fluxo. 0 inputs, 1 output.\n\n**Config:** `canal` (canal que ativa o fluxo)\n\n### Questao (Interacao)\n\nEnvia mensagem ao lead. Pode esperar resposta ou nao.\n\n**Subtipos na sidebar:** Texto, Selecao, Imagem, Pix\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| modelo | Modelo pronto: nome, email, telefone, cpf, cidade, cep, endereco, plano |\n| titulo | Texto da pergunta |\n| descricao | Instrucoes adicionais |\n| opcoes_resposta | Lista de opcoes (para selecao) |\n| espera_resposta | true = pausa e aguarda, false = envia e continua |\n| validacao | Tipo: texto, email, telefone, cpf_cnpj, cep, numero |\n| regex | Regex customizado de validacao |\n| salvar_em | Campo do lead onde salvar a resposta (nome_razaosocial, email, telefone, cpf_cnpj, cidade, cep, rua, etc.) |\n| max_tentativas | Maximo de tentativas (padrao: 3) |\n| mensagem_erro | Mensagem quando resposta invalida |\n| webhook_validacao | URL do webhook para validacao externa |\n| prompt_validacao | Prompt enviado ao webhook/IA junto com a resposta |\n| integracao_ia_id | ID da integracao de IA para validacao (OpenAI, Claude, Groq, Gemini) |\n\n**Cascata de validacao:**\n1. Resposta vazia (se espera_resposta)\n2. Opcoes (para selecao)\n3. Tipo (email, telefone, CPF, CEP, numero)\n4. Regex\n5. Integracao IA (chama provider configurado)\n6. Webhook externo\n\n**Modelos prontos:** Ao selecionar um modelo (ex: \"Nome\"), preenche automaticamente titulo, validacao e campo de salvamento.\n\n### Condicao\n\nAvalia uma condicao e segue branch true ou false. 1 input, 2 outputs.\n\n**Subtipos:** campo_check, resposta_check\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| campo | Campo a verificar (lead.origem, lead.score, lead.cidade, ultima_resposta, var.classificacao, var.custom, etc.) |\n| operador | igual, diferente, contem, maior, menor, maior_igual, menor_igual |\n| valor | Valor para comparacao |\n\n### Acao\n\nExecuta algo e continua. 1 input, 1 output.\n\n**Subtipos:**\n\n| Subtipo | Descricao |\n|---------|-----------|\n| criar_oportunidade | Cria oportunidade no CRM (pipeline padrao, estagio inicial) |\n| webhook | Chama URL externa (GET/POST) |\n| criar_tarefa | Cria tarefa no CRM |\n| mover_estagio | Move oportunidade de estagio |\n| notificacao_sistema | Cria notificacao no sistema |\n\n### Classificador IA\n\nAnalisa a mensagem do usuario e retorna uma categoria como variavel. NAO pausa. 1 input, 1 output.\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| integracao_ia_id | Integracao de IA (OpenAI, Anthropic, Groq, Google AI) |\n| modelo | Modelo a usar (gpt-4o-mini, claude-haiku, etc.) |\n| prompt | Instrucoes para classificacao |\n| categorias | Lista de categorias possiveis (uma por linha) |\n| variavel_saida | Nome da variavel onde salvar (padrao: classificacao) |\n\n**Uso tipico:** Antes de uma condicao, para decidir qual branch seguir baseado na intencao do usuario.\n\n### Extrator IA\n\nExtrai dados estruturados da mensagem do usuario. NAO pausa. 1 input, 1 output.\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| integracao_ia_id | Integracao de IA |\n| modelo | Modelo a usar |\n| prompt | Instrucoes extras para extracao |\n| campos_extrair | Lista de campos: nome, descricao, tipo |\n| salvar_no_lead | Se true, salva campos extraidos diretamente no lead |\n\n**Uso tipico:** Apos o usuario informar dados (nome, curso, cidade), extrair e salvar automaticamente.\n\n### Respondedor IA\n\nGera resposta conversacional com IA e envia ao usuario. PAUSA apos enviar (espera proxima mensagem). 1 input, 1 output.\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| integracao_ia_id | Integracao de IA |\n| modelo | Modelo a usar |\n| system_prompt | Prompt do sistema (aceita variaveis: {{lead_nome}}, {{classificacao}}, etc.) |\n| incluir_historico | Se true, inclui mensagens anteriores no contexto |\n| max_historico | Maximo de mensagens no historico (padrao: 10) |\n\n**Uso tipico:** Responder perguntas, apresentar valores, interagir naturalmente.\n\n### Agente IA\n\nConversa livre multi-turno com tools. PAUSA a cada turno. 1 input, 1 output.\n\n**Config:**\n\n| Campo | Descricao |\n|-------|-----------|\n| integracao_ia_id | Integracao de IA |\n| modelo | Modelo a usar |\n| system_prompt | Prompt completo do agente |\n| max_turnos | Maximo de turnos de conversa (padrao: 10) |\n| condicao_saida | Instrucao para o agente sair do loop |\n| mensagem_timeout | Mensagem de fallback |\n| tools_habilitadas | Lista: atualizar_lead, criar_oportunidade, criar_tarefa, mover_estagio, webhook |\n| campos_lead_editaveis | Campos do lead que o agente pode editar |\n\n**Uso tipico:** Atendimento completo onde o agente gerencia a conversa e executa acoes.\n\n### Delay\n\nPausa a execucao por um tempo. 1 input, 1 output.\n\n**Config:** `valor` (numero) + `unidade` (minutos, horas, dias)\n\n### Finalizacao\n\nFinaliza o atendimento. 1 input, 0 outputs.\n\n**Subtipos:** finalizar (simples), calcular_score (com score 1-10)\n\n**Config:** `mensagem_final`, `score` (para calcular_score)\n\n---\n\n## Editor Visual\n\n**URL:** `/configuracoes/fluxos/<id>/editor/`\n**Biblioteca:** Drawflow v0.0.59 (CDN)\n**Layout:** Sidebar (paleta de nos) + Canvas (Drawflow) + Config Panel (direita)\n\n**Sidebar (todos colapsados por padrao):**\n- Entrada: Inicio do Fluxo\n- Interacao (icone WhatsApp): Texto, Selecao, Imagem, Pix\n- Condicoes: Verificar Campo, Verificar Resposta\n- Acoes: Criar Oportunidade, Webhook, Criar Tarefa, Mover Estagio, Notificacao\n- Inteligencia Artificial (icone brain, cor roxa): Classificador, Extrator, Respondedor, Agente\n- Controle: Atraso, Finalizar Fluxo, Finalizar com Score\n\n**Salvar:** POST para `/api/fluxos/<id>/salvar-fluxo/` com `{drawflow_state, nodos[], conexoes[]}`\n\n**Carregar:** Importa de `fluxo_json` ou reconstroi do banco se nao houver JSON salvo.\n\n---\n\n## Integracao com IA\n\nA validacao por IA usa o modulo de integracoes (`apps/integracoes/`). O provedor configura uma integracao do tipo OpenAI, Anthropic, Groq ou Google AI com API key e modelo.\n\n**Providers suportados:**\n\n| Provider | Tipo | Modelo padrao |\n|----------|------|---------------|\n| OpenAI | openai | gpt-4o-mini |\n| Anthropic | anthropic | claude-haiku-4-5-20251001 |\n| Groq | groq | llama-3.1-8b-instant |\n| Google AI | google_ai | gemini-2.0-flash |\n\n**Fluxo:** Resposta do lead + prompt de validacao → API do provider → JSON `{valido, mensagem}` → aceita ou rejeita\n\n---\n\n## Canal de Ativacao\n\nCada fluxo tem um `canal` que define quando e ativado automaticamente:\n\n1. Mensagem chega no Inbox (ex: WhatsApp)\n2. Signal `on_mensagem_recebida` detecta o canal\n3. Engine busca fluxo ativo para o canal (`buscar_fluxo_por_canal`)\n4. Prioridade: fluxo do canal exato → fluxo \"qualquer\" → nenhum\n5. Cria atendimento e inicia o fluxo\n6. Pergunta do bot e enviada de volta no Inbox como mensagem \"Aurora\"\n\n---\n\n## Endpoints\n\n### Paginas (HTML)\n\n| URL | Descricao |\n|-----|-----------|\n| `/configuracoes/fluxos/` | Gerenciamento de fluxos (CRUD + botoes Editor Visual, Ativos, Questoes) |\n| `/configuracoes/fluxos/<id>/editor/` | Editor visual Drawflow |\n| `/configuracoes/sessoes/` | Acompanhamento de sessoes ativas |\n| `/configuracoes/sessoes/<id>/` | Detalhe da sessao com logs |\n| `/configuracoes/sessoes/<id>/fluxo/` | Visualizacao do fluxo ao vivo (nodo atual pulsando) |\n| `/configuracoes/questoes/` | Gerenciamento de questoes (legado) |\n\n### APIs\n\n| Metodo | URL | Descricao |\n|--------|-----|-----------|\n| GET | `/api/fluxos/` | Listar fluxos |\n| POST | `/api/fluxos/criar/` | Criar fluxo |\n| PUT | `/api/fluxos/<id>/atualizar/` | Atualizar fluxo |\n| DELETE | `/api/fluxos/<id>/deletar/` | Deletar fluxo |\n| POST | `/api/fluxos/<id>/salvar-fluxo/` | Salvar editor visual |\n\n---\n\n## Relacionamentos\n\n```\nFluxoAtendimento\n├── questoes → QuestaoFluxo (1:N, legado)\n├── nodos → NodoFluxoAtendimento (1:N, visual)\n├── conexoes → ConexaoNodoAtendimento (1:N, visual)\n└── atendimentos → AtendimentoFluxo (1:N)\n\nNodoFluxoAtendimento\n├── saidas → ConexaoNodoAtendimento (1:N)\n├── entradas → ConexaoNodoAtendimento (1:N)\n├── logs → LogFluxoAtendimento (1:N)\n└── execucoes_pendentes → ExecucaoFluxoAtendimento (1:N)\n```\n\n---\n\n## Arquivos\n\n| Arquivo | Descricao |\n|---------|-----------|\n| `models.py` | FluxoAtendimento, NodoFluxoAtendimento, ConexaoNodoAtendimento, ExecucaoFluxoAtendimento, LogFluxoAtendimento + legado |\n| `engine.py` | Engine visual: traversal, validacao (tipo/regex/IA/webhook), acoes, delays |\n| `views.py` | Editor visual, salvar fluxo, sessoes, detalhe, fluxo ao vivo |\n| `views_api.py` | APIs CRUD, N8N dual-mode |\n| `templates/editor_fluxo.html` | Editor Drawflow |\n| `templates/sessoes.html` | Lista de sessoes |\n| `templates/sessao_detalhe.html` | Detalhe com logs |\n| `templates/sessao_fluxo_visual.html` | Fluxo ao vivo read-only |\n| `templates/fluxos.html` | CRUD de fluxos |\n"}, {"t": "f", "n": "14 Modulo Atendimento", "fn": "14-MODULO_ATENDIMENTO.md", "c": "# 14. Comercial — Modulo de Atendimento\n\n**Status:** ✅ Em producao\n**Ultima atualizacao:** 06/04/2026\n**App:** `apps/comercial/atendimento/`\n\n---\n\n## Contexto\n\nO modulo de Atendimento gerencia a **execucao** dos fluxos conversacionais: sessoes ativas com leads, respostas, validacao, logs e integracao com Inbox/WhatsApp. A **configuracao** de fluxos esta documentada em `13-MODULO_FLUXOS.md`.\n\nSuporta dois modos de execucao:\n- **Legado:** QuestaoFluxo sequencial (questao por indice)\n- **Visual:** Engine node-based com traversal do grafo (engine.py)\n\n---\n\n## Arquitetura — Modo Visual\n\n```\nMensagem chega no Inbox (WhatsApp, Site, etc.)\n          ↓\nSignal on_mensagem_recebida (inbox/signals.py)\n          ↓\nengine.buscar_fluxo_por_canal(canal, tenant)\n          ↓\n   Fluxo encontrado? → engine.iniciar_por_canal(lead, canal)\n          ↓\n   Cria AtendimentoFluxo → engine.iniciar_fluxo_visual()\n          ↓\n   Percorre grafo: entrada → nodos...\n          ↓\n   Encontra nodo questao (espera_resposta=true)?\n     → PAUSA, envia pergunta no Inbox como bot \"Aurora\"\n          ↓\n   Lead responde no WhatsApp\n          ↓\n   Signal detecta atendimento ativo → engine.processar_resposta_visual()\n          ↓\n   Valida resposta (tipo → regex → IA → webhook)\n          ↓\n   Salva no campo do lead (se configurado)\n          ↓\n   Segue conexoes → proximo nodo (condicao/acao/delay/finalizacao)\n          ↓\n   [loop ate finalizar]\n          ↓\n   Nodo finalizacao → score + atualiza lead → mensagem final no Inbox\n```\n\n---\n\n## Models\n\n### AtendimentoFluxo\n\nSessao ativa de um lead em um fluxo.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| lead | FK → LeadProspecto | Lead sendo atendido |\n| fluxo | FK → FluxoAtendimento | Fluxo utilizado |\n| historico_contato | FK → HistoricoContato | Historico vinculado (opcional) |\n| nodo_atual | FK → NodoFluxoAtendimento | Posicao no modo visual (nullable) |\n| status | CharField(30) | iniciado, em_andamento, pausado, completado, abandonado, erro, cancelado |\n| questao_atual | PositiveInteger | Indice da questao atual (legado) |\n| total_questoes | PositiveInteger | Total de questoes/nodos tipo questao |\n| questoes_respondidas | PositiveInteger | Quantas foram respondidas |\n| dados_respostas | JSONField | Respostas: `{nodo_id: {resposta, data, titulo, ...}}` |\n| score_qualificacao | Integer(1-10) | Score calculado ao finalizar |\n| tempo_total | PositiveInteger | Duracao em segundos |\n\n**Tabela:** `atendimentos_fluxo`\n\n### LogFluxoAtendimento\n\nRegistro de cada passo executado no fluxo visual.\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| atendimento | FK → AtendimentoFluxo | Sessao |\n| nodo | FK → NodoFluxoAtendimento | Nodo executado (nullable) |\n| lead | FK → LeadProspecto | Lead (indexed) |\n| tipo_nodo | CharField(20) | entrada, questao, condicao, acao, delay, finalizacao |\n| subtipo_nodo | CharField(50) | Subtipo do nodo |\n| status | CharField(20) | sucesso, erro, aguardando, agendado |\n| mensagem | TextField | Descricao do que aconteceu |\n| dados | JSONField | Dados extras (resposta, branch, score...) |\n| data_execucao | DateTime | Quando executou |\n\n**Tabela:** `atendimento_log_fluxo`\n\n### ExecucaoFluxoAtendimento\n\nFila de execucoes pendentes (delays).\n\n| Campo | Tipo | Descricao |\n|-------|------|-----------|\n| atendimento | FK → AtendimentoFluxo | Sessao |\n| nodo | FK → NodoFluxoAtendimento | Nodo de delay |\n| contexto_json | JSONField | Contexto serializado |\n| data_agendada | DateTime | Quando executar |\n| status | CharField(20) | pendente, executado, cancelado, erro |\n\n**Tabela:** `atendimento_execucao_pendente`\n\n---\n\n## Engine (engine.py)\n\nEngine conversacional assincrono. A execucao **pausa** em nos de questao (espera_resposta=true) e delay.\n\n### Funcoes principais\n\n| Funcao | Descricao |\n|--------|-----------|\n| `buscar_fluxo_por_canal(canal, tenant)` | Busca fluxo ativo por canal (exato → \"qualquer\" → None) |\n| `iniciar_por_canal(lead, canal, tenant)` | Cria atendimento automaticamente por canal |\n| `iniciar_fluxo_visual(atendimento)` | Encontra nodo entrada, percorre ate primeira questao |\n| `processar_resposta_visual(atendimento, resposta)` | Valida resposta, salva no lead, segue conexoes |\n| `executar_pendentes_atendimento(tenant)` | Cron: executa delays pendentes |\n\n### Traversal do grafo\n\n| Tipo nodo | Comportamento |\n|-----------|--------------|\n| entrada | Passa direto, segue conexao default |\n| questao (espera=true) | **PAUSA**, retorna dados da pergunta |\n| questao (espera=false) | Envia mensagem, continua sem parar |\n| condicao | Avalia campo/operador/valor, segue branch true ou false |\n| acao | Executa (webhook, criar oportunidade, etc.), continua |\n| delay | Agenda ExecucaoFluxoAtendimento, **PAUSA** |\n| finalizacao | Calcula score, atualiza lead, **FIM** |\n\n### Validacao de respostas (cascata)\n\n1. **Resposta vazia** — rejeita se espera resposta\n2. **Opcoes** — valida contra lista (para selecao)\n3. **Tipo** — email (@), telefone (10+ digitos), CPF/CNPJ (11/14), CEP (8), numero\n4. **Regex** — valida contra padrao customizado\n5. **Integracao IA** — chama provider configurado (OpenAI, Claude, Groq, Gemini) com prompt\n6. **Webhook** — chama URL externa com resposta + prompt, espera `{valido, mensagem}`\n\n### Salvar resposta no lead\n\nSe o nodo de questao tem `salvar_em` configurado, a resposta e salva diretamente no campo do lead:\n\n| salvar_em | Campo do lead |\n|-----------|---------------|\n| nome_razaosocial | Nome |\n| email | Email |\n| telefone | Telefone |\n| cpf_cnpj | CPF/CNPJ |\n| cidade | Cidade |\n| estado | Estado |\n| cep | CEP |\n| rua | Rua |\n| bairro | Bairro |\n| empresa | Empresa |\n| observacoes | Observacoes |\n\n### Acoes disponiveis\n\n| Acao | Descricao |\n|------|-----------|\n| criar_oportunidade | Cria oportunidade no CRM (pipeline padrao, nao duplica) |\n| webhook | Chama URL externa (GET/POST) com contexto |\n| criar_tarefa | Cria tarefa no CRM com responsavel |\n| mover_estagio | Move oportunidade de estagio |\n| notificacao_sistema | Cria notificacao no painel |\n\n### Validacao por IA\n\nUsa integracoes configuradas em `/integracoes/` (modelo IntegracaoAPI).\n\n| Provider | Tipo | Modelo padrao |\n|----------|------|---------------|\n| OpenAI | openai | gpt-4o-mini |\n| Anthropic | anthropic | claude-haiku-4-5-20251001 |\n| Groq | groq | llama-3.1-8b-instant |\n| Google AI | google_ai | gemini-2.0-flash |\n\n**Fluxo:** Prompt + resposta → API do provider → JSON `{valido, mensagem}` → aceita ou rejeita\n\n---\n\n## Integracao com Inbox\n\nO signal `on_mensagem_recebida` em `apps/inbox/signals.py`:\n\n1. Mensagem de contato chega no Inbox\n2. Verifica se existe atendimento ativo aguardando resposta → processa resposta\n3. Se nao, tenta iniciar novo fluxo pelo canal\n4. Envia pergunta/mensagem do bot de volta no Inbox como remetente \"Aurora\" (tipo bot)\n5. Envia via webhook externo (WhatsApp) se configurado no canal\n\n---\n\n## Telas de acompanhamento\n\n### Sessoes (`/configuracoes/sessoes/`)\n- Lista todas as sessoes com status, progresso, nodo atual\n- Filtros por status (em andamento, completado, etc.) e por fluxo\n- Botao \"Ativos\" nos cards de fluxo filtra sessoes ativas\n\n### Detalhe da sessao (`/configuracoes/sessoes/<id>/`)\n- Info: fluxo, canal, inicio, duracao, score, progresso\n- Nodo atual (onde o lead esta)\n- Respostas do lead\n- **Log de execucao** passo a passo: cada nodo com status, mensagem e timestamp\n\n### Fluxo ao vivo (`/configuracoes/sessoes/<id>/fluxo/`)\n- Editor Drawflow em modo **read-only**\n- Nodos executados com **borda verde**\n- Nodo atual com **borda azul pulsando**\n- Sidebar com legenda, dados da sessao e respostas\n\n---\n\n## Endpoints\n\n### Paginas\n\n| URL | Descricao |\n|-----|-----------|\n| `/configuracoes/sessoes/` | Lista de sessoes |\n| `/configuracoes/sessoes/<id>/` | Detalhe com logs |\n| `/configuracoes/sessoes/<id>/fluxo/` | Visualizacao ao vivo |\n\n### APIs (dual-mode: legado + visual)\n\n| Metodo | URL | Descricao |\n|--------|-----|-----------|\n| POST | `/api/n8n/atendimento/iniciar/` | Iniciar atendimento (detecta modo_fluxo) |\n| POST | `/api/n8n/atendimento/<id>/responder/` | Responder (detecta modo_fluxo) |\n| POST | `/api/n8n/atendimento/<id>/finalizar/` | Finalizar |\n| POST | `/api/n8n/atendimento/<id>/pausar/` | Pausar |\n| POST | `/api/n8n/atendimento/<id>/retomar/` | Retomar |\n\n---\n\n## Tabelas\n\n| Model | Tabela |\n|-------|--------|\n| AtendimentoFluxo | `atendimentos_fluxo` |\n| NodoFluxoAtendimento | `atendimento_nodofluxo` |\n| ConexaoNodoAtendimento | `atendimento_conexaonodo` |\n| ExecucaoFluxoAtendimento | `atendimento_execucao_pendente` |\n| LogFluxoAtendimento | `atendimento_log_fluxo` |\n| RespostaQuestao | `respostas_questao` (legado) |\n| TentativaResposta | `tentativas_resposta` (legado) |\n\n---\n\n## Arquivos\n\n| Arquivo | Descricao |\n|---------|-----------|\n| `models.py` | Todos os models (legado + visual) |\n| `engine.py` | Engine visual: traversal, validacao, acoes, IA, delays, logs |\n| `views.py` | Editor, salvar fluxo, sessoes, detalhe, fluxo ao vivo |\n| `views_api.py` | APIs N8N dual-mode |\n| `apps/inbox/signals.py` | Signal que conecta mensagens do Inbox ao engine |\n| `services/atendimento_service.py` | Integracao Matrix/HubSoft |\n"}, {"t": "f", "n": "15 Servicos Cron", "fn": "15-SERVICOS_CRON.md", "c": "# 15. Servicos Periodicos e Cron Jobs\n\n**Ultima atualizacao:** 06/04/2026\n**Status:** ✅ Em producao\n\n---\n\n## Visao Geral\n\nO sistema utiliza servicos periodicos para processar automacoes, sincronizar dados com HubSoft, mover leads no CRM e executar delays dos fluxos de atendimento. Nao usa Celery. Tudo roda via **crontab** (Linux) ou **Task Scheduler** (Windows) + **systemd timer** para o sync HubSoft.\n\n---\n\n## Servicos Criticos (producao)\n\n### 1. executar_automacoes_cron\n\n**O que faz:** Coracao do motor de automacoes. Processa delays pendentes, detecta leads sem contato, tarefas vencidas e dispara automacoes por segmento.\n\n**App:** `apps/marketing/automacoes/`\n**Comando:** `python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 5 minutos\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem executar |\n| `--tenant SLUG` | Roda apenas para um tenant |\n\n**O que executa (por tenant):**\n\n1. **Processar delays pendentes** — Busca `ExecucaoPendente` com `data_agendada <= agora` e retoma a execucao do grafo de onde parou\n2. **Lead sem contato** — Detecta leads sem `HistoricoContato` ha X dias, dispara evento `lead_sem_contato` (com protecao contra duplicatas via `LogExecucao`)\n3. **Tarefa vencida** — Detecta `TarefaCRM` pendente com `data_vencimento < agora`, dispara evento `tarefa_vencida`\n4. **Disparo por segmento** — Para regras com `evento=disparo_segmento` e segmento FK, itera leads do segmento e dispara automacao (respeita rate limit e cooldown)\n\n**Crontab:**\n```bash\n*/5 * * * * cd /path/to/project && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/automacoes.log 2>&1\n```\n\n---\n\n### 2. sincronizar_clientes\n\n**O que faz:** Sincroniza clientes do HubSoft para o sistema local. Cria/atualiza registros em `ClienteHubsoft` e `ServicoClienteHubsoft`. Detecta alteracoes e marca `houve_alteracao=True`.\n\n**App:** `apps/integracoes/`\n**Comando:** `python manage.py sincronizar_clientes --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 1 minuto (via systemd timer)\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--lead-id INT` | Sincroniza apenas um lead |\n| `--todos` | Forca sync completo |\n| `--dry-run` | Simula sem salvar |\n\n**Dependencias:** `IntegracaoAPI` (tipo=hubsoft), `H
