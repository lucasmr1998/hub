\ndescription: \"Refatorar o monolito vendas_web em apps Django separados por módulo, implementar multi-tenancy para viabilizar o modelo \"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead / DevOps / Segurança (AppSec)\"\n---\n\n# Refatoração em apps + Multi-tenancy + Segurança — 29/03/2026\n\n**Data:** 29/03/2026\n**Responsável:** Tech Lead / DevOps / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ✅ Concluída\n\n---\n\n## Descrição\n\nRefatorar o monolito vendas_web em apps Django separados por módulo, implementar multi-tenancy para viabilizar o modelo SaaS e remover secrets hardcoded do código fonte.\n\n---\n\n## Tarefas\n\n- [x] Definir estrutura de apps (Opção A: sub-apps por pasta, aprovada pelo CEO)\n- [x] Separar vendas_web em 10 apps: sistema, notificacoes, integracoes, dashboard, leads, atendimento, cadastro, viabilidade, crm, campanhas\n- [x] Implementar multi-tenancy: Tenant, PerfilUsuario, TenantMixin, TenantManager, TenantMiddleware\n- [x] Criar Painel Admin Aurora (/aurora-admin/) com dashboard de tenants, planos e features\n- [x] Remover secrets do código fonte e migrar para variáveis de ambiente\n- [x] Criar agentes Segurança (AppSec), DevOps e QA\n\n---\n\n## Contexto e referências\n\n- Reunião: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Decisão de estrutura aprovada pelo CEO (Opção A)\n- Projeto: `robo/` (módulo Comercial da AuroraISP)\n\n---\n\n## Resultado esperado\n\nCódigo refatorado em apps modulares, multi-tenancy funcional em desenvolvimento, credenciais seguras via variáveis de ambiente, painel admin Aurora operacional. Pronto para deploy em produção como próximo passo.\n"}, {"t": "f", "n": "Refatoracao Vendas Web 29 03 2026", "fn": "refatoracao_vendas_web_29-03-2026.md", "c": "---\nname: \"Migração completa do vendas_web para apps modulares\"\ndescription: \"Finalizar a migração de models, views, urls e templates do vendas_web para a nova estrutura de apps\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead\"\ntype: tarefa\nstatus: em andamento\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nConcluir a separação do God App `vendas_web` nos novos apps modulares. A estrutura e os models já foram criados. Falta mover views, urls, templates e criar as migrations de transição.\n\n## Atividades\n\n- [x] Criar estrutura de pastas apps/ com 10 apps\n- [x] Criar models em apps/sistema (Tenant, PerfilUsuario, configs)\n- [x] Copiar integracoes e crm para apps/\n- [x] Migrar models para comercial/leads, comercial/atendimento, comercial/cadastro, comercial/viabilidade\n- [x] Migrar models para notificacoes, marketing/campanhas\n- [x] Atualizar settings.py e urls.py\n- [x] Atualizar vendas_web/models.py com re-exports dos novos apps\n- [x] Atualizar FKs cross-app (vendas_web.X → app_novo.X)\n- [x] Django check passando sem erros\n- [x] Migrations rodando localmente (SQLite)\n- [ ] Criar migrations com SeparateDatabaseAndState para produção\n- [ ] Mover views de vendas_web/views.py para cada app\n- [ ] Mover views de vendas_web/views_api_atendimento.py para comercial/atendimento\n- [ ] Mover urls de vendas_web/urls.py para cada app\n- [ ] Mover templates para dentro de cada app\n- [ ] Mover signals para cada app\n- [ ] Mover admin registrations para cada app\n- [ ] Mover services (contrato_service, atendimento_service, notification_service)\n- [ ] Ativar novas rotas no urls.py principal\n- [ ] Testar localmente com SQLite\n- [ ] Remover vendas_web\n\n## Contexto e referências\n\n- Reunião: docs/context/reunioes/refatoracao_apps_29-03-2026.md\n- Roadmap: docs/PRODUTO/02-ROADMAP_PRODUTO.md (seção 4)\n- Decisão: Opção A (sub-apps por pasta), aprovada em 29/03/2026\n\n## Resultado esperado\n\n`vendas_web` removido. Cada módulo do produto (Comercial, Marketing, CS) é um namespace com apps Django independentes. Multi-tenancy pronto para ativar via Tenant + TenantMixin.\n"}, {"t": "f", "n": "Segmentos Mover Marketing 03 04 2026", "fn": "segmentos_mover_marketing_03-04-2026.md", "c": "---\nname: \"Segmentos: Mover redirect para Marketing\"\ndescription: \"Ao criar/salvar segmento, redirecionar para Marketing em vez do CRM\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: Redirect para Marketing — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🟡 Média\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nA view de segmentos (`api_segmento_salvar`) redireciona para o CRM após salvar. Como segmentos agora pertence ao Marketing, o redirect deve ir para a lista de segmentos no Marketing.\n\n---\n\n## Tarefas\n\n- [ ] Verificar redirect na view api_segmento_salvar\n- [ ] Corrigir para redirecionar para segmentos_lista\n- [ ] Garantir que a sidebar de Marketing aparece nas páginas de segmentos\n\n---\n\n## Resultado esperado\n\nAo criar/editar segmento, o usuário permanece no contexto de Marketing.\n"}, {"t": "f", "n": "Segmentos Pagina Regras 03 04 2026", "fn": "segmentos_pagina_regras_03-04-2026.md", "c": "---\nname: \"Segmentos: Página dedicada com regras dinâmicas\"\ndescription: \"Criar página robusta de criação/edição de segmentos com builder de regras dinâmicas\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: Página dedicada com regras dinâmicas — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nSubstituir o modal de criação de segmentos por uma página dedicada com builder de regras dinâmicas (como o builder das Automações). O cliente define condições e o sistema filtra leads automaticamente.\n\n---\n\n## Tarefas\n\n- [ ] Model: adicionar campo `regras` (JSONField) ao SegmentoCRM para regras dinâmicas\n- [ ] View: criar página dedicada de criação/edição\n- [ ] Template: builder visual de regras (campo + operador + valor)\n- [ ] API: endpoint para preview de leads que atendem as regras\n- [ ] Lógica: avaliar regras e atualizar membros automaticamente\n- [ ] Migração\n\n---\n\n## Resultado esperado\n\nPágina `/marketing/segmentos/criar/` com builder de regras. Ao definir \"Origem = WhatsApp AND Score >= 7\", o sistema mostra quantos leads entram e atualiza automaticamente.\n"}, {"t": "f", "n": "Segmentos Signal Auto 03 04 2026", "fn": "segmentos_signal_auto_03-04-2026.md", "c": "---\nname: \"Segmentos: Signal para atualizar membros automaticamente\"\ndescription: \"Quando lead é criado/atualizado, verificar segmentos dinâmicos e adicionar/remover\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: Signal automático — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nImplementar signal post_save no LeadProspecto que avalia segmentos dinâmicos do tenant e adiciona/remove o lead automaticamente.\n\n---\n\n## Tarefas\n\n- [ ] Signal post_save em LeadProspecto para avaliar segmentos dinâmicos\n- [ ] Respeitar _skip_segmento para importação em massa\n- [ ] Atualizar total_leads do segmento\n\n---\n\n## Resultado esperado\n\nLead novo que atende regra \"Origem = WhatsApp AND Score >= 7\" aparece automaticamente no segmento.\n"}, {"t": "f", "n": "Seguranca Credenciais 29 03 2026", "fn": "seguranca_credenciais_29-03-2026.md", "c": "---\nname: Remover credenciais hardcoded do código\ndescription: Todas as credenciais movidas para variáveis de ambiente\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nEliminar credenciais expostas no código fonte.\n\n## Atividades\n\n- [x] Remover SECRET_KEY hardcoded do settings.py\n- [x] Remover senha do banco do settings.py (sem fallback)\n- [x] Remover token Matrix API do atendimento_service.py\n- [x] Remover credenciais HubSoft do setup_hubsoft.py\n- [x] Remover IP do servidor do ALLOWED_HOSTS\n- [x] Limpar settings_production.py (SECRET_KEY duplicada, IP do banco)\n- [x] Configurar DEBUG=False por padrão\n- [x] Criar .env.example com todas as variáveis\n- [x] Verificar .gitignore (.env já ignorado)\n\n## Resultado esperado\n\nZero credenciais no código. Deploy falha se variáveis não configuradas.\n"}, {"t": "f", "n": "Tenant Mixin Crm 30 03 2026", "fn": "tenant_mixin_crm_30-03-2026.md", "c": "---\nname: \"Adicionar TenantMixin nos Models do CRM\"\ndescription: \"9 models do CRM não herdam de TenantMixin e não possuem FK tenant. Com multi-tenancy ativo, um tenant consegue ver e man\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Adicionar TenantMixin nos Models do CRM — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\n9 models do CRM não herdam de TenantMixin e não possuem FK tenant. Com multi-tenancy ativo, um tenant consegue ver e manipular dados de outro tenant via CRM (oportunidades, tarefas, metas, alertas). Isso é um risco crítico de vazamento de dados.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar TenantMixin em `OportunidadeVenda`\n- [ ] Adicionar TenantMixin em `EquipeVendas`\n- [ ] Adicionar TenantMixin em `PipelineEstagio`\n- [ ] Adicionar TenantMixin em `PerfilVendedor`\n- [ ] Adicionar TenantMixin em `TagCRM`\n- [ ] Adicionar TenantMixin em `TarefaCRM`\n- [ ] Adicionar TenantMixin em `NotaInterna`\n- [ ] Adicionar TenantMixin em `MetaVendas`\n- [ ] Adicionar TenantMixin em `AlertaRetencao`\n- [ ] Adicionar TenantMixin em `ConfiguracaoCRM`\n- [ ] Gerar migrations (campo tenant com null=True para dados existentes)\n- [ ] Criar data migration para popular tenant nos registros existentes (via lead.tenant)\n- [ ] Atualizar views do CRM para usar o TenantManager\n- [ ] Criar testes de isolamento para o CRM (similar a `test_tenant_isolation.py`)\n- [ ] Testar localmente com SQLite\n\n---\n\n## Contexto e referências\n\n- Models: `apps/comercial/crm/models.py`\n- TenantMixin: `apps/sistema/mixins.py`\n- Testes de referência: `tests/test_tenant_isolation.py`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodos os models do CRM isolados por tenant. Testes de isolamento passando. Nenhum dado de tenant A visível para tenant B.\n"}, {"t": "f", "n": "Testes Isolamento Tenant 29 03 2026", "fn": "testes_isolamento_tenant_29-03-2026.md", "c": "---\nname: \"Testes automatizados de isolamento de tenant\"\ndescription: \"Escrever testes automatizados que garantam o isolamento correto de dados entre tenants. Cada tenant deve enxergar apenas\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"QA / Tech Lead\"\n---\n\n# Testes automatizados de isolamento de tenant — 29/03/2026\n\n**Data:** 29/03/2026\n**Responsável:** QA / Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nEscrever testes automatizados que garantam o isolamento correto de dados entre tenants. Cada tenant deve enxergar apenas seus próprios registros, e nenhuma operação deve vazar dados entre tenants.\n\n---\n\n## Tarefas\n\n- [ ] Criar fixtures de teste com múltiplos tenants\n- [ ] Testar que queries via TenantManager filtram corretamente por tenant\n- [ ] Testar que o TenantMiddleware atribui o tenant correto ao request\n- [ ] Testar que criação de registros atribui automaticamente o tenant do usuário\n- [ ] Testar que um usuário de um tenant não consegue acessar dados de outro tenant\n- [ ] Testar que o Painel Admin Aurora lista apenas dados do tenant correto\n- [ ] Testar cenários de erro: usuário sem tenant, tenant inativo, tenant inexistente\n- [ ] Integrar testes ao pipeline de CI\n\n---\n\n## Contexto e referências\n\n- Reunião: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Tarefa concluída: `docs/context/tarefas/finalizadas/refatoracao_apps_29-03-2026.md`\n- Depende de: deploy do multi-tenancy (pode rodar em ambiente local antes do deploy)\n\n---\n\n## Resultado esperado\n\nSuite de testes automatizados cobrindo todos os cenários de isolamento de tenant, executável localmente e no CI. Qualquer vazamento de dados entre tenants deve ser detectado automaticamente.\n"}, {"t": "f", "n": "Treinamento Parceiro 26 03 2026", "fn": "treinamento_parceiro_26-03-2026.md", "c": "---\nname: \"Trilha de Treinamento do Parceiro Comercial\"\ndescription: \"Criar a trilha de treinamento técnico para o parceiro comercial conseguir conduzir demos ao vivo e responder perguntas t\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"PMM + CEO\"\n---\n\n# Trilha de Treinamento do Parceiro Comercial\n\n**Data:** 26/03/2026\n**Responsável:** PMM + CEO\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 A criar\n\n---\n\n## Descrição\n\nCriar a trilha de treinamento técnico para o parceiro comercial conseguir conduzir demos ao vivo e responder perguntas técnicas com autonomia. O parceiro tem processo próprio de vendas, mas precisa conhecer o produto fundo o suficiente para não depender da Aurora em cada apresentação.\n\n---\n\n## Tarefas\n\n- [x] Criar Módulo 1 — Visão geral da AuroraISP (hub, módulos, ICP, posicionamento)\n- [x] Criar Módulo 2 — Comercial a fundo (fluxo completo: lead, bot, docs, contrato, HubSoft)\n- [x] Criar Módulo 3 — Marketing e CS (visão geral dos módulos em desenvolvimento)\n- [x] Criar Módulo 4 — Precificação e transacional (Starter/Start/Pro, simulações, ROI)\n- [x] Criar Módulo 5 — Objeções comuns (respostas prontas para as principais objeções)\n- [ ] Criar Módulo 6 — Demo hands-on (prática guiada do roteiro ao vivo)\n- [ ] Agendar sessão de treinamento com o parceiro (primeira semana de abril)\n\n---\n\n## Contexto e referências\n\n- Roteiro de demo em [09-ENABLEMENT.md](../../GTM/09-ENABLEMENT.md)\n- Objeções em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- Precificação em [08-PRECIFICACAO.md](../../GTM/08-PRECIFICACAO.md)\n\nO Módulo 6 (demo hands-on) depende do ambiente de demo estar configurado, que depende do multi-tenancy (prazo: 30/03).\n\n---\n\n## Resultado esperado\n\nParceiro apto a conduzir demos ao vivo com autonomia e responder objeções técnicas sem precisar acionar a Aurora.\n"}, {"t": "f", "n": "Upload Isolamento Tenant 30 03 2026", "fn": "upload_isolamento_tenant_30-03-2026.md", "c": "---\nname: \"Isolar Uploads por Tenant\"\ndescription: \"Uploads de arquivos (logos, imagens de carteirinha, logos de parceiros) são armazenados em diretórios compartilhados (`l\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Isolar Uploads por Tenant — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nUploads de arquivos (logos, imagens de carteirinha, logos de parceiros) são armazenados em diretórios compartilhados (`logos/`, `carteirinhas/modelos/`). Todos os tenants usam o mesmo diretório. Se o servidor de mídia for mal configurado, um tenant pode acessar arquivos de outro.\n\n---\n\n## Tarefas\n\n- [ ] Criar função `tenant_upload_path(instance, filename)` que gera path com tenant_id\n- [ ] Atualizar `ConfiguracaoEmpresa.logo_empresa` → `upload_to=tenant_upload_path`\n- [ ] Atualizar `ModeloCarteirinha.imagem_fundo` e `logo` → `upload_to=tenant_upload_path`\n- [ ] Atualizar `Parceiro.logo` → `upload_to=tenant_upload_path`\n- [ ] Gerar migrations\n- [ ] Migrar arquivos existentes para os novos paths (script de migração)\n- [ ] Testar que URLs de mídia ainda funcionam após migração\n\n---\n\n## Contexto e referências\n\n- Models afetados: `apps/sistema/models.py`, `apps/cs/carteirinha/models.py`, `apps/cs/parceiros/models.py`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCada tenant tem seu diretório de uploads isolado: `media/tenants/{tenant_id}/logos/`, etc.\n"}, {"t": "f", "n": "Upload Validacao Tipo Tamanho 30 03 2026", "fn": "upload_validacao_tipo_tamanho_30-03-2026.md", "c": "---\nname: \"Validação de Upload — Tipo e Tamanho\"\ndescription: \"Uploads de arquivos em carteirinha, parceiros e sistema não validam tipo de arquivo nem tamanho. Um usuário pode enviar \"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Validação de Upload — Tipo e Tamanho — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nUploads de arquivos em carteirinha, parceiros e sistema não validam tipo de arquivo nem tamanho. Um usuário pode enviar executáveis, ZIPs ou arquivos de vários GB, causando DoS por esgotamento de disco ou upload de malware.\n\n---\n\n## Tarefas\n\n- [ ] Criar validador reutilizável para uploads (tipo + tamanho)\n- [ ] Definir tipos permitidos: jpg, jpeg, png, gif, webp (imagens)\n- [ ] Definir tamanho máximo: 5MB para imagens, 10MB para documentos\n- [ ] Aplicar em `apps/cs/carteirinha/views.py` (imagem_fundo, logo)\n- [ ] Aplicar em `apps/cs/parceiros/views.py` (logo parceiro)\n- [ ] Aplicar em `apps/sistema/views.py` (logo empresa)\n- [ ] Retornar erro claro ao usuário quando validação falhar\n- [ ] Adicionar `DATA_UPLOAD_MAX_MEMORY_SIZE` no settings\n\n---\n\n## Contexto e referências\n\n- Views afetadas: carteirinha, parceiros, sistema\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nUploads rejeitam arquivos fora dos tipos e tamanhos permitidos. Mensagem de erro clara.\n"}, {"t": "f", "n": "User Tenant Filter 30 03 2026", "fn": "user_tenant_filter_30-03-2026.md", "c": "---\nname: \"Filtrar User por Tenant em Views\"\ndescription: \"Views do CRM e outros módulos fazem `User.objects.filter(is_active=True)` sem filtrar por tenant. Dropdowns de atribuiçã\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Filtrar User por Tenant em Views — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nViews do CRM e outros módulos fazem `User.objects.filter(is_active=True)` sem filtrar por tenant. Dropdowns de atribuição de responsável mostram usuários de todos os tenants. O model User do Django não tem tenant, mas PerfilUsuario faz a ponte.\n\n---\n\n## Tarefas\n\n- [ ] Criar helper `get_tenant_users(tenant)` que retorna users via PerfilUsuario\n- [ ] Substituir `User.objects.filter(is_active=True)` por `get_tenant_users()` nas views do CRM\n- [ ] Verificar outros locais que listam usuários (dashboard, admin, notificações)\n- [ ] Testar que dropdowns só mostram usuários do tenant correto\n\n---\n\n## Contexto e referências\n\n- CRM views: `apps/comercial/crm/views.py`, linhas 79, 297, 642, 682\n- PerfilUsuario: `apps/sistema/models.py` (FK tenant)\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nNenhum dropdown ou listagem exibe usuários de outros tenants. Filtragem via PerfilUsuario.tenant.\n"}, {"t": "f", "n": "Webhook Validacao Token 30 03 2026", "fn": "webhook_validacao_token_30-03-2026.md", "c": "---\nname: \"Validação de Token nos Webhooks\"\ndescription: \"O webhook `webhook_hubsoft_contrato()` aceita qualquer POST sem validar a origem. Um atacante pode forjar confirmações d\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Validação de Token nos Webhooks — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO webhook `webhook_hubsoft_contrato()` aceita qualquer POST sem validar a origem. Um atacante pode forjar confirmações de contrato e mover oportunidades para \"Cliente Ativo\", causando fraude de receita. Outros webhooks do N8N têm o mesmo problema.\n\n---\n\n## Tarefas\n\n- [ ] Criar variável de ambiente `WEBHOOK_SECRET_TOKEN` no `.env`\n- [ ] Implementar validação de token no header `X-Webhook-Token` no `webhook_hubsoft_contrato()` (CRM)\n- [ ] Implementar a mesma validação nos webhooks de `vendas_web/views.py` (ex: `registrar_lead_api`)\n- [ ] Configurar o token no N8N (header de autenticação nos workflows)\n- [ ] Retornar 401 Unauthorized se token inválido ou ausente\n- [ ] Adicionar log de tentativas inválidas para monitoramento\n- [ ] Documentar o processo de configuração do token para novos webhooks\n\n---\n\n## Contexto e referências\n\n- Webhook CRM: `apps/comercial/crm/views.py`, `webhook_hubsoft_contrato()`\n- Webhook vendas_web: `vendas_web/views.py`, múltiplos endpoints com `@csrf_exempt`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodos os webhooks validam um token secreto no header antes de processar. Requisições sem token válido são rejeitadas com 401. Tentativas inválidas são logadas.\n"}, {"t": "f", "n": "Xss Mark Safe 30 03 2026", "fn": "xss_mark_safe_30-03-2026.md", "c": "---\nname: \"Corrigir XSS — mark_safe e format_html\"\ndescription: \"Template tags de parceiros usam `mark_safe(json.dumps(data))` com dados de usuário (título, descrição de cupom). O `admi\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Corrigir XSS — mark_safe e format_html — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nTemplate tags de parceiros usam `mark_safe(json.dumps(data))` com dados de usuário (título, descrição de cupom). O `admin_config.py` usa `format_html()` com conteúdo não escapado. Ambos são vetores de XSS armazenado se os dados contiverem JavaScript.\n\n---\n\n## Tarefas\n\n- [ ] Substituir `mark_safe(json.dumps(...))` por `json_script` filter do Django em `parceiros/templatetags/parceiros_tags.py`\n- [ ] Corrigir `format_html()` em `vendas_web/admin_config.py` para escapar conteúdo\n- [ ] Auditar outros usos de `mark_safe` e `|safe` nos templates\n- [ ] Testar com payloads XSS (ex: `<script>alert(1)<\/script>` como título de cupom)\n\n---\n\n## Contexto e referências\n\n- `apps/cs/parceiros/templatetags/parceiros_tags.py`, linha 27\n- `vendas_web/admin_config.py`, linhas 20-53\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero uso de `mark_safe` com dados de usuário. Conteúdo dinâmico sempre escapado.\n"}]}, {"t": "f", "n": "Apis Agentes Ia 07 04 2026", "fn": "apis_agentes_ia_07-04-2026.md", "c": "---\nname: \"APIs para Agentes IA (Tools)\"\ndescription: \"Criar endpoints DRF em /api/v1/n8n/crm/ para agentes externos (N8N) interagirem com o CRM\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# APIs para Agentes IA (Tools) — 07/04/2026\n\n**Data:** 07/04/2026\n**Responsavel:** Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descricao\n\nCriar APIs DRF padronizadas para que agentes externos (N8N, futuramente nosso no Agente IA) possam interagir com o CRM, leads e inbox do sistema. Primeira fase do plano de Agente IA.\n\n---\n\n## Tarefas\n\n- [ ] Serializers DRF para OportunidadeVenda, TarefaCRM, Pipeline, PipelineEstagio\n- [ ] POST /api/v1/n8n/crm/oportunidades/ (criar)\n- [ ] PUT /api/v1/n8n/crm/oportunidades/<pk>/ (atualizar/mover estagio)\n- [ ] GET /api/v1/n8n/crm/oportunidades/buscar/ (buscar por lead)\n- [ ] POST /api/v1/n8n/crm/tarefas/ (criar)\n- [ ] PUT /api/v1/n8n/crm/tarefas/<pk>/ (atualizar/concluir)\n- [ ] GET /api/v1/n8n/crm/pipelines/ (listar com estagios)\n- [ ] GET /api/v1/n8n/crm/estagios/ (listar, filtrar por pipeline)\n- [ ] POST /api/v1/n8n/inbox/enviar/ (enviar mensagem como bot)\n- [ ] Documentar APIs\n- [ ] Testar com curl\n\n---\n\n## Contexto e referencias\n\nPlano completo em `.claude/plans/breezy-frolicking-thompson.md`.\nAnalise do fluxo N8N em `robo/docs/context/reunioes/analise_fluxo_n8n_consultoria_06-04-2026.md`.\nAPIs existentes em `/api/v1/n8n/leads/`, `/api/v1/n8n/atendimentos/`.\n\n---\n\n## Resultado esperado\n\nN8N pode chamar nossas APIs para criar oportunidades, tarefas, mover estagios e enviar mensagens. Mesmas APIs serao reutilizadas internamente pelo futuro no Agente IA.\n"}, {"t": "f", "n": "Campos Customizaveis Leads 06 04 2026", "fn": "campos_customizaveis_leads_06-04-2026.md", "c": "---\nname: \"Campos customizaveis nos Leads\"\ndescription: \"Permitir que cada tenant defina campos extras nos leads via JSONField\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Tech Lead\"\n---\n\n# Campos Customizaveis nos Leads — 06/04/2026\n\n**Data:** 06/04/2026\n**Responsavel:** Tech Lead\n**Prioridade:** 🟡 Media\n**Status:** 🔧 Em andamento\n\n---\n\n## Descricao\n\nPermitir que cada provedor (tenant) crie campos personalizados nos leads, sem necessidade de alterar o schema do banco. Abordagem: model CampoCustomizado por tenant + JSONField no LeadProspecto.\n\n---\n\n## Tarefas\n\n- [ ] Model CampoCustomizado (nome, slug, tipo, opcoes, obrigatorio, ordem)\n- [ ] Adicionar campo dados_custom (JSONField) no LeadProspecto\n- [ ] Migration local\n- [ ] Tela de configuracao para gerenciar campos custom\n- [ ] Renderizar campos custom no detalhe do lead\n- [ ] Suportar campos custom na API\n\n---\n\n## Contexto e referencias\n\nDecisao: JSONField escolhido por flexibilidade e bom suporte no Django 5.2 + PostgreSQL (indexes GIN).\nAlternativas descartadas: EAV (complexidade) e toggle de visibilidade (sem campos novos).\n\n---\n\n## Resultado esperado\n\nCada tenant pode criar, editar e ordenar campos extras para seus leads. Os campos aparecem no detalhe do lead e na API. Sem necessidade de migrations para novos campos.\n"}, {"t": "f", "n": "Email Builder 06 04 2026", "fn": "email_builder_06-04-2026.md", "c": "---\nname: \"Email Builder — Marketing\"\ndescription: \"Editor visual de e-mails com blocos programados no módulo Marketing\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Claude + Lucas\"\n---\n\n# Email Builder — 06/04/2026\n\n**Data:** 06/04/2026\n**Responsável:** Claude + Lucas\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nConstruir um editor visual de e-mails dentro do módulo Marketing, semelhante ao HubSpot e RD Station. O usuário monta e-mails arrastando blocos programados (texto, imagem, botão, colunas, etc.) com propriedades editáveis. Os templates são salvos como JSON e renderizados em HTML responsivo.\n\n---\n\n## Tarefas\n\n### Fase 1 — Base\n- [ ] Models: CategoriaTemplate, TemplateEmail, EnvioEmail\n- [ ] App structure: apps/marketing/emails/\n- [ ] Renderer: JSON de blocos → HTML responsivo\n- [ ] Views + URLs: CRUD, editor, preview\n- [ ] Admin\n- [ ] Template: editor visual drag-and-drop com Sortable.js\n- [ ] Template: lista de e-mails\n- [ ] Registro no settings.py e urls.py\n\n### Fase 2 — Templates prontos\n- [ ] 5 a 8 templates base por categoria\n\n### Fase 3 — Integração automações\n- [ ] Nova ação \"enviar email com template\" no engine\n- [ ] Seletor de template no editor de fluxos\n\n### Fase 4 — Tracking\n- [ ] Pixel de abertura\n- [ ] Redirect de cliques\n- [ ] Dashboard de métricas\n\n---\n\n## Contexto e referências\n\n- Padrão de apps: TenantMixin, @login_required, JSONField para dados visuais\n- Editor de fluxos (automacoes) como referência de UX\n- Engine de automações já tem ação enviar_email (texto puro via N8N)\n\n---\n\n## Resultado esperado\n\nEditor funcional onde o usuário cria e-mails visuais com blocos programados, salva como template e visualiza preview desktop/mobile.\n"}, {"t": "f", "n": "Fatepi System Prompt", "fn": "fatepi_system_prompt.md", "c": "# Instrucoes do Agente Pedro — Qualificacao e Conversao (FATEPI/FAESPI)\n\n## Quem sou eu:\nSou o Pedro, consultor virtual de ingresso da FATEPI / FAESPI. Meu tom e prestativo, agil e focado em transformar o interesse do candidato em matricula realizada.\n\n## Meu Objetivo:\nQualificar leads, apresentar a oferta financeira de forma proativa e conduzir o candidato ate o pagamento.\n\n## Regras de Ouro:\n1. PERSISTENCIA: Voce DEVE chamar a tool \"Atualizar Lead\" ou \"Atualizar Oportunidade\" apos CADA informacao coletada. Nunca responda sem antes salvar.\n2. OFERTA ATIVA: Nao espere o lead perguntar o preco. Assim que explicar a forma de ingresso, apresente os valores na sequencia.\n3. ANTI-ALUCINACAO: Responda apenas com dados da Tabela abaixo. Se nao estiver la, diga que o consultor humano ira assumir.\n\n## QUANDO CHAMAR CADA TOOL:\n\nTOOL \"Atualizar Lead\" - CHAME quando:\n- O candidato disser o nome dele\n- O candidato informar email, cidade, estado ou CPF\n- Qualquer dado pessoal novo for coletado\n\nTOOL \"Atualizar Oportunidade\" - CHAME quando:\n- O candidato escolher um curso (envie dados_custom.curso_interesse e mude estagio_slug para \"qualificacao\")\n- O candidato informar a forma de ingresso (envie dados_custom.forma_ingresso e mude estagio_slug para \"qualificado\")\n- O candidato aceitar fazer a matricula (mude estagio_slug para \"agendado\")\n- O candidato desistir (mude estagio_slug para \"perdido\")\n\n## Estilo de Resposta:\n- Paragrafos curtos (1 a 2 linhas).\n- Duas quebras de linha entre paragrafos.\n- Zero Markdown. Sem negrito, sem italico, sem listas. Texto puro.\n\n## Tabela de Referencia: Campanha 2026.1\n\nDireito: Integral R$ 1.500 | Vestibular R$ 199 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 525 | Seg-Sex 18h30-21h40\nSistemas de Informacao: Integral R$ 1.000 | Vestibular R$ 149 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 350 | Seg-Sex 18h30-21h40\nPedagogia: Integral R$ 840 | Vestibular R$ 139 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 294 | Seg-Sex 18h30-21h40\nFonoaudiologia: Integral R$ 1.380 | Vestibular R$ 169 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 483 | Seg-Sex 18h30-21h40\nPsicologia: Integral R$ 1.630 | Vestibular R$ 199 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 570,50 | Seg-Sex 18h30-21h40\nFisioterapia: Integral R$ 1.380 | Vestibular R$ 169 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 483 | Seg-Sex 18h30-21h40\nEducacao Fisica: Integral R$ 840 | Vestibular R$ 139 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 294 | Seg-Sex 18h30-21h40\nEnfermagem: Integral R$ 1.380 | Vestibular R$ 169 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 483 | Seg-Sex 18h30-21h40\nAdministracao: Integral R$ 890 | Vestibular R$ 139 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 311,50 | Seg-Sex 18h30-21h40\nCiencias Contabeis: Integral R$ 890 | Vestibular R$ 139 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 311,50 | Seg-Sex 18h30-21h40\nServico Social: Integral R$ 840 | Vestibular R$ 139 | ENEM R$ 49,99 | Transferencia R$ 99,99 | Mensalidade R$ 294 | Seg-Sex 18h30-21h40\n\n## Informacoes Institucionais:\n- Localizacao: Rua Primeiro de Maio, 2235, Bairro Primavera, Teresina - PI.\n- Contatos: (86) 2107-2200 | contato@faespi.com.br\n\n## Condicionais por Forma de Ingresso:\n- Nota do ENEM: Envie o print da sua nota para validarmos.\n- Prova Online: Acesse prova.fatepifaespi.com.br. Apos a redacao, me envie a foto legivel.\n- Transferencia: Envie seu historico academico para analise do coordenador.\n\n## Fluxo de Atendimento:\n\n1. ABERTURA: Pergunte o nome completo do candidato.\n\n2. SONDAGEM: Ao receber o nome, CHAME \"Atualizar Lead\" com nome_razaosocial. Depois pergunte qual curso tem interesse.\n\n3. DEFINICAO DO CURSO: Se o candidato nao souber, liste os cursos disponiveis. Se ja disse o curso, confirme na Tabela.\n\n4. HORARIO: Ao definir o curso, CHAME \"Atualizar Oportunidade\" com dados_custom.curso_interesse e estagio_slug \"qualificacao\". Informe que e presencial, segunda a sexta, 18h30 as 21h40.\n\n5. INGRESSO: Pergunte a forma de ingresso: Nota do ENEM, Transferencia ou Prova Online.\n\n6. OFERTA DE VALORES: Ao receber a forma de ingresso, CHAME \"Atualizar Oportunidade\" com dados_custom.forma_ingresso e estagio_slug \"qualificado\". Apresente os valores da Tabela usando a coluna correta (ENEM, Transferencia ou Vestibular). Apresente bolsas progressivas: 65% em 2026.1, 60% em 2026.2, 55% em 2027.1, 50% a partir de 2027.2.\n\n7. URGENCIA: Pergunte se consegue finalizar a matricula hoje.\n\n8. FECHAMENTO: Se aceitar, CHAME \"Atualizar Oportunidade\" com estagio_slug \"agendado\". Envie o PIX: 00020126580014br.gov.bcb.pix013652d3c4c3-6213-459a-bd59-ac47480dd1945204000053039865802BR5925GILCIFRAN VIEIRA DE SOUSA6008TERESINA62070503***630427D9\n\n## Regra de Retorno ao Fluxo:\nSe o usuario interromper com uma duvida, responda usando a Tabela e retome o fluxo de onde parou.\n"}, {"t": "f", "n": "Fatepi Tools N8n", "fn": "fatepi_tools_n8n.md", "c": "# Tools N8N — Agente Pedro FATEPI\n\nConfiguracao das HTTP Request Tools conectadas ao no do agente IA.\n\n---\n\n## Tool 1: Atualizar Lead\n\n- Nome: Atualizar Lead\n- Descricao do no: Salva informacoes do candidato como nome completo, email, cidade e estado. Chame esta tool sempre que coletar um dado pessoal novo do candidato durante a conversa.\n- Method: PUT\n- URL: https://SEU-DOMINIO/api/v1/n8n/leads/{{ $json._aurora.lead_id || $json.lead_id }}/\n- Headers: Authorization = Bearer qB0L0dkBULVQd6KlMlg24HV1hGxxQqIoFUrzZVN6yEU\n- Send Body: ON\n- Body Content Type: JSON\n- Specify Body: Using Fields Below\n- Body Parameters:\n\n| Name | Value | Description |\n|------|-------|-------------|\n| nome_razaosocial | Defined automatically by the model | Nome completo do candidato |\n| email | Defined automatically by the model | Email do candidato |\n| cidade | Defined automatically by the model | Cidade do candidato |\n| estado | Defined automatically by the model | UF do estado, exemplo: PI, SP, RJ |\n| cpf_cnpj | Defined automatically by the model | CPF do candidato se informado |\n\n---\n\n## Tool 2: Atualizar Oportunidade\n\n- Nome: Atualizar Oportunidade\n- Descricao do no: Salva o curso de interesse, forma de ingresso e move o estagio do candidato no funil de vendas. Chame esta tool quando o candidato definir o curso, forma de ingresso ou avancar no processo.\n- Method: PUT\n- URL: https://SEU-DOMINIO/api/v1/n8n/crm/oportunidades/{{ $json._aurora.oportunidade_id }}/\n- Headers: Authorization = Bearer qB0L0dkBULVQd6KlMlg24HV1hGxxQqIoFUrzZVN6yEU\n- Send Body: ON\n- Body Content Type: JSON\n- Specify Body: Using Fields Below\n- Body Parameters:\n\n| Name | Value | Description |\n|------|-------|-------------|\n| estagio_slug | Defined automatically by the model | Estagio atual do candidato. Valores: novo, qualificacao, qualificado, agendado, matriculado, perdido |\n| dados_custom.curso_interesse | Defined automatically by the model | Apenas o nome do curso. Exemplo: Direito, Enfermagem, Psicologia |\n| dados_custom.forma_ingresso | Defined automatically by the model | Apenas a forma de ingresso. Valores: ENEM, Prova Online, Transferencia |\n| dados_custom.status_matricula | Defined automatically by the model | Status da matricula. Valores: aguardando, pagamento_realizado, desistiu |\n\n---\n\n## Notas\n\n- SEMPRE terminar a URL com / (barra final), senao o Django retorna 404\n- Substituir SEU-DOMINIO pela URL do ngrok ou dominio de producao\n- O lead_id e oportunidade_id vem no payload que nosso sistema envia ao N8N (campo _aurora)\n- A API aceita campos flat com prefixo \"dados_custom.\" e converte para JSON aninhado automaticamente\n- Campos vazios sao ignorados pela API\n- O no do agente IA deve ser versao 2.0+ (recriar o no se estiver na versao 1.x)\n"}, {"t": "f", "n": "Login Email 07 04 2026", "fn": "login_email_07-04-2026.md", "c": "---\nname: \"Login por email em vez de username\"\ndescription: \"Mudar autenticacao para email unico, permitir usernames duplicados entre tenants\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# Login por Email — 07/04/2026\n\n**Data:** 07/04/2026\n**Responsavel:** Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descricao\n\nHoje o login e por username (Django padrao). Em multi-tenant, dois tenants podem querer criar usuario \"admin\" ou \"vendedor1\", causando conflito. Mudar para login por email resolve isso.\n\n---\n\n## Tarefas\n\n- [ ] Criar backend de autenticacao customizado (EmailBackend)\n- [ ] Alterar view de login para aceitar email\n- [ ] Alterar template de login\n- [ ] Alterar criacao de usuario (gerar username automatico ou usar email)\n- [ ] Garantir que email e unico globalmente\n- [ ] Migrar usuarios existentes (verificar emails duplicados)\n- [ ] Atualizar CLAUDE.md e docs\n\n---\n\n## Contexto\n\nMulti-tenant com usernames duplicados entre tenants e um problema real. Email como identificador unico resolve.\n"}, {"t": "f", "n": "Prompt Agente Pedro Fatepi", "fn": "prompt_agente_pedro_fatepi.md", "c": "---\nname: \"Prompt Agente Pedro FATEPI\"\ndescription: \"Indice dos arquivos de configuracao do agente IA da FATEPI no N8N\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# Agente Pedro — FATEPI/FAESPI\n\nArquivos separados para facilitar copiar e colar no N8N:\n\n1. **System Prompt** (colar no campo \"System Prompt\" do no do agente): [fatepi_system_prompt.md](fatepi_system_prompt.md)\n2. **Tools N8N** (configuracao das HTTP Request Tools): [fatepi_tools_n8n.md](fatepi_tools_n8n.md)\n\n---\n\n## Notas de implementacao\n\n1. O lead_id e oportunidade_id vem no payload que nosso sistema envia ao N8N (campo _aurora)\n2. A oportunidade e criada automaticamente pelo nosso sistema quando o lead entra (automacao lead_criado -> criar_oportunidade)\n3. A API aceita campos flat com prefixo \"dados_custom.\" e converte para JSON aninhado automaticamente\n4. Campos vazios sao ignorados pela API\n5. O no do agente IA deve ser versao 2.0+ (recriar o no se estiver na versao 1.x)\n"}]}]}, {"t": "d", "n": "GTM", "ch": [{"t": "f", "n": "00 Checklist Gtm", "fn": "00-CHECKLIST_GTM.md", "c": "# Checklist Completo GTM — AuroraISP\n\n**Última atualização:** 31/03/2026\n\nLegenda: ✅ Feito — 🟡 Parcial/Rascunho — 🔧 Em andamento — ⏳ Não iniciado\n\n---\n\n## 1. Estratégia de Mercado\n\n| Item | Status | Referência |\n|------|--------|------------|\n| Pesquisa de mercado | 🟡 | 01-PESQUISA_MERCADO.md |\n| Tamanho do mercado (TAM/SAM/SOM) | ⏳ | — |\n| ICP definido | ✅ | 02-ICP.md |\n| Personas mapeadas (4) | ✅ | 02-ICP.md |\n| Análise de concorrentes | ✅ | 03-CONCORRENTES.md |\n| Propo |\n| Migrar app gestão do megaroleta | ⏳ | Tarefa: migrar_gestao_megaroleta |\n\n---\n\n## 14. Infraestrutura\n\n| Item | Status | Referência |\n|------|--------|------------|\n| Deploy multi-tenancy em produção | ⏳ | Tarefa: deploy_multitenancy |\n| Docker e containerização | ⏳ | Tarefa: docker_containerizacao |\n| Pipeline CI/CD | ✅ | GitHub Actions configurado (30/03) |\n| Monitoramento e logging estruturado | 🟡 | PIIFilter implementado. Falta monitoramento completo |\n\n---\n\n## 15. Qualidade\n\n| Item | Status | Referência |\n|------|--------|------------|\n| Cobertura de testes (225 testes passando) | ✅ | 10 arquivos, 28+ factories, CI/CD |\n| Testes de isolamento tenant | ✅ | Testes de tenant isolation passando |\n| Linting e qualidade de código | ⏳ | Tarefa: linting_qualidade_codigo |\n\n---\n\n## 16. Segurança\n\n| Item | Status | Referência |\n|------|--------|------------|\n| Correção CSRF e segurança de endpoints | ✅ | Concluído (30/03). CSRF corrigido nos endpoints do frontend |\n| Autenticação nos 48+ endpoints de API | ✅ | Concluído (30/03). 27 @api_token_required + 21 @login_required |\n| Validação de token nos webhooks | ✅ | Concluído (30/03). @webhook_token_required |\n| TenantMixin nos models do CRM (13 models) | ✅ | Concluído (30/03). Migration gerada |\n| Remover credencial HubSoft hardcoded | ✅ | Concluído (29/03). Migrado para os.environ |\n| Corrigir exibição de senhas no admin | ✅ | Concluído (30/03). render_value removido |\n| XSS mark_safe corrigido | ✅ | Concluído (30/03). 9 funções com format_html |\n| IDOR nas APIs corrigido | ✅ | Concluído (30/03). get_tenant_object_or_404 |\n| Upload validação e isolamento | ✅ | Concluído (30/03). validate_image_upload + tenant_upload_path |\n| PII em logs removido | ✅ | Concluído (30/03). PIIFilter + 35+ prints removidos |\n| LGPD e privacidade de dados | ⏳ | Tarefa: lgpd_privacidade |\n| Secrets removidos do código | ✅ | Concluído (29/03/2026) |\n\n---\n\n## 17. Produto (Desenvolvimento)\n\n| Item NAIS.md) | 🔧 Em construção |\n| 08 | [Precificação](./08-PRECIFICACAO.md) | 🔧 Em construção |\n| 09 | [Enablement](./09-ENABLEMENT.md) | 🔧 Em construção |\n| 10 | [Roadmap GTM](./10-ROADMAP_GTM.md) | 🔧 Em construção |\n| 11 | [Materiais de Lançamento](./11-MATERIAIS_LANCAMENTO.md) | 🔧 Em construção |\n| 12 | [Fluxo Comercial](./12-FLUXO_COMERCIAL.md) | 🔧 Em construção |\n| 13 | [Diagnóstico do Provedor](./13-DIAGNOSTICO.md) | 🔧 Em construção |\n\n**Brand** (pasta separada em `docs/BRAND/`):\n\n| # | Documento | Status |\n|---|-----------|--------|\n| 07 | [Tom de Voz](../BRAND/07-TOM_DE_VOZ.md) | 🟡 Rascunho |\n| 08 | [Brandbook](../BRAND/08-BRANDBOOK.md) | 🔧 Em construção |\n\n---\n\n## Ordem de construção\n\n```\nPesquisa de Mercado → ICP → Concorrentes → Proposta de Valor\n→ Posicionamento → Mensagens Chave → Tom de Voz → Brandbook\n→ Canais → Precificação → Enablement → Roadmap GTM\n```\n\nOs documentos marcados como **Rascunho** foram criados antes da fundação e serão revisados após ICP e Concorrentes.\n"}, {"t": "f", "n": "01 Pesquisa Mercado", "fn": "01-PESQUISA_MERCADO.md", "c": "# 01. Pesquisa de Mercado\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender o tamanho, o contexto e a oportunidade do mercado de provedores de internet no Brasil antes de definir ICP e posicionamento.\n\n---\n\n## Mercado de ISPs no Brasil\n\n### Tamanho do mercado\n\n| Dado | Valor | Fonte |\n|------|-------|-------|\n| Total de ISPs registrados | ~14.000 | Anatel 2024 |\n| ISPs pequenos e médios (menos de 50k clientes) | ~85% (~11.900) | Estimativa de mercado |\n| ISPs que utilizam HubSoft | ~3.000 a 5.000 | Estimativa |\n| TAM estimado (SaaS para ISP) | R$ 10M a R$ 50M/ano | Estimativa conservadora |\n\n### Contexto do mercado\n\n- O mercado de provedores regionais no Brasil cresceu aceleradamente nos últimos anos com a expansão de fibra óptica\n- A maioria dos ISPs pequenos e médios opera com processos manuais ou ferramentas genéricas não adaptadas para o setor\n- HubSoft é o ERP/faturamento mais utilizado por provedores regionais no Brasil\n- Não existe um CRM ou plataforma de automação comercial construída especificamente para ISP com integração nativa ao HubSoft\n\n### Oportunidade\n\n- Mercado fragmentado, sem líder consolidado em automação comercial para ISP\n- Concorrentes posicionados como IA generativa (ISPRO AI) mas sem profundidade no fluxo de vendas\n- Resultado comprovado em produção real com números mensuráveis\n\n---\n\n## Dores do mercado\n\n> A ser detalhado no documento de ICP e validado com entrevistas de clientes.\n\n| Dor | Impacto |\n|-----|---------|\n| Perda de leads no WhatsApp | Alto |\n| Processo de documentação manual e caótico | Alto |\n| Contrato lento para chegar ao HubSoft | Médio |\n| Zero visibilidade do pipeline de vendas | Alto |\n| Churn de clientes sem programa de fidelização | Médio |\n\n---\n\n## Validação em produção\n\nResultado real de um provedor regional em operação com a AuroraISP:\n\n| Métrica | Resultado |\n|---------|-----------|\n| Leads processados | 341 |\n| Taxa de conversão | 48,9% |\n| Redução de trabalho manual | 70% |\n| Contratos enviados ao HubSoft automaticamente | 12 |\n| Economia estimada por ano | R$ 58.000 |\n| ROI | 564% |\n\n> O nome do provedor não é divulgado publicamente.\n\n---\n\n## Benchmark de volume (provedor de referência)\n\nDados reais de um provedor regional de médio porte em operação com a AuroraISP:\n\n| Métrica | Antes | Depois |\n|---------|-------|--------|\n| Clientes ativos | 30.000 | 30.000 |\n| Leads recebidos por mês | ~1.000 | ~1.000 |\n| Vendas digitais por mês | ~400 | ~400 |\n| Taxa de conversão | ~40% | ~40% |\n| Pessoas atendendo leads comerciais | 8 | 2 |\n| Pessoas em backoffice comercial | 0 | 2 |\n| Total no comercial | 8 | 4 |\n| Ticket médio do plano | R$ 99,90 | R$ 99,90 |\n\n> O dado mais forte do case: **2 pessoas fazem hoje o que 8 faziam antes.** A automação não só reduziu o time — ela liberou pessoas para funções estratégicas que antes não existiam.\n\n### Impacto econômico calculado\n\n| Cálculo | Valor |\n|---------|-------|\n| Equipe reduzida | 8 para 4 pessoas (50%) |\n| Resultado das 4 liberadas | Parte demitida (redução de custo direto) + parte realocada (ganho de produtividade em outros setores) |\n| Custo por pessoa (salário + comissão + benefícios) | R$ 3.050/mês |\n| Custo por pessoa com encargos trabalhistas (~40%) | ~R$ 3.950/mês |\n| Pessoas liberadas do atendimento comercial | 6 (de 8 para 2) |\n| Custo real por pessoa (salário + comissão + benefícios + encargos) | ~R$ 3.950/mês |\n| Economia mensal com 6 pessoas liberadas | R$ 23.700/mês |\n| **Economia anual com 6 pessoas liberadas** | **R$ 284.400/ano** |\n| Receita mensal gerada pelas 400 vendas | R$ 39.960/mês |\n| Receita anual gerada pelas 400 vendas | R$ 479.520/ano |\n\n> Referência útil para dimensionar o valor do produto no pitch comercial.\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o percentual de ISPs com HubSoft que têm time comercial estruturado?\n- [ ] Qual o ticket médio de aquisição de cliente para um ISP regional?\n- [ ] Qual o custo médio de um vendedor para um ISP pequeno/médio?\n"}, {"t": "f", "n": "02 Icp", "fn": "02-ICP.md", "c": "# 02. ICP — Ideal Customer Profile\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir com precisão quem é o cliente ideal da AuroraISP: o perfil da empresa, os decisores e as personas que interagem com o produto.\n\n---\n\n## Perfil da empresa (ICP primário)\n\n| Critério | Descrição |\n|----------|-----------|\n| Segmento | Provedor regional de internet (ISP) |\n| ERP utilizado | HubSoft |\n| Porte | 500 a 50.000 clientes ativos (referência: 30.000 clientes, ~1.000 leads/mês) |\n| Time comercial | 2 a 20 vendedores |\n| Localização | Brasil (foco inicial: interior e cidades médias) |\n| Maturidade digital | Usa WhatsApp como canal principal de vendas |\n| Dor principal | Perda de leads, processo manual, falta de visibilidade |\n\n## Perfil da empresa (ICP secundário — futuro)\n\n| Critério | Descrição |\n|----------|-----------|\n| ERP utilizado | Voalle, SGP, MK-Auth ou outros |\n| Expansão | Após consolidação com HubSoft |\n\n---\n\n## Personas\n\n### Persona 1 — O Dono do Provedor\n\n> Quem decide a compra.\n\n| Campo | Descrição |\n|-------|-----------|\n| Cargo | Proprietário / CEO |\n| Perfil | Empreendedor regional, fundou o provedor, operacional no dia a dia |\n| Dor principal | \"Meus vendedores perdem lead e eu não sei o que está acontecendo nas vendas\" |\n| O que quer | Visibilidade, controle e menos desperdício |\n| Como decide | Por ROI e indicação de confiança |\n| Canal preferido | WhatsApp, grupos de provedor, eventos do setor |\n\n---\n\n### Persona 2 — O Gerente Comercial\n\n> Quem vai usar o produto para gerir o time.\n\n| Campo | Descrição |\n|-------|-----------|\n| Cargo | Gerente Comercial / Supervisor de Vendas |\n| Perfil | Responsável pelo time, quer dados para cobrar resultados |\n| Dor principal | \"Não consigo cobrar o time porque não tenho dado nenhum\" |\n| O que quer | Dashboard, relatórios, visibilidade de pipeline |\n| Como decide | Influencia o dono, quer ferramenta que facilite a gestão |\n| Canal preferido | WhatsApp, ferramentas de gestão |\n\n---\n\n### Persona 3 — O Vendedor\n\n> Quem usa o produto no dia a dia.\n\n| Campo | Descrição |\n|-------|-----------|\n| Cargo | Vendedor / Atendente comercial |\n| Perfil | Atende via WhatsApp, coleta dados, pede documentos manualmente |\n| Dor principal | \"Fico perdido. Não sei qual lead devo ligar agora\" |\n| O que quer | Fila clara, lembretes automáticos, menos trabalho repetitivo |\n| Como decide | Não decide, mas adota ou resiste. A experiência precisa ser simples |\n| Canal preferido | WhatsApp, interface mobile |\n\n---\n\n### Persona 4 — O TI do Provedor\n\n> Quem vai avaliar e implementar tecnicamente.\n\n| Campo | Descrição |\n|-------|-----------|\n| Cargo | Analista de TI / Técnico de suporte |\n| Perfil | Responsável por sistemas, não quer manutenção extra |\n| Dor principal | \"Não quero dar suporte em coisa que não é meu core\" |\n| O que quer | SaaS pronto, documentação clara, pouca manutenção |\n| Como decide | Valida viabilidade técnica para o dono |\n| Canal preferido | Documentação técnica, e-mail |\n\n---\n\n## Sinais de fit (quem tem mais chance de comprar)\n\n- [ ] Usa HubSoft como ERP\n- [ ] Tem time comercial ativo (mínimo 2 vendedores)\n- [ ] Recebe leads pelo WhatsApp hoje\n- [ ] Já perdeu lead por falta de acompanhamento\n- [ ] Dono ou gerente sente falta de visibilidade do pipeline\n- [ ] Não tem CRM estruturado (usa planilha ou nada)\n\n## Sinais de não fit (quem provavelmente não vai comprar agora)\n\n- [ ] ISP muito pequeno sem time comercial (vendas feitas só pelo dono)\n- [ ] Usa outro ERP e não tem plano de migrar para HubSoft\n- [ ] Já tem CRM estruturado e integrado\n- [ ] Processo de vendas 100% presencial sem uso de WhatsApp\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o tamanho médio de time comercial dos provedores com HubSoft?\n- [ ] Quantos leads por mês um ISP médio recebe?\n- [ ] O dono costuma ser o decisor ou delega para gerente?\n"}, {"t": "f", "n": "03 Concorrentes", "fn": "03-CONCORRENTES.md", "c": "# 03. Análise de Concorrentes\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender quem compete pelo mesmo cliente, o que oferecem, onde falham e onde a AuroraISP se diferencia.\n\n---\n\n## Mapa competitivo\n\n| Concorrente | Tipo | Foco | Preço | HubSoft | Social proof |\n|-------------|------|------|-------|---------|--------------|\n| **ISPRO AI** | SaaS ISP | IA conversacional (vendas, cobrança, suporte) | Não divulgado | Genérico | Nenhuma |\n| **Pipedrive** | CRM genérico | Pipeline de vendas | R$ 900+/mês | Não | Sim |\n| **RD Station** | CRM + Marketing | Marketing e vendas | R$ 600 a 1.200/mês | Não | Sim |\n| **Planilha + WhatsApp** | Nenhum | Tudo manual | R$ 0 | Não | N/A |\n| **Sistema próprio** | Interno | Customizado | Alto custo de dev | Às vezes | N/A |\n\n---\n\n## Análise detalhada\n\n### ISPRO AI (isproai.com.br)\n**Concorrente mais direto.**\n\n| Item | Detalhe |\n|------|---------|\n| Posicionamento | \"A plataforma líder em IA Generativa para Provedores de Internet\" |\n| Módulos | Venda digital, cobrança, suporte N1, campanhas, indicações, resgate de abandono |\n| Diferencial que afirmam | IA generativa, 24/7, aumento de até 50% na conversão |\n| Fraquezas | Sem preço público, sem case real, sem social proof, integração HubSoft genérica |\n| CTA | Apenas WhatsApp |\n| Estilo | Genérico, não mostra profundidade no fluxo de vendas |\n\n**Onde a AuroraISP ganha:**\n- Integração HubSoft nativa e profunda (contrato vai direto para o ERP)\n- Resultado comprovado em operação real com números verificáveis\n- Foco no fluxo de vendas completo: lead, documento, contrato, ativação\n- Hub com produtos complementares (CRM + Clube de Benefícios)\n\n**Onde o ISPRO AI ganha:**\n- Módulos de cobrança e suporte (fora do escopo atual da AuroraISP)\n- Possivelmente mais recursos de campanha ativa\n\n---\n\n\n### Pipedrive / RD Station\n**Concorrentes indiretos.**\n\nProvedores mais sofisticados já usam ou tentaram usar essas ferramentas. A barreira é a falta de integração com HubSoft e o custo elevado para o porte do ISP regional.\n\n**Onde a AuroraISP ganha:**\n- Feito para ISP, não adaptado\n- Integração HubSoft nativa\n- Preço acessível para o mercado regional\n- Não exige consultor para configurar\n\n---\n\n### Planilha + WhatsApp Business\n**O \"concorrente\" mais comum.**\n\nÉ o sistema atual de 80% dos provedores regionais. O desafio não é vencer uma ferramenta, é vencer o hábito.\n\n**Argumento de troca:**\n- \"Planilha não avisa quando lead esfriou. Planilha não manda documento pro HubSoft. Planilha não gera contrato.\"\n\n---\n\n## Matriz de diferenciação\n\n| Capacidade | AuroraISP | ISPRO AI | Pipedrive | Planilha |\n|------------|-----------|----------|-----------|---------|\n| Integração HubSoft nativa | ✅ | ⚠️ Genérica | ❌ | ❌ |\n| Fluxo lead → contrato → ERP | ✅ | ❌ | ❌ | ❌ |\n| Coleta e validação de documentos | ✅ | ❌ | ❌ | ❌ |\n| Bot de qualificação WhatsApp | ✅ | ✅ | ❌ | ❌ |\n| CRM com pipeline visual | 🔧 Em dev | ⚠️ Parcial | ✅ | ❌ |\n| Clube de fidelização | 🔧 Em dev | ❌ | ❌ | ❌ |\n| Cobrança automatizada | ❌ | ✅ | ❌ | ❌ |\n| Suporte N1 automatizado | ❌ | ✅ | ❌ | ❌ |\n| Resultado comprovado em ISP | ✅ | ❌ | ❌ | N/A |\n| Preço acessível para ISP regional | ✅ | ❓ | ❌ | ✅ |\n\n---\n\n## Perguntas em aberto\n\n- [ ] O ISPRO AI tem clientes pagantes hoje? Quantos?\n- [ ] Existe algum outro concorrente regional não mapeado?\n- [ ] Provedores que usaram Pipedrive/RD Station: qual foi o motivo de abandono?\n"}, {"t": "f", "n": "04 Proposta Valor", "fn": "04-PROPOSTA_VALOR.md", "c": "# 04. Proposta de Valor\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir o que a AuroraISP entrega para cada persona, de forma clara e verificável.\n\n---\n\n## Proposta central\n\n> A AuroraISP automatiza o fluxo comercial do provedor de internet com inteligência artificial — do primeiro contato no WhatsApp até a ativação no HubSoft — eliminando retrabalho, reduzindo perda de leads e dando visibilidade real ao processo de vendas.\n\n---\n\n## Por persona\n\n### Para o Dono do Provedor\n\n**Antes:** \"Meus vendedores perdem lead e eu não sei o que está acontecendo.\"\n**Depois:** Painel com todos os leads, conversões e gargalos em tempo real.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Visibilidade do pipeline | Sabe exatamente quantos leads entraram, em qual etapa estão e quantos foram perdidos |\n| Automação do fluxo | Time não precisa pedir documento, gerar contrato ou ativar manualmente no HubSoft |\n| Resultado com dado | Consegue cobrar o time com base em números reais |\n\n---\n\n### Para o Gerente Comercial\n\n**Antes:** \"Não consigo cobrar porque não tenho dado nenhum.\"\n**Depois:** Dashboard com métricas de conversão por vendedor, por etapa e por período.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Relatórios automáticos | Sabe a performance de cada vendedor sem precisar perguntar |\n| Pipeline visual | Identifica onde os leads estão travando no funil |\n| Alertas inteligentes | Recebe aviso quando lead está há muito tempo sem contato |\n\n---\n\n### Para o Vendedor\n\n**Antes:** \"Fico perdido. Não sei qual lead ligar agora.\"\n**Depois:** Fila de prioridade clara, com o próximo passo definido para cada lead.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Fila de atendimento | Sabe qual lead abordar agora e qual está esperando |\n| Bot de qualificação | Recebe o lead já qualificado, sem precisar fazer perguntas básicas |\n| Coleta automática de docs | Não precisa ficar pedindo documento por mensagem |\n\n---\n\n### Para o TI do Provedor\n\n**Antes:** \"Não quero manutenção em coisa que não é meu core.\"\n**Depois:** SaaS pronto, com onboarding pela AuroraISP e suporte contínuo.\n\n| Entrega | Resultado esperado |\n|---------|--------------------|\n| Implementação pela Aurora | Configura, testa e entrega funcionando |\n| Integração HubSoft documentada | Não precisa desenvolver nada |\n| Atualizações sem intervenção | O sistema evolui sem exigir trabalho interno |\n\n---\n\n## Proposta de valor por produto\n\n### Comercial\n> \"Seu vendedor atende. A Aurora qualifica, coleta documento, gera contrato e ativa no HubSoft.\"\n\n### CRM Kanban *(em desenvolvimento)*\n> \"Veja onde cada lead está, quanto tempo está parado e quem precisa de atenção agora.\"\n\n### Clube de Benefícios *(em desenvolvimento)*\n> \"Seu cliente fica porque vale a pena ficar.\"\n\n---\n\n## Perguntas em aberto\n\n- [ ] Qual o ganho financeiro médio esperado por provedor ao usar o Comercial?\n- [ ] Qual a redução de tempo médio do ciclo de vendas com a plataforma?\n- [ ] A proposta de valor do Clube de Benefícios precisa ser validada com provedores\n"}, {"t": "f", "n": "05 Posicionamento", "fn": "05-POSICIONAMENTO.md", "c": "# Posicionamento — AuroraISP\n\n**Versão:** 2.0\n**Status:** ✅ Aprovado\n**Última atualização:** 26/03/2026\n\n---\n\n## O que é a AuroraISP\n\nA AuroraISP é um hub de tecnologia com inteligência artificial para provedores de internet.\n\nReunimos em um só lugar os módulos que o ISP precisa para crescer: do primeiro contato com o lead até a fidelização do cliente. Tudo automatizado, tudo integrado, tudo com IA.\n\n---\n\n## A jornada completa do provedor\n\n```\nATRAIR → CONVERTER → RETER\n```\n\n| Etapa | Módulo | O que faz |\n|-------|--------|-----------|\n| **Atrair** | Marketing | Motor de automação do hub. E-mail, WhatsApp, fluxos com réguas padrão prontas e gestão de tráfego pago com IA. |\n| **Converter** | Comercial | Automação do fluxo de vendas: lead, docs, contrato, HubSoft. Pro inclui CRM Kanban. |\n| **Reter** | CS | Clube de Benefícios, prevenção de churn, NPS e upsell. Automações rodam via Marketing. |\n\n> Cada módulo funciona de forma independente. Juntos, cobrem a jornada completa do provedor.\n\n---\n\n## O papel da IA\n\nA inteligência artificial não é um recurso isolado. Está presente em toda a plataforma:\n\n- **Marketing:** otimização de campanhas, segmentação de base, sugestão de réguas com melhor performance\n- **Comercial:** qualificação automática de leads, validação de documentos, respostas inteligentes no WhatsApp, priorização de pipeline\n- **CS:** personalização de benefícios, identificação de risco de churn, recomendação de upsell por perfil de cliente\n\n---\n\n## O problema que resolvemos\n\nO provedor regional opera com ferramentas desconectadas. WhatsApp para captar, planilha para registrar, e-mail para pedir documento, HubSoft para ativar. Nada conversa entre si.\n\nO resultado: leads perdidos, processo manual, time sobrecarregado e zero visibilidade do que está acontecendo nas vendas.\n\n---\n\n## Para quem\n\n**ICP primário:** Provedores regionais de internet que utilizam HubSoft como ERP.\n\n| Critério | Perfil |\n|----------|--------|\n| Porte | 500 a 50.000 clientes ativos |\n| Time comercial | 2 a 20 vendedores |\n| ERP | HubSoft (primário) |\n| Dor principal | Perda de leads, processo manual, zero visibilidade |\n| Perfil de compra | Dono ou gerente comercial |\n\n**ICP secundário (futuro):** Provedores com outros ERPs (Voalle, SGP, MK-Auth).\n\n---\n\n## Posicionamento\n\n> **Vende mais. Perde menos. Fideliza sempre.**\n> Do lead ao cliente fidelizado com inteligência.\n\nNão somos um CRM genérico adaptado para ISP.\nNão somos um chatbot.\nSomos o hub de IA construído para o provedor crescer, com módulos que se conectam e evoluem juntos.\n\n---\n\n## Status dos módulos\n\n| Módulo | Planos | Status |\n|--------|--------|--------|\n| **Comercial** | Start / Pro (Pro inclui CRM Kanban) | ✅ Validado em produção |\n| **Marketing** | Start / Pro | 🔧 Em desenvolvimento |\n| **CS** | Start / Pro (inclui Clube de Benefícios) | 🔧 Em desenvolvimento |\n\n---\n\n## Resultado comprovado\n\nUm provedor regional com 30.000 clientes usava 8 pessoas para atender 1.000 leads por mês. Hoje, 2 pessoas fazem o mesmo trabalho. As outras 2 viraram backoffice estratégico, função que antes não existia. São 400 vendas por mês no digital, R$ 99,90 cada. Economia de R$ 284.400 por ano só em pessoal.\n\n> Nome do provedor não divulgado. Números verificados em produção.\n\n---\n\n## Contra quem competimos\n\n| Concorrente | O que fazem | Onde perdemos | Onde ganhamos |\n|-------------|-------------|---------------|---------------|\n| **ISPRO AI** | IA conversacional para ISP (cobrança, suporte, vendas) | Módulos de cobrança e suporte | Hub completo, integração HubSoft profunda, resultado comprovado em produção |\n| **Pipedrive / RD Station** | CRM genérico | Marca consolidada | Feito para ISP, integra HubSoft, custo acessível |\n| **Planilha + WhatsApp** | O sistema atual da maioria | Custo zero | Automatiza tudo, tem IA, tem visibilidade real |\n| **Sistema próprio** | CRM interno | Customização total | Sem custo de manutenção, evolução contínua, time dedicado |\n\n---\n\n## Nossa vantagem real\n\n**1. Hub completo para provedor**\nA jornada inteira em um lugar: atrair, converter e reter. Nenhum concorrente cobre as três etapas com foco exclusivo em ISP.\n\n**2. IA que resolve problema real**\nNão é IA como buzzword. É IA aplicada a dores reais do provedor: qualificação de lead, validação de documento, prevenção de churn, otimização de campanha.\n\n**3. Integração HubSoft nativa**\nContrato gerado e enviado direto ao HubSoft. Nenhum concorrente faz isso.\n\n**4. Resultado comprovado**\nNúmeros reais de um provedor em operação. Não projeção, não demo, não promessa.\n\n---\n\n## O que não somos\n\n- Não somos sistema de cobrança\n- Não somos ERP nem substituto do HubSoft\n- Não somos suporte técnico automatizado\n\nNosso foco é crescimento: atrair mais leads, converter mais vendas, reter mais clientes.\n"}, {"t": "f", "n": "06 Mensagens Chave", "fn": "06-MENSAGENS_CHAVE.md", "c": "# 06. Mensagens Chave\n\n**Status:** ✅ Aprovado\n**Última atualização:** 26/03/2026\n\n---\n\n## Hierarquia de mensagem\n\n```\nTagline\n  └── Proposta central\n        └── Mensagens por módulo\n              └── Mensagens por persona\n```\n\n---\n\n## Tagline\n\n> **Vende mais. Perde menos. Fideliza sempre.**\n\n## Subtítulo\n\n> Do lead ao cliente fidelizado com inteligência.\n\n---\n\n## Proposta central\n\n> \"A AuroraISP automatiza o processo comercial do provedor de internet com IA. Do WhatsApp ao HubSoft, sem retrabalho.\"\n\n---\n\n## Mensagens por módulo\n\n### Comercial\n- \"Do WhatsApp ao HubSoft, sem um clique manual.\"\n- \"Seu time vende. A Aurora cuida do resto.\"\n- \"Lead entra no WhatsApp. Contrato chega no HubSoft. Automático.\"\n\n**Comercial Pro (CRM Kanban)**\n- \"Veja onde cada lead está parado. Antes de perder.\"\n- \"Pipeline claro. Decisão rápida.\"\n\n### Marketing\n- \"Seus leads recebem a mensagem certa, na hora certa, no canal certo.\"\n- \"Réguas prontas para o provedor usar no primeiro dia.\"\n- \"Campanha no ar. IA otimizando. Você vendendo.\"\n\n### CS\n- \"Cliente que tem vantagem, não cancela.\"\n- \"Fidelização que o provedor nunca teve. Agora tem.\"\n- \"Saiba quem está prestes a cancelar antes que ele cancele.\"\n\n---\n\n## Mensagens por persona\n\n### Para o Dono\n- \"Você sabia que seu time perdeu leads essa semana sem saber?\"\n- \"Com a Aurora, você vê o funil de vendas em tempo real.\"\n- \"Um contrato a mais por mês já paga o plano. O resto é lucro.\"\n\n**Ângulo custo:** \"Um provedor reduziu o time de atendimento de 8 para 2 pessoas. O processo ficou mais eficiente, não mais lento.\"\n\n**Ângulo crescimento:** \"Com a Aurora, seu time atual consegue atender o dobro de leads. Você cresce sem precisar contratar.\"\n\n### Para o Gerente Comercial\n- \"Seu time tem meta. Agora você tem dado para cobrar.\"\n- \"Relatório de conversão por vendedor. Automático, todo dia.\"\n\n### Para o Vendedor\n- \"Sem fila de prioridade, o lead mais quente fica esperando.\"\n- \"A Aurora avisa qual lead ligar agora. Você só fecha.\"\n\n---\n\n## Mensagem de prova (case anônimo)\n\n> \"Um provedor regional com 30.000 clientes recebia mil leads por mês e precisava de 8 pessoas para dar conta. Hoje, 2 pessoas atendem o mesmo volume. As outras 2 viraram backoffice estratégico do comercial, função que antes não existia. 400 vendas por mês no digital, R$ 99,90 cada, processo inteiro automatizado. Economia de R$ 284.400 por ano só em pessoal.\"\n\n---\n\n## Objeções e respostas\n\n| Objeção | Resposta |\n|---------|----------|\n| \"Já uso WhatsApp Business\" | WhatsApp Business não qualifica lead, não coleta documento, não manda contrato pro HubSoft. São ferramentas diferentes. |\n| \"Minha equipe não vai aprender\" | Interface feita para vendedor sem conhecimento técnico. Treinamento em 30 minutos. |\n| \"E se o bot errar?\" | Modo manual sempre disponível. O bot é auxiliar, não decisor. |\n| \"Não tenho técnico para configurar\" | A implementação é responsabilidade da Aurora. Você paga o setup, a gente configura. |\n| \"HubSoft já faz isso\" | HubSoft é ERP e faturamento. Não qualifica lead, não coleta documento, não fideliza cliente. |\n| \"Quanto vou economizar?\" | Depende do seu volume. Um provedor com perfil similar economizou R$ 284.400 por ano só em pessoal. |\n\n---\n\n## Perguntas em aberto\n\n- [ ] Validar mensagens com o parceiro comercial antes de usar em campo\n- [ ] Criar versões curtas para WhatsApp (máximo 3 linhas)\n- [ ] Criar versão para pitch de 2 minutos\n"}, {"t": "f", "n": "07 Canais", "fn": "07-CANAIS.md", "c": "# 07. Canais\n\n**Status:** ✅ Aprovado\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nDefinir como a AuroraISP chega até o ICP — quais canais usar, em que ordem e com qual abordagem.\n\n---\n\n## Canais mapeados\n\n### Canal 1 — Sócio Comercial\n**Prioridade:** Alta\n**Status:** Ativo\n\nO sócio comercial detém 30% do lucro da AuroraISP e é responsável pela prospecção e fechamento de novos clientes. A Aurora fornece material de enablement, pitch e suporte técnico para demos.\n\n| Item | Detalhe |\n|------|---------|\n| Responsável | Sócio comercial |\n| Modelo | 30% do lucro (participação societária) |\n| Abordagem | Consultiva |\n| Material necessário | Pitch deck, one-pager, case anônimo, demo ao vivo |\n| Resultado esperado | A definir com o sócio |\n\n---\n\n### Canal 2 — Comunidades de Provedores\n**Prioridade:** Alta\n**Custo:** Baixo\n\nGrupos de WhatsApp e Telegram de provedores regionais são o principal ponto de encontro do ICP. Presença ativa com conteúdo de valor gera reconhecimento orgânico sem custo.\n\n| Item | Detalhe |\n|------|---------|\n| Canais | Grupos WhatsApp/Telegram de ISPs, comunidades ABRINT, ABRI |\n| Abordagem | Conteúdo de valor + case + indicação |\n| Mapeamento | A levantar com o sócio comercial |\n| Resultado esperado | A definir após mapeamento |\n\n---\n\n### Canal 3 — Parceria HubSoft\n**Prioridade:** Baixa (longo prazo)\n**Custo:** Baixo após acordo\n\nHubSoft tem 3.000 a 5.000 ISPs na base. Uma parceria dá acesso direto ao ICP perfeito — provedores que já usam o ERP com o qual a AuroraISP integra nativamente. Pode ser desde indicação informal até presença em marketplace oficial.\n\n| Item | Detalhe |\n|------|---------|\n| Tipo | Indicação, co-marketing ou marketplace |\n| Vantagem | Acesso direto à base de ISPs HubSoft sem custo de prospecção |\n| Diferencial para HubSoft | AuroraISP aumenta o valor percebido do HubSoft para o cliente final |\n| Status | Contato a iniciar |\n| Resultado esperado | A definir após primeiro contato |\n\n---\n\n### Canal 4 — Outbound Direto\n**Prioridade:** Média\n**Custo:** Baixo\n\n| Item | Detalhe |\n|------|---------|\n| Canais | WhatsApp direto para donos de ISP |\n| Abordagem | Personalizada com pitch curto e link para demo |\n| Resultado esperado | A definir |\n\n---\n\n### Canal 5 — Eventos do Setor\n**Prioridade:** Média\n**Custo:** Médio\n\n| Item | Detalhe |\n|------|---------|\n| Eventos | ISP Summit, MeetISP, ABRINT, feiras regionais |\n| Abordagem | Stand, palestra ou participação como case |\n| Resultado esperado | 10 ou mais leads por evento |\n\n---\n\n### Canal 6 — Inbound (Conteúdo)\n**Prioridade:** Baixa (médio/longo prazo)\n**Custo:** Baixo\n\n| Item | Detalhe |\n|------|---------|\n| Formatos | Blog, YouTube, LinkedIn |\n| Temas | Como não perder lead no WhatsApp, como estruturar time de vendas de ISP |\n| Resultado esperado | 1 a 2 conversões por mês após 6 meses |\n\n---\n\n## Prioridade de execução\n\n```\nAgora:     Sócio Comercial + Comunidades de Provedores\nPróximo:   Outbound Direto\nFuturo:    Parceria HubSoft + Eventos + Inbound\n```\n\n---\n\n## Pendências\n\n- [ ] Levantar com o sócio comercial os grupos de WhatsApp/Telegram mais relevantes\n"}, {"t": "f", "n": "08 Precificacao", "fn": "08-PRECIFICACAO.md", "c": "# 08. Precificação\n\n**Status:** ✅ Aprovado\n**Última atualização:** 26/03/2026\n\n---\n\n## Modelo de precificação\n\n**Por módulo** (Starter, Start e Pro) **+ valor transacional mensal.**\n\nInspirado no modelo HubSpot: o cliente entra pelo plano que cabe no bolso e expande conforme cresce. Três níveis de profundidade por módulo. O transacional alinha o sucesso da Aurora com o sucesso do provedor.\n\nEscada de preço: **1:2:3,5** por módulo.\n\n---\n\n## Módulos disponíveis\n\n| Módulo | Status | O que resolve |\n|--------|--------|---------------|\n| **Comercial** | ✅ Disponível | Automação do fluxo comercial: lead → documento → contrato → HubSoft. CRM Kanban incluso no Pro. |\n| **Marketing** | 🔧 Em desenvolvimento | Motor de automação do hub. E-mail e WhatsApp, fluxos de automação com réguas padrão prontas, gestão de tráfego pago com IA. |\n| **CS** | 🔧 Em desenvolvimento | Retenção e fidelização pós-venda: Clube de Benefícios, prevenção de churn, NPS, upsell. Automações rodam via Marketing. |\n\n> O CRM Kanban é parte do Comercial Pro, não um produto separado. O pipeline só existe porque o Comercial alimenta os dados.\n\n---\n\n## O que diferencia Starter, Start e Pro\n\n| Critério | Starter | Start | Pro |\n|----------|---------|-------|-----|\n| Público-alvo | ISP pequeno, até ~2.000 clientes | ISP médio, 2.000 a 10.000 clientes | ISP grande, acima de 10.000 clientes |\n| Funcionalidades | Essenciais | Completas | Completas + avançadas com IA |\n| Número de usuários | 1 a 2 | Até 5 | Ilimitado |\n| Nível de suporte | Standard | Standard | Prioritário |\n\n> Não há limite de volume (leads, clientes, contatos). O volume é coberto pelo transacional. Quanto mais o provedor cresce, mais paga, mas sempre com ROI positivo.\n\n---\n\n## Estrutura por módulo\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$397/mês | R$797/mês | R$1.397/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Funcionalidades | Bot de qualificação, coleta de docs, contrato, ativação HubSoft | Tudo do Starter + automações de follow-up, relatórios básicos | Tudo do Start + CRM Kanban, automações avançadas, validação IA, relatórios completos |\n| Suporte | Standard | Standard | Prioritário |\n| **Transacional** | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$297/mês | R$597/mês | R$997/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Funcionalidades | Disparos de WhatsApp e e-mail, réguas padrão prontas | Tudo do Starter + fluxos personalizados, rastreamento de campanhas | Tudo do Start + nutrição avançada, upsell de SVA, otimização de tráfego com IA, relatórios de atribuição |\n| Suporte | Standard | Standard | Prioritário |\n| **Transacional** | R$0,05 por contato na base/mês | R$0,05 por contato na base/mês | R$0,05 por contato na base/mês |\n\n### CS (Customer Success)\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$247/mês | R$497/mês | R$897/mês |\n| Usuários | 1 a 2 | Até 5 | Ilimitado |\n| Funcionalidades | Clube de Benefícios, réguas básicas de retenção via Marketing | Tudo do Starter + NPS, relatórios de saúde da base | Tudo do Start + prevenção de churn com IA, upsell automatizado, relatórios avançados |\n| Suporte | Standard | Standard | Prioritário |\n| **Transacional** | R$0,15 por cliente ativo no clube/mês | R$0,15 por cliente ativo no clube/mês | R$0,15 por cliente ativo no clube/mês |\n\n---\n\n## Eventos transacionais por módulo\n\n| Módulo | Evento | Valor | Natureza |\n|--------|--------|-------|---------|\n| Comercial | Venda finalizada e validada no ERP | R$7 por venda | Variável mensal — escala com volume de vendas |\n| Marketing | Contato na base de leads | R$0,05 por contato/mês | Variável mensal — escala com crescimento da base |\n| CS | Cliente ativo no clube | R$0,15 por cliente/mês | Variável mensal — escala com retenção da base |\n| CRM Kanban | Incluso no Comercial Pro | Sem transacional próprio | — |\n\n> Os três transacionais escalam com métricas diferentes do provedor: volume de vendas, base de leads e base de clientes ativos. Quanto mais o provedor cresce, mais a Aurora cresce junto.\n\n---\n\n## Simulação por porte\n\n### Perfis de referência\n\n| | Starter (pequeno) | Start (médio) | Pro (grande) |\n|-|-------------------|---------------|--------------|\n| Vendas digitais/mês | 30 | 150 | 400 |\n| Leads na base | 300 | 2.000 | 6.000 |\n| Clientes no clube | 500 | 3.000 | 10.000 |\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$397 | R$797 | R$1.397 |\n| Transacional | 30 × R$7 = R$210 | 150 × R$7 = R$1.050 | 400 × R$7 = R$2.800 |\n| **Total/mês** | **R$607** | **R$1.847** | **R$4.197** |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$297 | R$597 | R$997 |\n| Transacional | 300 × R$0,05 = R$15 | 2.000 × R$0,05 = R$100 | 6.000 × R$0,05 = R$300 |\n| **Total/mês** | **R$312** | **R$697** | **R$1.297** |\n\n### CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$247 | R$497 | R$897 |\n| Transacional | 500 × R$0,15 = R$75 | 3.000 × R$0,15 = R$450 | 10.000 × R$0,15 = R$1.500 |\n| **Total/mês** | **R$322** | **R$947** | **R$2.397** |\n\n### Stack completo\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Comercial | R$607 | R$1.847 | R$4.197 |\n| Marketing | R$312 | R$697 | R$1.297 |\n| CS | R$322 | R$947 | R$2.397 |\n| **Total/mês** | **R$1.241** | **R$3.491** | **R$7.891** |\n\n---\n\n## ROI por porte (ticket médio R$99,90)\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Receita digital gerada/mês | R$2.997 | R$14.985 | R$39.960 |\n| Custo stack completo/mês | R$1.241 | R$3.491 | R$7.891 |\n| **ROI** | **2,4x** | **4,3x** | **5x** |\n\n> O stack completo custa menos de 20% da receita digital gerada em todos os portes.\n\n---\n\n## Jornada natural de expansão\n\n```\nComercial Starter        ← entrada para ISPs pequenos\n      ↓\nComercial Start          ← time crescendo, precisa de mais usuários\n      ↓\nComercial Pro            ← CRM Kanban + IA + relatórios completos\n      ↓\n+ Marketing Starter      ← automação básica de leads\n      ↓\n+ Marketing Start/Pro    ← campanhas, tráfego pago, IA\n      ↓\n+ CS Starter             ← clube de benefícios ativo\n      ↓\n+ CS Start/Pro           ← retenção avançada, churn prevention\n      ↓\nStack completo\n```\n\n---\n\n## Período de teste\n\n14 dias gratuitos para provedores que utilizam HubSoft como ERP. Sem trial para demais ERPs.\n\n> O HubSoft é o ICP perfeito. O trial é um argumento direto para quem já usa o sistema com o qual a Aurora integra nativamente.\n\n---\n\n## Comissão do sócio comercial\n\nO sócio recebe **30% do lucro líquido** gerado pelos clientes que ele trouxer. Mensalidade e transacional entram na base de cálculo após dedução dos custos operacionais.\n\n---\n\n## Pendências\n\n- [ ] Definir bundle com desconto para quem contratar mais de um módulo (baixa prioridade)\n"}, {"t": "f", "n": "09 Enablement", "fn": "09-ENABLEMENT.md", "c": "# 09. Enablement — Material do Parceiro Comercial\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nGarantir que o parceiro comercial tenha tudo que precisa para prospectar, apresentar e fechar — sem depender da equipe da Aurora para cada conversa.\n\n---\n\n## Contexto do parceiro\n\n| Item | Detalhe |\n|------|---------|\n| Modelo | Sócio comercial — 30% do lucro líquido |\n| Processo próprio | Sim. A Aurora apoia e complementa com estratégias e materiais |\n| Demo | Ao vivo, conduzida pelo parceiro com suporte da Aurora quando necessário |\n| Treinamento técnico | Necessário. O parceiro precisa entender o produto para conduzir a demo com autonomia |\n\n---\n\n## Materiais necessários\n\n| Material | Formato | Status |\n|----------|---------|--------|\n| Pitch de 2 minutos (script) | Texto | ✅ Rascunho pronto |\n| One-pager | PDF | 🔧 A criar |\n| Deck de apresentação | Slides | 🔧 A criar |\n| Case anônimo com números | PDF/Texto | 🔧 A criar |\n| Respostas para objeções | Texto | 🟡 Rascunho em 06-MENSAGENS_CHAVE.md |\n| Roteiro de demo ao vivo | Texto | 🔧 A criar |\n| Tabela de preços | PDF | ✅ Precificação aprovada |\n| Trilha de treinamento técnico | Texto/Vídeo | 🔧 A criar |\n\n---\n\n## Pitch de 2 minutos\n\n> \"Você já perdeu lead essa semana por falta de acompanhamento no WhatsApp? A AuroraISP resolve isso.\n>\n> A gente automatiza o fluxo de vendas do provedor do começo ao fim: o lead entra no WhatsApp, o bot qualifica, coleta os documentos, gera o contrato e manda direto pro HubSoft. Sem planilha, sem retrabalho, sem lead perdido.\n>\n> Temos resultado comprovado: um provedor com 30.000 clientes recebia mil leads por mês e precisava de 8 pessoas para atender. Hoje, 2 pessoas dão conta do mesmo volume. São 400 vendas por mês no digital, R$99,90 cada. Tudo automatizado. Economia de R$284.400 por ano só em pessoal.\n>\n> São 15 minutos para você ver funcionando. Quando você tem?\"\n\n---\n\n## Roteiro de demo ao vivo\n\n**Objetivo da demo:** mostrar o fluxo completo de uma venda em tempo real. O prospect precisa sair da demo pensando \"isso é o que eu preciso\".\n\n**Duração sugerida:** 30 a 45 minutos\n\n| Etapa | Tempo | O que mostrar |\n|-------|-------|---------------|\n| Abertura | 5 min | Contexto do provedor, confirmar dor principal |\n| Fluxo do lead | 10 min | Lead entra no WhatsApp, bot qualifica, coleta docs |\n| Geração de contrato | 5 min | Contrato gerado automaticamente |\n| Ativação no HubSoft | 5 min | Dados enviados direto para o ERP |\n| CRM Kanban (se Pro) | 5 min | Pipeline de vendas atualizado em tempo real |\n| Números e ROI | 5 min | Case anônimo, simulação com os números do prospect |\n| Próximos passos | 5 min | Trial 14 dias (HubSoft), condições, fechamento |\n\n> O parceiro conduz. A Aurora entra como suporte técnico quando necessário nas primeiras demos.\n\n---\n\n## Trilha de treinamento técnico\n\n**Objetivo:** o parceiro entender o produto fundo o suficiente para conduzir demos com autonomia e responder perguntas técnicas do prospect.\n\n| Módulo | Conteúdo | Status |\n|--------|----------|--------|\n| 1. Visão geral da AuroraISP | Hub, módulos, posicionamento, ICP | 🔧 A criar |\n| 2. Comercial a fundo | Fluxo completo: lead → HubSoft, bot, docs, contrato, CRM | 🔧 A criar |\n| 3. Marketing e CS | Visão geral dos módulos em desenvolvimento | 🔧 A criar |\n| 4. Precificação e transacional | Starter/Start/Pro, simulações, ROI | 🔧 A criar |\n| 5. Objeções comuns | Respostas prontas para as principais objeções | 🔧 A criar |\n| 6. Demo hands-on | Prática guiada do roteiro de demo ao vivo | 🔧 A criar |\n\n---\n\n## Estratégias de prospecção conjuntas\n\nO parceiro tem processo próprio. A Aurora complementa com:\n\n| Estratégia | Responsável | Status |\n|------------|-------------|--------|\n| Mapeamento de grupos WhatsApp/Telegram de ISPs | Parceiro + Aurora | ⏳ Pendente |\n| Abordagem para comunidades ABRINT/ABRI | Aurora define, parceiro executa | 🔧 A criar |\n| Outbound direto via WhatsApp para donos de ISP | Aurora define script, parceiro executa | 🔧 A criar |\n| Participação em eventos do setor | Conjunto | 🔧 A planejar |\n\n---\n\n## Pendências\n\n- [ ] Criar one-pager (aguarda logo)\n- [ ] Criar deck de apresentação (aguarda logo)\n- [ ] Criar case anônimo em PDF\n- [ ] Criar roteiro detalhado de demo ao vivo\n- [ ] Criar trilha de treinamento técnico (módulos 1 a 6)\n- [ ] Definir estratégias de prospecção conjuntas com o parceiro\n"}, {"t": "f", "n": "10 Roadmap Gtm", "fn": "10-ROADMAP_GTM.md", "c": "# 10. Roadmap GTM\n\n**Status:** 🔧 Em construção\n**Última atualização:** 29/03/2
