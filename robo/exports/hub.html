026\n\n---\n\n## Objetivo\n\nDefinir as fases de entrada no mercado, com ações concretas, responsáveis e métricas de sucesso.\n\n---\n\n## Fases\n\n### Fase 0 — Fundação\n**Período:** até 30/03/2026\n**Foco:** Preparar produto e material antes de ir ao mercado\n\n| Ação | Responsável | Prazo | Status |\n|------|-------------|-------|--------|\n| Refatoração completa do projeto | Dev | 27/03/2026 | ✅ Concluído (29/03). 10+ apps criados, models migrados |\n| Multi-tenancy implementado | Dev | 30/03/2026 | ✅ Concluído (29/03). Tenant, isolamento, auto-filtro, 16 testes |\n| Segurança: secrets removidos | Dev | 29/03/2026 | ✅ Concluído (29/03). Variáveis de ambiente |\n| CS migrado do megaroleta | Dev | 29/03/2026 | ✅ Concluído (29/03). 4 apps, 20 models, 76 URLs |\n| Painel Admin Aurora | Dev | 29/03/2026 | ✅ Concluído (29/03). Tenants, planos, 115 features |\n| Sistema de planos e features | Dev | 29/03/2026 | ✅ Concluído (29/03). 9 planos (3x3), seed_planos |\n| Finalizar documentação GTM | PMM | 30/03/2026 | 🔧 Em andamento |\n| Definir precificação | CEO + PMM | 26/03/2026 | ✅ Concluído |\n| Criar brandbook e identidade visual | PMM | A definir | 🔧 Em andamento |\n| Criar one-pager e pitch deck | PMM | A definir (aguarda logo) | ⏳ Aguardando |\n| Preparar roteiro de demo ao vivo | PMM + Parceiro | A definir | 🔧 A fazer |\n| Criar case anônimo em PDF | PMM | A definir | 🔧 A fazer |\n| Criar trilha de treinamento do parceiro | PMM | A definir | 🔧 A fazer |\n\n---\n\n### Fase 1 — Validação Comercial\n**Período:** a partir de 31/03/2026\n**Foco:** Primeiros clientes pagantes, ajuste de pitch e preço\n**Meta:** 15 clientes pagantes no primeiro trimestre de operação (abril a junho/2026)\n\n| Ação | Responsável | Meta |\n|------|-------------|------|\n| Parceiro comercial em campo | Parceiro | Imediato após Fase 0 |\n| Treinar parceiro no produto | CEO + PMM | Primeira semana de abril |\n| Abordar comunidades de provedores | Parceiro + CEO | A definir |\n| Fechar primeiros contratos | Parceiro | 15 clientes até junho/2026 |\n| Coletar feedback de onboarding | CEO | Por cliente fechado |\n| Ajustar pitch com base em objeções reais | PMM | Contínuo |\n\n---\n\n### Fase 2 — Escala Inicial\n**Período:** A definir (após validação)\n**Foco:** Repetir o processo que funcionou, aumentar volume\n\n| Ação | Responsável | Meta |\n|------|-------------|------|\n| Lançar case público (com autorização) | PMM | A definir |\n| Ativar outbound direto | Parceiro | A definir |\n| CRM Kanban em produção | Dev | A definir |\n| Iniciar contato com HubSoft | CEO | A definir |\n\n---\n\n### Fase 3 — Crescimento\n**Período:** A definir\n**Foco:** Novos canais, novos produtos, novos ERPs\n\n| Ação | Responsável | Meta |\n|------|-------------|------|\n| Módulo Marketing em produção | Dev | A definir |\n| Clube de Benefícios em produção | Dev | A definir |\n| Expansão para outros ERPs (Voalle, SGP) | Dev | A definir |\n| Inbound — blog, YouTube, LinkedIn | PMM | A definir |\n| Eventos do setor | CEO + Parceiro | A definir |\n\n---\n\n## Linha do tempo resumida\n\n```\n26/03  Precificação aprovada, GTM em construção\n27/03  Refatoração completa do projeto iniciada\n29/03  ✅ Refatoração, multi-tenancy, segurança, CS, Admin Aurora, planos concluídos\n30/03  Fase 0 encerra (pendente: deploy em produção)\n31/03  Fase 1 começa. Parceiro em campo\njun/26 Meta: 15 clientes pagantes\n       ↓\n       Fase 2 (datas a definir)\n       ↓\n       Fase 3 (datas a definir)\n```\n\n---\n\n## Pendências\n\n- [ ] Definir datas e metas das Fases 2 e 3\n- [ ] Criar logo (CEO) — desbloqueia one-pager, deck e brandbook\n- [ ] Alinhar primeira semana de treinamento com o parceiro\n"}, {"t": "f", "n": "11 Materiais Lancamento", "fn": "11-MATERIAIS_LANCAMENTO.md", "c": "# 11. Materiais de Lançamento\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nCentralizar todos os materiais necessários para lançar a AuroraISP no mercado. Cada item tem responsável, status e dependências — para que nada seja esquecido antes de ir ao ar.\n\n---\n\n## Brand\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| Logo da AuroraISP | CEO | — | ⏳ Pendente |\n| Brandbook completo | PMM | Logo | 🟡 Em andamento (aguarda logo) |\n| Paleta de cores | PMM | — | ✅ Definida |\n| Tipografia (Inter) | PMM | — | ✅ Definida |\n| Padrão de interface (light/dark) | PMM | — | ✅ Definido |\n\n---\n\n## Vendas e Enablement\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| One-pager | PMM | Logo | ⏳ Aguardando logo |\n| Pitch deck | PMM | Logo | ⏳ Aguardando logo |\n| Case anônimo em PDF | PMM | — | 🔧 A criar |\n| Tabela de preços | PMM | — | ✅ Aprovada |\n| Respostas para objeções | PMM | — | 🟡 Rascunho em 06-MENSAGENS_CHAVE.md |\n| Script do pitch de 2 minutos | PMM | — | 🟡 Rascunho em 09-ENABLEMENT.md |\n| Diagnóstico — Typeform | PMM + Dev | — | 🔧 A criar (ver 13-DIAGNOSTICO.md) |\n| Diagnóstico — Script WhatsApp | PMM | — | ✅ Rascunho em exports/drafts/scripts_vendas/ |\n\n---\n\n## Demo\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| Ambiente de demo configurado | Dev | Multi-tenancy | ⏳ Aguardando multi-tenancy |\n| Roteiro de demo ao vivo | PMM + Parceiro | — | 🔧 A criar |\n| Checklist pré-demo | PMM | Roteiro | 🔧 A criar |\n\n---\n\n## Treinamento do Parceiro\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| Módulo 1 — Visão geral da AuroraISP | PMM | — | 🔧 A criar |\n| Módulo 2 — Comercial a fundo | PMM | — | 🔧 A criar |\n| Módulo 3 — Marketing e CS | PMM | — | 🔧 A criar |\n| Módulo 4 — Precificação e transacional | PMM | — | 🔧 A criar |\n| Módulo 5 — Objeções comuns | PMM | — | 🔧 A criar |\n| Módulo 6 — Demo hands-on | PMM + Dev | Ambiente de demo | 🔧 A criar |\n\n---\n\n## Digital\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| Landing page | Dev + PMM | Logo, copy | 🔧 A criar |\n| Copy da landing page | PMM | — | 🔧 A criar |\n| Instagram | PMM | Logo | ⏳ Aguardando logo |\n| LinkedIn | PMM | Logo | ⏳ Aguardando logo |\n| WhatsApp Business configurado | CEO | — | 🔧 A verificar |\n\n---\n\n## Produto\n\n| Material | Responsável | Depende de | Status |\n|----------|-------------|------------|--------|\n| Refatoração do projeto | Dev | — | 🔧 Até 27/03 |\n| Multi-tenancy | Dev | Refatoração | 🔧 Até 30/03 |\n| Onboarding do cliente | Dev + PMM | Multi-tenancy | 🔧 A criar |\n| Documentação de uso para o provedor | PMM | — | 🔧 A criar |\n\n---\n\n## Resumo por status\n\n| Status | Qtd |\n|--------|-----|\n| ✅ Pronto | 4 |\n| 🟡 Rascunho/Em andamento | 3 |\n| ⏳ Aguardando desbloqueador | 5 |\n| 🔧 A criar | 13 |\n\n---\n\n## Principal desbloqueador\n\nA **logo** é o item que mais trava o avanço. One-pager, deck, brandbook, redes sociais e landing page dependem dela diretamente.\n\n---\n\n## Dependências críticas\n\n```\nLogo\n  └── Brandbook completo\n  └── One-pager\n  └── Pitch deck\n  └── Redes sociais\n  └── Landing page\n\nMulti-tenancy (30/03)\n  └── Ambiente de demo\n  └── Módulo 6 — Demo hands-on\n  └── Onboarding do cliente\n```\n"}, {"t": "f", "n": "12 Fluxo Comercial", "fn": "12-FLUXO_COMERCIAL.md", "c": "# 12. Fluxo Comercial\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Visão geral\n\n```\nGeração de demanda → Abordagem → Diagnóstico → Demo → Fechamento → Ativação\n```\n\nA Aurora gera demanda por múltiplos canais. O parceiro executa o processo comercial. A Aurora apoia na demo quando necessário e conduz o onboarding.\n\n---\n\n## Fontes de lead\n\n| Fonte | Quem gera | Canal |\n|-------|-----------|-------|\n| Rede do parceiro | Parceiro | Contato direto, indicações |\n| Comunidades de provedores | Aurora + Parceiro | WhatsApp, Telegram, ABRINT, ABRI |\n| Outbound direto | Aurora define, parceiro executa | WhatsApp direto para donos de ISP |\n| Eventos do setor | Aurora + Parceiro | ISP Summit, MeetISP, feiras regionais |\n| Inbound (futuro) | Aurora | Blog, YouTube, LinkedIn |\n\n---\n\n## Etapas do fluxo\n\n### 1. Identificação do lead\n\n**Responsável:** Aurora ou Parceiro\n**Critério de entrada:** ISP regional com HubSoft, 500 a 50.000 clientes, 2 a 20 vendedores.\n\n**Ações:**\n- Lead identificado via comunidade, indicação, evento ou outbound\n- Registrar lead com: nome, provedor, cidade, estimativa de clientes, usa HubSoft (sim/não)\n\n---\n\n### 2. Abordagem inicial\n\n**Responsável:** Parceiro\n**Canal:** WhatsApp direto\n\n**Ações:**\n- Contato personalizado com pitch curto (2 minutos)\n- Enviar pre-demo deck se houver interesse inicial\n- Objetivo: conseguir 30 minutos para a demo\n\n**Script de abertura (referência):**\n> \"Você já perdeu lead essa semana por falta de acompanhamento no WhatsApp? Tenho um sistema que resolve isso para provedores. São 30 minutos para você ver funcionando. Quando você tem?\"\n\n**Critério para avançar:** prospect aceita a reunião.\n\n---\n\n### 3. Diagnóstico\n\n**Responsável:** Parceiro\n**Quando:** Antes de agendar a demo — via Typeform (inbound) ou script WhatsApp (outbound)\n**Referência:** [13-DIAGNOSTICO.md](./13-DIAGNOSTICO.md) e [script WhatsApp](../../exports/drafts/scripts_vendas/diagnostico_whatsapp.md)\n\n**O que cobre:**\n- Qualificação obrigatória (ERP, porte, time, decisor)\n- Operação comercial (leads, vendas, ticket, canal)\n- Ferramentas atuais (CRM, gestão de leads)\n- Dores principais (onde perde mais, quanto tempo leva)\n- Objetivos (meta de crescimento, prioridade)\n\n**Saída do diagnóstico:**\n- Lead qualificado ou descartado\n- Resumo com números reais do prospect\n- Simulação de ROI personalizada\n- Demo personalizada com dados do próprio ISP\n\n**Critério para avançar:** passa no checklist obrigatório. Decisor presente ou confirmado para a demo.\n\n---\n\n### 4. Demo ao vivo\n\n**Responsável:** Parceiro (Aurora apoia nas primeiras demos)\n**Duração:** 30 a 45 minutos\n**Material:** Deck do parceiro + sistema ao vivo\n\n**Sequência:**\n1. Agenda e contexto (5 min)\n2. Validar as dores com os números do prospect (5 min)\n3. Demo ao vivo do Comercial (15 min)\n4. Visão de Marketing e CS — módulos futuros (5 min)\n5. Case de produção com comparação ao prospect (5 min)\n6. Precificação e simulação de ROI ao vivo (5 min)\n7. Próximos passos (5 min)\n\n**Critério para avançar:** prospect engajado, sem objeção bloqueante.\n\n---\n\n### 5. Fechamento\n\n**Responsável:** Parceiro\n**Objetivo:** Fechar o próximo passo concreto antes de encerrar a reunião.\n\n**Cenário 1 — Fecha na hora:**\n- HubSoft: ativar trial de 14 dias imediatamente\n- Outros ERPs: assinar contrato mensal\n\n**Cenário 2 — Não fecha na hora:**\n- Enviar deck de apoio logo após a reunião\n- Definir data para retorno antes de encerrar\n- Executar processo de follow-up definido pela Aurora\n\n**Cenário 3 — Precisa de outros decisores:**\n- Marcar segunda reunião incluindo o sócio ou diretor\n- Enviar deck de apoio para o prospect apresentar internamente\n\n**Regra:** nunca sair da reunião sem uma data marcada.\n\n---\n\n### 6. Follow-up (quando não fecha na hora)\n\n**Responsável:** Parceiro (processo definido pela Aurora)\n**Material:** Deck de apoio, case anônimo, simulação de ROI personalizada\n\n| Dia | Ação |\n|-----|------|\n| D+0 | Enviar deck de apoio por WhatsApp com mensagem personalizada |\n| D+2 | Follow-up leve: \"Ficou alguma dúvida depois que você viu o material?\" |\n| D+5 | Enviar simulação de ROI com os números do prospect |\n| D+10 | Última tentativa: nova proposta ou encerrar ciclo |\n\n**Critério para encerrar:** sem resposta após D+10. Mover para nutrição de longo prazo.\n\n---\n\n### 7. Ativação e onboarding\n\n**Responsável:** Time da Aurora\n**Duração:** Aproximadamente 1 hora\n**Gatilho:** Contrato assinado ou trial iniciado\n\n**Checklist de ativação:**\n- [ ] Acesso ao HubSoft configurado\n- [ ] Número de WhatsApp do provedor conectado\n- [ ] Bot de qualificação configurado com dados do provedor\n- [ ] Fluxo de documentos testado\n- [ ] Primeiro lead de teste rodado com o cliente presente\n- [ ] Cliente orientado sobre painel e relatórios\n\n**Critério de conclusão:** cliente ativo, primeiro lead processado com sucesso.\n\n---\n\n## Materiais por etapa\n\n| Etapa | Material |\n|-------|----------|\n| Abordagem | Script de abertura, pre-demo deck |\n| Diagnóstico | Typeform (inbound), script WhatsApp (outbound) |\n| Demo | Deck do parceiro, sistema ao vivo, simulação de ROI com dados do diagnóstico |\n| Fechamento | Proposta com dados do próprio ISP |\n| Follow-up | Deck de apoio, case anônimo, simulação personalizada |\n| Ativação | Checklist interno da Aurora |\n\n---\n\n## Responsabilidades\n\n| Etapa | Parceiro | Aurora |\n|-------|----------|--------|\n| Geração de demanda | Rede própria, executa outbound | Define estratégia, gera leads via canais digitais |\n| Abordagem e qualificação | Executa | Fornece script e materiais |\n| Demo | Conduz | Apoia nas primeiras demos |\n| Fechamento | Executa | Fornece simulação de ROI |\n| Follow-up | Executa | Define processo e materiais |\n| Ativação e onboarding | Não envolvido | Conduz integralmente |\n\n---\n\n## Pendências\n\n- [ ] Definir script detalhado de follow-up para o parceiro\n- [ ] Definir critério de qualificação mínima (tamanho, ERP, etc.)\n- [ ] Criar checklist de onboarding completo\n- [ ] Definir SLA de ativação (prazo máximo após assinatura)\n"}, {"t": "f", "n": "13 Diagnostico", "fn": "13-DIAGNOSTICO.md", "c": "# 13. Diagnóstico do Provedor\n\n**Status:** 🔧 Em construção\n**Última atualização:** 26/03/2026\n\n---\n\n## Objetivo\n\nEntender as dores, a operação e o momento do provedor antes da demo. O diagnóstico serve para:\n\n- Qualificar o lead (entra ou não no funil de demo)\n- Personalizar a demo com os números reais do prospect\n- Gerar a simulação de ROI específica para aquele provedor\n- Posicionar a Aurora como consultiva, não apenas como vendedora\n\n---\n\n## Formatos disponíveis\n\n| Formato | Quando usar | Responsável |\n|---------|-------------|-------------|\n| Typeform | Leads inbound (landing page) | Aurora — preenchido pelo prospect antes de agendar |\n| Script WhatsApp | Leads outbound e comunidades | Parceiro — conduzido em conversa |\n| Conversa na abertura da demo | Leads que pularam a etapa | Parceiro — primeiros 5 minutos da reunião |\n\n---\n\n## Checklist de qualificação\n\nCritérios que definem se o lead avança para a demo.\n\n### Obrigatórios\n\n| Critério | Pergunta | Mínimo para avançar |\n|----------|----------|---------------------|\n| ERP | Usa HubSoft? | Preferencial. Outros ERPs entram com ressalva e sem trial. |\n| Porte | Quantos clientes ativos hoje? | 500 ou mais |\n| Time | Quantos vendedores ou atendentes comerciais? | 2 ou mais |\n| Decisor | Você decide a contratação ou precisa de aprovação? | Ter acesso ao decisor antes de fazer a demo |\n\n### Desqualificadores imediatos\n\n- Menos de 500 clientes ativos\n- Sem operação comercial digital (só venda presencial, sem WhatsApp)\n- Nenhum acesso ao decisor e sem perspectiva de tê-lo\n\n---\n\n## Diagnóstico completo\n\n### Bloco 1 — Operação comercial\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quantos leads chegam por mês? | Dimensionar o volume e o transacional potencial |\n| Qual o canal principal de entrada de leads? | Entender origem (WhatsApp, indicação, tráfego pago) |\n| Quantas vendas digitais são feitas por mês? | Calcular taxa de conversão atual |\n| Qual o ticket médio do plano mais vendido? | Calcular ROI da simulação |\n| Qual a taxa de conversão estimada (leads para vendas)? | Identificar gargalo no funil |\n\n### Bloco 2 — Time\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quantas pessoas no time comercial hoje? | Calcular custo de pessoal atual |\n| Quantas no atendimento? | Entender divisão de funções |\n| Tem backoffice dedicado? | Entender carga operacional |\n| Qual a maior dificuldade do time no dia a dia? | Identificar dor principal |\n\n### Bloco 3 — Ferramentas\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Qual ERP usa? (HubSoft, Voalle, SGP, outro) | Qualificação e definição do trial |\n| Usa algum CRM hoje? | Identificar gap que o Comercial Pro resolve |\n| Como gerencia os leads hoje? (planilha, WhatsApp, sistema) | Entender nível de organização atual |\n| Usa alguma ferramenta de e-mail ou WhatsApp marketing? | Identificar gap do módulo Marketing |\n\n### Bloco 4 — Dores\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Onde você perde mais leads no processo? | Mapear o maior gargalo |\n| Qual etapa mais trava o processo de vendas? | Priorizar o que mostrar na demo |\n| Já perdeu um bom cliente por demora no atendimento? | Validar dor emocional |\n| Quanto tempo leva do lead até a ativação no ERP hoje? | Mostrar o contraste com a Aurora |\n| Tem problema com churn ou cancelamento? | Abrir conversa sobre CS |\n\n### Bloco 5 — Objetivos\n\n| Pergunta | Objetivo |\n|----------|----------|\n| Quanto quer crescer em vendas nos próximos 6 meses? | Alinhar a demo com a meta do prospect |\n| O que mudaria primeiro na operação se pudesse? | Entender prioridade do decisor |\n| Já considerou alguma solução parecida? Por que não foi em frente? | Identificar objeções antecipadas |\n\n---\n\n## Saída do diagnóstico\n\nApós o preenchimento, gerar um resumo com:\n\n| Campo | Fonte |\n|-------|-------|\n| Porte do ISP | Bloco 1 e 2 |\n| ERP utilizado | Bloco 3 |\n| Volume de leads/mês | Bloco 1 |\n| Vendas digitais/mês | Bloco 1 |\n| Ticket médio | Bloco 1 |\n| Custo estimado do time | Bloco 2 |\n| Maior dor identificada | Bloco 4 |\n| Simulação de ROI | Calculada automaticamente |\n| Qualificado para demo? | Baseado no checklist |\n\n### Fórmula de ROI para a simulação\n\n```\nReceita digital atual = vendas digitais/mês × ticket médio\nCusto do time = pessoas no comercial × R$3.950/mês (referência)\nCusto Aurora (estimado) = mensalidade + (vendas × R$7)\nROI = receita digital / custo Aurora\nEconomia potencial = custo do time atual − custo mínimo com Aurora\n```\n\n---\n\n## Pendências\n\n- [ ] Criar formulário no Typeform com base nesse diagnóstico\n- [ ] Criar script de conversa para WhatsApp (em exports/drafts/scripts_vendas/)\n- [ ] Definir ferramenta para gerar o resumo automático do diagnóstico\n- [ ] Definir quem recebe o resumo (parceiro, Aurora ou ambos)\n"}]}, {"t": "d", "n": "OPERACIONAL", "ch": [{"t": "d", "n": "contratos", "ch": [{"t": "f", "n": "Contrato Grupo Magister 01 04 2026", "fn": "contrato_grupo_magister_01-04-2026.md", "c": "# CONTRATO DE PRESTAÇÃO DE SERVIÇOS DE TECNOLOGIA\n\n## CONTRATO Nº 2026/001\n\n---\n\n**CONTRATANTE:** GRUPO MAGISTER DE ENSINO SUPERIOR LTDA, pessoa jurídica de direito privado, inscrita no CNPJ sob o nº 01.993.025/0001-04, com sede na Rua Primeiro de Maio, 2235, 1º Piso/Norte, Centro, CEP 64000-000, Teresina/PI, neste ato representada por seu sócio **Gislan Vieira de Sousa**, doravante denominada simplesmente **\"CONTRATANTE\"**.\n\n**CONTRATADA:** PSBR CONSULTORIA EMPRESARIAL LTDA, pessoa jurídica de direito privado, inscrita no CNPJ sob o nº 41.312.673/0001-64, com sede na Rua Tocantins, 140, Bairro Brasileia, CEP 32600-314, Betim/MG, neste ato representada por seu sócio **Paulo Sérgio Barbosa Rodrigues**, doravante denominada simplesmente **\"CONTRATADA\"**.\n\nAs partes acima qualificadas celebram o presente Contrato de Prestação de Serviços de Tecnologia, que se regerá pelas cláusulas e condições a seguir estipuladas.\n\n---\n\n## CLÁUSULA 1ª — DO OBJETO\n\n1.1. O presente contrato tem por objeto a prestação de serviços de tecnologia pela CONTRATADA à CONTRATANTE, consistente na licença de uso da plataforma **AuroraISP**, módulo **Comercial**, conforme especificações abaixo:\n\n| Item | Descrição |\n|------|-----------|\n| **Plataforma** | AuroraISP |\n| **Módulo** | Comercial |\n| **Plano** | Aurora |\n| **Modalidade** | Software como Serviço (SaaS) |\n\n1.2. O módulo Comercial contempla as seguintes funcionalidades:\n\na) Captura e qualificação automatizada de leads via WhatsApp;\nb) Gestão do funil de vendas com CRM Kanban;\nc) Fluxos de atendimento automatizados;\nd) Cadastro digital de clientes com coleta de documentos;\ne) Integração nativa com ERP HubSoft (envio de prospectos, sincronização de clientes, anexação de contratos);\nf) Dashboard de vendas e relatórios;\ng) Gestão de equipes, metas e tarefas;\nh) Sistema de notificações;\ni) API REST para integrações.\n\n1.3. A CONTRATADA fornecerá acesso à plataforma via ambiente web, com disponibilidade 24 horas por dia, 7 dias por semana, ressalvados os períodos de manutenção programada.\n\n---\n\n## CLÁUSULA 2ª — DO VALOR E FORMA DE PAGAMENTO\n\n2.1. Pela prestação dos serviços ora contratados, a CONTRATANTE pagará à CONTRATADA o valor mensal de **R$ 499,00 (quatrocentos e noventa e nove reais)**.\n\n2.2. O valor total do contrato para o período de vigência é de **R$ 5.988,00 (cinco mil, novecentos e oitenta e oito reais)**.\n\n2.3. O pagamento será realizado mensalmente, até o dia **10 (dez)** de cada mês subsequente ao da prestação dos serviços, mediante emissão de boleto bancário ou transferência via PIX.\n\n2.4. Em caso de atraso no pagamento, incidirão multa de 2% (dois por cento) sobre o valor da parcela em atraso, acrescida de juros de mora de 1% (um por cento) ao mês, calculados pro rata die.\n\n2.5. O valor mensal será reajustado anualmente, na data de aniversário do contrato, pelo índice IGPM/FGV acumulado no período, ou por outro índice que venha a substituí-lo.\n\n---\n\n## CLÁUSULA 3ª — DA VIGÊNCIA\n\n3.1. O presente contrato terá vigência de **12 (doze) meses**, com início em **01 de abril de 2026** e término em **31 de março de 2027**.\n\n3.2. O contrato será renovado automaticamente por períodos iguais e sucessivos, salvo manifestação contrária de qualquer das partes, por escrito, com antecedência mínima de **30 (trinta) dias** do término da vigência ou de qualquer período de renovação.\n\n---\n\n## CLÁUSULA 4ª — DAS OBRIGAÇÕES DA CONTRATADA\n\n4.1. A CONTRATADA se obriga a:\n\na) Disponibilizar a plataforma AuroraISP com as funcionalidades descritas na Cláusula 1ª;\nb) Garantir disponibilidade mínima de **99,5% (noventa e nove vírgula cinco por cento)** ao mês (SLA);\nc) Realizar manutenções corretivas e evolutivas na plataforma, sem custo adicional;\nd) Prestar suporte técnico em horário comercial (segunda a sexta, das 8h às 18h), com tempo de primeira resposta de até **4 horas úteis**;\ne) Comunicar previamente qualquer manutenção programada que possa impactar a disponibilidade, com antecedência mínima de 24 horas;\nf) Manter sigilo sobre todas as informações e dados da CONTRATANTE;\ng) Realizar backup diário dos dados armazenados na plataforma;\nh) Configurar a integração inicial com o ERP HubSoft da CONTRATANTE no prazo de até **5 (cinco) dias úteis** após a assinatura deste contrato.\n\n---\n\n## CLÁUSULA 5ª — DAS OBRIGAÇÕES DA CONTRATANTE\n\n5.1. A CONTRATANTE se obriga a:\n\na) Efetuar os pagamentos nas datas e condições estabelecidas;\nb) Fornecer as credenciais de acesso ao ERP HubSoft necessárias para a integração (Client ID, Client Secret, usuário e senha da API);\nc) Designar um responsável técnico para acompanhar a implantação e servir de ponto de contato;\nd) Utilizar a plataforma de acordo com as boas práticas e orientações da CONTRATADA;\ne) Não compartilhar credenciais de acesso com terceiros não autorizados;\nf) Manter atualizados os dados cadastrais e informações de contato.\n\n---\n\n## CLÁUSULA 6ª — DA IMPLANTAÇÃO\n\n6.1. A implantação será realizada em até **10 (dez) dias úteis** após a assinatura do contrato, compreendendo:\n\na) Configuração do tenant (ambiente isolado) da CONTRATANTE na plataforma;\nb) Integração com o ERP HubSoft;\nc) Cadastro de planos de internet e opções de vencimento;\nd) Configuração dos fluxos de atendimento;\ne) Criação dos usuários iniciais;\nf) Treinamento da equipe (até 2 horas, por videoconferência).\n\n6.2. Eventuais customizações ou integrações adicionais não previstas neste contrato serão objeto de proposta comercial separada.\n\n---\n\n## CLÁUSULA 7ª — DA PROTEÇÃO DE DADOS (LGPD)\n\n7.1. As partes se comprometem a cumprir a Lei Geral de Proteção de Dados Pessoais (Lei nº 13.709/2018) no que for aplicável ao presente contrato.\n\n7.2. A CONTRATADA atuará como **operadora** de dados pessoais, tratando os dados exclusivamente conforme as instruções da CONTRATANTE (controladora).\n\n7.3. A CONTRATADA adotará medidas técnicas e administrativas aptas a proteger os dados pessoais de acessos não autorizados e de situações acidentais ou ilícitas, incluindo:\n\na) Criptografia de dados sensíveis em repouso e em trânsito;\nb) Controle de acesso baseado em perfis e tenant isolation;\nc) Logs de auditoria e filtros de dados pessoais (PII);\nd) Backups criptografados com retenção mínima de 30 dias.\n\n7.4. Em caso de incidente de segurança envolvendo dados pessoais, a CONTRATADA comunicará a CONTRATANTE no prazo de **48 (quarenta e oito) horas** após a ciência do incidente.\n\n7.5. Ao término do contrato, a CONTRATADA excluirá os dados pessoais tratados em nome da CONTRATANTE no prazo de **30 (trinta) dias**, salvo obrigação legal de retenção.\n\n---\n\n## CLÁUSULA 8ª — DA PROPRIEDADE INTELECTUAL\n\n8.1. A plataforma AuroraISP, incluindo seu código fonte, algoritmos, interfaces, documentação e marcas, é de propriedade exclusiva da CONTRATADA.\n\n8.2. O presente contrato não transfere à CONTRATANTE qualquer direito de propriedade intelectual sobre a plataforma, conferindo apenas o direito de uso conforme as condições aqui estipuladas.\n\n8.3. Os dados inseridos pela CONTRATANTE na plataforma são de propriedade exclusiva da CONTRATANTE.\n\n---\n\n## CLÁUSULA 9ª — DA RESCISÃO\n\n9.1. O presente contrato poderá ser rescindido:\n\na) Por mútuo acordo entre as partes, formalizado por escrito;\nb) Por inadimplemento de qualquer das partes, caso não sanado no prazo de **15 (quinze) dias** após notificação por escrito;\nc) Por qualquer das partes, sem justa causa, mediante aviso prévio de **30 (trinta) dias** e pagamento de multa rescisória.\n\n9.2. Em caso de rescisão antecipada sem justa causa pela CONTRATANTE, será devida multa equivalente a **20% (vinte por cento)** do valor remanescente do contrato.\n\n9.3. Em caso de rescisão por inadimplemento da CONTRATADA, nenhuma multa será devida pela CONTRATANTE, sendo reembolsados eventuais valores pagos antecipadamente.\n\n9.4. Após a rescisão, a CONTRATADA disponibilizará os dados da CONTRATANTE para exportação pelo prazo de **15 (quinze) dias**, após o qual os dados serão excluídos conforme Cláusula 7.5.\n\n---\n\n## CLÁUSULA 10ª — DA CONFIDENCIALIDADE\n\n10.1. As partes se obrigam a manter sigilo sobre todas as informações confidenciais a que tiverem acesso em razão deste contrato, durante a vigência e por **2 (dois) anos** após seu término.\n\n10.2. São consideradas informações confidenciais: dados de clientes, leads, estratégias comerciais, dados financeiros, credenciais de acesso, e quaisquer informações técnicas ou comerciais não públicas.\n\n---\n\n## CLÁUSULA 11ª — DA LIMITAÇÃO DE RESPONSABILIDADE\n\n11.1. A responsabilidade total da CONTRATADA sob este contrato, por qualquer causa, estará limitada ao valor total pago pela CONTRATANTE nos **12 (doze) meses** anteriores ao evento que deu causa à responsabilidade.\n\n11.2. A CONTRATADA não será responsável por danos indiretos, incidentais, consequenciais ou lucros cessantes.\n\n11.3. A CONTRATADA não se responsabiliza por indisponibilidades decorrentes de: (a) caso fortuito ou força maior; (b) falhas de conectividade da CONTRATANTE; (c) uso indevido da plataforma; (d) indisponibilidade de serviços de terceiros (incluindo o ERP HubSoft).\n\n---\n\n## CLÁUSULA 12ª — DO SUPORTE TÉCNICO\n\n12.1. A CONTRATADA fornecerá suporte técnico nos seguintes termos:\n\n| Item | Condição |\n|------|----------|\n| **Canal** | WhatsApp, e-mail e plataforma de tickets |\n| **Horário** | Segunda a sexta, 8h às 18h |\n| **Primeira resposta** | Até 4 horas úteis |\n| **Resolução** | Até 24 horas úteis (prioridade normal) |\n| **Resolução crítica** | Até 4 horas úteis (sistema indisponível) |\n\n12.2. Solicitações fora do horário comercial serão atendidas no próximo dia útil, exceto em caso de indisponibilidade total do sistema.\n\n---\n\n## CLÁUSULA 13ª — DO FORO\n\n13.1. Fica eleito o foro da Comarca de **Teresina/PI** para dirimir quaisquer dúvidas ou controvérsias oriundas do presente contrato, com renúncia expressa de qualquer outro, por mais privilegiado que seja.\n\n---\n\nE por estarem assim justas e contratadas, as partes firmam o presente instrumento em 2 (duas) vias de igual teor e forma, na presença de 2 (duas) testemunhas.\n\n&nbsp;\n\nTeresina/PI, 01 de abril de 2026.\n\n&nbsp;\n\n---\n\n**CONTRATANTE**\n\nGRUPO MAGISTER DE ENSINO SUPERIOR LTDA\nCNPJ: 01.993.025/0001-04\n\n&nbsp;\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n**Gislan Vieira de Sousa**\nSócio\n\n&nbsp;\n\n---\n\n**CONTRATADA**\n\nPSBR CONSULTORIA EMPRESARIAL LTDA\nCNPJ: 41.312.673/0001-64\n\n&nbsp;\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n**Paulo Sérgio Barbosa Rodrigues**\nSócio\n\n&nbsp;\n\n---\n\n**TESTEMUNHAS:**\n\n&nbsp;\n\n1. \\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n   Nome:\n   CPF:\n\n&nbsp;\n\n2. \\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n   Nome:\n   CPF:\n"}]}, {"t": "f", "n": "Implementacao Aurora 05 04 2026", "fn": "implementacao_aurora_05-04-2026.md", "c": "# Implementação Aurora — Primeiro Cliente\n\n**Data início:** 05/04/2026\n**Última atualização:** 06/04/2026\n**Status:** 🔧 Em andamento\n**Cliente:** AuroraISP (nós mesmos)\n**WhatsApp:** Uazapi (consulteplus.uazapi.com)\n**ERP:** Nenhum (por enquanto)\n\n---\n\n## Objetivo\n\nUsar a própria plataforma Aurora para gerenciar leads, atendimento e vendas da AuroraISP. O primeiro cliente do produto é o próprio produto.\n\n---\n\n## Stack de integração\n\n```\nCliente (WhatsApp)\n    │\n    ▼\nUazapi (consulteplus.uazapi.com)\n    │\n    ├── Webhook → Aurora /inbox/api/webhook/uazapi/{canal_id}/\n    │              (Provider Pattern, escalável)\n    │\n    └── API ← Aurora envia mensagens\n              POST /send/text  {number, text}\n              POST /send/media {number, type, file}\n              POST /send/menu  {number, type, choices}\n```\n\n**Sem ERP:** Leads e oportunidades ficam apenas no Aurora.\n**Sem N8N:** Integração direta Aurora ↔ Uazapi via Provider Pattern.\n\n---\n\n## Fase 1 — Tenant Aurora ✅ Concluída\n\n### 1.1 Tenant criado\n\nTenant \"Aurora HQ\" (slug: `aurora-hq`, ID: 3) com plano full_pro.\n\n### 1.2 Seeds executados\n\n```bash\npython manage.py seed_planos          # 9 planos, 115 features\npython manage.py seed_funcionalidades # 35 funcionalidades\npython manage.py seed_perfis          # 11 perfis padrão por tenant\n```\n\n### 1.3 Configurações ✅\n\n- [x] ConfiguracaoEmpresa (logo Aurora, cores da marca)\n- [x] Perfis de permissão (11 perfis padrão criados)\n- [ ] Pipeline personalizado para venda de SaaS\n- [ ] ConfiguracaoCRM (pipeline padrão, estágios)\n\n### 1.4 Pipeline sugerido para venda SaaS\n\n| Ordem | Nome | Tipo | Probabilidade |\n|-------|------|------|---------------|\n| 1 | Lead Inbound | novo | 10% |\n| 2 | Primeiro Contato | qualificacao | 20% |\n| 3 | Demo Agendada | qualificacao | 40% |\n| 4 | Demo Realizada | negociacao | 60% |\n| 5 | Proposta Enviada | negociacao | 75% |\n| 6 | Negociação | fechamento | 85% |\n| 7 | Fechado Ganho | cliente | 100% |\n| 8 | Perdido | perdido | 0% |\n\n---\n\n## Fase 2 — Integração Uazapi ✅ Concluída\n\n### 2.1 Dados da instância\n\n| Item | Valor | Status |\n|------|-------|--------|\n| URL base da API | `https://consulteplus.uazapi.com` | ✅ Configurado |\n| Token da instância | `9ef0cf61-87b3-444a-8769-07b0b74563e5` | ✅ Em configuracoes_extras |\n| Número WhatsApp | `553181167572` | ✅ Conectado |\n| Nome da instância | `AuroraISP` | ✅ |\n| IntegracaoAPI ID | `1` (tipo=uazapi, tenant=Aurora HQ) | ✅ |\n| CanalInbox ID | `6` (tipo=whatsapp, provedor=uazapi) | ✅ |\n| Webhook URL | `/inbox/api/webhook/uazapi/6/` | ✅ Configurado no Uazapi |\n\n### 2.2 Arquitetura implementada (Provider Pattern)\n\n```\napps/inbox/providers/\n    __init__.py          # Registry + get_provider(canal) factory\n    base.py              # BaseProvider ABC\n    uazapi.py            # UazapiProvider (wraps UazapiService)\n    webhook.py           # GenericWebhookProvider (fallback N8N)\n```\n\nPara adicionar novo provider (ex: Evolution API): criar `evolution.py` com `@register_provider`. Zero mudanças em services.py ou views.py.\n\n### 2.3 Endpoints implementados no UazapiService\n\n**Headers:** `Content-Type: application/json`, `Accept: application/json`, `token: TOKEN`\n\n#### Enviar mensagens (Aurora → Uazapi)\n\n| Método | Endpoint | Body | Status |\n|--------|----------|------|--------|\n| `enviar_texto` | POST `/send/text` | `{number, text}` | ✅ Testado |\n| `enviar_midia` | POST `/send/media` | `{number, type, file, caption?, docName?}` | ✅ Implementado |\n| `enviar_imagem` | via `/send/media` type=image | | ✅ |\n| `enviar_documento` | via `/send/media` type=document | | ✅ |\n| `enviar_audio` | via `/send/media` type=audio | | ✅ |\n| `enviar_video` | via `/send/media` type=video | | ✅ |\n| `enviar_sticker` | via `/send/media` type=sticker | | ✅ |\n| `enviar_voz` | via `/send/media` type=ptt | | ✅ |\n| `enviar_menu` | POST `/send/menu` | `{number, type, text, choices, ...}` | ✅ Implementado |\n| `enviar_botoes` | via `/send/menu` type=button | | ✅ |\n| `enviar_lista` | via `/send/menu` type=list | | ✅ |\n| `enviar_enquete` | via `/send/menu` type=poll | | ✅ |\n| `enviar_carrossel` | via `/send/menu` type=carousel | | ✅ |\n| `enviar_vcard` | POST `/send/contact` | `{number, contactName, contactPhone}` | ✅ |\n| `enviar_localizacao` | POST `/send/location` | `{number, lat, lng, name, address}` | ✅ |\n| `enviar_presenca` | POST `/send/presence` | `{number, type}` | ✅ |\n| `enviar_botao_pix` | POST `/send/pix` | `{number, key, amount, description}` | ✅ |\n| `solicitar_localizacao` | POST `/send/requestLocation` | `{number, text}` | ✅ |\n| `solicitar_pagamento` | POST `/send/requestPayment` | `{number, amount, description}` | ✅ |\n| `enviar_story_texto` | POST `/send/stories` | `{type:text, text, backgroundColor}` | ✅ |\n| `enviar_story_midia` | POST `/send/stories` | `{type, file, caption}` | ✅ |\n\n#### Consultas\n\n| Método | Endpoint | Status |\n|--------|----------|--------|\n| `status_instancia` | GET `/instance/status` | ✅ Testado |\n| `verificar_numero` | POST `/misc/checkNumber` | ✅ |\n| `marcar_como_lido` | POST `/chat/markAsRead` | ✅ |\n\n#### Receber mensagens (Uazapi → Aurora via Webhook)\n\nFormato real do payload Uazapi:\n\n```json\n{\n    \"BaseUrl\": \"https://consulteplus.uazapi.com\",\n    \"EventType\": \"messages\",\n    \"chat\": {\n        \"phone\": \"+55 53 8152-1653\",\n        \"wa_chatid\": \"555381521653@s.whatsapp.net\",\n        \"wa_contactName\": \"Nome do Contato\",\n        \"name\": \"Nome\"\n    },\n    \"message\": {\n        \"text\": \"oi\",\n        \"messageType\": \"Conversation\",\n        \"fromMe\": false,\n        \"messageid\": \"3EB016C93EBA029158EF14\",\n        \"senderName\": \"Nome do Contato\",\n        \"chatid\": \"555381521653@s.whatsapp.net\"\n    },\n    \"token\": \"9ef0cf61-87b3-444a-8769-07b0b74563e5\"\n}\n```\n\n**UazapiProvider.parse_webhook** suporta dois formatos:\n1. Formato Uazapi real (`EventType`, `message.text`, `chat.phone`)\n2. Formato Baileys/legacy (`event`, `data.key.remoteJid`, `data.message.conversation`)\n\n### 2.4 Testes realizados\n\n| Teste | Resultado |\n|-------|-----------|\n| Testar conexão (botão na página de integrações) | ✅ Uazapi conectado |\n| Receber mensagem via webhook (WhatsApp → Inbox) | ✅ Mensagem aparece no Inbox |\n| Enviar mensagem texto (Inbox → WhatsApp) | ✅ Mensagem chega no WhatsApp |\n| Resolver conversa (não aparece mais no inbox) | ✅ |\n\n### 2.5 Problemas encontrados e resolvidos\n\n| Problema | Causa | Solução |\n|----------|-------|---------|\n| 404 no webhook | Uazapi envia sem barra final, APPEND_SLASH=False | Adicionada rota sem barra |\n| 400 Bad Request | Payload Uazapi diferente do esperado (não é Baileys) | Implementado `_parse_uazapi_format` |\n| 401 Invalid token no envio | Campo `access_token` criptografado com chave diferente | Token salvo em `configuracoes_extras` |\n| 400 Missing required fields | Uazapi usa `number`/`text` em vez de `phone`/`message` | Corrigido no UazapiService |\n| DisallowedHost | Domínio ngrok não no ALLOWED_HOSTS | `ALLOWED_HOSTS = ['*']` no settings_local |\n\n---\n\n## Fase 3 — Configuração do Inbox 🔧 Em andamento\n\n- [x] Canal WhatsApp Aurora criado (ID 6, provedor=uazapi)\n- [x] Accordion colapsável no painel de contexto\n- [x] Conversas anteriores do contato\n- [x] Emoji picker inline\n- [x] Botão anexar arquivo\n- [x] Equipe, prioridade e etiquetas funcionando\n- [x] Conversas resolvidas não aparecem por padrão\n- [x] Menu sidebar reorganizado (Suporte unificado)\n- [ ] Criar equipe \"Vendas Aurora\"\n- [ ] Criar fila \"WhatsApp\" vinculada à equipe\n- [ ] Configurar horário de atendimento\n- [ ] Criar respostas rápidas (saudação, preço, agendar demo)\n- [ ] Configurar mensagem fora do horário\n\n---\n\n## Fase 4 — CRM e Pipeline (pendente)\n\n- [ ] Pipeline \"Vendas SaaS\" com 8 estágios\n- [ ] Tags: Provedor Pequeno, Provedor Médio, Provedor Grande, HubSoft, MK, IXC\n- [ ] Criar equipe de vendas\n- [ ] Configurar auto-criação de oportunidade (score >= 7)\n\n---\n\n## Fase 5 — Automações básicas (pendente)\n\n- [ ] Lead criado → Notificação no sistema\n- [ ] Lead sem contato 2 dias → Alerta\n- [ ] Oportunidade movida para \"Demo Agendada\" → Notificação\n- [ ] Oportunidade em \"Proposta Enviada\" há 5 dias → Follow-up\n\n---\n\n## Fase 6 — Marketing (pendente)\n\n- [ ] Campanha \"Orgânico LinkedIn\"\n- [ ] Campanha \"Orgânico WhatsApp\"\n- [ ] Campanha \"Indicação\"\n- [ ] Segmento \"Leads com HubSoft\" (para direcionar pitch)\n\n---\n\n## Checklist de implementação\n\n```\nINFRA\n  [x] Tenant Aurora criado (Aurora HQ, ID 3)\n  [x] Seeds rodados (planos, funcionalidades, perfis)\n  [ ] Usuários criados com perfis de permissão\n  [ ] Deploy em servidor\n\nUAZAPI\n  [x] UazapiService criado (20+ endpoints)\n  [x] IntegracaoAPI criada (ID 1, tipo=uazapi)\n  [x] Provider Pattern implementado (escalável multi-provider)\n  [x] Webhook receiver criado e testado\n  [x] Canal WhatsApp criado (ID 6, provedor=uazapi)\n  [x] Testar envio de mensagem ✅\n  [x] Testar recebimento de mensagem via webhook ✅\n\nINBOX\n  [x] Mensagens chegam e são respondidas via WhatsApp\n  [x] Accordion, emoji, anexos, conversas anteriores\n  [x] Equipe/prioridade/etiquetas salvam\n  [ ] Equipe e fila configuradas\n  [ ] Respostas rápidas criadas\n  [ ] Horário de atendimento configurado\n\nCRM\n  [ ] Pipeline SaaS criado\n  [ ] Tags criadas\n  [ ] Equipe de vendas configurada\n\nAUTOMAÇÕES\n  [ ] Regras básicas criadas no editor visual\n\nMARKETING\n  [ ] Campanhas cadastradas\n  [ ] Segmentos configurados\n```\n\n---\n\n## Decisões tomadas\n\n| Decisão | Resultado |\n|---------|-----------|\n| Usar N8N como middleware? | **Não.** Integração direta via Provider Pattern. |\n| Formato de autenticação Uazapi | Header `token: TOKEN` |\n| Formato de payload envio | `{number, text}` para texto, `{number, type, file}` para mídia |\n| Escalabilidade multi-provider | Provider Pattern implementado. Novo provider = 1 arquivo. |\n\n## Decisões pendentes\n\n| Decisão | Opções | Status |\n|---------|--------|--------|\n| Bot de atendimento automático? | Sim (fluxo de qualificação) vs Não (só inbox manual) | Decidir |\n| Domínio do painel | app.auroraisp.com.br ou outro | Decidir |\n| Deploy | VPS, Docker, ou cloud | Decidir |\n"}, {"t": "f", "n": "Implementacao Cliente", "fn": "implementacao_cliente.md", "c": "# Guia de Implementação — Novo Cliente AuroraISP\n\n**Última atualização:** 04/04/2026\n**Responsável:** Operações / Tech Lead\n\n---\n\n## Resumo\n\nEste documento mapeia tudo que precisa ser configurado para ativar um novo provedor na plataforma AuroraISP. O processo é dividido em 9 fases, da criação do tenant ao go-live.\n\n**Tempo estimado:** 2 a 4 horas (dependendo da complexidade da integração HubSoft).\n\n---\n\n## Pré-requisitos\n\nAntes de iniciar, coletar com o provedor:\n\n| Item | Descrição | Obrigatório |\n|------|-----------|-------------|\n| Nome da empresa | Razão social ou nome fantasia | Sim |\n| CNPJ | Formatado (XX.XXX.XXX/XXXX-XX) | Sim |\n| Slug | Identificador URL-friendly (ex: megalink, provnet) | Sim |\n| Plano contratado | Módulos + tier (ex: Comercial Pro + CS Start) | Sim |\n| ERP do provedor | Qual ERP usa + credenciais de API | Sim |\n| Plataforma de atendimento | Qual plataforma WhatsApp usa + credenciais | Sim |\n| Logo | Imagem PNG/SVG (mínimo 200x200px) | Sim |\n| Cores da marca | Primária e secundária (hex) | Sim |\n| Planos de internet | Nome, velocidade, preço de cada plano | Sim |\n| Dias de vencimento | Quais dias o provedor oferece (ex: 5, 10, 15, 20) | Sim |\n| Admin do provedor | Nome, e-mail, telefone, senha desejada | Sim |\n| Equipe de vendas | Nomes e e-mails dos vendedores (se CRM) | Se plano Pro |\n| Contrato/Termos | Texto do contrato de adesão (se usar cadastro público) | Opcional |\n| WhatsApp suporte | Número do WhatsApp de atendimento | Opcional |\n\n---\n\n## Fase 1 — Criar Tenant\n\n### Via comando (recomendado)\n\n```bash\ncd robo/dashboard_comercial/gerenciador_vendas\n\npython manage.py criar_tenant \\\n  --nome \"Nome do Provedor\" \\\n  --slug \"slug-provedor\" \\\n  --cnpj \"12.345.678/0001-90\" \\\n  --plano comercial_pro \\\n  --admin-user admin_provedor \\\n  --admin-email admin@provedor.com \\\n  --admin-senha SenhaSegura123 \\\n  --admin-telefone \"85988881234\" \\\n  --trial \\\n  --settings=gerenciador_vendas.settings_local\n```\n\n**Opções de plano:**\n\n| Flag | Módulos | Tier |\n|------|---------|------|\n| `comercial_starter` | Comercial | Starter |\n| `comercial_start` | Comercial | Start |\n| `comercial_pro` | Comercial | Pro |\n| `full_start` | Comercial + Marketing + CS | Start |\n| `full_pro` | Comercial + Marketing + CS | Pro |\n\n**O que o comando cria automaticamente:**\n- Registro do Tenant\n- Usuário admin (Django User)\n- PerfilUsuario vinculando usuário ao tenant\n- ConfiguracaoEmpresa (config visual básica)\n\n### Via Admin Aurora\n\nURL: `/aurora-admin/tenants/criar/`\nAcesso: superuser only. Formulário web com validação de slug e username.\n\n### Campos do Tenant\n\n| Campo | Tipo | Default | Descrição |\n|-------|------|---------|-----------|\n| `nome` | CharField(200) | — | Nome do provedor |\n| `cnpj` | CharField(18) | — | CNPJ (unique) |\n| `slug` | SlugField | — | Identificador URL (unique) |\n| `modulo_comercial` | Boolean | True | Habilita módulo Comercial |\n| `modulo_marketing` | Boolean | False | Habilita módulo Marketing |\n| `modulo_cs` | Boolean | False | Habilita módulo CS |\n| `plano_comercial` | CharField | starter | starter, start, pro |\n| `plano_marketing` | CharField | starter | starter, start, pro |\n| `plano_cs` | CharField | starter | starter, start, pro |\n| `hubspot_url` | URLField | — | URL base da API HubSoft |\n| `em_trial` | Boolean | False | Se está em trial |\n| `trial_inicio` / `trial_fim` | DateField | — | Período do trial |\n| `ativo` | Boolean | True | Ativo/inativo |\n\n---\n\n## Fase 2 — Variáveis de Ambiente\n\nConfigurar no `.env` do servidor (ou painel de deploy):\n\n### Obrigatórias\n\n```env\n# Django\nSECRET_KEY=django-insecure-gerar-chave-unica-aqui\nDEBUG=False\nALLOWED_HOSTS=dominio-provedor.com.br,localhost\n\n# Banco de dados\nDB_NAME=robovendas\nDB_USER=admin\nDB_PASSWORD=senha-forte\nDB_HOST=localhost\nDB_PORT=5432\n\n# Segurança\nWEBHOOK_SECRET_TOKEN=token-longo-aleatorio\nSECURE_SSL_REDIRECT=True\nSESSION_COOKIE_SECURE=True\nCSRF_COOKIE_SECURE=True\n\n# Site\nSITE_URL=https://dominio-provedor.com.br\n```\n\n### Integrações\n\n```env\n# HubSoft API (OAuth)\nHUBSOFT_BASE_URL=https://api.hubsoft.com.br/v1\nHUBSOFT_CLIENT_ID=id-do-cliente\nHUBSOFT_CLIENT_SECRET=secret-do-cliente\nHUBSOFT_USERNAME=usuario-api\nHUBSOFT_PASSWORD=senha-api\n\n# HubSoft Database (read-only, para CS)\nHUBSOFT_DB_USER=readonly_user\nHUBSOFT_DB_PASSWORD=senha-db\nHUBSOFT_DB_HOST=ip-do-hubsoft\nHUBSOFT_DB_PORT=9432\nHUBSOFT_DB_NAME=hubsoft\n\n# N8N (automações)\nN8N_WEBHOOK_URL=https://n8n.aurora.consulteplus.com/webhook/notifications\nN8N_API_KEY=chave-api-n8n\n\n# Matrix (WhatsApp)\nMATRIX_API_URL=https://provedor.matrixdobrasil.ai/rest/v1/atendimento\nMATRIX_API_TOKEN=token-matrix\n```\n\n---\n\n## Fase 3 — Dados Iniciais (Seed)\n\n### 3.1 Planos e Features (obrigatório, uma vez por instância)\n\n```bash\npython manage.py seed_planos --settings=gerenciador_vendas.settings_local\n```\n\nCria 9 planos (3 por módulo) com 115 features mapeadas.\n\n### 3.2 Planos de Internet do provedor\n\nCadastrar via Django Admin ou popular_sistema_completo.py:\n\n| Campo | Exemplo |\n|-------|---------|\n| nome | Fibra 400MB |\n| velocidade_download | 400 |\n| velocidade_upload | 200 |\n| valor_mensal | 99.90 |\n| destaque | popular |\n| id_sistema_externo | ID do plano no HubSoft |\n| ordem_exibicao | 2 |\n\n### 3.3 Opções de Vencimento\n\n| Campo | Exemplo |\n|-------|---------|\n| dia | 10 |\n| descricao | 10º dia de cada mês |\n| id_sistema_externo | ID no HubSoft |\n| ativo | True |\n\n### 3.4 Pipeline de Vendas (CRM)\n\nCriar pipeline padrão com estágios:\n\n| Ordem | Nome | Tipo | Probabilidade | Final? |\n|-------|------|------|---------------|--------|\n| 1 | Novo Lead | novo | 10% | — |\n| 2 | Qualificado | qualificacao | 30% | — |\n| 3 | Documentação | negociacao | 60% | — |\n| 4 | Contrato | fechamento | 85% | — |\n| 5 | Ativado HubSoft | cliente | 100% | Ganho |\n| 6 | Perdido | perdido | 0% | Perdido |\n\n### 3.5 CS — Níveis do Clube (se módulo CS ativo)\n\n| Ordem | Nome | XP Necessário |\n|-------|------|---------------|\n| 1 | Iniciante | 0 |\n| 2 | Bronze | 100 |\n| 3 | Prata | 500 |\n| 4 | Ouro | 1.000 |\n| 5 | Diamante | 5.000 |\n\n### 3.6 CS — Regras de Pontuação\n\n| Gatilho | Nome | Saldo | XP | Limite |\n|---------|------|-------|----|----|\n| cadastro | Bônus de Boas Vindas | 20 | 10 | 1× |\n| telefone_verificado | Telefone Verificado | 10 | 5 | 1× |\n| indicacao_convertida | Indicação Convertida | 30 | 15 | Ilimitado |\n\n### 3.7 Seed completo (dev/demonstração)\n\n```bash\npython popular_sistema_completo.py\n```\n\nCria dados de demonstração: 5 planos, 5 vencimentos, campanhas, pipeline + estágios, tags CRM, equipe de vendas, 30 leads, oportunidades, tarefas, membros do clube, tickets de suporte.\n\n---\n\n## Fase 4 — Configurações por Módulo\n\n### 4.1 Comercial — ConfiguracaoCRM\n\nAcessível em: Configurações do CRM (painel) ou Django Admin.\n\n| Campo | O que configurar | Default |\n|-------|------------------|---------|\n| `pipeline_padrao` | Pipeline principal de vendas | **Obrigatório** |\n| `estagio_inicial_padrao` | Estágio onde novos leads entram | **Obrigatório** |\n| `criar_oportunidade_automatico` | Auto-criar oportunidade quando lead qualifica | True |\n| `score_minimo_auto_criacao` | Score mínimo para auto-criação | 7 |\n| `sla_alerta_horas_padrao` | SLA em horas | 48 |\n| `webhook_n8n_nova_oportunidade` | URL do webhook N8N | Opcional |\n| `webhook_n8n_mudanca_estagio` | URL do webhook N8N | Opcional |\n| `webhook_n8n_tarefa_vencida` | URL do webhook N8N | Opcional |\n\n### 4.2 Comercial — ConfiguracaoCadastro\n\nAcessível em: Marketing > Configurações > Cadastro (painel).\n\n| Grupo | O que configurar |\n|-------|------------------|\n| **Visual** | titulo_pagina, subtitulo, logo_url, cores (primary, secondary, success, error), background_type |\n| **Contato** | telefone_suporte, whatsapp_suporte, email_suporte |\n| **Campos** | cpf_obrigatorio, email_obrigatorio, telefone_obrigatorio, endereco_obrigatorio |\n| **Validações** | validar_cep (ViaCEP), validar_cpf |\n| **Documentação** | solicitar_documentacao, textos de instrução, tamanho_max_arquivo_mb, formatos_aceitos |\n| **Contrato** | exibir_contrato, titulo_contrato, texto_contrato, tempo_minimo_leitura_segundos |\n| **IDs externos** | id_origem (HubSoft), id_origem_servico, id_vendedor (RP) |\n| **Fluxo** | criar_lead_automatico, numero_etapas, mostrar_progress_bar |\n\n### 4.3 Marketing — Campanhas\n\nCriar campanhas de tráfego conforme canais usados pelo provedor:\n\n| Campo | Exemplo |\n|-------|---------|\n| nome | Google Ads Institucional |\n| codigo | google-institucional |\n| palavra_chave | google-institucional |\n| tipo_match | parcial |\n| plataforma | google_ads |\n| prioridade | 5 |\n\n### 4.4 CS — RoletaConfig\n\n| Campo | O que configurar | Default |\n|-------|------------------|---------|\n| `nome_clube` | Nome do programa de fidelidade | \"Clube MegaLink\" |\n| `custo_giro` | Pontos para girar a roleta | 10 |\n| `xp_por_giro` | XP ganho por giro | 5 |\n| `limite_giros_por_membro` | Máximo de giros (0 = ilimitado) | 0 |\n| `periodo_limite` | Janela do limite | total |\n\n### 4.5 CS — LandingConfig\n\n| Campo | O que configurar |\n|-------|------------------|\n| `titulo` / `subtitulo` | Textos da landing page pública |\n| `cor_primaria` / `cor_secundaria` | Cores da marca |\n| `logo` | Logo do clube |\n| `whatsapp_numero` | WhatsApp de suporte |\n| `texto_como_funciona` | Seção explicativa (markdown) |\n\n### 4.6 CS — IndicacaoConfig\n\n| Campo | O que configurar |\n|-------|------------------|\n| `titulo` / `subtitulo` | Textos da página de indicação |\n| `texto_indicador` | \"Você foi indicado por\" |\n| `cor_fundo` / `cor_botao` | Cores da marca |\n| `logo` / `imagem_fundo` | Visuais |\n| `mostrar_campo_cpf` / `mostrar_campo_cidade` | Campos opcionais |\n\n---\n\n## Fase 5 — Integração com ERP\n\n> Documentação completa: `docs/PRODUTO/10-INTEGRACOES.md`\n\n### 5.1 Perguntar ao provedor\n\n1. **Qual ERP?** (HubSoft, MK Solutions, IXCSoft, SGP, Controllr, outro)\n2. **Credenciais de API** (URL base, método de auth, client_id/secret ou token)\n3. **IDs de mapeamento** (id_origem do lead, id_vendedor padrão, id_serviço)\n4. **Contato técnico** para resolver credenciais e testes\n\n### 5.2 O que o Aurora precisa consumir do ERP\n\n| Dado | Criticidade | Usado em |\n|------|-------------|----------|\n| Consultar cliente por CPF (nome, telefone, endereço, cidade) | Alta | Clube CS, cadastro de lead |\n| ID do cliente no ERP | Alta | Rastreabilidade |\n| Planos disponíveis (nome, velocidade, preço) | Média | Cadastro público |\n| Status do contrato (ativo, dias restantes) | Média | Alertas de retenção/churn |\n| Situação financeira (inadimplência, recorrência) | Baixa | Pontuação extra no Clube |\n\n### 5.3 O que o Aurora envia para o ERP\n\n| Dado | Criticidade | Quando |\n|------|-------------|--------|\n| Novo prospecto/lead (dados + documentos) | Alta | Lead qualificado |\n| Contrato aceito (IP, timestamp) | Alta | Cadastro público |\n| Status do processamento | Média | Webhook de confirmação |\n\n### 5.4 Configurar credenciais\n\n**Via painel (primeiro login):**\nO admin do provedor é redirecionado para `/setup/` onde preenche as credenciais. Salva em IntegracaoAPI (campos sensíveis criptografados).\n\n**Via comando (HubSoft):**\n```bash\nexport HUBSOFT_BASE_URL=\"https://api.hubsoft.com.br/v1\"\nexport HUBSOFT_CLIENT_ID=\"id\"\nexport HUBSOFT_CLIENT_SECRET=\"secret\"\nexport HUBSOFT_USERNAME=\"user\"\nexport HUBSOFT_PASSWORD=\"pass\"\n\npython manage.py setup_hubsoft --settings=gerenciador_vendas.settings_local\n```\n\n### 5.5 Mapear IDs do ERP\n\n| ID | Onde configurar | Descrição |\n|----|-----------------|-----------|\n| `id_origem` | ConfiguracaoCadastro | De onde vem o lead (ex: \"site\", \"whatsapp\") |\n| `id_origem_servico` | ConfiguracaoCadastro | Qual serviço originou |\n| `id_vendedor` | ConfiguracaoCadastro | Vendedor padrão para leads automáticos |\n| `id_vendedor_hubsoft` | PerfilVendedor (por vendedor) | ID de cada vendedor no ERP |\n\n### 5.6 Validar conexão\n\n- `/aurora-admin/` → card do tenant → status da integração\n- `/aurora-admin/monitoramento/` → logs de integração (últimas 20 chamadas)\n\n---\n\n## Fase 6 — Integração com Atendimento + N8N\n\n> Documentação completa: `docs/PRODUTO/10-INTEGRACOES.md`\n\n### 6.1 Perguntar ao provedor\n\n1. **Qual plataforma de WhatsApp?** (Matrix, Evolution API, Z-API, Twilio, outro)\n2. **Já têm N8N?** (self-hosted ou cloud)\n3. **Webhook de envio** (URL para onde o Aurora manda mensagens)\n4. **Token de autenticação** da plataforma\n\n### 6.2 O que o Aurora envia para a plataforma\n\n| Dado | Quando |\n|------|--------|\n| Mensagens do agente | Resposta no Inbox |\n| Mensagens automáticas (boas-vindas, follow-up) | Automações |\n| OTP de verificação | Cadastro no Clube |\n| Notificações (tarefa vencida, nova oportunidade) | CRM webhooks |\n\n### 6.3 O que a plataforma envia para o Aurora\n\n| Dado | Webhook destino |\n|------|-----------------|\n| Mensagem recebida do cliente | `/inbox/api/n8n/mensagem-recebida/` |\n| Status de entrega/leitura | `/inbox/api/n8n/status-mensagem/` |\n\n### 6.4 Fluxos N8N necessários\n\n| Fluxo | O que faz |\n|-------|-----------|\n| **Bot de atendimento** | Mensagem → consulta fluxo na API Aurora → responde ao cliente |\n| **Detecção de campanha** | Mensagem → API `/marketing/api/campanhas/detectar/` → atribui lead |\n| **Envio de OTP** | Recebe CPF + código → envia via WhatsApp |\n| **Consulta cliente ERP** | Recebe CPF → consulta no ERP → retorna dados |\n| **Notificações CRM** | Nova oportunidade, mudança de estágio, tarefa vencida |\n\n### 6.5 Configurar webhooks no CRM\n\nEm Configurações do CRM, preencher:\n- `webhook_n8n_nova_oportunidade`\n- `webhook_n8n_mudanca_estagio`\n- `webhook_n8n_tarefa_vencida`\n\n### 6.6 Configurar canal no Inbox\n\nEm Inbox > Configurações > Canais, preencher o webhook de envio (URL da plataforma de atendimento).\n\n### 6.7 Gerar token de API\n\n```bash\npython manage.py drf_create_token admin_provedor --settings=gerenciador_vendas.settings_local\n```\n\nO token é usado pelo N8N e pela plataforma no header: `Authorization: Token <token>`\n\n---\n\n## Fase 7 — Usuários e Equipe\n\n### 7.1 Criar usuários adicionais\n\nPara cada pessoa do provedor que vai usar o sistema:\n\n```python\n# Via Django shell ou script\nfrom django.contrib.auth.models import User\nfrom apps.sistema.models import PerfilUsuario, Tenant\n\ntenant = Tenant.objects.get(slug='slug-provedor')\n\nuser = User.objects.create_user(\n    username='vendedor1',\n    email='vendedor1@provedor.com',\n    password='SenhaSegura123',\n    first_name='João',\n    last_name='Silva'\n)\nPerfilUsuario.objects.create(user=user, tenant=tenant, telefone='85988881234')\n```\n\n### 7.2 Configurar equipe de vendas (CRM Pro)\n\n1. Criar EquipeVendas (nome, líder, cor)\n2. Criar PerfilVendedor para cada vendedor:\n\n| Campo | Descrição |\n|-------|-----------|\n| `user` | OneToOne com User |\n| `equipe` | FK EquipeVendas |\n| `cargo` | vendedor, supervisor, gerente |\n| `id_vendedor_hubsoft` | ID no HubSoft |\n\n### 7.3 Permissões\n\n| Tipo | Acesso |\n|------|--------|\n| **Superuser** | Tudo + Admin Aurora |\n| **Staff** | Django Admin + painel do tenant |\n| **Usuário normal** | Apenas painel do tenant |\n| **Vendedor (não superuser)** | Vê apenas suas oportunidades + não atribuídas |\n\n---\n\n## Fase 8 — Branding e Visual\n\n### 8.1 ConfiguracaoEmpresa\n\n| Campo | Descrição |\n|-------|-----------|\n| `nome_empresa` | Nome exibido no painel |\n| `logo_empresa` | Logo (upload) |\n| `cor_primaria` | Cor principal (hex) |\n| `cor_secundaria` | Cor secundária (hex) |\n\n### 8.2 Personalizar páginas públicas\n\n| Página | Onde configurar |\n|--------|----------------|\n| Cadastro de cliente | ConfiguracaoCadastro (cores, logo, textos, contrato) |\n| Landing do clube | LandingConfig (cores, logo, textos, banners) |\n| Página de indicação | IndicacaoConfig (cores, logo, fundo, textos) |\n| Carteirinha digital | ModeloCarteirinha (cores, fundo, logo, campos visíveis) |\n\n---\n\n## Fase 9 — Validação e Go-live\n\n### Checklist de validação\n\n#### Infraestrutura\n- [ ] Servidor configurado (Gunicorn + Nginx)\n- [ ] SSL/HTTPS ativo\n- [ ] Variáveis de ambiente configuradas\n- [ ] Banco de dados PostgreSQL criado\n- [ ] Migrations aplicadas\n- [ ] Collectstatic executado\n- [ ] Backups automáticos configurados\n\n#### Funcionalidades\n- [ ] Login do admin funciona\n- [ ] Dashboard carrega com dados\n- [ ] Página de cadastro pública renderiza corretamente\n- [ ] Validação de CEP funciona (ViaCEP)\n- [ ] Leads podem ser criados (manual e via API)\n- [ ] CRM pipeline mostra estágios corretos\n- [ ] Drag-and-drop do Kanban funciona\n- [ ] Tarefas CRM podem ser criadas e concluídas\n\n#### Integrações\n- [ ] HubSoft API responde (token OAuth válido)\n- [ ] Sync de clientes HubSoft funciona\n- [ ] N8N webhooks disparam corretamente\n- [ ] Bot WhatsApp (Matrix) responde\n- [ ] Detecção de campanha por palavra-chave funciona\n- [ ] OTP do clube envia via WhatsApp\n\n#### Multi-tenancy\n- [ ] Dados isolados (admin só vê dados do próprio tenant)\n- [ ] Uploads isolados por tenant\n- [ ] Filtros automáticos funcionando em todas as views\n\n#### CS (se ativo)\n- [ ] Landing do clube renderiza\n- [ ] Cadastro de membro funciona\n- [ ] OTP valida corretamente\n- [ ] Roleta gira e prêmios são entregues\n- [ ] Cupons podem ser resgatados\n- [ ] Indicações podem ser criadas\n- [ ] Carteirinha digital renderiza\n\n---\n\n## Checklist Resumido (uma página)\n\n```\nFASE 1 — TENANT\n  [ ] Tenant criado (criar_tenant ou Admin Aurora)\n  [ ] Admin user criado\n  [ ] Planos e features seedados (seed_planos)\n\nFASE 2 — AMBIENTE\n  [ ] .env configurado (DB, secrets, integrações)\n  [ ] Migrations aplicadas\n  [ ] Collectstatic executado\n\nFASE 3 — DADOS INICIAIS\n  [ ] Planos de internet cadastrados\n  [ ] Opções de vencimento cadastradas\n  [ ] Pipeline + estágios criados\n  [ ] Níveis do clube criados (se CS)\n  [ ] Regras de pontuação criadas (se CS)\n\nFASE 4 — CONFIGURAÇÃO\n  [ ] ConfiguracaoCRM (pipeline_padrao, estagio_inicial)\n  [ ] ConfiguracaoCadastro (visual, campos, contrato)\n  [ ] RoletaConfig + LandingConfig (se CS)\n  [ ] IndicacaoConfig (se CS)\n\nFASE 5 — ERP\n  [ ] ERP identificado (HubSoft, MK, IXC, SGP, etc.)\n  [ ] Credenciais de API obtidas\n  [ ] Conexão validada (consulta cliente por CPF)\n  [ ] IDs mapeados (id_origem, id_vendedor, id_servico)\n\nFASE 6 — ATENDIMENTO + N8N\n  [ ] Plataforma identificada (Matrix, Evolution, Z-API, etc.)\n  [ ] Webhook de envio configurado\n  [ ] Canal configurado no Inbox\n  [ ] Fluxos N8N criados/duplicados\n  [ ] Webhooks CRM configurados\n  [ ] Token de API gerado\n\nFASE 7 — USUÁRIOS\n  [ ] Usuários criados com PerfilUsuario\n  [ ] Equipe de vendas configurada (se CRM Pro)\n  [ ] Permissões validadas\n\nFASE 8 — VISUAL\n  [ ] Logo e cores configurados\n  [ ] Páginas públicas personalizadas\n  [ ] Contrato/termos preenchidos\n\nFASE 9 — GO-LIVE\n  [ ] SSL ativo\n  [ ] Funcionalidades validadas\n  [ ] Integrações testadas\n  [ ] Multi-tenancy verificado\n  [ ] Backups configurados\n```\n"}]}, {"t": "d", "n": "PRODUTO", "ch": [{"t": "f", "n": "00 Status Produto", "fn": "00-STATUS_PRODUTO.md", "c": "# Status do Produto — AuroraISP\n\n**Última atualização:** 01/04/2026\n\nEste documento é a fonte da verdade sobre o que está pronto, em desenvolvimento e planejado em cada módulo da AuroraISP. Atualizar sempre que uma funcionalidade mudar de status.\n\n---\n\n## Legenda\n\n| Status | Significado |\n|--------|-------------|\n| ✅ Pronto | Funciona, tem UI, testável pelo cliente |\n| 🔧 Parcial | Backend existe mas UI incompleta, ou funciona com limitações |\n| 🚧 Em desenvolvimento | Trabalho iniciado, não utilizável ainda |\n| 📋 Planejado | Definido, não iniciado |\n| ❌ Desativado | Código existe mas está desligado |\n\n---\n\n## Visão Geral por Módulo\n\n| Módulo | Plano | Status Geral | Pronto | Parcial | Planejado |\n|--------|-------|-------------|--------|---------|-----------|\n| **Comercial** | Start / Pro | 🟢 Produção | 18 | 1 | 1 |\n| **Marketing** | Start / Pro | 🟡 Inicial | 3 | 2 | 4 |\n| **CS** | Start / Pro | 🟡 Em desenvolvimento | 12 | 3 | 4 |\n| **Suporte** | Interno | 🟡 Inicial | 4 | 0 | 2 |\n| **Sistema** | Base | 🟢 Produção | 10 | 2 | 1 |\n\n---\n\n## MÓDULO COMERCIAL\n\n### Leads (apps/comercial/leads/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Captura de leads via WhatsApp/N8N | ✅ Pronto | Integração ativa com N8N |\n| Score de qualificação automático | ✅ Pronto | 0 a 10 |\n| Listagem com filtros, busca, paginação | ✅ Pronto | |\n| Upload e validação de documentos | ✅ Pronto | Fotos de RG, comprovante |\n| Histórico de interações por lead | ✅ Pronto | |\n| Visualização de conversa HTML/PDF | ✅ Pronto | |\n\n### Atendimento (apps/comercial/atendimento/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Fluxos conversacionais configuráveis | ✅ Pronto | 20 tipos de questão |\n| Sessão de atendimento com estado | ✅ Pronto | |\n| APIs para N8N (15+ endpoints) | ✅ Pronto | |\n| Roteamento condicional inteligente | ✅ Pronto | |\n\n### Cadastro (apps/comercial/cadastro/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Formulário de cadastro de cliente | ✅ Pronto | |\n| Catálogo de planos de internet | ✅ Pronto | |\n| Opções de vencimento | ✅ Pronto | |\n| Geração de PDF do contrato | ✅ Pronto | WeasyPrint |\n| Envio de docs e aceite no HubSoft | ✅ Pronto | Automático via signal |\n\n### CRM (apps/comercial/crm/) — Plano Pro\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Pipeline Kanban com drag and drop | ✅ Pronto | Multi-pipeline por tenant |\n| Estágios configuráveis por pipeline | ✅ Pronto | |\n| Oportunidades com valor, probabilidade, tags | ✅ Pronto | |\n| Tarefas com vencimento e prioridade | ✅ Pronto | |\n| Notas internas | ✅ Pronto | |\n| Equipes de vendas | ✅ Pronto | Página dedicada |\n| Metas individuais e por equipe | ✅ Pronto | |\n| Dashboard de desempenho | ✅ Pronto | |\n| Auto-criação de oportunidade por score | ✅ Pronto | Signal automático |\n| Webhooks N8N por evento CRM | 🔧 Parcial | Configurado mas não testado em produção |\n\n### Viabilidade (apps/comercial/viabilidade/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Consulta de cobertura por CEP | ✅ Pronto | ViaCEP |\n\n---\n\n## MÓDULO MARKETING\n\n### Campanhas (apps/marketing/campanhas/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Cadastro de campanhas de tráfego | ✅ Pronto | |\n| Detecção automática de origem por keyword | ✅ Pronto | |\n| Métricas por campanha | ✅ Pronto | |\n\n### Segmentação (apps/comercial/crm/ — usado pelo Marketing)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Segmentação de leads | 🔧 Parcial | Model existe, UI básica |\n\n### Automações (apps/marketing/automacoes/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Lista de automações com toggle | 🚧 Em desenvolvimento | Frontend pronto, backend pendente |\n| Builder visual (Quando/Se/Então) | 🚧 Em desenvolvimento | Frontend pronto, backend pendente |\n| Engine de execução de regras | 📋 Planejado | |\n| Histórico de execuções | 📋 Planejado | |\n\n### Funcionalidades planejadas\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Landing pages configuráveis | 📋 Planejado | Placeholder no menu |\n| Réguas de automação (email, WhatsApp) | 📋 Planejado | Depende do módulo Automações |\n\n---\n\n## MÓDULO CUSTOMER SUCCESS\n\n### Clube de Benefícios (apps/cs/clube/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Dashboard com KPIs e gráficos | ✅ Pronto | Cadastros, validações, giros |\n| Gestão de membros (clientes) | ✅ Pronto | |\n| Roleta de prêmios | ✅ Pronto | |\n| Níveis e XP (gamificação) | ✅ Pronto | Bronze, Prata, Ouro, Diamante |\n| Regras de pontuação configuráveis | ✅ Pronto | |\n| Banners configuráveis | ✅ Pronto | |\n| Extrato de pontuação | ✅ Pronto | |\n| Relatórios do clube | ✅ Pronto | |\n\n### Parceiros (apps/cs/parceiros/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Dashboard de parceiros | ✅ Pronto | |\n| Gestão de parceiros e categorias | ✅ Pronto | |\n| Cupons de desconto | ✅ Pronto | |\n| Resgates de cupom | 🔧 Parcial | Model existe, sem dados populados |\n| Painel do parceiro (portal externo) | 🔧 Parcial | Templates existem, fluxo não testado |\n\n### Indicações (apps/cs/indicacoes/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Dashboard de indicações | ✅ Pronto | |\n| Registro e acompanhamento | ✅ Pronto | |\n\n### Carteirinhas (apps/cs/carteirinha/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Modelos de carteirinha | 🔧 Parcial | Model existe, UI básica |\n\n### Funcionalidades planejadas\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Retenção / Alertas de churn | 📋 Planejado | Models ScoreCliente, AlertaChurn criados |\n| NPS (pesquisa de satisfação) | 📋 Planejado | Models ConfiguracaoNPS, PesquisaNPS criados |\n| Upsell automático | 📋 Planejado | |\n| Onboarding guiado de novos clientes | 📋 Planejado | |\n\n---\n\n## MÓDULO SUPORTE (interno Aurora)\n\n### Tickets (apps/suporte/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Dashboard de tickets | ✅ Pronto | |\n| Criar ticket | ✅ Pronto | |\n| Detalhe do ticket com comentários | ✅ Pronto | |\n| SLA automático por plano | ✅ Pronto | |\n| Categorias configuráveis | ✅ Pronto | |\n| Relatórios de suporte | 📋 Planejado | |\n| Portal do cliente (abertura externa) | 📋 Planejado | |\n\n---\n\n## SISTEMA (base)\n\n### Infraestrutura (apps/sistema/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Multi-tenancy (isolamento por provedor) | ✅ Pronto | TenantMixin em todos os models. Pendente deploy |\n| Gestão de usuários e permissões | ✅ Pronto | |\n| Configurações da empresa | ✅ Pronto | |\n| Logs do sistema | ✅ Pronto | |\n| Status customizáveis | ✅ Pronto | |\n\n### Notificações (apps/notificacoes/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Models completos (tipos, canais, templates, preferências) | ✅ Pronto | |\n| Admin completo | ✅ Pronto | |\n| APIs de CRUD | ✅ Pronto | 26 endpoints |\n| Config WhatsApp/N8N | ✅ Pronto | |\n| Envio de notificações | ❌ Desativado | Service não implementado |\n| Página de configurações | ❌ Desativado | Redireciona com msg manutenção |\n| Signals automáticos | ❌ Desativado | Nenhum signal cria notificações |\n\n### Integrações (apps/integracoes/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| OAuth2 com HubSoft | ✅ Pronto | |\n| Envio automático de leads | ✅ Pronto | Signal post_save |\n| Sincronização de clientes | ✅ Pronto | Command + automático |\n| Anexação de docs ao contrato | ✅ Pronto | |\n| Logs de auditoria | ✅ Pronto | |\n| Conexão direta banco HubSoft (CS) | ✅ Pronto | Para dados não disponíveis na API |\n\n### API REST (apps/api/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Endpoints DRF com TokenAuth + SessionAuth | ✅ Pronto | |\n| Swagger/OpenAPI em /api/docs/ | ✅ Pronto | drf-spectacular |\n| Endpoints N8N | ✅ Pronto | |\n\n### Admin Aurora (apps/admin_aurora/)\n\n| Funcionalidade | Status | Observação |\n|----------------|--------|------------|\n| Gestão de tenants | ✅ Pronto | |\n| Gestão de planos (9 planos, 115 features) | ✅ Pronto | |\n| Monitoramento | 🔧 Parcial | Logs e status básicos |\n\n---\n\n## Infraestrutura e DevOps\n\n| Item | Status | Observação |\n|------|--------|------------|\n| CI/CD GitHub Actions | ✅ Pronto | Roda testes + linting |\n| Docker (Dockerfile + compose + nginx) | ✅ Pronto | Não usado em produção ainda |\n| 225 testes automatizados | ✅ Pronto | 10 arquivos, 28+ factories |\n| Deploy produção multi-tenant | 📋 Planejado | Produção atual é single-tenant Megalink |\n| Monitoramento (Sentry, uptime) | 📋 Planejado | |\n\n---\n\n## Prioridades Imediatas\n\n1. **Finalizar módulo Marketing**: backend de Automações (regras configuráveis pelo cliente)\n2. **Reativar Notificações**: conectar ao módulo de Automações\n3. **Finalizar CS**: Retenção (churn alerts), NPS, resgates de cupom\n4. **Deploy multi-tenant**: primeira vez com 2+ provedores em produção\n5. **Onboarding Grupo Magister**: primeiro cliente com contrato assinado\n"}, {"t": "f", "n": "01 Reguas Padrao", "fn": "01-REGUAS_PADRAO.md", "c": "# 11. Marketing — Réguas Padrão\n\n**Status:** 📋 Especificação para desenvolvimento\n**Última atualização:** 26/03/2026\n\n---\n\n## Contexto\n\nO módulo de Marketing é o motor de automação do hub AuroraISP. Além de permitir que o provedor crie fluxos customizados, ele entrega **réguas padrão prontas** organizadas por jornada — o provedor ativa, configura os dados básicos e começa a usar.\n\nCanais disponíveis: **WhatsApp** e **E-mail**\n\n---\n\n## Arquitetura das réguas\n\n```\nGatilho (trigger)\n      ↓\nCondição (filtro opcional)\n      ↓\nAção (mensagem WhatsApp / e-mail / tag / notificação interna)\n      ↓\nAguardar (tempo ou evento)\n      ↓\nPróxima ação ou fim do fluxo\n```\n\n---\n\n## Réguas do Comercial\n\nFluxos de automação para a etapa de atração e conversão de leads.\n\n---\n\n### C01 — Boas-vindas ao Lead\n**Gatilho:** Lead cadastrado na plataforma\n**Canal:** WhatsApp\n**Objetivo:** Confirmar recebimento e iniciar qualificação\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Enviar mensagem de boas-vindas com nome do lead | Imediato |\n| 2 | Iniciar fluxo de qualificação (bot) | Imediato |\n\n---\n\n### C02 — Follow-up de Lead Sem Resposta\n**Gatilho:** Lead qualificado sem resposta após X horas\n**Canal:** WhatsApp\n**Objetivo:** Reengajar lead que parou de responder\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Enviar mensagem de follow-up (tom leve) | 4h sem resposta |\n| 2 | Enviar segunda tentativa | 24h sem resposta |\n| 3 | Notificar vendedor para contato manual | 48h sem resposta |\n| 4 | Mover lead para status \"Frio\" | 72h sem resposta |\n\n---\n\n### C03 — Lembrete de Documentos Pendentes\n**Gatilho:** Lead com documentos solicitados e não enviados após X horas\n**Canal:** WhatsApp\n**Objetivo:** Reduzir abandono na etapa de documentação\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Lembrete amigável de documentos pendentes | 2h sem envio |\n| 2 | Segundo lembrete com lista dos docs faltantes | 24h sem envio |\n| 3 | Notificar vendedor | 48h sem envio |\n\n---\n\n### C04 — Nutrição de Lead Frio\n**Gatilho:** Lead marcado como \"Frio\" sem conversão\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Manter relacionamento e reativar interesse\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Enviar conteúdo de valor (dica, novidade do provedor) | 7 dias |\n| 2 | Enviar oferta ou promoção ativa | 15 dias |\n| 3 | Última tentativa de reativação | 30 dias |\n| 4 | Arquivar lead se sem resposta | 45 dias |\n\n---\n\n### C05 — Recuperação de Lead Perdido\n**Gatilho:** Lead marcado como \"Perdido\" no CRM\n**Canal:** WhatsApp\n**Objetivo:** Reabrir oportunidade após período de descanso\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Pausa no contato | 30 dias |\n| 2 | Recontato com nova abordagem ou oferta | 30 dias |\n| 3 | Se sem resposta, arquivar definitivamente | 15 dias após recontato |\n\n---\n\n### C06 — Confirmação de Instalação Agendada\n**Gatilho:** Instalação agendada no HubSoft\n**Canal:** WhatsApp\n**Objetivo:** Reduzir no-show e preparar o cliente\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Confirmação do agendamento com data e hora | Imediato |\n| 2 | Lembrete 1 dia antes | D-1 |\n| 3 | Lembrete 2h antes | D0 -2h |\n\n---\n\n## Réguas do CS\n\nFluxos de automação para a etapa de retenção e fidelização pós-venda. Rodam via Marketing.\n\n---\n\n### CS01 — Boas-vindas Pós-Ativação\n**Gatilho:** Cliente ativado no HubSoft\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Onboarding do novo cliente, reduzir churn nos primeiros 30 dias\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Mensagem de boas-vindas com dados do plano | Imediato |\n| 2 | Dicas de uso do serviço | D+3 |\n| 3 | Verificação de satisfação (está tudo funcionando?) | D+7 |\n| 4 | Convite para o Clube de Benefícios | D+15 |\n\n---\n\n### CS02 — NPS — Pesquisa de Satisfação\n**Gatilho:** X dias após ativação ou em data recorrente\n**Canal:** WhatsApp\n**Objetivo:** Medir satisfação e identificar clientes insatisfeitos antes do churn\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Enviar pergunta NPS (nota de 0 a 10) | D+30 após ativação |\n| 2a | Se nota 9-10: pedir indicação | Imediato |\n| 2b | Se nota 7-8: agradecer e monitorar | Imediato |\n| 2c | Se nota 0-6: notificar CS para contato urgente | Imediato |\n| 3 | Repetir a cada 90 dias | Recorrente |\n\n---\n\n### CS03 — Prevenção de Churn\n**Gatilho:** Cliente com fatura em atraso há X dias ou NPS baixo\n**Canal:** WhatsApp\n**Objetivo:** Intervir antes do cancelamento\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Mensagem de suporte proativo (tudo bem?) | 1 dia após gatilho |\n| 2 | Oferta de negociação ou plano alternativo | 3 dias |\n| 3 | Notificar CS para contato humano | 5 dias |\n\n---\n\n### CS04 — Upsell de Plano\n**Gatilho:** Cliente no plano básico há X meses sem reclamação\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Aumentar ticket médio de clientes satisfeitos\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Mensagem apresentando plano superior com benefícios | 90 dias após ativação |\n| 2 | Follow-up com oferta especial (desconto por tempo limitado) | 7 dias depois |\n| 3 | Última chamada para upgrade | 7 dias depois |\n\n---\n\n### CS05 — Venda de SVA (Serviços de Valor Agregado)\n**Gatilho:** Cliente ativo há X dias sem SVA contratado\n**Canal:** WhatsApp\n**Objetivo:** Aumentar receita por cliente com serviços adicionais (streaming, antivírus, backup, etc.)\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Apresentar SVA disponível com benefício claro | 60 dias após ativação |\n| 2 | Follow-up com período de teste grátis (se disponível) | 7 dias depois |\n| 3 | Lembrete de encerramento do período de teste | D-2 do fim do teste |\n\n---\n\n### CS06 — Reativação de Cliente Cancelado\n**Gatilho:** Contrato cancelado no HubSoft\n**Canal:** WhatsApp\n**Objetivo:** Recuperar cliente cancelado após período de respiro\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Pausa — sem contato | 30 dias |\n| 2 | Mensagem de recontato com oferta especial | D+30 |\n| 3 | Follow-up final | 7 dias depois |\n| 4 | Arquivar se sem resposta | 15 dias depois |\n\n---\n\n### CS07 — Programa de Indicação\n**Gatilho:** Cliente com NPS 9 ou 10, ou X meses ativo sem reclamação\n**Canal:** WhatsApp\n**Objetivo:** Gerar leads via base de clientes satisfeitos\n\n| Passo | Ação | Tempo |\n|-------|------|-------|\n| 1 | Convidar para programa de indicação com benefício claro | Imediato após gatilho |\n| 2 | Enviar link ou código de indicação | Imediato |\n| 3 | Notificar quando indicação converter | Automático |\n| 4 | Entregar benefício ao indicador | Automático após ativação do indicado |\n\n---\n\n## Réguas de Marketing (campanhas e tráfego)\n\n---\n\n### M01 — Rastreamento de Origem de Lead\n**Gatilho:** Lead captado via campanha (Facebook, Google, Instagram, etc.)\n**Ação:** Tag automática de origem + campanha + UTM no cadastro do lead\n**Objetivo:** Atribuição correta para otimização com IA\n\n---\n\n### M02 — Alerta de Performance de Campanha\n**Gatilho:** Campanha com CPL acima do benchmark ou taxa de conversão abaixo do esperado\n**Canal:** Notificação interna + E-mail para responsável\n**Objetivo:** Alertar gestor para ajuste de campanha com sugestão da IA\n\n---\n\n### M03 — Campanha Sazonal\n**Gatilho:** Data configurada (Black Friday, volta às aulas, etc.)\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Disparo em massa para base segmentada com oferta sazonal\n\n---\n\n## Resumo das réguas\n\n| Código | Nome | Módulo | Canal | Status |\n|--------|------|--------|-------|--------|\n| C01 | Boas-vindas ao Lead | Comercial | WhatsApp | 📋 A desenvolver |\n| C02 | Follow-up Sem Resposta | Comercial | WhatsApp | 📋 A desenvolver |\n| C03 | Documentos Pendentes | Comercial | WhatsApp | 📋 A desenvolver |\n| C04 | Nutrição de Lead Frio | Comercial | WhatsApp + E-mail | 📋 A desenvolver |\n| C05 | Recuperação de Lead Perdido | Comercial | WhatsApp | 📋 A desenvolver |\n| C06 | Confirmação de Instalação | Comercial | WhatsApp | 📋 A desenvolver |\n| CS01 | Boas-vindas Pós-Ativação | CS | WhatsApp + E-mail | 📋 A desenvolver |\n| CS02 | NPS | CS | WhatsApp | 📋 A desenvolver |\n| CS03 | Prevenção de Churn | CS | WhatsApp | 📋 A desenvolver |\n| CS04 | Upsell de Plano | CS | WhatsApp + E-mail | 📋 A desenvolver |\n| CS05 | Venda de SVA | CS | WhatsApp | 📋 A desenvolver |\n| CS06 | Reativação de Cancelado | CS | WhatsApp | 📋 A desenvolver |\n| CS07 | Programa de Indicação | CS | WhatsApp | 📋 A desenvolver |\n| M01 | Rastreamento de Origem | Marketing | Interno | 📋 A desenvolver |\n| M02 | Alerta de Performance | Marketing | Notificação + E-mail | 📋 A desenvolver |\n| M03 | Campanha Sazonal | Marketing | WhatsApp + E-mail | 📋 A desenvolver |\n\n---\n\n## SVAs suportados (CS05)\n\nServiços de valor agregado que os provedores costumam oferecer:\n\n- Streaming (Netflix, Paramount, etc.)\n- Antivírus\n- Backup em nuvem\n- Segurança kids (controle parental)\n- Rastreamento veicular\n- Energia solar\n- Plano de saúde\n\n---\n\n## Configurações do administrador\n\n- **Benefício do programa de indicação (CS07):** configurável pelo administrador do provedor\n- **Aprovação humana nos fluxos:** configurável por etapa. Alguns passos exigem intervenção humana. O sistema deve suportar esse controle por fluxo.\n\n---\n\n## Pendências\n\n- [ ] Definir tempo padrão de atraso que aciona a prevenção de churn (CS03)\n- [ ] Mapear quais etapas de cada fluxo precisam de aprovação humana por padrão\n"}, {"t": "f", "n": "02 Roadmap Produto", "fn": "02-ROADMAP_PRODUTO.md", "c": "# Roadmap de Produto — AuroraISP\n\n**Status:** ✅ Atualizado\n**Última atualização:** 31/03/2026\n**Base:** Análise completa do código fonte (robo/) em 28/03/2026. Refatoração completa finalizada em 31/03/2026. vendas_web removido do INSTALLED_APPS.\n\n---\n\n## 1. Inventário do sistema atual\n\n### 1.1 Estrutura de código\n\n| Item | Valor |\n|------|-------|\n| Framework | Django 5.2, Python 3.11, DRF |\n| Banco | PostgreSQL 15+ |\n| Apps Django | 15 modulares em apps/ (vendas_web removido do INSTALLED_APPS) |\n| Models totais | 67+ (todos com app_label natural, sem referência a vendas_web) |\n| Views migradas | 9.457 linhas migradas para apps modulares |\n| Rotas totais | 139 rotas em
