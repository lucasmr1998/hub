itГЎrio |\n| Transacional | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP |\n\n**Linha de apoio:**\n> Marketing e CS tГӘm precificaГ§ГЈo prГіpria. DisponГӯveis em breve.\n\n**SimulaГ§ГЈo de ROI:**\n> 100 vendas/mГӘs Г— R$99,90 = R$9.990 de receita digital gerada.\n> Custo Start + transacional: R$797 + R$700 = R$1.497/mГӘs.\n> ROI: 6,6x no primeiro mГӘs.\n\n---\n\n## Slide 9 вҖ” Por que AuroraISP\n\n**Layout:** 4 cards em grade 2x2, fundo dark\n\n**TГӯtulo:**\n> Por que a AuroraISP Г© diferente\n\n**Card 1 вҖ” HubSoft nativo**\n> IntegraГ§ГЈo profunda com o ERP mais usado por ISPs regionais. Os dados do ERP alimentam todo o hub em tempo real. Nenhum concorrente oferece isso.\n\n**Card 2 вҖ” Case real, nГЈo promessa**\n> Resultado comprovado em produГ§ГЈo. VocГӘ vГӘ o sistema funcionando antes de assinar qualquer coisa.\n\n**Card 3 вҖ” IA no processo**\n> QualificaГ§ГЈo de leads, validaГ§ГЈo de documentos, otimizaГ§ГЈo de campanhas e prevenГ§ГЈo de churn com inteligГӘncia artificial.\n\n**Card 4 вҖ” Modelo que cresce junto**\n> O transacional alinha o sucesso da Aurora com o sucesso do provedor. VocГӘ paga mais quando vende mais. ROI sempre positivo.\n\n---\n\n## Slide 10 вҖ” PrГіximos Passos\n\n**Layout:** centralizado, fundo dark com destaque azul\n\n**TГӯtulo:**\n> Como comeГ§ar\n\n**Para provedores HubSoft:**\n> 14 dias gratuitos para testar com os seus leads reais. Sem compromisso. Cancelamento a qualquer momento.\n\n**Para demais provedores:**\n> Contrato mensal. Cancelamento a qualquer momento.\n\n**O que Г© preciso para ativar:**\n> Acesso ao HubSoft. NГәmero de WhatsApp do provedor. Cerca de 1 hora para configurar.\n\n**Contato:**\n> [Nome do parceiro]\n> [WhatsApp]\n> auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo escuro:** #0F172A\n- **Fundo claro:** #F1F5F9\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n- **Tom:** direto, confiante, fala a lГӯngua do provedor.\n"}, {"t": "f", "n": "Demo Deck Parceiro Estrutura", "fn": "demo_deck_parceiro_estrutura.md", "c": "# Deck do Parceiro вҖ” Demo ao Vivo\n**Formato:** 10 slides PPT (16:9)\n**Uso:** Guia interno do parceiro durante a demo ao vivo\n**DuraГ§ГЈo:** 30 a 45 minutos\n**Objetivo:** Fechar o prГіximo passo вҖ” trial, contrato ou segunda reuniГЈo\n\n---\n\n## Slide 1 вҖ” Capa\n\n**Layout:** fundo dark, centralizado\n\n**Logo:** [inserir quando disponГӯvel]\n\n**TГӯtulo:**\n> AuroraISP\n\n**SubtГӯtulo:**\n> Do lead ao cliente fidelizado com inteligГӘncia.\n\n**Nota para o parceiro:**\n> Antes de comeГ§ar: perguntar quantas pessoas estГЈo no time comercial hoje e quantos leads chegam por mГӘs. Usar esses nГәmeros nos slides 3 e 9.\n\n---\n\n## Slide 2 вҖ” Agenda\n\n**Layout:** lista simples, fundo claro\n\n**TГӯtulo:**\n> O que vamos ver hoje\n\n**Itens:**\n> 1. O problema que a Aurora resolve\n> 2. Como funciona na prГЎtica (demo ao vivo)\n> 3. Os 3 mГіdulos do hub\n> 4. Resultado real de um provedor em produГ§ГЈo\n> 5. PrГіximos passos\n\n**Linha de apoio:**\n> Pode me interromper a qualquer momento com perguntas.\n\n**Nota para o parceiro:**\n> Confirmar se hГЎ outros decisores que deveriam estar nessa reuniГЈo. Se sim, marcar uma segunda reuniГЈo incluindo eles.\n\n---\n\n## Slide 3 вҖ” O Problema\n\n**Layout:** 2 colunas, fundo dark\n\n**TГӯtulo:**\n> Antes da Aurora\n\n**Coluna esquerda вҖ” dores:**\n> Lead chegando no WhatsApp sem acompanhamento.\n> Documentos pedidos no chat, processo travando na burocracia.\n> AtivaГ§ГЈo manual no ERP depois de cada venda.\n> Time grande para um volume que poderia ser menor.\n\n**Coluna direita вҖ” impacto (preencher ao vivo):**\n> Leads perdidos por semana: **[nГәmero do prospect]**\n> Custo por pessoa no time: **~R$3.950/mГӘs**\n> Pessoas no time hoje: **[nГәmero do prospect]**\n\n**Nota para o parceiro:**\n> Usar os nГәmeros levantados na abertura. \"VocГӘs tГӘm X pessoas no comercial, certo? Isso Г© R$X por mГӘs sГі em pessoal.\" Deixar o impacto financeiro claro antes de mostrar a soluГ§ГЈo.\n\n---\n\n## Slide 4 вҖ” Demo ao Vivo: Comercial\n\n**Layout:** fluxo visual, fundo claro\n\n**TГӯtulo:**\n> Veja o Comercial funcionando\n\n**Fluxo:**\n```\nLead no WhatsApp вҶ’ Bot qualifica вҶ’ Coleta documentos вҶ’ Gera contrato вҶ’ Ativa no HubSoft\n```\n\n**Nota para o parceiro:**\n> Este Г© o momento da demo ao vivo. Abrir o sistema e navegar em tempo real. O slide fica em segundo plano.\n> SequГӘncia sugerida: mostrar chegada do lead, qualificaГ§ГЈo automГЎtica, coleta de documentos, geraГ§ГЈo do contrato, envio para o HubSoft.\n> Se o prospect usa HubSoft: mostrar a ativaГ§ГЈo em tempo real. Гү o momento de maior impacto da demo.\n\n---\n\n## Slide 5 вҖ” CRM Kanban (Comercial Pro)\n\n**Layout:** screenshot ou mockup do CRM, fundo claro\n\n**TГӯtulo:**\n> VisГЈo completa do pipeline em tempo real\n\n**Texto:**\n> Cada lead qualificado alimenta o CRM automaticamente. Sem lanГ§amento manual. O gestor vГӘ o funil completo, por vendedor, por etapa, por perГӯodo.\n\n**Incluso em:** Comercial Pro\n\n**Nota para o parceiro:**\n> Mostrar o CRM ao vivo se o prospect tem time de 3 pessoas ou mais. Para ISPs menores, focar no fluxo do Slide 4.\n\n---\n\n## Slide 6 вҖ” MГіdulo Marketing\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**TГӯtulo:**\n> Marketing вҖ” o motor de automaГ§ГЈo do hub\n\n**Bloco 1 вҖ” WhatsApp e e-mail**\n> Disparos segmentados com rГ©guas padrГЈo prontas para ISP. Basta ativar.\n\n**Bloco 2 вҖ” Fluxos de automaГ§ГЈo**\n> NutriГ§ГЈo de leads frios, reativaГ§ГЈo de cancelados, upsell de plano. Tudo automГЎtico.\n\n**Bloco 3 вҖ” TrГЎfego pago com IA**\n> GestГЈo de campanhas no Facebook e Google com otimizaГ§ГЈo por inteligГӘncia artificial.\n\n**Status:** Em desenvolvimento. DisponГӯvel em breve.\n\n**Nota para o parceiro:**\n> NГЈo entrar em detalhes de prazo. Se perguntarem quando sai, responder \"em breve, e quem estГЎ com o Comercial ativo terГЎ acesso prioritГЎrio.\"\n\n---\n\n## Slide 7 вҖ” MГіdulo CS\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**TГӯtulo:**\n> CS вҖ” retenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda\n\n**Bloco 1 вҖ” Clube de BenefГӯcios**\n> Streaming, antivГӯrus, rastreamento veicular, plano de saГәde e mais.\n\n**Bloco 2 вҖ” PrevenГ§ГЈo de churn**\n> IA identifica clientes com risco de cancelamento antes do cancelamento.\n\n**Bloco 3 вҖ” NPS e upsell**\n> Pesquisa de satisfaГ§ГЈo automГЎtica. Clientes promotores indicam. Clientes satisfeitos fazem upgrade.\n\n**Status:** Em desenvolvimento. DisponГӯvel em breve.\n\n**Nota para o parceiro:**\n> Mesma abordagem do Marketing. NГЈo comprometer prazo. Focar no valor futuro do hub completo.\n\n---\n\n## Slide 8 вҖ” Case de ProduГ§ГЈo\n\n**Layout:** nГәmeros grandes, fundo dark\n\n**TГӯtulo:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**SubtГӯtulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**MГ©tricas:**\n- **1.000** leads por mГӘs\n- **400** vendas digitais por mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Linha de fechamento:**\n> O sistema que gerou esse resultado Г© o mesmo que vocГӘ acabou de ver funcionando.\n\n**Nota para o parceiro:**\n> Comparar com os nГәmeros do prospect. \"VocГӘs tГӘm X leads por mГӘs. Com esse fluxo, quanto a mais vocГӘs poderiam converter?\" Deixar o prospect fazer a conta.\n\n---\n\n## Slide 9 вҖ” PrecificaГ§ГЈo\n\n**Layout:** 3 colunas, fundo claro\n\n**TГӯtulo:**\n> Investimento\n\n**Tabela Comercial:**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| UsuГЎrios | AtГ© 2 | AtГ© 5 | Ilimitado |\n| CRM Kanban | NГЈo | NГЈo | Sim |\n| Transacional | R$7/venda | R$7/venda | R$7/venda |\n\n**Nota para o parceiro:**\n> Fazer a simulaГ§ГЈo ao vivo com os nГәmeros do prospect.\n> \"VocГӘs fazem X vendas por mГӘs. X Г— R$7 = R$X de transacional. Mais R$797 de mensalidade = R$X total. VocГӘs geram R$X de receita digital por mГӘs. O ROI Г© Xx jГЎ no primeiro mГӘs.\"\n> Deixar o prospect ver o nГәmero na tela. NГЈo apressar.\n\n---\n\n## Slide 10 вҖ” PrГіximos Passos\n\n**Layout:** centralizado, fundo dark\n\n**TГӯtulo:**\n> O que acontece agora\n\n**Para provedores HubSoft:**\n> 14 dias gratuitos. VocГӘ testa com os seus leads reais. Sem compromisso.\n\n**Para demais provedores:**\n> Contrato mensal. Cancelamento a qualquer momento.\n\n**O que precisamos para ativar:**\n> Acesso ao HubSoft. NГәmero de WhatsApp do provedor. Cerca de 1 hora para configurar.\n\n**CTA:**\n> Vamos ativar hoje?\n\n**Nota para o parceiro:**\n> Sempre fechar um prГіximo passo concreto antes de encerrar. Se nГЈo for o contrato, definir data para retorno ou para apresentaГ§ГЈo a outro decisor. Nunca sair da reuniГЈo sem data marcada.\n\n---\n\n## Roteiro de tempo\n\n| Tempo | Slide | AГ§ГЈo |\n|-------|-------|------|\n| 0 a 5 min | 1 e 2 | ApresentaГ§ГЈo, agenda, levantar nГәmeros do prospect |\n| 5 a 10 min | 3 | Validar dores com os nГәmeros reais do prospect |\n| 10 a 25 min | 4 e 5 | Demo ao vivo do Comercial e CRM |\n| 25 a 30 min | 6 e 7 | VisГЈo de Marketing e CS |\n| 30 a 35 min | 8 | Case de produГ§ГЈo, comparar com prospect |\n| 35 a 40 min | 9 | PrecificaГ§ГЈo e simulaГ§ГЈo de ROI ao vivo |\n| 40 a 45 min | 10 | PrГіximos passos, fechar aГ§ГЈo concreta |\n\n---\n\n## Diretrizes visuais\n\n- **Fundo escuro:** #0F172A\n- **Fundo claro:** #F1F5F9\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n"}, {"t": "f", "n": "One Pager Estrutura", "fn": "one_pager_estrutura.md", "c": "# One-pager вҖ” AuroraISP\n**Formato:** 1 slide PPT (16:9) exportado em PDF\n**Canal de uso:** WhatsApp вҖ” enviado antes da demo pelo parceiro comercial\n**Objetivo:** Gerar curiosidade e conseguir 30 minutos de atenГ§ГЈo do dono do ISP\n\n---\n\n## Layout su **CTA:**\n> SГЈo 30 minutos para vocГӘ ver funcionando ao vivo.\n> [Nome do parceiro] вҖ” [contato]\n\n---\n\n### Bloco direito вҖ” Case de produГ§ГЈo\n\n**TГӯtulo do bloco:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**4 mГ©tricas em destaque (nГәmero grande, label pequeno):**\n\n| NГәmero | Label |\n|--------|-------|\n| **400** | vendas digitais por mГӘs |\n| **2** | pessoas no time (eram 8) |\n| **R$284.400** | economia por ano em pessoal |\n| **HubSoft** | integraГ§ГЈo nativa e profunda |\n\n**RodapГ© do bloco:**\n> Provedor regional com 30.000 clientes ativos.\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark (#0F172A) ou branco com elementos azuis\n- **Cor primГЎria:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Tom:** direto, sem rodeios, fala a lГӯngua do provedor\n- **Regra:** sem traГ§o como pontuaГ§ГЈo. Ponto ou vГӯrgula.\n\n---\n\n## O que NГғO colocar\n\n- DescriГ§ГЈo dos mГіdulos (Marketing, CS) вҖ” nГЈo Г© hora\n- Tabela de preГ§os вҖ” gera objeГ§ГЈo antes da demo\n- Muitos logos ou elementos visuais вҖ” deve respirar\n- Texto longo вҖ” se precisar de mais de 5 segundos para ler o bloco, corta\n"}, {"t": "f", "n": "Pitch Deck Estrutura", "fn": "pitch_deck_estrutura.md", "c": "# Pitch Deck вҖ” AuroraISP\n**VersГЈo:** 1.0\n**Data:** 26/03/2026\n\n---\n\n## Slide 1 вҖ” Capa\n\n**TГӯtulo:** AuroraISP\n**SubtГӯtulo:** Vende mais. Perde menos. Fideliza sempre.\n**Linha de apoio:** Hub de tecnologia com IA para provedores de internet.\n**RodapГ©:** Pitch Comercial вҖ” Confidencial\n\n---\n\n## Slide 2 вҖ” O Problema\n\n**TГӯtulo:** O dia a dia do time comercial hoje\n\n**4 cards:**\n\n1. **Lead some no WhatsApp**\n   Chega, pergunta o preГ§o e desaparece. NinguГ©m acompanha.\n\n2. **Documentos no caos**\n   Vendedor pede CPF no chat, o cliente manda foto borrada, o processo trava.\n\n3. **AtivaГ§ГЈo manual e lenta**\n   Depois do contrato, alguГ©m precisa lanГ§ar tudo no sistema. Retrabalho todo dia.\n\n4. **Time grande para pouco volume**\n   8 pessoas para atender 1.000 leads por mГӘs. Custo alto, resultado mГ©dio.\n\n---\n\n## Slide 3 вҖ” A SoluГ§ГЈo\n\n**TГӯtulo:** A AuroraISP resolve isso\n\n**Headline:** Do lead ao cliente fidelizado com inteligГӘncia.\n\n**Texto:**\nA Aurora automatiza o fluxo comercial do inГӯcio ao fim. O lead entra no WhatsApp, o bot qualifica, coleta os documentos, gera o contrato e ativa direto no HubSoft. Sem planilha, sem retrabalho, sem lead perdido.\n\n**Destaque:** IntegraГ§ГЈo nativa e profunda com HubSoft. Nenhum concorrente faz isso.\n\n---\n\n## Slide 4 вҖ” Os 3 MГіdulos\n\n**TГӯtulo:** Um hub. TrГӘs mГіdulos. Uma jornada completa.\n\n**3 colunas:**\n\n| Comercial вң… | Marketing рҹ”§ | CS рҹ”§ |\n|---|---|---|\n| Lead no WhatsApp | Disparos de WhatsApp e e-mail | Clube de BenefГӯcios |\n| Bot de qualificaГ§ГЈo | Fluxos de automaГ§ГЈo prontos | PrevenГ§ГЈo de churn |\n| Coleta de documentos | NutriГ§ГЈo de leads | NPS automatizado |\n| GeraГ§ГЈo de contrato | GestГЈo de trГЎfego pago com IA | Upsell de plano e SVA |\n| AtivaГ§ГЈo no HubSoft | RelatГіrios de atribuiГ§ГЈo | SaГәde da base |\n| CRM Kanban (Pro) | | |\n\n---\n\n## Slide 5 вҖ” Case de ProduГ§ГЈo\n\n**TГӯtulo:** Resultado real. Provedor em produГ§ГЈo.\n**SubtГӯtulo:** Provedor regional com 30.000 clientes ativos.\n\n**5 mГ©tricas em destaque:**\n\n- **1.000** leads por mГӘs\n- **400** vendas digitais/mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** no time (eram 8)\n- **R$284.400** economia/ano em pessoal\n\n**Texto de apoio:**\n8 pessoas atendiam 1.000 leads por mГӘs. Hoje 2 pessoas dГЈo conta do mesmo volume. As outras 2 viraram backoffice estratГ©gico, funГ§ГЈo que antes nГЈo existia.\n\n---\n\n## Slide 6 вҖ” Como Funciona\n\n**TГӯtulo:** Do lead ao HubSoft em minutos\n\n**Fluxo visual (5 etapas em sequГӘncia):**\n\n```\nLead no WhatsApp вҶ’ Bot qualifica вҶ’ Coleta documentos вҶ’ Gera contrato вҶ’ Ativa no HubSoft\n```\n\n**Texto de apoio:**\nSem planilha. Sem retrabalho. Sem lead perdido.\nTudo integrado nativamente ao HubSoft.\n\n---\n\n## Slide 7 вҖ” PrecificaГ§ГЈo\n\n**TГӯtulo:** PreГ§o que cresce com o provedor\n\n**3 planos (por mГіdulo):**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mГӘs | R$797/mГӘs | R$1.397/mГӘs |\n| PГәblico | ISPs pequenos | ISPs em crescimento | ISPs estabelecidos |\n| UsuГЎrios | AtГ© 2 | AtГ© 5 | Ilimitado |\n| Suporte | Standard | Standard | PrioritГЎrio |\n| Destaque | Entrada acessГӯvel | Mais popular | IA + CRM Kanban |\n\n**Nota:** Cada mГіdulo (Comercial, Marketing, CS) tem seu prГіprio plano. Transacional por uso incluso.\n\n---\n\n## Slide 8 вҖ” Diferenciais\n\n**TГӯtulo:** Por que AuroraISP\n\n**6 cards:**\n\n1. **HubSoft nativo**\n   IntegraГ§ГЈo profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso.\n\n2. **Case real**\n   Resultado comprovado em produГ§ГЈo. NГЈo Г© promessa. SГЈo nГәmeros reais de um provedor com 30.000 clientes.\n\n3. **IA no processo**\n   QualificaГ§ГЈo, validaГ§ГЈo, sugestГЈo de campanha e prevenГ§ГЈo de churn com inteligГӘncia artificial.\n\n4. **PreГ§o que faz sentido**\n   ROI positivo no primeiro mГӘs. O transacional alinha o sucesso da Aurora com o sucesso do provedor.\n\n5. **Trial para HubSoft**\n   14 dias gratuitos para quem jГЎ usa HubSoft. Em 14 dias dГЎ para ver resultado real.\n\n6. **Hub completo**\n   Comercial, Marketing e CS em uma plataforma. Do lead ao cliente fidelizado.\n\n---\n\n## Slide 9 вҖ” CTA\n\n**TГӯtulo:** PrГіximo passo\n\n**Headline:** SГЈo 30 minutos para vocГӘ ver funcionando.\n\n**SubtГӯtulo:** Demo ao vivo. Sem compromisso.\n\n**BotГЈo:** Agendar demonstraГ§ГЈo\n\n**Linha de apoio:** Provedores HubSoft: 14 dias gratuitos para testar.\n\n**Site:** auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark mode (#0F172A)\n- **Cor primГЎria:** azul (#2563EB)\n- **Acento:** ciano (#06B6D4)\n- **Texto principal:** branco\n- **Texto secundГЎrio:** cinza claro (#F1F5F9)\n- **Tipografia:** Inter\n- **Tom:** direto, confiante, sem exagero\n"}, {"t": "f", "n": "Pre Demo Deck Estrutura", "fn": "pre_demo_deck_estrutura.md", "c": "# Pre-demo Deck вҖ” AuroraISP\n**Formato:** 6 slides PPT (16:9) exportado em PDF\n**Canal:** WhatsApp вҖ” enviado pelo parceiro antes da demo\n**Objetivo:** Gerar interesse nos 3 mГіdulos e converter para uma reuniГЈo de demo\n\n---\n\n## Slide 1 вҖ” Capa\n\n**Layout:** centralizado, fundo dark\n\n**Logo:** [inserir quando disponГӯvel]\n\n**TГӯtulo:**\n> AuroraISP\n\n**Tagline (destaque, fonte grande):**\n> Vende mais. Perde menos. Fideliza sempre.\n\n**SubtГӯtulo:**\n> Hub de tecnologia com IA para provedores de internet.\n\n---\n\n## Slide 2 вҖ” O Problema\n\n**Layout:** 4 cards em linha, fundo claro\n\n**TГӯtulo do slide:**\n> O que acontece todo dia no seu provedor\n\n**Card 1 вҖ” Lead some no WhatsApp**\n> O cliente pergunta o preГ§o e desaparece. NinguГ©m acompanha. O lead esfria.\n\n**Card 2 вҖ” Documentos no caos**\n> Vendedor pede CPF no chat, cliente manda foto borrada, processo trava. A venda morre na burocracia.\n\n**Card 3 вҖ” AtivaГ§ГЈo manual e lenta**\n> Depois do contrato, alguГ©m precisa lanГ§ar tudo no sistema. Retrabalho todo dia, toda venda.\n\n**Card 4 вҖ” Time grande, resultado mГ©dio**\n> Muitas pessoas para atender poucos leads. Custo alto. ConversГЈo baixa.\n\n---\n\n## Slide 3 вҖ” Os 3 MГіdulos\n\n**Layout:** 3 colunas, fundo dark\n\n**TГӯtulo do slide:**\n> Um hub completo. Do lead ao cliente fidelizado.\n\n**Coluna 1 вҖ” Comercial** вң… DisponГӯvel\n> AutomaГ§ГЈo do fluxo de vendas do inГӯcio ao fim.\n> Lead no WhatsApp. Bot qualifica. Documentos coletados. Contrato gerado. AtivaГ§ГЈo no HubSoft.\n> Tudo sem intervenГ§ГЈo manual.\n\n**Coluna 2 вҖ” Marketing** Em breve\n> Motor de automaГ§ГЈo do hub.\n> E-mail e WhatsApp com fluxos prontos. NutriГ§ГЈo de leads. Campanhas com IA. TrГЎfego pago gerenciado.\n> RГ©guas padrГЈo jГЎ configuradas para o setor.\n\n**Coluna 3 вҖ” CS** Em breve\n> RetenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda.\n> Clube de BenefГӯcios. PrevenГ§ГЈo de churn. NPS automatizado. Upsell de plano e SVA.\n> Cliente que fica, e que compra mais.\n\n**Linha de apoio (rodapГ©):**\n> IntegraГ§ГЈo nativa e profunda com HubSoft em todos os mГіdulos.\n\n---\n\n## Slide 4 вҖ” Case de ProduГ§ГЈo\n\n**Layout:** nГәmeros grandes em destaque, fundo dark\n\n**TГӯtulo do slide:**\n> Resultado real. Provedor em produГ§ГЈo.\n\n**SubtГӯtulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**5 mГ©tricas (nГәmero grande + label):**\n\n- **1.000** leads por mГӘs\n- **400** vendas digitais por mГӘs\n- **R$99,90** ticket mГ©dio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Texto de apoio:**\n> 8 pessoas para atender 1.000 leads por mГӘs. Hoje, 2 pessoas dГЈo conta do mesmo volume. As outras 2 viraram backoffice estratГ©gico. FunГ§ГЈo que antes nГЈo existia.\n\n---\n\n## Slide 5 вҖ” Por que AuroraISP\n\n**Layout:** 4 cards em grade 2x2, fundo claro\n\n**TГӯtulo do slide:**\n> Por que a AuroraISP Г© diferente\n\n**Card 1 вҖ” HubSoft nativo**\n> IntegraГ§ГЈo profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso. Os dados do ERP alimentam todo o hub em tempo real.\n\n**Card 2 вҖ” Case real, nГЈo promessa**\n> Resultado comprovado em produГ§ГЈo. NГәmeros reais de um provedor com 30.000 clientes. VocГӘ vГӘ funcionando antes de assinar.\n\n**Card 3 вҖ” IA no processo**\n> QualificaГ§ГЈo de leads, validaГ§ГЈo de documentos, sugestГЈo de campanha e prevenГ§ГЈo de churn. InteligГӘncia onde o provedor mais precisa.\n\n**Card 4 вҖ” PreГ§o que faz sentido**\n> ROI positivo no primeiro mГӘs. O modelo transacional cresce junto com o provedor. VocГӘ paga mais quando vende mais.\n\n---\n\n## Slide 6 вҖ” CTA\n\n**Layout:** centralizado, fundo dark com destaque azul\n\n**TГӯtulo:**\n> Veja funcionando. 30 minutos.\n\n**SubtГӯtulo:**\n> Demo ao vivo, sem compromisso.\n> VocГӘ traz os seus nГәmeros, a gente mostra o que a Aurora fa nternas:**\n- [ ] Proposta enviada\n- [ ] Follow-up D+2\n- [ ] Follow-up D+5\n\n**CritГ©rio de avanГ§o:** prospect sinalizou interesse em fechar ou iniciou trial.\n\n**Campos obrigatГіrios:**\n- MГіdulo(s) de interesse\n- Plano de interesse (Starter / Start / Pro)\n- MRR estimado\n- Data da proposta enviada\n- ObjeГ§Гөes levantadas\n- PrГіxima aГ§ГЈo e data\n\n---\n\n### 4. Trial ativo\n\n*(Exclusivo para leads qualificaГ§ГЈo A вҖ” HubSoft)*\n\n**Tarefas internas:**\n- [ ] AtivaГ§ГЈo feita\n- [ ] Acompanhamento D+7\n- [ ] Encerramento D+14\n\n**CritГ©rio de avanГ§o:** trial encerrado com decisГЈo tomada.\n\n**Campos obrigatГіrios:**\n- Data de inГӯcio do trial\n- Data de encerramento prevista\n- MГіdulo em trial\n- ResponsГЎvel Aurora pelo acompanhamento\n\n---\n\n### 5. Finalizada\n\n**Campos obrigatГіrios:**\n- Resultado: Ganho / Perdido\n- Se ganho: mГіdulo(s) contratado(s), plano, MRR fechado, data de inГӯcio\n- Se perdido: motivo da perda, data de encerramento\n\n---\n\n## Responsabilidades\n\n| Atividade | Parceiro | Aurora |\n|-----------|----------|--------|\n| Preencher e avanГ§ar cards | вң… | вҖ” |\n| RevisГЈo semanal do funil | Participa | Conduz |\n| AtivaГ§ГЈo e onboarding | вҖ” | вң… |\n| Acompanhamento do trial | вҖ” | вң… |\n\n---\n\n## ObservaГ§ГЈo\n\nEnquanto o mГіdulo Comercial Pro nГЈo inclui CRM prГіprio para a AuroraISP, este documento serve como base para configurar a ferramenta provisГіria do parceiro (Notion, Planilha Google ou Pipedrive).\n"}]}, {"t": "d", "n": "juridico", "ch": [{"t": "f", "n": "Contrato Saas", "fn": "contrato_saas.md", "c": "# CONTRATO DE PRESTAГҮГғO DE SERVIГҮO DE SOFTWARE COMO SERVIГҮO (SaaS)\n\n**Contrato nВә:** [NГҡMERO]\n**Data de assinatura:** [DATA]\n\n---\n\n## PARTES\n\n**CONTRATADA:** AURORAISP TECNOLOGIA LTDA., pessoa jurГӯdica de direito privado, inscrita no CNPJ sob o nВә [CNPJ], com sede na cidade de Teresina, Estado do PiauГӯ, na [ENDEREГҮO COMPLETO], neste ato representada por seu(s) sГіcio(s) administrador(es), doravante denominada simplesmente **AURORA** ou **CONTRATADA**.\n\n**CONTRATANTE:** [RAZГғO SOCIAL], pessoa jurГӯdica de direito privado, inscrita no CNPJ sob o nВә [CNPJ], com sede na cidade de [CIDADE], Estado de [UF], na [ENDEREГҮO COMPLETO], neste ato representada por [REPRESENTANTE LEGAL], portador do CPF nВә [CPF], doravante denominada simplesmente **CONTRATANTE**.\n\nAs partes acima qualificadas celebram o presente Contrato de PrestaГ§ГЈo de ServiГ§o de Software como ServiГ§o (SaaS), que serГЎ regido pelas clГЎusulas e condiГ§Гөes a seguir.\n\n---\n\n## CLГҒUSULA 1ВӘ. DO OBJETO\n\n1.1. O presente contrato tem por objeto a prestaГ§ГЈo, pela CONTRATADA, de serviГ§o de software como serviГ§o (SaaS), por meio da plataforma **AuroraISP**, acessГӯvel via navegador web e integraГ§Гөes de API, destinada Г  automaГ§ГЈo de processos comerciais, de marketing e de sucesso do cliente para provedores de internet.\n\n1.2. A plataforma Г© composta por mГіdulos independentes e complementares, conforme descrito na ClГЎusula 2ВӘ, que podem ser contratados de forma isolada ou combinada, de acordo com a necessidade do CONTRATANTE.\n\n1.3. O acesso Г  plataforma serГЎ fornecido mediante login e senha individuais, com funcionalidades limitadas ao plano e mГіdulos contratados.\n\n---\n\n## CLГҒUSULA 2ВӘ. DOS MГ“DULOS E PLANOS\n\n2.1. A plataforma AuroraISP Г© organizada nos seguintes mГіdulos:\n\n**a) MГіdulo Comercial.** AutomaГ§ГЈo do fluxo comercial completo: qualificaГ§ГЈo de leads via WhatsApp, coleta de documentos, geraГ§ГЈo de contratos e ativaГ§ГЈo no ERP HubSoft. No plano Pro, inclui CRM Kanban com automaГ§Гөes avanГ§adas e validaГ§ГЈo por inteligГӘncia artificial.\n\n**b) MГіdulo Marketing.** Motor de automaГ§ГЈo de comunicaГ§ГЈo com leads e clientes. Inclui disparos de e-mail e WhatsApp, rГ©guas de automaГ§ГЈo prontas, fluxos personalizados e, no plano Pro, gestГЈo de trГЎfego pago com inteligГӘncia artificial.\n\n**c) MГіdulo CS (Customer Success).** Ferramentas de retenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda, incluindo Clube de BenefГӯcios, rГ©guas de retenГ§ГЈo, NPS e, no plano Pro, prevenГ§ГЈo de churn e upsell automatizado com inteligГӘncia artificial.\n\n2.2. Cada mГіdulo estГЎ disponГӯvel em trГӘs planos de funcionalidade:\n\n| Plano | PГәblico alvo | UsuГЎrios | Suporte |\n|-------|-------------|----------|---------|\n| **Starter** | ISPs com atГ© 2.000 clientes | 1 a 2 | Standard |\n| **Start** | ISPs de 2.000 a 10.000 clientes | AtГ© 5 | Standard |\n| **Pro** | ISPs acima de 10.000 clientes | Ilimitado | PrioritГЎrio |\n\n2.3. Os mГіdulos e planos contratados estГЈo especificados no **Anexo I** deste contrato, que Г© parte integrante e indissociГЎvel do presente instrumento.\n\n2.4. O CONTRATANTE poderГЎ solicitar alteraГ§ГЈo de plano ou inclusГЈo de novos mГіdulos a qualquer momento, mediante formalizaГ§ГЈo por escrito, com efeitos a partir do ciclo de faturamento seguinte.\n\n---\n\n## CLГҒUSULA 3ВӘ. DA REMUNERAГҮГғO\n\n3.1. A remuneraГ§ГЈo devida pelo CONTRATANTE Г  CONTRATADA Г© composta por duas parcelas:\n\n**a) Mensalidade fixa.** Valor fixo mensal por cada mГіdulo e plano contratado, conforme tabela abaixo:\n\n| MГіdulo | Starter | Start | Pro |\n|--------|---------|-------|-----|\n| Comercial | R$ 397,00/mГӘs | R$ 797,00/mГӘs | R$ 1.397,00/mГӘs |\n| Marketing | R$ 297,00/mГӘs | R$ 597,00/mГӘs | R$ 997,00/mГӘs |\n| CS | R$ 247,00/mГӘs | R$ 497,00/mГӘs | R$ 897,00/mГӘs |\n\n**b) Taxa transacional variГЎvel.** Valor variГЎvel mensal, calculado com base em eventos mensurГЎveis vinculados ao uso efetivo da plataforma, conforme tabela abaixo:\n\n| MГіdulo | Evento gerador | Valor unitГЎrio |\n|--------|---------------|----------------|\n| Comercial | Venda finalizada e validada no ERP do CONTRATANTE | R$ 7,00 por venda |\n| Marketing | Contato ativo na base de leads gerenciada pela plataforma | R$ 0,05 por contato/mГӘs |\n| CS | Cliente ativo no Clube de BenefГӯcios | R$ 0,15 por cliente/mГӘs |\n\n3.2. NГЈo hГЎ limite de volume para nenhum dos eventos transacionais. A cobranГ§a acompanha proporcionalmente o crescimento operacional do CONTRATANTE.\n\n3.3. A CONTRATADA emitirГЎ fatura mensal atГ© o dia 5 (cinco) de cada mГӘs, referente ao mГӘs anterior, discriminando a mensalidade fixa e os eventos transacionais apurados.\n\n3.4. O pagamento deverГЎ ser efetuado atГ© o dia 10 (dez) do mГӘs de emissГЈo da fatura, por meio de boleto bancГЎrio, PIX ou outro meio indicado pela CONTRATADA.\n\n3.5. O atraso no pagamento acarretarГЎ multa de 2% (dois por cento) sobre o valor devido, acrescido de juros moratГіrios de 1% (um por cento) ao mГӘs, calculados pro rata die, e correГ§ГЈo monetГЎria pelo IPCA.\n\n3.6. Em caso de inadimplГӘncia superior a 30 (trinta) dias, a CONTRATADA poderГЎ suspender o acesso Г  plataforma atГ© a regularizaГ§ГЈo integral dos valores devidos, sem que isso configure rescisГЈo contratual.\n\n3.7. Os valores previstos neste contrato poderГЈo ser reajustados anualmente, na data de aniversГЎrio do contrato, pela variaГ§ГЈo acumulada do IPCA/IBGE dos 12 (doze) meses anteriores, ou por Гӯndice que venha a substituГӯ-lo.\n\n---\n\n## CLГҒUSULA 4ВӘ. DO PERГҚODO DE TESTE (TRIAL)\n\n4.1. A CONTRATADA oferece perГӯodo de teste gratuito de 14 (quatorze) dias corridos para provedores que utilizem o sistema HubSoft como ERP principal.\n\n4.2. Durante o perГӯodo de teste, o CONTRATANTE terГЎ acesso Г s funcionalidades do plano e mГіdulos definidos em comum acordo, sem cobranГ§a de mensalidade ou taxa transacional.\n\n4.3. Ao tГ©rmino do perГӯodo de teste, caso o CONTRATANTE nГЈo manifeste interesse na contrataГ§ГЈo definitiva, o acesso serГЎ automaticamente encerrado e os dados inseridos durante o trial serГЈo mantidos por 15 (quinze) dias adicionais para eventual recuperaГ§ГЈo.\n\n4.4. Caso o CONTRATANTE opte pela contrataГ§ГЈo definitiva, a cobranГ§a terГЎ inГӯcio a partir do primeiro dia Гәtil seguinte ao tГ©rmino do perГӯodo de teste, e este contrato passa a vigorar em sua integralidade.\n\n4.5. O perГӯodo de teste nГЈo gera vГӯnculo contratual definitivo nem obrigaГ§ГЈo de contrataГ§ГЈo por parte do CONTRATANTE.\n\n---\n\n## CLГҒUSULA 5ВӘ. DO PRAZO E DA VIGГҠNCIA\n\n5.1. O presente contrato terГЎ vigГӘncia por prazo indeterminado, com inГӯcio na data de sua assinatura ou, quando aplicГЎvel, na data de conversГЈo do perГӯodo de teste em contrataГ§ГЈo definitiva.\n\n5.2. Qualquer das partes poderГЎ rescindir o contrato mediante notificaГ§ГЈo por escrito com antecedГӘncia mГӯnima de 30 (trinta) dias, conforme disposto na ClГЎusula 10ВӘ.\n\n---\n\n## CLГҒUSULA 6ВӘ. DO NГҚVEL DE SERVIГҮO (SLA)\n\n6.1. A CONTRATADA se compromete a manter a disponibilidade da plataforma em, no mГӯnimo, 99,5% (noventa e nove vГӯrgula cinco por cento) do tempo total de cada mГӘs calendГЎrio, excluГӯdas as janelas de manutenГ§ГЈo programada.\n\n6.2. As janelas de manutenГ§ГЈo programada serГЈo comunicadas ao CONTRATANTE com antecedГӘncia mГӯnima de 48 (quarenta e oito) horas, preferencialmente agendadas para horГЎrios de baixo uso (entre 00h e 06h, horГЎrio de BrasГӯlia).\n\n6.3. Em caso de indisponibilidade nГЈo programada que exceda o limite de 99,5%, o CONTRATANTE terГЎ direito a crГ©dito proporcional na mensalidade do mГӘs seguinte, calculado sobre o tempo excedente de indisponibilidade.\n\n6.4. O suporte tГ©cnico serГЎ prestado via WhatsApp, em horГЎrio comercial (segunda a sexta, das 8h Г s 18h, horГЎrio de BrasГӯlia), com os seguintes prazos de resposta:\n\n| Plano | Primeira resposta | ResoluГ§ГЈo |\n|-------|------------------|-----------|\n| Starter e Start (Standard) | AtГ© 4 horas Гәteis | AtГ© 24 horas Гәteis |\n| Pro (PrioritГЎrio) | AtГ© 1 hora Гәtil | AtГ© 8 horas Гәteis |\n\n6.5. Incidentes crГӯticos que impeГ§am o uso integral da plataforma serГЈo tratados com prioridade mГЎxima, independentemente do plano contratado.\n\n---\n\n## CLГҒUSULA 7ВӘ. DOS DADOS E DA PRIVACIDADE\n\n7.1. Todos os dados inseridos pelo CONTRATANTE na plataforma sГЈo de propriedade exclusiva do CONTRATANTE. A CONTRATADA atua como operadora dos dados pessoais nos termos da Lei nВә 13.709/2018 (LGPD).\n\n7.2. A plataforma opera em regime de multi-tenancy com isolamento lГіgico de dados. Os dados de cada CONTRATANTE sГЈo armazenados de forma segregada, impedindo o acesso por outros contratantes.\n\n7.3. A CONTRATADA nГЈo utilizarГЎ os dados do CONTRATANTE para finalidades distintas da prestaГ§ГЈo do serviГ§o contratado, salvo quando necessГЎrio para cumprir obrigaГ§ГЈo legal ou regulatГіria, ou mediante consentimento prГ©vio e expresso do CONTRATANTE.\n\n7.4. A CONTRATADA adotarГЎ medidas tГ©cnicas e administrativas adequadas para proteger os dados pessoais contra acessos nГЈo autorizados, destruiГ§ГЈo, perda, alteraГ§ГЈo ou qualquer forma de tratamento inadequado ou ilГӯcito, em conformidade com a LGPD.\n\n7.5. Em caso de incidente de seguranГ§a que comprometa dados pessoais do CONTRATANTE, a CONTRATADA comunicarГЎ o fato ao CONTRATANTE em atГ© 48 (quarenta e oito) horas apГіs a tomada de conhecimento, indicando a natureza dos dados afetados, as medidas adotadas e as recomendaГ§Гөes para mitigaГ§ГЈo de riscos.\n\n7.6. A integraГ§ГЈo com o sistema HubSoft (ERP do CONTRATANTE) serГЎ realizada mediante API, com transferГӘncia de dados estritamente necessГЎrios Г  operaГ§ГЈo dos mГіdulos contratados. O CONTRATANTE Г© responsГЎvel por garantir que possui base legal adequada para o compartilhamento desses dados.\n\n7.7. O tratamento de dados pessoais serГЎ regido pela PolГӯtica de Privacidade da CONTRATADA, disponГӯvel em [URL], que Г© parte integrante deste contrato.\n\n---\n\n## CLГҒUSULA 8ВӘ. DA PROPRIEDADE INTELECTUAL\n\n8.1. A plataforma AuroraISP, incluindo seu cГіdigo fonte, arquitetura, interfaces, algoritmos, modelos de inteligГӘncia artificial, documentaГ§ГЈo e materiais correlatos, Г© de propriedade exclusiva da CONTRATADA, protegida pelas leis de propriedade intelectual e direitos autorais vigentes no Brasil.\n\n8.2. O presente forme ClГЎusula 10ВӘ.\n\n---\n\n## CLГҒUSULA 14ВӘ. DAS DISPOSIГҮГ•ES GERAIS\n\n14.1. Este contrato constitui o acordo integral entre as partes com relaГ§ГЈo ao seu objeto, substituindo todas as negociaГ§Гөes, entendimentos e acordos anteriores, verbais ou escritos.\n\n14.2. Nenhuma alteraГ§ГЈo ou aditamento a este contrato serГЎ vГЎlido, salvo se formalizado por escrito e assinado por ambas as partes.\n\n14.3. A tolerГўncia de qualquer das partes quanto ao descumprimento de qualquer obrigaГ§ГЈo pela outra parte nГЈo constituirГЎ renГәncia, novaГ§ГЈo ou precedente.\n\n14.4. Caso qualquer clГЎusula deste contrato seja considerada invГЎlida ou inexequГӯvel, as demais clГЎusulas permanecerГЈo em pleno vigor e efeito.\n\n14.5. O CONTRATANTE nГЈo poderГЎ ceder ou transferir os direitos e obrigaГ§Гөes decorrentes deste contrato sem o consentimento prГ©vio e por escrito da CONTRATADA.\n\n14.6. As comunicaГ§Гөes entre as partes poderГЈo ser realizadas por e-mail, sendo consideradas vГЎlidas quando enviadas para os endereГ§os cadastrados.\n\n---\n\n## CLГҒUSULA 15ВӘ. DO FORO\n\n15.1. As partes elegem o foro da Comarca de Teresina, Estado do PiauГӯ, para dirimir quaisquer controvГ©rsias oriundas deste contrato, com renГәncia expressa a qualquer outro, por mais privilegiado que seja.\n\n---\n\n## ASSINATURAS\n\nTeresina/PI, [DATA].\n\n&nbsp;\n\n_______________________________________________\n**CONTRATADA:** AURORAISP TECNOLOGIA LTDA.\nNome: [NOME DO REPRESENTANTE]\nCPF: [CPF]\nCargo: [CARGO]\n\n&nbsp;\n\n_______________________________________________\n**CONTRATANTE:** [RAZГғO SOCIAL]\nNome: [NOME DO REPRESENTANTE]\nCPF: [CPF]\nCargo: [CARGO]\n\n&nbsp;\n\n_______________________________________________\n**TESTEMUNHA 1**\nNome: [NOME]\nCPF: [CPF]\n\n&nbsp;\n\n_______________________________________________\n**TESTEMUNHA 2**\nNome: [NOME]\nCPF: [CPF]\n\n---\n\n## ANEXO I. MГ“DULOS E PLANOS CONTRATADOS\n\n| MГіdulo | Plano | Mensalidade | Transacional |\n|--------|-------|------- oa natural.\n\n**c) Titular:** pessoa natural a quem se referem os dados pessoais que sГЈo objeto de tratamento.\n\n**d) Controlador:** pessoa natural ou jurГӯdica, de direito pГәblico ou privado, a quem competem as decisГөes referentes ao tratamento de dados pessoais.\n\n**e) Operador:** pessoa natural ou jurГӯdica, de direito pГәblico ou privado, que realiza o tratamento de dados pessoais em nome do controlador.\n\n**f) Tratamento:** toda operaГ§ГЈo realizada com dados pessoais, como coleta, produГ§ГЈo, recepГ§ГЈo, classificaГ§ГЈo, utilizaГ§ГЈo, acesso, reproduГ§ГЈo, transmissГЈo, distribuiГ§ГЈo, processamento, arquivamento, armazenamento, eliminaГ§ГЈo, avaliaГ§ГЈo, controle, modificaГ§ГЈo, comunicaГ§ГЈo, transferГӘncia, difusГЈo ou extraГ§ГЈo.\n\n**g) ANPD:** Autoridade Nacional de ProteГ§ГЈo de Dados, ГіrgГЈo da administraГ§ГЈo pГәblica responsГЎvel por zelar, implementar e fiscalizar o cumprimento da LGPD.\n\n---\n\n## 3. PAPГүIS NO TRATAMENTO DE DADOS\n\n3.1. A Aurora atua em dois papГ©is distintos no tratamento de dados pessoais:\n\n**a) Como Controladora:** em relaГ§ГЈo aos dados pessoais dos representantes legais e colaboradores dos CONTRATANTES, coletados para fins de cadastro, faturamento, suporte e comunicaГ§Гөes relacionadas ao contrato.\n\n**b) Como Operadora:** em relaГ§ГЈo aos dados pessoais de clientes e leads dos CONTRATANTES, inseridos na Plataforma pelo CONTRATANTE para fins de operaГ§ГЈo dos mГіdulos contratados (Comercial, Marketing e CS). Nesse caso, o CONTRATANTE Г© o Controlador dos dados.\n\n3.2. Quando atua como Operadora, a Aurora trata os dados pessoais estritamente conforme as instruГ§Гөes e finalidades definidas pelo CONTRATANTE (Controlador), em conformidade com o Contrato de PrestaГ§ГЈo de ServiГ§o SaaS.\n\n---\n\n## 4. DADOS PESSOAIS COLETADOS\n\n4.1. **Dados dos representantes e colaboradores do CONTRATANTE (Aurora como Controladora):**\n\n| Categoria | Dados |\n|-----------|-------|\n| IdentificaГ§ГЈo | Nome completo, CPF, RG |\n|
