 ela vГӘ tudo ao vivo e vocГӘs decidem juntos.\"\n\n---\n\n## DiagnГіstico completo\n\n### OperaГ§ГЈo\n\n> \"Quantos leads chegam mais ou menos por mГӘs? Pode ser uma estimativa.\"\n\n> \"E de quantas viram venda? Sabe mais ou menos a taxa?\"\n\n> \"Qual o ticket mГ©dio do plano que mais vendem?\"\n\n> \"Hoje os leads chegam principalmente por onde, WhatsApp, indicaГ§ГЈo, trГЎfego pago?\"\n\n### Time\n\n> \"Quantas pessoas vocГӘs tГӘm no comercial hoje no total?\"\n\n> \"Tem alguГ©m sГі para backoffice, tipo lanГ§ar no sistema, gerar contrato, essas coisas?\"\n\n### Ferramentas\n\n> \"Como vocГӘs gerenciam os leads hoje, tem algum sistema ou Г© mais no WhatsApp e planilha?\"\n\n> \"Usam alguma ferramenta de CRM?\"\n\n### Dores\n\n> \"Me conta onde vocГӘs perdem mais lead no processo. Гү no primeiro contato, na hora dos documentos, na demora para ativar?\"\n\n> \"Quanto tempo leva em mГ©dia do lead chegar atГ© o cliente ser ativado no HubSoft?\"\n\n> \"VocГӘs tГӘm problema com churn, cancelamento, cliente indo embora?\"\n\n### Objetivos\n\n> \"O que vocГӘs querem melhorar no comercial nos prГіximos meses?\"\n\n---\n\n## Encerramento e agendamento\n\n> \"Perfeito, obrigado. Com essas informaГ§Гөes consigo montar uma demo bem personalizada para vocГӘs.\"\n\n> \"JГЎ calculei aqui: com o volume de vocГӘs, a Aurora pagaria por si mesma no primeiro mГӘs. Vou mostrar isso ao vivo na demo.\"\n\n> \"Quando vocГӘ tem 30 minutos para a gente fazer isso? Pode ser essa semana.\"\n\n---\n\n## Resumo para registrar apГіs a conversa\n\nApГіs a conversa, registrar:\n\n| Campo | Resposta |\n|-------|----------|\n| Nome e provedor | |\n| ERP | |\n| Clientes ativos | |\n| Leads/mГӘs | |\n| Vendas digitais/mГӘs | |\n| Ticket mГ©dio | |\n| Pessoas no comercial | |\n| Maior dor | |\n| Decisor presente na demo? | |\n| Qualificado? (sim/nГЈo) | |\n| Data da demo agendada | |\n"}]}, {"t": "d", "n": "treinamento_parceiro", "ch": [{"t": "f", "n": "Modulo 01 Visao Geral", "fn": "modulo_01_visao_geral.md", "c": "# MГіdulo 1 вҖ” VisГЈo Geral da AuroraISP\n\n**Trilha de Treinamento do Parceiro Comercial**\n**DuraГ§ГЈo estimada:** 30 minutos de leitura + discussГЈo\n\n---\n\n## 1. O que Г© a AuroraISP\n\nA AuroraISP Г© um hub de tecnologia com inteligГӘncia artificial feito para provedores de internet. Ela automatiza trГӘs ГЎreas da operaГ§ГЈo do provedor: o processo comercial (vendas), o marketing e o sucesso do cliente (retenГ§ГЈo e fidelizaГ§ГЈo).\n\n**Tagline:** Vende mais. Perde menos. Fideliza sempre.\n\n**Em uma frase:** do lead ao cliente fidelizado com inteligГӘncia. O provedor conecta a Aurora ao HubSoft e ganha um time digital que qualifica leads, coleta documentos, gera contratos, ativa clientes e ainda cuida da retenГ§ГЈo.\n\nA Aurora nГЈo substitui o vendedor. Ela libera o vendedor para fazer o que ele faz de melhor: vender. Todo o resto (coleta de documento, contrato, ativaГ§ГЈo no ERP) Г© automГЎtico.\n\n---\n\n## 2. O problema que a Aurora resolve\n\nProvedores de internet regionais enfrentam trГӘs problemas graves no dia a dia:\n\n### Processo comercial manual e desorganizado\nO lead chega no WhatsApp. O vendedor atende quando pode. Pede documento por mensagem. Gera contrato manualmente. Digita os dados no HubSoft. Cada etapa depende de uma pessoa fazer algo. Resultado: leads perdidos, vendas demoradas, retrabalho constante.\n\n### Falta de integraГ§ГЈo entre ferramentas\nO provedor usa WhatsApp de um lado, planilha do outro, HubSoft para faturamento. Nada conversa entre si. O gerente nГЈo sabe quantos leads entraram, quantos estГЈo parados, quantos foram perdidos. Cobra o time sem dado nenhum.\n\n### Churn invisГӯvel\nO cliente cancela e ninguГ©m sabe por quГӘ. NГЈo existe programa de fidelizaГ§ГЈo, nГЈo existe acompanhamento pГіs-venda, nГЈo existe prevenГ§ГЈo. O provedor descobre o cancelamento quando jГЎ perdeu o cliente.\n\n**A Aurora resolve os trГӘs problemas em uma plataforma integrada.**\n\n---\n\n## 3. Os trГӘs mГіdulos do Hub\n\nA AuroraISP Г© composta por trГӘs mГіdulos que funcionam juntos, mas podem ser contratados separadamente.\n\n### MГіdulo Comercial (disponГӯvel, em produГ§ГЈo)\n\nAutomatiza todo o fluxo de vendas: do lead no WhatsApp atГ© a ativaГ§ГЈo no HubSoft.\n\n**O que faz:**\n- Bot qualifica o lead automaticamente\n- Coleta documentos (RG, CPF, comprovante) via WhatsApp\n- Gera contrato automaticamente\n- Ativa o cliente direto no HubSoft\n- CRM Kanban para gestГЈo visual do pipeline (plano Pro)\n\n**Para quem vender:** qualquer provedor que recebe leads no WhatsApp e usa HubSoft. Este Г© o mГіdulo de entrada.\n\n### MГіdulo Marketing (em desenvolvimento)\n\nMotor de automaГ§ГЈo do hub. Cuida de campanhas, nutriГ§ГЈo de leads e comunicaГ§ГЈo com a base.\n\n**O que vai fazer:**\n- Disparos de e-mail e WhatsApp\n- RГ©guas de automaГ§ГЈo prontas para o provedor usar no primeiro dia\n- Rastreamento de campanhas e atribuiГ§ГЈo\n- GestГЈo de trГЎfego pago com IA (plano Pro)\n\n**Para quem vender:** provedores que jГЎ usam o Comercial e querem aumentar a geraГ§ГЈo de leads.\n\n### MГіdulo CS вҖ” Customer Success (em desenvolvimento)\n\nRetenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda. O mГіdulo que garante que o cliente nГЈo cancela.\n\n**O que vai fazer:**\n- Clube de BenefГӯcios (jГЎ migrado do sistema legado)\n- PrevenГ§ГЈo de churn com IA\n- NPS e pesquisas de satisfaГ§ГЈo\n- Upsell automatizado\n\n**Para quem vender:** provedores com base grande que perdem clientes e nГЈo sabem por quГӘ.\n\n---\n\n## 4. A vantagem competitiva\n\n### IntegraГ§ГЈo HubSoft nativa e profunda\n\nEste Г© o diferencial mais forte da Aurora. Nenhum concorrente faz integraГ§ГЈo real com o HubSoft. A Aurora nГЈo apenas \"conecta\" ao HubSoft. Ela lГӘ dados, valida informaГ§Гөes, gera contratos no padrГЈo do ERP e ativa o cliente diretamente no sistema. Sem digitaГ§ГЈo manual, sem importaГ§ГЈo de planilha, sem erro humano.\n\n**Quando o prospect perguntar \"mas o que vocГӘs fazem que os outros nГЈo fazem?\", a resposta Г© esta:** integraГ§ГЈo HubSoft de verdade. Do WhatsApp ao ERP, sem ninguГ©m no meio.\n\n### Case de produГ§ГЈo (anГҙnimo)\n\nEstes nГәmeros sГЈo reais, de um provedor que jГЎ usa a Aurora em produГ§ГЈo:\n\n| Dado | NГәmero |\n|------|--------|\n| Clientes ativos | 30.000 |\n| Leads por mГӘs | 1.000 |\n| Vendas digitais por mГӘs | 400 |\n| Ticket mГ©dio | R$ 99,90 |\n| Time antes da Aurora | 8 pessoas |\n| Time depois da Aurora | 2 pessoas no atendimento + 2 no backoffice estratГ©gico |\n| Economia anual em pessoal | R$ 284.400 |\n\n**Frase de impacto:** \"2 pessoas fazem o que 8 faziam. O processo ficou mais eficiente, nГЈo mais lento.\"\n\nUse esses nГәmeros em toda apresentaГ§ГЈo. Eles provam que a Aurora funciona em escala real.\n\n---\n\n## 5. ICP вҖ” Perfil Ideal de Cliente\n\nNem todo provedor Г© um bom prospect. O ICP da Aurora Г© bem definido:\n\n| CritГ©rio | MГӯnimo | Ideal |\n|----------|--------|-------|\n| Clientes ativos | 500 | 2.000 a 50.000 |\n| Vendedores ou atendentes | 2 | 5 a 20 |\n| ERP | HubSoft (obrigatГіrio para trial) | HubSoft |\n| Canal de vendas | WhatsApp ativo | WhatsApp + trГЎfego pago |\n| Decisor acessГӯvel | Sim | Dono ou gerente comercial direto |\n\n### Desqualificadores imediatos\n\nNГЈo perca tempo com provedores que:\n- TГӘm menos de 500 clientes ativos\n- NГЈo fazem venda digital (sГі presencial)\n- NГЈo usam WhatsApp para atendimento comercial\n- NГЈo dГЈo acesso ao decisor\n\n### Onde encontrar o ICP\n\n- Grupos de WhatsApp e Telegram de provedores\n- Comunidades ABRINT e ABRI\n- Eventos do setor (ISP Summit, MeetISP, feiras regionais)\n- IndicaГ§Гөes de provedores que jГЎ usam a Aurora\n- Grupos de usuГЎrios HubSoft\n\n---\n\n## 6. Posicionamento no mercado\n\nA Aurora nГЈo Г© uma ferramenta de WhatsApp. NГЈo Г© um chatbot. NГЈo Г© um CRM genГ©rico.\n\n**A Aurora Г© o hub de tecnologia com IA do provedor de internet.** Ela cuida de todo o ciclo: da aquisiГ§ГЈo do cliente atГ© a fidelizaГ§ГЈo. Tudo integrado ao HubSoft.\n\n### Versus o concorrente principal (ISPRO AI)\n\n| CritГ©rio | AuroraISP | ISPRO AI |\n|----------|-----------|----------|\n| Case real de produГ§ГЈo | Sim (30k clientes, 400 vendas/mГӘs) | NГЈo publicado |\n| IntegraГ§ГЈo HubSoft profunda | Sim, nativa | NГЈo comprovada |\n| PreГ§o pГәblico e transparente | Sim | NГЈo disponГӯvel |\n| MГіdulos alГ©m do comercial | Marketing + CS (em desenvolvimento) | Foco apenas em IA |\n\n**Quando mencionarem o ISPRO:** \"A gente tem um case real com 30.000 clientes e 400 vendas digitais por mГӘs. Funciona hoje, em produГ§ГЈo. Se eles tambГ©m tГӘm, peГ§a os nГәmeros.\"\n\n---\n\n## Checklist de fixaГ§ГЈo\n\nApГіs estudar este mГіdulo, vocГӘ deve conseguir responder:\n\n- [ ] O que Г© a AuroraISP em uma frase?\n- [ ] Quais sГЈo os trГӘs mГіdulos e o que cada um faz?\n- [ ] Qual o diferencial principal da Aurora?\n- [ ] Quais sГЈo os nГәmeros do case de produГ§ГЈo?\n- [ ] Qual o perfil ideal de cliente (ICP)?\n- [ ] Por que a Aurora Г© diferente do ISPRO AI?\n- [ ] Quais sГЈo os desqualificadores imediatos de um prospect?\n\n---\n\n*PrГіximo mГіdulo: [MГіdulo 2 вҖ” Comercial a Fundo](modulo_02_comercial.md)*\n"}, {"t": "f", "n": "Modulo 02 Comercial", "fn": "modulo_02_comercial.md", "c": "# MГіdulo 2 вҖ” MГіdulo Comercial a Fundo\n\n**Trilha de Treinamento do Parceiro Comercial**\n**DuraГ§ГЈo estimada:** 40 minutos de leitura + prГЎtica\n\n---\n\n## 1. O fluxo completo: do WhatsApp ao HubSoft\n\nEste Г© o coraГ§ГЈo da Aurora. O fluxo que vocГӘ vai mostrar em toda demo. Memorize cada etapa.\n\n```\nLead entra no WhatsApp\n      вҶ“\nBot qualifica (nome, endereГ§o, plano desejado)\n      вҶ“\nBot coleta documentos (RG, CPF, comprovante de endereГ§o)\n      вҶ“\nSistema valida os documentos\n      вҶ“\nContrato gerado automaticamente\n      вҶ“\nCliente assina o contrato digital\n      вҶ“\nDados enviados para o HubSoft\n      вҶ“\nCliente ativado no ERP вҖ” pronto para instalar\n```\n\n**Tempo total do fluxo:** pode ser concluГӯdo em minutos, sem intervenГ§ГЈo humana. O vendedor sГі entra quando precisa (modo manual sempre disponГӯvel).\n\n### O que acontece em cada etapa\n\n**QualificaГ§ГЈo automГЎtica:** o bot faz as perguntas certas no WhatsApp. Nome completo, endereГ§o, plano de interesse, viabilidade tГ©cnica. O lead chega ao vendedor jГЎ qualificado.\n\n**Coleta de documentos:** o bot pede RG, CPF e comprovante de endereГ§o direto no WhatsApp. O cliente envia as fotos e o sistema processa. Sem o vendedor precisar ficar cobrando documento.\n\n**GeraГ§ГЈo de contrato:** com os dados e documentos validados, o sistema gera o contrato no padrГЈo do provedor automaticamente. Usa WeasyPrint para geraГ§ГЈo de PDF profissional.\n\n**AtivaГ§ГЈo no HubSoft:** os dados do novo cliente sГЈo enviados direto para o HubSoft via API. O provedor abre o ERP e o cliente jГЎ estГЎ lГЎ, pronto para ativaГ§ГЈo tГ©cnica. Sem digitaГ§ГЈo manual.\n\n---\n\n## 2. Start versus Pro: o que muda\n\n### Comercial Starter (R$ 397/mГӘs)\n\n| Item | Detalhe |\n|------|---------|\n| UsuГЎrios | 1 a 2 |\n| Bot de qualificaГ§ГЈo | Sim |\n| Coleta de documentos | Sim |\n| GeraГ§ГЈo de contrato | Sim |\n| AtivaГ§ГЈo no HubSoft | Sim |\n| AutomaГ§Гөes de follow-up | NГЈo |\n| RelatГіrios | NГЈo |\n| CRM Kanban | NГЈo |\n| Suporte | Standard |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP pequeno, atГ© 2.000 clientes, 1 a 2 vendedores. Quer automatizar o bГЎsico.\n\n### Comercial Start (R$ 797/mГӘs)\n\n| Item | Detalhe |\n|------|---------|\n| UsuГЎrios | AtГ© 5 |\n| Tudo do Starter | Sim |\n| AutomaГ§Гөes de follow-up | Sim |\n| RelatГіrios bГЎsicos | Sim |\n| CRM Kanban | NГЈo |\n| Suporte | Standard |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP mГ©dio, 2.000 a 10.000 clientes, time de 3 a 5 vendedores. Precisa de mais controle e acompanhamento.\n\n### Comercial Pro (R$ 1.397/mГӘs)\n\n| Item | Detalhe |\n|------|---------|\n| UsuГЎrios | Ilimitado |\n| Tudo do Start | Sim |\n| CRM Kanban completo | Sim |\n| AutomaГ§Гөes avanГ§adas | Sim |\n| ValidaГ§ГЈo com IA | Sim |\n| RelatГіrios completos | Sim |\n| Suporte | PrioritГЎrio |\n| Transacional | R$ 7 por venda finalizada no ERP |\n\n**Para quem:** ISP grande, acima de 10.000 clientes, time de 5+ vendedores. Precisa de pipeline visual, IA e relatГіrios para gestГЈo.\n\n### Como apresentar a diferenГ§a\n\n\"O Starter automatiza o processo. O Start adiciona controle e relatГіrios. O Pro dГЎ visГЈo estratГ©gica completa com CRM e IA.\"\n\nA recomendaГ§ГЈo inicial depende do porte. Na dГәvida, comece pelo Start. Гү o plano que atende a maioria dos provedores e tem espaГ§o para crescer.\n\n---\n\n## 3. Roteiro de demo ao vivo do Comercial\n\nEsta Г© a sequГӘncia que vocГӘ vai seguir em toda demo. Pratique atГ© conseguir fazer sem consultar.\n\n### PreparaГ§ГЈo (antes da demo)\n\n- Confirmar que o ambiente de demo estГЎ funcionando\n- Ter os dados do prospect prontos (nГәmero de clientes, leads/mГӘs, vendedores, ticket mГ©dio)\n- Ter a simulaГ§ГЈo de ROI calculada com os nГәmeros do prospect\n- Testar a conexГЈo com o HubSoft de demo\n\n### SequГӘncia da demo\n\n**Abertura (5 min)**\n\nConfirme o contexto do prospect. Use as informaГ§Гөes do diagnГіstico.\n\n> \"Pelo que conversamos, vocГӘs recebem [X] leads por mГӘs no WhatsApp, tГӘm [Y] vendedores e hoje o processo de venda leva [Z] dias do lead atГ© a ativaГ§ГЈo. Correto?\"\n\nValide a dor principal:\n\n> \"O que mais te incomoda no processo atual?\"\n\n**Fluxo do lead ao vivo (10 min)**\n\nMostre o fluxo real, passo a passo:\n\n1. Envie uma mensagem para o nГәmero de demo como se fosse um lead\n2. Mostre o bot qualificando (fazendo perguntas, coletando dados)\n3. Mostre a coleta de documentos (envie fotos de teste)\n4. Mostre o contrato sendo gerado automaticamente\n5. Mostre os dados aparecendo no painel da Aurora\n\n**Dica:** vГЎ narrando cada etapa. \"Veja, o lead acabou de mandar o documento. O sistema jГЎ validou. Agora o contrato estГЎ sendo gerado. Pronto, em 30 segundos.\"\n\n**AtivaГ§ГЈo no HubSoft (5 min)**\n\nMostre os dados chegando no HubSoft de demo. Este Г© o momento de maior impacto.\n\n> \"Pronto. O cliente jГЎ estГЎ no HubSoft. NinguГ©m digitou nada. NinguГ©m copiou dado de planilha. Foi direto do WhatsApp para o ERP.\"\n\n**CRM Kanban вҖ” sГі se for mostrar o Pro (5 min)**\n\nMostre o pipeline visual:\n- Leads por etapa (qualificaГ§ГЈo, documentos, contrato, ativaГ§ГЈo)\n- Tempo parado em cada etapa\n- Alertas de leads que precisam de atenГ§ГЈo\n\n> \"Esse lead estГЎ parado hГЎ 3 dias na etapa de documento. O sistema jГЎ avisou o vendedor. Sem o CRM, esse lead estaria perdido.\"\n\n**NГәmeros e ROI (5 min)**\n\nApresente o case de produГ§ГЈo e compare com os nГәmeros do prospect:\n\n> \"Um provedor com 30.000 clientes faz 400 vendas digitais por mГӘs com a Aurora. 2 pessoas fazem o que 8 faziam. Economia de R$ 284.400 por ano. Com os seus [X] leads por mГӘs e [Y] vendedores, a conta fica assim...\"\n\nMostre a simulaГ§ГЈo de ROI personalizada.\n\n**PrГіximos passos (5 min)**\n\n> \"VocГӘ usa HubSoft, certo? EntГЈo a gente libera 14 dias gratuitos para vocГӘs testarem com seus dados reais. Quando podemos configurar?\"\n\n---\n\n## 4. MГ©tricas que vendem\n\nMemorize estes nГәmeros. Use em toda conversa.\n\n| MГ©trica | NГәmero |\n|---------|--------|\n| Vendas digitais por mГӘs (case) | 400 |\n| Leads processados por mГӘs (case) | 1.000 |\n| Pessoas no atendimento antes | 8 |\n| Pessoas no atendimento depois | 2 (+ 2 em backoffice estratГ©gico) |\n| Economia anual em pessoal | R$ 284.400 |\n| Ticket mГ©dio do case | R$ 99,90 |\n| Receita digital mensal (case) | R$ 39.960 |\n| Clientes ativos do case | 30.000 |\n\n### Contexto para cada mГ©trica\n\n**\"400 vendas digitais por mГӘs\"** вҖ” significa que 400 clientes foram do WhatsApp atГ© a ativaГ§ГЈo no HubSoft sem intervenГ§ГЈo manual no processo operacional.\n\n**\"2 pessoas fazem o que 8 faziam\"** вҖ” a Aurora nГЈo demitiu 6 pessoas. Ela liberou 6 pessoas. 2 ficaram no atendimento com muito mais eficiГӘncia, 2 foram para backoffice estratГ©gico (funГ§ГЈo que antes nГЈo existia). As demais foram realocadas.\n\n**\"R$ 284.400 por ano\"** вҖ” calculado com base em: 6 pessoas Г— R$ 3.950/mГӘs (salГЎrio + encargos estimados) Г— 12 meses.\n\n---\n\n## 5. CГЎlculo de ROI para o prospect\n\nUse esta fГіrmula durante a demo, com os nГәmeros reais do prospect:\n\n```\nReceita digital mensal = vendas digitais/mГӘs Г— ticket mГ©dio\nCusto atual do time = pessoas no comercial Г— R$ 3.950/mГӘs\nCusto da Aurora = mensalidade + (vendas Г— R$ 7)\nROI = receita digital / custo da Aurora\nEconomia = custo atual do time вҲ’ custo mГӯnimo com Aurora\n```\n\n### Exemplo com prospect de 5.000 clientes\n\n| Dado | Valor |\n|------|-------|\n| Leads por mГӘs | 200 |\n| Vendas digitais estimadas | 80 |\n| Ticket mГ©dio | R$ 89,90 |\n| Vendedores atuais | 4 |\n| Receita digital mensal | R$ 7.192 |\n| Custo do time atual | 4 Г— R$ 3.950 = R$ 15.800/mГӘs |\n| Custo Aurora (Start) | R$ 797 + (80 Г— R$ 7) = R$ 1.357/mГӘs |\n| ROI | 5,3x |\n| Economia potencial mensal | R$ 15.800 вҲ’ R$ 7.900 (2 pessoas) = R$ 7.900/mГӘs |\n\n> \"Com a Aurora, vocГӘ pode manter 2 vendedores em vez de 4 e ainda vender mais. A economia paga o sistema 5 vezes.\"\n\n---\n\n## Checklist de fixaГ§ГЈo\n\nApГіs estudar este mГіdulo, vocГӘ deve conseguir:\n\n- [ ] Descrever o fluxo completo do lead ao HubSoft sem consultar\n- [ ] Explicar a diferenГ§a entre Starter, Start e Pro\n- [ ] Conduzir a demo ao vivo seguindo o roteiro\n- [ ] Calcular o ROI para qualquer prospect usando a fГіrmula\n- [ ] Citar de memГіria os nГәmeros do case de produГ§ГЈo\n- [ ] Explicar por que \"2 pessoas fazem o que 8 faziam\" sem parecer que houve demissГЈo\n\n---\n\n*PrГіximo mГіdulo: [MГіdulo 3 вҖ” Marketing e CS](modulo_03_marketing_cs.md)*\n"}, {"t": "f", "n": "Modulo 03 Marketing Cs", "fn": "modulo_03_marketing_cs.md", "c": "# MГіdulo 3 вҖ” Marketing e CS\n\n**Trilha de Treinamento do Parceiro Comercial**\n**DuraГ§ГЈo estimada:** 30 minutos de leitura + discussГЈo\n\n---\n\n## 1. Por que vocГӘ precisa conhecer esses mГіdulos\n\nO Comercial Г© a porta de entrada. Гү o mГіdulo que jГЎ funciona, que tem case de produГ§ГЈo e que vende hoje. Mas a estratГ©gia da Aurora Г© de expansГЈo: o provedor entra pelo Comercial e, ao longo do tempo, adiciona Marketing e CS.\n\nVocГӘ precisa saber o que esses mГіdulos fazem por trГӘs razГөes:\n\n1. **Na demo, o prospect vai perguntar.** \"VocГӘs sГі fazem o comercial?\" VocГӘ precisa responder com seguranГ§a.\n2. **O cross-sell aumenta sua comissГЈo.** Cada mГіdulo adicionado Г© mais receita recorrente.\n3. **A visГЈo completa do hub Г© o diferencial.** Nenhum concorrente oferece automaГ§ГЈo comercial + marketing + CS integrados para ISPs.\n\n---\n\n## 2. MГіdulo Marketing\n\n### O que Г©\n\nO motor de automaГ§ГЈo do hub. Cuida de toda comunicaГ§ГЈo com leads e clientes nos canais digitais.\n\n### O que vai fazer\n\n| Funcionalidade | Starter | Start | Pro |\n|----------------|---------|-------|-----|\n| Disparos de WhatsApp e e-mail | Sim | Sim | Sim |\n| RГ©guas de automaГ§ГЈo prontas | Sim | Sim | Sim |\n| Fluxos personalizados | NГЈo | Sim | Sim |\n| Rastreamento de campanhas | NГЈo | Sim | Sim |\n| NutriГ§ГЈo avanГ§ada de leads | NГЈo | NГЈo | Sim |\n| Upsell de SVA | NГЈo | NГЈo | Sim |\n| OtimizaГ§ГЈo de trГЎfego com IA | NГЈo | NГЈo | Sim |\n| RelatГіrios de atribuiГ§ГЈo | NГЈo | NГЈo | Sim |\n\n### RГ©guas de automaГ§ГЈo prontas\n\nEste Г© um diferencial importante. O provedor nГЈo precisa criar nada do zero. A Aurora entrega rГ©guas prontas para cenГЎrios comuns:\n\n- **Boas-vindas:** novo lead recebe mensagem automГЎtica com prГіximos passos\n- **Follow-up de lead frio:** lead que nГЈo respondeu recebe lembrete depois de 24h, 48h e 72h\n- **AniversГЎrio de contrato:** cliente recebe mensagem no aniversГЎrio de 1 ano como cliente\n- **Upgrade:** cliente em plano bГЎsico recebe oferta de upgrade com condiГ§Гөes especiais\n- **ReativaГ§ГЈo:** lead que desistiu do processo recebe campanha de reativaГ§ГЈo apГіs 30 dias\n\n### PrecificaГ§ГЈo do Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 297/mГӘs | R$ 597/mГӘs | R$ 997/mГӘs |\n| Transacional | R$ 0,05 por contato na base/mГӘs | R$ 0,05 por contato na base/mГӘs | R$ 0,05 por contato na base/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n\n### Como apresentar na demo\n\n> \"Hoje a gente estГЎ mostrando o Comercial, que Г© o mГіdulo pronto e em produГ§ГЈo. Mas a Aurora Г© um hub completo. O mГіdulo de Marketing vai cuidar de toda automaГ§ГЈo de comunicaГ§ГЈo do provedor: e-mail, WhatsApp, rГ©guas prontas para usar no primeiro dia. E o melhor: tudo integrado com o Comercial. O lead que entrou pelo Marketing jГЎ alimenta o pipeline do Comercial automaticamente.\"\n\n**NГЈo prometa datas de lanГ§amento.** Diga apenas que estГЎ em desenvolvimento e que os clientes que entrarem agora pelo Comercial terГЈo prioridade no acesso.\n\n---\n\n## 3. MГіdulo CS (Customer Success)\n\n### O que Г©\n\nO mГіdulo de retenГ§ГЈo e fidelizaГ§ГЈo. Cuida do cliente depois que ele virou assinante.\n\n### O que vai fazer\n\n| Funcionalidade | Starter | Start | Pro |\n|----------------|---------|-------|-----|\n| Clube de BenefГӯcios | Sim | Sim | Sim |\n| RГ©guas bГЎsicas de retenГ§ГЈo (via Marketing) | Sim | Sim | Sim |\n| NPS e pesquisas de satisfaГ§ГЈo | NГЈo | Sim | Sim |\n| RelatГіrios de saГәde da base | NГЈo | Sim | Sim |\n| PrevenГ§ГЈo de churn com IA | NГЈo | NГЈo | Sim |\n| Upsell automatizado | NГЈo | NГЈo | Sim |\n| RelatГіrios avanГ§ados | NГЈo | NГЈo | Sim |\n\n### Clube de BenefГӯcios\n\nO Clube de BenefГӯcios jГЎ foi desenvolvido e testado (migrado do sistema legado megaroleta). Funciona assim:\n\n- O provedor oferece benefГӯcios exclusivos para clientes ativos (descontos em parceiros locais, sorteios, vantagens)\n- O cliente acessa pelo app ou portal e vГӘ seus benefГӯcios\n- Parceiros locais (farmГЎcias, restaurantes, lojas) entram no clube como parceiros de benefГӯcios\n- O cliente fica porque vale a pena ficar, e nГЈo apenas pelo plano de internet\n\n**Frase de impacto:** \"Cliente que tem vantagem nГЈo cancela.\"\n\n### PrecificaГ§ГЈo do CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 247/mГӘs | R$ 497/mГӘs | R$ 897/mГӘs |\n| Transacional | R$ 0,15 por cliente ativo no clube/mГӘs | R$ 0,15 por cliente ativo no clube/mГӘs | R$ 0,15 por cliente ativo no clube/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n\n### Como apresentar na demo\n\n> \"AlГ©m de vender, a Aurora ajuda a reter. O mГіdulo de CS traz um Clube de BenefГӯcios para o provedor oferecer aos clientes. O cliente ganha descontos em parceiros locais, sorteios, vantagens exclusivas. Isso reduz cancelamento e aumenta o tempo de vida do cliente. O Clube jГЎ existe e funciona. Os recursos avanГ§ados de prevenГ§ГЈo de churn com IA estГЈo em desenvolvimento.\"\n\n---\n\n## 4. O que estГЎ pronto versus o que estГЎ em desenvolvimento\n\nSeja sempre transparente sobre isso. Credibilidade Г© mais importante que empolgaГ§ГЈo.\n\n| MГіdulo | Funcionalidade | Status |\n|--------|---------------|--------|\n| Comercial | Fluxo completo (lead вҶ’ HubSoft) | вң… Em produГ§ГЈo |\n| Comercial | CRM Kanban | вң… Em produГ§ГЈo (Pro) |\n| CS | Clube de BenefГӯcios | вң… Desenvolvido, integrando ao hub |\n| Marketing | Disparos e rГ©guas | Em desenvolvimento |\n| Marketing | TrГЎfego pago com IA | Em desenvolvimento |\n| CS | NPS | Em desenvolvimento |\n| CS | PrevenГ§ГЈo de churn com IA | Em desenvolvimento |\n\n**Regra de ouro:** venda o que estГЎ pronto. Mostre o que estГЎ vindo como visГЈo de futuro, nunca como promessa com data.\n\n---\n\n## 5. EstratГ©gia de cross-sell\n\nA jornada natural de expansГЈo do cliente Г©:\n\n```\nComercial (entrada)\n    вҶ“\nMarketing (aumentar geraГ§ГЈo de leads)\n    вҶ“\nCS (reter os clientes que o Comercial trouxe)\n    вҶ“\nStack completo\n```\n\n### Gatilhos para oferecer Marketing\n\n- O provedor reclama que nГЈo gera leads suficientes\n- O provedor faz trГЎfego pago sem rastreamento\n- O provedor envia WhatsApp manualmente para a base\n- O provedor nГЈo faz follow-up com leads que nГЈo fecharam\n\n### Gatilhos para oferecer CS\n\n- O provedor tem churn acima de 3% ao mГӘs\n- O provedor nГЈo tem programa de fidelizaГ§ГЈo\n- O provedor nГЈo mede satisfaГ§ГЈo do cliente\n- O provedor perde cliente para concorrente regional que oferece \"mimos\"\n\n### SimulaГ§ГЈo de stack completo\n\nPara um provedor Start (mГ©dio), o stack completo custa:\n\n| MГіdulo | Custo mensal |\n|--------|-------------|\n| Comercial Start | R$ 1.847 (mensalidade + transacional) |\n| Marketing Start | R$ 697 |\n| CS Start | R$ 947 |\n| **Total** | **R$ 3.491/mГӘs** |\n\nA receita digital gerada (150 vendas Г— R$ 99,90) Г© de R$ 14.985/mГӘs. O ROI do stack completo Г© de 4,3x.\n\n> \"O stack completo custa menos de 20% da receita digital gerada. E isso sem contar a economia em pessoal.\"\n\n---\n\n## 6. Perguntas frequentes sobre Marketing e CS\n\n**\"Quando vai ficar pronto?\"**\n\"Estamos trabalhando ativamente nisso. Os clientes que entrarem agora pelo Comercial terГЈo acesso prioritГЎrio. Posso te avisar assim que estiver disponГӯvel para teste.\"\n\n**\"Posso esperar e contratar tudo junto?\"**\n\"Pode, claro. Mas o Comercial jГЎ estГЎ gerando resultado em produГ§ГЈo. Cada mГӘs sem ele Г© lead perdido e venda que nГЈo aconteceu. E quem entrar agora terГЎ condiГ§Гөes melhores na expansГЈo.\"\n\n**\"O Clube de BenefГӯcios funciona mesmo?\"**\n\"Sim. Ele foi desenvolvido e testado em um provedor real. Estamos integrando ao hub da Aurora para que funcione junto com os outros mГіdulos.\"\n\n**\"Preciso do Marketing para o Comercial funcionar?\"**\n\"NГЈo. O Comercial funciona de forma independente. O Marketing Г© uma camada adicional que potencializa a geraГ§ГЈo de leads, mas o Comercial processa os leads que jГЎ chegam no WhatsApp do provedor.\"\n\n---\n\n## Checklist de fixaГ§ГЈo\n\nApГіs estudar este mГіdulo, vocГӘ deve conseguir:\n\n- [ ] Explicar o que o mГіdulo Marketing faz sem prometer datas\n- [ ] Descrever o Clube de BenefГӯcios do CS com clareza\n- [ ] Diferenciar o que estГЎ pronto do que estГЎ em desenvolvimento\n- [ ] Identificar gatilhos de cross-sell durante a conversa com o prospect\n- [ ] Responder \"quando vai ficar pronto?\" sem perder credibilidade\n- [ ] Calcular o custo do stack completo para um provedor mГ©dio\n\n---\n\n*PrГіximo mГіdulo: [MГіdulo 4 вҖ” PrecificaГ§ГЈo e ROI](modulo_04_precificacao_roi.md)*\n"}, {"t": "f", "n": "Modulo 04 Precificacao Roi", "fn": "modulo_04_precificacao_roi.md", "c": "# MГіdulo 4 вҖ” PrecificaГ§ГЈo e ROI\n\n**Trilha de Treinamento do Parceiro Comercial**\n**DuraГ§ГЈo estimada:** 40 minutos de leitura + prГЎtica com simulaГ§Гөes\n\n---\n\n## 1. Como funciona o modelo de precificaГ§ГЈo\n\nA Aurora usa um modelo inspirado no HubSpot: **mensalidade fixa por mГіdulo + valor transacional variГЎvel mensal.**\n\nO provedor paga uma mensalidade pelo plano escolhido (Starter, Start ou Pro) e um valor variГЎvel que escala conforme o uso real.\n\n### Por que esse modelo Г© bom para o prospect\n\n- **NГЈo tem limite de volume.** O provedor pode processar quantos leads quiser.\n- **O transacional substitui os limites.** Em vez de \"vocГӘ tem direito a 100 leads\", o provedor paga proporcionalmente ao que usa.\n- **Quanto mais o provedor cresce, mais paga, mas sempre com ROI positivo.** O custo nunca supera o benefГӯcio.\n\n### O transacional por mГіdulo\n\n| MГіdulo | Evento cobrado | Valor |\n|--------|---------------|-------|\n| Comercial | Venda finalizada e validada no ERP | R$ 7 por venda |\n| Marketing | Contato na base de leads | R$ 0,05 por contato/mГӘs |\n| CS | Cliente ativo no clube | R$ 0,15 por cliente/mГӘs |\n\n**Importante:** o transacional do Comercial sГі Г© cobrado quando a venda Г© confirmada no HubSoft. Se o lead nГЈo virou cliente, nГЈo cobra. O provedor sГі paga quando vende.\n\n---\n\n## 2. Tabela de preГ§os completa\n\n### Comercial\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 397/mГӘs | R$ 797/mГӘs | R$ 1.397/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Transacional | R$ 7/venda | R$ 7/venda | R$ 7/venda |\n| Suporte | Standard | Standard | PrioritГЎrio |\n\n### Marketing\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 297/mГӘs | R$ 597/mГӘs | R$ 997/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Transacional | R$ 0,05/contato/mГӘs | R$ 0,05/contato/mГӘs | R$ 0,05/contato/mГӘs |\n| Suporte | Standard | Standard | PrioritГЎrio |\n\n### CS\n\n| | Starter | Start | Pro |\n|-|---------|-------|-----|\n| Mensalidade | R$ 247/mГӘs | R$ 497/mГӘs | R$ 897/mГӘs |\n| UsuГЎrios | 1 a 2 | AtГ© 5 | Ilimitado |\n| Transacional | R$ 0,15/cliente/mГӘs | R$ 0,15/cliente/mГӘs | R$ 0,15/cliente/mГӘs |\n| Suporte | Standard | Standard | PrioritГЎrio |\n\n### Escada de preГ§o\n\nA proporГ§ГЈo entre os planos Г© **1 : 2 : 3,5** (Starter : Start : Pro). Isso Г© consistente em todos os mГіdulos. Ajuda a posicionar o Start como o melhor custo-benefГӯcio para a maioria dos provedores.\n\n---\n\n## 3. SimulaГ§Гөes de ROI por porte\n\n### Provedor pequeno (500 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mГӘs | ~50 |\n| Vendas digitais estimadas | 15 a 30 |\n| Vendedores | 1 a 2 |\n| Ticket mГ©dio | R$ 79,90 |\n| Plano recomendado | Comercial Starter |\n\n**CГЎlculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 397 |\n| Transacional (20 vendas Г— R$ 7) | R$ 140 |\n| **Custo total Aurora** | **R$ 537/mГӘs** |\n| Receita digital (20 Г— R$ 79,90) | R$ 1.598/mГӘs |\n| **ROI** | **3x** |\n\n**Como apresentar:** \"Por menos de R$ 600 por mГӘs, vocГӘ automatiza todo o processo comercial. Cada venda digital gera quase R$ 80 de receita recorrente. O sistema se paga com 7 vendas.\"\n\n---\n\n### Provedor mГ©dio (2.000 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mГӘs | ~200 |\n| Vendas digitais estimadas | 80 a 150 |\n| Vendedores | 3 a 5 |\n| Ticket mГ©dio | R$ 89,90 |\n| Plano recomendado | Comercial Start |\n\n**CГЎlculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 797 |\n| Transacional (100 vendas Г— R$ 7) | R$ 700 |\n| **Custo total Aurora** | **R$ 1.497/mГӘs** |\n| Receita digital (100 Г— R$ 89,90) | R$ 8.990/mГӘs |\n| Custo do time atual (4 pessoas) | R$ 15.800/mГӘs |\n| Custo do time com Aurora (2 pessoas) | R$ 7.900/mГӘs |\n| **ROI** | **6x** |\n| **Economia em pessoal** | **R$ 7.900/mГӘs = R$ 94.800/ano** |\n\n**Como apresentar:** \"Com a Aurora, vocГӘ mantГ©m 2 vendedores em vez de 4, o sistema custa R$ 1.500 por mГӘs e gera quase R$ 9.000 em receita digital. A economia em pessoal sozinha jГЎ paga o sistema 5 vezes.\"\n\n---\n\n### Provedor grande (10.000 clientes)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mГӘs | ~500 |\n| Vendas digitais estimadas | 200 a 300 |\n| Vendedores | 6 a 10 |\n| Ticket mГ©dio | R$ 99,90 |\n| Plano recomendado | Comercial Pro |\n\n**CГЎlculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 1.397 |\n| Transacional (250 vendas Г— R$ 7) | R$ 1.750 |\n| **Custo total Aurora** | **R$ 3.147/mГӘs** |\n| Receita digital (250 Г— R$ 99,90) | R$ 24.975/mГӘs |\n| Custo do time atual (8 pessoas) | R$ 31.600/mГӘs |\n| Custo do time com Aurora (3 pessoas) | R$ 11.850/mГӘs |\n| **ROI** | **7,9x** |\n| **Economia em pessoal** | **R$ 19.750/mГӘs = R$ 237.000/ano** |\n\n**Como apresentar:** \"Com 10.000 clientes e 8 vendedores, a conta Г© clara. A Aurora custa R$ 3.100 por mГӘs e gera quase R$ 25.000 em receita digital. VocГӘ pode operar com 3 pessoas, economizando quase R$ 20.000 por mГӘs. SГЈo R$ 237.000 por ano.\"\n\n---\n\n### Provedor muito grande (30.000 clientes вҖ” o case real)\n\n| Dado | Valor |\n|------|-------|\n| Leads por mГӘs | 1.000 |\n| Vendas digitais | 400 |\n| Ticket mГ©dio | R$ 99,90 |\n| Plano | Comercial Pro |\n\n**CГЎlculo:**\n\n| Item | Valor |\n|------|-------|\n| Mensalidade | R$ 1.397 |\n| Transacional (400 vendas Г— R$ 7) | R$ 2.800 |\n| **Custo total Aurora** | **R$ 4.197/mГӘs** |\n| Receita digital (400 Г— R$ 99,90) | R$ 39.960/mГӘs |\n| Economia anual em pessoal | R$ 284.400 |\n| **ROI** | **9,5x** |\n\n---\n\n## 4. PolГӯtica de trial\n\n**14 dias gratuitos** para provedores que usam HubSoft como ERP.\n\nSem trial para provedores com outros ERPs. A integraГ§ГЈo nativa Г© com HubSoft e o trial precisa funcionar perfeitamente para converter.\n\n### Como usar o trial no fechamento\n\n> \"VocГӘ usa HubSoft, certo? EntГЈo a gente libera 14 dias gratuitos para vocГӘ testar com seus dados reais. Sem compromisso. Se nГЈo funcionar para vocГӘs, cancela sem custo. Quando podemos configurar?\"\n\nO trial Г© o argumento mais forte para quem usa HubSoft. Use sempre.\n\n---\n\n## 5. Bundles e descontos\n\nOs bundles com desconto para quem contratar mais de um mГіdulo ainda estГЈo sendo definidos. Por enquanto, nГЈo ofereГ§a desconto por conta prГіpria.\n\n**Regra:** se o prospect pedir desconto, a resposta Г©:\n\n> \"O preГ§o jГЎ estГЎ calibrado para entregar ROI positivo em qualquer porte. Um contrato a mais por mГӘs jГЎ paga o sistema. Mas se vocГӘs quiserem contratar mais de um mГіdulo, posso verificar condiГ§Гөes especiais com a Aurora.\"\n\nNesse caso, escale para o CEO.\n\n---\n\n## 6. Como apresentar o preГ§o\n\n### PrincГӯpio: ancore na economia, nГЈo no custo\n\nNunca comece falando o preГ§o. Sempre comece pelos nГәmeros do prospect.\n\n**Errado:** \"O plano Start custa R$ 797 por mГӘs mais R$ 7 por venda.\"\n\n**Certo:**\n1. Primeiro, calcule a economia de pessoal do prospect\n2. Depois, mostre a receita digital que a Aurora gera\n3. Por fim, revele o custo como fraГ§ГЈo da economia\n\n> \"Com os seus nГәmeros, a economia em pessoal seria de R$ 7.900 por mГӘs. A receita digital gerada seria de R$ 8.990 por mГӘs. O custo da Aurora? R$ 1.497. Menos de 10% do que vocГӘ economiza.\"\n\n### ComparaГ§ГЈo com contrataГ§ГЈo\n\nUse esta tabela quando o prospect hesitar sobre o preГ§o:\n\n| Item | Custo mensal |\n|------|-------------|\n| 1 vendedor CLT (salГЎrio + encargos) | ~R$ 3.950 |\n| Aurora Starter | R$ 537 (com transacional) |\n| Aurora Start | R$ 1.497 (com transacional) |\n| Aurora Pro | R$ 3.147 (com transacional) |\n\n> \"A Aurora Pro custa menos que um vendedor CLT. E ela nГЈo tira fГ©rias, nГЈo falta, nГЈo erra ao digitar no HubSoft e atende Г  noite.\"\n\n### SequГӘncia de apresentaГ§ГЈo do preГ§o\n\n1. Recapitule os nГәmeros do prospect (leads, vendas, time, custo)\n2. Mostre a simulaГ§ГЈo de ROI com os dados dele\n3. Mostre a economia em pessoal\n4. Revele o custo como fraГ§ГЈo da economia\n5. Pergunte: \"Faz sentido testar 14 dias gratuitos?\"\n\n---\n\n## 7. Sua comissГЈo\n\nVocГӘ recebe **30% do lucro lГӯquido** gerado pelos clientes que trouxer. Isso inclui mensalidade e transacional, apГіs deduГ§ГЈo dos custos operacionais.\n\nQuanto mais o cliente cresce, mais vocГӘ ganha. O modelo transacional beneficia vocГӘ tambГ©m.\n\n### SimulaГ§ГЈo de comissГЈo\n\nPara um cliente Comercial Start com 100 vendas/mГӘs:\n\n| Item | Valor |\n|------|-------|\n| Receita Aurora | R$ 1.497/mГӘs |\n| Margem estimada (~60%) | R$ 898/mГӘs |\n| Sua comissГЈo (30%) | ~R$ 269/mГӘs |\n| **Anual por cliente** | **~R$ 3.230** |\n\nCom 10 clientes nesse perfil: **~R$ 32.300 por ano** em comissГЈo recorrente.\n\n---\n\n## Checklist de fixaГ§ГЈo\n\nApГіs estudar este mГіdulo, vocГӘ deve conseguir:\n\n- [ ] Explicar o modelo de precificaГ§ГЈo (mensalidade + transacional) sem consultar\n- [ ] Calcular o custo total da Aurora para qualquer porte\n- [ ] Fazer a simulaГ§ГЈo de ROI ao vivo durante a demo\n- [ ] Apresentar o preГ§o ancorado na economia, nunca isolado\n- [ ] Usar o trial de 14 dias como argumento de fechamento\n- [ ] Saber quando escalar para o CEO (pedidos de desconto, bundles)\n- [ ] Explicar por que a Aurora Г© mais barata que contratar gente\n\n---\n\n*PrГіximo mГіdulo: [MГіdulo 5 вҖ” ObjeГ§Гөes e Fechamento](modulo_05_objecoes_fechamento.md)*\n"}, {"t": "f", "n": "Modulo 05 Objecoes Fechamento", "fn": "modulo_05_objecoes_fechamento.md", "c": "# MГіdulo 5 вҖ” ObjeГ§Гөes e Fechamento\n\n**Trilha de Treinamento do Parceiro Comercial**\n**DuraГ§ГЈo estimada:** 45 minutos de leitura + prГЎtica de role-play\n\n---\n\n## 1. As 10 objeГ§Гөes mais comuns e como responder\n\nPara cada objeГ§ГЈo: entenda o que o prospect realmente estГЎ dizendo, valide a preocupaГ§ГЈo e redirecione com fatos.\n\n---\n\n### ObjeГ§ГЈo 1: \"Гү caro\"\n\n**O que ele estГЎ dizendo:** \"NГЈo entendi o valor. Estou comparando com o custo, nГЈo com o retorno.\"\n\n**Resposta:**\n\n> \"Entendo a preocupaГ§ГЈo. Vamos olhar por outro Гўngulo. Quanto custa um vendedor CLT para vocГӘ hoje? Uns R$ 3.950 por mГӘs com encargos. A Aurora Start custa R$ 1.497 e faz o trabalho operacional de vГЎrios vendedores. Um provedor parecido com o seu economizou R$ 284.400 por ano em pessoal. O sistema se paga com 7 vendas no mГӘs. Todo o resto Г© lucro.\"\n\n**Se insistir:**\n\n> \"Cada lead que vocГӘ perde hoje por falta de acompanhamento Г© receita que nГЈo entra. Se sГЈo 10 leads perdidos por mГӘs a R$ 99,90, sГЈo quase R$ 12.000 por ano que vocГӘ deixa na mesa. O custo de nГЈo ter a Aurora Г© maior do que o custo de ter.\"\n\n---\n\n### ObjeГ§ГЈo 2: \"JГЎ tenho um sistema\"\n\n**O que ele estГЎ dizendo:** \"NГЈo quero trocar tudo. Tenho medo de mais complexidade.\"\n\n**Resposta:**\n\n> \"A Aurora nГЈo substitui o que vocГӘ jГЎ tem. Ela complementa. VocГӘ usa o HubSoft para faturamento e ERP, certo? A Aurora cuida de tudo que vem antes: a venda. Do WhatsApp ao HubSoft, sem vocГӘ precisar mudar nada no seu ERP. Na verdade, a Aurora melhora o uso do HubSoft porque os dados chegam limpos e validados.\"\n\n**Se ele tiver um CRM genГ©rico:**\n\n> \"CRM genГ©rico nГЈo integra com o HubSoft. VocГӘ digita os dados duas vezes. A Aurora elimina isso. O dado vai direto do WhatsApp para o ERP, sem retrabalho.\"\n\n---\n\n### ObjeГ§ГЈo 3: \"NГЈo uso HubSoft\"\n\n**O que ele estГЎ dizendo:** \"VocГӘs funcionam para mim?\"\n\n**Resposta:**\n\n> \"Hoje nossa integraГ§ГЈo mais profunda Г© com o HubSoft. Гү onde a gente entrega o maior valor, porque o dado vai direto do WhatsApp atГ© o ERP sem intervenГ§ГЈo. Para outros ERPs, a automaГ§ГЈo do fluxo comercial funciona (qualificaГ§ГЈo, documentos, contrato), mas a ativaГ§ГЈo automГЎtica no ERP depende de integraГ§ГЈo especГӯfica. Podemos conversar sobre o seu caso.\"\n\n**Importante:** nГЈo ofereГ§a trial. O trial Г© exclusivo para HubSoft. Se o provedor usar outro ERP, alinhe expectativas e, se necessГЎrio, escale para o CEO para avaliar viabilidade.\n\n---\n\n### ObjeГ§ГЈo 4: \"Preciso ver funcionando\"\n\n**O que ele estГЎ dizendo:** \"Estou interessado, mas quero prova.\"\n\n**Isso Г© bom.** Significa que ele quer comprar, sГі precisa de seguranГ§a.\n\n**Resposta:**\n\n> \"Perfeito. A gente faz uma demo ao vivo de 30 minutos. VocГӘ vai ver o fluxo real: lead entrando no WhatsApp, bot qualificando, documentos sendo coletados e o dado chegando no HubSoft. Tudo ao vivo, sem slide. Quando funciona para vocГӘ?\"\n\n**Se ele quiser testar com os dados dele:**\n\n> \"Se vocГӘ usa HubSoft, a gente libera 14 dias gratuitos para vocГӘ testar com seus leads reais. Sem compromisso.\"\n\n---\n\n### ObjeГ§ГЈo 5: \"Vou pensar\"\n\n**O que ele estГЎ dizendo:** \"NГЈo estou convencido o suficiente\" ou \"Preciso consultar outra pessoa.\"\n\n**Resposta (descubra o real motivo):**\n\n> \"Claro, faz sentido. SГі para eu entender melhor: Г© sobre o investimento, sobre a funcionalidade ou vocГӘ precisa alinhar com mais alguГ©m?\"\n\n**Se for sobre o investimento:** volte para o ROI. RefaГ§a a conta com os nГәmeros dele.\n\n**Se precisar alinhar com outro decisor:**\n\n> \"Entendo perfeitamente. Quer que a gente marque uma segunda reuniГЈo rГЎpida incluindo ele? Assim eu mostro os nГәmeros diretamente e respondo as dГәvidas dele. Qual o melhor dia?\"\n\n**Regra de ouro:** nunca saia da conversa sem um prГіximo passo concreto. Uma data marcada, um material a enviar, algo tangГӯvel.\n\n---\n\n### ObjeГ§ГЈo 6: \"Quem garante que funciona?\"\n\n**O que ele estГЎ dizendo:** \"Quero prova social. Quero saber que alguГ©m jГЎ testou.\"\n\n**Resposta:**\n\n> \"Temos um provedor com 30.000 clientes usando a Aurora em produГ§ГЈo. SГЈo 1.000 leads por mГӘs, 400 vendas digitais. 2 pessoas fazem o que 8 faziam. Economia de R$ 284.400 por ano. Funciona hГЎ meses, com dados reais, em escala real.\"\n\n**Se pedir para falar com o cliente:**\n\n> \"Por questГЈo de contrato, nГЈo podemos divulgar o nome do provedor. Mas os nГәmeros sГЈo verificГЎveis e o resultado estГЎ em produГ§ГЈo. AlГ©m disso, vocГӘ pode testar 14 dias gratuitos e ver o resultado nos seus prГіprios dados.\"\n\n---\n\n### ObjeГ§ГЈo 7: \"NГЈo tenho equipe tГ©cnica\"\n\n**O que ele estГЎ dizendo:** \"Tenho medo de nГЈo conseguir implementar ou manter.\"\n\n**Resposta:**\n\n> \"A implementaГ§ГЈo Г© inteira por conta da Aurora. A gente configura, testa e entrega funcionando. O onboarding leva aproximadamente 1 hora. Seu time nГЈo precisa de conhecimento tГ©cnico nenhum. A interface foi feita para vendedor usar, nГЈo para programador. E as atualizaГ§Гөes sГЈo automГЎticas, sem vocГӘ precisar fazer nada.\"\n\n**Reforce:**\n\n> \"Seu TI nГЈo vai precisar manter nada. Гү SaaS. A Aurora cuida de tudo: servidor, atualizaГ§ГЈo, integraГ§ГЈo com HubSoft. Se der qualquer problema, nosso suporte resolve.\"\n\n---\n\n### ObjeГ§ГЈo 8: \"E se eu cancelar?\"\n\n**O que ele estГЎ dizendo:** \"NГЈo quero ficar preso.\"\n\n**Resposta:**\n\n> \"Sem fidelidade. O contrato Г© mensal. Se nГЈo funcionar para vocГӘ, cancela no mГӘs seguinte. Seus dados ficam disponГӯveis para exportaГ§ГЈo. A gente confia que o resultado fala por si. Por isso oferecemos 14 dias gratuitos para quem usa HubSoft.\"\n\n**Reforce a confianГ§a:**\n\n> \"Nenhum cliente que viu o resultado cancelou por insatisfaГ§ГЈo. A Aurora se paga com poucas vendas por mГӘs. Quando o provedor vГӘ o nГәmero, ele expande, nГЈo cancela.\"\n\n---\n\n### ObjeГ§ГЈo 9: \"VocГӘs sГЈo novos no mercado\"\n\n**O que ele estГЎ dizendo:** \"Tenho medo de apostar em algo que pode sumir.\"\n\n**Resposta:**\n\n> \"A tecnologia da Aurora estГЎ em produГ§ГЈo hГЎ meses em um provedor com 30.000 clientes. NГЈo Г© um MVP, nГЈo Г© protГіtipo. SГЈo 400 vendas digitais por mГӘs passando pelo sistema, todo dia. O que estamos fazendo agora Г© abrir para outros provedores o que jГЎ funciona. VocГӘ nГЈo Г© cobaia. VocГӘ Г© dos primeiros a ter acesso a algo que jГЎ foi validado em escala.\"\n\n**Vire a vantagem:**\n\n> \"Ser dos primeiros clientes tem uma vantagem: atendimento direto, personalizaГ§ГЈo do onboarding e prioridade em novas funcionalidades. Quando tivermos 100 clientes, esse nГӯvel de atenГ§ГЈo nГЈo vai existir.\"\n\n---\n\n### ObjeГ§ГЈo 10: \"O ISPRO faz a mesma coisa\"\n\n**O que ele estГЎ dizendo:** \"Vi o concorrente. Quero saber por que vocГӘs sГЈo melhores.\"\n\n**Resposta:**\n\n> \"Г“timo que vocГӘ estГЎ comparando. EntГЈo me responde: eles mostraram um case real para vocГӘ? Com nГәmeros de produГ§ГЈo? Quantas vendas por mГӘs, quantos clientes, quanta economia? A Aurora tem um case com 30.000 clientes, 400 vendas digitais por mГӘs e R$ 284.400 de economia anual. Tudo verificГЎvel. Se eles tambГ©m tГӘm, peГ§a os nГәmeros.\"\n\n**Aprofunde:**\n\n> \"A integraГ§ГЈo com HubSoft Г© nativa na Aurora. NГЈo Г© uma API genГ©rica. O dado vai do WhatsApp ao ERP com validaГ§ГЈo, contrato e ativaГ§ГЈo automГЎtica. Confirme se o ISPRO faz isso com o HubSoft. A gente tem preГ§o pГәblico e transparente. Eles publicam o preГ§o?\"\n\n**Regra:** nunca fale mal do concorrente. Apenas pergunte o que eles entregam. Os fatos fazem o trabalho.\n\n---\n\n## 2. TГ©cnicas de fechamento para donos de ISP\n\n### Fechamento por trial\n\nPara quem usa HubSoft. O mais direto e eficaz.\n\n> \"VocГӘ jГЎ viu o fluxo funcionando. Usa HubSoft. A gente libera 14 dias gratuitos para testar com seus dados. Sem compromisso. Quando podemos configurar?\"\n\n### Fechamento por custo de inaГ§ГЈo\n\nPara quem estГЎ hesitando.\n\n> \"Cada mГӘs sem a Aurora, vocГӘ perde leads que nГЈo sГЈo acompanhados. Se sГЈo 20 leads perdidos por mГӘs a R$ 99,90, sГЈo quase R$ 24.000 por ano. O custo de nГЈo ter Г© maior do que o custo de ter.\"\n\n### Fechamento por comparaГ§ГЈo salarial\n\nPara quem reclama do preГ§o.\n\n> \"A Aurora Pro custa menos que um vendedor CLT. E ela nГЈo tira fГ©rias, nГЈo falta, nГЈo erra ao digitar no HubSoft e atende de madrugada.\"\n\n### Fechamento por exclusividade\n\nPara quem Г© competitivo na regiГЈo.\n\n> \"Se o seu concorrente na cidade contratar a Aurora antes de vocГӘ, ele vai vender mais rГЎpido, com menos gente, e com custo menor. Quando vocГӘ for reagir, ele jГЎ vai estar operando com IA.\"\n\n### Fechamento por prГіximo passo simples\n\nSempre finalize com uma aГ§ГЈo concreta, nГЈo com uma pergunta aberta.\n\n**Errado:** \"O que vocГӘ acha?\"\n**Certo:** \"Quando podemos configurar o trial? TerГ§a ou quinta funciona para vocГӘ?\"\n\n---\n\n## 3. CadГӘncia de follow-up apГіs a demo\n\nQuando o prospect nГЈo fecha na hora, execute este processo sem falta.\n\n| Dia | AГ§ГЈo | Canal |\n|-----|------|-------|\n| D+0 | Enviar deck de apoio com mensagem personalizada | WhatsApp |\n| D+2 | Follow-up leve | WhatsApp |\n| D+5 | Enviar simulaГ§ГЈo de ROI com os nГәmeros do prospect | WhatsApp + e-mail |\n| D+10 | Гҡltima tentativa com nova proposta ou encerrar ciclo | WhatsApp |\n\n### Mensagens de follow-up\n\n**D+0 (logo apГіs a demo):**\n\n> \"[Nome], foi Гіtimo conversar. Conforme combinamos, segue o material com o resumo da Aurora e a simulaГ§ГЈo com os nГәmeros de vocГӘs. Qualquer dГәvida, estou aqui.\"\n\n**D+2:**\n\n> \"[Nome], ficou alguma dГәvida depois que vocГӘ viu o material? Se quiser, posso esclarecer por mensagem mesmo ou a gente marca 10 minutos rГЎpidos.\"\n\n**D+5:**\n\n> \"[Nome], preparei uma simulaГ§ГЈo detalhada de ROI com os dados que vocГӘ me passou. Com [X] leads por mГӘs e [Y] vendedores, a economia estimada Г© de R$ [Z] por ano. Segue o documento. Quando podemos ativar o trial?\"\n\n**D+10:**\n\n> \"[Nome], sei que estГЎ corrido. Гҡltimo contato sobre isso: se fizer sentido testar a Aurora, a gente libera 14 dias gratuitos para vocГӘs verem o resultado com dados reais. Se nГЈo for o momento, sem problema. Fico Г  disposiГ§ГЈo para quando fizer sentido.\"\n\n### Regras do follow-up\n\n- **Nunca mande mais de uma mensagem por dia**\n- **Sempre personalize.** Use o nome e os nГәmeros do prospect.\n- **Se nГЈo responder apГіs D+10**, mova para nutriГ§ГЈo de longo prazo. NГЈo insista.\n- **Se responder com objeГ§ГЈo**, volte Г  seГ§ГЈo 1 deste mГіdulo e trate a objeГ§ГЈo antes de tentar fechar novamente.\n\n---\n\n## 4. Quando escalar para o CEO\n\nNГЈo tente resolver tudo sozinho. Escale para o CEO nos seguintes cenГЎrios:\n\n| CenГЎrio | Por que escalar |\n|---------|-----------------|\n| Prospect pede desconto que vocГӘ nГЈo pode dar | PreГ§o Г© definido pela Aurora |\n| Prospect quer contratar mais de um mГіdulo e pede bundle | Bundles ainda em definiГ§ГЈo |\n| Prospect usa outro ERP (nГЈo HubSoft) e quer integraГ§ГЈo | Requer avaliaГ§ГЈo tГ©cnica |\n| Prospect Г© muito grande (acima de 50.000 clientes) | Pode precisar de plano customizado |\n| Prospect quer falar com a \"empresa\" antes de fechar | Credibilidade institucional |\n| ObjeГ§ГЈo tГ©cnica que vocГӘ nГЈo consegue responder | Melhor escalar do que inventar resposta |\n\n### Como escalar\n\n> \"[Nome do CEO], tenho um prospect com perfil [descrever porte e situaГ§ГЈo]. Ele [descrever objeГ§ГЈo ou pedido]. Preciso de apoio para [descrever o que precisa]. Pode entrar numa call rГЎpida?\"\n\nSempre informe o contexto completo. O CEO nГЈo deve entrar na conversa sem saber o que jГЎ foi discutido.\n\n---\n\n## 5. CenГЎrios de fechamento\n\n### CenГЎrio A: fecha na hora\n\n1. Confirmar plano escolhido\n2. Se usa HubSoft: ativar trial de 14 dias\n3. Se usa outro ERP: assinar contrato mensal\n4. Agendar onboarding com o time da Aurora (aproximadamente 1 hora)\n5. Enviar mensagem de boas-vindas com prГіximos passos\n\n### CenГЎrio B: precisa de outro decisor\n\n1. Marcar segunda reuniГЈo incluindo o sГіcio ou diretor\n2. Enviar deck de apoio para o prospect apresentar internamente\n3. Preparar simulaГ§ГЈo de ROI personalizada para a segunda reuniГЈo\n4. Manter contato entre as reuniГөes (D+2, sem pressГЈo)\n\n### CenГЎrio C: quer pensar\n\n1. Descobrir o real motivo (investimento, funcionalidade ou alinhamento interno)\n2. Tratar a objeГ§ГЈo especГӯfica\n3. Definir data de retorno antes de encerrar\n4. Executar cadГӘncia de follow-up (D+0 a D+10)\n\n### CenГЎrio D: nГЈo fecha\n\n1. Registrar os motivos da recusa\n2. Mover para nutriГ§ГЈo de longo prazo\n3. Fazer contato leve a cada 45 a 60 dias\n4. Retomar quando houver novidade relevante (novo mГіdulo, novo case, novo recurso)\n\n**Regra absoluta:** nunca saia de uma conversa sem um prГіximo passo definido. Mesmo que seja \"vou te procurar em 45 dias com novidades.\"\n\n---\n\n## 6. Resumo das frases de impacto\n\nMemorize estas frases. Use conforme o contexto.\n\n| SituaГ§ГЈo | Frase |\n|----------|-------|\n| Abordagem | \"VocГӘ jГЎ perdeu lead essa semana por falta de acompanhamento no WhatsApp?\" |\n| Diferencial | \"Do WhatsApp ao HubSoft, sem ninguГ©m no meio.\" |\n| Prova social | \"2 pessoas fazem o que 8 faziam. R$ 284.400 de economia por ano.\" |\n| PreГ§o | \"Custa menos que um vendedor CLT. E nГЈo tira fГ©rias.\" |\n| ROI | \"O stack completo custa menos de 20% da receita digital gerada.\" |\n| Trial | \"14 dias gratuitos para testar com seus dados reais. Sem compromisso.\" |\n| UrgГӘncia | \"Cada mГӘs sem a Aurora Г© lead perdido e venda que nГЈo aconteceu.\" |\n| Concorrente | \"Se eles tambГ©m tГӘm case real, peГ§a os nГәmeros.\" |\n| Fechamento | \"Quando podemos configurar? TerГ§a ou quinta funciona?\" |\n\n---\n\n## Checklist de fixaГ§ГЈo\n\nApГіs estudar este mГіdulo, vocГӘ deve conseguir:\n\n- [ ] Responder todas as 10 objeГ§Гөes sem consultar\n- [ ] Usar pelo menos 3 tГ©cnicas de fechamento diferentes\n- [ ] Executar a cadГӘncia de follow-up sem esquecer nenhum passo\n- [ ] Saber exatamente quando escalar para o CEO\n- [ ] Conduzir o fechamento nos 4 cenГЎrios (fecha na hora, outro decisor, quer pensar, nГЈo fecha)\n- [ ] Recitar de memГіria as frases de impacto\n\n---\n\n**ParabГ©ns por concluir a trilha de treinamento.**\n\nApГіs estudar os 5 mГіdulos, o prГіximo passo Г© a prГЎtica: demo hands-on com o ambiente de teste da Aurora, simulando apresentaГ§Гөes reais com role-play de objeГ§Гөes. Agende com o CEO para a primeira sessГЈo prГЎtica.\n"}]}]}];

// в”Җв”Җ View switcher в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showView(v) {
  const isDocs = v === 'docs';
  document.getElementById('view-docs').style.display    = isDocs ? 'flex' : 'none';
  document.getElementById('view-backlog').style.display = isDocs ? 'none' : 'block';
  document.getElementById('sidebar').style.display      = isDocs ? 'block' : 'none';
  document.getElementById('search-input').style.display = isDocs ? 'block' : 'none';
  document.getElementById('btn-docs').classList.toggle('active', isDocs);
  document.getElementById('btn-backlog').classList.toggle('active', !isDocs);
}

// в”Җв”Җ Sidebar with accordions в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let allFiles = [];
let activeFileEl = null;

function countFiles(node) {
  if (node.t === 'f') return 1;
  return (node.ch || []).reduce((s, c) => s + countFiles(c), 0);
}

function buildTree(nodes, container, depth) {
  nodes.forEach(node => {
    if (node.t === 'd') {
      const fileCount = countFiles(node);
      const acc = document.createElement('div');
      acc.className = 'sb-accordion';

      const header = document.createElement('div');
      header.className = 'sb-acc-header';
      if (depth > 0) { header.style.paddingLeft = (12 + depth * 10) + 'px'; header.style.fontSize = '.74rem'; }
      header.innerHTML = `<i class="sb-icon bi bi-folder-fill"></i><span>${node.n}</span><span class="sb-count">(${fileCount})</span><i class="sb-arrow bi bi-chevron-right"></i>`;
      header.onclick = (e) => { e.preventDefault(); e.stopPropagation(); acc.classList.toggle('open'); return false; };

      const body = document.createElement('div');
      body.className = 'sb-acc-body';
      buildTree(node.ch || [], body, depth + 1);

      acc.appendChild(header);
      acc.appendChild(body);
      container.appendChild(acc);

    } else if (node.t === 'f') {
      const row = document.createElement('div');
      row.className = 'si' + (depth === 0 ? ' si-root' : '');
      row.innerHTML = `<i class="si-icon bi bi-file-earmark-text"></i><span>${node.n}</span>`;
      row.onclick = (e) => { e.stopPropagation(); openDoc(node, row); };
      container.appendChild(row);
      allFiles.push({ node, el: row });
    }
  });
}

function openDoc(node, el) {
  if (activeFileEl) activeFileEl.classList.remove('active');
  activeFileEl = el;
  el.classList.add('active');
  document.getElementById('breadcrumb-text').textContent = ' / ' + node.fn;
  const content = document.getElementById('doc-content');
  const html = marked.parse(node.c || '');
  content.innerHTML = `<div class="md">${html}</div>`;

  // render checkboxes
  content.querySelectorAll('li').forEach(li => {
    const t = li.childNodes[0];
    if (t && t.nodeType === 3) {
      const txt = t.textContent;
      if (/^\[( |x)\] /i.test(txt)) {
        const done = txt[1].toLowerCase() === 'x';
        const rest = txt.slice(4);
        li.innerHTML = `<input type="checkbox" ${done ? 'checked' : ''} disabled class="me-1">${rest}${li.innerHTML.replace(txt,'')}`;
      }
    }
  });

  // Transformar h2 em accordions
  convertH2ToAccordions(content.querySelector('.md'));

  document.getElementById('doc-panel').scrollTop = 0;
}

function convertH2ToAccordions(container) {
  if (!container) return;
  const children = Array.from(container.childNodes);
  const sections = [];
  let headerContent = []; // conteГәdo antes do primeiro h2 (tГӯtulo, intro)
  let currentSection = null;

  children.forEach(child => {
    if (child.nodeType === 1 && child.tagName === 'H2') {
      if (currentSection) sections.push(currentSection);
      currentSection = { title: child.textContent, elements: [] };
    } else if (currentSection) {
      currentSection.elements.push(child);
    } else {
      headerContent.push(child);
    }
  });
  if (currentSection) sections.push(currentSection);

  // Se tem menos de 2 seГ§Гөes h2, nГЈo vale converter
  if (sections.length < 2) return;

  // Limpar container
  container.innerHTML = '';

  // Re-adicionar o conteГәdo antes do primeiro h2 (tГӯtulo do doc)
  headerContent.forEach(el => container.appendChild(el));

  // Criar accordions
  sections.forEach((section, i) => {
    // Contar checkboxes na seГ§ГЈo
    const tempDiv = document.createElement('div');
    section.elements.forEach(el => tempDiv.appendChild(el.cloneNode(true)));
    const allChecks = tempDiv.querySelectorAll('li');
    let totalChecks = 0, doneChecks = 0;
    allChecks.forEach(li => {
      const txt = li.textContent.trim();
      if (/^\[.\]/.test(txt) || li.querySelector('input[type=checkbox]')) {
        totalChecks++;
        if (/^\[x\]/i.test(txt) || (li.querySelector('input[type=checkbox]') && li.querySelector('input[type=checkbox]').checked)) {
          doneChecks++;
        }
      }
    });
    // TambГ©m contar via emojis de status nas tabelas
    const allTds = tempDiv.querySelectorAll('td');
    let statusDone = 0, statusTotal = 0;
    allTds.forEach(td => {
      const t = td.textContent.trim();
      if (t === 'вң…' || t.startsWith('вң…')) { statusDone++; statusTotal++; }
      else if (t === 'вҸі' || t.startsWith('вҸі') || t === 'рҹҹЎ' || t.startsWith('рҹҹЎ') || t === 'рҹ”§' || t.startsWith('рҹ”§')) { statusTotal++; }
    });
    if (statusTotal > totalChecks) { totalChecks = statusTotal; doneChecks = statusDone; }

    const allDone = totalChecks > 0 && doneChecks === totalChecks;
    const hasTasks = totalChecks > 0;
    const pending = totalChecks - doneChecks;

    // Badge de progresso
    let badge = '';
    if (allDone) {
      badge = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;color:#16a34a;background:#dcfce7;padding:2px 8px;border-radius:99px;"><i class="bi bi-check-circle-fill"></i> Completo</span>`;
    } else if (hasTasks) {
      badge = `<span style="display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:600;color:#d97706;background:#fef3c7;padding:2px 8px;border-radius:99px;"><i class="bi bi-clock"></i> ${pending} pendente${pending > 1 ? 's' : ''}</span>`;
    }

    const acc = document.createElement('div');
    acc.className = 'content-accordion';
    const borderColor = allDone ? '#bbf7d0' : '#e2e8f0';
    acc.style.cssText = `margin-bottom:8px; border:1px solid ${borderColor}; border-radius:10px; overflow:hidden; background:#fff;`;
    if (allDone) acc.style.borderLeftWidth = '3px';
    if (allDone) acc.style.borderLeftColor = '#22c55e';

    const header = document.createElement('div');
    const headerBg = allDone ? '#f0fdf4' : '#f8fafc';
    header.style.cssText = `padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-weight:700; font-size:.9rem; color:#1e293b; background:${headerBg}; user-select:none; transition:background .1s;`;
    header.innerHTML = `<span style="flex:1;">${section.title}</span>${badge}<i class="bi bi-chevron-down" style="font-size:.7rem; color:#94a3b8; transition:transform .2s;"></i>`;

    const body = document.createElement('div');
    body.style.cssText = 'padding:0 16px 16px; display:none;';
    section.elements.forEach(el => body.appendChild(el));

    // Primeiro accordion aberto por padrГЈo
    if (i === 0) {
      body.style.display = 'block';
      header.querySelector('i').style.transform = 'rotate(180deg)';
      header.style.background = '#fff';
    }

    header.onmouseenter = () => { if (body.style.display === 'none') header.style.background = '#f1f5f9'; };
    header.onmouseleave = () => { header.style.background = body.style.display === 'none' ? '#f8fafc' : '#fff'; };

    header.onclick = (e) => {
      e.stopPropagation();
      const open = body.style.display === 'none';
      body.style.display = open ? 'block' : 'none';
      header.querySelector('i').style.transform = open ? 'rotate(180deg)' : 'rotate(0)';
      header.style.background = open ? '#fff' : '#f8fafc';
    };

    acc.appendChild(header);
    acc.appendChild(body);
    container.appendChild(acc);
  });
}

function searchDocs(q) {
  q = q.toLowerCase().trim();
  // expand all folders while searching
  document.querySelectorAll('.sf-children').forEach(el => {
    el.parentElement.classList.toggle('sf-open', !!q);
    const icon = el.parentElement.querySelector('.si-icon');
    if (icon) icon.className = `si-icon bi ${q ? 'bi-folder2-open' : 'bi-folder-fill'}`;
  });
  allFiles.forEach(({ node, el }) => {
    const match = !q
      || node.n.toLowerCase().includes(q)
      || node.fn.toLowerCase().includes(q)
      || (node.c || '').toLowerCase().includes(q);
    el.style.display = match ? 'flex' : 'none';
  });
}

// в”Җв”Җ Backlog в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const STATUS = {
  pendente:     { label: 'Pendente',     color: '#f97316', bg: '#fff7ed', icon: 'bi-clock-history',     statBg: '#fff7ed', statColor: '#f97316' },
  em_andamento: { label: 'Em andamento', color: '#3b82f6', bg: '#eff6ff', icon: 'bi-arrow-repeat',       statBg: '#eff6ff', statColor: '#3b82f6' },
  finalizada:   { label: 'Finalizada',   color: '#22c55e', bg: '#f0fdf4', icon: 'bi-check-circle',       statBg: '#f0fdf4', statColor: '#22c55e' },
};

function renderBacklog() {
  const wrap = document.getElementById('view-backlog');

  const byStatus = { pendente: [], em_andamento: [], finalizada: [] };
  TASKS.forEach(t => { if (byStatus[t.status]) byStatus[t.status].push(t); });
  const total = TASKS.length;

  // Stats
  const statsHtml = `
    <div class="row g-3 mb-4">
      ${['pendente','em_andamento','finalizada'].map(s => {
        const cfg = STATUS[s];
        const n = byStatus[s].length;
        return `
        <div class="col-sm-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:${cfg.statBg}">
              <i class="bi ${cfg.icon}" style="color:${cfg.statColor}"></i>
            </div>
            <div>
              <div class="stat-num">${n}</div>
              <div class="stat-label">${cfg.label}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
      <div class="col-sm-6 col-lg-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#f1f5f9">
            <i class="bi bi-list-task" style="color:#64748b"></i>
          </div>
          <div>
            <div class="stat-num">${total}</div>
            <div class="stat-label">Total</div>
          </div>
        </div>
      </div>
    </div>`;

  // Kanban
  const colsHtml = `
    <div class="row g-3 align-items-start">
      ${['pendente','em_andamento','finalizada'].map(s => {
        const cfg = STATUS[s];
        const cards = byStatus[s].map((t, i) => taskCardHtml(t, s + i, cfg.color)).join('');
        const empty = !byStatus[s].length ? `<div class="kb-empty"><i class="bi bi-inbox mb-2 d-block" style="font-size:1.5rem;opacity:.3"></i>Nenhuma tarefa</div>` : '';
        return `
        <div class="col-lg-4">
          <div class="kb-col">
            <div class="kb-header" style="border-left: 4px solid ${cfg.color}; background: ${cfg.bg}">
              <span class="kb-title" style="color:${cfg.color}">${cfg.label}</span>
              <span class="badge rounded-pill text-white" style="background:${cfg.color}">${byStatus[s].length}</span>
            </div>
            <div class="kb-body">${cards}${empty}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  wrap.innerHTML = statsHtml + colsHtml;
}

function taskCardHtml(t, uid, color) {
  const pct = t.total > 0 ? Math.round((t.done / t.total) * 100) : 0;
  const date = t.created ? `<span style="font-size:.68rem;color:#94a3b8">${t.created}</span>` : '';
  const desc = t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : '';
  const progressHtml = t.total > 0 ? `
    <div class="task-progress"><div class="task-progress-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="task-meta">
      <span class="task-count">${t.done}/${t.total} tarefas &bull; ${pct}%</span>
      <button class="task-toggle" onclick="toggleChecklist('cl-${uid}',this)">Ver tarefas</button>
    </div>` : '';

  const checklistItems = t.items.map(item => {
    const cls = item.d ? 'ci ci-done' : 'ci ci-pend';
    const icon = item.d ? 'bi-check-circle-fill text-success' : 'bi-circle text-secondary';
    return `<div class="${cls}"><i class="ci-icon bi ${icon}"></i><span>${esc(item.t)}</span></div>`;
  }).join('');

  const checklist = t.items.length ? `<div class="task-checklist" id="cl-${uid}">${checklistItems}</div>` : '';

  return `
  <div class="task-card" style="border-left-color:${color}">
    <div class="d-flex justify-content-between align-items-start mb-1">
      <div class="task-name">${esc(t.name)}</div>
      ${date}
    </div>
    ${desc}
    ${progressHtml}
    ${checklist}
  </div>`;
}

function toggleChecklist(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('open');
  btn.textContent = open ? 'Ocultar' : 'Ver tarefas';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// в”Җв”Җ Summary в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderSummary() {
  const totalDocs = allFiles.length;
  const totalTasks = TASKS.length;
  const doneTasks = TASKS.filter(t => t.status === 'finalizada').length;
  const pendTasks = TASKS.filter(t => t.status === 'pendente').length;

  // Agrupar docs por pasta de primeiro nГӯvel
  const folders = {};
  TREE.forEach(node => {
    if (node.t === 'd') {
      folders[node.n] = countFiles(node);
    }
  });

  // Encontrar docs do GTM
  let gtmFiles = [];
  function findGtm(nodes, path) {
    nodes.forEach(n => {
      if (n.t === 'd' && n.n === 'GTM') {
        (n.ch || []).forEach(f => { if (f.t === 'f') gtmFiles.push(f); });
      } else if (n.t === 'd') {
        findGtm(n.ch || [], path + '/' + n.n);
      }
    });
  }
  findGtm(TREE, '');

  const gtmHtml = gtmFiles.map(f =>
    `<div class="doc-link" onclick="openDocByName('${f.fn}')"><i class="bi bi-file-earmark-text"></i>${f.n}</div>`
  ).join('');

  // Tarefas recentes (finalizadas)
  const recentDone = TASKS.filter(t => t.status === 'finalizada').slice(0, 5);
  const recentPend = TASKS.filter(t => t.status === 'pendente').slice(0, 5);

  const doneHtml = recentDone.map(t =>
    `<div class="doc-link" style="border-left:3px solid #22c55e;"><i class="bi bi-check-circle-fill" style="color:#22c55e;"></i>${esc(t.name)}</div>`
  ).join('');

  const pendHtml = recentPend.map(t =>
    `<div class="doc-link" style="border-left:3px solid #f97316;"><i class="bi bi-clock" style="color:#f97316;"></i>${esc(t.name)}</div>`
  ).join('');

  document.getElementById('doc-summary').innerHTML = `
    <div class="summary-title">Hub AuroraISP</div>
    <div class="summary-sub">Gestor de documentos, backlog e estrategia. Gerado em 07/04/2026 15:13.</div>

    <div class="summary-grid">
      <div class="summary-card">
        <h3>Documentos</h3>
        <div class="num">${totalDocs}</div>
        <div class="sub">${Object.keys(folders).join(', ')}</div>
      </div>
      <div class="summary-card">
        <h3>Tarefas</h3>
        <div class="num">${totalTasks}</div>
        <div class="sub">${doneTasks} finalizadas, ${pendTasks} pendentes</div>
      </div>
      <div class="summary-card">
        <h3>Progresso</h3>
        <div class="num">${totalTasks > 0 ? Math.round((doneTasks/totalTasks)*100) : 0}%</div>
        <div class="sub">do backlog concluido</div>
      </div>
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-rocket-takeoff"></i> GTM (Go-to-Market)</h2>
      ${gtmHtml || '<div class="doc-link"><i class="bi bi-info-circle"></i>Nenhum documento GTM encontrado</div>'}
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-check2-square"></i> Finalizadas recentes</h2>
      ${doneHtml || '<div style="font-size:.8rem;color:#94a3b8;">Nenhuma tarefa finalizada</div>'}
    </div>

    <div class="summary-section">
      <h2><i class="bi bi-clock-history"></i> Pendentes</h2>
      ${pendHtml || '<div style="font-size:.8rem;color:#94a3b8;">Nenhuma tarefa pendente</div>'}
    </div>
  `;
}

function goHome() {
  if (activeFileEl) activeFileEl.classList.remove('active');
  activeFileEl = null;
  document.getElementById('breadcrumb-text').textContent = '';
  document.getElementById('doc-content').innerHTML = '<div id="doc-summary"></div>';
  renderSummary();
  document.getElementById('doc-panel').scrollTop = 0;
}

function openDocByName(filename) {
  const found = allFiles.find(f => f.node.fn === filename);
  if (found) {
    // Abrir os accordions pai
    let el = found.el;
    while (el) {
      if (el.classList && el.classList.contains('sb-accordion')) el.classList.add('open');
      el = el.parentElement;
    }
    openDoc(found.node, found.el);
  }
}

buildTree(TREE, document.getElementById('sidebar'), 0);
renderBacklog();
renderSummary();
</script>
