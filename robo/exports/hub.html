ubsoftService`\n\n**Systemd timer** (`apps/integracoes/systemd/robovendas-sync-clientes.timer`):\n```ini\n[Timer]\nOnBootSec=60\nOnUnitActiveSec=60\nAccuracySec=5\nPersistent=true\n```\n\n---\n\n### 3. processar_pendentes\n\n**O que faz:** Processa leads com `status_api='pendente'` e envia para o HubSoft via API. Atualiza `status_api` para 'processado' ou 'erro' e preenche `id_hubsoft` em caso de sucesso.\n\n**App:** `apps/integracoes/`\n**Comando:** `python manage.py processar_pendentes --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 30 minutos\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--lead-id INT` | Processa apenas um lead |\n| `--dry-run` | Simula sem enviar |\n\n**Crontab:**\n```bash\n*/30 * * * * cd /path/to/project && python manage.py processar_pendentes --settings=gerenciador_vendas.settings >> /var/log/hubsoft_pendentes.log 2>&1\n```\n\n---\n\n## Servicos de Manutencao (diario/semanal)\n\n### 4. taguear_leads\n\n**O que faz:** Auto-atribui tags do CRM baseado na completude dos dados do lead:\n- \"Comercial\" → lead tem plano ou dia de vencimento selecionado\n- \"Endereco\" → lead tem endereco completo (rua, numero, bairro, CEP)\n- \"Documental\" → lead tem CPF preenchido\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py taguear_leads --settings=gerenciador_vendas.settings`\n**Frequencia:** Diario (recomendado: 2h da manha)\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem salvar |\n| `--resetar` | Remove tags existentes antes de reatribuir |\n| `--estagio TIPO` | Filtra por tipo de estagio |\n\n**Crontab:**\n```bash\n0 2 * * * cd /path/to/project && python manage.py taguear_leads --settings=gerenciador_vendas.settings\n```\n\n---\n\n### 5. mover_perdidos\n\n**O que faz:** Move automaticamente oportunidades do estagio \"Qualificacao\" para \"Perdido\" se nao houver validacao de documentacao em X horas (padrao: 48h).\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py mover_perdidos --settings=gerenciador_vendas.settings`\n**Frequencia:** A cada 2 horas\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem mover |\n| `--horas INT` | Limite de horas sem atividade (padrao: 48) |\n\n**Cria:** Registro em `HistoricoPipelineEstagio` para auditoria.\n\n**Crontab:**\n```bash\n0 */2 * * * cd /path/to/project && python manage.py mover_perdidos --settings=gerenciador_vendas.settings\n```\n\n---\n\n### 6. popular_crm\n\n**O que faz:** Popula o pipeline do CRM com leads existentes, usando regras de prioridade para definir o estagio:\n- P1: HubSoft `servico_habilitado` → \"cliente\"\n- P2: HubSoft `aguardando_instalacao` → \"fechamento\"\n- P3: `documentacao_validada=True` → \"fechamento\"\n- P4: `status_api='processado'` → \"negociacao\"\n- P5: `status_api='processamento_manual'` → \"qualificacao\"\n- P6: Demais → \"novo\"\n\n**App:** `apps/comercial/crm/`\n**Comando:** `python manage.py popular_crm --settings=gerenciador_vendas.settings`\n**Frequencia:** Unica vez ou semanal para backfill\n\n**Argumentos:**\n| Argumento | Descricao |\n|-----------|-----------|\n| `--dry-run` | Simula sem criar |\n| `--limpar` | Remove oportunidades existentes antes |\n| `--criar-perfis` | Cria PerfilVendedor para users sem perfil CRM |\n\n---\n\n## Engine de Pendentes (Delays)\n\n### Automacoes (Marketing)\n\n**Funcao:** `executar_pendentes(tenant=None)` em `apps/marketing/automacoes/engine.py`\n\n**Como funciona:**\n1. Busca `ExecucaoPendente` com `status='pendente'` e `data_agendada <= agora`\n2. Para cada pendente:\n   - Restaura contexto do JSON serializado\n   - Se `nodo` (modo fluxo): retoma traversal do grafo a partir das saidas do no de delay\n   - Se `acao` (modo legado): executa a acao diretamente\n   - Marca como `executado` ou `erro`\n3. Chamada pelo cron `executar_automacoes_cron`\n\n**Idempotente:** Cada pendente e marcado apos execucao, nao re-executa.\n\n### Atendimento (Fluxos de Bot)\n\n**Funcao:** `executar_pendentes_atendimento(tenant=None)` em `apps/comercial/atendimento/engine.py`\n\n**Como funciona:**\n1. Busca `ExecucaoFluxoAtendimento` com `status='pendente'` e `data_agendada <= agora`\n2. Para cada pendente:\n   - Reconstroi contexto da conversa\n   - Retoma traversal do grafo a partir do no de delay\n   - Marca como `executado` ou `erro`\n\n**Nota:** Deve ser integrado ao cron principal ou ter cron separado.\n\n---\n\n## Comandos de Setup (unica vez)\n\n| Comando | App | O que faz |\n|---------|-----|-----------|\n| `seed_planos` | sistema | Cria planos de assinatura e features |\n| `seed_funcionalidades` | sistema | Cria 35 funcionalidades do sistema de permissoes |\n| `seed_perfis` | sistema | Cria perfis de usuario base |\n| `criar_tenant` | sistema | Cria novo workspace multi-tenant |\n| `setup_hubsoft` | integracoes | Configura credenciais HubSoft (le de variaveis de ambiente) |\n| `seed_inbox` | inbox | Inicializa sistema de inbox |\n| `seed_aurora` | suporte | Popula dados de suporte |\n| `gerar_faq` | cs/clube | Gera conteudo FAQ do clube de beneficios |\n\n---\n\n## Comandos de Teste (desenvolvimento)\n\n| Comando | App | O que faz |\n|---------|-----|-----------|\n| `testar_automacoes` | automacoes | 18 testes E2E do engine de automacoes |\n| `testar_pontuacoes` | cs/clube | Testa sistema de gamificacao |\n\n---\n\n## Configuracao Completa de Producao\n\n### Crontab (Linux)\n\n```bash\n# ============================================================\n# CRITICOS — nao desligar\n# ============================================================\n\n# Engine de automacoes (delays, eventos, segmentos)\n*/5 * * * * cd /opt/aurora && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/aurora/automacoes.log 2>&1\n\n# Processar leads pendentes para HubSoft\n*/30 * * * * cd /opt/aurora && python manage.py processar_pendentes --settings=gerenciador_vendas.settings >> /var/log/aurora/hubsoft_pendentes.log 2>&1\n\n# ============================================================\n# MANUTENCAO — pode ajustar horario\n# ============================================================\n\n# Auto-tag de leads por completude de dados\n0 2 * * * cd /opt/aurora && python manage.py taguear_leads --settings=gerenciador_vendas.settings >> /var/log/aurora/tags.log 2>&1\n\n# Mover oportunidades estagnadas para \"Perdido\"\n0 */2 * * * cd /opt/aurora && python manage.py mover_perdidos --settings=gerenciador_vendas.settings >> /var/log/aurora/perdidos.log 2>&1\n```\n\n### Systemd Timer (sincronizar_clientes)\n\n```bash\n# Copiar arquivos\nsudo cp apps/integracoes/systemd/robovendas-sync-clientes.timer /etc/systemd/system/\nsudo cp apps/integracoes/systemd/robovendas-sync-clientes.service /etc/systemd/system/\n\n# Ativar\nsudo systemctl daemon-reload\nsudo systemctl enable robovendas-sync-clientes.timer\nsudo systemctl start robovendas-sync-clientes.timer\n\n# Verificar\nsudo systemctl status robovendas-sync-clientes.timer\n```\n\n### Task Scheduler (Windows — desenvolvimento)\n\nPara ambiente de desenvolvimento no Windows, criar tarefas no Agendador de Tarefas:\n\n| Tarefa | Programa | Argumentos | Frequencia |\n|--------|----------|------------|------------|\n| Aurora Automacoes | python | `manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings_local` | 5 min |\n| Aurora HubSoft Sync | python | `manage.py sincronizar_clientes --settings=gerenciador_vendas.settings_local` | 1 min |\n| Aurora Pendentes | python | `manage.py processar_pendentes --settings=gerenciador_vendas.settings_local` | 30 min |\n\n---\n\n## Monitoramento\n\nPara verificar se os crons estao rodando:\n\n```bash\n# Verificar logs\ntail -f /var/log/aurora/automacoes.log\n\n# Verificar pendentes acumulados (sinal de cron parado)\npython manage.py shell -c \"\nfrom apps.marketing.automacoes.models import ExecucaoPendente\nprint(f'Pendentes: {ExecucaoPendente.objects.filter(status=\\\"pendente\\\").count()}')\n\"\n\n# Verificar ultima execucao\npython manage.py shell -c \"\nfrom apps.marketing.automacoes.models import LogExecucao\nultimo = LogExecucao.objects.order_by('-data_execucao').first()\nprint(f'Ultima execucao: {ultimo.data_execucao if ultimo else \\\"nunca\\\"} - {ultimo.resultado[:50] if ultimo else \\\"\\\"}')\n\"\n```\n"}, {"t": "f", "n": "16 Apis N8n", "fn": "16-APIS_N8N.md", "c": "# 16. APIs para Agentes e N8N\n\n**Ultima atualizacao:** 07/04/2026\n**Status:** ✅ Em producao\n\n---\n\n## Autenticacao\n\nTodas as APIs usam token Bearer no header:\n\n```\nAuthorization: Bearer qB0L0dkBULVQd6KlMlg24HV1hGxxQqIoFUrzZVN6yEU\n```\n\nBase URL: `http://127.0.0.1:8001` (dev) ou `https://app.dominio.com.br` (producao)\n\n---\n\n## APIs disponiveis\n\n### Leads\n\n| Metodo | Endpoint | Descricao |\n|--------|----------|-----------|\n| POST | `/api/v1/n8n/leads/` | Criar lead |\n| PUT | `/api/v1/n8n/leads/<id>/` | Atualizar lead |\n| GET | `/api/v1/n8n/leads/buscar/?telefone=5586999` | Buscar lead por telefone |\n\n**Criar lead:**\n```json\nPOST /api/v1/n8n/leads/\n{\n    \"nome_razaosocial\": \"Joao Silva\",\n    \"telefone\": \"5586999001234\",\n    \"email\": \"joao@email.com\",\n    \"origem\": \"whatsapp\"\n}\n```\n\n**Atualizar lead:**\n```json\nPUT /api/v1/n8n/leads/61/\n{\n    \"nome_razaosocial\": \"Joao Silva Santos\",\n    \"cidade\": \"Teresina\",\n    \"estado\": \"PI\",\n    \"score_qualificacao\": 8\n}\n```\n\n---\n\n### CRM — Pipelines e Estagios\n\n| Metodo | Endpoint | Descricao |\n|--------|----------|-----------|\n| GET | `/api/v1/n8n/crm/pipelines/` | Listar pipelines com estagios |\n| GET | `/api/v1/n8n/crm/estagios/?pipeline_slug=matriculas` | Listar estagios (filtro opcional) |\n\n---\n\n### CRM — Oportunidades\n\n| Metodo | Endpoint | Descricao |\n|--------|----------|-----------|\n| POST | `/api/v1/n8n/crm/oportunidades/` | Criar oportunidade |\n| PUT | `/api/v1/n8n/crm/oportunidades/<id>/` | Atualizar (mover estagio, atribuir) |\n| GET | `/api/v1/n8n/crm/oportunidades/buscar/?lead_id=61` | Buscar por lead |\n| GET | `/api/v1/n8n/crm/oportunidades/buscar/?telefone=5586999` | Buscar por telefone |\n\n**Criar oportunidade:**\n```json\nPOST /api/v1/n8n/crm/oportunidades/\n{\n    \"lead_id\": 61,\n    \"pipeline_slug\": \"matriculas\",\n    \"estagio_slug\": \"novo\",\n    \"titulo\": \"Joao - Direito\"\n}\n```\nNota: se a oportunidade ja existe para o lead, retorna a existente sem duplicar.\n\n**Mover estagio:**\n```json\nPUT /api/v1/n8n/crm/oportunidades/58/\n{\n    \"estagio_slug\": \"qualificado\"\n}\n```\n\n**Atribuir responsavel:**\n```json\nPUT /api/v1/n8n/crm/oportunidades/58/\n{\n    \"responsavel_username\": \"aurora\"\n}\n```\n\n---\n\n### CRM — Tarefas\n\n| Metodo | Endpoint | Descricao |\n|--------|----------|-----------|\n| POST | `/api/v1/n8n/crm/tarefas/` | Criar tarefa |\n| PUT | `/api/v1/n8n/crm/tarefas/<id>/` | Atualizar/concluir tarefa |\n\n**Criar tarefa:**\n```json\nPOST /api/v1/n8n/crm/tarefas/\n{\n    \"lead_id\": 61,\n    \"titulo\": \"Ligar para Joao sobre Direito\",\n    \"tipo\": \"ligacao\",\n    \"prioridade\": \"alta\"\n}\n```\nTipos: ligacao, whatsapp, email, visita, followup, proposta, instalacao, suporte, outro\nPrioridades: baixa, normal, alta, urgente\n\n**Concluir tarefa:**\n```json\nPUT /api/v1/n8n/crm/tarefas/77/\n{\n    \"status\": \"concluida\",\n    \"resultado\": \"Lead interessado em Direito noturno\"\n}\n```\n\n---\n\n### Inbox — Mensagens\n\n| Metodo | Endpoint | Descricao |\n|--------|----------|-----------|\n| POST | `/api/v1/n8n/inbox/mensagem-recebida/` | Registrar mensagem recebida do contato |\n| POST | `/api/v1/n8n/inbox/enviar/` | Enviar mensagem como bot |\n\n**Registrar mensagem recebida (do WhatsApp para nosso sistema):**\n```json\nPOST /api/v1/n8n/inbox/mensagem-recebida/\n{\n    \"telefone\": \"5586999001234\",\n    \"nome\": \"Joao Silva\",\n    \"conteudo\": \"Ola, quero saber sobre o curso de Direito\",\n    \"canal_tipo\": \"whatsapp\"\n}\n```\n\n**Enviar mensagem como bot (do nosso sistema para o WhatsApp via N8N):**\n```json\nPOST /api/v1/n8n/inbox/enviar/\n{\n    \"telefone\": \"5586999001234\",\n    \"conteudo\": \"Ola Joao! O curso de Direito funciona das 18h30 as 21h40. Qual forma de ingresso te interessa?\",\n    \"remetente_nome\": \"Pedro\"\n}\n```\n\n---\n\n## Fluxo N8N recomendado para a faculdade\n\n```\n1. Webhook Uazapi (WhatsApp mensagem recebida)\n        |\n2. POST /api/v1/n8n/inbox/mensagem-recebida/    ← registra no nosso Inbox\n        |\n3. POST /api/v1/n8n/leads/                       ← cria/busca lead\n        |\n4. POST /api/v1/n8n/crm/oportunidades/           ← cria oportunidade (nao duplica)\n        |\n5. Agente IA (OpenAI) processa a mensagem\n        |\n6. Se agente decide salvar dados:\n   PUT /api/v1/n8n/leads/<id>/                    ← atualiza nome, curso, etc.\n   PUT /api/v1/n8n/crm/oportunidades/<id>/        ← move estagio\n        |\n7. POST /api/v1/n8n/inbox/enviar/                ← registra resposta no nosso Inbox\n        |\n8. Uazapi envia resposta no WhatsApp\n```\n\n---\n\n## Respostas\n\nTodas as APIs retornam JSON com `success: true/false`. Em caso de erro:\n\n```json\n{\n    \"success\": false,\n    \"error\": \"Descricao do erro\"\n}\n```\n\nOu para erros de validacao:\n\n```json\n{\n    \"success\": false,\n    \"errors\": {\n        \"campo\": [\"mensagem de erro\"]\n    }\n}\n```\n"}]}]}, {"t": "d", "n": "Drafts", "ch": [{"t": "d", "n": "apresentacao", "ch": [{"t": "f", "n": "Battle Card Concorrentes", "fn": "battle_card_concorrentes.md", "c": "# Battle Card: AuroraISP vs Concorrentes\n\n**Uso:** Referência rápida para o parceiro durante ligações e reuniões com provedores.\n**Atualização:** 30/03/2026\n\n---\n\n## 1. AuroraISP vs ISPRO AI\n\n### Comparativo direto\n\n| Critério | **AuroraISP** | **ISPRO AI** |\n|----------|---------------|--------------|\n| **Integração HubSoft** | **Nativa e profunda** (lead → contrato → ativação no ERP) | Genérica, sem fluxo completo |\n| Fluxo lead → contrato → ERP | ✅ Automatizado de ponta a ponta | ❌ Não demonstrado |\n| Coleta e validação de documentos | ✅ Automática via WhatsApp | ❌ Não mencionado |\n| Bot de qualificação WhatsApp | ✅ | ✅ |\n| CRM com pipeline visual | 🔧 Em desenvolvimento (Pro) | ⚠️ Parcial |\n| Clube de fidelização (CS) | 🔧 Em desenvolvimento | ❌ |\n| Cobrança automatizada | ❌ (fora do escopo atual) | ✅ |\n| Suporte N1 automatizado | ❌ (fora do escopo atual) | ✅ |\n| **Case real comprovado** | **✅ 400 vendas/mês, R$ 284.400/ano de economia** | ❌ Nenhum case público |\n| **Preço público** | **✅ Transparente** | ❌ Não divulgado |\n| Social proof | ✅ Provedor com 30.000 clientes em produção | ❌ Nenhuma |\n\n### Fraquezas do ISPRO AI para explorar\n\n- **Sem case real:** nenhum provedor validou publicamente os resultados prometidos\n- **Integração HubSoft genérica:** não demonstra fluxo completo de lead até ativação no ERP\n- **Preço oculto:** sem tabela pública, o que gera desconfiança\n- **Promessas genéricas de IA:** \"aumento de até 50% na conversão\" sem dado verificável\n- **CTA apenas por WhatsApp:** sem demonstração, sem trial, sem transparência\n\n### Forças da AuroraISP para destacar\n\n- **Resultado comprovado:** 400 vendas digitais/mês em provedor com 30.000 clientes\n- **Integração HubSoft que ninguém mais tem:** contrato vai direto para o ERP, sem copiar e colar\n- **Preço justo e transparente:** mensalidade fixa + transacional por resultado\n\n### Pergunta decisiva para o prospect\n\n> **\"Quantas vendas digitais o ISPRO entrega por mês? Pode mostrar um case real com números?\"**\n\n---\n\n## 2. AuroraISP vs CRM Genérico (RD Station, Pipedrive)\n\n### Por que CRM genérico não resolve o problema do provedor\n\n| Critério | **AuroraISP** | **CRM Genérico** |\n|----------|---------------|-------------------|\n| **Integração HubSoft** | **Nativa. Lead vira contrato no ERP.** | ❌ Não existe. Tudo manual. |\n| Coleta de documentos via WhatsApp | ✅ Automática | ❌ Não faz |\n| Geração de contrato | ✅ Automática | ❌ Não faz |\n| Automação do fluxo ISP | ✅ Pronto para usar | ❌ Precisa de consultoria + customização |\n| Tempo de implantação | Dias | Semanas ou meses (com consultor) |\n| Preço total (ferramenta + customização) | **Acessível para ISP regional** | R$ 900+/mês + R$ 5.000 a 15.000 de setup com consultor |\n| Curva de aprendizado | Treinamento em 30 minutos | Semanas de adaptação |\n\n### Argumento central\n\nO CRM genérico foi feito para qualquer empresa. **A AuroraISP foi feita para o provedor.** O vendedor do provedor não precisa de um pipeline sofisticado para 50 tipos de negócio. Ele precisa que o lead do WhatsApp vire contrato no HubSoft sem copiar e colar.\n\n### Conta rápida para o prospect\n\n> \"Quanto você gasta hoje com Pipedrive/RD Station + o tempo do seu vendedor copiando dados manualmente para o HubSoft? Com a Aurora, esse retrabalho desaparece.\"\n\n---\n\n## 3. AuroraISP vs \"Não fazer nada\" (processo manual)\n\n### O custo real de manter o processo manual\n\n| Item | Processo manual | Com AuroraISP |\n|------|----------------|---------------|\n| Pessoas para atender 1.000 leads/mês | 8 | **2** |\n| Custo anual estimado de pessoal | R$ 384.000 | R$ 99.600 |\n| **Economia anual** | | **R$ 284.400** |\n| Leads sem acompanhamento | Muitos (sem controle) | **Zero (rastreio completo)** |\n| Erro em documentos e contratos | Frequente | **Validação automática** |\n| Visibilidade do funil | Nenhuma | **Dashboard em tempo real** |\n| Tempo médio do lead até contrato | Dias | **Minutos** |\n\n### Três problemas que o provedor não percebe\n\n1. **Leads perdidos sem saber:** vendedor esquece de retornar, lead esfria, ninguém rastreia. Cada lead perdido é receita recorrente que nunca vai existir.\n2. **Retrabalho invisível:** pedir documento por mensagem, digitar dados no HubSoft, gerar contrato manual. Tempo que o vendedor poderia estar vendendo.\n3. **Decisão no escuro:** sem dados, o dono não sabe se o problema é volume de leads, performance do vendedor ou gargalo no processo.\n\n### ROI simplificado\n\n> **Um provedor com perfil similar (30.000 clientes, 1.000 leads/mês) economizou R$ 284.400 por ano só em pessoal. 2 pessoas passaram a fazer o que 8 faziam, e o processo ficou mais rápido.**\n\n---\n\n## 4. Respostas Rápidas para Objeções Competitivas\n\n| Objeção | Resposta |\n|---------|----------|\n| **\"O ISPRO faz a mesma coisa\"** | \"O ISPRO promete IA para ISP, mas não tem um case público com números. A Aurora tem: 400 vendas/mês, 30.000 clientes, em produção. Pede o case deles e compara.\" |\n| **\"Uso RD Station e funciona\"** | \"RD Station é ótimo para marketing genérico. Mas ele manda contrato pro HubSoft? Coleta documento do cliente? Ativa o plano no ERP? A Aurora faz isso. São coisas complementares, não iguais.\" |\n| **\"Meu processo manual funciona bem\"** | \"Funciona, mas quanto custa? Um provedor do seu porte gastava R$ 384.000/ano em pessoal para o mesmo volume. Hoje gasta R$ 99.600 e atende mais rápido. A pergunta não é se funciona. É quanto você está deixando na mesa.\" |\n| **\"Vou esperar o mercado amadurecer\"** | \"Seu concorrente não vai esperar. Quem automatiza primeiro atende mais leads com menos gente. Enquanto você espera, ele fecha os clientes que poderiam ser seus.\" |\n| **\"É caro\"** | \"Um contrato a mais por mês já paga o plano. O resto é lucro. E a economia em pessoal paga o investimento no primeiro mês.\" |\n| **\"HubSoft já faz isso\"** | \"HubSoft é ERP e faturamento. Não qualifica lead, não coleta documento pelo WhatsApp, não gera contrato automaticamente. A Aurora é o que falta entre o WhatsApp e o HubSoft.\" |\n\n---\n\n*Documento de uso interno. Atualizar conforme novos dados de mercado e feedback do parceiro.*\n"}, {"t": "f", "n": "Case Anonimo", "fn": "case_anonimo.md", "c": "# Case de Sucesso: Automacao Comercial para Provedor Regional\n\n**AuroraISP | Modulo Comercial em Producao**\n\n---\n\n## O Provedor\n\nProvedor regional do Nordeste com **30.000 clientes ativos**, operacao consolidada e equipe comercial estruturada. Utiliza o HubSoft como ERP principal.\n\n---\n\n## 1. O Desafio\n\nO provedor recebia cerca de **1.000 leads por mes** via WhatsApp. Todo o processo comercial era manual e dependia de uma equipe de **8 pessoas** para dar conta do volume.\n\n**Os problemas eram claros:**\n\n- **Leads perdidos no WhatsApp.** Conversas se misturavam, mensagens ficavam sem resposta e ninguem sabia quantos leads estavam parados sem atendimento.\n- **Coleta de documentos por mensagem.** O vendedor pedia CPF, comprovante de endereco e foto do documento um por um, por chat. Documentos se perdiam, vinham errados e precisavam ser solicitados novamente.\n- **Contratos gerados manualmente.** Cada contrato era montado a mao, com erros frequentes de dados e retrabalho constante.\n- **Cadastro no HubSoft feito a mao.** Apos a venda, alguem precisava acessar o ERP e digitar todos os dados do cliente. Isso gerava atrasos na ativacao e erros de cadastro.\n- **Zero visibilidade.** O dono e o gerente nao tinham nenhum dado confiavel sobre o funil. Nao sabiam quantos leads entraram, quantos converteram, onde estavam os gargalos.\n\nO resultado: um processo lento, caro e fragil, onde o crescimento do provedor dependia de contratar mais gente.\n\n---\n\n## 2. A Solucao\n\nO provedor implantou o **modulo Comercial da AuroraISP**, que automatizou todo o fluxo do lead ate a ativacao no HubSoft.\n\n**O que foi entregue:**\n\n- **Qualificacao automatica via WhatsApp.** O bot da Aurora recebe o lead, faz as perguntas iniciais (endereco, plano de interesse, viabilidade) e qualifica antes de passar ao vendedor.\n- **Coleta inteligente de documentos.** O sistema solicita, recebe e valida os documentos automaticamente. Sem ir e vir de mensagens, sem perda de arquivos.\n- **Geracao automatica de contrato.** Com os dados validados, o contrato e gerado e enviado para assinatura digital sem intervencao manual.\n- **Ativacao direta no HubSoft.** Apos a assinatura, o cadastro do cliente e criado automaticamente no ERP, com todos os dados corretos.\n- **Dashboard em tempo real.** O gestor acompanha leads, conversoes, tempo medio de atendimento e performance de cada vendedor em um painel unico.\n\nA implantacao foi feita pela equipe da AuroraISP, sem necessidade de desenvolvimento interno pelo provedor.\n\n---\n\n## 3. Os Resultados\n\n| Metrica | Antes | Depois |\n|---------|-------|--------|\n| Equipe comercial | **8 pessoas** | **2 pessoas** |\n| Leads atendidos/mes | ~1.000 (com perda) | **1.000** (100% rastreados) |\n| Vendas digitais/mes | Sem controle | **400 vendas/mes** |\n| Ticket medio | R$ 99,90 | R$ 99,90 |\n| Receita digital mensal | Sem medicao | **R$ 39.960/mes** |\n| Tempo de cadastro no HubSoft | Manual (horas) | **Automatico (minutos)** |\n| Visibilidade do funil | Nenhuma | **Tempo real** |\n\n### Impacto financeiro direto\n\n- **Reducao de 6 posicoes** na equipe comercial (de 8 para 2).\n- **Economia anual de R$ 284.400** em custos de pessoal.\n- **400 vendas digitais por mes** com rastreabilidade completa.\n- **R$ 39.960/mes em receita digital** passando pelo sistema com controle total.\n\n---\n\n## 4. Depoimento\n\n> \"Antes a gente nao sabia nem quantos leads estavam parados. Hoje, com duas pessoas, a gente vende mais do que vendia com oito. O sistema faz o trabalho pesado e a equipe foca no que importa: fechar a venda.\"\n>\n> **Gerente de Operacoes** | Provedor regional do Nordeste\n\n---\n\n## 5. Por que a AuroraISP\n\n**Integracao nativa com HubSoft.** A Aurora e a unica plataforma que conecta o fluxo comercial diretamente ao HubSoft, sem gambiarras, sem planilhas intermediarias, sem digitacao manual.\n\n**Automacao de ponta a ponta.** Do primeiro contato no WhatsApp ate a ativacao do cliente no ERP, o processo roda com minima intervencao humana. O vendedor atende. A Aurora faz o resto.\n\n**Visibilidade real.** Dashboard com dados de verdade: leads, conversoes, gargalos, performance por vendedor. O gestor toma decisao com base em numeros, nao em achismo.\n\n**ROI comprovado.** Com economia de quase R$ 300.000 por ano so em pessoal, o retorno sobre o investimento se paga nos primeiros dias de operacao.\n\n---\n\n*AuroraISP. Vende mais. Perde menos. Fideliza sempre.*\n\n*Saiba mais em aurorahub.com.br*\n"}, {"t": "f", "n": "Demo Deck Apoio Estrutura", "fn": "demo_deck_apoio_estrutura.md", "c": "# Deck de Apoio — AuroraISP\n**Formato:** 10 slides PPT (16:9) exportado em PDF\n**Uso:** Antes ou depois da demo ao vivo. Apoio, formalização e proposta.\n**Objetivo:** O prospect entende o produto, vê o ROI e tem tudo que precisa para decidir.\n\n---\n\n## Slide 1 — Capa\n\n**Layout:** fundo dark, centralizado\n\n**Logo:** [inserir quando disponível]\n\n**Título:**\n> AuroraISP\n\n**Subtítulo:**\n> Hub de tecnologia com IA para provedores de internet.\n\n**Tagline:**\n> Vende mais. Perde menos. Fideliza sempre.\n\n---\n\n## Slide 2 — O Problema\n\n**Layout:** 4 cards em linha, fundo claro\n\n**Título:**\n> O que custa caro no seu provedor hoje\n\n**Card 1 — Lead perdido no WhatsApp**\n> O cliente pergunta o preço e desaparece. Sem acompanhamento automático, a venda esfria antes de acontecer.\n\n**Card 2 — Documentos no caos**\n> CPF no chat, foto borrada, processo travado. A burocracia mata vendas que já estavam feitas.\n\n**Card 3 — Ativação manual**\n> Depois do contrato, alguém lança tudo no sistema à mão. Retrabalho em cada venda, todo dia.\n\n**Card 4 — Time superdimensionado**\n> Muitas pessoas para um volume que a tecnologia resolveria com muito menos.\n\n---\n\n## Slide 3 — A Solução\n\n**Layout:** fundo dark, texto centralizado com destaque visual\n\n**Título:**\n> AuroraISP — do lead ao cliente fidelizado com inteligência.\n\n**Texto:**\n> A Aurora automatiza o fluxo comercial do provedor do início ao fim, com integração nativa e profunda ao HubSoft. Três módulos que cobrem toda a jornada: atração, conversão e retenção.\n\n**Destaque:**\n> Integração nativa com HubSoft. Nenhum concorrente faz isso.\n\n---\n\n## Slide 4 — Módulo Comercial\n\n**Layout:** fluxo visual + lista de funcionalidades, fundo claro\n\n**Título:**\n> Comercial — automação do fluxo de vendas\n\n**Status:** ✅ Disponível\n\n**Fluxo:**\n```\nLead no WhatsApp → Bot qualifica → Coleta documentos → Gera contrato → Ativa no HubSoft\n```\n\n**Funcionalidades:**\n> Bot de qualificação com IA. Coleta automática de documentos. Geração de contrato. Ativação direta no HubSoft. CRM Kanban com pipeline em tempo real (plano Pro).\n\n**Resultado:**\n> O lead entra, o processo acontece e o cliente é ativado. Sem intervenção manual em nenhuma etapa.\n\n---\n\n## Slide 5 — Módulo Marketing\n\n**Layout:** 3 blocos, fundo dark\n\n**Título:**\n> Marketing — motor de automação do hub\n\n**Status:** Em breve\n\n**Bloco 1 — WhatsApp e e-mail**\n> Disparos segmentados com réguas padrão prontas para o setor de ISP. Basta ativar e personalizar.\n\n**Bloco 2 — Fluxos de automação**\n> Nutrição de leads frios, reativação de cancelados, follow-up de documentos, upsell de plano. Tudo automático.\n\n**Bloco 3 — Tráfego pago com IA**\n> Campanhas no Facebook e Google otimizadas por inteligência artificial, com relatórios de atribuição por canal.\n\n---\n\n## Slide 6 — Módulo CS\n\n**Layout:** 3 blocos, fundo dark\n\n**Título:**\n> CS — retenção e fidelização pós-venda\n\n**Status:** Em breve\n\n**Bloco 1 — Clube de Benefícios**\n> Streaming, antivírus, rastreamento veicular, plano de saúde e mais. O cliente permanece pelo serviço e pelo clube.\n\n**Bloco 2 — Prevenção de churn**\n> IA identifica clientes com risco de cancelamento antes do cancelamento. O time age antes de perder o cliente.\n\n**Bloco 3 — NPS e upsell**\n> Pesquisa de satisfação automática. Clientes promotores são convidados a indicar. Clientes satisfeitos recebem oferta de upgrade.\n\n---\n\n## Slide 7 — Case de Produção\n\n**Layout:** números grandes em destaque, fundo dark\n\n**Título:**\n> Resultado real. Provedor em produção.\n\n**Subtítulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**Métricas:**\n- **1.000** leads por mês\n- **400** vendas digitais por mês\n- **R$99,90** ticket médio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Texto de apoio:**\n> 8 pessoas atendiam 1.000 leads por mês. Hoje 2 pessoas dão conta do mesmo volume. As outras 2 viraram backoffice estratégico. Função que antes não existia. Não é promessa. É o sistema que você acabou de conhecer.\n\n---\n\n## Slide 8 — Precificação\n\n**Layout:** 3 colunas, fundo claro\n\n**Título:**\n> Investimento — Módulo Comercial\n\n**Tabela:**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mês | R$797/mês | R$1.397/mês |\n| Usuários | Até 2 | Até 5 | Ilimitado |\n| Funcionalidades | Essenciais | Completas | Completas + IA e CRM Kanban |\n| Suporte | Standard | Standard | Prioritário |\n| Transacional | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP | R$7 por venda finalizada no ERP |\n\n**Linha de apoio:**\n> Marketing e CS têm precificação própria. Disponíveis em breve.\n\n**Simulação de ROI:**\n> 100 vendas/mês × R$99,90 = R$9.990 de receita digital gerada.\n> Custo Start + transacional: R$797 + R$700 = R$1.497/mês.\n> ROI: 6,6x no primeiro mês.\n\n---\n\n## Slide 9 — Por que AuroraISP\n\n**Layout:** 4 cards em grade 2x2, fundo dark\n\n**Título:**\n> Por que a AuroraISP é diferente\n\n**Card 1 — HubSoft nativo**\n> Integração profunda com o ERP mais usado por ISPs regionais. Os dados do ERP alimentam todo o hub em tempo real. Nenhum concorrente oferece isso.\n\n**Card 2 — Case real, não promessa**\n> Resultado comprovado em produção. Você vê o sistema funcionando antes de assinar qualquer coisa.\n\n**Card 3 — IA no processo**\n> Qualificação de leads, validação de documentos, otimização de campanhas e prevenção de churn com inteligência artificial.\n\n**Card 4 — Modelo que cresce junto**\n> O transacional alinha o sucesso da Aurora com o sucesso do provedor. Você paga mais quando vende mais. ROI sempre positivo.\n\n---\n\n## Slide 10 — Próximos Passos\n\n**Layout:** centralizado, fundo dark com destaque azul\n\n**Título:**\n> Como começar\n\n**Para provedores HubSoft:**\n> 14 dias gratuitos para testar com os seus leads reais. Sem compromisso. Cancelamento a qualquer momento.\n\n**Para demais provedores:**\n> Contrato mensal. Cancelamento a qualquer momento.\n\n**O que é preciso para ativar:**\n> Acesso ao HubSoft. Número de WhatsApp do provedor. Cerca de 1 hora para configurar.\n\n**Contato:**\n> [Nome do parceiro]\n> [WhatsApp]\n> auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo escuro:** #0F172A\n- **Fundo claro:** #F1F5F9\n- **Cor primária:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traço como pontuação. Ponto ou vírgula.\n- **Tom:** direto, confiante, fala a língua do provedor.\n"}, {"t": "f", "n": "Demo Deck Parceiro Estrutura", "fn": "demo_deck_parceiro_estrutura.md", "c": "# Deck do Parceiro — Demo ao Vivo\n**Formato:** 10 slides PPT (16:9)\n**Uso:** Guia interno do parceiro durante a demo ao vivo\n**Duração:** 30 a 45 minutos\n**Objetivo:** Fechar o próximo passo — trial, contrato ou segunda reunião\n\n---\n\n## Slide 1 — Capa\n\n**Layout:** fundo dark, centralizado\n\n**Logo:** [inserir quando disponível]\n\n**Título:**\n> AuroraISP\n\n**Subtítulo:**\n> Do lead ao cliente fidelizado com inteligência.\n\n**Nota para o parceiro:**\n> Antes de começar: perguntar quantas pessoas estão no time comercial hoje e quantos leads chegam por mês. Usar esses números nos slides 3 e 9.\n\n---\n\n## Slide 2 — Agenda\n\n**Layout:** lista simples, fundo claro\n\n**Título:**\n> O que vamos ver hoje\n\n**Itens:**\n> 1. O problema que a Aurora resolve\n> 2. Como funciona na prática (demo ao vivo)\n> 3. Os 3 módulos do hub\n> 4. Resultado real de um provedor em produção\n> 5. Próximos passos\n\n**Linha de apoio:**\n> Pode me interromper a qualquer momento com perguntas.\n\n**Nota para o parceiro:**\n> Confirmar se há outros decisores que deveriam estar nessa reunião. Se sim, marcar uma segunda reunião incluindo eles.\n\n---\n\n## Slide 3 — O Problema\n\n**Layout:** 2 colunas, fundo dark\n\n**Título:**\n> Antes da Aurora\n\n**Coluna esquerda — dores:**\n> Lead chegando no WhatsApp sem acompanhamento.\n> Documentos pedidos no chat, processo travando na burocracia.\n> Ativação manual no ERP depois de cada venda.\n> Time grande para um volume que poderia ser menor.\n\n**Coluna direita — impacto (preencher ao vivo):**\n> Leads perdidos por semana: **[número do prospect]**\n> Custo por pessoa no time: **~R$3.950/mês**\n> Pessoas no time hoje: **[número do prospect]**\n\n**Nota para o parceiro:**\n> Usar os números levantados na abertura. \"Vocês têm X pessoas no comercial, certo? Isso é R$X por mês só em pessoal.\" Deixar o impacto financeiro claro antes de mostrar a solução.\n\n---\n\n## Slide 4 — Demo ao Vivo: Comercial\n\n**Layout:** fluxo visual, fundo claro\n\n**Título:**\n> Veja o Comercial funcionando\n\n**Fluxo:**\n```\nLead no WhatsApp → Bot qualifica → Coleta documentos → Gera contrato → Ativa no HubSoft\n```\n\n**Nota para o parceiro:**\n> Este é o momento da demo ao vivo. Abrir o sistema e navegar em tempo real. O slide fica em segundo plano.\n> Sequência sugerida: mostrar chegada do lead, qualificação automática, coleta de documentos, geração do contrato, envio para o HubSoft.\n> Se o prospect usa HubSoft: mostrar a ativação em tempo real. É o momento de maior impacto da demo.\n\n---\n\n## Slide 5 — CRM Kanban (Comercial Pro)\n\n**Layout:** screenshot ou mockup do CRM, fundo claro\n\n**Título:**\n> Visão completa do pipeline em tempo real\n\n**Texto:**\n> Cada lead qualificado alimenta o CRM automaticamente. Sem lançamento manual. O gestor vê o funil completo, por vendedor, por etapa, por período.\n\n**Incluso em:** Comercial Pro\n\n**Nota para o parceiro:**\n> Mostrar o CRM ao vivo se o prospect tem time de 3 pessoas ou mais. Para ISPs menores, focar no fluxo do Slide 4.\n\n---\n\n## Slide 6 — Módulo Marketing\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**Título:**\n> Marketing — o motor de automação do hub\n\n**Bloco 1 — WhatsApp e e-mail**\n> Disparos segmentados com réguas padrão prontas para ISP. Basta ativar.\n\n**Bloco 2 — Fluxos de automação**\n> Nutrição de leads frios, reativação de cancelados, upsell de plano. Tudo automático.\n\n**Bloco 3 — Tráfego pago com IA**\n> Gestão de campanhas no Facebook e Google com otimização por inteligência artificial.\n\n**Status:** Em desenvolvimento. Disponível em breve.\n\n**Nota para o parceiro:**\n> Não entrar em detalhes de prazo. Se perguntarem quando sai, responder \"em breve, e quem está com o Comercial ativo terá acesso prioritário.\"\n\n---\n\n## Slide 7 — Módulo CS\n\n**Layout:** 3 blocos verticais, fundo dark\n\n**Título:**\n> CS — retenção e fidelização pós-venda\n\n**Bloco 1 — Clube de Benefícios**\n> Streaming, antivírus, rastreamento veicular, plano de saúde e mais.\n\n**Bloco 2 — Prevenção de churn**\n> IA identifica clientes com risco de cancelamento antes do cancelamento.\n\n**Bloco 3 — NPS e upsell**\n> Pesquisa de satisfação automática. Clientes promotores indicam. Clientes satisfeitos fazem upgrade.\n\n**Status:** Em desenvolvimento. Disponível em breve.\n\n**Nota para o parceiro:**\n> Mesma abordagem do Marketing. Não comprometer prazo. Focar no valor futuro do hub completo.\n\n---\n\n## Slide 8 — Case de Produção\n\n**Layout:** números grandes, fundo dark\n\n**Título:**\n> Resultado real. Provedor em produção.\n\n**Subtítulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**Métricas:**\n- **1.000** leads por mês\n- **400** vendas digitais por mês\n- **R$99,90** ticket médio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Linha de fechamento:**\n> O sistema que gerou esse resultado é o mesmo que você acabou de ver funcionando.\n\n**Nota para o parceiro:**\n> Comparar com os números do prospect. \"Vocês têm X leads por mês. Com esse fluxo, quanto a mais vocês poderiam converter?\" Deixar o prospect fazer a conta.\n\n---\n\n## Slide 9 — Precificação\n\n**Layout:** 3 colunas, fundo claro\n\n**Título:**\n> Investimento\n\n**Tabela Comercial:**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mês | R$797/mês | R$1.397/mês |\n| Usuários | Até 2 | Até 5 | Ilimitado |\n| CRM Kanban | Não | Não | Sim |\n| Transacional | R$7/venda | R$7/venda | R$7/venda |\n\n**Nota para o parceiro:**\n> Fazer a simulação ao vivo com os números do prospect.\n> \"Vocês fazem X vendas por mês. X × R$7 = R$X de transacional. Mais R$797 de mensalidade = R$X total. Vocês geram R$X de receita digital por mês. O ROI é Xx já no primeiro mês.\"\n> Deixar o prospect ver o número na tela. Não apressar.\n\n---\n\n## Slide 10 — Próximos Passos\n\n**Layout:** centralizado, fundo dark\n\n**Título:**\n> O que acontece agora\n\n**Para provedores HubSoft:**\n> 14 dias gratuitos. Você testa com os seus leads reais. Sem compromisso.\n\n**Para demais provedores:**\n> Contrato mensal. Cancelamento a qualquer momento.\n\n**O que precisamos para ativar:**\n> Acesso ao HubSoft. Número de WhatsApp do provedor. Cerca de 1 hora para configurar.\n\n**CTA:**\n> Vamos ativar hoje?\n\n**Nota para o parceiro:**\n> Sempre fechar um próximo passo concreto antes de encerrar. Se não for o contrato, definir data para retorno ou para apresentação a outro decisor. Nunca sair da reunião sem data marcada.\n\n---\n\n## Roteiro de tempo\n\n| Tempo | Slide | Ação |\n|-------|-------|------|\n| 0 a 5 min | 1 e 2 | Apresentação, agenda, levantar números do prospect |\n| 5 a 10 min | 3 | Validar dores com os números reais do prospect |\n| 10 a 25 min | 4 e 5 | Demo ao vivo do Comercial e CRM |\n| 25 a 30 min | 6 e 7 | Visão de Marketing e CS |\n| 30 a 35 min | 8 | Case de produção, comparar com prospect |\n| 35 a 40 min | 9 | Precificação e simulação de ROI ao vivo |\n| 40 a 45 min | 10 | Próximos passos, fechar ação concreta |\n\n---\n\n## Diretrizes visuais\n\n- **Fundo escuro:** #0F172A\n- **Fundo claro:** #F1F5F9\n- **Cor primária:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traço como pontuação. Ponto ou vírgula.\n"}, {"t": "f", "n": "One Pager Estrutura", "fn": "one_pager_estrutura.md", "c": "# One-pager — AuroraISP\n**Formato:** 1 slide PPT (16:9) exportado em PDF\n**Canal de uso:** WhatsApp — enviado antes da demo pelo parceiro comercial\n**Objetivo:** Gerar curiosidade e conseguir 30 minutos de atenção do dono do ISP\n\n---\n\n## Layout sugerido\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│  [LOGO]   AuroraISP                          [Tagline]      │\n├──────────────────────────────┬──────────────────────────────┤\n│                              │                              │\n│  GANCHO                      │   NÚMEROS DO CASE            │\n│                              │                              │\n│  Pergunta ou afirmação que   │   Métricas em destaque       │\n│  ele reconhece no dia a dia  │   (grande, visual, impacto)  │\n│                              │                              │\n│  O QUE É                     │                              │\n│                              │                              │\n│  Uma linha explicando        │                              │\n│  o produto                   │                              │\n│                              │                              │\n│  CTA                         │                              │\n│                              │                              │\n└──────────────────────────────┴──────────────────────────────┘\n```\n\n---\n\n## Conteúdo por bloco\n\n### Header\n- Logo da AuroraISP (esquerda)\n- Tagline: **Vende mais. Perde menos. Fideliza sempre.** (direita)\n\n---\n\n### Bloco esquerdo\n\n**Gancho:**\n> Quantos leads você perdeu essa semana por falta de acompanhamento no WhatsApp?\n\n**O que é (1 linha):**\n> AuroraISP automatiza o fluxo de vendas do provedor do início ao fim, integrado nativamente ao HubSoft.\n\n**CTA:**\n> São 30 minutos para você ver funcionando ao vivo.\n> [Nome do parceiro] — [contato]\n\n---\n\n### Bloco direito — Case de produção\n\n**Título do bloco:**\n> Resultado real. Provedor em produção.\n\n**4 métricas em destaque (número grande, label pequeno):**\n\n| Número | Label |\n|--------|-------|\n| **400** | vendas digitais por mês |\n| **2** | pessoas no time (eram 8) |\n| **R$284.400** | economia por ano em pessoal |\n| **HubSoft** | integração nativa e profunda |\n\n**Rodapé do bloco:**\n> Provedor regional com 30.000 clientes ativos.\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark (#0F172A) ou branco com elementos azuis\n- **Cor primária:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Tom:** direto, sem rodeios, fala a língua do provedor\n- **Regra:** sem traço como pontuação. Ponto ou vírgula.\n\n---\n\n## O que NÃO colocar\n\n- Descrição dos módulos (Marketing, CS) — não é hora\n- Tabela de preços — gera objeção antes da demo\n- Muitos logos ou elementos visuais — deve respirar\n- Texto longo — se precisar de mais de 5 segundos para ler o bloco, corta\n"}, {"t": "f", "n": "Pitch Deck Estrutura", "fn": "pitch_deck_estrutura.md", "c": "# Pitch Deck — AuroraISP\n**Versão:** 1.0\n**Data:** 26/03/2026\n\n---\n\n## Slide 1 — Capa\n\n**Título:** AuroraISP\n**Subtítulo:** Vende mais. Perde menos. Fideliza sempre.\n**Linha de apoio:** Hub de tecnologia com IA para provedores de internet.\n**Rodapé:** Pitch Comercial — Confidencial\n\n---\n\n## Slide 2 — O Problema\n\n**Título:** O dia a dia do time comercial hoje\n\n**4 cards:**\n\n1. **Lead some no WhatsApp**\n   Chega, pergunta o preço e desaparece. Ninguém acompanha.\n\n2. **Documentos no caos**\n   Vendedor pede CPF no chat, o cliente manda foto borrada, o processo trava.\n\n3. **Ativação manual e lenta**\n   Depois do contrato, alguém precisa lançar tudo no sistema. Retrabalho todo dia.\n\n4. **Time grande para pouco volume**\n   8 pessoas para atender 1.000 leads por mês. Custo alto, resultado médio.\n\n---\n\n## Slide 3 — A Solução\n\n**Título:** A AuroraISP resolve isso\n\n**Headline:** Do lead ao cliente fidelizado com inteligência.\n\n**Texto:**\nA Aurora automatiza o fluxo comercial do início ao fim. O lead entra no WhatsApp, o bot qualifica, coleta os documentos, gera o contrato e ativa direto no HubSoft. Sem planilha, sem retrabalho, sem lead perdido.\n\n**Destaque:** Integração nativa e profunda com HubSoft. Nenhum concorrente faz isso.\n\n---\n\n## Slide 4 — Os 3 Módulos\n\n**Título:** Um hub. Três módulos. Uma jornada completa.\n\n**3 colunas:**\n\n| Comercial ✅ | Marketing 🔧 | CS 🔧 |\n|---|---|---|\n| Lead no WhatsApp | Disparos de WhatsApp e e-mail | Clube de Benefícios |\n| Bot de qualificação | Fluxos de automação prontos | Prevenção de churn |\n| Coleta de documentos | Nutrição de leads | NPS automatizado |\n| Geração de contrato | Gestão de tráfego pago com IA | Upsell de plano e SVA |\n| Ativação no HubSoft | Relatórios de atribuição | Saúde da base |\n| CRM Kanban (Pro) | | |\n\n---\n\n## Slide 5 — Case de Produção\n\n**Título:** Resultado real. Provedor em produção.\n**Subtítulo:** Provedor regional com 30.000 clientes ativos.\n\n**5 métricas em destaque:**\n\n- **1.000** leads por mês\n- **400** vendas digitais/mês\n- **R$99,90** ticket médio\n- **2 pessoas** no time (eram 8)\n- **R$284.400** economia/ano em pessoal\n\n**Texto de apoio:**\n8 pessoas atendiam 1.000 leads por mês. Hoje 2 pessoas dão conta do mesmo volume. As outras 2 viraram backoffice estratégico, função que antes não existia.\n\n---\n\n## Slide 6 — Como Funciona\n\n**Título:** Do lead ao HubSoft em minutos\n\n**Fluxo visual (5 etapas em sequência):**\n\n```\nLead no WhatsApp → Bot qualifica → Coleta documentos → Gera contrato → Ativa no HubSoft\n```\n\n**Texto de apoio:**\nSem planilha. Sem retrabalho. Sem lead perdido.\nTudo integrado nativamente ao HubSoft.\n\n---\n\n## Slide 7 — Precificação\n\n**Título:** Preço que cresce com o provedor\n\n**3 planos (por módulo):**\n\n| | Starter | Start | Pro |\n|---|---|---|---|\n| Mensalidade | R$397/mês | R$797/mês | R$1.397/mês |\n| Público | ISPs pequenos | ISPs em crescimento | ISPs estabelecidos |\n| Usuários | Até 2 | Até 5 | Ilimitado |\n| Suporte | Standard | Standard | Prioritário |\n| Destaque | Entrada acessível | Mais popular | IA + CRM Kanban |\n\n**Nota:** Cada módulo (Comercial, Marketing, CS) tem seu próprio plano. Transacional por uso incluso.\n\n---\n\n## Slide 8 — Diferenciais\n\n**Título:** Por que AuroraISP\n\n**6 cards:**\n\n1. **HubSoft nativo**\n   Integração profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso.\n\n2. **Case real**\n   Resultado comprovado em produção. Não é promessa. São números reais de um provedor com 30.000 clientes.\n\n3. **IA no processo**\n   Qualificação, validação, sugestão de campanha e prevenção de churn com inteligência artificial.\n\n4. **Preço que faz sentido**\n   ROI positivo no primeiro mês. O transacional alinha o sucesso da Aurora com o sucesso do provedor.\n\n5. **Trial para HubSoft**\n   14 dias gratuitos para quem já usa HubSoft. Em 14 dias dá para ver resultado real.\n\n6. **Hub completo**\n   Comercial, Marketing e CS em uma plataforma. Do lead ao cliente fidelizado.\n\n---\n\n## Slide 9 — CTA\n\n**Título:** Próximo passo\n\n**Headline:** São 30 minutos para você ver funcionando.\n\n**Subtítulo:** Demo ao vivo. Sem compromisso.\n\n**Botão:** Agendar demonstração\n\n**Linha de apoio:** Provedores HubSoft: 14 dias gratuitos para testar.\n\n**Site:** auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo:** dark mode (#0F172A)\n- **Cor primária:** azul (#2563EB)\n- **Acento:** ciano (#06B6D4)\n- **Texto principal:** branco\n- **Texto secundário:** cinza claro (#F1F5F9)\n- **Tipografia:** Inter\n- **Tom:** direto, confiante, sem exagero\n"}, {"t": "f", "n": "Pre Demo Deck Estrutura", "fn": "pre_demo_deck_estrutura.md", "c": "# Pre-demo Deck — AuroraISP\n**Formato:** 6 slides PPT (16:9) exportado em PDF\n**Canal:** WhatsApp — enviado pelo parceiro antes da demo\n**Objetivo:** Gerar interesse nos 3 módulos e converter para uma reunião de demo\n\n---\n\n## Slide 1 — Capa\n\n**Layout:** centralizado, fundo dark\n\n**Logo:** [inserir quando disponível]\n\n**Título:**\n> AuroraISP\n\n**Tagline (destaque, fonte grande):**\n> Vende mais. Perde menos. Fideliza sempre.\n\n**Subtítulo:**\n> Hub de tecnologia com IA para provedores de internet.\n\n---\n\n## Slide 2 — O Problema\n\n**Layout:** 4 cards em linha, fundo claro\n\n**Título do slide:**\n> O que acontece todo dia no seu provedor\n\n**Card 1 — Lead some no WhatsApp**\n> O cliente pergunta o preço e desaparece. Ninguém acompanha. O lead esfria.\n\n**Card 2 — Documentos no caos**\n> Vendedor pede CPF no chat, cliente manda foto borrada, processo trava. A venda morre na burocracia.\n\n**Card 3 — Ativação manual e lenta**\n> Depois do contrato, alguém precisa lançar tudo no sistema. Retrabalho todo dia, toda venda.\n\n**Card 4 — Time grande, resultado médio**\n> Muitas pessoas para atender poucos leads. Custo alto. Conversão baixa.\n\n---\n\n## Slide 3 — Os 3 Módulos\n\n**Layout:** 3 colunas, fundo dark\n\n**Título do slide:**\n> Um hub completo. Do lead ao cliente fidelizado.\n\n**Coluna 1 — Comercial** ✅ Disponível\n> Automação do fluxo de vendas do início ao fim.\n> Lead no WhatsApp. Bot qualifica. Documentos coletados. Contrato gerado. Ativação no HubSoft.\n> Tudo sem intervenção manual.\n\n**Coluna 2 — Marketing** Em breve\n> Motor de automação do hub.\n> E-mail e WhatsApp com fluxos prontos. Nutrição de leads. Campanhas com IA. Tráfego pago gerenciado.\n> Réguas padrão já configuradas para o setor.\n\n**Coluna 3 — CS** Em breve\n> Retenção e fidelização pós-venda.\n> Clube de Benefícios. Prevenção de churn. NPS automatizado. Upsell de plano e SVA.\n> Cliente que fica, e que compra mais.\n\n**Linha de apoio (rodapé):**\n> Integração nativa e profunda com HubSoft em todos os módulos.\n\n---\n\n## Slide 4 — Case de Produção\n\n**Layout:** números grandes em destaque, fundo dark\n\n**Título do slide:**\n> Resultado real. Provedor em produção.\n\n**Subtítulo:**\n> Provedor regional com 30.000 clientes ativos.\n\n**5 métricas (número grande + label):**\n\n- **1.000** leads por mês\n- **400** vendas digitais por mês\n- **R$99,90** ticket médio\n- **2 pessoas** fazem o que 8 faziam\n- **R$284.400** economizados por ano em pessoal\n\n**Texto de apoio:**\n> 8 pessoas para atender 1.000 leads por mês. Hoje, 2 pessoas dão conta do mesmo volume. As outras 2 viraram backoffice estratégico. Função que antes não existia.\n\n---\n\n## Slide 5 — Por que AuroraISP\n\n**Layout:** 4 cards em grade 2x2, fundo claro\n\n**Título do slide:**\n> Por que a AuroraISP é diferente\n\n**Card 1 — HubSoft nativo**\n> Integração profunda com o ERP mais usado por ISPs regionais. Nenhum concorrente faz isso. Os dados do ERP alimentam todo o hub em tempo real.\n\n**Card 2 — Case real, não promessa**\n> Resultado comprovado em produção. Números reais de um provedor com 30.000 clientes. Você vê funcionando antes de assinar.\n\n**Card 3 — IA no processo**\n> Qualificação de leads, validação de documentos, sugestão de campanha e prevenção de churn. Inteligência onde o provedor mais precisa.\n\n**Card 4 — Preço que faz sentido**\n> ROI positivo no primeiro mês. O modelo transacional cresce junto com o provedor. Você paga mais quando vende mais.\n\n---\n\n## Slide 6 — CTA\n\n**Layout:** centralizado, fundo dark com destaque azul\n\n**Título:**\n> Veja funcionando. 30 minutos.\n\n**Subtítulo:**\n> Demo ao vivo, sem compromisso.\n> Você traz os seus números, a gente mostra o que a Aurora faria com eles.\n\n**Destaque:**\n> Provedores HubSoft: 14 dias gratuitos para testar.\n\n**Contato:**\n> [Nome do parceiro]\n> [WhatsApp]\n> auroraisp.com.br\n\n---\n\n## Diretrizes visuais\n\n- **Fundo slides escuros:** #0F172A\n- **Fundo slides claros:** #F1F5F9\n- **Cor primária:** #2563EB\n- **Acento:** #06B6D4\n- **Tipografia:** Inter\n- **Regra:** sem traço como pontuação. Ponto ou vírgula.\n- **Tom:** direto, próximo, confiante. Fala a língua do provedor.\n"}]}, {"t": "d", "n": "fluxos", "ch": [{"t": "f", "n": "Crm Parceiro", "fn": "crm_parceiro.md", "c": "# CRM do Parceiro — AuroraISP\n\n**Versão:** 1.0\n**Data:** 28/03/2026\n\n---\n\n## Qualificação de entrada\n\nTodo lead entra com uma qualificação definida na primeira etapa. Isso determina a prioridade e o caminho no pipeline, não se o lead entra ou não.\n\n| Qualificação | Critério | Impacto |\n|--------------|----------|---------|\n| **A** | Usa HubSoft | Alta prioridade. Trial de 14 dias disponível. Integração nativa |\n| **B** | Outro ERP | Média prioridade. Entra no pipeline normalmente, sem trial |\n\n---\n\n## Pipeline — 5 estágios\n\n### 1. Lead identificado\n\n**Critério de avanço:** contato do decisor confirmado.\n\n**Campos obrigatórios:**\n- Nome do provedor\n- Cidade\n- Nome do decisor\n- WhatsApp do decisor\n- ERP utilizado\n- Qualificação (A ou B)\n- Estimativa de clientes ativos\n- Estimativa de vendedores\n- Fonte do lead (comunidade, indicação, outbound, evento, inbound)\n\n---\n\n### 2. Em contato\n\n**Tarefas internas:**\n- [ ] Diagnóstico enviado\n- [ ] Demo agendada\n- [ ] Demo realizada\n\n**Critério de avanço:** demo realizada com decisor presente e sem objeção bloqueante.\n\n**Campos obrigatórios:**\n- Data do diagnóstico enviado\n- Data da demo agendada\n- Data da demo realizada\n- Decisor presente na demo (sim/não)\n- Dores principais identificadas\n- Simulação de ROI com dados reais do ISP\n\n---\n\n### 3. Em negociação\n\n**Tarefas internas:**\n- [ ] Proposta enviada\n- [ ] Follow-up D+2\n- [ ] Follow-up D+5\n\n**Critério de avanço:** prospect sinalizou interesse em fechar ou iniciou trial.\n\n**Campos obrigatórios:**\n- Módulo(s) de interesse\n- Plano de interesse (Starter / Start / Pro)\n- MRR estimado\n- Data da proposta enviada\n- Objeções levantadas\n- Próxima ação e data\n\n---\n\n### 4. Trial ativo\n\n*(Exclusivo para leads qualificação A — HubSoft)*\n\n**Tarefas internas:**\n- [ ] Ativação feita\n- [ ] Acompanhamento D+7\n- [ ] Encerramento D+14\n\n**Critério de avanço:** trial encerrado com decisão tomada.\n\n**Campos obrigatórios:**\n- Data de início do trial\n- Data de encerramento prevista\n- Módulo em trial\n- Responsável Aurora pelo acompanhamento\n\n---\n\n### 5. Finalizada\n\n**Campos obrigatórios:**\n- Resultado: Ganho / Perdido\n- Se ganho: módulo(s) contratado(s), plano, MRR fechado, data de início\n- Se perdido: motivo da perda, data de encerramento\n\n---\n\n## Responsabilidades\n\n| Atividade | Parceiro | Aurora |\n|-----------|----------|--------|\n| Preencher e avançar cards | ✅ | — |\n| Revisão semanal do funil | Participa | Conduz |\n| Ativação e onboarding | — | ✅ |\n| Acompanhamento do trial | — | ✅ |\n\n---\n\n## Observação\n\nEnquanto o módulo Comercial Pro não inclui CRM próprio para a AuroraISP, este documento serve como base para configurar a ferramenta provisória do parceiro (Notion, Planilha Google ou Pipedrive).\n"}]}, {"t": "d", "n": "juridico", "ch": [{"t": "f", "n": "Contrato Saas", "fn": "contrato_saas.md", "c": "# CONTRATO DE PRESTAÇÃO DE SERVIÇO DE SOFTWARE COMO SERVIÇO (SaaS)\n\n**Contrato nº:** [NÚMERO]\n**Data de assinatura:** [DATA]\n\n---\n\n## PARTES\n\n**CONTRATADA:** AURORAISP TECNOLOGIA LTDA., pessoa jurídica de direito privado, inscrita no CNPJ sob o nº [CNPJ], com sede na cidade de Teresina, Estado do Piauí, na [ENDEREÇO COMPLETO], neste ato representada por seu(s) sócio(s) administrador(es), doravante denominada simplesmente **AURORA** ou **CONTRATADA**.\n\n**CONTRATANTE:** [RAZÃO SOCIAL], pessoa jurídica de direito privado, inscrita no CNPJ sob o nº [CNPJ], com sede na cidade de [CIDADE], Estado de [UF], na [ENDEREÇO COMPLETO], neste ato representada por [REPRESENTANTE LEGAL], portador do CPF nº [CPF], doravante denominada simplesmente **CONTRATANTE**.\n\nAs partes acima qualificadas celebram o presente Contrato de Prestação de Serviço de Software como Serviço (SaaS), que será regido pelas cláusulas e condições a seguir.\n\n---\n\n## CLÁUSULA 1ª. DO OBJETO\n\n1.1. O presente contrato tem por objeto a prestação, pela CONTRATADA, de serviço de software como serviço (SaaS), por meio da plataforma **AuroraISP**, acessível via navegador web e integrações de API, destinada à automação de processos comerciais, de marketing e de sucesso do cliente para provedores de internet.\n\n1.2. A plataforma é composta por módulos independentes e complementares, conforme descrito na Cláusula 2ª, que podem ser contratados de forma isolada ou combinada, de acordo com a necessidade do CONTRATANTE.\n\n1.3. O acesso à plataforma será fornecido mediante login e senha individuais, com funcionalidades limitadas ao plano e módulos contratados.\n\n---\n\n## CLÁUSULA 2ª. DOS MÓDULOS E PLANOS\n\n2.1. A plataforma AuroraISP é organizada nos seguintes módulos:\n\n**a) Módulo Comercial.** Automação do fluxo comercial completo: qualificação de leads via WhatsApp, coleta de documentos, geração de contratos e ativação no ERP HubSoft. No plano Pro, inclui CRM Kanban com automações avançadas e validação por inteligência artificial.\n\n**b) Módulo Marketing.** Motor de automação de comunicação com leads e clientes. Inclui disparos de e-mail e WhatsApp, réguas de automação prontas, fluxos personalizados e, no plano Pro, gestão de tráfego pago com inteligência artificial.\n\n**c) Módulo CS (Customer Success).** Ferramentas de retenção e fidelização pós-venda, incluindo Clube de Benefícios, réguas de retenção, NPS e, no plano Pro, prevenção de churn e upsell automatizado com inteligência artificial.\n\n2.2. Cada módulo está disponível em três planos de funcionalidade:\n\n| Plano | Público alvo | Usuários | Suporte |\n|-------|-------------|----------|---------|\n| **Starter** | ISPs com até 2.000 clientes | 1 a 2 | Standard |\n| **Start** | ISPs de 2.000 a 10.000 clientes | Até 5 | Standard |\n| **Pro** | ISPs acima de 10.000 clientes | Ilimitado | Prioritário |\n\n2.3. Os módulos e planos contratados estão especificados no **Anexo I** deste contrato, que é parte integrante e indissociável do presente instrumento.\n\n2.4. O CONTRATANTE poderá solicitar alteração de plano ou inclusão de novos módulos a qualquer momento, mediante formalização por escrito, com efeitos a partir do ciclo de faturamento seguinte.\n\n---\n\n## CLÁUSULA 3ª. DA REMUNERAÇÃO\n\n3.1. A remuneração devida pelo CONTRATANTE à CONTRATADA é composta por duas parcelas:\n\n**a) Mensalidade fixa.** Valor fixo mensal por cada módulo e plano contratado, conforme tabela abaixo:\n\n| Módulo | Starter | Start | Pro |\n|--------|---------|-------|-----|\n| Comercial | R$ 397,00/mês | R$ 797,00/mês | R$ 1.397,00/mês |\n| Marketing | R$ 297,00/mês | R$ 597,00/mês | R$ 997,00/mês |\n| CS | R$ 247,00/mês | R$ 497,00/mês | R$ 897,00/mês |\n\n**b) Taxa transacional variável.** Valor variável mensal, calculado com base em eventos mensuráveis vinculados ao uso efetivo da plataforma, conforme tabela abaixo:\n\n| Módulo | Evento gerador | Valor unitário |\n|--------|---------------|----------------|\n| Comercial | Venda finalizada e validada no ERP do CONTRATANTE | R$ 7,00 por venda |\n| Marketing | Contato ativo na base de leads gerenciada pela plataforma | R$ 0,05 por contato/mês |\n| CS | Cliente ativo no Clube de Benefícios | R$ 0,15 por cliente/mês |\n\n3.2. Não há limite de volume para nenhum dos eventos transacionais. A cobrança acompanha proporcionalmente o crescimento operacional do CONTRATANTE.\n\n3.3. A CONTRATADA emitirá fatura mensal até o dia 5 (cinco) de cada mês, referente ao mês anterior, discriminando a mensalidade fixa e os eventos transacionais apurados.\n\n3.4. O pagamento deverá ser efetuado até o dia 10 (dez) do mês de emissão da fatura, por meio de boleto bancário, PIX ou outro meio indicado pela CONTRATADA.\n\n3.5. O atraso no pagamento acarretará multa de 2% (dois por cento) sobre o valor devido, acrescido de juros moratórios de 1% (um por cento) ao mês, calculados pro rata die, e correção monetária pelo IPCA.\n\n3.6. Em caso de inadimplência superior a 30 (trinta) dias, a CONTRATADA poderá suspender o acesso à plataforma até a regularização integral dos valores devidos, sem que isso configure rescisão contratual.\n\n3.7. Os valores previstos neste contrato poderão ser reajustados anualmente, na data de aniversário do contrato, pela variação acumulada do IPCA/IBGE dos 12 (doze) meses anteriores, ou por índice que venha a substituí-lo.\n\n---\n\n## CLÁUSULA 4ª. DO PERÍODO DE TESTE (TRIAL)\n\n4.1. A CONTRATADA oferece período de teste gratuito de 14 (quatorze) dias corridos para provedores que utilizem o sistema HubSoft como ERP principal.\n\n4.2. Durante o período de teste, o CONTRATANTE terá acesso às funcionalidades do plano e módulos definidos em comum acordo, sem cobrança de mensalidade ou taxa transacional.\n\n4.3. Ao término do período de teste, caso o CONTRATANTE não manifeste interesse na contratação definitiva, o acesso será automaticamente encerrado e os dados inseridos durante o trial serão mantidos por 15 (quinze) dias adicionais para eventual recuperação.\n\n4.4. Caso o CONTRATANTE opte pela contratação definitiva, a cobrança terá início a partir do primeiro dia útil seguinte ao término do período de teste, e este contrato passa a vigorar em sua integralidade.\n\n4.5. O período de teste não gera vínculo contratual definitivo nem obrigação de contratação por parte do CONTRATANTE.\n\n---\n\n## CLÁUSULA 5ª. DO PRAZO E DA VIGÊNCIA\n\n5.1. O presente contrato terá vigência por prazo indeterminado, com início na data de sua assinatura ou, quando aplicável, na data de conversão do período de teste em contratação definitiva.\n\n5.2. Qualquer das partes poderá rescindir o contrato mediante notificação por escrito com antecedência mínima de 30 (trinta) dias, conforme disposto na Cláusula 10ª.\n\n---\n\n## CLÁUSULA 6ª. DO NÍVEL DE SERVIÇO (SLA)\n\n6.1. A CONTRATADA se compromete a manter a disponibilidade da plataforma em, no mínimo, 99,5% (noventa e nove vírgula cinco por cento) do tempo total de cada mês calendário, excluídas as janelas de manutenção programada.\n\n6.2. As janelas de manutenção programada serão comunicadas ao CONTRATANTE com antecedência mínima de 48 (quarenta e oito) horas, preferencialmente agendadas para horários de baixo uso (entre 00h e 06h, horário de Brasília).\n\n6.3. Em caso de indisponibilidade não programada que exceda o limite de 99,5%, o CONTRATANTE terá direito a crédito proporcional na mensalidade do mês seguinte, calculado sobre o tempo excedente de indisponibilidade.\n\n6.4. O suporte técnico será prestado via WhatsApp, em horário comercial (segunda a sexta, das 8h às 18h, horário de Brasília), com os seguintes prazos de resposta:\n\n| Plano | Primeira resposta | Resolução |\n|-------|------------------|-----------|\n| Starter e Start (Standard) | Até 4 horas úteis | Até 24 horas úteis |\n| Pro (Prioritário) | Até 1 hora útil | Até 8 horas úteis |\n\n6.5. Incidentes críticos que impeçam o uso integral da plataforma serão tratados com prioridade máxima, independentemente do plano contratado.\n\n---\n\n## CLÁUSULA 7ª. DOS DADOS E DA PRIVACIDADE\n\n7.1. Todos os dados inseridos pelo CONTRATANTE na plataforma são de propriedade exclusiva do CONTRATANTE. A CONTRATADA atua como operadora dos dados pessoais nos termos da Lei nº 13.709/2018 (LGPD).\n\n7.2. A plataforma opera em regime de multi-tenancy com isolamento lógico de dados. Os dados de cada CONTRATANTE são armazenados de forma segregada, impedindo o acesso por outros contratantes.\n\n7.3. A CONTRATADA não utilizará os dados do CONTRATANTE para finalidades distintas da prestação do serviço contratado, salvo quando necessário para cumprir obrigação legal ou regulatória, ou mediante consentimento prévio e expresso do CONTRATANTE.\n\n7.4. A CONTRATADA adotará medidas técnicas e administrativas adequadas para proteger os dados pessoais contra acessos não autorizados, destruição, perda, alteração ou qualquer forma de tratamento inadequado ou ilícito, em conformidade com a LGPD.\n\n7.5. Em caso de incidente de segurança que comprometa dados pessoais do CONTRATANTE, a CONTRATADA comunicará o fato ao CONTRATANTE em até 48 (quarenta e oito) horas após a tomada de conhecimento, indicando a natureza dos dados afetados, as medidas adotadas e as recomendações para mitigação de riscos.\n\n7.6. A integração com o sistema HubSoft (ERP do CONTRATANTE) será realizada mediante API, com transferência de dados estritamente necessários à operação dos módulos contratados. O CONTRATANTE é responsável por garantir que possui base legal adequada para o compartilhamento desses dados.\n\n7.7. O tratamento de dados pessoais será regido pela Política de Privacidade da CONTRATADA, disponível em [URL], que é parte integrante deste contrato.\n\n---\n\n## CLÁUSULA 8ª. DA PROPRIEDADE INTELECTUAL\n\n8.1. A plataforma AuroraISP, incluindo seu código fonte, arquitetura, interfaces, algoritmos, modelos de inteligência artificial, documentação e materiais correlatos, é de propriedade exclusiva da CONTRATADA, protegida pelas leis de propriedade intelectual e direitos autorais vigentes no Brasil.\n\n8.2. O presente contrato não transfere ao CONTRATANTE qualquer direito de propriedade intelectual sobre a plataforma. O CONTRATANTE recebe licença de uso não exclusiva, intransferível e revogável, limitada ao prazo de vigência do contrato e ao escopo dos módulos e planos contratados.\n\n8.3. É vedado ao CONTRATANTE copiar, modificar, descompilar, fazer engenharia reversa, sublicenciar ou explorar comercialmente qualquer componente da plataforma.\n\n---\n\n## CLÁUSULA 9ª. DA CONFIDENCIALIDADE\n\n9.1. As partes se comprometem a manter em sigilo todas as informações confidenciais a que tiverem acesso em razão deste contrato, incluindo, mas não se limitando a: dados comerciais, estratégias de negócio, informações financeiras, dados de clientes, especificações técnicas e quaisquer outros dados que não sejam de conhecimento público.\n\n9.2. A obrigação de confidencialidade aplica-se a ambas as partes, seus sócios, diretores, empregados, prepostos e subcontratados, permanecendo vigente pelo prazo de 5 (cinco) anos após o encerramento deste contrato.\n\n9.3. Não serão consideradas confidenciais as informações que:\n\na) Sejam ou se tornem de domínio público sem violação deste contrato;\n\nb) Já eram de conhecimento da parte receptora antes da divulgação;\n\nc) Sejam recebidas licitamente de terceiros sem restrição de confidencialidade;\n\nd) Devam ser divulgadas por força de lei, ordem judicial ou determinação de autoridade competente, caso em que a parte obrigada comunicará a outra parte previamente, quando possível.\n\n9.4. A violação da obrigação de confidencialidade sujeitará a parte infratora ao pagamento de indenização por perdas e danos, sem prejuízo de outras medidas judiciais cabíveis.\n\n---\n\n## CLÁUSULA 10ª. DA RESCISÃO E DO CANCELAMENTO\n\n10.1. Qualquer das partes poderá rescindir o presente contrato, sem justa causa, mediante notificação por escrito à outra parte com antecedência mínima de 30 (trinta) dias.\n\n10.2. Em caso de rescisão, o CONTRATANTE será responsável pelo pagamento de todas as mensalidades e taxas transacionais referentes ao período efetivamente utilizado, incluindo o período de aviso prévio.\n\n10.3. Após o encerramento do contrato, a CONTRATADA disponibilizará ao CONTRATANTE a exportação de seus dados em formato estruturado (CSV ou JSON) pelo prazo de 30 (trinta) dias. Após esse prazo, os dados serão permanentemente excluídos dos servidores da CONTRATADA, ressalvadas as hipóteses de retenção previstas em lei.\n\n10.4. Constituem motivos para rescisão imediata, por justa causa, independentemente de notificação prévia:\n\na) Inadimplência do CONTRATANTE por período superior a 60 (sessenta) dias;\n\nb) Uso da plataforma em desacordo com os Termos de Uso ou com a legislação vigente;\n\nc) Violação das obrigações de confidencialidade por qualquer das partes;\n\nd) Decretação de falência, recuperação judicial ou extrajudicial de qualquer das partes;\n\ne) Comprovada impossibilidade técnica de continuidade na prestação do serviço pela CONTRATADA, por motivo de força maior, pelo prazo superior a 30 (trinta) dias consecutivos.\n\n10.5. A rescisão do contrato não exime as partes do cumprimento das obrigações vencidas e não pagas até a data da rescisão.\n\n---\n\n## CLÁUSULA 11ª. DA LIMITAÇÃO DE RESPONSABILIDADE\n\n11.1. A responsabilidade total da CONTRATADA por quaisquer danos decorrentes deste contrato será limitada ao valor total pago pelo CONTRATANTE nos 12 (doze) meses imediatamente anteriores ao evento que deu causa ao dano.\n\n11.2. A CONTRATADA não será responsável por danos indiretos, incidentais, consequenciais, lucros cessantes ou perda de dados decorrentes do uso ou da impossibilidade de uso da plataforma, salvo em caso de dolo ou culpa grave comprovada.\n\n11.3. A CONTRATADA não será responsável por falhas, indisponibilidades ou limitações decorrentes de:\n\na) Interrupção de serviços de terceiros (provedores de hospedagem, APIs externas, serviços de telecomunicações);\n\nb) Uso inadequado da plataforma pelo CONTRATANTE ou por seus usuários;\n\nc) Eventos de força maior ou caso fortuito, conforme definidos no Código Civil Brasileiro;\n\nd) Ações ou omissões do CONTRATANTE que comprometam a integridade ou segurança da plataforma.\n\n---\n\n## CLÁUSULA 12ª. DAS OBRIGAÇÕES DO CONTRATANTE\n\n12.1. São obrigações do CONTRATANTE:\n\na) Efetuar o pagamento das faturas nos prazos estipulados;\n\nb) Manter atualizados seus dados cadastrais junto à CONTRATADA;\n\nc) Utilizar a plataforma em conformidade com os Termos de Uso e com a legislação vigente;\n\nd) Garantir a segurança das credenciais de acesso de seus usuários, sendo responsável por qualquer ação realizada por meio de suas contas;\n\ne) Possuir base legal adequada para o tratamento dos dados pessoais inseridos na plataforma, nos termos da LGPD;\n\nf) Manter a integração com o ERP HubSoft operacional e atualizada, quando aplicável;\n\ng) Comunicar à CONTRATADA, em até 48 (quarenta e oito) horas, qualquer incidente de segurança ou uso não autorizado de que tenha conhecimento.\n\n---\n\n## CLÁUSULA 13ª. DAS OBRIGAÇÕES DA CONTRATADA\n\n13.1. São obrigações da CONTRATADA:\n\na) Disponibilizar a plataforma conforme os níveis de serviço estabelecidos na Cláusula 6ª;\n\nb) Prestar suporte técnico nos prazos e condições definidos neste contrato;\n\nc) Manter a plataforma atualizada, implementando melhorias e correções de segurança;\n\nd) Tratar os dados do CONTRATANTE com confidencialidade e em conformidade com a LGPD;\n\ne) Comunicar ao CONTRATANTE qualquer alteração relevante nas funcionalidades da plataforma com antecedência mínima de 15 (quinze) dias;\n\nf) Realizar o onboarding do CONTRATANTE, assegurando a correta configuração dos módulos contratados;\n\ng) Disponibilizar exportação dos dados do CONTRATANTE em caso de encerramento do contrato, conforme Cláusula 10ª.\n\n---\n\n## CLÁUSULA 14ª. DAS DISPOSIÇÕES GERAIS\n\n14.1. Este contrato constitui o acordo integral entre as partes com relação ao seu objeto, substituindo todas as negociações, entendimentos e acordos anteriores, verbais ou escritos.\n\n14.2. Nenhuma alteração ou aditamento a este contrato será válido, salvo se formalizado por escrito e assinado por ambas as partes.\n\n14.3. A tolerância de qualquer das partes quanto ao descumprimento de qualquer obrigação pela outra parte não constituirá renúncia, novação ou precedente.\n\n14.4. Caso qualquer cláusula deste contrato seja considerada inválida ou inexequível, as demais cláusulas permanecerão em pleno vigor e efeito.\n\n14.5. O CONTRATANTE não poderá ceder ou transferir os direitos e obrigações decorrentes deste contrato sem o consentimento prévio e por escrito da CONTRATADA.\n\n14.6. As comunicações entre as partes poderão ser realizadas por e-mail, sendo consideradas válidas quando enviadas para os endereços cadastrados.\n\n---\n\n## CLÁUSULA 15ª. DO FORO\n\n15.1. As partes elegem o foro da Comarca de Teresina, Estado do Piauí, para dirimir quaisquer controvérsias oriundas deste contrato, com renúncia expressa a qualquer outro, por mais privilegiado que seja.\n\n---\n\n## ASSINATURAS\n\nTeresina/PI, [DATA].\n\n&nbsp;\n\n_______________________________________________\n**CONTRATADA:** AURORAISP TECNOLOGIA LTDA.\nNome: [NOME DO REPRESENTANTE]\nCPF: [CPF]\nCargo: [CARGO]\n\n&nbsp;\n\n_______________________________________________\n**CONTRATANTE:** [RAZÃO SOCIAL]\nNome: [NOME DO REPRESENTANTE]\nCPF: [CPF]\nCargo: [CARGO]\n\n&nbsp;\n\n_______________________________________________\n**TESTEMUNHA 1**\nNome: [NOME]\nCPF: [CPF]\n\n&nbsp;\n\n_______________________________________________\n**TESTEMUNHA 2**\nNome: [NOME]\nCPF: [CPF]\n\n---\n\n## ANEXO I. MÓDULOS E PLANOS CONTRATADOS\n\n| Módulo | Plano | Mensalidade | Transacional |\n|--------|-------|-------------|-------------|\n| [MÓDULO] | [PLANO] | R$ [VALOR]/mês | [DESCRIÇÃO DO EVENTO E VALOR UNITÁRIO] |\n| [MÓDULO] | [PLANO] | R$ [VALOR]/mês | [DESCRIÇÃO DO EVENTO E VALOR UNITÁRIO] |\n| [MÓDULO] | [PLANO] | R$ [VALOR]/mês | [DESCRIÇÃO DO EVENTO E VALOR UNITÁRIO] |\n\n**Usuários autorizados:** [QUANTIDADE]\n\n**Data de início da vigência:** [DATA]\n\n**Período de teste aplicável:** ( ) Sim, 14 dias gratuitos ( ) Não\n"}, {"t": "f", "n": "Politica Privacidade", "fn": "politica_privacidade.md", "c": "# POLÍTICA DE PRIVACIDADE DA PLATAFORMA AURORAISP\n\n**Última atualização:** 30 de março de 2026\n\n---\n\n## 1. INTRODUÇÃO\n\n1.1. A presente Política de Privacidade (\"Política\") descreve como a **AURORAISP TECNOLOGIA LTDA.** (\"Aurora\"), pessoa jurídica de direito privado, inscrita no CNPJ sob o nº [CNPJ], com sede na cidade de Teresina, Estado do Piauí, coleta, utiliza, armazena, compartilha e protege os dados pessoais tratados por meio da plataforma **AuroraISP** (\"Plataforma\").\n\n1.2. Esta Política foi elaborada em conformidade com a Lei nº 13.709/2018 (Lei Geral de Proteção de Dados Pessoais, \"LGPD\"), o Marco Civil da Internet (Lei nº 12.965/2014), seu regulamento (Decreto nº 8.771/2016) e demais normas aplicáveis.\n\n1.3. Ao utilizar a Plataforma, o titular dos dados declara ter lido e compreendido esta Política. Recomendamos a leitura atenta de todas as suas disposições.\n\n---\n\n## 2. DEFINIÇÕES\n\n2.1. Para os fins desta Política, aplicam-se as seguintes definições, em consonância com a LGPD:\n\n**a) Dados Pessoais:** informação relacionada a pessoa natural identificada ou identificável.\n\n**b) Dados Pessoais Sensíveis:** dado pessoal sobre origem racial ou étnica, convicção religiosa, opinião política, filiação a sindicato ou a organização de caráter religioso, filosófico ou político, dado referente à saúde ou à vida sexual, dado genético ou biométrico, quando vinculado a uma pessoa natural.\n\n**c) Titular:** pessoa natural a quem se referem os dados pessoais que são objeto de tratamento.\n\n**d) Controlador:** pessoa natural ou jurídica, de direito público ou privado, a quem competem as decisões referentes ao tratamento de dados pessoais.\n\n**e) Operador:** pessoa natural ou jurídica, de direito público ou privado, que realiza o tratamento de dados pessoais em nome do controlador.\n\n**f) Tratamento:** toda operação realizada com dados pessoais, como coleta, produção, recepção, classificação, utilização, acesso, reprodução, transmissão, distribuição, processamento, arquivamento, armazenamento, eliminação, avaliação, controle, modificação, comunicação, transferência, difusão ou extração.\n\n**g) ANPD:** Autoridade Nacional de Proteção de Dados, órgão da administração pública responsável por zelar, implementar e fiscalizar o cumprimento da LGPD.\n\n---\n\n## 3. PAPÉIS NO TRATAMENTO DE DADOS\n\n3.1. A Aurora atua em dois papéis distintos no tratamento de dados pessoais:\n\n**a) Como Controladora:** em relação aos dados pessoais dos representantes legais e colaboradores dos CONTRATANTES, coletados para fins de cadastro, faturamento, suporte e comunicações relacionadas ao contrato.\n\n**b) Como Operadora:** em relação aos dados pessoais de clientes e leads dos CONTRATANTES, inseridos na Plataforma pelo CONTRATANTE para fins de operação dos módulos contratados (Comercial, Marketing e CS). Nesse caso, o CONTRATANTE é o Controlador dos dados.\n\n3.2. Quando atua como Operadora, a Aurora trata os dados pessoais estritamente conforme as instruções e finalidades definidas pelo CONTRATANTE (Controlador), em conformidade com o Contrato de Prestação de Serviço SaaS.\n\n---\n\n## 4. DADOS PESSOAIS COLETADOS\n\n4.1. **Dados dos representantes e colaboradores do CONTRATANTE (Aurora como Controladora):**\n\n| Categoria | Dados |\n|-----------|-------|\n| Identificação | Nome completo, CPF, RG |\n| Contato | E-mail, telefone, WhatsApp |\n| Profissional | Cargo, função, nome da empresa, CNPJ |\n| Acesso | Login, senha (armazenada de forma criptografada), logs de acesso |\n\n4.2. **Dados de clientes e leads do CONTRATANTE (Aurora como Operadora):**\n\n| Categoria | Dados |\n|-----------|-------|\n| Identificação | Nome completo, CPF, RG |\n| Contato | E-mail, telefone, WhatsApp, endereço completo (rua, número, bairro, cidade, UF, CEP) |\n| Documentos | Cópias digitalizadas de documentos pessoais (RG, CPF, comprovante de residência) |\n| Comercial | Plano de interesse, status do atendimento, histórico de interações |\n| Fidelização | Participação no Clube de Benefícios, vouchers utilizados, carteirinha digital |\n\n4.3. **Dados coletados automaticamente:**\n\n| Categoria | Dados |\n|-----------|-------|\n| Navegação | Endereço IP, tipo de navegador, sistema operacional, páginas acessadas, data e hora de acesso |\n| Dispositivo | Tipo de dispositivo, resolução de tela, idioma |\n| Logs | Registros de ações realizadas na Plataforma para fins de auditoria e segurança |\n\n4.4. A Aurora **não coleta** dados pessoais sensíveis (Art. 5º, II, da LGPD) de forma intencional. Caso o CONTRATANTE insira dados sensíveis na Plataforma, a responsabilidade pela obtenção do consentimento específico do titular será exclusivamente do CONTRATANTE.\n\n---\n\n## 5. FINALIDADES DO TRATAMENTO\n\n5.1. Os dados pessoais são tratados para as seguintes finalidades:\n\n| Finalidade | Base Legal (LGPD) |\n|-----------|-------------------|\n| Prestação do serviço contratado (operação dos módulos Comercial, Marketing e CS) | Execução de contrato (Art. 7º, V) |\n| Cadastro e autenticação de usuários na Plataforma | Execução de contrato (Art. 7º, V) |\n| Faturamento, cobrança e emissão de notas fiscais | Cumprimento de obrigação legal (Art. 7º, II) |\n| Suporte técnico e atendimento ao CONTRATANTE | Execução de contrato (Art. 7º, V) |\n| Comunicações sobre atualizações, manutenções e alterações no serviço | Interesse legítimo (Art. 7º, IX) |\n| Integração com o ERP HubSoft do CONTRATANTE | Execução de contrato (Art. 7º, V) |\n| Segurança da Plataforma, prevenção de fraudes e auditoria | Interesse legítimo (Art. 7º, IX) |\n| Melhoria da Plataforma com base em dados agregados e anonimizados | Interesse legítimo (Art. 7º, IX) |\n| Cumprimento de obrigações legais, regulatórias ou determinações judiciais | Cumprimento de obrigação legal (Art. 7º, II) |\n\n5.2. A Aurora não realiza tratamento de dados pessoais para finalidades incompatíveis com as descritas nesta Política.\n\n5.3. A Aurora não utiliza dados pessoais do CONTRATANTE ou de seus clientes para fins de marketing próprio, venda a terceiros ou qualquer outra finalidade não descrita nesta Política.\n\n---\n\n## 6. COMPARTILHAMENTO DE DADOS\n\n6.1. A Aurora poderá compartilhar dados pessoais com os seguintes destinatários, exclusivamente para as finalidades descritas nesta Política:\n\n| Destinatário | Finalidade | Dados compartilhados |\n|-------------|-----------|---------------------|\n| **HubSoft** (ERP do CONTRATANTE) | Integração operacional para ativação de contratos, consulta de viabilidade e sincronização de dados | Dados cadastrais e comerciais de clientes do CONTRATANTE |\n| **Provedores de infraestrutura** | Hospedagem, armazenamento e processamento de dados | Todos os dados, de forma criptografada |\n| **Serviços de comunicação** | Envio de mensagens via WhatsApp e e-mail | Dados de contato |\n| **Autoridades públicas** | Cumprimento de obrigação legal ou determinação judicial | Dados solicitados pela autoridade |\n\n6.2. O compartilhamento com o HubSoft ocorre via API, com transferência de dados estritamente necessários à operação dos módulos contratados. O CONTRATANTE, na qualidade de Controlador, é responsável por garantir base legal adequada para esse compartilhamento.\n\n6.3. A Aurora **não vende, aluga ou comercializa** dados pessoais a terceiros para quaisquer fins.\n\n6.4. Todos os terceiros com quem a Aurora compartilha dados são contratualmente obrigados a adotar medidas de segurança e privacidade compatíveis com esta Política e com a LGPD.\n\n---\n\n## 7. ARMAZENAMENTO E RETENÇÃO\n\n7.1. Os dados pessoais são armazenados em servidores localizados no Brasil e/ou em provedores de nuvem com política de proteção de dados compatível com a legislação brasileira.\n\n7.2. Os prazos de retenção dos dados pessoais são os seguintes:\n\n| Categoria | Prazo de retenção |\n|-----------|------------------|\n| Dados do CONTRATANTE (cadastro e faturamento) | Durante a vigência do contrato + 5 (cinco) anos após o encerramento, para cumprimento de obrigações legais, fiscais e tributárias |\n| Dados de clientes e leads do CONTRATANTE | Durante a vigência do contrato. Após o encerramento, disponíveis
