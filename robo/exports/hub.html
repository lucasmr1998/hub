 urls.py de cada app |\n| Templates | 24 templates migrados para diretórios de cada app |\n| Admin migrado | 3.676 linhas de admin distribuídas em 7 apps |\n| Linhas de código | ~30.000+ |\n| Testes | 225 (10 arquivos, 28+ factories, CI/CD) |\n| Multi-tenancy | ✅ Implementado (29/03/2026). TenantMixin em todos os models incluindo CRM. Pendente deploy |\n| Segurança | ✅ 5 críticas + 12 altas/médias corrigidas (30/03/2026) |\n| API REST | ✅ DRF com TokenAuth + SessionAuth. Swagger em /api/docs/ |\n\n### 1.2 Apps existentes\n\n#### `vendas_web` — DESATIVADO (31/03/2026)\nRemovido do INSTALLED_APPS. Todos os 27 models, 128 views, 24 templates, 139 rotas, 3.676 linhas de admin, signals e services foram migrados para os 15 apps em `apps/`. O `urls.py` e `admin.py` estão vazios. Migrations limpas e regeneradas do zero.\n\n#### `apps/` — Estrutura modular (15 apps)\nTodos os models têm app_label natural (sem `app_label='vendas_web'`). Cada app possui seus próprios models, views, urls, templates, admin e migrations. Base.html e static files centralizados em `apps/sistema/`.\n\n---\n\n## 2. Mapa completo de funcionalidades\n\n### 2.1 Domínio: Leads (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Captura de leads via WhatsApp/N8N | LeadProspecto | Produção |\n| Score de qualificação automático (0-100) | LeadProspecto.score_qualificacao | Produção |\n| Upload e validação de documentos | ImagemLeadProspecto | Produção |\n| Workflow de processamento | Prospecto | Produção |\n| Histórico de interações | HistoricoContato | Produção |\n| Listagem com filtros e busca | views.leads_view | Produção |\n| Visualização da conversa HTML/PDF | views.visualizar_conversa_lead | Produção |\n\n### 2.2 Domínio: Atendimento/Bot (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Fluxos conversacionais configuráveis | FluxoAtendimento | Produção |\n| 20 tipos de questão (texto, CPF, CEP, IA, condicional) | QuestaoFluxo | Produção |\n| Sessão de atendimento com estado | AtendimentoFluxo | Produção |\n| Respostas e tentativas registradas | RespostaQuestao, TentativaResposta | Produção |\n| APIs dedicadas para N8N (15+ endpoints) | views_api_atendimento | Produção |\n| Fluxo inteligente com roteamento condicional | QuestaoFluxo.condicoes_avancadas | Produção |\n\n### 2.3 Domínio: Cadastro e Contrato (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Formulário de cadastro de cliente | CadastroCliente | Produção |\n| Gestão de documentos por lead | DocumentoLead | Produção |\n| Configuração do formulário de cadastro | ConfiguracaoCadastro | Produção |\n| Catálogo de planos de internet | PlanoInternet | Produção |\n| Opções de vencimento | OpcaoVencimento | Produção |\n| Geração de PDF do contrato (WeasyPrint) | Signal automático | Produção |\n| Envio de docs e aceite no HubSoft | contrato_service.py | Produção |\n\n### 2.4 Domínio: Notificações (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Tipos de notificação (lead_novo, venda_aprovada...) | TipoNotificacao | Produção |\n| Canais (WhatsApp, webhook) | CanalNotificacao | Produção |\n| Preferências por usuário | PreferenciaNotificacao | Produção |\n| Histórico de envios | Notificacao | Produção |\n| Templates de mensagem | TemplateNotificacao | Produção |\n| Config de WhatsApp Business | API dedicada | Produção |\n\n### 2.5 Domínio: Campanhas (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Cadastro de campanhas de tráfego pago | CampanhaTrafego | Produção |\n| Detecção automática por keyword | DeteccaoCampanha | Produção |\n| Atribuição de origem ao lead | Signal automático | Produção |\n| Métricas por campanha (leads, conversão) | Dashboard | Produção |\n\n### 2.6 Domínio: Viabilidade (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Cadastro de cidades/bairros com cobertura | CidadeViabilidade | Produção |\n| Consulta por CEP com ViaCEP | API pública | Produção |\n\n### 2.7 Domínio: Sistema/Config (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Configuração da empresa (nome, logo, cores) | ConfiguracaoEmpresa | Produção |\n| Configurações gerais do sistema | ConfiguracaoSistema | Produção |\n| Configuração de recontato | ConfiguracaoRecontato | Produção |\n| Status customizáveis | StatusConfiguravel | Produção |\n| Log de auditoria | LogSistema | Produção |\n| Gestão de usuários | User + monkey-patch telefone | Produção (com débito) |\n\n### 2.8 Domínio: Integrações (app `integracoes`)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Conexão OAuth com HubSoft | IntegracaoAPI | Produção |\n| Sincronização de clientes (command + systemd timer) | ClienteHubsoft | Produção |\n| Sincronização de serviços/planos | ServicoClienteHubsoft | Produção |\n| Log de auditoria de todas as chamadas | LogIntegracao | Produção |\n\n### 2.9 Domínio: CRM (app `crm`)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Pipeline kanban com estágios configuráveis | PipelineEstagio | Pronto |\n| Oportunidade de venda (card do kanban) | OportunidadeVenda | Pronto |\n| Drag and drop entre estágios | api_mover_oportunidade | Pronto |\n| Histórico imutável de movimentação | HistoricoPipelineEstagio | Pronto |\n| Equipes de vendas com líder | EquipeVendas | Pronto |\n| Perfil de vendedor (cargo, ID HubSoft) | PerfilVendedor | Pronto |\n| Tags de classificação | TagCRM | Pronto |\n| Tarefas com vencimento, lembrete, auto-vence | TarefaCRM | Pronto |\n| Notas internas (fixar, menções, tipos) | NotaInterna | Pronto |\n| Metas individuais e por equipe | MetaVendas | Pronto |\n| Segmentação dinâmica/manual de leads | SegmentoCRM, MembroSegmento | Pronto |\n| Alertas de retenção (churn, inadimplência) | AlertaRetencao | Pronto |\n| Auto-criação de oportunidade por score | Signal (post_save Lead) | Pronto |\n| Conversão automática quando lead fecha | Signal (post_save Historico) | Pronto |\n| Webhooks N8N por evento (novo, mudança, tarefa) | ConfiguracaoCRM | Pronto |\n| Scanner de retenção | api_scanner_retencao | Pronto |\n| Webhook inbound HubSoft contrato | webhook_hubsoft_contrato | Pronto |\n\n### 2.10 Domínio: Dashboard e Relatórios (vendas_web)\n\n| Funcionalidade | Status |\n|----------------|--------|\n| Dashboard com métricas em tempo real | Produção |\n| Gráficos de funil e conversão | Produção |\n| Monitoramento de atendimentos em tempo real | Produção |\n| Jornada completa do cliente | Produção |\n| Relatório de leads por período | Produção |\n| Relatório de clientes ativos | Produção |\n| Relatório de atendimentos com métricas | Produção |\n| Relatório de conversões | Produção |\n| Funil insights | Produção |\n\n---\n\n## 3. Débitos técnicos que bloqueiam o SaaS\n\n### 3.1 Críticos (bloqueiam novos clientes)\n\n| Débito | Impacto | Esforço | Status |\n|--------|---------|---------|--------|\n| **Multi-tenancy inexistente** | Impossível ter mais de 1 provedor no sistema | Alto | ✅ Concluído (29/03). TenantMixin em todos os models |\n| **Credenciais hardcoded** (DB, SECRET_KEY, token Matrix) | Comprometimento total em repo público | Baixo | ✅ Concluído (29/03). Todas em variáveis de ambiente |\n| **APIs sem autenticação** (middleware isenta `^api/`) | Qualquer pessoa manipula dados | Médio | ✅ Concluído (30/03). 27 endpoints com @api_token_required, 21 com @login_required |\n| **DEBUG=True em produção** | Expõe stack traces com variáveis | Baixo | ✅ Concluído (29/03) |\n\n### 3.2 Altos (impactam operação)\n\n| Débito | Impacto | Esforço | Status |\n|--------|---------|---------|--------|\n| **God App (vendas_web)** com 27 models em 1 arquivo | Manutenção cada vez mais difícil | Alto | ✅ Concluído (31/03). vendas_web removido do INSTALLED_APPS. 15 apps modulares |\n| **Chamadas HTTP síncronas em signals** | Save trava 30s+ se API externa cair | Médio | ⏳ Pendente (migrar para Celery ou Django-Q) |\n| **Zero testes** para 25.000+ linhas | Regressões silenciosas | Alto | ✅ Concluído (30/03). 225 testes passando, CI/CD configurado |\n| **50+ endpoints com @csrf_exempt** | Vulnerabilidade CSRF | Médio | ✅ Concluído (30/03). CSRF corrigido nos endpoints do frontend |\n| **Monkey-patch do User** (add_to_class) | Frágil, quebra com updates do Django | Baixo | ⏳ Pendente (substituir por PerfilUsuario) |\n\n### 3.3 Médios (dívida técnica)\n\n| Débito | Impacto | Esforço | Status |\n|--------|---------|---------|--------|\n| Sem Django REST Framework (serialização manual) | Código repetitivo, sem validação padrão | Médio | ✅ Concluído (30/03). DRF implementado com TokenAuth + SessionAuth |\n| Sem versionamento de API (/api/v1/) | Mudança breaking afeta todos os consumidores | Baixo | ✅ Concluído (30/03). API em /api/v1/, Swagger em /api/docs/ |\n| Endpoints N8N duplicam lógica dos normais | Manutenção dobrada | Médio | ⏳ Pendente |\n| Rotas legado sem prazo de remoção | Dívida crescente | Baixo | ✅ Concluído (31/03). vendas_web/urls.py vazio |\n| WeasyPrint não está no requirements.txt | Deploy quebra em ambiente limpo | Baixo | ⏳ Pendente |\n\n---\n\n## 4. Arquitetura de apps\n\n**Decisão (29/03/2026):** Opção A — sub-apps por pasta. Cada domínio é um app Django completo dentro do seu módulo. Aprovada pelo CEO por permitir migrations isoladas, ativação/desativação por plano (Start/Pro) e refatoração incremental do vendas_web.\n\n### Estado atual (31/03/2026)\n\n```\ngerenciador_vendas/\n├── apps/           → 15 apps modulares. FONTE DA VERDADE. Todos os models, views, templates, URLs, admin\n├── vendas_web/     → MORTO. Removido do INSTALLED_APPS. urls.py e admin.py vazios\n├── integracoes/    → Legacy. Código copiado para apps/integracoes/\n└── crm/            → Legacy. Código copiado para apps/comercial/crm/\n```\n\n> **Migração concluída:** 9.457 linhas de views, 24 templa ting/email | +7 (novos) | Por contratação |\n| **CS Start** | cs/retencao + cs/nps | Novos | Por contratação |\n| **CS Pro** | Start + cs/clube | Novos | Por contratação |\n\n### Mapeamento: módulos AuroraISP vs apps\n\n| Módulo AuroraISP | Apps Django |\n|------------------|------------|\n| **Sistema (base)** | apps.sistema, apps.notificacoes, apps.integracoes, apps.dashboard |\n| **Comercial Start** | apps.comercial.leads, apps.comercial.atendimento, apps.comercial.cadastro, apps.comercial.viabilidade |\n| **Comercial Pro** | Comercial Start + apps.comercial.crm |\n| **Marketing Start** | apps.marketing.campanhas |\n| **Marketing Pro** | Marketing Start + apps.marketing.automacoes, apps.marketing.email |\n| **CS Start** | apps.cs.retencao, apps.cs.nps |\n| **CS Pro** | CS Start + apps.cs.clube |\n\n---\n\n## 5. Roadmap de produto por fases\n\n### Fase 0 — Segurança e Fundação (bloqueadores) ✅ CONCLUÍDA\n**Prazo alvo:** até 30/03/2026\n**Responsável:** Dev (CTO)\n**Status:** Todos os itens críticos concluídos entre 29/03 e 31/03/2026.\n\n| Ação | Prioridade | Status |\n|------|-----------|--------|\n| Remover credenciais hardcoded do código | Urgente | ✅ Concluído (29/03) |\n| Rotacionar senha do banco, token Matrix, SECRET_KEY | Urgente | ⏳ Pendente (requer deploy) |\n| DEBUG=False em produção | Urgente | ✅ Concluído (29/03) |\n| Restringir APIs (remover isenção geral `^api/`) | Urgente | ✅ Concluído (30/03). 48+ endpoints autenticados |\n| Implementar token auth para N8N | Urgente | ✅ Concluído (30/03). @api_token_required |\n| Multi-tenancy (Tenant + middleware + FK em todos os models) | Crítico | ✅ Concluído (29/03). TenantMixin em todos os models |\n| Remover @csrf_exempt dos endpoints do frontend | Alto | ✅ Concluído (30/03) |\n| Scan de segurança completo | Alto | ✅ Concluído (30/03). 5 críticas + 12 altas/médias corrigidas |\n\n### Fase 1 — Validação comercial (produto mínimo para vender) 🔧 EM ANDAMENTO\n**Prazo alvo:** abril/2026\n**Meta:** 15 clientes pagantes até junho/2026\n**Status:** Migração completa. vendas_web removido. Foco agora em deploy e ambiente de demo.\n\n| Ação | Prioridade | Status |\n|------|-----------|--------|\n| Criar app `apps.sistema` com Tenant, PerfilUsuario, configs | Alto | ✅ Concluído (29/03) |\n| Extrair `apps.comercial.leads` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.atendimento` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.cadastro` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.viabilidade` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Mover `crm/` para `apps.comercial.crm` | Alto | ✅ Concluído (29/03) |\n| Mover `integracoes/` para `apps.integracoes` | Alto | ✅ Concluído (29/03) |\n| Extrair `apps.notificacoes` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.marketing.campanhas` de vendas_web | Alto | ✅ Concluído (31/03). Models, views, URLs, templates, admin migrados |\n| Criar `apps.dashboard` (views de relatório) | Alto | ✅ Concluído (31/03). Views migradas |\n| vendas_web removido do INSTALLED_APPS | Alto | ✅ Concluído (31/03). urls.py e admin.py vazios |\n| Migrations limpas e regeneradas | Alto | ✅ Concluído (31/03) |\n| Django REST Framework implementado | Alto | ✅ Concluído (30/03). TokenAuth + SessionAuth, Swagger |\n| Testes unitários (225 testes) | Alto | ✅ Concluído (30/03). 10 arquivos, 28+ factories, CI/CD |\n| Renomear `gerenciador_vendas/` para `config/` | Médio | ⏳ Aguardando (baixo impacto) |\n| Substituir monkey-patch do User por PerfilUsuario | Alto | ⏳ Pendente |\n| Mover chamadas HTTP de signals para tasks assíncronas | Alto | ⏳ Pendente |\n| Ambiente de demo multi-tenant | Alto | ⏳ Pendente (requer deploy) |\n| Onboarding automatizado (criar tenant + config inicial) | Alto | ⏳ Pendente |\n\n### Fase 2 — Produto completo Comercial\n**Prazo alvo:** maio/2026\n\n| Ação | Prioridade | Esforço |\n|------|-----------|---------|\n| CRM integrado ao fluxo de vendas (já pronto, validar com clientes) | Alto | Validação |\n| Validação automática de documentos por IA | Médio | 2 semanas |\n| Relatórios de conversão por etapa do pipeline | Médio | 1 semana |\n| Adotar Django REST Framework | Médio | ✅ Concluído (30/03) |\n| Versionamento de API (/api/v1/) | Médio | ✅ Concluído (30/03) |\n| Case público com autorização de cliente | Médio | Comercial |\n\n### Fase 3 — Módulo Marketing\n**Prazo alvo:** julho/2026\n**Base existente:** notificacoes (5 models), campanhas (2 models), crm.SegmentoCRM\n\n| Ação | O que existe | O que falta |\n|------|-------------|-------------|\n| Motor de réguas de automação | N8N já roda. Templates de notificação existem | Engine interna com gatilhos por evento, tempo e comportamento |\n| E-mail marketing | Templates de notificação existem | Integração com provedor de e-mail (SendGrid, SES) |\n| WhatsApp automatizado | Canal WhatsApp já configurado | Réguas completas (trial, pós-ativação, retenção) |\n| Segmentação avançada | SegmentoCRM com filtros JSON existe | UI para criar segmentos por comportamento |\n| Relatórios de campanha | Métricas básicas por campanha existem | Dashboard dedicado com CAC, ROAS, LTV |\n| Tráfego pago com IA | Rastreamento de campanhas existe | Otimização automática de criativos |\n\n### Fase 4 — Módulo CS\n**Prazo alvo:** setembro/2026\n**Base existente:** integracoes.ClienteHubsoft, crm.AlertaRetencao, notificacoes\n\n| Ação | O que existe | O que falta |\n|------|-------------|-------------|\n| Prevenção de churn | AlertaRetencao com score e scanner existe | Detecção automática por comportamento no ERP |\n| NPS automatizado | Sistema de notificações existe | Pesquisa de NPS com régua automática |\n| Clube de Benefícios | Projeto megaroleta/ em desenvolvimento | Integrar com o hub e multi-tenancy |\n| Upsell automatizado | Segmentos + alertas existem | Régua de oferta por perfil do cliente |\n| Health score do cliente | churn_risk_score existe na OportunidadeVenda | Cálculo automático por múltiplas variáveis |\n\n### Fase 5 — Escala\n**Prazo alvo:** Q4 2026\n\n| Ação | Responsável |\n|------|------------|\n| Expansão para outros ERPs (Voalle, SGP) | Dev |\n| Inbound (blog, YouTube, LinkedIn) | Marketing |\n| Eventos do setor (ISP Summit, ABRINT) | CEO + Parceiro |\n| Contato formal com HubSoft para parceria | CEO |\n| Segundo parceiro comercial | Head de Vendas |\n\n---\n\n## 6. O que já serve de base para cada módulo futuro\n\n| Base existente no código | Onde está | Módulo que aproveita |\n|-------------------------|-----------|---------------------|\n| TipoNotificacao, CanalNotificacao, TemplateNotificacao, Notificacao | apps/notificacoes/ | Marketing (réguas, e-mail, WhatsApp) |\n| PreferenciaNotificacao | apps/notificacoes/ | Marketing e CS |\n| CampanhaTrafego, DeteccaoCampanha | apps/marketing/campanhas/ | Marketing (performance, atribuição) |\n| SegmentoCRM, MembroSegmento | apps/comercial/crm/ | Marketing (segmentação de base) |\n| ClienteHubsoft, ServicoClienteHubsoft | apps/integracoes/ | CS (base ativa, churn, NPS) |\n| AlertaRetencao | apps/comercial/crm/ | CS (churn prevention) |\n| N8N integrado com APIs dedicadas | apps/comercial/atendimento/ | Marketing e CS (automações) |\n| OportunidadeVenda.churn_risk_score | apps/comercial/crm/ | CS (health score) |\n| ConfiguracaoCRM.webhook_n8n_* | apps/comercial/crm/ | Marketing e CS (event-driven) |\n\n---\n\n## 7. Critérios de transição entre fases\n\n| De | Para | Critério |\n|----|------|---------|\n| Fase 0 | Fase 1 | ✅ Multi-tenancy funcionando. Zero credenciais expostas. APIs autenticadas |\n| Fase 1 | Fase 2 | 🔧 Separação em apps concluída. Falta: 5 clientes ativos e pagantes + deploy em produção |\n| Fase 2 | Fase 3 | 15 clientes. CRM validado com feedback. DRF adotado (✅ já concluído) |\n| Fase 3 | Fase 4 | Motor de réguas rodando. Ao menos 1 régua em produção por cliente |\n| Fase 4 | Fase 5 | NPS implementado. Clube de benefícios integrado. 50+ clientes |\n\n---\n\n## 8. Dependências entre fases\n\n```\nFase 0 (Segurança + Multi-tenancy)\n  │\n  ▼\nFase 1 (Separação em apps + Tenant)\n  │\n  ├──► Fase 2 (Comercial completo)\n  │       │\n  │       ├──► Fase 3 (Marketing)\n  │       │       │\n  │       │       └──► Fase 4 (CS)\n  │       │               │\n  │       │               └──► Fase 5 (Escala)\n  │       │\n  │       └──► Feedback de clientes alimenta Fases 3 e 4\n  │\n  └──► Logo criada (desbloqueador de materiais visuais)\n```\n\n---\n\n## Pendências\n\n- [x] CEO: definir prazo real para Fase 0 (segurança) — Resolvido em 29/03/2026. Credenciais removidas do código.\n- [x] CTO: estimar esforço real de multi-tenancy — Implementado em 29/03/2026. TenantMixin em todos os models.\n- [x] CTO: decidir estratégia de multi-tenancy — FK tenant_id via TenantMixin. Aprovado e implementado.\n- [ ] PM: validar com primeiro cliente se CRM kanban atende ou precisa de ajustes\n- [x] CEO: definir se megaroleta será integrado ao hub ou mantido separado — Resolvido em 29/03/2026. Apps CS migrados para robo/apps/cs/. App gestão permanece no megaroleta.\n"}, {"t": "f", "n": "03 Integracoes Hubsoft", "fn": "03-INTEGRACOES_HUBSOFT.md", "c": "# Integrações HubSoft\n\nDocumento técnico que mapeia todos os pontos de integração entre a AuroraISP e o ERP HubSoft. Essencial para onboarding de novos provedores e alinhamento técnico com a equipe HubSoft do cliente.\n\n---\n\n## Visão Geral\n\nA AuroraISP se integra com o HubSoft de duas formas:\n\n| Método | Usado por | Motivo |\n|--------|-----------|--------|\n| **API REST (OAuth2)** | Comercial, Cadastro | Endpoints disponíveis na API oficial |\n| **Conexão direta ao banco PostgreSQL** | CS / Clube de Benefícios | API não expõe os dados necessários (recorrência, app, pagamentos) |\n\n---\n\n## Requisitos de Onboarding\n\nPara ativar a integração HubSoft de um novo provedor, são necessários:\n\n### API REST (obrigatório para o módulo Comercial)\n\n| Variável | Descrição | Exemplo |\n|----------|-----------|---------|\n| `HUBSOFT_BASE_URL` | URL base da API HubSoft do provedor | `https://provedor.hubsoft.com.br` |\n| `HUBSOFT_CLIENT_ID` | Client ID do OAuth2 | Fornecido pelo HubSoft |\n| `HUBSOFT_CLIENT_SECRET` | Client Secret do OAuth2 | Fornecido pelo HubSoft |\n| `HUBSOFT_USERNAME` | Usuário da API | Fornecido pelo provedor |\n| `HUBSOFT_PASSWORD` | Senha da API | Fornecido pelo provedor |\n\nConfiguração via management command:\n```bash\npython manage.py setup_hubsoft\n```\n\n### Conexão direta ao banco (necessário apenas para CS / Clube)\n\n| Variável | Descrição |\n|----------|-----------|\n| `HUBSOFT_DB_HOST` | Host do PostgreSQL HubSoft |\n| `HUBSOFT_DB_PORT` | Porta (padrão: 5432) |\n| `HUBSOFT_DB_NAME` | Nome do banco |\n| `HUBSOFT_DB_USER` | Usuário com permissão de leitura |\n| `HUBSOFT_DB_PASS` | Senha do usuário |\n\n**Importante:** o usuário do banco precisa apenas de permissão `SELECT`. Nenhuma escrita é feita diretamente no banco do HubSoft.\n\n### Webhook N8N (necessário para CS / Clube)\n\n| Variável | Descrição |\n|----------|-----------|\n| URL do webhook | `https://automation-n8n.v4riem.easypanel.host/webhook/roletaconsultarcliente` |\n\nEsse webhook é acionado pelo Clube para consultar dados do cliente por CPF via N8N.\n\n---\n\n## Mapa de Integrações por Módulo\n\n### 1. Comercial — Envio de Leads\n\n**Fluxo:** Lead cadastrado no WhatsApp -> AuroraISP salva -> envia automaticamente para HubSoft como prospecto.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | Signal `post_save` no model `LeadProspecto` (quando `status_api='pendente'`) |\n| **Endpoint** | `POST /api/v1/integracao/prospecto` |\n| **Autenticação** | OAuth2 Bearer Token |\n| **Dados enviados** | Nome, CPF/CNPJ, telefone, email, endereço, plano, dia de vencimento |\n| **Retorno** | `id_prospecto` da HubSoft (salvo em `lead.id_hubsoft`) |\n| **Status** | `status_api` atualizado para `processado` (sucesso) ou `erro` (falha) |\n| **Arquivo** | `apps/integracoes/signals.py` |\n| **Service** | `apps/integracoes/services/hubsoft.py` → `cadastrar_prospecto()` |\n\n**Retry:** leads com `status_api='erro'` podem ser reprocessados via:\n```bash\npython manage.py processar_pendentes\n```\n\n---\n\n### 2. Comercial — Sincronização de Clientes\n\n**Fluxo:** Após o lead virar cliente no HubSoft, a Aurora sincroniza os dados do cliente e seus serviços/planos.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | Automático após cadastro de prospecto, ou manual via command |\n| **Endpoint** | `GET /api/v1/integracao/cliente?cpf_cnpj={cpf}` |\n| **Dados sincronizados** | Nome, CPF/CNPJ, telefones, emails, endereço, RG, data de nascimento |\n| **Serviços** | Plano, valor, velocidade, status, PPPoE, datas de habilitação/cancelamento |\n| **Models** | `ClienteHubsoft`, `ServicoClienteHubsoft` |\n| **Detecção de alterações** | Campo `houve_alteracao` e `historico_alteracoes` em JSON |\n| **Arquivo** | `apps/integracoes/services/hubsoft.py` → `sincronizar_cliente()` |\n\n**Sincronização em massa:**\n```bash\npython manage.py sincronizar_clientes --todos\n```\n\n---\n\n### 3. Cadastro — Contratos e Documentos\n\n**Fluxo:** Após validação dos documentos do lead (fotos do RG, comprovante), a Aurora anexa automaticamente ao contrato no HubSoft e aceita o contrato.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | Signal `post_save` no model `ImagemLeadProspecto` (quando status = validado) |\n| **Etapa 1** | Buscar ID do contrato via Matrix API |\n| **Etapa 2** | `POST /api/v1/integracao/cliente/contrato/adicionar_anexo_contrato/{id_contrato}` |\n| **Etapa 3** | `PUT /api/v1/integracao/cliente/contrato/aceitar_contrato` |\n| **Dados enviados** | Imagens dos documentos (base64), ID do contrato |\n| **Arquivo** | `apps/comercial/cadastro/services/contrato_service.py` |\n| **Signal** | `apps/comercial/cadastro/signals.py` → `gerar_pdf_quando_documentos_validados()` |\n\n---\n\n### 4. CS / Clube de Benefícios — Consultas ao Banco\n\n**Por que conexão direta?** A API REST da HubSoft não expõe endpoints para:\n- Verificar recorrência de pagamento (faturas em dia)\n- Verificar se o cliente pagou adiantado\n- Verificar se o app do provedor está instalado\n- Listar clientes por cidade (para análise de penetração)\n\nEsses dados são essenciais para o sistema de gamificação (pontos, XP, roleta).\n\n| Consulta | O que faz | Usado em |\n|----------|-----------|----------|\n| `checar_pontos_extras_cpf(cpf)` | Verifica recorrência, pagamento adiantado e app instalado | Gamificação (pontos automáticos) |\n| `consultar_cidade_cliente_cpf(cpf)` | Retorna a cidade do cliente por CPF | Filtro de prêmios por cidade |\n| `consultar_clientes_por_cidade(cidade)` | Lista clientes ativos numa cidade | Relatório de penetração de mercado |\n| Webhook N8N `/roletaconsultarcliente` | Consulta dados do cliente por CPF via N8N | Validação de membro no Clube |\n\n**Arquivo:** `apps/cs/clube/services/hubsoft_service.py`\n\n**Regras de pontuação automática (via banco):**\n\n| Gatilho | Condição verificada no banco HubSoft | Pontos |\n|---------|--------------------------------------|--------|\n| `hubsoft_recorrencia` | Cliente com faturas em dia nos últimos X meses | Configurável por regra |\n| `hubsoft_adiantado` | Fatura paga antes do vencimento | Configurável por regra |\n| `hubsoft_app` | App do provedor instalado (campo no HubSoft) | Configurável por regra |\n\n---\n\n## Models de Integração\n\n| Model | Tabela | Descrição |\n|-------|--------|-----------|\n| `IntegracaoAPI` | `integracoes_integracaoapi` | Credenciais OAuth2, URL base, token cacheado |\n| `LogIntegracao` | `integracoes_logintegracao` | Audit trail de chamadas à API (endpoint, payload, response, status) |\n| `ClienteHubsoft` | `integracoes_clientehubsoft` | Espelho local do cliente HubSoft (dados pessoais, sync status) |\n| `ServicoClienteHubsoft` | `integracoes_servicoclientehubsoft` | Planos/serviços ativos do cliente (velocidade, valor, PPPoE) |\n\n---\n\n## Endpoints Internos (API Aurora)\n\nEndpoints da Aurora que expõem dados sincronizados da HubSoft:\n\n| Endpoint | Método | Descrição |\n|----------|--------|-----------|\n| `/integracoes/api/clientes/` | GET | Lista clientes HubSoft sincronizados (paginado, com filtros) |\n| `/integracoes/api/lead/hubsoft-status/` | GET | Status de um lead específico na HubSoft |\n\n---\n\n## Fluxo Completo: Lead ao Cliente Ativado\n\n```\n1. Lead chega via WhatsApp (N8N)\n2. Aurora salva o LeadProspecto (status_api='pendente')\n3. Signal envia para HubSoft → POST /prospecto\n4. Lead vira prospecto no HubSoft (id_hubsoft salvo)\n5. Vendedor qualifica e coleta documentos\n6. Documentos validados → Signal anexa ao contrato HubSoft\n7. Contrato aceito automaticamente na HubSoft\n8. Sync de cliente → ClienteHubsoft espelhado localmente\n9. Se módulo CS ativo: membro do Clube criado automaticamente\n```\n\n---\n\n## Checklist de Onboarding\n\nPara cada novo provedor, validar:\n\n- [ ] Credenciais da API HubSoft configuradas (`setup_hubsoft`)\n- [ ] Token OAuth2 funcionando (testar via admin)\n- [ ] Envio de lead de teste (`processar_pendentes --lead-id X --dry-run`)\n- [ ] Sincronização de cliente de teste (`sincronizar_clientes --lead-id X --dry-run`)\n- [ ] (Se CS ativo) Conexão ao banco PostgreSQL do HubSoft testada\n- [ ] (Se CS ativo) Webhook N8N configurado e respondendo\n- [ ] Logs de integração sendo registrados (`LogIntegracao`)\n\n---\n\n## Limitações Conhecidas\n\n1. **API HubSoft não expõe dados de pagamento/recorrência.** O Clube depende de conexão direta ao banco. Se a HubSoft liberar esses endpoints no futuro, migrar para API REST.\n\n2. **Token OAuth2 tem expiração.** O sistema faz cache e renova automaticamente, mas se as credenciais mudarem no HubSoft, o `IntegracaoAPI` precisa ser atualizado.\n\n3. **Sincronização não é em tempo real.** Clientes são sincronizados sob demanda (após cadastro de prospecto) ou via command (`sincronizar_clientes`). Não há webhook do HubSoft para a Aurora.\n\n4. **Cada provedor tem sua própria instância HubSoft.** As credenciais são por tenant (model `IntegracaoAPI` usa `TenantMixin`).\n"}, {"t": "f", "n": "04 Testes", "fn": "04-TESTES.md", "c": "# Testes — AuroraISP\n\n**Última atualização:** 01/04/2026\n**Total de testes:** 291 (287 passando, 4 skipped)\n**Cobertura global:** 40%\n**Framework:** pytest + pytest-django + pytest-cov + factory_boy\n\n---\n\n## Como rodar\n\n```bash\ncd robo/dashboard_comercial/gerenciador_vendas\n\n# Rodar todos os testes\npython -m pytest tests/\n\n# Com cobertura\npython -m pytest tests/ --cov=apps --cov-report=term\n\n# Arquivo específico\npython -m pytest tests/test_automacoes.py -v\n\n# Teste específico\npython -m pytest tests/test_automacoes.py::EngineDispararEventoTest::test_condicao_verdadeira_executa -v\n```\n\nO `pytest.ini` já configura `DJANGO_SETTINGS_MODULE = gerenciador_vendas.settings_local` (SQLite in-memory).\n\n---\n\n## Estrutura dos testes\n\n| Arquivo | Testes | O que cobre |\n|---------|--------|-------------|\n| `test_tenant_isolation.py` | 62 | Isolamento multi-tenant: auto-filtro, cross-tenant, middleware, set/get tenant |\n| `test_endpoint_auth.py` | 48 | Autenticação de endpoints: @login_required, @api_token_required, acesso negado |\n| `test_models_comercial.py` | 35 | Models de leads, atendimento, cadastro, CRM: criação, validações, str |\n| `test_models_cs.py` | 28 | Models CS: MembroClube, NivelClube, Parceiro, Cupom, Indicação, Carteirinha |\n| `test_models_integracoes.py` | 15 | Models IntegracaoAPI, LogIntegracao, ClienteHubsoft, ServicoClienteHubsoft |\n| `test_models_marketing.py` | 8 | Models CampanhaTrafego, DeteccaoCampanha |\n| `test_models_notificacoes.py` | 12 | Models TipoNotificacao, CanalNotificacao, Notificacao, Template |\n| `test_api_drf.py` | 17 | API DRF: CRUD leads N8N, panel ViewSets, autenticação Token/Session |\n| `test_signals.py` | 15 | Signals: auto-criação CRM, envio HubSoft, conversão lead |\n| `test_module_access.py` | 6 | Acesso a módulos por plano (Start vs Pro) |\n| `test_admin_aurora.py` | 2 | Admin Aurora: dashboard, criar tenant |\n| **test_automacoes.py** | **43** | **Automações: models, engine, condições, ações, views, tenant isolation** |\n\n**Factories:** 30+ classes em `tests/factories.py` cobrindo todos os apps.\n\n---\n\n## Cobertura por módulo\n\n### Bem cobertos (>70%)\n\n| Arquivo | Cobertura | Obs |\n|---------|-----------|-----|\n| `sistema/middleware.py` | 98% | Core do multi-tenant |\n| `sistema/mixins.py` | 100% | TenantMixin |\n| `sistema/models.py` | 86% | Tenant, PerfilUsuario, configs |\n| `sistema/authentication.py` | 93% | APITokenAuthentication |\n| `sistema/context_processors.py` | 100% | |\n| `sistema/logging_filters.py` | 100% | PIIFilter |\n| `crm/models.py` | 90% | Pipeline, Oportunidade, Tarefa |\n| `crm/signals.py` | 85% | Auto-criação CRM |\n| `clube/models.py` | 93% | MembroClube, NivelClube, Regras |\n| `parceiros/models.py` | 96% | Parceiro, Cupom, Resgate |\n| `indicacoes/models.py` | 98% | Indicação |\n| `notificacoes/models.py` | 98% | Todos os models |\n| `integracoes/models.py` | 100% | IntegracaoAPI, ClienteHubsoft |\n| `campanhas/models.py` | 93% | CampanhaTrafego |\n| `automacoes/models.py` | 93% | RegraAutomacao, Condição, Ação |\n| `automacoes/views.py` | 97% | CRUD completo |\n| `automacoes/engine.py` | 71% | Dispatcher + executores |\n| `api/serializers_panel.py` | 100% | ViewSets DRF |\n| `api/serializers_n8n.py` | 93% | Serializers N8N |\n\n### Parcialmente cobertos (30-70%)\n\n| Arquivo | Cobertura | O que falta |\n|---------|-----------|-------------|\n| `sistema/decorators.py` | 58% | Testar @webhook_token_required |\n| `sistema/encrypted_fields.py` | 59% | Testar encrypt/decrypt |\n| `sistema/validators.py` | 40% | Testar validate_image_upload |\n| `leads/models.py` | 49% | Properties e methods complexos |\n| `leads/admin.py` | 56% | Actions admin |\n| `atendimento/admin.py` | 45% | Admin customizado |\n| `cadastro/models.py` | 74% | Geração de PDF, signals |\n| `integracoes/signals.py` | 36% | Envio para HubSoft (mock) |\n| `automacoes/signals.py` | 67% | Mais cenários de evento |\n\n### Sem cobertura significativa (<30%)\n\n| Arquivo | Cobertura | Motivo |\n|---------|-----------|--------|\n| `dashboard/views.py` | 8% | 736 linhas, muitas queries complexas |\n| `clube/views/api_views.py` | 7% | 393 linhas, integração HubSoft |\n| `clube/views/dashboard_views.py` | 18% | Dashboards com Chart.js |\n| `crm/views.py` | 16% | 784 linhas, CRM pipeline |\n| `leads/views.py` | 22% | 679 linhas, listagem, filtros |\n| `sistema/views.py` | 23% | Autenticação, configurações |\n| `notificacoes/views.py` | 16% | 508 linhas, maioria desativada |\n| `integracoes/services/hubsoft.py` | 12% | Chamadas HTTP externas |\n| `suporte/views.py` | 15% | Dashboard, tickets |\n| `cadastro/services/contrato_service.py` | 0% | Integração HubSoft/Matrix |\n| `atendimento/services/atendimento_service.py` | 0% | Lógica do bot |\n| Management commands | 0% | seed_planos, criar_tenant, etc |\n\n---\n\n## O que é testado hoje\n\n### Multi-tenancy (prioridade máxima)\n- TenantManager filtra automaticamente por tenant ativo\n- Dados de tenant A não vazam para tenant B\n- Middleware resolve tenant corretamente\n- Cross-tenant access retorna vazio\n- Models com TenantMixin isolam dados\n\n### Autenticação e segurança\n- Endpoints protegidos retornam 401/403 sem auth\n- @api_token_required valida token\n- @login_required redireciona para login\n- API DRF com TokenAuth e SessionAuth\n\n### Models\n- Criação, validações, str de todos os models principais\n- Relacionamentos (ForeignKey, ManyToMany)\n- Properties calculadas (taxa_sucesso, nivel_atual, etc)\n\n### Automações (novo)\n- Engine: disparo de evento, avaliação de condições (7 operadores), execução de ações\n- Ações: notificação, WhatsApp (mock), webhook (mock), criar tarefa, dar pontos\n- Delay/agendamento\n- Tenant isolation\n- Views: CRUD completo, toggle, histórico\n\n### Signals\n- Auto-criação de oportunidade CRM quando lead qualificado\n- Envio para HubSoft (parcial)\n- Conversão de lead\n\n---\n\n## O que precisa melhorar\n\n### Prioridade 1: Views de página\nAs views representam 60%+ do código mas têm <25% de cobertura. Motivo: testam lógica de negócio + renderização + queries complexas. Abordagem recomendada: testes de integração com `client.get()` verificando status_code, context e conteúdo.\n\n**Arquivos prioritários:**\n- `crm/views.py` (784 linhas, 16%) — Pipeline, configurações, equipes\n- `leads/views.py` (679 linhas, 22%) — Listagem, filtros, APIs internas\n- `dashboard/views.py` (736 linhas, 8%) — Dashboards e relatórios\n\n### Prioridade 2: Services com integração externa\nServices que chamam APIs externas (HubSoft, N8N, Matrix) têm 0-12% de cobertura. Precisam de mocks.\n\n**Arquivos:**\n- `integracoes/services/hubsoft.py` (12%) — Mock de requests\n- `cadastro/services/contrato_service.py` (0%) — Mock de upload de docs\n- `clube/services/hubsoft_service.py` (16%) — Mock de conexão PostgreSQL\n\n### Prioridade 3: Management commands\nNenhum command tem testes. São executados manualmente mas podem quebrar silenciosamente.\n\n---\n\n## Configuração\n\n### pytest.ini\n```ini\n[pytest]\nDJANGO_SETTINGS_MODULE = gerenciador_vendas.settings_local\npython_files = test_*.py\npython_classes = Test*\npython_functions = test_*\n```\n\n### CI/CD\nGitHub Actions roda os testes automaticamente em cada push via `.github/workflows/ci.yml`.\n\n### Banco de testes\nSQLite in-memory (`:memory:`) via `settings_local.py`. Cada test case cria e destrói o banco automaticamente.\n"}, {"t": "f", "n": "05 Automacoes", "fn": "05-AUTOMACOES.md", "c": "# Módulo de Automações — AuroraISP\n\n**Ultima atualizacao:** 06/04/2026\n**Status:** ✅ Implementado\n**Localização:** `apps/marketing/automacoes/`\n\n---\n\n## Visão Geral\n\nO módulo de Automações é o motor central do Marketing da AuroraISP. Permite que provedores criem regras visuais do tipo \"Quando X acontecer, se Y, então faça Z\" com fluxos condicionais (if/else), delays, ações encadeadas e integração com segmentos.\n\n**Dois modos de operação:**\n- **Legacy (linear):** evento → condições AND → ações sequenciais (compatibilidade com regras antigas)\n- **Fluxo visual (grafo):** editor drag & drop com nós conectáveis, branching if/else, delays reais\n\n---\n\n## Arquitetura\n\n### Models\n\n| Model | Tabela | Descrição |\n|-------|--------|-----------|\n| `RegraAutomacao` | `automacoes_regraautomacao` | Regra principal: nome, evento, ativa, contadores, modo (legacy/fluxo), controles |\n| `CondicaoRegra` | `automacoes_condicaoregra` | Condição do modo legacy: campo + operador + valor |\n| `AcaoRegra` | `automacoes_acaoregra` | Ação do modo legacy: tipo + configuração + delay |\n| `NodoFluxo` | `automacoes_nodofluxo` | Nó do fluxograma: trigger, condition, action ou delay |\n| `ConexaoNodo` | `automacoes_conexaonodo` | Aresta entre dois nós: default, true ou false |\n| `ExecucaoPendente` | `automacoes_execucaopendente` | Fila de ações com delay aguardando execução |\n| `ControleExecucao` | `automacoes_controleexecucao` | Rate limiting por lead por regra |\n| `LogExecucao` | `automacoes_logexecucao` | Registro de cada execução com FK para lead e nodo |\n\n### Campos importantes de `RegraAutomacao`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `nome` | CharField | Nome da regra |\n| `evento` | CharField (choices) | Evento gatilho (ver lista abaixo) |\n| `ativa` | BooleanField | Liga/desliga a regra |\n| `modo_fluxo` | BooleanField | `False` = legacy linear, `True` = fluxograma visual |\n| `fluxo_json` | JSONField | Estado salvo do editor Drawflow para re-import |\n| `segmento` | FK → SegmentoCRM | Segmento para disparo em massa (opcional) |\n| `max_execucoes_por_lead` | int | Máximo de execuções por lead no período (0 = ilimitado) |\n| `cooldown_horas` | int | Horas mínimas entre execuções para o mesmo lead |\n| `periodo_limite_horas` | int | Janela de tempo para o max_execucoes (default 24h) |\n| `total_execucoes` | int | Contador total de execuções |\n| `total_sucesso` | int | Contador de sucesso |\n| `total_erro` | int | Contador de erros |\n\n---\n\n## Eventos Disponíveis\n\n### Via Signal (tempo real)\n\n| Evento | Código | Signal | Quando dispara |\n|--------|--------|--------|----------------|\n| Novo lead criado | `lead_criado` | `post_save` LeadProspecto (created=True) | Lead entra no sistema via WhatsApp/site |\n| Lead qualificado | `lead_qualificado` | `post_save` LeadProspecto (score >= 7) | Score do lead muda para >= 7 |\n| Oportunidade movida | `oportunidade_movida` | `post_save` OportunidadeVenda (created=False) | Card arrastado no Kanban |\n| Documentos validados | `docs_validados` | `post_save` ImagemLeadProspecto (status=validado) | Todos os docs do lead aprovados |\n| Indicação convertida | `indicacao_convertida` | `post_save` Indicacao (status=convertido) | Indicação vira cliente |\n| Lead entrou em segmento | `lead_entrou_segmento` | Disparado pelo signal de segmentos dinâmicos | Lead atende regras de um segmento |\n\n### Via Cron (management command)\n\n| Evento | Código | Quando verifica |\n|--------|--------|-----------------|\n| Lead sem contato | `lead_sem_contato` | Lead sem histórico de contato há X dias |\n| Tarefa vencida | `tarefa_vencida` | TarefaCRM com status pendente e data_vencimento < agora |\n| Venda aprovada | `venda_aprovada` | Não implementado (precisa webhook HubSoft) |\n| Aniversário de cliente | `cliente_aniversario` | Não implementado |\n| Disparo por segmento | `disparo_segmento` | Para todos os leads de um segmento (massa) |\n\n### Flag de skip\n\nCada signal verifica `getattr(instance, '_skip_automacao', False)` antes de disparar. Para importação em massa, setar `lead._skip_automacao = True` antes do save.\n\n---\n\n## Engine de Execução\n\n### Arquivo: `apps/marketing/automacoes/engine.py`\n\n### Fluxo principal\n\n```\ndisparar_evento(evento, contexto, tenant)\n  ├── Busca regras ativas para o evento no tenant\n  ├── Para cada regra:\n  │   ├── Verifica controles (max_execucoes, cooldown)\n  │   ├── Se modo_fluxo=False: _processar_regra_legacy()\n  │   │   ├── Avalia condições (AND)\n  │   │   └── Executa ações sequenciais\n  │   └── Se modo_fluxo=True: _processar_fluxo()\n  │       ├── Encontra nodo trigger\n  │       └── BFS no grafo: _executar_nodo_e_seguir()\n  │           ├── trigger → segue conexões default\n  │           ├── condition → avalia → segue 'true' ou 'false'\n  │           ├── delay → cria ExecucaoPendente → para\n  │           └── action → executa → segue conexões default\n  └── Registra log em LogExecucao\n```\n\n### Adaptador NodoFluxo → AcaoRegra\n\nA classe `_NodoAcaoAdapter` converte a config JSON do `NodoFluxo` para a interface texto que os executores existentes esperam. Isso permite reutilizar os 6 executores sem duplicação.\n\n### Controles de execução\n\n```python\n_verificar_controles(regra, lead)\n```\n\n1. Se `max_execucoes_por_lead == 0` e `cooldown_horas == 0`: sempre passa\n2. Busca/cria `ControleExecucao` para o par (lead, regra)\n3. Se período expirou: reseta contadores\n4. Verifica max execuções no período\n5. Verifica cooldown desde última execução\n6. Atualiza contadores\n\n### Executar pendentes (delays)\n\n```python\nexecutar_pendentes(tenant=None)\n```\n\nChamado pelo cron. Busca `ExecucaoPendente` com `status=pendente` e `data_agendada <= agora`. Para cada:\n- Se tem `nodo`: retoma o grafo a partir das conexões de saída do nodo de delay\n- Se tem `acao` (legacy): executa a ação diretamente\n- Atualiza status para `executado` ou `erro`\n\n---\n\n## Ações Implementadas\n\n| Tipo | Codigo | O que faz | Config no editor |\n|------|--------|-----------|------------------|\n| WhatsApp | `enviar_whatsapp` | POST para webhook N8N | Mensagem com `{{variaveis}}` |\n| E-mail | `enviar_email` | Envia via webhook N8N | Assunto + corpo com `{{variaveis}}` |\n| Notificacao | `notificacao_sistema` | Cria Notificacao no sistema | Titulo + mensagem com `{{variaveis}}` |\n| Criar Tarefa | `criar_tarefa` | Cria TarefaCRM | Titulo, tipo (select), prioridade (select) |\n| Mover Estagio | `mover_estagio` | Move OportunidadeVenda | Pipeline (select), estagio (select filtrado) |\n| Atribuir Responsavel | `atribuir_responsavel` | Atribui vendedor a oportunidade | Modo (round-robin/fixo), responsavel (select) |\n| Dar Pontos | `dar_pontos` | Adiciona saldo ao MembroClube | Quantidade + motivo |\n| Webhook | `webhook` | Chama URL externa | URL, metodo (POST/GET), payload JSON |\n\n### Substituição de variáveis\n\nO template de mensagem suporta `{{variável}}`. Variáveis disponíveis dependem do evento:\n\n| Variável | Origem |\n|----------|--------|\n| `{{nome}}` | `contexto['nome']` (alias para nome do lead) |\n| `{{telefone}}` | `contexto['telefone']` |\n| `{{lead_nome}}` | `lead.nome_razaosocial` |\n| `{{lead_email}}` | `lead.email` |\n| `{{lead_telefone}}` | `lead.telefone` |\n| `{{lead_score}}` | `lead.score_qualificacao` |\n| `{{lead_origem}}` | `lead.origem` |\n| `{{lead_valor}}` | `lead.valor` |\n| `{{segmento_nome}}` | `segmento.nome` (quando evento = lead_entrou_segmento) |\n\n---\n\n## Editor Visual (Drawflow)\n\n### Biblioteca\n\n**Drawflow** (vanilla JS, 12KB, zero dependências, MIT)\n- CDN: `https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js`\n- Docs: https://github.com/jerosoler/Drawflow\n\n### Layout do editor\n\n```\n┌─────────────────────────────────────────────────────────┐\n│ ← Nome da Regra                    [Ativa] [Salvar]    │\n├──────────┬────────────────────────────┬─────────────────┤\n│ PALETA   │                            │ CONFIG PANEL    │\n│          │                            │ (aparece ao     │\n│ Gatilhos │     CANVAS DRAWFLOW        │  clicar num nó) │\n│ Condições│                            │                 │\n│ Ações    │     (drag & drop)          │ Campo: [...]    │\n│ Controle │                            │ Operador: [..] │\n│          │                            │ Valor: [...]    │\n└──────────┴────────────────────────────┴─────────────────┘\n```\n\n### Paleta de nós (sidebar esquerda)\n\n| Categoria | Nós |\n|-----------|-----|\n| **Gatilhos** | O evento da regra (definido na criação) |\n| **Condições** | Verificar Campo (if/else com 2 saídas) |\n| **Ações** | WhatsApp, E-mail, Notificação, Criar Tarefa, Mover Estágio, Dar Pontos, Webhook |\n| **Controle** | Atraso (delay em minutos/horas/dias) |\n\n### Tipos de nó\n\n| Tipo | Inputs | Outputs | Comportamento |\n|------|--------|---------|---------------|\n| `trigger` | 0 | 1 (default) | Ponto de entrada do fluxo |\n| `condition` | 1 | 2 (true/false) | Avalia campo+operador+valor, segue branch |\n| `action` | 1 | 1 (default) | Executa ação, segue para o próximo |\n| `delay` | 1 | 1 (default) | Cria ExecucaoPendente, para execução (retoma via cron) |\n\n### Configuracao especifica por tipo de no (painel direito)\n\n**Gatilhos:**\n- **Oportunidade movida:** Pipeline (select), estagio de (select filtrado), estagio para (select filtrado)\n- **Lead sem contato:** Dias sem contato (numero)\n- **Entrou em segmento:** Segmento (select com segmentos do CRM)\n- **Mensagem recebida:** Canal (select: WhatsApp/Email/Widget)\n- Outros gatilhos: informativo (disparam sempre)\n\n**Condicao:**\n- Campo (select com optgroups Lead/CRM/Temporal)\n- Operador (select: igual, diferente, contem, maior, menor, maior_igual, menor_igual)\n- Valor (campo dinamico conforme o campo selecionado):\n  - Origem → select com origens do lead\n  - Status → select com status do lead\n  - Estagio → select com estagios dos pipelines\n  - Pipeline → select com pipelines\n  - Responsavel → select com usuarios staff\n  - Estado → select com UFs\n  - Demais → input texto livre\n\n**Acoes:**\n- **Enviar WhatsApp:** Mensagem com variaveis\n- **Enviar Email:** Assunto + corpo com variaveis\n- **Notificacao:** Titulo + mensagem\n- **Criar Tarefa:** Titulo, tipo (select: ligacao/followup/visita/whatsapp/email), prioridade (select)\n- **Mover Estagio:** Pipeline (select), estagio destino (select filtrado por pipeline)\n- **Atribuir Responsavel:** Modo (round-robin/fixo), responsavel (select com usuarios staff)\n- **Dar Pontos:** Quantidade + motivo\n- **Webhook:** URL, metodo (POST/GET), payload JSON\n\n**Delay:**\n- Tempo (numero) + Unidade (select: minutos/horas/dias)\n\n### Serialização\n\n**Salvar:** `editor.export()` → JSON → POST `/marketing/automacoes/<pk>/salvar-fluxo/`\n\nO backend recebe:\n```json\n{\n  \"drawflow_state\": { /* estado bruto do Drawflow para re-import */ },\n  \"nodos\": [\n    {\"id_temp\": \"1\", \"tipo\": \"trigger\", \"subtipo\": \"lead_criado\", \"config\": {}, \"pos_x\": 100, \"pos_y\": 200},\n    {\"id_temp\": \"2\", \"tipo\": \"condition\", \"subtipo\": \"campo_check\", \"config\": {\"campo\": \"lead.origem\", \"operador\": \"igual\", \"valor\": \"whatsapp\"}, \"pos_x\": 300, \"pos_y\": 200}\n  ],\n  \"conexoes\": [\n    {\"origem\": \"1\", \"destino\": \"2\", \"tipo_saida\": \"default\"}\n  ]\n}\n```\n\n**Carregar:** view passa `regra.fluxo_json` → `editor.import(data)` no JS. Se `fluxo_json` estiver vazio mas existirem nodos no banco, o editor reconstroi o grafo automaticamente.\n\n---\n\n## Management Command (Cron)\n\n### Arquivo: `apps/marketing/automacoes/management/commands/executar_automacoes_cron.py`\n\n### Uso\n\n```bash\n# Execução normal (todos os tenants)\npython manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings\n\n# Simulação (não executa, só mostra)\npython manage.py executar_automacoes_cron --dry-run\n\n# Tenant específico\npython manage.py executar_automacoes_cron --tenant megalink\n```\n\n### Configuração crontab\n\n```\n*/5 * * * * cd /path/to/project && python manage.py executar_automacoes_cron --settings=gerenciador_vendas.settings >> /var/log/automacoes.log 2>&1\n```\n\n### O que faz (por tenant)\n\n1. **Executa pendentes:** busca `ExecucaoPendente` com `data_agendada <= agora` e executa\n2. **Lead sem contato:** detecta leads com último histórico > X dias e dispara `lead_sem_contato`\n3. **Tarefa vencida:** detecta tarefas pendentes com `data_vencimento < agora` e dispara `tarefa_vencida`\n4. **Disparo por segmento:** para regras com `evento=disparo_segmento` e segmento associado, itera leads do segmento\n\n### Proteção contra duplicatas\n\nPara `lead_sem_contato`: verifica se já existe `LogExecucao` para o lead nessa regra dentro do período, evitando disparar repetidamente.\n\n---\n\n## Dashboard Central\n\n### URL: `/marketing/automacoes/dashboard/`\n\n### Conteúdo\n\n| Seção | Dados |\n|-------|-------|\n| **KPIs** (4 cards) | Execuções hoje, Taxa de sucesso, Regras ativas, Pendentes (delay) |\n| **Gráfico** | Linha: execuções nos últimos 30 dias (Chart.js) |\n| **Top Regras** | 10 regras mais executadas |\n| **Erros Recentes** | 10 últimos logs com status=erro |\n| **Histórico** | Tabela com últimos 100 logs (data, regra, ação, lead, status, resultado) |\n\n---\n\n## Timeline no Lead\n\n### Integração\n\nNo detalhe da oportunidade (`apps/comercial/crm/views.py` → `oportunidade_detalhe`), a view consulta:\n\n```python\nLogExecucao.all_tenants.filter(tenant=request.tenant, lead=lead)\n```\n\nE passa `logs_automacao` no contexto. Isso é possível graças ao FK `LogExecucao.lead` que foi adicionado na refatoração.\n\n### API\n\n```\nGET /marketing/automacoes/api/lead/<lead_pk>/timeline/\n```\n\nRetorna JSON:\n```json\n{\n  \"logs\": [\n    {\"id\": 1, \"regra\": \"Boas vindas\", \"acao\": \"Enviar WhatsApp\", \"status\": \"sucesso\", \"resultado\": \"OK\", \"data\": \"03/04/2026 14:30\"}\n  ]\n}\n```\n\n---\n\n## Integração com Segmentos\n\n### Evento `lead_entrou_segmento`\n\nQuando o signal `avaliar_segmentos_dinamicos` (em `apps/comercial/crm/signals.py`) adiciona um lead a um segmento dinâmico, ele dispara:\n\n```python\ndisparar_evento('lead_entrou_segmento', {\n    'lead': instance,\n    'segmento': seg,\n    'segmento_nome': seg.nome,\n}, tenant=instance.tenant)\n```\n\nIsso permite criar regras como: \"Quando lead entrar no segmento 'Leads Quentes', enviar WhatsApp de boas vindas.\"\n\n### Disparo em massa por segmento\n\nRegras com `evento=disparo_segmento` e `segmento` FK preenchido são processadas pelo cron. Para cada lead do segmento, o cron dispara a automação (respeitando controles de rate limit e cooldown).\n\n### Serviço compartilhado\n\nO `apps/comercial/crm/services/segmentos.py` contém funções reutilizadas:\n- `filtrar_leads_por_regras(regras)` — filtra queryset por campo/operador/valor\n- `lead_atende_regras(lead, regras)` — avalia sem query (usado nos signals)\n- `avaliar_lead_em_segmentos(lead)` — retorna lista de segmentos adicionados\n- `atualizar_membros_segmento(segmento)` — sync completo de membros\n\n---\n\n## URLs\n\n| URL | View | Método | Descrição |\n|-----|------|--------|-----------|\n| `/marketing/automacoes/` | `lista_automacoes` | GET | Lista de regras |\n| `/marketing/automacoes/criar/` | `criar_automacao` | GET/POST | Criar regra (modo legacy) |\n| `/marketing/automacoes/dashboard/` | `dashboard_automacoes` | GET | Dashboard central |\n| `/marketing/automacoes/<pk>/editar/` | `editar_automacao` | GET/POST | Editar regra (modo legacy) |\n| `/marketing/automacoes/<pk>/fluxo/` | `editor_fluxo` | GET | Editor visual Drawflow |\n| `/marketing/automacoes/<pk>/salvar-fluxo/` | `salvar_fluxo` | POST | Salvar fluxograma |\n| `/marketing/automacoes/<pk>/toggle/` | `toggle_automacao` | POST | Ativar/desativar (AJAX) |\n| `/marketing/automacoes/<pk>/excluir/` | `excluir_automacao` | POST | Excluir regra |\n| `/marketing/automacoes/<pk>/historico/` | `historico_automacao` | GET | Logs de uma regra |\n| `/marketing/automacoes/api/lead/<pk>/timeline/` | `api_lead_timeline` | GET | Timeline de automações para um lead |\n\n---\n\n## Signals\n\n### Arquivo: `apps/marketing/automacoes/signals.py`\n\n| Signal | Sender | Condição | Skip flag |\n|--------|--------|----------|-----------|\n| `on_lead_criado` | `leads.LeadProspecto` | `created=True` | `_skip_automacao` |\n| `on_lead_qualificado` | `leads.LeadProspecto` | `created=False` AND `score >= 7` | `_skip_automacao` |\n| `on_oportunidade_movida` | `crm.OportunidadeVenda` | `created=False` | `_skip_automacao` |\n| `on_docs_validados` | `leads.ImagemLeadProspecto` | `status=validado` AND todos docs validados | `_skip_automacao` |\n| `on_indicacao_convertida` | `indicacoes.Indicacao` | `status=convertido` | `_skip_automacao` |\n\n### Arquivo: `apps/comercial/crm/signals.py`\n\n| Signal | Sender | O que faz |\n|--------|--------|-----------|\n| `avaliar_segmentos_dinamicos` | `leads.LeadProspecto` | Avalia segmentos + dispara `lead_entrou_segmento` |\n\n---\n\n## Testes\n\n### Arquivo: `tests/test_automacoes.py`\n\n**60 testes passando** cobrindo:\n\n| Classe | Testes | O que cobre |\n|--------|--------|-------------|\n| `RegraAutomacaoModelTest` | 4 | CRUD, taxa_sucesso, str |\n| `CondicaoRegraModelTest` | 7 | Avaliação: igual, maior, contém, aninhado, inexistente, menor_igual, diferente |\n| `AcaoRegraModelTest` | 6 | Delay timedelta (minutos, horas, dias), str |\n| `EngineSubstituirVariaveisTest` | 3 | Substituição de variáveis em templates |\n| `EngineDispararEventoTest` | 14 | Evento sem regras, com/sem condições, inativa, múltiplas AND, delay, notificação, WhatsApp (mock), webhook (mock), criar tarefa, dar pontos, sem tenant |\n| `AutomacoesTenantIsolationTest` | 1 | Regras isoladas por tenant |\n| `AutomacoesViewsTest` | 12 | Lista, criar GET/POST, editar, toggle, excluir, histórico, sem login, editor_fluxo, dashboard, timeline, salvar_fluxo |\n| `FluxoEngineTest` | 5 | Fluxo linear, condição true/false, delay, legacy não afetado |\n| `ControleExecucaoTest` | 3 | Max execuções bloqueia, cooldown bloqueia, sem controles passa |\n| `ExecucaoPendenteTest` | 2 | Executa pendentes vencidos, não executa futuros |\n| `NovasViewsTest` | 3 | Editor fluxo, dashboard, timeline lead |\n\n### Factories\n\n```python\nRegraAutomacaoFactory   # evento='lead_criado', ativa=True\nCondicaoRegraFactory    # campo='lead.origem', operador='igual', valor='whatsapp'\nAcaoRegraFactory        # tipo='notificacao_sistema', configuracao='Novo lead: {{nome}}'\nLogExecucaoFactory      # status='sucesso'\nNodoFluxoFactory        # tipo='action', subtipo='enviar_whatsapp'\nConexaoNodoFactory      # tipo_saida='default'\nExecucaoPendenteFactory # status='pendente'\n```\n\n---\n\n## Testes E2E\n\nManagement command para validar todos os componentes end-to-end:\n\n```bash\npython manage.py testar_automacoes --settings=gerenciador_vendas.settings_local\n```\n\n18 testes cobrindo: gatilhos (5 eventos via signal real), condicoes (7 operadores), acoes (notificacao + tarefa verificadas no banco), delay (pendente → execucao → resultado), rate limit (2 permitidas, 3a bloqueada), fluxo visual completo (trigger → condition → branch true/false), substituicao de variaveis.\n\n---\n\n## Limitacoes conhecidas\n\n1. **Sem Celery:** delays usam tabela `ExecucaoPendente` + cron (latencia maxima = intervalo do cron, ex: 5 min)\n2. **Eventos nao implementados:** `venda_aprovada` (precisa webhook HubSoft) e `cliente_aniversario` (precisa campo data_nascimento)\n3. **Webhook WhatsApp hardcoded:** URL do N8N esta fixa no codigo, deveria ser configuravel por tenant\n4. **Sem deduplicacao de acoes:** se 2 regras mandam WhatsApp para o mesmo lead no mesmo minuto, manda 2x (usar `max_execucoes_por_lead` para controlar)\n\n---\n\n## Exemplo de uso\n\n### Criar automação: \"Boas vindas ao novo lead via WhatsApp\"\n\n1. Acesse `/marketing/automacoes/criar/`\n2. Nome: \"Boas vindas WhatsApp\"\n3. Evento: \"Novo lead criado\"\n4. Salvar → vai para a lista\n5. Clique no ícone de fluxograma (📊) → abre editor visual\n6. Arraste \"Venda aprovada\" (trigger) para o canvas (já vem com o evento da regra)\n7. Arraste \"Verificar Campo\" → configure: Campo=lead.origem, Operador=igual, Valor=whatsapp\n8. Arraste \"Enviar WhatsApp\" → configure: \"Olá {{nome}}, obrigado pelo interesse!\"\n9. Conecte: trigger → condição (saída default), condição → whatsapp (saída true)\n10. Clique \"Salvar\"\n\nAgora todo lead que chegar via WhatsApp recebe a mensagem automaticamente.\n\n### Criar automação com delay: \"Followup 2 dias após cadastro\"\n\n1. Criar regra com evento \"Novo lead criado\"\n2. No editor: trigger → delay (2 dias) → criar tarefa (\"Contatar {{nome}}\")\n3. Salvar\n\nO lead é criado, o delay é agendado, e 2 dias depois o cron executa e cria a tarefa.\n"}, {"t": "f", "n": "06 Inbox", "fn": "06-INBOX.md", "c": "# Módulo Inbox (Atendimento/Suporte) — AuroraISP\n\n**Última atualização:** 03/04/2026\n**Status:** ✅ Implementado (3 sessões de desenvolvimento)\n**Localização:** `apps/inbox/`\n\n---\n\n## Visão Geral\n\nO Inbox é o módulo de conversas em tempo real da AuroraISP, estilo Chatwoot/Intercom. Permite que agentes do provedor conversem com leads e clientes via WhatsApp (webhook) e Chat Widget (embeddable), com interface three-panel unificada, equipes, filas de atendimento, distribuição automática, FAQ, métricas e integração com automações.\n\n**Localização no painel:** Menu `Suporte` → Sidebar `ATENDIMENTO`\n\n**Dois canais:**\n- **WhatsApp** — mensagens chegam/saem via webhook (pronto para N8N)\n- **Chat Widget** — JS embeddable para sites de provedores, com FAQ e 3 abas\n\n---\n\n## Arquitetura\n\n### Models (17 models)\n\n| Model | Tabela | Descrição |\n|-------|--------|-----------|\n| **Core** | | |\n| `CanalInbox` | `inbox_canais` | Configuração do canal: tipo (whatsapp/widget/email/interno) + webhook URLs |\n| `EtiquetaConversa` | `inbox_etiquetas` | Labels/tags com cor para classificar conversas |\n| `Conversa` | `inbox_conversas` | Conversa principal: canal, lead, agente, equipe, fila, status, etiquetas |\n| `Mensagem` | `inbox_mensagens` | Mensagem individual: remetente, tipo de conteúdo, lida, entrega, erro |\n| `RespostaRapida` | `inbox_respostas_rapidas` | Templates de resposta com atalhos (ex: `/ola`) |\n| `NotaInternaConversa` | `inbox_notas_internas` | Notas visíveis apenas para agentes |\n| **Equipes e Filas** | | |\n| `EquipeInbox` | `inbox_equipes` | Equipe de atendimento com líder, cor, membros |\n| `MembroEquipeInbox` | `inbox_membros_equipe` | M2M: agente pode estar em múltiplas equipes (agente/supervisor/gerente) |\n| `PerfilAgenteInbox` | `inbox_perfis_agente` | Status do agente (online/ausente/offline) + capacidade máxima |\n| `FilaInbox` | `inbox_filas` | Fila com modo de distribuição (round-robin/menor carga/manual) |\n| `RegraRoteamento` | `inbox_regras_roteamento` | Regra de roteamento: por canal, etiqueta ou horário → direciona para fila |\n| `HistoricoTransferencia` | `inbox_historico_transferencia` | Audit trail de transferências entre agentes/equipes/filas |\n| **Configuração** | | |\n| `HorarioAtendimento` | `inbox_horario_atendimento` | Dias/horas de funcionamento por tenant |\n| `ConfiguracaoInbox` | `inbox_configuracao` | Singleton: mensagem fora do horário, distribuição padrão |\n| **FAQ** | | |\n| `CategoriaFAQ` | `inbox_faq_categorias` | Categoria de artigos: nome, slug, ícone, cor |\n| `ArtigoFAQ` | `inbox_faq_artigos` | Artigo: título, conteúdo HTML, visualizações |\n| **Widget** | | |\n| `WidgetConfig` | `inbox_widget_config` | Singleton: token público UUID, cores, posição, FAQ, campos obrigatórios, domínios |\n\nTodos os models herdam de `TenantMixin` (multi-tenancy automático).\n\n### Campos importantes de `Conversa`\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `numero` | PositiveIntegerField | Auto-increment por tenant |\n| `canal` | FK → CanalInbox | Canal de origem |\n| `lead` | FK → LeadProspecto | Vinculado automaticamente por telefone/email |\n| `contato_nome` / `contato_telefone` / `contato_email` | CharField | Denormalizados para exibição |\n| `status` | CharField | `aberta`, `pendente`, `resolvida`, `arquivada` |\n| `prioridade` | CharField | `baixa`, `normal`, `alta`, `urgente` |\n| `agente` | FK → User | Atendente atribuído |\n| `equipe` | FK → EquipeInbox | Equipe atribuída |\n| `fila` | FK → FilaInbox | Fila de atendimento |\n| `etiquetas` | M2M → EtiquetaConversa | Labels visuais |\n| `ticket` | FK → Ticket | Link com suporte |\n| `oportunidade` | FK → OportunidadeVenda | Link com CRM |\n| `identificador_externo` | CharField | WhatsApp thread ID ou visitor_id do widget |\n| `ultima_mensagem_em` / `ultima_mensagem_preview` | DateTime/Char | Para lista sem join |\n| `mensagens_nao_lidas` | PositiveIntegerField | Badge |\n| `tempo_primeira_resposta_seg` | PositiveIntegerField | SLA |\n\n### Índices\n\n**Conversa:** `(status, agente)`, `(canal, status)`, `(ultima_mensagem_em)`, `(contato_telefone)`, `(equipe, status)`, `(fila, status)`\n**Mensagem:** `(conversa, data_envio)`, `(identificador_externo)`\n\n---\n\n## Relações com Módulos Existentes\n\n```\n                    ┌─────────────┐\n                    │ LeadProspecto│\n                    │  (leads)    │\n                    └──────┬──────┘\n                           │ FK lead\n┌──────────┐        ┌──────▼──────┐        ┌──────────────┐\n│EquipeInbox│───FK──▶│  Conversa   │────FK──▶│    Ticket     │\n│FilaInbox  │       │  (inbox)    │        │  (suporte)   │\n└──────────┘        └──────┬──────┘        └──────────────┘\n                           │ FK oportunidade\n                    ┌──────▼──────┐\n                    │Oportunidade │\n                    │  Venda (crm)│\n                    └─────────────┘\n```\n\n---\n\n## Services (Lógica de Negócio)\n\n### Arquivo: `apps/inbox/services.py`\n\n### Funções principais\n\n| Função | O que faz |\n|--------|-----------|\n| `receber_mensagem(telefone, nome, conteudo, tenant, ...)` | Processa mensagem WhatsApp: normaliza telefone, busca/cria conversa, vincula lead, distribui, notifica WS |\n| `receber_mensagem_widget(visitor_id, nome, conteudo, tenant, ...)` | Processa mensagem do widget: usa visitor_id em vez de telefone, vincula lead por email/telefone |\n| `enviar_mensagem(conversa, conteudo, user, ...)` | Agente envia: cria mensagem, calcula SLA, webhook async, WS notify |\n| `atribuir_conversa(conversa, agente, atribuido_por)` | Atribui agente + mensagem de sistema |\n| `resolver_conversa(conversa, user)` | Status → resolvida |\n| `reabrir_conversa(conversa, user)` | Status → aberta |\n| `transferir_conversa(conversa, transferido_por, para_agente/equipe/fila, motivo)` | Transfere + HistoricoTransferencia + redistribui se para equipe/fila |\n| `criar_ticket_de_conversa(conversa, titulo, user, categoria)` | Cria Ticket com histórico das últimas 10 mensagens |\n| `marcar_mensagens_lidas(conversa)` | Marca todas contato como lidas + zera badge |\n| `atualizar_status_entrega(identificador_externo, status, tenant)` | Atualiza delivery/read de mensagem externa |\n\n---\n\n## Engine de Distribuição\n\n### Arquivo: `apps/inbox/distribution.py`\n\n| Função | O que faz |\n|--------|-----------|\n| `verificar_horario_atendimento(tenant)` | Checa HorarioAtendimento para dia/hora atual. Sem registros = sempre aberto |\n| `determinar_fila(conversa, tenant)` | Itera RegraRoteamento por prioridade. Match por canal, etiqueta ou horário |\n| `selecionar_agente(fila, tenant)` | Round-robin (circular via ultimo_agente_id) ou menor carga (menos conversas abertas). Verifica status=online e capacidade |\n| `distribuir_conversa(conversa, tenant)` | Orquestrador: fila → agente → atribui → mensagem de sistema |\n\n### Integração\n\nChamado automaticamente em `receber_mensagem()` e `receber_mensagem_widget()` quando nova conversa é criada. Também chamado em `transferir_conversa()` quando destino é equipe/fila.\n\n---\n\n## APIs\n\n### API Webhook (N8N / Externos)\n\nAutenticação: `APITokenAuthentication` (Bearer token). Arquivo: `apps/inbox/views_n8n.py`\n\n| URL | Método | Descrição |\n|-----|--------|-----------|\n| `/api/v1/n8n/inbox/mensagem-recebida/` | POST | Recebe mensagem de contato (WhatsApp) |\n| `/api/v1/n8n/inbox/status-mensagem/` | POST | Callback de delivery/leitura |\n\n### APIs Internas (Painel)\n\nProtegidas por `@login_required`. Arquivo: `apps/inbox/views.py`\n\n| URL | Método | Descrição |\n|-----|--------|-----------|\n| `/inbox/` | GET | Inbox three-panel |\n| `/inbox/dashboard/` | GET | Dashboard de métricas |\n| `/inbox/configuracoes/` | GET/POST | Configurações (equipes, filas, FAQ, widget, etc.) |\n| `/inbox/api/conversas/` | GET | Lista com filtros (status, agente, canal, busca) |\n| `/inbox/api/conversas/<pk>/` | GET | Detalhe com contexto (lead, CRM, notas) |\n| `/inbox/api/conversas/<pk>/mensagens/` | GET | Mensagens paginadas |\n| `/inbox/api/conversas/<pk>/enviar/` | POST | Agente envia mensagem |\n| `/inbox/api/conversas/<pk>/atribuir/` | POST | Atribuir agente |\n| `/inbox/api/conversas/<pk>/resolver/` | POST | Resolver conversa |\n| `/inbox/api/conversas/<pk>/reabrir/` | POST | Reabrir conversa |\n| `/inbox/api/conversas/<pk>/transferir/` | POST | Transferir para agente/equipe/fila |\n| `/inbox/api/conversas/<pk>/ticket/` | POST | Criar ticket de suporte |\n| `/inbox/api/conversas/<pk>/etiquetas/` | POST | Atualizar etiquetas |\n| `/inbox/api/conversas/<pk>/notas/` | POST | Adicionar nota interna |\n| `/inbox/api/agente/status/` | POST | Atualizar status do agente (online/ausente/offline) |\n| `/inbox/api/respostas-rapidas/` | GET | Listar respostas rápidas |\n| `/inbox/api/etiquetas/` | GET | Listar etiquetas |\n\n### API Pública (Widget — sem login)\n\nAutenticação: `token` público UUID no query param. CORS manual. Arquivo: `apps/inbox/views_public.py`\n\n| URL | Método | Descrição |\n|-----|--------|-----------|\n| `/api/public/widget/config/?token=X` | GET | Config do widget + categorias FAQ |\n| `/api/public/widget/faq/?token=X&categoria=slug` | GET | Artigos de uma categoria |\n| `/api/public/widget/faq/buscar/?token=X&q=texto` | GET | Busca artigos por título/conteúdo |\n| `/api/public/widget/conversa/iniciar/` | POST | Inicia conversa (visitor_id, nome, email, mensagem) |\n| `/api/public/widget/conversa/<id>/mensagens/?token=X&visitor_id=Y` | GET | Mensagens da conversa |\n| `/api/public/widget/conversa/<id>/enviar/` | POST | Visitante envia mensagem |\n| `/api/public/widget/conversas/?token=X&visitor_id=Y` | GET | Lista conversas do visitante |\n\n**Segurança:** `@csrf_exempt`, validação de Origin contra `dominios_permitidos`, não expõe notas internas, sobrenome do agente, dados do lead ou mensagens de sistema de atribuição.\n\n---\n\n## WebSocket (Tempo Real)\n\n### Consumer: `InboxConsumer` em `apps/inbox/consumers.py`\n\n| Group | Formato | Quem entra |\n|-------|---------|------------|\n| Tenant | `inbox_tenant_{tenant_id}` | Todos os agentes do tenant |\n| Usuário | `inbox_user_{user_id}` | Agente específico |\n| Conversa | `inbox_conversa_{conversa_id}` | Agentes com chat aberto |\n\n| Action (cliente → servidor) | O que faz |\n|------------------------------|-----------|\n| `join_conversa` | Entra no group da conversa |\n| `leave_conversa` | Sai do group |\n| `typing` | Broadcast typing indicator |\n| `set_status` | Atualiza status (online/ausente/offline) |\n| `mark_read` | Marca mensagens como lidas |\n\nAuto-offline no `disconnect()`. Fallback para polling 5s quando WS não disponível.\n\n---\n\n## Integração com Automações\n\n### Arquivo: `apps/inbox/signals.py`\n\n| Signal | Evento disparado |\n|--------|------------------|\n| `on_conversa_criada` (Conversa created) | `conversa_aberta` |\n| `on_mensagem_recebida` (Mensagem created, remetente=contato) | `mensagem_recebida` |\n| `on_conversa_resolvida` (Conversa status=resolvida) | `conversa_resolvida` |\n\n---\n\n## Chat Widget (Embeddable)\n\n### Arquivo: `apps/inbox/static/inbox/widget/aurora-chat.js`\n\nJS vanilla, self-contained (~15KB), zero dependências. Embed:\n\n```html\n<script src=\"https://app.auroraisp.com/static/inbox/widget/aurora-chat.js\"\n        data-token=\"<token-do-tenant>\"><\/script>\n```\n\n### Interface (3 abas)\n\n```\n┌─────────────────────────────────┐\n│ ✕                               │\n│                                 │\n│  Olá 👋                        │  ← Header com gradiente (cor_header)\n│  Como podemos ajudar?           │\n│                                 │\n├─────────────────────────────────┤\n│                                 │\n│  [Envie uma mensagem      →]   │  ← CTA para abrir chat\n│                                 │\n│  Qual é a sua dúvida?    🔍    │  ← Busca FAQ\n│                                 │\n│  Planos e Preços           →   │  ← Categorias FAQ\n│  Suporte Técnico           →   │\n│  Financeiro                →   │\n│                                 │\n├─────────────────────────────────┤\n│  🏠 Início  💬 Mensagens  ❓ Ajuda │  ← 3 abas\n└─────────────────────────────────┘\n```\n\n### Funcionalidades\n\n- **Botão flutuante** (bottom-right/left, cor configurável)\n- **Aba Início:** saudação + CTA + busca FAQ + categorias com artigos\n- **Aba Mensagens:** lista de conversas do visitante, chat com bolhas, formulário de dados (nome/email/telefone) antes do primeiro contato (configurável)\n- **Aba Ajuda:** browser de FAQ por categoria + busca\n- **Visitor ID:** UUID em localStorage para continuidade entre sessões\n- **Polling 5s** para novas mensagens\n- **Responsivo:** full-screen em telas < 480px\n- **Isolamento CSS:** classes prefixadas `.aw-*`\n\n### Configuração via painel\n\nEm `/inbox/configuracoes/` aba \"Widget\":\n- Título, mensagem de boas vindas\n- Cores (primária + header)\n- Posição (inferior direito/esquerdo)\n- Mostrar FAQ, pedir dados antes do chat\n- Campos obrigatórios (nome, email, telefone)\n- Domínios permitidos (CORS)\n- Código embed para copiar\n\n---\n\n## Dashboard de Métricas\n\n### URL: `/inbox/dashboard/`\n\n| Seção | Dados |\n|-------|-------|\n| **KPIs** (5 cards) | Abertas, Pendentes, Resolvidas hoje, Tempo médio 1ª resposta, Total conversas |\n| **Gráfico** | Linha: volume nos últimos 30 dias (Chart.js) |\n| **Por Canal** | Tabela com volume por canal |\n| **Por Equipe** | Volume por equipe com badges coloridos |\n| **Ranking Agentes** | Top 15 agentes: resolvidas (30d) + tempo médio |\n\n---\n\n## Página de Configurações\n\n### URL: `/inbox/configuracoes/`\n\n9 abas:\n\n| Aba | O que configura |\n|-----|-----------------|\n| **Equipes** | CRUD equipes + adicionar/remover membros (cargo: agente/supervisor/gerente) |\n| **Filas** | CRUD filas (round-robin/menor carga/manual) + regras de roteamento (por canal/etiqueta/horário) |\n| **Respostas Rápidas** | CRUD templates com atalhos (ex: `/ola`) |\n| **Etiquetas** | CRUD labels com cores |\n| **Canais** | Configurar webhook de envio por canal |\n| **Horário** | Dias/horas de atendimento (segunda a domingo) |\n| **FAQ** | CRUD categorias + artigos (título + conteúdo) |\n| **Widget** | Config visual + campos + domínios + código embed |\n| **Geral** | Distribuição padrão, auto-atribuir ao responder, mensagem fora do horário |\n\n---\n\n## Navegação (Sidebar)\n\n```\nATENDIMENTO\n  💬 Inbox              ← /inbox/ (three-panel, full-bleed)\n  📊 Dashboard Inbox    ← /inbox/dashboard/\n\nSUPORTE\n  📊 Dashboard          ← /suporte/\n  📋 Tickets            ← /suporte/tickets/\n  ➕ Novo Ticket        ← /suporte/tickets/criar/\n\nCONFIGURAÇÕES\n  ⚙️ Configurações      ← /inbox/configuracoes/\n```\n\n---\n\n## Management Command\n\n```bash\n# Seed dados de teste (qualquer tenant)\npython manage.py seed_inbox --tenant=aurora-hq --settings=gerenciador_vendas.settings_local\n```\n\nCria: 2 canais, 5 etiquetas, 5 respostas rápidas, 7 conversas com 29 mensagens.\n\n---\n\n## Estrutura de Arquivos\n\n```\napps/inbox/\n├── __init__.py\n├── apps.py                          # AppConfig com ready() → importa signals\n├── models.py                        # 17 models\n├── services.py                      # Lógica de negócio (receber, enviar, transferir, etc.)\n├── distribution.py                  # Engine de distribuição (fila, round-robin, menor carga)\n├── serializers.py                   # DRF serializers (input/output)\n├── widget_auth.py                   # Decorator @widget_token_required + CORS\n├── views.py                         # View principal + APIs internas + config + dashboard\n├── views_n8n.py                     # 2 endpoints webhook (mensagem recebida, status)\n├── views_public.py                  # 7 endpoints públicos do widget (sem login)\n├── urls.py                          # Rotas internas (app_name = 'inbox')\n├── urls_public.py                   # Rotas públicas do widget\n├── signals.py                       # 3 signals → engine de automações\n├── consumers.py                     # WebSocket consumer (InboxConsumer)\n├── routing.py                       # WebSocket URL routing\n├── admin.py                         # Admin para todos os 17 models\n├── migrations/\n│   ├── 0001_initial.py              # Core: 6 models\n│   ├── 0002_*.py                    # Equipes, filas, distribuição: 8 models + 2 FKs\n│   └── 0003_*.py                    # FAQ + WidgetConfig: 3 models\n├── management/commands/\n│   └── seed_inbox.py                # Seed de dados de teste\n├── templates/inbox/\n│   ├── inbox.html                   # Three-panel chat\n│   ├── configuracoes_inbox.html     # 9 abas de configuração\n│   └── dashboard_inbox.html         # Dashboard com Chart.js\n└── static/inbox/\n    ├── css/inbox.css                # Estilos do painel\n    ├── js/inbox.js                  # JS do painel (fetch, polling, WebSocket)\n    └── widget/aurora-chat.js        # Widget embeddable (vanilla JS, ~15KB)\n```\n\n---\n\n## Limitações Conhecidas\n\n1. **Sem Celery:** envio de webhook é síncrono (background thread)\n2. **N8N não configurado:** API webhook funciona, mas nenhum workflow WhatsApp conectado\n3. **InMemoryChannelLayer em dev:** WebSocket funciona só em processo único. Produção precisa Redis\n4. **Sem upload de arquivos:** campo `arquivo_url` espera URL externa\n5. **Widget sem WebSocket:** usa polling 5s. WebSocket para visitantes é enhancement futuro\n6. **Sem CSAT:** pesquisa de satisfação pós-conversa não implementada\n\n---\n\n## Deploy em Produção (checklist)\n\n1. **Redis:** configurar `CHANNEL_LAYERS` com `RedisChannelLayer`\n2. **Daphne:** adicionar `'daphne'` ao INSTALLED_APPS\n3. **Nginx:** proxy `/ws/` → Daphne, resto → Gunicorn\n4. **N8N:** workflow WhatsApp → POST `/api/v1/n8n/inbox/mensagem-recebida/`\n5. **CanalInbox:** criar canal WhatsApp no admin com `webhook_envio_url`\n6. **Token:** `N8N_API_TOKEN` no `.env`\n7. **Widget:** configurar domínios permitidos em `/inbox/configuracoes/` aba Widget\n8. **Migrate:** `python manage.py migrate inbox`\n"}, {"t": "f", "n": "07 Modulo Comercial", "fn": "07-MODULO_COMERCIAL.md", "c": "# Módulo Comercial — AuroraISP\n\n**Última atualização:** 04/04/2026\n**Status:** ✅ Em produção\n**Localização:** `apps/comercial/`\n\n---\n\n## Visão Geral\n\nO módulo Comercial cobre todo o funil de vendas do provedor: da captação do lead até o contrato ativado no HubSoft. É composto por 5 sub-apps independentes que se integram via ForeignKeys e signals.\n\n```\nLead chega (WhatsApp/Site/Instagram)\n    │   \n    ▼\n┌─────────┐     ┌──────────────┐     ┌──────────┐     ┌──────────────┐\n│  LEADS  │────▶│ ATENDIMENTO  │────▶│ CADASTRO │────▶│ VIABILIDADE  │\n│ Captura │     │ Bot N8N      │     │ Registro │     │ Cobertura    │\n└────┬────┘     └──────────────┘     └──────────┘     └──────────────┘\n     │\n     ▼\n┌─────────┐\n│   CRM   │  Pipeline Kanban, Tarefas, Metas, Segmentos, Retenção\n└─────────┘\n```\n\n**Stack compartilhada:** TenantMixin (multi-tenancy), Django 5.2, DRF, PostgreSQL\n\n---\n\n## 1. Leads (`apps/comercial/leads/`)\n\n### O que faz\nCaptura, armazena e qualifica leads de qualquer canal (WhatsApp, site, Instagram, Facebook, telefone). Gerencia documentos (selfie, RG frente/verso) e histórico de contatos do bot.\n\n### Models (4)\n\n#### LeadProspecto\nTabela: `leads_prospectos` | 60+ campos\n\n| Grupo | Campos principais |\n|-------|-------------------|\n| **Identificação** | nome_razaosocial, email (unique), telefone (validado, regex), cpf_cnpj, rg, data_nascimento |\n| **Endereço** | rua, numero_residencia, bairro, cidade, estado, cep, ponto_referencia |\n| **Comercial** | valor (DecimalField 12,2), origem (site/facebook/instagram/google/whatsapp/indicacao/telefone/email/outros), score_qualificacao (1-10), empresa |\n| **Status** | status_api (pendente/processado/erro/sucesso/rejeitado/aguardando_retry), ativo |\n| **Documentação** | documentacao_completa, documentacao_validada, contrato_aceito, anexos_contrato_enviados, ip_aceite_contrato |\n| **Conversas** | url_pdf_conversa, html_conversa_path, data_geracao_pdf, data_geracao_html |\n| **Contato** | tentativas_contato, data_ultimo_contato, motivo_rejeicao, canal_entrada, tipo_entrada |\n| **Campanhas** | campanha_origem FK, campanha_conversao FK, total_campanhas_detectadas, metadata_campanhas (JSON) |\n| **IDs externos** | id_hubsoft, id_origem, id_origem_servico, id_plano_rp, id_dia_vencimento, id_vendedor_rp |\n\n**14 índices** incluindo compostos: `(canal_entrada, data_cadastro)`, `(score_qualificacao, status_api)`, `(tipo_entrada, ativo)`\n\n**Métodos principais:**\n- `calcular_score_qualificacao()` → score 1-10 baseado em dados preenchidos\n- `validar_documentacao_completa()` → verifica selfie + doc_frente + doc_verso\n- `aceitar_contrato(ip_address)` → marca contrato aceito com IP e timestamp\n- `gerar_url_pdf()` → gera URL do PDF da conversa\n- `get_historico_contatos_relacionados()` → contatos por lead ou telefone\n- `get_taxa_sucesso_contatos()` → % de contatos bem-sucedidos\n- `get_documentos_por_tipo()` → organiza documentos por tipo\n\n#### ImagemLeadProspecto\nTabela: `imagens_lead_prospecto`\n\nArmazena URLs de imagens externas (documentos do lead). Status: pendente, documentos_validos, documentos_rejeitados.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead pai |\n| `link_url` | URLField(1024) | URL da imagem |\n| `descricao` | CharField(255) | Descrição |\n| `status_validacao` | CharField(30) | pendente/documentos_validos/documentos_rejeitados |\n| `observacao_validacao` | TextField | Observações |\n| `validado_por` | CharField(150) | Username do validador |\n\n#### Prospecto\nTabela: `prospectos`\n\nRepresenta o prospecto no HubSoft. Vinculado ao lead via FK. Controla o processamento de envio para o ERP.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead pai (opcional) |\n| `nome_prospecto` | CharField(255) | Nome |\n| `id_prospecto_hubsoft` | CharField(100, unique) | ID no HubSoft |\n| `status` | CharField(20) | pendente/processando/processado/erro/finalizado/cancelado/aguardando_validacao/validacao_aprovada/validacao_rejeitada |\n| `tentativas_processamento` | PositiveInteger | Tentativas |\n| `tempo_processamento` | Decimal(10,3) | Tempo em segundos |\n| `dados_processamento` / `resultado_processamento` | JSONField | Input/output do processamento |\n| `score_conversao` | Decimal(5,2) | Score 0-100 de probabilidade de conversão |\n\n**Métodos:** `iniciar_processamento()`, `finalizar_processamento()`, `calcular_score_conversao_automatico()`\n\n#### HistoricoContato\nTabela: `historico_contato`\n\nRegistra cada interação do bot ou agente com o contato. Usado para funil de conversão e métricas.\n\n| Campo | Tipo | Descrição |\n|-------|------|-----------|\n| `lead` | FK LeadProspecto | Lead (opcional) |\n| `telefone` | CharField(17) | Telefone do contato |\n| `status` | CharField(30) | 14 status possíveis (fluxo_inicializado, venda_confirmada
