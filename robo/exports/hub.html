:** 30/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO `settings_production.py` contГ©m IP hardcoded e `localhost`/`127.0.0.1` no ALLOWED_HOSTS. Isso aumenta a superfГӯcie de ataque e expГөe o IP do servidor no cГіdigo.\n\n---\n\n## Tarefas\n\n- [ ] Remover `localhost` e `127.0.0.1` do ALLOWED_HOSTS de produГ§ГЈo\n- [ ] Remover IP hardcoded (`31.97.243.247`), usar apenas domГӯnios\n- [ ] Migrar ALLOWED_HOSTS para variГЎvel de ambiente\n- [ ] Validar que SECRET_KEY falha explicitamente se vazio em produГ§ГЈo\n\n---\n\n## Contexto e referГӘncias\n\n- Settings: `gerenciador_vendas/settings_production.py`, linhas 17-23\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nALLOWED_HOSTS contГ©m apenas domГӯnios. Sem IPs nem localhost em produГ§ГЈo.\n"}, {"t": "f", "n": "Api Response Dados Sensiveis 30 03 2026", "fn": "api_response_dados_sensiveis_30-03-2026.md", "c": "---\nname: \"Remover Dados SensГӯveis dos Responses de API\"\ndescription: \"A API de integraГ§Гөes retorna campos sensГӯveis nos JSON responses: login PPPoE, senha PPPoE, MAC address, IPv4 de cliente\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Remover Dados SensГӯveis dos Responses de API вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nA API de integraГ§Гөes retorna campos sensГӯveis nos JSON responses: login PPPoE, senha PPPoE, MAC address, IPv4 de clientes. Esses dados nГЈo deveriam ser expostos via API.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os serializers/dicts que retornam dados de `ClienteHubsoft` e `ServicoClienteHubsoft`\n- [ ] Remover campos: `login`, `senha`, `mac_addr`, `ipv4`, `ipv6` dos responses\n- [ ] Criar listas explГӯcitas de campos permitidos (allowlist) em vez de retornar tudo\n- [ ] Verificar outros endpoints que possam expor dados desnecessГЎrios\n\n---\n\n## Contexto e referГӘncias\n\n- Views: `apps/integracoes/views.py`, funГ§ГЈo `_servico_para_dict()`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nAPIs retornam apenas campos necessГЎrios. Dados de rede (login, senha, MAC, IP) nunca expostos via API.\n"}, {"t": "f", "n": "Api Rest Framework 30 03 2026", "fn": "api_rest_framework_30-03-2026.md", "c": "---\nname: \"Implementar Django REST Framework\"\ndescription: \"O projeto possui APIs (HubSoft, N8N, webhooks) mas sem Django REST Framework. NГЈo hГЎ serializers, versionamento de API, \"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev\"\n---\n\n# Implementar Django REST Framework вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO projeto possui APIs (HubSoft, N8N, webhooks) mas sem Django REST Framework. NГЈo hГЎ serializers, versionamento de API, autenticaГ§ГЈo por token nem documentaГ§ГЈo automГЎtica. ГҖ medida que o SaaS escala com multi-tenancy, uma camada de API padronizada Г© essencial.\n\n---\n\n## Tarefas\n\n- [ ] Instalar djangorestframework e adicionar ao requirements.txt\n- [ ] Configurar DRF no settings (autenticaГ§ГЈo, permissГөes, paginaГ§ГЈo)\n- [ ] Criar serializers para os models principais (Lead, Cliente, Tenant)\n- [ ] Migrar endpoints existentes para ViewSets/APIViews\n- [ ] Implementar autenticaГ§ГЈo por token (TokenAuth ou JWT)\n- [ ] Adicionar versionamento de API (v1/)\n- [ ] Configurar drf-spectacular ou similar para documentaГ§ГЈo OpenAPI\n- [ ] Testar endpoints migrados\n\n---\n\n## Contexto e referГӘncias\n\n- DГӯvida tГ©cnica documentada em `docs/PRODUTO/02-ROADMAP_PRODUTO.md`\n- Endpoints N8N duplicados mencionados no roadmap\n\n---\n\n## Resultado esperado\n\nAPI padronizada com DRF, autenticaГ§ГЈo por token, versionamento e documentaГ§ГЈo Swagger/OpenAPI acessГӯvel.\n"}, {"t": "f", "n": "Apps Cs Nps Retencao 30 03 2026", "fn": "apps_cs_nps_retencao_30-03-2026.md", "c": "---\nname: \"Ativar Apps CS: NPS e RetenГ§ГЈo\"\ndescription: \"As pastas `apps/cs/nps/` e `apps/cs/retencao/` existem no projeto mas nГЈo estГЈo em `INSTALLED_APPS`. Гү necessГЎrio defini\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev\"\n---\n\n# Ativar Apps CS: NPS e RetenГ§ГЈo вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nAs pastas `apps/cs/nps/` e `apps/cs/retencao/` existem no projeto mas nГЈo estГЈo em `INSTALLED_APPS`. Гү necessГЎrio definir os models, views e URLs desses apps, registrГЎ-los no Django e integrГЎ-los ao mГіdulo CS.\n\n---\n\n## Tarefas\n\n- [x] Definir models do app `nps` (ConfiguracaoNPS, PesquisaNPS com TenantMixin)\n- [x] Definir models do app `retencao` (ScoreCliente, AlertaChurn, AcaoRetencao com TenantMixin)\n- [x] Criar views e URLs bГЎsicos para ambos\n- [x] Registrar em `INSTALLED_APPS`\n- [ ] Gerar migrations (executar manualmente)\n- [ ] Integrar no menu do CS\n- [x] Adicionar TenantMixin nos models\n- [x] Registrar models no admin\n\n---\n\n## Contexto e referГӘncias\n\n- RГ©guas CS01 a CS07 em `docs/PRODUTO/01-REGUAS_PADRAO.md`\n- Apps CS migrados: `finalizadas/migracao_megaroleta_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nApps `nps` e `retencao` funcionais, com models, views e URLs integrados ao mГіdulo CS. Prontos para receber as rГ©guas de automaГ§ГЈo.\n"}, {"t": "f", "n": "Autenticacao Endpoints Api 30 03 2026", "fn": "autenticacao_endpoints_api_30-03-2026.md", "c": "---\nname: \"AutenticaГ§ГЈo nos 48+ Endpoints de API\"\ndescription: \"48+ endpoints de API usam `@csrf_exempt` sem nenhuma autenticaГ§ГЈo. Qualquer pessoa na internet consegue criar leads, apr\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# AutenticaГ§ГЈo nos 48+ Endpoints de API вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\n48+ endpoints de API usam `@csrf_exempt` sem nenhuma autenticaГ§ГЈo. Qualquer pessoa na internet consegue criar leads, aprovar/rejeitar vendas, deletar imagens e acessar dashboards. Inclui endpoints com impacto financeiro direto (`aprovar_venda_api`, `rejeitar_venda_api`).\n\n---\n\n## Tarefas\n\n### CategorizaГ§ГЈo dos endpoints\n- [ ] Mapear todos os endpoints com `@csrf_exempt` e classificar em:\n  - **Webhook/N8N** (chamados por sistemas externos) вҶ’ autenticaГ§ГЈo por API Key\n  - **Painel** (chamados pelo frontend) вҶ’ remover `@csrf_exempt`, usar `@login_required` + CSRF token\n  - **PГәblico** (cadastro de cliente) вҶ’ manter pГәblico mas com rate limiting\n\n### ImplementaГ§ГЈo вҖ” APIs do painel\n- [ ] Remover `@csrf_exempt` dos endpoints do painel (dashboard_data, aprovar_venda, etc.)\n- [ ] Adicionar `@login_required` nos endpoints que exigem autenticaГ§ГЈo\n- [ ] Garantir que o frontend envia o CSRF token via header `X-CSRFToken`\n\n### ImplementaГ§ГЈo вҖ” Webhooks/N8N\n- [ ] Criar decorator `@webhook_auth_required` que valida `Authorization: Bearer <token>`\n- [ ] Criar variГЎvel de ambiente `N8N_API_TOKEN`\n- [ ] Aplicar nos endpoints chamados pelo N8N (registrar_lead, registrar_prospecto, etc.)\n- [ ] Atualizar os workflows do N8N para enviar o token no header\n\n### ImplementaГ§ГЈo вҖ” Endpoints pГәblicos\n- [ ] Manter `api_cadastro_cliente` e `api_consulta_cep` pГәblicos\n- [ ] Adicionar rate limiting (ex: 10 req/min por IP)\n\n### ValidaГ§ГЈo\n- [ ] Testar que endpoints do painel rejeitam requests sem CSRF/login\n- [ ] Testar que webhooks rejeitam requests sem token\n- [ ] Testar que endpoints pГәblicos funcionam sem auth mas com rate limit\n- [ ] Atualizar a isenГ§ГЈo do LoginRequiredMiddleware (`^api/` Г© muito amplo)\n\n---\n\n## Contexto e referГӘncias\n\n- Endpoints: `vendas_web/views.py` e `vendas_web/views_api_atendimento.py`\n- LoginRequiredMiddleware: `apps/sistema/middleware.py` (isenta `^api/`)\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero endpoints de API sem autenticaГ§ГЈo (exceto os explicitamente pГәblicos com rate limiting). Webhooks protegidos por token. Frontend usando CSRF token corretamente.\n"}, {"t": "f", "n": "Automacoes Refatoracao Completa 03 04 2026", "fn": "automacoes_refatoracao_completa_03-04-2026.md", "c": "---\nname: \"AutomaГ§Гөes: RefatoraГ§ГЈo completa com fluxograma visual\"\ndescription: \"Implementar fluxos condicionais, editor drag & drop, delays reais, segmentos, timeline, controles\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# AutomaГ§Гөes: RefatoraГ§ГЈo Completa вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nRefatorar o mГіdulo de AutomaГ§Гөes para suportar fluxos condicionais visuais (drag & drop), delays reais, integraГ§ГЈo com segmentos, timeline por lead e controles robustos.\n\n---\n\n## Tarefas\n\n- [ ] Phase 1: Models (NodoFluxo, ConexaoNodo, ExecucaoPendente, ControleExecucao) + migrations\n- [ ] Phase 2: Engine dual-mode (legacy + grafo) + controles\n- [ ] Phase 3: Management command cron (pendentes, lead_sem_contato, tarefa_vencida, segmentos)\n- [ ] Phase 4: Frontend editor visual (Drawflow)\n- [ ] Phase 5: Dashboard central + Timeline no lead\n- [ ] Phase 6: IntegraГ§ГЈo com Segmentos\n- [ ] Phase 7: Testes completos\n\n---\n\n## Contexto e referГӘncias\n\nPlano detalhado em: `.claude/plans/typed-nibbling-stallman.md`\n\n---\n\n## Resultado esperado\n\nCliente cria automaГ§Гөes visuais com fluxos condicionais, delays e aГ§Гөes encadeadas. Logs claros por lead e por regra. Controles de execuГ§ГЈo robustos.\n"}, {"t": "f", "n": "Cicd Pipeline 30 03 2026", "fn": "cicd_pipeline_30-03-2026.md", "c": "---\nname: \"Pipeline CI/CD\"\ndescription: \"NГЈo existe pipeline de CI/CD. Testes, linting e deploy sГЈo manuais. Para garantir qualidade e agilidade no deploy, Г© nec\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"DevOps\"\n---\n\n# Pipeline CI/CD вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nNГЈo existe pipeline de CI/CD. Testes, linting e deploy sГЈo manuais. Para garantir qualidade e agilidade no deploy, Г© necessГЎrio configurar um pipeline automatizado (GitHub Actions ou similar).\n\n---\n\n## Tarefas\n\n- [ ] Criar workflow de CI (rodar testes em cada push/PR)\n- [ ] Adicionar linting ao pipeline (flake8 ou ruff)\n- [ ] Adicionar verificaГ§ГЈo de seguranГ§a (bandit ou safety)\n- [ ] Criar workflow de CD (deploy automatizado para produГ§ГЈo)\n- [ ] Configurar secrets no GitHub (DB, API keys)\n- [ ] Configurar notificaГ§Гөes de falha (e-mail ou Slack)\n- [ ] Documentar processo de deploy automatizado\n\n---\n\n## Contexto e referГӘncias\n\n- Depende de: Docker (`docker_containerizacao_30-03-2026.md`)\n- Depende de: Testes (`cobertura_testes_30-03-2026.md`)\n\n---\n\n## Resultado esperado\n\nPipeline CI/CD funcional. Push na main roda testes automaticamente. Deploy em produГ§ГЈo com um clique ou automГЎtico apГіs merge.\n"}, {"t": "f", "n": "Clube Auth Tenant 30 03 2026", "fn": "clube_auth_tenant_30-03-2026.md", "c": "---\nname: \"AutenticaГ§ГЈo e Tenant no MГіdulo Clube\"\ndescription: \"As APIs do Clube de BenefГӯcios usam session-based auth (`request.session.get('auth_membro_id')`) sem verificar se o memb\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# AutenticaГ§ГЈo e Tenant no MГіdulo Clube вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nAs APIs do Clube de BenefГӯcios usam session-based auth (`request.session.get('auth_membro_id')`) sem verificar se o membro pertence ao tenant atual. Um membro de um provedor poderia acessar dados de outro provedor se a sessГЈo for comprometida.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar verificaГ§ГЈo de tenant nas APIs do clube (`apps/cs/clube/views/api_views.py`)\n- [ ] Garantir que `MembroClube.objects.get(id=auth_membro_id)` filtra por tenant\n- [ ] Revisar login do membro para incluir tenant na sessГЈo\n- [ ] Testar que membro de Tenant A nГЈo acessa dados de Tenant B\n\n---\n\n## Contexto e referГӘncias\n\n- Views: `apps/cs/clube/views/api_views.py`, linhas 21-50, 191-300\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodas as operaГ§Гөes do clube validam que o membro pertence ao tenant do request.\n"}, {"t": "f", "n": "Cobertura Testes 30 03 2026", "fn": "cobertura_testes_30-03-2026.md", "c": "---\nname: \"Cobertura de Testes\"\ndescription: \"A cobertura de testes Г© ~1%. Existe apenas 1 arquivo de teste real (`test_tenant_isolation.py` com 16 testes). Para um S\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"QA / Dev\"\n---\n\n# Cobertura de Testes вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** QA / Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nA cobertura de testes Г© ~1%. Existe apenas 1 arquivo de teste real (`test_tenant_isolation.py` com 16 testes). Para um SaaS multi-tenant em produГ§ГЈo, Г© crГӯtico ter testes automatizados cobrindo os fluxos principais. Meta: 80% de cobertura nos models e views crГӯticos.\n\n---\n\n## Tarefas\n\n- [ ] Instalar pytest-cov e configurar .coveragerc\n- [ ] Atualizar requirements.txt com dependГӘncias de teste (pytest, pytest-django, pytest-cov, factory-boy)\n- [ ] Criar testes para models do mГіdulo comercial (Lead, Atendimento, Cadastro)\n- [ ] Criar testes para fluxo de integraГ§ГЈo HubSoft\n- [ ] Criar testes para models do mГіdulo CS (Clube, Parceiros, IndicaГ§Гөes)\n- [ ] Criar testes para o sistema de planos e features (Admin Aurora)\n- [ ] Criar testes para middleware de tenant (cenГЎrios de edge case)\n- [ ] Criar testes para views crГӯticas (login, dashboard, cadastro de lead)\n- [ ] Gerar relatГіrio de cobertura e identificar gaps\n- [ ] Definir meta mГӯnima de cobertura no CI (ex: 60% para comeГ§ar)\n\n---\n\n## Contexto e referГӘncias\n\n- Testes existentes: `robo/dashboard_comercial/gerenciador_vendas/tests/`\n- Fixtures: `conftest.py` com tenant_a, tenant_b, user_a, user_b\n- Factories: `factories.py` com TenantFactory, UserFactory, PerfilFactory\n- pytest.ini configurado com `settings_local`\n\n---\n\n## Resultado esperado\n\nCobertura de testes >60% nos mГіdulos crГӯticos. RelatГіrio de coverage integrado ao CI. Factories e fixtures reutilizГЎveis para todos os apps.\n"}, {"t": "f", "n": "Contrato Termos 30 03 2026", "fn": "contrato_termos_30-03-2026.md", "c": "---\nname: \"Contrato, Termos de Uso e PolГӯtica de Privacidade\"\ndescription: \"NГЈo existem documentos jurГӯdicos para a operaГ§ГЈo SaaS. Antes de fechar contratos na Fase 1 (a partir de 31/03), Г© necess\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"JurГӯdico / CEO\"\n---\n\n# Contrato, Termos de Uso e PolГӯtica de Privacidade вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** JurГӯdico / CEO\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nNГЈo existem documentos jurГӯdicos para a operaГ§ГЈo SaaS. Antes de fechar contratos na Fase 1 (a partir de 31/03), Г© necessГЎrio ter pelo menos o contrato de prestaГ§ГЈo de serviГ§o, termos de uso e polГӯtica de privacidade.\n\n---\n\n## Tarefas\n\n- [ ] Redigir contrato de prestaГ§ГЈo de serviГ§o SaaS (mensalidade + transacional)\n- [ ] Incluir clГЎusulas de SLA (uptime, suporte, prazo de ativaГ§ГЈo)\n- [ ] Redigir termos de uso da plataforma\n- [ ] Redigir polГӯtica de privacidade (conformidade LGPD)\n- [ ] Definir polГӯtica de cancelamento e reembolso\n- [ ] Redigir acordo com o sГіcio comercial (parceiro de vendas)\n- [ ] Revisar com advogado especializado\n- [ ] Disponibilizar no sistema (aceite digital no onboarding)\n\n---\n\n## Contexto e referГӘncias\n\n- PrecificaГ§ГЈo: `docs/GTM/08-PRECIFICACAO.md`\n- Fluxo comercial: `docs/GTM/12-FLUXO_COMERCIAL.md`\n- LGPD: `backlog/lgpd_privacidade_30-03-2026.md`\n\n---\n\n## Resultado esperado\n\nDocumentos jurГӯdicos prontos para uso comercial. Contrato, termos e polГӯtica acessГӯveis no sistema com aceite digital.\n"}, {"t": "f", "n": "Conversao Trial 27 03 2026", "fn": "conversao_trial_27-03-2026.md", "c": "---\nname: Processo de conversГЈo do trial\ndescription: Definir e documentar o processo de acompanhamento durante os 14 dias de trial para maximizar conversГЈo\ntype: tarefa\nstatus: finalizada\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nCriar o processo de nurturing durante o trial de 14 dias (HubSoft) para garantir que o ISP ative, use e converta para cliente pagante.\n\n## Atividades\n\n- [x] Definir touchpoints durante o trial (D+0 a D+14, dois trilhos: ativo e inativo)\n- [x] Definir critГ©rio de \"trial ativado com sucesso\" (primeiro lead processado)\n- [x] Definir o que acontece se o trial nГЈo for usado nos primeiros 3 dias (trilho inativo com WhatsApp ativo do PMM)\n- [x] Oferta D+12 вҶ’ decisГЈo: sem oferta durante o trial. Movida para RГ©gua de RecuperaГ§ГЈo PГіs-Trial.\n- [x] Documentar estrutura da rГ©gua em exports/drafts/email/regua_trial_estrutura.md\n- вҶ—пёҸ Criar mensagens вҶ’ movido para task textos_regua_trial_27-03-2026.md\n\n## ResponsГЎvel\n\n| Touchpoint | Executa | Criado por |\n|------------|---------|------------|\n| D+1 вҖ” Sistema ativado e funcionando? | PMM (Aurora) | PMM |\n| D+3 вҖ” Primeiro lead processado? | PMM (Aurora) | PMM |\n| D+7 вҖ” Como estГЎ sendo a experiГӘncia? | PMM (Aurora) | PMM |\n| D+10 вҖ” Alguma dГәvida antes de fechar? | Parceiro | PMM (script pronto) |\n| D+12 вҖ” Oferta de fechamento | Parceiro | PMM (script pronto) |\n| D+14 вҖ” Trial encerrado | PMM (Aurora) | PMM |\n\nPMM cria todos os materiais e executa os touchpoints de produto. Parceiro entra apenas nos momentos de fechamento com script jГЎ definido.\n"}, {"t": "f", "n": "Credencial Hubsoft Hardcoded 30 03 2026", "fn": "credencial_hubsoft_hardcoded_30-03-2026.md", "c": "---\nname: \"Remover Credencial HubSoft Hardcoded\"\ndescription: \"O arquivo `apps/cs/clube/management/commands/testar_pontuacoes.py` contГ©m a senha do banco HubSoft em texto plano. Qualq\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Remover Credencial HubSoft Hardcoded вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO arquivo `apps/cs/clube/management/commands/testar_pontuacoes.py` contГ©m a senha do banco HubSoft em texto plano. Qualquer pessoa com acesso ao cГіdigo consegue conectar ao banco de produГ§ГЈo do HubSoft.\n\n---\n\n## Tarefas\n\n- [ ] Substituir credenciais hardcoded por `os.getenv()` no `testar_pontuacoes.py`\n- [ ] Verificar se hГЎ outros arquivos com credenciais hardcoded no mГіdulo CS\n- [ ] Solicitar rotaГ§ГЈo da senha exposta ao administrador do HubSoft\n- [ ] Adicionar as variГЎveis `HUBSOFT_DB_*` ao `.env.example`\n\n---\n\n## Contexto e referГӘncias\n\n- Arquivo: `robo/dashboard_comercial/gerenciador_vendas/apps/cs/clube/management/commands/testar_pontuacoes.py`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero credenciais hardcoded no cГіdigo. Senha exposta rotacionada no HubSoft.\n"}, {"t": "f", "n": "Criptografia Credenciais Db 30 03 2026", "fn": "criptografia_credenciais_db_30-03-2026.md", "c": "---\nname: \"Criptografar Credenciais API no Banco\"\ndescription: \"Os models `IntegracaoAPI` armazenam `client_secret`, `password` e `access_token` em texto plano no banco. Se o banco for\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Criptografar Credenciais API no Banco вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nOs models `IntegracaoAPI` armazenam `client_secret`, `password` e `access_token` em texto plano no banco. Se o banco for comprometido (dump, backup vazado, acesso indevido), todas as credenciais de integraГ§ГЈo ficam expostas.\n\n---\n\n## Tarefas\n\n- [ ] Avaliar django-cryptography ou django-fernet-fields para criptografia de campo\n- [ ] Instalar e configurar a biblioteca escolhida\n- [ ] Migrar campos `client_secret`, `password` e `access_token` para campos criptografados\n- [ ] Gerar migration (dados existentes serГЈo re-criptografados)\n- [ ] Testar que leitura/escrita das credenciais continua funcionando (HubSoft, N8N)\n- [ ] Adicionar chave de criptografia ao `.env` (`FIELD_ENCRYPTION_KEY`)\n\n---\n\n## Contexto e referГӘncias\n\n- Model: `apps/integracoes/models.py`, campos client_secret, password, access_token\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCredenciais de API criptografadas em repouso no banco. Dump do banco nГЈo expГөe senhas.\n"}, {"t": "f", "n": "Crm Dropdown Pipeline 03 04 2026", "fn": "crm_dropdown_pipeline_03-04-2026.md", "c": "---\nname: \"CRM: Dropdown de seleГ§ГЈo de pipeline no tГӯtulo\"\ndescription: \"Substituir tГӯtulo fixo 'Pipeline CRM' por dropdown com nome do pipeline selecionado\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Dropdown de pipeline no tГӯtulo вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nO tГӯtulo \"Pipeline CRM\" deve ser substituГӯdo por um dropdown que mostra o nome do pipeline atual e permite trocar entre pipelines. Remover as tabs de seleГ§ГЈo criadas anteriormente.\n\n---\n\n## Tarefas\n\n- [ ] Remover tabs de pipeline\n- [ ] Substituir h1 \"Pipeline CRM\" por dropdown com nome do pipeline atual\n- [ ] Ao selecionar outro pipeline, recarregar com ?pipeline=ID\n\n---\n\n## Resultado esperado\n\nTГӯtulo mostra \"Vendas B2B Provedores в–ј\" e ao clicar abre dropdown com os outros pipelines.\n"}, {"t": "f", "n": "Crm Seletor Pipeline 03 04 2026", "fn": "crm_seletor_pipeline_03-04-2026.md", "c": "---\nname: \"CRM: Seletor de pipeline no Kanban\"\ndescription: \"Permitir trocar entre pipelines criados na pГЎgina do CRM Kanban\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Seletor de pipeline no Kanban вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nA pГЎgina do Pipeline CRM foi criada antes do sistema suportar mГәltiplos pipelines por tenant. Hoje o tenant pode ter vГЎrios pipelines (ex: Vendas B2B, Vendas B2C, Onboarding), mas o Kanban nГЈo permite trocar entre eles.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar seletor de pipeline (tabs ou dropdown) no topo do Kanban\n- [ ] Enviar pipeline_id na chamada da API api_pipeline_dados\n- [ ] Manter pipeline selecionado via query param (?pipeline=ID)\n- [ ] Atualizar estГЎgios e oportunidades ao trocar pipeline\n\n---\n\n## Resultado esperado\n\nUsuГЎrio consegue trocar entre pipelines no Kanban sem sair da pГЎgina.\n"}, {"t": "f", "n": "Crm Troca Pipeline Ajax 03 04 2026", "fn": "crm_troca_pipeline_ajax_03-04-2026.md", "c": "---\nname: \"CRM: Troca de pipeline via AJAX sem reload\"\ndescription: \"Trocar pipeline sem recarregar pГЎgina, usando fetch para atualizar apenas o kanban\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Troca de pipeline via AJAX вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nAo trocar de pipeline no dropdown, o sistema recarrega a pГЎgina inteira com `?pipeline=ID`. Deveria trocar via AJAX, atualizando apenas o kanban. A URL deve ficar limpa ou usar slug amigГЎvel.\n\n---\n\n## Tarefas\n\n- [ ] Trocar links `<a href=\"?pipeline=ID\">` por onclick JS\n- [ ] Ao clicar, chamar `carregarPipeline(pipelineId)` via fetch\n- [ ] Recriar as colunas do kanban dinamicamente com os novos estГЎgios\n- [ ] Atualizar tГӯtulo do dropdown com o nome do pipeline selecionado\n- [ ] NГЈo recarregar a pГЎgina\n\n---\n\n## Resultado esperado\n\nTroca de pipeline Г© instantГўnea, sem reload. URL permanece `/crm/`.\n"}, {"t": "f", "n": "Csp Unsafe Inline 30 03 2026", "fn": "csp_unsafe_inline_30-03-2026.md", "c": "---\nname: \"Remover unsafe-inline e unsafe-eval do CSP\"\ndescription: \"A Content Security Policy permite `unsafe-inline` e `unsafe-eval` nos scripts e estilos. Isso anula a proteГ§ГЈo contra XS\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Remover unsafe-inline e unsafe-eval do CSP вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nA Content Security Policy permite `unsafe-inline` e `unsafe-eval` nos scripts e estilos. Isso anula a proteГ§ГЈo contra XSS, pois qualquer script inline pode ser executado. Precisa migrar scripts inline para arquivos externos e usar nonces.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os `<script>` inline nos templates\n- [ ] Extrair scripts inline para arquivos .js separados\n- [ ] Extrair estilos inline para arquivos .css\n- [ ] Implementar sistema de nonces para scripts que precisam ser inline\n- [ ] Remover `'unsafe-inline'` e `'unsafe-eval'` do `CSP_SCRIPT_SRC` no settings\n- [ ] Remover `'unsafe-inline'` do `CSP_STYLE_SRC`\n- [ ] Testar todas as pГЎginas apГіs a mudanГ§a (dashboard, CRM, CS, cadastro)\n\n---\n\n## Contexto e referГӘncias\n\n- Settings: `gerenciador_vendas/settings.py`, linhas 92-115\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCSP sem unsafe-inline e unsafe-eval. Scripts inline usando nonces. ProteГ§ГЈo XSS efetiva.\n"}, {"t": "f", "n": "Csrf Endpoints Seguranca 30 03 2026", "fn": "csrf_endpoints_seguranca_30-03-2026.md", "c": "---\nname: \"CorreГ§ГЈo CSRF e SeguranГ§a de Endpoints\"\ndescription: \"O roadmap de produto identifica 50+ endpoints com `@csrf_exempt` e APIs sem autenticaГ§ГЈo adequada. Com o sistema multi-t\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"SeguranГ§a (AppSec)\"\n---\n\n# CorreГ§ГЈo CSRF e SeguranГ§a de Endpoints вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO roadmap de produto identifica 50+ endpoints com `@csrf_exempt` e APIs sem autenticaГ§ГЈo adequada. Com o sistema multi-tenant em produГ§ГЈo, endpoints inseguros representam risco de acesso cruzado entre tenants e ataques CSRF.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os endpoints com `@csrf_exempt` no projeto\n- [ ] Classificar por risco (alto: dados de tenant, mГ©dio: funcional, baixo: pГәblico)\n- [ ] Remover `@csrf_exempt` onde possГӯvel, usar AJAX com CSRF token\n- [ ] Implementar autenticaГ§ГЈo em endpoints de API (Token ou Session)\n- [ ] Adicionar verificaГ§ГЈo de tenant em endpoints crГӯticos\n- [ ] Validar que webhooks N8N usam autenticaГ§ГЈo (API key ou HMAC)\n- [ ] Testar cenГЎrios de acesso cruzado entre tenants via API\n- [ ] Documentar endpoints pГәblicos vs. autenticados\n\n---\n\n## Contexto e referГӘncias\n\n- DГӯvida tГ©cnica: `docs/PRODUTO/02-ROADMAP_PRODUTO.md` (CSRF vulnerabilities, 50+ endpoints)\n- Agente: `docs/AGENTES/tech/appsec.md`\n\n---\n\n## Resultado esperado\n\nZero endpoints com `@csrf_exempt` desnecessГЎrio. Todas as APIs autenticadas. Isolamento de tenant validado em endpoints crГӯticos.\n"}, {"t": "f", "n": "Docker Containerizacao 30 03 2026", "fn": "docker_containerizacao_30-03-2026.md", "c": "---\nname: \"Docker e ContainerizaГ§ГЈo\"\ndescription: \"O projeto nГЈo possui Dockerfile nem docker-compose. O deploy Г© manual via Gunicorn + Nginx no servidor. Para escalar o S\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"DevOps\"\n---\n\n# Docker e ContainerizaГ§ГЈo вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO projeto nГЈo possui Dockerfile nem docker-compose. O deploy Г© manual via Gunicorn + Nginx no servidor. Para escalar o SaaS com multi-tenancy e facilitar onboarding de novos clientes, Г© necessГЎrio containerizar a aplicaГ§ГЈo.\n\n---\n\n## Tarefas\n\n- [ ] Criar Dockerfile para a aplicaГ§ГЈo Django\n- [ ] Criar docker-compose.yml (Django + PostgreSQL + Nginx + Redis)\n- [ ] Configurar volumes para media/static files\n- [ ] Criar .dockerignore\n- [ ] Configurar variГЎveis de ambiente via docker-compose\n- [ ] Testar build e startup local\n- [ ] Documentar processo de deploy com Docker\n\n---\n\n## Contexto e referГӘncias\n\n- Gunicorn config atual: `robo/dashboard_comercial/gerenciador_vendas/gunicorn.conf.py`\n- Deploy atual: manual, servidor com user `darlan`, porta 8003\n\n---\n\n## Resultado esperado\n\nAplicaГ§ГЈo containerizada com docker-compose. Dev local roda com um comando (`docker-compose up`). Base para CI/CD e deploy automatizado.\n"}, {"t": "f", "n": "Docker Healthcheck 31 03 2026", "fn": "docker_healthcheck_31-03-2026.md", "c": "---\nname: \"Docker e Health Check\"\ndescription: \"ContainerizaГ§ГЈo do projeto com Docker e endpoint de monitoramento\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"DevOps\"\n---\n\n# Docker e Health Check вҖ” 31/03/2026\n\n**Data:** 31/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вң… ConcluГӯda\n\n---\n\n## DescriГ§ГЈo\n\nCriar infraestrutura de containerizaГ§ГЈo (Docker) e monitoramento (health check + logging estruturado) para o projeto gerenciador_vendas.\n\n---\n\n## Tarefas\n\n- [x] Criar Dockerfile (Python 3.11 slim, gunicorn)\n- [x] Criar docker-compose.yml (web + postgres + nginx)\n- [x] Criar nginx.conf (proxy reverso para gunicorn)\n- [x] Criar .dockerignore\n- [x] Criar endpoint /health/ com verificaГ§ГЈo de banco\n- [x] Adicionar /health/ como rota isenta de autenticaГ§ГЈo no middleware\n- [x] Configurar LOGGING estruturado com PIIFilter no settings.py\n\n---\n\n## Contexto e referГӘncias\n\nPreparaГ§ГЈo para deploy containerizado e monitoramento em produГ§ГЈo.\n\n---\n\n## Resultado esperado\n\nProjeto pronto para build Docker com `docker-compose up`, endpoint `/health/` acessГӯvel sem autenticaГ§ГЈo retornando status do banco, e logging estruturado com filtro de PII ativo.\n"}, {"t": "f", "n": "Fix Spa Navigation Js 31 03 2026", "fn": "fix_spa_navigation_js_31-03-2026.md", "c": "---\nname: \"Corrigir erros JS no sistema de navegaГ§ГЈo SPA\"\ndescription: \"navigateTo() injeta scripts duplicados causando NotificationSystem/API_URLS already declared e null references\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / Tech Lead\"\n---\n\n# Corrigir Erros JS no Sistema de NavegaГ§ГЈo SPA вҖ” 31/03/2026\n\n**Data:** 31/03/2026\n**ResponsГЎvel:** Dev / Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nO `base.html` tem um sistema de navegaГ§ГЈo SPA que usa `navigateTo()` para carregar pГЎginas via fetch e injetar o HTML no DOM. Ao navegar entre pГЎginas, scripts inline sГЈo re-executados causando erros de variГЎveis duplicadas (`NotificationSystem`, `API_URLS` already declared) e referГӘncias nulas (elementos DOM que nГЈo existem na pГЎgina atual).\n\n---\n\n## Tarefas\n\n- [ ] Investigar o sistema navigateTo() no base.html\n- [ ] Identificar todos os scripts inline que declaram variГЎveis globais\n- [ ] Corrigir injeГ§ГЈo duplicada de scripts\n- [ ] Corrigir referГӘncias a elementos DOM null\n- [ ] Testar navegaГ§ГЈo entre Dashboard, Comercial, Marketing, CS, RelatГіrios\n\n---\n\n## Contexto e referГӘncias\n\n- Erros no console: NotificationSystem already declared, API_URLS already declared, Cannot read properties of null\n- Arquivo: apps/sistema/templates/sistema/base.html (funГ§ГЈo navigateTo)\n- Afeta: navegaГ§ГЈo SPA entre mГіdulos\n\n---\n\n## Resultado esperado\n\nNavegaГ§ГЈo SPA sem erros no console. Todos os mГіdulos acessГӯveis sem reload de pГЎgina.\n"}, {"t": "f", "n": "Https Cookies Seguranca 30 03 2026", "fn": "https_cookies_seguranca_30-03-2026.md", "c": "---\nname: \"ForГ§ar HTTPS e Cookies Seguros\"\ndescription: \"O `settings.py` base nГЈo define `SESSION_COOKIE_SECURE`, `CSRF_COOKIE_SECURE` nem `SECURE_SSL_REDIRECT`. Em produГ§ГЈo, co\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"DevOps / SeguranГ§a (AppSec)\"\n---\n\n# ForГ§ar HTTPS e Cookies Seguros вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** DevOps / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO `settings.py` base nГЈo define `SESSION_COOKIE_SECURE`, `CSRF_COOKIE_SECURE` nem `SECURE_SSL_REDIRECT`. Em produГ§ГЈo, cookies podem ser transmitidos via HTTP, permitindo ataques man-in-the-middle.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar ao settings.py (com fallback via env var):\n  - `SECURE_SSL_REDIRECT`\n  - `SESSION_COOKIE_SECURE`\n  - `CSRF_COOKIE_SECURE`\n  - `SECURE_HSTS_SECONDS` (jГЎ existe no production, garantir no base)\n- [ ] Verificar que settings_production.py tem todas as flags ativas\n- [ ] Testar que settings_local.py nГЈo quebra com HTTP (valores False para dev)\n- [ ] Verificar configuraГ§ГЈo SSL do Nginx no servidor\n\n---\n\n## Contexto e referГӘncias\n\n- Settings base: `gerenciador_vendas/settings.py`\n- Settings prod: `gerenciador_vendas/settings_production.py` (jГЎ tem HSTS)\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCookies de sessГЈo e CSRF marcados como Secure em produГ§ГЈo. HTTPS forГ§ado. HSTS ativo.\n"}, {"t": "f", "n": "Idor Apis Tenant 30 03 2026", "fn": "idor_apis_tenant_30-03-2026.md", "c": "---\nname: \"Corrigir IDOR nas APIs вҖ” VerificaГ§ГЈo de Tenant\"\ndescription: \"MГәltiplas APIs aceitam IDs via parГўmetro (lead_id, imagem_id, fluxo_id) sem verificar se o objeto pertence ao tenant do \"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Corrigir IDOR nas APIs вҖ” VerificaГ§ГЈo de Tenant вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nMГәltiplas APIs aceitam IDs via parГўmetro (lead_id, imagem_id, fluxo_id) sem verificar se o objeto pertence ao tenant do usuГЎrio. Um atacante pode acessar, modificar ou deletar dados de outro tenant apenas trocando o ID na requisiГ§ГЈo.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os `.objects.get(pk=X)` e `get_object_or_404(Model, id=X)` sem filtro de tenant\n- [ ] Criar helper `get_tenant_object_or_404(Model, tenant, **kwargs)` para uso padronizado\n- [ ] Corrigir `deletar_imagem_lead_api()` вҖ” adicionar filtro de tenant\n- [ ] Corrigir `validar_imagem_api()` вҖ” adicionar filtro de tenant\n- [ ] Corrigir `imagens_por_cliente_api()` вҖ” adicionar filtro de tenant\n- [ ] Corrigir `iniciar_atendimento_n8n()` вҖ” verificar tenant do lead e fluxo\n- [ ] Corrigir `api_lead_hubsoft_status()` em `apps/integracoes/views.py` вҖ” verificar tenant\n- [ ] Corrigir `get_object_or_404(ModeloCarteirinha, id=X)` em `apps/cs/carteirinha/views.py`\n- [ ] Criar testes de IDOR (tentar acessar objeto de outro tenant, esperar 404)\n\n---\n\n## Contexto e referГӘncias\n\n- Endpoints afetados: `vendas_web/views.py`, `apps/integracoes/views.py`, `apps/cs/carteirinha/views.py`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodas as consultas por ID validam tenant antes de retornar. RequisiГ§Гөes para objetos de outro tenant retornam 404.\n"}, {"t": "f", "n": "Linting Qualidade Codigo 30 03 2026", "fn": "linting_qualidade_codigo_30-03-2026.md", "c": "---\nname: \"Linting e Qualidade de CГіdigo\"\ndescription: \"O projeto nГЈo possui ferramentas de linting, formataГ§ГЈo automГЎtica nem verificaГ§ГЈo de qualidade de cГіdigo. Para manter c\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev\"\n---\n\n# Linting e Qualidade de CГіdigo вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO projeto nГЈo possui ferramentas de linting, formataГ§ГЈo automГЎtica nem verificaГ§ГЈo de qualidade de cГіdigo. Para manter consistГӘncia Г  medida que o projeto cresce, Г© necessГЎrio configurar essas ferramentas.\n\n---\n\n## Tarefas\n\n- [ ] Instalar e configurar ruff (linter + formatter)\n- [ ] Criar pyproject.toml com configuraГ§Гөes do ruff\n- [ ] Rodar linting no cГіdigo existente e corrigir erros crГӯticos\n- [ ] Configurar pre-commit hooks (ruff, trailing whitespace, end-of-file)\n- [ ] Adicionar ao requirements-dev.txt\n- [ ] Integrar ao pipeline CI/CD\n\n---\n\n## Contexto e referГӘncias\n\n- Depende de: Pipeline CI/CD (`cicd_pipeline_30-03-2026.md`)\n- Codebase: 30.000+ linhas de cГіdigo Python\n\n---\n\n## Resultado esperado\n\nLinting automГЎtico com ruff. Pre-commit hooks impedem cГіdigo fora do padrГЈo. Integrado ao CI.\n"}, {"t": "f", "n": "Logging Pii Filter 30 03 2026", "fn": "logging_pii_filter_30-03-2026.md", "c": "---\nname: \"Filtro de PII no Logging\"\ndescription: \"A configuraГ§ГЈo de logging em produГ§ГЈo nГЈo possui filtros para mascarar dados pessoais. Se um desenvolvedor logar um obje\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Filtro de PII no Logging вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nA configuraГ§ГЈo de logging em produГ§ГЈo nГЈo possui filtros para mascarar dados pessoais. Se um desenvolvedor logar um objeto ou request com CPF, email ou telefone, esses dados ficam nos logs sem proteГ§ГЈo.\n\n---\n\n## Tarefas\n\n- [ ] Criar classe `PIIFilter(logging.Filter)` que mascara padrГөes de CPF, email e telefone\n- [ ] Adicionar filtro a todos os handlers no settings de logging\n- [ ] Testar que logs de integraГ§ГЈo (HubSoft) nГЈo expГөem dados pessoais\n- [ ] Documentar regra: nunca logar dados pessoais diretamente\n\n---\n\n## Contexto e referГӘncias\n\n- Logging: `gerenciador_vendas/settings_production.py`, linhas 57-99\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nFiltro de PII ativo em produГ§ГЈo. CPFs mascarados como `XXX.XXX.XXX-XX`, emails como `[email]`.\n"}, {"t": "f", "n": "Materiais Vendas 26 03 2026", "fn": "materiais_vendas_26-03-2026.md", "c": "---\nname: \"Materiais de Vendas вҖ” Roteiros e Estruturas\"\ndescription: \"Criar os materiais de vendas que o parceiro comercial usarГЎ para prospectar e fechar clientes. One-pager para enviar ant\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"PMM\"\n---\n\n# Materiais de Vendas вҖ” Roteiros e Estruturas\n\n**Data:** 26/03/2026\n**ResponsГЎvel:** PMM\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вң… Finalizado\n\n---\n\n## DescriГ§ГЈo\n\nCriar os materiais de vendas que o parceiro comercial usarГЎ para prospectar e fechar clientes. One-pager para enviar antes da reuniГЈo, deck para a apresentaГ§ГЈo e case anГҙnimo com os nГәmeros reais do provedor em produГ§ГЈo.\n\n---\n\n## Tarefas\n\n### Estruturas (conteГәdo definido)\n- [x] Estrutura do one-pager вҶ’ exports/drafts/apresentacao/one_pager_estrutura.md\n- [x] Estrutura do pre-demo deck (6 slides) вҶ’ exports/drafts/apresentacao/pre_demo_deck_estrutura.md\n- [x] Estrutura do deck de apoio (10 slides) вҶ’ exports/drafts/apresentacao/demo_deck_apoio_estrutura.md\n- [x] Estrutura do deck do parceiro (10 slides + roteiro) вҶ’ exports/drafts/apresentacao/demo_deck_parceiro_estrutura.md\n- [x] Script do pitch de 2 minutos вҶ’ 09-ENABLEMENT.md\n\n### Outros materiais\n- [ ] Revisar script do pitch de 2 minutos com o parceiro\n- [ ] Finalizar documento de objeГ§Гөes e respostas\n\n> VersГөes visuais (PPT/PDF) e case anГҙnimo em PDF registrados em task separada: materiais_vendas_visual.\n\n---\n\n## Contexto e referГӘncias\n\n- Pitch rascunhado em [09-ENABLEMENT.md](../../GTM/09-ENABLEMENT.md)\n- Mensagens e objeГ§Гөes em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- Dados do case em [01-PESQUISA_MERCADO.md](../../GTM/01-PESQUISA_MERCADO.md)\n- PrecificaГ§ГЈo aprovada em [08-PRECIFICACAO.md](../../GTM/08-PRECIFICACAO.md)\n\n---\n\n## Resultado esperado\n\nParceiro com material completo para prospectar e apresentar sem depender da Aurora em cada conversa.\n"}, {"t": "f", "n": "Migracao Megaroleta 29 03 2026", "fn": "migracao_megaroleta_29-03-2026.md", "c": "---\nname: \"MigraГ§ГЈo do mГіdulo CS (megaroleta) para o hub\"\ndescription: \"Migrar o mГіdulo CS (Clube de BenefГӯcios) do projeto megaroleta para dentro do hub, integrando os apps, models, URLs e te\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# MigraГ§ГЈo do mГіdulo CS (megaroleta) para o hub вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**ResponsГЎvel:** Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вң… ConcluГӯda\n\n---\n\n## DescriГ§ГЈo\n\nMigrar o mГіdulo CS (Clube de BenefГӯcios) do projeto megaroleta para dentro do hub, integrando os apps, models, URLs e templates ao layout unificado do vendas_web.\n\n---\n\n## Tarefas\n\n- [x] Migrar 4 apps do megaroleta: clube, parceiros, indicacoes, carteirinha\n- [x] Migrar 20 models para o hub\n- [x] Migrar 76 URLs\n- [x] Migrar 67+ templates\n- [x] Integrar templates CS ao layout do hub (estendem vendas_web/base.html)\n- [x] Criar sidebar CS com sub-seГ§Гөes: Clube, Parceiros, Carteirinhas, IndicaГ§Гөes\n- [x] Resolver conflitos CSS com modais (display:none inline)\n- [x] Definir CRM do parceiro com 5 estГЎgios (Lead identificado, Em contato, Em negociaГ§ГЈo, Trial ativo, Finalizada)\n\n---\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Projeto origem: `megaroleta/` (somente leitura)\n- DecisГЈo: app GestГЈo (17 models, agentes IA) NГғO migra para o hub\n\n---\n\n## Resultado esperado\n\nMГіdulo CS completamente integrado ao hub com 4 apps funcionais, templates unificados e sidebar de navegaГ§ГЈo. Pendente refinamento visual e substituiГ§ГЈo de URLs hardcoded.\n"}, {"t": "f", "n": "Migracao Models Apps 30 03 2026", "fn": "migracao_models_apps_30-03-2026.md", "c": "---\nname: \"Limpeza de Apps Legados e Imports\"\ndescription: \"Os models jГЎ foram migrados para os apps modulares (29/03). Restavam apps legados duplicados e imports antigos. A limpez\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# Limpeza de Apps Legados e Imports вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nOs models jГЎ foram migrados para os apps modulares (29/03). Restavam apps legados duplicados e imports antigos. A limpeza principal foi concluГӯda em 30/03.\n\n---\n\n## Tarefas\n\n- [x] Remover `crm/` (raiz) do `INSTALLED_APPS` вҖ” substituГӯdo por `apps.comercial.crm`\n- [x] Remover `integracoes/` (raiz) do `INSTALLED_APPS` вҖ” substituГӯdo por `apps.integracoes`\n- [x] Registrar `apps.comercial.crm` e `apps.integracoes` no `INSTALLED_APPS`\n- [x] Migrar imports de `from vendas_web.models import X` para `from apps.X.models import X` (~40 arquivos)\n- [x] Migrar imports de `from crm.models import X` para `from apps.comercial.crm.models import X`\n- [x] Migrar imports de `from integracoes.*` para `from apps.integracoes.*`\n- [x] Mover middleware (LoginRequiredMiddleware) para `apps.sistema.middleware`\n- [x] Mover context_processors para `apps.sistema.context_processors`\n- [x] Atualizar URLs para usar `apps.integracoes.urls` em vez de `integracoes.urls`\n- [x] Registrar apps CS e admin_aurora no settings.py principal\n- [x] Corrigir settings_local.py para herdar INSTALLED_APPS do settings.py\n- [x] `manage.py check` passando (0 erros)\n- [x] 16 testes de isolamento passando\n- [x] Migrar admin.py do vendas_web para apps modulares (Phase 2: admin split)\n  - [x] apps/sistema/admin.py вҖ” AdminSiteCustom, ConfiguracaoEmpresa, ConfiguracaoSistema, LogSistema, StatusConfiguravel, UserAdmin\n  - [x] apps/comercial/leads/admin.py вҖ” LeadProspecto, Prospecto, HistoricoContato, ImagemLeadProspecto\n  - [x] apps/comercial/atendimento/admin.py вҖ” FluxoAtendimento, QuestaoFluxo, AtendimentoFluxo, TentativaResposta, RespostaQuestao\n  - [x] apps/comercial/cadastro/admin.py вҖ” ConfiguracaoCadastro, PlanoInternet, OpcaoVencimento, CadastroCliente, DocumentoLead\n  - [x] apps/comercial/viabilidade/admin.py вҖ” CidadeViabilidade\n  - [x] apps/notificacoes/admin.py вҖ” TipoNotificacao, CanalNotificacao, PreferenciaNotificacao, Notificacao, TemplateNotificacao\n  - [x] apps/marketing/campanhas/admin.py вҖ” CampanhaTrafego, DeteccaoCampanha\n  - [x] vendas_web/admin.py esvaziado (apenas comentarios de referencia)\n- [x] Phase 4: Templates migrados para diretГіrios dos apps (31/03)\n    - [x] apps/sistema/templates/sistema/ вҖ” login.html, configuracoes/{index,usuarios,recontato}.html\n    - [x] apps/dashboard/templates/dashboard/ вҖ” 12 templates (dashboard, new_dash, vendas, relatorios, ajuda, api_swagger, n8n_guide, etc.)\n    - [x] apps/comercial/leads/templates/comercial/leads/ вҖ” leads.html\n    - [x] apps/comercial/cadastro/templates/comercial/cadastro/ вҖ” cadastro.html, configuracoes/{cadastro,planos,vencimentos}.html\n    - [x] apps/comercial/atendimento/templates/comercial/atendimento/ вҖ” fluxos.html, questoes.html\n    - [x] apps/notificacoes/templates/notificacoes/ вҖ” notificacoes.html, tipo_notificacao_detalhes.html\n    - [x] apps/marketing/campanhas/templates/marketing/campanhas/ вҖ” campanhas.html\n    - [x] render() calls atualizados em todas as views dos apps\n    - [x] {% extends 'vendas_web/base.html' %} mantido (base.html fica no vendas_web por ora)\n    - [x] Templates originais preservados em vendas_web/templates/ (sem exclusao)\n- [ ] Remover monkey-patch de User em `vendas_web/models.py`\n- [x] Migrar views/URLs do `vendas_web` para apps modulares\n  - [x] Dashboard & RelatГіrios: 29 views migradas para `apps/dashboard/views.py` (31/03)\n  - [x] URLs atualizadas em `vendas_web/urls.py` para importar de `apps.dashboard`\n  - [x] Funil insights migrado de `vendas_web/funil_insights.py` para `apps/dashboard/views.py`\n  - [x] Phase 5: URLs migradas para urls.py de cada app modular (31/03)\n    - [x] apps/sistema/urls.py вҖ” auth, configuracoes, usuarios (10 routes)\n    - [x] apps/comercial/leads/urls.py вҖ” leads, prospectos, historicos, vendas (20 routes)\n    - [x] apps/comercial/atendimento/urls.py вҖ” fluxos, questoes, atendimentos, N8N (38 routes)\n    - [x] apps/comercial/cadastro/urls.py вҖ” cadastro, planos, vencimentos, CEP (12 routes)\n    - [x] apps/comercial/viabilidade/urls.py вҖ” viabilidade tecnica (1 route)\n    - [x] apps/notificacoes/urls.py вҖ” notificacoes, templates, canais, whatsapp (25 routes)\n    - [x] apps/marketing/campanhas/urls.py вҖ” campanhas de trafego (4 routes)\n    - [x] apps/dashboard/urls.py вҖ” dashboard, relatorios, analise, docs (29 routes)\n    - [x] gerenciador_vendas/urls.py atualizado com includes modulares\n    - [x] vendas_web/urls.py esvaziado (todas as rotas migradas)\n- [ ] Remover pastas `crm/` e `integracoes/` legadas da raiz (apГіs validaГ§ГЈo em produГ§ГЈo)\n\n---\n\n## Contexto e referГӘncias\n\n- RefatoraГ§ГЈo concluГӯda: `finalizadas/refatoracao_apps_29-03-2026.md`\n- `vendas_web/models.py` Г© re-export (zero models prГіprios), mantido por compatibilidade de views\n- `crm/` e `integracoes/` na raiz removidos do INSTALLED_APPS, imports atualizados\n\n---\n\n## Resultado esperado\n\nTodos os imports apontam para `apps/`. Apps modulares registrados corretamente. PrГіximo passo: migrar views/URLs do vendas_web para os apps (tarefa separada).\n"}, {"t": "f", "n": "Modulo Inbox Atendimento 03 04 2026", "fn": "modulo_inbox_atendimento_03-04-2026.md", "c": "---\nname: \"MГіdulo Inbox de Atendimento/Suporte Completo\"\ndescription: \"Inbox Chatwoot-style: conversas, equipes, filas, distribuiГ§ГЈo, widget, FAQ, mГ©tricas\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# MГіdulo Inbox de Atendimento/Suporte вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вң… ConcluГӯda (14 phases em 3 sessГөes)\n\n---\n\n## DescriГ§ГЈo\n\nMГіdulo completo de atendimento estilo Chatwoot/Intercom. Inbox de conversas em tempo real com dois canais (WhatsApp via webhook e Chat Widget embeddable), equipes de atendimento, filas com distribuiГ§ГЈo automГЎtica (round-robin/menor carga), transferГӘncia, FAQ/base de conhecimento, dashboard de mГ©tricas e integraГ§ГЈo com automaГ§Гөes.\n\n---\n\n## Tarefas\n\n### SessГЈo 1: Inbox Base\n- [x] Models core (CanalInbox, Conversa, Mensagem, etc.)\n- [x] API webhook (receber/enviar mensagens, status)\n- [x] Inbox UI three-panel (lista, chat, contexto)\n- [x] WebSocket (Django Channels)\n- [x] IntegraГ§ГЈo automaГ§Гөes (3 eventos)\n\n### SessГЈo 2: Equipes e DistribuiГ§ГЈo\n- [x] Models (EquipeInbox, FilaInbox, PerfilAgenteInbox, etc.)\n- [x] Engine de distribuiГ§ГЈo automГЎtica\n- [x] PГЎgina de configuraГ§Гөes (9 abas)\n- [x] TransferГӘncia de conversas\n- [x] Dashboard de mГ©tricas\n\n### SessГЈo 3: Widget + FAQ\n- [x] Models FAQ (CategoriaFAQ, ArtigoFAQ)\n- [x] Model WidgetConfig (token pГәblico, cores, domГӯnios)\n- [x] API pГәblica (7 endpoints sem login, CORS)\n- [x] Widget JS embeddable (aurora-chat.js, 3 abas)\n\n---\n\n## Resultado\n\n- 17 models no app `apps/inbox/`\n- 26+ endpoints (internos, N8N, pГәblicos)\n- Widget JS vanilla (~15KB, zero dependГӘncias)\n- Dashboard com Chart.js\n- 3 migrations no PostgreSQL\n- DocumentaГ§ГЈo completa em `docs/PRODUTO/06-INBOX.md`\n"}, {"t": "f", "n": "Monitoramento Admin Aurora 31 03 2026", "fn": "monitoramento_admin_aurora_31-03-2026.md", "c": "---\nname: \"Painel de Monitoramento no Admin Aurora\"\ndescription: \"Criar pГЎgina de monitoramento do sistema no painel /aurora-admin/\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"DevOps\"\n---\n\n# Painel de Monitoramento no Admin Aurora вҖ” 31/03/2026\n\n**Data:** 31/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вң… ConcluГӯda\n\n---\n\n## DescriГ§ГЈo\n\nCriar uma pГЎgina de monitoramento completa no Admin Aurora (/aurora-admin/monitoramento/) que exiba o status do sistema, mГ©tricas operacionais, logs de integraГ§ГЈo e erros recentes. TambГ©m melhorar a pГЎgina de logs existente com filtros avanГ§ados e auto-refresh.\n\n---\n\n## Tarefas\n\n- [x] Criar view monitoramento_view com health check, mГ©tricas e logs\n- [x] Adicionar URL /aurora-admin/monitoramento/\n- [x] Adicionar link \"Monitoramento\" na navbar do Admin Aurora\n- [x] Criar template monitoramento.html com cards de status, mГ©tricas e tabelas\n- [x] Melhorar logs_view com filtro por mГіdulo, busca por texto e contagem por nГӯvel\n- [x] Melhorar logs.html com badges de contagem, auto-refresh e filtros avanГ§ados\n\n---\n\n## Contexto e referГӘncias\n\n- Admin Aurora: apps/admin_aurora/\n- Health check existente: /health/ (apps/sistema/views.py)\n- Models: LogSistema, LogIntegracao, Tenant, LeadProspecto, AtendimentoFluxo\n\n---\n\n## Resultado esperado\n\nPainel de monitoramento funcional com visГЈo consolidada do sistema: status do banco, contagem de erros/warnings, mГ©tricas de leads e atendimentos, logs de integraГ§ГЈo HubSoft e Гәltimos erros. PГЎgina de logs melhorada com busca, filtro por mГіdulo e auto-refresh.\n"}, {"t": "f", "n": "Monitoramento Logging 30 03 2026", "fn": "monitoramento_logging_30-03-2026.md", "c": "---\nname: \"Monitoramento e Logging Estruturado\"\ndescription: \"O projeto possui apenas logs do Gunicorn e um model `LogIntegracao` para auditoria de integraГ§Гөes. NГЈo hГЎ APM, alertas, \"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"DevOps\"\n---\n\n# Monitoramento e Logging Estruturado вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** DevOps\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nO projeto possui apenas logs do Gunicorn e um model `LogIntegracao` para auditoria de integraГ§Гөes. NГЈo hГЎ APM, alertas, structured logging nem dashboard de monitoramento. Com multi-tenancy ativo, Г© crГӯtico monitorar a saГәde do sistema por tenant.\n\n---\n\n## Tarefas\n\n- [ ] Configurar logging estruturado no Django (JSON format)\n- [ ] Definir nГӯveis de log por mГіdulo (comercial, CS, integraГ§Гөes)\n- [ ] Implementar health check endpoint (/health/)\n- [ ] Configurar alertas para erros crГӯticos (integraГ§Гөes HubSoft, falhas de API)\n- [ ] Avaliar ferramenta de APM (Sentry, Grafana ou similar)\n- [ ] Criar dashboard bГЎsico de monitoramento (uptime, erros, latГӘncia)\n- [ ] Monitorar mГ©tricas por tenant (uso, erros, volume)\n\n---\n\n## Contexto e referГӘncias\n\n- Model existente: `LogIntegracao` em `apps/integracoes/`\n- Gunicorn logs: `/var/log/gunicorn/robovendas/`\n\n---\n\n## Resultado esperado\n\nLogging estruturado em JSON, health check endpoint, alertas de erros crГӯticos configurados. Visibilidade sobre a saГәde do sistema em produГ§ГЈo.\n"}, {"t": "f", "n": "Multi Tenancy 29 03 2026", "fn": "multi_tenancy_29-03-2026.md", "c": "---\nname: Implementar multi-tenancy no sistema\ndescription: Tenant, PerfilUsuario, TenantMixin, TenantManager, middleware com auto-filtro e auto-save\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nPermitir que mГәltiplos provedores usem o mesmo sistema com dados isolados.\n\n## Atividades\n\n- [x] Criar model Tenant (provedor, mГіdulos, planos, trial, HubSoft)\n- [x] Criar model PerfilUsuario (substitui monkey-patch User.add_to_class)\n- [x] Criar TenantMixin (FK tenant + managers automГЎticos)\n- [x] Criar TenantManager (auto-filtra objects.all() por tenant do request)\n- [x] Criar TenantMiddleware (resolve tenant via thread-local)\n- [x] Todos os 27+ models herdam TenantMixin\n- [x] Auto-save: TenantMixin.save() preenche tenant automaticamente\n- [x] Escape hatch: all_tenants manager para admin/commands\n- [x] Seed do tenant Megalink + associaГ§ГЈo de users\n- [x] Isolamento testado com 3 tenants\n- [x] 16 testes automatizados passando\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: docs/context/reunioes/multi_tenancy_29-03-2026.md\n- Settings local: gerenciador_vendas/settings_local.py (SQLite)\n\n## Resultado esperado\n\nMulti-tenancy funcionando localmente. Cada provedor sГі vГӘ seus prГіprios dados.\n"}, {"t": "f", "n": "Padronizar Frontend Cs 29 03 2026", "fn": "padronizar_frontend_cs_29-03-2026.md", "c": "---\nname: \"Padronizar frontend do mГіdulo CS\"\ndescription: \"Os templates do mГіdulo CS (clube, parceiros, indicacoes, carteirinha) foram migrados do megaroleta e ainda usam o layout\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"CTO\"\n---\n\n# Padronizar frontend do mГіdulo CS вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**ResponsГЎvel:** CTO\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nOs templates do mГіdulo CS (clube, parceiros, indicacoes, carteirinha) foram migrados do megaroleta e ainda usam o layout antigo (base.html prГіprio com topbar/sidebar do megaroleta). O `extends` jГЎ foi trocado para `vendas_web/base.html`, mas os estilos internos (CSS inline, classes, cores) ainda nГЈo seguem o design system do hub.\n\nPadronizar para usar as classes e variГЎveis CSS do hub (mesma abordagem aplicada no CRM).\n\n---\n\n## Tarefas\n\n- [ ] Padronizar templates do clube/dashboard (home, premios, participantes, gamificacao, banners, config, etc.)\n- [ ] Padronizar templates do parceiros/dashboard (home, parceiros, cupons, cupom_detalhe)\n- [ ] Padronizar templates do indicacoes/dashboard (home, indicacoes, visual)\n- [ ] Padronizar templates do carteirinha/dashboard (home, modelos, regras, preview)\n- [ ] Garantir que modais usem .modal-overlay com display:none\n- [ ] Remover referГӘncias a cores hardcoded, usar CSS variables\n\n---\n\n## Contexto e referГӘncias\n\n- Design system: `vendas_web/static/vendas_web/css/dashboard.css`\n- VariГЎveis: --primary (#3b82f6), --bg-page (#f8fafc), --border (#e5e7eb), etc.\n- Classes: .page-header, .page-title, .stats-grid, .stat-card, .admin-table, .btn-primary, .btn-secondary, .card, .modal-overlay\n- CRM jГЎ padronizado como referГӘncia\n\n---\n\n## Resultado esperado\n\nTodas as pГЎginas do mГіdulo CS com visual consistente com o restante do hub (Comercial, CRM, Dashboard). Sem gradientes roxos, sem CSS inline extenso, usando variГЎveis e classes do design system.\n"}, {"t": "f", "n": "Permissoes Usuario 05 04 2026", "fn": "permissoes_usuario_05-04-2026.md", "c": "# Tarefa: Sistema de PermissГөes por MГіdulo/Papel/Escopo\n\n**Data:** 05/04/2026\n**Status:** Em andamento\n**Prioridade:** Alta\n\n---\n\n## Objetivo\n\nImplementar controle granular de permissГөes com 3 camadas: mГіdulo (acesso sim/nГЈo), papel (role dentro do mГіdulo) e escopo (visibilidade de dados).\n\n## Escopo\n\n1. Model `PermissaoUsuario` com flags por mГіdulo e papel\n2. Decorator `@permissao_required` para views\n3. Filtro de escopo nos querysets (meus/equipe/todos)\n4. Sidebar filtrada por permissГөes\n5. Tela de gestГЈo de permissГөes (na pГЎgina de usuГЎrios existente)\n\n## PapГ©is por mГіdulo\n\n- Comercial: vendedor, supervisor, gerente\n- Marketing: analista, gerente\n- CS: operador, gerente\n- Inbox: agente, supervisor, gerente\n- ConfiguraГ§Гөes: acesso sim/nГЈo (sГі admin)\n"}, {"t": "f", "n": "Pii Logs Print 30 03 2026", "fn": "pii_logs_print_30-03-2026.md", "c": "---\nname: \"Remover PII de Logs e Print Statements\"\ndescription: \"Existem `print()` em `vendas_web/views.py` que expГөem email e telefone de leads em stdout. Logs de produГ§ГЈo podem conter\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Remover PII de Logs e Print Statements вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nExistem `print()` em `vendas_web/views.py` que expГөem email e telefone de leads em stdout. Logs de produГ§ГЈo podem conter dados pessoais (CPF, telefone, email) sem mascaramento, violando boas prГЎticas de LGPD.\n\n---\n\n## Tarefas\n\n- [ ] Remover todos os `print()` com PII em `vendas_web/views.py` (linhas 2557, 2648, 2700)\n- [ ] Substituir por `logging.debug()` com ID do lead (sem dados pessoais)\n- [ ] Buscar outros `print()` no projeto inteiro e substituir por logging\n- [ ] Implementar filtro de PII no logging (mascarar CPF, email, telefone)\n- [ ] Verificar que `LogIntegracao` nГЈo armazena PII no campo `payload_enviado`\n\n---\n\n## Contexto e referГӘncias\n\n- Arquivo: `vendas_web/views.py`, linhas 2557-2701\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero PII em logs e stdout. Logging estruturado com `logging` module. Filtro de mascaramento ativo.\n"}, {"t": "f", "n": "Rate Limiting 30 03 2026", "fn": "rate_limiting_30-03-2026.md", "c": "---\nname: \"Implementar Rate Limiting\"\ndescription: \"Nenhum endpoint possui rate limiting. APIs pГәblicas (cadastro, consulta CEP) e webhooks podem ser abusados com enumeraГ§ГЈ\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / DevOps\"\n---\n\n# Implementar Rate Limiting вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / DevOps\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nNenhum endpoint possui rate limiting. APIs pГәblicas (cadastro, consulta CEP) e webhooks podem ser abusados com enumeraГ§ГЈo massiva, scraping de dados ou ataques de forГ§a bruta. Sem limitaГ§ГЈo, um atacante pode extrair toda a base de leads.\n\n---\n\n## Tarefas\n\n- [ ] Instalar django-ratelimit ou throttling do DRF\n- [ ] Definir limites por categoria:\n  - APIs pГәblicas: 10 req/min por IP\n  - Webhooks N8N: 100 req/min por IP\n  - APIs do painel: 60 req/min por usuГЎrio\n  - Login: 5 tentativas/min por IP\n- [ ] Aplicar nos endpoints crГӯticos (registrar_lead, cadastro, login, webhooks)\n- [ ] Retornar 429 Too Many Requests quando exceder\n- [ ] Logar tentativas que excedem o limite (alerta de possГӯvel ataque)\n- [ ] Testar que uso normal nГЈo Г© bloqueado\n\n---\n\n## Contexto e referГӘncias\n\n- Projeto inteiro nГЈo possui rate limiting\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nRate limiting ativo em todos os endpoints. ProteГ§ГЈo contra brute force, scraping e DoS.\n"}, {"t": "f", "n": "Recuperacao Pos Trial 27 03 2026", "fn": "recuperacao_pos_trial_27-03-2026.md", "c": "---\nname: RГ©gua de RecuperaГ§ГЈo PГіs-Trial\ndescription: Definir a sequГӘncia de mensagens e oferta especial para ISPs que nГЈo converteram apГіs os 14 dias de trial\ntype: tarefa\nstatus: finalizada\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nRecuperar prospects que testaram o produto, nГЈo converteram no trial e estГЈo em momento de decisГЈo. A oferta especial fica reservada para esse momento, nГЈo durante o trial.\n\n## Contexto\n\nDurante o trial o foco Г© ativaГ§ГЈo e valor. A oferta de recuperaГ§ГЈo Г© mais estratГ©gica: o prospect jГЎ conhece o produto, jГЎ viu funcionar, sГі nГЈo fechou. Uma oferta nesse momento tem muito mais impacto do que um desconto durante o trial.\n\n## Atividades\n\n- [x] Definir segmentaГ§ГЈo: usou o trial Г— nГЈo usou o trial\n- [x] Definir escalada de ofertas (D+7 ao D+30, crescente por segmento)\n- [x] Definir prazo do ciclo: 30 dias. ApГіs isso, nurturing passivo.\n- [x] Documentar estrutura em exports/drafts/email/regua_recuperacao_pos_trial_estrutura.md\n- вҶ—пёҸ Escrever textos вҶ’ task separada: textos_regua_recuperacao_27-03-2026.md\n\n## ResponsГЎvel\n\nPMM cria e executa. Parceiro entra se necessГЎrio para contato relacional.\n"}, {"t": "f", "n": "Refatoracao Apps 29 03 2026", "fn": "refatoracao_apps_29-03-2026.md", "c": "---\nname: \"RefatoraГ§ГЈo em apps + Multi-tenancy + SeguranГ§a\"\ndescription: \"Refatorar o monolito vendas_web em apps Django separados por mГіdulo, implementar multi-tenancy para viabilizar o modelo \"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Tech Lead / DevOps / SeguranГ§a (AppSec)\"\n---\n\n# RefatoraГ§ГЈo em apps + Multi-tenancy + SeguranГ§a вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**ResponsГЎvel:** Tech Lead / DevOps / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вң… ConcluГӯda\n\n---\n\n## DescriГ§ГЈo\n\nRefatorar o monolito vendas_web em apps Django separados por mГіdulo, implementar multi-tenancy para viabilizar o modelo SaaS e remover secrets hardcoded do cГіdigo fonte.\n\n---\n\n## Tarefas\n\n- [x] Definir estrutura de apps (OpГ§ГЈo A: sub-apps por pasta, aprovada pelo CEO)\n- [x] Separar vendas_web em 10 apps: sistema, notificacoes, integracoes, dashboard, leads, atendimento, cadastro, viabilidade, crm, campanhas\n- [x] Implementar multi-tenancy: Tenant, PerfilUsuario, TenantMixin, TenantManager, TenantMiddleware\n- [x] Criar Painel Admin Aurora (/aurora-admin/) com dashboard de tenants, planos e features\n- [x] Remover secrets do cГіdigo fonte e migrar para variГЎveis de ambiente\n- [x] Criar agentes SeguranГ§a (AppSec), DevOps e QA\n\n---\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- DecisГЈo de estrutura aprovada pelo CEO (OpГ§ГЈo A)\n- Projeto: `robo/` (mГіdulo Comercial da AuroraISP)\n\n---\n\n## Resultado esperado\n\nCГіdigo refatorado em apps modulares, multi-tenancy funcional em desenvolvimento, credenciais seguras via variГЎveis de ambiente, painel admin Aurora operacional. Pronto para deploy em produГ§ГЈo como prГіximo passo.\n"}, {"t": "f", "n": "Refatoracao Vendas Web 29 03 2026", "fn": "refatoracao_vendas_web_29-03-2026.md", "c": "---\nname: \"MigraГ§ГЈo completa do vendas_web para apps modulares\"\ndescription: \"Finalizar a migraГ§ГЈo de models, views, urls e templates do vendas_web para a nova estrutura de apps\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Tech Lead\"\ntype: tarefa\nstatus: em andamento\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nConcluir a separaГ§ГЈo do God App `vendas_web` nos novos apps modulares. A estrutura e os models jГЎ foram criados. Falta mover views, urls, templates e criar as migrations de transiГ§ГЈo.\n\n## Atividades\n\n- [x] Criar estrutura de pastas apps/ com 10 apps\n- [x] Criar models em apps/sistema (Tenant, PerfilUsuario, configs)\n- [x] Copiar integracoes e crm para apps/\n- [x] Migrar models para comercial/leads, comercial/atendimento, comercial/cadastro, comercial/viabilidade\n- [x] Migrar models para notificacoes, marketing/campanhas\n- [x] Atualizar settings.py e urls.py\n- [x] Atualizar vendas_web/models.py com re-exports dos novos apps\n- [x] Atualizar FKs cross-app (vendas_web.X вҶ’ app_novo.X)\n- [x] Django check passando sem erros\n- [x] Migrations rodando localmente (SQLite)\n- [ ] Criar migrations com SeparateDatabaseAndState para produГ§ГЈo\n- [ ] Mover views de vendas_web/views.py para cada app\n- [ ] Mover views de vendas_web/views_api_atendimento.py para comercial/atendimento\n- [ ] Mover urls de vendas_web/urls.py para cada app\n- [ ] Mover templates para dentro de cada app\n- [ ] Mover signals para cada app\n- [ ] Mover admin registrations para cada app\n- [ ] Mover services (contrato_service, atendimento_service, notification_service)\n- [ ] Ativar novas rotas no urls.py principal\n- [ ] Testar localmente com SQLite\n- [ ] Remover vendas_web\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: docs/context/reunioes/refatoracao_apps_29-03-2026.md\n- Roadmap: docs/PRODUTO/02-ROADMAP_PRODUTO.md (seГ§ГЈo 4)\n- DecisГЈo: OpГ§ГЈo A (sub-apps por pasta), aprovada em 29/03/2026\n\n## Resultado esperado\n\n`vendas_web` removido. Cada mГіdulo do produto (Comercial, Marketing, CS) Г© um namespace com apps Django independentes. Multi-tenancy pronto para ativar via Tenant + TenantMixin.\n"}, {"t": "f", "n": "Segmentos Mover Marketing 03 04 2026", "fn": "segmentos_mover_marketing_03-04-2026.md", "c": "---\nname: \"Segmentos: Mover redirect para Marketing\"\ndescription: \"Ao criar/salvar segmento, redirecionar para Marketing em vez do CRM\"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: Redirect para Marketing вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nA view de segmentos (`api_segmento_salvar`) redireciona para o CRM apГіs salvar. Como segmentos agora pertence ao Marketing, o redirect deve ir para a lista de segmentos no Marketing.\n\n---\n\n## Tarefas\n\n- [ ] Verificar redirect na view api_segmento_salvar\n- [ ] Corrigir para redirecionar para segmentos_lista\n- [ ] Garantir que a sidebar de Marketing aparece nas pГЎginas de segmentos\n\n---\n\n## Resultado esperado\n\nAo criar/editar segmento, o usuГЎrio permanece no contexto de Marketing.\n"}, {"t": "f", "n": "Segmentos Pagina Regras 03 04 2026", "fn": "segmentos_pagina_regras_03-04-2026.md", "c": "---\nname: \"Segmentos: PГЎgina dedicada com regras dinГўmicas\"\ndescription: \"Criar pГЎgina robusta de criaГ§ГЈo/ediГ§ГЈo de segmentos com builder de regras dinГўmicas\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: PГЎgina dedicada com regras dinГўmicas вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nSubstituir o modal de criaГ§ГЈo de segmentos por uma pГЎgina dedicada com builder de regras dinГўmicas (como o builder das AutomaГ§Гөes). O cliente define condiГ§Гөes e o sistema filtra leads automaticamente.\n\n---\n\n## Tarefas\n\n- [ ] Model: adicionar campo `regras` (JSONField) ao SegmentoCRM para regras dinГўmicas\n- [ ] View: criar pГЎgina dedicada de criaГ§ГЈo/ediГ§ГЈo\n- [ ] Template: builder visual de regras (campo + operador + valor)\n- [ ] API: endpoint para preview de leads que atendem as regras\n- [ ] LГіgica: avaliar regras e atualizar membros automaticamente\n- [ ] MigraГ§ГЈo\n\n---\n\n## Resultado esperado\n\nPГЎgina `/marketing/segmentos/criar/` com builder de regras. Ao definir \"Origem = WhatsApp AND Score >= 7\", o sistema mostra quantos leads entram e atualiza automaticamente.\n"}, {"t": "f", "n": "Segmentos Signal Auto 03 04 2026", "fn": "segmentos_signal_auto_03-04-2026.md", "c": "---\nname: \"Segmentos: Signal para atualizar membros automaticamente\"\ndescription: \"Quando lead Г© criado/atualizado, verificar segmentos dinГўmicos e adicionar/remover\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev\"\n---\n\n# Segmentos: Signal automГЎtico вҖ” 03/04/2026\n\n**Data:** 03/04/2026\n**ResponsГЎvel:** Dev\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ Em andamento\n\n---\n\n## DescriГ§ГЈo\n\nImplementar signal post_save no LeadProspecto que avalia segmentos dinГўmicos do tenant e adiciona/remove o lead automaticamente.\n\n---\n\n## Tarefas\n\n- [ ] Signal post_save em LeadProspecto para avaliar segmentos dinГўmicos\n- [ ] Respeitar _skip_segmento para importaГ§ГЈo em massa\n- [ ] Atualizar total_leads do segmento\n\n---\n\n## Resultado esperado\n\nLead novo que atende regra \"Origem = WhatsApp AND Score >= 7\" aparece automaticamente no segmento.\n"}, {"t": "f", "n": "Seguranca Credenciais 29 03 2026", "fn": "seguranca_credenciais_29-03-2026.md", "c": "---\nname: Remover credenciais hardcoded do cГіdigo\ndescription: Todas as credenciais movidas para variГЎveis de ambiente\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nEliminar credenciais expostas no cГіdigo fonte.\n\n## Atividades\n\n- [x] Remover SECRET_KEY hardcoded do settings.py\n- [x] Remover senha do banco do settings.py (sem fallback)\n- [x] Remover token Matrix API do atendimento_service.py\n- [x] Remover credenciais HubSoft do setup_hubsoft.py\n- [x] Remover IP do servidor do ALLOWED_HOSTS\n- [x] Limpar settings_production.py (SECRET_KEY duplicada, IP do banco)\n- [x] Configurar DEBUG=False por padrГЈo\n- [x] Criar .env.example com todas as variГЎveis\n- [x] Verificar .gitignore (.env jГЎ ignorado)\n\n## Resultado esperado\n\nZero credenciais no cГіdigo. Deploy falha se variГЎveis nГЈo configuradas.\n"}, {"t": "f", "n": "Tenant Mixin Crm 30 03 2026", "fn": "tenant_mixin_crm_30-03-2026.md", "c": "---\nname: \"Adicionar TenantMixin nos Models do CRM\"\ndescription: \"9 models do CRM nГЈo herdam de TenantMixin e nГЈo possuem FK tenant. Com multi-tenancy ativo, um tenant consegue ver e man\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Adicionar TenantMixin nos Models do CRM вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\n9 models do CRM nГЈo herdam de TenantMixin e nГЈo possuem FK tenant. Com multi-tenancy ativo, um tenant consegue ver e manipular dados de outro tenant via CRM (oportunidades, tarefas, metas, alertas). Isso Г© um risco crГӯtico de vazamento de dados.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar TenantMixin em `OportunidadeVenda`\n- [ ] Adicionar TenantMixin em `EquipeVendas`\n- [ ] Adicionar TenantMixin em `PipelineEstagio`\n- [ ] Adicionar TenantMixin em `PerfilVendedor`\n- [ ] Adicionar TenantMixin em `TagCRM`\n- [ ] Adicionar TenantMixin em `TarefaCRM`\n- [ ] Adicionar TenantMixin em `NotaInterna`\n- [ ] Adicionar TenantMixin em `MetaVendas`\n- [ ] Adicionar TenantMixin em `AlertaRetencao`\n- [ ] Adicionar TenantMixin em `ConfiguracaoCRM`\n- [ ] Gerar migrations (campo tenant com null=True para dados existentes)\n- [ ] Criar data migration para popular tenant nos registros existentes (via lead.tenant)\n- [ ] Atualizar views do CRM para usar o TenantManager\n- [ ] Criar testes de isolamento para o CRM (similar a `test_tenant_isolation.py`)\n- [ ] Testar localmente com SQLite\n\n---\n\n## Contexto e referГӘncias\n\n- Models: `apps/comercial/crm/models.py`\n- TenantMixin: `apps/sistema/mixins.py`\n- Testes de referГӘncia: `tests/test_tenant_isolation.py`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodos os models do CRM isolados por tenant. Testes de isolamento passando. Nenhum dado de tenant A visГӯvel para tenant B.\n"}, {"t": "f", "n": "Testes Isolamento Tenant 29 03 2026", "fn": "testes_isolamento_tenant_29-03-2026.md", "c": "---\nname: \"Testes automatizados de isolamento de tenant\"\ndescription: \"Escrever testes automatizados que garantam o isolamento correto de dados entre tenants. Cada tenant deve enxergar apenas\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"QA / Tech Lead\"\n---\n\n# Testes automatizados de isolamento de tenant вҖ” 29/03/2026\n\n**Data:** 29/03/2026\n**ResponsГЎvel:** QA / Tech Lead\n**Prioridade:** рҹ”ҙ Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nEscrever testes automatizados que garantam o isolamento correto de dados entre tenants. Cada tenant deve enxergar apenas seus prГіprios registros, e nenhuma operaГ§ГЈo deve vazar dados entre tenants.\n\n---\n\n## Tarefas\n\n- [ ] Criar fixtures de teste com mГәltiplos tenants\n- [ ] Testar que queries via TenantManager filtram corretamente por tenant\n- [ ] Testar que o TenantMiddleware atribui o tenant correto ao request\n- [ ] Testar que criaГ§ГЈo de registros atribui automaticamente o tenant do usuГЎrio\n- [ ] Testar que um usuГЎrio de um tenant nГЈo consegue acessar dados de outro tenant\n- [ ] Testar que o Painel Admin Aurora lista apenas dados do tenant correto\n- [ ] Testar cenГЎrios de erro: usuГЎrio sem tenant, tenant inativo, tenant inexistente\n- [ ] Integrar testes ao pipeline de CI\n\n---\n\n## Contexto e referГӘncias\n\n- ReuniГЈo: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Tarefa concluГӯda: `docs/context/tarefas/finalizadas/refatoracao_apps_29-03-2026.md`\n- Depende de: deploy do multi-tenancy (pode rodar em ambiente local antes do deploy)\n\n---\n\n## Resultado esperado\n\nSuite de testes automatizados cobrindo todos os cenГЎrios de isolamento de tenant, executГЎvel localmente e no CI. Qualquer vazamento de dados entre tenants deve ser detectado automaticamente.\n"}, {"t": "f", "n": "Treinamento Parceiro 26 03 2026", "fn": "treinamento_parceiro_26-03-2026.md", "c": "---\nname: \"Trilha de Treinamento do Parceiro Comercial\"\ndescription: \"Criar a trilha de treinamento tГ©cnico para o parceiro comercial conseguir conduzir demos ao vivo e responder perguntas t\"\nprioridade: \"рҹ”ҙ Alta\"\nresponsavel: \"PMM + CEO\"\n---\n\n# Trilha de Treinamento do Parceiro Comercial\n\n**Data:** 26/03/2026\n**ResponsГЎvel:** PMM + CEO\n**Prioridade:** рҹ”ҙ Alta\n**Status:** рҹ”§ A criar\n\n---\n\n## DescriГ§ГЈo\n\nCriar a trilha de treinamento tГ©cnico para o parceiro comercial conseguir conduzir demos ao vivo e responder perguntas tГ©cnicas com autonomia. O parceiro tem processo prГіprio de vendas, mas precisa conhecer o produto fundo o suficiente para nГЈo depender da Aurora em cada apresentaГ§ГЈo.\n\n---\n\n## Tarefas\n\n- [x] Criar MГіdulo 1 вҖ” VisГЈo geral da AuroraISP (hub, mГіdulos, ICP, posicionamento)\n- [x] Criar MГіdulo 2 вҖ” Comercial a fundo (fluxo completo: lead, bot, docs, contrato, HubSoft)\n- [x] Criar MГіdulo 3 вҖ” Marketing e CS (visГЈo geral dos mГіdulos em desenvolvimento)\n- [x] Criar MГіdulo 4 вҖ” PrecificaГ§ГЈo e transacional (Starter/Start/Pro, simulaГ§Гөes, ROI)\n- [x] Criar MГіdulo 5 вҖ” ObjeГ§Гөes comuns (respostas prontas para as principais objeГ§Гөes)\n- [ ] Criar MГіdulo 6 вҖ” Demo hands-on (prГЎtica guiada do roteiro ao vivo)\n- [ ] Agendar sessГЈo de treinamento com o parceiro (primeira semana de abril)\n\n---\n\n## Contexto e referГӘncias\n\n- Roteiro de demo em [09-ENABLEMENT.md](../../GTM/09-ENABLEMENT.md)\n- ObjeГ§Гөes em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- PrecificaГ§ГЈo em [08-PRECIFICACAO.md](../../GTM/08-PRECIFICACAO.md)\n\nO MГіdulo 6 (demo hands-on) depende do ambiente de demo estar configurado, que depende do multi-tenancy (prazo: 30/03).\n\n---\n\n## Resultado esperado\n\nParceiro apto a conduzir demos ao vivo com autonomia e responder objeГ§Гөes tГ©cnicas sem precisar acionar a Aurora.\n"}, {"t": "f", "n": "Upload Isolamento Tenant 30 03 2026", "fn": "upload_isolamento_tenant_30-03-2026.md", "c": "---\nname: \"Isolar Uploads por Tenant\"\ndescription: \"Uploads de arquivos (logos, imagens de carteirinha, logos de parceiros) sГЈo armazenados em diretГіrios compartilhados (`l\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Isolar Uploads por Tenant вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹ  Alta\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nUploads de arquivos (logos, imagens de carteirinha, logos de parceiros) sГЈo armazenados em diretГіrios compartilhados (`logos/`, `carteirinhas/modelos/`). Todos os tenants usam o mesmo diretГіrio. Se o servidor de mГӯdia for mal configurado, um tenant pode acessar arquivos de outro.\n\n---\n\n## Tarefas\n\n- [ ] Criar funГ§ГЈo `tenant_upload_path(instance, filename)` que gera path com tenant_id\n- [ ] Atualizar `ConfiguracaoEmpresa.logo_empresa` вҶ’ `upload_to=tenant_upload_path`\n- [ ] Atualizar `ModeloCarteirinha.imagem_fundo` e `logo` вҶ’ `upload_to=tenant_upload_path`\n- [ ] Atualizar `Parceiro.logo` вҶ’ `upload_to=tenant_upload_path`\n- [ ] Gerar migrations\n- [ ] Migrar arquivos existentes para os novos paths (script de migraГ§ГЈo)\n- [ ] Testar que URLs de mГӯdia ainda funcionam apГіs migraГ§ГЈo\n\n---\n\n## Contexto e referГӘncias\n\n- Models afetados: `apps/sistema/models.py`, `apps/cs/carteirinha/models.py`, `apps/cs/parceiros/models.py`\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCada tenant tem seu diretГіrio de uploads isolado: `media/tenants/{tenant_id}/logos/`, etc.\n"}, {"t": "f", "n": "Upload Validacao Tipo Tamanho 30 03 2026", "fn": "upload_validacao_tipo_tamanho_30-03-2026.md", "c": "---\nname: \"ValidaГ§ГЈo de Upload вҖ” Tipo e Tamanho\"\ndescription: \"Uploads de arquivos em carteirinha, parceiros e sistema nГЈo validam tipo de arquivo nem tamanho. Um usuГЎrio pode enviar \"\nprioridade: \"рҹҹЎ MГ©dia\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# ValidaГ§ГЈo de Upload вҖ” Tipo e Tamanho вҖ” 30/03/2026\n\n**Data:** 30/03/2026\n**ResponsГЎvel:** Dev / SeguranГ§a (AppSec)\n**Prioridade:** рҹҹЎ MГ©dia\n**Status:** вҸі Aguardando\n\n---\n\n## DescriГ§ГЈo\n\nUploads de arquivos em carteirinha, parceiros e sistema nГЈo validam tipo de arquivo nem tamanho. Um usuГЎrio pode enviar executГЎveis, ZIPs ou arquivos de vГЎrios GB, causando DoS por esgotamento de disco ou upload de malware.\n\n---\n\n## Tarefas\n\n- [ ] Criar validador reutilizГЎvel para uploads (tipo + tamanho)\n- [ ] Definir tipos permitidos: jpg, jpeg, png, gif, webp (imagens)\n- [ ] Definir tamanho mГЎximo: 5MB para imagens, 10MB para documentos\n- [ ] Aplicar em `apps/cs/carteirinha/views.py` (imagem_fundo, logo)\n- [ ] Aplicar em `apps/cs/parceiros/views.py` (logo parceiro)\n- [ ] Aplicar em `apps/sistema/views.py` (logo empresa)\n- [ ] Retornar erro claro ao usuГЎrio quando validaГ§ГЈo falhar\n- [ ] Adicionar `DATA_UPLOAD_MAX_MEMORY_SIZE` no settings\n\n---\n\n## Contexto e referГӘncias\n\n- Views afetadas: carteirinha, parceiros, sistema\n- Scan de seguranГ§a realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nUploads rejeitam arquivos fora dos tipos e tamanhos permitidos. Mensagem de erro clara.\n"}, {"t": "f", "n": "User Tenant Filter 30 03 2026", "fn": "user_tenant_filter_30-03-2026.md", "c": "---\nname: \"Filtrar User por Tenant em Views\"\ndescription: \"Views do CRM e outros mГіdulos fazem `User.objects.filter(is_active=True)` sem filtrar por tenant. Dropdowns de atribuiГ§ГЈ\"\nprioridade: \"рҹҹ  Alta\"\nresponsavel: \"Dev / SeguranГ§a (AppSec)\"\n---\n\n# Filtrar User por Tenant em Vi
