erências\n\n- Termos de uso e política de privacidade: `backlog/contrato_termos_30-03-2026.md`\n- Models com dados pessoais: Lead, ClienteHubSoft, MembroClube, Parceiro\n\n---\n\n## Resultado esperado\n\nSistema em conformidade com LGPD. Consentimento registrado, dados exportáveis/excluíveis, campos sensíveis criptografados.\n"}, {"t": "f", "n": "Materiais Vendas Visual 27 03 2026", "fn": "materiais_vendas_visual_27-03-2026.md", "c": "---\nname: \"Materiais de Vendas — Versões Visuais\"\ndescription: \"Produzir os arquivos finais em PPT/PDF dos materiais de vendas com identidade visual da AuroraISP\"\nprioridade: \"🟡 Média\"\nresponsavel: \"CMO\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nTransformar os roteiros aprovados em arquivos visuais prontos para uso pelo parceiro.\n\n## Atividades\n\n- [ ] Criar one-pager em PPT e exportar PDF → exports/prospect/01_prospeccao/\n- [ ] Criar pre-demo deck em PPT e exportar PDF → exports/prospect/01_prospeccao/\n- [ ] Criar deck de apoio em PPT e exportar PDF → exports/prospect/02_demo/\n- [ ] Criar deck do parceiro em PPT (uso interno) → exports/parceiro/demo/\n- [ ] Criar case anônimo em PDF → exports/prospect/03_proposta/\n\n## Dependências\n\n- Logo da AuroraISP (criar_logo_26-03-2026.md)\n\n## Referências\n\n- Roteiros em exports/drafts/apresentacao/\n- Paleta e tipografia em docs/BRAND/08-BRANDBOOK.md\n"}, {"t": "f", "n": "Migrar Gestao Megaroleta 30 03 2026", "fn": "migrar_gestao_megaroleta_30-03-2026.md", "c": "---\nname: \"Migrar App Gestão do Megaroleta\"\ndescription: \"O app `gestao` do megaroleta (17 models, agentes IA) não foi migrado para o hub. Existe um TODO no código (`apps/cs/club\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev\"\n---\n\n# Migrar App Gestão do Megaroleta — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO app `gestao` do megaroleta (17 models, agentes IA) não foi migrado para o hub. Existe um TODO no código (`apps/cs/clube/views/membro_views.py:193`) referenciando essa pendência. É necessário avaliar quais models são relevantes e migrá-los.\n\n---\n\n## Tarefas\n\n- [ ] Auditar os 17 models do `gestao` no megaroleta\n- [ ] Definir quais models serão migrados e para qual app destino\n- [ ] Migrar models relevantes (FAQ, configurações de agentes IA)\n- [ ] Atualizar referências no app `clube` (resolver TODO)\n- [ ] Gerar migrations\n- [ ] Testar localmente\n\n---\n\n## Contexto e referências\n\n- TODO em `apps/cs/clube/views/membro_views.py:193`\n- App original: `megaroleta/gestao/` (somente leitura)\n- Tarefa relacionada: `finalizadas/migracao_megaroleta_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nModels relevantes do `gestao` integrados ao hub. TODO resolvido. Funcionalidades de FAQ e agentes IA disponíveis no módulo CS.\n"}, {"t": "f", "n": "Modulo Automacoes 01 04 2026", "fn": "modulo_automacoes_01-04-2026.md", "c": "---\nname: \"Módulo Automações: Backend completo\"\ndescription: \"Implementar models, engine de execução e APIs do módulo de automações em Marketing\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Módulo Automações — Backend — 01/04/2026\n\n**Data:** 01/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nImplementar o backend do módulo de automações que permite ao cliente criar regras do tipo \"Quando X acontecer, se Y, então faça Z\". O frontend (lista + builder) já está pronto em `apps/marketing/automacoes/`.\n\n---\n\n## Tarefas\n\n- [x] Frontend: lista de automações com toggle, KPIs, filtros\n- [x] Frontend: builder visual (Quando/Se/Então)\n- [x] URLs e views placeholder\n- [ ] Models: RegraAutomacao, CondicaoRegra, AcaoRegra, LogExecucao\n- [ ] Admin registration\n- [ ] Views: CRUD de regras via POST do formulário\n- [ ] Engine: dispatcher que escuta signals e executa regras ativas\n- [ ] Ações: enviar_whatsapp, criar_tarefa, mover_estagio, notificacao_sistema, dar_pontos, webhook\n- [ ] Condições: avaliador dinâmico de campo/operador/valor\n- [ ] Delay: suporte a ações com atraso (minutos/horas/dias)\n- [ ] Log de execuções por regra\n- [ ] Testes\n\n---\n\n## Contexto e referências\n\n- Frontend: `apps/marketing/automacoes/templates/automacoes/lista.html` e `criar.html`\n- Signals existentes: `apps/integracoes/signals.py`, `apps/comercial/cadastro/signals.py`\n- Sistema de notificações: `apps/notificacoes/` (desativado, será conectado)\n\n---\n\n## Resultado esperado\n\nCliente consegue criar, ativar/desativar e monitorar regras de automação pelo painel. Exemplo: \"Quando novo lead chegar via WhatsApp com score >= 7, criar tarefa no CRM e enviar WhatsApp de boas vindas.\"\n"}, {"t": "f", "n": "Modulo Marketing 30 03 2026", "fn": "modulo_marketing_30-03-2026.md", "c": "---\nname: \"Desenvolver Módulo Marketing\"\ndescription: \"O módulo Marketing está listado no hub como \"a desenvolver\". Atualmente existe apenas o app `apps/marketing/campanhas/` \"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / PM\"\n---\n\n# Desenvolver Módulo Marketing — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / PM\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO módulo Marketing está listado no hub como \"a desenvolver\". Atualmente existe apenas o app `apps/marketing/campanhas/` com detecção de tráfego pago. É necessário expandir para cobrir o escopo completo do módulo: réguas de automação, segmentação de base, integrações de e-mail e WhatsApp em massa, e relatórios de performance.\n\n---\n\n## Tarefas\n\n- [ ] Definir escopo do MVP do módulo Marketing (Start vs Pro)\n- [ ] Especificar models: Campanha, Segmento, Disparo, Metricas\n- [ ] Implementar segmentação de base de leads/clientes\n- [ ] Implementar disparo em massa (WhatsApp via N8N, e-mail)\n- [ ] Criar dashboard de performance de campanhas\n- [ ] Integrar com réguas de automação\n- [ ] Definir limites por plano (Start vs Pro)\n- [ ] Testar fluxos com tenant de teste\n\n---\n\n## Contexto e referências\n\n- App existente: `apps/marketing/campanhas/`\n- Réguas: `docs/PRODUTO/01-REGUAS_PADRAO.md` (M01 a M03)\n- Precificação: `docs/GTM/08-PRECIFICACAO.md` (transacional por base de leads)\n\n---\n\n## Resultado esperado\n\nMódulo Marketing funcional no plano Start (réguas básicas, segmentação simples). Base para evolução ao plano Pro (IA, tráfego pago).\n"}, {"t": "f", "n": "Pos Ativacao 27 03 2026", "fn": "pos_ativacao_27-03-2026.md", "c": "---\nname: \"Processo pós-ativação\"\ndescription: \"Definir o que acontece depois que o cliente está ativo — NPS, indicação, expansão para outros módulos\"\nprioridade: \"🟡 Média\"\nresponsavel: \"CS\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nCriar o processo de acompanhamento pós-ativação para aumentar retenção, gerar indicações e expandir para Marketing e CS.\n\n## Atividades\n\n- [ ] Definir touchpoints pós-ativação (D+7, D+30, D+60, D+90)\n- [ ] Criar mensagem de NPS para D+30 (integra com régua CS02)\n- [ ] Criar fluxo de pedido de indicação para clientes com NPS 9 ou 10\n- [ ] Definir gatilho para oferta de expansão (quando oferecer Marketing ou CS)\n- [ ] Definir quem faz o acompanhamento pós-ativação (Aurora ou parceiro)\n- [ ] Documentar em 12-FLUXO_COMERCIAL.md e criar drafts em exports/drafts/whatsapp/\n\n## Responsável\n\nAurora define e executa (pós-ativação é responsabilidade do time interno).\n"}, {"t": "f", "n": "Processo Suporte Cobranca 30 03 2026", "fn": "processo_suporte_cobranca_30-03-2026.md", "c": "---\nname: \"Processo de Suporte e Cobrança\"\ndescription: \"Não há processo definido para suporte ao cliente SaaS nem modelo de cobrança implementado. Com a Fase 1 começando, é nec\"\nprioridade: \"🟡 Média\"\nresponsavel: \"CEO / RevOps\"\n---\n\n# Processo de Suporte e Cobrança — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** CEO / RevOps\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nNão há processo definido para suporte ao cliente SaaS nem modelo de cobrança implementado. Com a Fase 1 começando, é necessário definir como os clientes serão atendidos e como a cobrança (mensalidade fixa + transacional variável) será operacionalizada.\n\n---\n\n## Tarefas\n\n- [ ] Definir canais de suporte (WhatsApp, e-mail, portal)\n- [ ] Definir SLA de atendimento por plano (Start vs Pro)\n- [ ] Criar base de conhecimento / FAQ para clientes\n- [ ] Definir modelo de faturamento (gateway de pagamento, boleto, Pix)\n- [ ] Implementar cálculo do transacional variável por módulo\n- [ ] Criar dashboard de faturamento por tenant no Admin Aurora\n- [ ] Definir processo de cobrança inadimplente\n- [ ] Documentar fluxo completo de suporte e cobrança\n\n---\n\n## Contexto e referências\n\n- Precificação: `docs/GTM/08-PRECIFICACAO.md` (modelo transacional)\n- Admin Aurora: `finalizadas/admin_aurora_29-03-2026.md`\n- Fluxo comercial: `docs/GTM/12-FLUXO_COMERCIAL.md` (pós-ativação)\n\n---\n\n## Resultado esperado\n\nProcesso de suporte funcional com SLA definido. Cobrança automatizada (mensalidade + transacional). Dashboard de faturamento visível no Admin Aurora.\n"}, {"t": "f", "n": "Reguas Automacao Implementar 30 03 2026", "fn": "reguas_automacao_implementar_30-03-2026.md", "c": "---\nname: \"Implementar Réguas de Automação\"\ndescription: \"As 16 réguas de automação estão especificadas (`docs/PRODUTO/01-REGUAS_PADRAO.md`) mas nenhuma foi implementada no códig\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / CRM e Automação\"\n---\n\n# Implementar Réguas de Automação — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / CRM e Automação\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nAs 16 réguas de automação estão especificadas (`docs/PRODUTO/01-REGUAS_PADRAO.md`) mas nenhuma foi implementada no código. São o motor de automação do hub, cobrindo os módulos Comercial (C01 a C06), CS (CS01 a CS07) e Marketing (M01 a M03).\n\n---\n\n## Tarefas\n\n- [ ] Definir arquitetura do motor de réguas (models: Regua, EtapaRegua, ExecucaoRegua)\n- [ ] Criar app `apps/marketing/automacao/` ou integrar ao `apps/marketing/campanhas/`\n- [ ] Implementar réguas do Comercial (C01 a C06) — prioridade: C01 (boas-vindas), C02 (follow-up)\n- [ ] Implementar réguas do CS (CS01 a CS07) — prioridade: CS01 (onboarding), CS02 (NPS)\n- [ ] Implementar réguas do Marketing (M01 a M03)\n- [ ] Integrar com N8N para disparo de WhatsApp/e-mail\n- [ ] Criar painel de configuração por tenant (ativar/desativar réguas)\n- [ ] Criar logs de execução por régua\n- [ ] Testar fluxos end-to-end\n\n---\n\n## Contexto e referências\n\n- Especificação: `docs/PRODUTO/01-REGUAS_PADRAO.md` (16 fluxos detalhados)\n- Integração N8N existente: `apps/integracoes/`\n- Depende de: Apps NPS e Retenção (`apps_cs_nps_retencao_30-03-2026.md`)\n\n---\n\n## Resultado esperado\n\nMotor de réguas funcional com pelo menos as réguas C01, C02, CS01 e CS02 em produção. Configurável por tenant. Logs de execução visíveis no painel.\n"}, {"t": "f", "n": "Textos Regua Recuperacao 27 03 2026", "fn": "textos_regua_recuperacao_27-03-2026.md", "c": "---\nname: \"Textos da Régua de Recuperação Pós-Trial\"\ndescription: \"Escrever os textos de cada mensagem da régua de recuperação por canal e segmento\"\nprioridade: \"🟡 Média\"\nresponsavel: \"PMM\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nEscrever os textos de todas as mensagens da régua de recuperação pós-trial seguindo a estrutura definida em:\n`exports/drafts/email/regua_recuperacao_pos_trial_estrutura.md`\n\n## Atividades\n\n### Segmento: Usou o trial\n- [ ] D+1 — WhatsApp PMM (entender o que travou)\n- [ ] D+7 — WhatsApp PMM + e-mail (oferta: 1 mês com 30% de desconto)\n- [ ] D+15 — E-mail + WhatsApp PMM (oferta: setup gratuito)\n- [ ] D+22 — WhatsApp parceiro + e-mail (oferta: setup grátis + 50% de desconto)\n- [ ] D+30 — WhatsApp parceiro + e-mail (oferta: primeiro mês grátis. Última tentativa.)\n\n### Segmento: Não usou o trial\n- [ ] D+1 — WhatsApp PMM (entender o que aconteceu)\n- [ ] D+7 — WhatsApp PMM + e-mail (oferta: extensão do trial por 7 dias)\n- [ ] D+15 — E-mail + WhatsApp PMM (oferta: 1 mês com 30% de desconto)\n- [ ] D+22 — WhatsApp parceiro + e-mail (oferta: setup gratuito)\n- [ ] D+30 — WhatsApp parceiro + e-mail (oferta: primeiro mês grátis. Última tentativa.)\n\n## Responsável\n\nPMM redige todos os textos. Scripts do parceiro (D+22 e D+30) salvos em exports/drafts/scripts_vendas/. Demais mensagens em exports/drafts/whatsapp/ e exports/drafts/email/.\n\n## Dependências\n\n- Estrutura aprovada: exports/drafts/reguas/regua_recuperacao_pos_trial_estrutura.md ✅\n"}, {"t": "f", "n": "Textos Regua Trial 27 03 2026", "fn": "textos_regua_trial_27-03-2026.md", "c": "---\nname: \"Textos da Régua de Conversão do Trial\"\ndescription: \"Escrever os textos de cada mensagem da régua de trial por canal (WhatsApp, e-mail, notificação)\"\nprioridade: \"🟡 Média\"\nresponsavel: \"PMM\"\ntype: tarefa\nstatus: pendente\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nEscrever os textos de todas as mensagens da régua de trial seguindo a estrutura definida em:\n`exports/drafts/email/regua_trial_estrutura.md`\n\n## Atividades\n\n### Trilho comum\n- [ ] D+0 — E-mail de boas-vindas\n\n### Trilho Ativo\n- [ ] D+1 ⚡ — Notificação de celebração (primeiro lead processado)\n- [ ] D+3 — E-mail de relatório de uso\n- [ ] D+7 — E-mail mostrando funcionalidade não utilizada\n- [ ] D+10 — Script WhatsApp para o parceiro\n- [ ] D+12 — Script WhatsApp para o parceiro + e-mail de urgência\n- [ ] D+14 — E-mail de encerramento + notificação\n\n### Trilho Inativo\n- [ ] D+1 — WhatsApp PMM (verificar problema técnico)\n- [ ] D+3 — WhatsApp PMM (sessão de ativação assistida)\n- [ ] D+5 — WhatsApp PMM (entender o motivo de não uso)\n- [ ] D+7 — E-mail + WhatsApp PMM (última tentativa)\n- [ ] D+10 — Script WhatsApp para o parceiro\n\n## Responsável\n\nPMM redige todos os textos. Scripts do parceiro (D+10 e D+12) salvos em exports/drafts/scripts_vendas/. Demais mensagens em exports/drafts/whatsapp/ e exports/drafts/email/.\n\n## Dependências\n\n- Estrutura da régua aprovada (exports/drafts/reguas/regua_trial_estrutura.md) ✅\n- Definir ferramenta de detecção de uso/não uso para bifurcar os trilhos\n"}]}, {"t": "d", "n": "finalizadas", "ch": [{"t": "f", "n": "Admin Aurora 29 03 2026", "fn": "admin_aurora_29-03-2026.md", "c": "---\nname: Painel Admin Aurora e sistema de planos\ndescription: Painel de gestão do SaaS com gerenciamento de tenants, planos e features\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nCriar o painel administrativo da Aurora para gerenciar provedores, planos e features sem depender do Django Admin.\n\n## Atividades\n\n- [x] Criar app admin_aurora separado do app sistema\n- [x] Dashboard com stats (tenants, ativos, trial, erros)\n- [x] CRUD de tenants (criar, editar módulos/planos, toggle ativo, trial)\n- [x] Detalhe do tenant (users, leads, integração HubSoft)\n- [x] Logs do sistema com filtros\n- [x] Model Plano (modulo, tier, preco_mensal, preco_transacional)\n- [x] Model FeaturePlano (slug, nome, categoria, vinculado ao Plano)\n- [x] 9 planos criados (3x3) conforme 08-PRECIFICACAO.md\n- [x] 115 features distribuídas entre planos\n- [x] Tenant vinculado ao Plano via FK (tem_feature, features_ativas)\n- [x] Command seed_planos para recriar features\n- [x] Command criar_tenant para onboarding\n- [x] Gerenciamento visual de planos (/aurora-admin/planos/)\n- [x] Edição de features por plano (/aurora-admin/planos/{id}/)\n- [x] Topbar com botão Aurora (staff only)\n- [x] Context processor multi-tenant (módulos, planos, cores, logo)\n- [x] Controle de módulos na topbar e sidebar\n\n## Contexto e referências\n\n- Reunião: docs/context/reunioes/admin_aurora_planos_29-03-2026.md\n- Precificação: docs/GTM/08-PRECIFICACAO.md\n- URL: /aurora-admin/\n\n## Resultado esperado\n\nGestão completa do SaaS via painel web. Planos e features editáveis sem deploy.\n"}, {"t": "f", "n": "Admin Aurora Tenant Check 30 03 2026", "fn": "admin_aurora_tenant_check_30-03-2026.md", "c": "---\nname: \"Admin Aurora — Verificação de Tenant por Objeto\"\ndescription: \"O painel Admin Aurora usa `@staff_required` (verifica `is_staff`) mas não valida se o objeto acessado pertence ao tenant\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Admin Aurora — Verificação de Tenant por Objeto — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO painel Admin Aurora usa `@staff_required` (verifica `is_staff`) mas não valida se o objeto acessado pertence ao tenant do usuário. Um staff de Tenant A pode acessar detalhes de Tenant B via URL direta.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar verificação de tenant em todas as views que recebem ID por URL\n- [ ] Restringir `tenant_detalhe` para superusers ou verificar que o staff pertence ao tenant\n- [ ] Revisar permissões: staff vê apenas seu tenant, superuser vê todos\n- [ ] Testar com staff de Tenant A acessando URL de Tenant B (esperar 403)\n\n---\n\n## Contexto e referências\n\n- Views: `apps/admin_aurora/views.py`, linhas 21-279\n- Decorator: `staff_required` verifica apenas `is_staff`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nStaff users só acessam dados do seu tenant. Superusers acessam todos. Acesso indevido retorna 403.\n"}, {"t": "f", "n": "Admin Render Value 30 03 2026", "fn": "admin_render_value_30-03-2026.md", "c": "---\nname: \"Corrigir Exibição de Senhas no Admin\"\ndescription: \"O formulário de edição de integrações no Django Admin usa `render_value=True` nos campos de senha e client_secret. Isso \"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Corrigir Exibição de Senhas no Admin — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO formulário de edição de integrações no Django Admin usa `render_value=True` nos campos de senha e client_secret. Isso faz com que os valores apareçam em texto plano no HTML da página, expostos no histórico do navegador e no código-fonte.\n\n---\n\n## Tarefas\n\n- [ ] Remover `render_value=True` dos PasswordInput em `apps/integracoes/admin.py`\n- [ ] Verificar se outros formulários de admin expõem senhas da mesma forma\n\n---\n\n## Contexto e referências\n\n- Arquivo: `robo/dashboard_comercial/gerenciador_vendas/apps/integracoes/admin.py`, linhas 15-24\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCampos de senha no admin nunca exibem o valor armazenado. Comportamento padrão do Django (campo vazio ao editar).\n"}, {"t": "f", "n": "Allowed Hosts Producao 30 03 2026", "fn": "allowed_hosts_producao_30-03-2026.md", "c": "---\nname: \"Limpar ALLOWED_HOSTS de Produção\"\ndescription: \"O `settings_production.py` contém IP hardcoded e `localhost`/`127.0.0.1` no ALLOWED_HOSTS. Isso aumenta a superfície de \"\nprioridade: \"🟡 Média\"\nresponsavel: \"DevOps\"\n---\n\n# Limpar ALLOWED_HOSTS de Produção — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO `settings_production.py` contém IP hardcoded e `localhost`/`127.0.0.1` no ALLOWED_HOSTS. Isso aumenta a superfície de ataque e expõe o IP do servidor no código.\n\n---\n\n## Tarefas\n\n- [ ] Remover `localhost` e `127.0.0.1` do ALLOWED_HOSTS de produção\n- [ ] Remover IP hardcoded (`31.97.243.247`), usar apenas domínios\n- [ ] Migrar ALLOWED_HOSTS para variável de ambiente\n- [ ] Validar que SECRET_KEY falha explicitamente se vazio em produção\n\n---\n\n## Contexto e referências\n\n- Settings: `gerenciador_vendas/settings_production.py`, linhas 17-23\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nALLOWED_HOSTS contém apenas domínios. Sem IPs nem localhost em produção.\n"}, {"t": "f", "n": "Api Response Dados Sensiveis 30 03 2026", "fn": "api_response_dados_sensiveis_30-03-2026.md", "c": "---\nname: \"Remover Dados Sensíveis dos Responses de API\"\ndescription: \"A API de integrações retorna campos sensíveis nos JSON responses: login PPPoE, senha PPPoE, MAC address, IPv4 de cliente\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Remover Dados Sensíveis dos Responses de API — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nA API de integrações retorna campos sensíveis nos JSON responses: login PPPoE, senha PPPoE, MAC address, IPv4 de clientes. Esses dados não deveriam ser expostos via API.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os serializers/dicts que retornam dados de `ClienteHubsoft` e `ServicoClienteHubsoft`\n- [ ] Remover campos: `login`, `senha`, `mac_addr`, `ipv4`, `ipv6` dos responses\n- [ ] Criar listas explícitas de campos permitidos (allowlist) em vez de retornar tudo\n- [ ] Verificar outros endpoints que possam expor dados desnecessários\n\n---\n\n## Contexto e referências\n\n- Views: `apps/integracoes/views.py`, função `_servico_para_dict()`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nAPIs retornam apenas campos necessários. Dados de rede (login, senha, MAC, IP) nunca expostos via API.\n"}, {"t": "f", "n": "Api Rest Framework 30 03 2026", "fn": "api_rest_framework_30-03-2026.md", "c": "---\nname: \"Implementar Django REST Framework\"\ndescription: \"O projeto possui APIs (HubSoft, N8N, webhooks) mas sem Django REST Framework. Não há serializers, versionamento de API, \"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev\"\n---\n\n# Implementar Django REST Framework — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO projeto possui APIs (HubSoft, N8N, webhooks) mas sem Django REST Framework. Não há serializers, versionamento de API, autenticação por token nem documentação automática. À medida que o SaaS escala com multi-tenancy, uma camada de API padronizada é essencial.\n\n---\n\n## Tarefas\n\n- [ ] Instalar djangorestframework e adicionar ao requirements.txt\n- [ ] Configurar DRF no settings (autenticação, permissões, paginação)\n- [ ] Criar serializers para os models principais (Lead, Cliente, Tenant)\n- [ ] Migrar endpoints existentes para ViewSets/APIViews\n- [ ] Implementar autenticação por token (TokenAuth ou JWT)\n- [ ] Adicionar versionamento de API (v1/)\n- [ ] Configurar drf-spectacular ou similar para documentação OpenAPI\n- [ ] Testar endpoints migrados\n\n---\n\n## Contexto e referências\n\n- Dívida técnica documentada em `docs/PRODUTO/02-ROADMAP_PRODUTO.md`\n- Endpoints N8N duplicados mencionados no roadmap\n\n---\n\n## Resultado esperado\n\nAPI padronizada com DRF, autenticação por token, versionamento e documentação Swagger/OpenAPI acessível.\n"}, {"t": "f", "n": "Apps Cs Nps Retencao 30 03 2026", "fn": "apps_cs_nps_retencao_30-03-2026.md", "c": "---\nname: \"Ativar Apps CS: NPS e Retenção\"\ndescription: \"As pastas `apps/cs/nps/` e `apps/cs/retencao/` existem no projeto mas não estão em `INSTALLED_APPS`. É necessário defini\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev\"\n---\n\n# Ativar Apps CS: NPS e Retenção — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev\n**Prioridade:** 🟡 Média\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nAs pastas `apps/cs/nps/` e `apps/cs/retencao/` existem no projeto mas não estão em `INSTALLED_APPS`. É necessário definir os models, views e URLs desses apps, registrá-los no Django e integrá-los ao módulo CS.\n\n---\n\n## Tarefas\n\n- [x] Definir models do app `nps` (ConfiguracaoNPS, PesquisaNPS com TenantMixin)\n- [x] Definir models do app `retencao` (ScoreCliente, AlertaChurn, AcaoRetencao com TenantMixin)\n- [x] Criar views e URLs básicos para ambos\n- [x] Registrar em `INSTALLED_APPS`\n- [ ] Gerar migrations (executar manualmente)\n- [ ] Integrar no menu do CS\n- [x] Adicionar TenantMixin nos models\n- [x] Registrar models no admin\n\n---\n\n## Contexto e referências\n\n- Réguas CS01 a CS07 em `docs/PRODUTO/01-REGUAS_PADRAO.md`\n- Apps CS migrados: `finalizadas/migracao_megaroleta_29-03-2026.md`\n\n---\n\n## Resultado esperado\n\nApps `nps` e `retencao` funcionais, com models, views e URLs integrados ao módulo CS. Prontos para receber as réguas de automação.\n"}, {"t": "f", "n": "Autenticacao Endpoints Api 30 03 2026", "fn": "autenticacao_endpoints_api_30-03-2026.md", "c": "---\nname: \"Autenticação nos 48+ Endpoints de API\"\ndescription: \"48+ endpoints de API usam `@csrf_exempt` sem nenhuma autenticação. Qualquer pessoa na internet consegue criar leads, apr\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Autenticação nos 48+ Endpoints de API — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\n48+ endpoints de API usam `@csrf_exempt` sem nenhuma autenticação. Qualquer pessoa na internet consegue criar leads, aprovar/rejeitar vendas, deletar imagens e acessar dashboards. Inclui endpoints com impacto financeiro direto (`aprovar_venda_api`, `rejeitar_venda_api`).\n\n---\n\n## Tarefas\n\n### Categorização dos endpoints\n- [ ] Mapear todos os endpoints com `@csrf_exempt` e classificar em:\n  - **Webhook/N8N** (chamados por sistemas externos) → autenticação por API Key\n  - **Painel** (chamados pelo frontend) → remover `@csrf_exempt`, usar `@login_required` + CSRF token\n  - **Público** (cadastro de cliente) → manter público mas com rate limiting\n\n### Implementação — APIs do painel\n- [ ] Remover `@csrf_exempt` dos endpoints do painel (dashboard_data, aprovar_venda, etc.)\n- [ ] Adicionar `@login_required` nos endpoints que exigem autenticação\n- [ ] Garantir que o frontend envia o CSRF token via header `X-CSRFToken`\n\n### Implementação — Webhooks/N8N\n- [ ] Criar decorator `@webhook_auth_required` que valida `Authorization: Bearer <token>`\n- [ ] Criar variável de ambiente `N8N_API_TOKEN`\n- [ ] Aplicar nos endpoints chamados pelo N8N (registrar_lead, registrar_prospecto, etc.)\n- [ ] Atualizar os workflows do N8N para enviar o token no header\n\n### Implementação — Endpoints públicos\n- [ ] Manter `api_cadastro_cliente` e `api_consulta_cep` públicos\n- [ ] Adicionar rate limiting (ex: 10 req/min por IP)\n\n### Validação\n- [ ] Testar que endpoints do painel rejeitam requests sem CSRF/login\n- [ ] Testar que webhooks rejeitam requests sem token\n- [ ] Testar que endpoints públicos funcionam sem auth mas com rate limit\n- [ ] Atualizar a isenção do LoginRequiredMiddleware (`^api/` é muito amplo)\n\n---\n\n## Contexto e referências\n\n- Endpoints: `vendas_web/views.py` e `vendas_web/views_api_atendimento.py`\n- LoginRequiredMiddleware: `apps/sistema/middleware.py` (isenta `^api/`)\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero endpoints de API sem autenticação (exceto os explicitamente públicos com rate limiting). Webhooks protegidos por token. Frontend usando CSRF token corretamente.\n"}, {"t": "f", "n": "Automacoes Refatoracao Completa 03 04 2026", "fn": "automacoes_refatoracao_completa_03-04-2026.md", "c": "---\nname: \"Automações: Refatoração completa com fluxograma visual\"\ndescription: \"Implementar fluxos condicionais, editor drag & drop, delays reais, segmentos, timeline, controles\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Automações: Refatoração Completa — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nRefatorar o módulo de Automações para suportar fluxos condicionais visuais (drag & drop), delays reais, integração com segmentos, timeline por lead e controles robustos.\n\n---\n\n## Tarefas\n\n- [ ] Phase 1: Models (NodoFluxo, ConexaoNodo, ExecucaoPendente, ControleExecucao) + migrations\n- [ ] Phase 2: Engine dual-mode (legacy + grafo) + controles\n- [ ] Phase 3: Management command cron (pendentes, lead_sem_contato, tarefa_vencida, segmentos)\n- [ ] Phase 4: Frontend editor visual (Drawflow)\n- [ ] Phase 5: Dashboard central + Timeline no lead\n- [ ] Phase 6: Integração com Segmentos\n- [ ] Phase 7: Testes completos\n\n---\n\n## Contexto e referências\n\nPlano detalhado em: `.claude/plans/typed-nibbling-stallman.md`\n\n---\n\n## Resultado esperado\n\nCliente cria automações visuais com fluxos condicionais, delays e ações encadeadas. Logs claros por lead e por regra. Controles de execução robustos.\n"}, {"t": "f", "n": "Cicd Pipeline 30 03 2026", "fn": "cicd_pipeline_30-03-2026.md", "c": "---\nname: \"Pipeline CI/CD\"\ndescription: \"Não existe pipeline de CI/CD. Testes, linting e deploy são manuais. Para garantir qualidade e agilidade no deploy, é nec\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"DevOps\"\n---\n\n# Pipeline CI/CD — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nNão existe pipeline de CI/CD. Testes, linting e deploy são manuais. Para garantir qualidade e agilidade no deploy, é necessário configurar um pipeline automatizado (GitHub Actions ou similar).\n\n---\n\n## Tarefas\n\n- [ ] Criar workflow de CI (rodar testes em cada push/PR)\n- [ ] Adicionar linting ao pipeline (flake8 ou ruff)\n- [ ] Adicionar verificação de segurança (bandit ou safety)\n- [ ] Criar workflow de CD (deploy automatizado para produção)\n- [ ] Configurar secrets no GitHub (DB, API keys)\n- [ ] Configurar notificações de falha (e-mail ou Slack)\n- [ ] Documentar processo de deploy automatizado\n\n---\n\n## Contexto e referências\n\n- Depende de: Docker (`docker_containerizacao_30-03-2026.md`)\n- Depende de: Testes (`cobertura_testes_30-03-2026.md`)\n\n---\n\n## Resultado esperado\n\nPipeline CI/CD funcional. Push na main roda testes automaticamente. Deploy em produção com um clique ou automático após merge.\n"}, {"t": "f", "n": "Clube Auth Tenant 30 03 2026", "fn": "clube_auth_tenant_30-03-2026.md", "c": "---\nname: \"Autenticação e Tenant no Módulo Clube\"\ndescription: \"As APIs do Clube de Benefícios usam session-based auth (`request.session.get('auth_membro_id')`) sem verificar se o memb\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Autenticação e Tenant no Módulo Clube — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nAs APIs do Clube de Benefícios usam session-based auth (`request.session.get('auth_membro_id')`) sem verificar se o membro pertence ao tenant atual. Um membro de um provedor poderia acessar dados de outro provedor se a sessão for comprometida.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar verificação de tenant nas APIs do clube (`apps/cs/clube/views/api_views.py`)\n- [ ] Garantir que `MembroClube.objects.get(id=auth_membro_id)` filtra por tenant\n- [ ] Revisar login do membro para incluir tenant na sessão\n- [ ] Testar que membro de Tenant A não acessa dados de Tenant B\n\n---\n\n## Contexto e referências\n\n- Views: `apps/cs/clube/views/api_views.py`, linhas 21-50, 191-300\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodas as operações do clube validam que o membro pertence ao tenant do request.\n"}, {"t": "f", "n": "Cobertura Testes 30 03 2026", "fn": "cobertura_testes_30-03-2026.md", "c": "---\nname: \"Cobertura de Testes\"\ndescription: \"A cobertura de testes é ~1%. Existe apenas 1 arquivo de teste real (`test_tenant_isolation.py` com 16 testes). Para um S\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"QA / Dev\"\n---\n\n# Cobertura de Testes — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** QA / Dev\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nA cobertura de testes é ~1%. Existe apenas 1 arquivo de teste real (`test_tenant_isolation.py` com 16 testes). Para um SaaS multi-tenant em produção, é crítico ter testes automatizados cobrindo os fluxos principais. Meta: 80% de cobertura nos models e views críticos.\n\n---\n\n## Tarefas\n\n- [ ] Instalar pytest-cov e configurar .coveragerc\n- [ ] Atualizar requirements.txt com dependências de teste (pytest, pytest-django, pytest-cov, factory-boy)\n- [ ] Criar testes para models do módulo comercial (Lead, Atendimento, Cadastro)\n- [ ] Criar testes para fluxo de integração HubSoft\n- [ ] Criar testes para models do módulo CS (Clube, Parceiros, Indicações)\n- [ ] Criar testes para o sistema de planos e features (Admin Aurora)\n- [ ] Criar testes para middleware de tenant (cenários de edge case)\n- [ ] Criar testes para views críticas (login, dashboard, cadastro de lead)\n- [ ] Gerar relatório de cobertura e identificar gaps\n- [ ] Definir meta mínima de cobertura no CI (ex: 60% para começar)\n\n---\n\n## Contexto e referências\n\n- Testes existentes: `robo/dashboard_comercial/gerenciador_vendas/tests/`\n- Fixtures: `conftest.py` com tenant_a, tenant_b, user_a, user_b\n- Factories: `factories.py` com TenantFactory, UserFactory, PerfilFactory\n- pytest.ini configurado com `settings_local`\n\n---\n\n## Resultado esperado\n\nCobertura de testes >60% nos módulos críticos. Relatório de coverage integrado ao CI. Factories e fixtures reutilizáveis para todos os apps.\n"}, {"t": "f", "n": "Contrato Termos 30 03 2026", "fn": "contrato_termos_30-03-2026.md", "c": "---\nname: \"Contrato, Termos de Uso e Política de Privacidade\"\ndescription: \"Não existem documentos jurídicos para a operação SaaS. Antes de fechar contratos na Fase 1 (a partir de 31/03), é necess\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Jurídico / CEO\"\n---\n\n# Contrato, Termos de Uso e Política de Privacidade — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Jurídico / CEO\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nNão existem documentos jurídicos para a operação SaaS. Antes de fechar contratos na Fase 1 (a partir de 31/03), é necessário ter pelo menos o contrato de prestação de serviço, termos de uso e política de privacidade.\n\n---\n\n## Tarefas\n\n- [ ] Redigir contrato de prestação de serviço SaaS (mensalidade + transacional)\n- [ ] Incluir cláusulas de SLA (uptime, suporte, prazo de ativação)\n- [ ] Redigir termos de uso da plataforma\n- [ ] Redigir política de privacidade (conformidade LGPD)\n- [ ] Definir política de cancelamento e reembolso\n- [ ] Redigir acordo com o sócio comercial (parceiro de vendas)\n- [ ] Revisar com advogado especializado\n- [ ] Disponibilizar no sistema (aceite digital no onboarding)\n\n---\n\n## Contexto e referências\n\n- Precificação: `docs/GTM/08-PRECIFICACAO.md`\n- Fluxo comercial: `docs/GTM/12-FLUXO_COMERCIAL.md`\n- LGPD: `backlog/lgpd_privacidade_30-03-2026.md`\n\n---\n\n## Resultado esperado\n\nDocumentos jurídicos prontos para uso comercial. Contrato, termos e política acessíveis no sistema com aceite digital.\n"}, {"t": "f", "n": "Conversao Trial 27 03 2026", "fn": "conversao_trial_27-03-2026.md", "c": "---\nname: Processo de conversão do trial\ndescription: Definir e documentar o processo de acompanhamento durante os 14 dias de trial para maximizar conversão\ntype: tarefa\nstatus: finalizada\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nCriar o processo de nurturing durante o trial de 14 dias (HubSoft) para garantir que o ISP ative, use e converta para cliente pagante.\n\n## Atividades\n\n- [x] Definir touchpoints durante o trial (D+0 a D+14, dois trilhos: ativo e inativo)\n- [x] Definir critério de \"trial ativado com sucesso\" (primeiro lead processado)\n- [x] Definir o que acontece se o trial não for usado nos primeiros 3 dias (trilho inativo com WhatsApp ativo do PMM)\n- [x] Oferta D+12 → decisão: sem oferta durante o trial. Movida para Régua de Recuperação Pós-Trial.\n- [x] Documentar estrutura da régua em exports/drafts/email/regua_trial_estrutura.md\n- ↗️ Criar mensagens → movido para task textos_regua_trial_27-03-2026.md\n\n## Responsável\n\n| Touchpoint | Executa | Criado por |\n|------------|---------|------------|\n| D+1 — Sistema ativado e funcionando? | PMM (Aurora) | PMM |\n| D+3 — Primeiro lead processado? | PMM (Aurora) | PMM |\n| D+7 — Como está sendo a experiência? | PMM (Aurora) | PMM |\n| D+10 — Alguma dúvida antes de fechar? | Parceiro | PMM (script pronto) |\n| D+12 — Oferta de fechamento | Parceiro | PMM (script pronto) |\n| D+14 — Trial encerrado | PMM (Aurora) | PMM |\n\nPMM cria todos os materiais e executa os touchpoints de produto. Parceiro entra apenas nos momentos de fechamento com script já definido.\n"}, {"t": "f", "n": "Credencial Hubsoft Hardcoded 30 03 2026", "fn": "credencial_hubsoft_hardcoded_30-03-2026.md", "c": "---\nname: \"Remover Credencial HubSoft Hardcoded\"\ndescription: \"O arquivo `apps/cs/clube/management/commands/testar_pontuacoes.py` contém a senha do banco HubSoft em texto plano. Qualq\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Remover Credencial HubSoft Hardcoded — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO arquivo `apps/cs/clube/management/commands/testar_pontuacoes.py` contém a senha do banco HubSoft em texto plano. Qualquer pessoa com acesso ao código consegue conectar ao banco de produção do HubSoft.\n\n---\n\n## Tarefas\n\n- [ ] Substituir credenciais hardcoded por `os.getenv()` no `testar_pontuacoes.py`\n- [ ] Verificar se há outros arquivos com credenciais hardcoded no módulo CS\n- [ ] Solicitar rotação da senha exposta ao administrador do HubSoft\n- [ ] Adicionar as variáveis `HUBSOFT_DB_*` ao `.env.example`\n\n---\n\n## Contexto e referências\n\n- Arquivo: `robo/dashboard_comercial/gerenciador_vendas/apps/cs/clube/management/commands/testar_pontuacoes.py`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero credenciais hardcoded no código. Senha exposta rotacionada no HubSoft.\n"}, {"t": "f", "n": "Criptografia Credenciais Db 30 03 2026", "fn": "criptografia_credenciais_db_30-03-2026.md", "c": "---\nname: \"Criptografar Credenciais API no Banco\"\ndescription: \"Os models `IntegracaoAPI` armazenam `client_secret`, `password` e `access_token` em texto plano no banco. Se o banco for\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Criptografar Credenciais API no Banco — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nOs models `IntegracaoAPI` armazenam `client_secret`, `password` e `access_token` em texto plano no banco. Se o banco for comprometido (dump, backup vazado, acesso indevido), todas as credenciais de integração ficam expostas.\n\n---\n\n## Tarefas\n\n- [ ] Avaliar django-cryptography ou django-fernet-fields para criptografia de campo\n- [ ] Instalar e configurar a biblioteca escolhida\n- [ ] Migrar campos `client_secret`, `password` e `access_token` para campos criptografados\n- [ ] Gerar migration (dados existentes serão re-criptografados)\n- [ ] Testar que leitura/escrita das credenciais continua funcionando (HubSoft, N8N)\n- [ ] Adicionar chave de criptografia ao `.env` (`FIELD_ENCRYPTION_KEY`)\n\n---\n\n## Contexto e referências\n\n- Model: `apps/integracoes/models.py`, campos client_secret, password, access_token\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCredenciais de API criptografadas em repouso no banco. Dump do banco não expõe senhas.\n"}, {"t": "f", "n": "Crm Dropdown Pipeline 03 04 2026", "fn": "crm_dropdown_pipeline_03-04-2026.md", "c": "---\nname: \"CRM: Dropdown de seleção de pipeline no título\"\ndescription: \"Substituir título fixo 'Pipeline CRM' por dropdown com nome do pipeline selecionado\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Dropdown de pipeline no título — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nO título \"Pipeline CRM\" deve ser substituído por um dropdown que mostra o nome do pipeline atual e permite trocar entre pipelines. Remover as tabs de seleção criadas anteriormente.\n\n---\n\n## Tarefas\n\n- [ ] Remover tabs de pipeline\n- [ ] Substituir h1 \"Pipeline CRM\" por dropdown com nome do pipeline atual\n- [ ] Ao selecionar outro pipeline, recarregar com ?pipeline=ID\n\n---\n\n## Resultado esperado\n\nTítulo mostra \"Vendas B2B Provedores ▼\" e ao clicar abre dropdown com os outros pipelines.\n"}, {"t": "f", "n": "Crm Seletor Pipeline 03 04 2026", "fn": "crm_seletor_pipeline_03-04-2026.md", "c": "---\nname: \"CRM: Seletor de pipeline no Kanban\"\ndescription: \"Permitir trocar entre pipelines criados na página do CRM Kanban\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Seletor de pipeline no Kanban — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nA página do Pipeline CRM foi criada antes do sistema suportar múltiplos pipelines por tenant. Hoje o tenant pode ter vários pipelines (ex: Vendas B2B, Vendas B2C, Onboarding), mas o Kanban não permite trocar entre eles.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar seletor de pipeline (tabs ou dropdown) no topo do Kanban\n- [ ] Enviar pipeline_id na chamada da API api_pipeline_dados\n- [ ] Manter pipeline selecionado via query param (?pipeline=ID)\n- [ ] Atualizar estágios e oportunidades ao trocar pipeline\n\n---\n\n## Resultado esperado\n\nUsuário consegue trocar entre pipelines no Kanban sem sair da página.\n"}, {"t": "f", "n": "Crm Troca Pipeline Ajax 03 04 2026", "fn": "crm_troca_pipeline_ajax_03-04-2026.md", "c": "---\nname: \"CRM: Troca de pipeline via AJAX sem reload\"\ndescription: \"Trocar pipeline sem recarregar página, usando fetch para atualizar apenas o kanban\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# CRM: Troca de pipeline via AJAX — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nAo trocar de pipeline no dropdown, o sistema recarrega a página inteira com `?pipeline=ID`. Deveria trocar via AJAX, atualizando apenas o kanban. A URL deve ficar limpa ou usar slug amigável.\n\n---\n\n## Tarefas\n\n- [ ] Trocar links `<a href=\"?pipeline=ID\">` por onclick JS\n- [ ] Ao clicar, chamar `carregarPipeline(pipelineId)` via fetch\n- [ ] Recriar as colunas do kanban dinamicamente com os novos estágios\n- [ ] Atualizar título do dropdown com o nome do pipeline selecionado\n- [ ] Não recarregar a página\n\n---\n\n## Resultado esperado\n\nTroca de pipeline é instantânea, sem reload. URL permanece `/crm/`.\n"}, {"t": "f", "n": "Csp Unsafe Inline 30 03 2026", "fn": "csp_unsafe_inline_30-03-2026.md", "c": "---\nname: \"Remover unsafe-inline e unsafe-eval do CSP\"\ndescription: \"A Content Security Policy permite `unsafe-inline` e `unsafe-eval` nos scripts e estilos. Isso anula a proteção contra XS\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Remover unsafe-inline e unsafe-eval do CSP — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nA Content Security Policy permite `unsafe-inline` e `unsafe-eval` nos scripts e estilos. Isso anula a proteção contra XSS, pois qualquer script inline pode ser executado. Precisa migrar scripts inline para arquivos externos e usar nonces.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os `<script>` inline nos templates\n- [ ] Extrair scripts inline para arquivos .js separados\n- [ ] Extrair estilos inline para arquivos .css\n- [ ] Implementar sistema de nonces para scripts que precisam ser inline\n- [ ] Remover `'unsafe-inline'` e `'unsafe-eval'` do `CSP_SCRIPT_SRC` no settings\n- [ ] Remover `'unsafe-inline'` do `CSP_STYLE_SRC`\n- [ ] Testar todas as páginas após a mudança (dashboard, CRM, CS, cadastro)\n\n---\n\n## Contexto e referências\n\n- Settings: `gerenciador_vendas/settings.py`, linhas 92-115\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCSP sem unsafe-inline e unsafe-eval. Scripts inline usando nonces. Proteção XSS efetiva.\n"}, {"t": "f", "n": "Csrf Endpoints Seguranca 30 03 2026", "fn": "csrf_endpoints_seguranca_30-03-2026.md", "c": "---\nname: \"Correção CSRF e Segurança de Endpoints\"\ndescription: \"O roadmap de produto identifica 50+ endpoints com `@csrf_exempt` e APIs sem autenticação adequada. Com o sistema multi-t\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Segurança (AppSec)\"\n---\n\n# Correção CSRF e Segurança de Endpoints — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Segurança (AppSec)\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO roadmap de produto identifica 50+ endpoints com `@csrf_exempt` e APIs sem autenticação adequada. Com o sistema multi-tenant em produção, endpoints inseguros representam risco de acesso cruzado entre tenants e ataques CSRF.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os endpoints com `@csrf_exempt` no projeto\n- [ ] Classificar por risco (alto: dados de tenant, médio: funcional, baixo: público)\n- [ ] Remover `@csrf_exempt` onde possível, usar AJAX com CSRF token\n- [ ] Implementar autenticação em endpoints de API (Token ou Session)\n- [ ] Adicionar verificação de tenant em endpoints críticos\n- [ ] Validar que webhooks N8N usam autenticação (API key ou HMAC)\n- [ ] Testar cenários de acesso cruzado entre tenants via API\n- [ ] Documentar endpoints públicos vs. autenticados\n\n---\n\n## Contexto e referências\n\n- Dívida técnica: `docs/PRODUTO/02-ROADMAP_PRODUTO.md` (CSRF vulnerabilities, 50+ endpoints)\n- Agente: `docs/AGENTES/tech/appsec.md`\n\n---\n\n## Resultado esperado\n\nZero endpoints com `@csrf_exempt` desnecessário. Todas as APIs autenticadas. Isolamento de tenant validado em endpoints críticos.\n"}, {"t": "f", "n": "Docker Containerizacao 30 03 2026", "fn": "docker_containerizacao_30-03-2026.md", "c": "---\nname: \"Docker e Containerização\"\ndescription: \"O projeto não possui Dockerfile nem docker-compose. O deploy é manual via Gunicorn + Nginx no servidor. Para escalar o S\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"DevOps\"\n---\n\n# Docker e Containerização — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🔴 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO projeto não possui Dockerfile nem docker-compose. O deploy é manual via Gunicorn + Nginx no servidor. Para escalar o SaaS com multi-tenancy e facilitar onboarding de novos clientes, é necessário containerizar a aplicação.\n\n---\n\n## Tarefas\n\n- [ ] Criar Dockerfile para a aplicação Django\n- [ ] Criar docker-compose.yml (Django + PostgreSQL + Nginx + Redis)\n- [ ] Configurar volumes para media/static files\n- [ ] Criar .dockerignore\n- [ ] Configurar variáveis de ambiente via docker-compose\n- [ ] Testar build e startup local\n- [ ] Documentar processo de deploy com Docker\n\n---\n\n## Contexto e referências\n\n- Gunicorn config atual: `robo/dashboard_comercial/gerenciador_vendas/gunicorn.conf.py`\n- Deploy atual: manual, servidor com user `darlan`, porta 8003\n\n---\n\n## Resultado esperado\n\nAplicação containerizada com docker-compose. Dev local roda com um comando (`docker-compose up`). Base para CI/CD e deploy automatizado.\n"}, {"t": "f", "n": "Docker Healthcheck 31 03 2026", "fn": "docker_healthcheck_31-03-2026.md", "c": "---\nname: \"Docker e Health Check\"\ndescription: \"Containerização do projeto com Docker e endpoint de monitoramento\"\nprioridade: \"🟡 Média\"\nresponsavel: \"DevOps\"\n---\n\n# Docker e Health Check — 31/03/2026\n\n**Data:** 31/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🟡 Média\n**Status:** ✅ Concluída\n\n---\n\n## Descrição\n\nCriar infraestrutura de containerização (Docker) e monitoramento (health check + logging estruturado) para o projeto gerenciador_vendas.\n\n---\n\n## Tarefas\n\n- [x] Criar Dockerfile (Python 3.11 slim, gunicorn)\n- [x] Criar docker-compose.yml (web + postgres + nginx)\n- [x] Criar nginx.conf (proxy reverso para gunicorn)\n- [x] Criar .dockerignore\n- [x] Criar endpoint /health/ com verificação de banco\n- [x] Adicionar /health/ como rota isenta de autenticação no middleware\n- [x] Configurar LOGGING estruturado com PIIFilter no settings.py\n\n---\n\n## Contexto e referências\n\nPreparação para deploy containerizado e monitoramento em produção.\n\n---\n\n## Resultado esperado\n\nProjeto pronto para build Docker com `docker-compose up`, endpoint `/health/` acessível sem autenticação retornando status do banco, e logging estruturado com filtro de PII ativo.\n"}, {"t": "f", "n": "Fix Spa Navigation Js 31 03 2026", "fn": "fix_spa_navigation_js_31-03-2026.md", "c": "---\nname: \"Corrigir erros JS no sistema de navegação SPA\"\ndescription: \"navigateTo() injeta scripts duplicados causando NotificationSystem/API_URLS already declared e null references\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev / Tech Lead\"\n---\n\n# Corrigir Erros JS no Sistema de Navegação SPA — 31/03/2026\n\n**Data:** 31/03/2026\n**Responsável:** Dev / Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nO `base.html` tem um sistema de navegação SPA que usa `navigateTo()` para carregar páginas via fetch e injetar o HTML no DOM. Ao navegar entre páginas, scripts inline são re-executados causando erros de variáveis duplicadas (`NotificationSystem`, `API_URLS` already declared) e referências nulas (elementos DOM que não existem na página atual).\n\n---\n\n## Tarefas\n\n- [ ] Investigar o sistema navigateTo() no base.html\n- [ ] Identificar todos os scripts inline que declaram variáveis globais\n- [ ] Corrigir injeção duplicada de scripts\n- [ ] Corrigir referências a elementos DOM null\n- [ ] Testar navegação entre Dashboard, Comercial, Marketing, CS, Relatórios\n\n---\n\n## Contexto e referências\n\n- Erros no console: NotificationSystem already declared, API_URLS already declared, Cannot read properties of null\n- Arquivo: apps/sistema/templates/sistema/base.html (função navigateTo)\n- Afeta: navegação SPA entre módulos\n\n---\n\n## Resultado esperado\n\nNavegação SPA sem erros no console. Todos os módulos acessíveis sem reload de página.\n"}, {"t": "f", "n": "Https Cookies Seguranca 30 03 2026", "fn": "https_cookies_seguranca_30-03-2026.md", "c": "---\nname: \"Forçar HTTPS e Cookies Seguros\"\ndescription: \"O `settings.py` base não define `SESSION_COOKIE_SECURE`, `CSRF_COOKIE_SECURE` nem `SECURE_SSL_REDIRECT`. Em produção, co\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"DevOps / Segurança (AppSec)\"\n---\n\n# Forçar HTTPS e Cookies Seguros — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** DevOps / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO `settings.py` base não define `SESSION_COOKIE_SECURE`, `CSRF_COOKIE_SECURE` nem `SECURE_SSL_REDIRECT`. Em produção, cookies podem ser transmitidos via HTTP, permitindo ataques man-in-the-middle.\n\n---\n\n## Tarefas\n\n- [ ] Adicionar ao settings.py (com fallback via env var):\n  - `SECURE_SSL_REDIRECT`\n  - `SESSION_COOKIE_SECURE`\n  - `CSRF_COOKIE_SECURE`\n  - `SECURE_HSTS_SECONDS` (já existe no production, garantir no base)\n- [ ] Verificar que settings_production.py tem todas as flags ativas\n- [ ] Testar que settings_local.py não quebra com HTTP (valores False para dev)\n- [ ] Verificar configuração SSL do Nginx no servidor\n\n---\n\n## Contexto e referências\n\n- Settings base: `gerenciador_vendas/settings.py`\n- Settings prod: `gerenciador_vendas/settings_production.py` (já tem HSTS)\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nCookies de sessão e CSRF marcados como Secure em produção. HTTPS forçado. HSTS ativo.\n"}, {"t": "f", "n": "Idor Apis Tenant 30 03 2026", "fn": "idor_apis_tenant_30-03-2026.md", "c": "---\nname: \"Corrigir IDOR nas APIs — Verificação de Tenant\"\ndescription: \"Múltiplas APIs aceitam IDs via parâmetro (lead_id, imagem_id, fluxo_id) sem verificar se o objeto pertence ao tenant do \"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Corrigir IDOR nas APIs — Verificação de Tenant — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nMúltiplas APIs aceitam IDs via parâmetro (lead_id, imagem_id, fluxo_id) sem verificar se o objeto pertence ao tenant do usuário. Um atacante pode acessar, modificar ou deletar dados de outro tenant apenas trocando o ID na requisição.\n\n---\n\n## Tarefas\n\n- [ ] Auditar todos os `.objects.get(pk=X)` e `get_object_or_404(Model, id=X)` sem filtro de tenant\n- [ ] Criar helper `get_tenant_object_or_404(Model, tenant, **kwargs)` para uso padronizado\n- [ ] Corrigir `deletar_imagem_lead_api()` — adicionar filtro de tenant\n- [ ] Corrigir `validar_imagem_api()` — adicionar filtro de tenant\n- [ ] Corrigir `imagens_por_cliente_api()` — adicionar filtro de tenant\n- [ ] Corrigir `iniciar_atendimento_n8n()` — verificar tenant do lead e fluxo\n- [ ] Corrigir `api_lead_hubsoft_status()` em `apps/integracoes/views.py` — verificar tenant\n- [ ] Corrigir `get_object_or_404(ModeloCarteirinha, id=X)` em `apps/cs/carteirinha/views.py`\n- [ ] Criar testes de IDOR (tentar acessar objeto de outro tenant, esperar 404)\n\n---\n\n## Contexto e referências\n\n- Endpoints afetados: `vendas_web/views.py`, `apps/integracoes/views.py`, `apps/cs/carteirinha/views.py`\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nTodas as consultas por ID validam tenant antes de retornar. Requisições para objetos de outro tenant retornam 404.\n"}, {"t": "f", "n": "Linting Qualidade Codigo 30 03 2026", "fn": "linting_qualidade_codigo_30-03-2026.md", "c": "---\nname: \"Linting e Qualidade de Código\"\ndescription: \"O projeto não possui ferramentas de linting, formatação automática nem verificação de qualidade de código. Para manter c\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev\"\n---\n\n# Linting e Qualidade de Código — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO projeto não possui ferramentas de linting, formatação automática nem verificação de qualidade de código. Para manter consistência à medida que o projeto cresce, é necessário configurar essas ferramentas.\n\n---\n\n## Tarefas\n\n- [ ] Instalar e configurar ruff (linter + formatter)\n- [ ] Criar pyproject.toml com configurações do ruff\n- [ ] Rodar linting no código existente e corrigir erros críticos\n- [ ] Configurar pre-commit hooks (ruff, trailing whitespace, end-of-file)\n- [ ] Adicionar ao requirements-dev.txt\n- [ ] Integrar ao pipeline CI/CD\n\n---\n\n## Contexto e referências\n\n- Depende de: Pipeline CI/CD (`cicd_pipeline_30-03-2026.md`)\n- Codebase: 30.000+ linhas de código Python\n\n---\n\n## Resultado esperado\n\nLinting automático com ruff. Pre-commit hooks impedem código fora do padrão. Integrado ao CI.\n"}, {"t": "f", "n": "Logging Pii Filter 30 03 2026", "fn": "logging_pii_filter_30-03-2026.md", "c": "---\nname: \"Filtro de PII no Logging\"\ndescription: \"A configuração de logging em produção não possui filtros para mascarar dados pessoais. Se um desenvolvedor logar um obje\"\nprioridade: \"🟡 Média\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Filtro de PII no Logging — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nA configuração de logging em produção não possui filtros para mascarar dados pessoais. Se um desenvolvedor logar um objeto ou request com CPF, email ou telefone, esses dados ficam nos logs sem proteção.\n\n---\n\n## Tarefas\n\n- [ ] Criar classe `PIIFilter(logging.Filter)` que mascara padrões de CPF, email e telefone\n- [ ] Adicionar filtro a todos os handlers no settings de logging\n- [ ] Testar que logs de integração (HubSoft) não expõem dados pessoais\n- [ ] Documentar regra: nunca logar dados pessoais diretamente\n\n---\n\n## Contexto e referências\n\n- Logging: `gerenciador_vendas/settings_production.py`, linhas 57-99\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nFiltro de PII ativo em produção. CPFs mascarados como `XXX.XXX.XXX-XX`, emails como `[email]`.\n"}, {"t": "f", "n": "Materiais Vendas 26 03 2026", "fn": "materiais_vendas_26-03-2026.md", "c": "---\nname: \"Materiais de Vendas — Roteiros e Estruturas\"\ndescription: \"Criar os materiais de vendas que o parceiro comercial usará para prospectar e fechar clientes. One-pager para enviar ant\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"PMM\"\n---\n\n# Materiais de Vendas — Roteiros e Estruturas\n\n**Data:** 26/03/2026\n**Responsável:** PMM\n**Prioridade:** 🔴 Alta\n**Status:** ✅ Finalizado\n\n---\n\n## Descrição\n\nCriar os materiais de vendas que o parceiro comercial usará para prospectar e fechar clientes. One-pager para enviar antes da reunião, deck para a apresentação e case anônimo com os números reais do provedor em produção.\n\n---\n\n## Tarefas\n\n### Estruturas (conteúdo definido)\n- [x] Estrutura do one-pager → exports/drafts/apresentacao/one_pager_estrutura.md\n- [x] Estrutura do pre-demo deck (6 slides) → exports/drafts/apresentacao/pre_demo_deck_estrutura.md\n- [x] Estrutura do deck de apoio (10 slides) → exports/drafts/apresentacao/demo_deck_apoio_estrutura.md\n- [x] Estrutura do deck do parceiro (10 slides + roteiro) → exports/drafts/apresentacao/demo_deck_parceiro_estrutura.md\n- [x] Script do pitch de 2 minutos → 09-ENABLEMENT.md\n\n### Outros materiais\n- [ ] Revisar script do pitch de 2 minutos com o parceiro\n- [ ] Finalizar documento de objeções e respostas\n\n> Versões visuais (PPT/PDF) e case anônimo em PDF registrados em task separada: materiais_vendas_visual.\n\n---\n\n## Contexto e referências\n\n- Pitch rascunhado em [09-ENABLEMENT.md](../../GTM/09-ENABLEMENT.md)\n- Mensagens e objeções em [06-MENSAGENS_CHAVE.md](../../GTM/06-MENSAGENS_CHAVE.md)\n- Dados do case em [01-PESQUISA_MERCADO.md](../../GTM/01-PESQUISA_MERCADO.md)\n- Precificação aprovada em [08-PRECIFICACAO.md](../../GTM/08-PRECIFICACAO.md)\n\n---\n\n## Resultado esperado\n\nParceiro com material completo para prospectar e apresentar sem depender da Aurora em cada conversa.\n"}, {"t": "f", "n": "Migracao Megaroleta 29 03 2026", "fn": "migracao_megaroleta_29-03-2026.md", "c": "---\nname: \"Migração do módulo CS (megaroleta) para o hub\"\ndescription: \"Migrar o módulo CS (Clube de Benefícios) do projeto megaroleta para dentro do hub, integrando os apps, models, URLs e te\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Tech Lead\"\n---\n\n# Migração do módulo CS (megaroleta) para o hub — 29/03/2026\n\n**Data:** 29/03/2026\n**Responsável:** Tech Lead\n**Prioridade:** 🔴 Alta\n**Status:** ✅ Concluída\n\n---\n\n## Descrição\n\nMigrar o módulo CS (Clube de Benefícios) do projeto megaroleta para dentro do hub, integrando os apps, models, URLs e templates ao layout unificado do vendas_web.\n\n---\n\n## Tarefas\n\n- [x] Migrar 4 apps do megaroleta: clube, parceiros, indicacoes, carteirinha\n- [x] Migrar 20 models para o hub\n- [x] Migrar 76 URLs\n- [x] Migrar 67+ templates\n- [x] Integrar templates CS ao layout do hub (estendem vendas_web/base.html)\n- [x] Criar sidebar CS com sub-seções: Clube, Parceiros, Carteirinhas, Indicações\n- [x] Resolver conflitos CSS com modais (display:none inline)\n- [x] Definir CRM do parceiro com 5 estágios (Lead identificado, Em contato, Em negociação, Trial ativo, Finalizada)\n\n---\n\n## Contexto e referências\n\n- Reunião: `docs/context/reunioes/tech_refatoracao_29-03-2026.md`\n- Projeto origem: `megaroleta/` (somente leitura)\n- Decisão: app Gestão (17 models, agentes IA) NÃO migra para o hub\n\n---\n\n## Resultado esperado\n\nMódulo CS completamente integrado ao hub com 4 apps funcionais, templates unificados e sidebar de navegação. Pendente refinamento visual e substituição de URLs hardcoded.\n"}, {"t": "f", "n": "Migracao Models Apps 30 03 2026", "fn": "migracao_models_apps_30-03-2026.md", "c": "---\nname: \"Limpeza de Apps Legados e Imports\"\ndescription: \"Os models já foram migrados para os apps modulares (29/03). Restavam apps legados duplicados e imports antigos. A limpez\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Limpeza de Apps Legados e Imports — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nOs models já foram migrados para os apps modulares (29/03). Restavam apps legados duplicados e imports antigos. A limpeza principal foi concluída em 30/03.\n\n---\n\n## Tarefas\n\n- [x] Remover `crm/` (raiz) do `INSTALLED_APPS` — substituído por `apps.comercial.crm`\n- [x] Remover `integracoes/` (raiz) do `INSTALLED_APPS` — substituído por `apps.integracoes`\n- [x] Registrar `apps.comercial.crm` e `apps.integracoes` no `INSTALLED_APPS`\n- [x] Migrar imports de `from vendas_web.models import X` para `from apps.X.models import X` (~40 arquivos)\n- [x] Migrar imports de `from crm.models import X` para `from apps.comercial.crm.models import X`\n- [x] Migrar imports de `from integracoes.*` para `from apps.integracoes.*`\n- [x] Mover middleware (LoginRequiredMiddleware) para `apps.sistema.middleware`\n- [x] Mover context_processors para `apps.sistema.context_processors`\n- [x] Atualizar URLs para usar `apps.integracoes.urls` em vez de `integracoes.urls`\n- [x] Registrar apps CS e admin_aurora no settings.py principal\n- [x] Corrigir settings_local.py para herdar INSTALLED_APPS do settings.py\n- [x] `manage.py check` passando (0 erros)\n- [x] 16 testes de isolamento passando\n- [x] Migrar admin.py do vendas_web para apps modulares (Phase 2: admin split)\n  - [x] apps/sistema/admin.py — AdminSiteCustom, ConfiguracaoEmpresa, ConfiguracaoSistema, LogSistema, StatusConfiguravel, UserAdmin\n  - [x] apps/comercial/leads/admin.py — LeadProspecto, Prospecto, HistoricoContato, ImagemLeadProspecto\n  - [x] apps/comercial/atendimento/admin.py — FluxoAtendimento, QuestaoFluxo, AtendimentoFluxo, TentativaResposta, RespostaQuestao\n  - [x] apps/comercial/cadastro/admin.py — ConfiguracaoCadastro, PlanoInternet, OpcaoVencimento, CadastroCliente, DocumentoLead\n  - [x] apps/comercial/viabilidade/admin.py — CidadeViabilidade\n  - [x] apps/notificacoes/admin.py — TipoNotificacao, CanalNotificacao, PreferenciaNotificacao, Notificacao, TemplateNotificacao\n  - [x] apps/marketing/campanhas/admin.py — CampanhaTrafego, DeteccaoCampanha\n  - [x] vendas_web/admin.py esvaziado (apenas comentarios de referencia)\n- [x] Phase 4: Templates migrados para diretórios dos apps (31/03)\n    - [x] apps/sistema/templates/sistema/ — login.html, configuracoes/{index,usuarios,recontato}.html\n    - [x] apps/dashboard/templates/dashboard/ — 12 templates (dashboard, new_dash, vendas, relatorios, ajuda, api_swagger, n8n_guide, etc.)\n    - [x] apps/comercial/leads/templates/comercial/leads/ — leads.html\n    - [x] apps/comercial/cadastro/templates/comercial/cadastro/ — cadastro.html, configuracoes/{cadastro,planos,vencimentos}.html\n    - [x] apps/comercial/atendimento/templates/comercial/atendimento/ — fluxos.html, questoes.html\n    - [x] apps/notificacoes/templates/notificacoes/ — notificacoes.html, tipo_notificacao_detalhes.html\n    - [x] apps/marketing/campanhas/templates/marketing/campanhas/ — campanhas.html\n    - [x] render() calls atualizados em todas as views dos apps\n    - [x] {% extends 'vendas_web/base.html' %} mantido (base.html fica no vendas_web por ora)\n    - [x] Templates originais preservados em vendas_web/templates/ (sem exclusao)\n- [ ] Remover monkey-patch de User em `vendas_web/models.py`\n- [x] Migrar views/URLs do `vendas_web` para apps modulares\n  - [x] Dashboard & Relatórios: 29 views migradas para `apps/dashboard/views.py` (31/03)\n  - [x] URLs atualizadas em `vendas_web/urls.py` para importar de `apps.dashboard`\n  - [x] Funil insights migrado de `vendas_web/funil_insights.py` para `apps/dashboard/views.py`\n  - [x] Phase 5: URLs migradas para urls.py de cada app modular (31/03)\n    - [x] apps/sistema/urls.py — auth, configuracoes, usuarios (10 routes)\n    - [x] apps/comercial/leads/urls.py — leads, prospectos, historicos, vendas (20 routes)\n    - [x] apps/comercial/atendimento/urls.py — fluxos, questoes, atendimentos, N8N (38 routes)\n    - [x] apps/comercial/cadastro/urls.py — cadastro, planos, vencimentos, CEP (12 routes)\n    - [x] apps/comercial/viabilidade/urls.py — viabilidade tecnica (1 route)\n    - [x] apps/notificacoes/urls.py — notificacoes, templates, canais, whatsapp (25 routes)\n    - [x] apps/marketing/campanhas/urls.py — campanhas de trafego (4 routes)\n    - [x] apps/dashboard/urls.py — dashboard, relatorios, analise, docs (29 routes)\n    - [x] gerenciador_vendas/urls.py atualizado com includes modulares\n    - [x] vendas_web/urls.py esvaziado (todas as rotas migradas)\n- [ ] Remover pastas `crm/` e `integracoes/` legadas da raiz (após validação em produção)\n\n---\n\n## Contexto e referências\n\n- Refatoração concluída: `finalizadas/refatoracao_apps_29-03-2026.md`\n- `vendas_web/models.py` é re-export (zero models próprios), mantido por compatibilidade de views\n- `crm/` e `integracoes/` na raiz removidos do INSTALLED_APPS, imports atualizados\n\n---\n\n## Resultado esperado\n\nTodos os imports apontam para `apps/`. Apps modulares registrados corretamente. Próximo passo: migrar views/URLs do vendas_web para os apps (tarefa separada).\n"}, {"t": "f", "n": "Modulo Inbox Atendimento 03 04 2026", "fn": "modulo_inbox_atendimento_03-04-2026.md", "c": "---\nname: \"Módulo Inbox de Atendimento/Suporte Completo\"\ndescription: \"Inbox Chatwoot-style: conversas, equipes, filas, distribuição, widget, FAQ, métricas\"\nprioridade: \"🔴 Alta\"\nresponsavel: \"Dev\"\n---\n\n# Módulo Inbox de Atendimento/Suporte — 03/04/2026\n\n**Data:** 03/04/2026\n**Responsável:** Dev\n**Prioridade:** 🔴 Alta\n**Status:** ✅ Concluída (14 phases em 3 sessões)\n\n---\n\n## Descrição\n\nMódulo completo de atendimento estilo Chatwoot/Intercom. Inbox de conversas em tempo real com dois canais (WhatsApp via webhook e Chat Widget embeddable), equipes de atendimento, filas com distribuição automática (round-robin/menor carga), transferência, FAQ/base de conhecimento, dashboard de métricas e integração com automações.\n\n---\n\n## Tarefas\n\n### Sessão 1: Inbox Base\n- [x] Models core (CanalInbox, Conversa, Mensagem, etc.)\n- [x] API webhook (receber/enviar mensagens, status)\n- [x] Inbox UI three-panel (lista, chat, contexto)\n- [x] WebSocket (Django Channels)\n- [x] Integração automações (3 eventos)\n\n### Sessão 2: Equipes e Distribuição\n- [x] Models (EquipeInbox, FilaInbox, PerfilAgenteInbox, etc.)\n- [x] Engine de distribuição automática\n- [x] Página de configurações (9 abas)\n- [x] Transferência de conversas\n- [x] Dashboard de métricas\n\n### Sessão 3: Widget + FAQ\n- [x] Models FAQ (CategoriaFAQ, ArtigoFAQ)\n- [x] Model WidgetConfig (token público, cores, domínios)\n- [x] API pública (7 endpoints sem login, CORS)\n- [x] Widget JS embeddable (aurora-chat.js, 3 abas)\n\n---\n\n## Resultado\n\n- 17 models no app `apps/inbox/`\n- 26+ endpoints (internos, N8N, públicos)\n- Widget JS vanilla (~15KB, zero dependências)\n- Dashboard com Chart.js\n- 3 migrations no PostgreSQL\n- Documentação completa em `docs/PRODUTO/06-INBOX.md`\n"}, {"t": "f", "n": "Monitoramento Admin Aurora 31 03 2026", "fn": "monitoramento_admin_aurora_31-03-2026.md", "c": "---\nname: \"Painel de Monitoramento no Admin Aurora\"\ndescription: \"Criar página de monitoramento do sistema no painel /aurora-admin/\"\nprioridade: \"🟡 Média\"\nresponsavel: \"DevOps\"\n---\n\n# Painel de Monitoramento no Admin Aurora — 31/03/2026\n\n**Data:** 31/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🟡 Média\n**Status:** ✅ Concluída\n\n---\n\n## Descrição\n\nCriar uma página de monitoramento completa no Admin Aurora (/aurora-admin/monitoramento/) que exiba o status do sistema, métricas operacionais, logs de integração e erros recentes. Também melhorar a página de logs existente com filtros avançados e auto-refresh.\n\n---\n\n## Tarefas\n\n- [x] Criar view monitoramento_view com health check, métricas e logs\n- [x] Adicionar URL /aurora-admin/monitoramento/\n- [x] Adicionar link \"Monitoramento\" na navbar do Admin Aurora\n- [x] Criar template monitoramento.html com cards de status, métricas e tabelas\n- [x] Melhorar logs_view com filtro por módulo, busca por texto e contagem por nível\n- [x] Melhorar logs.html com badges de contagem, auto-refresh e filtros avançados\n\n---\n\n## Contexto e referências\n\n- Admin Aurora: apps/admin_aurora/\n- Health check existente: /health/ (apps/sistema/views.py)\n- Models: LogSistema, LogIntegracao, Tenant, LeadProspecto, AtendimentoFluxo\n\n---\n\n## Resultado esperado\n\nPainel de monitoramento funcional com visão consolidada do sistema: status do banco, contagem de erros/warnings, métricas de leads e atendimentos, logs de integração HubSoft e últimos erros. Página de logs melhorada com busca, filtro por módulo e auto-refresh.\n"}, {"t": "f", "n": "Monitoramento Logging 30 03 2026", "fn": "monitoramento_logging_30-03-2026.md", "c": "---\nname: \"Monitoramento e Logging Estruturado\"\ndescription: \"O projeto possui apenas logs do Gunicorn e um model `LogIntegracao` para auditoria de integrações. Não há APM, alertas, \"\nprioridade: \"🟡 Média\"\nresponsavel: \"DevOps\"\n---\n\n# Monitoramento e Logging Estruturado — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** DevOps\n**Prioridade:** 🟡 Média\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nO projeto possui apenas logs do Gunicorn e um model `LogIntegracao` para auditoria de integrações. Não há APM, alertas, structured logging nem dashboard de monitoramento. Com multi-tenancy ativo, é crítico monitorar a saúde do sistema por tenant.\n\n---\n\n## Tarefas\n\n- [ ] Configurar logging estruturado no Django (JSON format)\n- [ ] Definir níveis de log por módulo (comercial, CS, integrações)\n- [ ] Implementar health check endpoint (/health/)\n- [ ] Configurar alertas para erros críticos (integrações HubSoft, falhas de API)\n- [ ] Avaliar ferramenta de APM (Sentry, Grafana ou similar)\n- [ ] Criar dashboard básico de monitoramento (uptime, erros, latência)\n- [ ] Monitorar métricas por tenant (uso, erros, volume)\n\n---\n\n## Contexto e referências\n\n- Model existente: `LogIntegracao` em `apps/integracoes/`\n- Gunicorn logs: `/var/log/gunicorn/robovendas/`\n\n---\n\n## Resultado esperado\n\nLogging estruturado em JSON, health check endpoint, alertas de erros críticos configurados. Visibilidade sobre a saúde do sistema em produção.\n"}, {"t": "f", "n": "Multi Tenancy 29 03 2026", "fn": "multi_tenancy_29-03-2026.md", "c": "---\nname: Implementar multi-tenancy no sistema\ndescription: Tenant, PerfilUsuario, TenantMixin, TenantManager, middleware com auto-filtro e auto-save\ntype: tarefa\nstatus: finalizada\ncriado_em: 29/03/2026\n---\n\n## Objetivo\n\nPermitir que múltiplos provedores usem o mesmo sistema com dados isolados.\n\n## Atividades\n\n- [x] Criar model Tenant (provedor, módulos, planos, trial, HubSoft)\n- [x] Criar model PerfilUsuario (substitui monkey-patch User.add_to_class)\n- [x] Criar TenantMixin (FK tenant + managers automáticos)\n- [x] Criar TenantManager (auto-filtra objects.all() por tenant do request)\n- [x] Criar TenantMiddleware (resolve tenant via thread-local)\n- [x] Todos os 27+ models herdam TenantMixin\n- [x] Auto-save: TenantMixin.save() preenche tenant automaticamente\n- [x] Escape hatch: all_tenants manager para admin/commands\n- [x] Seed do tenant Megalink + associação de users\n- [x] Isolamento testado com 3 tenants\n- [x] 16 testes automatizados passando\n\n## Contexto e referências\n\n- Reunião: docs/context/reunioes/multi_tenancy_29-03-2026.md\n- Settings local: gerenciador_vendas/settings_local.py (SQLite)\n\n## Resultado esperado\n\nMulti-tenancy funcionando localmente. Cada provedor só vê seus próprios dados.\n"}, {"t": "f", "n": "Padronizar Frontend Cs 29 03 2026", "fn": "padronizar_frontend_cs_29-03-2026.md", "c": "---\nname: \"Padronizar frontend do módulo CS\"\ndescription: \"Os templates do módulo CS (clube, parceiros, indicacoes, carteirinha) foram migrados do megaroleta e ainda usam o layout\"\nprioridade: \"🟡 Média\"\nresponsavel: \"CTO\"\n---\n\n# Padronizar frontend do módulo CS — 29/03/2026\n\n**Data:** 29/03/2026\n**Responsável:** CTO\n**Prioridade:** 🟡 Média\n**Status:** 🔧 Em andamento\n\n---\n\n## Descrição\n\nOs templates do módulo CS (clube, parceiros, indicacoes, carteirinha) foram migrados do megaroleta e ainda usam o layout antigo (base.html próprio com topbar/sidebar do megaroleta). O `extends` já foi trocado para `vendas_web/base.html`, mas os estilos internos (CSS inline, classes, cores) ainda não seguem o design system do hub.\n\nPadronizar para usar as classes e variáveis CSS do hub (mesma abordagem aplicada no CRM).\n\n---\n\n## Tarefas\n\n- [ ] Padronizar templates do clube/dashboard (home, premios, participantes, gamificacao, banners, config, etc.)\n- [ ] Padronizar templates do parceiros/dashboard (home, parceiros, cupons, cupom_detalhe)\n- [ ] Padronizar templates do indicacoes/dashboard (home, indicacoes, visual)\n- [ ] Padronizar templates do carteirinha/dashboard (home, modelos, regras, preview)\n- [ ] Garantir que modais usem .modal-overlay com display:none\n- [ ] Remover referências a cores hardcoded, usar CSS variables\n\n---\n\n## Contexto e referências\n\n- Design system: `vendas_web/static/vendas_web/css/dashboard.css`\n- Variáveis: --primary (#3b82f6), --bg-page (#f8fafc), --border (#e5e7eb), etc.\n- Classes: .page-header, .page-title, .stats-grid, .stat-card, .admin-table, .btn-primary, .btn-secondary, .card, .modal-overlay\n- CRM já padronizado como referência\n\n---\n\n## Resultado esperado\n\nTodas as páginas do módulo CS com visual consistente com o restante do hub (Comercial, CRM, Dashboard). Sem gradientes roxos, sem CSS inline extenso, usando variáveis e classes do design system.\n"}, {"t": "f", "n": "Permissoes Usuario 05 04 2026", "fn": "permissoes_usuario_05-04-2026.md", "c": "# Tarefa: Sistema de Permissões por Módulo/Papel/Escopo\n\n**Data:** 05/04/2026\n**Status:** Em andamento\n**Prioridade:** Alta\n\n---\n\n## Objetivo\n\nImplementar controle granular de permissões com 3 camadas: módulo (acesso sim/não), papel (role dentro do módulo) e escopo (visibilidade de dados).\n\n## Escopo\n\n1. Model `PermissaoUsuario` com flags por módulo e papel\n2. Decorator `@permissao_required` para views\n3. Filtro de escopo nos querysets (meus/equipe/todos)\n4. Sidebar filtrada por permissões\n5. Tela de gestão de permissões (na página de usuários existente)\n\n## Papéis por módulo\n\n- Comercial: vendedor, supervisor, gerente\n- Marketing: analista, gerente\n- CS: operador, gerente\n- Inbox: agente, supervisor, gerente\n- Configurações: acesso sim/não (só admin)\n"}, {"t": "f", "n": "Pii Logs Print 30 03 2026", "fn": "pii_logs_print_30-03-2026.md", "c": "---\nname: \"Remover PII de Logs e Print Statements\"\ndescription: \"Existem `print()` em `vendas_web/views.py` que expõem email e telefone de leads em stdout. Logs de produção podem conter\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / Segurança (AppSec)\"\n---\n\n# Remover PII de Logs e Print Statements — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / Segurança (AppSec)\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nExistem `print()` em `vendas_web/views.py` que expõem email e telefone de leads em stdout. Logs de produção podem conter dados pessoais (CPF, telefone, email) sem mascaramento, violando boas práticas de LGPD.\n\n---\n\n## Tarefas\n\n- [ ] Remover todos os `print()` com PII em `vendas_web/views.py` (linhas 2557, 2648, 2700)\n- [ ] Substituir por `logging.debug()` com ID do lead (sem dados pessoais)\n- [ ] Buscar outros `print()` no projeto inteiro e substituir por logging\n- [ ] Implementar filtro de PII no logging (mascarar CPF, email, telefone)\n- [ ] Verificar que `LogIntegracao` não armazena PII no campo `payload_enviado`\n\n---\n\n## Contexto e referências\n\n- Arquivo: `vendas_web/views.py`, linhas 2557-2701\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nZero PII em logs e stdout. Logging estruturado com `logging` module. Filtro de mascaramento ativo.\n"}, {"t": "f", "n": "Rate Limiting 30 03 2026", "fn": "rate_limiting_30-03-2026.md", "c": "---\nname: \"Implementar Rate Limiting\"\ndescription: \"Nenhum endpoint possui rate limiting. APIs públicas (cadastro, consulta CEP) e webhooks podem ser abusados com enumeraçã\"\nprioridade: \"🟠 Alta\"\nresponsavel: \"Dev / DevOps\"\n---\n\n# Implementar Rate Limiting — 30/03/2026\n\n**Data:** 30/03/2026\n**Responsável:** Dev / DevOps\n**Prioridade:** 🟠 Alta\n**Status:** ⏳ Aguardando\n\n---\n\n## Descrição\n\nNenhum endpoint possui rate limiting. APIs públicas (cadastro, consulta CEP) e webhooks podem ser abusados com enumeração massiva, scraping de dados ou ataques de força bruta. Sem limitação, um atacante pode extrair toda a base de leads.\n\n---\n\n## Tarefas\n\n- [ ] Instalar django-ratelimit ou throttling do DRF\n- [ ] Definir limites por categoria:\n  - APIs públicas: 10 req/min por IP\n  - Webhooks N8N: 100 req/min por IP\n  - APIs do painel: 60 req/min por usuário\n  - Login: 5 tentativas/min por IP\n- [ ] Aplicar nos endpoints críticos (registrar_lead, cadastro, login, webhooks)\n- [ ] Retornar 429 Too Many Requests quando exceder\n- [ ] Logar tentativas que excedem o limite (alerta de possível ataque)\n- [ ] Testar que uso normal não é bloqueado\n\n---\n\n## Contexto e referências\n\n- Projeto inteiro não possui rate limiting\n- Scan de segurança realizado em 30/03/2026\n\n---\n\n## Resultado esperado\n\nRate limiting ativo em todos os endpoints. Proteção contra brute force, scraping e DoS.\n"}, {"t": "f", "n": "Recuperacao Pos Trial 27 03 2026", "fn": "recuperacao_pos_trial_27-03-2026.md", "c": "---\nname: Régua de Recuperação Pós-Trial\ndescription: Definir a sequência de mensagens e oferta especial para ISPs que não converteram após os 14 dias de trial\ntype: tarefa\nstatus: finalizada\ncriado_em: 27/03/2026\n---\n\n## Objetivo\n\nRecuperar prospects que testaram o produto, não converteram no trial e estão em momento de decisão. A oferta especial fica reservada para esse momento, não durante o trial.\n\n## Contexto\n\nDurante o trial o foco é ativação e valor. A oferta de recuperação é mais estratégica: o prospect já conhece o produto, já viu funcionar, só não fechou. Uma oferta nesse momento tem muito mais impacto do que um desconto durante o trial.\n\n## Atividades\n\n- [x] Definir segmentação: usou o trial × não usou o trial\n- [x] Definir escalada de ofertas (D+7 ao D+30, crescente por segmento)\n- [x] Definir prazo do ciclo: 30 dias. Após isso, nurturing passivo.\n- [x] Documentar estrutura em exports/drafts/email/regua_recuperacao_pos_trial_estrutura.md\n- ↗️ Escrever textos → task separada: textos_regua_recuperacao_27-03-2026.md\n\n## Responsável\n\nPMM cria e executa. Parceiro entra se necessário para contato relacional.\n"}, {"t": "f", "n": "Refatoracao Apps 29 03 2026", "fn": "refatoracao_apps_29-03-2026.md", "c": "---\nname: \"Refatoração em apps + Multi-tenancy + Segurança\"
