es confidenciais a que tiverem acesso em razГЈo deste contrato, durante a vigГӘncia e por **2 (dois) anos** apГіs seu tГ©rmino.\n\n10.2. SГЈo consideradas informaГ§Гөes confidenciais: dados de clientes, leads, estratГ©gias comerciais, dados financeiros, credenciais de acesso, e quaisquer informaГ§Гөes tГ©cnicas ou comerciais nГЈo pГәblicas.\n\n---\n\n## CLГҒUSULA 11ВӘ вҖ” DA LIMITAГҮГғO DE RESPONSABILIDADE\n\n11.1. A responsabilidade total da CONTRATADA sob este contrato, por qualquer causa, estarГЎ limitada ao valor total pago pela CONTRATANTE nos **12 (doze) meses** anteriores ao evento que deu causa Г  responsabilidade.\n\n11.2. A CONTRATADA nГЈo serГЎ responsГЎvel por danos indiretos, incidentais, consequenciais ou lucros cessantes.\n\n11.3. A CONTRATADA nГЈo se responsabiliza por indisponibilidades decorrentes de: (a) caso fortuito ou forГ§a maior; (b) falhas de conectividade da CONTRATANTE; (c) uso indevido da plataforma; (d) indisponibilidade de serviГ§os de terceiros (incluindo o ERP HubSoft).\n\n---\n\n## CLГҒUSULA 12ВӘ вҖ” DO SUPORTE TГүCNICO\n\n12.1. A CONTRATADA fornecerГЎ suporte tГ©cnico nos seguintes termos:\n\n| Item | CondiГ§ГЈo |\n|------|----------|\n| **Canal** | WhatsApp, e-mail e plataforma de tickets |\n| **HorГЎrio** | Segunda a sexta, 8h Г s 18h |\n| **Primeira resposta** | AtГ© 4 horas Гәteis |\n| **ResoluГ§ГЈo** | AtГ© 24 horas Гәteis (prioridade normal) |\n| **ResoluГ§ГЈo crГӯtica** | AtГ© 4 horas Гәteis (sistema indisponГӯvel) |\n\n12.2. SolicitaГ§Гөes fora do horГЎrio comercial serГЈo atendidas no prГіximo dia Гәtil, exceto em caso de indisponibilidade total do sistema.\n\n---\n\n## CLГҒUSULA 13ВӘ вҖ” DO FORO\n\n13.1. Fica eleito o foro da Comarca de **Teresina/PI** para dirimir quaisquer dГәvidas ou controvГ©rsias oriundas do presente contrato, com renГәncia expressa de qualquer outro, por mais privilegiado que seja.\n\n---\n\nE por estarem assim justas e contratadas, as partes firmam o presente instrumento em 2 (duas) vias de igual teor e forma, na presenГ§a de 2 (duas) testemunhas.\n\n&nbsp;\n\nTeresina/PI, 01 de abril de 2026.\n\n&nbsp;\n\n---\n\n**CONTRATANTE**\n\nGRUPO MAGISTER DE ENSINO SUPERIOR LTDA\nCNPJ: 01.993.025/0001-04\n\n&nbsp;\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n**Gislan Vieira de Sousa**\nSГіcio\n\n&nbsp;\n\n---\n\n**CONTRATADA**\n\nPSBR CONSULTORIA EMPRESARIAL LTDA\nCNPJ: 41.312.673/0001-64\n\n&nbsp;\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n**Paulo SГ©rgio Barbosa Rodrigues**\nSГіcio\n\n&nbsp;\n\n---\n\n**TESTEMUNHAS:**\n\n&nbsp;\n\n1. \\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n   Nome:\n   CPF:\n\n&nbsp;\n\n2. \\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n   Nome:\n   CPF:\n"}]}, {"t": "f", "n": "Implementacao Aurora 05 04 2026", "fn": "implementacao_aurora_05-04-2026.md", "c": "# ImplementaГ§ГЈo Aurora вҖ” Primeiro Cliente\n\n**Data inГӯcio:** 05/04/2026\n**Гҡltima atualizaГ§ГЈo:** 06/04/2026\n**Status:** рҹ”§ Em andamento\n**Cliente:** AuroraISP (nГіs mesmos)\n**WhatsApp:** Uazapi (consulteplus.uazapi.com)\n**ERP:** Nenhum (por enquanto)\n\n---\n\n## Objetivo\n\nUsar a prГіpria plataforma Aurora para gerenciar leads, atendimento e vendas da AuroraISP. O primeiro cliente do produto Г© o prГіprio produto.\n\n---\n\n## Stack de integraГ§ГЈo\n\n```\nCliente (WhatsApp)\n    в”Ӯ\n    в–ј\nUazapi (consulteplus.uazapi.com)\n    в”Ӯ\n    в”ңв”Җв”Җ Webhook вҶ’ Aurora /inbox/api/webhook/uazapi/{canal_id}/\n    в”Ӯ              (Provider Pattern, escalГЎvel)\n    в”Ӯ\n    в””в”Җв”Җ API вҶҗ Aurora envia mensagens\n              POST /send/text  {number, text}\n              POST /send/media {number, type, file}\n              POST /send/menu  {number, type, choices}\n```\n\n**Sem ERP:** Leads e oportunidades ficam apenas no Aurora.\n**Sem N8N:** IntegraГ§ГЈo direta Aurora вҶ” Uazapi via Provider Pattern.\n\n---\n\n## Fase 1 вҖ” Tenant Aurora вң… ConcluГӯda\n\n### 1.1 Tenant criado\n\nTenant \"Aurora HQ\" (slug: `aurora-hq`, ID: 3) com plano full_pro.\n\n### 1.2 Seeds executados\n\n```bash\npython manage.py seed_planos          # 9 planos, 115 features\npython manage.py seed_funcionalidades # 35 funcionalidades\npython manage.py seed_perfis          # 11 perfis padrГЈo por tenant\n```\n\n### 1.3 ConfiguraГ§Гөes вң…\n\n- [x] ConfiguracaoEmpresa (logo Aurora, cores da marca)\n- [x] Perfis de permissГЈo (11 perfis padrГЈo criados)\n- [ ] Pipeline personalizado para venda de SaaS\n- [ ] ConfiguracaoCRM (pipeline padrГЈo, estГЎgios)\n\n### 1.4 Pipeline sugerido para venda SaaS\n\n| Ordem | Nome | Tipo | Probabilidade |\n|-------|------|------|---------------|\n| 1 | Lead Inbound | novo | 10% |\n| 2 | Primeiro Contato | qualificacao | 20% |\n| 3 | Demo Agendada | qualificacao | 40% |\n| 4 | Demo Realizada | negociacao | 60% |\n| 5 | Proposta Enviada | negociacao | 75% |\n| 6 | NegociaГ§ГЈo | fechamento | 85% |\n| 7 | Fechado Ganho | cliente | 100% |\n| 8 | Perdido | perdido | 0% |\n\n---\n\n## Fase 2 вҖ” IntegraГ§ГЈo Uazapi вң… ConcluГӯda\n\n### 2.1 Dados da instГўncia\n\n| Item | Valor | Status |\n|------|-------|--------|\n| URL base da API | `https://consulteplus.uazapi.com` | вң… Configurado |\n| Token da instГўncia | `9ef0cf61-87b3-444a-8769-07b0b74563e5` | вң… Em configuracoes_extras |\n| NГәmero WhatsApp | `553181167572` | вң… Conectado |\n| Nome da instГўncia | `AuroraISP` | вң… |\n| IntegracaoAPI ID | `1` (tipo=uazapi, tenant=Aurora HQ) | вң… |\n| CanalInbox ID | `6` (tipo=whatsapp, provedor=uazapi) | вң… |\n| Webhook URL | `/inbox/api/webhook/uazapi/6/` | вң… Configurado no Uazapi |\n\n### 2.2 Arquitetura implementada (Provider Pattern)\n\n```\napps/inbox/providers/\n    __init__.py          # Registry + get_provider(canal) factory\n    base.py              # BaseProvider ABC\n    uazapi.py            # UazapiProvider (wraps UazapiService)\n    webhook.py           # GenericWebhookProvider (fallback N8N)\n```\n\nPara adicionar novo provider (ex: Evolution API): criar `evolution.py` com `@register_provider`. Zero mudanГ§as em services.py ou views.py.\n\n### 2.3 Endpoints implementados no UazapiService\n\n**Headers:** `Content-Type: application/json`, `Accept: application/json`, `token: TOKEN`\n\n#### Enviar mensagens (Aurora вҶ’ Uazapi)\n\n| MГ©todo | Endpoint | Body | Status |\n|--------|----------|------|--------|\n| `enviar_texto` | POST `/send/text` | `{number, text}` | вң… Testado |\n| `enviar_midia` | POST `/send/media` | `{number, type, file, caption?, docName?}` | вң… Implementado |\n| `enviar_imagem` | via `/send/media` type=image | | вң… |\n| `enviar_documento` | via `/send/media` type=document | | вң… |\n| `enviar_audio` | via `/send/media` type=audio | | вң… |\n| `enviar_video` | via `/send/media` type=video | | вң… |\n| `enviar_sticker` | via `/send/media` type=sticker | | вң… |\n| `enviar_voz` | via `/send/media` type=ptt | | вң… |\n| `enviar_menu` | POST `/send/menu` | `{number, type, text, choices, ...}` | вң… Implementado |\n| `enviar_botoes` | via `/send/menu` type=button | | вң… |\n| `enviar_lista` | via `/send/menu` type=list | | вң… |\n| `enviar_enquete` | via `/send/menu` type=poll | | вң… |\n| `enviar_carrossel` | via `/send/menu` type=carousel | | вң… |\n| `enviar_vcard` | POST `/send/contact` | `{number, contactName, contactPhone}` | вң… |\n| `enviar_localizacao` | POST `/send/location` | `{number, lat, lng, name, address}` | вң… |\n| `enviar_presenca` | POST `/send/presence` | `{number, type}` | вң… |\n| `enviar_botao_pix` | POST `/send/pix` | `{number, key, amount, description}` | вң… |\n| `solicitar_localizacao` | POST `/send/requestLocation` | `{number, text}` | вң… |\n| `solicitar_pagamento` | POST `/send/requestPayment` | `{number, amount, description}` | вң… |\n| `enviar_story_texto` | POST `/send/stories` | `{type:text, text, backgroundColor}` | вң… |\n| `enviar_story_midia` | POST `/send/stories` | `{type, file, caption}` | вң… |\n\n#### Consultas\n\n| MГ©todo | Endpoint | Status |\n|--------|----------|--------|\n| `status_instancia` | GET `/instance/status` | вң… Testado |\n| `verificar_numero` | POST `/misc/checkNumber` | вң… |\n| `marcar_como_lido` | POST `/chat/markAsRead` | вң… |\n\n#### Receber mensagens (Uazapi вҶ’ Aurora via Webhook)\n\nFormato real do payload Uazapi:\n\n```json\n{\n    \"BaseUrl\": \"https://consulteplus.uazapi.com\",\n    \"EventType\": \"messages\",\n    \"chat\": {\n        \"phone\": \"+55 53 8152-1653\",\n        \"wa_chatid\": \"555381521653@s.whatsapp.net\",\n        \"wa_contactName\": \"Nome do Contato\",\n        \"name\": \"Nome\"\n    },\n    \"message\": {\n        \"text\": \"oi\",\n        \"messageType\": \"Conversation\",\n        \"fromMe\": false,\n        \"messageid\": \"3EB016C93EBA029158EF14\",\n        \"senderName\": \"Nome do Contato\",\n        \"chatid\": \"555381521653@s.whatsapp.net\"\n    },\n    \"token\": \"9ef0cf61-87b3-444a-8769-07b0b74563e5\"\n}\n```\n\n**UazapiProvider.parse_webhook** suporta dois formatos:\n1. Formato Uazapi real (`EventType`, `message.text`, `chat.phone`)\n2. Formato Baileys/legacy (`event`, `data.key.remoteJid`, `data.message.conversation`)\n\n### 2.4 Testes realizados\n\n| Teste | Resultado |\n|-------|-----------|\n| Testar conexГЈo (botГЈo na pГЎgina de integraГ§Гөes) | вң… Uazapi conectado |\n| Receber mensagem via webhook (WhatsApp вҶ’ Inbox) | вң… Mensagem aparece no Inbox |\n| Enviar mensagem texto (Inbox вҶ’ WhatsApp) | вң… Mensagem chega no WhatsApp |\n| Resolver conversa (nГЈo aparece mais no inbox) | вң… |\n\n### 2.5 Problemas encontrados e resolvidos\n\n| Problema | Causa | SoluГ§ГЈo |\n|----------|-------|---------|\n| 404 no webhook | Uazapi envia sem barra final, APPEND_SLASH=False | Adicionada rota sem barra |\n| 400 Bad Request | Payload Uazapi diferente do esperado (nГЈo Г© Baileys) | Implementado `_parse_uazapi_format` |\n| 401 Invalid token no envio | Campo `access_token` criptografado com chave diferente | Token salvo em `configuracoes_extras` |\n| 400 Missing required fields | Uazapi usa `number`/`text` em vez de `phone`/`message` | Corrigido no UazapiService |\n| DisallowedHost | DomГӯnio ngrok nГЈo no ALLOWED_HOSTS | `ALLOWED_HOSTS = ['*']` no settings_local |\n\n---\n\n## Fase 3 вҖ” ConfiguraГ§ГЈo do Inbox рҹ”§ Em andamento\n\n- [x] Canal WhatsApp Aurora criado (ID 6, provedor=uazapi)\n- [x] Accordion colapsГЎvel no painel de contexto\n- [x] Conversas anteriores do contato\n- [x] Emoji picker inline\n- [x] BotГЈo anexar arquivo\n- [x] Equipe, prioridade e etiquetas funcionando\n- [x] Conversas resolvidas nГЈo aparecem por padrГЈo\n- [x] Menu sidebar reorganizado (Suporte unificado)\n- [ ] Criar equipe \"Vendas Aurora\"\n- [ ] Criar fila \"WhatsApp\" vinculada Г  equipe\n- [ ] Configurar horГЎrio de atendimento\n- [ ] Criar respostas rГЎpidas (saudaГ§ГЈo, preГ§o, agendar demo)\n- [ ] Configurar mensagem fora do horГЎrio\n\n---\n\n## Fase 4 вҖ” CRM e Pipeline (pendente)\n\n- [ ] Pipeline \"Vendas SaaS\" com 8 estГЎgios\n- [ ] Tags: Provedor Pequeno, Provedor MГ©dio, Provedor Grande, HubSoft, MK, IXC\n- [ ] Criar equipe de vendas\n- [ ] Configurar auto-criaГ§ГЈo de oportunidade (score >= 7)\n\n---\n\n## Fase 5 вҖ” AutomaГ§Гөes bГЎsicas (pendente)\n\n- [ ] Lead criado вҶ’ NotificaГ§ГЈo no sistema\n- [ ] Lead sem contato 2 dias вҶ’ Alerta\n- [ ] Oportunidade movida para \"Demo Agendada\" вҶ’ NotificaГ§ГЈo\n- [ ] Oportunidade em \"Proposta Enviada\" hГЎ 5 dias вҶ’ Follow-up\n\n---\n\n## Fase 6 вҖ” Marketing (pendente)\n\n- [ ] Campanha \"OrgГўnico LinkedIn\"\n- [ ] Campanha \"OrgГўnico WhatsApp\"\n- [ ] Campanha \"IndicaГ§ГЈo\"\n- [ ] Segmento \"Leads com HubSoft\" (para direcionar pitch)\n\n---\n\n## Checklist de implementaГ§ГЈo\n\n```\nINFRA\n  [x] Tenant Aurora criado (Aurora HQ, ID 3)\n  [x] Seeds rodados (planos, funcionalidades, perfis)\n  [ ] UsuГЎrios criados com perfis de permissГЈo\n  [ ] Deploy em servidor\n\nUAZAPI\n  [x] UazapiService criado (20+ endpoints)\n  [x] IntegracaoAPI criada (ID 1, tipo=uazapi)\n  [x] Provider Pattern implementado (escalГЎvel multi-provider)\n  [x] Webhook receiver criado e testado\n  [x] Canal WhatsApp criado (ID 6, provedor=uazapi)\n  [x] Testar envio de mensagem вң…\n  [x] Testar recebimento de mensagem via webhook вң…\n\nINBOX\n  [x] Mensagens chegam e sГЈo respondidas via WhatsApp\n  [x] Accordion, emoji, anexos, conversas anteriores\n  [x] Equipe/prioridade/etiquetas salvam\n  [ ] Equipe e fila configuradas\n  [ ] Respostas rГЎpidas criadas\n  [ ] HorГЎrio de atendimento configurado\n\nCRM\n  [ ] Pipeline SaaS criado\n  [ ] Tags criadas\n  [ ] Equipe de vendas configurada\n\nAUTOMAГҮГ•ES\n  [ ] Regras bГЎsicas criadas no editor visual\n\nMARKETING\n  [ ] Campanhas cadastradas\n  [ ] Segmentos configurados\n```\n\n---\n\n## DecisГөes tomadas\n\n| DecisГЈo | Resultado |\n|---------|-----------|\n| Usar N8N como middleware? | **NГЈo.** IntegraГ§ГЈo direta via Provider Pattern. |\n| Formato de autenticaГ§ГЈo Uazapi | Header `token: TOKEN` |\n| Formato de payload envio | `{number, text}` para texto, `{number, type, file}` para mГӯdia |\n| Escalabilidade multi-provider | Provider Pattern implementado. Novo provider = 1 arquivo. |\n\n## DecisГөes pendentes\n\n| DecisГЈo | OpГ§Гөes | Status |\n|---------|--------|--------|\n| Bot de atendimento automГЎtico? | Sim (fluxo de qualificaГ§ГЈo) vs NГЈo (sГі inbox manual) | Decidir |\n| DomГӯnio do painel | app.auroraisp.com.br ou outro | Decidir |\n| Deploy | VPS, Docker, ou cloud | Decidir |\n"}, {"t": "f", "n": "Implementacao Cliente", "fn": "implementacao_cliente.md", "c": "# Guia de ImplementaГ§ГЈo вҖ” Novo Cliente AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 04/04/2026\n**ResponsГЎvel:** OperaГ§Гөes / Tech Lead\n\n---\n\n## Resumo\n\nEste documento mapeia tudo que precisa ser configurado para ativar um novo provedor na plataforma AuroraISP. O processo Г© dividido em 9 fases, da criaГ§ГЈo do tenant ao go-live.\n\n**Tempo estimado:** 2 a 4 horas (dependendo da complexidade da integraГ§ГЈo HubSoft).\n\n---\n\n## PrГ©-requisitos\n\nAntes de iniciar, coletar com o provedor:\n\n| Item | DescriГ§ГЈo | ObrigatГіrio |\n|------|-----------|-------------|\n| Nome da empresa | RazГЈo social ou nome fantasia | Sim |\n| CNPJ | Formatado (XX.XXX.XXX/XXXX-XX) | Sim |\n| Slug | Identificador URL-friendly (ex: megalink, provnet) | Sim |\n| Plano contratado | MГіdulos + tier (ex: Comercial Pro + CS Start) | Sim |\n| ERP do provedor | Qual ERP usa + credenciais de API | Sim |\n| Plataforma de atendimento | Qual plataforma WhatsApp usa + credenciais | Sim |\n| Logo | Imagem PNG/SVG (mГӯnimo 200x200px) | Sim |\n| Cores da marca | PrimГЎria e secundГЎria (hex) | Sim |\n| Planos de internet | Nome, velocidade, preГ§o de cada plano | Sim |\n| Dias de vencimento | Quais dias o provedor oferece (ex: 5, 10, 15, 20) | Sim |\n| Admin do provedor | Nome, e-mail, telefone, senha desejada | Sim |\n| Equipe de vendas | Nomes e e-mails dos vendedores (se CRM) | Se plano Pro |\n| Contrato/Termos | Texto do contrato de adesГЈo (se usar cadastro pГәblico) | Opcional |\n| WhatsApp suporte | NГәmero do WhatsApp de atendimento | Opcional |\n\n---\n\n## Fase 1 вҖ” Criar Tenant\n\n### Via comando (recomendado)\n\n```bash\ncd robo/dashboard_comercial/gerenciador_vendas\n\npython manage.py criar_tenant \\\n  --nome \"Nome do Provedor\" \\\n  --slug \"slug-provedor\" \\\n  --cnpj \"12.345.678/0001-90\" \\\n  --plano comercial_pro \\\n  --admin-user admin_provedor \\\n  --admin-email admin@provedor.com \\\n  --admin-senha SenhaSegura123 \\\n  --admin-telefone \"85988881234\" \\\n  --trial \\\n  --settings=gerenciador_vendas.settings_local\n```\n\n**OpГ§Гөes de plano:**\n\n| Flag | MГіdulos | Tier |\n|------|---------|------|\n| `comercial_starter` | Comercial | Starter |\n| `comercial_start` | Comercial | Start |\n| `comercial_pro` | Comercial | Pro |\n| `full_start` | Comercial + Marketing + CS | Start |\n| `full_pro` | Comercial + Marketing + CS | Pro |\n\n**O que o comando cria automaticamente:**\n- Registro do Tenant\n- UsuГЎrio admin (Django User)\n- PerfilUsuario vinculando usuГЎrio ao tenant\n- ConfiguracaoEmpresa (config visual bГЎsica)\n\n### Via Admin Aurora\n\nURL: `/aurora-admin/tenants/criar/`\nAcesso: superuser only. FormulГЎrio web com validaГ§ГЈo de slug e username.\n\n### Campos do Tenant\n\n| Campo | Tipo | Default | DescriГ§ГЈo |\n|-------|------|---------|-----------|\n| `nome` | CharField(200) | вҖ” | Nome do provedor |\n| `cnpj` | CharField(18) | вҖ” | CNPJ (unique) |\n| `slug` | SlugField | вҖ” | Identificador URL (unique) |\n| `modulo_comercial` | Boolean | True | Habilita mГіdulo Comercial |\n| `modulo_marketing` | Boolean | False | Habilita mГіdulo Marketing |\n| `modulo_cs` | Boolean | False | Habilita mГіdulo CS |\n| `plano_comercial` | CharField | starter | starter, start, pro |\n| `plano_marketing` | CharField | starter | starter, start, pro |\n| `plano_cs` | CharField | starter | starter, start, pro |\n| `hubspot_url` | URLField | вҖ” | URL base da API HubSoft |\n| `em_trial` | Boolean | False | Se estГЎ em trial |\n| `trial_inicio` / `trial_fim` | DateField | вҖ” | PerГӯodo do trial |\n| `ativo` | Boolean | True | Ativo/inativo |\n\n---\n\n## Fase 2 вҖ” VariГЎveis de Ambiente\n\nConfigurar no `.env` do servidor (ou painel de deploy):\n\n### ObrigatГіrias\n\n```env\n# Django\nSECRET_KEY=django-insecure-gerar-chave-unica-aqui\nDEBUG=False\nALLOWED_HOSTS=dominio-provedor.com.br,localhost\n\n# Banco de dados\nDB_NAME=robovendas\nDB_USER=admin\nDB_PASSWORD=senha-forte\nDB_HOST=localhost\nDB_PORT=5432\n\n# SeguranГ§a\nWEBHOOK_SECRET_TOKEN=token-longo-aleatorio\nSECURE_SSL_REDIRECT=True\nSESSION_COOKIE_SECURE=True\nCSRF_COOKIE_SECURE=True\n\n# Site\nSITE_URL=https://dominio-provedor.com.br\n```\n\n### IntegraГ§Гөes\n\n```env\n# HubSoft API (OAuth)\nHUBSOFT_BASE_URL=https://api.hubsoft.com.br/v1\nHUBSOFT_CLIENT_ID=id-do-cliente\nHUBSOFT_CLIENT_SECRET=secret-do-cliente\nHUBSOFT_USERNAME=usuario-api\nHUBSOFT_PASSWORD=senha-api\n\n# HubSoft Database (read-only, para CS)\nHUBSOFT_DB_USER=readonly_user\nHUBSOFT_DB_PASSWORD=senha-db\nHUBSOFT_DB_HOST=ip-do-hubsoft\nHUBSOFT_DB_PORT=9432\nHUBSOFT_DB_NAME=hubsoft\n\n# N8N (automaГ§Гөes)\nN8N_WEBHOOK_URL=https://n8n.aurora.consulteplus.com/webhook/notifications\nN8N_API_KEY=chave-api-n8n\n\n# Matrix (WhatsApp)\nMATRIX_API_URL=https://provedor.matrixdobrasil.ai/rest/v1/atendimento\nMATRIX_API_TOKEN=token-matrix\n```\n\n---\n\n## Fase 3 вҖ” Dados Iniciais (Seed)\n\n### 3.1 Planos e Features (obrigatГіrio, uma vez por instГўncia)\n\n```bash\npython manage.py seed_planos --settings=gerenciador_vendas.settings_local\n```\n\nCria 9 planos (3 por mГіdulo) com 115 features mapeadas.\n\n### 3.2 Planos de Internet do provedor\n\nCadastrar via Django Admin ou popular_sistema_completo.py:\n\n| Campo | Exemplo |\n|-------|---------|\n| nome | Fibra 400MB |\n| velocidade_download | 400 |\n| velocidade_upload | 200 |\n| valor_mensal | 99.90 |\n| destaque | popular |\n| id_sistema_externo | ID do plano no HubSoft |\n| ordem_exibicao | 2 |\n\n### 3.3 OpГ§Гөes de Vencimento\n\n| Campo | Exemplo |\n|-------|---------|\n| dia | 10 |\n| descricao | 10Вә dia de cada mГӘs |\n| id_sistema_externo | ID no HubSoft |\n| ativo | True |\n\n### 3.4 Pipeline de Vendas (CRM)\n\nCriar pipeline padrГЈo com estГЎgios:\n\n| Ordem | Nome | Tipo | Probabilidade | Final? |\n|-------|------|------|---------------|--------|\n| 1 | Novo Lead | novo | 10% | вҖ” |\n| 2 | Qualificado | qualificacao | 30% | вҖ” |\n| 3 | DocumentaГ§ГЈo | negociacao | 60% | вҖ” |\n| 4 | Contrato | fechamento | 85% | вҖ” |\n| 5 | Ativado HubSoft | cliente | 100% | Ganho |\n| 6 | Perdido | perdido | 0% | Perdido |\n\n### 3.5 CS вҖ” NГӯveis do Clube (se mГіdulo CS ativo)\n\n| Ordem | Nome | XP NecessГЎrio |\n|-------|------|---------------|\n| 1 | Iniciante | 0 |\n| 2 | Bronze | 100 |\n| 3 | Prata | 500 |\n| 4 | Ouro | 1.000 |\n| 5 | Diamante | 5.000 |\n\n### 3.6 CS вҖ” Regras de PontuaГ§ГЈo\n\n| Gatilho | Nome | Saldo | XP | Limite |\n|---------|------|-------|----|----|\n| cadastro | BГҙnus de Boas Vindas | 20 | 10 | 1Г— |\n| telefone_verificado | Telefone Verificado | 10 | 5 | 1Г— |\n| indicacao_convertida | IndicaГ§ГЈo Convertida | 30 | 15 | Ilimitado |\n\n### 3.7 Seed completo (dev/demonstraГ§ГЈo)\n\n```bash\npython popular_sistema_completo.py\n```\n\nCria dados de demonstraГ§ГЈo: 5 planos, 5 vencimentos, campanhas, pipeline + estГЎgios, tags CRM, equipe de vendas, 30 leads, oportunidades, tarefas, membros do clube, tickets de suporte.\n\n---\n\n## Fase 4 вҖ” ConfiguraГ§Гөes por MГіdulo\n\n### 4.1 Comercial вҖ” ConfiguracaoCRM\n\nAcessГӯvel em: ConfiguraГ§Гөes do CRM (painel) ou Django Admin.\n\n| Campo | O que configurar | Default |\n|-------|------------------|---------|\n| `pipeline_padrao` | Pipeline principal de vendas | **ObrigatГіrio** |\n| `estagio_inicial_padrao` | EstГЎgio onde novos leads entram | **ObrigatГіrio** |\n| `criar_oportunidade_automatico` | Auto-criar oportunidade quando lead qualifica | True |\n| `score_minimo_auto_criacao` | Score mГӯnimo para auto-criaГ§ГЈo | 7 |\n| `sla_alerta_horas_padrao` | SLA em horas | 48 |\n| `webhook_n8n_nova_oportunidade` | URL do webhook N8N | Opcional |\n| `webhook_n8n_mudanca_estagio` | URL do webhook N8N | Opcional |\n| `webhook_n8n_tarefa_vencida` | URL do webhook N8N | Opcional |\n\n### 4.2 Comercial вҖ” ConfiguracaoCadastro\n\nAcessГӯvel em: Marketing > ConfiguraГ§Гөes > Cadastro (painel).\n\n| Grupo | O que configurar |\n|-------|------------------|\n| **Visual** | titulo_pagina, subtitulo, logo_url, cores (primary, secondary, success, error), background_type |\n| **Contato** | telefone_suporte, whatsapp_suporte, email_suporte |\n| **Campos** | cpf_obrigatorio, email_obrigatorio, telefone_obrigatorio, endereco_obrigatorio |\n| **ValidaГ§Гөes** | validar_cep (ViaCEP), validar_cpf |\n| **DocumentaГ§ГЈo** | solicitar_documentacao, textos de instruГ§ГЈo, tamanho_max_arquivo_mb, formatos_aceitos |\n| **Contrato** | exibir_contrato, titulo_contrato, texto_contrato, tempo_minimo_leitura_segundos |\n| **IDs externos** | id_origem (HubSoft), id_origem_servico, id_vendedor (RP) |\n| **Fluxo** | criar_lead_automatico, numero_etapas, mostrar_progress_bar |\n\n### 4.3 Marketing вҖ” Campanhas\n\nCriar campanhas de trГЎfego conforme canais usados pelo provedor:\n\n| Campo | Exemplo |\n|-------|---------|\n| nome | Google Ads Institucional |\n| codigo | google-institucional |\n| palavra_chave | google-institucional |\n| tipo_match | parcial |\n| plataforma | google_ads |\n| prioridade | 5 |\n\n### 4.4 CS вҖ” RoletaConfig\n\n| Campo | O que configurar | Default |\n|-------|------------------|---------|\n| `nome_clube` | Nome do programa de fidelidade | \"Clube MegaLink\" |\n| `custo_giro` | Pontos para girar a roleta | 10 |\n| `xp_por_giro` | XP ganho por giro | 5 |\n| `limite_giros_por_membro` | MГЎximo de giros (0 = ilimitado) | 0 |\n| `periodo_limite` | Janela do limite | total |\n\n### 4.5 CS вҖ” LandingConfig\n\n| Campo | O que configurar |\n|-------|------------------|\n| `titulo` / `subtitulo` | Textos da landing page pГәblica |\n| `cor_primaria` / `cor_secundaria` | Cores da marca |\n| `logo` | Logo do clube |\n| `whatsapp_numero` | WhatsApp de suporte |\n| `texto_como_funciona` | SeГ§ГЈo explicativa (markdown) |\n\n### 4.6 CS вҖ” IndicacaoConfig\n\n| Campo | O que configurar |\n|-------|------------------|\n| `titulo` / `subtitulo` | Textos da pГЎgina de indicaГ§ГЈo |\n| `texto_indicador` | \"VocГӘ foi indicado por\" |\n| `cor_fundo` / `cor_botao` | Cores da marca |\n| `logo` / `imagem_fundo` | Visuais |\n| `mostrar_campo_cpf` / `mostrar_campo_cidade` | Campos opcionais |\n\n---\n\n## Fase 5 вҖ” IntegraГ§ГЈo com ERP\n\n> DocumentaГ§ГЈo completa: `docs/PRODUTO/10-INTEGRACOES.md`\n\n### 5.1 Perguntar ao provedor\n\n1. **Qual ERP?** (HubSoft, MK Solutions, IXCSoft, SGP, Controllr, outro)\n2. **Credenciais de API** (URL base, mГ©todo de auth, client_id/secret ou token)\n3. **IDs de mapeamento** (id_origem do lead, id_vendedor padrГЈo, id_serviГ§o)\n4. **Contato tГ©cnico** para resolver credenciais e testes\n\n### 5.2 O que o Aurora precisa consumir do ERP\n\n| Dado | Criticidade | Usado em |\n|------|-------------|----------|\n| Consultar cliente por CPF (nome, telefone, endereГ§o, cidade) | Alta | Clube CS, cadastro de lead |\n| ID do cliente no ERP | Alta | Rastreabilidade |\n| Planos disponГӯveis (nome, velocidade, preГ§o) | MГ©dia | Cadastro pГәblico |\n| Status do contrato (ativo, dias restantes) | MГ©dia | Alertas de retenГ§ГЈo/churn |\n| SituaГ§ГЈo financeira (inadimplГӘncia, recorrГӘncia) | Baixa | PontuaГ§ГЈo extra no Clube |\n\n### 5.3 O que o Aurora envia para o ERP\n\n| Dado | Criticidade | Quando |\n|------|-------------|--------|\n| Novo prospecto/lead (dados + documentos) | Alta | Lead qualificado |\n| Contrato aceito (IP, timestamp) | Alta | Cadastro pГәblico |\n| Status do processamento | MГ©dia | Webhook de confirmaГ§ГЈo |\n\n### 5.4 Configurar credenciais\n\n**Via painel (primeiro login):**\nO admin do provedor Г© redirecionado para `/setup/` onde preenche as credenciais. Salva em IntegracaoAPI (campos sensГӯveis criptografados).\n\n**Via comando (HubSoft):**\n```bash\nexport HUBSOFT_BASE_URL=\"https://api.hubsoft.com.br/v1\"\nexport HUBSOFT_CLIENT_ID=\"id\"\nexport HUBSOFT_CLIENT_SECRET=\"secret\"\nexport HUBSOFT_USERNAME=\"user\"\nexport HUBSOFT_PASSWORD=\"pass\"\n\npython manage.py setup_hubsoft --settings=gerenciador_vendas.settings_local\n```\n\n### 5.5 Mapear IDs do ERP\n\n| ID | Onde configurar | DescriГ§ГЈo |\n|----|-----------------|-----------|\n| `id_origem` | ConfiguracaoCadastro | De onde vem o lead (ex: \"site\", \"whatsapp\") |\n| `id_origem_servico` | ConfiguracaoCadastro | Qual serviГ§o originou |\n| `id_vendedor` | ConfiguracaoCadastro | Vendedor padrГЈo para leads automГЎticos |\n| `id_vendedor_hubsoft` | PerfilVendedor (por vendedor) | ID de cada vendedor no ERP |\n\n### 5.6 Validar conexГЈo\n\n- `/aurora-admin/` вҶ’ card do tenant вҶ’ status da integraГ§ГЈo\n- `/aurora-admin/monitoramento/` вҶ’ logs de integraГ§ГЈo (Гәltimas 20 chamadas)\n\n---\n\n## Fase 6 вҖ” IntegraГ§ГЈo com Atendimento + N8N\n\n> DocumentaГ§ГЈo completa: `docs/PRODUTO/10-INTEGRACOES.md`\n\n### 6.1 Perguntar ao provedor\n\n1. **Qual plataforma de WhatsApp?** (Matrix, Evolution API, Z-API, Twilio, outro)\n2. **JГЎ tГӘm N8N?** (self-hosted ou cloud)\n3. **Webhook de envio** (URL para onde o Aurora manda mensagens)\n4. **Token de autenticaГ§ГЈo** da plataforma\n\n### 6.2 O que o Aurora envia para a plataforma\n\n| Dado | Quando |\n|------|--------|\n| Mensagens do agente | Resposta no Inbox |\n| Mensagens automГЎticas (boas-vindas, follow-up) | AutomaГ§Гөes |\n| OTP de verificaГ§ГЈo | Cadastro no Clube |\n| NotificaГ§Гөes (tarefa vencida, nova oportunidade) | CRM webhooks |\n\n### 6.3 O que a plataforma envia para o Aurora\n\n| Dado | Webhook destino |\n|------|-----------------|\n| Mensagem recebida do cliente | `/inbox/api/n8n/mensagem-recebida/` |\n| Status de entrega/leitura | `/inbox/api/n8n/status-mensagem/` |\n\n### 6.4 Fluxos N8N necessГЎrios\n\n| Fluxo | O que faz |\n|-------|-----------|\n| **Bot de atendimento** | Mensagem вҶ’ consulta fluxo na API Aurora вҶ’ responde ao cliente |\n| **DetecГ§ГЈo de campanha** | Mensagem вҶ’ API `/marketing/api/campanhas/detectar/` вҶ’ atribui lead |\n| **Envio de OTP** | Recebe CPF + cГіdigo вҶ’ envia via WhatsApp |\n| **Consulta cliente ERP** | Recebe CPF вҶ’ consulta no ERP вҶ’ retorna dados |\n| **NotificaГ§Гөes CRM** | Nova oportunidade, mudanГ§a de estГЎgio, tarefa vencida |\n\n### 6.5 Configurar webhooks no CRM\n\nEm ConfiguraГ§Гөes do CRM, preencher:\n- `webhook_n8n_nova_oportunidade`\n- `webhook_n8n_mudanca_estagio`\n- `webhook_n8n_tarefa_vencida`\n\n### 6.6 Configurar canal no Inbox\n\nEm Inbox > ConfiguraГ§Гөes > Canais, preencher o webhook de envio (URL da plataforma de atendimento).\n\n### 6.7 Gerar token de API\n\n```bash\npython manage.py drf_create_token admin_provedor --settings=gerenciador_vendas.settings_local\n```\n\nO token Г© usado pelo N8N e pela plataforma no header: `Authorization: Token <token>`\n\n---\n\n## Fase 7 вҖ” UsuГЎrios e Equipe\n\n### 7.1 Criar usuГЎrios adicionais\n\nPara cada pessoa do provedor que vai usar o sistema:\n\n```python\n# Via Django shell ou script\nfrom django.contrib.auth.models import User\nfrom apps.sistema.models import PerfilUsuario, Tenant\n\ntenant = Tenant.objects.get(slug='slug-provedor')\n\nuser = User.objects.create_user(\n    username='vendedor1',\n    email='vendedor1@provedor.com',\n    password='SenhaSegura123',\n    first_name='JoГЈo',\n    last_name='Silva'\n)\nPerfilUsuario.objects.create(user=user, tenant=tenant, telefone='85988881234')\n```\n\n### 7.2 Configurar equipe de vendas (CRM Pro)\n\n1. Criar EquipeVendas (nome, lГӯder, cor)\n2. Criar PerfilVendedor para cada vendedor:\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| `user` | OneToOne com User |\n| `equipe` | FK EquipeVendas |\n| `cargo` | vendedor, supervisor, gerente |\n| `id_vendedor_hubsoft` | ID no HubSoft |\n\n### 7.3 PermissГөes\n\n| Tipo | Acesso |\n|------|--------|\n| **Superuser** | Tudo + Admin Aurora |\n| **Staff** | Django Admin + painel do tenant |\n| **UsuГЎrio normal** | Apenas painel do tenant |\n| **Vendedor (nГЈo superuser)** | VГӘ apenas suas oportunidades + nГЈo atribuГӯdas |\n\n---\n\n## Fase 8 вҖ” Branding e Visual\n\n### 8.1 ConfiguracaoEmpresa\n\n| Campo | DescriГ§ГЈo |\n|-------|-----------|\n| `nome_empresa` | Nome exibido no painel |\n| `logo_empresa` | Logo (upload) |\n| `cor_primaria` | Cor principal (hex) |\n| `cor_secundaria` | Cor secundГЎria (hex) |\n\n### 8.2 Personalizar pГЎginas pГәblicas\n\n| PГЎgina | Onde configurar |\n|--------|----------------|\n| Cadastro de cliente | ConfiguracaoCadastro (cores, logo, textos, contrato) |\n| Landing do clube | LandingConfig (cores, logo, textos, banners) |\n| PГЎgina de indicaГ§ГЈo | IndicacaoConfig (cores, logo, fundo, textos) |\n| Carteirinha digital | ModeloCarteirinha (cores, fundo, logo, campos visГӯveis) |\n\n---\n\n## Fase 9 вҖ” ValidaГ§ГЈo e Go-live\n\n### Checklist de validaГ§ГЈo\n\n#### Infraestrutura\n- [ ] Servidor configurado (Gunicorn + Nginx)\n- [ ] SSL/HTTPS ativo\n- [ ] VariГЎveis de ambiente configuradas\n- [ ] Banco de dados PostgreSQL criado\n- [ ] Migrations aplicadas\n- [ ] Collectstatic executado\n- [ ] Backups automГЎticos configurados\n\n#### Funcionalidades\n- [ ] Login do admin funciona\n- [ ] Dashboard carrega com dados\n- [ ] PГЎgina de cadastro pГәblica renderiza corretamente\n- [ ] ValidaГ§ГЈo de CEP funciona (ViaCEP)\n- [ ] Leads podem ser criados (manual e via API)\n- [ ] CRM pipeline mostra estГЎgios corretos\n- [ ] Drag-and-drop do Kanban funciona\n- [ ] Tarefas CRM podem ser criadas e concluГӯdas\n\n#### IntegraГ§Гөes\n- [ ] HubSoft API responde (token OAuth vГЎlido)\n- [ ] Sync de clientes HubSoft funciona\n- [ ] N8N webhooks disparam corretamente\n- [ ] Bot WhatsApp (Matrix) responde\n- [ ] DetecГ§ГЈo de campanha por palavra-chave funciona\n- [ ] OTP do clube envia via WhatsApp\n\n#### Multi-tenancy\n- [ ] Dados isolados (admin sГі vГӘ dados do prГіprio tenant)\n- [ ] Uploads isolados por tenant\n- [ ] Filtros automГЎticos funcionando em todas as views\n\n#### CS (se ativo)\n- [ ] Landing do clube renderiza\n- [ ] Cadastro de membro funciona\n- [ ] OTP valida corretamente\n- [ ] Roleta gira e prГӘmios sГЈo entregues\n- [ ] Cupons podem ser resgatados\n- [ ] IndicaГ§Гөes podem ser criadas\n- [ ] Carteirinha digital renderiza\n\n---\n\n## Checklist Resumido (uma pГЎgina)\n\n```\nFASE 1 вҖ” TENANT\n  [ ] Tenant criado (criar_tenant ou Admin Aurora)\n  [ ] Admin user criado\n  [ ] Planos e features seedados (seed_planos)\n\nFASE 2 вҖ” AMBIENTE\n  [ ] .env configurado (DB, secrets, integraГ§Гөes)\n  [ ] Migrations aplicadas\n  [ ] Collectstatic executado\n\nFASE 3 вҖ” DADOS INICIAIS\n  [ ] Planos de internet cadastrados\n  [ ] OpГ§Гөes de vencimento cadastradas\n  [ ] Pipeline + estГЎgios criados\n  [ ] NГӯveis do clube criados (se CS)\n  [ ] Regras de pontuaГ§ГЈo criadas (se CS)\n\nFASE 4 вҖ” CONFIGURAГҮГғO\n  [ ] ConfiguracaoCRM (pipeline_padrao, estagio_inicial)\n  [ ] ConfiguracaoCadastro (visual, campos, contrato)\n  [ ] RoletaConfig + LandingConfig (se CS)\n  [ ] IndicacaoConfig (se CS)\n\nFASE 5 вҖ” ERP\n  [ ] ERP identificado (HubSoft, MK, IXC, SGP, etc.)\n  [ ] Credenciais de API obtidas\n  [ ] ConexГЈo validada (consulta cliente por CPF)\n  [ ] IDs mapeados (id_origem, id_vendedor, id_servico)\n\nFASE 6 вҖ” ATENDIMENTO + N8N\n  [ ] Plataforma identificada (Matrix, Evolution, Z-API, etc.)\n  [ ] Webhook de envio configurado\n  [ ] Canal configurado no Inbox\n  [ ] Fluxos N8N criados/duplicados\n  [ ] Webhooks CRM configurados\n  [ ] Token de API gerado\n\nFASE 7 вҖ” USUГҒRIOS\n  [ ] UsuГЎrios criados com PerfilUsuario\n  [ ] Equipe de vendas configurada (se CRM Pro)\n  [ ] PermissГөes validadas\n\nFASE 8 вҖ” VISUAL\n  [ ] Logo e cores configurados\n  [ ] PГЎginas pГәblicas personalizadas\n  [ ] Contrato/termos preenchidos\n\nFASE 9 вҖ” GO-LIVE\n  [ ] SSL ativo\n  [ ] Funcionalidades validadas\n  [ ] IntegraГ§Гөes testadas\n  [ ] Multi-tenancy verificado\n  [ ] Backups configurados\n```\n"}]}, {"t": "d", "n": "PRODUTO", "ch": [{"t": "f", "n": "00 Status Produto", "fn": "00-STATUS_PRODUTO.md", "c": "# Status do Produto вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 01/04/2026\n\nEste documento Г© a fonte da verdade sobre o que estГЎ pronto, em desenvolvimento e planejado em cada mГіdulo da AuroraISP. Atualizar sempre que uma funcionalidade mudar de status.\n\n---\n\n## Legenda\n\n| Status | Significado |\n|--------|-------------|\n| вң… Pronto | Funciona, tem UI, testГЎvel pelo cliente |\n| рҹ”§ Parcial | Backend existe mas UI incompleta, ou funciona com limitaГ§Гөes |\n| рҹҡ§ Em desenvolvimento | Trabalho iniciado, nГЈo utilizГЎvel ainda |\n| рҹ“Ӣ Planejado | Definido, nГЈo iniciado |\n| вқҢ Desativado | CГіdigo existe mas estГЎ desligado |\n\n---\n\n## VisГЈo Geral por MГіdulo\n\n| MГіdulo | Plano | Status Geral | Pronto | Parcial | Planejado |\n|--------|-------|-------------|--------|---------|-----------|\n| **Comercial** | Start / Pro | рҹҹў ProduГ§ГЈo | 18 | 1 | 1 |\n| **Marketing** | Start / Pro | рҹҹЎ Inicial | 3 | 2 | 4 |\n| **CS** | Start / Pro | рҹҹЎ Em desenvolvimento | 12 | 3 | 4 |\n| **Suporte** | Interno | рҹҹЎ Inicial | 4 | 0 | 2 |\n| **Sistema** | Base | рҹҹў ProduГ§ГЈo | 10 | 2 | 1 |\n\n---\n\n## MГ“DULO COMERCIAL\n\n### Leads (apps/comercial/leads/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Captura de leads via WhatsApp/N8N | вң… Pronto | IntegraГ§ГЈo ativa com N8N |\n| Score de qualificaГ§ГЈo automГЎtico | вң… Pronto | 0 a 10 |\n| Listagem com filtros, busca, paginaГ§ГЈo | вң… Pronto | |\n| Upload e validaГ§ГЈo de documentos | вң… Pronto | Fotos de RG, comprovante |\n| HistГіrico de interaГ§Гөes por lead | вң… Pronto | |\n| VisualizaГ§ГЈo de conversa HTML/PDF | вң… Pronto | |\n\n### Atendimento (apps/comercial/atendimento/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Fluxos conversacionais configurГЎveis | вң… Pronto | 20 tipos de questГЈo |\n| SessГЈo de atendimento com estado | вң… Pronto | |\n| APIs para N8N (15+ endpoints) | вң… Pronto | |\n| Roteamento condicional inteligente | вң… Pronto | |\n\n### Cadastro (apps/comercial/cadastro/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| FormulГЎrio de cadastro de cliente | вң… Pronto | |\n| CatГЎlogo de planos de internet | вң… Pronto | |\n| OpГ§Гөes de vencimento | вң… Pronto | |\n| GeraГ§ГЈo de PDF do contrato | вң… Pronto | WeasyPrint | рҹ“Ӣ Planejado | |\n\n### Funcionalidades planejadas\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Landing pages configurГЎveis | рҹ“Ӣ Planejado | Placeholder no menu |\n| RГ©guas de automaГ§ГЈo (email, WhatsApp) | рҹ“Ӣ Planejado | Depende do mГіdulo AutomaГ§Гөes |\n\n---\n\n## MГ“DULO CUSTOMER SUCCESS\n\n### Clube de BenefГӯcios (apps/cs/clube/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Dashboard com KPIs e grГЎficos | вң… Pronto | Cadastros, validaГ§Гөes, giros |\n| GestГЈo de membros (clientes) | вң… Pronto | |\n| Roleta de prГӘmios | вң… Pronto | |\n| NГӯveis e XP (gamificaГ§ГЈo) | вң… Pronto | Bronze, Prata, Ouro, Diamante |\n| Regras de pontuaГ§ГЈo configurГЎveis | вң… Pronto | |\n| Banners configurГЎveis | вң… Pronto | |\n| Extrato de pontuaГ§ГЈo | вң… Pronto | |\n| RelatГіrios do clube | вң… Pronto | |\n\n### Parceiros (apps/cs/parceiros/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Dashboard de parceiros | вң… Pronto | |\n| GestГЈo de parceiros e categorias | вң… Pronto | |\n| Cupons de desconto | вң… Pronto | |\n| Resgates de cupom | рҹ”§ Parcial | Model existe, sem dados populados |\n| Painel do parceiro (portal externo) | рҹ”§ Parcial | Templates existem, fluxo nГЈo testado |\n\n### IndicaГ§Гөes (apps/cs/indicacoes/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Dashboard de indicaГ§Гөes | вң… Pronto | |\n| Registro e acompanhamento | вң… Pronto | |\n\n### Carteirinhas (apps/cs/carteirinha/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Modelos de carteirinha | рҹ”§ Parcial | Model existe, UI bГЎsica |\n\n### Funcionalidades planejadas\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| RetenГ§ГЈo / Alertas de churn | рҹ“Ӣ Planejado | Models ScoreCliente, AlertaChurn criados |\n| NPS (pesquisa de satisfaГ§ГЈo) | рҹ“Ӣ Planejado | Models ConfiguracaoNPS, PesquisaNPS criados |\n| Upsell automГЎtico | рҹ“Ӣ Planejado | |\n| Onboarding guiado de novos clientes | рҹ“Ӣ Planejado | |\n\n---\n\n## MГ“DULO SUPORTE (interno Aurora)\n\n### Tickets (apps/suporte/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Dashboard de tickets | вң… Pronto | |\n| Criar ticket | вң… Pronto | |\n| Detalhe do ticket com comentГЎrios | вң… Pronto | |\n| SLA automГЎtico por plano | вң… Pronto | |\n| Categorias configurГЎveis | вң… Pronto | |\n| RelatГіrios de suporte | рҹ“Ӣ Planejado | |\n| Portal do cliente (abertura externa) | рҹ“Ӣ Planejado | |\n\n---\n\n## SISTEMA (base)\n\n### Infraestrutura (apps/sistema/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Multi-tenancy (isolamento por provedor) | вң… Pronto | TenantMixin em todos os models. Pendente deploy |\n| GestГЈo de usuГЎrios e permissГөes | вң… Pronto | |\n| ConfiguraГ§Гөes da empresa | вң… Pronto | |\n| Logs do sistema | вң… Pronto | |\n| Status customizГЎveis | вң… Pronto | |\n\n### NotificaГ§Гөes (apps/notificacoes/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Models completos (tipos, canais, templates, preferГӘncias) | вң… Pronto | |\n| Admin completo | вң… Pronto | |\n| APIs de CRUD | вң… Pronto | 26 endpoints |\n| Config WhatsApp/N8N | вң… Pronto | |\n| Envio de notificaГ§Гөes | вқҢ Desativado | Service nГЈo implementado |\n| PГЎgina de configuraГ§Гөes | вқҢ Desativado | Redireciona com msg manutenГ§ГЈo |\n| Signals automГЎticos | вқҢ Desativado | Nenhum signal cria notificaГ§Гөes |\n\n### IntegraГ§Гөes (apps/integracoes/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| OAuth2 com HubSoft | вң… Pronto | |\n| Envio automГЎtico de leads | вң… Pronto | Signal post_save |\n| SincronizaГ§ГЈo de clientes | вң… Pronto | Command + automГЎtico |\n| AnexaГ§ГЈo de docs ao contrato | вң… Pronto | |\n| Logs de auditoria | вң… Pronto | |\n| ConexГЈo direta banco HubSoft (CS) | вң… Pronto | Para dados nГЈo disponГӯveis na API |\n\n### API REST (apps/api/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| Endpoints DRF com TokenAuth + SessionAuth | вң… Pronto | |\n| Swagger/OpenAPI em /api/docs/ | вң… Pronto | drf-spectacular |\n| Endpoints N8N | вң… Pronto | |\n\n### Admin Aurora (apps/admin_aurora/)\n\n| Funcionalidade | Status | ObservaГ§ГЈo |\n|----------------|--------|------------|\n| GestГЈo de tenants | вң… Pronto | |\n| GestГЈo de planos (9 planos, 115 features) | вң… Pronto | |\n| Monitoramento | рҹ”§ Parcial | Logs e status bГЎsicos |\n\n---\n\n## Infraestrutura e DevOps\n\n| Item | Status | ObservaГ§ГЈo |\n|------|--------|------------|\n| CI/CD GitHub Actions | вң… Pronto | Roda testes + linting |\n| Docker (Dockerfile + compose + nginx) | вң… Pronto | NГЈo usado em produГ§ГЈo ainda |\n| 225 testes automatizados | вң… Pronto | 10 arquivos, 28+ factories |\n| Deploy produГ§ГЈo multi-tenant | рҹ“Ӣ Planejado | ProduГ§ГЈo atual Г© single-tenant Megalink |\n| Monitoramento (Sentry, uptime) | рҹ“Ӣ Planejado | |\n\n---\n\n## Prioridades Imediatas\n\n1. **Finalizar mГіdulo Marketing**: backend de AutomaГ§Гөes (regras configurГЎveis pelo cliente)\n2. **Reativar NotificaГ§Гөes**: conectar ao mГіdulo de AutomaГ§Гөes\n3. **Finalizar CS**: RetenГ§ГЈo (churn alerts), NPS, resgates de cupom\n4. **Deploy multi-tenant**: primeira vez com 2+ provedores em produГ§ГЈo\n5. **Onboarding Grupo Magister**: primeiro cliente com contrato assinado\n"}, {"t": "f", "n": "01 Reguas Padrao", "fn": "01-REGUAS_PADRAO.md", "c": "# 11. Marketing вҖ” RГ©guas PadrГЈo\n\n**Status:** рҹ“Ӣ EspecificaГ§ГЈo para desenvolvimento\n**Гҡltima atualizaГ§ГЈo:** 26/03/2026\n\n---\n\n## Contexto\n\nO mГіdulo de Marketing Г© o motor de automaГ§ГЈo do hub AuroraISP. AlГ©m de permitir que o provedor crie fluxos customizados, ele entrega **rГ©guas padrГЈo prontas** organizadas por jornada вҖ” o provedor ativa, configura os dados bГЎsicos e comeГ§a a usar.\n\nCanais disponГӯveis: **WhatsApp** e **E-mail**\n\n---\n\n## Arquitetura das rГ©guas\n\n```\nGatilho (trigger)\n      вҶ“\nCondiГ§ГЈo (filtro opcional)\n      вҶ“\nAГ§ГЈo (mensagem WhatsApp / e-mail / tag / notificaГ§ГЈo interna)\n      вҶ“\nAguardar (tempo ou evento)\n      вҶ“\nPrГіxima aГ§ГЈo ou fim do fluxo\n```\n\n---\n\n## RГ©guas do Comercial\n\nFluxos de automaГ§ГЈo para a etapa de atraГ§ГЈo e conversГЈo de leads.\n\n---\n\n### C01 вҖ” Boas-vindas ao Lead\n**Gatilho:** Lead cadastrado na plataforma\n**Canal:** WhatsApp\n**Objetivo:** Confirmar recebimento e iniciar qualificaГ§ГЈo\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Enviar mensagem de boas-vindas com nome do lead | Imediato |\n| 2 | Iniciar fluxo de qualificaГ§ГЈo (bot) | Imediato |\n\n---\n\n### C02 вҖ” Follow-up de Lead Sem Resposta\n**Gatilho:** Lead qualificado sem resposta apГіs X horas\n**Canal:** WhatsApp\n**Objetivo:** Reengajar lead que parou de responder\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Enviar mensagem de follow-up (tom leve) | 4h sem resposta |\n| 2 | Enviar segunda tentativa | 24h sem resposta |\n| 3 | Notificar vendedor para contato manual | 48h sem resposta |\n| 4 | Mover lead para status \"Frio\" | 72h sem resposta |\n\n---\n\n### C03 вҖ” Lembrete de Documentos Pendentes\n**Gatilho:** Lead com documentos solicitados e nГЈo enviados apГіs X horas\n**Canal:** WhatsApp\n**Objetivo:** Reduzir abandono na etapa de documentaГ§ГЈo\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Lembrete amigГЎvel de documentos pendentes | 2h sem envio |\n| 2 | Segundo lembrete com lista dos docs faltantes | 24h sem envio |\n| 3 | Notificar vendedor | 48h sem envio |\n\n---\n\n### C04 вҖ” NutriГ§ГЈo de Lead Frio\n**Gatilho:** Lead marcado como \"Frio\" sem conversГЈo\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Manter relacionamento e reativar interesse\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Enviar conteГәdo de valor (dica, novidade do provedor) | 7 dias |\n| 2 | Enviar oferta ou promoГ§ГЈo ativa | 15 dias |\n| 3 | Гҡltima tentativa de reativaГ§ГЈo | 30 dias |\n| 4 | Arquivar lead se sem resposta | 45 dias |\n\n---\n\n### C05 вҖ” RecuperaГ§ГЈo de Lead Perdido\n**Gatilho:** Lead marcado como \"Perdido\" no CRM\n**Canal:** WhatsApp\n**Objetivo:** Reabrir oportunidade apГіs perГӯodo de descanso\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Pausa no contato | 30 dias |\n| 2 | Recontato com nova abordagem ou oferta | 30 dias |\n| 3 | Se sem resposta, arquivar definitivamente | 15 dias apГіs recontato |\n\n---\n\n### C06 вҖ” ConfirmaГ§ГЈo de InstalaГ§ГЈo Agendada\n**Gatilho:** InstalaГ§ГЈo agendada no HubSoft\n**Canal:** WhatsApp\n**Objetivo:** Reduzir no-show e preparar o cliente\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | ConfirmaГ§ГЈo do agendamento com data e hora | Imediato |\n| 2 | Lembrete 1 dia antes | D-1 |\n| 3 | Lembrete 2h antes | D0 -2h |\n\n---\n\n## RГ©guas do CS\n\nFluxos de automaГ§ГЈo para a etapa de retenГ§ГЈo e fidelizaГ§ГЈo pГіs-venda. Rodam via Marketing.\n\n---\n\n### CS01 вҖ” Boas-vindas PГіs-AtivaГ§ГЈo\n**Gatilho:** Cliente ativado no HubSoft\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Onboarding do novo cliente, reduzir churn nos primeiros 30 dias\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Mensagem de boas-vindas com dados do plano | Imediato |\n| 2 | Dicas de uso do serviГ§o | D+3 |\n| 3 | VerificaГ§ГЈo de satisfaГ§ГЈo (estГЎ tudo funcionando?) | D+7 |\n| 4 | Convite para o Clube de BenefГӯcios | D+15 |\n\n---\n\n### CS02 вҖ” NPS вҖ” Pesquisa de SatisfaГ§ГЈo\n**Gatilho:** X dias apГіs ativaГ§ГЈo ou em data recorrente\n**Canal:** WhatsApp\n**Objetivo:** Medir satisfaГ§ГЈo e identificar clientes insatisfeitos antes do churn\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Enviar pergunta NPS (nota de 0 a 10) | D+30 apГіs ativaГ§ГЈo |\n| 2a | Se nota 9-10: pedir indicaГ§ГЈo | Imediato |\n| 2b | Se nota 7-8: agradecer e monitorar | Imediato |\n| 2c | Se nota 0-6: notificar CS para contato urgente | Imediato |\n| 3 | Repetir a cada 90 dias | Recorrente |\n\n---\n\n### CS03 вҖ” PrevenГ§ГЈo de Churn\n**Gatilho:** Cliente com fatura em atraso hГЎ X dias ou NPS baixo\n**Canal:** WhatsApp\n**Objetivo:** Intervir antes do cancelamento\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Mensagem de suporte proativo (tudo bem?) | 1 dia apГіs gatilho |\n| 2 | Oferta de negociaГ§ГЈo ou plano alternativo | 3 dias |\n| 3 | Notificar CS para contato humano | 5 dias |\n\n---\n\n### CS04 вҖ” Upsell de Plano\n**Gatilho:** Cliente no plano bГЎsico hГЎ X meses sem reclamaГ§ГЈo\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Aumentar ticket mГ©dio de clientes satisfeitos\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Mensagem apresentando plano superior com benefГӯcios | 90 dias apГіs ativaГ§ГЈo |\n| 2 | Follow-up com oferta especial (desconto por tempo limitado) | 7 dias depois |\n| 3 | Гҡltima chamada para upgrade | 7 dias depois |\n\n---\n\n### CS05 вҖ” Venda de SVA (ServiГ§os de Valor Agregado)\n**Gatilho:** Cliente ativo hГЎ X dias sem SVA contratado\n**Canal:** WhatsApp\n**Objetivo:** Aumentar receita por cliente com serviГ§os adicionais (streaming, antivГӯrus, backup, etc.)\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Apresentar SVA disponГӯvel com benefГӯcio claro | 60 dias apГіs ativaГ§ГЈo |\n| 2 | Follow-up com perГӯodo de teste grГЎtis (se disponГӯvel) | 7 dias depois |\n| 3 | Lembrete de encerramento do perГӯodo de teste | D-2 do fim do teste |\n\n---\n\n### CS06 вҖ” ReativaГ§ГЈo de Cliente Cancelado\n**Gatilho:** Contrato cancelado no HubSoft\n**Canal:** WhatsApp\n**Objetivo:** Recuperar cliente cancelado apГіs perГӯodo de respiro\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Pausa вҖ” sem contato | 30 dias |\n| 2 | Mensagem de recontato com oferta especial | D+30 |\n| 3 | Follow-up final | 7 dias depois |\n| 4 | Arquivar se sem resposta | 15 dias depois |\n\n---\n\n### CS07 вҖ” Programa de IndicaГ§ГЈo\n**Gatilho:** Cliente com NPS 9 ou 10, ou X meses ativo sem reclamaГ§ГЈo\n**Canal:** WhatsApp\n**Objetivo:** Gerar leads via base de clientes satisfeitos\n\n| Passo | AГ§ГЈo | Tempo |\n|-------|------|-------|\n| 1 | Convidar para programa de indicaГ§ГЈo com benefГӯcio claro | Imediato apГіs gatilho |\n| 2 | Enviar link ou cГіdigo de indicaГ§ГЈo | Imediato |\n| 3 | Notificar quando indicaГ§ГЈo converter | AutomГЎtico |\n| 4 | Entregar benefГӯcio ao indicador | AutomГЎtico apГіs ativaГ§ГЈo do indicado |\n\n---\n\n## RГ©guas de Marketing (campanhas e trГЎfego)\n\n---\n\n### M01 вҖ” Rastreamento de Origem de Lead\n**Gatilho:** Lead captado via campanha (Facebook, Google, Instagram, etc.)\n**AГ§ГЈo:** Tag automГЎtica de origem + campanha + UTM no cadastro do lead\n**Objetivo:** AtribuiГ§ГЈo correta para otimizaГ§ГЈo com IA\n\n---\n\n### M02 вҖ” Alerta de Performance de Campanha\n**Gatilho:** Campanha com CPL acima do benchmark ou taxa de conversГЈo abaixo do esperado\n**Canal:** NotificaГ§ГЈo interna + E-mail para responsГЎvel\n**Objetivo:** Alertar gestor para ajuste de campanha com sugestГЈo da IA\n\n---\n\n### M03 вҖ” Campanha Sazonal\n**Gatilho:** Data configurada (Black Friday, volta Г s aulas, etc.)\n**Canal:** WhatsApp + E-mail\n**Objetivo:** Disparo em massa para base segmentada com oferta sazonal\n\n---\n\n## Resumo das rГ©guas\n\n| CГіdigo | Nome | MГіdulo | Canal | Status |\n|--------|------|--------|-------|--------|\n| C01 | Boas-vindas ao Lead | Comercial | WhatsApp | рҹ“Ӣ A desenvolver |\n| C02 | Follow-up Sem Resposta | Comercial | WhatsApp | рҹ“Ӣ A desenvolver |\n| C03 | Documentos Pendentes | Comercial | WhatsApp | рҹ“Ӣ A desenvolver |\n| C04 | NutriГ§ГЈo de Lead Frio | Comercial | WhatsApp + E-mail | рҹ“Ӣ A desenvolver |\n| C05 | RecuperaГ§ГЈo de Lead Perdido | Comercial | WhatsApp | рҹ“Ӣ A desenvolver |\n| C06 | ConfirmaГ§ГЈo de InstalaГ§ГЈo | Comercial | WhatsApp | рҹ“Ӣ A desenvolver |\n| CS01 | Boas-vindas PГіs-AtivaГ§ГЈo | CS | WhatsApp + E-mail | рҹ“Ӣ A desenvolver |\n| CS02 | NPS | CS | WhatsApp | рҹ“Ӣ A desenvolver |\n| CS03 | PrevenГ§ГЈo de Churn | CS | WhatsApp | рҹ“Ӣ A desenvolver |\n| CS04 | Upsell de Plano | CS | WhatsApp + E-mail | рҹ“Ӣ A desenvolver |\n| CS05 | Venda de SVA | CS | WhatsApp | рҹ“Ӣ A desenvolver |\n| CS06 | ReativaГ§ГЈo de Cancelado | CS | WhatsApp | рҹ“Ӣ A desenvolver |\n| CS07 | Programa de IndicaГ§ГЈo | CS | WhatsApp | рҹ“Ӣ A desenvolver |\n| M01 | Rastreamento de Origem | Marketing | Interno | рҹ“Ӣ A desenvolver |\n| M02 | Alerta de Performance | Marketing | NotificaГ§ГЈo + E-mail | рҹ“Ӣ A desenvolver |\n| M03 | Campanha Sazonal | Marketing | WhatsApp + E-mail | рҹ“Ӣ A desenvolver |\n\n---\n\n## SVAs suportados (CS05)\n\nServiГ§os de valor agregado que os provedores costumam oferecer:\n\n- Streaming (Netflix, Paramount, etc.)\n- AntivГӯrus\n- Backup em nuvem\n- SeguranГ§a kids (controle parental)\n- Rastreamento veicular\n- Energia solar\n- Plano de saГәde\n\n---\n\n## ConfiguraГ§Гөes do administrador\n\n- **BenefГӯcio do programa de indicaГ§ГЈo (CS07):** configurГЎvel pelo administrador do provedor\n- **AprovaГ§ГЈo humana nos fluxos:** configurГЎvel por etapa. Alguns passos exigem intervenГ§ГЈo humana. O sistema deve suportar esse controle por fluxo.\n\n---\n\n## PendГӘncias\n\n- [ ] Definir tempo padrГЈo de atraso que aciona a prevenГ§ГЈo de churn (CS03)\n- [ ] Mapear quais etapas de cada fluxo precisam de aprovaГ§ГЈo humana por padrГЈo\n"}, {"t": "f", "n": "02 Roadmap Produto", "fn": "02-ROADMAP_PRODUTO.md", "c": "# Roadmap de Produto вҖ” AuroraISP\n\n**Status:** вң… Atualizado\n**Гҡltima atualizaГ§ГЈo:** 31/03/2026\n**Base:** AnГЎlise completa do cГіdigo fonte (robo/) em 28/03/2026. RefatoraГ§ГЈo completa finalizada em 31/03/2026. vendas_web removido do INSTALLED_APPS.\n\n---\n\n## 1. InventГЎrio do sistema atual\n\n### 1.1 Estrutura de cГіdigo\n\n| Item | Valor |\n|------|-------|\n| Framework | Django 5.2, Python 3.11, DRF |\n| Banco | PostgreSQL 15+ |\n| Apps Django | 15 modulares em apps/ (vendas_web removido do INSTALLED_APPS) |\n| Models totais | 67+ (todos com app_label natural, sem referГӘncia a vendas_web) |\n| Views migradas | 9.457 linhas migradas para apps modulares |\n| Rotas totais | 139 rotas em urls.py de cada app |\n| Templates | 24 templates migrados para diretГіrios de cada app |\n| Admin migrado | 3.676 linhas de admin distribuГӯdas em 7 apps |\n| Linhas de cГіdigo | ~30.000+ |\n| Testes | 225 (10 arquivos, 28+ factories, CI/CD) |\n| Multi-tenancy | вң… Implementado (29/03/2026). TenantMixin em todos os models incluindo CRM. Pendente deploy |\n| SeguranГ§a | вң… 5 crГӯticas + 12 altas/mГ©dias corrigidas (30/03/2026) |\n| API REST | вң… DRF com TokenAuth + SessionAuth. Swagger em /api/docs/ |\n\n### 1.2 Apps existentes\n\n#### `vendas_web` вҖ” DESATIVADO (31/03/2026)\nRemovido do INSTALLED_APPS. Todos os 27 models, 128 views, 24 templates, 139 rotas, 3.676 linhas de admin, signals e services foram migrados para os 15 apps em `apps/`. O `urls.py` e `admin.py` estГЈo vazios. Migrations limpas e regeneradas do zero.\n\n#### `apps/` вҖ” Estrutura modular (15 apps)\nTodos os models tГӘm app_label natural (sem `app_label='vendas_web'`). Cada app possui seus prГіprios models, views, urls, templates, admin e migrations. Base.html e static files centralizados em `apps/sistema/`.\n\n---\n\n## 2. Mapa completo de funcionalidades\n\n### 2.1 DomГӯnio: Leads (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Captura de leads via WhatsApp/N8N | LeadProspecto | ProduГ§ГЈo |\n| Score de qualificaГ§ГЈo automГЎtico (0-100) | LeadProspecto.score_qualificacao | ProduГ§ГЈo |\n| Upload e validaГ§ГЈo de documentos | ImagemLeadProspecto | ProduГ§ГЈo |\n| Workflow de processamento | Prospecto | ProduГ§ГЈo |\n| HistГіrico de interaГ§Гөes | HistoricoContato | ProduГ§ГЈo |\n| Listagem com filtros e busca | views.leads_view | ProduГ§ГЈo |\n| VisualizaГ§ГЈo da conversa HTML/PDF | views.visualizar_conversa_lead | ProduГ§ГЈo |\n\n### 2.2 DomГӯnio: Atendimento/Bot (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Fluxos conversacionais configurГЎveis | FluxoAtendimento | ProduГ§ГЈo |\n| 20 tipos de questГЈo (texto, CPF, CEP, IA, condicional) | QuestaoFluxo | ProduГ§ГЈo |\n| SessГЈo de atendimento com estado | AtendimentoFluxo | ProduГ§ГЈo |\n| Respostas e tentativas registradas | RespostaQuestao, TentativaResposta | ProduГ§ГЈo |\n| APIs dedicadas para N8N (15+ endpoints) | views_api_atendimento | ProduГ§ГЈo |\n| Fluxo inteligente com roteamento condicional | QuestaoFluxo.condicoes_avancadas | ProduГ§ГЈo |\n\n### 2.3 DomГӯnio: Cadastro e Contrato (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| FormulГЎrio de cadastro de cliente | CadastroCliente | ProduГ§ГЈo |\n| GestГЈo de documentos por lead | DocumentoLead | ProduГ§ГЈo |\n| ConfiguraГ§ГЈo do formulГЎrio de cadastro | ConfiguracaoCadastro | ProduГ§ГЈo |\n| CatГЎlogo de planos de internet | PlanoInternet | ProduГ§ГЈo |\n| OpГ§Гөes de vencimento | OpcaoVencimento | ProduГ§ГЈo |\n| GeraГ§ГЈo de PDF do contrato (WeasyPrint) | Signal automГЎtico | ProduГ§ГЈo |\n| Envio de docs e aceite no HubSoft | contrato_service.py | ProduГ§ГЈo |\n\n### 2.4 DomГӯnio: NotificaГ§Гөes (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Tipos de notificaГ§ГЈo (lead_novo, venda_aprovada...) | TipoNotificacao | ProduГ§ГЈo |\n| Canais (WhatsApp, webhook) | CanalNotificacao | ProduГ§ГЈo |\n| PreferГӘncias por usuГЎrio | PreferenciaNotificacao | ProduГ§ГЈo |\n| HistГіrico de envios | Notificacao | ProduГ§ГЈo |\n| Templates de mensagem | TemplateNotificacao | ProduГ§ГЈo |\n| Config de WhatsApp Business | API dedicada | ProduГ§ГЈo |\n\n### 2.5 DomГӯnio: Campanhas (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Cadastro de campanhas de trГЎfego pago | CampanhaTrafego | ProduГ§ГЈo |\n| DetecГ§ГЈo automГЎtica por keyword | DeteccaoCampanha | ProduГ§ГЈo |\n| AtribuiГ§ГЈo de origem ao lead | Signal automГЎtico | ProduГ§ГЈo |\n| MГ©tricas por campanha (leads, conversГЈo) | Dashboard | ProduГ§ГЈo |\n\n### 2.6 DomГӯnio: Viabilidade (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Cadastro de cidades/bairros com cobertura | CidadeViabilidade | ProduГ§ГЈo |\n| Consulta por CEP com ViaCEP | API pГәblica | ProduГ§ГЈo |\n\n### 2.7 DomГӯnio: Sistema/Config (vendas_web)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| ConfiguraГ§ГЈo da empresa (nome, logo, cores) | ConfiguracaoEmpresa | ProduГ§ГЈo |\n| ConfiguraГ§Гөes gerais do sistema | ConfiguracaoSistema | ProduГ§ГЈo |\n| ConfiguraГ§ГЈo de recontato | ConfiguracaoRecontato | ProduГ§ГЈo |\n| Status customizГЎveis | StatusConfiguravel | ProduГ§ГЈo |\n| Log de auditoria | LogSistema | ProduГ§ГЈo |\n| GestГЈo de usuГЎrios | User + monkey-patch telefone | ProduГ§ГЈo (com dГ©bito) |\n\n### 2.8 DomГӯnio: IntegraГ§Гөes (app `integracoes`)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| ConexГЈo OAuth com HubSoft | IntegracaoAPI | ProduГ§ГЈo |\n| SincronizaГ§ГЈo de clientes (command + systemd timer) | ClienteHubsoft | ProduГ§ГЈo |\n| SincronizaГ§ГЈo de serviГ§os/planos | ServicoClienteHubsoft | ProduГ§ГЈo |\n| Log de auditoria de todas as chamadas | LogIntegracao | ProduГ§ГЈo |\n\n### 2.9 DomГӯnio: CRM (app `crm`)\n\n| Funcionalidade | Model | Status |\n|----------------|-------|--------|\n| Pipeline kanban com estГЎgios configurГЎveis | PipelineEstagio | Pronto |\n| Oportunidade de venda (card do kanban) | OportunidadeVenda | Pronto |\n| Drag and drop entre estГЎgios | api_mover_oportunidade | Pronto |\n| HistГіrico imutГЎvel de movimentaГ§ГЈo | HistoricoPipelineEstagio | Pronto |\n| Equipes de vendas com lГӯder | EquipeVendas | Pronto |\n| Perfil de vendedor (cargo, ID HubSoft) | PerfilVendedor | Pronto |\n| Tags de classificaГ§ГЈo | TagCRM | Pronto |\n| Tarefas com vencimento, lembrete, auto-vence | TarefaCRM | Pronto |\n| Notas internas (fixar, menГ§Гөes, tipos) | NotaInterna | Pronto |\n| Metas individuais e por equipe | MetaVendas | Pronto |\n| SegmentaГ§ГЈo dinГўmica/manual de leads | SegmentoCRM, MembroSegmento | Pronto |\n| Alertas de retenГ§ГЈo (churn, inadimplГӘncia) | AlertaRetencao | Pronto |\n| Auto-criaГ§ГЈo de oportunidade por score | Signal (post_save Lead) | Pronto |\n| ConversГЈo automГЎtica quando lead fecha | Signal (post_save Historico) | Pronto |\n| Webhooks N8N por evento (novo, mudanГ§a, tarefa) | ConfiguracaoCRM | Pronto |\n| Scanner de retenГ§ГЈo | api_scanner_retencao | Pronto |\n| Webhook inbound HubSoft contrato | webhook_hubsoft_contrato | Pronto |\n\n### 2.10 DomГӯnio: Dashboard e RelatГіrios (vendas_web)\n\n| Funcionalidade | Status |\n|----------------|--------|\n| Dashboard com mГ©tricas em tempo real | ProduГ§ГЈo |\n| GrГЎficos de funil e conversГЈo | ProduГ§ГЈo |\n| Monitoramento de atendimentos em tempo real | ProduГ§ГЈo |\n| Jornada completa do cliente | ProduГ§ГЈo |\n| RelatГіrio de leads por perГӯodo | ProduГ§ГЈo |\n| RelatГіrio de clientes ativos | ProduГ§ГЈo |\n| RelatГіrio de atendimentos com mГ©tricas | ProduГ§ГЈo |\n| RelatГіrio de conversГөes | ProduГ§ГЈo |\n| Funil insights | ProduГ§ГЈo |\n\n---\n\n## 3. DГ©bitos tГ©cnicos que bloqueiam o SaaS\n\n### 3.1 CrГӯticos (bloqueiam novos clientes)\n\n| DГ©bito | Impacto | EsforГ§o | Status |\n|--------|---------|---------|--------|\n| **Multi-tenancy inexistente** | ImpossГӯvel ter mais de 1 provedor no sistema | Alto | вң… ConcluГӯdo (29/03). TenantMixin em todos os models |\n| **Credenciais hardcoded** (DB, SECRET_KEY, token Matrix) | Comprometi ** | CS Start + apps.cs.clube |\n\n---\n\n## 5. Roadmap de produto por fases\n\n### Fase 0 вҖ” SeguranГ§a e FundaГ§ГЈo (bloqueadores) вң… CONCLUГҚDA\n**Prazo alvo:** atГ© 30/03/2026\n**ResponsГЎvel:** Dev (CTO)\n**Status:** Todos os itens crГӯticos concluГӯdos entre 29/03 e 31/03/2026.\n\n| AГ§ГЈo | Prioridade | Status |\n|------|-----------|--------|\n| Remover credenciais hardcoded do cГіdigo | Urgente | вң… ConcluГӯdo (29/03) |\n| Rotacionar senha do banco, token Matrix, SECRET_KEY | Urgente | вҸі Pendente (requer deploy) |\n| DEBUG=False em produГ§ГЈo | Urgente | вң… ConcluГӯdo (29/03) |\n| Restringir APIs (remover isenГ§ГЈo geral `^api/`) | Urgente | вң… ConcluГӯdo (30/03). 48+ endpoints autenticados |\n| Implementar token auth para N8N | Urgente | вң… ConcluГӯdo (30/03). @api_token_required |\n| Multi-tenancy (Tenant + middleware + FK em todos os models) | CrГӯtico | вң… ConcluГӯdo (29/03). TenantMixin em todos os models |\n| Remover @csrf_exempt dos endpoints do frontend | Alto | вң… ConcluГӯdo (30/03) |\n| Scan de seguranГ§a completo | Alto | вң… ConcluГӯdo (30/03). 5 crГӯticas + 12 altas/mГ©dias corrigidas |\n\n### Fase 1 вҖ” ValidaГ§ГЈo comercial (produto mГӯnimo para vender) рҹ”§ EM ANDAMENTO\n**Prazo alvo:** abril/2026\n**Meta:** 15 clientes pagantes atГ© junho/2026\n**Status:** MigraГ§ГЈo completa. vendas_web removido. Foco agora em deploy e ambiente de demo.\n\n| AГ§ГЈo | Prioridade | Status |\n|------|-----------|--------|\n| Criar app `apps.sistema` com Tenant, PerfilUsuario, configs | Alto | вң… ConcluГӯdo (29/03) |\n| Extrair `apps.comercial.leads` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.atendimento` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.cadastro` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.comercial.viabilidade` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Mover `crm/` para `apps.comercial.crm` | Alto | вң… ConcluГӯdo (29/03) |\n| Mover `integracoes/` para `apps.integracoes` | Alto | вң… ConcluГӯdo (29/03) |\n| Extrair `apps.notificacoes` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Extrair `apps.marketing.campanhas` de vendas_web | Alto | вң… ConcluГӯdo (31/03). Models, views, URLs, templates, admin migrados |\n| Criar `apps.dashboard` (views de relatГіrio) | Alto | вң… ConcluГӯdo (31/03). Views migradas |\n| vendas_web removido do INSTALLED_APPS | Alto | вң… ConcluГӯdo (31/03). urls.py e admin.py vazios |\n| Migrations limpas e regeneradas | Alto | вң… ConcluГӯdo (31/03) |\n| Django REST Framework implementado | Alto | вң… ConcluГӯdo (30/03). TokenAuth + SessionAuth, Swagger |\n| Testes unitГЎrios (225 testes) | Alto | вң… ConcluГӯdo (30/03). 10 arquivos, 28+ factories, CI/CD |\n| Renomear `gerenciador_vendas/` para `config/` | MГ©dio | вҸі Aguardando (baixo impacto) |\n| Substituir monkey-patch do User por PerfilUsuario | Alto | вҸі Pendente |\n| Mover chamadas HTTP de signals para tasks assГӯncronas | Alto | вҸі Pendente |\n| Ambiente de demo multi-tenant | Alto | вҸі Pendente (requer deploy) |\n| Onboarding automatizado (criar tenant + config inicial) | Alto | вҸі Pendente |\n\n### Fase 2 вҖ” Produto completo Comercial\n**Prazo alvo:** maio/2026\n\n| AГ§ГЈo | Prioridade | EsforГ§o |\n|------|-----------|---------|\n| CRM integrado ao fluxo de vendas (jГЎ pronto, validar com clientes) | Alto | ValidaГ§ГЈo |\n| ValidaГ§ГЈo automГЎtica de documentos por IA | MГ©dio | 2 semanas |\n| RelatГіrios de conversГЈo por etapa do pipeline | MГ©dio | 1 semana |\n| Adotar Django REST Framework | MГ©dio | вң… ConcluГӯdo (30/03) |\n| Versionamento de API (/api/v1/) | MГ©dio | вң… ConcluГӯdo (30/03) |\n| Case pГәblico com autorizaГ§ГЈo de cliente | MГ©dio | Comercial |\n\n### Fase 3 вҖ” MГіdulo Marketing\n**Prazo alvo:** julho/2026\n**Base existente:** notificacoes (5 models), campanhas (2 models), crm.SegmentoCRM\n\n| AГ§ГЈo | O que existe | O que falta |\n|------|-------------|-------------|\n| Motor de rГ©guas de automaГ§ГЈo | N8N jГЎ roda. Templates de notificaГ§ГЈo existem | Engine interna com gatilhos por evento, tempo e comportamento |\n| E-mail marketing | Templates de notificaГ§ГЈo existem | IntegraГ§ГЈo com provedor de e-mail (SendGrid, SES) |\n| WhatsApp automatizado | Canal WhatsApp jГЎ configurado | RГ©guas completas (trial, pГіs-ativaГ§ГЈo, retenГ§ГЈo) |\n| SegmentaГ§ГЈo avanГ§ada | SegmentoCRM com filtros JSON existe | UI para criar segmentos por comportamento |\n| RelatГіrios de campanha | MГ©tricas bГЎsicas por campanha existem | Dashboard dedicado com CAC, ROAS, LTV |\n| TrГЎfego pago com IA | Rastreamento de campanhas existe | OtimizaГ§ГЈo automГЎtica de criativos |\n\n### Fase 4 вҖ” MГіdulo CS\n**Prazo alvo:** setembro/2026\n**Base existente:** integracoes.ClienteHubsoft, crm.AlertaRetencao, notificacoes\n\n| AГ§ГЈo | O que existe | O que falta |\n|------|-------------|-------------|\n| PrevenГ§ГЈo de churn | AlertaRetencao com score e scanner existe | DetecГ§ГЈo automГЎtica por comportamento no ERP |\n| NPS automatizado | Sistema de notificaГ§Гөes existe | Pesquisa de NPS com rГ©gua automГЎtica |\n| Clube de BenefГӯcios | Projeto megaroleta/ em desenvolvimento | Integrar com o hub e multi-tenancy |\n| Upsell automatizado | Segmentos + alertas existem | RГ©gua de oferta por perfil do cliente |\n| Health score do cliente | churn_risk_score existe na OportunidadeVenda | CГЎlculo automГЎtico por mГәltiplas variГЎveis |\n\n### Fase 5 вҖ” Escala\n**Prazo alvo:** Q4 2026\n\n| AГ§ГЈo | ResponsГЎvel |\n|------|------------|\n| ExpansГЈo para outros ERPs (Voalle, SGP) | Dev |\n| Inbound (blog, YouTube, LinkedIn) | Marketing |\n| Eventos do setor (ISP Summit, ABRINT) | CEO + Parceiro |\n| Contato formal com HubSoft para parceria | CEO |\n| Segundo parceiro comercial | Head de Vendas |\n\n---\n\n## 6. O que jГЎ serve de base para cada mГіdulo futuro\n\n| Base existente no cГіdigo | Onde estГЎ | MГіdulo que aproveita |\n|-------------------------|-----------|---------------------|\n| TipoNotificacao, CanalNotificacao, TemplateNotificacao, Notificacao | apps/notificacoes/ | Marketing (rГ©guas, e-mail, WhatsApp) |\n| PreferenciaNotificacao | apps/notificacoes/ | Marketing e CS |\n| CampanhaTrafego, DeteccaoCampanha | apps/marketing/campanhas/ | Marketing (performance, atribuiГ§ГЈo) |\n| SegmentoCRM, MembroSegmento | apps/comercial/crm/ | Marketing (segmentaГ§ГЈo de base) |\n| ClienteHubsoft, ServicoClienteHubsoft | apps/integracoes/ | CS (base ativa, churn, NPS) |\n| AlertaRetencao | apps/comercial/crm/ | CS (churn prevention) |\n| N8N integrado com APIs dedicadas | apps/comercial/atendimento/ | Marketing e CS (automaГ§Гөes) |\n| OportunidadeVenda.churn_risk_score | apps/comercial/crm/ | CS (health score) |\n| ConfiguracaoCRM.webhook_n8n_* | apps/comercial/crm/ | Marketing e CS (event-driven) |\n\n---\n\n## 7. CritГ©rios de transiГ§ГЈo entre fases\n\n| De | Para | CritГ©rio |\n|----|------|---------|\n| Fase 0 | Fase 1 | вң… Multi-tenancy funcionando. Zero credenciais expostas. APIs autenticadas |\n| Fase 1 | Fase 2 | рҹ”§ SeparaГ§ГЈo em apps concluГӯda. Falta: 5 clientes ativos e pagantes + deploy em produГ§ГЈo |\n| Fase 2 | Fase 3 | 15 clientes. CRM validado com feedback. DRF adotado (вң… jГЎ concluГӯdo) |\n| Fase 3 | Fase 4 | Motor de rГ©guas rodando. Ao menos 1 rГ©gua em produГ§ГЈo por cliente |\n| Fase 4 | Fase 5 | NPS implementado. Clube de benefГӯcios integrado. 50+ clientes |\n\n---\n\n## 8. DependГӘncias entre fases\n\n```\nFase 0 (SeguranГ§a + Multi-tenancy)\n  в”Ӯ\n  в–ј\nFase 1 (SeparaГ§ГЈo em apps + Tenant)\n  в”Ӯ\n  в”ңв”Җв”Җв–ә Fase 2 (Comercial completo)\n  в”Ӯ       в”Ӯ\n  в”Ӯ       в”ңв”Җв”Җв–ә Fase 3 (Marketing)\n  в”Ӯ       в”Ӯ       в”Ӯ\n  в”Ӯ       в”Ӯ       в””в”Җв”Җв–ә Fase 4 (CS)\n  в”Ӯ       в”Ӯ               в”Ӯ\n  в”Ӯ       в”Ӯ               в””в”Җв”Җв–ә Fase 5 (Escala)\n  в”Ӯ       в”Ӯ\n  в”Ӯ       в””в”Җв”Җв–ә Feedback de clientes alimenta Fases 3 e 4\n  в”Ӯ\n  в””в”Җв”Җв–ә Logo criada (desbloqueador de materiais visuais)\n```\n\n---\n\n## PendГӘncias\n\n- [x] CEO: definir prazo real para Fase 0 (seguranГ§a) вҖ” Resolvido em 29/03/2026. Credenciais removidas do cГіdigo.\n- [x] CTO: estimar esforГ§o real de multi-tenancy вҖ” Implementado em 29/03/2026. TenantMixin em todos os models.\n- [x] CTO: decidir estratГ©gia de multi-tenancy вҖ” FK tenant_id via TenantMixin. Aprovado e implementado.\n- [ ] PM: validar com primeiro cliente se CRM kanban atende ou precisa de ajustes\n- [x] CEO: definir se megaroleta serГЎ integrado ao hub ou mantido separado вҖ” Resolvido em 29/03/2026. Apps CS migrados para robo/apps/cs/. App gestГЈo permanece no megaroleta.\n"}, {"t": "f", "n": "03 Integracoes Hubsoft", "fn": "03-INTEGRACOES_HUBSOFT.md", "c": "# IntegraГ§Гөes HubSoft\n\nDocumento tГ©cnico que mapeia todos os pontos de integraГ§ГЈo entre a AuroraISP e o ERP HubSoft. Essencial para onboarding de novos provedores e alinhamento tГ©cnico com a equipe HubSoft do cliente.\n\n---\n\n## VisГЈo Geral\n\nA AuroraISP se integra com o HubSoft de duas formas:\n\n| MГ©todo | Usado por | Motivo |\n|--------|-----------|--------|\n| **API REST (OAuth2)** | Comercial, Cadastro | Endpoints disponГӯveis na API oficial |\n| **ConexГЈo direta ao banco PostgreSQL** | CS / Clube de BenefГӯcios | API nГЈo expГөe os dados necessГЎrios (recorrГӘncia, app, pagamentos) |\n\n---\n\n## Requisitos de Onboarding\n\nPara ativar a integraГ§ГЈo HubSoft de um novo provedor, sГЈo necessГЎrios:\n\n### API REST (obrigatГіrio para o mГіdulo Comercial)\n\n| VariГЎvel | DescriГ§ГЈo | Exemplo |\n|----------|-----------|---------|\n| `HUBSOFT_BASE_URL` | URL base da API HubSoft do provedor | `https://provedor.hubsoft.com.br` |\n| `HUBSOFT_CLIENT_ID` | Client ID do OAuth2 | Fornecido pelo HubSoft |\n| `HUBSOFT_CLIENT_SECRET` | Client Secret do OAuth2 | Fornecido pelo HubSoft |\n| `HUBSOFT_USERNAME` | UsuГЎrio da API | Fornecido pelo provedor |\n| `HUBSOFT_PASSWORD` | Senha da API | Fornecido pelo provedor |\n\nConfiguraГ§ГЈo via management command:\n```bash\npython manage.py setup_hubsoft\n```\n\n### ConexГЈo direta ao banco (necessГЎrio apenas para CS / Clube)\n\n| VariГЎvel | DescriГ§ГЈo |\n|----------|-----------|\n| `HUBSOFT_DB_HOST` | Host do PostgreSQL HubSoft |\n| `HUBSOFT_DB_PORT` | Porta (padrГЈo: 5432) |\n| `HUBSOFT_DB_NAME` | Nome do banco |\n| `HUBSOFT_DB_USER` | UsuГЎrio com permissГЈo de leitura |\n| `HUBSOFT_DB_PASS` | Senha do usuГЎrio |\n\n**Importante:** o usuГЎrio do banco precisa apenas de permissГЈo `SELECT`. Nenhuma escrita Г© feita diretamente no banco do HubSoft.\n\n### Webhook N8N (necessГЎrio para CS / Clube)\n\n| VariГЎvel | DescriГ§ГЈo |\n|----------|-----------|\n| URL do webhook | `https://automation-n8n.v4riem.easypanel.host/webhook/roletaconsultarcliente` |\n\nEsse webhook Г© acionado pelo Clube para consultar dados do cliente por CPF via N8N.\n\n---\n\n## Mapa de IntegraГ§Гөes por MГіdulo\n\n### 1. Comercial вҖ” Envio de Leads\n\n**Fluxo:** Lead cadastrado no WhatsApp -> AuroraISP salva -> envia automaticamente para HubSoft como prospecto.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | Signal `post_save` no model `LeadProspecto` (quando `status_api='pendente'`) |\n| **Endpoint** | `POST /api/v1/integracao/prospecto` |\n| **AutenticaГ§ГЈo** | OAuth2 Bearer Token |\n| **Dados enviados** | Nome, CPF/CNPJ, telefone, email, endereГ§o, plano, dia de vencimento |\n| **Retorno** | `id_prospecto` da HubSoft (salvo em `lead.id_hubsoft`) |\n| **Status** | `status_api` atualizado para `processado` (sucesso) ou `erro` (falha) |\n| **Arquivo** | `apps/integracoes/signals.py` |\n| **Service** | `apps/integracoes/services/hubsoft.py` вҶ’ `cadastrar_prospecto()` |\n\n**Retry:** leads com `status_api='erro'` podem ser reprocessados via:\n```bash\npython manage.py processar_pendentes\n```\n\n---\n\n### 2. Comercial вҖ” SincronizaГ§ГЈo de Clientes\n\n**Fluxo:** ApГіs o lead virar cliente no HubSoft, a Aurora sincroniza os dados do cliente e seus serviГ§os/planos.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | AutomГЎtico apГіs cadastro de prospecto, ou manual via command |\n| **Endpoint** | `GET /api/v1/integracao/cliente?cpf_cnpj={cpf}` |\n| **Dados sincronizados** | Nome, CPF/CNPJ, telefones, emails, endereГ§o, RG, data de nascimento |\n| **ServiГ§os** | Plano, valor, velocidade, status, PPPoE, datas de habilitaГ§ГЈo/cancelamento |\n| **Models** | `ClienteHubsoft`, `ServicoClienteHubsoft` |\n| **DetecГ§ГЈo de alteraГ§Гөes** | Campo `houve_alteracao` e `historico_alteracoes` em JSON |\n| **Arquivo** | `apps/integracoes/services/hubsoft.py` вҶ’ `sincronizar_cliente()` |\n\n**SincronizaГ§ГЈo em massa:**\n```bash\npython manage.py sincronizar_clientes --todos\n```\n\n---\n\n### 3. Cadastro вҖ” Contratos e Documentos\n\n**Fluxo:** ApГіs validaГ§ГЈo dos documentos do lead (fotos do RG, comprovante), a Aurora anexa automaticamente ao contrato no HubSoft e aceita o contrato.\n\n| Item | Detalhe |\n|------|---------|\n| **Trigger** | Signal `post_save` no model `ImagemLeadProspecto` (quando status = validado) |\n| **Etapa 1** | Buscar ID do contrato via Matrix API |\n| **Etapa 2** | `POST /api/v1/integracao/cliente/contrato/adicionar_anexo_contrato/{id_contrato}` |\n| **Etapa 3** | `PUT /api/v1/integracao/cliente/contrato/aceitar_contrato` |\n| **Dados enviados** | Imagens dos documentos (base64), ID do contrato |\n| **Arquivo** | `apps/comercial/cadastro/services/contrato_service.py` |\n| **Signal** | `apps/comercial/cadastro/signals.py` вҶ’ `gerar_pdf_quando_documentos_validados()` |\n\n---\n\n### 4. CS / Clube de BenefГӯcios вҖ” Consultas ao Banco\n\n**Por que conexГЈo direta?** A API REST da HubSoft nГЈo expГөe endpoints para:\n- Verificar recorrГӘncia de pagamento (faturas em dia)\n- Verificar se o cliente pagou adiantado\n- Verificar se o app do provedor estГЎ instalado\n- Listar clientes por cidade (para anГЎlise de penetraГ§ГЈo)\n\nEsses dados sГЈo essenciais para o sistema de gamificaГ§ГЈo (pontos, XP, roleta).\n\n| Consulta | O que faz | Usado em |\n|----------|-----------|----------|\n| `checar_pontos_extras_cpf(cpf)` | Verifica recorrГӘncia, pagamento adiantado e app instalado | GamificaГ§ГЈo (pontos automГЎticos) |\n| `consultar_cidade_cliente_cpf(cpf)` | Retorna a cidade do cliente por CPF | Filtro de prГӘmios por cidade |\n| `consultar_clientes_por_cidade(cidade)` | Lista clientes ativos numa cidade | RelatГіrio de penetraГ§ГЈo de mercado |\n| Webhook N8N `/roletaconsultarcliente` | Consulta dados do cliente por CPF via N8N | ValidaГ§ГЈo de membro no Clube |\n\n**Arquivo:** `apps/cs/clube/services/hubsoft_service.py`\n\n**Regras de pontuaГ§ГЈo automГЎtica (via banco):**\n\n| Gatilho | CondiГ§ГЈo verificada no banco HubSoft | Pontos |\n|---------|--------------------------------------|--------|\n| `hubsoft_recorrencia` | Cliente com faturas em dia nos Гәltimos X meses | ConfigurГЎvel por regra |\n| `hubsoft_adiantado` | Fatura paga antes do vencimento | ConfigurГЎvel por regra |\n| `hubsoft_app` | App do provedor instalado (campo no HubSoft) | ConfigurГЎvel por regra |\n\n---\n\n## Models de IntegraГ§ГЈo\n\n| Model | Tabela | DescriГ§ГЈo |\n|-------|--------|-----------|\n| `IntegracaoAPI` | `integracoes_integracaoapi` | Credenciais OAuth2, URL base, token cacheado |\n| `LogIntegracao` | `integracoes_logintegracao` | Audit trail de chamadas Г  API (endpoint, payload, response, status) |\n| `ClienteHubsoft` | `integracoes_clientehubsoft` | Espelho local do cliente HubSoft (dados pessoais, sync status) |\n| `ServicoClienteHubsoft` | `integracoes_servicoclientehubsoft` | Planos/serviГ§os ativos do cliente (velocidade, valor, PPPoE) |\n\n---\n\n## Endpoints Internos (API Aurora)\n\nEndpoints da Aurora que expГөem dados sincronizados da HubSoft:\n\n| Endpoint | MГ©todo | DescriГ§ГЈo |\n|----------|--------|-----------|\n| `/integracoes/api/clientes/` | GET | Lista clientes HubSoft sincronizados (paginado, com filtros) |\n| `/integracoes/api/lead/hubsoft-status/` | GET | Status de um lead especГӯfico na HubSoft |\n\n---\n\n## Fluxo Completo: Lead ao Cliente Ativado\n\n```\n1. Lead chega via WhatsApp (N8N)\n2. Aurora salva o LeadProspecto (status_api='pendente')\n3. Signal envia para HubSoft вҶ’ POST /prospecto\n4. Lead vira prospecto no HubSoft (id_hubsoft salvo)\n5. Vendedor qualifica e coleta documentos\n6. Documentos validados вҶ’ Signal anexa ao contrato HubSoft\n7. Contrato aceito automaticamente na HubSoft\n8. Sync de cliente вҶ’ ClienteHubsoft espelhado localmente\n9. Se mГіdulo CS ativo: membro do Clube criado automaticamente\n```\n\n---\n\n## Checklist de Onboarding\n\nPara cada novo provedor, validar:\n\n- [ ] Credenciais da API HubSoft configuradas (`setup_hubsoft`)\n- [ ] Token OAuth2 funcionando (testar via admin)\n- [ ] Envio de lead de teste (`processar_pendentes --lead-id X --dry-run`)\n- [ ] SincronizaГ§ГЈo de cliente de teste (`sincronizar_clientes --lead-id X --dry-run`)\n- [ ] (Se CS ativo) ConexГЈo ao banco PostgreSQL do HubSoft testada\n- [ ] (Se CS ativo) Webhook N8N configurado e respondendo\n- [ ] Logs de integraГ§ГЈo sendo registrados (`LogIntegracao`)\n\n---\n\n## LimitaГ§Гөes Conhecidas\n\n1. **API HubSoft nГЈo expГөe dados de pagamento/recorrГӘncia.** O Clube depende de conexГЈo direta ao banco. Se a HubSoft liberar esses endpoints no futuro, migrar para API REST.\n\n2. **Token OAuth2 tem expiraГ§ГЈo.** O sistema faz cache e renova automaticamente, mas se as credenciais mudarem no HubSoft, o `IntegracaoAPI` precisa ser atualizado.\n\n3. **SincronizaГ§ГЈo nГЈo Г© em tempo real.** Clientes sГЈo sincronizados sob demanda (apГіs cadastro de prospecto) ou via command (`sincronizar_clientes`). NГЈo hГЎ webhook do HubSoft para a Aurora.\n\n4. **Cada provedor tem sua prГіpria instГўncia HubSoft.** As credenciais sГЈo por tenant (model `IntegracaoAPI` usa `TenantMixin`).\n"}, {"t": "f", "n": "04 Testes", "fn": "04-TESTES.md", "c": "# Testes вҖ” AuroraISP\n\n**Гҡltima atualizaГ§ГЈo:** 01/04/2026\n**Total de testes:** 291 (287 passando, 4 skipped)\n**Cobertura global:** 40%\n**Framework:** pytest + pytest-django + pytest-cov + factory_boy\n\n---\n\n## Como rodar\n\n```bash\ncd robo/dashboard_comercial/gerenciador_vendas\n\n# Rodar todos os testes\npython -m pytest tests/\n\n# Com cobertura\npython -m pytest tests/ --cov=apps --cov-report=term\n\n# Arquivo especГӯfico\npython -m pytest tests/test_automacoes.py -v\n\n# Teste especГӯfico\npython -m pytest tests/test_automacoes.py::EngineDispararEventoTest::test_condicao_verdadeira_executa -v\n```\n\nO `pytest.ini` jГЎ configura `DJANGO_SETTINGS_MODULE = gerenciador_vendas.settings_local` (SQLite in-memory).\n\n---\n\n## Estrutura dos testes\n\n| Arquivo | Testes | O que cobre |\n|---------|--------|-------------|\n| `test_tenant_isolation.py` | 62 | Isolamento multi-tenant: auto-filtro, cross-tenant, middleware, set/get tenant |\n| `test_endpoint_auth.py` | 48 | AutenticaГ§ГЈo de endpoints: @login_required, @api_token_required, acesso negado |\n| `test_models_comercial.py` | 35 | Models de leads, atendimento, cadastro, CRM: criaГ§ГЈo, validaГ§Гөes, str |\n| `test_models_cs.py` | 28 | Models CS: MembroClube, NivelClube, Parceiro, Cupom, IndicaГ§ГЈo, Carteirinha |\n| `test_models_integracoes.py` | 15 | Models IntegracaoAPI, LogIntegracao, ClienteHubsoft, ServicoClienteHubsoft |\n| `test_models_marketing.py` | 8 | Models CampanhaTrafego, DeteccaoCampanha |\n| `test_models_notificacoes.py` | 12 | Models TipoNotificacao, CanalNotificacao, Notificacao, Template |\n| `test_api_drf.py` | 17 | API DRF: CRUD leads N8N, panel ViewSets, autenticaГ§ГЈo Token/Session |\n| `test_signals.py` | 15 | Signals: auto-criaГ§ГЈo CRM, envio HubSoft, conversГЈo lead |\n| `test_module_access.py` | 6 | Acesso a mГ
