{% extends 'vendas_web/base.html' %}

{% block extra_css %}
<style>
  /* ========================================
     PIPELINE / KANBAN - CRM
     ======================================== */
  .pipeline-page {
    background: linear-gradient(135deg, #f0f2ff 0%, #f8f0ff 100%);
    min-height: calc(100vh - 64px);
    padding: 24px;
  }

  /* Barra de controles */
  .pipeline-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .pipeline-toolbar h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1e1b4b;
    margin: 0;
    flex: 1;
  }
  .pipeline-toolbar select,
  .pipeline-toolbar input {
    padding: 8px 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    outline: none;
    transition: border-color .2s;
  }
  .pipeline-toolbar select:focus,
  .pipeline-toolbar input:focus {
    border-color: #667eea;
  }

  /* Board container */
  .kanban-board {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 16px;
    min-height: calc(100vh - 180px);
  }
  .kanban-board::-webkit-scrollbar {
    height: 6px;
  }
  .kanban-board::-webkit-scrollbar-thumb {
    background: #c4b5fd;
    border-radius: 3px;
  }

  /* Coluna */
  .kanban-column {
    flex: 0 0 280px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    border: 1px solid rgba(102,126,234,0.12);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 180px);
    transition: background .2s;
  }
  .kanban-column.drag-over {
    background: rgba(102,126,234,0.12);
    border-color: #667eea;
  }

  /* Header da coluna */
  .column-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .column-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .column-meta {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    font-size: 12px;
    color: #6b7280;
  }
  .column-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Lista de cards */
  .column-cards {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .column-cards::-webkit-scrollbar {
    width: 4px;
  }
  .column-cards::-webkit-scrollbar-thumb {
    background: #e5e7eb;
    border-radius: 2px;
  }

  /* Drop zone vazia */
  .drop-zone-empty {
    flex: 1;
    min-height: 80px;
    border: 2px dashed rgba(102,126,234,0.25);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-size: 13px;
    margin: 4px 0;
  }

  /* Card */
  .op-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    padding: 12px 14px;
    cursor: grab;
    transition: all .2s;
    user-select: none;
    position: relative;
  }
  .op-card:hover {
    box-shadow: 0 4px 16px rgba(102,126,234,0.18);
    border-color: #667eea;
    transform: translateY(-1px);
  }
  .op-card.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }
  .op-card-accent {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-nome {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    line-height: 1.3;
    flex: 1;
  }
  .card-menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #9ca3af;
    padding: 0 2px;
    font-size: 14px;
    line-height: 1;
    transition: color .15s;
  }
  .card-menu-btn:hover { color: #667eea; }

  .card-tel {
    font-size: 12px;
    color: #6b7280;
    margin-bottom: 8px;
  }
  .card-tel i { margin-right: 4px; color: #9ca3af; }

  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 8px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-score {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .badge-valor {
    background: #d1fae5;
    color: #065f46;
  }
  .badge-sla {
    background: #fee2e2;
    color: #991b1b;
    animation: pulse-badge 1.5s infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .badge-tarefas {
    background: #fef3c7;
    color: #92400e;
  }
  .badge-prioridade-urgente { background: #fee2e2; color: #b91c1c; }
  .badge-prioridade-alta { background: #ffedd5; color: #c2410c; }
  .badge-prioridade-normal { background: #f3f4f6; color: #4b5563; }
  .badge-prioridade-baixa { background: #f0fdf4; color: #166534; }

  /* Tags CRM nos cards */
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .card-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
    opacity: .88;
  }
  .card-tag i { font-size: 8px; }

  /* Indicador de tags faltando (só coluna qualificação) */
  .tag-missing {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: #9ca3af;
    background: #f3f4f6;
    border: 1px dashed #d1d5db;
  }
  .tag-missing i { font-size: 8px; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #f3f4f6;
  }
  .card-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-avatar.unassigned {
    background: #e5e7eb;
    color: #9ca3af;
  }
  .card-dias {
    font-size: 11px;
    color: #9ca3af;
  }
  .card-dias.vencido {
    color: #ef4444;
    font-weight: 600;
  }

  /* Loader overlay */
  .pipeline-loader {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(4px);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #667eea;
    gap: 10px;
    transition: opacity .3s;
  }
  .pipeline-loader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 22px;
    height: 22px;
    border: 3px solid #e5e7eb;
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tooltip de mover para estágio */
  .card-context-menu {
    position: absolute;
    right: 8px;
    top: 30px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 100;
    min-width: 160px;
    overflow: hidden;
    display: none;
  }
  .card-context-menu.show { display: block; }
  .context-menu-item {
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
    color: #374151;
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .context-menu-item:hover { background: #f5f3ff; color: #667eea; }
  .context-menu-sep {
    height: 1px;
    background: #f3f4f6;
    margin: 2px 0;
  }

  /* Responsivo */
  @media (max-width: 768px) {
    .pipeline-page { padding: 12px; }
    .kanban-column { flex: 0 0 250px; }
    .pipeline-toolbar h1 { font-size: 18px; }
  }
</style>
{% endblock %}

{% block content %}
<div class="pipeline-page">

  <!-- Loader -->
  <div class="pipeline-loader" id="pipelineLoader">
    <div class="spinner"></div>
    Carregando pipeline…
  </div>

  <!-- Toolbar -->
  <div class="pipeline-toolbar">
    <h1><i class="fas fa-stream" style="color:#667eea;margin-right:8px;"></i>Pipeline CRM</h1>

    <input type="text" id="searchPipeline" placeholder="Buscar lead…" style="width:200px;">


    <button onclick="carregarPipeline()" style="
      background: linear-gradient(135deg,#667eea,#764ba2);
      color:#fff; border:none; border-radius:8px;
      padding:8px 16px; cursor:pointer; font-size:14px; font-weight:600;
    ">
      <i class="fas fa-sync-alt"></i> Atualizar
    </button>

    <a href="{% url 'crm:oportunidades_lista' %}" style="
      background:#f3f4f6; color:#374151; border-radius:8px;
      padding:8px 14px; font-size:13px; text-decoration:none; font-weight:500;
    ">
      <i class="fas fa-list"></i> Lista
    </a>
  </div>

  <!-- Kanban Board -->
  <div class="kanban-board" id="kanbanBoard">
    {% for estagio in estagios %}
    <div class="kanban-column"
         id="col-{{ estagio.pk }}"
         data-estagio-id="{{ estagio.pk }}"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event, {{ estagio.pk }})">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot" style="background:{{ estagio.cor_hex }};"></span>
          <i class="fas {{ estagio.icone_fa }}" style="color:{{ estagio.cor_hex }};font-size:12px;"></i>
          {{ estagio.nome }}
        </div>
        <div class="column-meta">
          <span id="count-{{ estagio.pk }}"><i class="fas fa-circle" style="font-size:8px;"></i> 0</span>
          <span id="valor-{{ estagio.pk }}" style="color:#059669;">R$ 0</span>
        </div>
      </div>
      <div class="column-cards" id="cards-{{ estagio.pk }}">
        <div class="drop-zone-empty" id="empty-{{ estagio.pk }}">
          <i class="fas fa-inbox" style="margin-right:6px;"></i> Sem oportunidades
        </div>
      </div>
    </div>
    {% endfor %}
  </div>

</div>

<!-- Context menu global (reusado) -->
<div class="card-context-menu" id="globalContextMenu">
  <div id="contextMenuItems"></div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// ============================================================
// PIPELINE CRM — Vanilla JS
// ============================================================

const ESTAGIOS = [
  {% for e in estagios %}
  { id: {{ e.pk }}, nome: "{{ e.nome }}", cor: "{{ e.cor_hex }}", tipo: "{{ e.tipo }}", is_ganho: {{ e.is_final_ganho|yesno:"true,false" }}, is_perdido: {{ e.is_final_perdido|yesno:"true,false" }} },
  {% endfor %}
];

// Nomes das 3 tags de qualificação conhecidas
const TAGS_QUALIFICACAO = ['Comercial', 'Endereço', 'Documental'];
const TAG_ICONES = {
  'Comercial':  'fa-handshake',
  'Endereço':   'fa-map-marker-alt',
  'Documental': 'fa-id-card',
};

const CSRF_TOKEN = '{{ csrf_token }}';
let _draggedOpId = null;
let _draggedFromEstagio = null;

// ---- Carregamento inicial ----
document.addEventListener('DOMContentLoaded', () => {
  carregarPipeline();

  // Fechar context menu ao clicar fora
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#globalContextMenu') && !e.target.closest('.card-menu-btn')) {
      fecharContextMenu();
    }
  });

  // Debounce na busca
  let debounceTimer;
  document.getElementById('searchPipeline').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(carregarPipeline, 400);
  });
});

function carregarPipeline() {
  mostrarLoader(true);

  const search = document.getElementById('searchPipeline').value;

  const params = new URLSearchParams();
  if (search) params.append('search', search);

  fetch(`{% url 'crm:api_pipeline_dados' %}?${params}`)
    .then(r => r.json())
    .then(data => {
      if (!data.ok) throw new Error('Erro ao carregar dados');
      renderPipeline(data.estagios);
    })
    .catch(err => {
      console.error(err);
      mostrarNotificacao('Erro ao carregar pipeline', 'error');
    })
    .finally(() => mostrarLoader(false));
}

function renderPipeline(estagios) {
  estagios.forEach(e => {
    const container = document.getElementById(`cards-${e.id}`);
    const emptyZone = document.getElementById(`empty-${e.id}`);
    const countEl = document.getElementById(`count-${e.id}`);
    const valorEl = document.getElementById(`valor-${e.id}`);

    if (!container) return;

    // Atualizar meta da coluna
    countEl.innerHTML = `<i class="fas fa-circle" style="font-size:8px;"></i> ${e.total}`;
    valorEl.textContent = `R$ ${formatarValor(e.total_valor)}`;

    // Limpar cards existentes (preservar empty zone)
    Array.from(container.children).forEach(child => {
      if (!child.classList.contains('drop-zone-empty')) child.remove();
    });

    if (e.oportunidades.length === 0) {
      emptyZone.style.display = 'flex';
    } else {
      emptyZone.style.display = 'none';
      e.oportunidades.forEach(op => {
        container.appendChild(criarCard(op, e));
      });
    }
  });
}

function criarCard(op, estagio) {
  const card = document.createElement('div');
  card.className = 'op-card';
  card.draggable = true;
  card.dataset.opId = op.id;
  card.dataset.estagioId = estagio.id;

  // Accent bar colorida pelo estágio
  const accent = document.createElement('div');
  accent.className = 'op-card-accent';
  accent.style.background = estagio.cor;
  card.appendChild(accent);

  // Badges
  let badgesHtml = '';
  if (op.score > 0) {
    badgesHtml += `<span class="badge badge-score"><i class="fas fa-star" style="font-size:9px;"></i> ${op.score}</span>`;
  }
  if (parseFloat(op.valor) > 0) {
    badgesHtml += `<span class="badge badge-valor">R$ ${formatarValor(parseFloat(op.valor))}</span>`;
  }
  if (op.sla_vencido) {
    badgesHtml += `<span class="badge badge-sla"><i class="fas fa-clock"></i> SLA</span>`;
  }
  if (op.tarefas_pendentes > 0) {
    badgesHtml += `<span class="badge badge-tarefas"><i class="fas fa-tasks"></i> ${op.tarefas_pendentes}</span>`;
  }
  if (op.prioridade !== 'normal') {
    badgesHtml += `<span class="badge badge-prioridade-${op.prioridade}">${op.prioridade.charAt(0).toUpperCase() + op.prioridade.slice(1)}</span>`;
  }

  // Avatar do responsável
  const avatarClass = op.responsavel_id ? 'card-avatar' : 'card-avatar unassigned';
  const avatarText = op.responsavel_inicial || '?';
  const avatarTitle = op.responsavel_nome || 'Sem responsável';

  // Dias no estágio
  const diasClass = op.sla_vencido ? 'card-dias vencido' : 'card-dias';

  // Tags CRM
  const nomesTagsAtuais = (op.tags || []).map(t => t.nome);
  let tagsHtml = '';

  if (estagio.tipo === 'qualificacao') {
    // Coluna de qualificação: mostra tags presentes + indica as ausentes
    const tagsPresentesHtml = (op.tags || []).map(t =>
      `<span class="card-tag" style="background:${t.cor}" title="${escapeHtml(t.nome)}">
        <i class="fas ${TAG_ICONES[t.nome] || 'fa-tag'}"></i> ${escapeHtml(t.nome)}
      </span>`
    ).join('');

    const tagsFaltandoHtml = TAGS_QUALIFICACAO
      .filter(nome => !nomesTagsAtuais.includes(nome))
      .map(nome =>
        `<span class="tag-missing" title="Pendente: ${nome}">
          <i class="fas ${TAG_ICONES[nome] || 'fa-tag'}"></i> ${nome}
        </span>`
      ).join('');

    if (tagsPresentesHtml || tagsFaltandoHtml) {
      tagsHtml = `<div class="card-tags">${tagsPresentesHtml}${tagsFaltandoHtml}</div>`;
    }
  } else if (op.tags && op.tags.length > 0) {
    // Outros estágios: mostra só as tags que existem (sem indicar faltando)
    tagsHtml = `<div class="card-tags">
      ${op.tags.map(t =>
        `<span class="card-tag" style="background:${t.cor}" title="${escapeHtml(t.nome)}">
          <i class="fas ${TAG_ICONES[t.nome] || 'fa-tag'}"></i> ${escapeHtml(t.nome)}
        </span>`
      ).join('')}
    </div>`;
  }

  card.innerHTML += `
    <div class="card-top">
      <div class="card-nome">${escapeHtml(op.nome)}</div>
      <button class="card-menu-btn" onclick="toggleContextMenu(event, ${op.id}, ${estagio.id})" title="Ações">
        <i class="fas fa-ellipsis-v"></i>
      </button>
    </div>
    <div class="card-tel"><i class="fas fa-phone"></i>${escapeHtml(op.telefone || '—')}</div>
    ${badgesHtml ? `<div class="card-badges">${badgesHtml}</div>` : ''}
    ${tagsHtml}
    <div class="card-footer">
      <div class="${avatarClass}" title="${escapeHtml(avatarTitle)}">${escapeHtml(avatarText)}</div>
      <div class="${diasClass}">${op.dias_no_estagio}d${op.sla_vencido ? ' ⚠' : ''}</div>
    </div>
  `;

  // Eventos de drag
  card.addEventListener('dragstart', (e) => onDragStart(e, op.id, estagio.id));
  card.addEventListener('dragend', onDragEnd);

  // Click para abrir detalhe
  card.addEventListener('click', (e) => {
    if (!e.target.closest('.card-menu-btn') && !e.target.closest('.card-context-menu')) {
      window.location.href = `/crm/oportunidades/${op.id}/`;
    }
  });

  return card;
}

// ---- Drag and Drop ----
function onDragStart(e, opId, estagioId) {
  _draggedOpId = opId;
  _draggedFromEstagio = estagioId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, estagioNovoId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');

  if (!_draggedOpId || _draggedFromEstagio === estagioNovoId) return;

  moverOportunidade(_draggedOpId, estagioNovoId);
  _draggedOpId = null;
  _draggedFromEstagio = null;
}

function moverOportunidade(opId, estagioId) {
  mostrarLoader(true);

  fetch('{% url "crm:api_mover_oportunidade" %}', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': CSRF_TOKEN,
    },
    body: JSON.stringify({ oportunidade_id: opId, estagio_id: estagioId }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.ok) {
      carregarPipeline();
      mostrarNotificacao('Oportunidade movida com sucesso', 'success');
    } else {
      mostrarNotificacao(data.erro || 'Erro ao mover', 'error');
      mostrarLoader(false);
    }
  })
  .catch(() => {
    mostrarNotificacao('Erro de conexão', 'error');
    mostrarLoader(false);
  });
}

// ---- Context Menu ----
function toggleContextMenu(e, opId, estagioAtualId) {
  e.stopPropagation();
  const menu = document.getElementById('globalContextMenu');
  const itemsEl = document.getElementById('contextMenuItems');

  // Posicionar perto do botão
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.top = (rect.bottom + window.scrollY) + 'px';
  menu.style.right = '';
  menu.style.left = (rect.left + window.scrollX) + 'px';

  if (menu.classList.contains('show') && menu.dataset.opId === String(opId)) {
    fecharContextMenu();
    return;
  }

  menu.dataset.opId = opId;

  // Montar itens: "Mover para..."
  let html = `
    <div class="context-menu-item" onclick="abrirDetalhe(${opId})">
      <i class="fas fa-eye" style="color:#667eea;"></i> Ver Detalhes
    </div>
    <div class="context-menu-sep"></div>
  `;

  ESTAGIOS.forEach(est => {
    if (est.id !== estagioAtualId) {
      html += `
        <div class="context-menu-item" onclick="moverOportunidade(${opId}, ${est.id}); fecharContextMenu();">
          <i class="fas fa-arrow-right" style="color:${est.cor};"></i> ${escapeHtml(est.nome)}
        </div>
      `;
    }
  });

  itemsEl.innerHTML = html;
  menu.classList.add('show');
}

function fecharContextMenu() {
  document.getElementById('globalContextMenu').classList.remove('show');
}

function abrirDetalhe(opId) {
  window.location.href = `/crm/oportunidades/${opId}/`;
}

// ---- Helpers ----
function mostrarLoader(show) {
  const loader = document.getElementById('pipelineLoader');
  loader.classList.toggle('hidden', !show);
}

function formatarValor(valor) {
  if (valor >= 1000) return (valor / 1000).toFixed(1).replace('.', ',') + 'k';
  return valor.toFixed(2).replace('.', ',');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function mostrarNotificacao(mensagem, tipo) {
  // Usa o sistema de notificação do base.html se disponível
  if (typeof window.notificar === 'function') {
    window.notificar(tipo, mensagem);
  } else if (typeof window.showNotification === 'function') {
    window.showNotification(mensagem, tipo);
  } else {
    console.log(`[${tipo}] ${mensagem}`);
  }
}
</script>
