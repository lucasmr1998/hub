{% extends 'admin_aurora/base_admin.html' %}

{% block title %}Status do Produto{% endblock %}

{% block content %}
<div class="admin-header">
    <h1><i class="fas fa-cube" style="color:#818cf8;"></i> Status do Produto</h1>
</div>

<div class="card">
    <div class="md-content">
        {{ html_content|safe }}
    </div>
</div>

<style>
.md-content { font-size: .85rem; line-height: 1.7; color: #334155; }
.md-content h1 { font-size: 1.3rem; font-weight: 800; color: #0f172a; border-bottom: 2px solid #818cf8; padding-bottom: 8px; margin: 24px 0 16px; }
.md-content h2 { font-size: 1.05rem; font-weight: 700; color: #1e293b; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
.md-content h3 { font-size: .92rem; font-weight: 700; color: #334155; margin: 20px 0 8px; }
.md-content p { margin-bottom: 10px; }
.md-content table { width: 100%; border-collapse: collapse; margin: 12px 0 20px; font-size: .8rem; }
.md-content th { background: #f8fafc; padding: 8px 12px; text-align: left; font-weight: 700; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #64748b; border: 1px solid #e2e8f0; }
.md-content td { padding: 8px 12px; border: 1px solid #e2e8f0; }
.md-content tr:hover td { background: #f8fafc; }
.md-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 20px 0; }
.md-content ul, .md-content ol { margin-bottom: 12px; padding-left: 20px; }
.md-content li { margin-bottom: 4px; }
.md-content strong { color: #0f172a; }
.md-content code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: .8rem; color: #6366f1; }
.md-content pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
.md-content pre code { background: none; color: inherit; padding: 0; }
</style>
{% endblock %}
