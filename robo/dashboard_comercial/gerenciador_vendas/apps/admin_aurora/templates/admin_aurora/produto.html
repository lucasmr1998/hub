{% extends "admin_aurora/base_admin.html" %}

{% block title %}Status do produto{% endblock %}
{% block topbar_title %}Status do produto{% endblock %}

{% block content %}
  <div class="card">
    <div class="card-body">
      <div class="md-content">
        {{ html_content|safe }}
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_css %}
<style>
  .md-content { font-size: var(--fs-sm); line-height: 1.7; color: var(--color-text-secondary); }
  .md-content h1 {
    font-size: var(--fs-xl);
    font-weight: var(--fw-extrabold);
    color: var(--color-text);
    border-bottom: 2px solid var(--color-primary);
    padding-bottom: var(--sp-2);
    margin: var(--sp-6) 0 var(--sp-4);
  }
  .md-content h2 {
    font-size: var(--fs-lg);
    font-weight: var(--fw-bold);
    color: var(--color-text);
    margin: var(--sp-6) 0 var(--sp-3);
    padding-bottom: var(--sp-2);
    border-bottom: 1px solid var(--color-border);
  }
  .md-content h3 {
    font-size: var(--fs-md);
    font-weight: var(--fw-bold);
    color: var(--color-text);
    margin: var(--sp-5) 0 var(--sp-2);
  }
  .md-content p { margin-bottom: var(--sp-3); }
  .md-content table { width: 100%; border-collapse: collapse; margin: var(--sp-3) 0 var(--sp-5); font-size: var(--fs-xs); }
  .md-content th {
    background: var(--color-surface);
    padding: var(--sp-2) var(--sp-3);
    text-align: left;
    font-weight: var(--fw-bold);
    font-size: var(--fs-xs);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--color-text-muted);
    border: 1px solid var(--color-border);
  }
  .md-content td {
    padding: var(--sp-2) var(--sp-3);
    border: 1px solid var(--color-border);
  }
  .md-content tr:hover td { background: var(--color-surface); }
  .md-content hr { border: none; border-top: 1px solid var(--color-border); margin: var(--sp-5) 0; }
  .md-content ul, .md-content ol { margin-bottom: var(--sp-3); padding-left: var(--sp-5); }
  .md-content li { margin-bottom: 4px; }
  .md-content strong { color: var(--color-text); }
  .md-content code {
    background: var(--color-surface-2);
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-size: var(--fs-xs);
    color: var(--color-primary-text);
  }
  .md-content pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: var(--sp-4);
    border-radius: var(--radius);
    overflow-x: auto;
    margin: var(--sp-3) 0;
  }
  .md-content pre code { background: none; color: inherit; padding: 0; }
</style>
{% endblock %}
