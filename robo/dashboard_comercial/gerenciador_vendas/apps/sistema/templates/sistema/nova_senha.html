{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
        .card { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
        .card h1 { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:8px; }
        .card p { font-size:13px; color:#64748b; margin-bottom:24px; }
        .form-group { margin-bottom:16px; }
        .form-group label { font-size:12px; font-weight:600; color:#475569; display:block; margin-bottom:6px; }
        .form-group input { width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px; font-family:inherit; }
        .form-group input:focus { border-color:#667eea; outline:none; box-shadow:0 0 0 3px rgba(102,126,234,0.1); }
        .btn { width:100%; padding:12px; background:#667eea; color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
        .btn:hover { background:#5a6fd6; }
        .alert { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; }
        .alert-error { background:#fee2e2; color:#991b1b; }
        .alert-success { background:#dcfce7; color:#166534; }
    </style>
</head>
<body>
    <div class="card">
        <h1><i class="fas fa-key" style="color:#667eea;margin-right:8px;"></i> Nova Senha</h1>
        <p>Defina sua nova senha abaixo.</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" name="senha1" placeholder="Minimo 6 caracteres" required>
            </div>
            <div class="form-group">
                <label>Confirmar Senha</label>
                <input type="password" name="senha2" placeholder="Repita a senha" required>
            </div>
            <button type="submit" class="btn">Alterar Senha</button>
        </form>
    </div>
</body>
</html>
