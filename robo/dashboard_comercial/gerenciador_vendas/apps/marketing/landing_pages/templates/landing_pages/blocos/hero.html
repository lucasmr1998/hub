<section class="lp-bloco lp-hero" style="
    {% if props.imagem_fundo %}background-image: linear-gradient(0deg, {{ props.cor_overlay|default:'rgba(0,0,0,0.4)' }}, {{ props.cor_overlay|default:'rgba(0,0,0,0.4)' }}), url('{{ props.imagem_fundo }}');{% endif %}
    background-size: cover;
    background-position: center;
    color: {{ props.cor_texto|default:'#ffffff' }};
    padding: 80px 16px;
    text-align: {{ props.alinhamento|default:'centro'|cut:'centro'|default:props.alinhamento|default:'center' }};
">
  <div class="lp-container" style="text-align: {% if props.alinhamento == 'esquerda' %}left{% elif props.alinhamento == 'direita' %}right{% else %}center{% endif %};">
    {% if props.titulo %}<h1 style="font-size: 2.5rem; margin: 0 0 16px; font-weight: 700;">{{ props.titulo }}</h1>{% endif %}
    {% if props.subtitulo %}<p style="font-size: 1.25rem; margin: 0 0 32px; max-width: 720px; {% if props.alinhamento == 'centro' or not props.alinhamento %}margin-left: auto; margin-right: auto;{% endif %}">{{ props.subtitulo|linebreaksbr }}</p>{% endif %}
    {% if props.cta_texto and props.cta_link %}
      <a href="{{ props.cta_link }}" style="display:inline-block;padding:14px 32px;background:#ffffff;color:#1f2937;border-radius:6px;text-decoration:none;font-weight:600;font-size:1rem;">{{ props.cta_texto }}</a>
    {% endif %}
  </div>
</section>
