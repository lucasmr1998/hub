<div class="lp-campo lp-campo-select" style="display: flex; flex-direction: column; gap: 4px;">
  <label for="lp-{{ props.name }}" style="font-weight: 500; font-size: 0.875rem; color: #374151;">{{ props.label }}{% if props.required %} <span style="color:#dc2626;">*</span>{% endif %}</label>
  <select id="lp-{{ props.name }}" name="{{ props.name }}"
          {% if props.required %}required{% endif %}
          {% if props.multi %}multiple{% endif %}
          style="padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; background: #ffffff;">
    {% if not props.multi %}<option value="">{{ props.placeholder|default:'Selecione...' }}</option>{% endif %}
    {% for opcao in props.opcoes %}
      <option value="{{ opcao }}">{{ opcao }}</option>
    {% endfor %}
  </select>
  {% if props.help_text %}<small style="color: #6b7280; font-size: 0.75rem;">{{ props.help_text }}</small>{% endif %}
</div>
