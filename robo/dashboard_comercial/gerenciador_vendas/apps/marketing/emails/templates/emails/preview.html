<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview — {{ template.nome }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body { margin:0; padding:0; background:#e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .preview-bar { position:fixed; top:0; left:0; right:0; background:#0f172a; color:#fff; padding:10px 20px; display:flex; align-items:center; gap:12px; z-index:100; font-size:13px; }
        .preview-bar a { color:#93c5fd; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .preview-bar a:hover { color:#bfdbfe; }
        .preview-frame { margin-top:52px; padding:24px; display:flex; justify-content:center; }
    </style>
</head>
<body>
    <div class="preview-bar">
        <a href="{% url 'marketing_emails:editor' template.pk %}"><i class="bi bi-arrow-left"></i> Voltar ao editor</a>
        <span style="flex:1;"></span>
        <span>{{ template.nome }}</span>
    </div>
    <div class="preview-frame">
        {{ html_email|safe }}
    </div>
</body>
</html>
