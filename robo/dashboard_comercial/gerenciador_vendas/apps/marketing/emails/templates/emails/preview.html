<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview — {{ template.nome }}</title>
    <style>
        body { margin:0; padding:0; background:#e5e7eb; font-family:Arial, sans-serif; }
        .preview-bar { position:fixed; top:0; left:0; right:0; background:#1a1a2e; color:#fff; padding:10px 20px; display:flex; align-items:center; gap:12px; z-index:100; font-size:13px; }
        .preview-bar a { color:#93c5fd; text-decoration:none; }
        .preview-frame { margin-top:52px; padding:24px; display:flex; justify-content:center; }
    </style>
</head>
<body>
    <div class="preview-bar">
        <a href="{% url 'marketing_emails:editor' template.pk %}"><i class="fas fa-arrow-left" style="margin-right:4px;"></i> Voltar ao editor</a>
        <span style="flex:1;"></span>
        <span>{{ template.nome }}</span>
    </div>
    <div class="preview-frame">
        {{ html_email|safe }}
    </div>
</body>
</html>
