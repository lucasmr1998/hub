name: CI — Testes e Verificação

on:
  push:
    branches: [main]
    paths:
      - 'robo/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'robo/**'

jobs:
  gate-engine-test:
    name: Gate — engine.py exige teste
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar mudança em engine + testes
        run: |
          BASE=origin/${{ github.base_ref }}
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          CHANGED_ENGINE=$(echo "$CHANGED" | grep -E "apps/comercial/atendimento/engine\.py$|apps/marketing/automacoes/engine\.py$" || true)
          CHANGED_TESTS=$(echo "$CHANGED" | grep -E "tests/test_engine_.*\.py$|tests/test_automacoes\.py$|tests/test_automacao_pipeline\.py$|tests/test_fluxo_.*\.py$" || true)
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [ -n "$CHANGED_ENGINE" ] && [ -z "$CHANGED_TESTS" ]; then
            if echo "$PR_TITLE" | grep -qi "\[no-test-needed\]"; then
              echo "⚠ engine.py mudou sem teste, mas PR tem [no-test-needed]. Ok."
              exit 0
            fi
            echo "::error::engine.py mudou sem teste correspondente. Adicionar teste em tests/ ou justificar com [no-test-needed] no titulo do PR."
            echo "Arquivos de engine alterados:"
            echo "$CHANGED_ENGINE"
            exit 1
          fi
          echo "✅ Gate ok"

  test:
    name: Django Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: robo/dashboard_comercial/gerenciador_vendas

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: robo/dashboard_comercial/gerenciador_vendas/requirements.txt

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-django factory-boy

      - name: Django check
        run: python manage.py check --settings=gerenciador_vendas.settings_local

      - name: Rodar testes
        run: python -m pytest tests/ -v --tb=short

      - name: Verificar migrations
        run: python manage.py migrate --settings=gerenciador_vendas.settings_local --run-syncdb 2>&1
